[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Single [pytest] config — governs BOTH no-arg runs from the repo root
# AND targeted `pytest tests/<module>` runs (the inner dev loop). pytest
# resolves ini from the nearest ancestor; with tests/pytest.ini removed
# all targeted runs also fall back to this file.
#
# `-m "not smoke and not smoke_slow and not slow"` keeps both run modes
# FAST: smoke scenarios are opt-in via `pytest -m smoke`, and heavy
# `slow`-marked tests (full world-builds, per-test DB migrations,
# Node-subprocess SPA tests, Monte-Carlo loops) are opt-in via
# `pytest -m slow`. The full gate (`run_all_tests.bat`, which clears
# addopts via `-o addopts=`) still runs EVERYTHING, including smoke
# and slow.
addopts = -v --tb=short -x -m "not smoke and not smoke_slow and not slow"
# Note: `timeout = 30` was removed because pytest-timeout is not in
# requirements.txt; including it produced a PytestConfigWarning on
# every run. To re-enable per-test timeouts, add pytest-timeout to
# requirements.txt and use `addopts = ... --timeout=30`.
# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    economy: economy and credits flow tests
    combat: combat system tests
    space: space flight and combat tests
    tutorial: tutorial system tests
    smoke: end-to-end smoke scenarios run via in-process GameServer (opt-in via -m smoke)
    smoke_slow: smoke scenarios that boot a subprocess server (opt-in via -m smoke_slow). Reserved; no scenarios shipped under this marker yet.
