<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars D6 MUSH — Mos Eisley</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg-void: #030508;
    --bg-deep: #060910;
    --bg-panel: #0a0e16;
    --bg-surface: #0e1320;
    --bg-input: #111827;
    --bg-terminal: #070a0f;
    --border-dim: #141d2b;
    --border-mid: #1c2940;
    --border-bright: #263550;
    --text-primary: #a0aab8;
    --text-dim: #4a5568;
    --text-bright: #d8e0ea;
    --text-white: #edf2f7;
    --accent-green: #38b249;
    --accent-amber: #d4a020;
    --accent-red: #e5534b;
    --accent-blue: #4d9eff;
    --accent-cyan: #2ec4b6;
    --accent-purple: #a78bfa;
    --accent-gold: #c8a84e;
    --scrollbar-track: #0a0e16;
    --scrollbar-thumb: #1c2940;

    --mood-glow: rgba(46, 196, 182, 0.03);
    --mood-accent: #2ec4b6;
    --mood-border: rgba(46, 196, 182, 0.1);
    --mood-edge: rgba(46, 196, 182, 0.15);

    --font-mono: 'Share Tech Mono', 'Consolas', 'Courier New', monospace;
    --font-display: 'Orbitron', sans-serif;
    --font-ui: 'Rajdhani', sans-serif;

    --sidebar-w: 240px;
  }

  /* ── Ambient Mood Themes ── */
  [data-mood="cantina"] {
    --mood-glow: rgba(210, 153, 34, 0.04);
    --mood-accent: #d4a020;
    --mood-border: rgba(210, 153, 34, 0.12);
    --mood-edge: rgba(210, 153, 34, 0.2);
  }
  [data-mood="spaceport"], [data-mood="industrial"] {
    --mood-glow: rgba(77, 158, 255, 0.04);
    --mood-accent: #4d9eff;
    --mood-border: rgba(77, 158, 255, 0.1);
    --mood-edge: rgba(77, 158, 255, 0.18);
  }
  [data-mood="jabba"], [data-mood="palatial"] {
    --mood-glow: rgba(167, 139, 250, 0.05);
    --mood-accent: #a78bfa;
    --mood-border: rgba(167, 139, 250, 0.12);
    --mood-edge: rgba(167, 139, 250, 0.18);
  }
  [data-mood="government"], [data-mood="official"] {
    --mood-glow: rgba(229, 83, 75, 0.03);
    --mood-accent: #e5534b;
    --mood-border: rgba(229, 83, 75, 0.1);
    --mood-edge: rgba(229, 83, 75, 0.15);
  }
  [data-mood="shops"], [data-mood="commercial"] {
    --mood-glow: rgba(56, 178, 73, 0.04);
    --mood-accent: #38b249;
    --mood-border: rgba(56, 178, 73, 0.12);
    --mood-edge: rgba(56, 178, 73, 0.18);
  }
  [data-mood="combat"] {
    --mood-glow: rgba(229, 83, 75, 0.06);
    --mood-accent: #e5534b;
    --mood-border: rgba(229, 83, 75, 0.18);
    --mood-edge: rgba(229, 83, 75, 0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ══════════════════════════════════════
     APP SHELL
     ══════════════════════════════════════ */
  .app {
    display: grid;
    grid-template-columns: 1fr var(--sidebar-w);
    grid-template-rows: 38px 1fr 46px;
    height: 100vh;
    transition: grid-template-columns 0.3s ease;
  }

  /* ══════════════════════════════════════
     HEADER BAR
     ══════════════════════════════════════ */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px 0 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-dim);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 5%, var(--mood-edge) 30%,
      var(--mood-accent) 50%,
      var(--mood-edge) 70%, transparent 95%);
    opacity: 0.4;
    transition: all 2s ease;
  }

  .header-brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .header-logo {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--accent-gold);
    text-shadow: 0 0 30px rgba(200, 168, 78, 0.25);
  }
  .header-sep {
    width: 1px;
    height: 14px;
    background: var(--border-mid);
  }
  .header-sub {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-red);
    transition: all 0.4s;
  }
  .conn-dot.connected { background: var(--accent-green); box-shadow: 0 0 6px rgba(56,178,73,0.5); }
  .conn-dot.connecting { background: var(--accent-amber); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  .conn-label {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .conn-btn {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid var(--border-mid);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .conn-btn.disconnect { color: var(--text-dim); }
  .conn-btn.disconnect:hover { color: var(--accent-red); border-color: var(--accent-red); }
  .conn-btn.reconnect { color: var(--accent-green); border-color: rgba(56,178,73,0.3); }
  .conn-btn.reconnect:hover { border-color: var(--accent-green); background: rgba(56,178,73,0.06); }

  /* ══════════════════════════════════════
     TERMINAL AREA
     ══════════════════════════════════════ */
  .main-area {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    padding: 6px 6px 4px 6px;
    background: var(--bg-deep);
    overflow: hidden;
  }

  .terminal {
    flex: 1;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border-mid);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
    background: var(--bg-terminal);
    box-shadow:
      inset 0 2px 6px rgba(0,0,0,0.5),
      0 0 1px var(--border-bright),
      0 0 30px var(--mood-glow),
      0 0 80px var(--mood-glow);
    transition: box-shadow 2s ease;
  }

  /* Thin accent edge — left */
  .terminal::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--mood-accent), transparent 80%);
    opacity: 0.3;
    z-index: 3;
    transition: all 2s ease;
  }

  /* Subtle scanlines */
  .terminal::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 4px
    );
    z-index: 2;
  }

  /* Terminal top bar */
  .term-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 3px 10px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
    min-height: 22px;
  }
  .term-bar-left {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .term-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--border-mid);
    transition: all 0.8s;
  }
  .term-dot.on {
    background: var(--mood-accent);
    box-shadow: 0 0 4px var(--mood-accent);
  }
  .term-title {
    font-family: var(--font-display);
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.5;
    margin-left: 4px;
  }
  .term-meta {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    opacity: 0.35;
  }

  /* Output scroll area */
  #output {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 12px 8px 12px;
    position: relative;
    z-index: 1;
  }
  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }
  #output::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

  .output-line {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 14px;
    line-height: 1.4;
    min-height: 1.4em;
  }
  .output-line:empty::before { content: '\200b'; }
  .output-line.fresh { animation: lineIn 0.1s ease-out; }
  @keyframes lineIn { from { opacity: 0.3; } to { opacity: 1; } }

  .system-msg {
    color: var(--text-dim);
    font-size: 12px;
    opacity: 0.7;
  }

  /* ══════════════════════════════════════
     INPUT BAR
     ══════════════════════════════════════ */
  .input-area {
    grid-column: 1;
    grid-row: 3;
    display: flex;
    align-items: center;
    padding: 4px 6px;
    gap: 0;
    background: var(--bg-deep);
  }

  .input-shell {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border-mid);
    border-radius: 4px;
    padding: 0 10px;
    transition: border-color 0.2s;
  }
  .input-shell:focus-within {
    border-color: var(--mood-accent);
  }

  .input-caret {
    font-size: 13px;
    color: var(--mood-accent);
    user-select: none;
    margin-right: 8px;
    transition: color 2s;
    opacity: 0.8;
  }

  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px 0;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-bright);
    outline: none;
    min-width: 0;
  }
  #cmd-input::placeholder { color: var(--text-dim); opacity: 0.5; }

  /* Send button — minimal, keyboard users dominate */
  #send-btn {
    font-family: var(--font-display);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 10px;
    margin-left: 4px;
    background: transparent;
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover {
    color: var(--accent-green);
    border-color: rgba(56,178,73,0.3);
  }

  /* ══════════════════════════════════════
     SIDEBAR
     ══════════════════════════════════════ */
  .sidebar {
    grid-column: 2;
    grid-row: 2 / 4;
    background: var(--bg-panel);
    border-left: 1px solid var(--border-dim);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

  .sb-section {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-dim);
  }

  .sb-label {
    font-family: var(--font-display);
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* ── Character Identity ── */
  .char-name {
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-gold);
    line-height: 1.2;
    text-shadow: 0 0 16px rgba(200,168,78,0.12);
  }
  .char-name.empty { color: var(--text-dim); font-size: 13px; font-weight: 500; }

  /* ── Wound bar ── */
  .wound-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .wound-label {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    min-width: 44px;
  }
  .wound-bar { display: flex; gap: 2px; flex: 1; }
  .wound-seg {
    flex: 1; height: 4px; border-radius: 1px;
    background: var(--border-dim);
    transition: all 0.3s;
  }
  .wound-seg.healthy  { background: var(--accent-green); }
  .wound-seg.stunned  { background: var(--accent-amber); }
  .wound-seg.wounded  { background: #da6d28; }
  .wound-seg.incap    { background: var(--accent-red); }
  .wound-seg.mortal   { background: #8b0000; animation: pulse 1.2s infinite; }

  /* ── Combat Panel ── */
  #sec-combat { display: none; }
  #sec-combat.combat-active { display: block; }

  .combat-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .combat-round {
    font-family: var(--font-display); font-size: 9px; letter-spacing: 0.12em;
    color: var(--accent-red); text-transform: uppercase;
  }
  .combat-phase {
    font-size: 9px; color: var(--text-dim); text-transform: uppercase;
  }

  .cb-row {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 0; border-bottom: 1px solid var(--border-dim);
  }
  .cb-row:last-child { border-bottom: none; }
  .cb-name {
    flex: 1; font-size: 11px; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cb-name.is-you { color: var(--accent-cyan); font-weight: bold; }
  .cb-init {
    font-size: 9px; color: var(--text-dim); min-width: 20px; text-align: right;
  }
  .cb-wound {
    display: flex; gap: 1px;
  }
  .cb-wound-pip {
    width: 5px; height: 5px; border-radius: 1px;
    background: var(--border-dim);
  }
  .cb-wound-pip.healthy  { background: var(--accent-green); }
  .cb-wound-pip.stunned  { background: var(--accent-amber); }
  .cb-wound-pip.wounded  { background: #da6d28; }
  .cb-wound-pip.wounded2 { background: #c0391b; }
  .cb-wound-pip.incap    { background: var(--accent-red); }
  .cb-wound-pip.mortal   { background: #8b0000; animation: pulse 1.2s infinite; }
  .cb-wound-pip.dead     { background: #3a0000; }

  .cb-decl {
    font-size: 9px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 70px;
  }
  .cb-decl.declared { color: var(--accent-green); }
  .cb-decl.waiting  { color: var(--accent-amber); }

  .combat-your-action {
    margin-top: 6px; padding: 4px 6px;
    background: rgba(229,83,75,0.07); border: 1px solid rgba(229,83,75,0.2);
    border-radius: 3px; font-size: 10px; color: var(--text-primary);
    line-height: 1.4;
  }
  .combat-waiting {
    margin-top: 4px; font-size: 9px; color: var(--text-dim);
    font-style: italic;
  }

  .quick-pill.combat-pill {
    background: rgba(229,83,75,0.1); border-color: rgba(229,83,75,0.3);
    color: var(--accent-red);
  }
  .quick-pill.combat-pill:hover {
    background: rgba(229,83,75,0.2); border-color: var(--accent-red);
  }

  /* ── Stats ── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .stat-cell {
    padding: 4px 0;
  }
  .stat-num {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 400;
    line-height: 1;
  }
  .stat-num.credits { color: var(--accent-amber); }
  .stat-num.fp { color: var(--accent-blue); }
  .stat-num.cp { color: var(--accent-green); }
  .stat-num.dsp { color: var(--accent-red); }
  .stat-sub {
    font-family: var(--font-ui);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 1px;
  }

  /* ── Location ── */
  .loc-name {
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent-cyan);
    line-height: 1.2;
  }
  .loc-zone {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    color: var(--mood-accent);
    border: 1px solid var(--mood-border);
    background: var(--mood-glow);
    margin-top: 3px;
    transition: all 1.5s;
  }

  /* ── Exits ── */
  .exit-pills { display: flex; flex-wrap: wrap; gap: 3px; }
  .exit-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 7px;
    background: var(--bg-surface);
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    color: var(--accent-cyan);
    cursor: pointer;
    transition: all 0.12s;
  }
  .exit-pill:hover {
    border-color: var(--accent-cyan);
    background: rgba(46,196,182,0.05);
  }

  /* ── Quick Commands ── */
  .quick-pills { display: flex; flex-wrap: wrap; gap: 3px; }
  .quick-pill {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 6px;
    background: transparent;
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.12s;
  }
  .quick-pill:hover {
    color: var(--accent-green);
    border-color: rgba(56,178,73,0.3);
  }

  /* ── Comlink Feed ── */
  .news-scroll {
    max-height: 140px;
    overflow-y: auto;
  }
  .news-scroll::-webkit-scrollbar { width: 2px; }
  .news-scroll::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); }

  .news-item {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    padding: 3px 0;
    border-bottom: 1px solid rgba(20,29,43,0.5);
    line-height: 1.3;
  }
  .news-item:last-child { border-bottom: none; }
  .news-tag {
    font-family: var(--font-display);
    font-size: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0px 3px;
    border-radius: 2px;
    margin-right: 3px;
    vertical-align: 1px;
  }
  .news-tag.combat { color: var(--accent-red); border: 1px solid rgba(229,83,75,0.3); }
  .news-tag.system { color: var(--accent-amber); border: 1px solid rgba(212,160,32,0.3); }
  .news-tag.event  { color: var(--accent-purple); border: 1px solid rgba(167,139,250,0.3); }
  .news-tag.space  { color: var(--accent-cyan); border: 1px solid rgba(46,196,182,0.3); }

  /* ── Alert Level Badge ── */
  .alert-badge {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 2px;
    margin-top: 3px;
    margin-left: 4px;
    transition: all 0.5s;
    vertical-align: 1px;
  }
  .alert-badge.lockdown  { color: #e5534b; border: 1px solid rgba(229,83,75,0.4); background: rgba(229,83,75,0.08); }
  .alert-badge.high_alert { color: #d4a020; border: 1px solid rgba(212,160,32,0.4); background: rgba(212,160,32,0.08); }
  .alert-badge.standard  { color: var(--text-dim); border: 1px solid var(--border-dim); background: transparent; }
  .alert-badge.lax       { color: #38b249; border: 1px solid rgba(56,178,73,0.3); background: rgba(56,178,73,0.06); }
  .alert-badge.underworld { color: #a78bfa; border: 1px solid rgba(167,139,250,0.4); background: rgba(167,139,250,0.08); }
  .alert-badge.unrest    { color: #4d9eff; border: 1px solid rgba(77,158,255,0.4); background: rgba(77,158,255,0.08); }

  /* ── World Event Banner ── */
  .event-banner {
    display: none;
    padding: 4px 12px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    border-bottom: 1px solid var(--border-dim);
    animation: bannerIn 0.4s ease-out;
    flex-shrink: 0;
    z-index: 4;
    position: relative;
  }
  .event-banner.active { display: block; }
  .event-banner.alert-imperial {
    background: linear-gradient(90deg, rgba(229,83,75,0.08), rgba(229,83,75,0.15), rgba(229,83,75,0.08));
    color: #e5534b;
    border-bottom-color: rgba(229,83,75,0.2);
  }
  .event-banner.alert-neutral {
    background: linear-gradient(90deg, rgba(212,160,32,0.06), rgba(212,160,32,0.12), rgba(212,160,32,0.06));
    color: var(--accent-amber);
    border-bottom-color: rgba(212,160,32,0.2);
  }
  .event-banner.alert-criminal {
    background: linear-gradient(90deg, rgba(167,139,250,0.06), rgba(167,139,250,0.12), rgba(167,139,250,0.06));
    color: var(--accent-purple);
    border-bottom-color: rgba(167,139,250,0.2);
  }
  .event-banner .banner-dismiss {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    background: none;
    border: none;
    padding: 2px 4px;
    opacity: 0.5;
  }
  .event-banner .banner-dismiss:hover { opacity: 1; }
  @keyframes bannerIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

  /* ── Pre-login sidebar state ── */
  .sb-section.needs-char {
    opacity: 0.3;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  .app.logged-in .sb-section.needs-char {
    opacity: 1;
    pointer-events: auto;
  }

  /* ══════════════════════════════════════
     ANSI COLORS
     ══════════════════════════════════════ */
  .ansi-bold { font-weight: bold; }
  .ansi-dim { opacity: 0.6; }
  .ansi-italic { font-style: italic; }
  .ansi-underline { text-decoration: underline; }
  .ansi-blink { animation: blink 1s step-end infinite; }
  .ansi-strikethrough { text-decoration: line-through; }
  @keyframes blink { 50% { opacity: 0; } }

  .ansi-fg-30 { color: #4d4d4d; } .ansi-fg-31 { color: #e5534b; }
  .ansi-fg-32 { color: #38b249; } .ansi-fg-33 { color: #d29922; }
  .ansi-fg-34 { color: #4d9eff; } .ansi-fg-35 { color: #a78bfa; }
  .ansi-fg-36 { color: #2ec4b6; } .ansi-fg-37 { color: #d8e0ea; }
  .ansi-fg-90 { color: #5a6577; } .ansi-fg-91 { color: #ff7b72; }
  .ansi-fg-92 { color: #6ee07a; } .ansi-fg-93 { color: #e3b341; }
  .ansi-fg-94 { color: #79c0ff; } .ansi-fg-95 { color: #c4a8ff; }
  .ansi-fg-96 { color: #5ee8d8; } .ansi-fg-97 { color: #f0f4f8; }

  .ansi-bg-40 { background: #4d4d4d; } .ansi-bg-41 { background: #7a2420; }
  .ansi-bg-42 { background: #1a4d2e; } .ansi-bg-43 { background: #6b4e14; }
  .ansi-bg-44 { background: #1a3a6b; } .ansi-bg-45 { background: #4a3070; }
  .ansi-bg-46 { background: #145550; } .ansi-bg-47 { background: #c0c0c0; color: #000; }

  /* ══════════════════════════════════════
     MOBILE
     ══════════════════════════════════════ */
  @media (max-width: 700px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 38px 1fr 46px auto;
    }
    .sidebar {
      grid-column: 1; grid-row: 4;
      flex-direction: row; flex-wrap: wrap;
      border-left: none; border-top: 1px solid var(--border-dim);
      padding: 4px; gap: 4px;
      max-height: 120px;
    }
    .sb-section { flex: 1; min-width: 90px; padding: 6px; }
    .sb-label { font-size: 6px; }
    .header-sub, .header-sep { display: none; }
    .header-logo { font-size: 9px; letter-spacing: 3px; }
    #cmd-input { font-size: 16px; }
    .main-area { padding: 3px; }
    .news-scroll { max-height: 60px; }
  }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <span class="header-logo">Star Wars</span>
      <div class="header-sep"></div>
      <span class="header-sub">D6 Revised &amp; Expanded</span>
    </div>
    <div class="header-right">
      <div class="conn-status">
        <div class="conn-dot" id="conn-dot"></div>
        <span class="conn-label" id="conn-label">Offline</span>
      </div>
      <button class="conn-btn disconnect" id="conn-btn">Disconnect</button>
    </div>
  </header>

  <!-- TERMINAL -->
  <div class="main-area">
    <div class="terminal" id="terminal">
      <div class="term-bar">
        <div class="term-bar-left">
          <div class="term-dot" id="td0"></div>
          <div class="term-dot" id="td1"></div>
          <div class="term-dot" id="td2"></div>
          <span class="term-title">Terminal</span>
        </div>
        <span class="term-meta" id="term-meta"></span>
      </div>
      <div class="event-banner" id="event-banner">
        <span id="event-banner-text"></span>
        <button class="banner-dismiss" id="event-dismiss">&times;</button>
      </div>
      <div id="output"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-shell">
      <span class="input-caret">&gt;</span>
      <input type="text" id="cmd-input" placeholder="Enter command..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <button id="send-btn">Send</button>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- Character -->
    <div class="sb-section">
      <div class="sb-label">Character</div>
      <div class="char-name empty" id="hud-name">Not logged in</div>
    </div>

    <!-- Condition -->
    <div class="sb-section needs-char" id="sec-condition">
      <div class="sb-label">Condition</div>
      <div class="wound-row">
        <span class="wound-label" id="hud-wound">OK</span>
        <div class="wound-bar" id="wound-bar">
          <div class="wound-seg healthy"></div>
          <div class="wound-seg healthy"></div>
          <div class="wound-seg healthy"></div>
          <div class="wound-seg healthy"></div>
          <div class="wound-seg healthy"></div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="sb-section needs-char" id="sec-stats">
      <div class="sb-label">Stats</div>
      <div class="stat-grid">
        <div class="stat-cell">
          <div class="stat-num credits" id="hud-credits">—</div>
          <div class="stat-sub">Credits</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num fp" id="hud-fp">—</div>
          <div class="stat-sub">Force</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num cp" id="hud-cp">—</div>
          <div class="stat-sub">Char Pts</div>
        </div>
        <div class="stat-cell" id="dsp-cell" style="display:none;">
          <div class="stat-num dsp" id="hud-dsp">0</div>
          <div class="stat-sub">Dark Side</div>
        </div>
      </div>
    </div>

    <!-- Location -->
    <div class="sb-section needs-char">
      <div class="sb-label">Location</div>
      <div class="loc-name" id="hud-room">—</div>
      <div>
        <span class="loc-zone" id="hud-zone" style="display:none;"></span>
        <span class="alert-badge" id="hud-alert" style="display:none;"></span>
      </div>
    </div>

    <!-- Exits -->
    <div class="sb-section needs-char">
      <div class="sb-label">Exits</div>
      <div class="exit-pills" id="hud-exits">
        <span style="color:var(--text-dim);font-size:11px;">—</span>
      </div>
    </div>

    <!-- Comlink -->
    <div class="sb-section">
      <div class="sb-label">Comlink Feed</div>
      <div class="news-scroll" id="news-scroll">
        <div id="news-items">
          <div class="news-item" style="font-style:italic;opacity:0.5;">Scanning frequencies...</div>
        </div>
      </div>
    </div>

    <!-- Combat Panel (shown only during active combat) -->
    <div class="sb-section needs-char" id="sec-combat">
      <div class="combat-header">
        <span class="combat-round" id="cb-round">ROUND 1</span>
        <span class="combat-phase" id="cb-phase">DECLARATION</span>
      </div>
      <div id="cb-combatants"></div>
      <div class="combat-your-action" id="cb-your-action" style="display:none;"></div>
      <div class="combat-waiting" id="cb-waiting"></div>
    </div>

    <!-- Quick Commands -->
    <div class="sb-section needs-char">
      <div class="sb-label">Quick</div>
      <div class="quick-pills" id="quick-pills">
        <button class="quick-pill" onclick="sendCmd('look')">look</button>
        <button class="quick-pill" onclick="sendCmd('inventory')">inv</button>
        <button class="quick-pill" onclick="sendCmd('score')">score</button>
        <button class="quick-pill" onclick="sendCmd('sheet')">sheet</button>
        <button class="quick-pill" onclick="sendCmd('missions')">jobs</button>
        <button class="quick-pill" onclick="sendCmd('who')">who</button>
        <button class="quick-pill" onclick="sendCmd('news')">news</button>
        <button class="quick-pill" onclick="sendCmd('help')">help</button>
      </div>
    </div>
  </aside>

</div>

<script>
(function() {
  'use strict';

  var WS_PORT = 4001;
  var MAX_LINES = 2000;
  var RECONNECT_MS = 3000;
  var MAX_HIST = 100;
  var MAX_NEWS = 20;

  // DOM refs
  var app       = document.getElementById('app');
  var output    = document.getElementById('output');
  var cmdInput  = document.getElementById('cmd-input');
  var connDot   = document.getElementById('conn-dot');
  var connLabel = document.getElementById('conn-label');
  var connBtn   = document.getElementById('conn-btn');
  var termMeta  = document.getElementById('term-meta');
  var termDots  = [document.getElementById('td0'), document.getElementById('td1'), document.getElementById('td2')];

  var hudName    = document.getElementById('hud-name');
  var hudWound   = document.getElementById('hud-wound');
  var woundBar   = document.getElementById('wound-bar');
  var hudCredits = document.getElementById('hud-credits');
  var hudFp      = document.getElementById('hud-fp');
  var hudCp      = document.getElementById('hud-cp');
  var hudDsp     = document.getElementById('hud-dsp');
  var dspCell    = document.getElementById('dsp-cell');
  var hudRoom    = document.getElementById('hud-room');
  var hudZone    = document.getElementById('hud-zone');
  var hudExits   = document.getElementById('hud-exits');
  var hudAlert   = document.getElementById('hud-alert');
  var eventBanner = document.getElementById('event-banner');
  var eventBannerText = document.getElementById('event-banner-text');
  var eventDismiss = document.getElementById('event-dismiss');
  var newsItems  = document.getElementById('news-items');

  var ws = null, reconnTimer = null;
  var hist = [], histIdx = -1, tmpInput = '';
  var intentDC = false;
  var mood = '', lines = 0, loggedIn = false;

  // ═══════════ Helpers ═══════════

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ═══════════ ANSI → HTML ═══════════

  function ansi(text) {
    var r = '', li = 0, fg = null, bg = null;
    var b = false, d = false, it = false, ul = false, bl = false, st = false;
    var oc = 0;
    function cls() { while (oc > 0) { r += '</span>'; oc--; } }
    function opn() {
      var c = [];
      if (b) c.push('ansi-bold');  if (d) c.push('ansi-dim');
      if (it) c.push('ansi-italic'); if (ul) c.push('ansi-underline');
      if (bl) c.push('ansi-blink');  if (st) c.push('ansi-strikethrough');
      if (fg !== null) c.push('ansi-fg-'+fg);
      if (bg !== null) c.push('ansi-bg-'+bg);
      if (c.length) { cls(); r += '<span class="'+c.join(' ')+'">'; oc++; }
    }
    var rx = /\x1b\[([0-9;]*)m/g, m;
    while ((m = rx.exec(text)) !== null) {
      r += esc(text.substring(li, m.index));
      li = m.index + m[0].length;
      var codes = m[1] ? m[1].split(';').map(Number) : [0];
      for (var i = 0; i < codes.length; i++) {
        var c = codes[i];
        if (c===0){cls();fg=bg=null;b=d=it=ul=bl=st=false;continue;}
        if (c===1) b=true; else if (c===2) d=true; else if (c===3) it=true;
        else if (c===4) ul=true; else if (c===5) bl=true; else if (c===9) st=true;
        else if (c===22){b=d=false;} else if (c===23) it=false;
        else if (c===24) ul=false; else if (c===25) bl=false; else if (c===29) st=false;
        else if (c>=30&&c<=37) fg=c; else if (c===39) fg=null;
        else if (c>=40&&c<=47) bg=c; else if (c===49) bg=null;
        else if (c>=90&&c<=97) fg=c;
      }
      opn();
    }
    r += esc(text.substring(li));
    cls();
    return r;
  }

  // ═══════════ Output ═══════════

  function addOutput(text, cls) {
    var ls = text.split(/\r?\n/);
    for (var i = 0; i < ls.length; i++) {
      var el = document.createElement('div');
      el.className = 'output-line fresh';
      if (cls) el.classList.add(cls);
      el.innerHTML = ansi(ls[i]);
      output.appendChild(el);
      lines++;
    }
    while (output.children.length > MAX_LINES) output.removeChild(output.firstChild);
    output.scrollTop = output.scrollHeight;
    parseNews(text);
    termMeta.textContent = lines + ' lines';
  }

  function sysMsg(t) { addOutput(t, 'system-msg'); }

  // ═══════════ Mood ═══════════

  function setMood(m) {
    if (!m || m === mood) return;
    mood = m;
    app.setAttribute('data-mood', m);
    var p = {cantina:[1,1,0],spaceport:[1,0,1],industrial:[1,0,1],
      streets:[0,1,0],street:[0,1,0],shops:[1,1,1],commercial:[1,1,1],
      jabba:[1,0,0],palatial:[1,0,0],government:[0,0,1],official:[0,0,1],
      combat:[1,1,1]}[m] || [0,1,0];
    for (var i=0;i<3;i++) termDots[i].className = 'term-dot'+(p[i]?' on':'');
  }

  // ═══════════ Login State ═══════════

  function setLoggedIn(yes) {
    if (loggedIn === yes) return;
    loggedIn = yes;
    if (yes) { app.classList.add('logged-in'); }
    else { app.classList.remove('logged-in'); }
  }

  // ═══════════ World Event Banner ═══════════

  function handleWorldEvent(m) {
    if (m.action === 'start') {
      var title = m.title || 'World Event';
      var effects = m.effects || '';
      var display = title.toUpperCase();
      if (effects) display += ' — ' + effects;
      eventBannerText.textContent = display;
      // Pick banner style based on event type
      var etype = (m.event_type || '').toLowerCase();
      var bclass = 'event-banner active ';
      if (etype.indexOf('imperial') !== -1 || etype.indexOf('checkpoint') !== -1) {
        bclass += 'alert-imperial';
      } else if (etype.indexOf('criminal') !== -1 || etype.indexOf('pirate') !== -1
                 || etype.indexOf('hutt') !== -1 || etype.indexOf('bounty') !== -1) {
        bclass += 'alert-criminal';
      } else {
        bclass += 'alert-neutral';
      }
      eventBanner.className = bclass;
      addNews('event', title + (effects ? ' — ' + effects : ''));
    } else if (m.action === 'end') {
      eventBanner.className = 'event-banner';
      if (m.title) addNews('system', m.title + ' has ended.');
    }
  }

  eventDismiss.addEventListener('click', function() {
    eventBanner.className = 'event-banner';
  });

  // ═══════════ HUD ═══════════

  /* ─── Combat State Handler ─── */
  var preCombatMood = '';
  var combatActive = false;
  var normalPills = null;  // saved inner HTML of #quick-pills

  var WOUND_PIP_CLASS = [
    'healthy','stunned','wounded','wounded2','incap','mortal','dead'
  ];
  // Number of filled pips per wound level
  var WOUND_PIPS_FILLED = [0, 1, 2, 3, 4, 5, 5];

  function makePips(woundLevel) {
    var total = 5;
    var filled = WOUND_PIPS_FILLED[Math.min(woundLevel, 6)] || 0;
    var cls    = WOUND_PIP_CLASS[Math.min(woundLevel, 6)] || 'healthy';
    var html   = '';
    for (var i = 0; i < total; i++) {
      html += '<div class="cb-wound-pip ' + (i < filled ? cls : '') + '"></div>';
    }
    return '<div class="cb-wound">' + html + '</div>';
  }

  function handleCombatState(m) {
    var sec     = document.getElementById('sec-combat');
    var pillBox = document.getElementById('quick-pills');

    if (!m.active) {
      // Combat over — hide panel, restore mood + pills
      sec.classList.remove('combat-active');
      combatActive = false;
      if (preCombatMood) { setMood(preCombatMood); preCombatMood = ''; }
      if (normalPills !== null) { pillBox.innerHTML = normalPills; normalPills = null; }
      return;
    }

    // Activate panel
    if (!combatActive) {
      combatActive = true;
      preCombatMood = mood || '';
      setMood('combat');
      // Save normal pills and swap in combat buttons
      if (normalPills === null) {
        normalPills = pillBox.innerHTML;
        pillBox.innerHTML =
          '<button class="quick-pill combat-pill" onclick="sendCmd(\'dodge\')">dodge</button>' +
          '<button class="quick-pill combat-pill" onclick="sendCmd(\'aim\')">aim</button>' +
          '<button class="quick-pill combat-pill" onclick="sendCmd(\'flee\')">flee</button>' +
          '<button class="quick-pill combat-pill" onclick="sendCmd(\'pass\')">pass</button>' +
          '<button class="quick-pill combat-pill" onclick="sendCmd(\'combat\')">status</button>';
      }
    }

    sec.classList.add('combat-active');

    // Round + phase header
    document.getElementById('cb-round').textContent = 'ROUND ' + (m.round || 1);
    var phase = (m.phase || 'declaration').toUpperCase();
    document.getElementById('cb-phase').textContent = phase;

    // Combatant list
    var combatants = m.combatants || [];
    var myId = null;
    // Identify viewer by finding the is_player combatant with a declared action
    // (or just the first is_player if ambiguous)
    for (var i = 0; i < combatants.length; i++) {
      if (combatants[i].is_player) { myId = combatants[i].id; break; }
    }

    var rows = '';
    for (var j = 0; j < combatants.length; j++) {
      var c = combatants[j];
      var nameClass = 'cb-name' + (c.is_player ? ' is-you' : '');
      var displayName = c.is_player ? 'You' : esc(c.name);
      var init = c.initiative > 0 ? c.initiative : '?';
      var pips = makePips(c.wound_level || 0);
      var declText, declClass;
      if (c.declared) {
        declText  = c.action_summary ? esc(c.action_summary) : 'ready';
        declClass = 'cb-decl declared';
      } else {
        declText  = 'waiting…';
        declClass = 'cb-decl waiting';
      }
      rows +=
        '<div class="cb-row">' +
          '<span class="' + nameClass + '" title="' + esc(c.name) + '">' + displayName + '</span>' +
          pips +
          '<span class="cb-init">' + init + '</span>' +
          '<span class="' + declClass + '">' + declText + '</span>' +
        '</div>';
    }
    document.getElementById('cb-combatants').innerHTML = rows;

    // Your declared actions
    var yourActEl = document.getElementById('cb-your-action');
    if (m.your_actions && m.your_actions.length > 0) {
      yourActEl.textContent = '▸ ' + m.your_actions.join(', ');
      yourActEl.style.display = '';
    } else {
      yourActEl.style.display = 'none';
    }

    // Waiting for
    var waitEl = document.getElementById('cb-waiting');
    if (m.waiting_for && m.waiting_for.length > 0) {
      waitEl.textContent = 'Waiting for: ' + m.waiting_for.join(', ');
    } else {
      waitEl.textContent = '';
    }
  }

  function handleHud(d) {
    if (d.name) {
      hudName.textContent = d.name;
      hudName.classList.remove('empty');
      setLoggedIn(true);
    }
    if (d.wound_name !== undefined) setWound(d.wound_name);
    if (d.credits !== undefined) hudCredits.textContent = Number(d.credits).toLocaleString();
    if (d.force_points !== undefined) hudFp.textContent = d.force_points;
    if (d.character_points !== undefined) hudCp.textContent = d.character_points;
    if (d.dark_side_points !== undefined) {
      if (d.dark_side_points > 0) { dspCell.style.display = ''; hudDsp.textContent = d.dark_side_points; }
      else { dspCell.style.display = 'none'; }
    }
    if (d.room_name) hudRoom.textContent = d.room_name;
    if (d.zone_name) { hudZone.textContent = d.zone_name; hudZone.style.display = ''; }
    if (d.zone_type) setMood(d.zone_type);
    if (d.alert_level && d.alert_level !== 'standard') {
      hudAlert.textContent = d.alert_level.replace(/_/g,' ');
      hudAlert.className = 'alert-badge ' + d.alert_level;
      hudAlert.style.display = '';
    } else if (d.alert_level === 'standard') {
      hudAlert.style.display = 'none';
    }
    if (d.exits && Array.isArray(d.exits)) {
      hudExits.innerHTML = '';
      if (d.exits.length === 0) {
        hudExits.innerHTML = '<span style="color:var(--text-dim);font-size:11px;">None</span>';
      } else {
        for (var i = 0; i < d.exits.length; i++) {
          var b = document.createElement('button');
          b.className = 'exit-pill';
          b.textContent = d.exits[i];
          b.addEventListener('click', (function(dir){return function(){sendCmd(dir);};})(d.exits[i]));
          hudExits.appendChild(b);
        }
      }
    }
  }

  function setWound(level) {
    var W = {
      'healthy':          {l:'OK',       s:['healthy','healthy','healthy','healthy','healthy']},
      'stunned':          {l:'Stunned',  s:['stunned','stunned','stunned','stunned','']},
      'wounded':          {l:'Wounded',  s:['wounded','wounded','wounded','','']},
      'wounded twice':    {l:'Wnd x2',   s:['wounded','wounded','','','']},
      'incapacitated':    {l:'Incap',    s:['incap','incap','','','']},
      'mortally wounded': {l:'Mortal',   s:['mortal','','','','']},
      'dead':             {l:'DEAD',     s:['','','','','']},
    };
    var info = W[level.toLowerCase()] || W['healthy'];
    hudWound.textContent = info.l;
    var segs = woundBar.children;
    for (var i = 0; i < 5; i++) {
      segs[i].className = 'wound-seg';
      if (info.s[i]) segs[i].classList.add(info.s[i]);
    }
  }

  // ═══════════ News ═══════════

  function parseNews(raw) {
    var c = raw.replace(/\x1b\[[0-9;]*m/g, '');
    var ls = c.split(/\r?\n/);
    for (var i = 0; i < ls.length; i++) {
      var t = ls[i].trim();
      if (!t) continue;
      if (t.startsWith('[SYSTEM]')) addNews('system', t.replace('[SYSTEM] ',''));
      else if (t.startsWith('[COMBAT]')) addNews('combat', t.replace('[COMBAT] ',''));
      else if (t.startsWith('[THE FORCE]')) addNews('event', t.replace('[THE FORCE] ',''));
      else if (t.indexOf('GNN')!==-1 || t.indexOf('BULLETIN')!==-1) addNews('event', t);
      else if (t.indexOf('has connected')!==-1 || t.indexOf('has disconnected')!==-1) addNews('system', t);
    }
  }

  function addNews(tag, text) {
    var ph = newsItems.querySelector('[style]');
    if (ph) ph.remove();
    var el = document.createElement('div');
    el.className = 'news-item';
    el.innerHTML = '<span class="news-tag '+tag+'">'+esc(tag)+'</span>'+esc(text.substring(0,120));
    newsItems.insertBefore(el, newsItems.firstChild);
    while (newsItems.children.length > MAX_NEWS) newsItems.removeChild(newsItems.lastChild);
  }

  // ═══════════ Width ═══════════

  function measureW() {
    var t = document.createElement('span');
    t.style.cssText = 'font-family:'+getComputedStyle(output).fontFamily+';font-size:14px;position:absolute;visibility:hidden;white-space:pre;';
    t.textContent = 'M';
    document.body.appendChild(t);
    var cw = t.getBoundingClientRect().width;
    document.body.removeChild(t);
    if (cw < 1) cw = 8.4;
    var pw = output.clientWidth - 24; // 12px padding each side
    return Math.max(40, Math.min(200, Math.floor(pw / cw)));
  }

  function sendResize() {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:'resize',width:measureW()}));
  }

  var rzT = null;
  window.addEventListener('resize', function() {
    if (rzT) clearTimeout(rzT);
    rzT = setTimeout(sendResize, 300);
  });

  // ═══════════ WebSocket ═══════════

  function wsUrl() {
    return 'ws://'+(window.location.hostname||'localhost')+':'+WS_PORT;
  }

  function connect() {
    if (ws && (ws.readyState===0||ws.readyState===1)) return;
    intentDC = false;
    setConn('connecting');
    sysMsg('[Connecting to '+wsUrl()+'...]');
    ws = new WebSocket(wsUrl());

    ws.onopen = function() {
      setConn('connected');
      sendResize();
      sysMsg('[Connected]');
      cmdInput.focus();
    };

    ws.onmessage = function(e) {
      try {
        var m = JSON.parse(e.data);
        if (m.type==='hud_update') { handleHud(m); return; }
        if (m.type==='combat_state') { handleCombatState(m); return; }
        if (m.type==='text' && typeof m.data==='string') { addOutput(m.data); }
        else if (m.type==='news_event') {
          if (m.tag && m.text) addNews(m.tag, m.text);
          if (m.data) addOutput(m.data);
        }
        else if (m.type==='world_event') {
          handleWorldEvent(m);
        }
        else if (m.type==='space_state' || m.type==='room_description' || m.type==='combat_log') {
          /* structured types without a client handler yet — silently ignore */
        }
        else if (m.data || m.text) { addOutput(m.data||m.text); }
        /* else: unknown structured message with no text — drop silently */
      } catch(x) {
        /* Log the actual error so we can diagnose instead of silently dumping JSON */
        console.error('WS message error:', x, 'raw:', e.data && e.data.substring(0, 200));
        if (e.data && e.data.charAt(0) !== '{') { addOutput(e.data); }
        /* JSON messages that threw an error are NOT printed to terminal */
      }
    };

    ws.onclose = function() {
      setConn('disconnected');
      if (intentDC) sysMsg('[Disconnected]');
      else { sysMsg('[Connection lost — reconnecting in '+(RECONNECT_MS/1000)+'s...]'); schedReconn(); }
    };
    ws.onerror = function(){};
  }

  function disconnect() {
    intentDC = true;
    if (reconnTimer) { clearTimeout(reconnTimer); reconnTimer = null; }
    if (ws && ws.readyState===1) { ws.send(JSON.stringify({input:'quit'})); setTimeout(function(){if(ws)ws.close();},200); }
    else if (ws) ws.close();
    setConn('disconnected');
    setLoggedIn(false);
    hudName.textContent = 'Not logged in';
    hudName.classList.add('empty');
  }

  function schedReconn() {
    if (intentDC) return;
    if (reconnTimer) clearTimeout(reconnTimer);
    reconnTimer = setTimeout(connect, RECONNECT_MS);
  }

  function setConn(s) {
    connDot.className = 'conn-dot';
    if (s==='connected') {
      connDot.classList.add('connected');
      connLabel.textContent = 'Online';
      connBtn.textContent = 'Disconnect';
      connBtn.className = 'conn-btn disconnect';
    } else if (s==='connecting') {
      connDot.classList.add('connecting');
      connLabel.textContent = 'Connecting';
      connBtn.textContent = 'Cancel';
      connBtn.className = 'conn-btn disconnect';
    } else {
      connLabel.textContent = 'Offline';
      connBtn.textContent = 'Reconnect';
      connBtn.className = 'conn-btn reconnect';
    }
  }

  connBtn.addEventListener('click', function() {
    if (connBtn.textContent==='Reconnect') { intentDC=false; connect(); }
    else disconnect();
  });

  // ═══════════ Input ═══════════

  function sendCmd(t) {
    if (!t||!t.trim()) return;
    t = t.trim();
    if (!ws||ws.readyState!==1) { sysMsg('[Not connected]'); if(!intentDC) connect(); return; }
    ws.send(JSON.stringify({input:t}));
    if (hist.length===0||hist[0]!==t) { hist.unshift(t); if(hist.length>MAX_HIST) hist.pop(); }
    histIdx = -1; tmpInput = '';
    cmdInput.value = '';
    cmdInput.focus();
  }
  window.sendCmd = sendCmd;

  cmdInput.addEventListener('keydown', function(e) {
    if (e.key==='Enter') { e.preventDefault(); sendCmd(cmdInput.value); }
    else if (e.key==='ArrowUp') {
      e.preventDefault();
      if (!hist.length) return;
      if (histIdx===-1) tmpInput = cmdInput.value;
      if (histIdx<hist.length-1) { histIdx++; cmdInput.value = hist[histIdx]; }
    } else if (e.key==='ArrowDown') {
      e.preventDefault();
      if (histIdx>0) { histIdx--; cmdInput.value = hist[histIdx]; }
      else if (histIdx===0) { histIdx=-1; cmdInput.value = tmpInput; }
    }
  });

  document.getElementById('send-btn').addEventListener('click', function(){ sendCmd(cmdInput.value); });

  // Focus on any key
  document.addEventListener('keydown', function(e) {
    if (e.target===cmdInput) return;
    if (e.ctrlKey||e.metaKey||e.altKey) return;
    if (e.key.length===1) cmdInput.focus();
  });

  // ═══════════ Boot ═══════════
  sysMsg('Connecting to Mos Eisley...');
  connect();

})();
</script>
</body>
</html>
