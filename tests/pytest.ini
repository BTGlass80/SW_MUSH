[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Show verbose output with short traceback. -x stops on first failure
# in normal runs; smoke runs can override with -p no:cacheprovider or
# explicitly pass --no-exitfirst.
addopts = -v --tb=short -x -m "not smoke and not smoke_slow"
# [S60/P1d] Removed `timeout = 30` — pytest-timeout is not in requirements.txt,
# so the option emitted a PytestConfigWarning on every run. Re-add along with
# the package if you want per-test timeouts; `addopts = --timeout=30` also works.
# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    economy: economy and credits flow tests
    combat: combat system tests
    space: space flight and combat tests
    tutorial: tutorial system tests
    smoke: end-to-end smoke scenarios run via in-process GameServer (opt-in via -m smoke)
    smoke_slow: smoke scenarios that boot a subprocess server (opt-in via -m smoke_slow). Lands in drop SH3.
