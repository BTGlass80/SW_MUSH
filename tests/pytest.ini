[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Show verbose output with short traceback
addopts = -v --tb=short -x
# [S60/P1d] Removed `timeout = 30` — pytest-timeout is not in requirements.txt,
# so the option emitted a PytestConfigWarning on every run. Re-add along with
# the package if you want per-test timeouts; `addopts = --timeout=30` also works.
# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    economy: economy and credits flow tests
    combat: combat system tests
    space: space flight and combat tests
    tutorial: tutorial system tests
