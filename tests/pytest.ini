[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Show verbose output with short traceback. -x stops on first failure
# in normal runs; smoke runs can override with -p no:cacheprovider or
# explicitly pass --no-exitfirst.
#
# This config governs TARGETED runs (`pytest tests/<module>`), i.e. the
# inner dev loop. `-m "... and not slow"` keeps it fast: smoke scenarios
# are opt-in via `-m smoke`, and heavy `slow`-marked tests (full
# world-builds, per-test DB migrations, Node-subprocess SPA tests,
# Monte-Carlo loops) are opt-in via `-m slow`. The full gate
# (`run_all_tests.bat`, which clears addopts via `-o addopts=`) runs
# EVERYTHING. NOTE: a second [pytest] config lives at the repo root
# (../pytest.ini) governing no-arg runs from the repo root; keep the two
# addopts lines in sync.
addopts = -v --tb=short -x -m "not smoke and not smoke_slow and not slow"
# [S60/P1d] Removed `timeout = 30` — pytest-timeout is not in requirements.txt,
# so the option emitted a PytestConfigWarning on every run. Re-add along with
# the package if you want per-test timeouts; `addopts = --timeout=30` also works.
# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    economy: economy and credits flow tests
    combat: combat system tests
    space: space flight and combat tests
    tutorial: tutorial system tests
    smoke: end-to-end smoke scenarios run via in-process GameServer (opt-in via -m smoke)
    smoke_slow: smoke scenarios that boot a subprocess server (opt-in via -m smoke_slow). Lands in drop SH3.
