<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars D6 MUSH — Mos Eisley</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg-deep: #06080c;
    --bg-panel: #0b0e14;
    --bg-input: #10141c;
    --bg-hud: #0a0d13;
    --bg-terminal: #080b10;
    --border-dim: #151c28;
    --border-mid: #1e2838;
    --text-primary: #b8c0cc;
    --text-dim: #566070;
    --text-bright: #dce3ed;
    --accent-green: #3fb950;
    --accent-amber: #d4a020;
    --accent-red: #f85149;
    --accent-blue: #4d9eff;
    --accent-cyan: #40c8d0;
    --accent-purple: #b07cff;
    --scrollbar-track: #0e1218;
    --scrollbar-thumb: #252d3a;

    /* Ambient mood — defaults (neutral/street) */
    --mood-glow: rgba(63, 185, 80, 0.04);
    --mood-accent: var(--accent-green);
    --mood-border: rgba(63, 185, 80, 0.12);
    --mood-scanline: rgba(63, 185, 80, 0.015);

    --font-mono: 'Share Tech Mono', 'Consolas', 'Courier New', monospace;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Rajdhani', sans-serif;

    --sidebar-w: 250px;
    --header-h: 42px;
    --input-h: 52px;
  }

  /* ── Mood Themes ── */
  [data-mood="cantina"] {
    --mood-glow: rgba(210, 153, 34, 0.06);
    --mood-accent: #d4a020;
    --mood-border: rgba(210, 153, 34, 0.15);
    --mood-scanline: rgba(210, 153, 34, 0.01);
  }
  [data-mood="spaceport"], [data-mood="industrial"] {
    --mood-glow: rgba(77, 158, 255, 0.05);
    --mood-accent: #4d9eff;
    --mood-border: rgba(77, 158, 255, 0.12);
    --mood-scanline: rgba(77, 158, 255, 0.012);
  }
  [data-mood="jabba"], [data-mood="palatial"] {
    --mood-glow: rgba(176, 124, 255, 0.06);
    --mood-accent: #b07cff;
    --mood-border: rgba(176, 124, 255, 0.14);
    --mood-scanline: rgba(176, 124, 255, 0.015);
  }
  [data-mood="government"], [data-mood="official"] {
    --mood-glow: rgba(248, 81, 73, 0.04);
    --mood-accent: #e06050;
    --mood-border: rgba(248, 81, 73, 0.12);
    --mood-scanline: rgba(248, 81, 73, 0.01);
  }
  [data-mood="shops"], [data-mood="commercial"] {
    --mood-glow: rgba(63, 185, 80, 0.05);
    --mood-accent: #50cc60;
    --mood-border: rgba(63, 185, 80, 0.15);
    --mood-scanline: rgba(63, 185, 80, 0.012);
  }
  [data-mood="combat"] {
    --mood-glow: rgba(248, 81, 73, 0.08);
    --mood-accent: #f85149;
    --mood-border: rgba(248, 81, 73, 0.2);
    --mood-scanline: rgba(248, 81, 73, 0.02);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── App Layout ── */
  .app {
    display: grid;
    grid-template-columns: 1fr var(--sidebar-w);
    grid-template-rows: var(--header-h) 1fr var(--input-h);
    height: 100vh;
  }

  /* ══════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════ */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-dim);
    position: relative;
    z-index: 10;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--mood-accent), transparent);
    opacity: 0.3;
    transition: background 1.5s ease;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent-amber);
    text-shadow: 0 0 24px rgba(212, 160, 32, 0.3);
  }

  .header-sub {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 1px;
    padding-left: 10px;
    border-left: 1px solid var(--border-dim);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .conn-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent-red);
    transition: all 0.4s;
    flex-shrink: 0;
  }
  .conn-dot.connected { background: var(--accent-green); box-shadow: 0 0 8px rgba(63,185,80,0.5); }
  .conn-dot.connecting { background: var(--accent-amber); animation: pulse 1.2s ease-in-out infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .conn-btn {
    padding: 2px 10px;
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }
  .conn-btn.disconnect { color: var(--accent-red); border-color: rgba(248,81,73,0.25); }
  .conn-btn.disconnect:hover { background: rgba(248,81,73,0.08); border-color: var(--accent-red); }
  .conn-btn.reconnect { color: var(--accent-green); border-color: rgba(63,185,80,0.25); }
  .conn-btn.reconnect:hover { background: rgba(63,185,80,0.08); border-color: var(--accent-green); }

  /* ══════════════════════════════════════════
     TERMINAL / GAME TEXT BOX
     ══════════════════════════════════════════ */
  .terminal-wrap {
    grid-column: 1;
    grid-row: 2;
    padding: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg-deep);
  }

  .terminal {
    flex: 1;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border-mid);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    background: var(--bg-terminal);
    box-shadow:
      inset 0 1px 3px rgba(0,0,0,0.4),
      0 0 20px var(--mood-glow),
      0 0 60px var(--mood-glow);
    transition: box-shadow 1.5s ease;
  }

  /* Top bezel with indicator dots */
  .terminal-bezel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 10px;
    background: linear-gradient(180deg, rgba(20,26,36,0.9), rgba(14,18,26,0.95));
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
  }

  .bezel-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bezel-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border-mid);
    transition: all 0.6s;
  }
  .bezel-dot.active { background: var(--mood-accent); box-shadow: 0 0 4px var(--mood-accent); }

  .bezel-label {
    font-family: var(--font-display);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.6;
  }

  .bezel-right {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    opacity: 0.4;
  }

  /* Scanline overlay */
  .terminal::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      var(--mood-scanline) 2px, var(--mood-scanline) 4px
    );
    z-index: 2;
    border-radius: 6px;
    transition: background 1.5s ease;
  }

  /* Mood glow on left edge */
  .terminal::before {
    content: '';
    position: absolute;
    top: 24px; bottom: 0; left: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--mood-accent), transparent);
    opacity: 0.25;
    z-index: 3;
    transition: all 1.5s ease;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    position: relative;
    z-index: 1;
  }

  #output::-webkit-scrollbar { width: 5px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  #output::-webkit-scrollbar-thumb:hover { background: #3a4450; }

  .output-line {
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-bottom: 1px;
    font-size: 14px;
    line-height: 1.45;
  }

  .output-line:empty::before { content: '\200b'; }
  .output-line.fresh { animation: lineIn 0.12s ease-out; }
  @keyframes lineIn { from { opacity: 0.4; transform: translateY(1px); } to { opacity: 1; transform: none; } }

  .system-msg {
    color: var(--text-dim);
    font-style: italic;
    font-size: 12px;
  }

  /* ══════════════════════════════════════════
     HUD SIDEBAR
     ══════════════════════════════════════════ */
  .hud {
    grid-column: 2;
    grid-row: 2 / 4;
    background: var(--bg-hud);
    border-left: 1px solid var(--border-dim);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .hud::-webkit-scrollbar { width: 3px; }
  .hud::-webkit-scrollbar-track { background: transparent; }
  .hud::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

  .hud-section {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-dim);
  }

  .hud-label {
    font-family: var(--font-display);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }

  .hud-value {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-bright);
    line-height: 1.3;
  }
  .hud-value.name {
    color: var(--accent-amber);
    font-size: 16px;
    font-weight: 700;
    text-shadow: 0 0 12px rgba(212, 160, 32, 0.15);
  }
  .hud-value.room {
    color: var(--accent-cyan);
    font-size: 13px;
  }

  /* Zone badge */
  .zone-badge {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    color: var(--mood-accent);
    border: 1px solid var(--mood-border);
    background: var(--mood-glow);
    margin-top: 3px;
    transition: all 1s ease;
  }

  /* Wound bar */
  .wound-bar { display: flex; gap: 3px; margin-top: 4px; }
  .wound-seg {
    flex: 1; height: 5px; border-radius: 2px;
    background: var(--border-dim); transition: all 0.4s;
  }
  .wound-seg.healthy  { background: var(--accent-green); box-shadow: 0 0 4px rgba(63,185,80,0.3); }
  .wound-seg.stunned  { background: var(--accent-amber); }
  .wound-seg.wounded  { background: #da6d28; }
  .wound-seg.incap    { background: var(--accent-red); box-shadow: 0 0 4px rgba(248,81,73,0.3); }
  .wound-seg.mortal   { background: #8b0000; box-shadow: 0 0 6px rgba(139,0,0,0.5); animation: pulse 1.5s infinite; }

  /* Stat rows */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2px 0;
  }
  .stat-label {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-val {
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .stat-val.credits { color: var(--accent-amber); }
  .stat-val.fp { color: var(--accent-blue); }
  .stat-val.cp { color: var(--accent-green); }
  .stat-val.dsp { color: var(--accent-red); }

  /* Quick commands & exit buttons */
  .quick-cmds, .exit-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

  .quick-cmd, .exit-btn {
    padding: 3px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg-input);
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quick-cmd { color: var(--text-dim); }
  .quick-cmd:hover {
    color: var(--accent-green);
    border-color: rgba(63,185,80,0.4);
    background: rgba(63,185,80,0.05);
  }
  .exit-btn { color: var(--accent-cyan); }
  .exit-btn:hover {
    border-color: rgba(64,200,208,0.4);
    background: rgba(64,200,208,0.06);
  }

  /* ── News / Comlink Feed ── */
  .news-panel {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-dim);
    max-height: 160px;
    overflow-y: auto;
  }
  .news-panel::-webkit-scrollbar { width: 3px; }
  .news-panel::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

  .news-item {
    font-size: 11px;
    color: var(--text-dim);
    padding: 3px 0;
    border-bottom: 1px solid rgba(21,28,40,0.5);
    line-height: 1.35;
    font-family: var(--font-body);
    font-weight: 500;
  }
  .news-item:last-child { border-bottom: none; }
  .news-tag {
    font-family: var(--font-display);
    font-size: 7px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1px 4px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: 1px;
  }
  .news-tag.combat { color: var(--accent-red); border: 1px solid rgba(248,81,73,0.3); }
  .news-tag.system { color: var(--accent-amber); border: 1px solid rgba(210,153,34,0.3); }
  .news-tag.event  { color: var(--accent-purple); border: 1px solid rgba(176,124,255,0.3); }
  .news-tag.space  { color: var(--accent-cyan); border: 1px solid rgba(64,200,208,0.3); }

  /* ══════════════════════════════════════════
     INPUT AREA
     ══════════════════════════════════════════ */
  .input-area {
    grid-column: 1;
    grid-row: 3;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    background: var(--bg-deep);
  }

  .input-box {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-input);
    border: 1px solid var(--border-mid);
    border-radius: 5px;
    padding: 0 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus-within {
    border-color: var(--mood-accent);
    box-shadow: 0 0 0 2px rgba(63,185,80,0.08);
  }

  .input-prompt {
    font-size: 14px;
    color: var(--mood-accent);
    user-select: none;
    flex-shrink: 0;
    transition: color 1.5s ease;
  }

  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 0;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-bright);
    outline: none;
  }
  #cmd-input::placeholder { color: var(--text-dim); font-style: italic; opacity: 0.6; }

  .send-btn {
    padding: 8px 14px;
    font-family: var(--font-display);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(63,185,80,0.06);
    border: 1px solid rgba(63,185,80,0.25);
    border-radius: 4px;
    color: var(--accent-green);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover {
    background: rgba(63,185,80,0.12);
    border-color: var(--accent-green);
    box-shadow: 0 0 10px rgba(63,185,80,0.1);
  }

  /* ══════════════════════════════════════════
     ANSI Colors
     ══════════════════════════════════════════ */
  .ansi-bold { font-weight: bold; }
  .ansi-dim { opacity: 0.6; }
  .ansi-italic { font-style: italic; }
  .ansi-underline { text-decoration: underline; }
  .ansi-blink { animation: blink 1s step-end infinite; }
  .ansi-strikethrough { text-decoration: line-through; }
  @keyframes blink { 50% { opacity: 0; } }

  .ansi-fg-30 { color: #4d4d4d; } .ansi-fg-31 { color: #f85149; }
  .ansi-fg-32 { color: #3fb950; } .ansi-fg-33 { color: #d29922; }
  .ansi-fg-34 { color: #58a6ff; } .ansi-fg-35 { color: #bc8cff; }
  .ansi-fg-36 { color: #56d4dd; } .ansi-fg-37 { color: #e6edf3; }
  .ansi-fg-90 { color: #6e7681; } .ansi-fg-91 { color: #ff7b72; }
  .ansi-fg-92 { color: #7ee787; } .ansi-fg-93 { color: #e3b341; }
  .ansi-fg-94 { color: #79c0ff; } .ansi-fg-95 { color: #d2a8ff; }
  .ansi-fg-96 { color: #76e4ed; } .ansi-fg-97 { color: #ffffff; }

  .ansi-bg-40 { background: #4d4d4d; } .ansi-bg-41 { background: #8b2520; }
  .ansi-bg-42 { background: #1a4d2e; } .ansi-bg-43 { background: #6b4e14; }
  .ansi-bg-44 { background: #1a3a6b; } .ansi-bg-45 { background: #5a3d7a; }
  .ansi-bg-46 { background: #1a5c5f; } .ansi-bg-47 { background: #cccccc; color: #000; }

  /* ══════════════════════════════════════════
     Mobile
     ══════════════════════════════════════════ */
  @media (max-width: 700px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: var(--header-h) 1fr var(--input-h) auto;
    }
    .hud {
      grid-column: 1; grid-row: 4;
      flex-direction: row; flex-wrap: wrap;
      border-left: none; border-top: 1px solid var(--border-dim);
      padding: 4px; gap: 4px;
      max-height: 130px; overflow-y: auto;
    }
    .hud-section { flex: 1; min-width: 100px; padding: 6px 8px; }
    .hud-label { font-size: 7px; margin-bottom: 2px; }
    .hud-value { font-size: 13px; }
    .header-sub { display: none; }
    .header-logo { font-size: 10px; letter-spacing: 2px; }
    #cmd-input { font-size: 16px; }
    .terminal-wrap { padding: 4px; }
    .news-panel { max-height: 70px; }
  }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">Star Wars</div>
      <div class="header-sub">D6 Revised &amp; Expanded</div>
    </div>
    <div class="header-right">
      <div class="conn-status">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">Disconnected</span>
      </div>
      <button class="conn-btn disconnect" id="conn-btn">Disconnect</button>
    </div>
  </div>

  <!-- TERMINAL / GAME TEXT -->
  <div class="terminal-wrap">
    <div class="terminal" id="terminal">
      <div class="terminal-bezel">
        <div class="bezel-left">
          <div class="bezel-dot" id="bezel-dot-1"></div>
          <div class="bezel-dot" id="bezel-dot-2"></div>
          <div class="bezel-dot" id="bezel-dot-3"></div>
          <span class="bezel-label">Terminal</span>
        </div>
        <div class="bezel-right" id="bezel-info"></div>
      </div>
      <div id="output"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-box">
      <span class="input-prompt">&gt;</span>
      <input type="text" id="cmd-input" placeholder="Enter command..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <button class="send-btn" id="send-btn">Send</button>
  </div>

  <!-- HUD SIDEBAR -->
  <div class="hud">
    <div class="hud-section">
      <div class="hud-label">Character</div>
      <div class="hud-value name" id="hud-name">&mdash;</div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Condition</div>
      <div class="hud-value" id="hud-wound" style="font-size:13px;">Healthy</div>
      <div class="wound-bar" id="wound-bar">
        <div class="wound-seg healthy"></div>
        <div class="wound-seg healthy"></div>
        <div class="wound-seg healthy"></div>
        <div class="wound-seg healthy"></div>
        <div class="wound-seg healthy"></div>
      </div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Stats</div>
      <div class="stat-row">
        <span class="stat-label">Credits</span>
        <span class="stat-val credits" id="hud-credits">&mdash;</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Force</span>
        <span class="stat-val fp" id="hud-fp">&mdash;</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Char Pts</span>
        <span class="stat-val cp" id="hud-cp">&mdash;</span>
      </div>
      <div class="stat-row" id="dsp-row" style="display:none;">
        <span class="stat-label">Dark Side</span>
        <span class="stat-val dsp" id="hud-dsp">0</span>
      </div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Location</div>
      <div class="hud-value room" id="hud-room">&mdash;</div>
      <div class="zone-badge" id="hud-zone" style="display:none;"></div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Exits</div>
      <div class="exit-list" id="hud-exits">
        <span style="color:var(--text-dim); font-size:12px;">&mdash;</span>
      </div>
    </div>

    <div class="news-panel" id="news-panel">
      <div class="hud-label">Comlink Feed</div>
      <div id="news-items">
        <div class="news-item" style="color:var(--text-dim); font-style:italic;">Scanning frequencies...</div>
      </div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Quick</div>
      <div class="quick-cmds">
        <button class="quick-cmd" onclick="sendCmd('look')">look</button>
        <button class="quick-cmd" onclick="sendCmd('inventory')">inv</button>
        <button class="quick-cmd" onclick="sendCmd('score')">score</button>
        <button class="quick-cmd" onclick="sendCmd('sheet')">sheet</button>
        <button class="quick-cmd" onclick="sendCmd('missions')">jobs</button>
        <button class="quick-cmd" onclick="sendCmd('who')">who</button>
        <button class="quick-cmd" onclick="sendCmd('news')">news</button>
        <button class="quick-cmd" onclick="sendCmd('help')">help</button>
      </div>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  var WS_PORT = 4001;
  var MAX_OUTPUT_LINES = 2000;
  var RECONNECT_DELAY_MS = 3000;
  var MAX_HISTORY = 100;
  var MAX_NEWS_ITEMS = 20;

  var app       = document.getElementById('app');
  var output    = document.getElementById('output');
  var cmdInput  = document.getElementById('cmd-input');
  var sendBtn   = document.getElementById('send-btn');
  var connDot   = document.getElementById('conn-dot');
  var connLabel = document.getElementById('conn-label');
  var connBtn   = document.getElementById('conn-btn');

  var hudName    = document.getElementById('hud-name');
  var hudWound   = document.getElementById('hud-wound');
  var woundBar   = document.getElementById('wound-bar');
  var hudCredits = document.getElementById('hud-credits');
  var hudFp      = document.getElementById('hud-fp');
  var hudCp      = document.getElementById('hud-cp');
  var hudDsp     = document.getElementById('hud-dsp');
  var dspRow     = document.getElementById('dsp-row');
  var hudRoom    = document.getElementById('hud-room');
  var hudZone    = document.getElementById('hud-zone');
  var hudExits   = document.getElementById('hud-exits');
  var newsItems  = document.getElementById('news-items');
  var bezelDots  = [
    document.getElementById('bezel-dot-1'),
    document.getElementById('bezel-dot-2'),
    document.getElementById('bezel-dot-3')
  ];
  var bezelInfo  = document.getElementById('bezel-info');

  var ws = null;
  var reconnectTimer = null;
  var history = [];
  var historyIdx = -1;
  var tempInput = '';
  var intentionalDisconnect = false;
  var currentMood = '';
  var lineCount = 0;

  // ═══════════ ANSI Parser ═══════════

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function ansiToHtml(text) {
    var result = '';
    var lastIdx = 0;
    var fg = null, bg = null;
    var bold = false, dimOn = false, italic = false;
    var underline = false, blinkOn = false, strike = false;
    var openCount = 0;

    function closeSpans() { while (openCount > 0) { result += '</span>'; openCount--; } }

    function openSpan() {
      var classes = [];
      if (bold) classes.push('ansi-bold');
      if (dimOn) classes.push('ansi-dim');
      if (italic) classes.push('ansi-italic');
      if (underline) classes.push('ansi-underline');
      if (blinkOn) classes.push('ansi-blink');
      if (strike) classes.push('ansi-strikethrough');
      if (fg !== null) classes.push('ansi-fg-' + fg);
      if (bg !== null) classes.push('ansi-bg-' + bg);
      if (classes.length > 0) {
        closeSpans();
        result += '<span class="' + classes.join(' ') + '">';
        openCount++;
      }
    }

    var regex = /\x1b\[([0-9;]*)m/g;
    var match;
    while ((match = regex.exec(text)) !== null) {
      result += escapeHtml(text.substring(lastIdx, match.index));
      lastIdx = match.index + match[0].length;
      var codes = match[1] ? match[1].split(';').map(Number) : [0];
      for (var ci = 0; ci < codes.length; ci++) {
        var code = codes[ci];
        if (code === 0) { closeSpans(); fg = bg = null; bold = dimOn = italic = underline = blinkOn = strike = false; continue; }
        if (code === 1) bold = true;
        else if (code === 2) dimOn = true;
        else if (code === 3) italic = true;
        else if (code === 4) underline = true;
        else if (code === 5) blinkOn = true;
        else if (code === 9) strike = true;
        else if (code === 22) { bold = false; dimOn = false; }
        else if (code === 23) italic = false;
        else if (code === 24) underline = false;
        else if (code === 25) blinkOn = false;
        else if (code === 29) strike = false;
        else if (code >= 30 && code <= 37) fg = code;
        else if (code === 39) fg = null;
        else if (code >= 40 && code <= 47) bg = code;
        else if (code === 49) bg = null;
        else if (code >= 90 && code <= 97) fg = code;
      }
      openSpan();
    }
    result += escapeHtml(text.substring(lastIdx));
    closeSpans();
    return result;
  }

  // ═══════════ Output ═══════════

  function appendOutput(text, cssClass) {
    var lines = text.split(/\r?\n/);
    for (var i = 0; i < lines.length; i++) {
      var div = document.createElement('div');
      div.className = 'output-line fresh';
      if (cssClass) div.classList.add(cssClass);
      div.innerHTML = ansiToHtml(lines[i]);
      output.appendChild(div);
      lineCount++;
    }
    while (output.children.length > MAX_OUTPUT_LINES) { output.removeChild(output.firstChild); }
    output.scrollTop = output.scrollHeight;
    extractNewsFromText(text);
    bezelInfo.textContent = lineCount + ' lines';
  }

  function systemMsg(text) { appendOutput(text, 'system-msg'); }

  // ═══════════ Ambient Mood ═══════════

  function setMood(mood) {
    if (!mood || mood === currentMood) return;
    currentMood = mood;
    app.setAttribute('data-mood', mood);
    var moodPatterns = {
      'cantina': [true, true, false],
      'spaceport': [true, false, true],
      'industrial': [true, false, true],
      'streets': [false, true, false],
      'street': [false, true, false],
      'shops': [true, true, true],
      'commercial': [true, true, true],
      'jabba': [true, false, false],
      'palatial': [true, false, false],
      'government': [false, false, true],
      'official': [false, false, true],
      'combat': [true, true, true],
    };
    var pattern = moodPatterns[mood] || [false, true, false];
    for (var d = 0; d < 3; d++) {
      bezelDots[d].className = 'bezel-dot' + (pattern[d] ? ' active' : '');
    }
  }

  // ═══════════ Structured HUD ═══════════

  function handleHudUpdate(data) {
    if (data.name) hudName.textContent = data.name;
    if (data.wound_name !== undefined) updateWoundDisplay(data.wound_name);

    if (data.credits !== undefined) {
      hudCredits.textContent = Number(data.credits).toLocaleString();
    }

    if (data.force_points !== undefined) hudFp.textContent = data.force_points;
    if (data.character_points !== undefined) hudCp.textContent = data.character_points;
    if (data.dark_side_points !== undefined) {
      if (data.dark_side_points > 0) {
        dspRow.style.display = '';
        hudDsp.textContent = data.dark_side_points;
      } else {
        dspRow.style.display = 'none';
      }
    }

    if (data.room_name) hudRoom.textContent = data.room_name;

    // Zone info for ambient mood
    if (data.zone_name) {
      hudZone.textContent = data.zone_name;
      hudZone.style.display = '';
    }
    if (data.zone_type) {
      setMood(data.zone_type);
    }

    if (data.exits && Array.isArray(data.exits)) {
      hudExits.innerHTML = '';
      if (data.exits.length === 0) {
        hudExits.innerHTML = '<span style="color:var(--text-dim); font-size:12px;">None</span>';
      } else {
        for (var i = 0; i < data.exits.length; i++) {
          var btn = document.createElement('button');
          btn.className = 'exit-btn';
          btn.textContent = data.exits[i];
          btn.addEventListener('click', (function(dir) { return function() { sendCmd(dir); }; })(data.exits[i]));
          hudExits.appendChild(btn);
        }
      }
    }
  }

  function updateWoundDisplay(level) {
    var levels = {
      'healthy':           { label: 'Healthy',           segs: ['healthy','healthy','healthy','healthy','healthy'] },
      'stunned':           { label: 'Stunned',           segs: ['stunned','stunned','stunned','stunned',''] },
      'wounded':           { label: 'Wounded',           segs: ['wounded','wounded','wounded','',''] },
      'wounded twice':     { label: 'Wounded Twice',     segs: ['wounded','wounded','','',''] },
      'incapacitated':     { label: 'Incapacitated',     segs: ['incap','incap','','',''] },
      'mortally wounded':  { label: 'Mortally Wounded',  segs: ['mortal','','','',''] },
      'dead':              { label: 'DEAD',              segs: ['','','','',''] },
    };
    var key = level.toLowerCase();
    var info = levels[key] || levels['healthy'];
    hudWound.textContent = info.label;
    var segs = woundBar.children;
    for (var i = 0; i < 5; i++) {
      segs[i].className = 'wound-seg';
      if (info.segs[i]) segs[i].classList.add(info.segs[i]);
    }
  }

  // ═══════════ News / Comlink Feed ═══════════

  function extractNewsFromText(raw) {
    var clean = raw.replace(/\x1b\[[0-9;]*m/g, '');
    var lines = clean.split(/\r?\n/);
    for (var i = 0; i < lines.length; i++) {
      var t = lines[i].trim();
      if (!t) continue;
      if (t.startsWith('[SYSTEM]')) addNewsItem('system', t.replace('[SYSTEM] ', ''));
      else if (t.startsWith('[COMBAT]')) addNewsItem('combat', t.replace('[COMBAT] ', ''));
      else if (t.startsWith('[THE FORCE]')) addNewsItem('event', t.replace('[THE FORCE] ', ''));
      else if (t.indexOf('GNN') !== -1 || t.indexOf('BULLETIN') !== -1) addNewsItem('event', t);
      else if (t.indexOf('has connected') !== -1 || t.indexOf('has disconnected') !== -1) addNewsItem('system', t);
    }
  }

  function addNewsItem(tag, text) {
    var placeholder = newsItems.querySelector('[style]');
    if (placeholder) placeholder.remove();
    var item = document.createElement('div');
    item.className = 'news-item';
    item.innerHTML = '<span class="news-tag ' + tag + '">' + escapeHtml(tag) + '</span>' + escapeHtml(text.substring(0, 120));
    newsItems.insertBefore(item, newsItems.firstChild);
    while (newsItems.children.length > MAX_NEWS_ITEMS) newsItems.removeChild(newsItems.lastChild);
  }

  // ═══════════ Terminal Width ═══════════

  function measureCharWidth() {
    var testEl = document.createElement('span');
    testEl.style.cssText = 'font-family:' + getComputedStyle(output).fontFamily +
      ';font-size:14px;position:absolute;visibility:hidden;white-space:pre;';
    testEl.textContent = 'M';
    document.body.appendChild(testEl);
    var charW = testEl.getBoundingClientRect().width;
    document.body.removeChild(testEl);
    if (charW < 1) charW = 8.4;
    // Terminal inner width minus padding (14px each side = 28px)
    var paneW = output.clientWidth - 28;
    return Math.max(40, Math.min(200, Math.floor(paneW / charW)));
  }

  function sendResize() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      var w = measureCharWidth();
      ws.send(JSON.stringify({ type: 'resize', width: w }));
    }
  }

  var resizeTimer = null;
  window.addEventListener('resize', function() {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(sendResize, 300);
  });

  // ═══════════ WebSocket ═══════════

  function getWsUrl() {
    var host = window.location.hostname || 'localhost';
    return 'ws://' + host + ':' + WS_PORT;
  }

  function connect() {
    if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
    intentionalDisconnect = false;
    var url = getWsUrl();
    setConnStatus('connecting');
    systemMsg('[Connecting to ' + url + '...]');
    ws = new WebSocket(url);

    ws.onopen = function() {
      setConnStatus('connected');
      sendResize();
      systemMsg('[Connected]');
      cmdInput.focus();
    };

    ws.onmessage = function(evt) {
      try {
        var msg = JSON.parse(evt.data);
        if (msg.type === 'hud_update') { handleHudUpdate(msg); return; }
        if (msg.type === 'text' && typeof msg.data === 'string') { appendOutput(msg.data); }
        else if (msg.type === 'news_event') {
          if (msg.tag && msg.text) addNewsItem(msg.tag, msg.text);
          if (msg.data) appendOutput(msg.data);
        }
        else { appendOutput(msg.data || msg.text || JSON.stringify(msg)); }
      } catch (e) { appendOutput(evt.data); }
    };

    ws.onclose = function() {
      setConnStatus('disconnected');
      if (intentionalDisconnect) { systemMsg('[Disconnected]'); }
      else {
        systemMsg('[Connection lost — reconnecting in ' + (RECONNECT_DELAY_MS / 1000) + 's...]');
        scheduleReconnect();
      }
    };

    ws.onerror = function() {};
  }

  function disconnect() {
    intentionalDisconnect = true;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ input: 'quit' }));
      setTimeout(function() { if (ws) ws.close(); }, 200);
    } else if (ws) { ws.close(); }
    setConnStatus('disconnected');
  }

  function scheduleReconnect() {
    if (intentionalDisconnect) return;
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, RECONNECT_DELAY_MS);
  }

  function setConnStatus(state) {
    connDot.className = 'conn-dot';
    if (state === 'connected') {
      connDot.classList.add('connected');
      connLabel.textContent = 'Online';
      connBtn.textContent = 'Disconnect';
      connBtn.className = 'conn-btn disconnect';
    } else if (state === 'connecting') {
      connDot.classList.add('connecting');
      connLabel.textContent = 'Connecting';
      connBtn.textContent = 'Cancel';
      connBtn.className = 'conn-btn disconnect';
    } else {
      connLabel.textContent = 'Offline';
      connBtn.textContent = 'Reconnect';
      connBtn.className = 'conn-btn reconnect';
    }
  }

  connBtn.addEventListener('click', function() {
    if (connBtn.textContent === 'Reconnect') { intentionalDisconnect = false; connect(); }
    else { disconnect(); }
  });

  // ═══════════ Input ═══════════

  function sendCmd(text) {
    if (!text || !text.trim()) return;
    text = text.trim();
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      systemMsg('[Not connected]');
      if (!intentionalDisconnect) connect();
      return;
    }
    ws.send(JSON.stringify({ input: text }));
    if (history.length === 0 || history[0] !== text) {
      history.unshift(text);
      if (history.length > MAX_HISTORY) history.pop();
    }
    historyIdx = -1;
    tempInput = '';
    cmdInput.value = '';
    cmdInput.focus();
  }

  window.sendCmd = sendCmd;

  cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); sendCmd(cmdInput.value); }
    else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length === 0) return;
      if (historyIdx === -1) tempInput = cmdInput.value;
      if (historyIdx < history.length - 1) { historyIdx++; cmdInput.value = history[historyIdx]; }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIdx > 0) { historyIdx--; cmdInput.value = history[historyIdx]; }
      else if (historyIdx === 0) { historyIdx = -1; cmdInput.value = tempInput; }
    }
  });

  sendBtn.addEventListener('click', function() { sendCmd(cmdInput.value); });

  document.addEventListener('keydown', function(e) {
    if (e.target === cmdInput) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key.length === 1) cmdInput.focus();
  });

  // ═══════════ Boot ═══════════

  systemMsg('Connecting to Mos Eisley...');
  connect();

})();
</script>
</body>
</html>
