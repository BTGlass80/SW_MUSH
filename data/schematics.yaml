    base_cost: 7500

  - key: t5_hyperdrive_surge_converter
    name: "Hyperdrive Surge Converter"
    skill_required: space_transports_repair
    difficulty: 26
    trainer_npc: ""
    components:
      - type: scavenged_republic_tech
