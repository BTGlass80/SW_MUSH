  # ──────────────────────────────────────────────────────────────
  # T5 — Wilderness-gated master crafting (SYN.6.c, May 25 2026)
  # Per contestable_wilderness_design_v2.md §2.5.6.
  #
  # Each T5 schematic requires:
  #   1. A wilderness-only T5 material (gated by drop source — see
  #      engine/crafting.py::T5_WILDERNESS_MATERIALS) at q75+.
  #   2. Standard T1-T4 components at min_quality bands matching the
  #      base item's existing schematic.
  #
  # T5 outputs reuse existing base-item keys where they exist (lightsaber,
  # blaster_rifle, bounty_hunter_armor); ship-part outputs (hyperdrive_
  # surge_converter, mil_spec_ion_engine_core) are forward-references to
  # a future ship-part item catalogue. The schematics still craft —
  # an ItemInstance is created with the listed output_key — but
  # ship-part functional effects in combat/space land in a subsequent
  # drop alongside the weapons/items YAML extension.
  #
  # Difficulty band: 25-28 (Very Difficult on WEG D6 R&E ladder).
  # Existing schematics top out at 20 (Difficult). T5 is meant to be
  # genuinely endgame — a Master-level crafter (8D+ in the skill)
  # with a Wild Die explosion is the typical successful roll.
  #
  # Trainers: t5 schematics are NOT taught by ordinary trainer NPCs.
  # Acquisition is via story/quest-line (Jedi Master, Hutt
  # weaponsmith, Republic engineer-corps officer). trainer_npc is
  # left blank as a "find a master" hook; the parser-side
  # acquisition path is its own future drop.

  - key: t5_master_crafted_lightsaber
    name: "Master-Crafted Lightsaber"
    skill_required: craft_lightsaber
    difficulty: 28
    trainer_npc: ""
    components:
