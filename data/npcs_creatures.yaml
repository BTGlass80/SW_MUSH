  # ── Yeomet ──────────────────────────────────────────────────────────────
  - id: yeomet
    name: Yeomet
    species: Yeomet
    scale: creature
    size: "60cm"
    hostile: false          # flees unless cornered
    pack_count: [2, 5]      # herds of up to ~30 sleep in piles
    description: >-
      A scaled, rat-faced vermin the height of a knee, the yeomet is the
      definitive pest of built worlds, ships, and stations. It chews through
      almost anything — cables and conduits included, which makes it a fire
      hazard — carries disease, and breeds in non-hierarchical herds that
      sleep in heaped piles. It flees unless cornered, at which point its
      teeth are a real problem. Exterminators who clear them are respected.
    char_sheet:
      attributes:
        dexterity: 4D
        perception: 2D
        strength: 1D+1
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 8
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: teeth
      to_hit_skill: brawling
      damage: "STR+2D"
    special:
      - "Claws STR+1D."
      - "Disease transmission: a bite forces a Moderate stamina (or STR) roll."
      - "Gnaws through cables/conduits — an infrastructure/electrical-fire hazard."
    source: "COTG §2.4 (WEG40080)"

  # ── Borcatu ─────────────────────────────────────────────────────────────
  - id: borcatu
    name: Borcatu
    species: Borcatu
    scale: creature
    size: "0.2-0.5m"
    hostile: false          # bad-tempered nuisance; bites anything that grabs it
    pack_count: [1, 3]
    description: >-
      A bad-tempered little stowaway scavenger, spread galaxy-wide from desert
      origins by riding cargo holds into the urban slums. Rock-hard digging
      claws, an armoured hide, and a reflex to bite anything that grabs it make
      the borcatu a dockworker's curse — cheap to find, irritating to remove.
    char_sheet:
      attributes:
        dexterity: 3D
        perception: 2D
        strength: 1D+2
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 11
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: bite
      to_hit_skill: brawling
      damage: "STR+2"
    armor:
      note: "Armoured hide: +2."
    special:
      - "Claws STR+1; rock-hard digging claws (burrows)."
      - "Bites anything that grabs it."
    source: "COTG §2.4 (WEG40080)"

  # ── Tymp ──────────────────────────────────────────────────────────────
  - id: tymp
    name: Tymp
    species: Tymp
    scale: creature
    size: "0.7m (+0.7m tail)"
    hostile: true           # aggressive urban subspecies — attacks people
    pack_count: [1, 3]
    description: >-
      The tymp began as a forest forager, but a city-bred subspecies has turned
      aggressive — raiding trash and grain stores after dark and, more and more,
      attacking the people it finds there. Tusked, sharp-clawed, and a strong
      climber when pressed, it owns the night in the lower levels.
    char_sheet:
      attributes:
        dexterity: 3D
        perception: 1D
        strength: 1D+1
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 10
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: tusks
      to_hit_skill: brawling
      damage: "STR+1D"
    special:
      - "Night vision +2D."
      - "Climbing (+2D under stress)."
    harvest:
      good: "tymp_hide"
      resource: "organic"    # tusked urban-beast hide → crafting organic stock
      note: "Tough urban-beast hide; field-dressed on kill (Lane A Phase C)."
    source: "COTG §2.4 (WEG40080)"

  # ── Spor Crawler ──────────────────────────────────────────────────────
  - id: spor_crawler
    name: Spor Crawler
    species: Spor Crawler
    scale: creature
    size: "8cm"
    hostile: true           # disturb a nest and the hive swarms; lethal sting
    pack_count: [3, 6]      # hives swarm intruders
    description: >-
      Barely the length of a finger joint, the spor crawler is a tiny, deadly
      thing — an assassin's pet that hides in dirt, drawers, and bedding and
      stings with a venom that kills slowly and agonizingly. Its hives swarm
      anything that disturbs them. Ownership is tightly regulated; the black
      market in them thrives anyway.
    char_sheet:
      attributes:
        dexterity: 0D+2
        perception: 0D+2
        strength: 0D+2
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 1
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: sting
      to_hit_skill: brawling
      damage: "Poison 5D"
    special:
      - "Venom: roll every 5 minutes for 1 hour; Difficult stamina to resist the pain."
      - "Burrowing; camouflage (Difficult search to spot) — a hidden hazard."
      - "Hives swarm intruders."
    special_attack:
      poison:
        damage: "5D"
        rounds: 3
        onset: 0
        note: "Lethal venom; source cadence is every 5 min for 1 hr out of combat."
    harvest:
      good: "spor_venom"
      resource: "chemical"   # extracted venom → crafting chemical stock
      difficulty: 10         # extracting venom cleanly from a tiny stinger is hard
      note: "Black-market venom; field-dressed on kill (Lane A Phase C)."
    source: "COTG §2.4 (WEG40080)"

  # ── Somago ──────────────────────────────────────────────────────────────
  - id: somago
    name: Somago
    species: Somago
    scale: creature
    size: "50cm"
    hostile: true           # ambush "net" creature; chokes head-first
    pack_count: [1, 1]
    description: >-
      A net-shaped ambush creature that comes in several body-forms; the
      "helmet" form is sized to a humanoid head and drops to choke its prey
      head-first. Its origin is debated — rumoured to be engineered, though by
      whom no one agrees. It haunts cramped interiors and ship corridors,
      waiting overhead.
    char_sheet:
      attributes:
        dexterity: 4D
        perception: 2D
        strength: 3D+1
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 4
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: choke
      to_hit_skill: brawling
      damage: "+3D/round once it has the head"
    special:
      - "Hooks STR+1D."
      - "Drops from above; the helmet form engulfs and chokes head-first."
    special_attack:
      restraint:
        kind: choke
        hold_damage: "STR+3D"
        note: "Engulfs the head and chokes for +3D/round once it has a grip."
    source: "COTG §2.4 (WEG40080), origin recast (engineered, debated)"

