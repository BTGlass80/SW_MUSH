  # ── Bantha ────────────────────────────────────────────────────────────────
  # Consumer: dune_sea.yaml `tusken_bantha_herd` (non_hostile, terrains
  # [dune, rocky_outcrop], count [4,8]).
  # Source: WEG40120 p.215 (confirmed via sidecar WEG40120.txt lines
  # 20353-20381): DEX 2D, PER 2D, STR 8D, horns STR+1D, trample STR,
  # Move 5, Size 2-3m, Orneriness 2D.
  - id: bantha
    name: Bantha
    species: Bantha
    scale: creature
    size: "2-3m at the shoulder"
    hostile: false          # ambient fauna; non-hostile herd encounter
    pack_count: [4, 8]
    description: >-
      A massive shaggy quadruped with huge spiral horns and small, bright eyes
      that betray surprising curiosity for a creature that weighs as much as a
      landspeeder. Wild banthas move in herds across the Dune Sea, following
      ancient migration paths that predate any settlement on Tatooine. A herd
      of them means Tusken bands are not far — the Sand People depend on the
      bantha for everything: food, hide, transport, and ceremony. The ground
      shakes as they pass. Standing between a bantha and where it intends to
      go is not recommended.
    char_sheet:
      attributes:
        dexterity: 2D
        perception: 2D
        strength: 8D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 5
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: horns and trample
      to_hit_skill: brawling
      damage: "STR+1D"       # horns STR+1D; trample is STR (area-effect charge)
    special:
      - "Trample: STR damage (no to-hit modifier; area-effect charge against anything directly in the path)."
      - "Orneriness 2D — rideable by the Tusken Raiders; the spawn path uses this template as ambient fauna only."
      - "Wild bantha herds are guarded at distance by Tusken outriders; an encounter with a herd is a warning of Tusken proximity."
    source: "WEG40120 p.215 (Bantha stat block, confirmed via sidecar WEG40120.txt lines 20353-20381): DEX 2D, PER 2D, STR 8D, horns STR+1D, trample STR, Move 5, Size 2-3m, Orneriness 2D. Non-intelligent: KNO/MEC/TEC = 0D per WEG40120 p.214 creature convention. Verify against PDF page on dev box before merge (sourcebook is local-only)."

  # ── Preying Makthier ──────────────────────────────────────────────────────
  # Consumers: ey_akh.yaml `preying_makthier_crater` (hostile, crater,
  # count [5,10]); coruscant_underworld.yaml `makthier_dive` (hostile,
  # bottom_dark/service_tunnel/industrial_ruin, count [4,8]).
  # Source: COTG §2.3 (WEG40080), creatures_of_the_galaxy_extraction_v1.md
  # §2.3. Verified stat block: DEX 3D+1, PER 2D+1, STR 3D+1, search 4D,
  # sneak 4D+2, lifting 5D+1, sonic +1D+2 search, constriction 1D/round
  # -2D DEX, paralytic stinger 2D + 4D stun x5 rounds, Move 10 fly.
  - id: preying_makthier
    name: Preying Makthier
    species: Preying Makthier
    scale: creature
    size: "1.2-2.7m long, 2m wingspan"
    hostile: true           # pack aerial hunter; sonic motion detection
    pack_count: [5, 10]
    description: >-
      What sounds like wind through a crevice is not wind — it is the sonar
      clicks of something navigating in the dark below the rim. The preying
      makthier roosts in glassed crevices and structural voids, a cave flyer
      that hunts by ultrasonic echo in total darkness and has no use for the
      distinction between a ravine and a feeding run. It masses in dozens when
      the heat drives its prey to the surface, and the tail it drags behind it
      — barbed, sucking, jointed — is both a strangling weapon and a venom
      delivery system. The first one that hits you will not be the last one.
    char_sheet:
      attributes:
        dexterity: 3D+1
        perception: 2D+1
        strength: 3D+1
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        search: 4D
        sneak: 4D+2
        lifting: 5D+1
        brawling: 4D+1       # constriction and sting to-hit
      move: 10               # fly
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: tail stinger
      to_hit_skill: brawling
      damage: "2D"           # physical component; stun rider via special_attack
    special:
      - "Sonic motion detection: +1D+2 to search rolls; hunts unimpaired in total darkness."
      - "Constriction: 1D/round while holding; target loses 2D DEX while constricted (Moderate brawling or STR to break free)."
      - "Paralytic stinger: 2D physical + 4D stun; stun repeats every round for 5 rounds (Moderate stamina to resist each)."
      - "Masses 5-10+ for coordinated attacks; isolating targets is their primary tactic."
    special_attack:
      restraint:
        kind: grapple
        hold_damage: "1D"    # constriction 1D/round (COTG §2.3 exact value)
        dex_penalty: "2D"    # target loses 2D DEX while held (COTG §2.3)
        note: "Constricting tail; Moderate brawling or STR roll to break free."
      poison:
        damage: "4D"         # stun component of paralyzing stinger
        rounds: 5
        onset: 0
        note: "Paralytic stinger: 2D physical (natural_attack) + 4D stun per round for 5 rounds; Moderate stamina to resist each tick."
    source: "COTG §2.3 (WEG40080), creatures_of_the_galaxy_extraction_v1.md §2.3. Verified stat block: DEX 3D+1, PER 2D+1, STR 3D+1, search 4D, sneak 4D+2, lifting 5D+1, sonic motion detection +1D+2 search, constriction 1D/round -2D DEX, paralyzing stinger 2D + 4D stun x5 rounds, Move 10 fly, 1.2-2.7m long 2m wingspan. Era-clean: Geonosis-origin recast as 'structural voids and glassed crevices' for both Geonosis and Coruscant Underworld framing — no off-era operator reference."

  # ── Svaper ────────────────────────────────────────────────────────────────
  # Consumer: coruscant_underworld.yaml `svaper_escape` (hostile, terrains
  # [industrial_ruin, abandoned_plaza], min_band 2, count [1,2]).
