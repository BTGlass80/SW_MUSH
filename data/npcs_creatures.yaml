  #
  # PROVENANCE: "Geonosis and the Outer Rim Worlds" is a WotC d20 sourcebook, so
  # per the era discipline its d20 stats are DISCARDED and these are re-statted to
  # WEG D6 FROM SCRATCH — they are NOT faithful WEG transcriptions like the COTG
  # set above. The numbers below are the D6 stubs from geonosis_outer_rim_extraction_v1.md
  # §1.8 and are flagged for dev-box calibration against the R&E creature tables
  # (krayt/rancor power curve). Net-new vs. the COTG Geonosis cave/rock set
  # (Arqet/Draagax/Keejin/Preying Makthier/Thanu) — no duplication.
  # ════════════════════════════════════════════════════════════════════════════

  # ── Acklay ────────────────────────────────────────────────────────────────
  - id: acklay
    name: Acklay
    species: Acklay
    scale: creature
    size: "~3m tall (claw-reach to 5m)"
    hostile: true
    pack_count: [1, 1]          # solitary apex predator
    description: >-
      A nightmare of chitin and blades: six long, bladed legs carry a low
      armoured body and a wedge of a head fringed with sensory stalks. Acklays
      run prey down on those legs and open it with them, then finish with a
      crushing bite. Geonosian beast-handlers prize them for the arena — a single
      acklay can clear a pit — and the wild ones that have slipped their handlers
      hunt the badlands and the shore of the Ebon Sea. The first sign is usually
      the drumming of legs on rock.
    char_sheet:
      attributes:
        dexterity: 3D+1
        perception: 2D
        strength: 5D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        brawling: 6D
        dodge: 4D
      move: 16
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: claws
      to_hit_skill: brawling
      damage: "STR+2D"
    armor:
      note: "+1D chitin."
    special:
      - "Bite: STR+1D (the killing blow once prey is pinned by the legs)."
      - "Claw-reach ~5m on the six bladed legs — strikes before most foes close."
      - "D6 stub re-statted from WotC lore; calibrate on the dev box."
    harvest:
      good: acklay_chitin
      note: "Arena armourers buy intact chitin plate; NOT wired (no creature-harvest runtime path yet)."
    source: "Geonosis & Outer Rim (WotC d20) §1.8 — D6 re-stat from scratch; calibrate on dev box."

  # ── Mutant Acklay ───────────────────────────────────────────────────────────
  - id: mutant_acklay
    name: Mutant Acklay
    species: Acklay
    scale: creature
    size: "~3m+ (Ebon Sea strain)"
    hostile: true
    pack_count: [1, 1]
    description: >-
      The chemical sludge that bled from Golbah's Pit into the Ebon Sea did not
      kill the acklays that took to the water — it changed them. The Ebon Sea
      strain is bigger and better armoured than its desert kin, breathes the
      stagnant water as easily as air, and hunts the lightless depths beneath the
      scum film by sense and echo. It lies submerged until something crosses the
      shore, then comes up out of the black water all at once.
    char_sheet:
      attributes:
        dexterity: 3D+1
        perception: 2D
        strength: 5D+2
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        brawling: 6D
        dodge: 4D
      move: 14                  # 12 swimming
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: claws
      to_hit_skill: brawling
      damage: "STR+2D+2"
    armor:
      note: "+2D thickened chitin."
    special:
      - "Amphibious — breathes water; Move 12 swimming."
      - "Low-light / echo-sense: hunts the dark water unimpaired by darkness."
      - "+1D vs radiation and toxin (acclimated to the poisoned sea)."
      - "Bite STR+1D. D6 stub re-statted from WotC lore; calibrate on the dev box."
    source: "Geonosis & Outer Rim (WotC d20) §1.8 — D6 re-stat from scratch; calibrate on dev box."

  # ── Merdeth ───────────────────────────────────────────────────────────────
  - id: merdeth
    name: Merdeth
    species: Merdeth
    scale: creature             # see note: walker-scale-equivalent juggernaut — calibrate scale on dev box
    size: "immense (\"bigger than a star freighter\")"
    hostile: true
    pack_count: [1, 1]
    description: >-
      A merdeth is less an animal than a slow catastrophe: a vast armoured shell
      hauling itself across the dunes on barbed tentacles, consuming anything
      organic in its path. It is nearly unstoppable and nearly mindless, and it
      corners prey by smashing whatever the prey has fled into — a hive wall, a
      den mouth, a parked ship. Geonosians cannot kill them, so before the annual
      flood they herd them into the low desert to drown; the receding water leaves
      their glittering shells behind. Each one carries a cloud of mip parasites.
    char_sheet:
      attributes:
        dexterity: 1D
        perception: 1D+2
        strength: 8D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        brawling: 8D
      move: 4
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: barbed tentacles
      to_hit_skill: brawling
      damage: "STR+2D"
    armor:
      note: "+4D shell."
    special:
      - "Walker-scale-equivalent juggernaut (STR 8D, \"bigger than a star freighter\"); D6 stub — calibrate scale (likely walker) on the dev box before live combat."
      - "Hosts 1D6 Mip swarms (see mip_swarm); they disperse if the merdeth dies."
      - "Attacks structures (\"nests\") to corner fleeing prey."
    special_attack:
      restraint:
        kind: grapple
        hold_damage: "STR+2D"
        note: "Barbed tentacles seize and crush; opposed brawling/STR to break free."
    harvest:
      good: merdeth_shell
      note: "The glittering post-flood shells are a salvage good; NOT wired (no creature-harvest runtime path yet)."
    source: "Geonosis & Outer Rim (WotC d20) §1.8 — D6 re-stat from scratch; calibrate on dev box."

  # ── Mip Swarm ───────────────────────────────────────────────────────────────
  - id: mip_swarm
    name: Mip Swarm
    species: Mip
    scale: creature
    size: "swarm (individuals tiny)"
    hostile: true
    pack_count: [1, 1]          # one swarm entity
    description: >-
      Mips are tiny flying parasites that ride a merdeth in a humming cloud,
      scouting food for the host and screening it like interceptors. Singly they
      are nothing; as a swarm they fill the air in a stinging haze that blinds and
      bleeds anything caught inside it. Kill the merdeth they serve and the cloud
      loses its purpose and scatters.
    char_sheet:
      attributes:
        dexterity: 3D
        perception: 3D
        strength: 1D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 20                  # flying
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: swarm
      to_hit_skill: brawling
      damage: "2D auto-damage to anything sharing its space (no to-hit; the swarm is everywhere at once)"
    special:
      - "Distraction: a target engulfed suffers a penalty to actions (calibrate on the dev box)."
      - "Screens and scouts for its host merdeth; disperses if the host dies."
    source: "Geonosis & Outer Rim (WotC d20) §1.8 — D6 re-stat from scratch; calibrate on dev box."

  # ═══════════════════════════════════════════════════════════════════════════
  # Phantom-producer closure (2026-06-13): four creatures referenced by LIVE
  # encounters whose templates did not resolve (the encounter fired narrative
  # but spawned nothing). dewback + tusken_warrior wire dune_sea.yaml; maze_
  # predator + underworld_thug wire coruscant_underworld.yaml. See the SPAWN
  # RESOLUTION note in the header for why a sourcebook-canon creature still has
  # to live in THIS file to spawn.
