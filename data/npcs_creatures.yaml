  # ── Arqet ─────────────────────────────────────────────────────────────────
  # Consumer: ey_akh.yaml `arqet_ambush` (hostile, terrains [badlands]).
  # Source: COTG §2.3 (WEG40080). Patient mountain/rock-terrain color-shifting
  # ambush predator. Sits immobile (colour-shifts to match rock) until the prey
  # is point-blank, then gores with armoured horns; the carapace shrugs off bolts
  # as it baits the attacker into close range.
  - id: arqet
    name: Arqet
    species: Arqet
    scale: creature
    size: "1.8-2.4m long, 2m tall"
    hostile: true           # feigned immobility turns to sudden gore attack
    pack_count: [1, 2]
    description: >-
      The rock ahead has too many edges. The arqet is a patience predator —
      it colour-shifts to match the stone around it and sits absolutely still,
      watching through plated eyes, until the prey closes to the worst possible
      range. Then the horns come out of what you thought was a boulder, and they
      come fast. Its carapace turns a blaster bolt almost as reliably as the rock
      it was mimicking. The armour is not a design flaw: it lets the arqet sit
      in the open and let you come to it, knowing you cannot make the approach
      count.
    char_sheet:
      attributes:
        dexterity: 3D+2
        perception: 3D
        strength: 3D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        sneak: 5D            # colour-shift camouflage (feigned immobility)
        brawling: 4D         # horn-charge + claw follow-through
      move: 9                # 12 on a charge burst
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: horns
      to_hit_skill: brawling
      damage: "STR+2D"       # STR 3D -> 5D on the horn-gore
    armor:
      note: "+2D physical and energy — carapace armour."
    special:
      - "Camouflage: colour-shifts to rock; adds to sneak rolls while stationary."
      - "Feigned immobility: sits motionless until prey is in close range, then charges."
      - "Claws: STR+2 follow-through after the horn charge."
      - "Teeth: STR+1D as a final pin attack."
    harvest:
      good: "arqet_carapace"
      resource: "composite"   # armour-grade carapace plate → crafting composite stock
      note: "The carapace plate is a commercial armour blank; field-dressed on kill."
    source: "COTG §2.3 (WEG40080), creatures_of_the_galaxy_extraction_v1.md §2.3. Verified stat block: DEX 3D+2, PER 3D, STR 3D, sneak 5D, armor +2D phys/energy, horns STR+2D, claws STR+2, teeth STR+1D, Move 9/12 charge."

  # ── Draagax ───────────────────────────────────────────────────────────────
  # Consumer: ey_akh.yaml `draagax_pack` (hostile, terrains [badlands, crater]).
  # Source: COTG §2.3 (WEG40080). Pack cave-dweller that turns berserk and very
  # fast after eating a local narcotic plant; hunts by heat-sense; paralytic bite.
  - id: draagax
    name: Draagax
    species: Draagax
    scale: creature
    size: "1.6-2.0m tall"
    hostile: true           # pack carnivore; berserk after the narcotic plant
    pack_count: [3, 6]
    description: >-
      In the deep rock of the N'G'Zi badlands there are plants that grow in the
      crevices: a low, dark shrub with small blue berries. The draagax eat them.
      A draagax that has not eaten the berries is a fast pack hunter with
      paralyzing fangs, hunting by the heat of its prey. A draagax that has eaten
      them is something else — something that sprints at the edge of what is
      possible, that the rest of the pack races to keep up with. The Geonosians
      have a word for the state that translates approximately as "the hunger that
      has no bottom." You will know one is berserk before you see it: the sound
      of it coming across rock is very loud, and it does not slow down.
    char_sheet:
      attributes:
        dexterity: 4D
        perception: 3D
        strength: 4D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        dodge: 5D
        running: 6D            # berserk burst
        sneak: 5D
        brawling: 5D
        climbing: 5D
      move: 12                 # 28 on berserk burst (berserk -> Move 28)
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: fangs
      to_hit_skill: brawling
      damage: "STR+1D"         # STR 4D -> 5D; plus paralytic rider below
    special:
      - "Infrared vision: hunts by body heat, unimpaired by darkness."
      - "Berserk sprint: Move 28 after eating the narcotic plant (Geonosis cave flora)."
      - "Paralytic fangs: Moderate stamina or incapacitated (flavor — full mechanic is a follow-up)."
      - "Pack coordination: attacks in coordinated groups of 3-6."
    special_attack:
      poison:
        damage: "0D"           # paralytic, not damage-damage; mechanically it is stun
        rounds: 3
        onset: 0
        note: "Draagax fang neurotoxin: Moderate STR or incapacitated for 3 rounds."
    harvest:
      good: "draagax_fang"
      resource: "chemical"     # neurotoxin gland → crafting chemical stock
      difficulty: 10           # extracting a live paralytic fang gland safely is hard
      note: "The fang gland holds paralytic toxin; field-dressed on kill."
    source: "COTG §2.3 (WEG40080), creatures_of_the_galaxy_extraction_v1.md §2.3. Verified stat block: DEX 4D, PER 3D, STR 4D, dodge 5D, running 6D, sneak 5D, brawling 5D, climbing/jumping 5D, Move 12 / berserk 28, infrared vision, poisoned fangs (Moderate stamina or incapacitated)."

  # ── Keejin (Cave Crawler) ─────────────────────────────────────────────────
  # Consumer: ey_akh.yaml `keejin_wall_drop` (non_hostile, terrains [badlands]).
  # The "large hostile cousin" variant. Source: COTG §2.3 (WEG40080).
  # Near-blind cave scuttler; harmless standard variant (flees light); the larger
  # variant (this entry) drops on parties from above. Clinging to walls/ceilings.
  - id: keejin
    name: Keejin
    species: Keejin
    scale: creature
    size: "1-2m"
    hostile: false          # standard keejin flee; the "large hostile cousin" drops
    pack_count: [2, 4]
    description: >-
      The keejin is the kind of creature you only see when it decides you should.
      Near-blind, it moves by vibration and air-pressure, skittering across
      walls and ceilings on clinging feet that make no sound at all. The standard
      keejin is harmless — it flees light with the desperate urgency of something
      that has been prey its whole evolutionary life, and it carries a camouflage
      reflex that makes it almost invisible while it holds still. It holds still
      a great deal. The larger variant — the kind that weighs what a grown Rodian
      weighs — holds still until it has a clear angle, and then it drops. The
      ceiling in the N'G'Zi ravines is not always what it appears to be.
    char_sheet:
      attributes:
        dexterity: 3D
        perception: 2D
        strength: 2D+1
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 5
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: claws
      to_hit_skill: brawling
      damage: "STR+1D"         # STR 2D+1 -> 3D+1
    special:
      - "Camouflage: +2 difficulty to spot while motionless."
      - "Clinging: moves freely on walls and ceilings."
      - "Near-blind: hunts by vibration and air-pressure, not vision."
      - "Flees bright light; the large variant (this template) drops from above."
    source: "COTG §2.3 (WEG40080), creatures_of_the_galaxy_extraction_v1.md §2.3. Verified stat block: DEX 3D, PER 2D, STR 2D+1, camouflage +2 difficulty to spot, clinging (walls/ceilings), Move 5. Large hostile-variant template used here."

  # ── Gornt ─────────────────────────────────────────────────────────────────
  # Consumer: dune_sea.yaml `gornt_herd` (non_hostile, terrains [oasis, dune]).
  # Source: COTG §4 exotic appendix (WEG40080). Small frontier livestock / prey
  # animal — the desert equivalent of a grazing herd-beast. A gornt herd at an
  # oasis means water and food; where gornts drink, the water is safe.
  - id: gornt
    name: Gornt
    species: Gornt
    scale: creature
    size: "~0.5m at shoulder"
    hostile: false          # flees threats; docile grazer
    pack_count: [4, 8]
    description: >-
      A stubby, round-bodied herbivore the height of a knee, the gornt is the
      desert's modest promise: where they drink, the water is clean; where they
      gather, there is enough growth to sustain them and therefore something to
      eat. Gornts are hunted everywhere they are found, are not especially fast,
      and have no defenses to speak of beyond a reflexive bite that closes on
      whatever is closest when they panic. Moisture farmers on Tatooine keep
      small herds for meat and hide, and the feral populations that water at
      isolated oases are the best survey markers in the deep desert. A Gornt
      herd means you have found water. The predators that follow them here
      mean you have company.
    char_sheet:
      attributes:
        dexterity: 3D           # quick-fleeing prey animal
        perception: 2D
        strength: 1D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 10
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: bite
      to_hit_skill: brawling
      damage: "STR+2"           # STR 1D -> effectively flavor; gornts run first
    special:
      - "Prey animal: the gornt's defensive bite is reflexive and largely ineffective against adults."
    harvest:
      good: "gornt_meat"
      resource: "organic"       # small prey animal → crafting organic stock / food
      note: "Frontier livestock; field-dressed on kill for meat and hide."
    source: "COTG §4 exotic appendix (WEG40080), creatures_of_the_galaxy_extraction_v1.md §4. Verified stat block: DEX 1D+2, PER 1D, STR 1D, bite STR+2, Move 6. DEX raised to 3D (faster prey-animal reflex) to match role; STR and damage faithful to source."

  # ── Raen Sovra ────────────────────────────────────────────────────────────
  # Consumer: coruscant_underworld.yaml `raen_sovra_infestation` (hostile,
  # terrains [service_tunnel, industrial_ruin]).
  # Source: COTG §2.5 (WEG40080). Metal-shelled worm that eats electricity and
  # metal; infests corridors and conduit runs; electrocutes whatever disturbs it.
  # Spreads station-to-station via docking ships. Infrastructure threat.
  - id: raen_sovra
    name: Raen Sovra
    species: Raen Sovra
    scale: creature
    size: "<=8m long, 5cm wide"
    hostile: true           # passive until disturbed, then electrocutes anything near
    pack_count: [2, 4]
    description: >-
      A Raen Sovra is a length of dark-metal-shelled worm, segmented and
      dull-gleaming, threading through conduit runs and maintenance tunnels like
      insulation that has come alive. It feeds on electricity and the metal it
      lives inside, and it has three defenses: it passes current through anything
      in contact with it, it travels via docking ships from station to station,
      and it infests systems quarantined by the authorities before they know it
      is there. An infestation in a corridor's conduit run expresses itself as
      power surges, brown-outs, and the acrid smell of metal oxidized from the
      inside. The worms themselves are only visible when they come out of the
      walls, which they do when you crowd a conduit junction too closely or cut
      into a pipe without checking first. The current they carry at contact range
      is severe.
    char_sheet:
      attributes:
        dexterity: 4D+2
        perception: 1D
        strength: 2D+2
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 5
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: electrocution
      to_hit_skill: brawling
      damage: "5D+2"           # contact electrocution; absolute (not STR-based)
    special:
      - "Electricity sense: +3D PER vs anything carrying a power source."
      - "Space survival: can survive vacuum (travels via docking ships between stations/worlds)."
      - "Infrastructure hazard: infests ship and station conduits, causes power surges and brown-outs."
      - "Electrocution: contact with the worm delivers 5D+2 current — independent of STR."
    special_attack:
      poison:
        damage: "5D+2"
        rounds: 1
        onset: 0
        note: "Electrocution on contact — not venom, but the special_attack path handles it as an instantaneous damage rider."
    harvest:
      good: "sovra_shell_segment"
      resource: "metal"        # the metal-eating shell accumulates refined alloy → crafting metal stock
      difficulty: 9            # extracting intact shell segments from a live worm safely
      note: "The accumulated-alloy shell segments are a salvage good; field-dressed on kill."
    source: "COTG §2.5 (WEG40080), creatures_of_the_galaxy_extraction_v1.md §2.5. Verified stat block: DEX 4D+2, PER 1D, STR 2D+2, electricity sense (+3D PER), electrocution 5D+2 (contact), space survival, Move 5. Era strip applied per the extraction doc note (companion weapon item recast as a generic black-market prototype, off-era framing removed)."

  # ════════════════════════════════════════════════════════════════════════════
  # GRIND-REDIRECT round 2 (2026-06-24) — Jundland Wastes fauna.
  #
  # Three new D6-stat entries for the Tatooine Jundland Wastes wilderness
  # region (tatooine_jundland.yaml). All are D6 re-stats FROM SCRATCH per the
  # WEG R&E conventions in WEG40120:
  #   - canyon_womp_rat  — the 2m pack rodent named in SoT §2/§10 and already
  #                         in the jundland_beggars_canyon room description.
  #                         "re-stat to D6 from scratch" flag in
  #                         secrets_of_tatooine_extraction_v1.md §10.
  #   - rock_wart        — venomous insectoid that lays eggs in living hosts
  #                         (SoT §10 stat gap); hides in canyon crevices.
  #   - scurrier         — small fast vermin at the margins of settlements and
  #                         outskirts (SoT §10 stat gap); the jundland scrub
  #                         fringe variant.
  #
  # Calibration anchors (WEG40120 p.214+ creature family):
  #   gornt   STR 1D  (0.5m prey animal)
  #   dewback STR 5D  (2.5m riding beast)
  #   wrix    STR 3D  (2.5m pack carnivore, preys on banthas)
  # A 2m womp rat is a tier between the wrix and the gornt: STR 2D+2.
  # Non-intelligent: KNO/MEC/TEC = 0D per R&E creature convention.
  # ════════════════════════════════════════════════════════════════════════════

  # ── Canyon Womp Rat ────────────────────────────────────────────────────────
  # Consumer: tatooine_jundland.yaml `womp_rat_pack` (hostile, terrains
  # [canyon, rocky_outcrop], count [3,6]). Named directly in the existing
  # jundland_beggars_canyon room description: "Womp Rats nest in the
  # crevices — some growing nearly two metres long." SoT §10 flags womp rat
  # as one of the two D6-stat gaps most worth filling.
  - id: canyon_womp_rat
    name: Canyon Womp Rat
    species: Womp Rat
    scale: creature
    size: "~2m long"
    hostile: true            # aggressive pack predator; harries anything smaller
    pack_count: [3, 6]
    description: >-
      Lean and low-slung with a ridged spine and a long, naked tail, the canyon
      womp rat grows to almost two metres along the body — large enough that a
      pack of them can harry a full-grown Bantha calf to a standstill. They
      nest in crevices and boulder fields and hunt by harrying their prey in
      relay shifts, one pack biting from the front while the rest arc around.
      The Jundland settlers drive their young in skyhoppers to run and pick
      them off from the air; the womp rats have learned to scatter into the
      rocks at the sound of a repulsor engine.
    char_sheet:
      attributes:
        dexterity: 2D+1
        perception: 2D
        strength: 2D+2
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        brawling: 3D+2        # pack bite-and-tear; relay attacks
        sneak: 3D             # crevice ambush
        running: 3D           # harassment sprints
      move: 12               # quick chase sprints across broken rock
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: bite
      to_hit_skill: brawling
      damage: "STR+1D"       # STR 2D+2 -> 3D+2; the relay-bite threat
    special:
      - "Pack relay attack: one womp rat bites from the front while others arc around."
      - "Scatter reflex: at repulsorlift engine sound, pack breaks and hides in rocks."
    harvest:
      good: "womp_rat_pelt"
      resource: "organic"    # rough hide → crafting organic stock
      note: "Coarse banded hide; field-dressed on kill."
    source: "D6 re-stat from scratch per secrets_of_tatooine_extraction_v1.md §10 (SoT WTC11839 is WotC d20; d20 block discarded per WEG-only invariant). Calibrated to R&E creature family in WEG40120: wrix STR 3D (2.5m pack carnivore), gornt STR 1D (0.5m prey). Canyon womp rat at ~2m sits between them at STR 2D+2. Jundland room description (jundland_beggars_canyon) is the in-repo size reference: 'nearly two metres long.'"

  # ── Rock Wart ──────────────────────────────────────────────────────────────
  # Consumer: tatooine_jundland.yaml `rock_wart_ambush` (hostile, terrains
  # [rocky_outcrop, cave], count [1,3]). SoT §10 stat gap: "rock wart
  # (venomous insectoid that lays eggs in living hosts)." Not in COTG.
  # Statted to D6 from scratch following R&E small-predator conventions.
  # Small enough to be low-STR (like the hitcher crab STR 1D) but dangerous
  # via its paralytic venom. Gated: min_band 2 (the paralyzing venom + egg
  # infestation is a high-risk threat for a character who doesn't know it).
  - id: rock_wart
    name: Rock Wart
    species: Rock Wart
    scale: creature
    size: "20-35cm"
    hostile: false           # cryptic; attacks when stepped on or reached into
    pack_count: [1, 3]
    description: >-
      Flat as a scale and sand-coloured as the stone it flattens itself
      against, the rock wart is nearly impossible to see until it stings you.
      It haunts the shadowed undersides of boulders and the cool clefts in
      the canyon face — anywhere a warm hand might reach. Its sting delivers
      a paralysing venom, and the females of the species locate paralysed prey
      not as a meal but as a nursery: they lay eggs just below the skin,
      preferring the thigh or the shoulder, and the larvae feed for three to
      five days before boring out. Healers on Tatooine know the signs and the
      treatment; the settlers who lose animals to them do not usually realise
      what happened until the larvae emerge.
    char_sheet:
      attributes:
        dexterity: 2D
        perception: 1D+2
        strength: 1D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        sneak: 4D             # virtually invisible against rock; the whole defense
      move: 3
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: sting
      to_hit_skill: brawling
      damage: "STR+1 (plus venom below)"  # STR 1D -> 1D+1; sting is the venom delivery
    special:
      - "Camouflage: nearly impossible to see against rock; +3 difficulty to spot."
      - "Paralytic venom: Moderate STR roll or paralysed 1D rounds per sting."
      - "Egg incubation: paralysed prey at risk of larval implantation (1-in-3 chance; field-treatable with a Moderate first_aid roll within 1 hour; larvae emerge 3-5 days later)."
    special_attack:
      poison:
        damage: "0D"          # paralytic, not damage — modelled as a stun rider
        rounds: 2
        onset: 0
        note: "Paralytic sting: Moderate STR or incapacitated for 1D rounds; egg-incubation risk on extended paralysis."
    source: "D6 re-stat from scratch per secrets_of_tatooine_extraction_v1.md §10 (SoT WTC11839 is WotC d20; d20 block discarded per WEG-only invariant). Calibrated to R&E small-predator conventions in WEG40120: hitcher crab STR 1D (1.3m, venomous), spor crawler STR 0D+2 (8cm, lethal venom). Rock wart at 20-35cm with paralytic-only venom sits between them. Lore anchor: SoT §10 'venomous insectoid that lays eggs in living hosts.'"

  # ── Scurrier ───────────────────────────────────────────────────────────────
  # Consumer: tatooine_jundland.yaml `scurrier_colony` (non_hostile, terrains
  # [rocky_outcrop, scrubland], count [4,8]). SoT §10 stat gap: "scurrier
  # (urban vermin)." Appears in fringe and outskirt zones; the Jundland scrub
  # is the natural habitat edge. Non-hostile — forager/scavenger that flees.
  - id: scurrier
    name: Scurrier
    species: Scurrier
    scale: creature
    size: "10-25cm"
    hostile: false           # flees at threat; bites only if grabbed
    pack_count: [4, 8]       # colonies of 20+ occupy rock crevices
    description: >-
      A small, fast-footed lizard-like creature with a plated back and a
      fidgeting, anxious head on a neck that seems always in motion. Scurriers
      live in colonies of twenty or more, nesting in rock crevices and scrub
      thickets at the edge of the Jundland canyons. They are harmless — they
      scatter at any loud noise or quick movement — and they make reasonable
      eating in a survival situation, which is why Jawas and moisture farm
      children have caught them for generations. A colony moving suddenly and
      in the same direction is worth paying attention to: scurriers have better
      threat-detection than their nervous system has any right to.
    char_sheet:
      attributes:
        dexterity: 4D+1       # very fast; the primary defense is escape
        perception: 3D        # alert colony-animal with good threat-detection
        strength: 1D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        sneak: 4D             # low profile and colony-camouflage
        running: 5D           # explosive scatter reflex
      move: 14               # fast-moving small lizard
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: bite
      to_hit_skill: brawling
      damage: "STR"          # STR 1D; trivial — the scurrier never fights, only bites if grabbed
    special:
      - "Scatter reflex: the whole colony bolts simultaneously at a threat; warning signal to observers."
      - "Prey animal: the bite is reflexive; a scurrier flees before it fights."
    harvest:
      good: "scurrier_meat"
      resource: "organic"    # small lizard → crafting organic stock / survival food
      note: "Jawa subsistence food; field-dressed on kill."
    source: "D6 re-stat from scratch per secrets_of_tatooine_extraction_v1.md §10 (SoT WTC11839 is WotC d20; d20 block discarded per WEG-only invariant). Calibrated to R&E small-creature conventions in WEG40120: gornt DEX 1D+2, PER 1D, STR 1D (0.5m prey animal). Scurrier is faster and sharper-eyed (colony-alarm animal, 10-25cm) at DEX 4D+1, PER 3D, STR 1D. Lore anchor: SoT §10 'scurrier (urban vermin)' — placed in the fringe scrub, not a city interior, as the Jundland is its natural habitat edge."

  # ════════════════════════════════════════════════════════════════════════════
