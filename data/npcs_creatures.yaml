  # ── Voroos ──────────────────────────────────────────────────────────────
  - id: voroos
    name: Voroos
    species: Voroos
    scale: creature
    size: "1-10m"
    hostile: true           # stationary terrain-mimic ambush
    pack_count: [1, 1]
    description: >-
      What looks like a mound of sand, moss, or drifted snow is, sometimes, a
      voroos — a stationary terrain-mimic that waits, perfectly disguised, for
      something to wander within reach of its tongue. It grabs, hauls the prey
      in, and bites down; the bigger the voroos, the harder it is to tear free.
      The land itself, it turns out, can be hungry.
    char_sheet:
      attributes:
        dexterity: 4D
        perception: 2D
        strength: 6D         # 4D / 6D / 8D by size; mid value
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 0
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: tongue
      to_hit_skill: brawling
      damage: "STR+1D, then grasp (vs brawling parry)"
    special:
      - "Camouflage: a Difficult perception roll to notice before it strikes."
      - "STR 4D / 6D / 8D by size (1-10m) — scale the threat to the region."
      - "Teeth do half STR; +3D damage to anything trying to pull free of the grasp."
    special_attack:
      restraint:
        kind: grapple
        hold_damage: ""
        note: "Sticky tongue-grasp; opposed brawling/STR to break free."
    harvest:
      good: "voroos_hide"
      resource: "organic"    # massive terrain-mimic bulk → crafting organic stock
      yield: 2               # a 1-10m beast field-dresses to more than one stack
      note: "Bulk hide/flesh from a large beast; field-dressed on kill (Lane A Phase C)."
    source: "COTG §3 (WEG40080)"

