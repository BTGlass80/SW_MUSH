  # §2.2. Verified stat block: DEX 4D, PER 2D, STR 2D, Bite STR+3D,
  # Spines STR+3D+2 (lodge), Tough skin +2D (not gills), Move 20 swim
  # (land Move calibrated to 13 — out-of-water, non-aquatic context).
  - id: svaper
    name: Svaper
    species: Svaper
    scale: creature
    size: "2-3m"
    hostile: true           # fighting-pit escapee; immediately aggressive
    pack_count: [1, 2]
    description: >-
      A compact, low-slung predator built like compressed aggression —
      smooth-scaled, fast, and permanently hungry. In the underworld it is
      most often found as an escapee from a fighting pit or a crimelord's
      disposal tank: something that made it out of the cage and into the
      maintenance tunnels and has not yet been retrieved. It wraps fast and
      bites deep, and the spines that ridge its back snap off into whatever
      grabs it. The fighting-pit strains are meaner than the wild ones.
    char_sheet:
      attributes:
        dexterity: 4D
        perception: 2D
        strength: 2D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        brawling: 4D+2
        sneak: 3D+1
      move: 13               # land-calibrated (book Move 20 is aquatic swim speed)
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: bite
      to_hit_skill: brawling
      damage: "STR+3D"       # STR 2D -> 5D total bite
    special:
      - "Spines: STR+3D+2 damage; lodge in the skin of anything that grabs the svaper — Moderate STR roll to remove each spine without further damage."
      - "Tough skin: +2D vs physical and energy (not the gill area)."
      - "Fighting-pit strain: escaping svapers in the underworld are combat-conditioned — more aggressive than wild specimens."
    special_attack:
      restraint:
        kind: grapple
        hold_damage: "STR+3D+2"  # lodging spines on grapple (COTG §2.2)
        note: "Spine-lodge: anything grappling the svaper takes STR+3D+2 from lodging spines; Moderate STR to remove each."
    source: "COTG §2.2 (WEG40080), creatures_of_the_galaxy_extraction_v1.md §2.2. Verified stat block: DEX 4D, PER 2D, STR 2D, Bite STR+3D, Spines STR+3D+2 (lodge in skin), Tough skin +2D (not gills), Move 20 swim (land Move calibrated to 13 for non-aquatic underworld encounter). Era strip applied: fighting-pit/crimelord framing replaces any off-era operator reference."

  # ── Syndicate Enforcer ────────────────────────────────────────────────────
  # Consumer: coruscant_underworld.yaml `uscru_syndicate_muscle` (hostile,
  # terrains [abandoned_plaza, ferrocrete_corridor], min_band 1, count [1,2]).
  # D6 stats from scratch — anchored to WEG40120 p.199 Extras NPC conventions
  # (Guards: DEX 3D, blaster 3D+1, STR 3D+1 floor; pirate sentry DEX 4D,
  # blaster 5D+2 ceiling). Enforcer sits between: DEX 3D+1, blaster 4D.
  # Verify WEG40120 p.199 anchors against PDF on dev box before merge.
  - id: syndicate_enforcer
    name: Syndicate Enforcer
    species: Human
    scale: character
    intelligent: true        # sentient; exempt from non-intelligent 0D-KMT contract
    hostile: true
    pack_count: [1, 2]
    description: >-
      One or two figures in well-cut civilian coats stand in the shadows near
      the plaza's edge — not the tattooed gang muscle from the lower corridors,
      but something a step up. Polished boots, a visible sidearm worn with
      practice, and the stillness of someone paid to stand in a particular spot
      and discourage particular behaviors. Syndicate enforcers work Uscru's
      fringe corridors on retainer for kajidic and organized-crime interests
      that are too respectable to use street gangs. They don't negotiate, and
      they don't miss.
    char_sheet:
      attributes:
        dexterity: 3D+1
        perception: 3D
        strength: 3D
        knowledge: 2D
        mechanical: 2D
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D+2
        brawling: 3D+2
        intimidation: 4D
        streetwise: 3D+1
      move: 10
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: blaster pistol
      to_hit_skill: blaster
      damage: "4D"           # standard WEG blaster pistol; absolute (independent of STR)
    special:
      - "Armed: blaster pistol (4D); vibroblade backup (STR+1D) at close range."
      - "Works in pairs when available; does not break and run — fights until the contract says otherwise."
      - "Kajidic or organized-crime retainer — better trained and more professional than street gang muscle."
    source: "D6 stats from scratch — anchored to WEG40120 p.199 Extras NPC conventions (Guards: DEX 3D, blaster 3D+1, STR 3D+1 as floor; pirate sentry DEX 4D, blaster 5D+2 as ceiling). Enforcer sits between at DEX 3D+1, blaster 4D. Era-clean: no Imperial/Rebel affiliation; kajidic/organized-crime framing. Verify WEG40120 p.199 anchors against PDF on dev box before merge."

  # ── Drain Lurker ──────────────────────────────────────────────────────────
  # Consumer: coruscant_underworld.yaml `drain_lurker_ambush` (hostile,
  # terrains [ferrocrete_corridor, service_tunnel], min_band 1, count [1,2]).
  # Original creature (D6-statted from scratch). Bespoke Coruscant mid-level
  # predator filling the drainage-sump niche. Calibrated between the tymp
  # (STR 1D+1) and the maze_predator (STR 4D, min_band 3).
  - id: drain_lurker
    name: Drain Lurker
    species: Drain Lurker
    scale: creature
    size: "1.2-1.8m"
    hostile: true           # ambush from below; erupts from drainage grates
    pack_count: [1, 2]
    description: >-
      The drainage sumps beneath Coruscant's entertainment districts are warm,
      wet, and full of biological runoff from a thousand species. The drain
      lurker evolved in that niche: a pale, fast ambush predator built low and
      flat, able to squeeze through conduit gaps and explode upward from
      storm-grate openings with a bite that locks. It hunts thermal signatures
      in total dark, is blind in bright light, and smells strongly of the sumps
      it came from. Mid-level residents know the rule: if a grate is warm and
      the hinge is corroded from the inside, do not walk over it.
    char_sheet:
      attributes:
        dexterity: 3D+2
        perception: 3D
        strength: 2D+2
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        brawling: 4D
        sneak: 4D+1
        search: 4D
      move: 11
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: bite
      to_hit_skill: brawling
      damage: "STR+1D+1"     # STR 2D+2 -> effective 3D+3
    special:
      - "Heat sense: hunts by thermal signature; darkness does not impair it."
      - "Blind in bright light: strong illumination reduces effective PER to 1D while exposed."
      - "Ambushes from below: erupts from grates and drainage openings; first attack has +1D from surprise if not detected beforehand."
      - "Noxious odor: Moderate stamina roll for anyone within 2m of a freshly-killed lurker."
    source: "Original (D6-statted from scratch). Bespoke Coruscant mid-level predator filling the drainage-sump niche that the COTG set does not cover. Calibrated between the tymp (STR 1D+1, brawling flavor) and the maze_predator (STR 4D, min_band 3). STR 2D+2 + brawling 4D produces a credible Frontier-tier threat for a starting character."
