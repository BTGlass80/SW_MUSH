# data/npcs_creatures.yaml
#
# Sourcebook Enrichment — Lane A (creatures), Phase A: Tatooine biome.
#
# A STANDALONE creature generator-pool library. Faithful WEG D6 stat blocks
# distilled from *Creatures of the Galaxy* (WEG40080) §2.1 — see
# creatures_of_the_galaxy_extraction_v1.md. Stats are NOT invented; the harder
# numbers (poison codes, armor, constriction) are transcribed from the source.
#
# ── WHY THIS FILE IS NOT IN era.yaml content_refs.npcs ──────────────────────
# The NPC loader (engine/npc_loader.py::load_era_npcs) walks content_refs.npcs
# and force-places every NPC whose `room:` doesn't resolve into
# fallback_room_idx (=8). A roomless creature *pool* registered there would
# dump all of these into one room on boot. So this file is deliberately
# OUT of the era manifest. It is the canonical, faithful-stats SOURCE that the
# Phase B encounter->spawner bridge will load by `id` (the encounter pool's
# payload.npc_template key) and spawn via db.create_npc. Until Phase B lands it
# is consumed by tests/test_lane_a_creatures_tatooine.py, which cross-validates
# that every payload.npc_template in the live regions resolves to an `id` here
# (a validated contract, not a dead drop).
#
# ── SPAWN RESOLUTION (read before assuming a creature "already exists") ──────
# The runtime spawn bridge resolves `payload.npc_template` ONLY through
# engine.creature_library.get_creature, which loads ONLY this file. There is NO
# loader that reads creature stats out of a sourcebook appendix. So a creature
# referenced by a live hostile/non_hostile encounter MUST have an `id:` entry
# HERE or the encounter fires its narrative and spawns NOTHING
# (wilderness_encounter_runtime.spawn_encounter_creatures returns [] on a miss).
# An earlier note here wrongly assumed R&E-core beasts (dewback, etc.) resolved
# without an entry "because the core ships them" — they do not; that gap left
# dewback / tusken_warrior / maze_predator / underworld_thug as phantom
# producers until this drop added them below. The contract guard is
# tests/test_wilderness_encounter_template_resolution.py (walks every live
# region; fails on any dangling template). COTG (WEG40080) remains the stat
# source for the original Lane-A beasts; the four core/bespoke entries added in
# this drop are calibrated to the R&E creature/NPC conventions in WEG40120.
#
# ── SCHEMA (per creature) ────────────────────────────────────────────────────
#   id              short key; the encounter payload.npc_template value
#   name            display name
#   species         WEG species label
#   scale           creature (all Tatooine entries are character-scale)
#   size            from the source
#   hostile         default disposition (a nuisance creature is false but may
#                   turn hostile if provoked — the encounter `type` carries the
#                   live disposition; this is the template default)
#   pack_count      [lo, hi] typical group size (mirrors the encounter count)
#   description     room-look / spawn text (era/Q1-clean)
#   char_sheet      attributes {dex,per,str,kno,mec,tec} + skills + move + the
#                   standard fp/cp/dsp zeros. Non-intelligent creatures get
#                   KNO/MEC/TEC = 0D (faithful: beasts have no such ratings; it
#                   also stops a future loader defaulting them to 2D).
#   natural_attack  {name, to_hit_skill, damage}  (creatures have no weapon: key)
#   armor           optional {note} for hide/shell bonuses
#   special         optional list of ability notes (poison, odor, burrow, etc.)
#   harvest         optional {good, note} — a future-economy harvest good
#                   (NOT wired yet: creature-harvest has no runtime path; see the
#                   handoff. Recorded here so Phase B/economy can pick it up.)
#   source          provenance

schema_version: 1

npcs:

  # ── Worrt ───────────────────────────────────────────────────────────────
  - id: worrt
    name: Worrt
    species: Worrt
    scale: creature
    size: "0.5-1.5m"
    hostile: false          # nuisance; lunges at anything its own size or smaller
    pack_count: [1, 3]
    description: >-
      A squat, toad-like creature the colour of wet sand sits motionless in a
      shallow scrape, only its bulging eyes moving. Worrts are blindly stupid
      ambush feeders — it will snap its long sticky tongue at anything roughly
      its own size or smaller that crawls past, prey or droid or drifting
      rock alike. Harmless to a grown being, endlessly annoying everywhere else.
    char_sheet:
      attributes:
        dexterity: 1D
        perception: 0D+2
        strength: 1D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        brawling: 4D        # the tongue strike; "brawling/tongue 4D" in COTG
      move: 3
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: tongue
      to_hit_skill: brawling
      damage: 1D
    source: "COTG §2.1 (WEG40080)"

  # ── Glim Worm ─────────────────────────────────────────────────────────────
  - id: glim_worm
    name: Glim Worm
    species: Glim Worm
    scale: creature
    size: "<=1m"
    hostile: true           # bursts up beneath prey and grapples
    pack_count: [3, 4]
    description: >-
      The sand here is undisturbed — until it isn't. Glim worms track prey by
      vibration at speed beneath the dunes and erupt directly underneath it,
      wrapping the victim in adhesive scales and rolling it toward a ring of
      teeth. They travel in small knots of three or four. The first warning is
      usually the ground giving way.
    char_sheet:
      attributes:
        dexterity: 1D
        perception: 1D
        strength: 1D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        sneak: 4D
        brawling: 3D        # grappling specialization; digging 4D
      move: 10              # 14 burrowing
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: grapple
      to_hit_skill: brawling
      damage: "opposed (brawling vs. brawling or STR)"
    special:
      - "Burrows at ~40 kph; digging 4D. Erupts from beneath prey for a surprise grapple."
    special_attack:
      restraint:
        kind: grapple
        hold_damage: ""
        note: "Adhesive coils; opposed brawling/STR to break free."
    source: "COTG §2.1 (WEG40080)"

  # ── Hitcher Crab ──────────────────────────────────────────────────────────
  - id: hitcher_crab
    name: Hitcher Crab
    species: Hitcher Crab
    scale: creature
    size: "1.3m"
    hostile: true           # a buried hazard; venomous claws
    pack_count: [1, 2]
    description: >-
      A spiked desert crustacean the size of a footlocker, half-buried to wait
      out the heat — easy to tread on before you see it. Its claws carry a
      slow-acting venom that is merely painful to most beings if treated, and
      its body holds water sacs that make it a genuine survival prize for
      anyone who can kill one without getting clawed.
    char_sheet:
      attributes:
        dexterity: 1D
        perception: 1D+2
        strength: 1D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills: {}
      move: 12
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: claws
      to_hit_skill: brawling
      damage: "STR+1D"
    armor:
      note: "Shell: +1D vs energy, +2D vs physical."
    special:
      - "Claw venom 2D+2 (slow-acting; painful, treatable). Shell venom 1D+2 on contact."
      - "Burrows to wait out the heat — often encountered buried/unseen."
    special_attack:
      poison:
        damage: "2D+2"
        rounds: 2
        onset: 1
        note: "Slow-acting claw venom; painful but treatable."
    harvest:
      good: "water_sacs"
      resource: "chemical"   # extracted fluid → crafting chemical stock
      note: "Internal water sacs are a desert survival/sale good; field-dressed on kill."
    source: "COTG §2.1 (WEG40080)"

  # ── Magus ───────────────────────────────────────────────────────────────
  - id: magus
    name: Magus
    species: Magus
    scale: creature
    size: "58cm"
    hostile: false          # peaceful; bolts under the sand from threats
    pack_count: [1, 2]
    description: >-
      A low, armoured burrower about the length of a forearm, plated in a hide
      tough enough that it is hunted commercially for it. The magus wants
      nothing to do with you — threaten it and it vanishes under the sand,
      leaving behind the eye-watering reek of its defensive oil-gland.
    char_sheet:
      attributes:
        dexterity: 2D+1
        perception: 2D+1
        strength: 1D+1
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        sneak: 4D+1
        stamina: 5D
      move: 9               # 14 in sand
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: claws
      to_hit_skill: brawling
      damage: "STR+2"
    armor:
      note: "Armoured hide: +1D+1."
    special:
      - "Defensive odor: closing within 3-4m requires a Very Difficult stamina roll."
    harvest:
      good: "magus_hide"
      resource: "organic"    # armour-tough hide → crafting organic stock
      note: "Armour-tough hide is a commercially hunted good; field-dressed on kill."
    source: "COTG §2.1 (WEG40080)"

  # ── Stalker Lizard ──────────────────────────────────────────────────────
  - id: stalker_lizard
    name: Stalker Lizard
    species: Stalker Lizard
    scale: creature
    size: "<=3.5m"
    hostile: true           # a real threat to a lone traveller
    pack_count: [1, 1]
    description: >-
      Low and fast and the purple-blue of dune-grass, the stalker lizard is a
      patient plains constrictor. It shadows a target for distance, then
      sprints the last fifty metres and throws its coils, crushing the windpipe.
      It hunts alone and takes one kill at a time — which is small comfort when
      you are the one it has chosen.
    char_sheet:
      attributes:
        dexterity: 1D
        perception: 2D
        strength: 3D
        knowledge: 0D
        mechanical: 0D
        technical: 0D
      skills:
        search: 3D+2
        sneak: 5D
        brawling: 4D
      move: 13              # plus a burst sprint on the approach
      force_points: 0
      character_points: 0
      dark_side_points: 0
    natural_attack:
      name: constriction
      to_hit_skill: brawling
      damage: "STR+2D+2"
    special:
      - "Stalks, then a burst sprint over the final ~50m before constricting."
    special_attack:
      restraint:
        kind: constriction
        hold_damage: "STR+2D+2"
        note: "Crushes the windpipe each round once it has a coil on you."
    harvest:
      good: "stalker_hide"
      resource: "organic"    # large reptile hide → crafting organic stock
      note: "Thick constrictor hide; field-dressed on kill (Lane A Phase C)."
    source: "COTG §2.1 (WEG40080)"

