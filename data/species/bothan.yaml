name: Bothan
description: >
  Furred humanoids renowned throughout the galaxy as spies, information
  brokers, and political schemers. Bothans operate the galaxy's most
  extensive intelligence network. Many Bothans died to bring the
  Rebellion the plans to the second Death Star.
homeworld: Bothawui

