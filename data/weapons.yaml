# ARMOR
# ═══════════════════════════════════════

blast_vest:
  name: "Blast Vest"
  type: armor
  protection_energy: "+1D"
  protection_physical: "+1D"
  covers: ["torso"]
  cost: 300

blast_helmet:
  name: "Blast Helmet"
  type: armor
  protection_energy: "+1D"
  protection_physical: "+1D"
  covers: ["head"]
  cost: 100

stormtrooper_armor:
  name: "Stormtrooper Armor"
