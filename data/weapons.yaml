# ── CRAFT.GUNDARK Drop C (2026-06-11): non-powered armor, lawful Avail 1–3 ──
# Source: gundarks_personal_gear_extraction_v1.md §3.1 (WEG40158 Ch. 6).
# Registry reality: armor lives HERE as `type: armor` rows (wear/soak/sheet
# all read the weapon registry) — the integration plan's "new armor.yaml"
# predates that audit; extend-don't-add wins. Protection strings parse as
# DicePool ("+1D+2", pip-only "+2" both valid). Sub-systems with no engine
# consumer (camo spot bonus, IR alarms, servo boosts, enviro filters, swim
# modifiers, layering) are book-lore in notes — never phantom fields.
# Powered/space suits (§3.2) are DEFERRED: `powersuit operation` is not a
# registered skill and weapon mounts have no consumer; that family needs
# its own design pass before any row ships.

