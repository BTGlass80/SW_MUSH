# single-use consumption mechanic (faucets and sinks land together —
# ammo is otherwise unmodeled, so unflagged explosives would be
# permanent weapons). Blast radii are carried as data per the existing
# frag/thermal convention; combat resolves single-target until a blast
# consumer exists. Deferred wholesale: gas/spore/glop/smoke (effect-
# primary, unmodeled), mines + breaching charges + detonite (placement/
# demolition mechanics), nets (restraint-gated), missiles (launcher-
# gated), anti-vehicle + Firegems (contraband band → Drop G).

