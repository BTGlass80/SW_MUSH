# Star Wars D6 R&E - Weapon Data
# Ranges are in meters: [short_min, short_max, medium_max, long_max]
# Difficulty by range: Short=Easy(10), Medium=Moderate(15), Long=Difficult(20)
# Point-blank (< short_min): Very Easy(5) for most, Very Difficult for some
#
# All data from WEG Star Wars 2nd Edition, Chapter 8: Equipment

# ═══════════════════════════════════════
# BLASTERS (Energy weapons, can be set to stun)
# ═══════════════════════════════════════

hold_out_blaster:
  name: "Hold-Out Blaster"
