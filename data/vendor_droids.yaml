# Vendor Droid tier definitions for SW_MUSH Player Shop System
# Each tier is a purchasable object placed in public rooms.

gn4:
  name: "GN-4 Vendor Droid"
  tier: 1
  cost: 2000
  slots: 10
  listing_fee_pct: 2.0      # % of sale price destroyed per transaction
  bargain_dice: 0
  bargain_pips: 0
  buy_orders: false
  description: "A basic vendor droid with simple text-listing capability."

gn7:
  name: "GN-7 Merchant Droid"
  tier: 2
  cost: 5000
  slots: 25
  listing_fee_pct: 1.5
  bargain_dice: 2
  bargain_pips: 0
  buy_orders: false
  description: "A mid-tier droid with a Bargain processor. Negotiates small discounts for buyers."

gn12:
  name: "GN-12 Commerce Droid"
  tier: 3
  cost: 12000
  slots: 50
  listing_fee_pct: 1.0
  bargain_dice: 3
  bargain_pips: 1
  buy_orders: true
  description: "Top-tier commerce droid. Posts buy orders, offers the best terms."
