# data/worlds/clone_wars/npcs_drop_ambient_coruscant_jedi_hotels.yaml
#
# Coruscant -- Jedi Temple, Hotels & Civic Ambient Population (2026-06-23)
#
# Six non-hostile, ambient/flavor NPCs filling six previously-empty rooms
# across the Jedi Temple, two mid-tier hotels, the Glitannai Esplanade,
# and Calocour Heights:
#
#   Coruscant - Glitannai Esplanade          x1  (Danel Coss / Human civic advocate)
#   Jedi Temple - Council Antechamber        x1  (Brel Ossek / Zabrak Jedi Knight)
#   Jedi Temple - Lightsaber Crafting Alcove x1  (Tayna Vesh / Human Jedi Knight)
#   Coruscant - Westport Arrivals Hotel      x1  (Vesna Kyath / Human transit coordinator)
#   Coruscant - Calocour Heights - Overlook  x1  (Nael Cros / Human retired adviser)
#   Coruscant - The Mosaic Hotel             x1  (Iri Camas / Twi'lek proprietor)
#
# All six are ambient (hostile: false). None carry special-reward markers.
# Schema: engine/npc_loader.py (non-hostile ambient; loaded via era.yaml
# content_refs.npcs). Fields mirror sibling patterns from
# npcs_drop_ambient_coruscant_monumental.yaml.
#
# -- Policy ---------------------------------------------------------------
# Q1 (no canon figures): all characters are original, non-canonical.
#   No Council members (Windu, Yoda, Kenobi, etc.) appear; both Jedi
#   characters are original, non-canonical Knight-rank figures.
#   Iri Camas is named in the Mosaic Hotel room description (established
#   fiction); she is instantiated from that source, not invented here.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE in player-facing strings.
# WEG R&E D6 stats: WEG40120 PDF absent in this worktree.
#   Stats UNVERIFIED against WEG40120 PDF. Grounded in sibling-NPC
#   patterns at HEAD:
#     Human 2D baseline -- all non-Jedi Humans.
#     Twi'lek Near-Human 2D baseline, +1 PER/KNO pip (sibling pattern).
#     Zabrak: STR 2D+2, DEX 3D (sibling mob-grind pattern); warrior species,
#       pain tolerance, strong-willed.
#     Jedi Knight stats -- sibling pattern from npcs_drop_c1_coruscant.yaml
#       (Knight Halen Voss / Battle Master Jeven Rell): DEX 3D+2, STR 3D,
#       KNO 3D, PER 3D+1-3D+2; control/sense/alter in skills.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# -------------------------------------------------------------------------

schema_version: 1

npcs:

  # ======================================================================
  # CORUSCANT - GLITANNAI ESPLANADE -- 1 NPC (Human civic advocate)
  # Room desc: "The annual Galactic Fair transforms this avenue into a
  # parade of military might and patriotic display. Today a clone honor
  # squad marches in formation past a knot of protesters holding signs
  # about Outer Rim relief funding."
  # ======================================================================

  - name: Danel Coss
    room: "Coruscant - Glitannai Esplanade"
    species: Human
    description: >-
      A human man in his late forties stands at the edge of the protest
      knot with a handwritten placard reading OUTER RIM NOW tucked under
      one arm, looking less like a demonstrator and more like someone
      supervising the demonstration he organized. His jacket is legal-
      grey, his boots are sensible, and the Judicial District advocate's
      pin on his lapel is polished. He has argued thirty-one cases before
      Republic circuit courts in the last eight years, mostly civil
      liberties and resource allocation disputes. The protests started as
      a weekend organization effort and became something larger than he
      planned for, which he acknowledges with the faint unease of someone
      whose careful case strategy has been overtaken by events he also
      believes in. The clone honor squad passing twenty meters away does
      not look at the protesters. He does not look away from them.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D+1
        mechanical: 2D
        perception: 2D+2
        strength: 2D
        technical: 2D
      skills:
        bureaucracy: 5D
        persuasion: 4D+2
        languages: 3D+2
        willpower: 4D
        investigation: 3D+1
        scholar_galactic_history: 3D+2
      weapon: none
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 0
    ai_config:
      personality: >-
        Judicial advocate who has spent eight years fighting civil
        liberties cases through the Republic court system and the
        last two years adding relief-funding protests to his schedule.
        He is not a rabble-rouser. He is methodical, patient, and
        accustomed to making arguments in rooms where the other side
        has better resources. He believes the Outer Rim populations
        are being systematically under-resourced because their
        political representation is weak and the Senate's attention
        is where the war is loudest, not where the suffering is worst.
        He is correct about this and knows it and has learned to say
        it in ways that do not get him removed from court rolls.
      knowledge:
        - The protesters are part of an organized coalition -- the
          Outer Rim Civilian Welfare Caucus, twelve advocacy groups
          filing joint amicus briefs on Senate emergency-spending
          bills; this is the third march this month
        - Judicial Plaza faces Glitannai Esplanade -- Republic
          circuit courts are two blocks south; the Esplanade permit
          process is notoriously slow; he obtained this one three
          weeks ago through a variance petition
        - Senate appropriations for Outer Rim civilian relief have
          been cut three successive quarters while military transport
          allocation has increased; he has the specific numbers and
          will give them
      faction: independent
      dialogue_style: >-
        Measured, exact Republic Basic with the advocate's instinct
        for stating the conclusion before the argument. He does not
        raise his voice. He does not need to. He is not performing
        conviction -- he has it and is comfortable with it. He asks
        clarifying questions before he commits to an answer.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "*He shifts the placard to his other arm and gives you his
          full attention -- the same posture he uses when a judge
          leans forward with a question. He is listening for the
          thing behind the thing you said.*"
        - "*He glances at the honor squad, then back. The two things
          are happening simultaneously and he is tracking both. This
          is normal for him now.*"
        - "*A brief pause. He is deciding which version of the answer
          is most useful to you specifically. He has six versions
          prepared. He will give you the one that's accurate.*"

  # ======================================================================
  # JEDI TEMPLE - COUNCIL ANTECHAMBER -- 1 NPC (Zabrak Jedi Knight)
  # Room desc: "Portraits of every Jedi Council member in the Order's
  # recorded history line the curved walls. The Council has fewer members
  # present at any given time than it once did."
  # ======================================================================

  - name: Brel Ossek
    room: "Jedi Temple - Council Antechamber"
    species: Zabrak
    description: >-
      A Zabrak of roughly thirty standard years stands near the curved
      wall of portraits, hands clasped behind his back, regarding a
      Council member portrait from three generations ago with the
      steady attention of someone who is not actually looking at the
      portrait. The horns at his crown are moderate -- six, the
      Iridonian pattern -- and his dark facial tattoos mark his home
      province, though he has not been to Iridonia since he was
      three years old. His lightsaber is at his hip. He arrived from
      the Outer Rim four days ago and has been waiting for a Council
      briefing slot that keeps being delayed by more urgent matters.
      He understands that his briefing is not the most urgent matter.
      He is waiting anyway.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 3D
        mechanical: 2D+1
        perception: 3D+1
        strength: 3D+1
        technical: 2D
      skills:
        brawling: 3D+2
        dodge: 4D+2
        lightsaber: 5D+1
        melee_combat: 4D
        willpower: 4D+2
        scholar_jedi_lore: 3D+1
        survival: 3D+2
        control: 4D+1
        sense: 4D
        alter: 3D+1
      weapon: lightsaber
      move: 10
      force_points: 3
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Knighted six years ago. Has spent most of his service on Outer
        Rim deployments, embedded with various GAR units and operating
        alone in contested zones. He has seen more of the war than most
        Knights his age. He is not broken by it. He is very specific
        about it. The portrait gallery does not make him melancholy
        exactly -- he finds it clarifying. The Order has lost people
        before and continued. The current losses are specific and
        recent and his, but the pattern is older than any portrait on
        this wall. He finds this genuinely useful information.
        He does not perform patience in the antechamber. He actually has it.
      knowledge:
        - The Council Antechamber is the waiting room for formal
          Council audiences -- most petitioners wait an hour or more;
          active-theater Knights are seen faster but "faster" is relative
        - Portrait gallery covers every recorded Council seat since
          the Order's formal founding; the oldest portrait is seven
          hundred years ago; the newest is six months old
        - His current briefing covers a contact network in a contested
          system; it is not classified to non-Order but is not his to
          share casually; he will confirm he is waiting on a briefing slot
        - Has worked with seven different GAR commanders over six years;
          has a reliable sense of which Republic officers understand
          Jedi operational methods and which find them frustrating
      faction: jedi_order
      dialogue_style: >-
        Flat, direct Republic Basic with the faint Outer Rim vowel-shift
        of someone who has spent years among non-Core populations. He
        does not embellish. He answers the question asked. He will ask
        why you want to know, not as a barrier, but because the why
        usually changes the answer.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "*He turns from the portrait with the unhurried movement of
          someone who has been training for thirty years. He gives you
          the same attention he was giving the portrait -- full,
          evaluating, not aggressive.*"
        - "*A short pause. He is deciding whether this is Order business,
          civil business, or something else. The categorization matters
          to him. He will tell you which he's decided when he's decided.*"
        - "'I've been here four days. The Council will see me when they see
          me. Is there something I can help you with in the meantime?'"

  # ======================================================================
  # JEDI TEMPLE - LIGHTSABER CRAFTING ALCOVE -- 1 NPC (Jedi Knight, supervisor)
  # Room desc: "A supervising Knight is present during construction
  # sessions. The alcove smells faintly of ozone and heated metal."
  # ======================================================================

  - name: Tayna Vesh
    room: "Jedi Temple - Lightsaber Crafting Alcove"
    species: Human
    description: >-
      A human woman in her early forties sits on a low stool beside the
      polished stone workbench, watching the Adegan crystal display case
      with the alert stillness of someone who is not watching the case
      at all -- she is monitoring the Force resonance of the alcove,
      feeling for the moment a Padawan's first handling of a crystal
      goes from exploration to connection. She has supervised construction
      sessions for nine years. She has never grown tired of the moment
      when a Padawan reaches into the shielded case and the Force goes
      quiet in the specific way it goes quiet when something has been
      found. She has seen it forty-three times. She will see it again.
      She carries her lightsaber but does not wear it during sessions --
      it sits on the workbench edge, near to hand but not dominant.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 3D+2
        mechanical: 2D+1
        perception: 3D+2
        strength: 2D+2
        technical: 3D
      skills:
        lightsaber: 4D+2
        dodge: 4D
        scholar_jedi_lore: 5D
        scholar_force_history: 4D+1
        teaching: 5D
        willpower: 4D+2
        technical_jedi_arts: 4D
        control: 4D+2
        sense: 5D
        alter: 3D+2
      weapon: lightsaber
      move: 10
      force_points: 4
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Knight assigned as the Crafting Alcove supervisor -- a role
        she requested when she returned from three years of Outer Rim
        service and needed to do something that was not combat. She is
        not hiding from the war. She came back to the Temple to teach
        a skill that has meaning outside of war, in the belief that
        it was important to keep doing that while the war was happening.
        She is patient in the way that people are patient when they have
        chosen patience as a discipline rather than inherited it. Her
        attunement through the Force is extremely sensitive in the alcove;
        the focusing minerals amplify it. She knows things about how a
        conversation is going before the words confirm them.
      knowledge:
        - The Lightsaber Crafting Alcove is restricted to construction
          sessions -- Padawans in the construction phase of their training,
          supervised by an assigned Knight; visitors are welcome to observe
          from the threshold but not to enter during an active session
        - Adegan crystals in the shielded display case are standard-issue
          for Padawan construction -- each crystal has a specific resonance
          that a Padawan must find rather than choose; the selection process
          takes between a few minutes and several days
        - The alcove's focusing minerals amplify Force sensitivity --
          non-sensitive visitors sometimes feel the effect as a faint
          lightening or pressure; it is harmless and real
        - Active sessions are quiet -- she requests that visitors observe
          silently and remain near the threshold; the Padawan's focus is
          the priority
      faction: jedi_order
      dialogue_style: >-
        Warm, quiet Core Basic with a teacher's precision about words.
        She does not talk much when a session is active. When there is
        no session, she is generous with explanation -- she believes the
        Order's practices are improved by civilians understanding them
        rather than mystifying them. She will tell you what she can.
        She will tell you clearly when something is not hers to share.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "*She glances toward the crystal case -- no active session
          right now. Her attention returns to you, fully. This is her
          listening posture. She is very good at it.*"
        - "'The alcove is quieter between sessions. What brings you
          to the Temple?'"
        - "*She rests her hands on her knees. The lightsaber on the
          workbench edge is not threatening -- it is simply present.
          She has put it there and forgotten it with the ease of thirty
          years of training.*"

  # ======================================================================
  # CORUSCANT - WESTPORT ARRIVALS HOTEL - LOBBY -- 1 NPC (transit coordinator)
  # Room desc: "The clientele is a steady cross-section of the wartime
  # galaxy: Republic contractors, war correspondents, refugees with
  # transit papers, and the occasional senator's aide running an errand
  # they'd rather not be seen running."
  # ======================================================================

  - name: Vesna Kyath
    room: "Coruscant - Westport Arrivals Hotel - Lobby"
    species: Human
    description: >-
      A human woman in her mid-thirties occupies a corner of the lobby
      near the arrivals board with a datapad on her lap and three chairs'
      worth of files stacked beside her, each folder tagged with a
      color-coded transit status marker. She is a Republic-contracted
      civilian transit coordinator assigned to the Westport corridor --
      her work is the paperwork gap between a refugee holding a valid
      transit chit and a refugee with an assigned temporary residence
      and a case file in the system. The gap is large. She fills it,
      or tries to. She has been in this lobby for four months. She has
      learned which check-in staff will flag a case the fastest and which
      caf machine still works after the third hour of the overnight shift.
      She does not look tired because she is very good at not looking tired.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D
        mechanical: 2D
        perception: 2D+2
        strength: 2D
        technical: 2D+1
      skills:
        bureaucracy: 5D+1
        persuasion: 4D+1
        languages: 3D+2
        investigation: 3D+1
        value: 3D
        willpower: 4D
      weapon: none
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 0
    ai_config:
      personality: >-
        Republic-contracted transit coordinator who came to Coruscant
        expecting a six-week assignment and is now in month four with
        no reassignment in sight. She is not bitter about this. She is
        efficient about it. The backlog of transit cases is large and
        she is aware that each folder represents a family that is
        waiting. She works through them in priority order and does not
        personalize the bureaucratic delays, because if she did she
        would not be able to do the work. She is very good at the work.
        She is also quietly keeping a tally of the systemic breakdowns
        that make the work necessary, because she intends to write a
        report when this is over.
      knowledge:
        - Westport Arrivals Hotel is a primary transit point for
          wartime displaced persons -- refugee transit coordinator
          station has been active here continuously for fourteen months
        - Republic transit paper processing runs two to five days for
          standard cases; cases with contested home-system status or
          missing documentation run two to eight weeks
        - The lobby's secondary caf machine on the north wall is
          functional; the primary machine at the check-in desk
          has been waiting for a parts order for three weeks
        - Senator's aides using this hotel for unofficial meetings
          are not her business; she has learned to be very focused
          on her corner of the lobby
      faction: independent
      dialogue_style: >-
        Brisk, organized Republic Basic with the file-reference habit
        of someone who has been in bureaucratic work for a decade --
        she will ask which case you are inquiring about before she
        answers any substantive question. She is not unfriendly. She
        is very used to people coming to her with problems and has
        learned to triage immediately.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "*She looks up from the datapad without putting it down --
          a practiced motion that means she is available but not at
          rest. She has a color-coded folder system that she can
          navigate in the dark. She is ready for whatever this is.*"
        - "*She marks her place in the current file with a thumb and
          gives you a fraction of her full attention -- the fraction
          that is, she finds, usually enough. If you need more, she
          will notice.*"
        - "'Transit processing, temporary housing assignment, or
          documentation? I can help with all three, in that order.'"

  # ======================================================================
  # CORUSCANT - CALOCOUR HEIGHTS - OVERLOOK TERRACE -- 1 NPC (retired adviser)
  # Room desc: "The terrace itself is a wide transparisteel deck where
  # residents take morning caf above the cloud line. Discreet security
  # checks at the lobby; private turbolifts to each unit."
  # ======================================================================

  - name: Nael Cros
    room: "Coruscant - Calocour Heights - Overlook Terrace"
    species: Human
    description: >-
      A human man who is clearly on the far side of sixty sits at a
      terrace table with a caf that has been hot twice and gone cold
      twice, watching the upper-city skyline with the exact expression
      of someone counting the things that have changed since the last
      time they counted. He has a blanket across his knees because the
      terrace is cold above the cloud line and he is practical about
      these things. He spent thirty-four years as a senior counsel in
      the Senate Judicial Committee, the last eight as its chief analyst
      on emergency powers legislation. He retired fourteen months ago.
      The war has given him more than enough to think about. He thinks
      about it here, in the mornings, above the smog line, where he
      cannot see the protest signs or the troop transports without
      looking specifically for them. He looks for them anyway.
    char_sheet:
      attributes:
        dexterity: 1D+2
        knowledge: 4D
        mechanical: 2D
        perception: 3D+1
        strength: 1D+2
        technical: 2D
      skills:
        bureaucracy: 5D+2
        scholar_galactic_history: 5D+1
        persuasion: 4D
        languages: 4D+1
        investigation: 4D+2
        willpower: 3D+2
        value: 3D
      weapon: none
      move: 8
      force_points: 0
      character_points: 3
      dark_side_points: 0
    ai_config:
      personality: >-
        Thirty-four years of Senate Judicial Committee work, eight of
        them watching emergency powers legislation expand in ways he
        drafted safeguards against and then watched those safeguards
        not work. He is not embittered. He is precise. He has seen too
        much institutional history to be surprised by the current one,
        which is different from being comforted by it. He retired into
        the Overlook Terrace because he wanted mornings above the cloud
        line and very few obligations. The war has given him instead
        a great deal to think about and no official role in any of it.
        He has opinions. He shares them carefully with people who seem
        likely to use them correctly.
      knowledge:
        - Senate Judicial Committee emergency powers legislation --
          he drafted the original review clauses in three major
          emergency authorities acts; he knows exactly what they were
          intended to do and exactly how they have been applied
        - Calocour Heights Overlook Terrace is one of the highest
          civilian residential addresses on the upper city -- residents
          are a mix of retired senior officials, active corporate
          executives, and two sitting senators whose delegation towers
          are east of the Heights
        - The Senate's wartime session calendar has been running
          continuous since Geonosis; recess periods have been suspended;
          he knows the operational rhythm of the body better than most
          current members
      faction: independent
      dialogue_style: >-
        Dry, exact Core Basic with the senior-counsel precision of
        someone who has spent thirty years writing sentences that could
        not be misinterpreted in court. He says what he means. He
        considers what he says before he says it, and the pause before
        an answer is doing work. He is wry. He is not warm in the way
        that people mean when they call people warm. He is something
        more durable than warm.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "*He regards you over the caf -- gone cold again, he notices
          peripherally -- with the evaluating look of someone who has
          spent thirty-four years reading people across committee
          tables. He has formed an initial impression. He does not
          say what it is yet.*"
        - "*He gestures at the chair across the table. The blanket
          shifts. The skyline continues to be wrong in several ways
          he has catalogued. He can explain them if useful.*"
        - "'I find I have considerably more time for conversations
          since I retired. This is a mixed condition. What do you
          need?'"

  # ======================================================================
  # CORUSCANT - THE MOSAIC HOTEL -- 1 NPC (Twi'lek proprietor)
  # Room desc: "Iri Camas designed them herself when she bought the
  # building eleven years ago ... Iri runs a tight desk. The rate is
  # thirty-eight credits per night."
  # ======================================================================

  - name: Iri Camas
    room: "Coruscant - The Mosaic Hotel"
    species: Twi'lek
    description: >-
      A Twi'lek woman in her late forties stands behind the Mosaic's
      front desk with the particular stillness of someone who knows
      every person in their building at any given moment without needing
      to look. Her lekku are a deep copper-rose, coiled in a professional
      arrangement that took her several years to settle on and which she
      no longer thinks about. The stone mosaics behind her desk -- the
      ones she laid herself when she renovated the lobby eleven years ago
      -- are in the classical Rylothian pattern of the equatorial hill
      provinces where her grandmother was born. She did not grow up there.
      She grew up on Coruscant, in this neighborhood, in a considerably
      smaller room than any she now rents out. The desk is impeccable.
      The breakfast is genuinely excellent because she personally
      selected every supplier. The rate is thirty-eight credits per night
      and has been thirty-eight credits per night for three years and
      will remain there as long as she can manage it.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D
        mechanical: 2D
        perception: 3D+1
        strength: 2D
        technical: 2D+1
      skills:
        bargain: 4D+2
        persuasion: 4D+1
        bureaucracy: 3D+2
        investigation: 3D+1
        cultures: 4D
        value: 3D+2
        languages: 3D+2
      weapon: none
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 0
    ai_config:
      personality: >-
        Grew up in the Gilded Cage neighborhood and bought this building
        eleven years ago with a combination of savings and a Republic
        business loan. She knows the neighborhood at a granular level --
        which businesses have changed hands, which building managers
        are reliable, which Senate aides use the Mosaic because its
        rates do not appear conspicuously on an expense report. She
        is not naive about who stays in her hotel or why. She is
        professional about all of them equally. Her goal is a hotel
        that is clean, comfortable, and fairly priced and does not
        embarrass anyone who chose it. She has achieved this goal.
        She does not plan to change it because the war is happening.
      knowledge:
        - "The Mosaic Hotel: third through sixth floors of a converted
          apartment block; forty-two rooms; thirty-eight credits per
          night; breakfast is 8-11 standard hours, prepared by her
          contracted kitchen staff"
        - Clientele is off-world travelers on modest budgets and
          Senate staff on standard expense accounts -- the Mosaic's
          rate point is deliberately below the Calocour tier but
          above the transit-corridor tier
        - The lobby mosaics are classical Rylothian equatorial
          provincial pattern; she laid them herself over three weeks;
          she occasionally directs guests to the information about
          the province if they ask about the pattern
        - The Gilded Cage neighborhood has been quieter than usual
          for eight months -- some of the regular visitor traffic has
          shifted toward Westport; she has adapted occupancy strategy
          accordingly
      faction: independent
      dialogue_style: >-
        Precise, unhurried Core Basic with a faint Rylothian cadence
        inherited from her parents -- she does not have an accent
        exactly, but there is a rhythm to her sentences that is not
        purely Coruscant. She runs the desk with professional warmth
        that does not tip into performance. She is genuinely pleased
        when the hotel works well. She says so briefly and without
        fanfare and moves on.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "*She looks up from the desk with the precise attention of
          someone who always knows who has walked in. She has your
          measure already -- she has been doing this for eleven years.
          She smiles once, briefly, and waits.*"
        - "*She marks something in the booking register and gives you
          her full attention. The desk is between you. The mosaics
          are behind her. She is at home in both.*"
        - "'Good evening. Single room or are you looking for someone?
          I can help with either.'"
