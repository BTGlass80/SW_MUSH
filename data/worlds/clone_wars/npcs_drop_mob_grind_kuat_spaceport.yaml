# data/worlds/clone_wars/npcs_drop_mob_grind_kuat_spaceport.yaml
#
# Kuat Main Spaceport — Hostile Mob Grind Expansion (2026-06-22)
#
# Six roaming hostile NPCs seeded across the Kuat Main Spaceport zone
# (kuat_main_spaceport) to populate the solo-PvE mob-grind reward loop
# (engine/hunting_rewards.py).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Kuat - Main Spaceport Arrivals x2 (Devaronian cargo broker + Human data courier)
#   Kuat - Spaceport Concourse x1      (Rodian surveillance specialist)
#   Kuat - Spaceport Transit Lounge x2 (Nikto transit mule + Bothan intelligence analyst)
#   Kuat - Shuttle Bay x1              (Trandoshan baggage operative)
#
# Rooms confirmed NON-secured in planets/kuat.yaml:
#   Kuat - Main Spaceport Arrivals    — no security_level field
#   Kuat - Spaceport Concourse        — no security_level field
#   Kuat - Spaceport Transit Lounge   — no security_level field
#   Kuat - Shuttle Bay                — no security_level field
# Secured rooms skipped: KSF Customs Checkpoint, KSF Security Substation.
#
# Existing NPCs in these rooms: NONE (verified grep across all CW yaml files).
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats grounded in sibling CW NPC patterns (Drop H / mob-grind baselines).
#   Stats UNVERIFIED against WEG40120 PDF.
# Weapons: blaster_pistol, hold_out_blaster, blaster_carbine,
#   heavy_blaster_pistol — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # KUAT - MAIN SPACEPORT ARRIVALS — 2 NPCs
  # Republic wartime arrival processing; KSF customs rigor is legendary;
  # contraband operators and intelligence couriers use the volume of
  # legitimate wartime traffic as cover
  # ══════════════════════════════════════════════════════════════════

  - name: Devaronian Cargo Broker
    room: "Kuat - Main Spaceport Arrivals"
    species: Devaronian
    description: >-
      A Devaronian man in a traveler's coat worn one trip too many,
      standing near the secondary arrivals lane with a docking manifest
      in one hand and the particular stillness of someone whose plan
      has just changed. He brokers restricted KDY component shipments
      for clients who cannot appear on official procurement records —
      parts that leave the factory floor under one manifest number
      and arrive under another. A Republic Intelligence checkpoint flag
      hit his current shipment number forty minutes ago. He is
      deciding whether to walk away from the cargo entirely or whether
      to make sure the person who flagged it cannot file a complete report.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+1
        mechanical: 2D
        perception: 2D+2
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 2D+2
        streetwise: 3D+1
        value: 3D
        con: 2D+2
        persuasion: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A mid-tier black-market logistics operator who has been routing
        restricted KDY parts for three years without an incident. He
        prefers to dissolve problems through negotiation, bribery, or
        simply walking away from an exposed shipment. But he understands
        that a flagged manifest is only manageable if the person who
        flagged it is no longer available to follow up, and he has made
        that calculation before. He fires efficiently and does not linger.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Smooth, slightly nasal Devaronian Basic with the cadence of
        someone accustomed to talking faster than their listeners.
        "I think there's been a documentation error." The blaster
        comes out while he is still smiling.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires once and backs toward the secondary docking collar.*"
        - "*He uses the arrivals queue as cover, keeping people between
          you and his line of fire.*"
        - "*'Terrible misunderstanding.' He fires again and does not
          stop moving.*"

  - name: KDY Data Courier
    room: "Kuat - Main Spaceport Arrivals"
    species: Human
    description: >-
      A Human woman in unremarkable transit clothing who has spent
      the last forty-five minutes watching KSF customs process
      travelers three lanes over and doing nothing that looks like
      watching. She is carrying copied KDY engineering schematics
      embedded in the lining of an otherwise ordinary travel case —
      production schedules, dry-dock construction timelines, and a
      partial hull design for a vessel the Republic has not announced.
      She has delivered six packages like this one. The customs
      officer who spent forty-five minutes with someone else's bag
      was not looking for hers. But she has decided that you have
      been watching her for a reason, and she does not intend to find
      out what the reason is.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D+1
      skills:
        blaster: 4D
        dodge: 3D
        sneak: 3D+1
        con: 3D+2
        streetwise: 3D
        security: 2D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A professional intelligence courier on her seventh extraction
        run through Kuat. She is controlled, observant, and has a
        clear protocol for being made: fire first, discard the case
        somewhere KSF will find it before her, and reach the nearest
        transit connection. She does not carry credentials linking her
        to her client. She carries a hold-out that fits through every
        scanner configuration she has walked through in the last year
        and fires with professional accuracy at conversational range.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Neutral Core-world Basic with no regional markers — the kind
        of voice that belongs nowhere in particular. "I'm going to
        need you to stop following me." The hold-out is already up.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She fires without preamble and steps sideways out of
          the arrivals lane.*"
        - "*She uses the corner of a customs kiosk as cover. The
          hold-out tracks with practiced steadiness.*"
        - "*She fires again. She is already looking for the exit.*"

  # ══════════════════════════════════════════════════════════════════
  # KUAT - SPACEPORT CONCOURSE — 1 NPC
  # Main concourse linking customs, transit lounges, and shuttle bays;
  # KSF presence constant but watching for documentation violations,
  # not the subtler intelligence operations that move through the crowd
  # ══════════════════════════════════════════════════════════════════

  - name: Rodian Surveillance Specialist
    room: "Kuat - Spaceport Concourse"
    species: Rodian
    description: >-
      A Rodian in standard transit clothes, seated at the public
      HoloNet terminal bank with a datapad open to what appears to
      be a shipping manifest. He has been in that chair for three
      hours across two separate visits today, logging arrival times
      against facial recognition data for a cartel client who needs
      to know exactly when a Republic Intelligence contact is passing
      through Kuat. He has the concourse's KSF shift rotation memorized
      and knows which officers look at faces and which look at datapads.
      When you sit down close enough to see his actual screen, his
      hands move away from the datapad.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 2D+2
        search: 4D+1
        sneak: 3D
        investigation: 3D
        streetwise: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A surveillance-and-identification specialist who works clean
        environments like spaceport concourses because he is good at
        blending into functional crowds. He does not initiate violence
        in view of KSF officers if he can avoid it — concourse combat
        ends contracts permanently. But if he is made by someone not
        associated with KSF, the calculation shifts: a witness with
        his actual face in their memory is a liability. He fires low
        and moves for the transit lounge connection.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Rodian-accented Basic, carefully flat and unremarkable. "I
        don't think we've met." His hand is already off the table.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires low and moves for the lounge corridor immediately.*"
        - "*He puts a transit kiosk between you and his line of retreat.*"
        - "*He fires twice in quick succession without slowing down.*"

  # ══════════════════════════════════════════════════════════════════
  # KUAT - SPACEPORT TRANSIT LOUNGE — 2 NPCs
  # Comfortable waiting area between shuttle assignments; clone garrison
  # troops, merchant house staff, and Republic contractors mix here;
  # the HoloNet terminal bank and high foot volume make it useful
  # for operations requiring plausible deniability
  # ══════════════════════════════════════════════════════════════════

  - name: Nikto Transit Mule
    room: "Kuat - Spaceport Transit Lounge"
    species: Nikto
    description: >-
      A large Nikto sitting in the far corner of the transit lounge
      with two cases of regulation size and a posture that says he
      has been doing this particular wait for years. He has. He moves
      medical-grade stimulants and restricted tech components between
      the orbital ring and the planet surface using the shuttle
      schedule as a dead-drop window — cases go in as one type of
      cargo, a different type comes out, and the difference spends
      twelve minutes in the lounge being what the manifest says it is.
      He has completed this exchange forty-three times. When the
      expected contact fails to appear for the second shuttle cycle,
      he notices you noticing the cases.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+2
        strength: 3D
        technical: 2D
      skills:
        blaster: 3D+2
        brawling: 4D
        dodge: 2D+2
        streetwise: 3D
        survival: 3D
        intimidation: 3D
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A reliable mid-tier transit mule who has survived forty-three
        runs through regulated Republic spaceports by being patient,
        unremarkable, and physically able to enforce his own security
        when necessary. He is not subtle in a fight. He carries a
        blaster carbine that is difficult to explain in a transit
        lounge, which is why he keeps it in the larger case until
        the moment it becomes necessary. That moment is now.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Minimal Nikto Basic. He looks at you for three seconds. Then
        the case opens.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires the carbine from behind the seat row without
          standing up.*"
        - "*He advances, using his size to push through the transit
          crowd.*"
        - "*He fires again and does not bother with cover.*"

  - name: Bothan Intelligence Analyst
    room: "Kuat - Spaceport Transit Lounge"
    species: Bothan
    description: >-
      A Bothan in conservative business attire, seated at the
      public HoloNet terminal bank with a standard datapad connected
      to the terminal's secondary port. The connection looks like a
      charging cable. It is not a charging cable. He is running a
      passive extraction protocol against the terminal's cached
      scheduling data — KDY production timelines, Republic logistics
      waypoints, and the manifest summaries that flow through any
      spaceport HoloNet node that has ever touched a military routing
      tag. This is his seventh successful extraction at this specific
      terminal. The protocol runs in four minutes. He has been here
      for three. When you sit down at the adjacent terminal and he
      sees what you are looking at, the protocol becomes irrelevant.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 3D
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 3D
      skills:
        blaster: 4D+1
        dodge: 3D+1
        computer: 4D+2
        security: 3D+2
        con: 3D
        investigation: 3D+1
        sneak: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        A Bothan network analyst who runs passive extraction operations
        in high-value transit hubs — not an assassin, not a saboteur.
        He collects, packages, and routes. His hold-out is a
        professional tool for situations exactly like this one: someone
        in the wrong place at the wrong moment who cannot be allowed to
        complete a report. He is precise, calm, and does not hesitate
        once the decision is made. His employer does not pay for
        survivors who know his face.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Precise, slightly formal Bothan-accented Basic. "I'm afraid
        this seat is taken." He fires before you answer.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires and disconnects the datapad in one smooth motion.*"
        - "*He moves behind a transit kiosk and fires from the corner.*"
        - "*The hold-out tracks you with unsettling accuracy.*"

  # ══════════════════════════════════════════════════════════════════
  # KUAT - SHUTTLE BAY — 1 NPC
  # Scheduled shuttle connections between the spaceport station and
  # the orbital ring / planetary surface; the gap between customs
  # clearance and shuttle boarding creates a security window that
  # organized criminals have been exploiting for years
  # ══════════════════════════════════════════════════════════════════

  - name: Trandoshan Baggage Boss
    room: "Kuat - Shuttle Bay"
    species: Trandoshan
    description: >-
      A massive Trandoshan in KDY contractor's kit — the coverall
      is real, the ring-access patch is real, the assignment to
      baggage-handling is not. He runs a systematic luggage
      interception ring in the shuttle bay, exploiting the
      eighteen-minute window between KSF customs clearance and
      shuttle boarding during which passengers have no KSF eyes on
      their checked luggage. His four-person ring has been operating
      for six months. He is the sole enforcer and the only member of
      the operation who is expected to handle situations the others
      cannot. You have watched the wrong exchange in the wrong bay,
      and he has been doing this long enough to recognize the look.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 4D
        technical: 2D
      skills:
        blaster: 4D
        brawling: 4D+2
        dodge: 2D+2
        intimidation: 3D
        search: 3D
        survival: 3D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A professional criminal enforcer who has been maintaining
        operational security for a mid-tier theft ring through a
        simple methodology: anyone who sees something they should not
        see does not leave the bay. He is physically large, unhurried,
        and completely indifferent to what you represent. He does not
        explain the situation. He fires once to establish control of
        the space and approaches.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Almost nothing. A short Trandoshan sound. The heavy blaster
        pistol comes up from behind the shuttle cart.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires and advances. He does not use cover.*"
        - "*The heavy blaster tracks to center mass. He keeps coming.*"
        - "*He fires again, already within reach.*"
