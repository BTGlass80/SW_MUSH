# ── EXIT PATHS — these ARE the visible streets ──────────────────────
# Streets run through GAPS between room blocks, not through rooms.
# The renderer draws each path as a wide sand-colored ribbon (the road
# surface) plus a thin dashed centerline. Keys are "fromId-toId".

# ── LABELS — anchored to the street ribbons (negative space) ────────
# Streets sit ON the ribbon. Labels use min_zoom/max_zoom for tier visibility.
labels:
  # Flavor — empty substrate only
  - {text: "to Anchorhead →", kind: flavor, pos: [9.5, 2.2], rot: 0, size: 6, min_zoom: 1, max_zoom: 2}
  - {text: "to the deep desert →", kind: flavor, pos: [14.2, 5.2], rot: 0, size: 6, min_zoom: 1, max_zoom: 2}

# ── LANDMARKS — independent POI markers ─────────────────────────────
# Landmarks that share room coords have min_zoom>=2 (don't double-stamp).
# Registered against the painted substrate via static/tools/map_register.html
# (image-canonical: positions derived from where each pin sits on the painting).
