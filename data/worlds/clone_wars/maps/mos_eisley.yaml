# ─────────────────────────────────────────────────────────────────────────
# MOS EISLEY — AreaGeometry (server-authoritative)
#
# Drop F.MAP.1 (Tier 1 #4, Step 1 of map redesign implementation).
#
# Mirrors design_handoff_datapad_map/reference/data/mos-eisley.js exactly:
#   same room ids, same world coords (Y-up), same exits, same labels.
# The YAML form lives here so it can be loaded server-side via
# engine/area_loader.py and pushed to clients as an `area_geometry`
# event when the player crosses an area boundary (per architecture
# v41 §3.6 "Server-side data path").
#
# CRITICAL AUTHORING RULE (don't re-introduce; see README §"Recent fixes"):
#   1. Rooms cluster in BLOCKS with explicit GAPS between them. The
#      gaps ARE the streets. Don't place rooms on ribbon paths.
#   2. Landmarks that share a room's coords MUST have min_zoom >= 2.
#      At tier-1 the room glyph IS the landmark; tier-2+ rooms
#      collapse to dots and the landmark icon takes over.
#   3. District `label_anchor`s sit in EMPTY corners of the polygon,
#      never on a street centerline.
#
# Coordinate system: world units, Y-up. The renderer flips at the
# world <g> via scale(1, -1).
# ─────────────────────────────────────────────────────────────────────────

schema_version: 1
area_key: tatooine.mos_eisley
display_name: MOS EISLEY
planet: TATOOINE
era: 20 BBY · Clone Wars
default_terrain: sand
palette: tatooine

# Hybrid raster substrate (architecture v51 lane). Pre-painted Mos Eisley
# tile rendered at the world bounds beneath the SVG overlays. Present =>
# client skips procedural district/building/street/furniture layers and
# keeps labels/entities/weather/chrome on top. Remove this line to fall
# back to fully procedural rendering.
substrate_image: /static/maps/mos_eisley_substrate.png

bounds:
  x_min: 0.88
  y_min: -3.26
  x_max: 13.73
  y_max: 9.03

