    name: THE PROMENADE
    polygon: [[0.4, 7.6], [8.6, 7.6], [8.6, 12.6], [0.4, 12.6]]
    label_anchor: [7.8, 12.2]
    rotation: 0
  - id: landing
    name: DOCKING BAYS
    polygon: [[3.0, 6.5], [8.6, 6.5], [8.6, 7.6], [3.0, 7.6]]
    label_anchor: [8.0, 7.3]
    rotation: 0
  - id: undercity
    name: THE UNDERCITY
    polygon: [[3.0, 3.9], [8.6, 3.9], [8.6, 6.5], [3.0, 6.5]]
    label_anchor: [8.0, 6.1]
    rotation: 0
  - id: warrens
