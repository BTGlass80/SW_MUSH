# ─────────────────────────────────────────────────────────────────────────
# NAR SHADDAA — the Vertical City (AreaGeometry, server-authoritative)
#
# City #3 of the substrate rollout. Lays out the real nar_shaddaa rooms
# from planets/nar_shaddaa.yaml (ids 54–85, 4 zones) by their slug, so
# click-to-walk / NPC overlay / landmark resolution bind to real rooms.
#
# Nar Shaddaa is a VERTICAL city — one continuous descent. The planet
# file's map_y stacks the strata (the Grid at top → promenade → landing
# bays → undercity → warrens at the bottom). Represented here as ONE tall
# map (portrait bounds) with four vertically-stacked districts, rather
# than split maps: the descent is contiguous and reads top-to-bottom, so a
# single tall tile honors the world better than slicing it. (Contrast
# Coruscant, whose strata are physically separated km apart.)
#
# Layout derived from map_x/map_y grid hints (x 13–17, y 1–10), projected
# into portrait bounds with margins and collisions nudged apart. Y-up
# authored frame (adapter reflects Y; do not pre-flip). Streets follow
# grid adjacency (the rooms carry no inline exits; connectivity is the
# world-writer's, so the map draws the natural spatial spine + crossstreets).
#
# substrate_image: add a painted vertical-city tile once generated (see
# NANO_SUBSTRATE_PLAYBOOK.md). Absent → procedural. Palette nar_shaddaa.
# ─────────────────────────────────────────────────────────────────────────

schema_version: 1
area_key: nar_shaddaa.smugglers_moon
display_name: NAR SHADDAA
planet: NAR SHADDAA
era: 20 BBY · Clone Wars
default_terrain: duracrete
