# ─────────────────────────────────────────────────────────────────────────
# CORUSCANT — Jedi Temple INTERIOR (AreaGeometry, TEST zone-map)
#
# Nano "map depth" TEST (tier-0 interior). Projects the 11 real jedi_temple
# rooms from planets/coruscant.yaml (ids 210–220) by their map_x/map_y grid
# (x 23–25, y 6–10) into a building floorplan + intra-zone exit graph — the
# same derived-zone-map pattern as maps/senate_district.yaml. Lives OUTSIDE
# data/worlds/ (test scaffolding, not wired into the live game) — fed to
# tools/make_substrate_seed.py via --root. Floorplan orientation: main gate +
# hangar at the SOUTH (bottom), the High Council Chamber at the NORTH pinnacle
# (top), entrance hall the central hub.
# ─────────────────────────────────────────────────────────────────────────

schema_version: 1
area_key: coruscant.jedi_temple
display_name: JEDI TEMPLE
planet: CORUSCANT
era: 20 BBY · Clone Wars
default_terrain: stone
palette: jedi_temple
substrate_image: /static/maps/jedi_temple_substrate.png

bounds:
  x_min: 0.0
  y_min: 0.0
  x_max: 6.0
  y_max: 9.6

# ── DISTRICTS (the three vertical tiers of the temple) ───────────────────
districts:
  - id: gatehouse
    name: GATEHOUSE
    polygon: [[0.4, 0.4], [5.6, 0.4], [5.6, 2.2], [0.4, 2.2]]
    label_anchor: [0.7, 0.7]
    rotation: 0
  - id: great_halls
    name: GREAT HALLS
    polygon: [[0.4, 2.2], [5.6, 2.2], [5.6, 5.7], [0.4, 5.7]]
    label_anchor: [0.7, 5.3]
    rotation: 0
  - id: council_spire
    name: COUNCIL SPIRE
    polygon: [[0.4, 5.7], [5.6, 5.7], [5.6, 9.2], [0.4, 9.2]]
    label_anchor: [0.7, 8.8]
    rotation: 0

# ── ROOMS (the real jedi_temple rooms, by slug) ─────────────────────────
rooms:
  # GATEHOUSE — arrival from the city below
  - {id: 218, slug: "jedi_temple_hangar",              name: "Hangar Bay",   zone: gatehouse,     x: 1.2, y: 1.2, w: 0.85, h: 0.65, style: dock,    symbol: "◎"}
  - {id: 210, slug: "jedi_temple_main_gate",           name: "Main Gate",    zone: gatehouse,     x: 3.0, y: 1.2, w: 0.85, h: 0.65, style: dock,    symbol: "▣"}
  # GREAT HALLS — the central hub + ring of halls
  - {id: 216, slug: "jedi_temple_meditation_garden",   name: "Garden",       zone: great_halls,   x: 1.2, y: 4.8, w: 0.75, h: 0.6,  style: garden,  symbol: "♣"}
  - {id: 211, slug: "jedi_temple_entrance_hall",       name: "Entrance Hall", zone: great_halls,  x: 3.0, y: 3.0, w: 1.0,  h: 0.8,  style: temple,  symbol: "T"}
  - {id: 212, slug: "jedi_temple_training_hall",       name: "Training Hall", zone: great_halls,  x: 4.8, y: 3.0, w: 0.75, h: 0.6,  style: civic,   symbol: "§"}
  - {id: 217, slug: "jedi_temple_medical_bay",         name: "Medical Bay",  zone: great_halls,   x: 1.2, y: 3.0, w: 0.75, h: 0.6,  style: civic,   symbol: "§"}
  - {id: 213, slug: "jedi_temple_archives",            name: "Archives",     zone: great_halls,   x: 4.8, y: 4.8, w: 0.8,  h: 0.7,  style: temple,  symbol: "T"}
  # COUNCIL SPIRE — antechamber ring + the chamber at the pinnacle
  - {id: 220, slug: "jedi_temple_crafting_alcove",     name: "Crafting",     zone: council_spire, x: 1.2, y: 6.6, w: 0.7,  h: 0.55, style: craft,   symbol: "✦"}
  - {id: 214, slug: "jedi_temple_council_antechamber", name: "Antechamber",  zone: council_spire, x: 3.0, y: 6.6, w: 0.75, h: 0.6,  style: civic,   symbol: "§"}
  - {id: 219, slug: "jedi_temple_commissary",          name: "Commissary",   zone: council_spire, x: 4.8, y: 6.6, w: 0.7,  h: 0.55, style: civic,   symbol: "§"}
  - {id: 215, slug: "jedi_temple_council_chamber",     name: "Council Chamber", zone: council_spire, x: 3.0, y: 8.4, w: 1.0, h: 0.85, style: temple, symbol: "✷"}

# ── EXITS (intra-zone adjacencies from the planet file) ──────────────────
exits:
  - [210, 211]
  - [210, 218]
  - [211, 212]
  - [211, 213]
  - [211, 216]
  - [211, 217]
  - [211, 219]
  - [211, 220]
  - [211, 214]
  - [213, 214]
  - [214, 215]

exit_paths:
  # central processional spine: gate -> hub -> antechamber -> chamber
  "210-211": {kind: corridor, path: [[3.0, 1.2], [3.0, 2.1], [3.0, 3.0]], width: 0.30}
  "211-214": {kind: corridor, path: [[3.0, 3.0], [3.0, 4.8], [3.0, 6.6]], width: 0.30}
  "214-215": {kind: corridor, path: [[3.0, 6.6], [3.0, 7.5], [3.0, 8.4]], width: 0.30}
  # gatehouse cross-link
  "210-218": {kind: corridor, path: [[3.0, 1.2], [2.1, 1.2], [1.2, 1.2]], width: 0.24}
  # hub spokes to the ring of halls
  "211-212": {kind: corridor, path: [[3.0, 3.0], [3.9, 3.0], [4.8, 3.0]], width: 0.24}
  "211-216": {kind: corridor, path: [[3.0, 3.0], [2.1, 3.9], [1.2, 4.8]], width: 0.24}
  "211-213": {kind: corridor, path: [[3.0, 3.0], [3.9, 3.9], [4.8, 4.8]], width: 0.20}
  "211-217": {kind: corridor, path: [[3.0, 3.0], [2.1, 3.0], [1.2, 3.0]], width: 0.20}
  "211-219": {kind: corridor, path: [[3.0, 3.0], [3.9, 4.8], [4.8, 6.6]], width: 0.18}
  "211-220": {kind: corridor, path: [[3.0, 3.0], [2.1, 4.8], [1.2, 6.6]], width: 0.18}
  # archives stair up to the council antechamber
  "213-214": {kind: corridor, path: [[4.8, 4.8], [3.9, 5.7], [3.0, 6.6]], width: 0.18}

# ── LANDMARKS (gold blocks = distinctive features Nano must render) ──────
landmarks:
  - {id: council_chamber, icon: palace, name: "High Council Chamber", pos: [3.0, 8.4], min_zoom: 2, max_zoom: 3}
  - {id: entrance_hall,   icon: palace, name: "Grand Entrance Hall",   pos: [3.0, 3.0], min_zoom: 2, max_zoom: 3}
  - {id: archives,        icon: palace, name: "Temple Archives",       pos: [4.8, 4.8], min_zoom: 2, max_zoom: 3}
  - {id: hangar,          icon: dock,   name: "Hangar Bay",            pos: [1.2, 1.2], min_zoom: 2, max_zoom: 3}
  - {id: garden,          icon: beacon, name: "Meditation Garden",     pos: [1.2, 4.8], min_zoom: 2, max_zoom: 3}
