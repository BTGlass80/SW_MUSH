# ─────────────────────────────────────────────────────────────────────────
# CORUSCANT — Senate District (AreaGeometry, server-authoritative)
#
# City #2 of the substrate rollout. REPLACES the F.MAP.1 palette-swap stub
# (which used fictional placeholder rooms 100–124). This version lays out
# the REAL senate_district rooms from planets/coruscant.yaml (ids 200–209,
# 256) by their slug, so click-to-walk and landmark resolution bind to
# actual rooms. Layout derived from the planet file's map_x/map_y grid
# hints (x 20–22, y 6–11) and intra-zone exit graph, projected into world
# bounds with margins. Y-up authored frame (the adapter reflects Y so a
# north-up substrate registers; do not pre-flip).
#
# Districts (3): SENATE AXIS (central processional spine + chamber),
# CHANCELLERY (eastern civic/legislative blocks), GATEWAY (Westport arrival
# + opera + hotel to the west/south).
#
# substrate_image: add a painted Coruscant Senate tile here once generated
# (see NANO_SUBSTRATE_PLAYBOOK.md). Absent → procedural render. Palette
# stays senate_district either way.
# ─────────────────────────────────────────────────────────────────────────

schema_version: 1
area_key: coruscant.senate_district
display_name: SENATE DISTRICT
planet: CORUSCANT
era: 20 BBY · Clone Wars
default_terrain: duracrete
palette: senate_district

# Painted substrate (architecture v51 lane). Uncomment once the tile is
# generated + registered; the loader/renderer handle it generically.
substrate_image: /static/maps/senate_district_substrate.png

bounds:
  x_min: 0.0
  y_min: 0.0
  x_max: 9.0
  y_max: 8.0

# ── DISTRICTS ────────────────────────────────────────────────────────────
# label_anchors sit in empty corners, off the street centerlines.
districts:
  - id: axis
    name: SENATE AXIS
    polygon: [[3.2, 0.4], [5.8, 0.4], [5.8, 7.6], [3.2, 7.6]]
    label_anchor: [3.5, 0.8]
    rotation: 0
  - id: chancellery
    name: CHANCELLERY
    polygon: [[5.8, 2.6], [8.8, 2.6], [8.8, 7.6], [5.8, 7.6]]
    label_anchor: [8.3, 7.2]
    rotation: 0
  - id: gateway
    name: GATEWAY
    polygon: [[0.4, 1.4], [3.2, 1.4], [3.2, 3.0], [0.4, 3.0]]
    label_anchor: [0.8, 2.8]
    rotation: 0

# ── ROOMS (the real senate_district rooms, by slug) ─────────────────────
rooms:
  # SENATE AXIS — processional spine, monument at the north head
  - {id: 207, slug: "monument_plaza",                name: "Monument Plaza", zone: axis,        x: 4.5, y: 7.0, w: 0.7,  h: 0.6,  style: landmark, symbol: "※"}
  - {id: 206, slug: "legislative_borough",           name: "Legislative",    zone: axis,        x: 4.5, y: 5.9, w: 0.6,  h: 0.5,  style: civic,    symbol: "§"}
  - {id: 203, slug: "senate_building_lobby",         name: "Senate Lobby",   zone: axis,        x: 4.5, y: 4.8, w: 0.55, h: 0.5,  style: temple,   symbol: "T"}
  - {id: 202, slug: "senate_building_exterior",      name: "Senate Plaza",   zone: axis,        x: 4.5, y: 3.7, w: 0.7,  h: 0.6,  style: civic,    symbol: "§"}
  - {id: 201, slug: "senate_esplanade",              name: "Esplanade",      zone: axis,        x: 4.5, y: 2.5, w: 0.6,  h: 0.5,  style: civic,    symbol: "§"}
  # CHANCELLERY — eastern civic blocks
  - {id: 205, slug: "grand_reception_hall",          name: "Reception",      zone: chancellery, x: 6.6, y: 4.8, w: 0.6,  h: 0.5,  style: civic,    symbol: "§"}
  - {id: 204, slug: "chancellors_avenue",            name: "Chancellor Ave", zone: chancellery, x: 6.6, y: 3.7, w: 0.45, h: 0.45, style: street,   symbol: "·"}
  - {id: 208, slug: "galactic_museum",               name: "Museum",         zone: chancellery, x: 6.8, y: 6.6, w: 0.6,  h: 0.5,  style: civic,    symbol: "§"}
  # GATEWAY — Westport arrival, opera, hotel
  - {id: 200, slug: "coruscant_westport_landing",    name: "Westport",       zone: gateway,     x: 1.6, y: 2.2, w: 0.7,  h: 0.6,  style: dock,     symbol: "◎"}
  - {id: 209, slug: "opera_house",                   name: "Opera House",    zone: gateway,     x: 6.6, y: 2.0, w: 0.6,  h: 0.5,  style: temple,   symbol: "T"}
  - {id: 256, slug: "westport_arrivals_hotel_lobby", name: "Hotel",          zone: gateway,     x: 2.4, y: 1.3, w: 0.5,  h: 0.45, style: housing,  symbol: "⌂"}

# ── EXITS (intra-zone adjacencies from the planet file) ──────────────────
exits:
  - [201, 200]
  - [201, 202]
  - [201, 207]
  - [201, 205]
  - [202, 203]
  - [202, 204]
  - [202, 209]
  - [202, 200]
  - [204, 205]
  - [204, 206]
  - [205, 206]
  - [206, 207]
  - [206, 200]
  - [207, 208]
  - [200, 256]
  - [200, 206]

exit_paths:
  # SENATE WAY — central processional spine
  "201-202": {kind: street, path: [[4.5, 2.5], [4.5, 3.1], [4.5, 3.7]], width: 0.30}
  "202-203": {kind: street, path: [[4.5, 3.7], [4.5, 4.25], [4.5, 4.8]], width: 0.22}
  "206-207": {kind: street, path: [[4.5, 5.9], [4.5, 6.45], [4.5, 7.0]], width: 0.30}
  "201-207": {kind: street, path: [[4.5, 2.5], [4.2, 4.7], [4.5, 7.0]], width: 0.18}
  # CHANCELLERY — eastern civic loop
  "202-204": {kind: road, path: [[4.5, 3.7], [5.6, 3.7], [6.6, 3.7]], width: 0.22}
  "204-205": {kind: road, path: [[6.6, 3.7], [6.6, 4.25], [6.6, 4.8]], width: 0.22}
  "204-206": {kind: road, path: [[6.6, 3.7], [5.5, 4.8], [4.5, 5.9]], width: 0.18}
  "207-208": {kind: road, path: [[4.5, 7.0], [5.6, 6.8], [6.8, 6.6]], width: 0.22}
  # GATEWAY — Westport approach
  "201-200": {kind: road, path: [[4.5, 2.5], [3.0, 2.3], [1.6, 2.2]], width: 0.22}
  "200-256": {kind: alley, path: [[1.6, 2.2], [2.0, 1.7], [2.4, 1.3]], width: 0.18}
  "202-209": {kind: road, path: [[4.5, 3.7], [5.6, 2.8], [6.6, 2.0]], width: 0.18}

labels:
  - {text: "SENATE  WAY",  kind: street, path_id: "201-202", t: 0.50, side: 0, offset: 0, size: 8, min_zoom: 1, max_zoom: 2}
  - {text: "CHANCELLERY",  kind: street, path_id: "204-205", t: 0.50, side: 0, offset: 0, size: 7, min_zoom: 1, max_zoom: 2}
  - {text: "to the Senate floor →", kind: flavor, pos: [4.5, 4.95], rot: 0, size: 6, min_zoom: 1, max_zoom: 2}
  - {text: "Upper City ↗", kind: flavor, pos: [8.4, 3.4], rot: 0, size: 6, min_zoom: 1, max_zoom: 3}

# ── LANDMARKS ────────────────────────────────────────────────────────────
# Seeded at painted-feature anchors. Distinctive ones (dome, museum, opera,
# monument) get precise registration via map_register.html; the off-map
# pointer is edge-fine. Re-register against the substrate once painted.
landmarks:
  - {id: senate_dome, icon: palace, name: "Senate Rotunda", pos: [4.5, 4.7], min_zoom: 2, max_zoom: 3}
  - {id: monument, icon: beacon, name: "Monument Plaza", pos: [4.5, 6.5], min_zoom: 2, max_zoom: 3}
  - {id: museum, icon: palace, name: "Galactic Museum", pos: [7.6, 6.2], min_zoom: 2, max_zoom: 3}
  - {id: opera, icon: palace, name: "Opera House", pos: [6.7, 2.2], min_zoom: 2, max_zoom: 3}
  - {id: jedi_temple, icon: palace, name: "Jedi Temple ↗", pos: [8.6, 4.8], min_zoom: 2, max_zoom: 3}
