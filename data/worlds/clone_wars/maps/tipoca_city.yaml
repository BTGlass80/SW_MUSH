    name: OCEAN PLATFORM
    polygon: [[0.4, 0.4], [5.6, 0.4], [5.6, 4.8], [0.4, 4.8]]
    label_anchor: [0.9, 0.8]
    rotation: 0
  - id: tipoca
    name: TIPOCA CITY
    polygon: [[2.8, 4.8], [7.0, 4.8], [7.0, 7.6], [2.8, 7.6]]
    label_anchor: [3.3, 7.2]
    rotation: 0
  - id: cloning
    name: CLONING HALLS
    polygon: [[6.6, 1.6], [10.6, 1.6], [10.6, 7.6], [6.6, 7.6]]
    label_anchor: [10.1, 7.2]
    rotation: 0

