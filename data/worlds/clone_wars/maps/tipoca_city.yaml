# ─────────────────────────────────────────────────────────────────────────
# KAMINO — Tipoca City (AreaGeometry, server-authoritative)
#
# City #5 of the substrate rollout (last of the core five). Lays out the
# real kamino rooms from planets/kamino.yaml (ids 350–375, 3 zones) by
# their slug. Rooms carry rich inline exits, so streets (here: enclosed
# corridors/walkways — Tipoca is a sealed stilt-city in a storm ocean)
# follow the real adjacency graph.
#
# Spatial logic (from map_x/map_y, x 38–45 y 8–12): a linear west→east
# spine. OCEAN PLATFORM west (exterior landing platforms + lower platform
# dropping to the surface + aiwha stable), TIPOCA CITY center (the great
# main corridor with admin / PM's office / medical / quarters / library
# radiating off it), CLONING HALLS east (cloning access hub → growth
# chambers → training blocks → barracks). The arrivals hall + cloning
# access are the two interchange hubs.
#
# Y-up authored frame (adapter reflects Y; do not pre-flip).
#
# substrate_image: add a painted Tipoca City tile once generated (see
# NANO_SUBSTRATE_PLAYBOOK.md). Absent → procedural. Palette: nar_shaddaa
# is the closest cool-toned palette shipped today (Kamino has no dedicated
# palette yet) — swap to a kamino palette (cold blue-grey storm ocean) when
# one is authored.
# ─────────────────────────────────────────────────────────────────────────

schema_version: 1
area_key: kamino.tipoca_city
display_name: TIPOCA CITY
planet: KAMINO
era: 20 BBY · Clone Wars
default_terrain: duracrete
palette: nar_shaddaa

substrate_image: /static/maps/kamino_tipoca_substrate.png

bounds:
  x_min: 0.0
  y_min: 0.0
  x_max: 11.0
  y_max: 8.0

# ── DISTRICTS ────────────────────────────────────────────────────────────
districts:
