# ─────────────────────────────────────────────────────────────────────────
# GEONOSIS — Stalgasin Hive & Environs (AreaGeometry, server-authoritative)
#
# City #4 of the substrate rollout. Lays out the real geonosis rooms from
# planets/geonosis.yaml (ids 400–437, 4 zones) by their slug. The rooms
# carry rich inline exits, so streets here follow the REAL adjacency graph.
#
# Spatial logic (from the planet file's map_x/map_y grid, x 46–53 y 6–13):
# a central SURFACE hub (landing pad + market + quarters), with three wings
# radiating out — FOUNDRIES west (droid assembly lines), the DEEP HIVE
# northeast (Archduke's hall, worker district, command), and the PETRANAKI
# ARENA south (the execution arena + creature pens). Doorway rooms
# (hive_entrance, foundry_approach, arena_gate) sit at the wing mouths.
#
# Y-up authored frame (adapter reflects Y; do not pre-flip). Grid collisions
# nudged apart so footprints don't overlap.
#
# substrate_image: add a painted Geonosis tile once generated (see
# NANO_SUBSTRATE_PLAYBOOK.md). Absent → procedural. Palette: tatooine is the
# closest desert palette shipped today (Geonosis has no dedicated palette
# yet) — swap to a geonosis palette when one is authored.
# ─────────────────────────────────────────────────────────────────────────

schema_version: 1
