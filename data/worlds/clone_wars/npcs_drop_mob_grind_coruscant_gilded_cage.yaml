# data/worlds/clone_wars/npcs_drop_mob_grind_coruscant_gilded_cage.yaml
#
# Coruscant Gilded Cage Hostile Mob Grind Batch (2026-06-22)
#
# Six roaming hostile NPCs seeded across the Gilded Cage
# (entertainment_district zone, 3 public rooms) to populate the
# solo-PvE mob-grind reward loop (engine/hunting_rewards.py).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone: entertainment_district  (security: secured, threat_band: settled)
# Rooms covered:
#   Coruscant - Gilded Cage - Alien Quarter   x2  (rooms 266)
#   Coruscant - Gilded Cage - Bazaar          x2  (room 267)
#   Coruscant - Gilded Cage - Courtyard       x2  (room 268)
#
# Thematic premise: The Gilded Cage is Coruscant's cosmopolitan
# alien quarter — multi-species, old Hutt-mediated charters, war
# paranoia rising. The Falleen Syndicate watches from an adjacent
# tower; the Pyke Syndicate runs spice through the bazaar; protection
# rackets exploit desperate off-world refugees flooding the courtyard
# organizations. Six original hostile operators, none canon figures.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats grounded in sibling CW NPC patterns
#   (npcs_drop_mob_grind_coruscant_monumental.yaml, coruscant.yaml batch).
#   WEG40120 PDF absent in this tree — stats UNVERIFIED against PDF.
# Species note: Pyke (NPC 2) is a TCW-era canonical species (~20 BBY
#   war period), statted from scratch per WEG D6 convention since
#   WEG40120 predates TCW; biology/lore from TCW, mechanics D6-native.
# Weapons: blaster_pistol, hold_out_blaster, vibroblade,
#   heavy_blaster_pistol, vibrodagger_talon — all keys confirmed
#   in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # GILDED CAGE — ALIEN QUARTER — 2 NPCs
  # ══════════════════════════════════════════════════════════════════

  - name: Syndicate Watcher
    room: "Coruscant - Gilded Cage - Alien Quarter"
    species: Falleen
    description: >-
      A Falleen man with the careful stillness of someone whose job
      is to see without being seen. His coloring runs toward the deep
      blue-green of a Falleen at low affect — controlled, nothing
      bleeding through the skin that he has not decided to let show.
      He occupies a corner near the main passage in clothing that
      reads as a resident, not a guard, and watches everything that
      crosses the threshold. A blaster sits at his hip in the easy
      way of someone who has drawn it before and considers it
      unremarkable. He works for someone with an office on the
      Promenade who has an interest in who comes and goes here.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 4D
        persuasion: 4D
        con: 3D+2
        streetwise_coruscant: 3D+1
        search: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        Falleen intelligence operative assigned to the Gilded Cage by
        the Syndicate's Coruscant operation. Patient, controlled, and
        accustomed to reading people at range. He does not challenge
        unless challenged; when he moves, the conversation is already
        decided.
      knowledge: []
      faction: black_sun
      dialogue_style: >-
        Low, unhurried Basic with the faint precision of a Falleen
        who learned the language from legal documents. Speaks once.
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*His head turns toward you with the patience of someone who
          has been watching since you arrived.* 'Wrong quarter.'"
        - "*The Falleen steps out of the corner without hurrying.
          The blaster is already in his hand.* 'You've seen enough.'"
        - "*A slow exhale — and then he moves.* 'The Vigo does not
          like visitors who ask the wrong questions.'"

  - name: Pyke Spice Minder
    room: "Coruscant - Gilded Cage - Alien Quarter"
    species: Pyke
    description: >-
      A Pyke in a long dun-colored coat, his elongated skull low and
      forward in the characteristic hunch of a species that evolved
      in narrow mine shafts. He stands near a stack of sealed crates
      in the building's loading nook — the crates are labeled as
      Outer Rim food supplements, which is one way to describe spice.
      His large dark eyes move constantly, reading the foot traffic
      for Republic plainclothes, rival runners, and the kind of
      opportunist who gets ideas near unguarded cargo. The hold-out
      blaster under his coat has a short barrel for close work.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 3D+1
        hide: 3D+2
        sneak: 3D+1
        streetwise: 4D
        con: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        Pyke Syndicate low-level cargo minder who has survived the
        spice trade through paranoia and a willingness to act before
        being certain. He does not want a fight — fighting draws
        attention, which costs the Syndicate money. He will accept
        one that removes the threat.
      knowledge: []
      faction: pyke_syndicate
      dialogue_style: >-
        Clipped, minimal Basic with Pyke's characteristic flat
        intonation. He addresses problems directly and without preamble.
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*The Pyke goes very still, his dark eyes locked on you.*
          'You have the wrong crates. Walk away.'"
        - "*He steps sideways rather than back, putting the stack
          between you.* 'Last warning.'"
        - "*The hold-out blaster is out before the sentence ends.*
          'The Syndicate does not pay for witnesses.'"

  # ══════════════════════════════════════════════════════════════════
  # GILDED CAGE — BAZAAR — 2 NPCs
  # ══════════════════════════════════════════════════════════════════

  - name: Stall Enforcer
    room: "Coruscant - Gilded Cage - Bazaar"
    species: Weequay
    description: >-
      A stocky Weequay moving through the bazaar stalls with the
      ease of someone on a regular circuit. He stops at each
      unregistered vendor, says something in a low voice, and waits
      while a credit chip changes hands. The vendors comply quickly
      and without complaint, which speaks to how long this
      arrangement has been in place and what happened before they
      learned to comply quickly. His vibroblade is not hidden.
      Hiding it would undercut the message.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 1D+2
        mechanical: 2D
        perception: 2D+1
        strength: 3D
        technical: 2D
      skills:
        melee_combat: 4D+2
        brawling: 4D+1
        dodge: 3D+1
        intimidation: 4D+1
        search: 2D+2
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        Weequay who runs the Gilded Cage bazaar protection circuit
        for a Hutt-adjacent operation that has held this territory
        for years. He does not explain the arrangement; he enforces
        it. Resistance is not an option he recognizes.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Guttural Basic, economical. Two words where one would do;
        never three. The vibroblade is the argument.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The Weequay plants himself in your path.* 'Pay or
          leave. Those are your choices.'"
        - "*The vibroblade hums as he draws it.* 'Wrong day to
          play the hero.'"
        - "*He swings without another word — the negotiation
          was already over.*"

  - name: Contraband Spotter
    room: "Coruscant - Gilded Cage - Bazaar"
    species: Rodian
    description: >-
      A lean Rodian weaving through the bazaar stalls with the
      practiced ease of someone who knows every exit and has
      already clocked every face. His compound eyes rotate in
      small arcs — systematic, not nervous. He is not shopping.
      He is running surveillance on a rival operation that has
      been moving product through this bazaar without his
      employer's knowledge or cut. When the target presents
      itself, or when someone identifies themselves as standing
      between him and the job, the blaster under his coat will
      appear quickly and from an angle that suggests advance
      positioning.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D+2
        dodge: 4D+1
        hide: 4D
        sneak: 4D
        streetwise: 4D
        search: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        Rodian operative running black-market intelligence in the
        bazaar. He thinks in terms of sight lines and exit vectors.
        He responds to threats by repositioning before engaging —
        Rodian hunter instincts applied to urban criminal work.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Rapid-fire Huttese-accented Basic when he speaks at all.
        Mostly he does not. The blaster position communicates
        what words would only slow down.
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*The Rodian is no longer where he was.* 'You picked
          the wrong errand.'"
        - "*He materializes from behind a stall partition, blaster
          already leveled.*"
        - "*His compound eyes track every angle.* 'You move, I
          shoot. I move, I shoot. Your call.'"

  # ══════════════════════════════════════════════════════════════════
  # GILDED CAGE — COURTYARD — 2 NPCs
  # ══════════════════════════════════════════════════════════════════

  - name: Displaced Racketeer
    room: "Coruscant - Gilded Cage - Courtyard"
    species: Gran
    description: >-
      A Gran with three tired eyes that have seen a great deal go
      wrong and extracted profit from most of it. He arrived in
      the Gilded Cage as a refugee from a CIS-contested world six
      months ago and immediately identified the courtyard's refugee
      organizations as an untapped protection market. The three
      eyes give him the peripheral awareness to monitor the whole
      plaza simultaneously, which is useful in his line of work.
      The heavy blaster at his hip is newer than anything else he
      is wearing. He bought it immediately upon arrival.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D
        brawling: 4D
        dodge: 3D+2
        intimidation: 4D+1
        streetwise_coruscant: 3D+1
        search: 3D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        Gran refugee who turned criminal entrepreneur after arriving
        in the Gilded Cage. He targets displaced off-worlders who
        arrived after him, exploiting the trust networks among refugee
        organizations. Three eyes that never stop moving; heavy blaster
        that comes out the moment he reads a threat.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Gravelly, accented Basic — the Gran who learned the language
        after the war started. Direct about what he wants. Impatient
        with people who make him explain it twice.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*Three eyes fix on you from different angles simultaneously.*
          'You're in my courtyard. That has a fee.'"
        - "*The heavy blaster clears the holster.* 'Everyone in this
          plaza pays. You think you are different?'"
        - "*He does not look away — not once — as the blaster rises.*
          'Wrong day to resist.'"

  - name: Extortion Agent
    room: "Coruscant - Gilded Cage - Courtyard"
    species: Human
    description: >-
      A Human of middle age with the well-fed look of someone whose
      war has been profitable. He runs a booth at the edge of the
      courtyard advertising "displacement relief coordination" —
      a service that charges desperate off-worlders a fee to be
      added to a list that is never acted upon, then charges a
      second fee to avoid trouble from the first fee's absence.
      The vibrodagger is for the moments when a client decides
      to stop paying and needs a physical argument. He is
      disturbingly practiced at those moments.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 3D
        technical: 2D
      skills:
        melee_combat: 4D+1
        brawling: 4D
        dodge: 4D
        con: 4D
        streetwise_coruscant: 3D+2
        intimidation: 3D+2
      weapon: vibrodagger_talon
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        War profiteer who has built a fraud operation around the
        Gilded Cage's displaced population. Superficially polished —
        he is used to presenting as a legitimate service provider.
        When challenged, the polish drops immediately and the
        vibrodagger comes out with the speed of someone who has
        done it many times.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Initially smooth, helpful Basic — the practiced warmth of
        a con artist. Drops to cold and flat the moment the con
        stops working.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The helpful smile disappears.* 'You should have kept
          walking.' *The vibrodagger is in his hand.*"
        - "'Displacement relief is a dangerous business.' *He steps
          forward, blade low.* 'You've become a liability.'"
        - "*He moves fast for a man who looked comfortable a second
          ago.* 'The list has your name on it now.'"
