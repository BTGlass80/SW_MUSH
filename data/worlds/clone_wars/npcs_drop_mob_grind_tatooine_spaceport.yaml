# data/worlds/clone_wars/npcs_drop_mob_grind_tatooine_spaceport.yaml
#
# Tatooine Spaceport Docking Bays Hostile Mob Grind Batch (2026-06-23)
#
# Six roaming hostile NPCs seeded across six previously-uncovered Tatooine
# spaceport rooms. All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread (all tatooine_spaceport):
#   Docking Bay 86                x1  (Nikto cargo thief)
#   Docking Bay 87                x1  (Zabrak protection enforcer)
#   Docking Bay 92                x1  (Trandoshan parts fence)
#   Docking Bay 94 - Entrance     x1  (Devaronian mugger/con artist)
#   Docking Bay 94 - Pit Floor    x1  (Weequay syndicate watchman)
#   Spaceport Hotel               x1  (Twi'lek advance scout)
#
# Species diversity: Nikto / Zabrak / Trandoshan / Devaronian / Weequay / Twi'lek
#   — 6 distinct species, one per room.
#
# Thematic premise: Mos Eisley Spaceport's docking bays are the largest blind
# spot in Republic jurisdiction — customs checks the passenger manifests, not
# the bay floors or maintenance corridors. Bay 86's low traffic makes it a
# pocket-picking zone. Bay 87's double crane provides cover for a protection
# crew. Bay 92's underground access makes it a staging point for parts theft.
# Bay 94's cracked entrance draws con artists, and the pit floor underneath
# draws hired guns watching incoming ships for syndicate interests. The hotel
# above the terminal is forty anonymous rooms that serve as an advance-scout
# nest for crew scoping the wealthy transients below.
#
# All rooms confirmed in data/worlds/clone_wars/planets/tatooine.yaml at HEAD.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats are UNVERIFIED against the PDF. Grounded in sibling CW NPC
#   patterns (tatooine outskirts / mos_eisley / cantina_market baselines).
# Weapons: blaster_pistol / heavy_blaster_pistol / vibroblade /
#          hold_out_blaster / concealed_blaster — all keys confirmed in
#          data/weapons.yaml at HEAD.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # DOCKING BAY 86 — 1 NPC (Nikto cargo thief)
  # Old 86 is utilitarian — mostly small shuttles, personal transports,
  # and light freight that doesn't stay long. Low throughput means low
  # oversight. A Nikto who learned which manifests go unchecked has
  # been systematically stripping unattended cargo for three months.
  # ══════════════════════════════════════════════════════════════════

  - name: Bay 86 Cargo Thief
    room: "Docking Bay 86"
    species: Nikto
    description: >-
      A Kajain'sa'Nikto in a scuffed freight handler's vest moves through
      Bay 86's loading lanes with the unhurried confidence of someone who
      knows exactly which crates belong to nobody watching them. His orange-
      red skin is dust-bleached from weeks on the bay floor and the ridges
      along his jaw are scarred from at least one job that ended in a fight
      rather than a clean lift. He has a portable manifest scanner in one
      hand — the kind used legitimately to track cargo, and illegitimately
      to identify which freight has been in bay storage longer than its
      owners are likely still in the system. The blaster on his hip is
      holstered but not secured. He has already measured how long it would
      take you to cross the distance between you, and the answer determines
      whether he keeps working or reaches for it.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D+2
        technical: 2D+1
      skills:
        blaster: 4D
        dodge: 3D+1
        search: 3D+2
        streetwise: 3D+1
        sneak: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A methodical opportunist who has elevated cargo theft to a practiced
        science. He reads manifests the way a pilot reads navigation charts —
        looking for the window where a crate becomes invisible between filing
        and pickup. He does not take unnecessary risks but will not leave
        a witness either. The blaster is a tool like the manifest scanner,
        and he is equally comfortable using both.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat, clipped Nikto-accented Basic. "Wrong bay." Then the
        scanner goes away and the blaster comes out.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires low, toward your legs, and steps sideways into the shadow of the cargo stack.*"
        - "*'Wrong time.' He retreats toward the back berths without taking his eyes off you.*"
        - "*He fires twice and ducks behind a grounded shuttle's landing strut.*"

  # ══════════════════════════════════════════════════════════════════
  # DOCKING BAY 87 — 1 NPC (Zabrak protection enforcer)
  # Bay 87's double overhead crane and modern berthing equipment make
  # it the spaceport's most in-demand mid-size bay — which makes it
  # ideal for collecting protection fees from crews who need the space.
  # A Zabrak enforcer holds the collection contract for a local outfit.
  # ══════════════════════════════════════════════════════════════════

  - name: Bay 87 Protection Enforcer
    room: "Docking Bay 87"
    species: Zabrak
    description: >-
      A Zabrak with vestigial horns filed flush to his skull stands near
      the crane control station in Bay 87's center floor, arms crossed,
      watching every ship that enters the bay. The filed horns are an old
      fighter's habit — nothing to grab in a grapple — and the heavy
      blaster pistol on his thigh is overt enough to be the point. He
      collects a "bay security surcharge" from every crew that docks here:
      a flat rate for small transports, a sliding scale for anything with
      a cargo hold larger than the crane arm can reach in one swing. The
      arrangement is not in any spaceport schedule, but the port authority
      knows, and the arrangement suits them fine. He has the unhurried
      manner of someone who has not had to chase a target in a long time
      because the targets always come to him.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 3D
        technical: 2D
      skills:
        blaster: 4D+2
        dodge: 3D+2
        brawling: 4D
        intimidation: 4D+1
        search: 3D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A professional muscle for hire who has settled into a comfortable
        semi-permanent arrangement and intends to keep it that way. He
        does not explain the surcharge twice and he does not give refunds.
        Violence is the tool he reaches for when the conversation has
        finished, and the conversation finishes quickly.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Measured, unhurried Basic with a Zabrak drawl. "Landing fee.
        You've got one chance to make it easy." He does not explain
        what happens if you don't.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires without taking his eyes off you and advances one deliberate step at a time.*"
        - "*'No refunds.' He fires again and moves to flank the crane column.*"
        - "*He absorbs your shot like it bothers him mildly and keeps coming.*"

  # ══════════════════════════════════════════════════════════════════
  # DOCKING BAY 92 — 1 NPC (Trandoshan parts fence)
  # Bay 92's underground maintenance levels are stocked with repair
  # tools and labor droids that engineering crews rarely audit closely.
  # A Trandoshan has been running a parts-stripping operation from the
  # lower level for weeks — he turns violent if anyone gets too close.
  # ══════════════════════════════════════════════════════════════════

  - name: Bay 92 Parts Fence
    room: "Docking Bay 92"
    species: Trandoshan
    description: >-
      A Trandoshan crouches in Bay 92's underground maintenance corridor
      between two deactivated labor droids, running a diagnostic scanner
      over a hyperdrive motivator that definitely did not originate in
      this bay. His scales carry the chemical smell of lubricant and
      ionized durasteel from hours of close-quarters parts work, and
      his clawed hands move across the motivator's housing with a
      technician's precision that does not match the vibroblade sheathed
      at his thigh. He sells stripped components to mid-range traders who
      do not ask where the parts originated, and he has learned that the
      fastest way to maintain that arrangement is to make anyone who
      stumbles onto his operation regret the intrusion. He stands slowly
      when you enter the corridor. The motivator goes down. The vibroblade
      comes up.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 3D
        perception: 2D+2
        strength: 3D+1
        technical: 3D+1
      skills:
        blaster: 3D+2
        melee_combat: 4D+2
        dodge: 3D
        repair: 4D
        streetwise: 3D+1
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A pragmatic criminal who prefers the maintenance corridors to the
        open bay floor because witnesses are harder to accumulate underground.
        He is not reckless but he is territorial, and the territorial
        instinct is stronger than the pragmatic one when his operation is
        at stake. He has a Trandoshan predator's preference for closing
        the distance fast rather than trading shots across open space.
      knowledge: []
      faction: independent
      dialogue_style: >-
        A low Trandoshan hiss that shades into clipped Basic when he
        decides words are faster. "You didn't see anything." Then the
        vibroblade is already moving.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He closes the gap in two strides, vibroblade sweeping low.*"
        - "*He growls and retreats toward the maintenance shaft, blade still up.*"
        - "*'Nothing to see here.' He advances, scaling armor absorbing the hit.*"

  # ══════════════════════════════════════════════════════════════════
  # DOCKING BAY 94 - ENTRANCE — 1 NPC (Devaronian mugger)
  # The cracked duracrete steps leading down to Bay 94's pit attract
  # the spaceport's most transient element — beggars, flimflam artists,
  # and a Devaronian who has refined the distinction between those two
  # categories into a profitable specialization.
  # ══════════════════════════════════════════════════════════════════

  - name: Bay 94 Step Grifter
    room: "Docking Bay 94 - Entrance"
    species: Devaronian
    description: >-
      A Devaronian sits on the cracked duracrete steps leading down into
      Bay 94's pit, turned sideways to let travelers pass while watching
      every one of them with the patient, evaluating stillness of a
      predator that has decided waiting is more efficient than chasing.
      His horns are short — the kind that suggest youth, which is the
      deliberate impression. He has a traveler's pack beside him and a
      look of harmless transit fatigue that has persuaded a remarkable
      number of people to stop and tell him how long they're staying,
      which ship is theirs, and how much cargo they're expecting. By the
      time the conversation ends, the hold-out blaster is already on them
      and the traveler's pack is open, and the harmless look has been
      replaced with something quite different. He does not like it when
      the mark realizes the look was a calculation.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 3D+1
        con: 4D+2
        streetwise: 4D
        persuasion: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A con artist who defaults to the grift but escalates to violence
        the moment the mark does not play the role they were assigned.
        The harmless traveler persona is the first tool, the hold-out
        blaster is the second, and there is no third. He has a Devaronian's
        instinctive gift for reading what people want to see and showing
        them exactly that, right up until the moment he doesn't need to.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Warm, self-deprecating Basic with a Devaronian lilt. "Excuse me,
        friend—" then the blaster appears and the warmth drops entirely.
        "Credits. Now."
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The friendly face is gone. He fires from the step and rolls sideways.*"
        - "*'Wrong answer.' He backs down the steps toward the pit, blaster level.*"
        - "*He fires and runs — not out of cowardice, he just prefers a moving target.*"

  # ══════════════════════════════════════════════════════════════════
  # DOCKING BAY 94 - PIT FLOOR — 1 NPC (Weequay syndicate watchman)
  # The scorched pit floor of Bay 94 — eight landing pads and a decade
  # of scorch marks — is useful to a crime syndicate that needs someone
  # to observe which ships carry what cargo. A Weequay watchman holds
  # the post under the guise of a fuel inspection contractor.
  # ══════════════════════════════════════════════════════════════════

  - name: Bay 94 Pit Watchman
    room: "Docking Bay 94 - Pit Floor"
    species: Weequay
    description: >-
      A Weequay stands near the center of Bay 94's scorched pit floor
      with a fuel inspection clipboard and the unhurried authority of
      someone who has been assigned to this post for a long time and
      intends to be here a long time more. His leathery skin is the
      same grey-brown as the ferrocrete around him, and the fuel
      contractor's vest he wears carries a certification badge for a
      company that no longer exists. He notes every ship that lands —
      make, registry, manifest weight, docking duration — and relays
      it twice a day through a comlink that looks like a personal
      comm unit and is not. He is not violent by preference. But the
      syndicate that pays him prefers witnesses who cannot describe
      what they saw, and he has instructions about that.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D
        mechanical: 2D
        perception: 3D+2
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 3D+2
        search: 4D
        streetwise: 3D
        sneak: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A professional observer who has learned that the most dangerous
        thing he does is let someone walk away knowing what he is. He
        prefers to resolve the problem cleanly rather than with noise —
        a shot in a bay full of ship engines is quieter than it sounds
        from the outside — and he is good at not leaving anything that
        needs explaining later.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat, unhurried Weequay Basic. "Fuel inspection. Move along."
        When that stops working: silence, and the blaster.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires twice, clinical and unhurried, and steps behind the nearest ship.*"
        - "*'Nothing to report.' He fires again and retreats toward the landing struts.*"
        - "*He moves sideways, using the scorched bay floor's cover geometry like a familiar room.*"

  # ══════════════════════════════════════════════════════════════════
  # SPACEPORT HOTEL — 1 NPC (Twi'lek advance scout)
  # Forty small rooms at 15 credits a night serve a rotating cast of
  # transients. A Twi'lek occupies room 12 for the second week running,
  # her window facing the terminal exit — the ideal vantage for a crew's
  # advance scout cataloguing wealthy arrivals for a planned lift.
  # ══════════════════════════════════════════════════════════════════

  - name: Spaceport Hotel Scout
    room: "Spaceport Hotel"
    species: Twi'lek
    description: >-
      A Twi'lek with pale green skin and lekku wrapped close against
      the spaceport dust sits in the Spaceport Hotel's common area with
      a datapad and the relaxed posture of a long-haul traveler waiting
      for a connecting flight. She has been here for twelve days. The
      datapad shows passenger manifests — she has a contact at customs —
      and beside it on the table is a personal comm unit, a stylus, and
      a cold cup of caf. She marks arrivals who look like they have
      credits and do not know the city, notes which bay their ship is in,
      and relays the package to the crew she works with. When someone
      notices what she is doing, her response is not the relaxed posture
      anymore. The concealed blaster comes out of the holster stitched
      into the back of her travel jacket, and the conversation about
      what she's doing is over.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D+1
        sneak: 3D+2
        con: 3D+2
        search: 3D+2
      weapon: concealed_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A professional advance scout who prefers to finish the job clean
        rather than leave it messy. She is patient by nature — two weeks
        in a fifteen-credit hotel room requires patience — and she applies
        the same patience to a fight that she has been reading a threat
        for the last three days. She does not panic. She does not miss.
        She does not wait to see if the problem resolves itself.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Light, unaccented Basic — the neutral voice of someone who has
        moved through enough ports to have sanded all the identifying
        features off. "You've got the wrong person." Then the blaster
        is already level.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She fires without standing up and slips sideways toward the exit.*"
        - "*'Wrong room.' She fires again and moves to the corridor door.*"
        - "*She rolls behind the common-room table and shoots from cover, patient and methodical.*"
