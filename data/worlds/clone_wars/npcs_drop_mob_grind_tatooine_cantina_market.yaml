# data/worlds/clone_wars/npcs_drop_mob_grind_tatooine_cantina_market.yaml
#
# Tatooine Cantina & Market Mob Grind Batch (2026-06-23)
#
# Six roaming hostile NPCs seeded across six previously uncovered Tatooine
# rooms spanning the cantina and market zones, extending the solo-PvE
# mob-grind reward loop (engine/hunting_rewards.py).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Chalmun's Cantina - Entrance x1    (Rodian cantina spotter, hold_out_blaster)
#   Chalmun's Cantina - Main Bar x1    (Aqualish bar brawler, vibroblade)
#   Chalmun's Cantina - Back Hallway x1 (Human spice courier, blaster_pistol)
#   Market Place - Gep's Grill x1     (Nikto protection enforcer, vibroblade)
#   Heff's Souvenirs x1               (Zabrak fence guard, blaster_pistol)
#   Zygian's Banking Concern x1       (Trandoshan debt enforcer, heavy_blaster_pistol)
#
# Thematic premise: Mos Eisley (~20 BBY) is neutral Hutt territory —
# the Cantina and the Market Streets are the galaxy's most casual crucible
# of low-grade criminal activity. Chalmun's Cantina entrance is watched by
# a Hutt spotter logging faces the syndicate wants to track; the main bar is
# where the watch breaks down and personal violence takes over (the classic
# Aqualish aggression the cantina's "no shooting" policy exists to contain).
# The back hallway is a dead-letter drop for Hutt spice routes. The market
# street is carved into protection territories: the Grill pays a Nikto crew
# for the privilege of staying open; Heff's Souvenirs fronts as a legitimate
# shop but the back room is a stolen-goods clearinghouse; and Zygian's Banking
# Concern is an in-person collection point where Hutt debt enforcers meet
# clients who have stopped responding to comm messages.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
#   Chalmun (Wookiee cantina owner) and Wuher (bartender) are existing ambient
#   NPCs in npcs_mos_eisley_population_p1.yaml — none of this batch replaces
#   or references them as combat NPCs.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats UNVERIFIED against WEG40120 PDF. Grounded in sibling CW NPC
#   patterns (tatooine_mos_eisley / tatooine_mos_eisley_expansion baselines).
# Species stat modifiers applied per WEG D6 convention:
#   Rodian:     DEX 3D, PER 3D (hunter species; aware and precise)
#   Aqualish:   STR 3D+1, DEX 2D+2 (powerful, aggressive)
#   Human:      2D baseline all attributes
#   Nikto:      STR 3D, DEX 2D+2 (Hutt servants; strong, combat trained)
#   Zabrak:     STR 2D+2, DEX 3D (disciplined; resist pain)
#   Trandoshan: STR 4D, DEX 2D+2 (apex predator stat line)
# Weapons: hold_out_blaster, vibroblade, blaster_pistol, heavy_blaster_pistol
#   — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # CHALMUN'S CANTINA - ENTRANCE — 1 NPC (Rodian cantina spotter)
  # The entrance to Chalmun's Cantina is the first filter — the bouncer
  # droid checks for weapons, and the Rodian in the doorframe checks for
  # faces. He is a Hutt cartel information operative, logging who enters
  # and signaling via compressed comm-burst. He turns hostile when he
  # recognizes a target or someone gets too close to his operation.
  # ══════════════════════════════════════════════════════════════════

  - name: Rodian Cantina Spotter
    room: "Chalmun's Cantina - Entrance"
    species: Rodian
    description: >-
      A lean Rodian in a threadbare traveling cloak leans against the
      cantina archway with the practiced stillness of someone who has been
      standing in the same spot for three hours and intends to stand there
      three more. His multifaceted eyes take in every new arrival without
      moving his head. A compact hold-out blaster rides in a wrist holster
      mostly hidden by the cloak's cuff. He is not here to drink. He is
      here to watch — and whoever he is watching for, he will flag the
      moment they step through the arch.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D+1
        search: 3D+2
        streetwise: 3D
        hide: 3D+1
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A Hutt cartel information operative assigned to the cantina entrance
        to log arriving faces and comm-burst compressed reports to a handler
        in the spaceport. He is methodical and unhurried — he does not start
        fights, he ends them, and he has no illusions about how fast the
        hold-out comes out of the wrist holster when someone gets too close
        to what he is doing. When cornered or recognized as a spotter, he
        fires once to buy distance and uses the crowd to break contact.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Flat Rodian-accented Basic, minimal. "You have the wrong person."
        The blaster clears the holster before any argument can form.
      hostile: true
      combat_behavior: evasive
      fallback_lines:
        - "*He fires from a low draw and immediately steps sideways into the
          doorway crowd, breaking line of sight.*"
        - "*A fast shot, then he is already moving — using the archway pillar
          as cover, the hold-out tracking you from the edge.*"
        - "*He speaks into his comm briefly, then raises the blaster again.
          Someone is now on their way.*"

  # ══════════════════════════════════════════════════════════════════
  # CHALMUN'S CANTINA - MAIN BAR — 1 NPC (Aqualish bar brawler)
  # The main bar is why the "no shooting" rule exists. The Aqualish
  # patron has been drinking since before the twin suns were both
  # overhead and has found a grievance in every face in the room. He
  # is the kind of problem that ends with a body on the floor, which
  # is why Wuher keeps one hand on the bar cloth and one hand
  # somewhere else entirely.
  # ══════════════════════════════════════════════════════════════════

  - name: Aqualish Bar Brawler
    room: "Chalmun's Cantina - Main Bar"
    species: Aqualish
    description: >-
      A broad Aqualish takes up two stools at the bar, a half-empty
      glass of something corrosive at his elbow and a vibroblade on
      his belt that he keeps touching with his thumb the way some
      beings fidget with a coin. His four spider-like eyes track
      every movement in the room with the unfocused alertness of
      someone who is drunk but not harmlessly so. The other patrons
      have quietly shifted a meter clear of him in every direction.
      He has already decided you owe him an apology — he just hasn't
      told you what for.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D
        strength: 3D+1
        technical: 2D
      skills:
        brawling: 4D+2
        melee_combat: 4D
        intimidation: 3D+1
        dodge: 2D+2
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 2
    ai_config:
      personality: >-
        A violent Aqualish regular at Chalmun's who drinks until someone
        makes the mistake of looking at him wrong, then provides his own
        interpretation of what "wrong" means. He is not tactically
        sophisticated — he advances, he swings, he uses his body as
        a battering ram through furniture if the distance is wrong for
        the blade. The jizz band has learned to play louder when he
        stands up.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Guttural Aqualish with just enough Basic to communicate intent:
        "You. Problem." Then the vibroblade is already in his hand.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He swings with his full weight behind the vibroblade, scattering
          bar stools across the floor.*"
        - "*A heavy charge, the blade raised — he is not retreating and
          he is not slowing down.*"
        - "*He takes a hit, staggers one step, and comes back faster. Pain
          does not appear to register as a deterrent.*"

  # ══════════════════════════════════════════════════════════════════
  # CHALMUN'S CANTINA - BACK HALLWAY — 1 NPC (Human spice courier)
  # The back hallway behind the main bar is where Chalmun's policy of
  # "no questions" earns its keep. A regular transit point for Hutt
  # cartel spice hand-offs — small enough quantities that nobody
  # documents them, large enough to matter. The courier guards the
  # drop point and fires on anyone who witnesses the exchange.
  # ══════════════════════════════════════════════════════════════════

  - name: Cantina Back-Room Courier
    room: "Chalmun's Cantina - Back Hallway"
    species: Human
    description: >-
      A human in nondescript brown work clothes stands at the far end
      of the back hallway, one hand on a courier satchel slung close
      to his body and the other near a blaster pistol holstered at
      his hip. He looks like dozens of other spacers who move through
      Mos Eisley without anyone looking twice — which is the point.
      The satchel contains a compressed spice parcel waiting for its
      recipient. Anyone who wanders back here at the wrong moment is
      a liability he is authorized to remove.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D+1
        sneak: 3D
        streetwise: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A Hutt cartel courier maintaining a spice hand-off point in the
        cantina back hallway. He does not negotiate, does not ask questions,
        and does not allow witnesses. The moment someone enters the hallway
        and is not his contact, he fires — two quick shots and he backs
        toward the service exit, always moving, never letting the distance
        close to arm's length. He has done this on six planets and the math
        is always the same.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Standard Basic, flat and fast. "Wrong hallway." The blaster is
        already in his hand by the second word.
      hostile: true
      combat_behavior: evasive
      fallback_lines:
        - "*Two fast shots and he is already backing toward the service door,
          keeping the distance open.*"
        - "*He fires from a side-step, using the hallway wall as cover,
          never staying in the same spot twice.*"
        - "*He glances at the service exit — another shot to buy time, then
          he is moving for it.*"

  # ══════════════════════════════════════════════════════════════════
  # MARKET PLACE - GEP'S GRILL — 1 NPC (Nikto protection enforcer)
  # Gep's Grill feeds spacers and locals on tight budgets. The Nikto
  # crew that controls this block of the market collects weekly —
  # the enforcer shows up, takes his percentage, and departs. If
  # the payment is short, or if someone interferes, he resolves it
  # with the blade on his belt.
  # ══════════════════════════════════════════════════════════════════

  - name: Nikto Protection Enforcer
    room: "Market Place - Gep's Grill"
    species: Nikto
    description: >-
      A heavyset Nikto in a worn leather vest stands near the grill
      counter, arms crossed, watching Gep work the cooking surface
      with the patient confidence of someone who is owed money and
      knows he will collect it. A worn vibroblade rides in a
      sheath on his thigh — not drawn, but positioned so the first
      centimeter of the hilt is always visible above the sheath lip.
      The other customers are eating faster than usual. Nobody
      makes eye contact with the Nikto.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 3D
        technical: 2D
      skills:
        melee_combat: 4D
        brawling: 3D+2
        intimidation: 3D+1
        dodge: 2D+2
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Hutt cartel street-level protection enforcer assigned to the
        market block that includes Gep's Grill. He collects weekly and
        handles "disputes" — anyone who challenges his crew's claim on
        the block, or witnesses a collection he would prefer to keep
        quiet, becomes a problem he solves with the vibroblade. He
        prefers close range: grabs, pressures, uses the knife as the
        last word in an argument he started in the first sentence.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Flat Nikto-accented Basic, short sentences. "This block has
        an arrangement. You're interfering." The vibroblade comes
        out before the second sentence finishes.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He presses forward with the vibroblade, using his bulk to
          close the distance — he fights better close than at range.*"
        - "*A feint with the left hand and a low cut with the blade;
          he reads the room like someone who has done this in worse spaces.*"
        - "*He shoves a grill-counter stool out of the way and advances,
          blade low, waiting for an opening.*"

  # ══════════════════════════════════════════════════════════════════
  # HEFF'S SOUVENIRS — 1 NPC (Zabrak fence guard)
  # Heff's Souvenirs is a legitimate storefront in the front third.
  # The back two-thirds are a clearinghouse for stolen cargo components,
  # off-manifest ship parts, and personal effects from travelers who
  # no longer needed them. The Zabrak guards the back room and the
  # arrangement — anyone who gets past Heff and sees what is behind
  # the curtain gets a blaster in the face.
  # ══════════════════════════════════════════════════════════════════

  - name: Zabrak Fence Guard
    room: "Heff's Souvenirs"
    species: Zabrak
    description: >-
      A Zabrak with twin rows of small facial horns stands at the
      back of the souvenir shop near a curtained doorway, positioned
      so he can watch both the main shop entrance and the passage
      behind him. He has the stillness of someone who does not need
      to move to be ready. A blaster pistol hangs in a drop holster
      at his thigh — worn, maintained, and drawn very fast for
      someone who looks like he never hurries. The souvenirs in this
      half of the shop are real. The back half is not a shop.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 3D+1
        intimidation: 3D
        search: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A freelance fence guard protecting a stolen-goods operation in
        the back of a souvenir shop. He works for whoever pays him —
        currently a mid-level Outer Rim cargo thief using Mos Eisley's
        Hutt-neutral status to move components. He is professional and
        dispassionate: anyone who reaches the curtained back room and
        is not his employer fires the same mental trigger. He does not
        warn twice and he does not miss at shop range.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Measured Basic, no inflection. "Shop's closed." One step
        forward and the blaster is already cleared from the holster.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires once, fast and level, then repositions to the curtained
          doorway — controlling the only exit behind him.*"
        - "*A precise double-tap from the hip. He is not hiding. He is
          making a point about sightlines.*"
        - "*He takes a step back into the doorframe, using the curtained
          passage for cover, blaster tracking left to right.*"

  # ══════════════════════════════════════════════════════════════════
  # ZYGIAN'S BANKING CONCERN — 1 NPC (Trandoshan debt enforcer)
  # Zygian's Banking Concern issues Hutt-backed credit lines at rates
  # the Republic's consumer protection statutes would never allow —
  # because they never apply here. A client three payments behind
  # stopped answering the comm. The Trandoshan debt enforcer has
  # been authorized to collect in person, which on Tatooine is a
  # different category of conversation.
  # ══════════════════════════════════════════════════════════════════

  - name: Trandoshan Debt Enforcer
    room: "Zygian's Banking Concern"
    species: Trandoshan
    description: >-
      A Trandoshan in a dust-grey coat stands in the center of
      Zygian's Banking Concern lobby, too large for the room and
      indifferent to it. A heavy blaster pistol is holstered across
      his chest — the kind of visible holster that communicates
      that the meeting is not a negotiation. He is mid-conversation
      with the teller, who looks like someone who has already told
      him the client is not here and is not enjoying the reply.
      Anyone who enters while he is working is collateral he will
      decide about in the order they present a problem.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D
        strength: 4D
        technical: 2D
      skills:
        brawling: 5D
        blaster: 4D+1
        intimidation: 4D
        dodge: 3D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 3
    ai_config:
      personality: >-
        A Hutt cartel debt enforcer sent to collect from a delinquent
        Zygian's client in person. He is not here for conversation —
        the comm attempts are finished, the grace period is finished,
        and his mandate is collection by whatever means the situation
        requires. He is competent and unhurried: fires once to establish
        dominance, advances through resistance, and uses his STR 4D frame
        to turn the lobby furniture into obstacles for everyone except
        himself.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Deep Trandoshan-accented Basic, very few words. "You owe a
        debt. I collect debts." The heavy blaster is already clearing
        the chest holster.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires once — a heavy, deliberate shot — then advances through
          the lobby, stepping over furniture without slowing.*"
        - "*A second shot, aimed low. He is closing the range and he knows
          the lobby geometry better than you do.*"
        - "*He shoulders through the teller counter divider and fires again.
          He does not retreat. He collects.*"
