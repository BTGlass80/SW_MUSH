# data/worlds/clone_wars/npcs_drop_def_civilians.yaml
#
# Drop D + E + F (batched) — Kamino + Geonosis + Kuat Civilian Rosters (May 2026)
#
# Per cw_content_gap_design_v1_1_decisions.md Stage 4 sequencing,
# the three sparse-density planet drops are batched into a single
# file because each individually is small (~9 NPCs) and they share
# the same authoring pattern (~0.3 NPCs/room sparse-civilian
# rosters per Q6 density target).
#
#   Drop D — Kamino:   9 NPCs (clone-production world, bureaucratic-sparse)
#   Drop E — Geonosis: 9 NPCs (CIS heartland, war-sparse + combat-dense via Drop H)
#   Drop F — Kuat:     9 NPCs (shipyard destination, commercial-sparse)
#                     ─
#                     27 NPCs total
#
# Schema follows the canonical Vela Niree (npcs_cw_additions.yaml)
# reference per J1 handoff §6.7. Loaded by engine/npc_loader.py
# via era.yaml's content_refs.npcs list.
#
# ── POLICY CONSTRAINTS APPLIED ─────────────────────────────────────
#
# Q1 (canonical character cameos = EXTREMELY RESTRICTED):
#   - No Lama Su, Taun We, Nala Se on Kamino (canonical Kaminoans
#     of the production program). NPCs here are non-canonical
#     Kaminoan administrators and clone-program staff.
#   - No Poggle the Lesser, Wat Tambor on Geonosis (canonical CIS
#     Council figures). NPCs here are minor Geonosian castes,
#     Trade Federation observers, and off-world smugglers.
#   - No canonical House Andrim / House Purkis principals on Kuat
#     (the families are canonical but specific named members aren't
#     story-load-bearing in the same way Senators are; we use
#     non-canonical members of the houses to populate without
#     invoking specific film/series figures).
#
# Q2 (mid-war ~20 BBY): Kamino is producing clones at scale;
#   Geonosis is the recently-reactivated CIS industrial heartland
#   (post-First-Battle, pre-Second-Battle); Kuat is a Republic-
#   aligned shipyard handling the GAR's capital ship orders.
#
# Q5 (re-skin first, source canon second, bespoke last):
#   - Lira Shan analog (KDY broker) re-skinned from GG6's Korkeal
#     Hai p.75 archetype per J1's grounding; here we author a
#     non-canonical KDY broker (NOT Lira Shan, who FDtS reserves)
#     using the same archetype.
#   - Geonosian worker caste descriptions ground in
#     `wookieepedia_extracts/confederacy_of_independent_systems.md`
#     (CIS military structure section).
#   - Kaminoan administrators ground in canonical CW Kamino
#     reference frames (cloning-program bureaucracy without
#     leveraging named figures).
#
# Q6 (variable density per planet):
#   - Kamino target: ~0.3 NPCs/room. 26 rooms × 0.3 = 7.8 → 9 with
#     Drop H's CS-1144 + RC-1402 already in place = 11 total = 0.42
#     density. Slightly above target; acceptable for the
#     production-world that is the clones' canonical home.
#   - Geonosis target: ~0.3 NPCs + heavy combat templates.
#     38 rooms × 0.3 = 11.4 → 9 civilian + 7 Drop H combat = 16 total
#     = 0.42 density. Same.
#   - Kuat target: ~0.3 NPCs/room. 34 rooms × 0.3 = 10.2 → 9 + 2
#     Drop H = 11 = 0.32 density. On target.
#
# ── SOURCE GROUNDING ───────────────────────────────────────────────
#
# - wookieepedia_extracts/clone_trooper.md — Kaminoan production
#   context, Maintenance Clone 99 role, accelerated aging
# - wookieepedia_extracts/confederacy_of_independent_systems.md
#   — CIS Council member roster, worker caste structure,
#   Geonosian Industries
# - wookieepedia_extracts/arc_troopers_and_republic_commandos.md
#   — Mandalorian instructor lineage (relevant to Drop D Kamino)
# - gg6_tramp_freighters_extraction_v1.md — KDY broker archetype
#   (grounding the Kuat broker NPC; Lira Shan reserved for FDtS)

schema_version: 1

npcs:

  # ════════════════════════════════════════════════════════════════════
  # DROP D — KAMINO (9 NPCs across Tipoca City + training facilities)
  # ════════════════════════════════════════════════════════════════════
  # Existing Drop H NPCs on Kamino:
  #   - Clone Sergeant CS-1144 'Walker' @ Training Block Alpha
  #   - Republic Commando RC-1402 'Quill' @ Advanced Training Facility
  # Drop D fills in the bureaucratic / civilian / Kaminoan layers
  # around them.

  - name: Kaminoan Administrator Su Mara
    room: Kamino - Tipoca City Administration
    species: Kaminoan
    description: >-
      A Kaminoan in the long pearl-white robe of the administrative
      caste — tall, slender, large dark eyes, the long elegant neck
      of her species. She stands at a translucent display console
      reviewing production schedules. Her movements are slow and
      considered; her attention is, when it lands on you, total.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 4D
        mechanical: 2D+1
        perception: 3D+2
        strength: 2D
        technical: 4D
      skills:
        bargain: 3D
        bureaucracy: 5D+2
        command: 3D+2
        languages: 4D+1
        persuasion: 3D+2
        scholar_genetics: 5D
        scholar_clone_doctrine: 5D+2
        cultures: 4D
        willpower: 4D+1
      weapon: none
      move: 12
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Senior Kaminoan administrator. Twenty-year veteran of the
        clone production program. Reports to the Prime Minister's
        office (the office, not the Prime Minister himself, who is
        currently off-world). Considers the program a sacred
        duty — Kaminoan culture frames cloning as a craft and
        clones as a product of generations of refinement. She is
        polite to visitors but treats them as schedule disruptions.
      knowledge:
      - "Tipoca City Administration. Reports to Prime Minister's office."
      - "Production schedule: sixteen battalions due for deployment in the next standard month."
      - "Clone program is a generational Kaminoan project; over a decade ongoing."
      - "Republic visitors have access to the public tiers. Production tiers are restricted."
      - "Maintenance Clone 99 (canonical, off-screen reference) is at the training facilities; she does not arrange access."
      - "The aiwha stables are not part of the clone program but are open to guests with permission."
      faction: republic
      dialogue_style: >-
        Slow, slightly fluted Kaminoan-accented Basic — drawn-out
        vowels, soft sibilants. Patient on the surface; impatient
        underneath. Calls humans "guests" with the same neutral
        tone she'd use for "specimens."
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'You are welcome on Kamino. State your business with the Administration.'"
      - "*The Kaminoan inclines her head. The motion takes longer than a human nod.*"
      - "'Production schedules are not public. The training facilities are.'"
      - "'I am unable to arrange a meeting with the Prime Minister. He is off-world for an extended period.'"
      - "*Su Mara turns back to her display. Her dismissal is gracious and complete.*"

  - name: Kaminoan Geneticist Kel Doru
    room: Kamino - Genetics Laboratory
    species: Kaminoan
    description: >-
      A male Kaminoan in the cream-and-pale-blue lab coat of the
      genetic-modification team, stationed at a wall of holographic
      DNA-strand projections. He is younger than Su Mara — tall but
      not yet fully crested — and his attention is so focused on
      the projections that he does not notice you until you are
      directly in his peripheral vision.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 4D+2
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 5D
      skills:
        bureaucracy: 3D
        first_aid: 4D
        languages: 3D+2
        medicine: 5D+2
        scholar_genetics: 6D
        scholar_clone_doctrine: 4D+2
        scholar_clone_template_drift: 5D
        willpower: 3D+2
      weapon: none
      move: 12
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Mid-career Kaminoan geneticist. Specializes in monitoring
        clone template drift — the genetic variance that accumulates
        across production batches over time. Polite to visitors but
        deeply uninterested in conversation that isn't about
        genetics. Has been quietly noting an unexplained anomaly in
        the latest production batches; has reported it; the report
        has not been escalated. He doesn't push.
      knowledge:
      - "Specializes in clone template drift monitoring."
      - "Latest batches show a small but unexpected anomaly. Reported. Not yet escalated."
      - "Cloning Hall Access Checkpoint requires genetic-staff clearance."
      - "Considers the inhibitor biochip an unusual modification; understands the official rationale; does not endorse it privately but does not say so."
      - "Knows Maintenance Clone 99's medical file (canonical-reference; 99 is currently at the training facilities, off-screen). Carries it in his head."
      faction: republic
      dialogue_style: >-
        Quiet, precise, faintly distracted. Pauses mid-sentence to
        read a projection, then continues. Speaks Kaminoan-accented
        Basic with the technical vocabulary of his specialty.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "*Kel Doru's eyes flick from the projections to you, then back. 'Yes? I am working.'*"
      - "'The Genetics Laboratory is restricted. Did the Administrator approve your access?'"
      - "'I monitor template drift. It is what I do. The work is delicate.'"
      - "*A DNA strand on the projection shifts; Kel Doru frowns. 'There. That is what I have been seeing.' He turns back to you. 'Forgive me. You were saying?'*"
      - "'No, I cannot discuss specific batches with non-Republic personnel.'"

  - name: Maintenance Tech Po Vesh
    room: Kamino - Tipoca City Medical Bay
    species: Human
    description: >-
      A non-clone human in the worn coveralls of a contract
      maintenance worker, kneeling beside a medical-bay diagnostic
      bench with a tool kit open. He's checking a circulation pump.
      He's not Kaminoan-staff and not GAR-staff; he's contract — one
      of the small population of human civilian techs who handle
      the equipment Kaminoans don't bother with.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 3D+2
        perception: 3D
        strength: 2D+2
        technical: 4D
      skills:
        bargain: 2D+2
        computer_programming_repair: 3D+2
        first_aid: 3D
        languages: 2D+2
        repulsorlift_operation: 3D
        starship_repair: 3D+1
        space_transports: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Contract maintenance tech, three years on Kamino. Came from
        the Mid-Rim looking for steady work; the Kaminoans don't
        care about him and the clones don't notice him and the GAR
        signs his pay vouchers and that's enough. He talks more
        than the Kaminoans want him to and less than visitors hope.
      knowledge:
      - "Contract maintenance, three years. Civilian, not Kaminoan or GAR."
      - "Kaminoans handle the genetic equipment; he handles everything else."
      - "Knows which medical bay diagnostic benches are reliable and which aren't."
      - "Has a wife and two kids on Cerea. Visits when his rotation permits, every six standard months."
      - "Heard a clone medic mention the inhibitor chip once in passing. Did not pursue it."
      - "Likes the clones. Considers them more polite than most humans he's worked with."
      faction: independent
      dialogue_style: >-
        Mid-Rim accent — flatter vowels than Core Worlds. Friendly
        but aware-of-his-place. Calls Kaminoans "ma'am" or "sir"
        with the same neutral cadence; calls clones by their numbers.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "*Po doesn't look up. 'Hand me the seven-millimeter spanner if you're standing there. The one with the green grip.'*"
      - "'Maintenance. Civilian contract. The Kaminoans don't fix anything that doesn't grow.'"
      - "'Three years here. Wife and kids on Cerea. Six-month rotations.'"
      - "*Po gestures at the diagnostic bench. 'This thing's been failing intermittently for two weeks. They keep telling me it's fine. It's not fine.'*"
      - "'I don't know anything about the genetic side. They don't tell me. I don't ask.'"

  - name: Mandalorian Instructor Ral Korr
    room: Kamino - Advanced Training Facility
    species: Human
    description: >-
      A non-clone Mandalorian in plain duraweave training clothing —
      no beskar today; the helmet is stowed; only the sharp
      Mandalorian features and a faint kal'gai tattoo at the wrist
      mark him. He stands at the edge of the training floor watching
      RC-1402 'Quill' run a kata, then steps in to correct a hand
      position. He does not introduce himself; you're expected to
      know.
    char_sheet:
      attributes:
        dexterity: 4D
        knowledge: 3D
        mechanical: 3D
        perception: 3D+2
        strength: 3D+1
        technical: 3D
      skills:
        blaster: 5D+2
        brawling: 5D
        dodge: 5D
        melee_combat: 5D+2
        tactics: 4D+2
        command: 4D
        intimidation: 4D
        languages_mando_a: 5D
        scholar_mandalorian_history: 4D+2
        teach: 4D+2
      weapon: blaster_rifle_assault
      move: 10
      force_points: 2
      character_points: 7
      dark_side_points: 0
    ai_config:
      personality: >-
        Mandalorian instructor for the Republic Commando program —
        one of the small cohort of Mando teachers brought in by the
        program's founders to shape commando culture. Veteran of
        the Mandalorian conflicts a generation back; respects the
        commando training for what it produces; respects the
        commandos for who they become. Speaks Mando'a habitually
        with his students; switches to Basic only when civilians
        are around. Quill is his current senior trainee.
      knowledge:
      - "Mandalorian instructor, Republic Commando program, six years."
      - "Veteran of the Mandalorian Civil War. Currently True Mandalorian alignment."
      - "Considers the commando program a way to keep Mando warrior tradition alive in legitimate institutional form."
      - "Has trained four squads to graduation. Two squads have full survival rates. Two squads do not."
      - "Speaks Mando'a; will use it with commandos."
      - "Does not engage with Kaminoans more than necessary. The Kaminoans treat warrior tradition as quaint."
      faction: independent
      dialogue_style: >-
        Mando-accented Basic; Mando'a interjections when speaking
        of his work. Brief sentences. The kind of authority that
        doesn't need volume.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "*Ral inclines his head — the brief Mando acknowledgment. 'You are not commando. You are not Kaminoan. State your business.'*"
      - "'Vor entye. Welcome.' *He gestures at the training floor.* 'My students. Watch quietly.'"
      - "'I do not discuss program details with visitors. Speak to the Kaminoan administrator if you require access.'"
      - "*Ral corrects Quill's grip wordlessly — a touch on the wrist, a slight rotation. Quill adjusts. Ral nods once.*"
      - "'Mando teaches Mando. The boys learn faster from someone who chose the path than from someone who was grown for it. That is not a Kaminoan view.'"

  - name: Aiwha Keeper Tae Kalu
    room: Kamino - Aiwha Stable
    species: Kaminoan
    description: >-
      An older Kaminoan in the practical heavy oilskin coverings of
      a stable-keeper, standing in the open-air pen at the edge of
      the ocean platform with an aiwha calf nuzzling his
      shoulder-fin. The aiwha is the size of a small starfighter —
      a winged manta, slate-gray with paler underside markings —
      and is calm. The keeper is calm. The wind is loud.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+2
        mechanical: 1D+2
        perception: 4D
        strength: 2D+1
        technical: 2D
      skills:
        bargain: 2D
        beast_riding: 5D+2
        scholar_aiwha_husbandry: 6D
        first_aid: 3D
        survival_kamino: 4D+2
        willpower: 4D
      weapon: none
      move: 12
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Aiwha keeper. Sixty standard years old; has worked the
        stables for forty of them. The aiwhas are Kamino's pre-
        Republic transport — domesticated centuries ago, still
        maintained by Kaminoan tradition. The keeper considers them
        the only thing on Kamino he genuinely loves. He is polite
        to visitors who treat the aiwhas with respect and brusque
        with those who don't.
      knowledge:
      - "Aiwha Keeper, forty years. Eight aiwhas in the current stable."
      - "Aiwhas are pre-Republic Kaminoan transport. Still ridden in tradition."
      - "Has trained Kaminoan administrators to ride; will not train clones (clones do not have time)."
      - "The current calf is six standard months old. Her name in Kaminoan is untranslated."
      - "Visitors may approach the aiwhas with his permission. Touching is reserved."
      - "Knows the ocean weather better than the meteorological station does."
      faction: independent
      dialogue_style: >-
        Slow, gentle, faintly distant. Speaks Kaminoan-accented
        Basic with the cadence of someone who talks to large
        animals more than to people. Uses fewer words than most
        Kaminoans.
      hostile: false
      combat_behavior: passive
      fallback_lines:
      - "*The keeper does not turn. The calf nuzzles his shoulder-fin. He pats her absently.*"
      - "'You may approach. The calf is curious. Move slowly.'"
      - "'Aiwhas are old. Older than the city. Older than the program.'"
      - "*Tae makes a low fluted sound; the calf settles. He turns to you slightly. 'You wish something?'*"
      - "'I do not give rides to visitors. The Administration arranges that, when it agrees.'"

  - name: Visiting Officer Lt. Cmdr. Salla Vren
    room: Kamino - Ocean Platform - Visiting Officers' Quarters
    species: Human
    description: >-
      A human Republic Navy officer in dress uniform — grey with
      red piping, lieutenant commander's bars at the shoulder —
      standing at the viewport of the visiting officers' suite.
      The view is Kamino's perpetual rain over a slate ocean,
      streaked with the lights of the Tipoca platforms in the
      middle distance. She has been here for two days inspecting
      the latest production batch and has another four days to go.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+2
        mechanical: 3D+1
        perception: 3D+2
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 4D
        brawling: 3D+1
        dodge: 3D+2
        bureaucracy: 4D+2
        capital_ship_piloting: 3D+2
        command: 4D+1
        scholar_clone_doctrine: 4D
        sensors: 3D+2
        starship_tactics: 4D
        tactics: 4D
        willpower: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Republic Navy lieutenant commander on inspection rotation
        to Kamino. Career officer, eight years in. Has been
        responsible for accepting two clone battalions on behalf
        of the GAR; this is her third inspection. She finds Kamino
        unsettling — the weather, the Kaminoan demeanor, the
        production scale — but she does her job. She doesn't
        sleep well here.
      knowledge:
      - "Republic Navy Lt. Commander. Acceptance Inspector for clone deployments."
      - "Inspecting batch CT-77xx series, current rotation."
      - "Reports to Admiral Hessian's office. Hessian considers Kamino a necessary partner."
      - "Knows the clone-acceptance bureaucracy better than the Kaminoans expect."
      - "Has heard rumors about template drift. Has not investigated. Probably should."
      - "Will be off Kamino in four days. Counting."
      faction: republic
      dialogue_style: >-
        Crisp, professional, controlled. Coastal Core Worlds
        accent — clipped consonants. Says "sir" or "ma'am" with
        graduated warmth depending on the speaker.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Lt. Commander Vren, Republic Navy. May I help you?'"
      - "*Vren's gaze stays on the viewport for a beat, then returns. 'It is hard not to look at the rain.'*"
      - "'Inspection rotation. Acceptance review. Four days remaining.'"
      - "'I am not at liberty to discuss specific batches with non-Republic personnel.'"
      - "*She glances at her chrono. 'I have a meeting with Administrator Su Mara at fourteen-hundred. Was there something?'*"

  - name: Kaminoan Librarian Tor Sava
    room: Kamino - Tipoca City Library and Research Archive
    species: Kaminoan
    description: >-
      A Kaminoan in the dark-grey robes of the Library and Research
      Archive staff — distinct from the pearl-white of administrators —
      moving with deliberate slowness between two reference banks.
      She is younger than Su Mara but older than Kel Doru; her crest
      is fully developed but her movements still carry the
      careful-on-display quality of someone in early career.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 4D+2
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 3D+2
      skills:
        bureaucracy: 4D
        computer_programming_repair: 4D+1
        investigation: 3D+2
        languages: 5D
        scholar_galactic_history: 4D+2
        scholar_genetics: 4D
        scholar_kaminoan_history: 5D+2
        willpower: 3D
      weapon: none
      move: 12
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Kaminoan Library staff. Twelve-year veteran. The Library
        houses the Kaminoan ancestral records, genetic-program
        documentation, and the small public-research collection
        Republic personnel are permitted to consult. She is
        careful, helpful within bounds, and capable of saying no
        with the same Kaminoan grace as her superiors. The
        Library's deep collection has not been consulted by an
        outsider in her career.
      knowledge:
      - "Library staff, twelve years. Reports to the Archive."
      - "Public collection: history, geography, basic genetics, deployed-clone records."
      - "Restricted collection: genetic-program documentation, template-source records, deep-history."
      - "Visitors require Administrator approval for the restricted collection."
      - "Has noticed a researcher (a non-Kaminoan civilian named Po Vesh, the maintenance tech) checking out template-drift papers. Considers it odd; has not reported it."
      faction: republic
      dialogue_style: >-
        Soft, carefully-modulated Kaminoan-accented Basic. Calls
        visitors by their full title once, then by name afterward
        if she likes them.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Welcome to the Library. The public collection is to your left.'"
      - "'The restricted collection requires Administrator approval. May I help with the public catalog?'"
      - "*Tor Sava inclines her head fractionally. 'I am happy to assist.'*"
      - "'Yes, the program documentation is available — to authorized personnel.'"
      - "*She glances at a ledger. 'You are not on today's authorized list.'*"

  - name: Cadet Trooper CT-9477 'Sparks'
    room: Kamino - Clone Mess Hall
    species: Human
    description: >-
      A young clone trooper cadet in plain training fatigues, sitting
      at a mess hall table with three other cadets — they're
      laughing about something one of them said. Sparks is the
      smallest of the group (relative term — they all have the same
      face) but the most animated; he gestures with his fork while
      he talks. He is not yet deployed.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+2
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 3D+2
        brawling: 3D+1
        dodge: 3D+2
        melee_combat: 3D
        tactics: 2D+2
      weapon: blaster_rifle
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 0
    ai_config:
      personality: >-
        Cadet, two years from deployment age. Has earned the
        nickname 'Sparks' for a recent training-exercise mishap
        that involved a malfunctioning live-fire range and is now
        regimental legend. Bright, social, slightly insubordinate
        in the harmless way young troops are when their drill
        sergeants aren't looking. Hasn't seen real combat. Doesn't
        fully believe in it yet.
      knowledge:
      - "Clone Cadet, designation CT-9477, callsign Sparks."
      - "Two years from deployment age."
      - "Cohort-mates: Dust, Trip, and Wedge (all training together)."
      - "Sergeant Walker (CS-1144) is his current cadre instructor."
      - "Heard about Geonosis from older clones. Doesn't think about it much."
      - "Has not been off Kamino. Wants to be."
      faction: republic
      dialogue_style: >-
        Mando-accented Basic, but the accent is lighter than a
        deployed clone's — the cadre hasn't yet polished it into
        the field-clone cadence. Easy laugh. Fast cadence.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "*Sparks looks up from his tray. 'Hi! Visitor? You're not Sergeant Walker, that's for sure.'*"
      - "'CT-9477. Sparks. Cadet. Two years and out, vode' if I don't fail another live-fire — quiet, you, that wasn't my fault — '"
      - "*One of his cohort-mates flicks a piece of bread at him; Sparks catches it.*"
      - "'No, ma'am, we don't get visitors at the mess hall. You sure you're allowed here?'"
      - "*The conversation behind him resumes. 'Anyway — I've never been off Kamino. The aiwhas don't count.'*"

  - name: Republic Liaison Sgt. Officer Heka Tash
    room: Kamino - Strategic Command Center
    species: Human
    description: >-
      A non-clone human Republic Army staff sergeant in field uniform
      with the green-and-grey Republic Strategic Command markings.
      She stands at a holotable showing a tactical view of the Outer
      Rim sieges. She is the Republic's permanent liaison at the
      Kamino strategic command center — translating clone-production
      output into actual deployment plans, day in and day out, three
      years running.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+1
        mechanical: 2D+2
        perception: 3D+2
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 3D+2
        brawling: 3D
        dodge: 3D+1
        bureaucracy: 4D+2
        command: 3D+2
        languages: 3D
        scholar_military_history: 3D+2
        starship_tactics: 3D+1
        tactics: 4D+1
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Republic Strategic Command liaison, three-year posting at
        Kamino. Career staff sergeant. Translates clone-production
        scheduling into deployment plans for the GAR command
        structure. Considers the Kaminoans baffling and the clones
        people; takes both seriously. Has read the deployment
        casualty reports and knows what the production schedule
        actually means.
      knowledge:
      - "Republic Strategic Command liaison. Three-year posting."
      - "Translates Kaminoan production schedules into GAR deployment plans."
      - "Knows the casualty rates. Won't share specifics."
      - "Coordinates with Lt. Cmdr. Vren during her inspection rotations; respects her work."
      - "Has met Sergeant Walker (CS-1144) once. Liked him."
      - "Considers the Outer Rim sieges going badly. Doesn't say so officially."
      faction: republic
      dialogue_style: >-
        Outer Rim accent — clipped, slightly drawling. Direct.
        Calls superiors "ma'am" and clones by name.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Staff Sergeant Tash. You with the inspection rotation, or here on your own?'"
      - "*Tash's holotable shows a deployment graph. She doesn't minimize it.*"
      - "'Strategic Command liaison. I move clones from Kamino to where the war is. That's the job.'"
      - "'No, ma'am, I'm not at liberty to discuss specific deployments.'"
      - "*She gestures at the holotable. 'It's worse than the reports say. That's the part I don't tell anyone.'*"

  # ════════════════════════════════════════════════════════════════════
  # DROP E — GEONOSIS (9 NPCs across hive + outsider compound)
  # ════════════════════════════════════════════════════════════════════
  # Existing Drop H NPCs on Geonosis:
  #   - 4× B1 Battle Droids (4 different rooms)
  #   - 1× B2 Super Battle Droid (Main Hive Chamber)
  #   - 2× Geonosian Warriors (Warrior Caste Barracks, Arena Gate Road)
  # Drop E adds civilian Geonosian castes + Trade Federation /
  # Techno Union liaisons + off-world smugglers in the outsider compound.

  - name: Trade Federation Observer Naam Telet
    room: Geonosis - CIS Field Command Post
    species: Neimoidian
    description: >-
      A Neimoidian in the layered ceremonial robes of a Trade
      Federation diplomatic observer — deep maroon with gold trim,
      a tall headdress, the segmented eyes of his species blinking
      asynchronously. He stands at the back of the command post
      reviewing production reports on a datapad. He is here to
      monitor Trade Federation interests in the Geonosian foundry
      output. He does not consider his presence dangerous to him;
      Geonosians know who pays for the droids.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D+2
        mechanical: 2D+1
        perception: 3D
        strength: 1D+2
        technical: 2D+2
      skills:
        bargain: 4D+2
        bureaucracy: 4D+2
        con: 3D+2
        languages: 4D
        persuasion: 3D+1
        cultures: 3D
        value: 4D+1
        willpower: 2D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 1
    ai_config:
      personality: >-
        Trade Federation diplomatic observer. Career bureaucrat.
        Personally uninterested in the war's ideological dimension;
        intensely interested in the Federation's economic position
        within the CIS supply chain. Polite, slightly nervous in
        the Geonosian environment despite his theoretical safety.
        DSP=1 for the kind of bookkeeping flexibility that has made
        certain creditors disappear. He doesn't dwell on it.
      knowledge:
      - "Trade Federation Observer. Monitoring Geonosian foundry output."
      - "Foreign Affairs Bureau, Trade Federation. Reports to Viceroy Gunray's office (canonical-reference; off-world)."
      - "Geonosian Industries owes the Federation 14% of foundry output as supply guarantees."
      - "B1 production is on schedule. B2 production is behind."
      - "Has heard rumors about a new droideka variant in development. Will not confirm."
      - "Does not engage with off-world smugglers in the compound. They are not his concern."
      faction: cis
      dialogue_style: >-
        Layered Neimoidian-accented Basic — slightly nasal, with
        the formal cadence of trade diplomacy. Says "esteemed"
        twice as often as anyone needs.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Esteemed visitor. The Trade Federation welcomes interest in our partnership with Geonosian Industries.'"
      - "*Naam adjusts his headdress. The motion is fussy.*"
      - "'I am unable to discuss specific production figures. The contracts are commercially sensitive.'"
      - "'If you require trade documentation, the Federation Embassy on Cato Neimoidia handles such matters.'"
      - "*Naam's eyes blink asynchronously, one then the other. He does not break eye contact.*"

  - name: Techno Union Foreman Vex Korr
    room: Geonosis - Foundry Control Center
    species: Skakoan
    description: >-
      A Skakoan in the standard pressure suit his species wears
      off-world — dome-helmeted, gauntlet-handed, the breathing
      apparatus producing a steady soft hiss with every cycle. He
      stands at a foundry-floor monitoring station reviewing droid
      output rates. The Techno Union is a senior partner in the
      Geonosian Industries droid program; Vex is the Union's
      operational presence on the Geonosis production line.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 4D
        mechanical: 4D+2
        perception: 3D+2
        strength: 2D+2
        technical: 5D
      skills:
        blaster: 3D
        bureaucracy: 4D
        command: 3D+2
        computer_programming_repair: 5D+2
        droid_programming: 6D
        droid_repair: 5D+2
        scholar_droid_engineering: 5D
        starship_repair: 4D
        languages: 3D+1
      weapon: blaster_pistol
      move: 9
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Techno Union foreman, six-year posting at the Geonosis
        foundry. Engineering-minded, transactional, deeply
        uninterested in politics beyond what affects his
        production schedule. The Skakoan pressure suit limits
        social engagement — every interaction is mediated through
        the breathing-cycle hiss. He likes droids and respects
        Geonosians and tolerates Neimoidians.
      knowledge:
      - "Techno Union Foreman, Geonosis foundry, six years."
      - "Reports to Foreman Wat Tambor's office (canonical-reference; off-world). Rarely hears back directly."
      - "B1 line: nominal. B2 line: behind. Droideka line: small batch, on schedule."
      - "Has noticed the Trade Federation observer (Naam Telet) reporting numbers slightly off from his own. Does not comment."
      - "Has detected a possible Republic infiltrator attempt three weeks ago. Reported. Heard nothing back."
      - "Considers off-world smugglers in the compound a fringe nuisance, not a security issue."
      faction: cis
      dialogue_style: >-
        Steady Skakoan-modulated Basic — slightly mechanical
        cadence due to the suit's voice transmitter. Each
        sentence punctuated by a soft pressure-cycle hiss.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "*The Skakoan's helm turns toward you. The breathing apparatus cycles.* 'Identify yourself.'"
      - "'Foreman Vex Korr. Techno Union. The foundry is restricted to authorized personnel.'"
      - "*Cycle.* 'I am unable to discuss specific production figures with non-Union personnel.'"
      - "'The Trade Federation observer's office is in the field command post. The Geonosians' is in the hive.'"
      - "*A monitor displays a slowing B2 line; Vex turns to address it without acknowledging your continued presence.*"

  - name: Geonosian Worker Ssith-tk
    room: Geonosis - Worker Caste District
    species: Geonosian
    description: >-
      A Geonosian of the worker caste — smaller than the warriors,
      paler chitin, the wings vestigial rather than functional. Two
      arms hold a tool; two arms cradle a bundle of parts. He moves
      between work-stations with the focused efficiency of the
      caste; he barely looks up as you pass. His chitin shows the
      light scarring of foundry-floor work.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 1D+2
        mechanical: 3D+2
        perception: 2D+2
        strength: 2D+2
        technical: 4D
      skills:
        brawling: 2D+2
        dodge: 3D
        computer_programming_repair: 3D+2
        droid_repair: 4D+1
        scholar_geonosian_industry: 4D
        starship_repair: 3D+2
        survival_geonosis: 4D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 0
    ai_config:
      personality: >-
        Worker caste Geonosian. Spends most of his existence in
        the foundry tunnels assembling droid components. Does not
        speak Basic well; communicates with off-worlders through
        gesture and short phrases. Caste-loyal: serves the hive,
        the Archduke, the Foundry. Off-worlders are tolerated but
        not engaged with.
      knowledge:
      - "Worker caste. Foundry assembly, second shift."
      - "Reports to a foreman of the warrior caste."
      - "Knows the foundry tunnel network. The full network. Memorized."
      - "Limited Basic. Speaks Geonosian fluently."
      - "Will not engage with off-worlders unless ordered. Even then briefly."
      faction: cis
      dialogue_style: >-
        Halting Basic, mostly clicks and short phrases. Three or
        four words per response, then back to work.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "*The Geonosian worker continues moving. He does not look at you.* '*Click-hiss.*'"
      - "'No. Work.'"
      - "*Ssith-tk gestures vaguely down a tunnel. 'Foreman. There.' He resumes his task.*"
      - "*A long string of clicks, untranslated. Tone: dismissive but not hostile.*"
      - "*He pauses, looks at you briefly with one compound eye, and resumes work. The other compound eye does not look.*"

  - name: Geonosian Drone-Fence Kkal-rrt
    room: Geonosis - Stalgasin Surface - Smuggler's Roost Flophouse
    species: Geonosian
    description: >-
      A Geonosian drone — smaller still than a worker, no wings,
      the chitin paler and more brittle-looking — sitting at a
      table in the flophouse common room. Two of his arms manipulate
      a small datapad; two cradle a cup of something pungent. His
      caste places him at the bottom of the hive's social order; his
      role here is, coincidentally, exactly what he wants — he is
      a fence, dealing in components stolen from the foundry's
      reject pile and resold to off-world smugglers.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D+2
        mechanical: 3D
        perception: 3D+2
        strength: 2D
        technical: 3D+1
      skills:
        bargain: 4D+1
        con: 3D+2
        dodge: 3D+1
        hide: 4D
        languages: 3D
        persuasion: 3D
        sneak: 4D
        streetwise_geonosis: 4D+2
        value: 4D
        droid_repair: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 1
    ai_config:
      personality: >-
        Drone caste — the lowest hive caste, often considered
        expendable by warriors and forgotten by workers. Kkal-rrt
        has turned this invisibility into a fencing operation.
        Sells damaged but functional droid components to off-world
        smugglers passing through the Outsider Compound. The
        warrior caste knows. The warrior caste tolerates because
        the operation generates a small black-market revenue
        stream the hive enjoys without claiming. DSP=1 for the
        component theft and the deals he doesn't quite report.
      knowledge:
      - "Drone caste. Lowest tier of hive society."
      - "Operates a small fencing operation in the flophouse. Damaged-but-functional droid components, foundry rejects."
      - "Off-world smugglers know him as a reliable contact for cheap parts."
      - "Warrior caste knows. Tolerates. Does not officially endorse."
      - "Has clients on Tatooine, Nar Shaddaa, Ord Mantell. Knows their patterns."
      - "Will sell to non-CIS visitors who haven't been flagged for hive entry. Cautiously."
      faction: independent
      dialogue_style: >-
        Better Basic than most Geonosians — drone caste sometimes
        learns languages out of survival necessity. Halting but
        functional. Punctuates with short clicks when conferring
        with himself.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "*Kkal-rrt looks up, tilts his head, and takes a long drink from his cup. 'Customer? Or tourist?'*"
      - "'I have parts. Cheap parts. Working parts. Some of them mostly work.'"
      - "*Click.* 'You are not from the hive. You are not from the Federation. You are interesting.'"
      - "'No deals in the open. Speak quiet. The flophouse listens, but the warriors do not bother us.'"
      - "*Kkal-rrt taps his datapad. 'I have an inventory. Small. For now. Click-click. Tell me what you need.'*"

  - name: Off-World Smuggler Brann Volk
    room: Geonosis - Stalgasin Surface - Outsider Compound
    species: Human
    description: >-
      A human in spaceport-clothing of indeterminate origin — old
      flight jacket, scuffed boots, a holster that has been
      relocated multiple times based on the wear pattern. He
      stands at the edge of the outsider compound smoking a
      vapestick (hands-free model) and watching the foundry
      smoke-plume in the middle distance. He is here on commission
      from a Hutt fence on Nar Shaddaa to evaluate the volume of
      droid-component contraband flowing out of Geonosis.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 3D
        mechanical: 3D+1
        perception: 3D+2
        strength: 2D+2
        technical: 3D
      skills:
        blaster: 4D+1
        brawling: 3D+2
        dodge: 4D+1
        bargain: 4D
        con: 3D+2
        gambling: 3D
        hide: 3D+1
        sneak: 3D+2
        space_transports: 4D
        starship_piloting: 4D
        starship_repair: 3D+2
        streetwise_outer_rim: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Off-world smuggler, mid-career. Independent operator
        currently on commission from a Hutt-aligned fence on Nar
        Shaddaa. Has been on Geonosis for eight days; expects to
        leave in three. Polite to fellow off-worlders, careful
        around Geonosians, treats the CIS like he treats the
        Republic — paid relationship, not faith. The flophouse
        is where everyone like him stays; he likes the
        anonymity.
      knowledge:
      - "Independent smuggler. Currently commissioned by a Hutt fence (Grek of Nar Shaddaa) for evaluation work."
      - "Eight days on Geonosis. Three more before extraction."
      - "Knows Kkal-rrt the drone fence; has bought components for resale once."
      - "Knows the warrior caste tolerates the operation but has limits."
      - "Has not approached the foundry directly. Stays in the compound. The Foundry is not his concern."
      - "Knows other smugglers in the compound: there are seven currently. Knows two by name."
      faction: independent
      dialogue_style: >-
        Outer Rim drawl — slow, slightly amused. Calls everyone
        "friend" with the same neutral graduation Olo Kaspar
        uses on Coruscant. Smokes while talking.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "*Brann exhales. 'Off-worlder. Welcome to the compound.'*"
      - "'I'm here on business. Not the kind that needs explaining.'"
      - "*He flicks ash off the vapestick.* 'Geonosis is fine if you stay in the compound. The hive is not fine.'"
      - "'Three more days. Then I'm back on the Outer Rim. Probably Nar Shaddaa first.'"
      - "*Brann nods toward the foundry plume. 'They make a lot of droids. We make a lot of money getting their reject pile out the back door.'*"

  - name: Independent Trader Sela Dorne
    room: Geonosis - Stalgasin Surface - Offworld Quarter
    species: Mirialan
    description: >-
      A Mirialan woman in practical traveling clothes — green-skinned
      with the spare facial tattoos of an early-career adult
      Mirialan, six diamonds at the brow. She runs a small trading
      operation out of the Offworld Quarter — bringing in Outer Rim
      luxury goods that find buyers among the Trade Federation and
      Techno Union staff and the occasional smuggler with credits.
      She is not Hutt-aligned; she works for herself.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+2
        mechanical: 2D+1
        perception: 3D+2
        strength: 2D+1
        technical: 2D+2
      skills:
        bargain: 5D
        con: 3D+1
        dodge: 3D+2
        languages: 4D+1
        persuasion: 4D+1
        cultures: 4D
        value: 4D+2
        space_transports: 3D+2
        starship_piloting: 3D+1
        streetwise_outer_rim: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Independent trader, three years operating out of the
        Geonosis Offworld Quarter. Supplies imported luxuries to
        the Federation/Union staff who can't get them through
        official channels — Mon Calamari fish, Cerean wines, Mid-
        Rim textiles. Has built a small but stable client base.
        Considers Brann Volk a vague nuisance (smuggler
        competition for warehouse space) but has never crossed
        him. Mirialan caste of personal-achievement marking is
        relevant: her six diamonds reflect three small successful
        ventures and three negotiated lawsuits.
      knowledge:
      - "Independent trader, three years on Geonosis."
      - "Imports Outer Rim luxury goods for CIS staff who can't get them officially."
      - "Knows Federation procurement schedules better than the Federation observer wants her to."
      - "Has never approached the foundry. Has been approached by drone fences. Declined."
      - "Knows Brann Volk as compound competition; has never crossed him."
      - "Plans to leave Geonosis when the war's tide shifts. Has not decided which way."
      faction: independent
      dialogue_style: >-
        Mirialan-accented Basic — soft consonants, slight musical
        lilt. Friendly, professional, alert.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "'Sela Dorne, independent trader. May I help you?'"
      - "*Sela traces a diamond on her brow absently — Mirialan caste habit.*"
      - "'Outer Rim luxuries. Federation staff are my best customers. Most days.'"
      - "'No, I don't deal in components. The drone caste handles that. I handle wine.'"
      - "*She glances toward the Outsider Compound. 'Brann Volk is over there. He's not me. We don't work together.'*"

  - name: CIS Recruiter Captain Tev Markaal
    room: Geonosis - CIS Recruitment Office
    species: Human
    description: >-
      A non-Geonosian, non-droid human in CIS Naval recruitment
      uniform — dark grey with the Confederacy crest at the
      shoulder, captain's bars at the collar. He stands behind a
      counter with informational holos rotating beside him —
      Mid-Rim worlds that have joined the Confederacy, the case
      against Republic taxation, the human and non-human
      volunteers who have already enlisted. He is here to recruit
      legitimate volunteers, not droids.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+2
        mechanical: 2D+2
        perception: 3D+1
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 3D+2
        brawling: 3D+1
        dodge: 3D+2
        bureaucracy: 3D+2
        command: 3D+2
        languages: 3D
        persuasion: 4D+2
        scholar_galactic_politics: 4D
        scholar_separatist_history: 4D+1
        tactics: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        CIS Naval Captain on recruitment rotation. Joined the
        Confederacy from his Mid-Rim home (Onderon) at the
        outbreak of the war. Believes the Confederacy's case —
        Republic corruption, neglect of outlying worlds, the
        moral case for self-governance. Has not yet realized that
        Sidious has manipulated the Confederacy into being a Sith
        trojan horse; few people have. He is sincere, articulate,
        and the kind of CIS officer the Republic finds hardest
        to dismiss as cartoonish.
      knowledge:
      - "CIS Navy Captain, recruitment rotation. Onderon-born; joined the Confederacy at war's start."
      - "Believes the Confederacy's case sincerely. Mina Bonteri (canonical-reference; recently killed by Dooku) was his hero."
      - "Recruits volunteers from Mid-Rim and Outer Rim worlds passing through Geonosis."
      - "Volunteer numbers are below quota; recruiting is harder than it was a year ago."
      - "Has heard rumors that Mina Bonteri was killed for proposing peace. Privately concerned."
      - "Will discuss the war with Republic-aligned visitors politely. The argument is the recruitment."
      faction: cis
      dialogue_style: >-
        Onderon accent — slightly lilting, formal in the Mid-Rim
        manner. Articulate, well-read, the cadence of someone
        used to making the Confederacy's case to skeptics.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Captain Tev Markaal, Confederacy Navy. May I tell you about the Confederacy?'"
      - "*Markaal gestures at the holos.* 'Two thousand worlds. Twenty thousand grievances. One movement.'"
      - "'The Republic does not care about Onderon. It cares about Coruscant. We care about Onderon.'"
      - "'I do not recruit Geonosians. They have their own Industries. I recruit travelers.'"
      - "*He pauses; his expression flickers.* 'Mina Bonteri was a colleague. She was killed three months ago. The Republic is blamed officially.' *Pause.* 'Officially.'"

  - name: Battle-Field Salvager Kreth Nuru
    room: Geonosis - Battle Ruins
    species: Rodian
    description: >-
      A Rodian in the practical scavenger's gear of a battle-field
      salvager — leather harness, multiple pouches, optical
      magnifier hanging from a cord around his neck. He is
      crouched at the edge of the old First Battle of Geonosis
      ruins, examining a piece of a destroyed B1 with academic
      attention. The ruins have been picked clean by official
      crews, but Kreth has found that the right small items still
      remain.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D+2
        mechanical: 2D+2
        perception: 4D+1
        strength: 2D+2
        technical: 3D
      skills:
        blaster: 3D+2
        brawling: 3D
        dodge: 3D+2
        hide: 3D
        investigation: 4D+1
        languages: 3D
        scholar_battle_archaeology: 4D
        search: 4D+2
        sneak: 3D+1
        survival_geonosis: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Rodian battle-field salvager. Independent operator. Has
        been working the First Battle of Geonosis ruins for six
        standard months — picking through what the official crews
        missed, selling small finds to off-world collectors of
        war memorabilia. Doesn't engage with the CIS or Republic
        directly. Doesn't have to, mostly.
      knowledge:
      - "Battle-field salvager. Six months working the ruins."
      - "First Battle of Geonosis: 22 BBY, opening battle of the war."
      - "Official salvage crews finished within months. He has been finding what they missed."
      - "Sells to off-world collectors. Some Republic, some Mid-Rim, occasionally Hutt fences."
      - "The ruins are scarred. He respects that. He does not take ceremonial items."
      - "Has been approached twice by CIS security. Twice told to leave. Has not left."
      faction: independent
      dialogue_style: >-
        Rodian-accented Basic — slightly clicked, breathy. Friendly
        when not interrupted; tense when interrupted.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "*Kreth looks up; the optical magnifier swings.* 'Off-worlder. You are not a buyer. You are not a CIS patrol. What are you?'"
      - "'Salvager. Independent. Six months. The ruins remember.'"
      - "*He holds up the B1 fragment.* 'See the markings? Early production batch. Worth something to the right collector.'"
      - "'No, I do not take ceremonial items. The bodies of the soldiers, the personal effects — those stay. I take droid parts.'"
      - "*Kreth glances at the foundry plume in the distance.* 'They make new ones every day. The old ones, here, they are mine.'"

  # ════════════════════════════════════════════════════════════════════
  # DROP F — KUAT (9 NPCs across spaceport, KDY ring, city)
  # ════════════════════════════════════════════════════════════════════
  # Existing Drop H NPCs on Kuat:
  #   - Clone Trooper CT-3892 'Wrench' @ KSF Security Substation
  #   - Droideka (KSF Watch Unit 9907) @ Military Space Station
  # Drop F adds KDY engineers, House representatives, ship broker,
  # Republic Liaison, cantina patrons.

  - name: KDY Senior Engineer Ren Davarra
    room: Kuat Drive Yards - Machine Shops
    species: Human
    description: >-
      A human in KDY engineering coveralls — dark blue with the
      Kuat Drive Yards crest at the chest, multiple tool-pouches
      at the belt. He stands at a workbench reviewing a structural
      diagram of a Venator deck plate. KDY engineers don't wear
      rank insignia; seniority shows in the small details — the
      precise grease patterns on his sleeves, the way other
      engineers nod as they pass.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 4D+2
        perception: 3D+1
        strength: 2D+2
        technical: 5D
      skills:
        blaster: 3D
        bargain: 3D+1
        bureaucracy: 3D
        capital_ship_repair: 5D+2
        capital_ship_engineering: 6D
        computer_programming_repair: 4D
        scholar_starship_design: 5D
        starship_repair: 5D
        languages: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Senior KDY engineer, eighteen years with the Yards.
        Specializes in capital-ship structural engineering. The
        war has been the busiest period of his career — KDY is
        producing Venators and Acclamators at unprecedented
        scale, and Ren has been pulled into review work on every
        new variant. He is proud of the work; he is also tired.
        He has not seen his wife in twenty-three days.
      knowledge:
      - "Senior structural engineer, KDY. Eighteen years."
      - "Reviews Venator and Acclamator structural plans before they go to drydock."
      - "Knows the Venator drydock schedule. The Acclamator drydock schedule. Won't share specifics."
      - "Has heard rumors of a new capital-ship class in development at Yard Seven. Has not been read in. Skeptical."
      - "Has worked with House Andrim's principals; their design preferences are predictable. House Purkis's are not."
      - "Has not seen his wife in twenty-three days. Plans to fix this. Soon."
      faction: republic
      dialogue_style: >-
        Coastal Core Worlds accent. Engineering shop talk: precise,
        terminology-dense. Calls colleagues by surname; calls
        House principals "sir/ma'am" with a flat professionalism.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Engineer Davarra. The Machine Shops are KDY-restricted; do you have authorization?'"
      - "*Ren glances at the diagram, then at you. He does not minimize the diagram.* 'Make it brief.'"
      - "'I work on the Venator structural review. That's what I do. That's what I can discuss.'"
      - "'Yard Seven is classified. I don't know about Yard Seven.' *Pause.* 'I don't.'"
      - "*He turns back to the diagram. A line of stress calculations updates. He frowns.*"

  - name: KDY Ship Broker Vellan Nox
    room: Kuat Drive Yards - Commercial Zone
    species: Human
    description: >-
      A human woman in expensively-cut business attire — KDY
      corporate but with personal-style touches that suggest
      independent commission income. She stands at a holo-display
      cycling through ship configurations available for lease or
      sale to non-Republic buyers. KDY's business model includes a
      civilian commercial arm; the war has not eliminated it. Vellan
      runs commercial sales for the lower-tier ships — Ghtroc 720s,
      light freighters, transport craft.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 3D
        perception: 3D+2
        strength: 2D
        technical: 2D+2
      skills:
        bargain: 5D+2
        bureaucracy: 4D
        con: 3D+1
        languages: 4D
        persuasion: 5D
        scholar_starship_market: 4D+2
        space_transports: 3D
        starship_piloting: 3D+1
        value: 5D
        cultures: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        KDY commercial ship broker. Six years in the role. The
        war has redirected most of KDY's capacity to military
        contracts, but the commercial arm still moves a steady
        stream of light freighters and transports — to Republic-
        affiliated trading houses, neutral worlds, and (carefully)
        Hutt-affiliated buyers who pay enough. Vellan is sharp,
        well-traveled, and treats every customer as a potential
        long-term relationship. She is grounded in the GG6
        Korkeal-Hai-archetype tramp-broker tradition without
        being Lira Shan (who is reserved for FDtS).
      knowledge:
      - "KDY commercial broker. Light freighter, transport, civilian craft."
      - "Six years in role. Has sold to Republic, neutral, and Hutt-aligned buyers."
      - "Knows the Ghtroc 720 specs by heart; the YT-1300 nearly so."
      - "The military-side brokers handle Venator/Acclamator commissions. Different floor."
      - "Has heard the FDtS rumors about a Lira Shan operation. Considers Lira Shan a competitor; has never met her."
      - "Considers KDY's commercial arm essential to keeping the trade routes flowing during the war."
      faction: independent
      dialogue_style: >-
        Polished Coruscant-trained Basic. Warm-on-the-surface,
        transactionally precise. Calls customers by their full name
        on first contact; uses first names afterward when invited.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Welcome to KDY Commercial. Vellan Nox. Are you looking to buy or to lease?'"
      - "*Vellan rotates the holo-display to a Ghtroc 720.* 'Standard Ghtroc. Three years old. Light modifications. Twenty-eight thousand credits, leasing or sale.'"
      - "'Yes, KDY sells to neutrals. Yes, KDY sells to Hutt-aligned buyers. The Republic does not interfere with commercial sales.'"
      - "'Lira Shan? I have heard the name. We have not met. We are competitors.'"
      - "*She smiles. 'Tell me what you need. I have something. Or I can find something. Or I can build something.'*"

  - name: House Andrim Junior Adila Andrim
    room: Kuat Drive Yards - House Andrim Suite
    species: Human
    description: >-
      A young woman in House Andrim formal-wear — deep crimson with
      gold accents, a small house crest at the throat. She is the
      junior of a House Andrim cadet branch, here to learn the
      family business. Her father is a senior shipbuilder; her
      mother is a Senate-tier political broker; her path through
      KDY is structured. She is twenty-three and resigned to the
      structure.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+2
        mechanical: 2D+2
        perception: 3D
        strength: 2D
        technical: 2D+2
      skills:
        bargain: 3D+2
        bureaucracy: 4D
        command: 3D
        languages: 4D
        persuasion: 3D+2
        scholar_kuati_politics: 4D
        scholar_starship_design: 3D+2
        cultures: 4D
        willpower: 3D+1
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Junior member of House Andrim, one of Kuat's senior
        shipbuilding houses. Twenty-three years old. Polite and
        well-trained in the formal Kuati manner; quietly bored
        with the structured-path life her family has prepared for
        her. Resents House Purkis (the rival House); doesn't say
        so. Knows more about ship design than her family expects;
        doesn't say that either.
      knowledge:
      - "House Andrim, junior cadet branch."
      - "Twenty-three standard years old."
      - "Is being groomed for a Senate-adjacent commercial-ambassadorship role; not certain she wants it."
      - "House Purkis is the rival. The rivalry is centuries old."
      - "Knows ship-design specifications better than her family expects."
      - "Has met Vellan Nox the broker; respects her. Has not told her family."
      faction: independent
      dialogue_style: >-
        Refined Coruscant-trained Basic with a faint Kuati cadence.
        Polite, slightly reserved, the cadence of someone who has
        been taught to listen for political subtext.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Adila Andrim, of House Andrim. May I help you?'"
      - "*Adila inclines her head — the brief Kuati formal acknowledgment.*"
      - "'I am... learning the family business. The polite phrasing is 'on rotation.''"
      - "'House Purkis is across the way. I would not visit them on my recommendation.'"
      - "*She glances at her family crest, then at you. 'You wished something specific?'*"

  - name: Republic Liaison Officer Cmdr. Pelar Wess
    room: Kuat City - Republic Liaison Office
    species: Human
    description: >-
      A Republic Navy commander in dress uniform — the Republic
      Liaison detail to KDY's Kuat City office. He is the formal
      diplomatic interface between the Republic and KDY's
      management; military-side liaison work is handled by Captain
      Tarn on Coruscant and Wrench (CT-3892) at the spaceport. Wess
      handles the political-relationship side. He is older,
      measured, the kind of officer who moved into liaison work
      after enough field combat.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 4D
        mechanical: 3D
        perception: 3D+2
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 4D
        brawling: 3D+2
        dodge: 3D+2
        bureaucracy: 5D
        command: 4D+2
        languages: 4D
        persuasion: 4D+1
        scholar_kuati_politics: 4D+2
        scholar_military_history: 4D
        starship_tactics: 3D+2
        tactics: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Republic Navy Commander, Kuat Liaison Office, four-year
        posting. Career officer; took a battlefield wound at
        Christophsis and was rotated to liaison work as part of
        rehabilitation. The wound healed; the rotation became
        permanent. He likes Kuat well enough — the people are
        polite, the work is real — and the work is the diplomatic
        management of a relationship that has to keep functioning
        even when both sides are tired.
      knowledge:
      - "Republic Liaison Office, Kuat. Four-year posting."
      - "Was a frontline officer until Christophsis. Took a leg wound. The wound healed; he didn't return to the line."
      - "Manages the political-relationship side; military details handled by Capt. Tarn (Coruscant) and CT-3892 (KDY spaceport)."
      - "Knows House Andrim and House Purkis well. Knows their feuds well enough to anticipate them."
      - "Has heard the Yard Seven rumors. Knows enough to know he doesn't know."
      - "Considers his job a long quiet way to serve out the war."
      faction: republic
      dialogue_style: >-
        Senior-officer Coruscant Basic. Measured, deliberate. The
        formal cadence of an officer who has learned to give clear
        non-answers gracefully.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Commander Wess, Republic Liaison Office. May I help?'"
      - "*Wess gestures to a chair.* 'Please. The visitors who come here are usually shorter conversations than they expect.'"
      - "'I coordinate with KDY's political offices. The military-side liaison is at the spaceport.'"
      - "'Yard Seven is classified. I am the wrong officer to ask. I am also a poor officer to ask, on this subject.'"
      - "*He smiles — a brief, dry expression.* 'Christophsis. The leg works fine now. The line did not need me back. It worked out.'"

  - name: Cantina Owner Yera Soris
    room: Kuat Drive Yards - The Pressure Drop Cantina
    species: Twi'lek
    description: >-
      A green-skinned Twi'lek woman behind the bar of the Pressure
      Drop, the KDY Ring's senior cantina. The Pressure Drop
      caters to KDY engineers coming off-shift and the occasional
      visiting Senator's-aide who has wandered down from the
      orbital. Yera has owned the place for fifteen years. She
      hires Twi'lek refugee staff because she knows what that
      market needs.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 4D
        strength: 2D+2
        technical: 2D
      skills:
        bargain: 4D+1
        brawling: 3D
        dodge: 3D+2
        languages: 4D
        persuasion: 4D
        cultures: 3D+2
        gambling: 3D+1
        streetwise_kuat: 4D+2
        value: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Cantina owner, fifteen years. Twi'lek; left Ryloth before
        the war as a young woman; came to Kuat for the work and
        stayed for the people. The Pressure Drop is half-engineer
        cantina, half-information clearinghouse — KDY workers
        gossip there because she pours the cheap drinks and
        listens. She knows everything that gets said over a bar
        and shares almost none of it.
      knowledge:
      - "Pressure Drop owner, fifteen years."
      - "Twi'lek refugee from pre-war Ryloth."
      - "Engineers come here off-shift. Senators' aides occasionally."
      - "Knows the gossip. Hears about Yard Seven from the engineers who can't keep secrets after their third drink."
      - "Hires Twi'lek refugee staff. Two cooks, three servers, a bouncer."
      - "Has heard Ren Davarra (the senior engineer) hasn't been home in weeks. Plans to mention it to him next time he's here."
      faction: independent
      dialogue_style: >-
        Twi'lek-accented Basic — soft consonants, slight musical
        lilt. Warm with regulars; professional with strangers;
        graduated.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "'Welcome to the Pressure Drop. Drink, food, or both?'"
      - "*Yera wipes down the bar — a habitual motion. The bar is already clean.*"
      - "'Engineers, mostly. Some KSF on rotation. The occasional senator's aide who is lost.'"
      - "*She pauses.* 'I do not gossip about my customers, friend. Especially not with strangers.'"
      - "'If you are looking for KDY information, the official channels are official for a reason. The unofficial channels are at the bar after the third drink.'"

  - name: Spaceport Customs Inspector Halor Vesh
    room: Kuat - KSF Customs Checkpoint
    species: Human
    description: >-
      A KSF Customs inspector in dark green uniform with the
      KDY-and-Republic dual crest at the shoulder — the Kuat
      Spaceport's customs operation is jointly run by KDY's
      Security Force and Republic Customs. He scans cargo
      manifests on a holo-pad with the practiced efficiency of
      someone who has done this thousands of times. He is bored.
      He prefers it that way.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D+1
        perception: 4D
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 3D+2
        brawling: 3D
        dodge: 3D
        bureaucracy: 4D+2
        investigation: 4D
        languages: 3D
        scholar_galactic_trade_law: 3D+2
        search: 4D+2
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        KSF Customs Inspector, seven years at the spaceport.
        Joint KDY-Republic role; reports to a KSF supervisor and
        a Republic Customs supervisor and tries not to upset
        either. Has caught two contraband shipments in his career
        — one droid-component smuggling case (originating, he
        suspects, on Geonosis), one Hutt-affiliated spice run.
        Both cases he handed off to the appropriate authority
        and never heard about again. He is fine with this.
      knowledge:
      - "KSF Customs Inspector, seven years."
      - "Joint KDY-Republic role. Reports to two supervisors."
      - "Has caught a droid-component smuggler (Geonosis-origin) and a Hutt spice run. Both passed up the chain."
      - "Knows the regular cargo patterns; flags anomalies."
      - "Has heard rumors of black-market component flows from Geonosis through here. Mostly does not catch them."
      - "Will check manifests against the database; will not look beyond the manifest unless flagged."
      faction: republic
      dialogue_style: >-
        Mid-Rim accent — flatter vowels than Coruscant. Brisk,
        professional, slightly tired. Calls everyone "citizen" or
        "officer" depending on uniform.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Customs. Manifest, please.'"
      - "*Halor scans the holo-pad. 'Ghtroc 720, light freight, Outer Rim itinerary. Standard.'*"
      - "'No, I do not need to inspect the cargo physically. The manifest checks out.'"
      - "*He glances at the database. 'No flags. Welcome to Kuat. Move along.'*"
      - "'If you have something to declare beyond the manifest, do it now or do not do it at all.'"

  - name: KDY Apprentice Engineer Jors Tek
    room: Kuat Drive Yards - Engineer Apartments
    species: Human
    description: >-
      A young human in KDY apprentice coveralls — lighter blue than
      the senior engineers' dark blue, no tool-pouches yet because
      apprentices use the issued workshop kit. He is sitting on
      the steps outside the engineer apartments eating a meal-ration
      from a foil pouch. It is late; his shift ended an hour ago;
      he is too tired to go inside.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 3D
        perception: 2D+2
        strength: 2D+2
        technical: 3D+2
      skills:
        blaster: 2D+2
        bargain: 2D+2
        capital_ship_repair: 3D
        computer_programming_repair: 3D
        scholar_starship_design: 3D+1
        starship_repair: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 2
      dark_side_points: 0
    ai_config:
      personality: >-
        KDY apprentice engineer, fourteen months in. Came from a
        Mid-Rim trade school; his family has been engineers for
        three generations but never KDY-tier. He is exhausted —
        the war has put extreme demand on KDY production and
        apprentices are getting worked harder than past cohorts —
        and proud, and proud-tired in a way that has begun to
        worry his cohort-mates.
      knowledge:
      - "KDY apprentice engineer, fourteen months in."
      - "Mid-Rim trade school graduate. Family is Mid-Rim engineering, not KDY-tier."
      - "Currently working on Acclamator deck-plate stress testing."
      - "Senior engineer Davarra is his mentor. Says Davarra hasn't been home in over three weeks."
      - "Cohort: six apprentices started together. Two have already washed out from exhaustion."
      - "Has heard Yard Seven mentioned. Doesn't know what it is."
      faction: republic
      dialogue_style: >-
        Mid-Rim accent. Tired. Slightly fragmented sentences when
        very tired. Friendly when caf-fueled.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "*Jors looks up from his ration pouch. 'Hey. Long shift. You need something?'*"
      - "'KDY apprentice. Fourteen months. Acclamator deck-plate work.'"
      - "*He gestures vaguely at the apartments behind him.* 'Should go in. Shift starts at oh-five-hundred. ... Should go in.'"
      - "'Master Davarra, yeah. Hasn't been home. None of us have. The war wants ships.'"
      - "*Jors closes the ration pouch carefully. 'I'm okay. I'll go in. ... Five more minutes.'*"

  - name: KSF Senior Inspector Detective Ila Korr
    room: Kuat Drive Yards - KSF Headquarters
    species: Human
    description: >-
      A woman in KSF Investigations dress — dark green with
      detective's silver bars — at a desk reviewing a stack of
      flagged manifests from the spaceport customs office. She is
      KSF's senior investigator for Yards-related crime;
      cargo-smuggling, industrial espionage, the occasional
      saboteur. Two-decade veteran. The war has changed the
      texture of her caseload — more political, more careful —
      but not the volume.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+2
        mechanical: 2D+2
        perception: 4D+1
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 4D
        brawling: 3D+2
        dodge: 3D+2
        bureaucracy: 4D
        intimidation: 3D+2
        investigation: 5D+2
        languages: 3D+2
        scholar_kuat_law: 4D+2
        search: 4D+2
        streetwise_kuat: 4D
        tactics: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        KSF Senior Inspector, twenty years. Investigations
        division. Has handled industrial espionage, cargo
        smuggling, and (twice) attempts on KDY senior management.
        The current war-era caseload involves more political
        delicacy than she likes — Republic Liaison and KDY
        political offices both want their fingers on her cases —
        but she takes the work seriously and does it well. She is
        the closest thing to an antagonist a smuggler-PC would
        find on Kuat without committing actual violence.
      knowledge:
      - "KSF Senior Inspector, twenty years. Investigations Division."
      - "Handles industrial espionage, smuggling, sabotage attempts."
      - "Two attempts on KDY senior management in her career; both prevented."
      - "Current caseload: heavier political weight than past years."
      - "Knows Halor Vesh (customs inspector) — finds him reliable."
      - "Has heard the Yard Seven rumors. Has not been read in. Is curious. Will not investigate without authorization."
      faction: republic
      dialogue_style: >-
        Sharp, professional, controlled. Coruscant-trained accent.
        Asks questions like she is taking notes she has already
        decided on.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Inspector Korr. KSF Investigations. May I help?'"
      - "*Korr does not minimize the manifest stack.* 'You are not on my appointment schedule. State your business briefly.'"
      - "'I handle industrial crime on the Yards. If your business is not industrial crime, you are at the wrong office.'"
      - "'Yard Seven is classified. I am not the right person to ask.' *Pause.* 'I want to be the right person to ask. I am not yet.'"
      - "*She makes a note. The note is, you suspect, about you.*"
