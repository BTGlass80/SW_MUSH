# data/worlds/clone_wars/starships.yaml
# Clone Wars Era — CW-Exclusive Ship Templates
# Schema version 1
#
# This file is ADDITIVE to the global data/starships.yaml. It contains
# only ships that are CW-era specific — ships that did not exist in 20 BBY
# (X-Wing, A-Wing, B-Wing, TIE Fighter/Interceptor/Bomber, Lambda Shuttle,
# Sentinel Shuttle, Nebulon-B, Imperial Star Destroyer) stay out of the CW
# era's effective registry; ships that ARE era-agnostic (YT-1300, Ghtroc 720,
# YT-2400, Y-Wing, Z-95, Firespray, Corellian Corvette) are sourced from
# the global file unchanged.
#
# When the F.X Space Pivot drop lands, the engine ship registry will merge
# global + era-specific YAMLs with this precedence:
#   1. Era-specific (this file) wins on key collision
#   2. Era-agnostic global file fills in the rest
#   3. Era's `excluded_templates` list (in era.yaml) blocks the global
#      file's post-CW ships from registering
#
# Until that lands, this file is inert at runtime.
#
# Schema (must match data/starships.yaml entries):
#   name, nickname, scale, hull, shields, speed, maneuverability,
#   crew, passengers, cargo, consumables, hyperdrive, hyperdrive_backup,
#   cost, mod_slots, reactor_power, weapons[]
#
# Stat sources: WEG D6 R&E core values where available; consensus
# fan-converted values (Saga Edition / WotC d20 conversions) where WEG
# never published the ship. Balance check: each entry was sized against
# the closest existing data/starships.yaml entry to keep the same
# scale-relative power curve.
#
# 14 templates total: 7 Republic, 7 CIS.

