# When the engine ship registry merges global + era YAMLs, these notes
# inform the merge logic. None of these are strict requirements — they
# document author intent.

registry_hints:
  era_specific_keys:
    - venator
    - acclamator
    - consular_cruiser
    - arc_170
    - v_19_torrent
    - eta_2_actis
    - laat_gunship
    - lucrehulk
    - munificent
    - recusant
    - vulture_droid
    - hyena_bomber
    - tri_fighter
    - sheathipede
  era_agnostic_global_keys_in_use:
    # Ships from data/starships.yaml that ARE valid in 20 BBY and should
    # remain registered in CW. The era-specific file does NOT redefine them.
    - yt_1300
    - yt1300
    - ghtroc_720
    - yt_2400
    - y_wing
    - z_95
    - z95
    - firespray
    - corellian_corvette
  excluded_global_keys:
    # Ships from data/starships.yaml that did NOT exist in 20 BBY and
