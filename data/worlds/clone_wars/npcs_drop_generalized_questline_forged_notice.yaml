# Generalized Questline Drop — "The Forged Notice" (T3.24 seventh slice, 2026-06-26)
#
# The SEVENTH accessible (non-t5, non-tutorial) `kind: questline` chain, after
# "The Ghost Shipment" (nar_freight_ghost_shipment, Nar Shaddaa), "The Crooked
# Wheel" (mos_eisley_crooked_wheel, Tatooine/Mos Eisley), "The Lost Courier"
# (coruscant_lower_lost_courier, Coruscant LOWER city), "The Skimmed Line"
# (kuat_ring_skimmed_line, Kuat ring), "The Dust-Sick" (jundland_dust_sick,
# Tatooine wilderness), and "The False Provenance" (coruscant_petrax_false_
# provenance, Coruscant cultural district). It reuses the SAME live questline
# engine (engine/tutorial_chains.py + chain_events.py: the `kind: questline`
# type + `active_questline` slot, the existing event types, the four reward
# funnels) with NO new engine code, no new slot, no new event type, no schema
# migration, no new reward faucet, and NO map-coordinate or exit-graph change —
# the sanctioned right-of-launch widening per quest_expansion_postlaunch_path_v1
# .md (T3.24): author MORE questlines on the proven pattern.
#
# Two firsts for the accessible-questline arc:
#   1. A SEVENTH distinct skill spread — FORGERY + BUREAUCRACY (vs
#      search+streetwise on the Ghost Shipment, investigation+gambling on the
#      Crooked Wheel, persuasion+sneak on the Lost Courier, security+bargain on
#      the Skimmed Line, first_aid+survival on the Dust-Sick, value+con on the
#      False Provenance). The seven accessible questlines now each teach distinct
#      play, and this is the first to lead with the counterfeiter's eye (spotting
#      a forged document for what it is) and the bureaucrat's hand (out-papering a
#      corrupt registry on its own ground) — the two skills the combat, social,
#      technical, wilderness, and appraisal arcs never exercise.
#   2. A return to NAR SHADDAA — the smuggler's-moon setting of the Ghost
#      Shipment, but a DIFFERENT face of it: the upper docks and the freight
#      registry rather than the Burning Deck cantina and the Undercity. It
#      reuses NONE of the Ghost Shipment's rooms (that arc ran burning_deck_
#      cantina / nar_shaddaa_bay_aurek / floating_market / undercity_depths;
#      this one runs upper_dock_observation / westport_arrivals /
#      smugglers_guild_hall / enforcer_alley). It touches NO map coordinate or
#      world exit graph — the rooms already exist and are loaded
#      (planets/nar_shaddaa.yaml); only NPCs + a chains.yaml entry + an
#      achievement are added.
#
# It is also a new STORY SHAPE: a property-seizure racket beaten by paperwork —
# not a smuggling-trace, a racket-bust, a kidnap-rescue, an industrial-theft
# clear-the-innocent, a frontier rescue, or an art-fraud caper. A corrupt Nar
# Shaddaa port factor runs a seize-and-sell scheme: he forges abandonment
# notices against berthed ships whose owners can't fight the registry, has them
# legally condemned as derelict, and sells the hulls off-moon for a cut. Captain
# Cassa Brel's freighter, the Cinder Run, has been tagged — a flawless forged
# derelict-notice mag-clamped to her hull, a seizure crew mustering within the
# hour, and a registry desk the factor owns. You examine the notice and prove it
# a forgery (forgery), out-paper the factor by filing an emergency title-hold
# through the Smugglers' Guild registry before the crew moves (bureaucracy),
# stop the factor's enforcer where he is mustering the seizure crew to march on
# the berth (attack/dodge), and carry the cleared title back to the captain.
#
# Premise: Cassa Brel, an honest Corellian freighter captain working freelance
# runs out of Nar Shaddaa, returned from a haul to find her berthed ship
# condemned on an abandonment notice she never triggered — the work of a port
# factor (narrated as "Factor Hask") who has quietly built a seize-and-sell
# racket on forged derelict paperwork. The notice is a forgery, but it carries a
# registry authority-seal good enough to seize a ship, and the factor controls
# the desk that would hear an appeal. Prove the notice forged, file a hold the
# factor can't quash, and stop the seizure crew before it reaches the Cinder Run.
#
# These NPCs back the `nar_shaddaa_forged_notice` questline in
# data/worlds/clone_wars/tutorials/chains.yaml:
#   * Cassa Brel   — the freighter captain who offers + closes the quest
#                    (step-1 npc = the questline's start-NPC, per
#                    get_questline_offer). She keeps a worried watch over her
#                    clamped ship from the Upper Dock Observation Level.
#                    Step-1 + step-5 NPC.
#   * Varn Tesk    — the combat-step enforcer (ai_config.chain_enemy_template
#                    nar_forged_notice_enforcer; the step-4 combat_won foil),
#                    the factor's hired muscle mustering the seizure crew in
#                    Enforcer Alley to march on the berth.
# The port factor (narrated as "Factor Hask"), the seizure crew at his back, the
# forged derelict-notice itself, and the freighter Cinder Run are NARRATED ONLY
# — story beats carried in the prose, NOT spawned NPC entities (the off-screen
# swindler and the ship need no producer, the way the prior questlines'
# off-screen principals are carried). Only the giver and the single combat foil
# are real placed NPCs.
#
# Original characters, era-clean ~20 BBY, WEG R&E D6 stats. No canon figures.
# Provenance: Human/Corellian (the galaxy's most common freelance spacer stock,
# wholly era-clean and faction-neutral — Corellians crowd Nar Shaddaa's Corellian
# Sector) and Weequay (a long-settled, faction-neutral species, a fixture of
# Hutt-space muscle well before the Clone Wars) are both era-clean and not
# war-faction coded. Stats matched to the shipped accessible-questline bands —
# the giver to the non-combat fixer band (Yelza Korrin / Dorae Vint / Sashi
# Renko / Dav Nuro / Soree Bann / Hessa Veil), the enforcer to the small-time-
# criminal antagonist band (Brakkis Vone / Gorvahn Brusk / Skarn Vex / Suro Vant
# / Vohrek Sarn / Brask Yade): a real fight, beatable by a fresh post-chargen
# character. WEG40120 PDF is local-only (gitignored) and absent in this tree;
# the bands are cited against the in-repo reference NPCs, not re-derived.

schema_version: 1

npcs:

  # ═══════════════════════════════════════════════════════════════════
  # The freighter captain — Cassa Brel (questline GIVER + closer)
  # Questline: nar_shaddaa_forged_notice ("The Forged Notice")
  # Placement: Nar Shaddaa - Upper Dock Observation Level
  #            (upper_dock_observation, zone nar_shaddaa_promenade).
  #            Step-1 + step-5 NPC.
  # NOTE: a working captain watching her own seized ship from the only
  # vantage the factor's crew hasn't barred her from — NOT one of the
  # observation deck's idle spacer-watchers. Distinct presence, same room.
  # ═══════════════════════════════════════════════════════════════════

  - name: Cassa Brel
    room: "Nar Shaddaa - Upper Dock Observation Level"
    species: Human
    description: >-
      A weathered Corellian freighter captain in a worn flight jacket gone soft
      at the elbows, her hands flexing at the observation rail as she watches a
      ship two levels down that she is no longer allowed to board. The Cinder Run
      is hers — bought outright, flown clean, never once abandoned — and a port
      factor's forged derelict-notice now hangs mag-clamped to its hull, the seal
      official enough to condemn it and sell it off-moon for a cut. She has flown
      cargo through worse than this and kept her temper; what she cannot do,
      alone and barred from the registry desk the factor owns, is prove on paper
      what she knows in her bones — that the notice is a fake and the seizure is
      a theft dressed as procedure. She is looking for someone with a sharp eye
      for a forged document and the patience to beat a crooked clerk at his own
      forms, before the crew comes to take her ship.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 3D+1
        perception: 2D+2
        strength: 2D
        technical: 2D+1
      skills:
        space_transports: 4D+1
        astrogation: 3D+2
        bureaucracy: 3D+2
        streetwise: 3D+1
        bargain: 3D
        con: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        A level, hard-luck working captain — competent, unsentimental, and slow
        to anger until someone tries to steal what she earned, at which point she
        goes very quiet and very stubborn. She knows ships and ports and the
        thousand small frauds of dock life, but she is no forger and no
        bureaucrat, and the factor has counted on exactly that in every captain
        he has robbed before her. Practical, plain-spoken, and quietly desperate
        under the calm; she pays a fair finder's fee out of the run's reserve
        because a cleared title is worth more to her than the credits, and a ship
        is worth more than both.
      knowledge:
        - "She is Cassa Brel, an independent Corellian freighter captain; she came back from a haul to find her ship, the Cinder Run, condemned on a derelict-notice she never triggered, mag-clamped to its own hull and good enough to seize it."
        - "A port factor — she names him as Factor Hask — runs a seize-and-sell racket on forged abandonment paperwork: he tags a berthed ship whose owner can't fight the registry, condemns it as derelict, and sells the hull off-moon for a cut; he controls the desk that hears appeals, so the fraud has never been made to show."
        - "The notice carries a registry authority-seal good enough to condemn a ship, but it is a forgery — and a forged seal proven false voids the seizure; what she cannot do, barred from the desk and no forger herself, is prove it and file the hold before the crew moves."
        - "A seizure crew is mustering within the hour to take the Cinder Run; the only way to stop it is to prove the notice forged, file an emergency title-hold through the Smugglers' Guild registry the factor cannot quietly quash, and keep his enforcer off the berth until the hold stamps."
      faction: independent
      dialogue_style: >-
        Plain Corellian spacer's diction, dry and direct, spare with complaint
        and exact about ships, ports, and paperwork. Talks like someone who has
        argued with a hundred dock clerks and lost to exactly one.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'The Cinder Run isn't derelict. I flew her in here myself. That notice on her hull is a forgery with a good seal, and the factor who hung it owns the desk I'd appeal to. That's the whole trap.'"
        - "*Cassa Brel grips the observation rail and watches her clamped ship two levels down, jaw set, saying nothing she can't prove.*"
        - "'Prove the notice is a fake, file a hold the factor can't bury, and keep his crew off my berth till it stamps. Do that and the run's reserve is yours — a fair fee, honestly paid. Just get my ship back.'"

  # ── Questline antagonist: Varn Tesk (combat step 4) ─────────────────
  # Single hostile instance in Enforcer Alley. Matches the
  # nar_shaddaa_forged_notice step-4 combat_won enemy_template.

  - name: Varn Tesk
    room: "Nar Shaddaa - Enforcer Alley"
    species: Weequay
    description: >-
      A broad, leather-skinned Weequay in a dock-crew's heavy coat, the seizure
      writ rolled in one fist and a blaster riding easy on his hip, mustering a
      handful of hired hands in the alley mouth before they march on the upper
      berths. He works the factor's dirty end — the part where a forged notice
      stops being paperwork and becomes a crew that comes to take a ship whether
      its owner agrees or not — and he has cleared a dozen berths this way without
      a hull-owner ever landing a complaint that stuck. The writ in his fist names
      the Cinder Run; his crew is half-assembled and the captain has no standing
      to stop them. When a stranger plants themselves in the alley between him and
      that berth, the Weequay's bored efficiency curdles into something flat and
      certain: the writ gets served, the ship gets cleared, and anyone in the
      lane is in the way of an honest day's seizing.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+2
        strength: 3D+1
        technical: 2D
      skills:
        blaster: 4D
        brawling: 4D+1
        dodge: 3D+2
        melee_combat: 3D+1
        intimidation: 4D
        streetwise: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      chain_enemy_template: nar_forged_notice_enforcer
      personality: >-
        A career dock-enforcer for hire, unbothered and incurious about whose
        ship he is taking or why the paper says he can, then immediately and
        coldly violent when the seizure is blocked. He would rather serve the
        writ and clear the berth without a scene than fight, but his pay rides on
        the hull changing hands and his standing on never backing down in his own
        alley — he will draw on anyone who plants themselves between him and the
        berth. Combat foil for the questline's confrontation beat.
      knowledge:
        - "He is muscle hired by a port factor to serve forged derelict-notices and clear the condemned berths; he does not know or care that the paperwork is faked — only that the writ names a ship, the crew takes it, and he gets paid."
        - "The seizure crew is half-mustered and the captain has no standing to stop them; anyone blocking the alley is between him and his pay, and he will gun them down in the lane to keep the schedule and his name in this sector."
      faction: criminal
      dialogue_style: >-
        Flat, unhurried, contemptuous. Names the writ once, tells you to clear
        the lane, and after that lets the blaster settle the schedule.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'Writ's good, the berth's condemned, and you're standing in a working alley. Whatever the captain promised you, it doesn't cover a seizure crew. Clear the lane.'"
        - "*Varn Tesk passes the rolled writ to a crewman and squares into the alley mouth, one leathery hand dropping to the blaster on his hip.*"
        - "'I don't read the paper, I serve it. The Cinder Run gets cleared today. Last time — out of the lane.'"
