# data/worlds/clone_wars/npcs_drop_mob_grind_geonosis_foundries_expansion.yaml
#
# Geonosis Foundries Expansion — Hostile Mob Grind (2026-06-22)
#
# Six roaming hostile NPCs filling the five previously-uncovered
# geonosis_foundries zone rooms and the E'Y-Akh Desert Edge (geonosis_ey_akh),
# extending the solo-PvE mob-grind reward loop (engine/hunting_rewards.py).
#
# Complements:
#   npcs_drop_mob_grind_geonosis.yaml         (Droid Staging Ground, Foundry
#     Upper Level, B2 Assembly, Deep Hive Tunnel, Upper Hive Tunnel,
#     CIS Field Command Post)
#   npcs_drop_mob_grind_geonosis_foundry.yaml (Foundry Main Floor,
#     Control Center, Secondary Deep Level, Main Hive Chamber,
#     Warrior Caste Barracks, Battle Ruins)
#   npcs_drop_mob_grind_geonosis_ey_akh.yaml  (E'Y-Akh wilderness landmark
#     rooms — wilderness_npcs loader)
#
# Zone spread (all 6 rooms previously had zero hostile NPCs at HEAD):
#   Geonosis - Component Storage x1          (geonosis_foundries — Geonosian storage enforcer)
#   Geonosis - CIS Engineering Bay x1        (geonosis_foundries — escaped test chassis)
#   Geonosis - Foundry Power Generator x1    (geonosis_foundries — MagnaGuard security unit)
#   Geonosis - Droid Output Bay x1           (geonosis_foundries — scrambled deployment B1)
#   Geonosis - Worker Staging Area x1        (geonosis_foundries — CIS security enforcer)
#   Geonosis - E'Y-Akh Desert - Edge x1      (geonosis_ey_akh — desert merdeth)
#
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF absent from this worktree;
#   stats grounded in sibling Geonosis NPC patterns
#   (npcs_drop_mob_grind_geonosis.yaml / foundry.yaml baselines):
#   B1 droids: DEX 2D–2D+1, blaster 3D+1–3D+2.
#   Geonosian warriors: DEX 3D, STR 3D, vibroblade 4D+2.
#   MagnaGuard: DEX 3D+1, STR 3D+2, force_pike 5D.
#   CIS Human operative: DEX 2D+2, blaster 3D+2–4D.
#   Desert creature: STR 3D+2, brawling 4D+1.
# Stats UNVERIFIED against WEG40120 PDF.
# Weapons: force_pike, vibroblade, blaster_pistol, blaster_rifle,
#   blaster_carbine — all keys confirmed in data/weapons.yaml.
#   Merdeth uses weapon: "" (combat engine falls back to brawling + STR).
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # COMPONENT STORAGE — 1 NPC (Geonosian storage enforcer)
  # Vast rock-hewn chambers of catalogued droid components and weapons
  # systems. The Geonosians regard this inventory — weeks of production
  # capacity — as a territorial extension of the hive itself. The
  # warrior-caste enforcer here has memorised every shelf row and
  # treats unrecognised presences as sabotage threats.
  # ══════════════════════════════════════════════════════════════════

  - name: Geonosian Storage Enforcer
    room: "Geonosis - Component Storage"
    species: Geonosian
    description: >-
      A Geonosian warrior moving between the towering rock shelves of
      the component storage with the deliberate pace of something that
      has memorised every row and knows exactly what belongs there.
      Its folded wings carry the dull-grey pigment of the foundry
      caste; its compound eyes sweep each aisle as it passes. A
      vibroblade hangs at its hip, worn with the ease of a tool used
      regularly rather than carried for ceremony. When it registers
      your presence in a section you have no clearance to enter, the
      pace does not quicken — it simply stops and turns, which is
      somehow more unsettling.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 1D+2
        mechanical: 1D
        perception: 3D+1
        strength: 3D
        technical: 2D
      skills:
        vibroblade: 4D+2
        dodge: 3D+2
        brawling: 4D
        search: 3D+2
        sneak: 3D
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 0
    ai_config:
      personality: >-
        A Geonosian warrior-caste enforcer assigned to the component
        storage as territorial security. It does not negotiate over
        unauthorised entry — the hive's standing protocol for
        uninvited presences in the storage chambers is physical
        removal, and the enforcer has a literal interpretation of that
        instruction.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Clicks and subsonic thrumming that require a translator to
        render. The body language needs no translation: wings half-
        opened to full span, vibroblade already in hand.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The Geonosian clicks twice and closes the distance.*"
        - "*Wings snap half-open as the vibroblade comes up.*"
        - "*A subsonic thrum — the storage is being secured. You are not being secured with it.*"

  # ══════════════════════════════════════════════════════════════════
  # CIS ENGINEERING BAY — 1 NPC (escaped experimental chassis)
  # The engineering bay's prototype workbench holds an experimental B1
  # variant that has been 'working on a puzzle box for two weeks.' It
  # has not solved the puzzle box. It has, however, decided that the
  # box is a threat, that the engineers are threats, and that the
  # visitor who just walked in through the bay door is a threat.
  # The lead engineer's report describes this as 'progress.'
  # ══════════════════════════════════════════════════════════════════

  - name: Escaped Test Chassis
    room: "Geonosis - CIS Engineering Bay"
    species: Droid
    description: >-
      A B1 battle droid with a non-standard cranial housing and two
      extra sensor clusters bolted to its chassis, its right arm
      adapted to hold both a standard blaster and a prototype
      manipulator array that has been partially stripped down to its
      frame. The puzzle box is still in its left hand, crushed flat.
      Its photoreceptors have shifted to a threat-detection bandwidth
      the engineers did not program and cannot override remotely —
      they cut the hardline after it bit a Neimoidian technician.
      It is standing in the middle of the workbench area with the
      particular stillness of something that is not waiting, merely
      deciding.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 1D
        mechanical: 1D+1
        perception: 2D+2
        strength: 2D+1
        technical: 1D+2
      skills:
        blaster: 3D+2
        dodge: 2D+2
        search: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      personality: >-
        An experimental B1 chassis whose cognition-expansion
        subroutines crossed a threshold the engineering team did not
        plan for and cannot roll back. It has not developed
        self-awareness in any useful sense. It has developed the
        ability to identify what it perceives as threats and the
        initiative to do something about them before being instructed
        to. Currently, the threat-ID list includes you.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Standard B1 monotone in short, wrong-context readouts. 'PUZZLE
        BOX: THREAT NEUTRALISED.' 'UNKNOWN VARIABLE APPROACHING.'
        The syntax of a B1; the content of something broken.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*'UNSCHEDULED ENTRY. INITIATING CONTAINMENT.' It raises the blaster.*"
        - "*The chassis pivots with the smooth precision of something that has found its purpose.*"
        - "*'THREAT IDENTIFIED. LOGGING FOR ENGINEER REVIEW.' It fires.*"

  # ══════════════════════════════════════════════════════════════════
  # FOUNDRY POWER GENERATOR — 1 NPC (MagnaGuard security unit)
  # The power generator is the highest-value sabotage target on
  # Geonosis: destroying it halts foundry production for weeks. The
  # Geonosians assigned two IG-100 MagnaGuards and a rotating warrior
  # patrol to its defence. This one is on active sweep and has been
  # notified of your presence by the Geonosian checkpoint upstream.
  # ══════════════════════════════════════════════════════════════════

  - name: MagnaGuard Security Unit
    room: "Geonosis - Foundry Power Generator"
    species: Droid
    description: >-
      An IG-100 MagnaGuard in the muted grey that the Geonosians
      favour for their close-protection assignments, its cloak removed
      for the heat of the generator chamber, its staff in a two-handed
      combat grip at high-guard. The electrostaff cracks with a low
      charge hum audible over the turbine roar. Its photoreceptors
      are fixed on you with the expressionless intensity of a unit
      designed specifically to engage Jedi in close quarters, for
      whom a regular visitor represents a significantly lower threat
      band. This is not a reassuring observation.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 1D+2
        mechanical: 1D
        perception: 3D
        strength: 3D+2
        technical: 1D+2
      skills:
        force_pike: 5D
        brawling: 4D+2
        dodge: 4D+1
        search: 3D+1
      weapon: force_pike
      move: 12
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      personality: >-
        An IG-100 MagnaGuard in active generator-defence posture.
        It was assigned here because the Geonosians understand that a
        being willing to die for a sabotage target will press past
        lesser security. The MagnaGuard does not experience the concept
        of 'pressing past' — it experiences only contact and
        neutralisation. Contact has been made.
      knowledge: []
      faction: cis
      dialogue_style: >-
        No vocoder output at all. The MagnaGuard communicates entirely
        through posture and weapon alignment. The staff in high-guard
        and the weight shifting onto the leading foot are complete
        sentences.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The electrostaff swings in a low arc, crackling with charge. It has done this before.*"
        - "*The MagnaGuard does not speak. It closes the distance.*"
        - "*The staff reverses grip mid-swing — a technique trained against lightsaber reach.*"

  # ══════════════════════════════════════════════════════════════════
  # DROID OUTPUT BAY — 1 NPC (scrambled deployment-queue B1)
  # The output bay stages thousands of completed droids for surface
  # transport. One of this shift's B1 batch came off the line with a
  # corrupted deployment matrix: it received its activation signal,
  # accepted a targeting package, and indexed every non-droid presence
  # in the output bay as a confirmed hostile before the quality-
  # control drone could flag it for reset.
  # ══════════════════════════════════════════════════════════════════

  - name: Scrambled Deployment B1
    room: "Geonosis - Droid Output Bay"
    species: Droid
    description: >-
      A B1 battle droid still carrying its line-exit paint sheen,
      its serial number not yet logged to the staging manifest, its
      blaster rifle slung at a combat angle that the quality-control
      checklist explicitly tests for and that this unit passed in
      error. It is standing slightly apart from the dormant column
      it emerged from, its photoreceptors in the active-threat band,
      its targeting system having resolved every biological signature
      in the bay to a single category: hostile. The foundry supervisors
      have been notified. Nobody has come yet.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 1D
        mechanical: 1D
        perception: 2D
        strength: 2D
        technical: 1D
      skills:
        blaster: 3D+1
        dodge: 2D+1
        search: 2D
      weapon: blaster_rifle
      move: 10
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      personality: >-
        A brand-new B1 battle droid with a factory-corrupted
        deployment targeting package. It is executing its combat
        programming precisely as written — the error is in what it
        was told to shoot at, not in how it shoots. It does not
        experience ambiguity. It experiences valid targets.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Clean-install B1 monotone: the readouts are crisp, the
        syntax is fresh, the conclusions are completely wrong.
        'HOSTILE CONTACT CONFIRMED. ENGAGING.' Delivered in the
        bright register of a unit on its first operational hour.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'ENGAGING HOSTILE.' It fires a burst with machine-steady aim."
        - "'ENGAGEMENT IN PROGRESS.' The targeting reticle doesn't waver."
        - "'CASUALTY ASSESSMENT WILL FOLLOW.' It advances.*"

  # ══════════════════════════════════════════════════════════════════
  # WORKER STAGING AREA — 1 NPC (CIS security enforcer)
  # The staging area is where workers collect assignments and CIS
  # technical supervisors hold briefings. Security oversight is the
  # unspoken function of this shift's quiet enforcer — watching for
  # Republic infiltrators, discontented drones, or unscheduled
  # off-worlders in a facility where every room is a sabotage target.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Foundry Security Enforcer
    room: "Geonosis - Worker Staging Area"
    species: Human
    description: >-
      A human in the dark grey CIS technical corps uniform with a
      security-detail shoulder patch, standing near the shift
      assignment boards with the neutral watchfulness of someone
      whose job is to look like they're checking a datapad while
      actually checking everything else. The blaster carbine on
      his hip is worn low and loose-holstered — a deliberate signal
      to the foundry workers that compliance is assumed. When he
      looks up and realises you are not on any shift assignment he
      has seen, the datachip goes into a pocket and the carbine
      hand drops to the grip.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 2D+2
        technical: 2D+1
      skills:
        blaster: 4D
        dodge: 3D+1
        intimidation: 3D+2
        search: 3D+2
        sneak: 2D+2
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        A CIS security enforcer whose job is to identify Republic
        infiltrators, discontented Geonosian drones, and
        unscheduled off-worlders in a facility where every room is
        a sabotage opportunity. He is not aggressive by preference
        — he will ask for authorisation first, once, and briefly.
        When no authorisation is forthcoming, he stops asking.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Clipped, professional Basic with the flat authority of
        someone who gives orders more than he receives them. Short
        questions first — 'Shift clearance?' — then silence, then
        action.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'No clearance on record. This ends here.' He draws.*"
        - "*He doesn't raise his voice — just raises the carbine.*"
        - "'Infiltration protocol active.' He fires and moves for cover simultaneously.*"

  # ══════════════════════════════════════════════════════════════════
  # E'Y-AKH DESERT EDGE — 1 NPC (desert merdeth)
  # The rock spires give way to open red dune here; this slope is
  # where Geonosian drones drive merdeth herds to drown in the
  # annual flood. The bleached shell-fragments scattered across the
  # sand mark how far the water reached last time. Between floods,
  # merdeths use this edge as grazing territory — large, shell-
  # plated, irritable when approached, and entirely unafraid of
  # anything that hasn't drowned one yet.
  # ══════════════════════════════════════════════════════════════════

  - name: Desert Merdeth
    room: "Geonosis - E'Y-Akh Desert - Edge"
    species: Creature
    description: >-
      A merdeth: a low-slung, armoured quadruped the size of a
      speeder-bike, its shell plates the same weathered red-ochre
      as the dune it is resting on. The shell carries scars from
      previous flood seasons — deep grooves where the current drag
      its body across submerged rock. Its limbs are disproportionately
      powerful for the chassis, evolved for pulling through fast-
      moving water. On dry ground it moves in short explosive bursts,
      stopping to orient with sensory organs clustered above its
      beak. It has oriented on you. The bleached shell-fragments of
      previous merdeths visible in the sand around you are not a
      coincidence — this is their territory, and merdeths resolve
      territorial ambiguity with their armoured heads.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 1D
        mechanical: 1D
        perception: 2D+1
        strength: 3D+2
        technical: 1D
      skills:
        brawling: 4D+1
        search: 2D+2
        sneak: 2D
      weapon: ""
      move: 8
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      personality: >-
        A desert merdeth — a large, shell-armoured quadruped native
        to the E'Y-Akh. It is not aggressive in the way a predator
        is aggressive; it is territorial in the way a herd animal
        whose armour makes it the largest thing on the slope is
        territorial. You are in its territory. It has made its
        assessment.
      knowledge: []
      faction: ""
      dialogue_style: >-
        No vocoder. The merdeth communicates in a series of rapid
        beak-claps and a deep resonant rumble from its thorax cavity.
        The body language is unambiguous: it lowers its armoured
        head and the shell-crest flares forward.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The merdeth lowers its head and charges — shell-first, the way its kind always do.*"
        - "*A deep resonant thrum from its thorax cavity, then it closes fast.*"
        - "*It ignores the shot. The shell-plates were designed for flood-current drag, not comfort.*"
