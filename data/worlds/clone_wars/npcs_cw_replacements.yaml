# ENGINE INTEGRATION NOTES
# ═══════════════════════════════════════════════════════════════════════
# When the engine session lands (parallel-safe with this content drop):
#
# 1. engine/npc_loader.py reads era.yaml's content_refs.npcs as a list
#    when the active era is clone_wars. The list contains:
#       - npcs_cw_additions.yaml
#       - npcs_cw_replacements.yaml
#    Both files are loaded and their `npcs:` lists combined.
#
# 2. The loader builds a suppression set from this file's `replaces:`
#    field values. When iterating data/npcs_gg7.yaml's roster, any
#    NPC whose `name` is in the suppression set is SKIPPED.
#
# 3. The replacement NPC is loaded as a normal addition. Its `room`
#    field targets the same room slot as the original (or a
#    semantically-compatible one), so the room ends up populated by
#    one NPC of the right era rather than two NPCs or zero.
#
# 4. If a replacement targets a `replaces:` value that does NOT
#    exist in npcs_gg7.yaml, the loader logs a warning and proceeds
#    (the replacement still loads as a normal addition; the
#    suppression is simply a no-op). This is forward-compatible with
#    GG7 roster changes that move or remove NPCs over time.
#
# 5. The seven `replaces:` values in this file are the canonical set
#    for CW Drop A. Future Drop B (Mos Eisley CW additions) authors
#    NEW NPCs and will go in npcs_cw_additions.yaml without `replaces:`
#    fields. Future drops on other planets follow the same split:
#    additions for CW-only NPCs, replacements for GG7 entries that
#    don't fit the era.
#
# 6. Het Nkik's replacement is structurally identical to the GG7
#    original (same name, room, stats, skills) with only the
#    personality and faction lore re-skinned from anti-Imperial to
#    anti-Hutt. This is intentional — it is the canonical example of
#    Q5 "re-skin first" in action. The engine treats it as a normal
#    replacement; the gameplay continuity is preserved (same room,
#    same blaster, same idealism).
#
# 7. The faction codes used here align with v1.1-decisions §Q4:
#    - "republic"        — already matches organizations.yaml.
#    - "independent"     — already matches organizations.yaml.
#    - No "hutt" / "imperial" used in this file.
#
# ═══════════════════════════════════════════════════════════════════════
