# data/worlds/clone_wars/npcs_drop_mob_grind_kuat_hotels.yaml
#
# Kuat Lodging and Embassy Quarter — Hostile Mob Grind Expansion (2026-06-24)
#
# Six roaming hostile NPCs seeded across the three Kuat lodging and
# diplomatic-quarter rooms with no prior mob-grind coverage, completing
# Kuat's room-by-room hostile-NPC density map.
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Kuat City - Embassy Residential Row x2   (extortionist + corporate spy)
#   Kuat - Spaceport Concourse Hotel x2      (data thief + surveillance operative)
#   Kuat City - The Embassy Inn x2           (CIS sleeper agent + hired intimidator)
#
# Rooms confirmed in planets/kuat.yaml (exact name match, no security_level field
# on any of the three — not flagged as restricted or military):
#   "Kuat City - Embassy Residential Row"
#   "Kuat - Spaceport Concourse Hotel"
#   "Kuat City - The Embassy Inn"
#
# No existing NPCs in these rooms (verified grep across all CW yaml files).
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats grounded in sibling CW NPC patterns (mob-grind settled-band baselines).
#   Stats UNVERIFIED against WEG40120 PDF.
# Weapons: concealed_blaster, blaster_pistol, hold_out_blaster, vibroblade —
#   all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # KUAT CITY - EMBASSY RESIDENTIAL ROW — 2 NPCs
  # Mid-tier residences for visiting officers and contractors;
  # quiet street with limited KSF foot-patrol coverage
  # ══════════════════════════════════════════════════════════════════

  - name: Embassy Quarter Extortionist
    room: "Kuat City - Embassy Residential Row"
    species: Devaronian
    description: >-
      A Devaronian in a well-cut civilian coat who has the unhurried
      look of someone waiting for a resident to come home. He has
      been working this street for three weeks — long enough to know
      which contractors carry proprietary KDY data and which ones
      would rather pay than explain a leak to their handlers. He
      clocked you half a block back and has already made the
      calculation that you are either a mark or a problem. He steps
      out from the doorway alcove.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D
        intimidation: 4D+1
        streetwise: 3D+2
        con: 3D+1
        dodge: 3D
      weapon: concealed_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A mid-level extortionist who targets visiting KDY contractors
        and Republic liaison staff for information leverage. He prefers
        threats to violence — violence draws attention — but he carries
        the concealed blaster and uses it when a mark won't cooperate.
        He identifies threats quickly and moves to eliminate them before
        they can report his presence to KSF.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Smooth, conversational Devaronian-accented Basic until the
        moment the blaster comes out. "Let's talk about what you're
        carrying." Then the tone drops flat.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He produces the concealed blaster in a single practiced motion.*"
        - "*'Wrong answer.' He fires without further discussion.*"
        - "*He circles to your flank — he has done this before.*"

  - name: KDY Residential Spy
    room: "Kuat City - Embassy Residential Row"
    species: Mirialan
    description: >-
      A Mirialan woman with the facial tattoos of a completed
      apprenticeship — but not the kind you finish at a university.
      She is seated on a low wall across from a residence, working
      what appears to be a maintenance datapad. The diagnostics
      window is real; the surveillance package running underneath it
      is not. She has been building a target profile on a KDY
      structural engineer who lives three doors down. She notices
      when you slow down.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 3D
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 3D+1
      skills:
        blaster: 3D+2
        security: 4D
        sneak: 4D
        con: 3D+2
        dodge: 3D+1
        streetwise: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A corporate intelligence operative running long-term
        surveillance on KDY residential targets. She is patient,
        methodical, and dislikes unexpected variables — a passerby
        who notices too much is a variable she resolves immediately.
        Her preference is a clean exit; when that option closes she
        draws and shoots with the precision of someone who trained
        for this contingency.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Even, professional Basic. She does not raise her voice.
        "You should keep walking." If you don't: two shots, center
        mass.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She closes the datapad and draws in one motion.*"
        - "*'I won't ask again.' She fires.*"
        - "*She retreats toward the residence entry, maintaining fire.*"

  # ══════════════════════════════════════════════════════════════════
  # KUAT - SPACEPORT CONCOURSE HOTEL — 2 NPCs
  # KDY-affiliated clean transit hotel; high traveler turnover;
  # data thieves favor the transient guest population
  # ══════════════════════════════════════════════════════════════════

  - name: Traveler's Data Thief
    room: "Kuat - Spaceport Concourse Hotel"
    species: Bothan
    description: >-
      A Bothan in transit traveler's clothes — the kind that say
      "passing through" without specifying from or to where. He
      works the hotel lobby and corridors between the spaceport
      check-in desks and the room lifts, skimming guest datapads
      for proprietary cargo manifests and clearance codes. The fur
      along his neck stands slightly higher than the ambient
      temperature warrants. He has been watching the lift door for
      forty-five minutes, waiting for the right mark. You are
      apparently close enough.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+1
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 3D
      skills:
        blaster: 3D+1
        security: 4D+1
        con: 4D
        streetwise: 3D+2
        sneak: 3D+1
        dodge: 2D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        An information broker's field agent specializing in transit-
        hotel data harvesting — skimming cargo codes and travel
        authorizations off inattentive travelers before they reach
        their ships. He relies on cover and misdirection; when
        cornered he draws the hold-out blaster and shoots quickly,
        then runs for the spaceport exits.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Chatty, helpful Bothan Basic — until the moment he decides
        you've seen too much. "Let me help you find your room." Then
        the hold-out comes out.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The hold-out blaster is in his hand before you finish the sentence.*"
        - "*He fires toward the exit, trying to clear a path.*"
        - "*'Just hand over the datapad and this doesn't get worse.'*"

  - name: Concourse Hotel Surveillance Operative
    room: "Kuat - Spaceport Concourse Hotel"
    species: Rodian
    description: >-
      A Rodian in the pressed uniform of a third-party hospitality
      contractor — the kind of vendor KDY hotels use for security
      supplementation. The uniform is genuine; the employer on the
      badge is not. He moves through the hotel corridors with the
      practiced ease of someone whose real job is watching who comes
      and goes, who they meet, and what they carry. The moment he
      realizes you have identified him, the performance ends.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D+1
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 4D
        sneak: 3D+2
        streetwise: 3D
        con: 3D
        dodge: 3D
        security: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A corporate counter-intelligence field operative running
        surveillance cover inside the KDY-affiliated hotel under a
        forged contractor identity. He monitors guest activity for
        a rival shipyard consortium. He is calm and disciplined under
        pressure; when cover is blown he immediately moves to
        eliminate the witness and extract.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Rodian-inflected Basic, neutral and professional. "You've
        made a mistake." He doesn't wait for a response.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The contractor uniform does not slow him down — he draws and fires.*"
        - "*He moves toward the service corridor, firing as he retreats.*"
        - "*'You should have kept walking.' He fires again.*"

  # ══════════════════════════════════════════════════════════════════
  # KUAT CITY - THE EMBASSY INN — 2 NPCs
  # Three-generation family inn on the embassy quarter main street;
  # modest, well-run; CIS prefers it precisely because it is not grand
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Sleeper Operative
    room: "Kuat City - The Embassy Inn"
    species: Umbaran
    description: >-
      An Umbaran who has been occupying room seven for eleven days
      under a plausible trade-delegation pretext. The pale skin and
      silver eyes draw occasional looks but his paperwork is
      impeccable, the cover story consistent across three separate
      inquiries, and his behavior unremarkable — until you find
      the room at an hour when you should not be in the corridor
      and he opens the door before you knock. The analysis takes
      him less than a second. The weapon comes out immediately
      after.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 3D
        mechanical: 2D
        perception: 3D+2
        strength: 2D+2
        technical: 3D
      skills:
        blaster: 4D+1
        con: 4D+2
        sneak: 4D
        security: 3D+1
        dodge: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS deep-cover intelligence operative embedded in the
        embassy quarter under a trade-mission cover identity. His
        mission is long-term: building target assessments on KDY
        Republic liaison staff. He is highly competent at
        misdirection and near-silent movement; when exposure is
        unavoidable he eliminates the threat immediately and
        considers exfiltration options afterward.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Precise, unhurried Umbaran-accented Basic. He offers no
        explanation. "You should not have come this way." Then he
        fires.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The blaster is in his hand before the door fully opens.*"
        - "*He fires two controlled shots and steps back into the doorway.*"
        - "*'Your file will be updated.' He fires again.*"

  - name: Embassy Inn Hired Muscle
    room: "Kuat City - The Embassy Inn"
    species: Gamorrean
    description: >-
      A Gamorrean who has been renting the ground-floor corner
      room for four days — far longer than a Gamorrean carrying
      nothing but a travel satchel and a vibroblade on a
      registered hire contract would normally stay. Whoever is
      paying him wants a physical presence in the inn that can
      react fast to problems the Umbaran upstairs is not equipped
      to handle quietly. He sees you near the back of the common
      room and pushes back from his chair.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 1D+2
        mechanical: 1D+2
        perception: 2D
        strength: 4D+1
        technical: 2D
      skills:
        brawling: 5D
        melee_combat: 4D+2
        intimidation: 3D+2
        dodge: 2D+1
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        Hired muscle placed inside the inn to provide physical
        backup for a CIS sleeper operative. He has no ideological
        stake in the mission — the credits are consistent and the
        job is simple: stop anyone who gets close to what is
        happening upstairs. He is direct, aggressive, and has no
        interest in extended conversation.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Grunted Gamorrean Basic, minimal. He does not explain
        himself. He charges.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He overturns the table and charges.*"
        - "*The vibroblade sweeps a wide arc — he is not aiming for a wound.*"
        - "*He roars and presses forward, absorbing the hit.*"
