# data/worlds/clone_wars/npcs_drop_mob_grind_kamino_inner_complex.yaml
#
# Kamino Inner Complex Hostile Mob Grind Batch (2026-06-22)
#
# Six roaming hostile NPCs seeded across Kamino's inner residential,
# biological, security, and logistics zones to extend the solo-PvE
# mob-grind reward loop (engine/hunting_rewards.py). All six satisfy
# engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Thematic premise: a second CIS operation layer targeting Kamino's inner
# non-public zones — the Prime Minister's access corridor, staff residential
# wing, cloning biology support areas, and the facility's logistics/security
# perimeter. These are original operatives and opportunists (not the
# administrative-cover agents placed by the Tipoca City batch) working the
# areas that Republic audit cycles don't usually reach.
#
# Zone spread:
#   Prime Minister's Residence x1     (Pantoran contract assassin)
#   Kaminoan Residential Wing x1      (Human embedded slicer)
#   Growth Chambers x1                (Verpine biotech operative)
#   Clone Equipment Bay x1            (Trandoshan equipment thief)
#   Security Holding Facility x1      (Escaped Zygerrian prisoner)
#   Landing Platform Alpha x1         (Weequay ship-jacker)
#
# Avoided rooms with existing hostile NPCs (covered by prior batches):
#   kamino.yaml      → Pylon Access Corridor, Unauthorized Docking Point,
#                       Ocean Surface Platform, Lower Platform
#   cloning_halls    → Cloning Hall Checkpoint, Genetics Lab, Training Block,
#                       Advanced Training, Clone Mess Hall, Strategic Command
#   tipoca_city      → Main Corridor, Briefing Room, Visitor Dining, Medical
#                       Bay, Library, Administration
#
# Avoided rooms with civilian/ambient NPCs (per original batch note):
#   Aiwha Stable, Ocean Platform - Visiting Officers' Quarters
#   Tipoca City Arrivals Hall (Kaminoan Attendant Kel Avon)
#   Clone Barracks, Growth Chambers, Clone Equipment Bay already have
#     civilian ambient NPCs — hostile additions below are independent.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF absent from this worktree;
#   stats UNVERIFIED against PDF. Grounded in sibling CW NPC patterns
#   (kamino_tipoca_city.yaml baselines; Aqualish sub-commander = DEX 3D,
#   blaster 4D ceiling; exterior CIS Infiltrator = DEX 3D+1 top-of-band).
# Weapons: heavy_blaster_pistol, blaster_pistol, vibroblade, blaster_carbine
#   — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # PRIME MINISTER'S RESIDENCE — 1 NPC (Pantoran contract assassin)
  # The PM's personal quarters and anteroom corridor — the closest
  # civilian point to the Kaminoan government's executive function.
  # Access requires PM-tier escort clearance; a forged credential
  # and three weeks of careful social engineering got her inside.
  # She has been waiting in the anteroom for forty minutes.
  # ══════════════════════════════════════════════════════════════════

  - name: Pantoran Contract Assassin
    room: "Kamino - Prime Minister's Residence"
    species: Pantoran
    description: >-
      A Pantoran woman seated in the anteroom with a diplomatic guest
      pass on her collar and an expression of patient composure that
      has not wavered in forty minutes. The blue skin and gold facial
      tattoos are unmistakably Pantoran, and the Senate aide credentials
      in the access log are a precision forgery — the real aide is
      currently indisposed in a medical suite two levels down with
      a plausible viral complaint. Her hands are folded in her lap.
      When you come around the corner and stop, her composure does not
      change. Her hands do.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D+2
        con: 4D+1
        sneak: 4D
        willpower: 3D+2
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 4
      dark_side_points: 4
    ai_config:
      personality: >-
        A contract assassin on a high-value executive access job. She
        operates through social infiltration and patience rather than
        force — she spent three weeks establishing the credential chain
        that put her in this anteroom. Discovery before the moment of
        action is the one scenario she has over-prepared for: the
        heavy pistol comes up immediately and she exits via whichever
        route has the most confusion, not the nearest door.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Quiet, even Basic — the voice of someone who has spent a
        career being forgettable. "I have an appointment." A beat.
        Then the pistol clears her lap and she is no longer quiet.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She fires and moves, angling for the corridor junction.*"
        - "*The guest pass lands on the floor. The pistol doesn't.*"
        - "*'Forty minutes.' She fires again. 'I was so close.'*"

  # ══════════════════════════════════════════════════════════════════
  # KAMINOAN RESIDENTIAL WING — 1 NPC (Human embedded slicer)
  # Staff residential corridor serving Kaminoan facility personnel
  # and long-term Republic contractor residents. Building access
  # rotates quarterly — long enough for someone patient enough to
  # establish a household identity and stop being noticed.
  # ══════════════════════════════════════════════════════════════════

  - name: Embedded Network Slicer
    room: "Kamino - Kaminoan Residential Wing"
    species: Human
    description: >-
      A Human man in maintenance-contractor casual wear with a toolkit
      bag that has the right scuffs on it and a residential access
      chip that has been cycling cleanly for eleven weeks. He is not
      maintaining anything — the chip gets him into the residential
      network junction closets, which connect to the administrative
      backbone, and he has been leaving passive tap modules there one
      at a time for eleven weeks. He is replacing the last one when
      you find him, and the expression he turns toward you is the
      expression of someone doing arithmetic about how long he has
      before this becomes a problem.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 3D+1
      skills:
        blaster: 3D+2
        dodge: 3D
        computer: 4D
        con: 3D+2
        security: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A long-duration network infiltration specialist running a
        passive tap operation against the Kamino residential network
        backbone. He is not a front-line combatant and does not
        pretend to be — the pistol is a surprise, not a threat, and
        his first move is always to disable the nearest junction
        panel so any alert he triggered becomes unreadable noise.
        He has a prepared exit route and he will take it.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Casual, slightly preoccupied — the voice of a contractor
        who has been here long enough not to feel the need to
        perform. "Wrong corridor, friend." Then the junction
        panel goes dark and the pistol comes out.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires one-handed and kills the corridor lights.*"
        - "*He moves toward the junction closet, shooting behind him.*"
        - "*'Eleven weeks.' He fires again. 'Eleven weeks clean.'*"

  # ══════════════════════════════════════════════════════════════════
  # GROWTH CHAMBERS — 1 NPC (Verpine biotech operative)
  # The biological core of Kamino's clone production infrastructure:
  # growth tanks, nutrient delivery systems, and the accelerated
  # maturation apparatus. Civilian ambient staff are present; this
  # NPC operates independently, using a biological sampling cover
  # to access areas staff ignore.
  # ══════════════════════════════════════════════════════════════════

  - name: Verpine Sample Extractor
    room: "Kamino - Growth Chambers"
    species: Verpine
    description: >-
      A Verpine — insectoid, compound-eyed, slightly taller than a
      Human — in the unmarked gray coveralls that pass for technician
      wear in the growth chamber access corridors. The equipment
      case he carries has legitimate biosample seals on four of
      the six clasps; the other two contain a series of micro-vial
      extraction rigs sized for genetic material that is not on any
      authorized sampling manifest. He works with the methodical
      efficiency of his species, moving tank to tank, and does not
      acknowledge you until you are between him and the exit corridor.
      Then the compound eyes track you and he puts down the case
      with one hand and reaches into a chest pocket with the other.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 3D+2
      skills:
        blaster: 3D+1
        dodge: 3D
        medicine: 3D+2
        computer: 3D+2
        search: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Verpine biological intelligence operative running a
        genetic extraction operation against the growth chambers.
        Verpine technical aptitude makes him extremely efficient
        at the sampling work; he is not a combat specialist but
        he is fast and precise, and the blaster is a tool he
        approaches with the same systematic care as everything
        else. His priority is always the sample case — he will
        fire to create space and take the case with him.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Clipped, minimally-accented Basic — Verpine speech patterns
        tend toward brevity. "Not your area." Then the blaster
        comes up with more speed than his frame suggests.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires and angles away from the tank row.*"
        - "*The case goes to his back hand. The pistol stays forward.*"
        - "*A chittering sound that might be frustration. He keeps firing.*"

  # ══════════════════════════════════════════════════════════════════
  # CLONE EQUIPMENT BAY — 1 NPC (Trandoshan equipment thief)
  # Issue and maintenance depot for clone trooper field equipment:
  # armor, weapons, communication gear. Civilian ambient staff
  # are present; this NPC is stripping prototype components
  # from the maintenance rotation bins while posing as a courier.
  # ══════════════════════════════════════════════════════════════════

  - name: Trandoshan Equipment Stripper
    room: "Kamino - Clone Equipment Bay"
    species: Trandoshan
    description: >-
      A large Trandoshan in the gray coveralls of a Republic Logistics
      contracted courier service, holding a pickup manifest that has
      the right stamps and the wrong items on it. He is working
      through the maintenance rotation bins methodically, pulling
      prototype armor components that are flagged for scheduled
      repair and will not be missed until the next audit cycle. The
      components go into a sealed courier case that is heavier than
      the manifest suggests. He is on his third case. When you
      make it clear this conversation is happening, he sets the
      case down with a deliberateness that communicates he has
      done this before.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 3D
        technical: 2D+1
      skills:
        brawling: 4D
        melee_combat: 3D+2
        dodge: 3D
        intimidation: 3D+1
        streetwise: 3D
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A professional equipment thief running a component-stripping
        operation against Kamino's maintenance rotation queue. He
        is not CIS-affiliated — this is a straight commercial
        operation, prototype clone armor components commanding a
        premium from several buyers. He prefers not to fight
        because it creates problems with the courier manifest,
        but if he has to, he is a large Trandoshan with a
        vibroblade and the willingness to use it. He fights
        to incapacitate and leave, not to kill.
      knowledge: []
      faction: neutral
      dialogue_style: >-
        Low, flat Basic with a Trandoshan rasp. "Walk away.
        Nothing on that manifest concerns you." The vibroblade
        clears the hip sheath if you don't.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The vibroblade sweeps wide. He moves toward the bay door.*"
        - "*He shoves a rack between you and takes the case with him.*"
        - "*A low hiss. He is not enjoying this. The blade keeps moving.*"

  # ══════════════════════════════════════════════════════════════════
  # SECURITY HOLDING FACILITY — 1 NPC (Escaped Zygerrian prisoner)
  # The facility's detention and processing space for individuals
  # apprehended on-site or transferred from Republic Judicial.
  # One cell's occupant has been here long enough to learn the
  # maintenance access panel schedule. She has been loose since
  # yesterday's shift change and has not left the building because
  # she does not have a ship.
  # ══════════════════════════════════════════════════════════════════

  - name: Escaped Zygerrian Prisoner
    room: "Kamino - Security Holding Facility"
    species: Zygerrian
    description: >-
      A Zygerrian woman in the facility detention-issue coverall,
      torn at the right shoulder where she pulled the tracking
      node out. The feline features of her species carry an
      expression of flat, practical aggression that has nothing
      to do with panic — she has been loose for twenty-seven
      hours and she is still here because she has been waiting
      for a ship manifest she can use. She has taken a blaster
      from a stunned guard's holster, which she holds with
      the practiced ease of someone for whom weapons are working
      tools. When she sees you she does not ask questions.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 3D
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 3D+2
        brawling: 4D
        dodge: 3D+1
        intimidation: 3D+2
        survival: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        An escaped detainee with twenty-seven hours of surviving
        loose in a facility that is quietly looking for her. She
        is not CIS-affiliated — she was processed in on an
        unrelated warrant and has been waiting for the right
        moment ever since. She fights aggressively and without
        theatrics: she needs a ship and she does not need
        anyone reporting her position.
      knowledge: []
      faction: neutral
      dialogue_style: >-
        Short, clipped Basic with a Zygerrian accent. She does
        not speak first. If you speak, she fires first.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She fires and moves for the equipment locker wall.*"
        - "*No words. She keeps shooting and angling for the door.*"
        - "*She fires again, economical, already moving past you.*"

  # ══════════════════════════════════════════════════════════════════
  # LANDING PLATFORM ALPHA — 1 NPC (Weequay ship-jacker)
  # The facility's primary authorized landing platform for Republic
  # supply and personnel transfers. Less traffic scrutiny than the
  # main docking bay — scheduled manifests reduce per-ship checks.
  # A Weequay in tech coveralls has been waiting for the next
  # supply shuttle with patience and a plan.
  # ══════════════════════════════════════════════════════════════════

  - name: Weequay Ship-Jacker
    room: "Kamino - Landing Platform Alpha"
    species: Weequay
    description: >-
      A Weequay in the faded orange coveralls of a Republic Orbital
      Maintenance contractor, leaning against the equipment locker
      at the far end of the platform with a posture that says he
      has been waiting a long time and does not mind. The orange
      is close enough to the real contractor livery that platform
      staff wave him through. He is waiting for the supply shuttle
      on the fourteen-hundred manifest — he knows its crew rotation,
      its security configuration, and which bay it will park in.
      When you come onto the platform and stop moving, he
      straightens up and stops pretending to be patient.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 3D
        perception: 2D+2
        strength: 2D+1
        technical: 2D+1
      skills:
        blaster: 4D
        dodge: 3D+1
        starship_gunnery: 3D+2
        con: 3D
        streetwise: 3D+1
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A professional ship-jacker who has done the research: crew
        rotation schedules, docking manifest windows, security
        response times. He works alone and takes small vessels
        with predictable patterns rather than fighting for big
        targets. He is not an ideologue — the job is the job,
        and discovery before the shuttle arrives is an expensive
        complication he deals with the way he deals with everything
        else: direct, immediate, and committed.
      knowledge: []
      faction: neutral
      dialogue_style: >-
        Flat, unhurried Basic with the Weequay cadence. "Platform's
        closed for maintenance." He already has the carbine up.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires twice and steps behind the equipment locker.*"
        - "*The carbine sweeps the platform edge. He moves fast.*"
        - "*He fires and angles for the shuttle access stairwell.*"
