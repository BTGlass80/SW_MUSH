    - npcs_drop_mob_grind_coruscant_lower.yaml  # Mob-grind expansion (Jun 21 2026): 6 hostile NPCs filling 6 Coruscant lower-city rooms previously without mob coverage (Invisible Sector Border, Lower City Descent, Lower City Refugee Warren, Petrax Historic Quarter Sublevels, Coruscant Works Atmospheric Processing Plant, Coruscant Underworld Surface Entry). Weequay/Human/Trandoshan/Rodian/Devaronian/Quarren. All satisfy is_huntable_mob(). Original characters, era-clean, WEG D6 stats.
