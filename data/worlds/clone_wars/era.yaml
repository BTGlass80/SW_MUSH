  starship_excluded_templates:
    - x_wing
    - a_wing
    - b_wing
    - tie_fighter
    - tie_interceptor
    - tie_bomber
    - lambda_shuttle
    - sentinel_shuttle
    - nebulon_b
    - imperial_star_destroyer

