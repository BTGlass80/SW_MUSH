  # opts to skip the tutorial chain. Per first-character-mandatory
  # policy, the kit is NEVER applied to a player's first character —
  # those go through the chain and get the graduation reward instead.
  # The YAML file lives next to the era manifest; schema documented in
  # the file's own header. SEAM-FIRST: the YAML is registered here so
  # the era manifest is the single source of truth, but the consumer
  # (web chargen "skip" branch) ships in Drop 2b. Reading it now is a
  # no-op; no engine code dereferences it yet.
