# REGISTRY POLICY (Space Pivot drop)
# ═══════════════════════════════════════════════════════════════════════
# The ship registry merges global data/starships.yaml with this era's
# starships.yaml. excluded_templates names global ships that should NOT
# register in this era — typically post-CW Imperial-era designs.
