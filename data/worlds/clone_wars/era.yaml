    - npcs_drop_mob_grind_coruscant_underworld.yaml # Mob-grind expansion (Jun 22 2026): 6 hostile NPCs across Coruscant Underworld WILDERNESS landmark rooms (zone: coruscant_underworld; resolved via _resolve_wilderness_room_id at runtime). Covers all 4 quadrants: NE (Derelict Loading Docks / Contraband Transfer Point), NW (Tier-Seven Warehouse Row / Sublevel Pump Station Nine), SE (The Collapse Gallery — lethal tier), SW (The Null Gallery — lethal tier). Zabrak/Weequay/Trandoshan/Human/Gamorrean/Nikto. All satisfy is_huntable_mob(). Original characters, era-clean, WEG D6 stats.
