# data/worlds/clone_wars/era.yaml
# Clone Wars Era — Foundation Configuration
# Schema version 1 — per world_data_extraction_design_v1.md §5
#
# This file is the root configuration for the Clone Wars era.
# Active when game_server config sets active_era: clone_wars.
# All content refs are relative to data/worlds/clone_wars/.

schema_version: 1

era:
  code: clone_wars
  name: "Clone Wars"
  tagline: "The Republic fractures. The Jedi fight as generals. The galaxy bleeds."
  description: >
    Mid-war, approximately 20 BBY. The Galactic Republic fights the Confederacy
    of Independent Systems across the Outer Rim. Jedi Masters serve as generals
    commanding clone armies. The CIS is publicly led by a former Jedi Master
    operating off-world from Republic-reachable systems; a deeper Sith hand
    directs events from off-stage, never seen by those who survive learning
    of it. The war has dragged on long enough that everyone is tired of it —
    but no one knows how to stop.
  timeline_reference: "~20 BBY"
  canon_era: "Clone Wars (film trilogy + TCW animated series)"
  sourcebook_refs:
    - "WEG40120 (D6 R&E Core — era-agnostic rules)"
    - "WEG40114 (Jedi Academy Sourcebook — Jedi pedagogy, Force powers)"
    - "WEG40069 (GG7 Mos Eisley — Tatooine geography, era-agnostic)"
    - "WEG40027 (GG6 Tramp Freighters — smuggler archetypes, era-agnostic)"

policy:
  # ── Force policy ─────────────────────────────────────────────────────────
  # Jedi are not a chargen option by default. Players must complete the
  # Jedi Village quest chain (Act 1-3) to unlock the Jedi Padawan template.
  # This gates Force access behind meaningful in-game narrative commitment.
  force_chargen_allowed: false
  force_sensitive_chargen: village_gated   # Requires Village quest completion
  lightsaber_availability: restricted_jedi # Issued by Jedi Order or earned via Village
  force_suppression: none                  # No Inquisitorial pressure in 20 BBY
  dark_side_detectability: high            # Public Force use draws attention
  village_location: tatooine_dune_sea      # Seed data slug for Village quest chain

  # ── Progression policy ───────────────────────────────────────────────────
  # F.7.k (May 4 2026). Whether real-time cooldowns gate the Village
  # quest's Act transitions and inter-trial windows. Per
  # progression_gates_and_consequences_design_v1.md §2.5:
  #   - 7 days between Act 1 (invitation) and Act 2 (first trial)
  #   - 14 days between successful trials
  #   - 24 hours between Trial of Courage retries on failure (this is
  #     enforced separately in engine/village_trials.py and is NOT
  #     governed by this flag)
  # The flag is true (strict) for production; flip to false to short-
  # circuit dev/test runs. Honored after the
  # SW_MUSH_PROGRESSION_COOLDOWNS env var (env var wins if set to a
  # recognized boolean spelling — see engine/jedi_gating.py docstring).
  progression_cooldowns_enabled: true

  # ── Faction set ──────────────────────────────────────────────────────────
  # These must match codes in organizations.yaml.
  # npc_only_factions are not joinable by players; used by Director AI only.
  factions:
    - republic
    - cis
    - jedi_order
    - hutt_cartel
    - bounty_hunters_guild
    - independent
  npc_only_factions:
    - sith          # Dooku/Sidious — NPC antagonists, never player-joinable
    - separatist_council  # CIS leadership tier, NPC only
    - stalgasin     # Geonosis dominant hive — NPC, Director-narrated
    - gehenbar      # Geonosis rival hive — NPC, Director-narrated

  # ── Starting defaults ────────────────────────────────────────────────────
  starting_room_slug: westport_arrivals    # Nar Shaddaa landing pad
  starting_faction: independent
  starting_credits_default: 500

  # ── Era flavor substitutions ─────────────────────────────────────────────
  # Used by Director AI and ambient event system to swap GCW terminology.
  # "default_imperial_substitute" = faction that fills "Imperial threat" role.
  # "default_rebel_substitute" = faction that fills "Rebel resistance" role.
  default_trooper_type: clone              # Clone troopers, not stormtroopers
  default_imperial_substitute: republic   # Republic = order/authority axis
  default_rebel_substitute: cis           # CIS = disruption/resistance axis
  hutt_cartel_stance: neutral_profiteering

  # ── Director AI knobs ────────────────────────────────────────────────────
  director_config_ref: director_config.yaml  # Clone Wars director baseline

content_refs:
  zones: zones.yaml
  organizations: organizations.yaml
  planets:
    - planets/tatooine.yaml
    - planets/nar_shaddaa.yaml
    - planets/coruscant.yaml
    - planets/kuat.yaml
    - planets/kamino.yaml
    - planets/geonosis.yaml
    - tutorials/rooms.yaml   # F.8.b (Apr 30 2026): 27 tutorial-zone-only rooms (planet="tutorial_chains") anchoring the 7 unlocked CW tutorial chains. All have properties.tutorial_zone=true so the runtime suppresses ambient/world events, NPC traffic, and CP tick accrual while the player is in-tutorial.
    # F.4 (Apr 30 2026): All six CW planets now active. Per-room exit dict
    # format supported by the loader (see clone_wars_era_design_v3.md §6).
  wilderness:
    # Drop 9 (May 3 2026): Tatooine Dune Sea minimal substrate. Hosts the
    # Village quest landmarks (per jedi_village.yaml) plus the 2 force-
    # resonant landmarks (anchor_stones, ruined_obelisk) plus the Hermit's
    # Hut. The full coordinate-grid wilderness engine (movement, hazards,
    # encounters per wilderness_system_design_v1.md Drops 2-7) is the
    # post-Village roadmap track.
    - wilderness/dune_sea.yaml
    # T2.3 (May 24 2026): Coruscant Underworld wilderness region.
    # Single-level (Brian's call to collapse the design's mid/low/bottom
    # Z-axis into one plane), minimal-substrate parity with Dune Sea.
    # 5 landmarks + 3 transit nodes pulled in via landmark_includes
    # from coruscant_underworld_landmarks.yaml and
    # force_resonant_landmarks.yaml (region-filtered). The full
    # encounter/hazard system is the next wilderness drop and will
    # cover both regions.
    - wilderness/coruscant_underworld.yaml
    # Lane D wilderness tier (2026-06-07): the E'Y-Akh — Geonosis's dune-sea
    # wilderness region. Full encounter pool (4 D6-re-statted Geonosis
    # creatures from npcs_creatures.yaml) + the Ebon Sea / Golbah's Pit
    # landmarks + an on-foot edge from the surface (ey_akh_desert_edge).
    # The annual-flood mechanic and Marmio Mio's freighter are follow-ups.
    - wilderness/ey_akh.yaml

  # ── Wilderness-anchored NPCs (Drop F.6, May 3 2026) ─────────────────────
  # NPCs whose home rooms are wilderness landmarks (i.e. rooms with
  # wilderness_region_id IS NOT NULL). These are loaded by
  # engine/npc_loader.py::load_wilderness_npcs() AFTER the wilderness
  # writer has populated the landmark rooms in the DB. Cannot use
  # the regular content_refs.npcs path because those resolve room
  # names against the yaml-bundle, which doesn't include wilderness
  # rooms. See Drop F.6 handoff for context.
  wilderness_npcs:
    - wilderness_npcs.yaml      # F.6: the Hermit at Hermit's Hut

  # ── Jedi Village NPCs (Drop F.7.b, May 4 2026) ──────────────────────────
  # NPCs at Village landmark rooms (also wilderness_region_id IS NOT NULL,
  # since Village rooms live inside the Dune Sea region's substrate).
  # Loaded by engine/npc_loader.py::load_jedi_village_npcs() AFTER the
  # wilderness writer + wilderness_npcs load. Mirrors the wilderness_npcs
  # contract — same room-resolution semantics, same NPC-config schema,
  # but the top-level YAML key is `jedi_village_npcs:` instead of
  # `wilderness_npcs:`. Sister Vitha (the Gate sentry) and Master Yarael
  # Tinré are the F.7.b NPCs; F.7.c/d will add Smith Daro, Elders Mira/
  # Korvas/Saro, and Padawan Sela for the trial runtime.
  jedi_village_npcs:
    - jedi_village/jedi_village_npcs.yaml
  # ── NPCs (per cw_content_gap_design_v1_1_decisions.md Drop A) ────────────
  # `npcs` is a list of files that engine/npc_loader.py loads in order. The
  # additions file adds CW-only NPCs with no GG7 antecedent (Vela Niree, etc.).
  # The replacements file substitutes 7 GG7 NPCs that are Imperial-keyed in
  # the GCW era and don't fit a 20 BBY Republic-Hutt-CIS world. Entries in
  # the replacements file have a `replaces:` field naming the GG7 NPC name
  # the engine should suppress when this era is active. Both files are
  # additive on top of the era-agnostic data/npcs_gg7.yaml roster, with
  # `replaces:` providing the suppression mechanism. The ordering matters
  # only to the human reader; engine merge is keyed by `replaces:` field.
  npcs:
    - npcs_cw_additions.yaml
    - npcs_cw_replacements.yaml
    - npcs_drop_h_combat.yaml      # Drop H (May 2026): 12 combat-capable NPCs (B1, B2, droideka, clones, Republic commando, Geonosian warriors) seeded across Geonosis, Coruscant, Kamino, Kuat. Per cw_content_gap_design_v1.md and dropH_combat_templates_v1.md.
    - npcs_drop_c1_coruscant.yaml  # Drop C1 (May 2026): 24 NPCs across Coruscant Senate District (12) + Jedi Temple (12). Per cw_content_gap_design_v1_1_decisions.md Stage 4. Q1 policy applied: no canonical Council members or Senators.
    - npcs_drop_def_civilians.yaml # Drop D+E+F batched (May 2026): 25 NPCs across Kamino (9) + Geonosis (8) + Kuat (8). Sparse-density civilian rosters complementing Drop H combat templates.
    - npcs_drop_g1_nar_shaddaa_topside.yaml  # Drop G1 (May 2026): 22 Nar Shaddaa topside NPCs (docking, cantinas, Smugglers' Guild, Bounty Hunters' Quarter, FDtS anchors Mak/Zekka/Renna/Doc Myrra). Per cw_content_gap_design_v1_1_decisions.md Stage 4. G2 will cover Hutt Tower / Warrens / Undercity / Spice Den / Fighting Pits.
    - npcs_drop_g2_nar_shaddaa_lower.yaml     # Drop G2 (May 2026): 23 Nar Shaddaa lower-level NPCs (Hutt Emissary Tower incl. Borka + Grek the FDtS loanshark fixer, Spice Den, Fighting Pits, The Grid slicers, 5 Warrens sub-rooms, Undercity, Enforcer Alley, Weapons Cache, Upper Dock Observation, Promenade Corporate Tower). Completes Drop G; brings Nar Shaddaa to 45 NPCs across 32 rooms (~1.4/room).
    - npcs_drop_b_mos_eisley.yaml             # Drop B (May 2026): 6 Mos Eisley CW polish NPCs (clone customs liaison, Republic Navy traffic controller, clone Eastern Gate patrol, Hutt Townhouse enforcer, dewback stable-keeper, Jawa trade-elder). Per cw_content_gap_design_v1_1_decisions.md Stage 4 Gap B. Tatooine total 64 NPCs across 54 rooms.
    - npcs_drop_c2_southern_underground.yaml       # Drop C2 (May 2026): 24 Coruscant Coco Town + Mid-City + Lower City + Underworld NPCs. Final atmospheric-NPC drop for CW. Per cw_content_gap_design_v1_1_decisions.md Stage 4 Gap C2. Coruscant total 49 across 31 of 72 rooms (active subset ~1.5/room; remaining 41 rooms are atmospheric reserves).
    - npcs_drop_f8c2a_chain_anchors.yaml     # Drop F.8.c.2.a (May 4 2026): 20 tutorial-chain anchor NPCs across 7 unlocked CW chains (republic_soldier, republic_intelligence, separatist_commando, separatist_agent, bounty_hunter, smuggler, shipwright_trader). Content prerequisite for F.8.c.2.b (event-hook wiring) and F.8.c.2.c (graduation teleport). Per F.8.c.1 handoff §"Does NOT" list and ROADMAP_RECONCILIATION_MAY04.md.
    - npcs_drop_f8c2b2_combat_templates.yaml  # Drop F.8.c.2.b₂ (May 4 2026): 4 hostile combat-template seed NPCs (B1 Sim Droid Alpha/Bravo at Tipoca combat sim, Republic Clone Simulant Alpha/Bravo at Geonosis drill pit). Each carries ai_config.chain_enemy_template so Phase 1's combat hook fires. Tarko Vinn was tagged in npcs_drop_f8c2a_chain_anchors.yaml (he is both a chain-anchor and a combat target). Together: all 3 combat_won completions in unlocked chains have spawnable enemies tagged.
    - npcs_drop_i_falleen_syndicate.yaml      # Drop I / Q1.3 (May 18 2026): 1 NPC. Vigo Sethel Vask, Falleen Black Sun Vigo, Coruscant operations seat. Replaces the legacy Xizor's Castle District (room 230) with an original character at the same room slot. Per Q1.3 design decision: Xizor referenced off-stage in lore.yaml only; Vask is the on-stage tower master.
    - npcs_drop_0a2_fdts_relocate.yaml        # Drop 0a-2 (Jun 2 2026): 1 NPC. Lira Shan, the Kuati Drive Yards ship broker, at "Kuat Drive Yards - Commercial Zone" — closes the "From Dust to Stars" Phase-5 ship-purchase climax (spacer_quest.py step 27), formerly routed through a Lira "on Corellia/Coronet" that the 06-01 era migration deleted and that was never seeded in CW. Per from_dust_to_stars_design_v2_clone_wars.md §49/§209/§538-546. Companion spacer_quest.py edits: travel objectives Kessel→Kuat, Corellia→Coruscant; step 24 retargeted from the (removed) Corellia NPC Venn Kator to Renna Dox, who is already seeded on Nar Shaddaa (design v2 §501-507). Companion NPC edit: Mak Torvin moved Nar Shaddaa→Docking Bay 94 within npcs_drop_g1_nar_shaddaa_topside.yaml. NOTE: CW does not load the gg7 base roster, so gg7 NPCs (Venn, Kayson) are absent from CW — addressed for the cantina + Venn + Kayson by npcs_mos_eisley_population_p1.yaml below.
    - npcs_mos_eisley_population_p1.yaml       # Mos Eisley population recovery, Phase 1 (Jun 2 2026): 12 era-portable GG7 Mos Eisley locals, re-skinned for CW per cw_content_gap_design_v1_1_decisions.md Q5 + the gg7_mos_eisley_extraction_v1.md era playbook (no Empire; Hutts run Tatooine; war is distant news). The CW Tatooine map already has the GG7 rooms, but the GG7 roster never loads in CW (only GCW lists ../../npcs_gg7.yaml), so Chalmun's Cantina held a single NPC. Phase 1 = the cantina core (Wuher, Chalmun, Muftak, Kabe, Djas Puhr, Hem Dazon, M'iiyoom Onith, Bom Vimdin, Cantina Bouncer) + two FUNCTIONAL NPCs whose absence broke CW systems: Venn Kator at Docking Bay 94 - Pit Floor (the data/schematics.yaml `trainer_npc` for ship-component recipes; now given a real train_skills list) and Kayson at Kayson's Weapon Shop (room+lore already reference him). No overlap with npcs_cw_replacements.yaml. Phase 2+ covers the street/shop/service tiers + the 8 salvageable GCW-coupled NPCs.
    - npcs_mos_eisley_population_p2.yaml       # Mos Eisley population recovery, Phase 2 (Jun 2 2026): the UTILITY tier — 6 service-anchor NPCs, one per real service gap: Heist (medic @ The Cutting Edge Clinic), Zygian Teller (banker @ Zygian's Banking Concern), Lup (general store @ Lup's General Store — re-skinned Rebel→neutral Ithorian merchant), Geordi Hans (speeder dealer @ Spaceport Speeders), De Maal (independent bay operator @ Docking Bay 94 - Entrance), Gep (food grill @ Market Place - Gep's Grill). Same re-skin/era discipline as Phase 1. Density is deliberately CAPPED per user directive (2026-06-02): "don't go crazy with NPCs on Tatooine — flavor and utility, but PCs are the focus" — this SUPERSEDES the content-gap Q6 ~1.4/room target for Tatooine. Transactional mechanics (shop/medical/vehicle) are separate-system concerns, not NPC seeding. No collision with Phase 1 or npcs_cw_replacements.yaml. Phase 3 (lean street ambiance + leftover service NPCs) and Phase 4 (8 salvageable GCW-coupled) scheduled in TODO.json; ANH-plot figures (BoShek/Evazan/Garindan) not ported unless a quest wants one.
    - npcs_drop_craft_c_armorer.yaml          # CRAFT.GUNDARK Drop C (Jun 11 2026): 1 NPC. Sela Tarn, armorer + armor_repair skill trainer, at "Kayson's Weapon Shop" — the teacher half of the Drop C armor schematic family (10 recipes, trainer_npc: Sela Tarn). Co-located per the 2026-06-02 Tatooine density directive (one storefront, two trades). Original character per Q1.
    - npcs_drop_craft_e_outfitter.yaml        # CRAFT.GUNDARK Drop E (Jun 11 2026): 1 NPC. Vek Nurren, Sullustan field outfitter + survival skill trainer, at "Lup's General Store" — the DANGLING trainer behind five existing gear schematics (cooling_unit/breath_mask/radiation_suit/anti_theft_alarm/water_canteen were unlearnable phantom-teaching until this seed) plus Drop E's luma_flare + animal_excluder. Co-located per the density directive. Original character per Q1.
    - npcs_drop_craft_g_gundark.yaml          # CRAFT.GUNDARK Drop G (Jun 12 2026): 1 NPC. Gundark — the catalog's own in-fiction compiler — Whiphid black-market arms dealer + contraband recipe trainer (disruptor_pistol/predator_rifle/anti_vehicle_grenade, all contraband: true) at "Nar Shaddaa - Undercity Market". The lane finale's bookend. WEG original persona per Q1.
    - npcs_drop_b_t5_trainers.yaml            # T5-questline arc Drop B (Jun 13 2026): master-trainer NPCs + questline enemies for the t5 schematic unlocks. Vertical slice 1: Master Vehn Tasaal (Jedi Master, lightsaber trainer, trainer_npc for t5_master_crafted_lightsaber) at "Jundland Wastes - Hidden Cave" (contested_marches) + the Canyon Krayt-Spawn enemy (chain_enemy_template jundland_krayt_spawn) at the Krayt Dragon Graveyard for the master_jedi_lightsaber questline's combat step. The t5 recipe is gated (gated_by_questline + gated_faction on the schematic): visible in his curriculum only after completing "The Hermit's Trial" AND Jedi Order rep >= 50. Remaining 4 masters follow this template in a companion drop.
    - npcs_drop_mob_grind_nar_shaddaa.yaml    # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs across Nar Shaddaa lower criminal belt (Enforcer Alley x2, Warrens Entry Shaft/Reactor Core/Squat Block, Undercity Depths). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. Huntable by the solo-PvE grind loop (engine/hunting_rewards.py). Original characters, era-clean, WEG D6 stats.
    - npcs_drop_mob_grind_geonosis.yaml       # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs across Geonosis (Droid Staging Ground, Foundry Upper Level, B2 Assembly, Deep Hive Tunnel, Upper Hive Tunnel, CIS Field Command Post). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. B1x2, B2 malfunction, Geonosian warriors x2, CIS merc. Original characters, era-clean, WEG D6 stats.
    - npcs_drop_mob_grind_coruscant.yaml      # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs across Coruscant lower city / underworld (Invisible Sector Main Street, Ice Crypts, Lower City Black Market, Factory District, Southern Underground, Coruscant Works Industrial Sublevel). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. Twi'lek/Aqualish/Nikto/Human/Zabrak/Besalisk. Original characters, era-clean, WEG D6 stats.
    - npcs_drop_mob_grind_tatooine.yaml       # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs across Jundland Wastes (Canyon Mouth x2, Beggar's Canyon x2, Tusken Camp Overlook, Dune Sea Edge). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. Tusken Raiders x3, Giant Womp Rat x1, Human outlaws x2. Original characters, era-clean, WEG D6 stats (unverified vs WEG40120 PDF — sourced absent in tree).
    - npcs_drop_mob_grind_tatooine_outskirts.yaml # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs across City Outskirts (Eastern Gate x1, Abandoned Moisture Farm x1, Speeder Track x1, Wrecked Sandcrawler x1, Hermit's Ridge x1, Desert Trail Junction x1). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. Swoop gang x2 (scout/enforcer), desperate squatter x1, Womp Rat x1, outlaw lookout x1, trail bandit x1. Original characters, era-clean, WEG D6 stats.
    - npcs_drop_mob_grind_kamino.yaml         # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs across Kamino exterior platforms and maintenance corridors (Pylon Access x2, Unauthorized Docking Pt x2, Ocean Surface x1, Lower Platform x1). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. CIS saboteur team x2, pirate/mercenary x2, native creature x1, AWOL deserter x1. Original characters, era-clean, WEG D6 stats.
    - npcs_drop_mob_grind_kuat.yaml           # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs across KDY orbital ring (Ring Warehouse District x2, Machine Shops x1, Factories x1, Supply Space Station x1, Deporin Shipyards x1). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. CIS operatives x3 (cargo, fabrication saboteur, rogue droid), black-market runner x1, pirate scout x1, Trandoshan salvage stripper x1. Original characters, era-clean, WEG D6 stats.
    - npcs_drop_mob_grind_geonosis_arena.yaml # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs in the Petranaki Arena and Gladiator Barracks (Arena Floor x2, Creature Pens x1, Training Pit x1, Muster Yard x1, Slavemaster's Den x1). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. Creatures x2 (escaped acklay spawn, maddened reek calf), Geonosian arena/barracks wardens x2, Human gladiator x1, Nikto slavemaster x1. Original characters, era-clean, WEG D6 stats.
    - npcs_drop_mob_grind_geonosis_foundry.yaml # Mob-grind batch (Jun 21 2026): 6 roaming hostile NPCs across Geonosis Droid Foundry and Hive interior (Foundry Main Floor x1, Control Center x1, Secondary Deep Level x1, Main Hive Chamber x1, Warrior Caste Barracks x1, Battle Ruins x1). All satisfy is_huntable_mob() — hostile=true, no special-reward markers. Droids x2 (scrambled B1, rogue maintenance chassis), Geonosian warriors x3 (foundry marshal, hive champion, barracks veteran), Trandoshan scavenger x1. Original characters, era-clean, WEG D6 stats.
    - npcs_drop_mob_grind_nar_shaddaa_deep.yaml # Mob-grind expansion (Jun 21 2026): 6 hostile NPCs filling the 6 Nar Shaddaa rooms previously without mob coverage (Warrens: Fungal Cavern/Scavenger Den/Collapsed Plaza; Undercity: Spice Den/Droid Junkyard/Fighting Pits). Evocii Tunnel Warden x1 (vibroblade), Scavenger Camp Sentry x1 (blaster_pistol), Tunnel Stalker x1 (creature/brawling), Spice Den Enforcer x1 (blaster_pistol), Rogue Patrol Droid x1 (blaster_pistol), Pit Floor Enforcer x1 (vibroaxe). All satisfy is_huntable_mob(). Original characters, era-clean, WEG D6 stats.
