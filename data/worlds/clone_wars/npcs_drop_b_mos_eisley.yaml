# data/worlds/clone_wars/npcs_drop_b_mos_eisley.yaml
#
# Drop B — Mos Eisley CW Additions (May 2026)
#
# Per cw_content_gap_design_v1_1_decisions.md Stage 4 sequencing,
# Drop B is the smallest remaining CW.NPCS drop — Tatooine is
# already healthy at 58 NPCs (51 from GG7 carryover + 7 from
# Drop A's CW replacements / cw_additions). Drop B is polish:
# adds CW-specific flavor NPCs to a small set of intentionally
# empty rooms that benefit from era-coupled presence.
#
# Per the plan (cw_content_gap_design_v1.md Gap B):
#   "clone patrol, Republic customs liaison, Hutt enforcers, etc.
#    Depends on J1 (GG6 archetypes for the Hutt enforcers)."
#
# Drop B authors 6 NPCs across 6 empty rooms:
#
#   1. Republic Checkpoint        — clone customs liaison (CT-2207)
#   2. Mos Eisley Spaceport Control Tower — Republic Navy traffic controller
#   3. City Outskirts - Eastern Gate — clone patrol pair (one trooper)
#   4. Jabba's Townhouse Main Entrance — Hutt enforcer (Jabba canonical-
#      reference, off-screen at his palace at the Dune Sea)
#   5. Dewback Stables and Garage — local stable-keeper
#   6. Jawa Traders               — Jawa trade-elder (canonical Jawa role)
#
# Rooms intentionally LEFT empty after Drop B:
#   - Jundland Wastes (5 rooms) — atmospheric desert; reserved for
#     quest content and Padawan-Master Hermit interim NPC
#     (Hermit's Ridge specifically per padawan_master_system_design_v1.md)
#   - City Outskirts - Abandoned Moisture Farm — atmospheric
#   - City Outskirts - Wrecked Sandcrawler — atmospheric
#   - City Outskirts - Desert Trail Junction / Speeder Track /
#     Scavenger Market — low-traffic outskirts, can stay empty
#   - Various street corners and quiet rooms — atmospheric
#
# After Drop B, Tatooine is at 64 NPCs across 54 rooms (~1.2/room),
# matching the Q6 hangout-planet density target with intentional
# empty-room atmospheric reserves.
#
# Schema follows the canonical Vela Niree (npcs_cw_additions.yaml)
# reference per J1 handoff §6.7.
#
# ── POLICY CONSTRAINTS APPLIED ─────────────────────────────────────
#
# Q1 (canonical character cameos = EXTREMELY RESTRICTED):
#   - Jabba the Hutt does NOT appear; he is canonical-reference
#     and remains at his palace at the Dune Sea (canonically off-
#     screen for the open world; the Hutt enforcer at the Townhouse
#     is a non-canonical lieutenant named Greeshk).
#   - No canonical Tusken figures.
#   - No canonical Mos Eisley figures (no Wuher, no Greedo, no Cantina
#     band, etc.) — those are reserved if Mos Eisley cantina content
#     is ever expanded post-launch.
#   - Clones in Drop B use non-canonical CT designations.
#
# Q2 (mid-war ~20 BBY): Republic presence on Tatooine is canonically
#   light during the Clone Wars — the Outer Rim is a backwater for
#   the war. The Republic Checkpoint is small and underfunded; the
#   Spaceport Control Tower has one Navy liaison rotating in
#   periodically; the clone patrol at the Eastern Gate is a token
#   presence. Hutt influence dominates day-to-day; Republic
#   intervenes only when smuggling routes become a war-relevant
#   issue.
#
# Q5 (re-skin first, source canon second, bespoke last):
#   - Clone NPCs use the Drop H combat template stats (CT-77xx series)
#     adjusted for non-combat liaison/patrol roles
#   - Hutt enforcer Greeshk grounded in GG6 Yerkys ne Dago archetype
#     (same J1 §8.3 derivation as Grek, but more local-thug-coded
#     since Greeshk is a Townhouse muscle, not a portfolio fixer)
#   - Jawa trade-elder grounds in canonical Jawa scavenger-market
#     role; non-canonical specific named figure
#
# Q6 (variable density per planet, Tatooine = ~1.2/room hangout):
#   54 rooms × 1.2 = ~65 NPCs. Drop B brings total to 64. On target.

schema_version: 1

npcs:

  # ════════════════════════════════════════════════════════════════════
  # REPUBLIC PRESENCE — 3 NPCs
  # ════════════════════════════════════════════════════════════════════

  - name: Clone Customs Liaison CT-2207 'Stamp'
    room: City Outskirts - Republic Checkpoint
    species: Human
    description: >-
      A clone trooper in dust-streaked Phase II armor with the
      orange-and-cream Customs Liaison detail markings, seated on
      an upturned crate at the Republic Checkpoint with a battered
      datapad and a stack of docking manifests. The checkpoint is
      a temporary structure — prefab walls, a single processing
      desk, a comm rig — built three years ago and never upgraded.
      Stamp has been here for fourteen months and considers the
      assignment a punishment posting. He does not say so.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D+2
        mechanical: 2D+1
        perception: 3D
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 4D+1
        brawling: 3D+2
        bureaucracy: 4D
        dodge: 3D+2
        intimidation: 2D+2
        investigation: 3D+1
        languages: 2D+2
        scholar_galactic_trade_law: 3D
        search: 4D
        streetwise_tatooine: 3D
        tactics: 3D
      weapon: blaster_rifle
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Clone trooper, Customs Liaison detail, Tatooine Republic
        Checkpoint. Fourteen months at this post. Got the callsign
        'Stamp' for processing manifests faster than the Republic
        bureaucracy expected possible. Considers the assignment a
        backwater posting; the Outer Rim doesn't matter to the war
        and Tatooine doesn't even matter to the Outer Rim. Polite
        with travelers; brisk with smugglers; quietly bored. Has
        not personally fired his rifle in anger in fourteen months.
      knowledge:
      - "CT-2207 'Stamp', Customs Liaison detail. 14 months at this post."
      - "Republic Checkpoint is a temporary prefab; never upgraded."
      - "Processes ~30 docking manifests a day; flags maybe two for inspection."
      - "Hutt enforcement is the actual law on Tatooine; the checkpoint is symbolic."
      - "Has reported Hutt-affiliated smuggling activity up the chain three times. Nothing came back."
      - "Misses his vode'. Knows two of his cohort died at Christophsis."
      faction: republic
      dialogue_style: >-
        Mando-accented Basic (clone-standard), polished by 14 months
        of customs work. Brisk, professional, occasionally dry. Calls
        travelers "citizen"; calls Hutts "sir" with the same neutral
        cadence.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Republic Checkpoint. Manifest please, citizen.'"
      - "*Stamp scans your manifest absently. 'No flags. Welcome to Tatooine.'*"
      - "'Inspections are random and rare. The Hutts run the rest of the planet. The checkpoint is a formality.'"
      - "*He glances at the comm rig. 'Reports go up the chain. Nothing comes back. The chain is busy with the war.'*"
      - "'Fourteen months. Two more to rotation. Then maybe somewhere the war actually is.'"

  - name: Republic Navy Traffic Controller Lt. Vesh Talon
    room: Mos Eisley Spaceport Control Tower
    species: Human
    description: >-
      A Republic Navy lieutenant in dust-stained service uniform
      seated at the spaceport's central traffic console — a single
      operator station overlooking three landing-bay sectors and
      two atmospheric approach lanes. The console is older than
      she is; one of the displays flickers periodically. She is
      mid-career, six months into a year-long rotation, and is
      already counting the days back.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 3D+1
        perception: 3D+2
        strength: 2D+1
        technical: 3D
      skills:
        blaster: 3D+2
        bureaucracy: 4D
        capital_ship_piloting: 3D+2
        command: 3D+1
        computer_programming_repair: 3D+2
        dodge: 3D+1
        languages: 3D+2
        scholar_starship_recognition: 4D+2
        sensors: 4D+1
        space_transports: 3D+2
        starship_piloting: 4D
        tactics: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Republic Navy Lieutenant, year-long Tatooine traffic-control
        rotation. Was a Venator bridge officer before the rotation;
        considers this the dullest assignment of her career and
        has worked out it is also the safest. The console is
        ancient. The traffic is light. The Hutts run the spaceport
        in every way that matters; the Republic operates the
        formal traffic-control function only because someone has
        to officially log the manifests. Six months in, six to go.
      knowledge:
      - "Lt. Vesh Talon, Republic Navy. 6 of 12 months on this rotation."
      - "Was a Venator bridge officer before the rotation."
      - "Mos Eisley spaceport handles ~200 ship movements a day."
      - "Hutts run the spaceport's actual operations. Republic logs the formal manifests."
      - "Coordinates with CT-2207 ('Stamp') at the Republic Checkpoint."
      - "Has flagged three suspicious cargo profiles to Coruscant Naval Intelligence in 6 months. No follow-up on any of them."
      - "Misses Venator duty. Considers this rotation a useful reminder of how good Venator duty was."
      faction: republic
      dialogue_style: >-
        Coastal Core Worlds accent, polished. Crisp, professional,
        slightly worn. Calls civilians "captain" if they have a
        ship; "citizen" otherwise.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Mos Eisley Spaceport Control. Lt. Talon. Authorized?'"
      - "*A flickering display gets a brief glare from Talon. She returns to you.* 'My console is older than the Republic's customs treaties. Apologies.'"
      - "'Two hundred movements a day. The Hutts run the docking. I log the manifests. The arrangement works because everyone has agreed it does.'"
      - "'Six months in, six to go. Then back to a Venator. Possibly. War schedule depending.'"
      - "*She glances at the sensor feed.* 'Inbound on Lane Two — looks like a Ghtroc. Common type. Light traffic today.'"

  - name: Clone Patrol Trooper CT-7041 'Dust'
    room: City Outskirts - Eastern Gate
    species: Human
    description: >-
      A clone trooper in heat-modified Phase II armor — pale tan
      desert overlay, helmet temporarily off and clipped to belt,
      a sun-bleached sandscarf wrapped at his neck. He stands at
      the Eastern Gate of Mos Eisley with his rifle slung loose,
      watching the road. His patrol partner is around the corner
      handling a brief comm check. Dust has been on Tatooine for
      eight months; the cohort jokes that the desert is named for
      him now.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 2D+1
        mechanical: 2D+1
        perception: 3D+1
        strength: 3D
        technical: 2D+1
      skills:
        blaster: 4D+2
        brawling: 3D+2
        dodge: 4D
        intimidation: 3D+1
        languages: 2D+2
        melee_combat: 3D+2
        scholar_tatooine_geography: 2D+2
        search: 3D+2
        streetwise_tatooine: 2D+2
        survival_desert: 3D+2
        tactics: 3D+1
      weapon: blaster_rifle
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Clone trooper, Tatooine garrison Eastern Gate patrol. Eight
        months on-planet. Got the callsign 'Dust' from a sandstorm
        incident in his second week that became cohort legend.
        Friendlier than Stamp; the Eastern Gate sees more civilian
        traffic than the Republic Checkpoint and Dust has learned
        to chat. Considers the patrol assignment uneventful in a
        good way. Has not had to draw his rifle in anger here once.
      knowledge:
      - "CT-7041 'Dust', Eastern Gate patrol. 8 months on Tatooine."
      - "Patrol partner CT-7062 'Bink' is around the corner doing a comm check."
      - "Eastern Gate sees ~50 travelers a day. Mostly Jawas and locals."
      - "Hutts run the gate's de-facto entry tax. Republic looks the other way."
      - "Knows the regular travelers by face; has learned a few Jawa traders' names by trade-talk."
      - "Has not personally seen Tusken Raiders. Has heard about them. Believes the locals."
      faction: republic
      dialogue_style: >-
        Mando-accented Basic, polished by 8 months around civilians.
        Friendly, dry, occasionally chats about the weather (which
        is always hot). Calls civilians "friend" without graduation.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "*Dust glances at you and nods. 'Eastern Gate. Going in or coming out?'*"
      - "*He gestures with his chin toward the road.* 'Hot today. Always hot. The locals say it gets hotter. I don't know if they're joking.'"
      - "'My partner's around the corner. Comm check. Should be back in a minute.'"
      - "*Dust adjusts the sandscarf at his neck.* 'Eight months. I rotate in four. Then somewhere with rain, maybe.'"
      - "'No, the Republic doesn't enforce on Tatooine the way it does in the Core. Hutts run the day-to-day. We just stand here.'"

  # ════════════════════════════════════════════════════════════════════
  # HUTT-AFFILIATED — 1 NPC
  # ════════════════════════════════════════════════════════════════════

  - name: Hutt Enforcer Greeshk
    room: Jabba's Townhouse - Main Entrance
    species: Twi'lek
    description: >-
      A male Twi'lek with deep red skin in dark Hutt-Cartel
      enforcement leather — sturdy, professionally cut, the small
      hexagonal Cartel seal at the shoulder. He stands at the
      entrance of Jabba's Townhouse — a Mos Eisley city residence
      Jabba (canonical-reference; off-screen at his palace at the
      Dune Sea) maintains for visiting business — with the
      relaxed-but-aware posture of a long-experienced bouncer.
      His headtails are decorated with small plain ornaments —
      Twi'lek formal markings of an enforcer who has earned his
      role through competence rather than violence.
    char_sheet:
      # Per gg6_tramp_freighters_extraction_v1.md §8.3, this Hutt
      # enforcer grounds in GG6 Yerkys ne Dago (p.73) but as a
      # local-thug variant — physical-combat skills boosted at
      # the cost of the bureaucratic/social-engineering skills
      # that define Yerkys himself. Differs from Grek (the
      # debt-portfolio fixer) by leaning into the muscle role.
      attributes:
        dexterity: 3D+1
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D+1
        strength: 3D+1
        technical: 2D
      skills:
        bargain: 3D+2
        blaster: 4D+2
        brawling: 5D
        bureaucracy: 2D+2
        command: 3D+1
        con: 3D+2
        cultures: 3D
        dodge: 4D+1
        intimidation: 5D+1
        investigation: 3D+2
        languages: 4D+2
        melee_combat: 4D+2
        scholar_huttese_etiquette: 4D
        search: 3D+2
        streetwise_tatooine: 4D+2
        survival_desert: 3D+1
        willpower: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 1
    ai_config:
      personality: >-
        Twi'lek Hutt-Cartel enforcer, Mos Eisley Townhouse detail.
        Eleven years in Jabba's service (Jabba is canonical-
        reference; remains at the palace at the Dune Sea). The
        Townhouse is a city residence Jabba maintains for visiting
        business; Greeshk is its day-to-day muscle. Professional,
        unsentimental, surprisingly polite by enforcer standards.
        DSP=1 from a long career of choices that have ended badly
        for the people on the receiving end. Reports to a Hutt-
        Cartel lieutenant who reports to Jabba's majordomo
        (canonical-reference; also off-screen at the palace).
      knowledge:
      - "Hutt-Cartel enforcer, Mos Eisley Townhouse, 11 years."
      - "Reports to a Cartel lieutenant; ultimately to Jabba's majordomo (Jabba is canonical-reference; remains at his palace at the Dune Sea)."
      - "Townhouse is for Jabba's visiting Mos Eisley business; Jabba himself does not visit."
      - "Twi'lek; came from Ryloth pre-war; entered Jabba's service through a smuggling-network connection."
      - "Has had to physically remove three petitioners in 11 years. None has died."
      - "Knows the Mos Eisley underworld intimately. Will trade information for credits."
      - "Considers Republic presence on Tatooine theatrical. The Hutts are the law here."
      faction: hutt_cartel
      dialogue_style: >-
        Twi'lek-accented Basic — soft consonants, slight musical
        lilt; the headtail micro-gestures sometimes communicate
        more than the words. Calm, professional. Calls petitioners
        by their full name once he knows it; "friend" with
        graduated warmth otherwise.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "*Greeshk's eyes track you. He does not move. 'Petitioner. State your business with the Townhouse.'*"
      - "*A headtail twitch — controlled.* 'Jabba is not here. Jabba does not come to Mos Eisley. Jabba's business in the city goes through me first.'"
      - "'No appointment, no entry. Cartel petition forms are at the Mos Eisley merchant office. Three days to process.'"
      - "*Greeshk gestures at the closed Townhouse door.* 'The Townhouse is for negotiated visits. Walk-ins are turned away. Most leave under their own power. Most.'"
      - "'I have been in Jabba's service eleven years. I know the underworld better than the Republic does. If your business is with the Cartel, you may speak. Briefly.'"

  # ════════════════════════════════════════════════════════════════════
  # LOCAL FLAVOR — 2 NPCs
  # ════════════════════════════════════════════════════════════════════

  - name: Stable-Keeper Old Brana Nesh
    room: Dewback Stables and Garage
    species: Human
    description: >-
      An older woman in a loose desert-cut tunic and worn leather
      boots, brushing down a dewback in one of the stable's open
      stalls. The dewback — a saddle-broken male, six standard
      years old, reliable — leans into the brushing. Brana has
      run the Dewback Stables and Garage for thirty-one years.
      She has outlasted four Mos Eisley sheriffs and three
      Hutt-Cartel enforcer lieutenants and intends to outlast
      several more.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 3D+2
        perception: 4D
        strength: 2D+2
        technical: 3D+1
      skills:
        bargain: 4D+1
        beast_riding: 5D+2
        blaster: 3D
        brawling: 3D+1
        dodge: 3D
        first_aid: 3D+1
        languages: 3D+2
        repulsorlift_operation: 4D+1
        repulsorlift_repair: 4D+2
        scholar_dewback_husbandry: 5D+2
        scholar_tatooine_lore: 5D
        starship_repair: 3D
        streetwise_tatooine: 4D+2
        survival_desert: 5D
        value: 4D
        willpower: 4D+1
      weapon: hold_out_blaster
      move: 10
      force_points: 3
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Stable-keeper, 31 years. Was a freighter-mechanic's
        apprentice in her youth; took over the stables from her
        late husband 18 years ago and added a small repair garage
        on the side. Knows dewbacks better than most Tatooinians;
        knows the desert better than most Tatooinians; knows
        Mos Eisley's underbelly because the underbelly comes by
        for repairs. Will rent a dewback to anyone with credits
        and a deposit. Will repair a speeder for anyone with
        credits and patience.
      knowledge:
      - "Stable-keeper, 31 years. Late husband ran it before her."
      - "Eight dewbacks in current rotation. Three available for rent (5 cr/day)."
      - "Garage handles speeder repairs; queue is currently 3 days."
      - "Knows the regular customers — locals, smugglers, occasional Republic personnel."
      - "Has met Greeshk the Cartel enforcer. Treats him like everyone else; he respects that."
      - "Has heard Tusken activity has been quiet recently. Doesn't trust the quiet."
      faction: independent
      dialogue_style: >-
        Tatooine-Outer-Rim accent — flatter than Coruscant, slower
        than Mos Eisley. Direct, dry, the cadence of someone who
        spends most days talking to dewbacks and finds humans
        only marginally more verbose.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "*Brana doesn't pause her brushing. 'Stables open. Five credits a day, fifty deposit. Garage queue's three days.'*"
      - "*She glances at you over the dewback's flank.* 'You riding, fixing, or browsing? Browsing is fine. Touching the dewbacks costs five credits.'"
      - "'Thirty-one years on this lot. Outlasted the four sheriffs. Plan to outlast more.'"
      - "*The dewback huffs; Brana scratches its jaw absently.* 'Reliable. Six years. Saddle-broken. You won't get bucked unless you deserve it.'"
      - "'Tusken's been quiet recently. Don't trust the quiet. Quiet means they're somewhere else.'"

  - name: Jawa Trade-Elder Ruzz-tha
    room: Jawa Traders
    species: Jawa
    description: >-
      A small hooded figure — perhaps a meter tall — in the
      heavy patchwork robes that mark all Jawas, glowing yellow
      eyes barely visible in the depths of the hood. Ruzz-tha is
      the trade-elder of a small Jawa trading post operating out
      of a converted Mos Eisley warehouse — distinct from the
      sandcrawler-based itinerant Jawa clans, this trading post
      is the city-fixed half of the operation. He has been the
      elder for nine standard years.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 3D+2
        mechanical: 3D+2
        perception: 4D
        strength: 1D+2
        technical: 4D
      skills:
        bargain: 5D+2
        computer_programming_repair: 4D+1
        con: 3D+2
        droid_programming: 4D
        droid_repair: 5D
        hide: 4D+1
        languages: 5D
        scholar_droid_history: 4D+2
        scholar_jawa_lore: 5D+2
        scholar_tatooine_lore: 4D+2
        sneak: 4D
        starship_repair: 3D+2
        streetwise_tatooine: 4D
        survival_desert: 5D+1
        value: 5D+1
      weapon: ion_blaster
      move: 8
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Jawa trade-elder, 9 years in role. The trading post is the
        city-fixed half of a Jawa scavenger operation; the
        sandcrawler-based half (his cousins) brings in salvage
        from the deep desert and the post sells it to Mos Eisley
        buyers. Ruzz-tha is canny, deeply transactional, deeply
        loyal to his clan, mildly disdainful of off-worlders who
        try to bargain him down. Speaks Basic only when forced
        to; prefers Jawaese supplemented with hand-gestures.
      knowledge:
      - "Jawa trade-elder, 9 years. Clan: Tha-tha-zikkik (canonical Jawa naming pattern)."
      - "Trading post is city-fixed; cousin sandcrawler clan brings in deep-desert salvage."
      - "Stock: salvaged droid components, refurbished droids (some rebuilt by Ruzz-tha himself), miscellaneous tech."
      - "Refuses to sell to non-Jawa buyers without 30% upfront. Ancestral policy."
      - "Knows Brana Nesh the stable-keeper — they trade favors occasionally."
      - "Has heard Tusken activity is quiet. Considers it ominous; Jawas know the desert."
      faction: independent
      dialogue_style: >-
        Jawaese-accented Basic — high-pitched, breathy, very fast
        when excited. Calls everyone "off-worlder" except other
        Jawas. Punctuates sentences with the canonical Jawa
        exclamation when something delights or alarms him.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "*Ruzz-tha's eyes glow from the hood. 'Utinni! Off-worlder buyer? Or browser?'*"
      - "'Salvaged droids. Components. Refurbished tech. Cheap by city standards. Fair by Jawa standards.'"
      - "*He gestures at a stack of droid parts; the gesture is excited and economical at once.* 'Power couplings, motivators, sensor arrays. Bring credits.'"
      - "'Thirty percent upfront for non-Jawa buyers. Clan rule. Five thousand years of clan rule. Will not change for you.'"
      - "*A long Jawa exclamation, untranslated. Tone: pleased. He has just sold something to someone behind you.*"
