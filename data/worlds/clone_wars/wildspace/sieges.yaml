# data/worlds/clone_wars/wildspace/sieges.yaml
# Sieges Theater — wildspace cache pools   [T3.16 Drop 2]
# space_wildspace_design_v1.md §3.1, §4.1
#
# Loaded by engine/space_caches.py::_load_wildspace_pools() into CacheDef
# objects keyed {zone_key: {cache_def_id: CacheDef}}. Consumed by the `mine`
# command (parser/space_commands.py MineCommand).
#
# Schema (mirrors engine/space_caches.CacheDef):
#   zones.<zone_key>.theater          str   flavor tag (sieges)
#   zones.<zone_key>.caches.<def_id>:
#       kind            "mining" | "faction_cache" | "derelict"
#       visibility      "universal" | [faction_code, ...] | "hidden"
#       respawn_minutes int   cooldown length
#       density         int   avg instances active at once
#       yield_table     list of [weight, rtype, qty_min, qty_max, qual_min, qual_max]
#       rep_reward      optional {faction_code: delta}
#
# DROP 2  — mining nodes (kind: mining), universal + republic/cis faction
#           visibility. Harvested via the `mine` command (Pilot skill check).
# DROP 2b — rep-bearing faction caches (kind: faction_cache) added below each
#           zone: clone survival pods (republic), Jedi recovery beacons
#           (jedi_order), CIS recovery markers (cis), clone-bounty dead drops
#           (bounty_hunters_guild), Hutt salvage claims (hutt_cartel). These
#           are markers, not nodes — harvested via the `harvest` command (NO
#           skill check, §4.3), granting resources + a small (2–5) faction rep
#           reward through engine.organizations.adjust_rep (personal faction
#           standing — the same rep the visibility gate reads). The Drop-1a
#           adjust_territory_influence(zone_id=0) placeholder is GONE.
#
# rtype values must be registered in engine.crafting.RESOURCE_TYPES:
#   metal, composite, rare, energy, electronic, scavenged_republic_tech,
#   kyber_shard_minor

schema_version: 1

zones:

  # ── Geonosis Front — fresh CIS/Republic battle debris (MEDIUM theme) ──────
  geonosis_front:
    theater: sieges
    caches:

      # Universal: every PC sees these on `mine`.
      droid_scrap_cluster:
        kind: mining
        visibility: universal
        respawn_minutes: 45
        density: 5
        yield_table:
          # [weight, rtype, qty_min, qty_max, qual_min, qual_max]
          - [50, metal,      2, 6, 40, 70]
          - [30, electronic, 1, 3, 35, 65]
          - [20, composite,  1, 2, 45, 75]

      munitions_debris:
        kind: mining
        visibility: universal
        respawn_minutes: 50
        density: 3
        yield_table:
          - [55, energy,    2, 5, 45, 75]
          - [30, metal,     1, 3, 40, 65]
          - [15, rare,      1, 2, 55, 85]

      hull_plating_drift:
        kind: mining
        visibility: universal
        respawn_minutes: 40
        density: 4
        yield_table:
          - [60, metal,     3, 7, 35, 60]
          - [40, composite, 1, 3, 40, 70]

      # Republic-visible: rep >= 0 with `republic` to detect. No rep reward
      # (the rep-bearing clone survival pods are the deferred faction_cache).
      republic_supply_debris:
        kind: mining
        visibility: [republic]
        respawn_minutes: 60
        density: 2
        yield_table:
          - [55, metal,     2, 5, 50, 75]
          - [30, energy,    1, 3, 45, 70]
          - [15, composite, 1, 2, 50, 80]

      # CIS-visible: intact battle-droid platoons stripped as parts.
      cis_droid_platoon_scrap:
        kind: mining
        visibility: [cis]
        respawn_minutes: 60
        density: 2
        yield_table:
          - [50, electronic,              2, 5, 45, 70]
          - [30, scavenged_republic_tech, 1, 2, 50, 75]
          - [20, metal,                   2, 4, 40, 65]

      # ── Faction caches (Drop 2b) — `harvest <id>`, no skill check ──────────

      # Republic-visible: downed clone trooper survival pods (rep + supplies).
      clone_survival_pod:
        kind: faction_cache
        visibility: [republic]
        respawn_minutes: 90
        density: 2
        rep_reward: {republic: 2}
        yield_table:
          - [50, metal,     2, 4, 50, 75]
          - [30, energy,    1, 3, 50, 75]
          - [20, composite, 1, 2, 55, 80]

      # Jedi-visible: recovery beacons for downed Jedi pilots. Big rep;
      # kyber fragments + lightsaber components. Density 1, long respawn —
      # the only player-reachable kyber_shard_minor faucet in wildspace.
      jedi_recovery_beacon:
        kind: faction_cache
        visibility: [jedi_order]
        respawn_minutes: 180
        density: 1
        rep_reward: {jedi_order: 5}
        yield_table:
          - [45, electronic,        1, 3, 55, 80]
          - [35, rare,              1, 2, 60, 85]
          - [20, kyber_shard_minor, 1, 1, 55, 80]

      # CIS-visible: recovery markers planted by retreating droid command.
      cis_recovery_marker:
        kind: faction_cache
        visibility: [cis]
        respawn_minutes: 90
        density: 2
        rep_reward: {cis: 2}
        yield_table:
          - [50, electronic,              2, 4, 50, 75]
          - [30, scavenged_republic_tech, 1, 2, 55, 80]
          - [20, rare,                    1, 1, 55, 80]

      # BHG-visible: deserter-clone bounty dead drops (contract bait).
      clone_bounty_dead_drop:
        kind: faction_cache
        visibility: [bounty_hunters_guild]
        respawn_minutes: 120
        density: 1
        rep_reward: {bounty_hunters_guild: 2}
        yield_table:
          - [55, electronic, 1, 3, 50, 75]
          - [25, rare,       1, 2, 55, 80]
          - [20, energy,     1, 2, 50, 70]

  # ── Outer Rim Sieges Drift — older, picked-over debris (LOW theme) ────────
  outer_rim_sieges_drift:
    theater: sieges
    caches:

      derelict_hull_salvage:
        kind: mining
        visibility: universal
        respawn_minutes: 55
        density: 4
        yield_table:
          - [55, metal,     3, 8, 30, 55]
          - [30, composite, 1, 4, 35, 60]
          - [15, rare,      1, 1, 50, 70]

      drifting_cargo_containers:
        kind: mining
        visibility: universal
        respawn_minutes: 50
        density: 3
        yield_table:
          - [50, composite, 2, 5, 35, 65]
          - [30, energy,    1, 3, 40, 65]
          - [20, metal,     1, 3, 35, 60]

      # Republic-visible: mothballed supply caches (gear, not rep).
      mothballed_republic_supply:
        kind: mining
        visibility: [republic]
        respawn_minutes: 70
        density: 2
        yield_table:
          - [50, metal,     2, 5, 45, 70]
          - [30, energy,    1, 3, 45, 70]
          - [20, composite, 1, 2, 50, 75]

      # CIS-visible: abandoned field-HQ tech.
      abandoned_cis_cache:
        kind: mining
        visibility: [cis]
        respawn_minutes: 70
        density: 2
        yield_table:
          - [50, electronic,              2, 4, 45, 70]
          - [30, scavenged_republic_tech, 1, 2, 50, 75]
          - [20, rare,                    1, 1, 55, 80]

      # ── Faction caches (Drop 2b) — `harvest <id>`, no skill check ──────────

      # Jedi-visible: lost artifact beacons settled into the old debris field
      # (Force-attuned items / fragment holocrons — flavored rare + tech, no
      # raw kyber; the fresh battlefield beacon at Geonosis is the kyber source).
      lost_jedi_artifact_beacon:
        kind: faction_cache
        visibility: [jedi_order]
        respawn_minutes: 180
        density: 1
        rep_reward: {jedi_order: 4}
        yield_table:
          - [55, electronic, 1, 3, 55, 80]
          - [30, rare,       1, 2, 60, 85]
          - [15, composite,  1, 2, 55, 75]

      # Hutt-visible: pre-marked salvage claims. Working the Cartel's wrecks
      # earns standing with them.
      hutt_salvage_claim:
        kind: faction_cache
        visibility: [hutt_cartel]
        respawn_minutes: 120
        density: 2
        rep_reward: {hutt_cartel: 3}
        yield_table:
          - [50, metal,     2, 5, 45, 70]
          - [30, composite, 1, 3, 50, 75]
          - [20, rare,      1, 1, 55, 80]
