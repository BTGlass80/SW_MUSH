# data/worlds/clone_wars/npcs_drop_mob_grind_kamino.yaml
#
# Kamino Hostile Mob Grind Batch (2026-06-21)
#
# Six roaming hostile NPCs seeded across Kamino's exterior platforms and
# maintenance access zones to populate the solo-PvE mob-grind reward loop
# (engine/hunting_rewards.py).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Pylon Access Corridor x2  (CIS saboteurs — contested maintenance corridor)
#   Unauthorized Docking Pt x2 (mercenary + pirate — lawless hidden dock)
#   Ocean Surface Platform x1  (Kamino Storm Stalker — native creature)
#   Lower Platform x1          (AWOL operative turned criminal)
#
# Existing room occupants avoided: Tipoca City civilian/military NPCs in
#   the secured Tipoca/Cloning zone; Combat Simulator (chain_enemy_template);
#   Aiwha Stable (civilian NPC); Visiting Officers' Quarters (civilian NPC).
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats grounded in sibling CW NPC patterns (Drop H / DEF baselines).
# Weapons: blaster_pistol, heavy_blaster_pistol, blaster_carbine —
#   all keys confirmed in data/weapons.yaml. Storm Stalker uses empty
#   weapon key; combat engine falls back to brawling + STR.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # PYLON ACCESS CORRIDOR — 2 NPCs (CIS saboteur team)
  # contested maintenance corridor; least-monitored zone in Tipoca City
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Infiltrator
    room: "Kamino - Pylon Access Corridor"
    species: Human
    description: >-
      A Human woman in maintenance coveralls that are slightly too clean
      for someone who works the pylons. The tool belt has the right look
      but the wrong tools — some of the casings are shaped for something
      that does not repair durasteel. She moves through the corridor with
      the controlled economy of someone who has rehearsed this route
      twice. When she sees you she does not speak. Her hand goes to a
      side holster that was not visible until now.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D+1
        mechanical: 2D
        perception: 2D+2
        strength: 2D+1
        technical: 3D+1
      skills:
        blaster: 4D
        demolitions: 4D+1
        sneak: 3D+1
        dodge: 3D
        security: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS field operative with a mission: place charges in the pylon
        superstructure to destabilize Tipoca City's foundations. She is
        calm and professional, not ideological — this is a contract. She
        reacts to interference with immediate, lethal efficiency. Her
        training covered detection avoidance and close-quarters response.
        She does not negotiate and does not retreat unless the mission
        is already blown.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Flat, clipped, uninflected Basic. No identification, no threats —
        just action. She does not explain herself to people she intends
        to kill.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She draws without warning, stepping sideways behind a pylon.*"
        - "*The coveralls are off — she moves into cover and fires.*"
        - "*A precisely aimed shot — she is not wasting ammunition.*"

  - name: CIS Systems Cutter
    room: "Kamino - Pylon Access Corridor"
    species: Zabrak
    description: >-
      A Zabrak male with a compact dataslate in one hand and a heavy
      blaster in the other. He is running an intrusion package against
      the corridor's security grid — the maintenance panel behind him
      hangs open, wires trailing. The Zabrak's facial horns are filed
      short, probably to avoid snagging on ductwork. He looks up from
      the panel with the focused irritation of someone who has been
      interrupted mid-process and intends to resolve the interruption
      quickly.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+1
        mechanical: 2D
        perception: 2D+1
        strength: 2D+2
        technical: 3D
      skills:
        blaster: 3D+2
        security: 4D
        computer: 4D
        dodge: 3D
        sneak: 3D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS technical operative whose job is to cut security feeds and
        disable the corridor's automated response systems long enough for
        the rest of the team to work. He is methodical, precise, and
        furious at interruptions to the intrusion sequence. He fires
        immediately when compromised — his secondary training is close-
        protection, and the heavy blaster is not for show.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Terse, irritated Basic. No wasted words. "You shouldn't be here."
        Then he fires.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He slams the panel shut and fires in a single motion.*"
        - "*The heavy blaster tracks you across the corridor.*"
        - "*'You've cost me eleven seconds.' He fires again.*"

  # ══════════════════════════════════════════════════════════════════
  # UNAUTHORIZED DOCKING POINT — 2 NPCs (criminal operators)
  # lawless hidden dock beneath Tipoca City's sensor umbrella
  # ══════════════════════════════════════════════════════════════════

  - name: Hired Dock Guard
    room: "Kamino - Unauthorized Docking Point"
    species: Weequay
    description: >-
      A broad-shouldered Weequay in weatherproofed gear, blaster carbine
      resting across one arm with the casual authority of someone who
      stands watch here every day. The rain has plastered his leathered
      hair flat; he does not seem to notice. Someone is paying him to
      keep this dock private, and he takes that arrangement seriously.
      He gives you one look — measuring, unhurried — and decides you
      did not arrive through the right channels.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D
        strength: 3D+1
        technical: 2D
      skills:
        blaster: 4D
        brawling: 4D
        intimidation: 3D
        streetwise: 2D+2
        dodge: 2D+2
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        Hired muscle tasked with keeping the hidden dock secret and
        unauthorized visitors off the platform. He does not ask questions
        about who is paying or why — the credits are consistent and the
        job is clear. He challenges any unfamiliar presence and attacks
        without hesitation if they don't immediately produce the right
        recognition code. He is methodical and patient; this is not his
        first time doing this.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Blunt, minimal Basic with a Weequay accent. "Wrong dock. Wrong
        time." If you don't leave, the carbine comes up.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The carbine comes up. 'Last chance.'*"
        - "*He fires from a stable stance, economical and accurate.*"
        - "*He advances steadily, using the dock equipment as cover.*"

  - name: Devaronian Fence
    room: "Kamino - Unauthorized Docking Point"
    species: Devaronian
    description: >-
      A Devaronian with filed horns and the sharp, restless eyes of
      someone who catalogues everything that passes through a location
      and assigns it a potential value. He found this dock three months
      ago and has been quietly using it ever since — running items in
      and out of Tipoca City through the maintenance access that the
      Kaminoans choose not to officially acknowledge. He is cheerful
      right up until the moment he calculates you are a liability, and
      then he is not cheerful at all.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D+1
        perception: 3D
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 3D+2
        con: 3D
        streetwise: 3D
        sneak: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        An opportunistic smuggler-fence who discovered the hidden dock
        and has been quietly profiting from it. He is charming and
        talkative — right until he decides the person in front of him
        threatens his operation, at which point the warmth shuts off
        like a switch and the blaster comes out. He shoots fast and
        accurately. He has been in this situation before.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Cheerful, insinuating Basic — all smiles until the split-second
        he decides you're a problem. "Nothing personal." Then the
        blaster is already up.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'Nothing personal.' *The blaster clears the holster fast.*"
        - "*He fires and steps behind a cargo crate in one motion.*"
        - "*Still smiling. 'You should have taken the offer.'*"

  # ══════════════════════════════════════════════════════════════════
  # OCEAN SURFACE PLATFORM — 1 NPC (native creature)
  # storm-level access platform at ocean surface; rarely visited
  # ══════════════════════════════════════════════════════════════════

  - name: Kamino Storm Stalker
    room: "Kamino - Ocean Surface Platform"
    species: Creature
    description: >-
      Something that lives below the surface of Kamino's ocean and
      occasionally does not. It has the flattened, wedge-shaped head
      of a deep predator, four articulated limbs suited for both
      swimming and climbing, and a hide the gray-green color of deep
      water. It came up the platform struts during the last major storm
      system and has stayed — the platform is warmer than the open water
      and the maintenance droids provide irregular but reliable prey.
      It regards you with the methodical patience of something that has
      no concept of retreat and a great deal of experience with patience.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 1D
        mechanical: 1D
        perception: 3D+1
        strength: 3D+2
        technical: 1D
      skills:
        brawling: 4D+2
        swimming: 5D
        search: 3D+1
        sneak: 3D
        dodge: 2D+2
      weapon: ""
      move: 12
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      personality: >-
        A native Kamino deep-water predator that has established a
        temporary territory on the surface platform. It does not
        distinguish between threats and food sources — anything that
        enters its claimed space is approached with the same sequence:
        assessment, positioning, attack. It is not fast on land by
        ocean-creature standards, but it is considerably faster than
        it looks, and its hide absorbs blaster bolts at ranges that
        most beings do not survive discovering.
      knowledge: []
      faction: wildlife
      dialogue_style: >-
        No vocalization. A low, resonant clicking from somewhere in
        its torso cavity — possibly echolocation, possibly a threat
        display. It does not repeat it twice.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The creature closes the distance faster than anything that
          size should move.*"
        - "*A resonant click, and then it is already on you.*"
        - "*It absorbs the hit and keeps coming. The ocean grew it
          patient.*"

  # ══════════════════════════════════════════════════════════════════
  # LOWER PLATFORM — 1 NPC (criminal deserter)
  # supply delivery platform; irregular Kaminoan maintenance presence
  # ══════════════════════════════════════════════════════════════════

  - name: AWOL Operative
    room: "Kamino - Lower Platform"
    species: Human
    description: >-
      A Human male in Republic logistics coveralls with the unit patches
      removed — the outline of where they were is visible as a slightly
      lighter patch on the sleeve. He has been on Kamino for three weeks
      without reporting in. The supply manifests he is holding are not
      the official ones. He looks like someone who made a calculation
      about what was worth more — his enlistment or the contents of an
      unscheduled delivery — and has been living with the answer ever
      since. He gives you a look that is half-threat, half-calculation,
      and decides the calculation favors violence.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 2D+2
        technical: 2D+1
      skills:
        blaster: 3D+2
        brawling: 3D
        streetwise: 2D+2
        intimidation: 2D+2
        sneak: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Republic logistics clerk who went AWOL three weeks ago,
        running contraband through the lower platform with the help of
        the Devaronian at the hidden dock. He is not a trained combatant
        but he is desperate and has been in two firefights since going
        rogue; desperation has substituted for skill so far. He attacks
        first because witnesses are his biggest problem. He is not
        reckless — he is cornered, which is more dangerous.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Rapid, defensive Basic with a core-world accent badly worn by
        three weeks of not sleeping well. "You don't want this trouble."
        He fires when he says the last word.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'You don't want this trouble.' *He fires on the last word.*"
        - "*He fires from cover, one hand bracing on a supply crate.*"
        - "*'I'm not going back.' Another shot, more accurate than the
          last.*"
