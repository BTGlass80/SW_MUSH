    category: "location"
    priority: 5
    planet: "all"
    surface_affinity: "news"
    content: |
      Alderaan, guided by pragmatic leadership, became a haven for those displaced by Separatist violence across the galaxy. The world loosened its immigration restrictions to absorb refugees, embodying the Refugee Relief Movement's compassionate vision. However, Senate-mandated transit taxes created hardship for those seeking resettlement, forcing displaced persons into difficult financial straits. Alderaan's nobility championed opposition to such policies, viewing them as contrary to both moral principle and the Republic's long-term stability.

  - title: "Kouhun Assassin Creature"
