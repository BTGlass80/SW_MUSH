    content: |
      Naboo senators retain ceremonial handmaiden retinues descended from the trappings of monarchy. These attendants function as sworn bodyguards, trusted confidants, and occasionally as decoys in high-profile travel. Handmaidens are trained in disguise, infiltration, and close-quarters combat; they often carry comlinks, datapads, and concealed weapons including vibroblades. Their loyalty is absolute, and failure in their duty to protect is felt as profound personal shame. The role demands both martial skill and the discretion to observe sensitive personal matters without comment.

