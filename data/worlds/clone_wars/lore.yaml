  - title: "Jury-Rigging Equipment"
    keywords: "jury-rig,modify,improve,breakdown,malfunction,repair,tinker"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "general"
    content: |
      Field modification of equipment — called jury-rigging — can temporarily boost a device's performance by up to 3D, but the improvement is unreliable. Jury-rigged equipment has a chance of breakdown every time it is used. The more powerful the modification, the greater the risk. Modifications take about an hour, or one minute if rushed at higher difficulty. When jury-rigged equipment fails, weapons may explode, vehicles may lose power, and non-lethal devices simply stop working.

  - title: "Transponder Codes"
    keywords: "transponder,code,identity,ship,boss,registration,signal"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      Every starship has a unique transponder code burned into its sublight engine. The code broadcasts the ship's name, type, owner, and registration data continuously. The code is extremely difficult to alter because it is embedded in the engine itself — tampering can fuse the wiring irreparably. False transponder codes can be added by analyzing the ship's signal and overlaying matching frequencies, but more than three false codes begin to bleed into each other and look suspicious on scanners.

  - title: "Cybernetic Enhancements"
    keywords: "cybernetics,prosthetic,enhancement,cyborg,implant,machine"
    category: "concept"
    priority: 4
    planet: "all"
    surface_affinity: "general"
    content: |
      Cybernetic enhancements are available but deeply stigmatized across the galaxy. The average citizen fears the blurring line between being and machine. People with visible prosthetics face discrimination and curtailment of civil rights. Enhanced beings often hide their modifications. The technology improves physical abilities but reportedly reduces empathy and emotional connection. Force users with cybernetics find it harder to tap the Force and are more vulnerable to the Dark Side.

  - title: "How Blasters Work"
    keywords: "blaster,gas,xciter,galven,power pack,tibanna,bolt"
    category: "concept"
    priority: 4
    planet: "all"
    surface_affinity: "general"
    content: |
      Blasters fire by exciting gas in a chamber. The trigger opens the energy converter valve, releasing gas into the XCiter where it is energized by the power pack. The excited gas passes through the Actuating Blaster Module and is focused by the galven pattern in the barrel into a beam of intense energy. The visible light is a byproduct — the energy itself is what causes damage. Different gases produce different power levels and bolt colors. Tibanna gas from Cloud City is among the most powerful but hardest to acquire.

  - title: "Computer Data Files in the Galaxy"
    keywords: "computer,data,file,datapad,holistic,hdt,slicing,portable"
    category: "concept"
    priority: 4
    planet: "all"
    surface_affinity: "general"
    content: |
      Computer data files in the Star Wars galaxy use Holistic Data Transfer languages — AI-enhanced shorthand that lets files provide more information than they literally contain by making educated deductions. Files are rated by die codes from 1D to 13D, with higher ratings exponentially more expensive. A 4D file costs 1,000 credits while a 10D file costs 100,000. Pocket datapads store up to 5D of files, portable computers up to 20D, and capital starship computers up to 30D. MicroThrust portable computers can add their power rating as bonus dice to a programmer's skill.

  - title: "The Bounty Hunter Creed"
    keywords: "bounty,hunter,creed,acquisition,code,ethics,honor"
    category: "faction"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Most bounty hunters adhere to an unwritten code of ethics called the Bounty Hunter Creed. Three rules define it. First: People Don't Have Bounties, Only Acquisitions Have Bounties — once a bounty is posted, the target loses their rights and becomes an 'acquisition.' Second: Capture By Design, Kill By Necessity — killing is business, but unnecessary killing is murder. Third: No Hunter Shall Slay Another Hunter — hunters consider themselves a special breed and never take up arms against a fellow hunter who follows the creed. Those who break the creed become acquisitions themselves.

  - title: "The SEPI Principle"
    keywords: "sepi,selection,evaluation,preparation,implementation,hunt,method,bounty"
    category: "faction"
    priority: 4
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Experienced bounty hunters follow the SEPI principle — Selection, Evaluation, Preparation, and Implementation. Selection means choosing the right target based on bounty value, danger, and the hunter's strengths. Evaluation means researching the target's habits, associates, hideouts, and capabilities. Preparation means acquiring permits, equipment, transportation, and local contacts before beginning the hunt. Implementation is the hunt itself. Hunters who skip steps — especially Evaluation and Preparation — tend to end up dead.

  - title: "Tramp Freighter"
    keywords: "tramp,freighter,independent,trader,captain,smuggler,light freighter,small ship"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      A tramp freighter is an independent, owner-operated cargo ship — typically a stock light freighter modified by its captain. Tramp captains take whatever work they can find: legitimate cargo runs (drop-point delivery), speculative trading (buying low and selling high across planets), smuggling, salvage, and the occasional dangerous courier job. The life is precarious — over 60 percent of one-ship operations fail in their first year — but the freedom is unmatched. Most tramp captains carry significant debt to a loanshark or a bank, and many spend their careers chasing the next score that will let them pay it off.

  - title: "Drop-Point Delivery"
    keywords: "drop,point,delivery,dpd,cargo,run,freight,hauling,contract"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      Drop-Point Delivery is the standard contract structure for tramp freighters: a captain is hired to carry cargo from one specified location to another for a specified fee. Standard fees run between five and 10 credits per ton per day, calculated on a baseline x2 hyperdrive engine, one day to load and depart, one day to arrive and unload. Modifiers apply for time pressure, dangerous routes, hazardous cargo, and the captain's reputation. Most tramps live primarily on DPD income, supplementing with speculative trading when capital allows.

  - title: "Speculative Trading"
    keywords: "speculative,trading,trade,goods,markets,profit,cargo,tech level,planets"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      Speculative trading is the high-risk, high-reward complement to drop-point delivery: the captain purchases cargo from their own pocket on one planet, transports it, and sells it for (hopefully) a profit on another. Roughly twenty percent of even experienced tramps' speculative deals go sour. The rules of the game are governed by tech-level differentials between worlds — primitive worlds will pay fortunes for manufactured goods, while industrial planets crave raw materials. The galaxy's tech-level classifications are Stone, Feudal, Industrial, Atomic, Hyperspace, and Hyperspace+1. A captain who can read these gradients can make a killing; one who can't will be skinned by the established trading houses, who hate freighter competition.

  - title: "The Black Market"
    keywords: "black,market,illegal,goods,contraband,smuggling,fence,broker,underground"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      Every populated planet has a black market — an illegal economy that runs alongside the legitimate one. What it carries varies: weapons and drugs on most worlds, banned holos on repressive worlds, mind-altering substances like alcohol on highly religious worlds, animal products on environmentalist worlds. The first contact is the hard part. Spaceport personnel — purchasing agents, shippers, warehouse managers — form the visible edge of every black market, and a polite inquiry at a spacer's bar (with a small fee) usually produces a contact. Local Customs agents are sometimes intimately involved themselves. After the first connection is made, repeat business runs smoothly.

  - title: "Loan Sharks"
    keywords: "loan,shark,debt,interest,creditor,goon,enforcer,payment,hutt,broken,kneecap"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "general"
    content: |
      Most legitimate financial institutions will not loan tramp freighter captains money at any price — the risks are too high, the collateral (a highly mobile ship that can be re-registered in weeks) too unreliable. Loan sharks fill this gap. They charge brutal rates: 300 percent over 30 months, 10 percent of principal per month, no early-repayment discount. They have no qualms about using force to remind customers of payment dates, and they hunt down defaulters as a matter of policy. Despite the rates, they remain the only credit available for someone trying to buy their first ship — every spacer in the galaxy knows someone who is making payments to one. The Twi'lek Yerkys ne Dago is the most famous of these loansharks in the Outer Rim, but every sector has its own.

  - title: "Loan Shark Discipline"
    keywords: "missed,payment,goon,broken,finger,beating,debtor,enforcer,delinquent"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "general"
    content: |
      A loanshark's discipline ladder is canonical and predictable. A first missed payment doubles next month's bill (the missed payment plus a penalty payment of equal size). A second missed payment in a row brings goons to the debtor's door — a violent demonstration that typically ends with broken fingers and a wound. A third missed payment means being dragged to the loanshark's office, where the debtor must talk their way out via Con or Bargain rolls; failure on those rolls runs from beaten to mortally wounded to dead, depending on how poorly the rolls go. Note that the loanshark always gives the debtor the chance to make their case; the violence is not malice, it is policy. Loansharks who break this convention lose customers — and the customers' debts.

  - title: "The Tramp Freighter and Its Captain"
    keywords: "freighter,modification,ship,captain,upgrade,hyperdrive,personality,modify"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      Stock light freighters are slow, unmaneuverable, and lightly armed when they leave the factory. Most freighter captains plow a substantial portion of their profits back into modifying their ship — bigger hyperdrive, better ion drive, sensor masks, hidden compartments, occasionally illegal weapons systems. A tramp captain's ship is rarely sold; it accumulates the captain's investments, quirks, and history over decades. A famous saying in the trade: 'A tramp captain marries her ship before she marries anything else.' The conventional view among captains is that the ship has a personality of its own, that this personality is shaped by the captain's modifications, and that mistreating the ship will eventually cost the captain dearly.

  - title: "Hyperdrive Class and Cost"
    keywords: "hyperdrive,class,multiplier,cost,jump,starship,upgrade,x1,x2,x3"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      Hyperdrive performance is rated by multiplier. A x1 hyperdrive (15,000 credits, 18 tons, civilian-best) covers a route in standard time. A x2 hyperdrive (10,000 credits, 15 tons) takes twice as long. The standard tramp freighter hyperdrive is x2; serious smugglers and racing operations upgrade to x1. A x1/2 hyperdrive (military-grade, 30,000 credits on the black market when available, 20 tons) is the only thing faster, and most tramps will never own one. Slower hyperdrives — x3, x4, x5 — are progressively cheaper and lighter, but the time penalty makes them suitable only for budget operations. Hyperdrive multipliers are also the conversational shorthand by which captains size each other up; 'she's a x1 ship' carries weight at any spacer's bar.

  - title: "Standard Maintenance and Restocking"
    keywords: "maintenance,restock,consumables,fuel,oxygen,fluid,ship,upkeep"
    category: "concept"
    priority: 4
    planet: "all"
    surface_affinity: "general"
    content: |
      Every Standard-class or better spaceport will automatically perform standard restock and maintenance on any ship that lands, typically within 24 hours. Restocking includes water, lubricating fluids, coolants, oxygen, basic protein for food converters, and waste removal. The standard maintenance package covers air filters, gravitational disks, ablative heat shields, ion engine recalibration, and basic hyperdrive maintenance. Cost is calculated as 10 credits multiplied by the ship's total crew and passenger capacity, multiplied by the consumables duration in days. Ships that skip restocking risk being stranded with a depleted oxygen supply — which has killed crews more often than pirates have.

  - title: "Hyperdrive Overhaul"
    keywords: "overhaul,hyperdrive,maintenance,malfunction,jump,inspection,replacement"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "general"
    content: |
      After every twenty hyperspace jumps, a ship's hyperdrive should receive a complete overhaul — replacement of certain key components, inspection of the rest. The cost is approximately 1,000 credits at most spaceports. Captains who skip overhauls accumulate a malfunction risk: roughly three percent per subsequent jump (mechanically, a roll of 2 on 2D6 produces a malfunction). A malfunction during a long jump can leave a ship adrift in deep space for days — long enough that the consumables countdown becomes lethal before rescue can arrive. Tramp captains who skip overhauls to save credits usually only make this mistake once.

  - title: "Outer Rim Trade Routes"
    keywords: "outer rim,trade,route,smuggler,hyperlane,corridor,run,frontier"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      The Outer Rim Territories are the natural habitat of the tramp freighter. Distance from Core World authority means lighter customs enforcement, sparser official patrols, and no large trading houses with the political clout to muscle out independent operators. The trade-off is risk: pirates, less-regulated economies that can collapse mid-route, planets where the local government is hostile or absent, and routes that take longer because the safe lanes are not always the direct lanes. A captain who learns the unmarked hyperlanes — the routes that bypass the popular space lanes where Customs corvettes wait — earns more per run, but the routes themselves are jealously-guarded knowledge. New captains buy this knowledge from old captains, in trade for favors or future cargo discounts; a route never appears in print.

  - title: "The Jedi Praxeum"
    keywords: "praxeum,jedi,temple,training,academy,karena,learning,action"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "general"
    content: |
      Praxeum is an ancient Jedi word — first coined by the scholar Karena, distilling the concepts of learning combined with action — that names a place where Jedi training happens. A praxeum is not a monastery for contemplation; it is a place for the learning of action. The Jedi saying holds: 'A Jedi is aware, but does not waste time in mindless contemplation. When action is required, a Jedi acts.' The Jedi Temple on Coruscant is the largest praxeum in the galaxy, though smaller Jedi enclaves on worlds such as Dantooine and Ossus function by the same principle.

  - title: "The Dangers of Training Jedi"
    keywords: "training,padawan,jedi,dark side,temptation,pace,discipline,bodo baas"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "general"
    content: |
      Jedi Masters have long warned that training an apprentice is the most perilous duty a Knight can undertake. The Bodo Baas Holocron preserves the warning: 'Never, Oh master Jedi, rest easy when your pupil begins to grow anxious to learn at a pace greater than that which you have set for him. Such impatience is natural in the young and inexperienced, and a commendable trait in a student. But it also signals a time when the pupil is most open to the temptation of stepping onto the broad path of instant gratification and easy advancement that leads to the dark side.' A student who disdains 'pointless exercises' and craves the 'true' powers of the Force has already taken the first step toward falling.

  - title: "The Humility Principle"
    keywords: "humility,jedi,power,service,code,padawan,training"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      The ancient Jedi masters taught that Force power gathered too quickly can corrupt even the most selfless and devout apprentice. A Jedi student must be properly humble in their powers, and mature enough to embrace the tremendous responsibility that comes with wielding the Force. The Jedi does not crave power, but seeks to serve others, without the expectation of becoming 'great in the Force.' True Jedi are cautious, and reluctant to learn too much too quickly. Overeager students run a fearful risk of opening themselves up to the temptations of the easy path.

  - title: "The Jedi High Council"
    keywords: "council,jedi,high council,coruscant,temple,leadership"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "general"
    content: |
      The Jedi High Council is the governing body of the Jedi Order. Convened in the Council Chamber at the apex of the Jedi Temple on Coruscant, it sets policy for the Order, assigns Masters to critical missions, hears matters of grave concern, and passes judgment on Jedi who have broken the Code. Membership is reserved for Masters of exceptional wisdom and experience. During the Clone Wars, the Council's burdens have multiplied: Jedi generals are dispatched to every front, seats are left empty as their occupants die in combat, and debate over the Order's role as warriors has grown increasingly fractious.

  - title: "The Bodo Baas Holocron"
    keywords: "holocron,bodo baas,jedi,artifact,knowledge,ancient,training"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      A Holocron is an ancient Jedi artifact, a crystalline device that stores the accumulated knowledge, teachings, and recorded counsel of long-dead Jedi Masters. The Bodo Baas Holocron is one of the most revered — Bodo Baas himself was a Jedi Master of the Old Sith Wars era, and the Holocron preserves not only his wisdom but also echoes of every Master who later contributed. Holocrons are consulted by senior Jedi for guidance on precedent, obscure Force techniques, and history. They are typically kept in the restricted archives beneath the Jedi Temple and accessed only by Masters and Council members.

  - title: "Jedi Code (Old Republic Framing)"
    keywords: "jedi code,old republic,values,philosophy,peace,emotion,knowledge,serenity"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "general"
    content: |
      The Jedi Code has been the foundation of Jedi training for millennia. It teaches that a Jedi uses the Force for knowledge and defense, never for attack; that a Jedi acts from calm and control, manipulating the Force passively rather than bending the universe to personal will. The Code's discipline stands in direct opposition to Sith philosophy. Even the minor powers of the Sith are extremely dangerous for Jedi to touch, since they lead directly to the dark side. The Order's teachers watch their apprentices for telltale signs of the headstrong student who wants more than they are ready for — a pattern that has ended in tragedy more than once in the long history of the Order.

  - title: "The Jedi Trials"
    keywords: "trials,jedi,knight,padawan,test,ritual,elevation"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      Before a Padawan is elevated to Knight, they must pass the Jedi Trials — a set of tests designed to reveal whether the apprentice has mastered themselves sufficiently to wield the Force without oversight. The Trials are not a single event. They include the Trial of Skill (a demonstration of lightsaber and Force mastery), the Trial of Courage (a task requiring the Padawan to face what they most fear), the Trial of Flesh (endurance of pain or deprivation), the Trial of Spirit (confronting one's own darkness), and the Trial of Insight (perceiving truth despite deception). A Padawan who fails a Trial is not cast out — they return to their Master to continue training until they are ready.

  - title: "Jedi Pedagogy — Wilderness Exercises"
    keywords: "training,wilderness,padawan,jedi,concentration,sensing,exercise"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      A traditional Jedi training exercise sends Padawans in pairs into wilderness with nothing but their wits and the Force. Stripped of tools and distractions, with no abilities but their own, the students work on concentration, sensing and studying other lifeforms, and touching the Force directly. The exercise is drawn from ancient training methods and is as old as the Order itself. On Coruscant, where wilderness is scarce, the Temple maintains dedicated meditation chambers and simulation halls that approximate the exercise — though most Masters still send their Padawans offworld to a wilder planet when the time is right.

  - title: "Jedi and Sith — The Core Contrast"
    keywords: "jedi,sith,philosophy,force,contrast,dark side,passion,control"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "general"
    content: |
      The Sith philosophy is fundamentally opposed to the Jedi Code. Where a Jedi uses the Force for knowledge and defense, a Sith uses the Force to bend the universe to their will. The Jedi manipulates the Force passively, while in a state of calm and control. The Sith gives themselves over to their passions, and channels the Force by harnessing the power of anger, hate, love, and jealousy. To use any Sith power is to relinquish any claim to call oneself a Jedi. Even the minor powers of the Sith are extremely dangerous for Jedi to touch, since every use of such a power draws the wielder further toward the dark side.

  - title: "Cautionary Tale — The Arrogant Apprentice"
    keywords: "exar kun,cautionary tale,dark side,jedi,apprentice,arrogance,sith"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      Every Jedi disciple soon hears the cautionary tale of the arrogant apprentice — the gifted Jedi who wanted more than their Master was ready to teach, who believed they could embrace forbidden teachings and not be dominated by them, and who was ultimately lost to the dark side by that arrogance. The classic example is Exar Kun, a prodigy of the Old Sith Wars era whose fall left scars on the Force that lingered for millennia. The tale is told and retold at every level of training, and its warning is sharp: if a great Jedi Master could fall this way, their teachers told them, they themselves must tread with special care.

  - title: "The Lightsaber Constructed in Secret"
    keywords: "lightsaber,construction,padawan,secret,double-bladed,sith,forbidden"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      A Padawan's first lightsaber is traditionally constructed under the guidance of their Master, in a ritual that serves as both technical exercise and spiritual rite — the student gathers the components, meditates on the crystal, assembles the hilt, and presents the finished weapon to their Master for approval. A Padawan who builds a lightsaber in secret, outside their Master's sight, has broken the training discipline in a way that rarely goes unnoticed. In the most troubling cases, the secretly-built weapon takes unusual forms — notably the double-bladed lightsaber, a design favored by certain Sith lineages and considered dangerous in the hands of an untested student.

  - title: "Force-Sensitive Detection"
    keywords: "force sensitive,detection,jedi,search,identification,awareness"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      Identifying Force-sensitive individuals in a galaxy of trillions is a perennial challenge for the Jedi. The deep subconscious of a Force-sensitive person is shielded by a protective barrier that pushes back against probing — the shield is involuntary and maintained by every Force-sensitive, whether or not they are aware of their talent. A skilled Jedi can use the Sense Force Potential power to probe a target's mind; if the target is Force-sensitive, the probe will be rebuffed with a backlash proportional to the target's strength in the Force. Those with little training will reel; those with great raw talent may hurl the probing Jedi physically across the room. This 'shield-test' is the most reliable way to confirm Force-sensitivity — though it is considered intrusive, and the Order uses it sparingly.

  - title: "The Life Bond"
    keywords: "life bond,jedi,master,padawan,force,link,telepathy,bond,connection"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "general"
    content: |
      The Life Bond is one of the most profound and perilous commitments a Jedi can make. Through deep meditation and mutual consent, two Force-sensitives can permanently link their minds and their life forces. Bonded pairs are aware of each other's location and emotional state across any distance, and can sense each other's injuries as if they were their own. Masters and Padawans sometimes form such bonds, though the Order's teachers warn that the bond is not to be taken lightly — when one half of a life bond dies, the survivor enters a state of grief so profound it echoes in the Force itself. A life bond cannot be severed while both parties live.

  - title: "Battle Meditation"
    keywords: "battle meditation,jedi,war,army,force,nomi sunrider,general"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      Battle Meditation is among the rarest and most powerful abilities in the Jedi Order's arsenal — and among the most troubling. A Jedi who has mastered this power can extend her awareness across an entire battlefield, strengthening the resolve and coordination of her allies while sowing confusion and doubt among her enemies. Nomi Sunrider was perhaps the most gifted practitioner of her age, capable of turning the tide of engagements involving thousands of combatants. In the Clone Wars, Jedi generals commanding clone armies sometimes employ this power in desperate moments. The Council debates whether doing so makes the Order complicit in the war in ways that will take generations to undo.

  - title: "The Adegan Crystal"
    keywords: "adegan crystal,lightsaber,kyber,jedi,construction,force,crystal,weapon"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "general"
    content: |
      The Adegan crystal — sometimes called a kyber crystal in archaic Jedi texts — is the heart of every lightsaber. Found on only a handful of remote worlds, these rare gems possess a natural affinity for the Force that makes them ideal focusing elements for the blade. When arranged within the lightsaber's internal lattice, an Adegan crystal channels and focuses the weapon's energy field into the distinctive blade. Jedi Masters traditionally present Adegan crystals to their Padawans when the time comes to construct their first lightsaber — the quality of the crystal shapes the weapon's character, and finding one's crystal is considered a formative act of self-discovery.

