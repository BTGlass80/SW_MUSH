    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The discovery of a Sith vessel on Naboo provided invaluable insights into cutting-edge starfighter design and technology. Those with keen eyes for flight systems recognized the craft as an exceptional specimen of engineering—its systems and architecture offering clues to technological capabilities well beyond standard Republic or Separatist designs. The vessel remains a subject of intense study, its mysterious origins and advanced features a testament to the sophistication of those who move in the shadows.

  - title: "Malacia: A Jedi Equilibrium Technique"
