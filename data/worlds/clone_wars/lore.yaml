    priority: 5
    planet: "all"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      Kouhuns are small, deadly creatures employed by assassins for their potent venom delivery. These creatures strike swiftly, capable of penetrating standard clothing to inject toxins that cause rapid incapacitation or death. Their use in Senate attacks demonstrated the Separatist forces' willingness to employ exotic, untraceable methods. A pair of kouhuns posed lethal threat even to heavily protected targets, requiring Jedi intervention to neutralize.

  - title: "Naboo N-1 Starfighter Escorts"
