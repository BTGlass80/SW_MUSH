    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Thisspians are a long-lived species capable of reaching extraordinary ages—some surpassing 170 standard years with full vitality intact. Their most distinctive feature is a powerful, dexterous prehensile tail that can manipulate objects with surprising finesse, freeing their hands for combat or delicate work. In close quarters, a Thisspian can coil their tail around an opponent with crushing force. Thisspian culture maintains ancient traditions of nobility; those of prominent bloodline may inherit titles such as Blood Monarch, though many Thisspians choose to abandon such obligations in pursuit of other paths.

  - title: "Jedi Starfighter Doctrine and Aerial Combat"
