    content: |
      The Naboo maintain a professional security apparatus centered on the protection of their senatorial representatives. The Head of Security oversees palace guard operations and coordinates with handmaiden details to ensure layered defense. Officers in this role are expected to pilot Naboo N-1 starfighters as personal escorts and command tactical responses to assassination attempts. Security protocols include decoy assignments, transport coordination to safe worlds, and direct deference to Jedi authorities when threats escalate beyond standard capability.

  - title: "Handmaiden Orders of Naboo"
