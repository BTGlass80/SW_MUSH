    planet: "all"
    surface_affinity: "ambient"
    content: |
      Corellia is home to a proud tradition of diplomatic excellence, producing skilled negotiators and political strategists who navigate the complex economics of the galactic marketplace and council chambers. Corellian families of prominence often serve as ambassadors, bringing their intuitive understanding of political currents and trade relations to bear on the Republic's most delicate negotiations. Corellians are equally renowned as exceptional pilots, combining their natural acuity with a daring spirit.

  - title: "Reverse-Grip Lightsaber Combat"
