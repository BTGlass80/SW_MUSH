    planet: "kuat"
    surface_affinity: "encounter"
    zone_scope: "coruscant,kuat"
    content: |
      R4-P17 began as a standard R4-series droid, conical-domed and precise, until a trash compactor incident at Kuat Drive Yards crushed her beyond her original specs. Rebuilt with an R2-series dome by a visiting Jedi, she became the prototype for integrated droid navigators—her truncated head now permanently wired into Jedi starfighter hulls as astrogator, technician, and comlink specialist. Her survival and evolution from scrap into indispensable asset exemplifies the resourcefulness of the Jedi Order during these turbulent years.

  - title: "The Clone Army and Kamino Conspiracy"
    keywords: "clone army, kamino, separatist, conspiracy, kaminoan, saberdart, archives"
    category: "concept"
    priority: 10
    planet: "all"
    surface_affinity: "news"
    zone_scope: "coruscant,kamino"
    content: |
      A fallen Jedi Master orchestrated the erasure of Kamino from the Archives—a planet expunged to hide the creation of a vast clone army beneath Jedi awareness. When investigators traced Kaminoan saberdart forensics and discovered the data gap, the conspiracy unraveled. The Archives held more: at least thirty additional star systems also scrubbed from records, all part of a larger Separatist strategy to blind the Order while war machinery assembled in shadow. The discovery triggered the Clone Wars and forever altered the Jedi Temple's understanding of its own fallibility.

  - title: "Iktotchi Precognition and Piloting Heritage"
