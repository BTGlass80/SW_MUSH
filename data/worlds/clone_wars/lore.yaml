    content: |
      Rodians carry a reputation across the galaxy as tenacious, willing to kill in cold blood for profit. Though distrusted in most circles, they are valued employees in criminal networks. In the Senate, a Rodian senator from Rodia has released a controversial list of 245 individuals accused of Separatist ties, triggering political upheaval. This mixture of Rodian ruthlessness and senatorial power makes them unpredictable players in Republic politics.

  - title: "Gran Politics and Malastare Strife"
