    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      A blue-skinned Twi'lek senator leads the Rim faction, advocating for reduced Republic interference in local affairs and greater planetary autonomy. Despite cultural disdain for violence, this Twi'lek is a major supporter of military expansion—a contradiction that reveals the desperation of the Separatist Crisis. His considerable skill in bargaining and intrigue marks him as a major power broker in Senate committees.

  - title: "Agricultural Worlds and Senatorial Independence"
    keywords: "agri-world, independence, agriculture, peaceful, military creation act"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "news"
    content: |
      Peaceful agricultural worlds send senators to Coruscant who prize independence from central authority. These representatives often oppose the Military Creation Act, fearing it concentrates too much power in the hands of the Republic government. Agricultural economies and independent streaks produce cautious voices in Senate debates, though some eventually vote for military expansion when the Separatist threat becomes undeniable.

  - title: "Naboo Security Command Structure"
