    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Iktotchi are a species naturally gifted with a limited form of precognition, manifesting as vivid dreams and daydreams that most individuals cannot consciously control. This innate sensitivity to future currents makes them exceptional starfighter pilots and navigators across the galaxy. Their connection to these instinctive visions—particularly among Force-sensitive individuals—grants them an almost supernatural edge in piloting and astrogation tasks, allowing them to anticipate hazards and navigate treacherous hyperspace routes with uncanny accuracy.

  - title: "Togruta Tribal Heritage and Survival Instincts"
    keywords: "togruta, shili, tribe, camouflage, predators, echolocation, montrals"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Togruta hail from Shili, a world where survival depends on collective strength and visual deception. Their distinctive disruptive skin patterns evolved to confuse the slow-witted predators that roam their homeworld, allowing dense tribal groups to move through danger undetected. Beyond mere coloration, their hollow montrals function as biological sonar, gathering ultrasonic information about their surroundings and allowing them to navigate and perceive threats even in total darkness. This combination of camouflage and echolocation reflects a culture deeply rooted in group cooperation and environmental attunement.

  - title: "Lannik: A World of Violence and Honor"
    keywords: "lannik, violence, honor, terrorism, red iaro, diplomacy"
    category: "location"
    priority: 6
    planet: "all"
    surface_affinity: "news"
    content: |
      Lannik stands as a world long cursed by bloodshed and political instability. Attempts at Corellian diplomatic intervention have repeatedly ended in ambush and assassination by extremist groups like the Red Iaro, who strike without warning even in the heart of official institutions. Yet from this crucible of conflict emerge warriors of exceptional courage—those who bear their scars not as marks of shame but as badges of pride and testimony to their willingness to stand against chaos. The planet's harsh environment has forged a culture that respects ferocity and unwavering persistence.

  - title: "Togruta Culture: Group Identity vs. Individual Exception"
    keywords: "togruta, individualism, tribe, culture, abnormal"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Togruta culture emphasizes collective identity and communal strength—individualism is viewed as a cultural aberration among a species evolved for synchronized group action. Togruta operatives working within organized teams become exponentially more effective, their instinctive coordination and shared awareness creating a synergy that isolated operators cannot match. Those who choose solitary paths, though rare, often develop heightened perception and combat acuity to compensate for the loss of their tribe's protective formation.

  - title: "Togruta Misconceptions: The Venom Myth"
    keywords: "togruta, venom, poison, misconception, xenobiology"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      A persistent myth circulates throughout the galaxy that Togruta are venomous creatures—a dangerous misconception born from their striking appearance and predatory evolution. In truth, they are not poisonous, yet the false reputation occasionally serves as a social advantage or disadvantage depending on circumstance. This gap between perception and reality has shaped how offworlders interact with Togruta operatives, sometimes creating opportunities for deception or, conversely, unwarranted fear and prejudice.

  - title: "Sith Infiltrator: A Prize of Technological Interest"
