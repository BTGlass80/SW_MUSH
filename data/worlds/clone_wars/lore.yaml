    priority: 6
    planet: "all"
    surface_affinity: "news"
    content: |
      Mon Calamari's Quarren representatives navigate treacherous political waters. A previous senator was censured and arrested on charges of profiting from slaving ventures in the Outer Rim, later fleeing Coruscant to escape prosecution. Quarren are naturally aquatic, able to breathe both air and water and withstand extreme ocean pressures, yet their political role demands adaptation to the dry corridors of the Senate chamber.

