    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      The sleek Delta-7 interceptor is the Republic's cutting edge—a small, needle-nosed craft painted in diplomatic red and white. Twin-barrel laser cannons give it teeth for reconnaissance work that turns hostile. Too compact for an internal hyperdrive, it docks with external booster rings for faster-than-light jumps, and its integrated R4-series astromech droid navigator sits visible as a truncated dome head, fused into the hull. Jedi piloting these machines benefit from the droid's integrated astrogation systems; separation from the proper droid leaves a pilot fumbling through calculations.

  - title: "R4-P17 Astromech Droid"
