    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "news"
    content: |
      The Jedi have recently integrated sleek, nimble starfighters—such as the Delta 7—into their military doctrine, allowing their pilots to conduct precision air support over contested battlefields. These craft demand exceptional piloting skill, favoring Force-sensitive individuals who can anticipate enemy movements. Jedi pilots flew such fighters in coordinated squadrons during major engagements, providing devastating close-air support. The starfighters' design reflects Jedi philosophy: elegant, efficient, and capable in the hands of a master pilot.

  - title: "Vurk Wisdom and the Watery World of Sembla"
