    content: |
      During the Military Creation Act debate, Republic officials faced coordinated assassination campaigns. Attacks employed poisonous creatures—kouhuns capable of delivering lethal toxins—and precision explosive strikes against transport vessels. Decoys were often employed to confuse attackers, yet assassins adapted their tactics across multiple attempts. The violence claimed security personnel and handmaidens alike, forcing the evacuation of threatened senators to safer worlds. Such attacks reflected the desperation of forces opposed to the Republic's military mobilization.

