  - title: "The Jedi Archives"
    keywords: "jedi archives, librarian, knowledge, records, coruscant"
    category: "location"
    priority: 8
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Jedi Archives serve as the repository of galactic knowledge for the Jedi Order, maintained with meticulous precision by the Chief Librarian. Rows of ancient texts, holocrons, and data spools stretch across vast chambers, cataloging everything from alien species and planetary systems to forbidden Sith lore. The Archives are more than a library—they are a strategic asset, where mission briefs are prepared for Jedi Knights and task forces deployed across the galaxy. Access is carefully guarded, and the Librarian's expertise in languages, cultures, and Jedi history makes them an invaluable resource during times of conflict.

  - title: "Jedi Archivists and Scholars"
    keywords: "jedi archivist, jedi scholar, knowledge keeper, librarian"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Some of the most dedicated members of the Jedi Order find their calling not in combat but in the preservation and study of knowledge. These archivists spend decades mastering languages, cultures, and the intricate history of the galaxy. They are skilled in investigation and persuasion, capable of extracting crucial information from records and testimony alike. Though they may lack the combat training of field operatives, their command of the Force—particularly in sensing and control—allows them to enhance their scholarly work and navigate the complexities of wartime intelligence gathering.

  - title: "The Republic in Crisis"
    keywords: "republic, senate, separatists, galactic stalemate, chancellor"
    category: "concept"
    priority: 9
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      The Republic teeters on the brink of collapse as the Separatist Movement grows bold. The Senate is hopelessly divided—some argue for raising a military to crush the rebellion, others cling to a fragile peace that grows more fragile by the day. The government struggles under its own weight, unable to act decisively while powerful interests clash openly in committee and corridor. A stalemate that has held for months now threatens to shatter, and when it does, the cascading effects could plunge the entire galaxy into chaos. The Force itself seems to echo with disturbance, as if warning of the cataclysm to come.

  - title: "Coruscant: The Galactic Heart"
    keywords: "coruscant, republic capital, skyscape, urban world, senate"
    category: "location"
    priority: 9
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      Coruscant gleams with the sleek geometry of an endless skyline—towering structures that pierce perpetual clouds, their surfaces reflecting the light of thousands of speeders and vessels. This is the seat of galactic government, where the Republic Senate chambers host endless debates and backroom negotiations. The planet is a sprawl of urban complexity, home to countless species, endless opportunities, and the grinding machinery of bureaucracy. Even here, amid the glimmering towers and carefully ordered districts, the stalemate between peace and war creates a tension that bleeds into every cantina and spaceport.

  - title: "Naboo: The Pastoral Paradise"
    keywords: "naboo, pastoral, gardens, peaceful world, lush"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Naboo stands as a jewel of natural beauty—its rolling hills studded with lush gardens and vast wetlands teeming with life. The planet has long been a haven of peace and culture, its people known for their grace and commitment to diplomacy. Yet even here, the spreading shadow of the Separatist Movement casts doubt over the future. The pastoral tranquility that once defined Naboo now feels fragile, a sanctuary that could be shattered at any moment if the Republic's stalemate breaks into open war.

  - title: "The Military Creation Act"
    keywords: "military creation act, senate bill, clone army, separatist threat, emergency powers"
    category: "concept"
    priority: 8
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      A legislative proposal that sought to reestablish formal military structure within the Republic after a decade of scaling down forces following the New Sith Wars. The act emerged from growing concerns over planetary secessions and political instability on Coruscant. While supported by several Senators, it faced organized opposition. The bill never reached formal vote—the revelation of a droid army on Geonosis prompted the Senate to grant emergency powers instead, leading directly to activation of the clone trooper forces trained on Kamino.

  - title: "The Senate Office Building"
    keywords: "senate office building, chancellor's suite, coruscant government, chancellor's residence"
    category: "location"
    priority: 7
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      A massive structure standing directly in front of the Senate rotunda, housing the ceremonial offices of the Supreme Chancellor and numerous Senatorial suites. The building reflects the ambitions of its tenants—corpulent Senators competed fiercely for office space as close to the Senate chambers as possible to minimize travel distance. The Chancellor's Suite itself underwent radical transformation under its current occupant: blue décor was stripped away and replaced with red, antique furnishings removed, and the walls now dominated by crimson tones. A distinctive black, thronelike Chair of Office crafted from ultra-dense lanthanide alloy serves as the centerpiece.

  - title: "The Chancellor's Guard"
    keywords: "red guard, chancellor's guard, senate guard, elite protection, security detail"
    category: "organization"
    priority: 6
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      A personal guard unit established to protect the Supreme Chancellor, distinguished by their crimson robes and disciplined bearing. The Red Guard replaced the traditional blue-robed Senate Guard on the Chancellor's detail, though the Senate Guard now focus on protecting individual Senators. The formation of a personal guard for the chief of state was viewed by many in the Senate as a controversial departure from Republican values—traditionally, the Chancellor relied on broader Senate security measures. Despite objections, the Red Guard became permanent fixture of the Chancellor's protection apparatus.

  - title: "Separatist Crisis and Droid Army"
    keywords: "separatist movement, droid army, geonosis, charismatic leader, war threat"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    zone_scope: "geonosis,all"
    content: |
      A growing political movement that threatened to splinter the Republic into open conflict. Led by a charismatic figure, the Separatists gained popular support across multiple worlds, driving a wedge between planetary governments and central authority on Coruscant. Many feared the crisis would escalate into full-scale warfare. The discovery of a secret droid military being assembled on Geonosis revealed the Separatists' true intentions—not negotiation, but armed rebellion. This revelation forced the Republic to authorize emergency military measures and activate previously dormant clone forces.

  - title: "Clone Troopers of Kamino"
    keywords: "clone troopers, kamino, grand army of the republic, clone army, military force"
    category: "faction"
    priority: 9
    planet: "kamino"
    surface_affinity: "news"
    zone_scope: "kamino,all"
    content: |
      An army of soldiers created in secret on the ocean world of Kamino, activated in response to the Separatist threat. Upon emergency authorization by the Senate, the Republic deployed these clones as the foundation of a newly forged Grand Army. The existence and readiness of the clone force allowed the Republic to rapidly mobilize military strength against the Separatist droid army, transforming the political crisis into armed conflict.

  - title: "The Jedi Code"
    keywords: "jedi code, harmony, discipline, force, light side, teachings"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The foundational philosophy of the Jedi Order rests upon three core tenets: self-discipline, knowledge preserved in the Archives, and understanding of the Force. Jedi are taught that there is no chaos—only harmony—and that all actions must be carefully considered and planned. When multiple Jedi work together, cooperation and mutual protection are paramount. The Code emphasizes that nothing truly dies; all living things return to the Force and persist within the fabric of the galaxy. Through disciplined study and contemplation, a Jedi learns to harness the Force for healing and defense, never yielding to anger or fear.

  - title: "The Light Side and Dark Side of the Force"
    keywords: "force, light side, dark side, temptation, corruption, jedi, sith"
    category: "concept"
    priority: 10
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Force is an energy field that emanates from all living things. The Jedi Order teaches the light side—a path of healing and protection achieved through careful study and meditation. However, many are tempted by the dark side, which offers quicker and easier power but proves self-destructive. Those who taste dark Force powers find it increasingly difficult to turn away, and some become Dark Jedi, joining the Sith Order. The Jedi Council expressly forbids the practice of dark Force powers, viewing this struggle as central to the Order's eternal conflict with the Sith.

  - title: "Jedi Rank Structure and Advancement"
    keywords: "jedi initiate, youngling, padawan, jedi knight, master, trials, rank, promotion"
    category: "concept"
    priority: 9
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      The Jedi Order organizes its members into four primary ranks. Jedi Initiates (Younglings) are Force-sensitive children separated from their families and trained in communal clans within the Temple. At adolescence, a youngling may be chosen by a Knight or Master to become a Padawan—an apprentice undergoing serious one-on-one tutelage. Padawans often wear a long braid behind the right ear; this is removed during the knighting ceremony upon promotion to Jedi Knight. Those not chosen by age thirteen enter the Service Corps, serving in roles suited to their talents. Jedi Knights may ascend to Master rank by successfully training a Padawan to Knighthood or through extraordinary deeds, though self-proclamation is rare and frowned upon.

  - title: "Naboo Royal Yacht"
    keywords: "naboo yacht, h-type nubian, royal starship, escape vessel, theed hangars"
    category: "technology"
    priority: 8
    planet: "tatooine"
    surface_affinity: "encounter"
    zone_scope: "naboo,coruscant"
    content: |
      The H-type Nubian yacht serves as the personal craft of Naboo's Senator, a sleek vessel designed for swift escapes and diplomatic missions. Its narrow profile and sheltered engines produce a minimal sensor signature, making it ideal for evading pursuit across hostile space. The ship is unarmed by philosophy—Naboo's peaceful culture forbids weapons—yet compensates with powerful shields, advanced electronic countermeasures, and an escape pod. A single pilot can operate the yacht from the central cockpit, with crew bunks, maintenance consoles, and supply stores occupying the lower sections. The upper level includes a formal bedroom that doubles as a portable throne room, befitting its role in both escape and state functions.

  - title: "Astromech Reliability and Memory"
    keywords: "astromech droid, memory wipe, personality, droid initiative, box of tricks"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Astromechs that retain their original memory matrices develop unexpected depth—creative problem-solving, initiative, and personality quirks that distinguish them from freshly-wiped units. These droids accumulate years of experience across multiple masters and vessels, learning unorthodox solutions and developing loyalty bonds that transcend their programming. A droid who has never undergone a memory wipe becomes a repository of knowledge: planetary routes, sensor manipulation tricks, even the ability to pull an obscure tool from its chassis at exactly the right moment. Such droids are prized by those who value ingenuity over predictability, though their independence sometimes troubles military commanders and protocol officers.

  - title: "Naboo Security Detail"
