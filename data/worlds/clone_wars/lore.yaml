    zone_scope: "naboo,coruscant"
    content: |
      The elegant Naboo N-1 starfighter serves as both diplomatic symbol and capable combat vessel. Security officers trained in N-1 piloting provide armed escort for senatorial transports departing Coruscant. These craft are fast, maneuverable, and distinctive in silhouette—suitable for high-profile protective missions where visual identification matters. The N-1's presence signals Naboo's status and military readiness without the aggressive posture of more militaristic designs.

  - title: "The Jedi Temple"
    keywords: "jedi temple, coruscant, spire, council, fortress, ziggurat"
    category: "location"
    priority: 10
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      For four millennia, the Jedi Temple has anchored the Order's presence in the galaxy—a towering ziggurat crowned with five spires that symbolize the climb to enlightenment. The Temple Spire holds the ancient Founding texts and scrolls salvaged from Ossus. The four surrounding spires house the High Council, the Council of First Knowledge, the Council of Reconciliation, and the Reassignment Council, each commanding the Temple's high-gain transmitters that pierce Coruscant's skyline to reach field operatives across the Republic. Within its walls, younglings meditate, lightsaber forms are drilled, and dormitories shelter the Order's youth. The Temple Hangars—recently expanded—cradle Delta-7 Jedi Starfighters ready for dispatch.

  - title: "Delta-7 Aethersprite-class Jedi Starfighter"
    keywords: "delta-7, aethersprite, jedi starfighter, interceptor, laser cannon, hyperdrive ring"
    category: "technology"
