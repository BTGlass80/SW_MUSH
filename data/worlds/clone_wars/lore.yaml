    planet: "all"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      Gungan representation in the Galactic Senate brought aquatic-world perspectives to Republic governance. Gungan senators carried expertise in survival and resourcefulness alongside diplomatic acumen. During periods of crisis—such as the Separatist insurgency preceding the Clone Wars—Gungan representatives exercised significant procedural authority, including the power to propose emergency motions that reshaped executive authority. Their swimming physiology and acute hearing made them distinctive presences in the legislative chamber.

  - title: "Alderaan's Refugee Policy"
