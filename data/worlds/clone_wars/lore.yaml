    category: "faction"
    priority: 8
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      The Galactic Senate is divided into factions reflecting the strain of the Separatist Crisis. The Loyalist Committee supports the Military Creation Act and the Republic's militarization, championing the creation of a vast clone army to counter Separatist forces. Senators debate fiercely over how much power the central government should hold and whether military expansion will preserve the Republic or corrupt it. Political allegiances shift as assassination, corruption scandals, and the pressure of war reshape the Senate's composition.

  - title: "Quarren and Mon Calamari Politics"
