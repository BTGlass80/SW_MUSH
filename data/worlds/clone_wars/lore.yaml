      Gungans hold seats in the Galactic Senate, representing their people and Naboo's interests alongside human counterparts. A Gungan Senator stands as an unusual figure in the Capitol's formal corridors—his lanky frame and accent often the subject of derision among Core Worlders. Yet the best among them display genuine commitment to the Republic's welfare rather than personal enrichment, offering counsel rooted in Gungan philosophy: patience, communal harmony, and an instinctive distrust of militarization. When assigned to temporary Senate positions during crises, a Gungan Senator may find himself thrust into the orbit of the most powerful figures in the government, his naive trust in their wisdom proving both his strength and his vulnerability.

