    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Umbarans hail from a shadowed world deep within the Ghost Nebula, a realm perpetually veiled in darkness and mystery. Their pale, nearly colorless skin and piercing gaze perceive only in the ultraviolet spectrum—their elaborate shadowcloaks display intricate patterns invisible to ordinary sight. Ancient whispers suggest Umbarans possess an uncanny ability to sway the thoughts of others, their presence unsettling to those unfamiliar with their kind. They thrive in dimness and shadow, their eyes reflecting little light.

  - title: "Naboo Royal Cruiser"
    keywords: "naboo, diplomatic transport, shield generators, hyperdrive, n-1 starfighter, unarmed"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The sleek Naboo Royal Cruiser represents the height of diplomatic elegance—a 39-meter vessel with graceful swept-back wings that speak to Naboo's commitment to peaceful negotiation over military aggression. Stripped of weapons by custom, it relies instead on powerful deflector shield generators, redundant hyperdrive backups, and the escort of swift N-1 starfighters. Four recharge sockets along its underside allow the nimble fighters to draw power during long voyages across the galaxy. The craft's design balances vulnerability with speed and grace.

  - title: "Senatorial Politics During the Clone Wars"
    keywords: "senate, faction, confederacy, separatists, clone army, democracy, senator"
    category: "concept"
    priority: 8
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      As the Clone Wars erupt, the Galactic Senate fractures into competing visions of Republic security. Moderate factions oppose the militarization of the Republic through a clone army to suppress the Confederacy of Independent Systems and its droid legions, fearing that such measures abandon democratic principles. This ideological clash plays out in countless Senate debates, committee meetings, and private negotiations across Coruscant's governmental towers. Senators must choose between pragmatism and principle as worlds burn.

  - title: "Naboo During Wartime"
    keywords: "naboo, pastoral, senator, royal family, tradition, security, assassination"
    category: "location"
    priority: 6
    planet: "tatooine"
    surface_affinity: "ambient"
    content: |
      Naboo's verdant lakes and rolling fields offer respite from the violence of the Clone Wars, making the pastoral world a sanctuary for those seeking refuge from galactic conflict. Yet even this serene planet cannot escape the war's reach; assassination attempts and political intrigue penetrate even its royal courts. Naboo's tradition of diplomatic neutrality and democratic governance has been strained by the rising militarization of the Republic, and its leaders must navigate treacherous political waters while defending their world's peaceful character.

  - title: "Geonosis Arena Battle"
    keywords: "geonosis, arena, separatist, killing beasts, clone wars, first battle"
    category: "location"
    priority: 9
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      The execution grounds of Geonosis echo with the roars of genetically engineered killing beasts—massive creatures bred for public spectacle and death. In this sandy arena, the Clone Wars ignited when Jedi Masters and their newly formed clone legions burst through the gates to rescue prisoners condemned by Separatist forces. The clash of lightsabers against battle droids amid the shrieking beasts and cheering crowds marked the moment the clone soldiers transitioned from theory to brutal reality, setting the tone for years of bloodshed across the galaxy.

  - title: "The Jedi Code and Philosophy"
    keywords: "jedi code, force, emotion, peace, knowledge, serenity, discipline"
    category: "concept"
    priority: 9
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Jedi Order has guarded the Galactic Republic for over 25,000 years as peacekeepers bound by a strict Code. Young Force-sensitives are taken to the Jedi Temple on Coruscant for rigorous training that demands sacrifice and unwavering discipline. The Code teaches that emotion leads to darkness—hate, anger, and fear must be purged in favor of rational thought, patience, and benevolence. A Jedi seeks to suppress attachment, control passion, and pursue knowledge above all, using the mysterious energy of the Force only to defend and protect.

  - title: "Jedi as Keepers of Peace"
    keywords: "jedi order, peacekeepers, guardians, republic service, the force"
    category: "organization"
    priority: 8
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Jedi are the guardians of peace in the galaxy, sworn to serve others rather than rule them. For millennia they have studied and mastered the Force, channeling its power toward protection and aid. The Jedi do not see themselves as soldiers; they are keepers of peace, bound by a Code that emphasizes respect for all life and a commitment to knowledge. During the Clone Wars, this identity is tested as the Republic calls upon them for military leadership.

  - title: "Republican Senators and Political Factions"
