    content: |
      A Senator's security chief operates in the shadows of high politics, orchestrating layers of protection invisible to the casual observer. The practice of employing disguised decoy 'handmaidens'—trusted personnel who mimic the Senator's movements and appearance—has proven effective against assassination attempts on Coruscant and across Naboo space. Experienced security officers bear the marks of their duty: lost eyes from planetside combat, permanent tension in their posture, an encyclopedic knowledge of escape routes and safe houses. The position demands absolute loyalty and strategic thinking; the chief must anticipate threats not just from common assassins but from rival factions within the Senate itself.

  - title: "The Loyalist Committee"
    keywords: "loyalist committee, senate panel, separatist threat, military creation act, negotiation"
    category: "organization"
    priority: 7
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      Within the Galactic Senate, a coalition of Senators concerned with the Separatist movement's spread formed a panel dedicated to countering the rising threat. These Loyalists favor negotiation and peaceful resolution, often standing opposed to the Military Creation Act—a controversial measure that would authorize the construction of a Republic military force. The Committee's members, drawn from diverse worlds and species, operate amid the Senate's Byzantine politics, where genuine idealism about the Republic's survival often clashes with the personal ambitions of other Senators. When key members are forced to leave Coruscant due to assassination attempts, the Committee's work continues through appointed proxies—a precarious arrangement vulnerable to manipulation by those with darker agendas.

  - title: "Gungan Senators in the Republic"
