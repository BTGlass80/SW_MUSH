    planet: "all"
    surface_affinity: "news"
    content: |
      Malastare's Gran Protectorate is mired in scandal and social conflict. The Dug, treated as second-class citizens, have disrupted Senate funerals and incited unrest. A previous Gran senator was murdered, his death marked by Dug activist protests at the funeral rites. The current Gran senator, a three-eyed political veteran, became a vocal champion of the Military Creation Act after witnessing the danger that factional violence poses.

  - title: "Twi'lek Leadership and the Rim Faction"
