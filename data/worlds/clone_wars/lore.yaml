      The Vurk hail from Sembla, a world of warm seas punctuated by volcanic ridges and natural harbors. Though considered primitive by galactic standards, Sembla's isolation has fostered a culture of contemplative wisdom. Vurk are renowned across the Republic as skilled negotiators and mediators, capable of resolving fractious disputes through insight and patient dialogue. Their calm temperament and deep understanding of sentient nature make them invaluable counselors, though they are no less formidable when forced to take up arms in the defense of those they serve.

  - title: "Corellian Diplomatic Tradition"
