    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      While most Jedi adopt conventional lightsaber stances, some masters pioneer unorthodox approaches to blade combat. The reverse grip—holding the weapon inverted—allows for sweeping, wide arcs that can overwhelm opponents expecting traditional overhead cuts and thrusts. This style requires exceptional body control and spatial awareness, but in the hands of a skilled duelist, it can prove devastatingly effective. Such techniques are rarely taught, as they demand both raw talent and years of disciplined practice.

  - title: "Jedi Temple Analysis Rooms"
    keywords: "jedi temple, analysis rooms, archives, artifact identification, sensor technology"
    category: "location"
    priority: 7
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      Deep within the Jedi Temple, the Analysis Rooms serve as laboratories for investigating the provenance of objects recovered across the galaxy. Hermetically sealed chambers house sophisticated multispectral readers and polysensitive sensor apparatus capable of detecting even trace organic compounds. The rooms are staffed by specialized analysis droids—SP-4 and JN-66 models—which interface wirelessly with the vast Jedi Archives database to cross-reference findings against thousands of documented weapon types, cultures, and technologies. The extreme sensitivity of the equipment demands absolute environmental control; no organic being may enter without risking false readings from contamination.

  - title: "SP-4 Analysis Droid"
    keywords: "sp-4 droid, analysis droid, jedi temple, investigation, sensor platform"
    category: "technology"
    priority: 6
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      The SP-4 is a moderately intelligent analysis platform designed for laboratory work within the Jedi Temple. Its distinctive mouth-stalk vocodor—suggesting Pa'lowick design influence—allows it to convey complex findings to organic researchers. Wireless connections to the Temple's computer network grant access to the Jedi Archives' exhaustive database of galactic weapon signatures and cultural artifacts. During high-profile investigations, SP-4 units cross-reference sophisticated sensor data against thousands of known weapon profiles, though sufficiently exotic or obscure technologies may yield no match.

  - title: "JN-66 Analysis Droid"
    keywords: "jn-66 droid, cybot galactica, analysis droid, sensor apparatus, sterilization"
    category: "technology"
    priority: 6
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      Manufactured by Cybot Galactica at the premium end of their utility droid spectrum, the JN-66 combines advanced sensor apparatus with modular customization capability. Its stripped, gleaming chassis undergoes frequent sterilizing radiation baths to maintain the sterile environment demanded by sensitive analysis work. A quadruple array of photoreceptors enables multi-wavelength imaging at extreme magnification, while paired repulsor-field projectors prevent any contact with contaminated surfaces. The JN-66 units maintained by the Jedi Temple possess enhanced processing cores and sensor suites that multiply the base unit's cost considerably.

  - title: "Jedi Council Leadership and the Fall of the Republic"
    keywords: "jedi council, dark side, separatist war, clone army, geonosis, clone wars"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    zone_scope: "coruscant,kamino,geonosis"
    content: |
      A senior Jedi Council member oversees the foundational training of young Padawans in group settings called clans before they advance to one-on-one instruction. As the dark side's influence spreads across the Republic, the Council grows increasingly unsettled; a disturbance in the Force clouds their perception of critical events. The discovery of a secretly created clone army—commissioned by a deceased Jedi decades prior—shocks the Council. Simultaneously, intelligence confirms that Separatist forces, led by a fallen former Council member, are consolidating vast droid militaries across multiple worlds. When the Supreme Chancellor grants emergency powers and deploys the Clone Army, the ancient Jedi Master is thrust into command of Republic forces on the war's opening battlefield.

  - title: "The First Battle of Geonosis"
    keywords: "geonosis, clone wars, first battle, jedi taskforce, separatist droids, republic victory"
    category: "concept"
    priority: 9
    planet: "geonosis"
    surface_affinity: "news"
    zone_scope: "geonosis"
    content: |
      The opening engagement of the Clone Wars erupts on the red desert world of Geonosis, where a Jedi rescue operation becomes a pitched battle between Republic clone forces and Separatist battle droid armies. An ill-fated Jedi taskforce is dispatched to the planet, only to be trapped by overwhelming droid formations. Clone regiments, newly arrived from the training world, engage the Separatist mechanicals across barren canyons and industrial facilities. Though Republic forces achieve tactical victory, many Jedi fall in the fighting, and key Separatist commanders escape into the darkness of a hangar complex. The battle marks the beginning of a prolonged conflict that will test the Jedi Order to its limits.

  - title: "Jedi Master Duel at Geonosis"
    keywords: "lightsaber duel, force combat, geonosis hangar, master combatants, force lightning"
    category: "concept"
    priority: 8
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      A legendary clash occurs in a darkened hangar on Geonosis between an ancient Jedi Master and a fallen Council member turned Separatist warlord. The duel encompasses both Force manipulation—where debris and lightning are weaponized through raw connection to the Force—and pure bladework. The ancient Master's agility and precision are extraordinary; he leaps and twirls through the hangar, his lightsaber moving with blinding speed to counter every attack. The Separatist commander proves his own mastery, but ultimately loses when the Master's sense of compassion provides an opening—the fallen leader flees rather than risk his young opponents, allowing the Separatist force to escape capture.

  - title: "Darkness in the Force"
    keywords: "dark side, force disturbance, jedi judgment, complicity, future uncertainty"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      A pervasive shadow clouds the perceptions of the Jedi Order during the Republic's final years. The dark side's influence is strong enough to obscure critical insights and muddy the judgment of even the wisest minds. In quiet meditation, the Jedi sense traumatic events unfolding far away—echoes of death and suffering that reach across the galaxy through the Force itself. Many recognize too late that the Order's confidence may have been misplaced, that complacency and arrogance blinded them to threats gathering in the shadows. The very nature of death and the Force becomes uncertain, and ancient masters find their deepest convictions tested by visions of an unclear future.

  - title: "The Spirit of the Fallen: A Shaman's Legacy"
    keywords: "force, meditation, spirit, shaman of the whills, identity, death, jedi secrets"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      A fallen Jedi Master discovered an esoteric and powerful technique to preserve identity even after death—a method developed by a Shaman of the Whills. This Force ability, honed outside traditional Jedi teachings, allows a skilled practitioner to commune with the dead through deep meditation. The discovery troubled many in the Order, for it challenged the fundamental understanding that individual identity dissolves upon becoming one with the Force. Few Jedi possess the knowledge or discipline to master such communion.

  - title: "Vaapad: The Seventh Form's Forbidden Dance"
    keywords: "lightsaber combat, seventh form, vaapad, dueling technique, dark side elements"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Vaapad is a lethal dueling technique within the seventh form of lightsaber combat that incorporates certain elements drawn from dark side practices. This eclectic form demands absolute mastery of both discipline and danger, channeling aggression without surrendering to it. Only a handful of Jedi Masters have ever perfected its execution. The technique is said to be nearly unparalleled in single combat, though its practitioners walk a precarious edge between light and shadow.

  - title: "The Separatist Crisis and the Jedi's Certainty"
    keywords: "separatists, secessionist movement, former jedi, dooku, violence, republic, fragmentation"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      A powerful secessionist movement threatened to tear the Republic asunder, led by a former Jedi who had turned against the Order. Many within the Jedi Council believed such a figure incapable of orchestrating direct violence—a fatal misjudgment. As flashpoints of conflict escalated across the galaxy, the Jedi's prescience faltered, clouded by something they could not perceive. The Order's ancient connection to the Force itself grew weaker, and despite warnings from field operatives, diplomatic instincts overrode military readiness until the moment for negotiation had passed entirely.

  - title: "Geonosis: First Blood of the Clone Wars"
    keywords: "geonosis, clone troopers, first engagement, battle, jedi taskforce, separatist droid army"
    category: "location"
    priority: 9
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      The first major engagement of the Clone Wars erupted on Geonosis when a Jedi taskforce arrived to rescue captives held by Separatist forces. Clone trooper reinforcements followed, and the desert world became a killing ground as Jedi and clone soldiers faced overwhelming waves of battle droids. The Geonosians themselves proved manageable foes, but the sheer scale of the Separatist droid army shocked the Jedi. Many fell that day. Those who survived bore witness to a new kind of war—one where the Jedi were no longer peacekeepers but soldiers commanding platoons of identical warriors into mechanized slaughter.

  - title: "The Cost of Command"
    keywords: "jedi council, clone wars, peacekeepers, soldiers, psychological toll, spirit, burden"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      When the Clone Wars began, Jedi who had spent their lives as negotiators and peacekeepers found themselves transformed into generals commanding clone trooper armies. The reversal came too suddenly, and the Order was unprepared for the moral weight of it. Jedi Masters emerged physically unscathed from initial battles only to carry invisible wounds—the erosion of their identity as keepers of peace, the weight of sending countless clones to their deaths, and the creeping knowledge that something profoundly dark was orchestrating events they could not fully comprehend.

  - title: "Soresu Mastery"
    keywords: "soresu, lightsaber form, defensive technique, mastery, jedi"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Soresu is a refined form of lightsaber combat emphasizing defensive positioning and blade work. Those who master it achieve an almost seamless defense, deflecting blaster fire and melee attacks with minimal wasted motion. The technique demands precise footwork and exceptional reflexes, transforming a Jedi into an impenetrable fortress of light and precision.

  - title: "Bounty Hunters in the Separatist War"
    keywords: "bounty hunter, hired gun, separatist, mercenary, geonosis, blaster, lightsaber"
    category: "person"
    priority: 6
    planet: "geonosis"
    surface_affinity: "bounty"
    content: |
      The Separatists employed mercenaries and hired bounty hunters as elite operatives, augmenting their droid forces with skilled killers capable of tactics beyond mechanical programming. These professionals proved deadly in small-unit engagements, though even the most lethal rarely matched a seasoned Jedi Master in direct combat. Their presence signified the Separatists' deep resources and willingness to spare no expense in escalating conflict.

  - title: "The Jedi Council's Blindness"
    keywords: "jedi council, prescience, force connection weakening, sith, cloud, imbalance"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Jedi Council, long accustomed to relying upon Force prescience to guide the Republic, found their visions clouded and their premonitions unreliable as the Clone Wars erupted. Something in the Force itself had changed—a shadowy presence worked to obscure the future and sever the Order's connection to their ancient power. While the Council suspected a Sith Lord orchestrated events, they could not fathom how a single dark side practitioner could generate such profound imbalance across the entire galaxy.

  - title: "Jedi Knight Training and Protocol"
    keywords: "jedi,padawan,master,apprentice,training,order,force"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      A Jedi Knight typically takes a single Padawan learner under their tutelage, a relationship that can span years and involve travel to distant worlds. The training encompasses both martial prowess with a lightsaber and deep study of Force abilities—control, sense, and alter disciplines. Jedi are bound by a code that discourages attachment to anything save the Force itself, though the interpretation and enforcement of this principle varies. Masters guide their learners through dangerous assignments, investigation of criminal networks, and the pursuit of threats to the Republic.

  - title: "The Kaminoan Clone Army"
    keywords: "clone,army,kamino,kaminoan,republic,soldiers,military"
    category: "faction"
    priority: 9
    planet: "kamino"
    surface_affinity: "news"
    content: |
      Hidden on the water-shrouded world of Kamino, the Kaminoans—a tall, graceful species—have been secretly breeding a massive clone army for the Republic. The project was commissioned years ago under mysterious circumstances, and the clones are raised in vast facilities across the planet's surface. Kaminoan craftsmanship extends to weapons and armor; their dart-based projectiles are distinctive and rare elsewhere in the galaxy. The existence of this clone army represents both the Republic's hope and a potential betrayal buried within its own ranks.

  - title: "Assassination and Bounty Hunting in the Core"
    keywords: "assassin,bounty hunter,murder,coruscant,poison,mandalorian"
    category: "concept"
    priority: 7
    planet: "coruscant"
    surface_affinity: "encounter"
    content: |
      Even in the heart of the Republic on Coruscant, skilled killers move through the shadows. A shapeshifting Clawdite assassin might be hired to strike at a Senator, only to fall herself to a poisoned dart—the work of a more mysterious hunter clad in Mandalorian armor. The Outlander Club, a establishment deep in Coruscant's lower levels, serves as a hunting ground for both hunters and their prey. These assassinations are often linked to larger political conspiracies, with the murder weapon itself becoming crucial evidence.

  - title: "Geonosis and the Separatist Conspiracy"
    keywords: "geonosis,separatist,confederacy,independent systems,conspiracy,droid,war"
    category: "location"
    priority: 9
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      Geonosis, a desolate world of rocky badlands and underground caverns, has become a nexus for a conspiracy of star systems seeking to secede from the Republic. The Geonosians themselves—chittering, insectile beings—manufacture vast quantities of battle droids and war machines. Beneath the planet's rust-colored surface lies a network of coliseums where captured enemies are forced to fight for the amusement of the ruling caste. The discovery of Separatist plotting on this world has sparked the first large-scale military engagement between Republic forces and the growing Confederacy of Independent Systems.

  - title: "Mandalorian Armor and Bounty Hunters"
    keywords: "mandalorian,armor,bounty hunter,warrior,helmet,tradition"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The distinctive Mandalorian armor—sleek, efficient, and often adorned with personal symbols—marks its wearer as a warrior of renown. Bounty hunters who don such gear are typically well-trained, dangerous, and connected to networks that span the galaxy. The armor provides superior protection and is often paired with advanced weaponry and piloting skills. Those who wear it command respect born of fear; their identities concealed behind their helms, they remain enigmatic figures moving between crime syndicates and mercenary operations.

  - title: "Tatooine's Moisture Farming Communities"
    keywords: "tatooine,moisture farmer,farm,family,sandpeople,desert,settlement"
    category: "location"
    priority: 7
    planet: "tatooine"
    surface_affinity: "ambient"
    content: |
      The outlying moisture farms of Tatooine are isolated homesteads scattered across the twin-sunned desert, where hardy settlers extract water from the planet's subsurface and eke out a living. These farmers form loose communities, often related by blood or years of neighborly trade. The B'Thazoshe Bridge marks a boundary into territory frequented by the native Sandpeople, who view the desert as their ancestral home and regard moisture farmers as intruders. Tragedy strikes swiftly in such remote places—isolation means that rescue is distant, and abduction or loss can go unresolved for years.

  - title: "Force-Induced Darkness and Corruption"
    keywords: "dark side,force,corruption,darkness,massacre,hatred,anger"
    category: "concept"
    priority: 8
    planet: "tatooine"
    surface_affinity: "ambient"
    content: |
      When a Force-user surrenders to rage and hatred, their power can warp the very fabric of a location, leaving a taint that lingers for years. Places where such atrocities occur become imbued with darkness, warping local flora and fauna into twisted versions of themselves. This corruption is felt not only by other Force-users but manifests in tangible ways—creatures become hostile and unnaturally aggressive, the landscape seems to repel visitors, and a palpable sense of dread settles over the afflicted region. Such sites serve as warnings of the peril that unchecked emotion poses to the Force-sensitive.

  - title: "Political Intrigue and Senatorial Networks"
    keywords: "senator,naboo,politics,republic,diplomat,assassination,conspiracy"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "news"
    content: |
      Senators of the Republic move through circles of power where assassination attempts are routine and alliances shift like sand. A Senator from Naboo, for instance, might become a target for her political stance or her connections to other factions. Protection details assigned to threatened Senators often uncover larger webs of conspiracy reaching into the highest levels of government. The political class exists in constant danger, and survival requires both keen judgment and allies willing to stand against those who would do them harm.

  - title: "Narglatch XJ-6 Airspeeder"
    keywords: "narglatch xj-6, airspeeder, coruscant, hotrod, luxury transport, turbojet, repulsorlift"
    category: "technology"
    priority: 6
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      A custom-built luxury airspeeder painted in distinctive yellow with racing decals, favored by wealthy Coruscant politicians and Senators who use them for high-speed pursuits through the planet's traffic lanes. Fitted with twin frontal turbojet engines capable of reaching 720 kilometers per hour, the two-seater is controlled via dual joysticks and an eight-speed thrust control system. An electric field repulses oncoming obstacles, while tractor units in the seats secure occupants through aggressive maneuvers—essential for the reckless joy-flying culture among the Republic's elite.

  - title: "Mirialan Species"
    keywords: "mirialan, mirial, tribal tattoos, radiation resistance, frigid environment, face tattoos"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      The Mirialans are a humanoid species originating from the world of Mirial, distinguished by elaborate tribal facial and body tattoos that mark significant life accomplishments. Each completed task—whether a mission, trial, or coming-of-age challenge—earns a new tattoo applied through painful ritual; refusing or fearing the marking is considered grave disrespect within their culture. Mirialans possess natural resistance to radiation and show enhanced survival capabilities in subfreezing environments, adaptations suited to their harsh homeworld's conditions.

  - title: "Jedi Diplomatic Missions to Border Worlds"
    keywords: "ansion, diplomatic mission, border dispute, separatist movement, jedi peacekeeping"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "news"
    content: |
      In the months before major hostilities erupted, the Jedi Order dispatched teams to minor worlds at risk of joining the Separatist movement. These missions balanced military deterrence with negotiation, aiming to solidify planets' loyalty to the Republic through visible Jedi presence and mediation of local grievances. The efforts reflected the Order's traditional role as keepers of peace across the galaxy—a role increasingly strained as factions mobilized for war.

  - title: "Jedi Padawan Training and Doctrine"
    keywords: "padawan, jedi temple, jedi code, lightsaber training, force synchronization, tandem fighting"
    category: "concept"
    priority: 6
    planet: "coruscant"
    surface_affinity: "general"
    zone_scope: "coruscant"
    content: |
      Young Force-sensitives are taken from their families and raised within the Jedi Temple to study the Code and martial disciplines. Padawans undergo rigorous training in lightsaber combat, Force manipulation, and diplomatic protocol, though some possess temperaments that chafe against the Order's formal strictures. Advanced Padawans develop specialized techniques—such as synchronized tandem fighting with their Masters, where Force connection enables perfect coordination in combat. The tension between rigid doctrine and individual impulse remains a constant thread in Jedi development.

  - title: "Zabrak Species and Iridonia"
    keywords: "zabrak, iridonia, horned humanoid, jedi masters, tough combatants"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "general"
    content: |
      The Zabraks are a horned humanoid species native to Iridonia, recognized for their martial prowess and capability as Force users. Zabraks have proven themselves as formidable Jedi, excelling in lightsaber combat and tactical operations. While physically and mentally suited to warfare, some Zabraks find diplomatic work less natural than direct action—a tension that surfaces when combat-focused Masters navigate political situations.

  - title: "The Clone Wars: Early Mobilization"
    keywords: "clone wars, geonosis, separatist movement, republic forces, jedi casualties"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      The conflict erupted when Separatist forces openly challenged Republic authority at major strongholds, forcing the Jedi Order into direct military engagement. The opening battles saw heavy casualties on both sides, including young Padawans who had barely completed their training. The war transformed the Jedi from peacekeepers into generals and field commanders, a role for which their monastic tradition had not fully prepared them. Survival of early engagements became a matter of circumstance as much as skill.

  - title: "Nautolan Physiology and Culture"
    keywords: "nautolan, glee anselm, amphibious, pheromone, tendril, olfactory, sabilon"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      Nautolans are an amphibious species native to the water-rich world of Glee Anselm, particularly the Sabilon region. Their most distinctive feature is a crown of sensitive head tentacles that function as primary sensory organs, capable of detecting pheromonal expressions of emotion and subtle changes in body chemistry. These tendrils are extraordinarily sensitive but function poorly outside of water, making Nautolans more perceptive in aquatic environments. They are naturally excellent swimmers and can survive equally well in air or water, though their language is only fully pronounceable when submerged.

  - title: "Weequay Clan Communication"
    keywords: "weequay, pheromone, clan, communication, short-range"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      Weequays possess a unique form of short-range communication exclusive to members of their own clan, conducted through complex pheromonal signals. This silent method of coordination is as clear and nuanced to them as verbal speech is to other species, allowing for tactical coordination that remains imperceptible to outsiders. No other known species can sense or interpret Weequay pheromonal communication without Force sensitivity.

  - title: "Form I Lightsaber Technique (Shii-Cho)"
    keywords: "lightsaber, form i, shii-cho, technique, underwater combat"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      Form I, also known as Shii-Cho, is a classical lightsaber combat style that focuses on fundamental technique and wide, arcing strikes. Practitioners who master this form can adapt it for unusual environments; specially constructed lightsabers using rare crystals can function effectively even underwater, allowing skilled users to extend their combat capabilities into aquatic theaters of war.

  - title: "Vaapad: The Seventh Form"
    keywords: "vaapad, seventh form, lightsaber, dark side, dangerous, intense"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      Vaapad is the seventh and most dangerous form of lightsaber combat, a technique so intense and perilous that its practice walks a razor's edge along the dark side itself. Mastery of this form requires not merely physical prowess but psychological fortitude and iron discipline, as the form's very nature tempts practitioners toward forbidden power. Only the most skilled and disciplined Jedi swordmasters attempt to perfect this technique.

  - title: "Battle of Geonosis: Jedi Command Structure"
    keywords: "geonosis, jedi commander, battle, clone wars, task force"
    category: "faction"
    priority: 8
    planet: "geonosis"
    surface_affinity: "news"
    content: |
      During the opening engagement of the Clone Wars at Geonosis, the Jedi Order deployed a task force of approximately 200 Jedi knights and masters to rescue captured Republic operatives and engage Separatist droid forces. The Jedi commanders coordinating this force included several masters of exceptional combat skill and Force mastery. Many of the Jedi who trained under master lightsaber instructors perished in the arena combat and space battle that followed, marking a significant loss of experienced combatants early in the conflict.

  - title: "Ord Mantell: A World Brought to Temporary Peace"
    keywords: "ord mantell, lawless, peace, jedi, mediation"
    category: "location"
    priority: 5
    planet: "all"
    surface_affinity: "news"
    content: |
      Ord Mantell is a notoriously lawless world plagued by criminal activity and territorial disputes. A skilled Jedi negotiator and peacekeeper achieved a temporary cessation of hostilities through diplomacy and mediation, bringing rare stability to this chaotic world. However, the fragile peace remains dependent on continued vigilance and the threat of Jedi intervention.

  - title: "Glitteryll Drug Trade"
    keywords: "glitteryll, drug, spice, glitterstim, ryll, trafficking, illegal"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "bounty"
    content: |
      Glitteryll is a potent hybrid drug created by combining glitterstim and ryll spices, produced and trafficked by criminal enterprises across the galaxy. The illegal trade in this substance has drawn Jedi attention due to its connection to wider criminal networks. Glitteryll trafficking operations often employ ruthless methods to maintain operational security and eliminate threats to their supply chains.

  - title: "Twi'lek Physiology and Grace"
    keywords: "twi'lek, ryloth, athletic, graceful, empathic, lekku"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      Twi'leks are a naturally athletic and graceful species, with a genetic predisposition toward fluid movement and physical coordination. Members of influential Twi'lek clans on Ryloth often exhibit high levels of empathy and intelligence, though individual temperament varies widely. Their innate grace makes them well-suited to acrobatic combat styles and Force disciplines that emphasize fluidity over brute strength.

  - title: "Ongree Analytical Mind"
    keywords: "ongree, skustell cluster, analyst, investigation, persuasion, cunning"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "general"
    content: |
      Ongrees are a species renowned for their natural analytical abilities and talent for investigation. Their minds excel at ferreting out deception and reading interpersonal dynamics, making them exceptional diplomats and investigators. Many Ongrees leverage cunning and persuasion over direct confrontation, preferring to unravel complex situations through careful observation and negotiation.

  - title: "Raxus Prime Declaration"
    keywords: "raxus prime, separatist rally, public condemnation, republic corruption, jedi decadence"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "news"
    content: |
      The Separatist movement reached critical mass when its leader publicly appeared on Raxus Prime to denounce the Republic and Jedi Order. Standing before crowds of corporate delegates and sympathetic worlds, he articulated grievances about decadence, hypocrisy, and institutional rot. His rhetoric catalyzed entire systems to formally secede, transforming regional discontent into an organized political coalition that would challenge Republic authority across the Outer Rim.

  - title: "The Sith Duel on Geonosis"
    keywords: "lightsaber duel, force powers, force lightning, combat form, jedi knight confrontation"
    category: "concept"
    priority: 7
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      In a secret hangar on Geonosis, a powerful Sith Lord demonstrated overwhelming mastery of both blade and Force. His lightning crackled through the air, incapacitating overconfident attackers. Against a more measured opponent, the duel stretched into a calculated exchange of strikes and defensive parries. When pressed by a warrior wielding dual blades, the Sith severed his opponent's weapon arm with surgical precision. The combat showcased a decades-long perfection of Form techniques and Force manipulation that left even experienced Jedi outmatched.

  - title: "Corporate Secession and Droid Conscription"
    keywords: "commerce guild, banking clan, technical union, droid conscription, corporate armies, reform promises"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Major commercial entities—the Commerce Guild, Banking Clan, Technical Union, and others—were recruited to the Separatist cause through promises of economic reform and protection of capitalist interests. In exchange, these powerful corporations committed their vast manufacturing capacity and existing droid armies to Separatist military operations. The decentralized nature of corporate droid forces meant the Confederacy could field mechanized legions across disparate systems simultaneously, overwhelming the Republic's initial defensive posture.

  - title: "Sheathipede-class Shuttle"
    keywords: "sheathipede,shuttle,trade federation,transport,lapiz cutter"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Sheathipede-class shuttle is a compact short-range transport vessel employed by Trade Federation officials for planetary approaches and orbital ferry operations. These craft sacrifice cockpit space for automated pilot systems, allowing expanded passenger cabins. The personal shuttle of high-ranking Federation dignitaries, such as the Lapiz Cutter, foregoes weaponry in favor of robust deflector shield arrays. During the Naboo crisis and subsequent conflicts, Sheathipede shuttles have served as rapid-deployment vessels for Neimoidian representatives, capable of swift planetary insertion and extraction under contested conditions.

  - title: "Techno Union Coalition"
    keywords: "techno union,manufacturing,confederacy,separatist,droid army,trade,corporate"
    category: "organization"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      The Techno Union stands as a vast consortium of heavy manufacturers and galactic shipping magnates, wielding considerable influence within the Republic's Senate through coordinated lobbying and commerce regulation. Member firms—including armor workshops, engineering houses, and starship manufacturers—gain access to cutting-edge research facilities and proprietary technologies. The Union's manufacturing worlds span industrial centers across the galaxy, from foundries to mechanized factory-planets. As the Separatist crisis escalated, the Techno Union pledged its considerable military-industrial capacity to the Confederacy of Independent Systems, modeled its governance after the Trade Federation's Senate representation and droid-army structure.

  - title: "Aqualish Senators in the Republic"
    keywords: "aqualish, senator, aquatic, republic, politics, ando"
    category: "faction"
    priority: 5
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      Aqualish senators serve in the Galactic Senate, representing aquatic interests across the galaxy. These amphibious beings are born swimmers, adapted to life in water with natural fins that grant them extraordinary aquatic mobility. However, their lack of traditional fingers means standard Republic equipment often requires custom modification to function properly. Aqualish senators are known for their diplomatic acumen and involvement in trade negotiations, though some have proven susceptible to offers from the emerging Separatist movement.

  - title: "The Trade Federation in the Clone Wars"
    keywords: "trade federation, separatist, droid army, neimoidian, cis, confederacy"
    category: "faction"
    priority: 9
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      Once merely a commercial enterprise, the Trade Federation has become a military power within the Confederacy of Independent Systems. Led by Viceroy officials who survived Senate prosecution, the Federation commits its vast droid armies to the Separatist cause, fighting directly against the Republic's newly formed clone legions. Trade Federation officers command B1 and B2 battle droids across multiple theaters, transforming merchant vessels and transport infrastructure into vessels of war. The Federation's loyalty to the CIS is absolute—defection means death.

  - title: "Assassination Market for Senators"
    keywords: "assassination, bounty, separatist, senator, contract, hunter"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "bounty"
    content: |
      In the years preceding the Clone Wars, wealthy Separatist interests placed substantial bounties on prominent Republic senators, particularly those blocking Separatist recruitment or military expansion. These contracts have drawn some of the galaxy's most dangerous bounty hunters to the task, creating a lethal marketplace where political rivals can hire professional killers. While some targets perish in spectacular fashion, others prove remarkably difficult to eliminate, escaping multiple assassination attempts through luck, cunning, or protective networks.

  - title: "Battle of Geonosis Arena Spectacle"
    keywords: "geonosis, battle, arena, clone war, droid, separatist"
    category: "location"
    priority: 8
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      The inaugural conflict of the Clone Wars erupted in a Geonosis arena where Separatist commanders gathered to witness executions and celebrate the deployment of their combined droid armies. The arena became a sudden battleground when more than two hundred Jedi Knights and newly deployed clone regiments invaded the facility, turning a spectacle of death into a fierce three-way melee. Battle droids clashed with clone troopers while Jedi fought across the sand, and Separatist commanders fled in chaos, barely escaping with their lives as their grand military reveal transformed into a devastating defeat.

  - title: "Slythmongers of Coruscant"
    keywords: "slythmonger, drug dealer, death stick seller, pharmaceutical contraband, entertainment district"
    category: "organization"
    priority: 7
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      Slythmongers are street hustlers who deal in pharmaceutical contraband, particularly death sticks, throughout Coruscant's entertainment districts and lower levels. Operating from the trendy clubs and establishments of Galactic City, they move product across all social strata—from wealthy nobles seeking escape to the impoverished seeking temporary relief. The work attracts individuals from various species, many with mixed reputations and checkered pasts. Though slythmonging is highly profitable due to the addictive nature of their product, dealers themselves are often viewed with contempt as parasites by the very customers who depend on them.

  - title: "Balosar Species"
    keywords: "balosar, antennapalps, poison resistance, shifty, cheats, scoundrels"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Balosars are a species known for their distinctive antennapalps—sensitive sensory organs attuned to sound vibrations. Physiologically, they possess a natural resistance to poisons and certain narcotics, making them physically hardier against toxic exposure than most humanoids. However, Balosars carry a difficult reputation in galactic society; they are widely stereotyped as shifty cheats and scoundrels prone to deception and self-serving behavior. This stereotype persists despite individual variation, and it colours how Balosars are treated in legitimate institutions and business dealings. Some Balosars lean into these expectations, pursuing underworld trades and criminal enterprise.

  - title: "Dex's Diner"
    keywords: "dex's diner, coco town, coruscant, diner, information, refuge"
    category: "location"
    priority: 6
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      Dex's Diner is a modest establishment in Coco Town, Coruscant, serving quick and hearty meals to a steady clientele. The diner functions as more than just a place to eat; it is known throughout the district as a reliable source of information on an astonishing array of topics and connections. The proprietor, a seasoned individual with a colorful past including work on oil rigs, gun-running, and bartending, has built a reputation for both culinary skill and accumulated street knowledge. The diner represents a refuge from the darker elements of Galactic City, a place where information flows freely alongside food and drink.

  - title: "The Outlander Club"
    keywords: "outlander club, coruscant, entertainment, zealots of psusan, flesh peddlers"
    category: "location"
    priority: 5
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      The Outlander Club is a trendy entertainment establishment in Coruscant's fashionable districts, known for its displays of exotic flesh and clientele drawn from the galaxy's wealthy and curious. The club attracts various subcultures and cult groups seeking popularity and recruits among the younger, more decadent crowds. Its atmosphere mixes danger and excess—a place where one might encounter everything from criminal intelligence networks to mystical devotees. The club serves as a nexus point for information gathering, personal confrontations, and unexpected encounters between worlds that would otherwise never collide.

  - title: "Zealots of Psusan"
    keywords: "zealots of psusan, cult, psusan designs, revenge, corruption"
    category: "organization"
    priority: 5
    planet: "coruscant"
    surface_affinity: "bounty"
    zone_scope: "coruscant"
    content: |
      The Zealots of Psusan are a religious or mystical cult enjoying a flash of popularity in Coruscant's trendy entertainment districts. The organization has been exposed as a front for illicit activities, operated by corrupt leadership now deceased. Members remain active and vengeful, plotting against those responsible for their leader's downfall. The Zealots' aesthetic includes distinctive designs and symbols that mark their followers in public establishments. The group represents a dangerous convergence of religious fervor and criminal enterprise, capable of orchestrating betrayals and seeking violent retribution against their enemies.

  - title: "Coco Town"
    keywords: "coco town, coruscant, illegal labs, pharmaceutical, underworld, lower levels"
    category: "location"
    priority: 6
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      Coco Town is a district of Coruscant housing illegal pharmaceutical laboratories where dangerous narcotics like death sticks are manufactured and distributed. The area serves as a hub for underworld activity, attracting those seeking to escape legitimate society or profit from vice. The district's shadowy reputation and lax enforcement make it ideal for criminal enterprises, yet it also draws individuals attempting to build new lives away from their pasts. The contrast between legitimate businesses operating in Coco Town and its thriving black market creates an atmosphere of moral ambiguity.

  - title: "Besalisk Species"
    keywords: "besalisk, ojom, four-armed, arctic, cold-adapted, strength"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "general"
    content: |
      A sturdy humanoid species from the ice world Ojom, Besalisks are naturally adapted to extreme cold and can survive extended periods without sustenance. Males typically possess four arms, which provide them with exceptional climbing and melee combat capability. Their physiology makes them formidable workers and combatants, and their calm demeanor masks considerable physical prowess. They stand roughly 1.8 meters tall on average and are strong swimmers despite their arctic origins.

  - title: "WA-7 Server Droid"
    keywords: "server droid, wa-7, wheeled, antique, droid, waitress, coruscant"
    category: "technology"
    priority: 5
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      An antique wheeled server droid recognizable by its streamlined humanoid form, decorative metallic skirt, and agile unipod wheel base. WA-7 operates with repulsor stabilizers to maintain balance and carries an integrated order transmitter linked directly to kitchen systems. The droid is known for a sharp, sassy personality programming and holds distinct preferences—dislikes low tippers and has been observed flirting with dishwashing units. Its persistence and efficiency make it a fixture in establishments across Coruscant's dining scene.

  - title: "Clawdite Shapeshifters"
    keywords: "clawdite, shapeshifter, zolan, reptilian, bounty hunter, disguise"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A reptilian species hailing from Zolan, Clawdites possess the natural ability to shapeshift into different appearances, typically assuming humanoid forms to blend into galactic society. Their green-scaled true form contrasts sharply with their assumed personas. Many Clawdites leave their homeworld to pursue careers in security, bounty hunting, or contract work where their unique abilities command premium pay. Their shapeshifting talent makes them invaluable—and dangerous—operatives in covert operations.

  - title: "Mabari Martial Arts Tradition"
    keywords: "mabari, zolan, warrior, martial arts, order, knights, ancient"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "general"
    content: |
      An ancient martial tradition of the warrior knights of Zolan, the Mabari represents the height of hand-to-hand combat training on that world. The discipline encompasses multiple mastery levels, with advanced practitioners achieving extraordinary skill in unarmed combat. Those who achieve high rank in Mabari training become formidable warriors capable of engaging armed opponents. The order maintains strict codes and traditions, though some practitioners have fled Zolan to pursue mercenary careers across the galaxy.

  - title: "Bando Gora Cult"
    keywords: "bando gora, cult, death, obsession, threat, bogden, terrorist"
    category: "organization"
    priority: 7
    planet: "all"
    surface_affinity: "bounty"
    content: |
      A death-obsessed cult led by a fallen Force user who commands significant resources and warrior cadres. The organization maintains a headquarters on one of Bogden's moons and operates as a terrorist threat across the Outer Rim. Members are fanatically devoted to their leader and willing to engage military-grade opposition. The cult represents a dangerous combination of ideological extremism and access to advanced weaponry, making them a priority target for serious bounty hunters and law enforcement.

  - title: "Kamino Clone Army"
    keywords: "kamino, clone, army, template, genetic, republic, military"
    category: "faction"
    priority: 9
    planet: "kamino"
    surface_affinity: "news"
    zone_scope: "kamino"
    content: |
      A massive military cloning operation conducted in secret on the water world of Kamino, producing an entire army of genetically identical soldiers grown from a single template. The clones are designed for rapid deployment and are undergoing military training to serve as the Republic's primary armed force. The project represents an unprecedented scale of genetic engineering and represents a fundamental shift in how galactic warfare will be conducted. Few in the Republic are aware of the program's existence or scope.

  - title: "Senatorial Assassination Plot"
    keywords: "assassination, senator, bounty, contract, coruscant, explosive, poison"
    category: "concept"
    priority: 8
    planet: "coruscant"
    surface_affinity: "bounty"
    zone_scope: "coruscant"
    content: |
      A high-profile contract targeting a Republic senator employs multiple assassination methods—remote explosives, bio-weapons in automated delivery systems, and direct hunter pursuit across Coruscant's skyways. The plot is coordinated through layered intermediaries to obscure the ultimate contractor. Operatives use sophisticated droid assassins, custom speeder vehicles, and personal martial skill in a coordinated effort. The attempt demonstrates the vulnerability of high-ranking Republic officials to determined and well-funded assassination contracts.

  - title: "Coruscant Underlevels"
    keywords: "underlevel, coruscant, lower city, working class, poverty, danger"
    category: "location"
    priority: 6
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      The lower districts of Coruscant house the working poor and immigrant populations, far removed from the gleaming upper city. The underlevels are densely populated, poorly lit, and marked by narrower streets and older infrastructure. Residents here experience limited opportunity and often work service jobs in upper-level establishments. The underlevels harbor both tight-knit communities and criminal elements, creating environments where desperation and opportunity intersect. Rising to work in the upper levels represents genuine advancement for underlevel residents.

  - title: "Denon Commercial Hub"
    keywords: "denon, megapolis, commerce, city, corporate, security"
    category: "location"
    priority: 5
    planet: "all"
    surface_affinity: "general"
    content: |
      A sprawling megalopolitan world devoted entirely to commercial enterprise and trade, Denon hosts vast corporate headquarters and serves as a center of galactic commerce. The world's immense cities create opportunities for security specialists, bodyguards, and corporate operatives. Professional careers in corporate security and executive protection command significant compensation and attract skilled operatives from across the galaxy. Denon's focus on commerce and wealth creates a lucrative market for those with combat and tactical expertise.

  - title: "Clawdites: Masters of Deception"
    keywords: "clawdite, shapeshifter, zolan, skin-changer, bounty hunter, disguise"
    category: "person"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Clawdites are a humanoid species from Zolan known for their extraordinary ability to alter their physical appearance. Their skin is malleable, allowing them to change its color, texture, and shape to mimic other humanoid species—though the transformation is intensely painful and reverts if they are stunned or rendered unconscious. Some Clawdites develop refined control over their shapeshifting, altering hair length and eye coloration with precision. This natural talent makes them formidable operatives in espionage, infiltration, and bounty-hunting circles, where their ability to move undetected through worlds and slip past security has become legendary.

  - title: "Ansion: The Wind-Swept Linchpin"
    keywords: "ansion, mid rim, alliance, treaty, prairie, politics"
    category: "location"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Ansion lies in the Mid Rim as a critical strategic world, its allegiances holding together multiple sector-spanning treaties and military pacts. Wind-blown and dominated by vast grasslands and prairies, the planet hosts a diverse population despite being predominantly Ansionian. The capital, Cuipernam, sits on the Sorr-ul-Paan Plateau and serves as the commercial heart of the world, its markets and spaceport drawing traders and offworld corporations. The three other major cities—Doigon, Flerauw, and Dashbalar—form a network of urban centers, while the open plains beyond remain the domain of nomadic herders and the creatures that inhabit this untamed landscape.

  - title: "The Alwari: Nomadic Traditionalists of Ansion"
    keywords: "alwari, ansion, nomad, prairie, overclan, borokii, januul, tradition"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Alwari are the nomadic peoples of Ansion's windswept prairies, organized into powerful overclans—most notably the Situng Borokii and Hovsgol Januul—that have long competed for dominance across the grasslands. These traditionalists blend ancestral customs with adapted modern technology, such as modifying glowlamps to flicker like the natural flames their ancestors used. Tensions between the overclans run deep, rooted in generational rivalries, while resentment toward the city-dwelling Ansionians of Cuipernam simmers just beneath the surface. The Alwari fear that outsiders—particularly those sent to mediate disputes—favor urban interests over pastoral rights, a friction that threatens Ansion's political unity.

  - title: "Ansionians: Yellow-Skinned People of Two Worlds"
    keywords: "ansionian, ansion, humanoid, mane, city dweller, pale-yellow"
    category: "person"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Ansionians are slender humanoids with pale-yellow skin, shorter than most humans, and distinguished by a dense brush of fur—a mane—running from forehead to tail tip. These manes occur naturally in a spectrum of colors, though many Ansionians dye them in vibrant patterns as cultural expression. Society splits between city dwellers inhabiting Cuipernam and its sister cities, and the Alwari nomads of the open plains. Urban Ansionians tend toward commerce and administration, while the Alwari cling to pastoral traditions. Their sharp, pointed teeth hint at a predatory ancestry, though modern Ansionians are primarily humanoid in behavior and intellect.

  - title: "Suubatars: Six-Legged Predators of Ansion's Grasslands"
    keywords: "suubatar, ansion, predator, prairie, beast, transportation, six-legged"
    category: "location"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Suubatars are massive six-legged predators native to Ansion's grasslands, standing three times the height of a human and built for explosive speed across open terrain. Covered in green stripes unique to each individual and sandy-brown underbellies that blend seamlessly with prairie vegetation, they are consummate ambush hunters. Their streamlined skulls, powerful claws, and unhinged, snake-like jaws hint at their savage nature, though their broad diets and adaptability have made them surprisingly successful. The Alwari have domesticated suubatars as swift mounts and pack animals, their natural affinity for the grasslands making them invaluable for nomadic life.

  - title: "Hazards of Ansion's Open Sky"
    keywords: "ansion, kyren, chawix, tumbleweed, predator, swarm, danger"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Ansion's grasslands harbor creatures as alien as they are deadly. The Chawix is a spiky tumbleweed that hunts by impaling prey, lurking in the tall grass to ambush the unwary. More terrifying still are the Kyren—vast insect swarms numbering in the hundreds of millions that darken the sky as they migrate, turning day into twilight. Travelers caught on the open prairie when a Kyren swarm passes overhead must seek shelter or risk being overwhelmed. These natural perils make the grasslands as dangerous as they are vast, a reminder that Ansion's beauty masks an unforgiving wilderness.

  - title: "Subterrel Mining Operations"
    keywords: "subterrel, mining, kaminoan, polis massan, underground colonies, outer rim"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Subterrel, located in the outer rim near wild space, is renowned across the galaxy for its vast mining operations conducted in sprawling underground colonies. The Kaminoans operate the largest mining colony, employing clones engineered specifically for subterranean work—operatives bred to navigate the planet's extensive cave systems and harsh mineral extraction environments. Polis Massans and various alien workers also toil in these isolated settlements. The planet's name derives from 'subterranean,' a fitting descriptor for a world where civilization exists almost entirely beneath the surface. Regular trade and personnel exchanges occur between Subterrel and the nearby planet Polis Massa, making the two worlds interdependent economic partners.

  - title: "Naboo: Terrestrial Paradise and Political Refuge"
    keywords: "naboo, gungan, human settlement, plasma-rich core, underwater cities, refugee world"
    category: "location"
    priority: 9
    planet: "all"
    surface_affinity: "general"
    content: |
      Naboo, a terrestrial world in the Chommell sector, presents a paradox to astrophysicists: its porous, plasma-rich interior lacks a molten core, a phenomenon unique in the known galaxy. The planet's surface sprawls with dense swamps, rolling grasslands, and verdant hills bisected by the Gallo Mountains. Beneath the waves of Paonga Sea lies the Gungan city of Otoh Gunga, constructed with exotic hydrostatic bubble technology. An intricate network of underwater passages—the 'underwaterways'—connects Gungan holy places and settlements, teeming with immense aquatic creatures never glimpsed on the surface. During the Separatist crisis, Naboo's elected leadership opened the planet's borders to refugees fleeing worlds seceding from the Republic, though this influx created tensions between established Naboo society and migrant workers.

  - title: "Theed: Capital of Classical Architecture"
    keywords: "theed, naboo city, spaceport, palace courtyard, hall of perri-teeka, cultural center"
    category: "location"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Theed, one of Naboo's major cities, exemplifies the planet's tradition-bound elegance. The city boasts monuments such as the Hall of Perri-Teeka dedicated to a revered statesman, Guido's Tower among its oldest structures, and the Parnelli Museum of Art. The Palace Courtyard, recently rebuilt over bomb-scarred districts following the Trade Federation's occupation, features graceful walkways and a circular colonnade housing a holographic frieze of great philosophers and artists. Virdugo Plunge, the city's largest waterfall, cascades from the Solleu River. Theed Spaceport, dominating the cliff-base below, breaks from tradition with its functional, unadorned design—a pragmatic response to urgent construction needs—though its elegantly curved docking platforms echo the natural sweep of surrounding cliffs. The spaceport now channels increased traffic from senators and immigrant miners seeking work on Naboo's spice-rich moons.

  - title: "Lake Country: Pastoral Heartland of Naboo"
    keywords: "lake country, naboo, pastoral collective, glad arrival festival, shaak, meadows, refuge"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Lake Country, a remote region of Naboo, forms a sanctuary of natural beauty dominated by crystalline lakes ringed by mountains and valleys. Wide communally-owned meadows of grass and wildflowers, tended by the Pastoral Collective, intersperse waterfalls and pristine waters. The planet's native shaak population thrives in this landscape. Each springtime, the festival of Glad Arrival transforms the meadows with colorful pageants and music-making that last several days, celebrating the season's renewal. The Lake Country maintains isolation from Naboo's underground waterways, preserving its serene pastoral character and making it an ideal refuge for those seeking sanctuary from the turmoil of the wider galaxy.

  - title: "Naboo Lake Country"
    keywords: "naboo, lake, island, varykino, glasswork, farmer, hermit, pastoral"
    category: "location"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    zone_scope: "naboo"
    content: |
      The lake regions of Naboo stretch across vast plains dotted with sparkling blue waters. Kaminoan engineers long ago cleared the waterways of dangerous sea creatures, making the lakes safe for settlement. The sparse population consists mostly of farmers and hermit-craftsworkers renowned for their mystically beautiful glassworks. On the most distant islands stand grand villas owned by wealthy families, surrounded by rose-covered arbors and flowering gardens. The landscape embodies Naboo's serene pastoral character.

  - title: "Shaak Herds"
    keywords: "shaak, herd animal, naboo, grazer, meat, livestock, grassland"
    category: "location"
    priority: 5
    planet: "all"
    surface_affinity: "ambient"
    zone_scope: "naboo"
    content: |
      Shaaks are plump, four-legged creatures native to Naboo's grasslands, moving in peaceful herds across the plains in search of flowers and tender grass shoots. They possess multiple wombs, allowing their populations to expand rapidly. Though weak and clumsy—often tumbling over waterfalls—shaaks are excellent swimmers. They avoid damp swamps and keep to dry regions. For Naboo's peoples, shaak meat is a reliable food source that stores well and requires minimal preparation, making these gentle beasts economically vital despite their unsuitability as mounts or pack animals.

  - title: "Kamino: World of Waters"
    keywords: "kamino, cloning, kaminoan, stilt city, storm, ocean, genetic science, rishi maze"
    category: "location"
    priority: 9
    planet: "kamino"
    surface_affinity: "ambient"
    zone_scope: "kamino"
    content: |
      Kamino orbits within a dwarf satellite galaxy beyond the Outer Rim, a world transformed by catastrophic global warming that melted vast ice shelves and swelled the oceans to drown all landmasses. The tall, elegant Kaminoans adapted by constructing stilt-cities that echo the architecture of their ancient land colonies, designed to withstand the relentless electrical storms that rage across the planet for much of the year. The Kaminoans possess unparalleled mastery of cloning technology, trading this knowledge for vital raw materials. Beneath the waves lie sunken cities—relics of pre-flood civilization—which the Kaminoans visit on sacred pilgrimages to honor their ancestors.

  - title: "Kaminoan Cloning Industry"
    keywords: "kaminoan, clone, cloning, genetic science, technology, weapons, saberdart, interrogation, bounty hunter"
    category: "technology"
    priority: 9
    planet: "kamino"
    surface_affinity: "general"
    zone_scope: "kamino"
    content: |
      The Kaminoans are the galaxy's foremost cloning specialists, their expertise unmatched in genetic manipulation and biological engineering. Beyond clones, they manufacture highly specialized high-tech weapons and interrogation devices, including saberdarts favored by professional bounty hunters and security specialists. The Kaminoans subcontract production of larger military hardware to off-world suppliers, maintaining their focus on genetic sciences and advanced weaponry. Their trade in cloning knowledge sustains their world's survival, exchanged for foodstuffs and raw materials they cannot produce themselves.

  - title: "Tipoca City"
    keywords: "tipoca, kamino, capital, stilt city, cloning facility, hatchery, training complex, prime minister"
    category: "location"
    priority: 9
    planet: "kamino"
    surface_affinity: "encounter"
    zone_scope: "kamino"
    content: |
      Tipoca City sprawls across Kamino's western equator for 150,000 kilometers as a network of interconnected stilt structures, the beating heart of Kaminoan society. Millions of Kaminoans work either within the cloning program or its closely-linked bureaucracy. The capital's only residential spaces house the prime minister, military staff, and rotating shifts of cloning scientists who spend three-month rotations before returning to distant satellite cities. Within Tipoca's domes lie vast cloning hatcheries, growth pods, learning facilities, dormitories, and dining halls for the cloned armies. The Clone Military Education Complex represents the largest training center on Kamino, wholly committed to Republic contracts.

  - title: "Aiwha Mounts"
    keywords: "aiwha, mount, kamino, aquatic, cetacean, water-vascular, flight, swim, gungan"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    zone_scope: "naboo,kamino"
    content: |
      Aiwhas are colossal aquatic creatures found on several worlds including Naboo and Kamino, living in medium-sized pods and feeding on surface krill and fishes through baleen sieve-plates. The Gungans of Naboo have domesticated these massive beasts as mounts and airborne transports. Aiwhas possess a unique water-vascular system: their spongy tissues absorb water for underwater travel, then expel it for flight, allowing the creatures to shift their density at will. With wingspans reaching 20 to 30 meters, aiwhas can slam opponents with tremendous force and move swiftly across water or through the sky.

  - title: "Massiff"
    keywords: "massiff, carnivore, quadruped, geonosis, tatooine, beast, arena, guard animal"
    category: "location"
    priority: 6
    planet: "tatooine"
    surface_affinity: "encounter"
    zone_scope: "tatooine,geonosis"
    content: |
      Massiffs are burly quadrupedal carnivores standing about a meter tall at the shoulder, with coarse skin, large jaws filled with teeth, dark eyes, and a line of hard spines running along their backs. Found on both Tatooine and Geonosis, they were likely introduced to one world by careless traders. On Geonosis, massiffs serve as emblems of the aristocracy and are domesticated to rid the hives of vermin, occasionally forced into arena combat. On Tatooine, settlers similarly domesticate them as camp guard animals, relying on their keen sense of smell and natural aggression.

  - title: "Protocol Droid Functions"
    keywords: "protocol droid, c-3po, cybot galactica, communication, translation, etiquette, diplomat"
    category: "technology"
    priority: 5
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Protocol droids like the Cybot Galactica model are purpose-built to facilitate interaction between organic beings. Equipped with advanced communication modules and language processors, they serve as translators and cultural advisors during formal meetings and negotiations. Their secondary functions range from logistics to data management, though in remote settlements they often find themselves relegated to simple mechanical communication and maintenance tasks instead of their intended diplomatic work.

  - title: "Tatooine Moisture Farming Culture"
    keywords: "moisture farmer, tatooine, homestead, settler, farm equipment, livelihood, remote settlement"
    category: "location"
    priority: 7
    planet: "tatooine"
    surface_affinity: "ambient"
    content: |
      Moisture farming is the lifeblood of remote Tatooine settlements. Families maintain scattered homesteads equipped with vaporators and repulsorlift technology, extracting water from the arid atmosphere. Farmers form tight-knit communities, banding together during crises and hardship. They trade parts and supplies in outpost towns like Mos Espa, where they encounter merchants, slavers, and other travelers. The work is grueling and the dangers—from environmental hazards to raiders—are ever-present, binding families and neighbors together through shared struggle.

  - title: "Tusken Raider Threat"
    keywords: "tusken raider, tatooine, raid, kidnapping, settler conflict, wilderness danger"
    category: "faction"
    priority: 7
    planet: "tatooine"
    surface_affinity: "encounter"
    content: |
      Tusken Raiders prowl the desert wastes of Tatooine, striking at isolated settlements and travelers with brutal efficiency. They conduct raids to seize supplies, slaves, and goods, showing little mercy to those who resist. Organized settler militia attempts to mount rescue operations often end in heavy casualties, as the Raiders possess intimate knowledge of the terrain and superior numbers in their home desert. The threat they pose has become a defining danger of frontier life on Tatooine.

  - title: "Mos Espa Trade Hub"
    keywords: "mos espa, tatooine, trade, marketplace, merchant, slaves, parts"
    category: "location"
    priority: 6
    planet: "tatooine"
    surface_affinity: "news"
    content: |
      Mos Espa serves as a vital trade hub for Tatooine's remote settlements, where moisture farmers venture to acquire parts, sell goods, and conduct business. The settlement houses merchants, traders, and slave dealers who operate in the lawless frontier, dealing in everything from equipment to sentient beings. Routine trading trips offer settlers their only contact with wider commerce, though danger and moral compromise accompany every transaction.

  - title: "Geonosis Arena Combat"
    keywords: "geonosis, arena, combat, battle, droid, separatist, hive"
    category: "location"
    priority: 7
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      Geonosis hosts brutal arena spectacles where captured combatants—droids, beasts, and unfortunates—are forced to fight for the entertainment of the Geonosian aristocracy. Massiffs are occasionally deployed as arena fighters alongside other creatures and mechanical combatants. The arenas serve both as entertainment venues and demonstrations of Separatist military might, drawing crowds of chittering Geonosians to witness organized violence.

  - title: "Geonosis Arena Execution Ceremony"
    keywords: "geonosis, arena, execution, separatist, cis, battle droids, jedi"
    category: "location"
    priority: 8
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      The Geonosian Archduke presided over a public execution ceremony in the grand arena, where condemned prisoners faced their final moments before crowds and Separatist leadership. The arena featured a private box reserved for high-ranking CIS officials and their allies, offering an elevated vantage point over the sand floor below. The ceremony was interrupted by the sudden arrival of a Jedi strike force, triggering a massive confrontation between Jedi warriors and overwhelming numbers of battle droids—the first large-scale engagement of the Clone Wars.

  - title: "Mandalorian Battle Armor and Arsenal"
    keywords: "mandalorian armor, saberdart, wrist rocket, jet pack, bounty hunter gear, kouhun venom"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Elite bounty hunters deploy modified Mandalorian battle armor—a sealed exoskeleton enhancing physical strength and energy resistance. The suit integrates lethal and versatile weaponry: saberdart launchers loaded with neurotoxin, wrist-mounted missile pods, a turbo-projected grappling hook for vertical traversal, retractable wrist blades, and a integrated jet pack capable of sustained flight. Sensor packages including infrared, motion detection, and broad-band communication interception allow the wearer to track and intercept targets across hostile terrain. An internal enviro-filter provides two hours of breathable atmosphere in toxic or vacuum environments.

  - title: "Slave I: A Rare Firespray Patrol Craft"
    keywords: "slave i, firespray, bounty hunter ship, oovo iv, rare starfighter, seismic charges"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Slave I is a heavily modified Kuat Systems Engineering Firespray—originally designed as a police transport for the asteroid prison Oovo IV. The vessel's distinctive design rotates 90 degrees during flight, shifting from horizontal docking configuration to vertical maneuvering stance. Stolen from Oovo IV's hangar when all sister ships were destroyed, it remains one of the rarest Firesprays in circulation. The craft bristles with military-grade armament: twin blaster cannons, dual laser cannons, dual proton torpedo launchers, and a naval minelayer equipped with seismic charges. Its hull supports advanced sensor masking and can carry six passengers plus 70 metric tons of cargo—ideal for bounty retrieval and escape.

  - title: "Kamino's Hidden Clone Army"
    keywords: "kamino, clone army, tipoca city, kaminoan, secret military, republic clones"
    category: "location"
    priority: 9
    planet: "kamino"
    surface_affinity: "news"
    zone_scope: "kamino"
    content: |
      The water-world of Kamino harbors a clandestine military cloning facility hidden from the broader galaxy. Tipoca City, the primary settlement, houses vast libraries and laboratories where the Grand Army of the Republic was cultivated in absolute secrecy. Kaminoan scientists—tall, elegant xenos with expertise in genetic manipulation—managed the breeding program, nurturing millions of clone soldiers from a single genetic template. The discovery of this army marked a turning point in galactic conflict, revealing a conspiracy of unprecedented scale. Few outsiders gain access to Kamino's restricted research sectors; those who do witness rows of cultivation chambers and training facilities designed to produce combat-ready soldiers en masse.

  - title: "The Clone Wars Begin"
    keywords: "clone wars, grand army, battle droids, republic, separatist, first engagement, geonosis"
    category: "concept"
    priority: 10
    planet: "geonosis"
    surface_affinity: "news"
    zone_scope: "geonosis"
    content: |
      The Clone Wars erupted when the Grand Army of the Republic clashed directly with the Separatist Droid Army for the first time on Geonosis. What began as a small-scale Jedi rescue operation in an arena evolved into a full-scale military engagement as clone troopers deployed from Republic gunships to counter waves of battle droids. The conflict represented a seismic shift in galactic politics—no longer a Cold War of espionage and proxy conflicts, but open combat between two massive military forces. The arena itself became a symbol of the war's brutality: a place designed for execution transformed into a battlefield where the fate of billions would be decided.

  - title: "Oovo IV: The Asteroid Prison"
    keywords: "oovo iv, asteroid prison, police patrol, firesprays, detention facility"
    category: "location"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Oovo IV is a high-security prison asteroid designed to hold the most dangerous and exotic criminals across the galaxy. The facility employs Firespray-class patrol craft to transport newly convicted inmates and maintain perimeter security. The hangar bay contains multiple Firespray vessels, standardized security measures, and advanced holding cells engineered to contain even the most physically aberrant prisoners. The asteroid's remote location and harsh environment make escape nearly impossible—a fact that makes theft of one of its prison transports a feat of rare audacity.

  - title: "Geonosian Sonic Turret"
    keywords: "sonic turret, geonosian artillery, droid factory defense, sonic damage"
    category: "technology"
    priority: 6
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      A two-crew sonic artillery emplacement of Geonosian design, capable of firing compressed sonic bursts across extended ranges. The turret operates on unlimited power, making it an effective static defensive asset. Its sonic resonance can devastate exposed targets across distances up to three kilometers, delivering concussive force through the air itself rather than conventional projectiles.

  - title: "Geonosis Droid Foundries"
    keywords: "droid factory, baktoid armor workshop, techno union, b1 battle droids, droideka, automated production"
    category: "location"
    priority: 9
    planet: "geonosis"
    surface_affinity: "ambient"
    zone_scope: "geonosis"
    content: |
      Massive subterranean droid factories operated by Baktoid Armor Workshop deep beneath Geonosis's forbidding surface. Hundreds of conveyor belts and robotic assembly arms work in orchestrated automation, capable of producing thousands of droids daily from raw metal and alloys sourced from the planet's mineral-rich ring system. B-1 battle droids, B-2 variants, and Droidekas emerge from these facilities in endless waves, their first combat deployment occurring at the Battle of Geonosis.

  - title: "Geonosian Gladiatorial Tradition"
    keywords: "arena combat, geonosian culture, low-caste advancement, melee weapons, beast fighting"
    category: "concept"
    priority: 7
    planet: "geonosis"
    surface_affinity: "dialogue"
    zone_scope: "geonosis"
    content: |
      Among Geonosian low-caste drones, arena combat offers the sole path to elevated status and recognition by the aristocracy. Volunteers who survive combat against exotic predators—acklays, nexu, reeks, mongworts, and gundarks—may achieve modest fame and fortune, earning acknowledgment from the ruling caste, though never as equals. The brutal spectacle serves both entertainment and pragmatic resource management, disposing of otherwise burdensome prisoners while satisfying the rigid society's need for public display.

  - title: "Geonosian Picador"
    keywords: "picador, spear fighter, beast rider, geonosian warrior, melee combat"
    category: "person"
    priority: 5
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      Arena handlers trained in beast management and armed with electrified spears. These wingless Geonosians command creatures through the arena from elevated platforms, their spears capable of delivering both wounding strikes and disabling stun charges. Their skill with beasts and resilience to damage make them formidable handlers of the arena's most dangerous predators.

  - title: "Tusken Raider Ambush Tactics"
    keywords: "tusken raiders, ambush, wire trap, gaffi stick, slugthrower, tatooine desert"
    category: "faction"
    priority: 8
    planet: "tatooine"
    surface_affinity: "encounter"
    zone_scope: "tatooine"
    content: |
      Tusken Raiders employ cunning traps to neutralize mounted pursuers. They string monofilament or metal wire across desert paths at head height to decapitate speeder riders, then emerge from rocky outcrops and shadows with gaffi sticks and slugthrowers while their Banthas kick up concealing dust. The Sand People coordinate attacks with patience, sometimes withdrawing into the deep desert to draw searchers further from aid. They strike hardest against moisture farmers who venture alone or in small, poorly armed groups.

  - title: "Lars Moisture Farm"
    keywords: "lars homestead, moisture vaporator, tatooine farming, blue milk, mos nytram"
    category: "location"
    priority: 7
    planet: "tatooine"
    surface_affinity: "ambient"
    zone_scope: "tatooine"
    content: |
      The Lars moisture farm sits isolated in Tatooine's desert wasteland, where family units harvest water from the parched air using vaporators—machines frequently damaged by sandstorms. Moisture farmers live solitary existences but maintain strong community bonds; they gather for mutual defense and share blue milk during difficult times. The homestead features a humble dwelling and scattered equipment, surrounded by endless dunes and capable of supporting speeder bikes and farm tools.

  - title: "Zephyr-G Swoop Bike"
    keywords: "zephyr-g swoop, mobquet, repulsorlift, cargo panniers, farm vehicle"
    category: "technology"
    priority: 6
    planet: "tatooine"
    surface_affinity: "general"
    zone_scope: "tatooine"
    content: |
      The Zephyr-G is a utilitarian single-seat swoop bike originally designed as a sports vehicle but readily converted for farm work. Mobquet's design places the power generator at the rear, flanked by cargo panniers capable of holding up to 100 kilograms. These machines are rugged enough to withstand twenty years of wear and remain serviceable through trader networks across Tatooine; farmers prize them for desert traversal despite their cramped passenger capacity.

  - title: "Moisture Farming Culture"
    keywords: "moisture farmer, tatooine, desert survival, harsh conditions, swoop bike, community"
    category: "concept"
    priority: 7
    planet: "tatooine"
    surface_affinity: "dialogue"
    zone_scope: "tatooine"
    content: |
      Moisture farming families across Tatooine endure brutal isolation, rising before dawn to tend vaporators and maintain equipment in relentless heat. The work demands constant vigilance—families warn their members against solo expeditions into the wastes. Farmers who lose limbs to sandstorm wire or Tusken traps adapt through hoverchairs and continued labor. Community runs deep; a farmer's call for aid brings thirty volunteers armed with whatever weapons they possess, though Tusken Raiders often use this loyalty against them.

  - title: "Tatooine Desert Dangers"
    keywords: "tatooine wasteland, sandstorm, wire trap, tusken raider, death, isolation"
    category: "location"
    priority: 8
    planet: "tatooine"
    surface_affinity: "encounter"
    zone_scope: "tatooine"
    content: |
      Tatooine's desert wasteland kills through multiple vectors: sandstorms tear apart unshielded equipment and force moisture farmers into dangerous repair work; Tusken Raiders embed monofilament wire at head height across migration routes, severing limbs or decapitating riders; Raiders coordinate attacks using rocky terrain and dust clouds from Banthas for concealment. Moisture farmers venture into this landscape daily, knowing that a family member's absence may mean abduction or death—and rescue attempts often trigger carefully prepared ambushes.

  - title: "Clone Trooper"
    keywords: "clone trooper, republic army, kamino, phase i armor, dc-15 blaster, soldier, trained"
    category: "person"
    priority: 9
    planet: "kamino"
    surface_affinity: "encounter"
    zone_scope: "kamino,geonosis"
    content: |
      Clone troopers are the Republic's primary military force, bred and trained from birth in the stilt-cities of Kamino. Regarded as among the finest soldiers in the galaxy, they possess unwavering loyalty to the Republic and unrivaled discipline. Each clone is identified by a unique DNA-embedded number, tracked via helmet scanner and transmitted to commanders during battle. Their Phase I armor—a form-fitting plastoid-alloy composite sealed to a temperature-control body glove—bears Mandalorian influence in its t-shaped visor and stark Kaminoan aesthetic. Color-coded rank flashes adorn the armor: green for sergeants, blue for lieutenants, red for captains, yellow for commanders. Advanced academies on Kamino train specialized clone pilots and officers.

  - title: "Clone Trooper Armor, Phase I"
    keywords: "phase i armor, plastoid-alloy, body glove, comlink, mftas, helmet, clone trooper"
    category: "technology"
    priority: 8
    planet: "kamino"
    surface_affinity: "ambient"
    zone_scope: "kamino,geonosis"
    content: |
      Phase I clone armor consists of 20 formfitting plastoid-alloy composite plates sealed magnatomically to a climate-controlled body glove. The distinctive t-shaped visor reflects Mandalorian design heritage, while stark coloration and detailing echo Kaminoan aesthetics. Each helmet houses a tongue-activated comlink, multi-frequency targeting acquisition system with polarized lenses for low-visibility combat, and an embedded LED viewscreen displaying the wearer's identification data. A comprehensive utility belt carries high-tension wire, grappling hooks, power packs, ion flares, rations, and medical supplies. Early iterations proved uncomfortable for prolonged sitting—a flaw corrected in later generations.

  - title: "SPHA-T Walker"
    keywords: "spha-t, self-propelled heavy artillery, walker, geonosis, rothana heavy engineering, long-range artillery"
    category: "technology"
    priority: 7
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      The Self-Propelled Heavy Artillery walker is a modular long-range support platform used by Republic forces, developed by Rothana Heavy Engineering—a covert Kuat Drive Yards subsidiary. Its design prioritizes a dorsally-mounted capital-class weapon, powerful reactor core, and crew stations, with engineers sacrificing complex turreting systems and heavy armor to save weight. The walker repositions its entire frame to adjust firing coordinates, relying on articulated legs to resist anti-repulsorlift weaponry. However, low mobility and thin armor make it vulnerable; the intense reactor powering the main weapon can meltdown catastrophically under sustained enemy fire. SPHA units operate primarily in safe firebases far behind friendly lines, under heavy guard.

  - title: "Battle of Geonosis—Separatist Defeat"
    keywords: "geonosis, battle, republic victory, separatist retreat, droid army, techno union, trade federation core ships"
    category: "concept"
    priority: 8
    planet: "geonosis"
    surface_affinity: "news"
    zone_scope: "geonosis"
    content: |
      Republic forces achieved a decisive victory when the Separatist droid army retreated and much of the Separatist starfleet remained grounded receiving droid shipments. Lightly armored Techno Union vessels attempted immediate withdrawal but were decimated in the first wave of Republic gunship attacks. Heavy Republic artillery targeted Trade Federation Core Ships—each harboring hundreds of thousands of battle droids—with substantial success. Despite controlling the planetary surface, Republic commanders failed to capture Separatist leadership, allowing the conflict to escalate into a prolonged war.

  - title: "Rothana Heavy Engineering"
    keywords: "rothana heavy engineering, kuat drive yards, subsidiary, spha-t, weapons development"
    category: "organization"
    priority: 6
    planet: "kuat"
    surface_affinity: "ambient"
    content: |
      Rothana Heavy Engineering operates as a covert subsidiary of Kuat Drive Yards, tasked with developing advanced military platforms for the Republic. The organization engineered the SPHA-T walker, demonstrating sophisticated understanding of weapons systems, reactor technology, and Walker chassis design. Their modular approach to artillery platforms reflects pragmatic engineering priorities: maximum firepower paired with acceptable (if imperfect) mobility, at the cost of defensive plating.

  - title: "Orray"
    keywords: "orray, pack animal, geonosis, mount, quadruped, leathery, haul"
    category: "concept"
    priority: 6
    planet: "geonosis"
    surface_affinity: "ambient"
    zone_scope: "geonosis"
    content: |
      Orrays are hardy leathery-skinned quadrupeds native to Geonosis, prized as pack animals and arena mounts by the Geonosians. These sturdy beasts possess great strength and a quick gait suitable for hauling heavy loads across rocky terrain. Before domestication, wild orrays were destructive predators, using their long snouts to root into sensitive egg chambers of young hive colonies and devouring thousands of larvae in a single feeding. Domesticated orrays have their dangerous tail stingers amputated to ensure docility, making them safer for handlers to manage.

  - title: "Acklay"
    keywords: "acklay, predator, vendaxa, arena beast, claws, ebon sea, geonosis"
    category: "concept"
    priority: 7
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis,ebon_sea"
    content: |
      The acklay is a nightmarish predator originally from the lush world of Vendaxa, where dense ecosystems bred creatures of terrible proportion. Offworld interests brought acklays to Geonosis decades ago as exotic arena beasts for the Archduke, and escaped specimens have since infested the shallow brine of the Ebon Sea, becoming the region's dominant predator. These six-meter creatures are built for survival in harsh environs: a long frill protects the sensitive neck during combat, while hypertrophied claws—hardened fingertips incapable of feeling pain—allow the acklay to slash from a distance. Their aggressive display and relentless hunting methods have carved them a brutal niche in Geonosian ecology.

  - title: "Nexu"
    keywords: "nexu, feline, predator, cholganna, infrared vision, security beast, arena"
    category: "concept"
    priority: 6
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      Nexu are feline predators native to the forests of Indona on Cholganna, bred and exported across the galaxy for use as security beasts and arena combatants. These sleek two-meter hunters possess infrared vision to aid nocturnal hunting, paired with razor-sharp claws capable of bisecting a humanoid and a spike-lined back for defense. Though they tire quickly, nexu rely on explosive speed and exceptional reflexes to end encounters in moments, making them favored by spice lords and arena masters alike. Their keen hearing and instinctive hunting prowess make them valuable—and dangerous—predatory assets.

  - title: "Reek"
    keywords: "reek, quadruped, horned, ylesia, herbivore, tatooine, arena beast"
    category: "concept"
    priority: 5
    planet: "geonosis"
    surface_affinity: "ambient"
    zone_scope: "geonosis,tatooine"
    content: |
      Reeks are large thick-skinned horned quadrupeds native to Ylesia, also found in ranches on the Codian Moon and Tatooine. By nature herbivorous and docile, reeks possess minimal intelligence and require constant shock-prod stimulation to become aggressive. The Geonosians have weaponized their starvation in execution arenas, transforming the normally passive creatures into raging carnivores driven by hunger and pain into lethal combatants. Their massive six-meter frames and reinforced hide make them formidable opponents despite their lack of natural cunning.

  - title: "Geonosis: The Ringed Desert World"
    keywords: "geonosis, desert, ringed planet, radiation storms, hive-mounds, separatist base"
    category: "location"
    priority: 9
    planet: "geonosis"
    surface_affinity: "ambient"
    zone_scope: "geonosis"
    content: |
      Geonosis orbits beyond the Republic's borders as a harsh, ringed terrestrial world dominated by red-tinted mesas, buttes, and barren hardpan. Radiation storms periodically sweep the surface, forcing lifeforms underground; dense high-altitude fog can shroud the world in twilight conditions for weeks at a stretch. Many native creatures evolved bioluminescence to survive these extremes. The planet's rings—rich in metallic content—serve dual purposes: Geonosian harvesters extract raw materials for manufacturing, yet the asteroids also create security risks, allowing cunning pilots to slip through sensor coverage. The Geonosians have carved immense organic spires into the landscape, hive-mounds that blend seamlessly with the natural terrain; only escaping steam and exhaust vents betray their artificial nature. The planet's remote location and advanced droid foundries made it an ideal stronghold for the Separatist movement during the Clone Wars.

  - title: "Geonosians: Insectoid Masters of Hive Society"
    keywords: "geonosians, insectoid, hive, caste system, aristocrats, workers, winged warriors"
    category: "faction"
    priority: 9
    planet: "geonosis"
    surface_affinity: "dialogue"
    zone_scope: "geonosis"
    content: |
      The Geonosians are sentient insectoids whose civilization is rigidly organized by caste. Aristocrats—marked by functional wings—command resources and authority, living within towering spire-hives and ruling through hive councils. Workers form the vast labor force, wingless and considered expendable by their betters, toiling in harsh conditions to maintain the planet's vast manufacturing apparatus. A warrior caste, grown to combat-readiness by age six, serves as both defenders and elite fighters; the most superior specimens receive advanced beam weaponry while regulars carry weaker force pikes. Geonosians are naturally strong despite slender builds; their thick chitinous exoskeletons provide inherent protection against physical assault and the radiation that periodically scorches their world. They cultivate parasitic creatures called phidnas whose secretions, when mixed with stone powders, form the rock paste used to construct their architecture. A worker may escape their caste through gladiatorial combat, though victory is far from assured.

  - title: "Upper-Caste Geonosian Authority and Ruthlessness"
    keywords: "archduke, lieutenant, geonosian aristocrat, command, harsh rule, execution"
    category: "person"
    priority: 8
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      Geonosian aristocrats of the upper caste rule through force and absolute authority, demonstrated most starkly by their treatment of wingless workers. These elite insectoids are unusually intelligent and creative compared to their lower-caste kin, and those in positions of power—such as an archduke's chief lieutenant—prove themselves through ruthless execution of orders and willingness to adapt to shifting political circumstances. They command the court systems, oversee the droid foundries, and attend to off-world clients seeking weapons and droids. An aristocrat's intelligence, combined with their natural armor and ability to fly, makes them formidable administrators and, when required, executioners. They move comfortably among Separatist power brokers, Trade Federation officials, and Banking Clan representatives, mediating agreements and enforcing their world's interests.

  - title: "Geonosian Warrior Caste: Born for Combat"
    keywords: "warrior caste, elite warriors, sonic weapons, beam weapons, force pike, aerial combat"
    category: "faction"
    priority: 8
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      The Geonosian warrior caste forms the apex of military capability on Geonosis, divided into elite specimens and regular soldiers. Elite warriors possess superior genetic endowment, granting them heightened martial prowess and access to sophisticated beam weapons capable of penetrating personal shielding and armor. Regular warriors carry weaker sonic and force-pike armaments. All warriors sport functional wings, allowing them to maneuver three-dimensionally in combat. They reach combat readiness by age six and form Geonosis's primary military force during the Clone Wars. Though possessing sufficient cunning to defend against natural predators, they proved vulnerable to more strategically sophisticated foes. Their sonically-tuned weapons and integrated piloting systems reflect a philosophy of unified warrior design—pilot, weapon, and craft intricately linked into a single dangerous instrument.

  - title: "Nantex-Class Territorial Defense Starfighter"
    keywords: "nantex-class, geonosian starfighter, territorial defense, laser cannon, tractor beam, interceptor"
    category: "technology"
    priority: 7
    planet: "geonosis"
    surface_affinity: "encounter"
    zone_scope: "geonosis"
    content: |
      The Nantex-class fighter is a lean, needle-nosed interceptor designed exclusively for Geonosian pilots, its multi-axis control yokes calibrated to their natural dexterity. A single pilot sits in a cramped cockpit beneath a transparent bubble canopy offering 360-degree vision, receiving vital performance feedback through a scent-stimulator mask that exploits the Geonosian sense of smell—a unique integration impossible for other species. The craft's main armament is a turret-mounted laser cannon cradled beneath forward needle-like protrusions. Additionally, dozens of small, independently-aiming tractor beam and repulsorlift generators line the fuselage, augmenting atmospheric maneuverability and allowing the fighter to constrain enemy craft mobility. The vessel's exceptional speed and superior agility make it formidable in territorial patrol and interception roles.

  - title: "Phidna Parasites and Geonosian Construction"
    keywords: "phidna, parasite, geonosian architecture, rock paste, stone powder, construction material"
    category: "concept"
    priority: 6
    planet: "geonosis"
    surface_affinity: "ambient"
    zone_scope: "geonosis"
    content: |
      Geonosians cultivate parasitic creatures called phidnas that excrete specialized secretions. Geonosian artisans harvest this excretion and blend it with powdered stone to create a composite rock paste—the primary building material used to construct the vast hive-mounds and spires that dot Geonosis's landscape. This symbiotic relationship between cultivated parasite and artisan allows the construction of immense, organically-styled structures that seamlessly integrate with the planet's natural terrain, rendering settlements nearly invisible to casual observation.

  - title: "SPHA-T Heavy Artillery Walker"
    keywords: "spha-t, self-propelled heavy artillery, turbolaser, walker, rothana engineering, artillery support"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The SPHA-T is a massive 34-meter artillery platform fielded by the Republic during the Clone Wars. This ponderous walker houses a devastating heavy turbolaser cannon capable of engaging targets kilometers away, supported by a battery of twelve blaster cannons for close defense. Crewed by fifteen specialists and capable of carrying twenty troops, the SPHA-T is a linchpin of Republic siege operations—its sheer firepower and slow, inexorable advance can break enemy fortifications that lighter walkers cannot touch. The vehicle moves at a grinding 35 kmh but provides unmatched fire support for advancing clone battalions.

  - title: "AT-TE All-Terrain Tactical Enforcer"
    keywords: "at-te, all-terrain tactical enforcer, assault walker, clone trooper transport, battlefield support"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The AT-TE is the workhorse of Republic ground forces—a six-legged walker standing 12.4 meters tall, equally at home ferrying clone squads across hostile terrain or laying down covering fire for advancing battalions. Seven crew members operate the beast: pilot, spotter, four gunners, and a rail-gun operator fully exposed atop the hull. Its electromagnetic shielding renders it immune to ion weapons, and it can maintain full speed for over 500 kilometers on internal fuel, with three weeks of air and rations for extended operations. Twenty clone troopers ride in its armored rear compartment, protected by a heavy projectile cannon and six light blaster turrets that shred infantry and light vehicles alike.

  - title: "LAAT/i Attack Gunship"
    keywords: "laat/i, attack gunship, larty, assault transport, gunship, clone trooper insertion"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The LAAT/i—affectionately called "larty" by clone troopers—is the spear-tip of Republic aerial assault. This 17.4-meter gunship bristles with firepower: mass driver missile launchers for heavy strikes, anti-personnel laser cannons for infantry suppression, and composite-beam pinpoint turrets for precision targeting. It carries thirty soldiers into the thick of battle while its three gunners unleash overlapping fields of fire. First blooded at Geonosis where they shattered Separatist formations and plucked Jedi from execution arenas, the LAAT/i has become the symbol of Republic air superiority—fast enough to strafe and retreat, tough enough to absorb punishment, and lethal enough to turn the tide of ground engagements.

  - title: "Homing Spider Droid"
    keywords: "spider droid,walker,commerce guild,antipersonnel,ion cannon,homing laser"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A seven-meter tall mechanical walker deployed by the Commerce Guild as a mobile weapons platform. The droid features a distinctive round body with articulated legs, housing a potent homing laser cannon turret capable of sustained firepower against shields and armored formations. Its design prioritizes versatility—an antipersonnel blaster beneath the chassis handles close-quarters threats, while a retractable ion cannon can be mounted for anti-vehicle work. Integrated sensor suites allow the walker to track moving targets across open terrain, making it a formidable presence in massed droid formations.

  - title: "Hardcell-class Interstellar Transport"
    keywords: "hardcell,techno union,capital ship,transport,banking clan,hyperdrive"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A 220-meter armed transport vessel employed by the Techno Union and InterGalactic Banking Clan for commerce and fleet operations. The craft resembles a towering rocket with a conical command pod, capable of 4,000 kmh atmospheric takeoff via six primary thruster units and achieving 400 MGLT in deep space. Tripedal landing gear and retro-thrusters enable vertical landings on standard worlds, while variants feature specialized landing claws for low-gravity operations. The upper conical section houses crew quarters, command decks, and medical facilities; the vessel can transport 600 droid troops or serve as a mobile trading platform for business negotiations across star systems.

  - title: "Lucrehulk-class Core Ship"
    keywords: "core ship,lucrehulk,trade federation,droid carrier,battleship,neimoidian"
    category: "technology"
    priority: 9
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      A 700-meter diameter droid carrier born from the repurposed centrispheres of Trade Federation battleships, modified to circumvent post-Naboo military restrictions. The massive sphere bristles with quadlaser emplacements and employs powerful repulsorlift suspensor arrays on its ventral surface to achieve planetary landings despite its colossal mass. Once airborne, ventral ion-thrusters propel the core ship beyond gravity wells. Interior architecture mirrors Neimoidian hive structure—command bridges and executive treasuries occupy the upper pole, while lower decks house junior officers, droids, and engineering sections deliberately shunned by ranking officials. A single core ship can carry 40,000 battle droids and serves as the spine of Separatist naval operations.

  - title: "Acclamator-class Assault Transport"
    keywords: "acclamator, republic assault ship, transport, clone troopers, rothana heavy engineering, capital ship, wedge design"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Acclamator I-class assault transport, built by Rothana Heavy Engineering, serves as the Republic's primary troop carrier during the Clone Wars. At 752 meters long, each vessel can transport 16,000 clone troopers into active combat zones alongside heavy support equipment—AT-TE walkers, SPHA-T walkers, 80 LAAT gunships for insertion, and 320 speeder bikes for reconnaissance. The ship's dagger-shaped hull mounts formidable firepower: 12 turbolaser turrets, 24 point-defense laser cannons, and 4 assault missile tubes. During the Battle of Geonosis, Acclamators performed admirably, disgorging legions of clones while Republic capital ships engaged Separatist fleets overhead, establishing their reputation as the backbone of Republic amphibious operations.

  - title: "Super Battle Droid"
    keywords: "super battle droid, b2 series, separatist droid, baktoid, armored, blaster rifle"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Baktoid B2-series Super Battle Droid represents a significant upgrade over standard battle droid designs, featuring a much sturdier armored shell and superior structural integrity. Standing 1.8 meters tall, the droid's bulky upper chest houses its cognitive unit and signal receptor, balanced by sophisticated movement algorithms despite its high center of gravity. Armored monogrip hands with built-in signal emitters allow the droid to fire specialized blaster rifles despite lacking fingers, while interchangeable foot attachments—climbing claws or buoyant pods—enable operation across exotic terrain. Armed with a mounted blaster rifle, the Super Battle Droid operates within Separatist forces as a heavily-armored infantry unit, capable of independent combat or coordinated platoon operations.

  - title: "Dwarf Spider Droid"
    keywords: "dwarf spider droid, burrowing spider droid, commerce guild, four-legged walker, laser cannon, mine warfare"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Commerce Guild's Dwarf Spider Droid, also known as the burrowing spider droid, was first developed to clear opposition from narrow mine shafts but has since seen deployment in broader Separatist campaigns. Standing 1.6 meters tall, its four all-terrain legs and compact frame allow swift movement through treacherous subterranean passages and rocky terrain. A central laser cannon mounted on its face serves as its primary weapon, though the fixed mounting prevents tracking swift targets—a notable tactical weakness. The droid employs digging claws and magnetic feet for terrain navigation, infrared vision for dark environments, and features improved sensor packages. Before the Clone Wars, Commerce Guild droid walkers like these enforced tax collection against defaulting customers.

  - title: "Hailfire Droid Tank"
    keywords: "hailfire droid, banking clan, mobile missile platform, droid tank, hoop wheels, self-aware"
    category: "technology"
    priority: 9
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      The Hailfire-class droid tank is a self-aware mobile missile platform mounted on distinctive hoop-like wheels that enable operation across nearly any terrain. Standing 5.5 meters tall and 6 meters long, each Hailfire carries twin missile launchers fitted on either side of its head, each rack loaded with 30 guided rocket warheads capable of terrible destruction—a single well-placed shot can disable or destroy a Republic AT-TE walker. Supplementing the missile armament is a retractable double blaster for engaging infantry and soft targets. Before the Clone Wars, the InterGalactic Banking Clan deployed Hailfire droids to punish customers unable to pay debts. During the Battle of Geonosis, Hailfire droids inflicted heavy casualties on clone trooper formations before Republic gunships destroyed them.

  - title: "Separatist Droid Deployment at Geonosis"
    keywords: "separatist forces, droid army, battle of geonosis, confederation, droid deployment, separatist military"
    category: "faction"
    priority: 9
    planet: "geonosis"
    surface_affinity: "news"
    content: |
      The Confederacy of Independent Systems fielded a massive droid army at the Battle of Geonosis, marking the first large-scale engagement of the Clone Wars. The deployment included over one million standard Battle Droids and an equal number of Super Battle Droids, supported by specialized combat platforms: 15,000 Dwarf Spider Droids, 7,500 Homing Spider Droids, 4,100 Hailfire tanks, 3,000 Droidekas, and four Sonic Cannons deployed within the arena. The droid contingent was reinforced by capital ships—286 Techno Union vessels, 41 Commerce Guild ships, and 60 Trade Federation core ships formed the orbital Separatist fleet, though many escaped when Republic forces gained control of the engagement. This unprecedented mechanical army demonstrated the Separatists' ability to field overwhelming numbers of disposable combatants.

  - title: "The Clone Wars"
    keywords: "clone wars, galactic republic, separatist alliance, conflict, territorial battles, planetary allegiances"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      Years of devastating conflict rage across the galaxy as the Galactic Republic and Separatist Alliance clash in territorial battles and struggle for planetary control. The war has exposed deep doubts within the Jedi Order, with veteran clone troopers beginning to question their own purpose and role in the conflict. Entire worlds shift allegiances as military fortunes ebb and flow, leaving governments fractured and populations displaced.

  - title: "Bounty Hunters and Criminal Networks"
    keywords: "bounty hunters, criminals, criminal underworld, mercenaries, opportunities"
    category: "organization"
    priority: 7
    planet: "all"
    surface_affinity: "bounty"
    content: |
      The chaos of the Clone Wars has created a golden age for those operating outside the law. Bounty hunters and criminals exploit the disorder to pursue their trades unimpeded, taking contracts from war-weary factions, desperate individuals, and criminal syndicates. Safe havens shift frequently as control of space lanes and black markets changes hands, making the underworld a volatile but lucrative arena.

  - title: "The Nightsisters of Dathomir"
    keywords: "nightsisters, dathomir, esoteric rituals, dark side, force users, witches"
    category: "organization"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The enigmatic Nightsisters of Dathomir conduct arcane rituals drawing on ancient Force traditions, furthering their mysterious plots amid the galactic conflict. Operating from their remote world, these warrior-mystics remain largely independent of the main war effort, though their actions occasionally intersect with the larger struggle. Their esoteric knowledge and supernatural abilities make them dangerous and unpredictable actors in the larger game.

  - title: "Death Watch of Mandalore"
    keywords: "death watch, mandalore, mandalorians, terrorists, tradition, violence"
    category: "organization"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The militant Death Watch movement escalates terrorist activities across Mandalore and beyond, claiming to fight for traditional Mandalorian values and independence. Operating as an insurgent force, they conduct raids and sabotage missions while building a following among those who resent foreign interference. Their ruthless tactics and ideological fervor make them a serious threat to stability in the Outer Rim.

  - title: "The Jedi Order in Crisis"
    keywords: "jedi order, doubt, crisis, veteran troopers, republic, faith"
    category: "organization"
    priority: 8
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      The prolonged conflict has exposed fractures within the Jedi Order itself. Veteran clone troopers, who have fought alongside Jedi commanders for years, increasingly question the righteousness of the war and the guidance of their Jedi leaders. Whispers of doubt spread through military ranks as the line between justice and pragmatism blurs, creating an undercurrent of unease that threatens the very foundation of the Order's authority.

  - title: "War-Torn Worlds"
    keywords: "planetary conquest, territorial control, war zones, displaced populations, devastation"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Worlds across the galaxy have become battlegrounds as the Republic and Separatists vie for control. Planetary surfaces bear scars of orbital bombardment and ground campaigns—ruined cities, scorched farmlands, and fortified installations. Civilian populations flee contested worlds while military forces fortify key positions, transforming once-peaceful communities into strategic assets and staging grounds.

  - title: "Force Users in the Shadows"
    keywords: "dark side, force users, ascendant, shadow, unknown threats"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Beyond the visible struggle between Republic and Separatists, shadowy Force users pursue their own agendas, drawing power from the dark side. These mysterious actors manipulate events from the periphery, using the chaos of war to further arcane goals. Their presence is felt indirectly through unexpected reversals and unexplained events that suggest a deeper game being played beneath the surface.

  - title: "Soldier's Creed: Meaningful Death"
    keywords: "clone trooper, sacrifice, glory, death wish, motivation"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Republic soldiers in the Clone Wars are driven by a need to make their deaths meaningful. Many seek dangerous assignments where they might go out in a blaze of glory, viewing their sacrifice as essential to the Republic's survival. This mentality reflects the existential weight of the conflict—soldiers believe that if they must die, that death should matter.

  - title: "Soldier's Creed: Purity and Self-Policing"
    keywords: "republic loyalty, self-appointed arbiter, purity, internal threat, zealot"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Clone Wars breeds an unbending sense of purity in some soldiers, who become self-appointed arbiters of right and wrong. These troops will never question their superiors' orders, yet harbor doubts about their peers' commitment. They fear traitors and spies within Republic ranks, sometimes viewing their brothers as insufficiently devoted to the cause. This internal pressure cooker creates tension even among loyal forces.

  - title: "ARC Troopers: The Elite Commandos"
    keywords: "arc trooper, advanced recon commando, elite, independent, special operations"
    category: "person"
    priority: 9
    planet: "kamino"
    surface_affinity: "encounter"
    content: |
      Advanced Recon Commando troopers represent the pinnacle of clone soldier capability. Operating in small, flexible squads, ARC Troopers handle unconventional objectives and unknown situations with minimal command oversight. They are trained in quick strikes, careful infiltration, and overwhelming force, often inserted via jetpack for daring aerial assaults. These elite soldiers showcase the clones' potential for human-like creativity and independent thought—a deliberate contradiction to their original programming.

  - title: "ARC Trooper Selection and Training"
    keywords: "arc trooper, promotion, training pipeline, badge of honor, creative thinking"
    category: "organization"
    priority: 8
    planet: "kamino"
    surface_affinity: "news"
    content: |
      Selection for the ARC Trooper program is fiercely competitive; clones with ambition view promotion as the ultimate achievement. Candidates receive specialized training that explicitly requires them to think creatively and independently—a radical departure from their base programming. Many candidates fail this mental hurdle. Those selected receive additional rations, better equipment, and theoretically more recreation time, though the reality is constant reassignment and heavy demand means little downtime despite promises.

  - title: "ARC Trooper Operations and Command Structure"
    keywords: "arc trooper, independent operation, unconventional orders, mission-based rank"
    category: "organization"
    priority: 7
    planet: "kamino"
    surface_affinity: "encounter"
    content: |
      ARC Troopers operate with considerable autonomy, often detached from the main troop contingent. Their position in the command hierarchy shifts based on mission requirements, and they may hold ranks from specialist to commander. Rank-and-file troops sometimes struggle to interpret their unconventional orders, and ARC Troopers chafe against safe, conservative tactical decisions. This independence means they constantly balance mission success, clone survival, and civilian protection—decisions scrutinized in intense debriefing sessions by GAR leadership and Kamino engineers.

  - title: "Clone Commanders: Thinking Soldiers"
    keywords: "clone commander, leadership, independent thinker, loyalty, jedi advisor"
    category: "person"
    priority: 9
    planet: "kamino"
    surface_affinity: "encounter"
    content: |
      Clone Commanders are biogenetically engineered or promoted from the ranks to lead regiments of four battalions across multiple companies. Unlike standard officers, they possess the rare combination of independent judgment and unwavering loyalty—a deliberate Kaminoan achievement. Commanders advise Jedi generals on tactical and strategic matters, questioning when appropriate but executing orders when commanded. They must balance the Jedi's goals with casualty minimization and manage complex logistics to sustain offensives.

  - title: "Clone Commander: The Burden of Command"
    keywords: "clone commander, paperwork, logistics, burden, recreation, stress"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone Commanders experience little true recreation. Administrative work consumes their free time—supply manifests, casualty reports, and strategic assessments never cease. A common saying among command staff is 'If the droids don't get me, the paperwork will.' The weight of commanding thousands of lives under constant combat stress, combined with endless bureaucratic demands, creates an often-invisible toll on Republic command structure.

  - title: "Harch Industrial Expansion and Ocean Engineering"
    keywords: "harch, secundus ando, artificial islands, ocean cooling, war industry"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Harches have rapidly expanded their industrial capabilities into the oceans of Secundus Ando through the construction of artificial islands, driven by the demands of the Clone Wars. The ruling nests control significant protected territory where these installations operate, using the surrounding water both as a cooling source for their manufacturing and as a waste-disposal system. This transformation represents a dramatic shift in Harch society, as traditional ocean spaces become dominated by industrial infrastructure.

  - title: "Linguistic Shift in Harch Culture"
    keywords: "harch, harchic language, aqualish, basic, generational divide, cultural pride"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      For centuries, Harches spoke Aqualish and Basic due to proximity with the Aqualish species, but the past twenty years have witnessed a dramatic linguistic transformation. Harchic, once a secondary tongue, has become the official language of Secundus Ando, displacing Galactic Basic to third place. Younger generations now speak only Harchic, a phenomenon that older Harches view as a reclamation of cultural identity. This linguistic shift creates tension, particularly for Harch business interests attempting to navigate their new Separatist alliance, where Basic remains essential for galactic commerce.

  - title: "Karkarodon Physiology and Motion Dependency"
    keywords: "karkarodon, physiology, webbed, muscle, undersized heart, movement, swimming"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Karkarodons are tall, lanky beings with webbed feet and hands, flattened faces, and powerful jaws capable of tremendous bite force. Their bodies consist almost entirely of muscle supported by a flexible cartilage frame and partial bone skeleton. Their most distinctive physiological trait is an undersized heart compared to other species; to maintain proper blood circulation, Karkarodons require constant muscular motion. This makes them exceptional swimmers and formidable in aquatic environments, but on land they become sluggish if prevented from continuous movement. Their skin tones range from gray and brown to blue and white, often marked with stripes, spots, or dark-and-light patterns.

  - title: "Karkarodon Political Fragmentation and Neutral Stance"
    keywords: "karkarodon, karkaris, weak government, senate, neutrality, separatist, factions"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      Karkaris maintains a deliberately weak global government, reflecting the Karkarodon preference for local autonomy over centralized authority. Though the species maintains a representative in the Galactic Senate, all political observers recognize the open secret that this representative wields no genuine power—Karkarodons simply have no interest in galactic governance through official channels. Officially neutral in the Clone Wars, Karkaris has nevertheless unofficially aligned with the Confederacy of Independent Systems, creating a paradox: the Separatist Parliament sees aggressive, enthusiastic representation from Karkarodon senators, but these voices represent only a minority faction. The broader Karkarodon population remains deeply divided, with some drawn to building a unified identity and colonial empire, others preferring isolation, and still others seeking to unite only under their own banner.

  - title: "Karkarodon Social Structure and Small-Group Identity"
    keywords: "karkarodon, society, small groups, local autonomy, tradition"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Karkarodon society has historically organized itself around smaller social groups rather than cohesive planetary structures. This preference for local identity and autonomy reflects deeper cultural values, making unified decision-making difficult and political consensus rare. The Karkarodons' traditional focus on intimate communities stands in tension with larger political movements attempting to rally them to galactic causes.

  - title: "Harch Physiology and Biology"
    keywords: "harch, arachnid, six arms, chelicerae, exoskeleton, venom, spinnerets, long-lived"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Harches are arachnid-descended beings with six fully functional arms and two legs, their bodies covered in hair ranging from brown to pale gray. They possess two large primary eyes and four smaller secondary eyes above, the latter excellent at sensing movement and light changes rather than color and detail. Their most distinctive features are two large protruding jaws called chelicerae. Though shorter and stockier than humans, their tough exoskeletons give them comparable weight. Some Harches inherit ancestral spinnerets or venom from their genetic diversity. They prefer liquefied protein diets but consume solid meat and vegetation. Rumors suggest Harch lifespans stretch across centuries, making them exceptionally long-lived compared to most galactic species.

  - title: "Traditional Harch Society and Individualism"
    keywords: "harch, individualism, decentralized, cultural groups, offworld harches, nomadic"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Traditional Harch society operated without organized warfare, their fierce individualism preventing the formation of large standing armies despite their capacity for violence. Individual Harches would wander the galaxy seeking fortune with little loyalty to their homeworld or other Harches, often returning to kin only temporarily. Numerous Harch cultural groups and subspecies maintained vastly different norms, with offworld communities freely adopting local customs. This atomized approach to identity and governance meant no monolithic Harch culture existed—each individual or small band operated according to their own code and ambitions.

  - title: "The Andoan Wars and Harch Militarization"
    keywords: "andoan wars, separatists, militarization, ruling nests, republic betrayal, resentment"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      More than two decades before the current Clone Wars, the Andoan Wars marked a turning point in Harch history. The ruling nests backed the Spiverelda government against the Andoan Free Colonies, turning Harch industry toward warfare. When the Republic intervened to protect the Andoans, dashing what Harches called the 'Great Harch Prosperity,' the species' resentment calcified into permanent antagonism. Rather than return to peacetime production, Harches continued manufacturing weapons, selling them to corporate interests and ignoring Republic restrictions. This grievance ultimately drove them to join the Separatist Confederacy, viewing the Republic's support for the Andoans as a profound betrayal of profit and destiny.

  - title: "Harch Ruling Nests and Militant Ascendency"
    keywords: "ruling nests, aristocracy, diplomacy, patriotism, harch empire, separatist alliance"
    category: "organization"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The ruling nests trace their lineage across generations and operate as the cultural and political architects of modern Harch society, though they claim no formal aristocratic title. These families cultivated mastery in diplomacy, negotiation, and leadership, becoming the prime motivators behind Harch expansion and militarization. They negotiated Harch entry into the Separatist Confederacy and have systematically pushed their species toward militant patriotism, their ultimate goal being a unified Harch empire with themselves established as true dynastic aristocrats. The nests maintain a sophisticated information network across the galaxy, with offworld Harches selling intelligence and contacts that feed back to strengthen homeworld interests.

  - title: "Secundus Ando: Harch Homeworld"
    keywords: "secundus ando, mid rim, caverns, megacities, war factories, arboreal parks, cloudcutters"
    category: "location"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Secundus Ando, located in the Mid Rim, is a temperate planet carved by caverns and hosting diverse ecosystems. Massive, craggy trees rooted in loamy earth fill ecologically protected parks where the ruling nests maintain their palatial centers, surrounded by intricate information networks as complex as the webs of their ancestors—real estate so costly that average Harches could never afford it. The majority of the population dwells in sprawling megacities, vast industrial sprawls that mock the preserved natural beauty through their mechanical brutality. Giant spires and cloudcutters funnel waste gases from ground-level war factories into the upper atmosphere, a landscape of production and pollution that fuels the Harch military ambitions.

  - title: "Offworld Harch Network and Separatist Sentiment"
    keywords: "offworld harches, galaxy-spanning, information network, pro-homeworld, separatist loyalty, conditional alliance"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "news"
    content: |
      Solitary and individualistic Harches scattered across the galaxy have been integrated into a powerful information network serving the ruling nests, selling contacts and intelligence in exchange for resources that improve homeworld interests or support other offworld operatives. Though these distant Harches maintain a broader galaxy-wide political perspective, they have been increasingly infected with pro-homeworld sentiment and distrust of non-Harches. While allied with the Separatist Confederacy, most Harches view the partnership as one of equal standing meant to support Harch ascendency. Should the Separatist government ever appear to disadvantage them, the ruling nests fully intend to act aggressively—viewing such action as their natural right.

  - title: "Karkarodon Society and Politics"
    keywords: "karkarodon, separatist, allegiance, individualism, competition, offworld relations"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Karkarodons are driven by personal success, security, and wealth rather than galactic politics. Among their own kind, they engage in aggressive competition, though offworlders encounter them as individualistic and relationship-focused. A minority faction has aligned with the Separatists, drawn by promises of riches and dominion over ocean worlds like Mon Cala. This political division creates internal conflict: some Karkarodons remain apathetic to the alliance's risks, lulled by prosperity, while others fear losing autonomy to Confederacy control. Unity itself remains contentious among their people.

  - title: "Karkaris: Ocean World and Industrial Transformation"
    keywords: "karkaris, ocean planet, temperate, geothermal, volcanic, industrial sludge, reef die-off, confederacy presence"
    category: "location"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Karkaris is a temperate ocean world in the Outer Rim's Nilgaard sector, dominated by warm equatorial currents and polar ice caps teeming with life. Karkarodons traditionally dwelled deep in undercurrents to escape massive storms, building decentralized cities near geothermal vents in tectonic plates. The Separatist alliance has transformed the landscape: towering starports now pierce the water on scattered landmasses, freighters from the Confederacy deliver weapons and military equipment, and new factories churn out cybernetic war beasts. Industrial waste has created thick sludge and reef die-off in mining areas, poisoning waters that once sustained the species. While many Karkarodons relocate or seek factory work, growing unease about Karkaris becoming blighted and uninhabitable spreads through their population.

  - title: "Karkarodon Languages and Political Control"
    keywords: "karkarodon language, basic, communication barrier, political leverage, linguistic diversity"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Multiple mutually unintelligible Karkarodon languages forced the species to adopt Galactic Basic as a common tongue, though many Karkarodons remain indifferent to learning it. This linguistic fragmentation has inadvertently granted Separatist-aligned Karkarodons political advantage: those who do not speak Basic tend to ignore galactic politics entirely, allowing the pro-Confederacy faction to dominate the conversation uncontested. Language barriers thus become a tool of control and a barrier to unified resistance.

  - title: "Cybernetic Enhancement of Oceanic Life"
    keywords: "hydroid medusa, cybernetic implants, war beasts, bio-cybernetic warfare, electric fields, artificial gills, cybernetic jaws"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Karkarodon war doctrine merges oceanic fauna with advanced cybernetics to create devastating weapons. Hydroid Medusas—massive jellyfish enhanced with implants that harness and amplify their electric fields—withstand blaster fire and serve as formidable combat units. Similar modifications equip other creatures with enhanced natural abilities, though the experimentation exacts a grim toll: many creatures die in testing. Karkarodons also augment themselves with secondary artificial hearts, gill implants that hyperoxygenate blood for land performance, and reinforced cybernetic jaws both for combat effectiveness and cosmetic status. These technologies promise strength, speed, and wealth, making them highly sought after by soldiers and criminals alike.

  - title: "Clone Soldier Diversity and Experimentation"
    keywords: "clone, genetic variation, kaminoan, grand army republic, training, template, live experiment"
    category: "concept"
    priority: 8
    planet: "kamino"
    surface_affinity: "ambient"
    content: |
      The Grand Army of the Republic began as identical soldiers trained along strict parameters—ground combat, air combat, and leadership roles. As the Clone Wars grind on, Kaminoan engineers have systematically introduced genetic and training deviations, treating the war itself as a vast live laboratory. Each successful batch of variations may become a new template for future production; each failure narrows the field. Despite these experimental differences, clones remain bound by dedication to winning the war, preserving the Republic, and protecting their brothers. Yet as experiences accumulate across the theater, individual clones increasingly assign their own priorities to these ideals, creating subtle but profound divergences in thought and action.

  - title: "Clone Soldier Pride and Martyrdom"
    keywords: "clone soldier, superiority, recklessness, martyrdom, sacrifice, dangerous mission, pride, egoism"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone soldiers are instilled with pride in their work and drive to excel: being first to the objective, destroying the most droids, rescuing brothers under fire. Some pursue this excellence to dangerous extremes, driven by recklessness or hidden egoism masked as duty. Others, after multiple sorties, begin to believe their death is their purpose, volunteering for the most perilous missions with no expectation of survival. Both paths reflect the war's toll on soldiers bred for combat—whether manifestations of genuine dedication or distorted psychology born from accelerated training and endless conflict remains ambiguous.

  - title: "Clone Military Speech and Jargon"
    keywords: "clones, basic, military jargon, clankers, droids, patois, speech, language"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone troopers speak Basic, the common language of the Galactic Republic. Those stationed long-term on specific worlds often adopt local linguistic patterns and dialects. Military culture saturates their speech with specialized terminology—calling battle droids "clankers," for instance—incomprehensible to civilians or Jedi unfamiliar with the rigors of galactic warfare. This verbal shorthand serves both practical and social functions, marking the divide between soldier and civilian.

  - title: "Clone Futures Beyond the War"
    keywords: "clones, post-war, loyalty, republic, future, corporate security, politics, desertion"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Few clones know what awaits them after the war concludes. Forward-thinking soldiers contemplate corporate security or advisory roles with planetary militaries, though their fierce loyalty to the Republic may create conflict with outside employment. Rare deserters seek civilian lives away from combat entirely. Republic politicians have vetted certain clone officers about maintaining a permanent military force, and a select few exceptional soldiers have been approached about political office—military heroes beloved by civilians, though clones typically disdain political maneuvering.

  - title: "Dathomirians and the Nightsisters"
    keywords: "dathomirians, nightsisters, dathomir, matrilineal, pale skin, tattoos, alchemy, magicks, force-sensitive"
    category: "person"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Near-human Dathomirians—exclusively female—possess pale white, blue, or gray skin marked with darker patterns accentuated by ritual tattoos. Their eyes range from white to amber; their hair spans black, white, or prismatic hues. Born from ancient exiles and shaped by Dathomir's dark side influence, they form a warrior culture obsessed with strength, self-determination, and discipline. The Nightsisters, as they call themselves, practice alchemy and Force-derived magicks unknown to the broader galaxy, organized into matrilineal clans each led by a Mother who preserves wisdom through written texts blending history, spirituality, and folklore.

  - title: "Dathomir: The Exile World"
    keywords: "dathomir, outer rim, quelii sector, exiles, prison planet, predators, dark side, isolation, ruins"
    category: "location"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Dathomir, a temperate world in the Outer Rim's Quelii sector, remains largely uncharted due to its isolation from major hyperspace routes. Rich with biomass and resources, it nonetheless bristles with lurking predators, strange flora, and rumors of supernatural malevolence—enough to deter most traders and further increase its isolation. The Republic allegedly used Dathomir as an unofficial penal colony, dropping exiles and criminals with minimal supplies and no records. Those Force-sensitive claim the planet shrouds itself in deep shadow; the Nightsisters assert it is a locus of spiritual power. Ancient ruins dot the landscape, suggesting an empire existed in primordial times, now repurposed as temples with stone facades honoring revered Nightsisters and Zabrak.

  - title: "Dathomirian Language and Paecian"
    keywords: "dathomirians, language, basic, paecian, loanwords, criminals' slang, ancient"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Dathomirians speak a dialect of Basic generally intelligible to Republic citizens, yet peppered with ancient loanwords and criminal slang accumulated from across the galaxy. The Nightsisters additionally claim fluency in Paecian, a language extracted from Dathomir's ancient ruins, and weave purported Paecian words into their speech—a linguistic marker of their mystical heritage and isolation.

  - title: "The Nightbrothers: Vassal Warriors of Dathomir"
    keywords: "nightbrothers, zabrak, dathomir, ritual trials, vassal, nightsisters, muscle, protection"
    category: "organization"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Nightbrothers—primarily Zabrak and human exiles—exist in a vassal-like relationship with the dominant Nightsisters. Seeking agency in a world dominated by Force-wielding women, Nightbrothers undergo brutal ritual trials; those who survive are selected to serve as muscle and to execute dangerous tasks. Any attempt to usurp Nightsister power results in swift, merciless retribution. In exchange for grudging service and occasional sacrifice, the Nightbrothers gain protection from Dathomir's monstrous fauna and the harsh environment itself.

  - title: "Nightsister Expansion and Growing Galactic Influence"
    keywords: "nightsisters, mother talzin, sith, jedi, galactic influence, empire, power, manipulation"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      As Nightsister power grows, tensions emerge within their isolationist philosophy. Mother Talzin's strategic manipulations risk drawing Dathomir into galactic conflicts between Sith and Jedi—threatening the sanctuary many Nightsisters prize. Some sisters chafe at the unwanted attention; others trust Talzin's vision and rally behind her leadership. A radical faction even whispers of forging a Sith-like empire to seize control of their own destiny, reflecting the warrior culture's ambition clashing with ancient isolationism.

  - title: "Dathomirians Abroad: Strength Tested in the Outer Rim"
    keywords: "dathomirians, outer rim, strength, determination, warrior culture, isolation, violence"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Dathomirians who venture beyond their homeworld find their philosophy of struggle and discipline well-suited to Outer Rim survival. Years of hardship on Dathomir—competing with predators, navigating treacherous terrain, and enduring brutal initiation—prepare them for the galaxy's violence. The Rim offers far more enemies, allies, and opportunities than their isolated world, making it a natural proving ground for those seeking to test their warrior's mettle beyond the shadow of Dathomir.

  - title: "Clone Soldiers: The Manufactured Army"
    keywords: "clone wars, grand army of the republic, kamino, accelerated growth, identity, loyalty, brotherhood"
    category: "faction"
    priority: 9
    planet: "kamino"
    surface_affinity: "dialogue"
    zone_scope: "kamino"
    content: |
      The clone soldiers of the Republic fight for an impersonal future, grown and designed specifically for war in the accelerated training programs of Kamino. Physically identical and based on a bounty hunter's genetics, they share black hair, dark-brown eyes, and light-brown skin. Most carry deep scars from insufficient field care, wearing them as badges of pride. The clones bond most closely with their immediate squad mates, treating their brothers-in-arms as family. Each unit develops its own rituals and identifications—veterans of Christophsis speak of "cracking that crystal," while soldiers who fought Geonosis call enemy targets "bugs." Though the vast majority remain loyal to the Republic, stress and sustained combat have amplified personality quirks into extreme forms, and older clones increasingly question their strict obedience and the Republic's ineffectual leadership.

  - title: "Kamino: The Ocean World of Clones"
    keywords: "kamino, clone facilities, accelerated training, storm towers, ocean world, genetic engineering"
    category: "location"
    priority: 10
    planet: "kamino"
    surface_affinity: "ambient"
    zone_scope: "kamino"
    content: |
      Kamino is the birthplace of the Grand Army of the Republic, a planet of endless storms where white-lit clone facilities rise in towering spires above waters most clones never see until they leave for combat. For their first decade, clones train and study under the soft hum of never-ending storms, learning combat, simulations, and discipline. The trainers and genetic engineers encourage the clones to view Kamino not as home but as a point of origin—a place to be left behind. Clones receive letter and number designations rather than names, treated as products of the machine rather than individuals. The isolation tanks and retraining pods await those who show anger or rebellion, while veiled threats of disposal reinforce obedience.

  - title: "Worlds in Transition: The Separatist Alternative"
    keywords: "confederacy of independent systems, separatist, outer rim, core worlds, political isolation, resentment"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      Across the galaxy, many worlds grow weary of the distant Republic's stagnant governance and corporate interests that overshadow smaller, politically isolated systems. For decades, the voices of Outer Rim worlds went unheard in the Senate while Core World blocs pursued their own agendas. The Confederacy of Independent Systems now offers these resentful worlds an alternative—a chance to turn simmering discontent into action. A fallen Jedi's public leadership lent weight to these sentiments, giving systems caught between Republic bureaucracy and their own survival an opportunity to reshape their destinies. The war threatens planetary identities and ways of life, yet for worlds with everything to lose and everything to gain, the choice between stagnation and change has become personal.

  - title: "The Harches: Drums of War"
    keywords: "harches, separatist, colonial aggression, ruling nests, scattered civilization, nationalism"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "news"
    content: |
      The Harches beat the drums of war for two decades before the Separatists offered them a place in the Confederacy and a reason to join the fight. Their people scattered across the galaxy, their loyalties divided by corporate interests rather than nationalism, and their ruling nests saw opportunity. Behind public rhetoric of unity and glory lies a calculated strategy: the ruling nests decided upon colonial aggression and flag-waving to reunite their fragmented civilization. The war provides them the means to consolidate power and revive a sense of shared identity among a people grown distant from one another.

  - title: "The Karkarodons: Reluctant Allies"
    keywords: "karkarodons, separatist, aquatic, sovereignty, factory, divided interests"
    category: "faction"
    priority: 6
    planet: "all"
    surface_affinity: "news"
    content: |
      Historically, the Karkarodons pursued their own interests with little concern for cultural identity or homeworld cohesion. The Separatists changed that with promises of a Karkarodon empire under the CIS banner, yet the majority of the species resent the sudden loss of sovereignty. A small group of Karkarodons reap the benefits of Separatist alliance while the homeworld transforms into an aquatic factory of war. The people watch their world industrialized and their autonomy dissolved, creating deep divisions between those enriched by the alliance and those whose lives have been upended by it.

  - title: "Dathomirians: Isolationist Pressures"
    keywords: "dathomirians, isolation, sith, jedi, unwilling, self-determination"
    category: "faction"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Dathomirians want nothing more than to be left alone, but the machinations of the Sith and the suspicions of the Jedi keep pushing their homeworld into the galactic spotlight. Unwilling to choose sides in the greater war, they must decide whether to allow the galaxy to control their destiny or push back and claim a place in the larger conflict for themselves. Their isolationist and misanthropic traditions clash with forces determined to exploit or involve them in the Clone Wars.

  - title: "The Cost of War: Personal Stakes in Galactic Conflict"
    keywords: "clone wars, homeworld, personal politics, fear, freedom, oppression"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      When war threatens a homeworld, galactic politics become deeply personal. The Clone Wars can threaten an individual's core values, forcing them to succumb to fear or rise up as heroes defending their way of life. For those whose worlds are caught up in systemic oppression—transformed into factories, their sovereignty stripped away, or their isolationist traditions violated—the conflict is never abstract. The stress and carnage reshape personalities and beliefs, turning ordinary soldiers and citizens into either broken subjects or determined freedom fighters.

  - title: "Clone Commander Authority and Responsibility"
    keywords: "clone commander, accountability, command structure, troop welfare, chain of command"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      A clone commander balances dual responsibilities: accountability for resource management through debriefings and tactical reviews, and protection of subordinates from administrative blame rolling down from above. Information flows upward from troopers through commanders to generals, filtered to prevent morale damage while ensuring critical intelligence reaches decision-makers. Commanders weigh casualty risks against mission success, knowing that while clones are bred for sacrifice, planning and preparation offer the best chance of bringing soldiers home alive.

  - title: "Clone Veteran Specialization"
    keywords: "clone veteran, field experience, combat expertise, tactical knowledge, accelerated learning"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone veterans transcend their initial programming through genuine combat experience—knowledge no training facility can replicate. Accelerated training and genetic design allow clones to absorb lessons from diverse battlefields: urban infiltration, environmental survival, enemy psychology, and security protocols. The military deliberately seeds veterans among fresh squads to boost survivability and morale, even if it means decorated soldiers hold lower ranks to preserve chain of command. Veterans display wide personality ranges: some become hardened, by-the-code instructors; others adopt local customs, talismans, or warrior practices as expressions of individuality earned through survival.

  - title: "Clone Trooper Individuality and Loyalty"
    keywords: "clone trooper identity, quirks, affectations, loyalty to republic, self-awareness"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Despite being genetically identical and subject to mental conditioning, clone veterans develop distinct personalities and habits that set them apart. Some adopt local herbs for their medpacs, wear feathers for each confirmed kill, or incorporate alien warrior practices into their conduct. Military command tolerates these idiosyncrasies because veterans remain dedicated to the Republic and their brothers—they have lived as soldiers long enough to understand no other life. Ironically, Senate-proposed medals and commendations are often viewed by veterans as hollow gestures serving politicians' public relations rather than honoring genuine sacrifice.

  - title: "Jedi Generals and the Republic's Ethical Standard"
    keywords: "jedi general, clone army, republic, ethics, sacrifice, civilian protection"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Jedi Generals occupy a unique position during the Clone Wars, serving as independent commanders of the Republic's clone forces while answerable to principles beyond the government itself. Their core responsibility is to protect civilian lives first, the Republic's welfare second, and their soldiers' lives third. This hierarchy creates tension: when calculated sacrifices of soldiers are necessary, Jedi must fight alongside their troops rather than directing from safety. The greatest danger lies in losing sight of the ultimate goal—peace—as the intoxication of victory clouds judgment.

  - title: "The Jedi Master's Path to Wisdom"
    keywords: "jedi master, force mastery, meditation, contemplation, wisdom, self-reflection"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      A Jedi Master is one who has achieved profound understanding of the Force and inner discipline, requiring no formal title for their mastery to be recognized. Masters pursue wisdom through silent contemplation, study of ancient texts, and both formal instruction and informal conversation. They serve as anchors for other Jedi, especially those troubled by doubt or anger born of war's horrors. During the Clone Wars, Masters locate areas of conflict through Force-sensitivity, sense disturbances caused by dark side agents, and guide their order away from treating the Force as merely a weapon.

  - title: "Jedi Master's Responsibility to the Whole and Individual"
    keywords: "jedi master, wisdom, bigger picture, individual, galaxy, hubris"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      While a Jedi Master possesses the wisdom to perceive patterns greater than the Clone Wars or the Republic itself, this perspective carries a dangerous shadow. The greatest hubris is dismissing any single individual as unimportant to the galactic whole. Masters must remind themselves and their order that the galaxy is composed of countless individual points of light in darkness, and the pursuit of larger peace means nothing if it comes at the cost of those individuals' dignity and lives.

  - title: "The Force's Central Promise in Wartime"
    keywords: "force, connection, understanding, peace, jedi code, galaxy"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Force's binding principle connects all life in the galaxy, a truth that becomes obscured during the chaos of war. Jedi Masters must remind warriors that the Force exists to connect and understand all life, not to dominate or destroy. The peaceful exploration of the galaxy and steady journey toward self-realization remain central to the Jedi Order's core principles, even—perhaps especially—when fighting armies. Jedi fight in spite of their quest for peace, not because of it.

  - title: "The Ideological Divide Among the Jedi"
    keywords: "jedi, clone wars, philosophy, order, republic, war, monasticism, force"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Clone Wars have fractured the Jedi Order's sense of purpose. Before the conflict, the Jedi served as independent troubleshooters and contemplative monks, studying the Force and their role in the galaxy. Now they command armies as generals and field commanders, enmeshed in constant warfare. Many Jedi grapple with what has been lost—the time for meditation and philosophical reflection. The tension is acute: some believe the Republic's corruption and legislative weakness make direct military action necessary to save lives, while others fear abandoning the monastic path means losing the Jedi's soul. A Jedi who destroys a Separatist tank division saves a village, but does it serve the greater good, or merely perpetuate the cycle of violence? This struggle defines the modern Jedi Order.

  - title: "Jedi Generals: Warriors and Administrators"
    keywords: "jedi general, clone wars, leadership, republic army, battlefield, administration"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      A Jedi General reconciles the Order's contemplative heritage with the brutal demands of commanding troops. These rare Jedi use their connection to the Force to perceive the larger strategic picture and master their fear and anger, making them formidable battlefield leaders. Unlike traditional military officers, Jedi Generals wade into combat alongside their soldiers rather than directing from holoprojectors, understanding the destruction, death, and terror that troops endure firsthand. They shoulder mundane but essential duties—staffing decisions, equipment resupply, promotions, training protocols, budget requests—while maintaining the acute senses and presence required on active fields of battle. The Clone Wars have forged this specialization from necessity.

  - title: "Clone Officer Corps: Tactics and Unit Cohesion"
    keywords: "clone commander, clone soldier, tactics, leadership, formation, droid killer"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone Commanders and veteran soldiers form the backbone of Republic military strategy during the war. Officers trained for leadership understand not just the mechanics of warfare but the psychology of cloned troops—many share genetic and psychological commonality with their units, creating bonds of 'brotherhood' that can be leveraged in combat. Commanders employ formation tactics to protect allies, use their knowledge of droid vulnerabilities to eliminate battle droids with lethal efficiency, and maintain unit cohesion even when communications break down. Veteran clone soldiers are hardened by constant engagement, capable of reading enemy intentions, reacting with practiced speed, and inflicting devastating injuries on opponents. Their culture emphasizes loyalty, sacrifice, and the willingness to absorb punishment to protect their brothers.

  - title: "Death Watch: Mandalorian Separatist Movement"
    keywords: "death watch, mandalore, separatists, warrior culture, commandos, sabotage"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Death Watch comprises Mandalorian zealots who view their species' current pacifist government as a betrayal of ancient warrior traditions. Allied with the Separatists, they conduct hit-and-run raids and surgical strikes against Republic targets—sabotaging communication outposts, power plants, and defense systems—in exchange for political support against Mandalore's recognized leadership. Without the numbers to hold territory, Death Watch relies on mobility, jetpack-equipped warriors, and strategic disruption. Their true goal is to overthrow the peaceful government and transform Mandalore into a militant state, reclaiming what they view as their birthright and freeing their world from both Republic and Separatist influence.

  - title: "Mandalorian Space: Border Region Contested"
    keywords: "mandalore, outer rim, inner rim, border, territory, conflict"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Mandalore's position at the frontier between the Outer Rim and Inner Rim makes its space and territories perpetually contested and coveted. Historians debate whether constant invasion has cemented Mandalorian warrior culture or whether prime location bred dreams of conquest. Regardless, the planet's choice of a peaceful path contrasts sharply with Death Watch ideology, creating internal tension between those who accept galactic diplomacy and those who see it as enslavement.

  - title: "Nightsisters of Dathomir: Force-Using Alchemists"
    keywords: "nightsisters, dathomir, alchemy, force magic, clan matriarchy, witchcraft"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Nightsisters harness the Force through alchemy—condensing it into physical form rather than pursuing Jedi enlightenment or Sith domination. They study Dathomir's strange creatures, extracting properties for survival and healing; an ancient creature called the Sleeper yields compounds for their 'Ways of Life' healing alchemy. Unlike the Jedi's quest for knowledge or the Sith's hunger for power, Nightsisters view all of Dathomir—animals, trees, waters, energy bows, even the Nightbrothers—as tools to ensure clan endurance. They bend or break these tools without remorse, avoiding the extremes of Jedi serenity or Sith rage by freely crossing the boundary between light and dark.

  - title: "Nightsister Beliefs: The Winged and Fanged Deities"
    keywords: "nightsisters, religion, goddess, god, death, fertility, divination"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Nightsister spirituality reflects their individualism: some venerate a Winged Goddess of life, divination, and fertility, while others honor a Fanged God of death and the hunt. Life itself is a series of challenges and suffering that tempers body and soul; death is neither celebrated nor feared but accepted as a natural part of existence. The boundary between living and dead is thin—merely a veil, not a wall. Mother clans practice ritual burial in leather pods hung from trees, symbolizing rebirth and integration into the ecosystem. Through practice, a Nightsister can commune with the dead, gain their wisdom, and even summon them into the material world.

  - title: "Lightsaber (Drawn Weapon)"
    keywords: "lightsaber, jedi weapon, energy blade, melee combat, force-attuned, sith"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      An ancient and elegant weapon of the Jedi Order and their eternal enemies, the Sith. When inactive, a lightsaber appears as little more than a simple hilt. Once ignited, a shining blade of powerful energy springs forth, capable of cutting through nearly any material. The weapon's unusual weight distribution and energy blade nature make it difficult for those trained only with conventional swords to wield properly. It is said that only those in tune with the Force can truly master the lightsaber, allowing that all-encompassing energy field to guide their blade where they will. Derivative weapons include lightwips, guard shotos, and training sabers.

  - title: "The Galactic Senate and Separatist Parliament"
    keywords: "senate, parliament, representation, political structure, homeworld, coalition, special interest"
    category: "organization"
    priority: 9
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Republic Senate comprises tens of thousands of members representing homeworlds, guilds, federations, and corporate interests across the galaxy. This vast size fragments power into countless competing voices, forcing Senators to form coalitions and special interest groups to wield collective influence. For ordinary citizens, these political bodies often appear paralyzed by infighting rather than effective governance. The Separatist Parliament, smaller by comparison, numbers in the thousands and creates the illusion of more direct democracy. However, many Senators in the CIS follow charismatic leadership or respond to perceived Republic aggression, while a handful worry this concentration of power mirrors the very corruption they fled the Senate to escape.

  - title: "The Role and Skills of Senators"
    keywords: "senator, negotiation, rhetoric, diplomat, constituent, deception, charm, homeworld"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Effective Senators maintain visible contact with their constituents, acting as commanders of teams of diplomats and support staff advancing their homeworld's or corporate interests politically, economically, or militarily. The most successful master Charm, Deception, and Knowledge (Education), wielding rhetorical tactics with precision—knowing when to lay facts plainly and when to obscure truth. Some Senators prefer hands-on engagement, traveling to affected worlds to personally organize locals, investigate cover-ups, and gather evidence of corruption or atrocity. In rare cases, one Senator must use cunning, silver tongue, and political status to ensnare another corrupt Senator in a trap, blurring the line between diplomacy and espionage.

  - title: "Separatist Military Command Structure"
    keywords: "separatist commander, cis military, droid commander, tactical droid, corporate soldier, militia officer, command"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Confederacy of Independent Systems draws commanders from diverse backgrounds—corporate soldiers with discipline but questionable loyalty, planetary militia officers seeing their first large-scale war, police force leaders, and even droids given full command responsibility. This hodgepodge structure breeds commanders motivated by passion or ambition rather than experience, yet it paradoxically offers advantages against the Republic's slow, traditionalist approach. Baktoid Combat Automata's T-series and super tactical droids fill critical command gaps, and in some cases an independent droid's steady success rate engenders more trust than an untested organic officer. The CIS military enjoys unified government backing and enthusiasm that sustains soldiers through repeated sorties—a stark contrast to the Republic's fractured political support.

  - title: "Separatist Tactical Innovation and Patchwork Armies"
    keywords: "separatist commander, tactical innovation, droid bomber, super tank, boarding ship, improvisation, non-standard military"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Early in the Clone Wars, Separatist sectors cobbled together troops from local armies, amateur militias, and mercenary groups, forcing commanders to innovate with patchwork forces and ad-hoc training. Separatist Commanders develop unusual strategic flexibility through necessity, learning to outmaneuver Republic forces with non-standard military tactics. The Techno Union and Trade Federation now supply cutting-edge weaponry—Hyena-class droid bombers, Baktoid Armor Workshop super tanks, and Oroch-class boarding ships—adding technological surprise to the CIS arsenal. A Separatist Commander must master Coercion, Knowledge (Warfare), Leadership, and Vigilance to adapt to both enemy threats and the temperamental demands of their own diverse forces. Technology alone cannot guarantee victory, but a well-timed technological advantage wielded by an adaptable commander can shift the tide.

  - title: "Amplifying Chamber"
    keywords: "blaster modification, weapon attachment, damage, plasma, chamber"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A blaster's chamber controls the volatile gas and energy mixture that becomes plasma. An amplifying chamber enlarges and reinforces this space, allowing significantly more powerful blasts that spread damage over a wider area. While repeated use accelerates component wear and eventual breakdown, most soldiers accept this cost for the increased stopping power. The modification adds considerable strain to maintenance checks.

  - title: "Bayonet Attachment"
    keywords: "bayonet, melee weapon, rifle modification, hand-to-hand combat"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      When ranged combat deteriorates into close quarters, a rifle equipped with a bayonet grants soldiers immediate melee capability without requiring a weapon switch. The blade provides greater reach and force than a knife alone, enabling smooth transitions between ranged and engaged combat. Troops carrying bayoneted rifles can act decisively in chaotic firefights.

  - title: "Hair Trigger"
    keywords: "trigger mechanism, pistol modification, fire rate, responsiveness"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Standard trigger mechanisms limit how quickly a pistol can cycle and fire. A hair trigger replaces this with a highly responsive mechanism, allowing substantially faster firing rates. The modification trades some accuracy for speed—the weapon becomes harder to control in sustained fire—but gives quick-draw specialists a critical edge in rapid engagements.

  - title: "Mandalorian Chamber"
    keywords: "mandalorian, blaster chamber, stun setting, deadly setting, hybrid weapon"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A recent innovation popular among mercenary soldiers, the Mandalorian chamber allows a blaster to simultaneously apply characteristics of both stun and deadly settings by carefully manipulating the volatile gas and energy mixture ratios. This hybrid approach sacrifices some range but grants adaptability—a single weapon can incapacitate or kill depending on necessity. Soldiers using such weapons must account for reduced effective distance.

  - title: "Proximity Detonator"
    keywords: "grenade, detonator, explosive trap, proximity sensor, smart trigger"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A proximity detonator transforms thrown grenades into area-denial devices by triggering detonation when enemies approach within a user-set range. Rather than relying on timing or direct impact, soldiers can place these weapons strategically and let them activate autonomously when targets enter the kill zone. Proper positioning of proximity-detonated explosives can eliminate entire squads caught in coordinated ambushes.

  - title: "Clone Trooper Personal Defense Armament"
    keywords: "clone trooper, blaster pistol, personal weapon, republic soldier, combat gear"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone troopers of the Grand Army of the Republic are trained in the use of standard-issue blasters and specialized weapons appropriate to their deployment. Whether conducting security detail, reconnaissance, or direct assault operations, each trooper carries reliable kinetic and energy weapons. The variety of available armaments reflects the diverse tactical situations Republic forces encounter across the galaxy—from aquatic environments requiring specialized beam rifles to aerial operations demanding jetpack integration with weapon systems.

  - title: "Mandalorian Warrior Traditions"
    keywords: "mandalore, mandalorian, warrior tradition, combat culture, specialized equipment"
    category: "faction"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The unique warrior traditions of Mandalore are reflected in distinctive combat doctrines and equipment design. Mandalorian fighters employ esoteric practices and specialized gear developed through generations of conflict. Their approach to warfare emphasizes mobility, versatility, and personal mastery of diverse weapon systems. These traditions stand apart from standard military protocols and represent a sophisticated martial culture with deep historical roots.

  - title: "Nightsisters of Dathomir"
    keywords: "nightsisters, dathomir, esoteric practices, dark side, supernatural combat"
    category: "organization"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Nightsisters of Dathomir practice esoteric combat techniques and arts distinct from mainstream galactic warfare. Their methods combine unconventional weaponry with supernatural practices, creating formidable warriors outside traditional military hierarchies. The Nightsisters maintain independent operations and specialized knowledge, making them unique actors in the broader conflicts of the Clone Wars era.

  - title: "Republic Military Equipment Provisioning"
    keywords: "republic, military equipment, issued gear, clone trooper loadout, mission support"
    category: "faction"
    priority: 8
    planet: "coruscant"
    surface_affinity: "news"
    content: |
      The Galactic Republic provides comprehensive equipment support to clone soldiers and Jedi conducting official missions. Soldiers receive specialized gear matched to mission parameters—reconnaissance armor for intelligence gathering, aquatic protection systems for water-based operations, aerial assault equipment for high-altitude insertions. This logistical support reflects the Republic's substantial wartime resources, ensuring field units possess necessary tools without concern for acquisition costs. Assigned equipment remains Republic property and must be returned or justified for continued use.

  - title: "Separatist Military Doctrine and Resources"
    keywords: "separatist, confederacy, cis, droid vehicle, military resources, battle tank"
    category: "faction"
    priority: 8
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      The Confederacy of Independent Systems marshals substantial resources for prosecution of the war, employing both organic commanders and integrated droid systems. Separatist forces deploy heavily armed speeders, swift walkers, and armored battle tanks operated by both flesh and machine. Droid vehicles serve dual roles as dangerous adversaries and mobile platforms, combining pilot and weapon system into single units. Large vessels like the Subjugator-class heavy cruiser and Juggernaut-class armored fighting vehicles serve as mobile headquarters and battlefield anchors.

  - title: "Advanced Clone Trooper Armor Systems"
    keywords: "clone armor, reconnaissance armor, dive armor, specialized protection, combat suit"
    category: "technology"
    priority: 7
    planet: "kamino"
    surface_affinity: "ambient"
    content: |
      Clone trooper armor is engineered for diverse operational environments and specialized combat roles. Reconnaissance variants incorporate polarized electrobinocular systems enabling long-range surveillance and target acquisition. Aquatic assault armor provides environmental protection in water-based operations while maintaining mobility and weapon integration. Aerial assault armor supports jetpack systems and whipcord thrower attachments. Each variant balances protection, mobility, and mission-specific capabilities through advanced materials and modular attachment systems.

  - title: "BARC Speeder Reconnaissance Platform"
    keywords: "barc speeder, reconnaissance vehicle, clone transport, sidecar, light cavalry"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The BARC (Biker Advanced Recon Commando) speeder serves as the primary reconnaissance and mobility platform for clone scout operations. Twin-seated variants with sidecar configurations enable rapid movement across varied terrain while maintaining combat effectiveness. Polarized electrobinoculars integrated into the speeder platform extend surveillance range, making BARC units ideal for forward reconnaissance operations ahead of main Republic forces.

  - title: "E-5 Blaster Rifle"
    keywords: "e-5, blaster rifle, separatist, battle droid, heavy weapon, carbine"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The E-5 is the standard-issue longarm of Separatist battle droids, produced by Baktoid Armor Workshop. Despite its squat, heavy frame more akin to a carbine than a full rifle, the E-5 packs tremendous firepower from an oversized gas chamber and optimized galven pattern. Built exclusively for droid use, it lacks safety features found on organic-operated blasters, making it fragile and prone to overheating. The weapon runs extremely hot and suffers from substandard materials that render it relatively inaccurate—drawbacks meaningless to droids but unattractive to organic soldiers. When overheated, the E-5 can damage itself and burn the wielder.

  - title: "EE-3 Blaster Carbine"
    keywords: "ee-3, blaster carbine, blatech, law enforcement, bounty hunter, selective fire"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "bounty"
    content: |
      One of Blatech's most popular nonmilitary weapons, the EE-3 is a rugged, reliable carbine designed for law enforcement and private security. Its short, lightweight frame features a heavily shrouded barrel, pistol grip, solid stock, and optical sight. Unlike most weapons in its class, the EE-3 is selectively fired—capable of both single shots and automatic bursts. This combination of standard features, low cost, and solid Blatech construction makes it extremely popular with bounty hunters and paramilitary groups throughout the Outer Rim.

  - title: "Crushgaunts"
    keywords: "crushgaunts, shuk'orok, mandalorian, strength, beskar, armor, melee"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Crushgaunts—called shuk'orok in Mando'a—are ancient strength-enhancing gloves designed by the Mandalorians centuries past. Constructed from reactive polymer-enhanced material reinforced with beskar plates, these gauntlets amplify grip strength to lethal extremes, allowing the wearer to shatter bone, crush durasteel, and deflect weapons. Their unique beskar construction grants a remarkable property: they can turn aside a lightsaber blade. A wearer's Brawn-based grip checks are upgraded, though the strain of crushing with such force can wound the user.

  - title: "Beskad"
    keywords: "beskad, mandalorian, sword, beskar, melee weapon, ceremonial"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The beskad is the traditional Mandalorian blade—a powerful, elegant sword forged entirely from beskar. Its design features a straight edge along one side and a serrated or notched edge running the opposite length, creating a weapon optimized to crack armor with short, powerful slashes. The bare metal hilt offers minimal grip enhancement, but its construction ensures durability through countless conflicts. In the hands of a skilled warrior, the beskad remains one of the galaxy's most formidable melee weapons.

  - title: "Kai"
    keywords: "kai, dagger, beskar, mandalorian, off-hand, hexagonal blade"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The kai is the traditional off-hand companion to the beskad—a short, deadly dagger forged entirely from beskar. The weapon's distinctive elongated hexagonal blade features a rectangular cutout running along its center, reducing weight without sacrificing lethal edge. The bare metal hilt lacks a crossguard, though the notch where blade meets hilt provides hand protection. While less devastating than the beskad, the kai remains a formidable weapon in trained hands.

  - title: "Nightsister Energy Blade"
    keywords: "nightsister, energy blade, curved blade, scimitar, ceremonial, short sword"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Nightsisters employ a distinctive curved, single-edged short sword carried both in battle and for ceremonial purposes. The blade resembles a scimitar or cutlass, broad at the tip before tapering toward the hilt, then flaring again at the guard. With a short, one-handed hilt and a guard on the outer edge below the cutting edge, these blades are lightweight, flexible, and deadly when wielded by trained users. The weapon's elegant design reflects the mystical traditions of the Nightsisters.

  - title: "Lightsabers"
    keywords: "lightsaber, jedi, sith, plasma blade, kyber crystal, melee weapon"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Lightsabers are the most recognizable symbol of the Jedi Order, existing in various forms for millennia. These elegant and deadly weapons count among the galaxy's most powerful personal arms, capable of cutting through nearly any material. While lightsabers are typically symbols of Jedi hope and the Order's power, they can become tools of oppression and evil in the hands of the Sith. A basic lightsaber consists of a hilt crafted from alloys, composites, exotic hardwoods, or combinations thereof, powered by a kyber crystal—usually one harvested during Jedi training. Basic variants possess no exotic or advanced features, though constructed lightsabers rarely remain basic for long.

  - title: "Aquasuit"
    keywords: "aquasuit, diving, water operations, pressure suit, mon cala, underwater"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Form-fitting pressurized suits designed for deep-water operations on worlds like Mon Cala. The flexible, airtight material uses natural memory properties to maintain integrity while allowing freedom of movement. Integrated helmet optics and audio systems dynamically adjust to the wearer's senses, helping operators adapt to the crushing pressures and disorientation of operating hundreds of meters beneath the ocean surface. Each suit provides six hours of breathable atmosphere, along with integrated fresh water and nutritional supplements to sustain the wearer during extended underwater missions.

  - title: "Concealed Recorder"
    keywords: "recorder, surveillance, evidence, concealed device, negotiation, investigation"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Small devices disguised as innocent personal items—pendants, styluses, hair clips, and similar inconspicuous objects—that capture full holographic and audio recordings of conversations. Particularly valuable when all parties remain unaware of the recording. Intelligence officers, negotiators, and investigators employ these tools to document sensitive discussions for later analysis or legal proceedings, though detection requires keen perception and vigilance.

  - title: "Diplomatic Authorization"
    keywords: "diplomatic credentials, holodisc, government authority, sash, brooch, diplomatic immunity"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Official documentation—typically in the form of a holodisc—that grants government agents passage and deference across neutral, aligned, and hostile star systems. Often accompanied by personal ornamentation such as an ornate sash, brooch, or necklace that marks the bearer as an authorized representative. Holders gain automatic advantage when navigating bureaucratic obstacles and can access individuals and services otherwise unavailable to common travelers. Such authorization is tightly controlled and rarely acquired outside legal channels.

  - title: "JT12C Jetpack"
    keywords: "jetpack, clone trooper, deployment, jet propulsion, merrsoam, republic military"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A modified variant of the standard JT12 jetpack, manufactured by Merr-Sonn specifically for the Grand Army of the Republic. Enhanced for reliability during extended field operations, the JT12C features hardened intakes, turbines, and nozzles to reduce maintenance requirements in combat zones. The modifications result in a slightly bulkier profile, but clone troopers can discard spent units to reduce encumbrance once fuel cells are depleted. Essential equipment for rapid battlefield deployment and tactical mobility.

  - title: "Nano-Droids"
    keywords: "nano-droids, nanomachines, nm-k reconstitutors, molecular reconfiguration, prohibited, republic ban"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      Microscopic spheres of programmable nanomachinery suspended in electrolytic transfer fluid, officially designated NM-K reconstitutors. Capable of reconfiguring carbon-based matter at the molecular level, enabling advanced fabrication and repair of delicate electronics. However, their potential for catastrophic misuse—rearranging molecules into explosively unstable configurations or turning a living being into an undetectable biological weapon—has resulted in strict Republic prohibition outside closely monitored industrial applications. Their very existence poses a dire security threat.

  - title: "Christophsis Crystal"
    keywords: "lightsaber crystal, kyber crystal, christophsis, kinetic energy, breach, sunder"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "general"
    content: |
      The crystalline forests of Christophsis yield pure kyber crystals prized by Force users for their unique properties. A lightsaber blade fashioned from these crystals amplifies kinetic energy in ways distinct among lightsaber designs, producing devastating impacts capable of breaching and sundering armor and shields. The Republic and Separatists both recognize Christophsis's strategic value, making it a flashpoint throughout the Clone Wars.

  - title: "Ilum Ice Crystals"
    keywords: "ilum, kyber crystal, jedi, rite of passage, younglings, meditation"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The icy world of Ilum has long served as a destination for Jedi younglings undertaking their first kyber crystal pilgrimage. The crystals found in Ilum's frozen depths are reliable for novices, though skilled technicians can coax remarkable performance from careful emitter matrix adjustments. In these troubled times of galactic conflict, Jedi Masters struggle to find opportunity to accompany the next generation on this sacred rite, yet to abandon this tradition risks admitting defeat against the rising darkness.

  - title: "Clone Polarized Electrobinoculars"
    keywords: "clone trooper, helmet visor, electrobinoculars, optics, perception, reconnaissance"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone troopers frequently mount polarized electrobinoculars to their helmets on motorized visors that lower swiftly into position. The Grand Army of the Republic-issue sets include light filtering, image sharpening, and stabilization systems, all hardened to withstand combat conditions. These optical enhancements allow soldiers to observe distant targets and cut through obscuring weather and darkness.

  - title: "Micro-Rocket Armor Mount"
    keywords: "armor attachment, micro-rocket, munitions, intimidation, heavy weapon"
    category: "technology"
    priority: 5
    planet: "all"
    surface_affinity: "encounter"
    content: |
      When situations demand firepower beyond a standard blaster, a micro-rocket launcher offers greater range and accuracy than a thrown grenade. These armor-mounted systems fire small explosives with intimidating force. Clone troopers and other soldiers favor them for their subtlety compared to heavier ordnance—a single launcher can be installed on armor without sacrificing mobility, and munitions carry undeniable psychological weight in negotiations.

  - title: "Personal Vibrosaw"
    keywords: "vibrosaw, cutting tool, breaching, undergrowth, durasteei, diamond-tipped"
    category: "technology"
    priority: 5
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Troopers operating across diverse environments often mount a personal vibrosaw on their armor bracers for rapid breaching and cutting tasks. The diamond-tipped chain rotates at high velocity around a thin blade capable of cutting through nearly any material—forest undergrowth, bulkheads, reinforced doors, and security barriers. In emergencies, the spinning blade can be wielded as a weapon, though its cumbersome rotation limits combat effectiveness.

  - title: "HMP Droid Gunship"
    keywords: "droid gunship, confederacy, hmp predator, haor chall engineering, heavy gunship, autonomous vehicle, close air support"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Droid Heavy Missile Platform—known as the HMP Predator—represents the Confederacy's response to Republic heavy assault airspeeders. Designed by Haor Chall Engineering, the HMP features a heavily armored, saucer-shaped hull with centrally mounted reactor and drive systems, capable of carrying heavy ordnance and delivering devastating close air support. Piloted by droid brains renowned for implacable aggression, the HMP has earned a terrifying reputation in its short operational deployment, with crews and commanders across the galaxy learning to respect its destructive capability.

  - title: "STAP Light Speeder"
    keywords: "stap, reconnaissance, patrol, light speeder, baktoid armor"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The STAP is a minimalist reconnaissance platform—little more than a vertical spar slightly taller than a battle droid, topped with a simple control pod housing handlebars and rudimentary instruments. A pair of light blasters provide basic anti-personnel capability. Paired turbines powered by rechargeable energy cells drive the craft, with a small horizontal platform below serving both as wing and pilot support, housing foot controls. Designed for light armed reconnaissance and patrol duties, the STAP is favored by Separatist forces for its simplicity and speed in contested airspace.

  - title: "WLO-5 Light Speeder Tank"
    keywords: "wlo-5, light tank, ubrikkian, repulsor, assault tank"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The WLO-5 is a relatively uncommon light assault platform produced by Ubrikkian Ord Pedrovia. Its squat, oval hull features a forward ram prow and twin aft thruster nacelles, with short aft-mounted wings providing stability and maneuverability at low altitude. Powered by a simple UBR-14a reactor using off-the-shelf components to minimize costs, the tank sacrifices shields for firepower: two forward light blaster cannons and a top-mounted heavy laser turret. The cramped crew compartment seats a pilot and two gunners, with minimal high-tech piloting aids—a deliberately simple control layout prioritizing reliability over sophistication. Infantry can ride exterior handholds, making the WLO-5 useful for rapid dismounted operations.

  - title: "HAUW A6 Juggernaut Heavy Assault Vehicle"
    keywords: "juggernaut, hauw a6, kuat drive yards, heavy tank, republic, troop carrier"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Kuat Drive Yards' HAUW A6 is a massive ten-wheeled heavy assault platform fielded by the Grand Army of the Republic as both primary battle tank and troop transport. Twice the size of an All-Terrain Tactical Enforcer, the lumbering Juggernaut stands among the largest landvehicles ever constructed, capable of sustained assault operations across varied terrain. Its sheer scale and firepower make it a symbol of Republic military might in large-scale engagements, though its slow speed and fuel consumption limit deployment flexibility.

  - title: "Tracked and Wheeled Vehicles in Clone Wars"
    keywords: "tracked vehicles, wheeled vehicles, maintenance, cost-effective, specialty roles"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Traditional tracked and wheeled platforms remain in service alongside advanced repulsorlift craft, offering distinct advantages despite lower versatility. While less efficient in varied terrain than walkers and unable to achieve the maneuverability of repulsor vehicles, tracked and wheeled designs excel through low operational cost and ease of field maintenance—critical factors when supply lines stretch across contested worlds. Both Republic and Separatist forces maintain specialized units of these vehicles for roles where reliability and simplicity outweigh performance.

  - title: "NR-N99 Persuader Tank Droid"
    keywords: "persuader, tank droid, heavy armor, separatist, droid brain, slow, artillery"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The NR-N99 Persuader is a massive armored droid tank fielded by Separatist forces. Nearly unstoppable when rolling forward, it mounts ion cannons, shock cannons, heavy repeating blasters, and ordnance launchers across multiple hardpoints. However, its droid intelligence is inflexible and unimaginative—once committed to a course of action, a Persuader rarely adapts. This predictability makes even small guerrilla forces capable of outmaneuvering and destroying them through quick tactical shifts. The vehicle is extremely slow, limiting its battlefield utility despite its overwhelming firepower.

  - title: "ATAP Walker"
    keywords: "atap, walker, republic, light artillery, terrain, kuat drive yards, three-legged"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The All-Terrain Attack Pod (ATAP) is a three-legged walker widely deployed by the Grand Army of the Republic. Designed by Kuat Drive Yards, it features a low-profile wedge-shaped hull with two articulated rear legs for propulsion and a centrally-mounted third leg that extends for bracing during firing or stabilization on broken terrain. Piloted by a crew of three, the ATAP serves multiple infantry support roles including light armor coverage, reconnaissance, and field artillery work. Its design prioritizes durability and versatility over speed.

  - title: "Eta-2 Actis-Class Starfighter"
    keywords: "eta-2 actis, republic fighter, light starfighter, laser cannon, ion cannon, kuat systems engineering"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Eta-2 Actis is a Republic light starfighter that punches well above its weight class despite its small frame. Armed with a pair of medium laser cannons running the length of each wing and twin light ion cannons on the leading edges, the fighter can engage light gunboats and armed shuttlecraft without hesitation. Pilots appreciate the Actis's longer reach and devastating firepower, though the compact design leaves no room for hyperdrive or navicomputer—limiting it to short-range operations near friendly territory or carrier support.

  - title: "Hyena-Class Droid Bomber"
    keywords: "hyena droid, cis bomber, droid brain, ordnance, baktoid, vulture variant"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Separatist Hyena-Class droid bomber is descended from the Vulture-Class fighter but trades speed for firepower and independent cunning. Its broad horizontal hull and transforming vertical wings grant both maneuverability and the ability to land on sturdy surfaces, folding its wings into legs for hangar deployment. Unlike the simpler Vulture, the Hyena's droid brain is sophisticated enough to act independently, making coordinated bombing runs and tactical decisions without constant command-ship oversight. Its payload—missiles, torpedoes, and proton bombs—makes it a heavy threat to both starships and ground installations.

  - title: "Trident-Class Assault Ship"
    keywords: "trident-class, cis assault ship, grappling ship, boarding craft, drill, collicoid creation nest"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Collicoid Creation Nest's Trident-Class assault ship is a bizarre, squid-like vessel purpose-built for boarding and siege operations. Its long, pyramid-shaped hull sports four five-pointed electromagnetic arms on the ventral surface that grip metallic hulls like tentacles, while scattered light laser cannons provide covering fire. The vessel's defining feature is a massive hardened drill mounted between the arms—where a squid's beak would be—capable of boring through armored hulls to deposit battle droids and aqua droids into a captive ship's interior. Later variants gained submarine capabilities for assaulting underwater cities and fortified facilities.

  - title: "ARC-170 Heavy Starfighter"
    keywords: "arc-170, republic navy, starfighter, heavy fighter, reconnaissance, long-range combat, incom, subpro"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Aggressive Reconnaissance-170 is the Republic Navy's premier heavy starfighter, developed jointly by Incom and Subpro Corporation. This sturdy, square-shouldered vessel features a long fuselage flanked by large engine nacelles carrying IGP-4400a ion turbines. Its distinctive S-foils split into three sections for enhanced atmospheric maneuverability and heat dissipation. The three-position dorsal cockpit accommodates a pilot, co-pilot managing electronics and weapons, and a rearward-facing gunner, with an astromech socket for in-flight maintenance and navigation backup.
      
      Designed for long-range standoff combat and armed reconnaissance, the ARC-170 boasts robust hull armor backed by triple-redundant shield systems. Offensive capability includes wingtip medium laser cannons, forward proton torpedo launchers, and aft anti-aircraft lasers. Its sophisticated sensor package, reliable hyperdrive, and month-long consumables endurance make it ideal for extended operations deep in hostile space.

  - title: "Belbullab-22 Heavy Starfighter"
    keywords: "belbullab-22, cis navy, separatist fighter, feethan ottraw, heavy attack, utapau, crewed fighter"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Belbullab-22, manufactured by Feethan Ottraw Scalable Assemblies in Pau City on Utapau, is the heaviest fighter in the Separatist Confederacy's inventory and the only crewed fighter in their arsenal. Built more like a landspeeder than traditional starfighter, this heavy vessel relies on powerful engines and sheer speed for flight. Its twin-boom design features a central fuselage housing the cockpit, avionics, shield generators, hyperdrive, and main engines, with spar-mounted nacelles containing weapons, auxiliary thrusters, and repulsorlift systems. The cramped cockpit can be factory-configured to accommodate diverse body types.
      
      Comparable to the Republic's ARC-170 in role and armament, the Belbullab-22 trades speed for durability. Armor plating rivals that of smaller gunboats, with a sturdy hull and powerful shields capable of withstanding damage that would destroy lighter craft. Its retractable triple light laser cannon pods provide adequate anti-fighter and light anti-ship capability. During its deployment, this rare fighter has earned a reputation as an extremely difficult target to destroy and, in skilled hands, a formidable adversary.

  - title: "Acclamator-class Assault Ship"
    keywords: "republic, assault ship, transport, landing craft, clone legion, cargo, hangar bays"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Acclamator-class serves as the Republic's primary planetary assault and logistics vessel. Its broad arrowhead hull features a command deck mounted high on an armored pylon at the stern. The interior is dominated by vast cargo holds and passenger berthing spaces equipped with automated cargo-handling systems, capable of sustaining an entire clone legion in the field. Armed with turbolasers, torpedo tubes, point-defense lasers, and tractor beams, Acclamators can traverse gravity wells and disgorge troops and materiel within hours of atmospheric entry.

  - title: "V-19 Torrent Starfighter"
    keywords: "republic starfighter, torrent, slayn korpil, fighter craft, clone pilot"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The V-19 Torrent is a nimble single-pilot fighter employed throughout the Clone Wars by Republic naval forces. Manufactured by Slayn & Korpil, it features a tight frame optimized for dogfighting with forward-mounted medium laser cannons and concussion missile launchers. Though it lacks a backup hyperdrive, its Class 1 primary drive and navicomputer allow independent operations across systems. The craft's short sensor range demands aggressive piloting and situational awareness.

  - title: "Providence-class Battleship"
    keywords: "separatist, battleship, providence, rendili, droid starfighter, cis fleet"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Providence-class represents the Separatist Alliance's most formidable capital warship, a joint design by Rendili StarDrive and the Free Dac Volunteers. These massive vessels carry droid tri-fighters and vulture droids as well as hundreds of armored vehicles and landing craft. With capacity for over a million deactivated battle droids and nearly fifty thousand organic personnel, Providence-class ships function as mobile military strongholds capable of sustained multi-year operations. Their immense holds and sophisticated sensor arrays make them critical command nodes within the CIS fleet structure.

  - title: "The Separatist Crisis and the Clone Wars' Origin"
    keywords: "separatist alliance, cis, confederacy, clone wars, geonosis, dooku, republic collapse"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      The Confederacy of Independent Systems arose from systemic grievances: Rim Worlds felt exploited and unheard as the Republic Senate wallowed in bloat and corruption, while wealth and resources flowed to Core Worlds. When a fallen Jedi Master founded the CIS and called for secession, resource-rich systems answered, calculating they had more to gain by independence than loyalty. The Republic Senate, fearing economic collapse as the Rim withdrew its food, raw materials, and factories, authorized the Grand Army of the Republic—a clone military mysteriously commissioned years earlier by a dead Jedi Master. The gambit to crush the Confederacy at Geonosis failed catastrophically, entrenching both sides into a grinding conflict that now stretches across years, drawing in neutral worlds and ravaging systems caught between.

  - title: "War Weariness Across the Galaxy"
    keywords: "clone wars fatigue, neutral worlds, republic exhaustion, jedi losses, peace attempts"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "news"
    content: |
      Years into the Clone Wars, exhaustion has set in across the galaxy. The Jedi Order bleeds members and morale; the Republic has lost system after system despite massive military investment. Even Separatist territorial gains have stalled, leading some to whisper that peace might be possible. Citizens conscripted or taxed to support the war effort grow resentful; worlds ravaged by bombardment and invasion hunger only to rebuild and resume normal commerce. Diplomatic efforts have repeatedly emerged, only to be sabotaged by treachery and miscalculation, driving each side deeper into commitment to total victory. The machinery of war grinds on, but beneath the surface, a palpable desire for resolution grows—even as those steering the conflict seem determined to deny it.

  - title: "Holonet Propaganda and the Separatist Narrative"
    keywords: "holonet, propaganda, separatist, senate, rights violations, slaves"
    category: "concept"
    priority: 7
    planet: "coruscant"
    surface_affinity: "news"
    content: |
      Across the HoloNet, recordings circulate purporting to show collaboration with slavery and rights abuses. Separatist sympathizers claim the recordings are fabricated or taken out of context, yet their timing consistently undermines Senate peace initiatives. The flood of imagery and testimony has become a weapon in the information war, shaping public and political opinion across the Republic's worlds.

  - title: "Sector Governance Decree and the Petition of 2,000"
    keywords: "sector governance decree, petition, chancellor, power concentration, senators"
    category: "concept"
    priority: 8
    planet: "coruscant"
    surface_affinity: "news"
    content: |
      By the third year of the Clone Wars, Republican Senators grow restless as executive power consolidates in the Chancellor's office. The Sector Governance Decree becomes the catalyst for quiet resistance. Legislators approach sympathetic colleagues to build signatures for a formal petition demanding the Chancellor relinquish accumulated wartime authority. Led by respected voices calling for restraint, they aim for 2,000 signatures before presenting their case.

  - title: "The Clone Troopers of Kamino"
    keywords: "clone trooper, grand army, kamino, jango fett, sifo-dyas, genetic template"
    category: "faction"
    priority: 9
    planet: "kamino"
    surface_affinity: "general"
    content: |
      The Republic's clone army, commissioned under enigmatic circumstances, represents a desperate gamble. Engineered from the genetic template of a deceased bounty hunter, the clones inherited martial prowess and tactical instinct, while Kaminoan geneticists instilled loyalty and obedience. Overseen by Jedi and Kaminoan overseers, the cloning facilities have become the backbone of Republic military strength—a source of both pride and unspoken anxiety about origins and control.

  - title: "Clone Morale and Mercy Missions"
    keywords: "clone bar, mercy mission, morale, unit cohesion, 79's, civilian relations"
    category: "location"
    priority: 6
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      Clone troopers enjoy broad civilian support, burnished by their conduct of mercy missions—delivering supplies to war-ravaged worlds and disaster survivors on route to the front. On Coruscant and other Republic worlds, dedicated clone bars provide sanctuaries for off-duty troopers to decompress and strengthen unit bonds. Establishments like 79's serve as unofficial crossroads where clones mingle with Jedi officers and civilians, normalizing the soldiers' presence and deepening public sympathy for the war effort.

  - title: "Individuality Among the Clone Legions"
    keywords: "clone identity, nicknames, armor customization, individuality, phase two armor"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Though engineered as uniform soldiers, clones under Jedi leadership have begun forging individual identities. Custom nicknames replace batch designations, tattoos and unconventional haircuts mark each trooper's personality, and armor modifications reflect fighting style and unit pride. The new Phase II armor, superior to its predecessor, invites personalization—pauldrons, kamas, rangefinders—allowing troopers to differentiate themselves while maintaining unit cohesion and combat readiness. This emerging individuality has transformed many clones from seeing themselves as expendable products to thinking as soldiers with agency.

  - title: "Clone Questioning of Command Authority"
    keywords: "clone, orders, leadership, questioning, individuality, authority"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Years of sustained warfare have bred introspection among the clone ranks. Troopers who once unquestioningly followed orders now weigh directives from Jedi generals and civilian commanders, occasionally voicing doubt or concern. This emergent skepticism represents both a potential strength—soldiers thinking critically about their missions—and a subtle fracture in the command structure, a fissure that could widen if loyalty is tested too severely.

  - title: "Coruscant: Heart of the Republic"
    keywords: "coruscant, republic capital, galactic senate, politics, bureaucracy, core worlds"
    category: "location"
    priority: 9
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      Coruscant has served as the capital of the Galactic Republic since ancient times, a world-spanning city of layered metropolises where the fate of a thousand worlds is decided. The Galactic Senate convenes here, where representatives from across the galaxy gather to settle disputes and enact law. For millennia this system functioned, maintaining relative peace across vast distances. Yet in recent decades, corruption has metastasized through the Senate and bureaucratic apparatus—political maneuvering now paralyzes courts, corporate interests bend law to their will, and opportunism runs unchecked. The consequences of this decay ripple outward, destabilizing the Republic itself.

  - title: "The Republic in Decay"
    keywords: "republic, corruption, senate, bureaucracy, political crisis, clone wars"
    category: "concept"
    priority: 8
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      Once the Galactic Republic stood as a beacon of democratic governance, with centuries of relative stability maintained through reasoned debate and collective will. However, the machinery of government has grown brittle with age and compromise. Corruption spreads through every level—from petty officials accepting bribes to senators openly trading votes for corporate donations. Political factions deadlock crucial decisions while those with wealth and influence grow wealthier still. The onset of the Clone Wars has exposed the hollowness of these institutions, revealing how thoroughly the Republic's ideals have been hollowed out by greed and self-interest.

  - title: "Separatist Recruitment and Planetary Subjugation"
    keywords: "separatist, confederacy, planets, taxation, corporate exploitation, resistance, onderon"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      The Confederacy courts worlds with promises of congressional representation, freedom from crushing taxes and tariffs, and protection from Republic reprisals. Yet these pledges often evaporate when Separatist military needs demand resources. Conquered worlds find themselves strip-mined by foreign corporations, their skies choked with factory exhaust, entire populations forced into indentured servitude. Some worlds, like Onderon, form resistance groups and petition the Republic for covert aid, though the Republic struggles to allocate resources to non-member systems. The gap between Separatist promises and the brutal reality of occupation creates desperate populations and underground movements across the galaxy.

  - title: "Mandalorian Death Watch: Mercenaries and Throne-Seekers"
    keywords: "mandalore, death watch, mercenaries, mandalorian armor, jetpacks, warrior culture, pacifism"
    category: "organization"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A ruthless mercenary faction operating across the Mandalore Sector's neutral systems, the Death Watch rejects the pacifist rule of their world's leadership and yearns to restore the old ways of Mandalorian warrior-clan culture. They don armor and jetpacks, wielding exotic weaponry while hiring out to independent systems and criminal factions—the Republic refuses to work with them, and a soured deal distances them from the Separatists. Their legendary combat prowess and iconic equipment make them formidable operatives, though their primary goal remains seizing control of their homeworld and reinstating militant traditions.

  - title: "Piracy and Privateering in the Clone Wars"
    keywords: "pirates, privateers, piracy, hyperspace ambush, merchant routes, cargo, ransom"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "bounty"
    content: |
      The Clone Wars have created unprecedented opportunity for piracy. Military logistics routes carry tempting prizes of arms and supplies, heavily defended but valuable; non-military trade routes remain virtually undefended, making cargo ships easy pickings across the Rim. Pirates who attack Republic or Separatist convoys earn substantial payment for captured cargo and prisoners. Privateering licenses and pardons are available to those willing to legitimize their operations. Pirates typically ambush ships exiting hyperspace from behind asteroids, debris fields, or moons, disabling engines before shields rise. Some tow massive wreckage into hyperspace lanes to force unexpected reversions, catching crews unprepared. Treatment of captured crews varies wildly—some are slaughtered, others sold into slavery, while many are offered positions among the pirate crew.

  - title: "Mercenary Economics and Desperation"
    keywords: "mercenaries, hiring, reputation, battle, abandonment, garrison"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Mercenaries during the Clone Wars face a bitter economic calculus: commit to a posting and risk being trapped in a losing fight, or flee early and damage the reputation needed for future contracts. Many desperate plans have failed because hired soldiers abandoned garrison commanders they deemed doomed, creating a cycle of distrust between military forces and contractors. Reputation is currency in the mercenary trade, and those who flee too soon find themselves blacklisted, unable to secure lucrative contracts. This tension between self-preservation and professional obligation makes every engagement a high-stakes gamble.

  - title: "Separatist Worlds and Corporate Control"
    keywords: "separatist worlds, corporate control, confederacy, trade, exploitation"
    category: "location"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Separatist space divides into two categories: worlds run by intergalactic corporations seeking profit from war, and smaller backwater settlements largely ignored by the Republic. Corporate worlds benefit from leaving the Republic—no tariffs or taxes while retaining Separatist military contracts. Smaller worlds, however, often find the CIS as stifling as the Republic, forced to trade land-rights to corporations for defense agreements. Once corporations gain footholds, they exploit not only natural resources but entire populations.

  - title: "Unprotected Backwater Worlds and Piracy"
    keywords: "piracy, crime, backwater worlds, undefended, bandits, syndicates"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Many smaller CIS worlds, lacking standing defenses or unwilling to become corporate vassals, suffer massive crime waves as pirates and criminal syndicates descend on unprotected settlements. The Separatist fleet makes token efforts to clear hyperlanes of raiders, but cunning bandits easily evade patrol routes. Desperate populations yearn for the war's end so the Separatist military can turn inward to address piracy and corporate malfeasance ravaging their homes.

  - title: "The Outer Rim Sieges Campaign"
    keywords: "outer rim sieges, blockade, separatist council, republic campaign"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      The Republic launches a coordinated military campaign to blockade key Separatist worlds in the Outer Rim, hoping to force surrender by cutting off homeworlds of the Separatist Council and limiting vital resources. The strategy exploits a critical Separatist weakness: their inability to use the Hydian Way through Republic Core Worlds for rapid reinforcement, and Hutt control of the circuitous Triellus Trade Route, making troop and supply movement between Spinward and Trailing territories extremely difficult.

  - title: "The Sith Rule of Two"
    keywords: "sith, rule of two, master, apprentice, dark side, force users"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      The Sith have endured in shadow for centuries by strict adherence to the Rule of Two: a Master to embody power, an apprentice to crave it. This structure has allowed them to rebuild from near-extinction at Jedi hands. The current Dark Lord maintains this balance carefully, eliminating apprentices who grow too powerful while recruiting new servants to study the ways of the Sith. The secrecy of this hierarchy is absolute—even trusted agents who learn too much risk swift elimination.

  - title: "The Sith Conspiracy"
    keywords: "sith plot, clone wars, manipulation, republic, separatists, conspiracy"
    category: "concept"
    priority: 10
    planet: "all"
    surface_affinity: "news"
    content: |
      The Sith orchestrate the Clone Wars from both sides of the conflict, engineering a galaxy-wide war to cloud the Jedi's Force visions and paralyze the Republic's will. Dozens of Senators operate under Sith influence, unknowingly serving the Dark Lords' design. The conspiracy spans centuries of careful plotting—poking holes in the Republic's foundation, engineering wars, and limiting Jedi options. Under cover of fear and chaos, the Sith convince the galaxy to surrender freedoms for security, patiently awaiting the moment to seize open control.

  - title: "Covering Tracks and Eliminating Witnesses"
    keywords: "sith, witnesses, assassination, secrecy, dooku, identity"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Sith devote nearly as much effort to concealing their conspiracy as advancing it. Any investigation threatening to expose the Dark Lord's identity or reveal the truth about the clone army draws direct oversight from the highest Sith ranks or their most trusted agents. Witnesses are systematically eliminated. Even loyal servants who learn too much or begin to question orders become targets for death. This paranoid security apparatus moves swiftly and leaves few loose ends.

  - title: "Dark Side Ascendant"
    keywords: "dark side, force, jedi, visions, tribalism, violence, nightsisters"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The dark side grows stronger across the galaxy as the Clone Wars rage. Jedi report that darkness clouds their vaunted Force visions, making them blind to threats and vulnerable to manipulation. The populace grows more susceptible to violent tribalism and fear. This corruption did not arise by chance—it is the culmination of centuries of Sith scheming. Yet the Sith are not alone in benefiting from this climate. The Nightsisters of Dathomir stir, and threats long thought dead return to sow suffering.

  - title: "Jedi Investigation of the Clone Army"
    keywords: "clone army, dooku, sifo-dyas, kenobi, skywalker, investigation"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      Late in the third year of the Clone Wars, an emergency transponder belonging to a long-dead Jedi Master suddenly activates on a moon of Oba Diah. The investigation reveals shocking truths: the clone army was commissioned and created by a fallen Jedi Master, now serving as a Sith Lord. When Jedi discover this connection, the Sith respond with swift elimination of witnesses. The threat of exposure sets the Dark Lords to work erasing evidence and accelerating their plans before their designs unravel completely.

  - title: "The Bounty Hunting Trade During the Clone Wars"
    keywords: "bounty hunter, clone wars, guild, independent, contracts, republic, separatist"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "bounty"
    content: |
      The Clone Wars have created unprecedented demand for bounty hunters across the galaxy. The Bounty Hunters' Guild controls much official work for the Republic, but the sheer volume of targets has exceeded their capacity. This surplus demand, combined with lucrative Separatist contracts, has spawned a new generation of independent hunters operating outside guild authority. Many guild members themselves freelance in secret, unwilling to forgo the credits offered by high-paying jobs. The Republic Enforcement DataCore, exclusive to guild members, posts official bounties; however, as Republic resources dwindle, criminal bounties have proliferated. Independent hunters instead contract with Separatists, criminal syndicates, and private interests, often forming small teams to tackle larger contracts—including the standing one-million-credit bounty for the live capture of prominent Jedi Masters.

  - title: "Dathomir: World of Crimson Wilderness"
    keywords: "dathomir, crimson atmosphere, red forests, dangerous wildlife, force-strong world"
    category: "location"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Dathomir is a mysterious and remote world bathed in crimson light, its atmosphere and landscape rendered in shades of blood-red. Thick red vines entangle sprawling forests that give way to rocky clearings and jagged, broken mountains. Billowing mist shrouds the terrain in ethereal haze, limiting visibility and adding to the world's oppressive, dangerous character. The planet teems with exotic and violent creatures, and its dense swamps, harsh deserts, and bleak forests make survival a daily struggle for the scattered sentient populations clustered in small villages and enclaves.

  - title: "The Force and Dathomir's Dark Aura"
    keywords: "dathomir, force connection, dark side, spirits, force-sensitive"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Dathomir is unusually strong in the Force, and this connection permeates both its inhabitants and some of its wildlife. Spirits linger in ways not commonly experienced elsewhere in the galaxy. The dark side is palpable to those attuned to the Force, manifesting as an oppressive presence that weighs upon the world. Even those without Force sensitivity can feel the planet's sinister character—an aura of danger and death that seems woven into the very fabric of Dathomir's existence.

  - title: "Nightsister Magicks and Power"
    keywords: "nightsisters, magicks, force users, incantations, spells, sickly green-yellow"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Nightsisters wield the Force through mystical and ritualistic methods fundamentally unlike those of the Jedi or Sith, employing incantations and spells as their primary means of channeling power. Their magicks manifest with a distinctive sickly green-yellow coloration, a telltale signature visible to observers. The most powerful Nightsister leaders rival fully trained Jedi Masters or Sith Lords in raw ability, though their unconventional approaches remain poorly understood by the traditional Force-using orders.

  - title: "Nightsister and Nightbrother Clans"
    keywords: "nightsisters, nightbrothers, clans, villages, tribal, dathomir society"
    category: "organization"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Dathomir's sentient population is organized into Nightsister and Nightbrother clans scattered across small villages and enclaves throughout the world. These tribal societies have adapted to survive in the planet's hostile wilderness. The clans maintain their own hierarchies and allegiances, though the Nightsisters hold greater prominence and power within Dathomirian society, particularly among those versed in Force manipulation.

  - title: "Dathomir's Isolation and Limited Trade"
    keywords: "dathomir, remote, hyperspace routes, isolation, no industry, no trade"
    category: "location"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Dathomir remains one of the galaxy's most isolated and remote worlds, located far from any major galactic hyperspace routes and nearest only to the distant Hydian Way and Salin Corridor. The planet hosts no significant industries, corporate operations, or established trade routes. Past attempts to develop Dathomir have been crushed by its hostile wilderness. As a result, few outsiders have reason to visit, and the world remains largely cut off from mainstream galactic commerce and culture.

  - title: "Felucia: War-Torn Jungle World"
    keywords: "felucia, nysillim, jungle, gossams, felucians, medicinal herbs, commerce guild, war zone"
    category: "location"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Felucia was once a lush jungle world inhabited by the peaceful, diminutive Felucians who farmed in harmony with their environment. The discovery of nysillim—a valuable medicinal herb—attracted Gossam colonists and traders, fundamentally transforming the planet's ecology. The Gossams encouraged large-scale deforestation to maximize nysillim production, driving native rancors and predators into conflict with agricultural expansion. Now, during the Clone Wars, both Republic and Separatist forces wage campaigns across Felucia, leaving vast wastelands scarred by battle and fire. The once-vibrant jungle has become a contested war zone, with little hope the ecosystem will recover.

  - title: "Haven-Class Medical Station"
    keywords: "medical station, republic, bacta tanks, medical droids, clone wounded, supply lines, felucia"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "news"
    zone_scope: "felucia"
    content: |
      The Haven-class medical stations are strategic Republic installations positioned throughout contested space to ensure medical access and support clone operations. These facilities are equipped with advanced medical droids, bacta tanks, and emergency supplies, staffed by small clone crews. They serve both wounded soldiers from planetary operations and local civilian populations, functioning as vital supply nodes in regions where piracy and Separatist blockades threaten standard trade routes. The station on Felucia (designation HCTFF2) has become a priority target for Separatist attack, requiring frequent replacement and repair.

  - title: "Coruscant's Vertical Stratification"
    keywords: "coruscant, class divide, upper levels, lower levels, poverty, wealth, cityscape"
    category: "location"
    priority: 8
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      Coruscant's vast cityscape stretches across thousands of levels, creating a stark divide between rich and poor. The wealthy dwell in luxury towers high above the sprawl, while descending through the endless levels reveals increasingly impoverished districts with stale air, darkness, and few amenities. The middle and lower-level citizens can only dream of the lives led by those in the prestigious upper towers.

  - title: "Coruscant's Hidden Criminal Underworld"
    keywords: "coruscant, crime, underworld, corruption, senators, black market"
    category: "concept"
    priority: 7
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      Despite Coruscant's position as the political heart of the Republic, a widespread and complex criminal underworld thrives beneath the city's official facade. This shadow economy is far less isolated from prestigious upper levels and influential government figures than many citizens believe, with corruption and illicit dealings woven into the city's power structure.

  - title: "Militarization of Coruscant"
    keywords: "coruscant, clone troops, grand army, military, security, martial law, defense"
    category: "concept"
    priority: 9
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      The Military Creation Act formally established the Grand Army of the Republic and transformed Coruscant forever. Clone troop deployments have expanded defensive forces' roles far beyond traditional police and protection duties. Massive logistics structures now support millions of soldiers, and defensive fortifications grow ever larger. While not under formal martial law, many citizens feel the weight of heavy clone presence, and political dissenters view the militarization as a concerning ceding of freedoms to central authority.

  - title: "The Senate District"
    keywords: "coruscant, senate district, federal district, government, galactic senate building, rotunda"
    category: "location"
    priority: 8
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Senate District holds some of the Republic's most vital government buildings, including the iconic Senate Rotunda. Entire levels and complexes are dedicated to specific bureaucratic functions, with many ancient headquarters standing alongside newer structures built to support war logistics. Security is perpetually high, intensified further by occasional Separatist operations and the constant threat of attack—safeguards that nervous Senators readily request and justify.

  - title: "Galactic Senate Chamber"
    keywords: "coruscant, senate chamber, senators, debate, repulsorlift platforms, chancellor"
    category: "location"
    priority: 9
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Galactic Senate Chamber serves as the Republic's true political center, where laws and diplomatic struggles are debated daily. Topics range from local petty projects to desperate pleas for aid, from managing the vast war effort to addressing sovereign worlds' concerns. The roughly cylindrical chamber features walls lined with repulsorlift platforms where Senators and advisors observe debates. Platforms detach to allow Senators to address the Supreme Chancellor or each other face-to-face at the central podium.

  - title: "Jedi Temple"
    keywords: "coruscant, jedi temple, jedi council, learning, force, training, library, vaults"
    category: "location"
    priority: 9
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      The ancient Jedi Temple stands as the center of Jedi learning and power, its five distinctive spires towering over a massive ziggurat structure. Within lie training facilities, vast libraries, living quarters, secure hangars, and rumored secret chambers. The High Council Chamber convenes to monitor the war effort, assign Jedi to critical missions, review Padawan advancement, and study the Force's role in galactic events. Public access is severely restricted, and speculation abounds about the Temple's true secrets.

  - title: "The Works"
    keywords: "coruscant, industrial sector, manufacturing, derelict, toxic, clandestine meeting, dangerous"
    category: "location"
    priority: 7
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      The Works comprise a sprawling industrial center once dedicated to manufacturing construction-related products—tools, droids, specialized vehicles, and building materials. Long since abandoned by commerce, these massive complexes now slowly deteriorate into dangerous ruins. Noxious gases accumulate in sealed chambers, and corrosive liquids threaten vital support structures, making the air unexpectedly toxic. As one of the least populated sectors in Galactic City, the Works serve as an ideal clandestine meeting ground for those desperate or bold enough to brave the hazards.

  - title: "The Zillo Beast Incident"
    keywords: "coruscant, zillo beast, monster, rampage, building-sized creature, chancellor"
    category: "concept"
    priority: 8
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      One of the most spectacular and unexpected events of the Clone Wars occurred when a massive Zillo Beast, originally brought from Malastare for study, escaped its holding facility on Coruscant. The building-sized creature tore through the heart of Galactic City, damaging dozens of structures before seizing the Chancellor's speeder. The beast was ultimately halted by Jedi action, leaving a trail of destruction through the capital's urban landscape.

  - title: "Battle of Coruscant"
    keywords: "coruscant, battle, separatist fleet, chancellor kidnapping, orbital combat, clone defenders, jedi rescue"
    category: "concept"
    priority: 10
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      One of the Clone Wars' most critical engagements erupted in Coruscant's orbital space when a massive Separatist fleet launched a surprise attack on the capital itself. The assault temporarily succeeded in seizing the Chancellor, but the attack was ultimately repelled by stalwart clone defenders, the Republic Fleet, and a daring Jedi rescue mission. The battle demonstrated both Coruscant's vulnerability and the fragility of the Republic's position.

  - title: "Wookiee Force Sensitivity and Abduction"
    keywords: "wookiee, force-sensitive, kashyyyk, rwookrrorro, kidnapping, hunter"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    zone_scope: "kashyyyk,rwookrrorro"
    content: |
      A Trandoshan hunter has abducted a young Force-sensitive Wookiee from Kashyyyk, an exceptionally rare occurrence. The Wookiees discovered and disabled the hunter's vessel but he escaped into the dark lower levels of the forest canopy. Infrared vision grants Trandoshans an advantage in these lightless depths where Wookiees fear to tread. The child's mother, bearing a fresh blaster wound to her shoulder, desperately searches the city above while her people comb the mid-levels, unaware their quarry has descended far below.

  - title: "Mandalore: Monarchy and Mercenary Tradition"
    keywords: "mandalore, monarchy, mercenaries, sundari, outer rim, starships"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    zone_scope: "mandalore,sundari"
    content: |
      Mandalore remains a monarchy in the Outer Rim, its 4 million inhabitants—predominantly human—sustaining an ancient warrior culture. The royal seat in Sundari overlooks both jungle and desert terrain, while the moon Concordia holds strategic significance. The planet's primary export has long been mercenaries and starship construction, drawing those seeking employment or vessels across the galaxy, though Mandalore maintains no major hyperspace routes, preserving its relative isolation.

  - title: "Felucia: Contested Sector Stronghold"
    keywords: "felucia,clone wars,separatist,republic,blockade,droid,outpost,104th battalion"
    category: "location"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    zone_scope: "felucia"
    content: |
      Felucia has been a critical battleground since the early Clone Wars, with Separatists and Republic forces locked in sustained combat over the planet and its nearby trade routes. The Separatists achieved initial dominance through orbital blockade and overwhelming droid deployment, but their hold weakened after the Republic destroyed their medical station and eliminated their Vulture droid garrison. The planet remains strategically vital, with the Republic mounting renewed offensives to drive Separatist forces completely from the sector. Felucia's lush terrain and valuable crop resources make it a prize worth fighting for, even as both sides pour resources into the endless conflict.

  - title: "Felucia Agricultural Raids"
    keywords: "felucia,farm,outlaw,crop,droid,mystery,attack,theft"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "bounty"
    zone_scope: "felucia"
    content: |
      Across Felucia's farmland, a wave of mysterious attacks has devastated agricultural operations. Raiders burn vast fields of valuable crops, destroy protective droids, and steal provisions—targeting multiple farms in coordinated strikes. Local authorities, overwhelmed by Clone Wars priorities, have little resources to spare for what they consider minor threats. The attacks appear deliberate and organized, suggesting the raiders either possess significant skill or deliberately wish to be pursued. Gossam traders and farmers struggle to protect their livelihoods as the conflict above draws military attention away from rural security.

  - title: "Kashyyyk: Forest Fortress of the Wookiees"
    keywords: "kashyyyk,wookiee,forest,wroshyr,temperate,city,hidden,native"
    category: "location"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Kashyyyk is a lush, densely forested world of towering wroshyr trees whose oldest specimens pierce the clouds, fringing wide oceans of deep blue. The temperate climate erupts occasionally into fierce mrawzim storms. Wookiee settlements hide among the canopy, built high above the dangerous forest floor where vicious predators and hazardous flora thrive—needle blossoms, syren plants, gnasps, web-spitting kinraths, and deadly anakkonas. The Wookiees are naturally protective of their homeworld and discourage outsiders, preferring isolation. When threatened, however, they are ferocious warriors whose code of honor and martial prowess are legendary.

  - title: "Wookiee Loyalty to the Republic"
    keywords: "kashyyyk,wookiee,republic,separatist,allegiance,honor,debt,conflict"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Wookiees initially sought to remain neutral in the Clone Wars, friendly to the Republic but determined to avoid bringing war to their forests. When Separatist forces invaded Kashyyyk to seize resources and control, the Republic answered their call, and the Wookiees' allegiance to the Republic became absolute. This commitment reflects a deep cultural value: the Wookiees never forget a debt unpaid and never abandon those who aid them. Their ferocity as warriors, combined with their unwavering loyalty, makes them formidable allies and dangerous enemies.

  - title: "The Trandoshan-Wookiee Blood Feud"
    keywords: "trandoshan,wookiee,kashyyyk,rivalry,enemy,blood feud,hunt,honor"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Trandoshans of the neighboring world in the Kashyyyk system and the Wookiees are sworn enemies locked in an ancient blood feud. The reptilian Trandoshans' desire to explore, colonize, and hunt new game clashed irrevocably with Wookiee efforts to preserve their homeworld. When Trandoshan colonists attempted settlement on Kashyyyk, the Wookiees repelled them militarily, igniting a cycle of violence that continues. Both species value honor codes and hunting prowess, yet few dare voice such parallels aloud. When Trandoshans and Wookiees meet, battle is inevitable and fierce—some say angry Wookiees have torn limbs from opponents over lesser provocations than this ancient enmity.

  - title: "Mandalorian Warriors and Culture"
    keywords: "mandalorian, armor, warrior, tradition, honor, combat, clan"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Mandalorian warriors are instantly recognizable by their distinctive armor and T-shaped visor helmets. They serve their clans and mercenary contracts across the galaxy, holding honor and tradition in the highest regard. However, centuries of warfare—especially a brutal civil conflict—devastated Mandalore's surface into a hostile desert wasteland. The planet now requires enclosed habitats, sealed dwellings, and colossal bio-cubes for survival, as exposure to the environment is lethal without protection.

  - title: "The New Mandalorian Movement and Pacifism"
    keywords: "new mandalorian, pacifist, duchess, neutral systems, council"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      The New Mandalorian movement emerged as a pacifist response to Mandalore's environmental destruction. A ruling Duchess championed this philosophy with broad citizen support, leading the Council of Neutral Systems—representing over 1,500 worlds. This faction maintains formal ties to the Republic but offers no military support to the Clone Wars effort. Black markets have become necessary for survival as rationing and food shortages worsen, with corruption spreading through government ranks.

  - title: "Death Watch and Mandalorian Traditionalism"
    keywords: "death watch, exile, concordia, militant, traditionalist, restoration"
    category: "organization"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      Those Mandalorians who reject pacifism were exiled to Concordia, Mandalore's moon, where they secretly formed Death Watch—a militant faction dedicated to overthrowing pacifist leadership and restoring ancient warrior traditions. Internal conflict between traditionalists and reformers periodically flares, creating tension that foreign powers have attempted to exploit. The Senate once considered occupation to suppress these conflicts, though evidence supporting intervention proved false.

  - title: "Mandalorian Armor and Reputation"
    keywords: "armor, reputation, tradition, prestige, impostor, mercenary"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Mandalorian armor carries profound cultural weight and inspires fear in enemies across the galaxy. The sight of the iconic suit alone signals battle-hardened warrior prowess. Some non-Mandalorians exploit this reputation by wearing the armor themselves, a practice that deeply offends true Mandalorians who view armor as inseparable from clan identity and earned honor. Armor appearance, maintenance, and customization are governed by strict tradition.

  - title: "Mandalorian Traditions and Customs"
    keywords: "tradition, clan, succession, fighting style, politics, heritage"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Mandalorian traditions stretch back centuries, governing everything from internal clan politics and inter-clan agreements to training regimens, combat styles, succession, and the treatment of armor. Even pacifist Mandalorians maintain many nonviolent traditional practices. Traditions form the bedrock of Mandalorian identity and social order, reinforcing bonds between clans and shaping individual roles within society.

  - title: "Mandalore's Hostile Environment"
    keywords: "desert, wasteland, environment, bio-dome, habitat, sealed, hostile"
    category: "location"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Mandalore's surface is now a barren, hostile desert wasteland—the aftermath of centuries of warfare and civil destruction. All settlements require protective infrastructure: isolated dwellings are hardened and sealed against lethal environmental exposure, while major cities are contained within enormous bio-cubes. Survival depends entirely on maintained life-support systems; venturing outside unprotected is swiftly fatal.

  - title: "High-Priority Missions in the Clone Wars"
    keywords: "clone wars, high command, missions, veterans, priorities, ramifications"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      High command on both sides holds its most accomplished units in reserve, assigning them to the highest priority and most challenging missions. Veteran characters rarely receive guard duty on desolate worlds far from the front; instead, they work with minimal support in the most treacherous environments. Success is rarely rewarded with respite—only ever-more-challenging assignments. High-priority missions carry significant ramifications for the campaign's storyline. When a droid fighter manufacturing plant is eliminated, the GAR may enjoy temporary space superiority as Separatists scramble to rebuild. Conversely, failure to defend a cargo vessel delivering supplies to an outpost world may cause that world to shift allegiances out of necessity.

  - title: "Experienced Clone Troopers and Veterans of the War"
    keywords: "clone troopers, veterans, experience, combat training, field experience"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      As the Clone Wars near their climax, vast armies of clone troopers fight alongside thousands of Jedi and countless soldiers from disaffected worlds against Separatist battle droids. Untold conflicts provide these warriors with field training, and survivors become true masters of their respective crafts. Those who endure learn to function effectively amid the distractions and stress of combat. Such accomplished characters possess robust skill sets, talents, and equipment beyond newly decanted clones. Heroes who have battled through extended Clone Wars campaigns naturally achieve appropriate expertise, though this requires Game Masters to present ever-more-challenging encounters.

  - title: "The Escalating Cost of War"
    keywords: "clone wars, devastation, casualties, collateral damage, moral cost, negotiation failure"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Clone Wars transform the galaxy through unrelenting conflict that neither side anticipated would last years. Thousands die in combat while entire worlds suffer devastation affecting soldiers and civilians alike. What began as a conflict between the Republic and the CIS, potentially preventable through negotiation, has become a grinding war of attrition where both sides grow increasingly desperate. The mounting casualties and destruction erode conviction among combatants at every level—from high command to frontline troops—forcing individuals to question whether the war's cost can ever be justified.

  - title: "Betrayal and Redemption in Wartime"
    keywords: "betrayal, redemption, moral crisis, conviction, abandonment, cause"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      As the Clone Wars drag on and losses mount, individuals throughout the conflict face profound moral crises. Some abandon their cause entirely, unable to reconcile their beliefs with the mounting death toll. Others seek redemption or ways to end the war before further escalation. NPCs become particularly effective vehicles for exploring these themes—their deathbed revelations, switches in allegiance, or final acts of redemption echo the larger tragedy unfolding across the galaxy. These moments of personal moral collapse or recovery can anchor campaign narratives and give weight to the conflict beyond tactical objectives.

  - title: "Galactic Fatigue and War Weariness"
    keywords: "clone wars, late stage, desperation, civilian impact, shortages, refugees, blockade, black market, protests"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      As the Clone Wars drag into their final stages, both the Republic and the Separatist Alliance grow increasingly desperate. Galactic fatigue permeates everyday life across worlds from the Outer Rim to Coruscant. Transports overflow with refugees at spaceports; shortages of imported foodstuffs disrupt meals; common household goods vanish into black markets as blockades strangle supply lines. Demonstrations erupt outside government buildings—some opposing the war, others demanding greater involvement. The collective weariness shapes the mood of any settlement, a backdrop of depletion and despair that colors all interactions.

  - title: "Political Instability and Crumbling Alliances"
    keywords: "alliances, political shifts, treaties, renegotiation, faction switching, troop withdrawal, resource exhaustion"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      In the face of mounting protests and shortages, alliances begin to fracture as involved parties demand ever-greater sacrifices. Established allies seek to alter previous agreements; promises require renegotiation as resources dry up. Military units suddenly lose access to facilities when previously allied governments terminate treaties without warning. Smugglers and operatives working the margins discover unexpected changes in planetary security as troops are rapidly reassigned. These shifts can reverse just as abruptly in response to new political maneuvering, creating an environment of constant uncertainty where today's partner may become tomorrow's enemy.

  - title: "Mass Combat in the Clone Wars"
    keywords: "clone wars, large scale battles, vehicles, ships, orbital support, mass combat rules, epic engagements"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Clone Wars are characterized by vast, coordinated battles involving hundreds or thousands of troops, supported by combat vehicles and starships in orbital positions. These engagements require different approaches than small-unit skirmishes. The scale and complexity of such conflicts create opportunities for characters to distinguish themselves as commanders and strategists, not merely individual combatants. Whether commanding clone forces, coordinating Separatist droids, or attempting to navigate the chaos, characters can leverage their unique abilities to influence outcomes far beyond their personal combat prowess.

  - title: "The Separatist Leadership's Final Days"
    keywords: "separatist leadership, betrayal, grudge, shadowy figure, military collapse"
    category: "concept"
    priority: 7
    planet: "geonosis"
    surface_affinity: "bounty"
    content: |
      As the Clone Wars near their end, the Separatist leadership faces annihilation not by Republic hands but by treachery from within. A shadowy dark-side figure eliminates separatist commanders while simultaneously striking down the CIS navy, shutting down their ability to command forces. Any separatist leaders who survive this purge will harbor deep grudges against the unseen architect of their downfall, creating opportunities for revenge plots and desperate survival scenarios.

  - title: "Moral Conflict and Belief Systems in War"
    keywords: "moral conflict, belief systems, core values, war decisions, faction loyalty"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Soldiers and operatives often find themselves ordered to act in ways that conflict with their core beliefs and training. These orders may contradict a character's fundamental moral code, creating internal struggle and dramatic choice. The mechanical consequences of such actions matter less than the moral weight players must consider when making decisions that align or clash with their character's values. This tension between obedience and conscience is especially acute for clone troopers and Force-sensitive warriors.

  - title: "Clone Veterans and Civilian Life"
    keywords: "clone trooper, veteran, civilian sector, adjustment, employment, security work"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone troopers who survive the Clone Wars find transition to civilian life profoundly difficult. Their entire education centered on military discipline and combat doctrine, leaving them unprepared for trades, farming, or professional civilian careers that require years of specialist training. Many struggle to find meaningful employment and drift toward security work, mercenary contracts, or bounty hunting—fields where their combat training holds value. This creates tension as former clone brothers now serve in competing capacities, sometimes facing each other across hostile lines.

  - title: "Clone Sergeant"
    keywords: "clone sergeant, field promotion, tactical leadership, chain of command, platoon command"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone Sergeants lead by field experience as much as formal training. Many were promoted from common trooper ranks as casualties mounted and losses required experienced soldiers to fill leadership gaps. Serving under clone lieutenants or Jedi commanders, sergeants must take charge when plans unravel or communications fail. Their battle experience has proven as effective as advanced training, and many have distinguished themselves through creative thinking and unwavering dedication during critical situations.

  - title: "Senate Guard"
    keywords: "senate guard, blue armor, coruscant, galactic senate, elite security, corruption"
    category: "organization"
    priority: 7
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The blue-clad Senate Guard form an elite security force of specially trained soldiers tasked with protecting the Galactic Senate, the Senate District, and the Supreme Chancellor. During the Clone Wars, their responsibilities have been shared with the Coruscant Guard, possibly due to increased threats or loss of confidence from higher authority. Recent cases of corruption and betrayal have damaged their reputation, though they remain skilled and disciplined protectors. Weapon choice varies with assigned duties and limited personal preference.

  - title: "Republic Military Conflict"
    keywords: "clone wars, republic casualties, jedi disagreement, military tactics, victory uncertain"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      As the Clone Wars drag on, casualties mount and victory remains elusive. Conflict grows between Jedi warriors and Republic military command, both fighting for the same cause but often disagreeing on methods and strategy. The outcome of the conflict remains uncertain, and soldiers continue fighting despite mounting losses and questions about direction from above.

  - title: "B1 Battle Droid Limitations"
    keywords: "battle droid, b1, separatist, cis, tactical limitations, independent operation"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Since their redesign following the Battle of Naboo, B1 battle droids were engineered to function independently of a control ship, yet they continue to be mass-produced for speed and cost-efficiency. The average B1 lacks tactical thinking and often struggles to comprehend even simple orders. While tactical droids and commanders might provide sensible battle plans, B1s cannot adapt when encountering unexpected situations, making them inflexible in the field.

  - title: "B1 Supervisor Droid"
    keywords: "supervisor droid, b1 command, cis, separatist droid, mini probe, tactical adaptation"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The B1 Supervisor Droid was designed to bridge the gap between mindless B1 units and sophisticated tactical droids. Equipped with a mini probe for elevated battlefield surveillance, supervisors relay adapted orders to regular B1 units. However, their success has been limited—tactical droids resent supervisors overriding orders, and supervisors often create confusion by issuing conflicting directives. Some B1s begin second-guessing orders themselves, which proves disastrous. Existing supervisor droids see only occasional deployment when T-series droids are unavailable, and no plans exist for further production.

  - title: "Buzz Droids"
    keywords: "buzz droid, pistoeka sabotage droid, disposable weapon, swarm tactics, starfighter sabotage"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Properly known as Pistoeka sabotage droids, buzz droids are disposable weapons typically deployed via discord missiles. Using specialized tools, they swiftly dismantle starfighters and enemy vehicles. Individually insignificant, a swarm of buzz droids can make short work of a craft by targeting vital systems. Their coordinated attacks inflict planetary-scale damage with breach capability.

  - title: "BX-Series Commando Droid"
    keywords: "commando droid, bx-series, elite battle droid, cis, special operations, infiltration"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The BX-Series Commando Droid represents the pinnacle of CIS droid engineering—a sophisticated elite unit far superior to standard B1s. Physically stronger, tougher, and more dexterous, these droids are programmed for versatility: stealth missions, guard duty, ground assault, and precision sniping. Their humanoid design allows them to wear clone armor for infiltration purposes, and their vocaulator enables voice alteration during covert operations. Though the perfect weapon for the Confederacy, manufacturing costs prevent widespread deployment; they are reserved for special missions and critical battles where they operate in small, elite groups.

  - title: "Octuptarra Tri-Droid"
    keywords: "octuptarra, tri-droid, eight-legged, walker, laser turrets, photorecepors, 360-degree vision, separatist droid"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Octuptarra is a large eight-legged droid platform capable of traversing difficult terrain and scaling vertical structures with remarkable agility. Its orb-shaped body bristles with photorecepors and laser turrets positioned to grant 560-degree vision, allowing it to spin and engage multiple targets simultaneously. Though expensive to manufacture, even one or two Octuptarras added to an assault force can shift the tide of battle, making them valuable despite their cost. Their long legs remain vulnerable to lightsaber attacks, so they are typically positioned behind supporting troops during engagements.

  - title: "Rocket Trooper Super Battle Droid"
    keywords: "rocket trooper, super battle droid, b2-rp, rocket pack, separatist, tactical droid"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      An advanced variant of the B2-RP battle droid series, the Rocket Trooper features an integrated rocket pack enabling ship-to-ship assault insertions and aerial maneuverability unmatched by ground-based super battle droids. Foot-mounted thrusters allow it to hover steadily, providing enhanced targeting accuracy. Like all super battle droids, it sacrifices strategic thinking for raw combat power, but when operating under the direction of a tactical droid commander, a small squadron becomes a formidable strike force capable of rapid deployment and sustained pressure.

  - title: "Super Tactical Droid"
    keywords: "super tactical droid, tactical droid, baktoid combat automata, separatist commander, military intelligence, autonomous"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Designed by Baktoid Combat Automata as a successor to the T-series, the Super Tactical Droid represents a quantum leap in droid command capability. Its formidable physique houses an intellect capable of instantaneous strategic planning, combined with extensive programming in military tactics, interrogation methods, and unwavering loyalty to the Separatist cause. Its capacity for autonomous thought rivals the most sophisticated organic minds, allowing it to command entire armies single-handedly. During the Clone Wars, the Separatists deploy these droids extensively, placing immense faith in their ability to orchestrate complex operations across multiple theaters of war.

  - title: "The Clone Wars: Years of Weariness"
    keywords: "clone wars, coruscant, senate district, bombing, exhaustion, soldiers, jedi, peacekeepers, military generals"
    category: "concept"
    priority: 9
    planet: "coruscant"
    surface_affinity: "news"
    content: |
      The bombing of Coruscant's Senate District power generator shattered hopes for peace and marked the beginning of a seemingly endless galactic conflict. Years of continuous warfare have ground down soldiers across all ranks, from frontline troops to command staff, with no resolution in sight. The Jedi Order finds itself stretched ever thinner, tasked simultaneously with maintaining their traditional roles as peacekeepers while serving as military generals commanding clone armies. The strain of this duality weighs heavily as the war deepens.

  - title: "Nightbrothers of Dathomir"
    keywords: "nightbrother, dathomir, zabrak, warrior clans, servants, high pain tolerance, enchanted weapons, curse"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    zone_scope: "dathomir"
    content: |
      The Nightbrothers are warrior clans descended from enslaved Zabrak stock, bound to serve the Nightsisters of Dathomir through harsh discipline and an embrace of strength as the ultimate virtue. Weakness is punished by death, and only those who survive the brutal training prove worthy. Though they receive no direct instruction in magicks, proximity to the Nightsisters' sorcery and the tainted energies of Dathomir enhance their perception and reflexes beyond normal limits. Those who distinguish themselves in battle may be granted weapons imbued with Nightsister curses, enchantments that sap the strength from their enemies.

  - title: "Death Watch Commandos"
    keywords: "death watch, mandalorian, commandos, jetpack, traditional armor, warrior code, concealed weapons, explosives"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Death Watch is a Mandalorian faction of elite commandos driven by a vision of restoring Mandalore to its former martial glory. These warriors live by a strict code that respects skill and valor above all else, yet they employ any means necessary—sabotage, explosives, flame throwers, and ambush tactics—to achieve victory. Clad in full traditional Mandalorian armor and equipped with jetpacks, they strike with precision and mobility, swooping in to devastate enemies before withdrawing to regroup. Their armor conceals an array of surprises, and they take fierce pride in demonstrating their strength and bravery in every engagement.

  - title: "Neutrality in the Clone Wars"
    keywords: "neutral, separatists, republic, independence, local conflict, uncertainity, shadows"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      In a galaxy torn between Republic and Separatist forces, many worlds and individuals choose to remain neutral, waiting to see who will emerge victorious or preferring to work outside the system entirely. On worlds with their own internal conflicts, the larger war often becomes secondary to immediate local struggles. This neutrality offers both opportunity and danger—neutral parties may trade with either side, harbor refugees, or become unwitting pawns in the greater conflict. Those who navigate these treacherous waters must be cautious, as both the Republic and the Separatists view non-alignment with suspicion.

  - title: "Separatist Droid Factories"
    keywords: "separatist, droids, factories, upgraded models, b1 battle droids, production, army replacement"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Separatist droid armies, though sometimes dismissed as inferior to clone troopers, have proven formidable through sheer numbers and tactical persistence. B1 battle droids have shown critical deficiencies in key engagements, prompting Separatist command to accelerate production of upgraded and specialized models. The CIS droid foundries work ceaselessly to produce variants suited to specific environments and missions—aquatic droids for flooded worlds, reconnaissance units for intelligence gathering, and heavily modified assault units. This industrial output, replaceable at scale and requiring no food, rest, or morale, has become the Separatists' greatest strategic asset.

  - title: "Aqua Droids"
    keywords: "aqua droid, separatist, water combat, twin propellers, retractable blaster, amphibious, underwater assembly"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Aqua droids are streamlined combat units designed to dominate aquatic environments where standard battle droids prove clumsy and ineffective. Twin propellers grant them exceptional speed and maneuverability through water, while their retractable blaster systems allow them to engage targets both above and below the surface with equal lethality. Though lightly armored, their aquatic agility provides a decisive combat advantage in flooded ruins, underwater installations, and coastal strongholds. Beyond combat, they are versatile enough to perform complex engineering tasks such as assembling starship components submerged or serving as ground troops when deployed on land.

  - title: "Arakyd Ringneck Reconnaissance Droid"
    keywords: "ringneck, arakyd, recon droid, probe droid, reconnaissance, data gathering, holonet, dual blasters"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Arakyd Ringneck reconnaissance droid is a small, gray orb-shaped unit designed to gather intelligence for Separatist forces. Equipped with integrated long-range sensors and holonet communicators, it observes designated targets or explores hostile territory while relaying critical data immediately back to CIS command. Its appendages allow it to climb, grasp, and manipulate objects, and it can transition from airborne flight to ground crawling to evade detection. Though fragile compared to combat droids, its speed and diminutive silhouette make it difficult to spot and track. When cornered, its dual blaster pistols provide minimal but real defensive capability, often enough to disable a pursuing enemy.

  - title: "Jedi Knight: Warrior and Leader of the Republic"
    keywords: "jedi knight, clone wars, general, commander, leadership, force warrior"
    category: "person"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Jedi Knights serve as the primary military and diplomatic force of the Galactic Republic during the Clone Wars, commanding clone trooper battalions against the droid armies of the Separatist Confederacy. They function as generals, diplomats, and symbols of Republic authority—often the most visible face of the war to the civilian populations they defend. Knights must balance martial prowess with emotional discipline, making impossible decisions about risk and sacrifice without allowing fear or hesitation to cloud their judgment.

  - title: "Jedi Padawan: The Path of Learning and Balance"
    keywords: "padawan, learner, jedi training, force sensitivity, apprenticeship"
    category: "person"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Padawans are learners who study not merely facts and techniques, but the deeper philosophies of fluidity, flexibility, and the nature of understanding itself. During the Clone Wars, Padawans serve alongside their Masters as subcommanders and aides on the battlefield, gaining practical experience in warfare, negotiation, and the application of Force power under real conditions. Many senior Jedi have rediscovered the Padawan path as a means to recover lost balance amid the chaos of the conflict.

  - title: "Jedi Order Structure in Wartime"
    keywords: "jedi hierarchy, master, knight, padawan, initiate, youngling, jedi council"
    category: "organization"
    priority: 8
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      The Jedi Order maintains a formal hierarchy that has taken on heightened significance during the Clone Wars: Initiates and younglings train at the Temple, Padawans receive one-on-one tutelage from Masters, Knights assume independent field command, and Masters advise the Order and Republic from Coruscant. This structured system allows the Order to rapidly deploy trained warriors while maintaining continuity of instruction. Titles now directly correspond to wartime responsibilities, with Knights leading troops and Padawans supporting their Masters in active combat zones.

  - title: "The Jedi as Generals and Emergency Response"
    keywords: "jedi general, military command, crisis response, republic forces, separatist conflict"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      Since the outbreak of the Clone Wars, Jedi have shifted from philosophical pursuits to active military and emergency response roles. Rather than contemplating esoteric Force mysteries, they now spend their time commanding clone troops, uncovering Separatist saboteurs and operatives, and helping civilian populations survive the devastating effects of war. The urgency of the conflict has reshaped Jedi practice, turning many toward practical application of their skills rather than deeper spiritual inquiry.

  - title: "Jedi Leadership: Duty and Compassion"
    keywords: "jedi compassion, leadership, suffering, the force, republic duty"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Jedi Knights serve as guides to compassion and justice, understanding that the Force exists in all living beings and that suffering ripples through it. Their acts of charity, teaching, and defense inspire others to do likewise. Yet this compassion must be tempered with stoicism—a Knight cannot allow emotion to cloud critical decisions about who should risk their lives for the greater good. Knights must trust the Force and lead with clarity, dispelling hesitation and confusion in themselves and their troops, for a doubting commander cannot serve a galaxy in turmoil.

  - title: "Clone Trooper: Soldier of the Republic"
    keywords: "clone trooper, clone soldier, republic army, clone battalions, elite infantry"
    category: "person"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone troopers form the backbone of the Republic's military forces during the Clone Wars, operating under the command of Jedi generals and officers. These trained soldiers specialize in ranged and melee combat, discipline, and resilience under fire. While Jedi serve as symbols of the Republic, clone troopers represent the practical force that holds the line—disciplined, capable, and increasingly hardened by prolonged conflict against Separatist droid armies and battle-hardened foes.

  - title: "Umbaran Physiology and Sensory Adaptation"
    keywords: "umbara, shadow dweller, darkness, light sensitivity, deception, entrancing gaze"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Umbarans are beings adapted to their homeworld's perpetual darkness, granting them natural advantages in shadowed environments. Their distinctive entrancing gaze—a subtle hypnotic quality reflected in their Charm and Deception abilities—makes them formidable negotiators and infiltrators. However, their eyes are sensitive to bright natural light, such as direct sunlight, causing discomfort during daylight operations. This biological quirk makes Umbarans particularly valuable assets during night operations and in the shadowed corridors of orbital stations, though deployments to sun-drenched worlds require tactical adjustment.

  - title: "Clone Soldier Training and Doctrine"
    keywords: "clone soldier, grand army of the republic, accelerated training, genetic identity, battlefield roles"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone Soldiers form the backbone of the Grand Army of the Republic, products of accelerated synthetic growth and rapid training programs designed to deliver combat-ready soldiers swiftly. All clones share baseline competency in Athletics, Brawl, Cool, Discipline, Medicine, and Ranged weapons—making them universally reliable across virtually every battlefield role, from infantry to pilots to officers. Their shared genetic identity and core training create a powerful consistency: commanders can predict clone behavior and capability with remarkable precision. This genetic homogeneity grants them a significant tactical advantage against Separatist droid forces, whose mechanical nature cannot replicate organic adaptability.

  - title: "Clone Individuality and Identity"
    keywords: "clone soldier, individuality, heroism, personality, distinct identity, self-sacrifice"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Despite their genetic uniformity, Clone Soldiers forge distinct identities through accumulated experience, unique acts of heroism, and personal interests. Each clone struggles against the mirror image of his comrades, driven to carve out a recognizable niche within the vast Grand Army. These soldiers develop personal ambitions and goals beyond their assigned roles—pursuits that define them as individuals rather than interchangeable units. Paradoxically, this drive toward individuality coexists with a deep conditioning toward loyalty to the Republic and a willingness to sacrifice themselves utterly for mission success, even unto death.

  - title: "Clone Officer Ranks and Command Structure"
    keywords: "clone officer, sergeant, lieutenant, captain, commander, rank, hierarchy, leadership"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Grand Army of the Republic's officer corps spans from sergeants managing nine-trooper squads to commanders overseeing full regiments of sixteen companies. Sergeants develop close working relationships with their troops, learning each clone's particular strengths and assigning tasks accordingly; they fight alongside their squads at the front lines. Lieutenants command platoons of four squads, while captains lead companies of four platoons. Commanders, answering directly to Jedi generals, operate with significant independence and must manage extended missions in isolation from higher command. Many Clone Officers are trained to perform at their assigned rank from inception rather than promoted through standard advancement.

  - title: "Clone Officer Leadership Qualities"
    keywords: "clone officer, leadership, knowledge warfare, cool, command, tactics"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone Officers combine practical battlefield competence with strategic knowledge critical to unit command. They must master Knowledge of Warfare and Outer Rim operations, maintain Cool under pressure, and exercise Leadership over subordinates. Officers balance two command philosophies: sometimes serving as trusted comrades to their soldiers, at other times representing absolute authority tolerating no dissension. Success requires officers to anticipate complications before they manifest and to possess detailed understanding of their units' capabilities so they can deploy appropriate responses to any tactical situation.

  - title: "Clone Pilot Training and Specialization"
    keywords: "clone pilot, starfighter, republic navy, training, squadron, specialization"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone Pilots represent the skilled aviators of the Republic Navy, trained beyond basic soldiering to master the complexities of aerial and space combat. Every Clone Soldier receives rudimentary piloting knowledge, but Clone Pilots undergo additional specialized training in Gunnery, Mechanics, Piloting (Planetary), and Piloting (Space). They serve in squadrons under Clone Officer command, often reassigned between different craft based on mission needs. The core starfighter assignments include the 7-95 Headhunter, V-19 Torrent, and ARC-170 starfighters, with transport pilots flying Low Altitude Assault Transports (LAATs) and Wu-class attack shuttles. Some Clone Pilots operate ground-support walkers like AT-RTs and AT-TEs, though these fall outside the naval chain of command.

  - title: "Clone Trooper Infantry Roles and Equipment"
    keywords: "clone trooper, infantry, specialization, equipment, combat roles, cold assault, scuba, medic"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone Troopers form the backbone of the Grand Army of the Republic, deployed as frontline infantry across diverse battlefields—ground, underwater, and within space stations. Their basic competency determines the army's effectiveness against Separatist droid forces. Standard Clone Troopers gain proficiency in Gunnery, Perception, Ranged (Heavy), and Resilience skills. Within the broader trooper specialization, soldiers fill more specific combat niches: cold assault troopers, SCUBA troopers, paratroopers, flame troopers, medics, ARC troopers, and scout troopers. Each role carries distinctive equipment and specialized training. Within squads, individual troopers assume particular responsibilities—one might carry a Z-6 rotary blaster cannon while others wield explosives, communications gear, medpacs, or mission-specific tools.

  - title: "Clone Armor Markings and Unit Identification"
    keywords: "armor markings, clone identification, jedi coordination, personal insignia, recognition"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      As the Clone Wars have progressed, the Republic has learned that enemy units exploit the standardized armor schemes for easy target identification. Jedi commanders have encouraged Clone Officers to develop unique, personalized armor markings that distinguish individual soldiers and units while making targeting more difficult for adversaries. This shift away from uniform standard schemes represents an adaptation to combat experience—distinctive colorful markings, unit emblems, and personal insignia are becoming increasingly common as Clone Officers assert their command identities. The trend suggests that standard army-wide armor patterns will soon be largely abandoned in favor of more varied and individualized platoon or squad-level designs.

  - title: "Republic Navy Starfighter Assets"
    keywords: "republic navy, starfighter, headhunter, v-19 torrent, arc-170, capital ships, squadrons"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      Interplanetary conflict demands control of orbital and atmospheric space. Capital ships coordinate large-scale naval engagements, but starfighter wings remain vital to every campaign. These smaller, nimble craft exploit their reduced profiles and varied armament configurations to evade detection while filling diverse tactical roles—escort, reconnaissance, strike, and support. Military transports deploy from capital ships through active war zones under starfighter screen protection, carrying troops and equipment for planetary assault operations. The Republic Navy's core fighter complement includes the versatile 7-95 Headhunter, the agile V-19 Torrent, and the heavy ARC-170, each suited to different mission profiles and squadron compositions. The combination of capital naval power and coordinated starfighter squadrons provides the Republic with a formidable instrument for projecting military force across the galaxy.

  - title: "Clone Officer Command Structure"
    keywords: "clone officer, command, squadron, leadership, tactics, coordination"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone Officers lead Clone Pilot squadrons and Clone Trooper units, possessing both advanced combat skills and strategic understanding. Officers master piloting disciplines alongside their command training, enabling them to coordinate complex aerial operations and ground assaults. Infantry experience gives Clone Officers insight into the risks faced by frontline soldiers, while pilot experience helps them appreciate air support requirements. This dual competency—combining tactical expertise with intimate knowledge of operational conditions—allows Clone Officers to make rapid, informed decisions in volatile combat situations. Officers receive additional career skills in Cool, Leadership, Knowledge (Outer Rim), and Knowledge (Warfare), reflecting their broader responsibilities across diverse theaters of operation.

  - title: "Separatist Military Assault"
    keywords: "separatist, tanks, battle droids, invasion, offensive, valley, farming"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Separatist forces advance with brutal efficiency, deploying armored tanks that float ominously across open terrain while disgorging waves of battle droids from bulky transports. The assault offers no negotiation or warning—simply overwhelming firepower directed at civilian populations and settlements. Tanks sweep valleys at dawn, opening fire on the first structures encountered while droid phalanxes follow in perfect lockstep formation, their crimson blaster bolts filling the air with relentless suppressive fire. The coordination between armor and droid infantry creates a crushing wave difficult for lightly-armed defenders to resist.

  - title: "Clone Trooper Armor and Markings"
    keywords: "clone trooper, plasteel armor, white armor, helmet markings, red lines, blaster rifle"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone troopers wear chipped and battered white plasteel armor, bearing unit or personal markings in colored lines—such as bold red snarling designs on helmets—that distinguish individuals and squads. Despite weathering and battle damage, the armor maintains its distinctive appearance. These soldiers carry heavy blaster rifles and move with practiced discipline, capable of suppressing droid formations through controlled bursts and tactical positioning. The friendly, reassuring voices beneath the helmets often belie the fierce competence of these Republic defenders.

  - title: "Jedi with Lightsaber"
    keywords: "jedi, lightsaber, green blade, master, robed figure, force powers"
    category: "person"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Jedi are brown-robed Force-users wielding lightsabers—weapons of brilliant green energy that hiss audibly when ignited. They possess the ability to deflect blaster bolts skyward in blazing arcs and bisect battle droids with surgical precision. Jedi work alongside clone troopers in coordinated defense, with masters commanding forces from gunship insertions while younger apprentices engage enemies directly. Their presence transforms military engagements, turning desperate situations into decisive victories through superior reflexes and Force-sensitivity.

  - title: "Republic Gunships in Combat"
    keywords: "gunship, aircraft, republic, assault, insertion, open doors, tactical support"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Republic gunships are heavily-armed hovering aircraft capable of rapid insertion of Jedi and clone trooper forces into hot combat zones. They feature open side doors from which personnel can leap directly into engagement areas, and squadron formations can be coordinated to strike objectives simultaneously. The sight of gunships howling over mountain passes signals the arrival of organized Republic military response to Separatist incursions, often turning the tide of local battles through concentrated firepower and tactical mobility.

  - title: "Battle Droid Formations and Tactics"
    keywords: "battle droid, droid, formation, lockstep, blaster, panic, infantry"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Battle droids march in perfect lockstep phalanxes, maintaining rigid formation discipline as they advance through terrain. Their coordination breaks down when engaged by trained opponents—panic spreads through their ranks, causing them to spray wildly inaccurate shots in desperation. Despite this vulnerability to focused defense, the sheer volume of droids disgorged from Separatist transports creates overwhelming numbers that can exhaust defenders. Droids are slender-framed and relatively fragile, exploding into pieces under concentrated blaster fire, yet they represent the backbone of Separatist military power.

  - title: "Mountain Pass Refugee Flight"
    keywords: "refugees, evacuation, mountain pass, civilians, flight, desperation"
    category: "location"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      When Separatist forces attack farming settlements, civilians flee upward through narrow mountain passes hemmed by sharp slopes of rock and scree. The terrain both hems them in and slows their flight—parents, children, and neighbors struggle and claw desperately to reach dubious safety on highland plateaus. These mountain defiles become choke points where tactical defense can shelter evacuees; large boulders and debris provide cover from blaster fire while defenders hold narrow approaches against pursuing droid forces.

  - title: "Destroyed Farmland and Burning Villages"
    keywords: "farmland, destroyed, burned, valley, hamlet, river, ash"
    category: "location"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      When Separatist forces sweep through farming valleys, they leave devastation in their wake. Fields devoured by flames, once-clear alpine rivers running black with ash, farming hamlets reduced to smoking ruins—the destruction is total and deliberate. The landscape transforms from productive agricultural terrain feeding small communities to charred wasteland, with villagers forced to abandon ancestral homes and livelihoods. Simple farmers armed only with old hunting blasters prove no match for this mechanized onslaught.

  - title: "Clone Wars Era—The Galaxy in Conflict"
    keywords: "clone wars, separatist alliance, galactic republic, conflict, diplomacy, neutral systems"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      The galaxy is embroiled in the Clone Wars, with the Separatist Alliance having seceded from the Galactic Republic after years of mounting tension. Worlds withdraw from Republic allegiance, driven by Separatist diplomatic efforts and military pressure. Both factions seek alliances with neutral systems while fighting bitter campaigns. Beyond the battlefields, smugglers, scavengers, and pirates find lucrative opportunities to profit from the ongoing conflict. The war shows no signs of ending, reshaping the political and military landscape of known space.

  - title: "Inhibitor Chips in Clone Soldiers"
    keywords: "clone brain chip, obedience, loyalty, biological implant, emotional control"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Republic clone troopers are implanted with biological chips that modify emotional responses, compel obedience to authority, and direct aggression toward enemies. These chips appear on advanced medical scans merely as enlarged glands stimulating adrenaline and hormone production. Being biological rather than electronic, they resist EMP interference and have minimal rejection risk from a clone's immune system.

  - title: "Geonosian Species and Physiology"
    keywords: "geonosian, insectoid, chitinous, winged, castes, short lifespan, genetic modification"
    category: "person"
    priority: 9
    planet: "geonosis"
    surface_affinity: "ambient"
    content: |
      Geonosians are winged, insectoid humanoids with chitinous skin ranging from red-orange to green-blue. Their extra-jointed limbs and functional or vestigial wings vary by caste. With lifespans averaging only sixty-five years, they mature rapidly. Hive castes deliberately engineer genetic variants among worker and warrior classes through selective breeding and intentional modification, though these experiments remain erratic and subject to aristocratic whim.

  - title: "Geonosian Hive Society and Caste System"
    keywords: "geonosian hive, queen, aristocracy, worker caste, warrior caste, oppression, revolt"
    category: "faction"
    priority: 9
    planet: "geonosis"
    surface_affinity: "dialogue"
    content: |
      Geonosian society orbits hives led by queens whose authority varies—some merely breed while aristocrats rule, others manipulate from shadow, and rare few govern directly. The warrior caste enforces law and suppresses dissent; workers function as enslaved laborers producing vast industrial output. Inter-hive competition for resources and territory periodically erupts into warfare. Worker revolts are routinely crushed; warrior uprisings may prompt aristocrats to seek reinforcements from rival hives to quell their own populations.

  - title: "Geonosis: Desert World and Hive Architecture"
    keywords: "geonosis, desert, sandstorm, radiation, hive spires, tunnels, moons, ring system, volcanic"
    category: "location"
    priority: 9
    planet: "geonosis"
    surface_affinity: "ambient"
    content: |
      Geonosis orbits in harsh desert conditions scoured by massive sandstorms and intense solar radiation. Hollow hive colonies rise as towering spires offering refuge; underground tunnels connect hives and enable expansion or inter-hive siege warfare. The planet's fifteen moons drive volcanic activity, and a recently-formed ring system features in Geonosian mythology as punishment from an angry universe. Located in the Outer Rim's Arkanis sector near Tatooine, Geonosis lay beyond Republic jurisdiction, allowing unchecked arms buildup for Separatist interests.

  - title: "Geonosian Language and Communication"
    keywords: "geonosian hive-mind language, clicks, pheromones, touch, body motion, miscommunication, basic"
    category: "concept"
    priority: 6
    planet: "geonosis"
    surface_affinity: "dialogue"
    content: |
      Geonosians communicate through clicked and guttural vocalizations layered with tactile contact, pheromone emission, and body language. Offworlders learning their spoken tongue often misinterpret intent, unaware of the full spectrum of non-verbal nuance. Aristocrats may learn Basic; traveling Geonosians rarely speak it fluently, though simplified Basic communication bypasses the miscues inherent in their native speech.

  - title: "Geonosis Under Separatist and Republic Control"
    keywords: "geonosis droid production, separatist loyalty, republic occupation, hive factions, war aftermath"
    category: "location"
    priority: 8
    planet: "geonosis"
    surface_affinity: "news"
    content: |
      During the Clone Wars, Geonosis served as the Separatist Alliance's primary droid manufacturer, its hives fully committed to the Confederacy while lower castes endured intensified oppression. After the Second Battle of Geonosis, Republic forces occupy the world, prioritizing containment over governance. Some hives collaborate with the Republic to gain influence in the new regime; others retreat into hiding awaiting conflict's end; a few harbor insurrection plans if victory seems assured. Republic citizens remain largely unaware that Geonosians built the droid army.

  - title: "Kaminoan Isolationism and Genetic Artistry"
    keywords: "kamino, kaminoan, isolationist, genetic engineering, cloning, clone army, trade, secrecy"
    category: "faction"
    priority: 9
    planet: "kamino"
    surface_affinity: "news"
    content: |
      Kaminoans engineered survival on their flood-ravaged world through towering sea-anchored spires, genetic banks, and radical self-modification. As isolationists, they restricted offworld contact to vetted wealthy traders seeking their unparalleled biological and genetic services—particularly cloning. When a fallen Jedi proposed producing an entire clone army for the Republic, the Kaminoans weighed galactic exposure against generational wealth and Senate influence, ultimately accepting the commission that altered galactic history.

  - title: "Kaminoan Physiology and Sensory Adaptation"
    keywords: "kaminoan, tall, slender, elongated neck, oblong head, crest, large eyes, ultraviolet vision, white"
    category: "person"
    priority: 6
    planet: "kamino"
    surface_affinity: "ambient"
    content: |
      Kaminoans are tall, slender beings with distinctive elongated necks and oblong heads; males bear finlike crests. Their large dark eyes with white pupils perceive subtle color gradations and into the ultraviolet spectrum—explaining their cultural preference for white in dress and architecture, which to them comprises a rich palette of hues invisible to most species.

  - title: "Kaminoan Society: Genetic Planning and Social Flexibility"
    keywords: "kaminoan culture, genetic engineering, planned society, offspring modification, flexibility, uncertainty"
    category: "concept"
    priority: 5
    planet: "kamino"
    surface_affinity: "dialogue"
    content: |
      Kaminoan society is carefully planned, with offspring genetically engineered and life trajectories predetermined. Yet paradoxically, the culture maintains surprising flexibility and tolerance for uncertainty—a tension between control and adaptation that defines the species' approach to both internal governance and external opportunity.

  - title: "Padawan Training and Rank"
    keywords: "padawan, apprentice, jedi training, braid, kyber crystal, lightsaber"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      A Padawan becomes an apprentice after obtaining their kyber crystal and constructing their lightsaber. They wear a braid in their hair—or silka beads if hairless—to signify their dedication to learning under a Jedi Knight or Master. During the Clone Wars, Padawans serve as runners, attachés, and even lieutenants for their masters, thrust into roles they were not traditionally prepared for. Upon completing their training, the Padawan cuts off the braid or beads, symbolizing the severing of their attachment to their master and the beginning of their path as a Knight.

  - title: "Padawans in the Clone Wars"
    keywords: "clone wars, padawan, jedi council, war, training, ethics"
    category: "concept"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      When the Clone Wars began, most Padawans had not faced the stresses of galactic life, much less the fear and despair of war. Many Jedi Knights resisted the distraction of training an apprentice during a galaxy-spanning conflict. However, the Jedi Council realized that Padawans needed masters and Knights needed assistants trained in the ethics of the Jedi Code. While clone troopers can follow orders, only a subordinate versed in the Force could interpret a Knight's commands through the spiritual lens the Council demanded. Thus, the Council sent its Padawans to war alongside their masters.

  - title: "The Philosophy of Padawan Learning"
    keywords: "padawan, learning, jedi philosophy, open mind, wisdom"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The title of Padawan represents the idea of learning and the many paths to wisdom. Even Jedi Knights and Masters sometimes become Padawans again to return to basics. To 'open your mind as if a Padawan' means to rid oneself of preconceived notions and biases, seeing things with fresh, innocent eyes. A legendary Jedi Master gained renown for repeatedly taking on the Padawan title and asking seemingly obvious questions that revealed hidden wisdom to those around her, testing their patience while enlightening them both.

  - title: "Jedi Knight Role in Conflict"
    keywords: "jedi knight, leadership, force, lightsaber, republic"
    category: "person"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Jedi Knights serve as guardians of the Republic, wielding the Force and the lightsaber with precision and discipline. They are trained in Athletics, Cool, Discipline, Knowledge of ancient lore, Lightsaber combat, and piloting. Knights demonstrate mastery of Parry and Reflect techniques to defend themselves and allies, and many possess the ability to throw their lightsaber with deadly accuracy. In times of war, a Knight relies on leadership, negotiation, and the spiritual strength of the Force to accomplish their missions.

  - title: "Force-Sensitive Outcasts"
    keywords: "force sensitive, outcast, independent, smuggler, bounty hunter, criminal"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "bounty"
    content: |
      Not all Force sensitives follow the Jedi or Sith. Force-Sensitive Outcasts are those who received training—or were expelled—and now walk their own path, wielding the Force and often a lightsaber as masters of their own destiny. Many work as smugglers, bounty hunters, or criminals, using their talents to gain wealth and influence outside the law. Yet not all Outcasts are outlaws by nature; some clash with Republic authority due to personal conflicts with the Jedi Order. They must contend with the political power of both the Republic and the Separatists while evading the reach of those who would reclaim them.

  - title: "Republic Senate Representatives"
    keywords: "republic, senate, coruscant, diplomat, representative, delegation, junior representative"
    category: "person"
    priority: 8
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Galactic Senate relies on more than mere Senators to govern thousands of civilizations. Junior representatives work alongside full Senators as nonvoting members, each voicing the concerns of minority parties, distinct species, or political coalitions within a world's larger delegation. These envoys sit on committees, receive full briefings, and serve as intermediaries between their homeworlds and the heart of Republic authority on Coruscant. When a Senator must leave the capital, a trusted representative may be elevated to proxy their full powers—a mark of high esteem and often the first step toward inheriting the seat itself.

  - title: "Political Intrigue in the Rotunda"
    keywords: "senate, coruscant, politics, diplomacy, negotiation, intrigue, shifting loyalties"
    category: "concept"
    priority: 7
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Senate rotunda is a stressful and dangerous arena where competing interests and shifting political alliances can turn allies into adversaries in moments. Representatives must master diplomacy to advance their constituency's agenda while maintaining favor with their Senator and coalition partners. The ability to keep composure when facing rebuke, to detect betrayal without revealing it, and to defuse tense situations through words rather than weapons defines success in this world of smooth charm and sharp critique. Truly skilled politicians understand that the right words can be more powerful than any blaster.

  - title: "Battlefield Scavenging"
    keywords: "scavenger, salvage, wreckage, black market, droid, wartime, profit, technology"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      As the Clone Wars spread across the galaxy, battlefields leave behind fortunes for those brave or desperate enough to claim them. Scavengers venture into ruined factories and starship graveyards, navigating unstable munitions, shattered war machines, and not-quite-disabled battle droids to strip valuable components and intact technology for resale. The work is isolating and deadly, but the pay far exceeds safer employment. Most operate alone, their survival instincts honed by constant exposure to danger. They are as much inventors as salvagers, refurbishing discoveries in innovative ways or crafting unique equipment tailored to their own needs.

  - title: "Outer Rim Survival"
    keywords: "outer rim, scavenger, survival, isolation, wreckage, predators, malfunctioning droids"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Outer Rim has always harbored scavengers, but wartime creates opportunity for any being willing to risk the dangers of former battlegrounds. Burned-out facilities and hulking starship wrecks hide both treasure and peril—local predators prowl the shadows, and deactivated battle droids can suddenly reactivate with lethal intent. Those who master improvisation and learn to spot value in destruction find themselves wealthy by Rim standards, freed from the constraints of legitimate employment. The isolation demanded by such work breeds a particular kind of tenacity in those who survive it.

  - title: "Force-Sensitive Outcasts: The Unaligned Path"
    keywords: "force-sensitive outcast, dark side, self-taught, rejection, jedi, survival, subterfuge"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Those who reject the Jedi Order or evade recruitment are masters of survival and subterfuge, wielding the Force through their own self-sufficiency rather than formal doctrine. The Jedi's restrictions on attachment conflict with many Force-users' values; some feel the dark side's pull despite their efforts to resist it. Without proper institutional training, Force-Sensitive Outcasts acquire their knowledge through hard experience—a harsh but effective teacher. Such iconoclasts may develop skills rivaling or exceeding those of the Jedi in certain areas, despite their lack of formal instruction.

  - title: "Lightsabers Beyond the Order"
    keywords: "lightsaber, black market, fallen jedi, outcast, weapon, symbol"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The abundance of Force-users in the Republic means lightsabers occasionally appear outside official Jedi channels. Blades belonging to fallen Jedi surface on black markets, and those trained by either the Jedi or Sith may depart with their own weapons regardless of circumstance. When a Force-Sensitive Outcast acquires such a blade, it becomes a tangible symbol of their independence and capability—a dangerous artifact in the hands of the unaligned.

  - title: "Unpredictable Lightsaber Combat"
    keywords: "combat, lightsaber, self-taught, technique, improvisation, deadly"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Force-Sensitive Outcasts develop combat styles through improvisation and observation rather than formal discipline. Their techniques blend fragments of formal lightsaber styles with traditional sword-fighting methods and maneuvers observed from other wielders. This piecemeal approach—unpredictable and diverse—makes them less refined than Jedi or Sith, but no less deadly. Their self-taught nature means each outcast fights differently, making them dangerous opponents whose tactics are difficult to anticipate.

  - title: "Republic Navy Officer: The Grand Army's Strategic Backbone"
    keywords: "republic navy, officer, command, strategy, clone army, coordination, leadership"
    category: "faction"
    priority: 9
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      The war against the Confederacy demands coordination among the Republic's finest military minds. While clone troopers form the effective fighting force on the ground, their success depends entirely on the tactical leadership commanding and supporting them from orbit. These naval officers, drawn from experienced commanders across the Republic's scattered system defense fleets, serve as the Grand Army's frontline strategic leadership. Even Jedi generals rely on their judgment and experience, as the Jedi lack the expertise to conduct large-scale naval actions or organize major troop deployments.

  - title: "Naval Command: Mentors to Generals"
    keywords: "republic navy, jedi general, mentor, strategy, collaboration, military experience"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Many Republic Navy Officers work closely with Jedi generals, and while officially outranked, their military experience often positions them as mentors rather than subordinates. The two develop strategy in concert, with naval officers more comfortable commanding orbital and interplanetary forces while Jedi direct ground engagements and starfighter dogfights. This collaboration leverages both the Jedi's unique abilities and the officer's strategic depth—a partnership born from necessity as the Senate and Jedi discovered they were unprepared to wage total war.

  - title: "Diverse Commanders, Shared Expertise"
    keywords: "republic navy, commanders, tactics, experience, spacelanes, navigation"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Republic's naval officers are a diverse group—drawn from isolated defense fleets across known space, they bring wildly different skills, training, and approaches to command. Yet all share excellent tactical and strategic sense, capable of outmaneuvering a single warship or entire star systems. Having often dealt with pirates before the war, these officers know the spacelanes intimately and can navigate dangerous obstacles that would confound less experienced navigators.

  - title: "Scavenger's Black Market Network"
    keywords: "scavenger, black market, fence, salvage, profit, smuggler, technician"
    category: "organization"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Every piece of recovered tech or wreckage carries value to someone in the vast underworld. Experienced scavengers build relationships with fences—smugglers and technicians who trade credits for salvaged materials, parts, and defunct hull sections. A reliable scavenger develops a network of connections that yields not just improved profits, but intelligence unavailable through legitimate channels. The black market moves quickly; a worthless circuit board to one trader might be essential to another.

  - title: "Ancient Technology and Pre-Republic Relics"
    keywords: "ancient, relic, pre-republic, archaeology, scavenger, wreckage, priceless"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      War-torn worlds occasionally yield more than the detritus of recent conflict. Battlefields sometimes unearth devices and relics from civilizations that predate even the Republic itself—technologies so old and foreign that their mechanisms baffle modern engineers. Such artifacts command premium prices from academics and religious institutions, yet their true value lies in capabilities no contemporary device can replicate. Rumors of such discoveries draw ambitious scavengers into territories untouched for generations, where the risks are as ancient as the prizes.

  - title: "Knowledge of Galactic Warfare"
    keywords: "warfare, strategy, tactics, jedi order, republic, separatist, conflict, history"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      The annals of the Jedi Order and the Republic overflow with accounts of great wars—tales of heroism, tragedy, and tactical brilliance spanning centuries. Warriors who study these patterns can apply lessons from past campaigns to modern struggles. Knowledge of organized conflict encompasses training in contemporary strategy, insight into the personnel and technology of warring factions, and familiarity with the rhythms and escalations of galactic-scale combat. Those who master such study gain an edge in understanding the currents of the Clone Wars.

  - title: "Lightsaber: The Jedi Weapon"
    keywords: "lightsaber, jedi, sith, melee, energy blade, force, elegant weapon"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "general"
    content: |
      The lightsaber stands as the signature weapon of the Jedi Order and their ancient adversaries alike. When dormant, it appears no more than a plain hilt; ignited, it unleashes a blade of pure energy capable of severing nearly any material. The weapon's unusual weight distribution and energetic nature demand mastery beyond conventional swordcraft—it is said only those attuned to the Force can truly command a lightsaber, allowing that vast energy field to guide each stroke. Variants exist: lightwhips, guard shotos, and training sabers follow similar principles, though lighter blades suited to specific disciplines.

  - title: "Clone Trooper Combat Armor"
    keywords: "clone trooper, armor, soak, protection, defense"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone troopers don armor engineered for the rigors of battlefield deployment. The plating increases a wearer's ability to withstand incoming fire and trauma, measurably improving survivability. Well-maintained armor with soak values of 2 or higher grants not only greater damage absorption but also enhanced evasive posture—the weight and balance of superior armor can make a trooper harder to hit altogether.

  - title: "Emergency Disembarkation Tactics"
    keywords: "pilot, vehicle, assault drop, disembark, tactical insertion"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Combat pilots have perfected rapid-deployment techniques to move troops quickly from transport craft into active zones. A skilled pilot can coordinate sudden disembarkation or boarding maneuvers that occur in the heat of engagement, allowing passengers and allied forces to relocate in moments rather than minutes. Such tactics are invaluable when insertion timing is critical or enemy fire demands immediate repositioning.

  - title: "Underworld Negotiation and Back-Channel Deals"
    keywords: "negotiation, underworld, deal, republic representative, intelligence"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Those with deep connections to the underworld operate through hidden networks of obligation and favor. A well-placed representative can leverage previously unknown dealings to shift the course of an encounter—calling in favors owed long ago or revealing that one's influence extends into unexpected places. Such negotiations are delicate; a failed gambit can expose dangerous past connections and draw unwanted attention from enemies.

  - title: "The Force Enhanced: Physical Mastery"
    keywords: "force power, enhance, athletics, agility, strength, acrobatics, force user"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "general"
    content: |
      Those strong in the Force can allow it to flow through their bodies, responding to their own intent and movement to enhance physical actions. With the Force's assistance, a user can leap seemingly impossible distances, move faster than otherwise possible, and demonstrate physical strength far in excess of normal abilities. Most Force users find it relatively simple to use the Force to overcome their own physical limitations and shrug off fatigue. With practice, a Force user can achieve uncanny acts of agility and acrobatics, allowing the Force to suffuse their movements and imbue them with strength and elegance. The power manifests through improved coordination, resilience, piloting, and brawling—the Force becomes an extension of the user's intent.

  - title: "Republic Military Equipment and Logistics"
    keywords: "republic, clone soldiers, grand army, equipment issue, resources, starship, blaster"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Republic provides its clone troopers with the weapons and equipment needed for their missions, including high-grade military equipment that would be illegal and prohibitively expensive to common citizens. Clone troopers in the Grand Army of the Republic receive regular pay and access to vehicles and specialized gear sanctioned by their command. Missions are typically outfitted with necessary equipment through official channels; boarding actions, planetary assaults, reconnaissance operations, and site defense missions each receive appropriate loadouts—from transport-class vessels to demolitions kits. Jedi and Republic officials operate similarly, drawing upon the resources of the Jedi Order and the Galactic Senate rather than relying on independent acquisition.

  - title: "Weapons of War: Clone Wars Arsenal"
    keywords: "weapons, lightsaber, blaster, armor, clone trooper, military equipment, attachments"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The outbreak of war across the galaxy spurs innovation in weapons and armor development. The Republic and Confederacy of Independent Systems both prepare their arsenals for sustained conflict. Standard-issue arms and armor equip the Republic's clone forces, with many troopers customizing their equipment through various attachments and modifications. The Jedi are known for their distinctive lightsabers—elegant and elegant weapons of which multiple types and components exist. Military forces rely on a broad range of support gear to succeed on the battlefield: vehicles and starships from standard transports to specialized craft represent the diverse mechanical assets employed by both factions.

  - title: "The Force Binds Living Things"
    keywords: "force power, telekinesis, restraint, bind, dark side, control"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Those who channel the Force deeply can extend their reach far beyond their physical body, using invisible threads of power to seize and restrain living beings from a distance. A trained Force user can immobilize a target, locking their limbs in place and preventing them from acting—a technique that walks a fine line between control and cruelty. Those who draw from the dark side channel this power with malevolent intent, crushing and maiming their targets from afar. The sensation of being bound by the Force is utterly alien: victims describe a suffocating pressure, as though invisible hands grip every limb, making even breathing feel like a struggle against an unseen force.

  - title: "Clone Officer Tactics: Rally and Advance"
    keywords: "clone officer, leadership, tactical advance, cover, suppressing fire, scrap em"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A seasoned Clone Officer rallies their squad with crisp commands, bolstering morale and coordination under fire. Experienced officers learn to coordinate attacks through their troops, amplifying the effectiveness of each shot—a technique called 'Scrap 'em!' where the officer's successful strike triggers a cascade of focused fire from nearby allies. In the chaos of active combat, skilled officers can shift their entire squad's position while maintaining defensive cover, allowing soldiers to relocate and maintain their advantages. Clone Officers who master these techniques become force multipliers, turning scattered squads into lethal, synchronized units.

  - title: "Padawan Foundations"
    keywords: "padawan, jedi training, lightsaber, knowledge, temple training, sincerest flattery, something to prove"
    category: "concept"
    priority: 6
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      Young Padawans undergo rigorous training in the Jedi Temple, where they learn to channel the Force through ancient disciplines and martial forms. Temple training rituals teach these initiates to blend knowledge with combat prowess, drawing upon their scholarly understanding to enhance their blade work. Padawans often find themselves learning by imitation, watching senior Jedi and fellow trainees alike, developing their own techniques by mirror—a practice known among the order as 'Sincerest Flattery.' Frustration is common among Padawans, driving some to push themselves beyond their limits in moments of desperation, proving their worth through sheer determination.

  - title: "Jedi Knight Mastery"
    keywords: "jedi knight, force sensitivity, will of the force, side by side, sense emotions, lightsaber"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Jedi Knights who have progressed through years of training possess refined command over the Force, allowing them to manipulate the very destinies they face. A Knight standing beside fellow blade-wielders becomes nearly invulnerable, their combined Force presence creating a web of mutual protection—each saber-lock makes them stronger. Some Knights develop the subtle gift of sensing the emotional currents around them, using the Force to read intentions and motivations with unnerving accuracy. When a Knight's will aligns with the Force itself, they can convert despair into triumph, transmuting darkness into light in moments of critical need.

  - title: "Force-Sensitive Outcasts: Unaligned Power"
    keywords: "force sensitive outcast, dark side, force power, sorry about the mess, secrets of the force"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Not all Force sensitives serve the Jedi Order or the Separatist cause. Outcasts—untrained or rejected from formal institutions—wield raw Force power without the discipline of orthodox training. These individuals often gravitate toward pragmatic applications of the Force, learning to heighten their combat lethality or exploit their enemies' weaknesses. An Outcast's early strikes often prove devastatingly effective, their victims unprepared for the focused aggression of someone operating without restraint. Those who study forbidden lore outside temple walls gain insight that institutional training deliberately excludes, channeling knowledge and Force together in ways that traditional Jedi consider dangerous or taboo.

  - title: "Scavenger's Ingenuity"
    keywords: "scavenger, tinkerer, utility belt, utinni, salvage, improvisation"
    category: "concept"
    priority: 5
    planet: "tatooine"
    surface_affinity: "ambient"
    content: |
      Scavengers across the galaxy develop a keen eye for value in discarded wreckage. A skilled Tinkerer can improve salvaged equipment beyond its original specifications, retrofitting components and jury-rigging enhancements that would make manufacturers cringe. The most resourceful scavengers carry an impossibly well-stocked utility belt—pockets and pouches that somehow yield exactly the tool needed for any situation, from makeshift locks picks to emergency power cells. Experienced scavengers move quickly through ruins and junkyards, their practiced eye cutting through waste to find pristine components in mere moments. The Jawas' traditional cry—'Utinni!'—echoes the philosophy that every piece of scrap holds potential.

  - title: "Republic Diplomatic Corps"
    keywords: "republic representative, diplomacy, translation, negotiation, senate"
    category: "faction"
    priority: 5
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      The Republic's diplomatic representatives navigate the treacherous waters of inter-species communication and cultural understanding. These envoys develop an intuitive sense for linguistic nuance, learning to recognize and correct misunderstandings before they escalate into conflict. A skilled representative can reframe a faltering negotiation with a single well-chosen phrase, turning apparent disagreement into productive dialogue. The presence of a diplomatic officer often smooths the friction between clone commanders and civilian populations, offering a buffer between military necessity and civilian needs.

  - title: "DC-15 Blaster Rifle"
    keywords: "dc-15, blaster rifle, heavy weapon, republic, clone trooper, longarm"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The DC-15 is the workhorse of Republic ground forces, roughly as tall as a clone trooper and brutally powerful. Despite its poor balance and beam cohesion issues after sustained fire, clone marksmen favor it for raw stopping power—it punches through laminate armor at 1,000 meters and can destroy lightly armored vehicles at closer range. The weapon rarely overheats, needs minimal field maintenance, and many veterans outfit it with long-range optics and gyrostabilization units for precision work across open battlefields.

  - title: "DC-15A Blaster Carbine"
    keywords: "dc-15a, carbine, blaster, republic, standard issue, clone"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Blastech's DC-15A is the standard-issue carbine of the Grand Army of the Republic, carried by every clone from decanting onward. Lighter and shorter-ranged than its heavy cousin, the DC-15A trades raw power for accuracy, ease of handling, and legendary reliability. Every clone can field-strip and maintain it with minimal training, making it the backbone of small unit tactics and close-quarters operations.

  - title: "DC-17 Hand Blaster"
    keywords: "dc-17, blaster pistol, sidearm, republic, clone officer"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The standard-issue blaster pistol of the GAR, the DC-17 packs incredible stopping power into a rugged, well-balanced frame. Vehicle crews, weapon teams, and officers carry it as their primary sidearm, while ARC troopers and special forces have adopted it as a close-quarters backup weapon. The DC-17 is lightweight with a respectable rate of fire and proven reliability in the field.

  - title: "Z-6 Rotary Blaster Cannon"
    keywords: "z-6, rotary cannon, heavy support, squad weapon, blaster"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Z-6 is an exceptionally potent heavy support weapon featuring six rotating blaster barrels around a central assembly. Spinning at thousands of RPM, it delivers devastating firepower and higher rates of fire than standard repeating blasters. The tradeoff is extreme heat generation—overzealous gunners have destroyed their weapons and suffered serious burns from continuous fire, making it a dangerous tool in inexperienced hands.

  - title: "AP-M1 Armor Piercing Grenade"
    keywords: "ap-m1, grenade, anti-armor, shaped charge, demolition"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Merr-Sonn's AP-M1 is a fist-sized grenade with a shaped charge core that produces a highly focused blast capable of cracking tough armor. Clones can throw it like a standard grenade or use its integral chemical adhesive to place and hold it for precision demolition work. The AP-M1 gives common foot soldiers light anti-armor capabilities in the field, making it essential for anti-vehicle operations.

  - title: "BT X-42 Heavy Flame Projector"
    keywords: "btx-42, flame projector, flamethrower, anti-personnel, blastech"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      One of the most destructive and terrifying weapons in the Republic arsenal, the BT X-42 is carried by specially trained clone flame troopers. It excels at clearing rooms, bunkers, and massed unarmored opponents while denying areas and destroying enemy materiel. The weapon is as dangerous to friendlies as enemies and has a nasty reputation for overheating or exploding when damaged, requiring expert handling.

  - title: "Mk II EMP Grenade"
    keywords: "mk ii, emp grenade, electromagnetic pulse, anti-droid, sorosuub"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      SoroSuub's Mk II EMP grenade is the latest anti-droid weapon deployed by the Republic. Roughly the size of a standard frag grenade, it releases a powerful electromagnetic pulse upon detonation rather than explosive force, incapacitating droids and knocking out hardened electronic systems. It has become essential for engagements against Separatist battle droids and automated defenses.

  - title: "Model 201 Mortar System"
    keywords: "model 201, mortar, artillery, light artillery, merr-sonn"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Merr-Sonn's Model 201 is a portable light artillery system used by specialized clone artillery troopers. This smoothbore weapon uses an electromagnetic mass-driver to launch large-caliber shells in an arc rather than direct line, making it ideal for striking enemies behind heavy cover. The GAR typically deploys the 201 behind front lines as a support weapon, providing devastating indirect fire.

  - title: "Republic Military Equipment Assignment"
    keywords: "republic equipment, military gear, clone trooper, loadout, mission assignment"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Republic forces assign protective equipment for hostile missions—armor, specialized gear, and mission-specific loadouts issued at no cost to personnel. Such equipment remains Republic property; clones may retain standard-issue gear or return specialized items post-mission depending on duty assignment. Misuse, carelessness, or unauthorized sale of assigned equipment results in disciplinary action if discovered.

  - title: "Clone Trooper Standard Loadout"
    keywords: "clone soldier, loadout, phase i armor, dc-15, starting equipment"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Clone soldiers receive phase I clone trooper armor, a DC-15 blaster rifle or DC-15A carbine, an M8 combat knife, and standard ordnance grenades as their foundational kit. This loadout represents not just the issued necessities but the focused training and familiarization each clone undertakes during their service preparation.

  - title: "Gundark Stav-Suit"
    keywords: "salvage, sensor array, scavenger equipment, underworld, technology analysis"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      An exiled Arkanian engineer's design, this peculiar suit has become common among salvagers and scavengers across the galactic underworld. The advanced sensor package analyzes energy readings and material compositions to help wearers distinguish valuable salvage from scrap—or from battlefield detritus. The sensor array arrangement resembles gundark ears at the wearer's sides, giving the suit its distinctive profile. However, the exposed sensors are vulnerable; bounty hunters and others sometimes exploit this weakness by triggering feedback loops that blind the wearer, making the design both blessing and liability.

  - title: "Heavy Robes"
    keywords: "jedi robes, ceremonial garments, protection, battlefield wear"
    category: "technology"
    priority: 5
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Thick, voluminous robes worn by Force users serve both practical and ceremonial purposes. While the reinforced fabric layers provide minimal direct defense against incoming attacks, their bulk obscures vital areas and silhouettes, offering subtle protection through concealment rather than armor. These garments have become iconic across the clone wars, worn by warrior-monks in combat and negotiation alike.

  - title: "HT-77 Cold Assault Armor"
    keywords: "clone armor, cold environment, polar regions, thermal insulation, specialized divisions"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The HT-77 pattern serves clone forces operating in harsh arctic and far-sunned worlds. Enhanced thermal seals and insulating flaps strengthen the bodysuit's base temperature regulation. The helmet's treated visor resists snow-glare and moisture frosting, while audio dampening cuts through howling winds and interference. Specialized divisions train extensively in its use, making cold assault armor a mark of hardened, specialized soldiers adapted to frozen battlefields.

  - title: "Jedi Commander Armor"
    keywords: "jedi, clone wars modification, laminate plates, republic armorers, general officer gear"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      As Force users took command of clone detachments, traditional peacekeeping robes proved inadequate for frontline leadership. Republic armorers modified clone trooper suits, fitting laminate protective plates over loose robes to balance vital protection with acrobatic lightsaber forms and Force-assisted maneuvers. These hybrid garments, recognizable across Clone Wars battlefields, vary in silhouette and systems based on each Jedi's commissioning, yet share enough commonality to form a distinct officer class aesthetic.

  - title: "Mk II Hotspot Insulated Armor"
    keywords: "flame trooper, thermal protection, respirator, toxic environment, flamethrower support"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Flame troopers rely on the Mk II "Hotspot" design to survive their own incendiary weaponry. Heavy filtered respirator units and significant thermal shielding protect wearers from superheated air and toxic smoke. The initial Mk I design fatally lacked adequate respirator filtration, a rushed-production flaw that cost lives until corrected. The improved Mk II represents both combat evolution and morale triumph for the flame trooper corps, enabling them to clear defended positions and contaminated zones without self-destruction.

  - title: "Phase I ARC Trooper Armor"
    keywords: "arc trooper, elite clone, reinforced plating, advanced helmet, pauldron rank insignia"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Elite ARC troopers receive specialized gear including reinforced laminate plating across body and limbs, advanced helmet design, and armored rank pauldrons. The armor's careful engineering optimizes deflection of standard blaster fire patterns while allowing wider, more natural movement than basic clone suits. Built-in subsystems accommodate integrated customization for dangerous special assignments. However, the Senate restricts mass production due to substantial cost; a more economical variant remains in early design stages with uncertain deployment timeline.

  - title: "Phase I Clone Trooper Armor"
    keywords: "clone armor, laminate plating, bodysuit, vacuum protection, kaminoan manufacture"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Mass-produced by Kaminoans alongside the first clone batches, Phase I armor emphasizes function and protection through full-body laminate plating over sealed bodysuits. Built-in temperature regulation offsets enclosure weight; light pressurization provides brief emergency vacuum protection—minutes of life-support, not extended operations. The armor is reliably protective with room for customization, yet notoriously uncomfortable; designers prioritized the clones' function over comfort, making armor adjustment a rite of passage. Veterans spot new soldiers instantly by their awkward, weight-unbalanced movements.

  - title: "Scavenged Clone Armor"
    keywords: "salvage, black market armor, bounty hunter, pirate equipment, battlefield scrap"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone Wars battlefields have become treasure troves for scavengers, making looted laminate plating nearly an industry unto itself. Bounty hunters, pirates, and underworld figures prize clone armor's durability and protection but cannot afford new military construction. Scavenged suits cobbled from battlefield fragments are even more ill-fitting than standard issue, sometimes drawing unwanted Republic attention. Nevertheless, affordable heavy protection appeals to many willing to tolerate awkward movement and official scrutiny.

  - title: "Aquata Breather"
    keywords: "aquata breather, portable air, underwater, subaquatic, two hours, disposable"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A portable device consisting of two small tanks connected to a mouthpiece, worn over the mouth and nostrils. Supplies up to two hours of breathable air and is particularly suited to subaquatic environments. The unit is designed to be disposable—once the air supply is depleted, it cannot be recharged. Standard gear for field operatives working in aquatic zones.

  - title: "Destro-6 Demolition Charge"
    keywords: "destro-6, detonite charge, demolition, sabotage, breaching, shaped charge"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Shaped detonite charges favored for sabotage missions and clandestine raids against hardened targets. Can be detonated via timer with delays up to six hours or by remote signal. Properly placed charges are capable of incapacitating armored vehicles or blasting major breaches in fortifications. Setting up charges requires time and precision; skilled demolitionists can disable safeties to speed deployment.

  - title: "Holo-Megacaster"
    keywords: "holo-megacaster, holocomm, public address, projection, rally, amplification"
    category: "technology"
    priority: 5
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      A variation on standard holocomm systems for public speakers. Projects the user's voice and magnified holographic image nearby rather than across the HoloNet. Typical models project images ranging from centimeters to ten meters in height, with adjustable volume suitable for private audiences or vast populist rallies. Standard tool for diplomatic and propaganda operations.

  - title: "Jedi Utility Belt"
    keywords: "jedi utility belt, field gear, compact, tools, lightsaber, maintenance"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Designed by skilled artisans long ago, these belts contain a three-day food supply, emergency medpac, lightsaber maintenance kit, slim glow rod, comlink, and aquata breather in nondescript compact form. Empty concealed pouches allow storage of small items. Standard lightsabers hang securely from the belt for easy access. Some Jedi view reliance on such tools as a weakness; others never leave without one.

  - title: "Lightsaber Maintenance Kit"
    keywords: "lightsaber maintenance kit, jedi tools, repair, maintenance, mechanical"
    category: "technology"
    priority: 5
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Compact device manufactured to Jedi Order specifications and often customized by individual wielders. Contains specialized tools for lightsaber maintenance and repair, with many tools capable of conducting minor repairs on small mechanical and electronic items. Essential field gear for any warrior dependent on a blade weapon.

  - title: "Republic Insignia and Service Awards"
    keywords: "republic insignia, military decoration, combat medal, valor, service record"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Clone troopers, Navy officers, and Jedi who distinguish themselves in Clone Wars combat may be nominated for Republic insignia—medals granted directly by Grand Army commanders to recognize exceptional bravery and service. These small metal decorations clip onto uniforms or formal robes; clone soldiers sometimes conceal theirs inside armor for morale without drawing unwanted attention. Black-market counterfeits circulate, expertly crafted enough to fool casual inspection. An authentic insignia carries weight in military circles, signaling to peers that the wearer has proven themselves in actual combat.

  - title: "Republic Seal of Service"
    keywords: "republic seal, service award, star of coruscant, order of chandrila, identity verification"
    category: "concept"
    priority: 8
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      The highest military and civilian honors granted by the Republic—such as the Star of Coruscant for combat valor, the Order of Chandrila for diplomatic excellence, and the Kimble Award for lifesaving medical service—take the form of statuary or medallions embedded with encrypted transponders. Each seal contains verification codes linked to Republic databases, instantly identifying the bearer's accomplishments and legitimacy across all official channels. These awards represent exemplary service to the Republic's ideals and prove invaluable when dealing with official proceedings or establishing credibility among the military and bureaucracy.

  - title: "XSR Heavy Demolitions Kit"
    keywords: "xsr kit, demolitions, explosives expert, detonators, thermal charges"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A rugged carbo-plas case containing precision timers, remote detonators, signal-proof compartments, and specialized measurement tools, the XSR kit is the field demolitions expert's most trusted companion. The shielded interior safely stores thermal detonators and larger charges away from accidental trigger signals. While bulky and demanding careful handling, the kit's precision tools drastically reduce catastrophic errors when preparing or disarming complex explosive arrays—a critical advantage when one miscalculation means death.

  - title: "Ascension Gun"
    keywords: "ascension gun, grappling launcher, traversal, repulsor, equipment modification"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A blaster-barrel modification that fires a magnetic or adhesive grapnel tether, the ascension gun allows soldiers and operatives to scale vertical terrain, cross chasms, or climb urban structures in seconds. The localized repulsor field reels the shooter upward toward the anchored point. Elite clone units requisition these attachments for mountain assaults and vertical cityscape operations; smugglers and fringers customize their own variants for escape routes and territorial advantage. The SoroSuub S-A Grappling Launcher is a common field variant.

  - title: "Augmented Vibro-Motor"
    keywords: "vibro weapon, vibro-motor, blade enhancement, cutting power, modification"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Weapon modifiers who specialize in melee gear know that boosting a vibro weapon's motor output dramatically increases cutting and shearing power—capable of tearing through armor plating that conventional blades cannot penetrate. The enhancement comes with a cost: the weapon becomes harder to control, requiring a stronger wielder to manage its aggressive vibrations during combat. Specialized soldiers and duelists favor this modification when facing armored opponents or when raw penetrating power matters more than finesse.

  - title: "AAT-1 Tank: Separatist Armored Weakness"
    keywords: "aat-1,separatist tank,droid crew,predictable,emp,weaknesses"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The AAT-1 remains formidable on paper but proves less effective in practice, its primary vulnerability stemming from its quartet of Bi-series droid crew. While competent, these droids lack the initiative and improvisation of sentient operators, making their tactics predictable to experienced opponents. Their computer and electrical systems are prone to failure; even a handful of EMP grenades can neutralize an entire platoon. Despite these shortcomings, AAT-1s pose considerable threat to clone infantry and armor, proving devastatingly effective against planetary defense forces where a handful of tanks can suppress entire populations.

  - title: "CK-6 Freeco Bike: Clone Cold-Weather Swoop"
    keywords: "ck-6,freeco bike,clone trooper,cold-weather,swoop,arctic"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The CK-6 swoop—clone shorthand for 'freezing cold'—is a long, thin militarized reconnaissance craft optimized for sub-zero and arctic operations. Sealed bubble canopy protects the pilot while twin aft thrusters in port and starboard nacelles provide exceptional range and agility. Originally ordered from Bespin Motors for trials on the ice world Orto Plutonia, these craft have earned a reputation for ruggedness and reliability unmatched among militarized swoops. Cold-weather assault units deploy them for reconnaissance, courier runs, and battlefield mobility across frozen terrain.

  - title: "LAAT/i Gunship: Republic's Versatile Arsenal"
    keywords: "laat/i,gunship,clone transport,rothana,assault transport,close air support"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The LAAT/i—Low Altitude Assault Transport/Infantry by Rothana Heavy Engineering—serves as transport, landing craft, gunboat, and attack platform in one heavily armored package. Twin clone pilots operate from a cramped tandem cockpit while the spacious main fuselage carries three squads of clone troopers plus Jedi and all combat gear, with capacity for four speeder bikes in deployable racks. Twin dorsal missile launchers, laser turrets, air-to-air rockets, and door-mounted repeater blasters provide devastating firepower. Clone troopers speak reverently of LAAT crews who survived impossible odds; few gunship crews need buy their own drinks.

  - title: "Multi Troop Transport: Separatist Siege Vehicle"
    keywords: "mtt,multi troop transport,battle droids,baktoid,siege,deployment"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The MTT—Baktoid Armor Workshop's massive, lumbering siege vehicle—combines troop carrier, tank, and battering ram into an elephantine-silhouetted war machine. Its sloping front hull and towering frame house a rotating droid deployment rack that holds over one hundred deactivated battle droids. To deploy, the MTT halts, extends its hatch, and unfolds the rack, allowing droids to rapidly activate into instant infantry formations. Compared to the AAT, the MTT excels at its primary role of delivering overwhelming droid forces, and its ram prow can shatter stationary fortifications at full speed.

  - title: "Droid Vehicle Limitations in Combat"
    keywords: "droid vehicle,artificial intelligence,limitations,circuit overload,predictable"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Droid-operated vehicles must handle numerous simultaneous tasks without crew guidance, sometimes taxing their circuits to overload. While a rival droid vehicle can attack and perform pilot-only actions or dual-attack patterns, their inflexibility proves costly. Lack of sentient initiative and improvisational capability makes droid vehicles predictable—opponents who've encountered them before quickly learn to exploit behavioral patterns and circuit limitations, particularly through electronic warfare.

  - title: "Traditional Ground Vehicles: Obsolete Curiosities"
    keywords: "ground vehicle,landspeeder,repulsorlift,traditional,obsolete"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "ambient"
    content: |
      In an age dominated by repulsorlift engines and ion thrusters, traditional ground vehicles—wheeled or tracked machines—rarely see battlefield use, regarded with curiosity or scorn by modern combatants. Yet those few old-fashioned craft that remain operational prove no less capable than their hovering cousins, their simpler systems sometimes more reliable in harsh environments or near ion shielding.

  - title: "Kyber Crystals and Lightsaber Construction"
    keywords: "kyber crystal, lightsaber, jedi, construction, resonance, force"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Kyber crystals are the core of any lightsaber, defining the weapon's individual characteristics through their unique structural makeup. Found across different worlds in various shapes and colors, all kyber variants share the ability to withstand and focus the immense energies that run through a lightsaber blade. Force-sensitives can channel their connection to the Force to guide their hands when installing or modifying these crystals, using the Force to enhance the precision of their work.

  - title: "Zophis Crystals: Dangerous Remnants of Jedi Seeking"
    keywords: "zophis crystal, kyber, outer rim, separatist, unstable blade, durasteel"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Outer Rim world of Zophis once drew Jedi Padawans seeking their kyber crystals, but now falls under Separatist control—hostile to any Jedi crystal seekers. The unusual crystals found there possess a unique resonance that creates devastating yet unstable blades. A lightsaber fitted with a Zophis crystal can carve through durasteel plating with ease, but suffers from vulnerability to power fluctuations in the crystal core, making it a weapon of great power and considerable risk.

  - title: "Ceremonial Adornment Armor"
    keywords: "armor, diplomacy, ceremonial, social, aesthetic, protection"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Diplomats and their retinues seek compromise between personal protection and signaling sincerity at the negotiation table. Ornamental armor with ceremonial styling downplays its combat nature while remaining functionally protective, though elaborate decorations typically reduce mobility. The finest examples balance beauty with utility, allowing cautious diplomats to face even dangerous situations without appearing overtly militaristic.

  - title: "Physiological Enhancement Systems for Clone Troopers"
    keywords: "clone trooper, armor attachment, medical, support system, ergonomic, stress reduction"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Advanced custom-tailored systems provide medical diagnostics, ergonomic adjustments, and powered support tuned to the wearer's motor functions. Heart-rate regulation and temperature control reduce stress and pain, allowing physical tasks to require considerably less effort. Clone troopers benefit from standardized templates that greatly reduce cost compared to custom civilian systems, making physiological enhancement widespread among the Grand Army of the Republic.

  - title: "Squad Tactical Systems and Integrated Comlink Networks"
    keywords: "squad tactics, clone trooper, sensor, comlink, tactical network, awareness"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Sensor and communications packages are standard on military armor, but coordinated squads equip all members with uniform packages designed to work in tandem. Clone trooper squads and planetary militia share real-time tactical information, dramatically enhancing situational awareness and communication across the battlefield. Even independent bounty hunter groups sometimes adopt these integrated systems to gain the advantages of networked tactical awareness.

  - title: "AAT-1 Hover Tank: Separatist Infantry Fighting Vehicle"
    keywords: "aat-1, separatist, droid, armor, tank, laser cannon, battlefield"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Baktoid Armor Workshop's Armored Assault Tank Mk I is the Confederacy of Independent Systems' primary infantry fighting vehicle. Its heavily armored spade-shaped lower hull and rotating turret are crewed by four B1 battle droids with capacity for six more via external handholds. Though heavily armored and devastatingly armed—main heavy laser cannon, dual medium laser cannons, coaxial heavy blasters, and a six-barreled multiordnance launcher—it sacrifices speed and agility for overwhelming firepower and protective capability on the battlefield.

  - title: "Grand Army of the Republic: Mechanized War Machine"
    keywords: "republic, clone army, vehicle production, geonosis, mechanization, technology"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      The Grand Army of the Republic stands as one of the most heavily mechanized military forces in recent memory, with production output drawing from a thousand worlds. The Republic has developed hundreds of new vehicle designs to transport, support, and fight alongside its clone army across multiple theaters of war. This unprecedented scale of military industrialization has transformed the nature of warfare across the galaxy.

  - title: "Land and Air Speeders in Clone Wars Conflict"
    keywords: "speeder, vehicle, republic, separatist, transportation, battlefield"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Both the Grand Army of the Republic and the Confederacy of Independent Systems deploy diverse arrays of land speeders and airspeeders to move soldiers and materiel across contested battlefields. These swift vehicles provide mobility and tactical flexibility essential to modern warfare, allowing rapid repositioning of forces and supply lines across diverse planetary terrain.

  - title: "IG-227 Wheel Droid"
    keywords: "ig-227, wheel droid, cis, droid tank, missile platform, haor chall, tracked wheels"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      One of the Confederacy's more common fighting vehicles, the IG-227 is a highly mobile, dedicated missile platform designed to provide standoff support fire for CIS ground forces. The droid is built around massive tracked wheels nearly nine meters across, rendering it exceptionally fast and agile across broken terrain. Its dual long-range missile launchers deliver devastating barrages, while a pair of forward auto-blasters defend against approaching threats. Despite its lethal firepower, the IG-227 is lightly armored for speed, leaving it vulnerable to sustained fire from heavy weapons.

  - title: "AT-TE Walker"
    keywords: "at-te, all terrain tactical enforcer, republic, walker, clone troopers, six-legged"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The lumbering AT-TE is one of the Galactic Army of the Republic's premier fighting vehicles—a massive, low-slung, six-legged walker designed to deliver fully equipped clone trooper squads into battle and provide fire support once engaged. Its sturdy construction, heavy armor, and powerful leg actuators allow it to absorb tremendous punishment and scale sheer surfaces via grapnel feet. Republic pilots are notorious for using the walker's mass and armor to ram enemy vehicles and smash fortifications, opening paths for their troops to advance.

  - title: "C-9979 Landing Craft"
    keywords: "c-9979, landing craft, cis navy, haor chall, modular, troop transport, droid carrier"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The C-9979 is the primary planetary assault craft of the Separatist Navy, a modular vessel designed by Haor Chall Engineering and based on antique Trade Federation mercantile barges. Its distinctive appearance—four broad wings attached to a thick fuselage—resembles a massive insect more than a starship. These hollow vessels are transported to battle in pieces, then rapidly assembled and loaded with hundreds of combat vehicles, thousands of battle droids, or entire droid starfighter wings. Equipped with automated repair systems and on-board vehicle bays, the C-9979 gives the Confederacy unparalleled deployment mobility.

  - title: "Delta-7 Aethersprite-Class Interceptor"
    keywords: "delta-7, aethersprite, kuat systems engineering, interceptor, republic fighter, astromech droid"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Delta-7 Aethersprite is one of the newest starfighters in the Republic's arsenal—a revolutionary design combining the speed of a dedicated interceptor with superior aerospace combat capabilities. Descended from the older Delta-6, this arrowhead-shaped fighter features a long, narrow fuselage with forward-mounted laser cannons and a bubble canopy positioned far aft over twin powerful engines. Each Aethersprite carries an R4 astromech droid permanently integrated into its systems, allowing interface with the Syliure-31 hyperspace docking ring for medium-range jump capability—unusual for a fighter of its class.

  - title: "Droch-Class Boarding Ship"
    keywords: "droch, boarding ship, cis navy, utility vessel, plasma cutter, boarding spikes"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      A common sight aboard Separatist warships, the Droch-class boarding ship is a small, awkward-looking starfighter-sized vessel with a distinctive bell-shaped hull. Four long, retractable spikes protrude from its broad base, designed to pierce enemy hulls and anchor the craft during boarding operations. Each Droch carries six fully equipped troops or battle droids, launching en masse from mother ships and accelerating at full speed toward their targets. Upon contact, a plasma-cutting ring burns through the enemy hull while a boarding tube extends, allowing swift insertion of assault forces.

  - title: "Republic Navy and Military Force"
    keywords: "republic navy, clone troopers, military, galactic army, force projection"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      The Republic Navy serves as the Galactic Republic's primary mechanism for force projection across the galaxy. Millions of clones, droids, and other sentient beings serve throughout the fleet, their professionalism and dedication holding back the destructive waves of Separatist naval assault. The Navy's vast fleet of warships, starfighters, shuttles, and specialized vessels represents the Republic's greatest strength in the ongoing conflict.

  - title: "Separatist Navy and Droid Forces"
    keywords: "cis navy, confederacy, separatist navy, droid forces, battle droids"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      The Confederacy of Independent Systems fields countless combat vessels and droid-controlled vehicles across multiple theaters of war. The CIS Navy's mobility and sheer number of available craft—from massive C-9979 landing craft to agile Droch boarding ships—gives the Separatists formidable advantages in rapid deployment and sustained planetary assault operations. Droid soldiers and automated combat platforms serve as the backbone of CIS ground forces.

  - title: "Droch-Class Boarding Vessel"
    keywords: "droch-class, boarding vessel, separatist, colicoid, utility, maintenance, salvage, drop ship, escape pod"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Droch-class boarding vessel, manufactured by the Colicoid Creation Nest, serves the Separatist Navy as a specialized insertion craft. Beyond its primary boarding role, these sturdy vessels fill numerous utility functions—maintenance checks, salvage operations, troop drops, and even emergency evacuation duties. Their versatility has made them a staple of CIS fleet operations.

  - title: "Undicur-Class Jumpspeeder"
    keywords: "undicur-class, jumpspeeder, swoop, kuat vehicles, personal transport, light vehicle"
    category: "technology"
    priority: 5
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Undicur-class jumpspeeder, produced by Kuat Vehicles, is a nimble single-pilot swoop craft designed for rapid reconnaissance and personal transport. With a maximum altitude of 150 meters and minimal encumbrance capacity, it excels at quick insertions and extractions. These compact speeders are often carried aboard larger transports for deployed field operations.

  - title: "Eta-Class Shuttle"
    keywords: "eta-class, shuttle, cygnus spaceworks, republic, vip transport, diplomatic, jedi, black ops"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Originally designed by Cygnus Spaceworks for the Republic Ambassadorial Corps and Galactic Senate as a VIP transport, the elegant Eta-class shuttle proved its worth when the Clone Wars erupted. The Republic military and Jedi Order swiftly pressed these sturdy vessels into service, with some receiving covert upgrades—hidden weapons and stealth systems—for black operations. Each shuttle carries ten passengers in reasonable comfort and includes two folding Undicur-class jumpspeeders as standard equipment.

  - title: "Nu-Class Transport"
    keywords: "nu-class, transport, republic navy, gunship, troop transport, cygnus spaceworks, light attack, special forces, jedi"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Born from a Republic Navy design competition at the war's outbreak, the Nu-class transport emerged as a versatile solution for long-range troop movement and light combat support. Its triangular hull, flanked by folding wings, houses a tandem flight deck and carries thirty fully equipped troops. The Nu-class has proven remarkably successful, balancing respectable laser armament with heavy armor to fulfill both transport and attack roles. GAR special forces units and Jedi operatives particularly favor the vessel for its rugged utility and flexibility in hostile environments.

  - title: "Automated Sheathipede-Class Shuttle"
    keywords: "automated sheathipede, droid pilot, cis, spy ship, electronic warfare, self-destruct, intelligence gathering"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The CIS has modified some Sheathipede-class shuttles with integrated droid pilot brains, removing the need for a full crew while increasing cargo flexibility and operational range. These automated variants serve multiple roles: routine base ferries, intelligence-gathering platforms with enhanced sensors and electronic warfare suites, and expendable spy craft. Packed with cutting-edge reconnaissance technology and armed with powerful self-destruct systems, these ships can be remotely detonated if capture becomes imminent—a grim guarantee that secrets do not fall into Republic hands.

  - title: "Vulture-Class Droid Starfighter"
    keywords: "vulture-class, droid starfighter, variable geometry, cis, haor chall, autonomous fighter, walker mode, battle droid"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Officially designated the Variable Geometry Self-Propelled Battle Droid Mk I, the Vulture-class droid starfighter forms the backbone of CIS aerospace superiority. Controlled remotely by a central computer aboard its mothership, each vulture droid carries a mix of heavy blaster cannons and concussion missile launchers. Though deadly, these machines suffer from predictable attack patterns due to their limited onboard droid intelligence. A unique asset: vulture droids can transform into a four-legged walker configuration for patrol and fire support duties, confounding many Republic pilots who watch their flying prey suddenly land and scurry into cover.

  - title: "Flak Cannons: Anti-Fighter Ordnance"
    keywords: "flak cannon, anti-fighter, point defense, burst shell, shrapnel"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Flak cannons fire large-caliber shells packed with thousands of tiny explosive pellets and inert durasteel fragments. Upon detonation at a preset distance, flak shells burst and spread their contents in a dense cloud capable of tearing through light starfighter hulls and small vehicles. They are commonly mounted on capital ships and planetary defense installations as point-defense systems against incoming fighter wings.

  - title: "Lucrehulk-Class Battleship: CIS Carrier Behemoth"
    keywords: "lucrehulk, cis battleship, capital ship, droid carrier, blockade, ring hull"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The massive Lucrehulk-class battleships represent the Confederate navy's pride—three-kilometer-wide ring-hulled carriers descended from Trade Federation freighters. A sphere-shaped core section houses the command bridge, sensors, and crew quarters opposite the cavernous fighter launch bays. Armed with twelve heavy turbolaser batteries per side, hundreds of laser turrets, and nearly two hundred quad laser turrets, these ships project devastating firepower and carry thousands of battle droids and up to 1,500 droid starfighters. A single Lucrehulk can blockade a civilized planet for years with regular resupply. Despite their intimidating silhouette and raw power, they are inefficient, maintenance-heavy vessels that require substantial support and are vulnerable without escort—many Republic commanders have learned this lesson at great cost.

  - title: "Venator-Class Star Destroyer: Republic Carrier Force"
    keywords: "venator, republic star destroyer, carrier, clone navy, arrowhead hull, fighter complement"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Venator-class Star Destroyers form the backbone of the Republic Navy's carrier force and have served with distinction since the war's beginning. Over a kilometer in length with an arrowhead-shaped hull, Venators feature a broad aft section housing dual command centers—the main bridge and combat information center—and a towering superstructure. A long dorsal hangar bay protected by extra shielding and heavily armored retractable doors stretches from the superstructure to the bow, capable of holding nearly four hundred starfighters across four full wings. Unlike most capital ships of comparable size, Venators can enter planetary atmospheres to conduct fighter operations and strike ground targets, providing unparalleled tactical flexibility. Eight twin heavy turbolaser batteries, proton torpedo launchers, and tractor beam emitters support the primary carrier role.

  - title: "Capital Ship Firepower: Turbolaser Doctrine"
    keywords: "turbolaser, capital ship weapons, naval combat, quad battery, breach, linked fire"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Modern capital ships mount turbolaser weapons in configurations ranging from light single cannons to massive quad-battery turrets. Heavy turbolaser batteries represent the primary anti-ship armament, capable of penetrating thick armor and shields at long range. Lighter point-defense systems—single and twin laser cannons—provide close-in defense against incoming ordnance and enemy fighters. Linked fire systems allow multiple guns to concentrate their output on a single target, multiplying the devastating effect of a coordinated salvo.

  - title: "Republic vs. Separatist Naval Strategy"
    keywords: "republic navy, cis navy, carrier battle group, naval doctrine, capital ship tactics"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      The Republic Navy's strategy centers on carrier battle groups built around Venator-class ships, with starfighter wings providing long-range strike capability and tactical flexibility. These formations have proven devastating against CIS assets throughout the galaxy. By contrast, the Separatist navy relies on massive capital ships like the Lucrehulk for force projection and intimidation, though these vessels require substantial logistical support and fighter escort to remain effective. The strategic contrast between the agile, carrier-centric Republic approach and the heavy, carrier-based CIS approach shapes engagements across the war's theaters.

  - title: "Z-95 Headhunter Starfighter"
    keywords: "republic fighter, clone pilot, multi-role starfighter, incom, subpro, proton torpedo"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Z-95 Headhunter is the Republic Navy's primary multi-role starfighter, a joint design by Incom and Subpro built specifically to leverage clone pilots' exceptional physical and mental capabilities. Fast and agile despite its modest size, the Z-95 packs genuine striking power through paired proton torpedo launchers alongside twin laser cannons. Its success has already prompted engineers to develop mass-market variants and use the design as a foundation for future projects, cementing it as a workhorse of the Clone Wars.

  - title: "Arquitens-Class Light Cruiser"
    keywords: "kuat drive yards, light cruiser, republic navy, escort vessel, carrier battle group, turbolaser"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Arquitens-class light cruiser is a sleek, fast escort vessel rushed into service by the Republic Navy during the Clone Wars, designed and built at Kuat Drive Yards. Its distinctive kite-shaped hull features twin forward spars and a squat bridge tower, with three powerful horizontal thrusters aft. These versatile cruisers typically operate as part of carrier battle groups, providing anti-fighter and light anti-ship support through quad laser batteries and missile launchers while escorting convoys and larger capital ships. Highly respected by Republic crews, they represent a successful blend of speed, maneuverability, and firepower.

  - title: "Consular-Class Light Cruiser"
    keywords: "corellian engineering, diplomatic corps, unarmed transport, vips, luxury vessel, scarlet livery"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Consular-class light cruiser is an elegant, unarmed diplomatic transport operated by the Republic Diplomatic Corps and identifiable by its distinctive deep scarlet livery. Its wasp-waisted hull design and striking appearance reflect its role ferrying high-ranking officials and dignitaries across the galaxy. A modular salon pod slung beneath the flight deck contains lavishly appointed staterooms, common areas, and facilities designed to keep important passengers comfortable across long journeys. Powerful hyperdrive and extreme sensor range make it well-suited for solo diplomatic missions.

  - title: "Charger C70 Combat Refit"
    keywords: "consular-class refit, combat upgrade, diplomatic corps, scout ship, picket vessel"
    category: "technology"
    priority: 6
    planet: "all"
    surface_affinity: "news"
    content: |
      Facing the urgent demands of the Clone Wars, the Republic Navy has begun converting surplus diplomatic cruisers into combat vessels through the Charger C70 refit program. Consular-class ships chosen for this conversion receive substantial upgrades: thicker armor plating, sturdier shields, and comprehensive arrays of turbolasers and ordnance launchers transform elegant transports into effective scout and picket ships. This emergency adaptation demonstrates how the Republic has been forced to repurpose every available asset in its war effort.

  - title: "Munificent-Class Heavy Frigate"
    keywords: "confederacy navy, pocket cruiser, cis, vulture droid, heavily armed, automated ship"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Munificent-class frigate, known colloquially as a 'pocket cruiser,' is a deadly and feared Separatist warship that packs extraordinary firepower into a relatively compact frame. Nearly fully automated with a minimal crew of around 200, these frigates dedicate most internal volume to redundant systems, hangars for vulture droid squadrons, and stasis storage for thousands of battle droids. Lightly armored but bristling with turbolasers, ion cannons, flak batteries, and missile launchers, Munificents are designed to operate in squadrons against larger capital ships. These vessels come from the Banking Clan's decades-long military protection of its far-flung assets, giving their crews hard-won experience in sustained space combat.

  - title: "Vulture Droid Walker Configuration"
    keywords: "vulture droid, variable geometry, walker mode, cis fighter, magnetic cling"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Vulture droids possess a remarkable variable-geometry design allowing rapid reconfiguration from starfighter to walker stance as a simple maneuver. In walker mode, movement becomes deliberate and measured, but the droid gains the ability to cling magnetically to starship hulls or scale sheer vertical surfaces—capabilities making it invaluable for boarding actions and hull-breach assaults. Its articulated legs in walker configuration serve as vicious close-combat weapons, capable of ensnaring and throwing prey across metal decking with surprising force.

  - title: "Buzz Droid Missile Deployment"
    keywords: "buzz droid, discord missile, vulture droid, cis weapon, boarding tactic"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Confederacy has developed a specialized discord missile payload that deploys swarms of buzz droids upon impact. Rather than inflicting conventional explosive damage, these guided missiles release aggressive small droids engineered to engage and sabotage enemy vessels at close range. The more accurate the targeting, the more buzz droids successfully deploy—a successful strike can disgorge multiple mechanical infiltrators into the target's superstructure, spreading chaos and system failures throughout the ship's interior.

  - title: "The Fractured Republic: Corporate Influence and Outer Rim Neglect"
    keywords: "republic, corruption, corporate sector, outer rim, trade federation, senate"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Galactic Republic, despite its thousand-year democratic foundation, had grown unwieldy and divided long before the Clone Wars erupted. Hundreds of Senators representing tens of thousands of systems found themselves unable—or unwilling—to address criminal syndicates, Hutt cartels, and pirate bands ravaging the Outer Rim. Worse, the Republic's wealth and protection flowed toward the Core Worlds while frontier systems felt abandoned. Corporate entities, legitimized through Senate seats and taxation compromises, gained political clout that rivaled planetary governors. The Trade Federation exemplified this consolidation: controlling Outer Rim trade routes, it backed its economic monopoly with a droid army, allowing it to dictate terms to any world seeking offworld commerce.

  - title: "The Rule of Two: The Silent Threat in the Shadows"
    keywords: "sith, dark side, rule of two, shadow, ancient conspiracy"
    category: "concept"
    priority: 10
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Jedi Order celebrated centuries of peace after the great Jedi-Sith War, believing the Sith extinct. Yet one survivor, a fallen master, devised a creed to perpetuate the order in darkness: the Rule of Two. A master and apprentice alone—no armies, no visible conflict—influencing galactic events from the shadows. The apprentice advances only by slaying the master, or dies in the attempt and is replaced. While the Jedi enjoyed political ascension and filled their academies with idealistic recruits, they remained ignorant of the ancient power working quietly in the darkness, bending hearts and minds toward the chaos to come.

  - title: "The Militarization of the Jedi: Warriors or Peacekeepers?"
    keywords: "jedi, militarization, perception, outer rim, distrust, warrior monks"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Without a standing military, the Galactic Republic relied on the Jedi Order to suppress sector conflicts and serve as troubleshooters, military commanders, and diplomats. However, this militarization transformed public perception of the mystical warrior-monks. Core World citizens trusted the Jedi's impartiality; Outer Rim denizens grew suspicious, viewing them as agents of Republican power rather than neutral peacekeepers. Even within the order, divisions emerged over the Jedi's true role. Some feared that constant military readiness invited conflict; others, like a fallen Council member, abandoned the order entirely over such philosophical disputes.

  - title: "Eriadu Summit: The Pivot Point"
    keywords: "eriadu, summit, assassination, trade federation, political crisis, valorum"
    category: "location"
    priority: 8
    planet: "all"
    surface_affinity: "news"
    content: |
      The Eriadu trade summit stands as a watershed moment when hidden powers moved openly. A radical political faction attempted to assassinate the Chancellor and succeeded in eliminating the Trade Federation's ruling council. From this chaos emerged a new Trade Federation viceroy with strong anti-Republic sympathies, installed alongside similarly ideological allies throughout the organization. The assassination gave the weakened Chancellor a temporary surge in popularity and political capital, enough to push through a taxation resolution on Free Trade Zones—a move that would soon ignite open conflict.

  - title: "The Naboo Blockade: Test of Republican Strength"
    keywords: "naboo, blockade, trade federation, plasma, crisis, military force"
    category: "location"
    priority: 9
    planet: "tatooine"
    surface_affinity: "news"
    content: |
      When the Senate passed the resolution taxing Free Trade Zones, the Trade Federation viewed it as appropriation of profits. Already in dispute with Naboo over fair compensation for plasma mining rights, the Federation established a military blockade around the peaceful planet—framing it as protest rather than warfare. The Trade Federation's leaders had long questioned whether the Galactic Republic possessed the military teeth to enforce its authority. The blockade was, in their calculation, a calculated test: would the Republic capitulate, or would it demonstrate actual power? The answer would reshape the entire galaxy.

  - title: "The Corporate Sector Legacy: Exploitation and Suppression"
    keywords: "corporate sector, labor, exploitation, oligarchy, outer expansion zone"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Two centuries before the Clone Wars, the Republic's struggle with corporate consolidation repeated a dark historical cycle. An Expansionist Oligarchy had pushed for development rights in the Outer Expansion Zone, then engaged in cruel labor practices indistinguishable from slavery, strip-mining worlds and crushing worker uprisings. Though the Republic eventually intervened, the same corporate forces reemerged through the Corporate Sector framework—legitimized now through Senate compromise and taxation concessions. The corporations gained legal power within the government itself, steering policy toward their interests while the ordinary denizens of the frontier suffered the same exploitation under a veneer of legality.

  - title: "Clone Trooper Training and Development"
    keywords: "clone trooper, kamino, training, genetic engineering, combat preparation, jango fett"
    category: "faction"
    priority: 9
    planet: "kamino"
    surface_affinity: "ambient"
    zone_scope: "kamino"
    content: |
      Clone troopers are grown and trained from decanting onward for combat roles. Assigned their function during gestation and receiving genetic tweaks tailored to their intended purpose—commander, specialist, or frontline troop—clones spend every waking moment in preparation: sparring, studying tactics, reading technical manuals, and running obstacle courses. A handpicked team of mercenaries developed the rigorous training program under oversight, which includes live-fire exercises and war games in simulated environments to harden each clone for their designated role.

  - title: "Local Planetary Defense Forces"
    keywords: "planetary defense, local militia, republic defense, resistance fighters, sector rangers"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Republic lacks enough clone troopers to defend all worlds, relying heavily on local forces. Planetary defense forces range from professional paramilitaries like elite royal security to untrained volunteer groups. When clone troopers assault key targets elsewhere, local militias must stand alone against Separatist droid swarms. Republic agents—Jedi, clone commandos, or other operatives—sometimes remain to advise and train these forces, or depart to establish resistance movements on contested worlds.

  - title: "Republic High Command and Strategic Operations"
    keywords: "republic high command, strategic command, coruscant, military operations, logistics, strategy"
    category: "organization"
    priority: 9
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      Republic High Command, headquartered in the Republic Center for Military Operations on Coruscant, comprises experienced generals and admirals from member worlds. Meeting in a strategic planning amphitheater, they manage the Grand Army of the Republic, develop overall war strategy, and issue orders focusing on unit strength and logistics rather than individual battles. A representative from the Jedi Council attends most sessions. The Chancellor can supersede High Command with emergency orders, balancing strategic goals against political and morale concerns.

  - title: "Republic Defense Procurement Office"
    keywords: "rdpo, procurement, logistics, supply lines, reinforcement, medical supplies"
    category: "organization"
    priority: 8
    planet: "coruscant"
    surface_affinity: "news"
    zone_scope: "coruscant"
    content: |
      The RDPO is a civilian agency managing logistical support for all GAR units—both Army and Navy. Beyond stockpiling equipment, the office must keep supply lines secure enough for timely delivery of everything from medical supplies to ammunition. Reinforcements often escort transports for security. Separatists harass supply lines relentlessly, making even rear-area runs dangerous. For particularly perilous runs, the Republic sometimes conscripts smugglers in exchange for pardons.

  - title: "Republic Medical Infrastructure"
    keywords: "medical care, clone medic, surgical unit, bacta, medical frigate, field medicine"
    category: "organization"
    priority: 7
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      Injured clone troopers receive immediate care from field medics within their unit. When field treatment proves insufficient, Republic Mobile Surgical Units staffed by medical interns, volunteers, medical droids, and Jedi MedCorps personnel handle wounded in the field. Patients requiring long-term recovery transfer to larger facilities: Hoben-class medical space stations, MedStar or Pelta-class medical frigates in orbit, or planetside centers like the Republic Central Medcenter on Coruscant. This tiered system keeps clones combat-capable despite the war's brutal attrition.

  - title: "The Republic Navy: Structure and Assets"
    keywords: "republic navy, venator, acclamator, corellian corvette, hyperspace routes, core worlds"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "news"
    content: |
      The Republic Navy maintains three primary tasks: securing vital hyperspace supply routes, providing troop insertion and extraction for ground assaults, and defending access to the Core. Organized into twenty fleets—each attached to a Sector Army—six fleets defend Core Worlds as reserve forces, while the rest see heavy combat throughout the Rim. The fleet is an ad-hoc assembly of conscripted member-world vessels (Corellian corvettes, gunships) supplemented by Venator-class Star Destroyers, Acclamator-class assault ships, and Consular-class cruisers. Since Geonosis, Kuat Drive Yards and Rothana Heavy Engineering have ramped production of capital ships and support vessels, slowly allowing the Republic to return borrowed ships.

  - title: "Senate Committees and War Powers"
    keywords: "senate, legislation, committees, chancellor, war powers, oversight"
    category: "organization"
    priority: 7
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Galactic Senate operates through numerous committees—longstanding bodies handling oversight and budgetary matters, alongside Senate Action Committees tasked with managing trade disputes, first contacts, and regional conflicts. Most war effort planning occurs within these action committees. While legislation typically requires committee passage before Senate floor votes, the Chancellor's enhanced war powers can circumvent protocol. Committee seats attract droves of lobbyists and fellow Senators seeking votes or to propose legislation.

  - title: "Senate Guard—The Blue Guard"
    keywords: "senate guard, blue guard, security, coruscant, loyalist crisis"
    category: "organization"
    priority: 6
    planet: "coruscant"
    surface_affinity: "encounter"
    zone_scope: "coruscant"
    content: |
      The Senate Guard, identifiable by their distinctive blue tunics and ceremonial armor, protects the Galactic Senate, its members, and facilities. Beyond physical security, they maintain an investigative arm monitoring threats to Senators and staff. Early in the war, a Captain's breach of protocol—enabling a high-profile prisoner's escape—shattered public confidence and weakened the Guard's authority. Consequently, oversight of sensitive prisoner transfers now falls to the Jedi Order or Royal Guard, dimming the blue guard's prestige within Senate circles.

  - title: "The Jedi Order in Wartime"
    keywords: "jedi, clone wars, jedi generals, moral conflict, losses, tradition, force"
    category: "faction"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      For generations the Jedi defended peace and justice from their Coruscant Temple. When the Separatist crisis erupted, the Senate drafted the Jedi to lead the clone army, a decision that splits the Order philosophically. Many see warfare as incompatible with Jedi ideals—keepers of peace, not soldiers—yet Jedi Generals now command legions, the Archives serve intelligence functions, and even support corps are militarized. The Battle of Geonosis decimated the Order's ranks; each conflict brings fresh losses, forcing inexperienced Padawans into hasty Knighthood and shattering the traditional Master-Padawan bond. Few now indulge in meditation or Force study; survival and the next battle consume all.

  - title: "Jedi Generals and Command Structure"
    keywords: "jedi generals, clone troopers, grand army, legion, logistics, senate oversight"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Military Creation Act empowered the Jedi Council to commission its members as Jedi Generals, placing them atop battlefield hierarchies. Each General commands at least one legion of clone troopers, though Masters often field far larger forces. Pragmatism overrides moral objection to clone conscription—the troopers have no choice in service, yet their necessity is undeniable. Jedi responsibility extends across sectors; they oversee logistics, intelligence, and troop orders whether forces cluster for assault or scatter across space. This expanded role increased Senate scrutiny: politicians unfamiliar with Force abilities rarely accept 'the will of the Force' as justification for failure or protocol breaches. The Jedi High Council and Republic High Command jointly formulate strategy under Chancellor and Senate authority.

  - title: "Padawans as Jedi Commanders"
    keywords: "padawan, commander, rank, clone troopers, attachment, regiment"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Padawan learners in the Clone Wars hold the rank of Jedi Commander, placing teenage Force-users in charge of regiments and outranking all clones save commanders themselves. The sight startles many in the Republic—adolescents leading battle-hardened troops—yet clone troopers undergo accelerated growth and are chronologically younger than their Padawan superiors. Inexperienced Padawans thrust into command often form perilous bonds with clone officers, regarding them as role models and guides in warfare they never expected to wage.

  - title: "Council of First Knowledge—The Jedi Archives"
    keywords: "jedi archives, council of first knowledge, data-tapes, holochronicon, wartime intelligence"
    category: "location"
    priority: 6
    planet: "coruscant"
    surface_affinity: "ambient"
    zone_scope: "coruscant"
    content: |
      The Council of First Knowledge maintains the Jedi Archives within the Temple spires—a repository of ancient data-tapes, manuscripts, and the Holocron Vault. Archivists regularly acquire new materials from Jedi exploring the galaxy. Since war erupted, the Archives' focus shifted dramatically toward collecting and analyzing wartime intelligence, converting scholarship into tactical advantage. Sacred knowledge now serves the immediate needs of generals and strategists.

  - title: "Council of Reassignment—Training and Service"
    keywords: "council of reassignment, jedi service corps, younglings, padawan, reassignment"
    category: "organization"
    priority: 5
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Council of Reassignment evaluates younglings and aspirants who fail their Jedi trials. Some return home; others possess useful skills or desire to serve the Republic and accept posts in the Jedi Service Corps, serving the war effort without lightsabers. In wartime, this council's role expanded as the need for support personnel surged.

  - title: "Council of Reconciliation—Diplomacy Transformed"
    keywords: "council of reconciliation, diplomacy, jedi diplomacy, allies, republic support"
    category: "organization"
    priority: 6
    planet: "coruscant"
    surface_affinity: "dialogue"
    zone_scope: "coruscant"
    content: |
      The Council of Reconciliation once brokered peace between worlds and corporate entities. Now these former mediators marshal allies under the Republic banner and secure financial and material donations for the war effort. Diplomacy has become conscription by persuasion—old skills applied to new imperatives.

  - title: "Clone Training Simulation Chamber"
    keywords: "training simulation, glacier environment, blizzard, clone troopers, military exercise"
    category: "location"
    priority: 7
    planet: "kamino"
    surface_affinity: "encounter"
    content: |
      A vast underground chamber designed to replicate arctic combat conditions. Streams of meltwater flow into a river running the length of the space, while wind and snow generators produce near-blizzard conditions. Hundreds of clone troopers take defensive positions along the riverbank. The chamber features repulsorlift floor systems that can rise and fall, tactical holographic projectors, and a control center protected by a hangar bay-sized energy shield. Maintenance corridors and zones beneath the chamber handle drainage and power systems.

  - title: "Naboo: The Lush Sanctuary"
    keywords: "naboo, republic world, human-gungan culture, plasma core, underwater caverns"
    category: "location"
    priority: 9
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Naboo presents a deceptive paradise of rolling plains, forests, and crystalline waters dotted with elegant cities and formal gardens. Beneath the verdant surface lies a geological anomaly: instead of a molten core, a plasma core has carved an endless labyrinth of submerged tunnels and cavern systems. The native Gungans navigate these underwater passages with practiced skill, though enormous aggressive sea creatures lurk in the darkness. The planet orbits a yellow star and hosts three moons with orbital shipyards and factories. Human colonists have built grand architecture and settlements atop the grasslands for thousands of years, creating a dual civilization.

  - title: "Gungans and Humans of Naboo"
    keywords: "gungan, human colonist, naboo, dual culture, underground city, monarchy"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Naboo's population of 4.5 billion comprises Gungans (72%) and human colonists (27%), with other species forming a tiny minority. The humans dominate the surface, electing monarchs to rule during their terms, while native Gungans govern through bosses who form councils and control the vast underwater realms. Though both civilizations have inhabited the world for millennia, trust between them remains fractured by historical conflict and cultural distance. Gungans are thoroughly familiar with the planet's submerged routes and caverns, knowledge hard-won and jealously guarded. Each group maintains separate capitals—Theed for humans, Oteh Gunga for Gungans—yet both are represented in galactic affairs through shared diplomatic channels.

  - title: "Naboo's Geologic Mystery"
    keywords: "plasma core, cavern system, submerged tunnel, geological formation, sea creature"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Naboo's geological structure defies standard planetary science. Most worlds of its size and type possess molten cores; Naboo's plasma core instead eats away at rocky lower layers, creating an endless network of submerged tunnels and caverns that run beneath the surface. These formations represent both treasure and terror—viable underwater routes connect distant points around the world, yet enormous predatory sea creatures dwell in the depths, making passage hazardous. The Gungans have mapped many passages over generations, and their mastery of these routes gives them unique strategic advantage and cultural identity tied to the underwater realms.

  - title: "Separatist Infiltration on Naboo"
    keywords: "separatist, sabotage, spy, gungan dissident, secret operation, clone wars"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "news"
    content: |
      While Naboo remains officially loyal to the Republic during the Clone Wars, the Separatist cause has found unexpected purchase among disgruntled Gungan populations. Historical grievances between human and Gungan communities create fractures that Separatist propaganda exploits, though Gungan government officials remain largely resistant to recruitment. The Separatists have successfully launched secret operations on Naboo, though most prove short-lived. Republic forces remain vigilant against infiltration, and whispers of spies and saboteurs occasionally surface in diplomatic and military circles. The presence of powerful Republic figures on Naboo adds strategic value, making the planet a nexus of competing interests.

  - title: "The Elders' War"
    keywords: "elders, ancient species, gungan, war, ruins, statue, swamp"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Millennia before human colonization, an ancient species known as the Elders arrived on Naboo and waged brutal warfare against the native Gungan civilization. The conflict was violent and devastating, leaving scars upon the planet's landscape. Though the Elders departed as mysteriously as they came, enormous ruined stone statues and monumental visages remain scattered throughout Naboo's swamps and marshlands—silent testaments to that distant conflict. These relics baffle contemporary scholars and serve as reminders of forces and civilizations long vanished from the galaxy.

  - title: "Separatist Operations on Naboo"
    keywords: "separatist, gungan, sabotage, spy ship, tactical droid, b1 battle droid, b2 super battle droid"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    zone_scope: "naboo"
    content: |
      Separatist forces have established covert operations on Naboo, with agents working among the Gungan population to undermine infrastructure. A T-series tactical droid designated TX-532 commands a cell operating from a camouflaged disk-shaped spy vessel hidden deep in dense forest. The operation employs standard B1 and B2 battle droid squads for security and enforcement. Local Gungan shop owners and business operators have grown resentful of Separatist activities, particularly sabotage to critical systems like power generators.

  - title: "Tatooine: Desert World of Hutts and Exiles"
    keywords: "tatooine, hutt, desert, outer rim, spaceport, moisture farmer, harsh environment"
    category: "location"
    priority: 9
    planet: "tatooine"
    surface_affinity: "ambient"
    content: |
      Tatooine bakes eternally under twin suns in the Arkanis sector, a sparsely populated desert world where survival against heat, sandstorms, and hostile creatures is the primary concern. The planet hosts scattered settlements and a few major cities including Mos Eisley and Mos Espa, connected by the Triellus Trade Route to Hutt Space. Life in the cities brings constant danger from criminals and slavers, while the wilderness offers little refuge from Tusken Raiders and Jawas. The sand gets everywhere, a constant irritant to those struggling to survive.

  - title: "Hutt Control and Criminal Governance on Tatooine"
    keywords: "hutt kajidic, criminal underworld, slave trade, smuggling, bounty hunting, tatooine"
    category: "faction"
    priority: 9
    planet: "tatooine"
    surface_affinity: "dialogue"
    content: |
      Tatooine sits beyond Republic borders in secure Hutt control, allowing the kajidics to operate gambling dens, smuggling rings, slave trading operations, and extortion schemes without legal constraint. A powerful Hutt crime lord maintains thousands of slaves and dominates the criminal underworld, casting a long shadow over all society. The Clone Wars have forced the Republic to negotiate with these criminals for access to vital hyperspace trade routes that circumvent Separatist space, while the Separatists risk even larger incursions to strike at their enemies through Hutt intermediaries.

  - title: "Tusken Raiders: Sand People of the Wastes"
    keywords: "tusken raiders, sand people, nomadic, low-tech, wasteland, hostile"
    category: "faction"
    priority: 7
    planet: "tatooine"
    surface_affinity: "encounter"
    content: |
      The Tusken Raiders maintain their nomadic, low-technology culture across Tatooine's wastelands in defiance of the planet's harsh environment and Hutt domination. Regarded by settled populations as vicious brutes, they pose a constant threat to isolated moisture farms, trade caravans, and smaller settlements. Their intimate knowledge of desert survival and territorial claims make them a formidable obstacle for those venturing beyond city walls.

  - title: "Jawas and Sandcrawler Scavenging"
    keywords: "jawa, sandcrawler, scavenger, technology, nomadic, tatooine"
    category: "faction"
    priority: 6
    planet: "tatooine"
    surface_affinity: "ambient"
    content: |
      Jawas adapted to Tatooine by taking over abandoned mobile mining processing plants, transforming them into massive sandcrawlers. These nomadic scavengers drive across the desert landscape, collecting and recycling salvaged technology to trade with isolated farms and remote settlements. Though reviled for their indiscriminate acquisition of goods, Jawas provide a critical service bringing recycled components and equipment to communities otherwise cut off from standard supply chains.

  - title: "Podracing Culture on Tatooine"
    keywords: "podrace, mos espa, grand arena, dangerous, excitement, sport"
    category: "concept"
    priority: 5
    planet: "tatooine"
    surface_affinity: "news"
    content: |
      Mos Espa hosts the Grand Arena, venue for Tatooine's dangerous and thrilling Podraces—high-speed competitions that draw spectators and participants seeking fortune, glory, or escape. The races represent some of the few entertainment attractions on the harsh world, though participants risk death in explosive competition.

  - title: "Clone Wars Impact on Tatooine's Neutral Status"
    keywords: "clone wars, republic, separatist, hutt, trade route, neutral, galactic conflict"
    category: "concept"
    priority: 7
    planet: "tatooine"
    surface_affinity: "news"
    content: |
      Though Tatooine remains outside the direct theaters of the Clone Wars, the galactic conflict has elevated the planet's strategic importance. Both the Republic and Separatists court Hutt support to access vital hyperspace routes and resources, making neutral Tatooine a crossroads where distant war touches criminal affairs and local politics.

  - title: "Separatist Droid Forces"
    keywords: "droid, confederacy, b1 battle droid, magnaguard, separatist army, cis"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Confederacy of Independent Systems deploys a vast array of combat droids across contested worlds. From the ubiquitous B1 battle droid—mass-produced and economical but unreliable—to the deadly IG-100 MagnaGuard with its advanced programming and lethal efficiency, Separatist droid forces represent a constant threat. Whether a soldier faces waves of B1s or encounters a lone MagnaGuard, the technological sophistication of CIS droids demands tactical respect and caution.

  - title: "The Galactic Republic's Military Structure"
    keywords: "grand army of the republic, gar, clone soldiers, officer, specialist, senator, diplomat, rank, duty"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Grand Army of the Republic draws its command structure and specialists from across the galaxy. Clone troopers form the backbone of frontline forces, while non-clone officers, engineers, spies, and diplomats fill crucial roles. Representatives and senators operate alongside military personnel, and planetary militias defend their homeworlds. The GAR rarely struggles with supply lines—ammunition, spare parts, rations, and equipment flow readily to those in uniform. Rank and responsibility increase as soldiers prove their loyalty and heroism, granting both greater standing in the war effort and access to superior resources.

  - title: "Jedi in the Clone Wars Era"
    keywords: "jedi, force user, lightsaber, republic, public recognition, resources, undercover, separatist worlds"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      The Jedi Order remains a pillar of the Republic during the Clone Wars. Force-sensitive heroes openly wielding lightsabers are celebrated and easily recognized across most worlds, receiving warm welcomes and access to training and resources. However, this prominence carries risk—Jedi operating on Separatist-occupied worlds must exercise caution or operate undercover to avoid immediate conflict. The traditions of the Jedi Order, with its emphasis on moral strength and emotional discipline, shape how Force users approach their roles in this tumultuous era.

  - title: "Fringe Operatives in Wartime"
    keywords: "bounty hunter, smuggler, fringe, war profiteer, instability, independent"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "bounty"
    content: |
      The Clone Wars create opportunities for those operating outside official military structures. Bounty hunters, smugglers, and other independent operators exploit the chaos and instability of the conflict to pursue their own agendas. With Republic and Separatist forces focused on larger battles, the fringe worlds and neutral territories become hunting grounds for credits and survival. These operatives rarely concern themselves with the ideological clash between the Confederacy and the Republic—only with the advantage the war's disorder offers.

  - title: "Diplomacy and Senate Negotiations"
    keywords: "senate, diplomat, negotiation, senator, separatist sympathizer, peace, conflict prevention"
    category: "concept"
    priority: 7
    planet: "coruscant"
    surface_affinity: "dialogue"
    content: |
      Even as armies clash across distant worlds, representatives and senators engage in high-stakes negotiations within the halls of power. Diplomats work to sway worlds toward the Republic or prevent their defection to the Separatist cause. The outcome of such negotiations can determine whether a world experiences warfare at all, making diplomatic efforts as consequential as any military victory. Senators sympathetic to the Separatist cause work to undermine Republic solidarity, while loyal diplomats strive to preserve the Galactic Republic's coalition.

  - title: "Infantry Squad Formations"
    keywords: "dug in, skirmish, support fire, comm silence, search party, defensive posture, formation tactics"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Ground squads employ specialized tactical formations to maximize their combat effectiveness. A 'Dug In' formation hardens defenses against incoming fire. 'Skirmish' overlaps firing arcs to sweep for enemies and disrupts enemy weapon systems. 'Support Fire' coordinates soldier fire to bolster their leader's accuracy. 'Comm Silence' goes dark to move undetected, though any comlink transmission immediately breaks the formation. 'Search Party' uses organized grid patterns to track targets across terrain more efficiently than scattered troops could manage.

  - title: "Military Objective Focus"
    keywords: "battle objectives, mission focus, targets of opportunity, command discipline, mining facility"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      Competent military commanders maintain rigid focus on primary objectives throughout battle. Targets of opportunity—enemy supply lines, reinforcement routes, secondary installations—remain subordinate to the central goal. A Separatist commander defending a mining facility keeps forces concentrated there rather than risk large units disrupting distant Republic supply chains. An unfocused or unskilled commander, however, scatters forces on desperate gambits that destabilize the battle's flow and create opportunities for heroes to exploit.

  - title: "The Outer Rim: Lawlessness and Necessity"
    keywords: "outer rim, lawlessness, criminal cartels, unstable governments, necessity"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Outer Rim operates far from the oversight of the Galactic Senate, where criminal cartels and unstable governments create an environment where actions are taken out of necessity rather than preference. Life on the fringe is defined by the absence of central authority and the prevalence of informal justice. The chaos of the Clone Wars intensifies this dynamic, as both the Republic and Separatists vie for control while criminal elements exploit the conflict for profit and survival.

  - title: "Fringe Operations During the Clone Wars"
    keywords: "smugglers, pirates, bounty hunters, refugees, fringe, underworld, temporary alliances"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "bounty"
    content: |
      Characters operating on the fringe during the Clone Wars find unique opportunities amid the chaos. Smugglers and pirates can move contraband more freely as military forces concentrate on battlefronts. Medical personnel, technicians, and political operatives are in high demand on war-ravaged worlds. Both the Republic and Separatists occasionally contract with criminal elements and fringe operators, creating situations where the same group might accept jobs from opposing sides within days of each other.

  - title: "Weakened System Security in the Clone Wars Era"
    keywords: "republic navy, military, system security, grand army, law enforcement, bounty hunters"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Grand Army of the Republic focuses entirely on military operations rather than police actions across the systems. The Republic Navy's vessels are deployed to battlefronts, leaving individual systems with reduced security infrastructure. This absence of overwhelming law enforcement presence makes interplanetary smuggling and bounty work considerably easier, though criminal syndicates operate with the same freedom, creating unpredictable dangers for fringe operators in any given sector.

  - title: "Obligation and Shifting War Dynamics"
    keywords: "obligation, factions, balances of power, separatist conquest, benefactors, rivals"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "news"
    content: |
      As systems fall to the Separatists or come under Republic control, the obligations binding characters to various factions shift and intensify. An erstwhile benefactor may reconnect seeking aid after their world is threatened. An old rival might cut a deal with Republic officials, suddenly becoming a problem. The unpredictable nature of these obligations reflects the fluid political landscape, where yesterday's enemy could become tomorrow's temporary ally in the face of military occupation.

  - title: "Outer Rim Species and the Clone Wars"
    keywords: "twi'leks, trandoshans, wookiees, gands, rodians, spacelanes, outer rim"
    category: "concept"
    priority: 5
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Outer Rim populations—humans, Twi'leks, Trandoshans, Wookiees, Gands, and Rodians—are well-traveled across the major spacelanes. Many originate from worlds that become embroiled in the Clone Wars. As these species move through their normal commerce and survival activities, they inadvertently influence the battles and political outcomes of the conflict, bringing local perspectives and connections to galactic struggles.

  - title: "Clone Trooper Units and Squad Dynamics"
    keywords: "clone troopers, clone officer, clone pilot, squad, platoon, regiment"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Clone units operate with clear hierarchies, from Clone Officers commanding squads to specialized Clone Pilots handling air and space operations. A typical unit might include soldiers trained for different environmental conditions—desert, urban, aquatic, or zero-gravity warfare. The professionalism and cohesion of these units makes them formidable on any battlefield, though individual clones may develop distinct personalities and tactical preferences despite their genetic similarity.

  - title: "Jedi Authority Over Clone Regiments"
    keywords: "jedi, clone troopers, regiment, command authority, negotiation, military"
    category: "faction"
    priority: 7
    planet: "all"
    surface_affinity: "dialogue"
    content: |
      Jedi often hold command authority over clone regiments, coordinating military strategy and diplomatic negotiations. A Jedi might work alongside senators, planetary governors, or leaders of allied worlds to prosecute campaigns against Separatist forces. These Jedi generals combine military expertise with diplomatic skill, though the tension between military necessity and political negotiation frequently creates complex operational challenges.

  - title: "Hired Defense of Colonial Settlements"
    keywords: "colonists, hired guns, mercenaries, defense, separatist forces, republic forces"
    category: "concept"
    priority: 6
    planet: "all"
    surface_affinity: "bounty"
    content: |
      Colonial communities caught between Republic and Separatist forces often hire mercenaries and gun-for-hire to protect their systems and settlements. These hired defenders operate independently of official military command, creating situations where they may oppose both major factions equally or ally with whichever power offers better terms. The desperation of colonists creates steady work for skilled operatives willing to take risks.

  - title: "Recurring Nemeses in Clone Wars Conflicts"
    keywords: "nemesis, recurring villain, worthy opponent, iconic enemy, competent foe"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The most memorable conflicts feature powerful, recurring opponents who plague heroes across multiple encounters and adventures. Such a nemesis is defined by competence, resilience, and the ability to survive initial defeats. These powerful adversaries possess the skills and resources of fully-realized combatants, making them substantially harder to eliminate than common soldiers. A truly iconic nemesis creates personal motivation for heroes to persist in opposition despite the cost.

  - title: "Droid Phalanx Tactics"
    keywords: "separatist, battle droids, phalanx, tactics, overwhelming force, columns"
    category: "faction"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The Separatist military deploys battle droids in long, relentless columns across contested battlefields—mechanical formations that advance with inexorable precision. These phalanxes are designed to overwhelm entrenched positions through sheer, implacable numbers. The Separatist leadership accepts droid losses as acceptable costs; what matters is achieving the objective. Soldiers and clone troopers who have faced these formations report the terrifying sound of synchronized metallic footfalls, hundreds or thousands of identical units marching in perfect lockstep. Phalanxes are typically employed to hold a single location or protect an objective for the duration of a critical engagement—whether defenders are waiting for extraction, reinforcements, or simply buying time for a fortress to mount its defense.

  - title: "Clone Wars Campaign Scale and Scope"
    keywords: "clone wars, galactic conflict, multiple fronts, campaign setting, planetary warfare"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "ambient"
    content: |
      The Clone Wars encompass an enormous portion of the galaxy, with hundreds of distinct battle fronts erupting simultaneously across dozens of worlds. Conflicts of this scale are staggering in scope: hundreds of thousands of soldiers engage in each major engagement, with logistics and command-and-control challenges that boggle comprehension. Few beings—regardless of their allegiance—can escape the war's consequences entirely. The Separatist Confederacy shows no restraint in targeting civilian infrastructure, businesses, and planetary governments for their resources. Even neutral worlds and smuggler havens feel the war's pressure. Any location the heroes visit exhibits some mark of the conflict, whether subtle or dramatic, and these signs can rapidly escalate into active combat.

  - title: "Battle Objectives and Tactical Goals"
    keywords: "battle planning, military objectives, tactics, defensive strategy, offensive goals"
    category: "concept"
    priority: 8
    planet: "all"
    surface_affinity: "general"
    content: |
      Every large-scale engagement in the Clone Wars hinges on specific tactical objectives that define how both combatants will fight. Attackers assaulting a factory, mine, or communications array will avoid weapons that could damage the installation they seek to capture. Conversely, forces tasked with destroying a military asset may unleash artillery and orbital strikes without hesitation. Defenders fighting to retain control of a facility will commit to desperate, inch-by-inch resistance and rely on reinforcement arriving in time. Those defending a location already marked for evacuation adopt more conservative tactics, accepting retreat to fight another day. Understanding both sides' true objectives—even when the heroes remain ignorant of them—allows a Game Master to portray the ebb and flow of battle authentically and ensure all combat encounters reflect each faction's strategic priorities.

  - title: "War Consequences and Sustained Conflict"
    keywords: "war consequences, supply disruption, factory destruction, reinforcements, tactical impact"
    category: "concept"
    priority: 7
    planet: "all"
    surface_affinity: "general"
    content: |
      Actions during the Clone Wars carry strategic ripples across the entire conflict. A Republic strike that destroys a Separatist droid factory in one campaign arc means the Confederacy may lack B1 units during critical engagements weeks later, forcing them to substitute alternate models or redeploy existing forces. Supply shortages compound over time. Successful campaigns to seize or deny resources reshape the military balance across entire sectors. Game Masters should track these consequences and allow them to meaningfully affect later adventures, ensuring that the heroes' victories and defeats reverberate through the ongoing campaign rather than being isolated encounters.

  - title: "B1 Battle Droid"
    keywords: "battle droid, clanker, separatist, droid army, blaster rifle, networked control"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The original battle droids that served the Trade Federation on Naboo have largely been replaced by newer models, though mass-produced B1s still form the backbone of Separatist armies. Early generation droids relied on networked control systems, but vulnerabilities in this approach prompted the development of fully independent units. Despite their reputation as expendable cannon fodder, large numbers of B1s under a competent commander present a grave threat due to the sheer volume of blaster fire they can sustain and coordinate. Clone troopers who dismiss the basic 'clankers' as insignificant often learn this lesson the hard way.

  - title: "B2 Super Battle Droid"
    keywords: "super battle droid, destroyer, shock trooper, separatist elite, reinforced plating, bodyguard"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The B2 Super Battle Droid represents a significant advancement over standard battle droids, standing nearly two meters tall and encased in reinforced armor plating with integrated sensors. Only their significantly increased cost prevents them from replacing basic droids entirely. The CIS deploys B2s as vanguard units and shock troops in advance missions, and they are often assigned as bodyguards for Separatist officers and dignitaries. A pair of B2s is generally considered sufficient to restrain most prisoners short of a Force user. Though their combat programming can be relatively simple, their durability and integrated weapons make them formidable opponents.

  - title: "Buzz Droid"
    keywords: "buzz droid, sabotage droid, starfighter, vehicle killer, disposable, discord missile"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Technically designated Pistoeka sabotage droids, buzz droids are diminutive machines deployed via discord missiles to target enemy starfighters and transports. Individually insignificant even against lightly armored fighters, swarms of buzz droids can strip a vessel of its plating and tear through vital systems with alarming speed. Removing them typically requires exceptional piloting or intervention from onboard droids like astromech co-pilots, as pilots cannot spare attention mid-flight to deal with the infestation directly. Despite their destructive capability against vehicles, buzz droids are relatively defenseless when confronted directly, lacking true weapons or redundant systems—a deliberate design choice by CIS manufacturers treating them as disposable ordnance.

  - title: "C-8 Saboteur Droid"
    keywords: "saboteur droid, infiltration, demolition, stealth, matte-black, sensor masking"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      C-8 saboteur droids operate in small independent squads detached from primary divisions, striking without warning and inflicting maximum damage before vanishing into the chaos of their own attacks. Their matte-black plating and featureless faceplates present an intimidating appearance—described as resembling a void in humanoid form. Standing only 1.2 meters tall, they deploy with sensor-masking technology to defeat detection and carry internal weapon compartments that conceal their armaments until deployment. When infiltrating fortified targets, they sometimes carry demolition charges to plant during their strikes, making them a critical threat for Republic installations and forward bases.

  - title: "DRK-1 Probe Droid"
    keywords: "probe droid, reconnaissance, sensor masking, microgrenade, spy, separatist intelligence"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      DRK-1 probe droids are rare reconnaissance platforms believed to number around 25 across the galaxy, though few have been recovered and fewer still have been fully studied. First reported during the Battle of Naboo, they have been spotted at isolated sites across known space, their true operational authority and mission parameters unknown even to many Separatist commanders. These droids employ sophisticated sensor-baffling technology to become virtually undetectable to electronic scanners, while their small size and high speed make them difficult targets for conventional detection. When engaged, they typically open fire with micro-grenade launchers, attempting either to destroy their target or force a self-destructive response.

  - title: "Droideka"
    keywords: "droideka, destroyer droid, shield projector, energy shield, heavy weapons, mobile fortress"
    category: "technology"
    priority: 10
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Droidekas, also known as destroyer droids, rank among the most dangerous battle units regularly deployed by the Separatists in large numbers. These lethal opponents are capable of facing down entire squads of clone troopers and represent a genuine threat even to Force users. Destroyer droids excel at rapid repositioning followed by shield deployment, allowing them to take and hold ground with devastating efficiency. Once deployed, their unidirectional energy shields prove nearly impervious to blaster fire and lightsaber strikes alike, while presenting no impediment to the droid's own integrated heavy blasters, which deliver withering volleys. The droids possess a critical blind spot in their rear sensor array that Republic forces exploit through coordinated multi-directional assaults or stealth approaches.

  - title: "DSD1 Dwarf Spider Droid"
    keywords: "dwarf spider droid, walker tank, heavy weapons platform, urban combat, quadrupedal"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Straddling the line between heavy battle droid and light droid tank, DSD1 dwarf spider droids serve as common heavy weapons platforms in Separatist forces. These compact quadrupedal walkers navigate confined spaces with surprising agility thanks to their extensively articulated limbs, making them ideal for urban combat environments and other situations where standard tanks cannot operate effectively. Heavy armor plating covers their bodies, though their undersides remain more lightly armored—a deliberate design choice since they rarely need protection from below. Their firepower stems from a powerful centrally mounted cannon capable of delivering devastating long-range fire, making them formidable fortification destroyers.

  - title: "MagnaGuard Elite Bodyguard Droid"
    keywords: "magnaguard, elite droid, bodyguard, electrostaff, cortosis, close combat, separatist leadership"
    category: "technology"
    priority: 9
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Elite bodyguard droids reserved for the highest echelon of Separatist leadership, MagnaGuards represent a significant financial investment but are considered worth every credit spent. Each unit is equipped with advanced close-combat protocols and cortosis-plated electrostaves, making even a single droid a formidable opponent in melee engagement—capable of matching most Force users in direct combat. Their hardened durasteel armor provides substantial protection against blaster fire at range. While their primary function is protecting important Separatist officials, some models receive additional modifications including pilot systems or heavy weaponry to serve in assault operations, leveraging their impressively wired reflex circuits.

  - title: "LM-432 Crab Droid"
    keywords: "crab droid, heavy tank, separatist armor, droid walker, blaster cannon, open terrain"
    category: "technology"
    priority: 8
    planet: "geonosis"
    surface_affinity: "encounter"
    content: |
      The LM-432 crab droid ranks among the heaviest units deployed in Separatist ground forces. Its six powerful limbs can batter aside opposition in close quarters, while dual blaster cannons mounted beneath the main chassis engage distant foes—sometimes before enemies can return fire. Though less effective in urban environments or constrained spaces than smaller walkers or battle droids, a detachment of crab droids can dominate large-scale engagements across open terrain. Their thick plating negates the tactical necessity of seeking cover, making them devastating in force-projection scenarios.

  - title: "Pilot Battle Droid B1 Series"
    keywords: "pilot droid, b1 series, cis crew, vehicle crew, fighter pilot, naval crew"
    category: "technology"
    priority: 7
    planet: "all"
    surface_affinity: "encounter"
    content: |
      The B1 pilot droid represents an upgraded cognitive variant compared to standard infantry counterparts. Beyond basic combat and piloting protocols, these droids are programmed to maintain and repair the ships and vehicles they operate. Whether stationed in fighter wings, aboard massive battleships, or crewing AAT-1 hover tanks, pilot droids form the standard crew complement of the CIS fleet. Republic forces encounter them regularly during boarding actions and ship-to-ship engagements, where their technical expertise and combat training make them dangerous adversaries.

  - title: "5-43 Enforcer Droid (Hutt Syndicate)"
    keywords: "enforcer droid, hutt enforcer, crime droid, 5-43, underworld, debt collection"
    category: "technology"
    priority: 6
    planet: "nar_shaddaa"
    surface_affinity: "encounter"
    content: |
      A consortium of Hutt crime lords developed the 5-43 enforcer droid line based on stolen Separatist battle droid schematics, modified to suit their criminal interests. Skimping on chassis reinforcement to cut costs, these droids are more fragile than standard battle droids, but compensate with upgraded processors designed to handle the deception and trickery endemic to underworld operations. Equipped with integrated, non-removable weapons, 5-43 units cannot be disarmed. Despite their fragility, the project has proven a considerable investment, with orders flooding in from crime lords across the galaxy to deploy against lowlifes and delinquent debtors.

  - title: "T-Series Tactical Droid Commander"
    keywords: "tactical droid, t-series, cis commander, advanced processor, military strategy, droid leadership"
    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      T-series tactical droids serve as field commanders for smaller droid detachments and as strategic advisors to the upper echelons of CIS military leadership. Their advanced processors are responsible for many of the Confederacy's most successful stratagems, calculating odds and directing operations with mechanical precision. Though their confidence borders on arrogance, they rarely fail against conventional opponents. Their blocky frames offer reasonable resistance to damage but prove ill-suited for direct combat relative to specialized droid warriors, so tactical droids rarely approach front lines. When directly involved in conflict, their precise assessments of victory conditions can inspire Separatist fighters while demoralizing Republic troops familiar with their calculated accuracy.

