      The Supreme Chancellor's Guard are elite Republic soldiers stationed at the highest levels of Coruscant's government. Armed with distinctive force pikes that crackle with charged energy, they wear form-fitted guardsman armor of matte black that bears the insignia of the Chancellor's office. These sentries are trained in both ranged and melee combat, their perimeter sweeps methodical and their presence a visible reminder of the Chancellor's authority during these turbulent Clone Wars years.

