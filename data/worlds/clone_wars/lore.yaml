    category: "technology"
    priority: 8
    planet: "all"
    surface_affinity: "encounter"
    content: |
      Malacia is an advanced Jedi Force technique that turns an opponent's own sense of balance against them, inducing profound dizziness and nausea without inflicting lasting physical harm. The affected target suffers severe disorientation—losing coordination in combat and movement—though the effect fades within two rounds. Force-sensitive victims may resist by drawing upon their control of the Force, reducing the debilitation. Only a handful of Jedi have achieved true mastery of this subtle and demanding art, passed down through direct training from accomplished practitioners.

  - title: "Thisspian Physiology and Heritage"
