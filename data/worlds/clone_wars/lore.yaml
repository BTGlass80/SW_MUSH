    content: |
      Chagrians are distinctive blue-skinned near-humans whose lethorns drape from their shoulders like ceremonial vestments. Native to a high-radiation world, their physiology evolved to screen harmful stellar radiation; they command respect in galactic bureaucracy through their mastery of parliamentary procedure and their refined taste for rare art and antiquities. In Senate corridors, a Chagrian's presence often signals complex political maneuvering and long-standing networks of influence.

