#       Imperial bounties fall under eight classifications. Most Wanted and Galactic postings appear on all DataCore boards across the Empire. Regional bounties cover multiple sectors. Sector, System, and Local bounties are progressively more limited in scope. Corporate bounties are posted by companies and are only legally binding within that company's territory. A separate 'Locate and Detain' list covers individuals the Empire wants alive for questioning — killing a Locate and Detain target can result in penalties up to and including execution of the hunter.

