#       Bounty hunters fall into three categories. Imperial hunters work exclusively for the Empire, taking only government-authorized bounties — they are often ex-military and receive equipment discounts and subsidized transport. Guild hunters operate through their syndicate, which assigns contracts and takes a percentage — they get equipment, training, and sanctuary but have no choice in assignments. Independent hunters work alone, taking any contract from any source — they keep everything they earn but bear all expenses and have no institutional support. Most hunters are independents, but most successful hunters belong to a guild.

