#       Official Imperial bounty postings follow a standard format: the target's name, species, sex, age, homeworld, and known associates; the bounty amount in credits; the classification (Galactic, Regional, Sector, etc.); application conditions (Alive, Dead or Alive, or Dead); any bonus for special conditions; determents or restrictions on methods; the crimes warranting the bounty; the originator who posted it; and the receiver to whom the acquisition must be delivered. A brief narrative describes the circumstances. Typical bounties range from 2,000 credits for minor sector violations to 25,000 or more for galactic-class fugitives.

