#       Bounty hunter guilds — also called syndicates or houses — are privately established organizations that broker contracts between hunters and those posting bounties. Major guilds include House Benelex (kidnapping retrievals, Outer Rim), House Neuvalis (the largest, 6,790 hunters, bounties under 20,000 credits only), House Paramexor (murder contracts exclusively), and House Renliss (female hunters only, bounties on males). Guilds take a 'gap' of 3 to 10 percent from each bounty's face value. In return they provide equipment, repairs, training, intelligence, legal mediation, and sanctuary from Imperial officials.

# REJECTED [era:Imperial, era:Empire]:
