#       An Imperial Peace-Keeping Certificate is the license required to operate as a bounty hunter in the Empire. It costs 500 credits and must be renewed annually. The IPKC entitles the holder to carry weapons that would otherwise be illegal and to transport captured individuals. It is valid in most regions, though some Core Worlds prohibit bounty hunting entirely. Imperial officials review the holder's record at each renewal — flagrant violations of Imperial law can result in revocation, though the Empire usually prefers token fines and stern warnings.

