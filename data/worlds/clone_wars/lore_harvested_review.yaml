#       The Force detector is a rare Imperial scanning device, originally commissioned to hunt down Jedi survivors of the Purge. The three-component system — a control pack and two crystal paddle readers — scans a subject from head to toe and generates a wire-frame hologram overlaid with a color-coded aura. A blue aura indicates Force sensitivity; the stronger the corona, the stronger the connection to the Force. Those who carry the stain of the dark side show an aura tinged with red. Fewer than ten thousand were ever produced, most now lost or destroyed. The Jedi Council regards them with deep unease: a device that reduces a person's soul to a readout is, they argue, precisely the kind of technology the Order should not use — and precisely the kind the Empire will.

