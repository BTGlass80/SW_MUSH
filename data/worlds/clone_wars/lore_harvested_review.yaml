#       The Imperial Enforcement DataCore is a specialized database maintained by the Imperial Office of Criminal Investigations. It lists all legal bounties in the Empire — who is wanted, by whom, and for how much. Hunters access it at local Imperial offices or through posting agencies and guild houses. A datacard listing a specific bounty costs 10 credits. Searching boards on other planets costs 50 credits. Posting agencies charge 10 to 25 credits per day for DataCore access and maintain their own supplemental intelligence on targets.

# REJECTED [era:Imperial, era:Empire]:
