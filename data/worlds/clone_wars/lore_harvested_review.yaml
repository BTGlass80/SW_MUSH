#       Spaceports are classified by the official galactic bureaucracy into five tiers: Landing Field (a flat space cleared on the ground; no services, no control tower, ships risk collisions on landing), Limited Services (a small tower, basic refueling, limited maintenance), Standard Class (full control tower, restocking, minor repairs and modifications, possibly at premium), Stellar Class (multiple shipyards capable of major repair and customization, usually with a Customs office on site), and Imperial Class (luxurious, lavish facilities, expensive services, well-staffed Customs office with portable scanners). Docking fees scale with class: Standard runs 50 credits per day; busy Imperial-class ports may charge up to 150 per day. The class-name is era-agnostic in galactic usage; non-Imperial governments use the same five-tier scale for their own spaceports.

