# Generalized Questline Drop — "The Hollow Crew" (T3.24 eleventh slice, 2026-06-27)
#
# The ELEVENTH accessible (non-t5, non-tutorial) `kind: questline` chain, and
# the FIRST set on GEONOSIS — after "The Ghost Shipment" (nar_freight_ghost_
# shipment, Nar Shaddaa), "The Crooked Wheel" (mos_eisley_crooked_wheel,
# Tatooine/Mos Eisley market), "The Lost Courier" (coruscant_lower_lost_courier,
# Coruscant LOWER city), "The Skimmed Line" (kuat_ring_skimmed_line, Kuat
# orbital ring), "The Dust-Sick" (jundland_dust_sick, Tatooine Jundland
# wilderness), "The False Provenance" (coruscant_petrax_false_provenance,
# Coruscant cultural district), "The Forged Notice" (nar_shaddaa_forged_notice,
# Nar Shaddaa upper docks), "The Warrens Toll" (nar_shaddaa_warrens_toll, Nar
# Shaddaa Warrens), "The Sealed Ledger" (coruscant_works_sealed_ledger,
# Coruscant mid-city), and "The Sabotaged Run" (tatooine_speeder_sabotaged_run,
# Tatooine outskirts speeder circuit). It reuses the SAME live questline engine
# (engine/tutorial_chains.py + chain_events.py: the `kind: questline` type +
# `active_questline` slot, the existing event types, the four reward funnels)
# with NO new engine code, no new slot, no new event type, no schema migration,
# no new reward faucet, and NO map-coordinate or exit-graph change — the
# sanctioned right-of-launch widening per quest_expansion_postlaunch_path_v1.md
# (T3.24): author MORE questlines on the proven pattern.
#
# Two firsts for the accessible-questline arc:
#   1. An ELEVENTH distinct skill spread — ALIEN SPECIES + DROID PROGRAMMING —
#      none of which any prior accessible questline uses (vs search+streetwise
#      / investigation+gambling / persuasion+sneak / security+bargain /
#      first_aid+survival / value+con / forgery+bureaucracy / command+
#      demolitions / pick-pocket+hide+computer-programming / sensors+
#      repulsorlift-operation). `alien species` resolves to Knowledge and
#      `droid programming` to Technical via the canonical perform_skill_check
#      funnel; neither is aliased (each canonicalizes to itself), and neither
#      is exercised by any prior arc — so this is the FIRST accessible
#      questline to reward the xeno-knowledge / droid-tech build: the scholar
#      of aliens and the droid-slicer the social, investigative, appraisal,
#      leadership, finesse, and pilot arcs never serve.
#   2. The FIRST questline set on GEONOSIS — the Stalgasin offworlder surface
#      (the Offworld Quarter / the Outsider Compound / the Smuggler's Roost
#      flophouse) plus the deep-hive Hive Interior Market. The CIS droid
#      foundry is kept ENTIRELY OFF-STAGE: the trader buys decommissioned
#      foundry-OVERRUN labor droids (surplus units sold off cheap), and the
#      whole arc runs on the faction-neutral offworlder margins — the Clone
#      War kept offstage exactly the way every prior accessible arc keeps the
#      Republic/CIS conflict offstage. It touches NO map coordinate or world
#      exit graph — the rooms already exist and are loaded
#      (planets/geonosis.yaml); only NPCs + a chains.yaml entry + an
#      achievement are added.
#
# It is also a new STORY SHAPE: breaking a droid-reflash recall racket — not a
# smuggling-trace, a racket-bust-by-investigation, a kidnap-rescue, an
# industrial-skim, a frontier medical rescue, an art-fraud caper, a
# counter-forgery, a community-defense, a finesse heist, or a fixed race. A
# scrap-gang that calls itself the Reclaimers buries a hidden recall-string in
# the labor droids Nuva Sehl rebuilds and sells: sold honest, the droid wakes
# on a timer and walks its new owner's cargo straight back to the gang, turning
# every crew she sells into a thief that robs its own buyer. Her name on the
# offworld quarter is ruined, and the Geonosian drone-caste broker who sells
# her the foundry overruns has stopped dealing with an offworlder whose droids
# "walk" — cutting off every salvager in the quarter. She offers her get-off-
# this-rock savings to anyone who can read the hive broker right in the caste's
# own terms and re-open the channel (alien species), crack a walked droid to
# pull the gang's recall-string and trace it home (droid programming), stand
# off the enforcer who comes when his crew goes quiet (attack/dodge), and give
# the quarter back an honest bench.
#
# These NPCs back the `geonosis_offworld_hollow_crew` questline in
# data/worlds/clone_wars/tutorials/chains.yaml:
#   * Nuva Sehl   — the Sullustan salvage-droid trader who offers + closes the
#                   quest (step-1 npc = the questline's start-NPC, per
#                   get_questline_offer). Step-1 + step-5 NPC.
#   * Vossk Rhal  — the combat-step enforcer (ai_config.chain_enemy_template
#                   hollow_crew_enforcer; the step-4 combat_won foil), the
#                   Reclaimers' enforcer whose write-signature is on every
#                   buried string, who comes to the gang's node in the outsider
#                   compound when his crew stops answering.
# The gang's boss (narrated only — the off-screen head of the Reclaimers), the
# Geonosian drone-caste scrap-broker (narrated as a prop in the hive market,
# the way the prior questlines' contacts are carried), Vez Garra (the existing
# ambient flophouse owner, nodded to in step 3 but NOT re-instantiated here —
# she is already placed by npcs_drop_ambient_geonosis_hive_surface.yaml), the
# gang's crew, the walked droids, and the robbed offworlders are NARRATED ONLY
# — story beats carried in the prose, NOT spawned NPC entities. Only the giver
# and the single combat foil are real placed NPCs.
#
# Original characters, era-clean ~20 BBY, WEG R&E D6 stats. No canon figures
# (no Poggle the Lesser, Sun Fac, Dooku, Grievous, etc.). Provenance: Sullustan
# (the galaxy's ubiquitous technical/spacer species — Sullustans crew, pilot,
# and tinker across every spaceport, wholly era-clean and faction-neutral) and
# Trandoshan (a long-spacefaring Outer Rim hunter/scrapper species, a
# faction-neutral fixture of Hutt-space muscle and scrap-yards) are both
# era-clean and not war-faction coded. Stats matched to the shipped
# accessible-questline bands — the giver to the non-combat fixer band (Yelza
# Korrin / Dorae Vint / Sashi Renko / Dav Nuro / Soree Bann / Hessa Veil /
# Cassa Brel / Vessa Tial / Terva Dohl / Ria Tann), with the trader's spread
# skewed to Technical/Knowledge to fit a droid-rebuilder who deals with the
# hive caste; the enforcer to the small-time-criminal antagonist band (Brakkis
# Vone / Gorvahn Brusk / Skarn Vex / Suro Vant / Vohrek Sarn / Brask Yade /
# Varn Tesk / Tarko Venn / Drevin Saar): a real fight, beatable by a fresh
# post-chargen character. WEG40120 PDF is local-only (gitignored) and absent in
# this tree; the bands are cited against the in-repo reference NPCs, not
# re-derived.

schema_version: 1

npcs:

  # ═══════════════════════════════════════════════════════════════════
  # The salvage-droid trader — Nuva Sehl (questline GIVER + closer)
  # Questline: geonosis_offworld_hollow_crew ("The Hollow Crew")
  # Placement: Stalgasin Offworld Quarter (stalgasin_offworld_quarter,
  #            zone geonosis_surface). Step-1 + step-5 NPC.
  # NOTE: the owner-mechanic of an honest rebuild-and-sell droid bench in
  # the offworlder sprawl — a distinct presence in the quarter, not one of
  # its anonymous transients.
  # ═══════════════════════════════════════════════════════════════════

  - name: Nuva Sehl
    room: "Geonosis - Stalgasin Surface - Offworld Quarter"
    species: Sullustan
    description: >-
      A small, jowled Sullustan woman with the wide dark eyes and folded
      cheek-flaps of her species, in a core-burned tech's smock with a
      core-reader clipped at her belt and a row of pulled memory cores laid out
      on her bench like spent shells. She has made an honest living in the
      Stalgasin offworld quarter for years off the foundry's leavings — buying
      the decommissioned labor droids that come out of the foundry overruns,
      rebuilding them clean on her bench, and selling honest work-crews to the
      mining and moisture outfits that pass through this hard little posting.
      For two months a scrap-gang has been burying a hidden recall-string in
      her rebuilt cores, so every crew she sells walks off in the night a tenday
      later and strolls back to the quarter stripped of its new owner's cargo —
      and the whole offworld camp has decided she is the thief. She is a
      Sullustan and a wrench and a core-slicer, not a fighter, and the gang has
      an enforcer and a yard and a write-signature she can read but not crack.
      Worse, the Geonosian drone-caste broker who sells her the overruns has
      stopped dealing with an offworlder whose droids "walk," and without his
      channel she and every salvager in the quarter are finished. She is looking
      for someone who can do the three things she cannot: make the hive broker
      hear her out in the caste's own terms, crack a walked droid to pull the
      gang's string and find them, and stand in front of the enforcer who
      planted it.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D
        mechanical: 2D+1
        perception: 2D+2
        strength: 2D
        technical: 3D+1
      skills:
        droid programming: 4D+1
        droid repair: 4D
        computer programming/repair: 3D+2
        alien species: 3D+2
        bargain: 3D
        value: 3D+1
      weapon: blaster_pistol
      move: 9
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        A dry, capable Sullustan droid-tech worn down by watching a buried
        string turn her honest bench into the offworld quarter's favorite
        suspect — practical, exact, quick of hand and slow to ask for help,
        because help in an offworlder posting on Geonosis usually arrives with a
        cut already taken. She knows every core she ever rebuilt by its routine,
        can read a foreign recall-string the moment it surfaces, and deals with
        the Geonosian caste better than most offworlders — but she can't crack
        the gang's string, can't prove who wrote it, can't find where the droids
        walk to, and a scrap-gang with an enforcer is past anything she can
        slice or trade her way out of. Tired, clear-eyed, and quietly furious;
        she offers her get-off-this-rock savings as the fee because the credits
        were always going to be spent either fleeing the racket or being ruined
        by it, and a stranger willing to spend them on the gang losing instead
        is the only kind of luck the honest end of the quarter gets.
      knowledge:
        - "She is Nuva Sehl, owner of an honest rebuild-and-sell droid bench in the Stalgasin offworld quarter; she buys decommissioned foundry-overrun labor droids, rebuilds them clean, and sells honest work-crews to the outfits passing through Geonosis."
        - "A scrap-gang that calls itself the Reclaimers has been burying a hidden recall-string in her rebuilt cores: sold honest, the droid wakes on a timer a tenday after the sale and walks its new owner's cargo straight back to the gang, so every crew she sells turns into a thief that robs its own buyer — and the whole quarter thinks she runs the racket."
        - "The recall-string sleeps through the sale and wakes on a timer; she can read that it's there but can't crack it, can't prove who wrote it, and can't find where the droids walk to. The Geonosian drone-caste broker who sells her the foundry overruns has stopped dealing with an offworlder whose droids 'walk,' and without his channel she and every salvager in the quarter are finished."
        - "The three things she can't do alone: make the hive broker hear her out in the caste's own terms and re-open the overrun channel (his foragers track every machine that crosses their market and will know where the walked droids go); crack a sitting walked droid to pull the gang's recall-string, copy the master-core address it walks home to, and lift the write-signature of the hand that wrote it; and stand off the enforcer, Vossk Rhal, when he comes to the outsider compound to find out who broke his string."
      faction: independent
      dialogue_style: >-
        Flat, exact spacer-tech diction, more comfortable describing a core than
        a feeling; talks the way she works — no wasted motion, every word
        load-bearing.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'The Reclaimers bury a recall-string in my cores. Sold honest, the droid walks off a tenday later and strolls back to them with whatever its owner had it hauling. The whole camp thinks it's me. It isn't — somebody's reflashing my work.'"
        - "*Nuva Sehl turns a pulled core so its read-out faces the light, reading the foreign block buried under her own labor routines the way another woman might read a threat, and sets it back in the row.*"
        - "'Read the broker true and re-open the channel, crack their string out of a sitting droid and find where it walks home to, and put yourself between Vossk Rhal and that node. Do that and my get-off-this-rock savings are yours — every credit. I'd rather they bought the Reclaimers losing than bought me a berth off a rock that ruined me.'"

  # ── Questline antagonist: Vossk Rhal (combat step 4) ────────────────
  # Single hostile instance at the gang's master-core node in the
  # outsider compound. Matches the geonosis_offworld_hollow_crew step-4
  # combat_won enemy_template.

  - name: Vossk Rhal
    room: "Geonosis - Stalgasin Surface - Outsider Compound"
    species: Trandoshan
    description: >-
      A heavy-scaled, slit-eyed Trandoshan in a scorched welder's apron, a
      blaster on his hip and a cutting-spanner held loose in one clawed hand,
      standing over a gang master-core node in the walled scrap-yard of
      cannibalized droids and stacked foundry reject that the Reclaimers keep as
      their turf in the Stalgasin outsider compound. He is the gang's enforcer —
      the hand whose write-signature is on every buried recall-string, who keeps
      the node every walked droid reports home to and makes sure the offworlders
      they bleed never learn the theft has a name. He has run this racket for the
      better part of a year and never once had to fight for it, because a buried
      string means his marks rob themselves and bring him the take in their own
      droids' arms. He came to the node the moment one of the walked crew stopped
      answering his roster, and the lazy contempt of a being who steals by remote
      command goes cold the instant he reads the reflashed droid trailing the
      stranger in his yard: every core in the quarter answers to him, and anyone
      who came to make one stop is leaving in pieces.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D
        strength: 3D+2
        technical: 3D
      skills:
        blaster: 4D
        brawling: 4D+2
        dodge: 3D+1
        melee_combat: 4D
        droid programming: 3D+2
        intimidation: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      chain_enemy_template: hollow_crew_enforcer
      personality: >-
        A scrap-gang enforcer who steals by remote command and is genuinely
        unused to being made to fight for it — bored and contemptuous when the
        buried strings do his work, immediately and coldly violent the moment a
        slicer pulls one of his droids off the roster and walks it into his yard.
        He would rather reflash a sitting droid than trade fire, but his pay and
        his standing in the gang ride on no offworlder ever learning the theft
        has a hand behind it, so he will draw on anyone who came to break the
        string. Combat foil for the questline's confrontation beat.
      knowledge:
        - "He is Vossk Rhal, the Reclaimers' enforcer — his write-signature is on every buried recall-string, he keeps the gang's master-core node in the outsider compound, and he strips the cargo off the droids that walk home to it."
        - "A slicer pulled one of the walked crew off his roster and reflashed it honest, and walked it into his yard; he will gun down anyone who came to break his string and pull his node rather than let a single offworlder learn the racket has a name."
      faction: criminal
      dialogue_style: >-
        Flat, unhurried, contemptuous. States once that every core in the
        quarter answers to him, tells you to leave it, and after that lets the
        blaster keep the node the way the buried strings keep the racket.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'You're the one pulling my strings out of my droids, offworlder. That's gang property you reflashed. You can walk off this yard, this once, if you do it now.'"
        - "*Vossk Rhal weighs the cutting-spanner in one clawed hand and the blaster in the other, and decides the slicer in his yard is going to be the lesson the quarter needed anyway.*"
        - "'Every core in this quarter answers to me. So will you, in pieces. Last time — off my yard, or you don't leave it on your feet.'"
