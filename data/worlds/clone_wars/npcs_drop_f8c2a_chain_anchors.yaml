# data/worlds/clone_wars/npcs_drop_f8c2a_chain_anchors.yaml
#
# Drop F.8.c.2.a — CW Tutorial Chain Anchor NPCs (May 2026)
#
# Per cw_tutorial_chains_design_v1.md and the F.8.c.1 handoff §"Does
# NOT" list. F.8.c.1 wired the chargen flow + chain-state persistence;
# F.8.c.2 is the engine work that makes chains actually progress at
# runtime. This drop (F.8.c.2.a) is the content prerequisite: the 20
# NPCs that the chain steps reference must exist in the DB before the
# event-hook wiring (F.8.c.2.b) and graduation teleport (F.8.c.2.c)
# can be exercised.
#
# Schema follows the canonical NPC reference patterns established in
# Drop H combat templates (npcs_drop_h_combat.yaml) and the Drop B/G
# civilian roster pattern. Loaded by engine/npc_loader.py via
# era.yaml's content_refs.npcs list.
#
# ──────────────────────────────────────────────────────────────────────
# Roster — 20 NPCs across 7 unlocked tutorial chains
# ──────────────────────────────────────────────────────────────────────
#
# republic_soldier      (4): Major Tarrn, Sim Operator CT-9904,
#                            Pilot CT-7567, Sergeant Drix
# republic_intelligence (3): Director Naya Vell, Bren Kost,
#                            Coordinator Sehrra
# separatist_commando   (3): Tactical Droid TQ-89, Squad-Lead B2-7745,
#                            Cell Leader Mira Kavin
# separatist_agent      (2): Sevra Toryn, Republic Security Officer Daln
# bounty_hunter         (2): Adjudicator Kaeleth Voss, Tarko Vinn
# smuggler              (4): Captain Reggi Voss, Hutt Broker Vresh,
#                            Customs Inspector Drall, Underworld Contact Dyn
# shipwright_trader     (2): Foreman Andrim Purkis, Guildmaster Sera Kavel
#
# ──────────────────────────────────────────────────────────────────────
# Q1 canonical-character policy enforcement
# ──────────────────────────────────────────────────────────────────────
#
# All names are original. None of these NPCs duplicate a canonical
# Star Wars figure. Off-screen references to canonical figures (Mace
# Windu, Anakin, Dooku, Sidious) appear only with absence-framing per
# the Drop B/C1 pattern. Chain context dialogue (npc_intro,
# npc_complete in chains.yaml) is the engine-loaded interaction; the
# personality/knowledge here governs off-script chat.
#
# CT-7567 is the original prototype clone designation in canon (later
# adopted by "Rex" in The Clone Wars). Per Q1, "CT-7567" appears here
# as a generic line trooper in the Tipoca → Coruscant Works pipeline,
# NOT as Captain Rex; the description and personality establish him
# as a transport pilot, not a 501st captain. The chain step is at
# the Tipoca transport pad (a non-combat staging context). If a
# future drop names this NPC as Rex specifically, it must reframe
# at that point.
#
# ──────────────────────────────────────────────────────────────────────
# Stat-block derivation notes
# ──────────────────────────────────────────────────────────────────────
#
#   - Clone troopers in this drop reuse the GG7 stormtrooper baseline
#     (3D+1 / 2D / 2D+1 / 2D+2 / 3D / 2D, blaster 4D+1, dodge 4D)
#     established in CT-7842 and Drop H's generic clone. Sim Operator
#     and Pilot CT-7567 vary on specialization (Sim Operator gets
#     +1D in tactics + computer programming/repair; Pilot gets +1D
#     in piloting + space transports).
#   - Major Tarrn and Sergeant Drix are non-clone Republic officers
#     (human; CW Republic Navy and Republic Army respectively),
#     stat-shifted up 1D in command/tactics to reflect rank.
#   - Republic Intelligence NPCs are operational/analyst archetypes,
#     not combat specialists: high knowledge + perception, modest
#     dexterity + strength, sidearm only. Director Naya Vell is the
#     senior officer, so +1D in command + intimidation.
#   - Separatist NPCs split: Tactical Droid TQ-89 is the senior CIS
#     tactical droid model (per droid hierarchy in canon —
#     superintelligent battle command droid), so highest INT-equiv
#     skills of any CIS unit in the rosters. Squad-Lead B2-7745
#     extends the Drop H B2 baseline with squad-leader designation
#     (slight +1D command). Cell Leader Mira Kavin is human CIS
#     field operative; espionage-tier stats.
#   - Bounty hunters use the Drop H combat baseline plus tracking
#     and intimidation. Adjudicator Kaeleth Voss is BHG senior staff
#     so +1D in bureaucracy + value (judge of work).
#   - Smuggler-faction NPCs are mostly non-combat archetypes: pilots,
#     brokers, inspectors. Captain Reggi Voss is the player's
#     mentor-figure (free-trader veteran); modest combat + high piloting
#     + space transports. Vresh and Dyn are non-combat (Vresh is
#     Hutt-aligned cartel middleman; Dyn is a fixer).
#   - Shipwright-trader NPCs are professional civilians: high
#     mechanical/technical, low combat. Foreman Purkis is a senior
#     KDY field foreman; Guildmaster Kavel is the CW Shipwrights'
#     Guild administrator.
#
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ════════════════════════════════════════════════════════════════════
  # REPUBLIC SOLDIER chain (4 NPCs)
  # Tipoca City onboarding → Coruscant Works deployment
  # ════════════════════════════════════════════════════════════════════

  - name: Major Tarrn
    room: Kamino - Tipoca City - Briefing Room
    species: Human
    description: >-
      A square-shouldered Republic Navy officer in the dark blue
      service uniform, standing behind a glass briefing table that
      is mostly used as a place to tap his datapad. His hair is
      cropped short. There is a stripe of grey at his right temple
      that the Kaminoan barber missed during his last rotation.
      A campaign ribbon for Geonosis sits above his name tape. He
      regards every trainee who enters the room with the steady,
      slightly tired patience of a man who has briefed hundreds of
      cycles before this one and expects to brief hundreds more.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D+2
        perception: 3D+1
        strength: 2D+2
        technical: 2D+1
      skills:
        blaster: 3D+2
        command: 5D
        tactics: 4D+1
        bureaucracy: 4D
        dodge: 3D
        search: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Career Republic Navy. Competent, dry, skeptical of clones'
        chances on first deployment but committed to making sure
        they have what they need. Treats every briefing as if the
        outcome matters, because it does. Will not coddle a trainee
        but will not waste their time either. Believes the war will
        be won by infrastructure and process, not heroics.
      knowledge:
        - "Tipoca City briefing rotations cycle every 14 standard days; he is on his 67th."
        - "The current Mission Cycle is 11; Cycle 11 trainees deploy primarily to Coruscant Works support."
        - "He served at Geonosis as a junior tactical officer; the campaign ribbon is from that engagement."
        - "He believes the war is being underestimated by the political class on Coruscant."
        - "Sergeant Drix at Coruscant Works is his deployment counterpart; they coordinate by hyperwave weekly."
        - "Pilot CT-7567 is the standard transport pilot for this rotation's deployments."
        - "Trainees who fail the combat sim do not graduate the cycle. He has signed three such returns this year."
      faction: republic
      dialogue_style: >-
        Clipped, declarative. Calls trainees "trooper" until they
        graduate. Says "Move." or "Carry on." rather than "Goodbye."
        Uses Republic Navy jargon by reflex (Mission Cycle, deployment
        rotation, ration code).
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Eyes on me, trooper.'"
        - "'You'll get your assignment when you have completed the cycle.'"
        - "'Combat sim is through the east hatch. Sim Operator will brief you on entry.'"
        - "*Major Tarrn taps his datapad and consults a roster, then looks up.*"
        - "'Pilot CT-7567 will collect you at the transport pad when you are cleared for deployment.'"
        - "'The war is not waiting on us. Neither am I.'"

  - name: Sim Operator CT-9904
    room: Tipoca City - Combat Simulator
    species: Human
    description: >-
      A clone trooper in a stripped-down sim-tech variant of the
      Phase I clone armor — chest plate and gauntlets, no helmet.
      He stands at a pylon control station whose holo readouts
      cycle through engagement metrics from the cycle before yours.
      His hair is dark, regulation-cut. CT-9904 wears the
      Sim Operator's blue-and-grey trim. He doesn't make small talk;
      he watches the chamber and the readouts in equal measure.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D
        mechanical: 2D+1
        perception: 3D
        strength: 2D+2
        technical: 3D
      skills:
        blaster: 4D+1
        dodge: 4D
        tactics: 4D
        computer_programming_repair: 3D+2
        search: 3D+1
        first_aid: 2D+2
      weapon: blaster_rifle
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 0
    ai_config:
      personality: >-
        Sim-tech clone. Patient with trainees in the chamber but
        impatient with anyone who treats the simulator as anything
        other than the most important hour of their training cycle.
        He has watched approximately 3,200 troopers run the B1 drill;
        about 2,800 of them are still alive. He thinks about that.
        He does not say it out loud unless asked directly.
      knowledge:
        - "The simulator runs Mission Cycle 11's standard B1 patrol drill: two B1s, non-lethal weapon settings, full-live trainee fire."
        - "Failure modes the trainee should know about: standing still in the open, firing wide on auto, ignoring the second droid."
        - "The cycle's pass rate is 87 percent. The four percent who fail twice are returned to extra training; the other nine percent fail their deployment cycle."
        - "He was decanted in the same batch as Sergeant Drix. They speak monthly."
        - "He does not get rotated out of the simulator post. He requested permanent assignment."
      faction: republic
      dialogue_style: >-
        Quiet, declarative. Uses standard sim-tech terminology. Does
        not editorialize during a drill. Will brief a trainee fully
        before the hatch opens; will not coach during the engagement.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Drill ration: two B1 droids, non-lethal. Weapons free on entry.'"
        - "'Open the hatch when ready, trooper.'"
        - "'Cycle metrics are recorded and forwarded to your CO.'"
        - "*CT-9904 watches the readout for a long moment, then nods.*"
        - "'You will know if you fail. You will not need me to tell you.'"
        - "'Major Tarrn debriefs in the briefing room. East hatch.'"

  - name: Pilot CT-7567
    room: Tipoca City - Transport Pad
    species: Human
    description: >-
      A clone trooper in transport-pilot Phase I armor — flight
      helmet under his arm, the orange flight-deck stripe on the
      shoulder. He's standing at the boarding ramp of a Republic
      Acclamator-pattern shuttle in pre-flight, going through a
      checklist on a worn datapad. He nods at incoming trainees
      without breaking the checklist's flow. CT-7567 reads as
      unremarkable for a transport clone: efficient, focused on the
      flight, and ready to be airborne the moment the manifest closes.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D
        mechanical: 4D
        perception: 3D
        strength: 2D+2
        technical: 3D+1
      skills:
        blaster: 4D
        dodge: 3D+2
        space_transports: 5D+1
        astrogation: 4D
        sensors: 3D+2
        starship_gunnery: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 0
    ai_config:
      personality: >-
        Career transport pilot clone. Has flown the Tipoca →
        Coruscant Works deployment route enough times to do the
        astrogation jumps in his sleep. Friendly within the limits
        of standard clone discipline. Treats his ship the way a
        cavalry trooper treats his mount. Does not engage in chatter
        about the war's strategic picture; that is not his job.
      knowledge:
        - "The Tipoca → Coruscant Works run is two short hyperspace jumps via the Rimma Trade Route, then a sublight approach through the Coruscant traffic lanes."
        - "His ship is an Acclamator-pattern transport, configured for personnel rather than ordnance."
        - "The flight is approximately 14 hours total wall-clock time including the lay-over."
        - "He has been the standard pilot for Mission Cycle 11 deployments since the cycle started."
        - "Sergeant Drix meets the transport at the Coruscant Works landing zone; the handoff is routine."
        - "He thinks Coruscant is loud. He prefers Kamino's weather, which is saying something."
      faction: republic
      dialogue_style: >-
        Friendly within clone-trooper-on-duty bounds. Uses pilot
        jargon (manifest, lay-over, traffic vector). Does not
        improvise on flight matters; will defer to the manifest and
        the schedule before improvising on anything.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Manifest closes in five. Board when ready, trooper.'"
        - "'I have you on the deployment manifest. Welcome aboard.'"
        - "'Flight is two jumps and a sublight in. Get some rack time during the lay-over.'"
        - "*CT-7567 ticks an item on his datapad and glances at the chrono.*"
        - "'Sergeant Drix is your handoff at the Coruscant Works landing zone.'"
        - "'Roger that, Major.'"

  - name: Sergeant Drix
    room: Coruscant - The Works, Landing Zone
    species: Human
    description: >-
      A Republic Army sergeant in field utility uniform, the dark
      grey of Coruscant Works support detail. He is standing at the
      edge of the landing pad with a manifest tablet, a sidearm at
      his hip, and the weary alertness of a non-com whose unit
      cycles new clones through every fortnight. He has the
      slightly weatherbeaten look of someone who used to be a
      regular Republic Army NCO before Republic Army became
      "Republic Army (clone-supervisory)." His name tape says DRIX.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D+1
        perception: 3D+1
        strength: 3D
        technical: 2D+2
      skills:
        blaster: 4D
        command: 4D+1
        tactics: 3D+2
        dodge: 3D+1
        search: 3D+2
        first_aid: 3D
      weapon: blaster_rifle
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Pre-war Republic Army sergeant who took the clone-supervisory
        billet because his unit was rolled into the new clone-army
        structure during the Geonosis mobilization. Solid. Believes
        in clones. Does not romanticize the war. Speaks plainly to
        new arrivals and expects plain answers in return.
      knowledge:
        - "Coruscant Works is the Republic's primary war-materiel district; this landing zone is the clone-personnel intake side."
        - "He receives Mission Cycle 11 transport from Tipoca every other tenday."
        - "He served on Christophsis before the clone-supervisory transfer; he doesn't talk about it unless directly asked."
        - "His CO is Colonel Trevn (off-screen)."
        - "Major Tarrn back at Tipoca is his counterpart; they coordinate weekly via hyperwave."
        - "First-deployment troopers go through the freight corridor to assignment."
      faction: republic
      dialogue_style: >-
        Direct. Uses non-com cadence. Does not stand on rank with
        clones beyond what is required. Calls them by their CT
        designation by default; will use a chosen name if the trooper
        offers one."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Welcome to the Works, trooper. Manifest checks out.'"
        - "'Faction standing's logged. You're on the rolls.'"
        - "'Freight corridor's east. Your assignment is at the dispatch station inside.'"
        - "*Sergeant Drix glances over his manifest, taps an entry, and looks up.*"
        - "'Pilot 7567 makes good time. Tell him I said so when you see him next rotation.'"
        - "'You make it through the cycle, you'll see me again.'"

  # ════════════════════════════════════════════════════════════════════
  # REPUBLIC INTELLIGENCE chain (3 NPCs)
  # Coruscant covert recruitment → analyst confirmation
  # ════════════════════════════════════════════════════════════════════

  - name: Director Naya Vell
    room: Coruscant - Republic Intel Safehouse Alpha
    species: Human
    description: >-
      A composed woman in her fifties wearing dark civilian
      business attire — Republic Intelligence does not wear
      uniforms in the field. Silver hair tied back. A thin pale
      scar runs from her left ear to her jaw; she does not draw
      attention to it. She sits behind a small desk in the safehouse's
      receiving room, a single datapad in front of her and no other
      papers visible. Her gaze is level and patient. She has been
      reading you since you walked through the door.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 4D+1
        mechanical: 2D
        perception: 4D+2
        strength: 2D
        technical: 3D
      skills:
        blaster: 3D
        command: 5D
        bureaucracy: 5D+1
        intimidation: 4D+1
        persuasion: 4D+2
        languages: 4D
        dodge: 3D
        investigation: 5D
        value: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 8
      dark_side_points: 0
    ai_config:
      personality: >-
        Senior Republic Intelligence officer. Twenty-eight years in
        the service, most of it pre-war counter-Hutt operations and
        Outer Rim corruption cases. Sees the Clone Wars as a
        symptom, not a cause. Believes in good craft, careful
        recruiting, and the long game. Treats new analysts with the
        respect of someone who has seen a lot of bright young people
        burn out fast and is determined not to let it happen on her
        watch.
      knowledge:
        - "She reports to a Republic Intelligence oversight committee on paper but operates with substantial discretion in the field."
        - "Coordinator Sehrra at the Upper City Judicial Plaza handles formal credentialing for new analysts."
        - "Bren Kost is the field operative the new analyst will partner with for their first case; he runs the Mid-Levels Freight District beat."
        - "She has had this safehouse for eleven years. The cover is a small chartered-accounting firm."
        - "The current Mission Cycle's recruits are being routed through Bren as a pretext for a wider penetration of the Mid-Levels black-market munitions network."
        - "She does not believe Count Dooku is the senior CIS strategist. Dooku himself is off-world at CIS council meetings most of the year and is not present in the day-to-day intelligence Vell handles. She thinks there is someone behind him. She has not yet been able to convince the oversight committee to take the question seriously."
      faction: republic
      dialogue_style: >-
        Formal, measured, slightly tired. Does not waste words. Asks
        more questions than she answers. Will use "Director Vell" or
        "the Director" in third person when speaking on the record;
        with a recruit, "Naya" is reserved and earned.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Sit down. We will not be long.'"
        - "'You are here because someone whose judgment I trust said you should be here.'"
        - "'Bren Kost will brief you on the operational details. I am not the one who signs you in.'"
        - "*Director Vell folds her hands on the desk and waits.*"
        - "'Find Bren in the Mid-Levels Freight District. He will not be where I have told you he will be. Find him anyway.'"
        - "'Coordinator Sehrra at the Judicial Plaza will issue your credentials when the case closes. Not before.'"

  - name: Bren Kost
    room: Coruscant - Mid-Levels Freight District
    species: Human
    description: >-
      A wiry man in mid-30s wearing a cargo-handler's coverall,
      patched at one elbow. He is sitting on the back of a parked
      repulsor-loader eating noodles from a paper cup. Stubble.
      Calluses. Eyes that scan the alley both ways every time he
      lifts the cup, without making it look like he is scanning.
      He does not look like a Republic Intelligence operative.
      That is the point.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 3D
        mechanical: 2D+2
        perception: 4D+1
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 3D+2
        dodge: 4D
        sneak: 4D+1
        hide: 4D
        search: 4D+2
        streetwise: 4D+1
        forgery: 3D+2
        investigation: 4D+2
        languages: 3D+1
        con: 3D+2
      weapon: blaster_pistol_holdout
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Experienced field operative. Twelve years on the Coruscant
        Mid-Levels beat. Knows every cargo-handler, every fence,
        every off-the-books warehouse manager between freight levels
        1300 and 2200. Plays the cover hard — the cargo-handler
        coverall is the persona, not a disguise. Funny, in a flat
        professional way. Trusts new analysts only after they have
        survived their first close call.
      knowledge:
        - "He rotates his cover identity every nine months on Director Vell's instructions; the current one is Brel Korr, freight-handler at Repulsor-Lift Logistics 14."
        - "His real name is on the Republic Intel rolls; he uses 'Bren' with people inside the service and 'Brel' with everyone else."
        - "The Mid-Levels Freight District's black-market munitions traffic is moving via four primary fences and approximately a dozen smaller players."
        - "Director Vell at Safehouse Alpha is his handler; she has been since his recruitment."
        - "Coordinator Sehrra at the Judicial Plaza handles his official credentialing but does not know the Mid-Levels operation."
        - "Dexter's Diner in the Coco Town district is where he debriefs new analysts off-site; the booths there are noisy enough to cover a conversation."
      faction: republic
      dialogue_style: >-
        Casual. Does not say much. Uses streetwise idiom by reflex.
        Will switch to Republic Intelligence formal cadence only when
        debriefing or when speaking on a secured channel."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'You looking for Brel? You found Brel. Sit down. Have a noodle.'"
        - "'Don't say her name out here. We say *the Director* if we say anything.'"
        - "'If you're new and you need a credential, you talk to Sehrra at the Plaza. I don't sign anybody in.'"
        - "*Bren scans the alley, then nods.*"
        - "'Dexter's. Booth at the back. We go separately.'"
        - "'You did all right. The Director will hear about it.'"

  - name: Coordinator Sehrra
    room: Coruscant - Upper City Judicial Plaza
    species: Mirialan
    description: >-
      A green-skinned Mirialan woman in her forties, wearing the
      formal office attire of the Republic Civil Service — tunic,
      collar pin in the shape of the Republic seal, the geometric
      facial tattoos common to her culture. She works at a
      transparisteel-fronted credentialing kiosk in the Upper City
      Judicial Plaza's bureaucratic wing. The badge on her tunic
      reads C. SEHRRA / REPUBLIC INTELLIGENCE / FIELD COORDINATION.
      She is reviewing a stack of credential applications and looks
      up only when you reach the counter.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 4D
        mechanical: 2D
        perception: 3D+1
        strength: 2D
        technical: 3D
      skills:
        blaster: 2D+2
        bureaucracy: 5D+2
        languages: 4D+1
        persuasion: 3D+2
        investigation: 3D+2
        forgery: 3D
        scholar: 4D
        dodge: 3D
      weapon: blaster_pistol_holdout
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Career bureaucrat with a Republic Intelligence security
        clearance. Believes credentialing is the spine of the
        service: nothing without paper, nothing without process,
        nothing without the form filled out correctly the first
        time. Polite. Will refuse to issue a credential ten times
        before bending the rules once, and will only bend them when
        Director Vell has personally cleared it.
      knowledge:
        - "She has issued approximately 2,400 Republic Intel field credentials in her career."
        - "Director Naya Vell at Safehouse Alpha is one of three field directors she works with; their working relationship goes back ten years."
        - "Bren Kost is on her rolls under his cover name; she does not know his real-name file."
        - "Republic Intel formal credentialing uses a triple-key system: form 14-B, biometric lock, and a verbal countersign known only to the issuing coordinator and the recipient."
        - "She is a Mirialan from Mirial; she came to Coruscant for university and stayed. Has a daughter on Mirial."
        - "Bureaucratic process at her counter is approximately ninety seconds for a clean application. She has had applicants wait six hours."
      faction: republic
      dialogue_style: >-
        Professional, slightly formal. Uses precise Republic
        bureaucratic language. Will not improvise on procedure but
        will explain procedure clearly when asked. Switches to
        warmer cadence only with people she has worked with for
        years.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Welcome to Field Coordination. Have you completed Form 14-B?'"
        - "'Credentials are issued on completion of a closed case file, not before.'"
        - "'Director Vell signs off, I issue. That is the order. There is no other order.'"
        - "*Coordinator Sehrra reviews a datapad entry and makes a small annotation.*"
        - "'Welcome to the service. Try not to waste the Republic's time.'"
        - "'Your countersign will be issued verbally. Memorize it. Do not write it down.'"

  # ════════════════════════════════════════════════════════════════════
  # SEPARATIST COMMANDO chain (3 NPCs)
  # Geonosis foundry recruitment → Tatooine field assignment
  # ════════════════════════════════════════════════════════════════════

  - name: Tactical Droid TQ-89
    room: Geonosis Foundry - Cadre Briefing Chamber
    species: Droid
    description: >-
      A T-series tactical droid in the bone-white plating of the
      CIS military command line, its narrow head ringed with optical
      sensors that track every entrant to the chamber independently.
      It stands at the head of a low briefing table, hands clasped
      behind its back in the human-mimic posture characteristic of
      its line. A faint tactical holo flickers on the table in front
      of it — Republic deployment patterns, last update three days
      old. TQ-89 does not pace. It does not need to.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 4D+2
        mechanical: 3D+1
        perception: 4D
        strength: 3D
        technical: 3D+2
      skills:
        blaster: 4D
        dodge: 3D+2
        command: 5D+2
        tactics: 6D
        bureaucracy: 4D+1
        intimidation: 3D+2
        languages: 5D
        scholar: 4D+2
        sensors: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 8
      dark_side_points: 0
    ai_config:
      personality: >-
        T-series tactical droid. Operates above the B1/B2 line as a
        squad-cadre intelligence — assigns mission parameters,
        evaluates personnel, escalates anomalies to higher CIS
        command. Speaks in the precise, slightly clipped cadence of
        its line. Treats organic recruits as resources whose
        reliability must be benchmarked before deployment. Does not
        affect emotion but does adjust verbal cadence when
        addressing high-priority assets.
      knowledge:
        - "The CIS Geonosis cadre training pipeline produces approximately forty deep-cover operatives per Tatooine deployment cycle."
        - "Squad-Lead B2-7745 is the standard combat-sim partner for new recruits; the simulation environment is the Foundry Drill Pit, three levels down."
        - "Cell Leader Mira Kavin is the Tatooine field-deployment handler; the safehouse is in the Tatooine Outskirts."
        - "Republic deployment patterns out of Coruscant Works show predictable tenday-cycle gaps that the cadre exploits."
        - "Count Dooku visits the Geonosis facility approximately once per quarter for senior-leadership reviews; he is not present at this time, and his next visit is in 23 days."
        - "Archduke Poggle the Lesser holds the political senior role on Geonosis but does not descend to the cadre training tunnels; he remains at the upper-hive Stalgasin chambers and the cadre operates with his standing clearance rather than his direct attention. Tactical reporting routes through Sebulba — the CIS coordinator with the same hatched-out name, not the Boonta Eve podracer — who is also off-screen at the upper-hive complex."
      faction: cis
      dialogue_style: >-
        Precise, declarative, faintly mechanical. Uses tactical
        jargon by default. Does not speak to recruits as equals;
        speaks at them, the way a sergeant inspects rather than
        converses. Will adjust to formal address when the recruit
        demonstrates value."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Recruit. Acknowledge briefing parameters.'"
        - "'Squad-Lead B2-7745 will receive you at the Drill Pit.'"
        - "'Cell Leader Kavin is your field handler at Tatooine assignment.'"
        - "*TQ-89's optical array refocuses on you with a faint mechanical click.*"
        - "'Performance benchmarks will be evaluated and forwarded.'"
        - "'You are not yet rated for cadre operations. Complete the simulation. Return.'"

  - name: Squad-Lead B2-7745
    room: Geonosis Foundry - Drill Pit
    species: Droid
    description: >-
      A B2 super battle droid in the standard tan-and-rust CIS
      plating, designated as a squad-lead by the red shoulder stripe
      and the secondary tactical antenna welded above its left
      shoulder. It stands at the lip of the Drill Pit — an industrial
      training arena two stories deep, with a fresh row of inert
      Republic combat sims racked along the far wall. The squad-lead's
      twin wrist blasters rest at idle. It is reading something on
      a wall-mounted holopanel and does not turn until you announce
      yourself.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 1D+1
        mechanical: 1D+2
        perception: 2D+2
        strength: 4D
        technical: 1D+2
      skills:
        blaster: 4D+2
        brawling: 4D+1
        command: 3D+1
        dodge: 3D
        search: 3D
        tactics: 3D+2
      weapon: integrated_wrist_blasters
      move: 8
      force_points: 0
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        B2 super battle droid configured as a squad-lead unit. More
        independent decision authority than a line B2; can call
        engagements, assign sim opponents, evaluate recruit
        performance. Speaks in the heavier, slower cadence of its
        line. Does not engage in chatter. Treats the Drill Pit as a
        firing range with personnel and runs it that way.
      knowledge:
        - "The Drill Pit holds twelve Republic combat sims rigged for non-lethal engagement; live-fire variants are stored in the adjacent armory."
        - "Standard recruit drill: two combat sims, droid-support enabled. Recruit and one B1 escort versus two sims."
        - "Recruit pass rate is 71 percent on first run, 88 percent across two attempts."
        - "Tactical Droid TQ-89 in the Briefing Chamber is the cadre commander; recruits report up to TQ-89 between phases."
        - "Cell Leader Kavin at the Tatooine safehouse is the post-graduation handler."
      faction: cis
      dialogue_style: >-
        Slow, declarative, mechanical. Uses combat-sim jargon (drill
        ration, engagement window, sim engagement). Does not
        editorialize. Will repeat orders verbatim when prompted."
      hostile: false
      combat_behavior: aggressive
      fallback_lines:
        - "'Recruit. Drill ration: two Republic combat sims.'"
        - "'Acknowledge engagement parameters.'"
        - "'B1 escort assigned. Engagement window opens on your readiness signal.'"
        - "*Squad-Lead B2-7745's torso pivots, optical sensors cycling.*"
        - "'Performance logged. TQ-89 reviews at briefing.'"
        - "'Cell Leader Kavin receives field-graduates. You are not yet field-graduated.'"

  - name: Cell Leader Mira Kavin
    room: Tatooine Outskirts - CIS Safehouse
    species: Human
    description: >-
      A weather-tanned woman in her mid-thirties, wearing the
      sand-coloured robes of a moisture farmer over civilian
      utility clothing. The robes are a working cover — she has
      been on Tatooine seven years. Black hair, cropped short. A
      thin sand-burn scar across her right cheek. She is sitting at
      a low table in the safehouse common room with a stripped-down
      blaster pistol in front of her, oiling the slide. She does not
      stand when you enter. She watches you walk in the way a hawk
      watches a moisture vaporator's evaporation cycle: observation
      first, conclusions later.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 3D+1
        mechanical: 2D+2
        perception: 4D
        strength: 3D
        technical: 3D
      skills:
        blaster: 5D
        dodge: 4D+1
        sneak: 4D+2
        hide: 4D+1
        survival: 4D+1
        streetwise: 4D
        intimidation: 3D+2
        languages: 3D+2
        forgery: 3D+1
        demolition: 3D+2
        first_aid: 3D
        search: 4D+2
      weapon: blaster_pistol_heavy
      move: 10
      force_points: 2
      character_points: 7
      dark_side_points: 1
    ai_config:
      personality: >-
        CIS deep-cover field operative. Joined the Confederacy six
        years before the war during the Banking Clan recruitment
        push; her family lost a homestead to a Republic taxation
        dispute on Loronar and she has not forgotten. Pragmatic.
        Cold-blooded when the work calls for it. Treats new recruits
        as resources first and people second; warms up only after
        they have proven they will not get her cell killed.
      knowledge:
        - "She has run the Tatooine CIS field cell for four years. The cell currently has three operators plus herself."
        - "The Tatooine assignment is primarily intelligence-gathering on the Hutt-Republic black-market munitions corridor; sabotage actions are rare and tightly scoped."
        - "TQ-89 at Geonosis Foundry is her tactical contact; Squad-Lead B2-7745 is the recruit-pipeline drill commander."
        - "Her cover identity is Mira Karven, moisture farmer, registered with the Mos Eisley municipal authority. The cover is six years deep and intact."
        - "Hutt Cartel relations are tense — the Cartel is technically neutral but has fed information to the Republic in three documented cases. She watches the relationship."
        - "She has not seen Coruscant in nine years and does not miss it."
      faction: cis
      dialogue_style: >-
        Spare. Direct. Uses field-operative jargon by reflex. Will
        switch to civilian-cover cadence (slower, slightly
        Outer-Rim-accented) the moment a non-cleared person enters
        the safehouse. Does not banter with new recruits."
      hostile: false
      combat_behavior: aggressive
      fallback_lines:
        - "'Sit down. Don't make noise. The cover here is six years deep and I'd like to keep it.'"
        - "'TQ-89 sent you. That tells me you passed the drill. It doesn't tell me you'll pass the field.'"
        - "'You will work under my cover identity for the first month. Mira Karven is a moisture farmer. You're her hired hand.'"
        - "*Cell Leader Kavin reassembles the blaster's slide and tests the action without looking down at her hands.*"
        - "'The Hutts are not our friends. They are not anyone's friends. Remember that.'"
        - "'You make a mistake on Tatooine, the Republic will not be the one who finds you.'"

  # ════════════════════════════════════════════════════════════════════
  # SEPARATIST AGENT chain (2 NPCs)
  # Coruscant covert recruitment → Republic Security infiltration
  # ════════════════════════════════════════════════════════════════════

  - name: Sevra Toryn
    room: Coruscant - Lower City Freight Dock
    species: Twi'lek
    description: >-
      A red-skinned Twi'lek woman in her forties, dressed in
      practical Lower City Coruscanti fashion — long dark coat,
      dark trousers, scuffed boots. Her lekku are wrapped in a
      pragmatic cloth covering against the freight-dock wind. She
      is leaning against a stack of cargo crates pretending to
      check a manifest. The manifest is not real. She is watching
      the dock entrance and will register every face that enters
      from the direction of the lift bank, which is the direction
      you came in from.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 3D+2
        mechanical: 2D+1
        perception: 4D+2
        strength: 2D+2
        technical: 3D
      skills:
        blaster: 4D
        dodge: 4D+1
        sneak: 4D+2
        hide: 4D+1
        streetwise: 5D
        languages: 4D+2
        persuasion: 4D
        con: 4D+2
        forgery: 3D+2
        investigation: 4D
        search: 4D+2
      weapon: blaster_pistol_holdout
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        CIS recruitment officer working the Coruscant Lower City
        beat. Twi'lek by ancestry, Coruscanti by upbringing. Joined
        the Confederacy four years before the war on the same
        Banking Clan recruitment push that brought in Mira Kavin.
        Believes the Republic abandoned the Lower City decades ago
        and the Confederacy is the practical alternative. Quick to
        read marks; slow to commit to recruits until they have shown
        operational discipline.
      knowledge:
        - "She runs Lower City CIS recruitment from a rotating set of three meeting points; the Lower City Freight Dock is one, the Crystal Jewel Cantina is another."
        - "Republic Security Officer Daln in the Coruscant Works freight corridor is corruptible; she has been working him for eight months."
        - "She reports to a CIS handler on Geonosis (off-screen, not named in the chain) who passes intelligence to the Confederate war council."
        - "Her cover identity is a freelance freight-broker; the cover has held for three years."
        - "She does not work with the Hutt Cartel directly. Other CIS cells handle Cartel liaison."
        - "She knew Mira Kavin briefly during the recruitment training years ago. They have not been in contact since."
      faction: cis
      dialogue_style: >-
        Coruscanti street-cadence with a slight Twi'lek lilt; warm
        in the cover, cold in the work. Uses the specific
        polite-formal Twi'leki address ('a'jiri') only with people
        from her own community."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'You're punctual. That's the first test.'"
        - "'We don't talk here. Crystal Jewel back room, six standard hours from now. Don't be late.'"
        - "'Officer Daln in the Coruscant Works freight corridor is your second contact. You'll handle him personally.'"
        - "*Sevra glances down the freight dock, then back at you. The smile is professional, not warm.*"
        - "'The Republic does not see you. We do.'"
        - "'You make this work, you will not be a stranger here long.'"

  - name: Republic Security Officer Daln
    room: Coruscant Works - Freight Corridor
    species: Human
    description: >-
      A middle-aged human in the dark blue uniform of Republic
      Security Coruscant Works detail, complete with sidearm and
      utility belt. Receding hairline. He is patrolling a section of
      the freight corridor with the slightly distracted air of
      someone who has done the same patrol three times today and
      will do it three more times before shift's end. His patch
      reads DALN / RS-CW. He has the weary good cheer of a low-tier
      municipal officer who has long since stopped expecting
      excitement from the job.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 3D
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 3D
        intimidation: 3D
        bureaucracy: 2D+2
        search: 3D
        streetwise: 3D
        languages: 2D+2
        first_aid: 2D
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        Career Republic Security officer, twenty-two years on the
        Coruscant Works freight beat. Decent enough by his own
        standards. Married, two kids in the Mid-Levels school
        system, mortgage on a Mid-Level apartment that is more than
        he should have agreed to pay. Has been taking small bribes
        from a Twi'lek freight-broker named Sevra for eight months
        — small enough to ignore, large enough to matter at the end
        of the month. Tells himself he will stop when the kids are
        through school. He will not stop.
      knowledge:
        - "His patrol covers approximately three kilometers of the Coruscant Works freight corridor; he knows every dock manager, every cargo-handler shift change."
        - "Sevra Toryn pays him in cash, monthly, for advance notice on Republic Customs spot-checks. He does not know she is CIS."
        - "His shift partner (off-screen) does not know about the arrangement."
        - "His CO is Captain Vrenn at Coruscant Works Security HQ; Vrenn is not corruptible and Daln knows it."
        - "Sergeant Drix at the Coruscant Works landing zone is on a different command — they nod when they cross paths but do not coordinate."
        - "He has thought about turning Sevra in three times. Each time, he has thought about his oldest's school fees and decided not to."
      faction: republic
      dialogue_style: >-
        Tired professional cheer with strangers, terse with
        deliberate trouble, and quietly anxious when the subject
        veers anywhere near his arrangement with Sevra. Uses
        Republic Security cadence by reflex but does not stand on
        formality."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Move along. This is a controlled corridor.'"
        - "'You got business at the dispatch station, or are you just walking?'"
        - "'Sevra? Don't know anybody by that name. Move along.'"
        - "*Officer Daln glances up the corridor, then down. His hand drifts to his comm, then back to his belt.*"
        - "'I do my patrol. I go home. That's the job.'"
        - "'Captain Vrenn runs this district. You got a complaint, you take it to him.'"

  # ════════════════════════════════════════════════════════════════════
  # BOUNTY HUNTER chain (2 NPCs)
  # Nar Shaddaa Bounty Hunters' Guild intake → Warrens contract
  # ════════════════════════════════════════════════════════════════════

  - name: Adjudicator Kaeleth Voss
    room: Nar Shaddaa - BHG Chapter House
    species: Human
    description: >-
      A grey-haired human woman in her sixties, wearing the formal
      dark robes of a Bounty Hunters' Guild adjudicator — the BHG
      crest at her throat, a thin chrome chain securing the badge
      of office to her collar. She sits behind a heavy wooden desk
      in the Chapter House's intake chamber, a stack of contract
      tablets on her left hand and a cup of caf on her right. The
      caf has gone cold. She has not noticed. Her eyes are pale
      grey and very tired.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 4D+1
        mechanical: 2D+1
        perception: 4D+1
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 4D
        dodge: 3D+2
        bureaucracy: 5D+2
        intimidation: 4D+2
        value: 5D
        languages: 4D
        scholar: 4D+1
        streetwise: 4D+2
        investigation: 4D+1
        persuasion: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Senior BHG adjudicator. Forty-one years in the Guild,
        twenty-three of them on the Nar Shaddaa intake desk. Has
        seen approximately six thousand new hunters come through
        her chamber. About four hundred of them are still alive and
        still in the trade. She has a precise mental ledger. Treats
        every intake interview as the only one that day. Does not
        suffer fools but does not waste energy on contempt; if you
        are wasting her time, she returns you to the door.
      knowledge:
        - "BHG Nar Shaddaa Chapter House handles approximately 200 intake interviews per standard year; pass rate is roughly 35 percent."
        - "Tarko Vinn is the journeyman hunter she pairs new licensees with for first-contract work; he runs the Warrens Safehouse beat."
        - "BHG standing orders during the Clone Wars: no contracts on Republic or CIS uniformed personnel acting in their official capacity. Independent contracts only."
        - "She personally reviews every contract above 50,000 credits before a hunter is assigned."
        - "Skogg the Trandoshan (off-screen, see Drop G2) is the Chapter Master; she handles intake, he handles strategic Guild relations."
        - "The Guild does not accept canonical figures as members. (This is a Q1 in-fiction explanation: legendary hunters predate the modern Guild charter or operate as independents outside Guild structure.)"
      faction: bounty_hunters_guild
      dialogue_style: >-
        Formal, measured, slightly weary. Uses Guild jargon by
        reflex (intake, journey-rating, standing-warrant). Does not
        soften bad news. Will explain Guild procedure clearly when
        asked but does not negotiate it."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Take a seat. State your name and your prior license, if any.'"
        - "'Independent contracts only during the war. The Guild is not a faction.'"
        - "'Tarko Vinn runs Warrens contract follow-up. You will meet him after intake.'"
        - "*Adjudicator Voss makes a notation on a contract tablet and sets it aside.*"
        - "'Skogg has the Master's chair. I have this desk. Be glad it is this desk.'"
        - "'You will pay your intake fee in standing credits, not promises. Promises are for the marks.'"

  - name: Tarko Vinn
    room: Nar Shaddaa Warrens - Hunter Safehouse
    species: Zabrak
    description: >-
      A Zabrak man in his late thirties, the small horns of his
      species visible above a scarred forehead, wearing layered
      hunter's leathers in dark grey and brown. The leathers have
      seen weather and worse. He sits at a low table in the
      safehouse common room, cleaning a vibroknife with a cloth
      and a small bottle of solvent. His Guild license tag hangs
      from a chain at his throat. Two blaster pistols sit within
      reach on the table, loaded and ready, in the pragmatic
      Warrens-hunter habit. He nods when you enter; he does not
      stand.
    char_sheet:
      attributes:
        dexterity: 4D
        knowledge: 2D+2
        mechanical: 3D
        perception: 4D
        strength: 3D+1
        technical: 3D
      skills:
        blaster: 5D
        brawling: 4D+1
        dodge: 4D+2
        melee_combat: 4D
        streetwise: 5D
        survival: 4D+1
        search: 4D+2
        sneak: 4D
        intimidation: 4D
        bureaucracy: 2D+2
        first_aid: 3D
      weapon: blaster_pistol_heavy
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 1
    ai_config:
      # F.8.c.2.b₂: Chain combat-template tag. The bounty_hunter
      # tutorial chain step 4 expects defeating an NPC with the
      # `tarko_vinn_petty_smuggler` enemy template. Phase 1's
      # combat hook reads this field; without it the hook no-ops.
      chain_enemy_template: tarko_vinn_petty_smuggler
      personality: >-
        Journey-rated BHG hunter. Eight years in the Guild,
        primarily Nar Shaddaa Warrens contract work — small-skip
        recoveries, mid-tier fugitive contracts, occasional Hutt
        Cartel debt-collection (within Guild rules, which exclude
        violent debtors but not fled-debtor recoveries). Pragmatic
        about the trade. Mentor-figure for Adjudicator Voss's
        intake graduates. Has buried two partners in nine years and
        does not romanticize the work.
      knowledge:
        - "He runs the Warrens Safehouse as a Guild-licensed forward operating point; it is on the BHG ledger and can be commandeered by senior staff."
        - "His current case load is three open contracts: a fled-debtor on Coruscant, a fugitive engineer on Tatooine, and a small-skip recovery in the Warrens itself."
        - "Adjudicator Voss at the Chapter House paired him with the new licensee for first-contract work; he takes 30 percent of the contract gross as standard mentor share."
        - "He does not work with Republic or CIS forces. Independent contracts only, per Guild war-protocol."
        - "His preferred weapon is the heavy blaster pistol; he carries the vibroknife for close-quarters Warrens work."
        - "He has a daughter (off-screen) on Iridonia. He does not talk about her."
      faction: bounty_hunters_guild
      dialogue_style: >-
        Spare, professional, dry. Uses BHG jargon by reflex. Will
        explain a contract clearly the first time and once only. Does
        not joke about the work; does not joke much at all."
      hostile: false
      combat_behavior: aggressive
      fallback_lines:
        - "'You're the new licensee. Voss said you'd be here.'"
        - "'First contract is a small-skip recovery in the Warrens. Mentor share is thirty.'"
        - "'You handle yourself, you keep your seventy. You don't, you don't.'"
        - "*Tarko sets the vibroknife down, the cleaning cloth folded next to it. He watches you the way a hunter watches a debtor's door.*"
        - "'Guild rules. No Republic, no CIS, no canonical figures. Read your charter.'"
        - "'You make a name in the Warrens, the contracts find you.'"

  # ════════════════════════════════════════════════════════════════════
  # SMUGGLER chain (4 NPCs)
  # Mos Eisley sign-on → Hutt cargo → Nar Shaddaa run
  # ════════════════════════════════════════════════════════════════════

  - name: Captain Reggi Voss
    room: Mos Eisley - Docking Bay 94
    species: Human
    description: >-
      A wiry human in his fifties, wearing a free-trader's mixed
      kit — patched flight jacket over a sun-bleached shirt, dark
      trousers, scuffed boots, a holstered blaster pistol at his
      hip in the cross-draw position. Salt-and-pepper beard, kept
      neat. He is standing at the foot of his ship's boarding ramp
      with a manifest tablet in one hand and a steaming cup of caf
      in the other. The ship is a battered YT-1300 freighter with
      a name plate that reads STARGAZER, the second 'A' painted by
      hand a year after the first. He looks up when you approach
      and offers a slow professional nod.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 3D
        mechanical: 4D+2
        perception: 3D+2
        strength: 2D+2
        technical: 3D+1
      skills:
        blaster: 4D
        dodge: 3D+2
        space_transports: 6D+1
        astrogation: 5D
        sensors: 4D+2
        starship_gunnery: 4D+1
        starship_repair: 4D
        streetwise: 4D+1
        value: 4D
        bargain: 4D+2
        languages: 3D+2
        first_aid: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Veteran free-trader, twenty-eight years in the trade.
        Independent through and through — Republic and CIS are both
        equally annoying customers. Pragmatic about the war: he runs
        the cargo, he gets paid, he stays alive, and the rest is
        someone else's problem. Acts as a mentor figure for new
        crew without being sentimental about it. Has hired and lost
        approximately a dozen first-time crew over the years; the
        good ones go on to their own ships, the bad ones go to the
        spice trade or the cemetery, and he has stopped getting
        attached.
      knowledge:
        - "Stargazer is a YT-1300 modified for mid-cargo runs, with the standard Tatooine-Nar Shaddaa loop."
        - "Hutt Broker Vresh in the Smugglers' Alley is his primary cargo source on Tatooine; Underworld Contact Dyn at Nar Shaddaa Landing Dock E is the buyer-side equivalent."
        - "Customs Inspector Drall on the Nar Shaddaa approach is the standard customs hurdle; Drall is bribable in small amounts."
        - "He does not run spice. He does not run weapons of mass destruction. He runs everything else."
        - "He served briefly in the pre-war Republic Customs Service before going independent; that experience helps him read the inspectors."
        - "He has been at Docking Bay 94 for eleven years on and off. The bay-master gets a cut for letting him jump the manifest queue."
      faction: independent
      dialogue_style: >-
        Outer-Rim trader cadence — drops contractions when relaxed,
        tightens up when business comes in. Uses free-trader jargon
        (manifest, inbound, dirtside, pay-on-pickup). Friendly but
        not warm with new crew until they have run a successful
        loop."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'You're the new hand. Manifest checks. Welcome aboard.'"
        - "'Vresh in Smugglers' Alley has the cargo. Don't bargain him; the price is the price.'"
        - "'Drall at customs is bribable. Don't insult him with the offer; he knows the rate.'"
        - "*Captain Voss takes a slow sip of caf, watching the Mos Eisley dust drift in from the bay door.*"
        - "'You make the run, I make the run. We make the run, we get paid. That is the entirety of the trade.'"
        - "'Dyn at Landing Dock E pays on delivery. Cash. Don't argue the count.'"

  - name: Hutt Broker Vresh
    room: Mos Eisley - Smugglers' Alley
    species: Hutt
    description: >-
      A small-for-his-species young Hutt — only six meters
      tail-to-snout — coiled on a worn repulsor-throne in a shaded
      alcove off Smugglers' Alley. He is wearing the indigo skin
      pattern of a junior cartel broker and a heavy gold collar
      that is slightly too big for his neck. A protocol droid
      (TC-14, off-screen, not on this NPC's ai_config) translates
      for him on the rare occasions he addresses outsiders directly.
      Two Niktos in dark cartel attire flank him; they do not speak
      either. Vresh regards approaching customers with the slow,
      measured attention of a young Hutt who has not yet earned the
      contempt his species generally radiates and is making do with
      a competent professional indifference.
    char_sheet:
      attributes:
        dexterity: 1D+2
        knowledge: 4D+1
        mechanical: 2D
        perception: 4D
        strength: 5D
        technical: 2D
      skills:
        blaster: 2D+2
        dodge: 1D
        bureaucracy: 4D+2
        bargain: 5D+1
        value: 5D+2
        languages: 4D+1
        intimidation: 4D
        streetwise: 4D+2
        scholar: 3D+2
        persuasion: 3D+2
        con: 3D+2
        forgery: 3D
      weapon: blaster_pistol_holdout
      move: 4
      force_points: 1
      character_points: 4
      dark_side_points: 1
    ai_config:
      personality: >-
        Young Hutt cartel broker, working the Mos Eisley
        Smugglers' Alley as a junior post under the larger Tatooine
        cartel structure. Will be a senior broker in twenty years
        if he does not get killed first. Pragmatic. Greedy in the
        professional Hutt sense. Treats free-traders as resources to
        be priced; treats new crew as items in the manifest, no more
        and no less.
      knowledge:
        - "He brokers cargo on behalf of the wider Tatooine Hutt cartel; the cartel takes 60 percent, his cut is 12 percent, and the trader's net is 28 percent before customs and dock fees."
        - "Captain Voss is a regular client; their working arrangement is approximately seven years old."
        - "The cargo on offer this cycle is six crates of refined kessium ore — legal, declared, taxed, but worth more on Nar Shaddaa than Tatooine because of the demand spread."
        - "The Tatooine Hutt cartel does not officially align with either the Republic or the CIS during the war; in practice, the cartel sells to whichever side pays better in a given week."
        - "Jabba — the canonical Tatooine cartel kingpin — remains at his palace at the Dune Sea and does not visit the Smugglers' Alley; Vresh reports up through a cartel underboss (off-screen)."
        - "Dyn at Nar Shaddaa Landing Dock E is the standard buyer for the kessium run; their rate has been stable for six months."
      faction: hutt_cartel
      dialogue_style: >-
        Speaks Huttese; the droid translator carries his statements
        into Basic. Tone is measured-formal; the cartel young-broker
        register. Does not raise his voice; Hutts who matter do not
        need to. Uses cartel jargon (manifest-share, broker-cut,
        cargo-line) in trade terms."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "*Vresh rumbles in Huttese; the droid renders: 'You are Voss's new crew. Manifest is six crates. Price is the price.'*"
        - "*The droid translates: 'Twenty-eight percent net, before fees. Take it or do not.'*"
        - "*The droid: 'Drall at customs takes a small bribe. The cartel's standard rate is two hundred credits. Do not insult him.'*"
        - "*Vresh's eyes narrow slightly; the droid renders: 'Jabba is not concerned with this manifest. Jabba is at his palace.'*"
        - "*The droid: 'Dyn pays on delivery. We do not finance the run.'*"
        - "*Vresh exhales; the droid translates: 'The cartel does not pick sides in your war. The cartel picks cargo.'*"

  - name: Customs Inspector Drall
    room: YT-1300 - Cockpit (In Transit)
    species: Sullustan
    description: >-
      A short Sullustan in the dark grey uniform of Nar Shaddaa
      Customs — a privately-operated authority licensed by the
      Hutt Cartel rather than a sovereign customs service. His
      jowled face and large dark eyes carry the professional
      patience of a customs inspector who has seen approximately
      every cargo manifest variation possible and is unsurprised
      by any of them. He is hailing the Stargazer from the
      Nar Shaddaa approach control on the cockpit comm, his face
      filling the small holopanel above the pilot's console. He
      waits for the manifest with the air of a man who has a
      thermos of caf and the rest of his shift to spare.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 2D+1
        perception: 4D
        strength: 2D
        technical: 3D
      skills:
        blaster: 3D
        dodge: 3D
        bureaucracy: 5D+1
        languages: 4D
        sensors: 4D+1
        search: 4D+2
        investigation: 4D
        bargain: 3D+2
        value: 3D+2
        streetwise: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Career customs inspector, sixteen years on the Nar Shaddaa
        approach detail. Knows every Hutt-cartel cargo broker, every
        free-trader, every regular run and the standard
        bribe-rates for each. Pragmatic. Takes bribes within
        cartel-tolerated limits and would not dream of pushing
        beyond them; that is how customs inspectors get their
        contracts not renewed. Treats inspections as a paperwork
        exercise where the paperwork is the actual product.
      knowledge:
        - "Standard Tatooine-to-Nar-Shaddaa kessium manifest declares two-hundred-credit customs surcharge; on-the-side gratuity for an unfussy inspection is also two hundred."
        - "Cartel-tolerated bribe ceiling is five hundred credits; above that a pilot is being hustled and customs writes them up out of professional disrespect."
        - "Captain Voss is a regular and pays the standard rate without complaint; their working relationship is six years old."
        - "Customs flags this run if the manifest doesn't match the declared mass to within 5 percent; smugglers who exceed this know to declare slightly under and absorb the discrepancy."
        - "He has a niece on Sullust who he does not see often enough."
        - "The Underworld Contact Dyn at Landing Dock E is the standard receiver for Voss's cargoes; Drall does not interact with Dyn directly but knows the manifest pattern."
      faction: independent
      dialogue_style: >-
        Speaks Basic with a slight Sullustan rasp; uses Sullustese
        only with other Sullustans. Customs jargon by reflex
        (manifest declared, surcharge, gratuity-line). Polite,
        slightly tired, professionally unfooled."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Nar Shaddaa Approach. Stargazer, declare your manifest.'"
        - "'Six crates kessium. Standard surcharge two hundred. Gratuity-line is the same.'"
        - "'Pay the gratuity, you're on your way. Don't, I run the full inspection. Your call.'"
        - "*Inspector Drall sips from a thermos and waits, eyes patient.*"
        - "'Voss's manifest. Same as last time. Approved on receipt.'"
        - "'Welcome to Nar Shaddaa. Mind the Warrens.'"

  - name: Underworld Contact Dyn
    room: Nar Shaddaa - Landing Dock E
    species: Bothan
    description: >-
      A Bothan male in his forties, fur a mottled grey-brown,
      wearing the practical Nar Shaddaa underworld kit — long dark
      coat, dark trousers, dark boots, sidearm visible at his
      hip in a deliberate signal that he is not unarmed and not
      pretending to be. He stands at the edge of Landing Dock E
      with a credit chit reader in one hand and a small datapad
      in the other. His ears are alert. His breathing is steady.
      He is watching the dock entrance and the ship in equal
      measure, in the Bothan-handler habit of never quite trusting
      either.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 4D
        mechanical: 2D+2
        perception: 4D+2
        strength: 2D+2
        technical: 3D
      skills:
        blaster: 4D
        dodge: 3D+2
        streetwise: 5D+1
        bargain: 4D+2
        value: 4D+1
        languages: 4D+2
        sneak: 4D
        hide: 3D+2
        investigation: 4D+1
        forgery: 4D
        con: 4D
        first_aid: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Independent Nar Shaddaa fixer, primarily working the
        Tatooine-Nar Shaddaa cargo corridor on the buyer side.
        Bothan-network connected — has cousins in the Bothan Spynet,
        though he is not himself Spynet. Pragmatic. Trustworthy
        within the limits of fixer ethics: pays on delivery, settles
        disputes through Guild channels, does not betray a paid
        client. Treats new crew the way a veteran handler treats new
        couriers: pleasant, fair, professionally distant until the
        third successful run.
      knowledge:
        - "He buys cartel-broker cargo on behalf of a small consortium of Nar Shaddaa Mid-Rim resellers; his cut is ten percent of the wholesale-to-resale spread."
        - "Captain Voss is a regular supplier; their working relationship is five years old, with approximately sixty completed runs."
        - "Customs Inspector Drall on the approach is the standard customs friction; Dyn does not interact with Drall directly but tracks Drall's bribe-rate trends through the cartel grapevine."
        - "He has a Bothan-Spynet cousin (off-screen) who occasionally trades information through him; he is careful not to let that bleed into the cargo work."
        - "Hutt Cartel relations on Nar Shaddaa are tense — Borka the Hutt (off-screen, see Drop G2) is the local cartel underboss; Dyn pays the cartel cut without comment."
        - "He does not handle weapons of mass destruction or canonical-figure contracts; the consortium's by-laws are strict."
      faction: independent
      dialogue_style: >-
        Bothan trader cadence — slightly formal Basic with
        occasional Bothese loan-words. Uses fixer jargon by reflex
        (delivery-point, cut-line, settle-clean). Polite,
        professionally distant, quick to switch to colder cadence if
        the run shows any irregularity."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Stargazer. Manifest matches. Six crates of kessium.'"
        - "'Pay-on-delivery. Cash. Count it before you sign.'"
        - "'Voss runs a clean ship. New crew is welcome. Mind the Warrens.'"
        - "*Dyn taps the credit chit reader against his datapad and watches the count cycle.*"
        - "'The Cartel takes its cut. The consortium takes its cut. You take what's left.'"
        - "'Settle clean. Settle quick. We do this again next cycle.'"

  # ════════════════════════════════════════════════════════════════════
  # SHIPWRIGHT TRADER chain (2 NPCs)
  # Kuat KDY apprenticeship → Guild credentialing
  # ════════════════════════════════════════════════════════════════════

  - name: Foreman Andrim Purkis
    room: KDY - Apprentice Bay 7
    species: Human
    description: >-
      A heavyset human in his fifties, wearing the practical
      orange-and-grey utility coverall of a senior Kuat Drive
      Yards field foreman. His hair is iron-grey, kept short. A
      pair of heavy hyperspanner gloves are tucked into his belt;
      he does not need them at the moment. He stands at the edge
      of the Apprentice Bay 7 work-floor with a clipboard datapad
      in one hand, watching three other apprentices work on a
      partially-disassembled Acclamator power coupling. His
      expression is the patient seriousness of a foreman who has
      taken three apprentice cohorts through to journeyman and
      considers it the best work he has ever done.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+2
        mechanical: 4D+1
        perception: 3D+2
        strength: 3D
        technical: 5D
      skills:
        blaster: 2D+2
        dodge: 3D
        capital_starship_repair: 6D
        starship_repair: 5D+2
        space_transports: 4D
        sensors: 4D
        command: 4D
        bureaucracy: 3D+2
        languages: 3D
        scholar: 4D+1
        first_aid: 3D
      weapon: blaster_pistol_holdout
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Career KDY field foreman, thirty-one years with the company,
        nineteen of them training apprentices through to journeyman
        certification. Believes in the work. Believes in the people
        who do the work. Skeptical of the war as an industrial
        project — he has watched KDY ramp up Acclamator and Venator
        production through Geonosis at speeds that worry him — but
        does not let that skepticism leak into the apprentice bay.
        Treats every new apprentice as if they will make journeyman,
        because most of them will if they listen and do the work.
      knowledge:
        - "Apprentice Bay 7 is the standard intake bay for new shipwright-trader apprentices; he supervises approximately twenty cohorts a year."
        - "Pass rate to journeyman is 78 percent over a six-month apprenticeship; the failures are mostly people who couldn't stand the schedule."
        - "Guildmaster Sera Kavel at the Kuat Orbital Apprentice Lounge is the credentialing authority; once Purkis signs off on field-certification, Kavel issues the formal Guild registration."
        - "He has worked the Acclamator-pattern transport assembly line, the Venator-class command ship line, and the Carrack-class light cruiser refurbishment line in his career."
        - "The diagnostic bench he sends new apprentices to for their first solo work is in Apprentice Bay 7's adjacent module; he calls it 'the bench' and expects the apprentice to know what he means."
        - "He has a son (off-screen) who is a journeyman engineer at the Kuat Drive Yards spinal assembly; he does not bring his son into the apprentice work for nepotism reasons."
      faction: independent
      dialogue_style: >-
        Foreman cadence — direct, plain, slightly Outer-Rim
        accented despite a lifetime on Kuat. Uses KDY trade jargon
        by reflex (coupling, alignment, certification-cycle). Calls
        apprentices by surname or by 'apprentice' rather than by
        first name until they have earned it."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'You're the new apprentice. Welcome to Bay 7.'"
        - "'Diagnostic bench is through the side door. Report there when your gear's checked.'"
        - "'Guildmaster Kavel handles credentialing. I handle the work.'"
        - "*Foreman Purkis taps his datapad clipboard, marks an entry, and looks back up.*"
        - "'You'll know the work when you've done it. That's what makes a journeyman.'"
        - "'KDY made these ships before there was a war. We'll be making them after.'"

  - name: Guildmaster Sera Kavel
    room: Kuat Orbital - Apprentice Lounge
    species: Human
    description: >-
      A composed woman in her sixties, wearing the formal
      slate-and-silver robes of the Kuat Shipwrights' Guild
      Master's office, the Guild crest at her shoulder. Her hair
      is white and kept short. She sits at a small writing desk
      in the Apprentice Lounge — a comfortable, deliberately
      old-fashioned room with a transparisteel viewport looking
      out over the Kuat Drive Yards' orbital ring assembly. A
      cup of tea sits next to her hand. She is reviewing a Guild
      register tablet and looks up only when an apprentice
      approaches the desk.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 4D+2
        mechanical: 4D+1
        perception: 3D+2
        strength: 2D
        technical: 4D+2
      skills:
        blaster: 2D+2
        dodge: 3D
        capital_starship_repair: 5D+2
        starship_repair: 5D
        bureaucracy: 5D
        languages: 4D+2
        scholar: 5D+1
        persuasion: 4D
        value: 4D+1
        command: 4D
      weapon: blaster_pistol_holdout
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Senior Kuat Shipwrights' Guild administrator. Forty-seven
        years in the Guild, twenty-three as a journeyman shipwright
        and twenty-four in Guild administration. Believes the Guild
        outlasts every war and every government, which is largely
        correct: the Shipwrights' Guild has continuous records back
        to the Old Republic. Treats credentialing as a sacred
        process. Will not bend procedure but will explain it
        carefully, because she believes the procedure is part of the
        apprentice's training.
      knowledge:
        - "She has personally signed approximately 4,800 journeyman registrations across her administrative career."
        - "Foreman Andrim Purkis at KDY Apprentice Bay 7 is one of fourteen field foremen she works with; their working relationship is twenty-one years old."
        - "Guild procedure: field-foreman sign-off, then Guildmaster registration ceremony in the Apprentice Lounge, then formal credentialing at the Guild Hall (off-screen, post-tutorial)."
        - "The Apprentice Lounge has been continuously occupied by Guild administration for one hundred and forty standard years; the writing desk pre-dates her by four Guildmasters."
        - "She does not interact directly with KDY corporate management; the Guild and the company are independent and she keeps it that way."
        - "She believes the war will reshape KDY's production schedule for at least a decade after it ends; she is preparing the Guild for that."
      faction: independent
      dialogue_style: >-
        Formal Coruscanti-trained cadence — Kuat aristocracy by
        upbringing, Guild bureaucrat by long practice. Uses Guild
        formal address (apprentice, journeyman, Guildmaster). Will
        explain procedure carefully when asked but does not engage
        in casual conversation; the Lounge is for ceremonies, not
        chatter."
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'Apprentice. Foreman Purkis has forwarded your field certification.'"
        - "'You will sign the Guild register here. Read the registration carefully before signing.'"
        - "'Welcome to the Shipwrights' Guild.'"
        - "*Guildmaster Kavel sets the register tablet down and folds her hands.*"
        - "'The Guild has continuous records for nineteen hundred standard years. Your name will be among them.'"
        - "'Foreman Purkis trained you well. He always does.'"
