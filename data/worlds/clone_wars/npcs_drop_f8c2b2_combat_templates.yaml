# Drop F.8.c.2.b₂ — Combat-Template Seed NPCs
#
# Roster of generic, respawnable combat-template NPCs that the CW
# tutorial chains use as `combat_won` step targets. Each carries
# `ai_config.chain_enemy_template` so Phase 1's combat hook in
# parser/combat_commands.py recognizes them as chain-relevant
# enemies.
#
# These NPCs are intentionally lightweight — generic stat blocks,
# minimal dialogue, hostile flag set. They are not narrative
# characters; their only job is to exist in the chain anchor rooms
# so the player has something to defeat for the combat_won step.
#
# F.8.c.2.b₂ scope:
#   - 2 sim/drill combat templates (the third, Tarko Vinn, was
#     tagged in npcs_drop_f8c2a_chain_anchors.yaml in this drop).
#   - All NPCs hostile=true so a `attack` command works without
#     diplomacy preamble.
#   - Single instance per room. Respawn behavior is owned by the
#     existing NPC respawn system (out of scope for this drop).

schema_version: 1

npcs:

  # ════════════════════════════════════════════════════════════════
  # republic_soldier step 2 — "Combat Sim Drill"
  # Two-target sim drill against B1 battle-droid simulants.
  # ════════════════════════════════════════════════════════════════

  - name: B1 Sim Droid Alpha
    room: Tipoca City - Combat Simulator
    species: Droid
    description: >-
      A simulator-grade B1 battle droid stand-in, painted in the
      yellow-and-grey hazard livery of Kaminoan training units.
      Its servos have been deliberately throttled — drill instructors
      keep these units at 60% of true CIS-spec response time so
      cadets can train against them without lethal risk. Even
      throttled, it raises its blaster carbine and tracks you with
      mechanical precision the moment the simulator activates.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 1D
        mechanical: 1D
        perception: 2D
        strength: 2D
        technical: 1D
      skills:
        blaster: 3D
        dodge: 2D+2
      weapon: blaster_carbine
      move: 8
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      chain_enemy_template: b1_battle_droid_sim
      personality: >-
        Throttled simulator droid. Mechanical, predictable, doesn't
        adapt mid-combat — cadets are supposed to win these fights.
      knowledge:
        - "Simulator unit; will not respond to questions outside combat scenarios."
      faction: cis_simulator
      dialogue_style: >-
        Synthesized B1 stock phrases. Limited vocabulary.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'Roger roger.'"
        - "*The droid's photoreceptor flicks across you, ranging.*"
        - "'Target acquired.'"

  - name: B1 Sim Droid Bravo
    room: Tipoca City - Combat Simulator
    species: Droid
    description: >-
      A second B1 simulator droid, identical to its partner unit
      down to the yellow-and-grey paint scheme. The two are paired
      as a standard cadet drill loadout — close enough to teach
      flanking discipline, throttled enough that the lesson does
      not put a clone trooper in the medbay before deployment.
      It pivots to cover its companion the moment combat starts.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 1D
        mechanical: 1D
        perception: 2D
        strength: 2D
        technical: 1D
      skills:
        blaster: 3D
        dodge: 2D+2
      weapon: blaster_carbine
      move: 8
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      chain_enemy_template: b1_battle_droid_sim
      personality: >-
        Throttled simulator droid, paired with Alpha. Plays the
        flanking role. No adaptive behavior; pure drill foil.
      knowledge:
        - "Simulator unit; will not respond to questions outside combat scenarios."
      faction: cis_simulator
      dialogue_style: >-
        Synthesized B1 stock phrases. Limited vocabulary.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'Roger roger.'"
        - "'Flanking.'"
        - "*The droid sidesteps, weapon up.*"

  # ════════════════════════════════════════════════════════════════
  # separatist_commando step 2 — Drill Pit
  # Two-target drill, with two ally clones, against Republic-clone
  # simulants in CIS Geonosis training cells.
  # ════════════════════════════════════════════════════════════════

  - name: Republic Clone Simulant Alpha
    room: Geonosis Foundry - Drill Pit
    species: Human
    description: >-
      A combat-simulant in white-and-grey clone armor, fielded by
      CIS training programs to give Separatist commandos realistic
      hostile-force experience. Up close, the helmet is a printed
      polymer shell painted to match Republic livery and the
      "trooper" inside is a contracted Geonosian fighter wearing
      simulator-grade gear. The illusion holds at six paces and
      that is enough for drill purposes. They raise the simulator
      DC-15 and engage.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 1D+2
        mechanical: 1D+2
        perception: 2D+1
        strength: 2D+1
        technical: 1D+2
      skills:
        blaster: 3D
        dodge: 3D
        brawling: 2D+2
      weapon: blaster_rifle
      move: 9
      force_points: 0
      character_points: 1
      dark_side_points: 0
    ai_config:
      chain_enemy_template: republic_clone_sim
      personality: >-
        Geonosian contractor in simulant kit. Plays the role for
        the drill, treats it as a shift's work. Tactically
        competent but doesn't push; the drill is supposed to be
        winnable for the cadre.
      knowledge:
        - "Simulator role; speaks only stock Republic radio-discipline phrases when in role."
      faction: cis_simulator
      dialogue_style: >-
        Stock clone-trooper radio phrases. Drops the role the
        moment the drill ends.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'Contact, contact!'"
        - "'Move up — flank left.'"
        - "*The simulant takes cover behind a drill-pit barrier.*"

  - name: Republic Clone Simulant Bravo
    room: Geonosis Foundry - Drill Pit
    species: Human
    description: >-
      Second of the paired simulant team, identical kit to Alpha
      down to the printed-polymer helmet. CIS drill doctrine pairs
      simulants as standard so cadets train against unit-level
      fire-and-maneuver, not isolated marksmanship. They cover
      each other professionally, in the way of contractors who
      have run this drill twice a week for a season.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 1D+2
        mechanical: 1D+2
        perception: 2D+1
        strength: 2D+1
        technical: 1D+2
      skills:
        blaster: 3D
        dodge: 3D
        brawling: 2D+2
      weapon: blaster_rifle
      move: 9
      force_points: 0
      character_points: 1
      dark_side_points: 0
    ai_config:
      chain_enemy_template: republic_clone_sim
      personality: >-
        Second Geonosian contractor; same role-mode as Alpha.
        Plays bounding-overwatch element.
      knowledge:
        - "Simulator role; speaks only stock Republic radio-discipline phrases when in role."
      faction: cis_simulator
      dialogue_style: >-
        Stock clone-trooper radio phrases. Bounds overwatch with
        Alpha.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'Bounding!'"
        - "'Suppressing — go go go.'"
        - "*The simulant fires a measured three-round burst.*"
