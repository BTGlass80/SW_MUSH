#    accumulation path is gated on that flag (per jedi_village_quest_design_v1.md
#    §3.1). These are mundane sites; omitting the flag is intentional.
#
# 2. sw_ancient_pipe_market sets director_managed: true + npc_cluster: true,
#    matching the pattern of uscru_entertainment_district_fringe. The Director
#    NPC cluster spawns here; hand-authored NPC Orveth Callo is flavor text.
#
# 3. sw_foundation_stratum_museum.structural_hazard: true signals the engine
