#    shaft drop is narrative (40 meters) — implementation is engine-side.
#
# 4. sw_null_gallery.threat_tier: lethal + low_level_warning: true matches
#    the maze_the_reaper_territory pattern. The engine surfaces a threshold
#    warning on entry for under-level characters.
#
# 5. sw_null_gallery.terrain: bottom_dark is permitted only for a genuine
#    bottom-level site per content authoring rules. [9, 34] is bottom level.
