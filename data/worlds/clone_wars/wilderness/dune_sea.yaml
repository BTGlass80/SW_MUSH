# UNWALKABLE TILES (per W.2 phase 2 / Evennia review addendum)
# ═══════════════════════════════════════════════════════════════════════
#
# Tiles that are inside the rectangular bounds but cannot be entered.
# Used for cliff faces, sealed bunkers, military exclusion zones, etc.
#
# The Dune Sea ships W.2 phase 2 with NO unwalkable tiles — the whole
# rectangle is walkable open desert. The block below is a documentation
# template for future regions; the loader accepts an empty or absent list.

unwalkable_tiles: []
