# DESIGN NOTES
# ═══════════════════════════════════════════════════════════════════════
# These three landmarks form a threat gradient approaching the existing
# maze_the_reaper_territory anchor from the southeast:
#
#   [37,23] se_last_ward_marker      threat_tier: low    (last safe-ish point)
#   [33,30] se_collapse_gallery      threat_tier: lethal (active feeding sign)
#   [29,36] se_sublevel_shriek_dark  threat_tier: lethal (Maze threshold)
#
# cartography_unstable: true on the two lethal landmarks mirrors the
# existing Maze flag. This is a property flag only — no new engine
# support required; engine reads it the same way it reads the flag on
# maze_the_reaper_territory.
#
# The apex predator is intentionally unnamed and ambiguous throughout,
# consistent with the Reaper anchor's "accounts disagree" register.
# Creature fauna (shredder bats, spor-crawlers) is drawn from the
# Coruscant Underworld's established city-bred fauna register.
#
# Era: Clone Wars ~20 BBY. B3-clean: no post-Republic / GCW-era faction terms.
# No canonical Clone Wars figures appear. All named fauna is original.
# ═══════════════════════════════════════════════════════════════════════
