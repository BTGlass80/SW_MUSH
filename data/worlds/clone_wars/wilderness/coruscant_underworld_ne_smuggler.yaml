# ENGINE INTEGRATION NOTES
# ═══════════════════════════════════════════════════════════════════════
# These three landmarks are additive to the Coruscant Underworld
# landmark set. The wilderness builder reads all landmark YAML files
# for the region simultaneously; these entries will be included in
# the same pass as coruscant_underworld_landmarks.yaml.
#
# 1. ne_derelict_loading_docks.structural_hazard: true signals that
#    the cracked slab approach should trigger a hazard check consistent
#    with the pattern set by abandoned_factory_dominus. Engine-side.
#
# 2. ne_contraband_transfer_point.gameplay_role: smuggler_contraband_cache
#    matches abandoned_factory_dominus; the engine's contraband loot
#    table should fire for this landmark the same way it does for Dominus.
#    These are distinct sites — do not collapse them to a single room.
#
# 3. ne_stripped_cargo_lift_hub has no gameplay_role to remain consistent
#    with sibling entries that omit it when the role is staging/flavor
#    rather than a cache or hub function with a live consumer.
#
# 4. All three landmarks: faction_anchor: independent. The existing
#    black_sun_crawler_hideout at [20, 15] remains the sole BHG anchor
#    for the Coruscant Underworld region.
#
