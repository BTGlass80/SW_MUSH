# Generalized Questline Drop — "The Sealed Ledger" (T3.24 ninth slice, 2026-06-26)
#
# The NINTH accessible (non-t5, non-tutorial) `kind: questline` chain, after
# "The Ghost Shipment" (nar_freight_ghost_shipment, Nar Shaddaa Promenade/
# Undercity), "The Crooked Wheel" (mos_eisley_crooked_wheel, Tatooine/Mos
# Eisley), "The Lost Courier" (coruscant_lower_lost_courier, Coruscant LOWER
# city), "The Skimmed Line" (kuat_ring_skimmed_line, Kuat orbital ring), "The
# Dust-Sick" (jundland_dust_sick, Tatooine wilderness), "The False Provenance"
# (coruscant_petrax_false_provenance, Coruscant cultural district), "The Forged
# Notice" (nar_shaddaa_forged_notice, Nar Shaddaa upper docks), and "The Warrens
# Toll" (nar_shaddaa_warrens_toll, Nar Shaddaa Warrens). It reuses the SAME live
# questline engine (engine/tutorial_chains.py + chain_events.py: the `kind:
# questline` type + `active_questline` slot, the existing event types, the four
# reward funnels) with NO new engine code, no new slot, no new event type, no
# schema migration, no new reward faucet, and NO map-coordinate or exit-graph
# change — the sanctioned right-of-launch widening per
# quest_expansion_postlaunch_path_v1.md (T3.24): author MORE questlines on the
# proven pattern.
#
# Two firsts for the accessible-questline arc:
#   1. A NINTH distinct skill spread — PICK POCKET + HIDE + COMPUTER PROGRAMMING
#      (slicing) — none of which any prior accessible questline uses (vs
#      search+streetwise on the Ghost Shipment, investigation+gambling on the
#      Crooked Wheel, persuasion+sneak on the Lost Courier, security+bargain on
#      the Skimmed Line, first_aid+survival on the Dust-Sick, value+con on the
#      False Provenance, forgery+bureaucracy on the Forged Notice, command+
#      demolitions on the Warrens Toll). The nine accessible questlines now each
#      teach distinct play, and this is the first to reward the thief's three
#      hands — the lift (Dexterity/pick pocket), the slip (Perception/hide), and
#      the slice (Technical/computer programming).
#   2. A NEW STRUCTURE — the FIRST accessible questline that resolves on FINESSE,
#      not force: three skill-check steps and NO combat step, climaxing on the
#      master slice rather than a blaster fight. Every other accessible questline
#      forces a combat climax, so a pure slicer / scoundrel / face build hits a
#      blaster wall at the end of all eight; this is the first side-arc such a
#      build can finish entirely on its own terms. (The static reachability
#      Class-5 anti-vacuous combat check stays satisfied corpus-wide by the
#      tutorial chains and the eight prior combat-climax questlines.)
#
# It is also a new STORY SHAPE: a heist-for-justice — not a smuggling-trace, a
# racket-bust-by-investigation, a kidnap-rescue, an industrial-skim, a frontier
# medical rescue, an art-fraud caper, a counter-forgery, or a community defense.
# An info-broker the Coruscant mid-city knows only as the Ledger runs a forgery
# mill dressed as a "debt-clearing service": he fabricates lien-records against
# working families, then seizes their accounts through a registry desk he
# controls, and keeps the originals (the proof the liens are fakes) in a private
# data-vault hidden in a decommissioned corner of the Coruscant Works, on a
# purge schedule that re-forges the records to beat any audit. Terva Dohl, an
# honest mid-city records-advocate, can't beat him on paper — he owns the desk
# and forges faster than she can appeal — so she offers a freelance fee to pull
# the original ledger before the next purge: lift the vault fob off his collector
# (pick pocket), slip past his watchers and the dead sublevel's sensor sweep
# (hide), and crack the slicer-gauntlet on the data-core (computer programming),
# then carry it to an honest desk so the forged liens collapse all at once.
#
# A FRESH district of Coruscant — the mid-city commercial district + the
# Coruscant Works sublevels (commercial_district zone): Dexter's Diner, the
# Mid-City Transit Hub, the Works Industrial Sublevel, the Works Atmospheric
# Processing Plant. It reuses NONE of the prior two Coruscant arcs' rooms (the
# Lost Courier ran crystal_jewel_cantina / lower_refugee_warren / petrax_sublevels
# / factory_district; the False Provenance ran petrax_quarter / galactic_museum /
# calocour_heights / coruscant_westport_landing). It touches NO map coordinate or
# world exit graph — the commercial-district rooms already exist and are loaded
# (planets/coruscant.yaml); only ONE NPC + a chains.yaml entry + an achievement
# are added.
#
# This NPC backs the `coruscant_works_sealed_ledger` questline in
# data/worlds/clone_wars/tutorials/chains.yaml:
#   * Terva Dohl — the mid-city records-advocate who offers + closes the quest
#                  (step-1 npc = the questline's start-NPC, per
#                  get_questline_offer). She helps families fix registry errors
#                  honestly and is being out-forged by the Ledger faster than she
#                  can appeal. Step-1 + step-5 NPC.
# The broker (narrated only as "the Ledger"), his collector on the transit hub,
# the watchers on the Works approach, the purge-timer, the data-vault, and the
# seized families (the widow first among them) are NARRATED ONLY — story beats
# carried in the prose, NOT spawned NPC entities (the off-screen principal and
# the off-screen marks need no producer, the way the prior questlines' off-screen
# principals are carried). Because the questline resolves on finesse with NO
# combat step, there is NO antagonist NPC and NO chain_enemy_template — the only
# placed NPC is the giver.
#
# Original character, era-clean ~20 BBY, WEG R&E D6 stats. No canon figures.
# Provenance: Bothan (the galaxy's archetypal information-network species, long
# established and wholly era-clean — Bothans run info and brokerage everywhere in
# the era and are not war-faction coded). Stats matched to the shipped
# accessible-questline non-combat fixer band (Yelza Korrin / Dorae Vint / Sashi
# Renko / Dav Nuro / Soree Bann / Hessa Veil / Cassa Brel / Vessa Tial): a
# capable, socially/technically sharp non-combatant, no fight statline, a sidearm
# only for flavor. WEG40120 PDF is local-only (gitignored) and absent in this
# tree; the band is cited against the in-repo reference NPCs, not re-derived.

schema_version: 1

npcs:

  # ═══════════════════════════════════════════════════════════════════
  # The mid-city records-advocate — Terva Dohl (questline GIVER + closer)
  # Questline: coruscant_works_sealed_ledger ("The Sealed Ledger")
  # Placement: Coruscant - Dexter's Diner (dexters_diner,
  #            zone commercial_district). Step-1 + step-5 NPC.
  # NOTE: she keeps a back booth at Dexter's and works the registry on
  # behalf of families it has wronged — a fixture of the mid-city, not a
  # diner patron passing through.
  # ═══════════════════════════════════════════════════════════════════

  - name: Terva Dohl
    room: "Coruscant - Dexter's Diner"
    species: Bothan
    description: >-
      A sleek grey-furred Bothan woman in a plain, well-kept advocate's coat,
      a back booth at Dexter's claimed by the stacked datapads of other people's
      ruin and a stylus she taps when she is thinking too fast to talk. She runs
      an honest mid-city records service — the unglamorous work of proving the
      registry got a working family's account wrong and making it fix the entry
      — and for years that was enough. It is not enough against the Ledger. The
      broker forges debt-liens against people who never borrowed a credit, seizes
      their accounts through a desk he owns, and re-forges the originals on a
      purge schedule so no audit ever catches the same lie twice; she appeals and
      he forges faster than she can file, and she has watched a dozen families go
      under she could not pull back. She is no thief and no slicer, and the one
      thing that would end him — the original ledger out of a vault he is sure no
      one can reach — is past anything she can do from a desk. So she is looking
      for a pair of quiet hands: someone who can lift the way in, slip past
      unseen, and crack a lock, and bring back the record that collapses every
      forged lien at once.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D+1
        strength: 2D
        technical: 2D+2
      skills:
        bureaucracy: 4D+1
        investigation: 3D+2
        persuasion: 3D+2
        streetwise: 3D+1
        value: 3D
        computer_programming: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        A sharp, principled mid-city advocate worn down by losing an
        unwinnable paper war — precise, unsentimental, quick to size up whether
        a stranger can actually do the thing she needs, slow to trust because the
        people who promise help in the mid-city usually want a cut of the
        wreckage. She knows the registry cold, knows exactly how the Ledger forges
        and purges, and knows just as exactly that none of that knowledge gets the
        originals out of his vault. Tired, clear-eyed, and quietly relentless on
        behalf of people who can't fight a forged lien; she frames the fee as a
        fair price for finesse because the families have nothing left to pay and
        the work is worth paying for.
      knowledge:
        - "She is Terva Dohl, an honest mid-city records-advocate who helps working families fix what the Coruscant registry got wrong; lately she is losing that fight to a single broker."
        - "A broker the mid-city knows only as the Ledger runs a 'debt-clearing service' that is a forgery mill — he fabricates lien-records against people who never borrowed, then seizes their accounts through a registry desk he controls, and re-forges the originals on a purge schedule so no audit catches the same lie twice."
        - "The proof the liens are fake — the original ledger — sits in a private data-vault the Ledger hid in a decommissioned corner of the Coruscant Works, behind automation so old the crews ignore it, with a slicer's-gauntlet lock and a purge-timer counting down to the next wipe."
        - "She can't beat him on paper: he owns the desk and forges faster than she can appeal. The only thing that ends him is the original ledger pulled before the purge — and that is a job for finesse, not a firefight in a sealed sublevel: lift the vault fob off his collector at the transit hub, slip past his watchers and the sensor sweep, and crack the gauntlet on the core."
      faction: independent
      dialogue_style: >-
        Crisp, economical mid-city diction, lawyerly without the fog — states the
        problem, states the plan, and names the price plainly; talks like someone
        used to making a hard case to people who are out of options.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'The Ledger sells debt-clearing. What he sells is forged liens — debts you never owed — and your account seized when you can't pay his fee. I can't out-appeal a man who owns the desk and forges faster than I file. But the originals are in his vault, and originals don't lie.'"
        - "*Terva Dohl taps her stylus against a datapad stacked with other people's ruin, and does not pretend the desk is winning this one.*"
        - "'Lift the fob off his collector at the transit hub, get past his watchers in the Works unseen, crack the gauntlet on the core, and bring me the original ledger before his purge re-forges it. Do that and the fee's yours, and dozens of families come out clear. No blaster. Quiet hands. That's the whole job.'"
