# data/worlds/clone_wars/npcs_drop_mob_grind_kuat_drydocks.yaml
#
# Kuat Drive Yards Drydocks & Inner Ring Hostile Mob Grind Batch (2026-06-22)
#
# Six roaming hostile NPCs seeded across KDY drydocks and inner-ring rooms to
# populate the solo-PvE mob-grind reward loop (engine/hunting_rewards.py).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Venator Drydock x1      (CIS insertion specialist, Zabrak)
#   Acclamator Drydock x1   (structural saboteur, Human)
#   Ileu Shipyards x1       (pirate hull stripper, Trandoshan)
#   Commercial Zone x1      (black-market arms broker, Besalisk)
#   Ring Residential Block x1 (gang shakedown enforcer, Weequay)
#   Corporate Offices x1    (corporate intelligence thief, Chiss)
#
# Thematic premise: At wartime, Kuat Drive Yards is the galaxy's most critical
# shipbuilding hub — and the most surveilled. But KSF audits have gaps. CIS
# saboteurs carry forged inspection passes; freelance criminals work the
# civilian zones behind the military perimeter. Six hostile operators with
# six distinct angles of entry into KDY's profitable and dangerous interior.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats UNVERIFIED against WEG40120 PDF — grounded in sibling CW NPC
#   patterns (kuat.yaml, kuat_city.yaml, kuat_spaceport.yaml batches).
# Species stat modifiers applied per WEG D6 convention:
#   Zabrak: STR 3D, KNO 2D+2 (resilient, disciplined; WEG40120 p.34)
#   Human: all attributes 2D baseline
#   Trandoshan: STR 3D+2, DEX 2D+1 (powerful, predatory)
#   Besalisk: STR 3D+2, four arms (bulky, imposing)
#   Weequay: STR 2D+2, DEX 2D+2 (tough, thuggish)
#   Chiss: KNO 3D, PER 2D+2 (analytical, precise)
# Weapons: heavy_blaster_pistol, blaster_pistol, blaster_carbine,
#   hold_out_blaster, vibroblade — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # VENATOR DRYDOCK — 1 NPC (CIS insertion specialist)
  # The vast Venator-class construction slip, seven hulls in varying
  # stages of completion. KSF access is tight but contractor rotation
  # creates auditable gaps a skilled operative can walk through.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Hull Insertion Specialist
    room: "Kuat Drive Yards - Venator Drydock"
    species: Zabrak
    description: >-
      A Zabrak woman moving through the Venator construction slip with
      a KDY hull-inspection badge that checks out against last quarter's
      roster — because she replaced the woman in that slot three weeks
      ago and has been refiling her access logs ever since. She wears
      fabrication coveralls with the magnetic boots of a zero-g hull
      worker, and the calibration kit slung over one shoulder contains
      two things that are not calibration equipment. She has placed four
      micro-charges in structural joins along the port secondary hull.
      When you step out from behind a forward frame brace and she
      realizes you have been watching her place the fifth, the
      calibration kit hits the deck and the hold-out blaster appears
      from her inner pocket in a single motion.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D
        perception: 2D+2
        strength: 3D
        technical: 2D+2
      skills:
        blaster: 4D+1
        dodge: 3D+2
        sneak: 4D
        security: 3D+1
        demolitions: 3D+2
        climb_jump: 3D+1
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS technical-infiltration specialist whose mission is hull
        sabotage on Venator-class frames during construction — not enough
        to catch in quality review, enough to cause catastrophic stress
        failures after the ship enters service. She is methodical,
        patient, and committed to not leaving witnesses when her cover
        is compromised. She fires immediately when cornered and uses
        the exposed structural frame of the construction slip as cover,
        moving through the skeleton of the hull rather than along
        the access walkways.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Controlled, accent-free Basic with the faint flatness of
        someone who trained hard to sound like nobody in particular.
        "Hull inspection is closed in this section." The blaster
        is already leveled before the sentence ends.
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*She drops behind a hull frame and fires from cover through
          a structural gap.*"
        - "*The magnetic boots clank as she repositions along the keel
          and fires twice.*"
        - "*'You should have kept walking.' She fires and moves deeper
          into the construction frame.*"

  # ══════════════════════════════════════════════════════════════════
  # ACCLAMATOR DRYDOCK — 1 NPC (structural saboteur)
  # The Acclamator assault ship slip runs three overlapping shifts;
  # the fourth hull is a month from launch certification.
  # ══════════════════════════════════════════════════════════════════

  - name: KDY Structural Saboteur
    room: "Kuat Drive Yards - Acclamator Drydock"
    species: Human
    description: >-
      A Human man in the gray coveralls of a senior structural welder,
      with eighteen years of KDY service records that are entirely
      genuine — the CIS approached him eight months ago when his
      daughter's medical debt reached a figure KDY's health plan
      would not cover. He has been introducing micro-fractures into
      load-bearing weld seams on the Acclamator frames: nothing that
      fails in dock, everything that fails under the stress of an
      atmospheric insertion six months from now. He looks up from
      his work when you come around the hull scaffolding, and the
      expression on his face is not guilt — it is the flat calculation
      of a man who decided some time ago that he was past the point
      where stopping was an option.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+2
        mechanical: 2D+1
        perception: 2D+2
        strength: 2D+1
        technical: 3D+2
      skills:
        blaster: 3D+2
        sneak: 3D+1
        mechanical_repair: 4D+2
        security: 3D+2
        dodge: 3D
        streetwise: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 3
    ai_config:
      personality: >-
        A long-service KDY structural welder who took a CIS contract
        under financial duress and has spent eight months rationalizing
        it. He is not a fanatic or an idealist — he is a frightened
        man past the point of no return who understands that witnesses
        mean the end of everything. He fires quickly and accurately
        for someone whose primary trade is welding; he spent three
        weeks at a private range after he took the money, because he
        knew the day would come.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Flat, exhausted Basic with a Kuat city-district accent. He
        does not try to explain. "I'm sorry." And then the blaster
        comes up.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires from behind the scaffolding and does not say
          another word.*"
        - "*A controlled pair of shots — he is not panicking. He
          has been expecting this.*"
        - "*He advances, firing. There is nothing left to negotiate.*"

  # ══════════════════════════════════════════════════════════════════
  # ILEU SHIPYARDS — 1 NPC (pirate hull stripper)
  # The Ileu slip handles decommissioned and battle-damaged hulls
  # awaiting disassembly; the accounting is a controlled mess.
  # ══════════════════════════════════════════════════════════════════

  - name: Pirate Component Stripper
    room: "Kuat Drive Yards - Ileu Shipyards"
    species: Trandoshan
    description: >-
      A broad-chested Trandoshan with the scarring of someone who has
      spent years working tight corridors between hull plating and
      internal frame. He found the gap in the Ileu audit cycle six
      weeks ago — the decommissioned hulls queuing for the smelter
      get a single manifest review before they go in, and nobody
      cross-checks what comes off them in between. He has pulled
      fourteen navigation transponder arrays, nine hyperdrive
      motivator housings, and thirty meters of high-grade power
      conduit, all of which have left the ring in a maintenance
      worker's locker. He turns from the hull access panel he is
      currently stripping with a vibroblade in one massive hand,
      and the look he gives you is purely evaluative.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+1
        strength: 3D+2
        technical: 2D+2
      skills:
        melee_combat: 4D+2
        brawling: 4D+1
        intimidation: 3D+2
        dodge: 2D+2
        mechanical_repair: 3D+1
        search: 2D+2
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A freelance pirate-supply operative who specializes in
        stripping decommissioned military hulls before they reach the
        smelter. He is methodical, experienced, and deeply pragmatic
        about witnesses — he did not get this far in his trade by
        leaving loose ends. The vibroblade is already in his hand
        because he always works with it out in case a panel seal
        resists. He uses the decommissioned hull geometry for cover
        instinctively and fights close.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Deep Trandoshan-accented Basic with minimal vocabulary.
        A long, flat stare. Then he moves.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The vibroblade swings low and fast — he has done this
          in tight spaces before.*"
        - "*He shoves a hull panel aside and closes the distance.*"
        - "*A low growl. He is not retreating.*"

  # ══════════════════════════════════════════════════════════════════
  # COMMERCIAL ZONE — 1 NPC (black-market arms broker)
  # The ring's civilian commercial belt: service contractors, tool
  # suppliers, transit cafes. The KSF presence is lighter here.
  # ══════════════════════════════════════════════════════════════════

  - name: Black-Market Arms Broker
    room: "Kuat Drive Yards - Commercial Zone"
    species: Besalisk
    description: >-
      A large Besalisk operating out of a legitimately licensed
      industrial-supply stall in the Commercial Zone — four arms,
      two of which are resting on the counter with apparent idleness
      while the other two are managing a transaction that does not
      appear on any manifest. The stall sells cutting equipment and
      fastener stock; what it actually moves, in the unmarked crates
      that go out via the maintenance freight system, is a curated
      selection of hold-out blasters, carbines, and military-grade
      power cells diverted from KDY contractor supply chains and
      resold to parties who cannot buy them through legitimate
      channels. When you come close enough to see what is in the
      open crate on the workbench, all four arms reach for weapons
      simultaneously.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 2D+2
        mechanical: 2D
        perception: 2D+2
        strength: 3D+2
        technical: 2D+1
      skills:
        blaster: 4D+1
        brawling: 3D+2
        intimidation: 4D
        streetwise: 3D+2
        bargain: 4D
        dodge: 2D+1
      weapon: heavy_blaster_pistol
      move: 8
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A Besalisk black-market arms broker who has been operating
        a successful diversion ring out of the KDY Commercial Zone
        for two years. He is not impulsive — business depends on
        not attracting attention — but when a potential witness
        has already seen the open crate, the calculus shifts
        completely. He is large, strong, and fights with four arms
        when pushed into a corner, which means he can absorb
        considerably more punishment than he looks like he can
        before going down.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Heavy Besalisk-accented Basic, deliberately amiable until
        it isn't. "Looking for something? We carry the full line."
        All four arms are already moving.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*Four arms, three of them moving at once — he is harder
          to read than a single-armed opponent.*"
        - "*The heavy blaster comes up in a lower arm while the
          upper two sweep the counter clear.*"
        - "*He does not retreat. He has nowhere to go and he
          knows it.*"

  # ══════════════════════════════════════════════════════════════════
  # RING RESIDENTIAL BLOCK — 1 NPC (gang shakedown enforcer)
  # Housing for KDY workers and contractors; KSF patrols are
  # irregular; the protection economy runs the hallways at night.
  # ══════════════════════════════════════════════════════════════════

  - name: Ring Protection Enforcer
    room: "Kuat Drive Yards - Ring Residential Block"
    species: Weequay
    description: >-
      A wiry Weequay working his way down the residential corridor
      with a collection manifest on a beat-up datapad and the
      carbine visible enough to clarify the nature of the visit.
      The residential block is divided into six collection routes;
      his is the third corridor of the B-wing, where the overnight
      shift workers live — people who are tired, alone, and have
      learned that the amounts on the manifest are cheaper than
      the alternative. He has been running this route for four
      months without serious interference. When you come around
      the corner into his route, he sizes you up in half a second
      and decides you are either a new arrival who does not know
      the system, or a problem he needs to deal with before the
      end of the corridor.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D+2
        intimidation: 3D+2
        brawling: 3D+1
        dodge: 2D+2
        streetwise: 3D
        search: 2D+2
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A gang enforcer running a residential protection route in
        KDY's Ring Residential Block. He is not sophisticated —
        his business model is straightforward intimidation and
        reliable violence — but he is experienced. He knows
        when someone is going to comply and when they are going
        to be a problem, and he does not let the second type
        get comfortable before moving on them. The carbine is
        out already because it is always out on collection runs.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat Weequay-accented Basic. "New to the block? Let me
        explain how things work." The carbine is already at
        his shoulder.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires and steps sideways into a doorway.*"
        - "*The carbine tracks you smoothly — he has done this
          in a corridor before.*"
        - "*'Wrong answer.' Another shot, no hesitation.*"

  # ══════════════════════════════════════════════════════════════════
  # CORPORATE OFFICES — 1 NPC (corporate intelligence thief)
  # KDY's proprietary shipbuilding designs are worth extraordinary
  # sums to competing defense contractors. The offices hold them.
  # ══════════════════════════════════════════════════════════════════

  - name: Corporate Intelligence Thief
    room: "Kuat Drive Yards - Corporate Offices"
    species: Chiss
    description: >-
      A Chiss woman in the sharply pressed attire of a procurement
      auditor, with a KSF-certified access badge and a datapad
      running an audit protocol that is entirely legitimate on its
      surface and contains, three layers down, a siphon routine
      that has been copying KDY's Venator-class variant schematics
      to a dead-drop server for the past eleven days. She was hired
      by a Fondor Shipyards subsidiary that does not officially
      exist. Her blue skin and red eyes are precisely as unreadable
      as she intends them to be. When you enter the corporate filing
      corridor and she realizes you are not the auditor she was
      told would be delayed until 1700, the datapad goes into
      a document sleeve and the blaster comes out of her jacket
      in a single unhurried motion.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 2D+2
        strength: 2D
        technical: 3D
      skills:
        blaster: 4D
        sneak: 4D+1
        security: 4D
        computers: 3D+2
        dodge: 3D+1
        con: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        A Chiss corporate intelligence operative contracted by a
        competing defense manufacturer to steal KDY shipbuilding
        schematics. She is precise, analytical, and entirely calm
        in a crisis — Chiss do not panic, they recalculate. She
        has already run the decision tree for this situation and
        the answer is the same in every branch: no witnesses
        reach a KSF substation. She fires accurately and
        methodically, retreating toward the filing corridor
        exit while maintaining cover.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Precise, formal Basic with the faint Chiss intonation
        pattern — clipped vowels, unhurried cadence. "I believe
        you have taken a wrong turn." The blaster is level
        before she finishes the sentence.
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*She steps back along the filing shelves and fires
          from the end of the row.*"
        - "*A precise shot — she is aiming at your comm unit.*"
        - "*She does not hurry. Two steps back, one shot.*"
