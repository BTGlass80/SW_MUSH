# Generalized Questline Drop — "The Driven Herd" (T3.24 twelfth slice, 2026-06-27)
#
# The TWELFTH accessible (non-t5, non-tutorial) `kind: questline` chain, and
# the FIRST set on KAMINO — after "The Ghost Shipment" (nar_freight_ghost_
# shipment, Nar Shaddaa), "The Crooked Wheel" (mos_eisley_crooked_wheel,
# Tatooine/Mos Eisley market), "The Lost Courier" (coruscant_lower_lost_courier,
# Coruscant LOWER city), "The Skimmed Line" (kuat_ring_skimmed_line, Kuat
# orbital ring), "The Dust-Sick" (jundland_dust_sick, Tatooine Jundland
# wilderness), "The False Provenance" (coruscant_petrax_false_provenance,
# Coruscant cultural district), "The Forged Notice" (nar_shaddaa_forged_notice,
# Nar Shaddaa upper docks), "The Warrens Toll" (nar_shaddaa_warrens_toll, Nar
# Shaddaa Warrens), "The Sealed Ledger" (coruscant_works_sealed_ledger,
# Coruscant mid-city), "The Sabotaged Run" (tatooine_speeder_sabotaged_run,
# Tatooine outskirts speeder circuit), and "The Hollow Crew"
# (geonosis_offworld_hollow_crew, Geonosis offworlder surface). It reuses the
# SAME live questline engine (engine/tutorial_chains.py + chain_events.py: the
# `kind: questline` type + `active_questline` slot, the existing event types,
# the four reward funnels) with NO new engine code, no new slot, no new event
# type, no schema migration, no new reward faucet, and NO map-coordinate or
# exit-graph change — the sanctioned right-of-launch widening per
# quest_expansion_postlaunch_path_v1.md (T3.24): author MORE questlines on the
# proven pattern.
#
# Three firsts for the accessible-questline arc:
#   1. A TWELFTH distinct skill spread — BEAST RIDING + SWIMMING — neither of
#      which any prior accessible questline uses (vs search+streetwise /
#      investigation+gambling / persuasion+sneak / security+bargain /
#      first_aid+survival / value+con / forgery+bureaucracy / command+
#      demolitions / pick-pocket+hide+computer-programming / sensors+
#      repulsorlift-operation / alien-species+droid-programming). `beast riding`
#      resolves to MECHANICAL and `swimming` to STRENGTH via the canonical
#      perform_skill_check funnel; neither is aliased (each canonicalizes to
#      itself). This is the FIRST accessible questline whose spread includes a
#      STRENGTH skill (swimming) at all — every prior arc's spread drew only on
#      Perception / Knowledge / Technical / Mechanical — and the FIRST to reward
#      BEAST RIDING: the physical creature-handler build (the rider-and-swimmer)
#      that the social, investigative, appraisal, leadership, finesse, slicer,
#      pilot, and xeno-scholar arcs never serve.
#   2. The FIRST questline set on KAMINO — the offworlder-accessible ocean
#      platform margin (the Aiwha Stable / the Ocean Surface Platform / the
#      sensor-shadowed Unauthorized Docking Point beneath the city). The Tipoca
#      City cloning facility and the clone army are kept ENTIRELY OFF-STAGE: the
#      whole arc runs on the faction-neutral fauna-and-spacer margins of the
#      open-ocean platforms — the Clone War kept offstage exactly the way every
#      prior accessible arc keeps the Republic/CIS conflict offstage. It touches
#      NO map coordinate or world exit graph — the rooms already exist and are
#      loaded (planets/kamino.yaml, zone kamino_ocean_platform); only NPCs + a
#      chains.yaml entry + an achievement are added.
#
# It is also a new STORY SHAPE: breaking a wildlife-poaching racket / rescuing
# a driven herd — not a smuggling-trace, a racket-bust-by-investigation, a
# kidnap-rescue, an industrial-skim, a frontier medical rescue, an art-fraud
# caper, a counter-forgery, a community-defense, a finesse heist, a fixed race,
# or a droid-reflash racket. No prior accessible arc touches fauna at all. A
# poacher, Korsa Drael, works the offworld ocean platforms with a stolen
# herd-call goad: in the storm-squalls he sounds the goad to panic the working
# aiwha off their roost and scatter them into the open swell, where his crew
# nets the foundered ones and crates them — under the city's sensor umbrella,
# unlogged — for off-world private collectors and game-preserves. The aiwha
# his crew don't reach drown in the open sea; the keeper's hired string is
# thinned one squall at a time, and the platform outfits that depend on the
# aiwha to cross the storm-separated pylons are stranded. Neyla Sur, the
# offworlder keeper who tends the string, is a hand with the beasts and an
# amphibious Nautolan swimmer, but she is not rider enough for a storm-swell
# nor a match for an armed crew. She offers her savings to anyone who can
# gentle one of the driven aiwha and ride it out to find where the herd was
# taken (beast riding), dive the poacher's submerged net-pen and cut the
# foundering aiwha free before they drown (swimming), stand off the poacher
# when he comes back to an empty pen (attack/dodge), and give the platforms
# their herd back.
#
# These NPCs back the `kamino_driven_herd` questline in
# data/worlds/clone_wars/tutorials/chains.yaml:
#   * Neyla Sur   — the Nautolan aiwha-keeper who offers + closes the quest
#                   (step-1 npc = the questline's start-NPC, per
#                   get_questline_offer). Step-1 + step-5 NPC.
#   * Korsa Drael — the combat-step poacher (ai_config.chain_enemy_template
#                   driven_herd_poacher; the step-4 combat_won foil), the hand
#                   who sounds the goad and crates the herd, who returns to his
#                   under-city dock when his pen goes quiet.
# The off-world buyers, the poacher's net-crew, the stolen herd-call goad, the
# scattered and netted aiwha, and the stranded platform outfits are NARRATED
# ONLY — story beats carried in the prose, NOT spawned NPC entities. Only the
# giver and the single combat foil are real placed NPCs. The aiwha themselves
# are the planet's established native megafauna (kamino.yaml room flavor); they
# are narrated, never statted as combat entities.
#
# Original characters, era-clean ~20 BBY, WEG R&E D6 stats. No canon figures
# (no Lama Su, Taun We, Kit Fisto, etc.). Provenance: Nautolan (the amphibious
# aquatic species of Glee Anselm — a wholly era-clean, faction-neutral fixture
# of the galaxy, and the natural fit for an ocean-world creature-keeper and
# strong swimmer) and Weequay (a long-spacefaring Outer Rim hunter/mercenary
# species, a faction-neutral fixture of Hutt-space muscle and hired crews) are
# both era-clean and not war-faction coded. Stats matched to the shipped
# accessible-questline bands — the giver to the non-combat fixer band (Yelza
# Korrin / Dorae Vint / Sashi Renko / Dav Nuro / Soree Bann / Hessa Veil /
# Cassa Brel / Vessa Tial / Terva Dohl / Ria Tann / Nuva Sehl), with the
# keeper's spread skewed to Mechanical/Strength to fit a beast-handler and
# amphibious swimmer; the poacher to the small-time-criminal antagonist band
# (Brakkis Vone / Gorvahn Brusk / Skarn Vex / Suro Vant / Vohrek Sarn / Brask
# Yade / Varn Tesk / Tarko Venn / Drevin Saar / Vossk Rhal): a real fight,
# beatable by a fresh post-chargen character. WEG40120 PDF is local-only
# (gitignored) and absent in this tree; the bands are cited against the in-repo
# reference NPCs, not re-derived.

schema_version: 1

npcs:

  # ═══════════════════════════════════════════════════════════════════
  # The aiwha-keeper — Neyla Sur (questline GIVER + closer)
  # Questline: kamino_driven_herd ("The Driven Herd")
  # Placement: Kamino - Aiwha Stable (kamino_aiwha_stable, zone
  #            kamino_ocean_platform). Step-1 + step-5 NPC.
  # NOTE: the offworlder who has earned the working aiwha's trust and hires
  # rider-and-mount crossings to the outfits stranded between the
  # storm-separated pylons — a distinct, rooted presence at the stable,
  # not one of the platform's transients.
  # ═══════════════════════════════════════════════════════════════════

  - name: Neyla Sur
    room: "Kamino - Aiwha Stable"
    species: Nautolan
    description: >-
      A lean, sea-green Nautolan woman, the long head-tresses of her species
      bound back in a fisher's net-cord and beaded with the constant Kaminoan
      rain, in a salt-stiff weather-smock with a coil of cut net over one
      shoulder and a beast-handler's quiet in her hands. She is no Kaminoan, but
      she has spent years at this stable earning what no clone ever has — the
      trust of the aiwha that roost here between flights — and she hires out
      rider-and-mount crossings to the offworld outfits stranded between the
      storm-separated pylons, and doctors the foundered beasts the squalls bring
      in. For a season now a poacher has worked her string: in the worst of the
      squalls he sounds a stolen herd-call goad that panics the aiwha off their
      roost and scatters them into the open swell, where his crew nets the
      foundered ones and crates them, under the city's sensor umbrella and off
      the logs, for off-world collectors who pay for a thing that flies and
      swims and can't be bred in a tank. The ones his crew don't reach drown
      out in the dark water. She is amphibious and a strong swimmer and a hand
      with the beasts, but she is not rider enough for a storm-swell and no
      match for an armed crew, and the string is thinning one squall at a time.
      She is looking for someone who can do the three things she cannot: gentle
      a driven aiwha and ride it out to find where the herd was taken, dive the
      poacher's net-pen and cut the foundering beasts free before they drown,
      and stand in front of the man who sounds the goad.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 2D+2
        mechanical: 3D
        perception: 3D
        strength: 2D+2
        technical: 2D
      skills:
        beast riding: 4D+1
        swimming: 4D
        survival: 3D+1
        first aid: 3D
        bargain: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        A quiet, sure-handed Nautolan beast-keeper worn down by watching a
        poacher thin the string she has spent years earning — patient, exact,
        and slow to ask for help, because help on a lawless ocean platform
        usually arrives with a cut already taken. She reads the swell and the
        herd the way another being reads a face, can gentle a foundered aiwha
        out of a panic and doctor it back, and swims the cold dark water under
        the pylons without fear — but she can't out-ride a storm-swell, can't
        dive a netted beast free and fight an armed crew at once, and a poacher
        with a goad and a gun is past anything she can gentle or trade her way
        out of. Tired, clear-eyed, and quietly furious; she offers her
        get-off-this-rock savings as the fee because the credits were always
        going to be spent either fleeing the platforms or being ruined by the
        racket, and a stranger willing to spend them on the poacher losing
        instead is the only kind of luck the honest end of the platform gets.
      knowledge:
        - "She is Neyla Sur, an offworlder aiwha-keeper at the Kamino ocean-platform stable; she has earned the roosting aiwha's trust, hires out rider-and-mount crossings to the outfits stranded between the storm-separated pylons, and doctors the foundered beasts the squalls bring in."
        - "A poacher named Korsa Drael works her string: in the worst squalls he sounds a stolen herd-call goad that panics the aiwha off their roost and scatters them into the open swell, where his crew nets the foundered ones and crates them — under the city's sensor umbrella, off the logs — for off-world collectors. The aiwha his crew don't net drown out in the open sea."
        - "She is a strong swimmer and a hand with the beasts but not rider enough for a storm-swell and no match for an armed crew; the string is thinning one squall at a time, and the platform outfits that depend on the aiwha to cross the pylons are getting stranded."
        - "The three things she can't do alone: gentle one of the driven aiwha foundering near the ocean-surface platform and ride it out across the swell to find where the herd was taken; dive the poacher's submerged net-pen beneath the Unauthorized Docking Point and cut the foundering aiwha free before they drown in the nets; and stand off Korsa Drael when he comes back down to a pen cut empty."
      faction: independent
      dialogue_style: >-
        Quiet, exact, sea-worn diction, more at ease describing a swell or a
        beast than a feeling; talks the way she works the water — no wasted
        motion, every word load-bearing.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'A poacher's working my string. In the squalls he sounds a stolen goad, panics the aiwha off the roost and scatters them into the swell, and his crew nets the foundered ones and crates them off the logs. The ones they don't reach drown. I can't out-ride a storm-swell and I can't dive a netted beast free with a gun on me.'"
        - "*Neyla Sur runs the cut coil of net through her webbed hands, reading where the strands were sheared the way another woman might read a threat, and lets it fall back over her shoulder.*"
        - "'Gentle one of the driven beasts and ride it out to where he took the herd, dive his pen and cut them free before they drown, and put yourself between Korsa Drael and that dock. Do that and my get-off-this-rock savings are yours — every credit. I'd rather they bought the poacher losing than bought me a berth off a rock that drowned my string.'"

  # ── Questline antagonist: Korsa Drael (combat step 4) ───────────────
  # Single hostile instance at the poacher's net-pen beneath the city.
  # Matches the kamino_driven_herd step-4 combat_won enemy_template.

  - name: Korsa Drael
    room: "Kamino - Unauthorized Docking Point"
    species: Weequay
    description: >-
      A weathered, leather-skinned Weequay in a sealed salvager's slicker, a
      blaster on his hip and a stolen Kaminoan herd-call goad slung across his
      back, standing over a submerged net-pen lashed to the underside of the
      city's sensor-shadowed dock, where the crated and the still-netted aiwha
      wait out the tide for an unlogged ship. He is the poacher who works the
      ocean platforms — the hand who sounds the goad in the squalls to scatter
      the keeper's string and the one who nets the foundered beasts and ships
      them off-world to collectors who pay a fortune for a thing that flies and
      swims. He has run this season-long without once having to fight for it,
      because a goad and a storm do the driving and a drowning beast doesn't
      struggle in a net. He came back down to the dock the moment his pen-line
      went slack on the count, and the bored contempt of a being who poaches by
      remote sound goes cold the instant he reads the cut net and the freed
      aiwha breaching off into the swell: the herd is his catch, the dock is
      his, and whoever swam down and cut it loose is leaving in the nets the
      aiwha just left empty.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D
        mechanical: 2D+2
        perception: 2D+1
        strength: 3D
        technical: 2D+1
      skills:
        blaster: 4D+1
        dodge: 3D+2
        brawling: 4D
        beast riding: 3D+2
        melee_combat: 3D+1
        intimidation: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      chain_enemy_template: driven_herd_poacher
      personality: >-
        A poacher who steals by sound and storm and is genuinely unused to
        being made to fight for it — bored and contemptuous while the goad and
        the squalls do his driving, immediately and coldly violent the moment a
        diver cuts his net-pen and walks his catch free. He would rather sound
        the goad and crate a foundered beast than trade fire, but his pay and
        his standing with the off-world buyers ride on a full pen and an
        unlogged ship, so he will draw on anyone who came to cut it loose.
        Combat foil for the questline's confrontation beat.
      knowledge:
        - "He is Korsa Drael, the poacher who works the Kamino ocean platforms — he sounds a stolen Kaminoan herd-call goad in the squalls to scatter the keeper's aiwha, nets the foundered ones, and crates them off the logs beneath the city's sensor umbrella for off-world collectors."
        - "A diver cut his submerged net-pen and walked his catch free; he will gun down anyone who came to cut his nets and free the herd rather than lose a full pen and the unlogged ship waiting on the tide."
      faction: criminal
      dialogue_style: >-
        Flat, unhurried, contemptuous. States once that the herd is his catch
        and the dock is his, tells you to swim off, and after that lets the
        blaster keep the pen the way the goad and the storm keep the racket.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'That's my catch you cut loose, diver. Season's work breaching off into the dark on your account. You can swim off this dock, this once, if you do it now.'"
        - "*Korsa Drael unslings the goad off his back, weighs it against the blaster on his hip, and decides the diver in his pen is going to be the lesson the platforms needed anyway.*"
        - "'The herd's mine, the dock's mine, and so are you. Last time — off my dock, or you go out in the nets the aiwha just left empty.'"
