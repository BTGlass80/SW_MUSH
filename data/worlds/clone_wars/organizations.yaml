# data/worlds/clone_wars/organizations.yaml
# Clone Wars Era — Factions and Guilds
# Replaces GCW organizations.yaml for the Clone Wars era.
#
# Faction design refs:
#   - clone_wars_era_design_v3.md §3.1 faction roster
#   - jas_extraction_v1.md §2 (Jedi Order framing)
#   - GCW organizations.yaml (structure template)
#
# Guilds are era-agnostic and carry over unchanged from GCW.
#
# NPC-only factions (sith, separatist_council) are defined here for
# Director AI use but marked npc_only: true so chargen never surfaces them.

# ── Legacy rewicker map (B.5, Apr 29 2026) ──────────────────────────────
# Maps GCW organization codes to their CW equivalents. Used by
# `engine.organizations.apply_org_rewicker()` on login to migrate PCs
# whose stored faction_id or attributes.faction_intent references a
# code from the prior era's organizations.yaml. Mapping rationale:
#
#   empire    -> republic            (lawful state authority of the era)
#   rebel     -> cis                 (insurgent challenger — structural mirror)
#   hutt      -> hutt_cartel         (direct rename; same archetype)
#   bh_guild  -> bounty_hunters_guild  (direct rename)
#   independent -> independent       (era-agnostic, passthrough)
#
# This is a separate namespace from director_config.yaml::rewicker.
# That one maps director-axis codes (imperial/rebel/criminal/independent)
# used by the zone-tone system; this one maps organization codes used
# by chargen, the faction system, and faction_intent.
legacy_rewicker:
  factions:
    empire:      republic
    rebel:       cis
    hutt:        hutt_cartel
    bh_guild:    bounty_hunters_guild
    independent: independent

factions:

  # ── Galactic Republic ─────────────────────────────────────────────────
  - code: republic
    name: "Galactic Republic"
    director_managed: true
    npc_only: false
    properties:
      color: "\033[1;34m"    # Blue
      axis: republic
      violence_index: 25
      hq_room_name: "Nar Shaddaa - Corellian Sector Promenade"
      description: >
        The thousand-year-old democratic Republic is fighting for its
        survival against the Separatist insurgency. Joining the Republic
        means clone trooper logistics, Senate politics, and the weight
        of an institution that believes it is fighting for civilization.
      archetype_fit: "Republic Soldier, Republic Intelligence, Faction Pilot"
    ranks:
      - level: 0
        title: "Conscript"
        min_rep: 0
        equipment: ["republic_uniform", "dc17_pistol"]
      - level: 1
        title: "Private"
        min_rep: 10
        equipment: ["dc15_blaster_rifle", "republic_light_armor"]
        permissions: ["faction_comms"]
      - level: 2
        title: "Corporal"
        min_rep: 25
        equipment: ["improved_armor"]
        permissions: ["faction_comms"]
      - level: 3
        title: "Sergeant"
        min_rep: 40
        permissions: ["faction_comms", "lead_npc_squad"]
      - level: 4
        title: "Lieutenant"
        min_rep: 60
        equipment: ["officers_sidearm"]
        permissions: ["faction_comms", "lead_npc_squad", "issue_orders", "restricted_access"]
      - level: 5
        title: "Captain"
        min_rep: 75
        permissions: ["faction_comms", "lead_npc_squad", "issue_orders", "restricted_access", "create_missions", "promote_sergeant"]
      - level: 6
        title: "Commander"
        min_rep: 90
        permissions: ["faction_admin"]

  # ── Confederacy of Independent Systems ───────────────────────────────
  - code: cis
    name: "Confederacy of Independent Systems"
    director_managed: true
    npc_only: false
    properties:
      color: "\033[1;31m"    # Red
      axis: separatist
      violence_index: 60
      hq_room_name: "Nar Shaddaa - The Burning Deck Cantina"
      description: >
        The Separatist alliance draws its membership from systems that
        resent Republic taxation, corruption, and Core World privilege.
        Joining the CIS means working alongside battle droids, Sith-aligned
        commanders, and a cause that might be justified or might be a power
        grab — it's genuinely hard to tell from the inside.
      archetype_fit: "Separatist Commando, Separatist Agent, Faction Pilot"
    ranks:
      - level: 0
        title: "Sympathizer"
        min_rep: 0
        equipment: ["encrypted_comlink"]
      - level: 1
        title: "Operative"
        min_rep: 15
        equipment: ["blaster_pistol", "civilian_gear"]
        permissions: ["faction_comms", "cell_missions"]
      - level: 2
        title: "Agent"
        min_rep: 30
        equipment: ["heavy_blaster_pistol"]
        permissions: ["faction_comms", "cell_missions"]
      - level: 3
        title: "Sergeant"
        min_rep: 50
        permissions: ["faction_comms", "cell_missions", "lead_npc_squad"]
      - level: 4
        title: "Cell Leader"
        min_rep: 70
        permissions: ["faction_comms", "cell_missions", "lead_npc_squad", "create_missions", "recruit"]
      - level: 5
        title: "Commander"
        min_rep: 90
        permissions: ["faction_admin"]

  # ── Jedi Order ────────────────────────────────────────────────────────
  - code: jedi_order
    name: "Jedi Order"
    director_managed: true
    npc_only: false
    properties:
      color: "\033[1;33m"    # Yellow
      axis: jedi
      violence_index: 15
      hq_room_name: "Jedi Temple - Entrance Hall"  # TD.CW_JEDI_HQ_ROOM_NAME fix 2026-06-05 (previously pointed at a room name that did not exist; aligns with the intel handler on Knight Halen Voss in this room)
      description: >
        The Jedi Order serves the Republic as generals while upholding
        their ancient mandate as guardians of peace. A Jedi's faction
        is not a political affiliation — it is a way of life. Joining
        the Order requires completing the Jedi Village quest chain.
        Not a faction for the impatient.
      archetype_fit: "Jedi Path (Village-gated)"
      join_requirement: village_quest_complete  # Enforced in Drop 9
    ranks:
      - level: 0
        title: "Padawan"
        min_rep: 0
        equipment: ["padawan_robes", "jedi_utility_belt"]
        # Lightsaber granted via Village quest, not equipment drop
      - level: 1
        title: "Jedi Knight"
        min_rep: 50
        equipment: ["jedi_robes"]
        permissions: ["faction_comms", "take_padawan"]
      - level: 2
        title: "Jedi Master"
        min_rep: 90
        permissions: ["faction_comms", "take_padawan", "sit_council", "faction_admin"]

  # ── Hutt Cartel ──────────────────────────────────────────────────────
  - code: hutt_cartel
    name: "Hutt Cartel"
    director_managed: true
    npc_only: false
    properties:
      color: "\033[0;33m"    # Dark yellow/gold
      axis: criminal
      scale: empire        # GG11 §3A five-tier criminal scale (E1)
      violence_index: 88   # GG11 §8B Violence Index, 0-100
      hq_room_name: "Nar Shaddaa - Hutt Emissary Tower - Audience Chamber"
      description: >
        The Hutts are neutral in the Clone Wars and intend to stay that
        way — neutrally profitable. Working for the Hutt Cartel means
        smuggling, enforcement, and the Outer Rim criminal apparatus.
        Dark side pays more. The Hutts know this and price accordingly.
      archetype_fit: "Smuggler, Trader, enforcer"
    ranks:
      - level: 0
        title: "Associate"
        min_rep: 0
        equipment: ["blaster_pistol"]
      - level: 1
        title: "Runner"
        min_rep: 10
        equipment: ["heavy_blaster_pistol", "smuggler_vest"]
        permissions: ["faction_comms", "hutt_missions"]
      - level: 2
        title: "Enforcer"
        min_rep: 25
        permissions: ["faction_comms", "hutt_missions"]
      - level: 3
        title: "Operator"
        min_rep: 45
        permissions: ["faction_comms", "hutt_missions", "hutt_black_market"]
      - level: 4
        title: "Underboss"
        min_rep: 65
        permissions: ["faction_comms", "hutt_missions", "hutt_black_market", "recruit", "territory_ops"]
      - level: 5
        title: "Vigo"
        min_rep: 85
        permissions: ["faction_admin"]

  # ── Bounty Hunters' Guild ─────────────────────────────────────────────
  - code: bounty_hunters_guild
    name: "Bounty Hunters' Guild"
    director_managed: false
    npc_only: false
    properties:
      color: "\033[0;35m"    # Magenta
      axis: independent
      scale: guild
      violence_index: 55
      hq_room_name: "Nar Shaddaa - Bounty Hunters' Quarter"
      description: >
        The Guild doesn't take sides in the war — it takes contracts.
        Both Republic and CIS put bounties on each other's agents.
        The Guild processes them all with professional neutrality.
        Membership requires demonstrated competence and payment of dues.
      archetype_fit: "Bounty Hunter"
    ranks:
      - level: 0
        title: "Novice"
        min_rep: 0
        equipment: ["binder_cuffs", "guild_license"]
      - level: 1
        title: "Journeyman"
        min_rep: 15
        equipment: ["tracking_fob"]
        permissions: ["guild_bounty_board"]
      - level: 2
        title: "Hunter"
        min_rep: 35
        permissions: ["guild_bounty_board"]
      - level: 3
        title: "Senior Hunter"
        min_rep: 55
        permissions: ["guild_bounty_board", "post_player_bounties"]
      - level: 4
        title: "Veteran"
        min_rep: 75
        permissions: ["guild_bounty_board", "post_player_bounties", "guild_vote"]
      - level: 5
        title: "Guildmaster"
        min_rep: 90
        permissions: ["faction_admin"]

  # ── Independent ───────────────────────────────────────────────────────
  - code: independent
    name: "Independent"
    director_managed: false
    npc_only: false
    properties:
      color: "\033[0m"       # Default/white
      axis: independent
      violence_index: 30
      description: >
        No allegiance. No faction benefits, no faction obligations.
        The galaxy is full of people who just want to survive the war
        without picking a side. This is the default starting affiliation.
      archetype_fit: "Trader, Shipwright, general freelancer"
    ranks:
      - level: 0
        title: "Freelancer"
        min_rep: 0

  # ── NPC-only factions ─────────────────────────────────────────────────
  # These are used by the Director AI for enemy generation and influence
  # tracking. Players cannot join them. They do not appear in chargen.

  - code: sith
    name: "Sith"
    director_managed: true
    npc_only: true
    properties:
      color: "\033[1;31m"    # Red
      axis: sith
      violence_index: 95
      description: >
        The Sith Order is publicly believed extinct, destroyed a thousand
        years ago by the Jedi — but a master-apprentice pair has operated
        in the shadows of galactic politics for generations, never seen
        and never named by those who survive learning the truth. Their
        hand shapes both sides of the war from off-stage; the
        Sith influence score tracks how much of the galaxy's suffering
        serves their plan. NPC-only; the Director uses this faction to
        narrate atmospheric pressure, never to put a Sith Lord in a
        player-reachable scene.
    ranks:
      - level: 0
        title: "Acolyte"
        min_rep: 0
      - level: 1
        title: "Sith Lord"
        min_rep: 50

  - code: separatist_council
    name: "Separatist Council"
    director_managed: true
    npc_only: true
    properties:
      color: "\033[0;31m"    # Dark red
      axis: separatist
      violence_index: 65
      description: >
        The Separatist Council is the corporate oligarchy that funds
        and directs CIS war policy at the institutional level — Trade
        Federation, Techno Union, InterGalactic Banking Clan, Corporate
        Alliance, Commerce Guild, and the Hyper-Communications Cartel,
        each represented by its sitting senior. The Council meets at
        rotating off-world safehouses (Geonosis, Raxus Prime, Mustafar)
        and never in a Republic-reachable system. NPC-only — the
        Council is a Director AI faction for narrative events, not a
        player organization. Individual Council members remain
        off-screen by design.
    ranks:
      - level: 0
        title: "Council Member"
        min_rep: 0

  # ── Stalgasin Hive (Geonosis — NPC, Director-narrated) ────────────────
  # Lane D foundation. Geonosian hives are political/military powers, not
  # criminal orgs, so they carry a violence_index (turf-dispute posture)
  # but no `scale` — matching the E1 rule (scale only on criminal orgs;
  # state/military factions get a tone, no scale). The contest-aggression
  # consumer for violence_index lands in Lane D2.
  - code: stalgasin
    name: "Stalgasin Hive"
    director_managed: true
    npc_only: true
    properties:
      color: "\033[1;33m"    # Amber — foundry fire
      axis: separatist
      violence_index: 88
      description: >
        The dominant hive of Geonosis and seat of its ruling archduke,
        Stalgasin controls the deepest droid foundries and the Petranaki
        execution arena. Its aristocrats meet off-worlders only in the
        foundry's tower conference rooms; the kilometres of drone
        catacombs and the queen's chamber below are closed to outsiders.
        Stalgasin holds its place the Geonosian way — soldier-drone
        tunnel wars against rival hives, and reprisals so absolute that
        when one subordinate hive's drones rose in revolt, the
        aristocrats answered by bombing the entire spire to slag. In the
        war it has thrown its foundries behind the Confederacy. Acklay
        Chopper, the scarred old drone who runs the arena barracks,
        speaks for the hive on the sand. NPC-only — the Director narrates
        Stalgasin as the entrenched power of Geonosis; the archduke
        himself stays off-stage.
    ranks:
      - level: 0
        title: "Hive Drone"
        min_rep: 0

  # ── Gehenbar Hive (Geonosis — NPC, Director-narrated) ─────────────────
  - code: gehenbar
    name: "Gehenbar Hive"
    director_managed: true
    npc_only: true
    properties:
      color: "\033[1;32m"    # Green — rival-hive banners
      axis: republic
      violence_index: 84
      description: >
        Stalgasin's primary rival and the second power among the hives.
        Gehenbar is led by Typtus of the 33rd Egg, a young aristocrat who
        has revived the old warrior-cult of Typtus the First and is openly
        mustering a strike to bring the dominant hive down. Gehenbar wages
        the same vast underground wars — soldier drones and sonic cannon
        in the dark between the spires — and Typtus rewards those who
        serve his cause as readily as he crushes those who stand in his
        way. He will take help wherever it is offered, which makes
        Gehenbar the opening any outside power needs to pry at Stalgasin's
        grip on Geonosis. NPC-only — the Director narrates Gehenbar as the
        ambitious challenger; Typtus is a faction patron, not a
        player-reachable scene.
    ranks:
      - level: 0
        title: "Hive Drone"
        min_rep: 0

# ── Guilds (era-agnostic, carry over from GCW) ───────────────────────────
# Guilds are professional associations independent of faction allegiance.
# A Hutt Cartel smuggler and a Republic soldier can both be in the
# Mechanics' Guild. Guild cp_discount applies to skill training costs.

guilds:
  - code: mechanics_guild
    name: "Mechanics' Guild"
    properties:
      cp_discount: 0.20
      description: "Ship and equipment repair specialists."
    dues_weekly: 50

  - code: shipwrights_guild
    name: "Shipwrights' Guild"
    properties:
      cp_discount: 0.20
      description: "Ship modification and construction experts."
    dues_weekly: 75

  - code: medics_guild
    name: "Medics' Guild"
    properties:
      cp_discount: 0.20
      description: "Healers, bacta specialists, combat medics."
    dues_weekly: 50

  - code: slicers_guild
    name: "Slicers' Collective"
    properties:
      cp_discount: 0.20
      description: "Computer intrusion and electronic warfare."
    dues_weekly: 60

  - code: entertainers_guild
    name: "Entertainers' Guild"
    properties:
      cp_discount: 0.20
      description: "Performers, musicians, and social operators."
    dues_weekly: 25

  - code: scouts_guild
    name: "Scouts' Guild"
    properties:
      cp_discount: 0.20
      description: "Surveyors, pathfinders, wilderness experts."
    dues_weekly: 40
