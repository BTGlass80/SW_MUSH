# data/worlds/clone_wars/npcs_drop_mob_grind_tatooine_mos_eisley_expansion.yaml
#
# Tatooine Mos Eisley Expansion Hostile Mob Grind Batch (2026-06-23)
#
# Four roaming hostile NPCs seeded across four previously-uncovered Mos Eisley
# rooms to extend the solo-PvE mob-grind reward loop (engine/hunting_rewards.py).
# Complements npcs_drop_mob_grind_tatooine_mos_eisley.yaml, which covers 6
# other city-street rooms.
#
# All four satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread (all tatooine_mos_eisley):
#   Mos Eisley Street - Market District x1   (Rodian syndicate collector)
#   Mos Eisley Street - North End x1         (Trandoshan warehouse guard)
#   Lucky Despot Hotel - Grand Staircase x1  (Gamorrean hotel bouncer)
#   Lucky Despot - Star Chamber Cafe x1      (Nikto casino enforcer)
#
# Existing Mos Eisley civilian NPCs avoided: cantina occupants,
#   vendor-room proprietors, spaceport staff, Jabba's Townhouse roster,
#   and the 6 NPCs already placed by npcs_drop_mob_grind_tatooine_mos_eisley.yaml.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats grounded in sibling CW NPC patterns (Drop H / mob-grind baselines
#   and npcs_drop_mob_grind_tatooine_mos_eisley.yaml siblings).
#   Stats UNVERIFIED against WEG40120 PDF.
# Weapons: blaster_pistol, blaster_carbine, vibroblade, heavy_blaster_pistol
#   — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # MARKET DISTRICT — 1 NPC (Rodian Hutt collection enforcer)
  # The commercial heart of Mos Eisley; stalls and transactions move
  # credits Hutt-adjacent businesses consider their rightful cut
  # ══════════════════════════════════════════════════════════════════

  - name: Rodian Market Collector
    room: "Mos Eisley Street - Market District"
    species: Rodian
    description: >-
      A Rodian with flat green skin and the compact build of someone
      who walks these stalls every day, knows every vendor by face,
      and has memorized which ones are three weeks late on their
      arrangement. He carries a collector's ledger in his left hand
      and a blaster pistol in a clip holster on his right hip — the
      ledger for show, the blaster for the ones who decide today is
      the day they stop paying. His snout angles toward you the moment
      you step into his patrol lane. He has already assessed whether
      you are a problem.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D+2
        intimidation: 3D+1
        search: 3D+1
        streetwise: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Hutt syndicate street-level collection enforcer assigned to
        the market district, running weekly protection rounds with the
        quiet authority of someone the vendors have already tested and
        stopped testing. He is not angry — anger is inefficient. He
        is methodical: fire twice, advance, fire again, and the problem
        resolves. He knows every exit in the market block by reflex.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Rodian-inflected Basic, polite and flat. "You are in my route."
        The blaster is clear of the holster before the sentence ends.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires from a half-turn stance and sidesteps behind a market stall.*"
        - "*Two fast shots — he is already repositioning around the stall row.*"
        - "*A clicking sound from his snout, then another bolt. He is not
          in a hurry.*"

  # ══════════════════════════════════════════════════════════════════
  # NORTH END — 1 NPC (Trandoshan warehouse guard)
  # The industrial northern block; warehouses and freight offices hold
  # off-manifest cargo that requires more persuasive security than
  # Notsub Shipping's legitimate staff provides
  # ══════════════════════════════════════════════════════════════════

  - name: Trandoshan Cargo Guard
    room: "Mos Eisley Street - North End"
    species: Trandoshan
    description: >-
      A broad Trandoshan positioned at the corner of a warehouse
      entrance with a blaster carbine held loose across his chest —
      not aimed, not holstered, exactly at the point where it
      communicates a complete sentence without requiring speech.
      The warehouse behind him holds three cargo containers that
      did not arrive through official channels, which is why the
      guard standing in front of it has no uniform, no badge, and
      no interest in conversation with anyone who isn't his employer.
      His scaled skin has the pale burn-scarring on one forearm
      of someone who has been shot at before and adjusted his
      methodology accordingly.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 4D
        technical: 2D
      skills:
        blaster: 4D+1
        brawling: 5D
        intimidation: 4D
        dodge: 3D+1
        search: 3D
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A freelance cargo security hire protecting off-book freight
        in the North End warehouse district. He has done this job
        on a dozen planets — the contracts are always cash, the
        cargo is always undocumented, and his mandate is always
        the same: nobody gets past the door who wasn't sent by the
        employer. He fires at close-to-medium range, advances through
        return fire using his size as a shield, and does not retreat
        unless the math goes badly wrong.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Deep Trandoshan-accented Basic, two words maximum. "Move on."
        If you don't: the carbine tracks and he fires without further
        discussion.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He advances behind a burst from the carbine, using the doorframe
          as cover.*"
        - "*A heavy shot at center mass — he steps forward rather than back.*"
        - "*A low growl and another burst. He is not retreating.*"

  # ══════════════════════════════════════════════════════════════════
  # LUCKY DESPOT HOTEL — GRAND STAIRCASE — 1 NPC (Gamorrean bouncer)
  # The converted cargo hauler's entrance staircase; the hotel's
  # orange-uniformed security handles guests, the Gamorreans handle
  # the situations orange uniforms are not equipped for
  # ══════════════════════════════════════════════════════════════════

  - name: Lucky Despot Bouncer
    room: "Lucky Despot Hotel - Grand Staircase"
    species: Gamorrean
    description: >-
      A Gamorrean in a loose orange vest that matches the hotel's
      security livery — barely, given that it does not button across
      his chest. He is stationed at the midpoint of the grand staircase
      not because it is a strategic position but because he is too
      heavy to stand anywhere that requires him to move quickly. He
      does not need to move quickly. The staircase is narrow enough
      that he fills it. When a guest becomes an incident, the orange-
      uniformed staff radio him, step back, and let the geometry
      do its work. He watches you ascend with the patient attention
      of something that has learned anticipation.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 1D+2
        mechanical: 1D+2
        perception: 2D
        strength: 4D
        technical: 2D
      skills:
        melee_combat: 4D+2
        brawling: 5D
        intimidation: 4D
        dodge: 2D+2
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        A Lucky Despot hotel security enforcer whose entire job
        function is being large in an enclosed space and willing
        to use the vibroblade at his belt. He does not initiate
        — that is the orange uniforms' job — but once the signal
        comes, he does not stop. He fights by occupying ground and
        forcing opponents into the walls, relying on his mass and
        the staircase geometry to remove options.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Gamorrean grunts, no Basic. A sharp sound that functions
        as a warning. The vibroblade clears its scabbard with
        the second sound.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He advances up the staircase, vibroblade drawn, filling the
          available width.*"
        - "*A sweeping blow aimed at driving you back against the banister.*"
        - "*A grunt and another step forward. He is not negotiating.*"

  # ══════════════════════════════════════════════════════════════════
  # LUCKY DESPOT — STAR CHAMBER CAFE — 1 NPC (Nikto casino enforcer)
  # The converted cargo hauler's after-hours gambling den; the
  # Star Chamber's house muscle handles unpaid tabs, cheating
  # accusations, and anyone who wins too often and asks too many
  # questions about how
  # ══════════════════════════════════════════════════════════════════

  - name: Nikto Star Chamber Enforcer
    room: "Lucky Despot - Star Chamber Cafe"
    species: Nikto
    description: >-
      A stocky Nikto in a dark jacket that marks him as house staff
      rather than patron — no drink, no chips, no apparent interest
      in the sabacc tables. His job is the room's unwritten economy:
      the debts owed to the house that are not on any official ledger,
      the players who won more than they were supposed to and left
      looking smug about it, and the occasional situation that requires
      the heavy blaster pistol under his jacket to become briefly
      visible. He has been watching you since you arrived, cataloging
      behaviors. When he approaches, he does it from the angle that
      leaves you with no clean line to the door.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 3D
        technical: 2D
      skills:
        blaster: 4D+2
        dodge: 3D+2
        intimidation: 4D
        streetwise: 3D+1
        search: 3D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 3
    ai_config:
      personality: >-
        A Lucky Despot casino floor enforcer running collection and
        general threat-management for the Star Chamber's after-hours
        operation. He is patient, observant, and has been doing this
        long enough to recognize the moment a situation becomes
        unrecoverable — he acts before that moment rather than during
        it. He fires from cover when possible and uses the tables and
        columns to channel opponents toward unfavorable angles. He
        does not shout, does not warn twice, and does not pursue
        through the main exits where witnesses accumulate.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat Nikto-accented Basic, almost quiet. "The house has a
        concern." He is already drawing when the sentence finishes.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires from behind a column, already moving to cut off the
          exit.*"
        - "*A precise shot — he fires and shifts position before you can
          reacquire.*"
        - "*No expression. Another bolt, another lateral step. He knows
          this room.*"
