    steps:
      - step: 1
        title: "The Powerplant Chief"
        location: geonosis_hive_main_chamber
        npc: "Chief Dax Orrin"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Report to Chief Dax Orrin in the hive chamber."
        npc_intro: >
          "Mil-spec ion core, eh? That's a powerplant secret, not a parts
          list. We hold this chamber because the salvaged CIS reactor in
          it is worth more than the position. You want the core spec, you
          help me tame it. `examine` the reactor housing first — tell me
          what we're working with."
        completion:
          type: talk_to_npc
          npc: "Chief Dax Orrin"
        npc_complete: >
          "Reactor's against the far wall. `examine` the housing — careful,
          it's salvage, not spec. Then we tune."
        reward:
          faction_rep:
            republic: 2
        next_hint: "Inspect the reactor — `examine` the housing."

      - step: 2
        title: "Salvaged Power"
        location: geonosis_hive_main_chamber
        npc: "Chief Dax Orrin"
        npc_role: instructor
        teaches: ["examine"]
        objective: "Examine the salvaged CIS reactor housing."
        npc_intro: >
          "`examine` the housing. You can't tune a powerplant you don't
          understand — and CIS salvage doesn't read like Republic kit."
        completion:
          type: command_executed
          command: "examine"
        npc_complete: >
          "Now you see the problem — the regulator's fighting the core.
          Tuning it by hand is the test. `chain attempt` — that's a
          `space transports repair` job, and the margins are tight."
        reward:
          faction_rep:
            republic: 2
        next_hint: "Tune the powerplant by hand — `chain attempt`."

      - step: 3
        title: "Tuning by Hand"
        location: geonosis_hive_main_chamber
        npc: "Chief Dax Orrin"
        npc_role: instructor
        teaches: ["repair"]
        objective: "Hand-tune the salvaged ion powerplant."
        npc_intro: >
          [The regulator hums wrong, power surging against the core's
          limits. Tune it live or it cooks.] "Easy," Dax murmurs.
          "`chain attempt` — `space transports repair`, and feel the
          margin."
        completion:
          type: skill_check_passed
          skill: "space_transports_repair"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [The powerplant settles into a clean, deep hum — mil-spec
          steady. But a full reactor draw rings through the hive, and the
          Geonosians who built this place come to reclaim it.]
        reward:
          faction_rep:
            republic: 3
        next_hint: "Geonosian warriors converge. Defend the chamber."

      - step: 4
        title: "Reclaimers"
        location: geonosis_warrior_barracks
        npc: "(none)"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Defeat the Geonosian warrior."
        npc_intro: >
          [A Geonosian drone-warrior drops from a barracks tunnel, sonic
          pike leveled, hive-furious that off-worlders woke its reactor.
          `attack`, `dodge` the pike.]
        completion:
          type: combat_won
          enemy_template: "geonosis_drone_warrior"
          enemy_count: 1
        npc_complete: >
          [The warrior falls; the chamber holds. The powerplant still
          hums clean behind you — and Dax has his proof.]
        reward:
          credits: 200
          faction_rep:
            republic: 4
        next_hint: "Report back to Chief Dax."

      - step: 5
        title: "Powerplant-Certified"
        location: geonosis_hive_main_chamber
        npc: "Chief Dax Orrin"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Report your tuning run to Chief Dax."
        npc_intro: >
          "Tuned by hand, held the chamber, and that core's still singing
          mil-spec. That's the run. Not many finish it."
        completion:
          type: talk_to_npc
          npc: "Chief Dax Orrin"
        npc_complete: >
          "I'll sign you for the ion-core spec. Come back when the
          Republic trusts you proper, with deep-dune iron worth the
          build. Good run, engineer."
        reward:
          faction_rep:
            republic: 3
        next_hint: >
          Trial complete. `talk` to Chief Dax to learn the Mil-Spec Ion
          Engine Core (Republic rep 50+ required).

  # ─── Q5. MASTER ARMORER — "The Warrens Forge" → t5 armor ─────────────
  - chain_id: master_armorer_armor
    chain_name: "The Warrens Forge"
    description: >
      An independent master armorer who works a hidden forge in the Nar
      Shaddaa Warrens will teach the crafting of master-grade armor — to
      one who can scavenge the right composite, prove the plate against a
      real edge, and survive what the Warrens send. Rich, dangerous,
      end-game.
    archetype_label: "Master-Grade Armor Trial"
    faction_alignment: independent
    starting_zone: nar_shaddaa_warrens
    starting_room: warrens_scavenger_den
    prerequisites:
      - chargen_complete
    duration_minutes: 40
    locked: false
    kind: questline

    graduation:
      credits: 500
      faction_rep:
        independent: 3
      items: []
      achievements: ["warrens_forge"]
      drop_room: warrens_scavenger_den
      follow_up_hint: >
        Sabra will teach Master-Grade Armor. With the independents
        honored (rep 50+) you can `learn` it — `talk` to begin, then
        bring q75+ composite chitin and craft.

    steps:
      - step: 1
        title: "The Armorer of the Warrens"
        location: warrens_scavenger_den
        npc: "Sabra the Smith"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Find Sabra the Smith in the scavenger den."
        npc_intro: >
          "Master-grade plate. You came to the right hole in the ground —
          and the most dangerous one. I don't sell the spec; I teach it to
          people who can WORK. The Warrens are full of good composite if
          you know where to dig. `search` the den — find me a chitin
          plate worth forging."
        completion:
          type: talk_to_npc
          npc: "Sabra the Smith"
        npc_complete: >
          "Go dig. `search` the scavenger den. The good chitin's buried
          under the junk — most folk walk right past it."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Scavenge composite — `search` the scavenger den."

      - step: 2
        title: "Good Composite"
        location: warrens_scavenger_den
        npc: "Sabra the Smith"
        npc_role: instructor
        teaches: ["search"]
        objective: "Search the scavenger den for composite chitin."
        npc_intro: >
          "`search`. Chitin plate, not scrap — you'll know it by the
          weight. The Warrens don't give up the good stuff easy."
        completion:
          type: command_executed
          command: "search"
        npc_complete: >
          "That's the one. Heavy, clean. Now — plate's no good if it
          can't take an edge. There's a test rig in the fungal cavern.
          Prove the chitin holds: `chain attempt`, armor work, by hand."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Prove the plate in the fungal cavern — `chain attempt`."

      - step: 3
        title: "Proving the Plate"
        location: warrens_fungal_cavern
        npc: "(none)"
        npc_role: contact
        teaches: ["repair"]
        objective: "Work the chitin plate against the test rig."
        npc_intro: >
          [The test rig is a brutal old thing — a powered edge that bites
          armor to grade it. Set the plate, work it true.] "By hand,"
          Sabra had said. "`chain attempt` — `armor repair`, and feel
          where it wants to fail."
        completion:
          type: skill_check_passed
          skill: "armor_repair"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [The plate takes the edge and holds — master-grade. But the
          rig's noise carries in the Warrens, and a fungal-cavern stalker
          that hunts by sound comes for you.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "A stalker hunts the noise. Defend yourself."

      - step: 4
        title: "What the Warrens Send"
        location: warrens_collapsed_plaza
        npc: "(none)"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Defeat the Warrens stalker."
        npc_intro: >
          [It drives you into the collapsed plaza — a pale, many-legged
          Warrens predator, all hooks and silence. `attack` it, `dodge`
          its lunges. Your new plate earns its first scars here.]
        completion:
          type: combat_won
          enemy_template: "warrens_stalker"
          enemy_count: 1
        npc_complete: >
          [The stalker shrieks and folds. The plaza goes still. The plate
          held — and so did you. Back to the forge.]
        reward:
          credits: 200
          faction_rep:
            independent: 4
        next_hint: "Return to Sabra at the scavenger den."

      - step: 5
        title: "Forge-Proven"
        location: warrens_scavenger_den
        npc: "Sabra the Smith"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Sabra to finish the trial."
        npc_intro: >
          "Scavenged it, proved it, wore it against a stalker, and walked
          back to my forge. That's the trial. The Warrens keep the rest."
        completion:
          type: talk_to_npc
          npc: "Sabra the Smith"
        npc_complete: >
          "I'll teach you master-grade plate. Come back when the
          independents trust you proper, with chitin worth the forge. Now
          get out of my den — you've earned the right to come back."
        reward:
          faction_rep:
            independent: 3
        next_hint: >
          Trial complete. `talk` to Sabra to learn Master-Grade Armor
          (independent rep 50+ required).

  # ═══════════════════════════════════════════════════════════════════════
  # GENERALIZED QUESTLINES (kind: questline) — T3.24 quest expansion
  # ═══════════════════════════════════════════════════════════════════════
  # quest_expansion_postlaunch_path_v1.md — the sanctioned right-of-launch
  # widening of the chain engine: MORE `kind: questline` chains that reuse
  # the SAME live engine (active_questline slot, the 11 existing event
  # types, the four reward funnels). NO new engine code, NO new slot, NO
  # new completion type — pure additive content, exactly the "author
  # questlines in chains.yaml" build step the design doc describes.
  #
  # These differ from the t5 master-trainer questlines above: they are
  # ACCESSIBLE (prerequisites: chargen_complete; no faction rep gate), run
  # in ordinary city rooms, do NOT unlock a t5 schematic, and pay a modest
  # reward + a lower-tier achievement (cp_reward 3 vs the t5 chains' 5).
  # They prove the generalized-quest path serves ordinary freelance
  # side-content, not just the trainer economy. Same reachability rules
  # apply (tests/test_chain_corpus_reachability_invariant.py): every
  # `location` is a REAL world-room slug; NO room_entered / item_acquired
  # completions; every command literal registered; every skill canonical;
  # every combat_won enemy_template resolves to a tagged NPC.

  # ─── G1. FREELANCE INVESTIGATION — "The Ghost Shipment" ───────────────
  - chain_id: nar_freight_ghost_shipment
    chain_name: "The Ghost Shipment"
    description: >
      A small independent freight broker on Nar Shaddaa keeps losing cargo
      between pickup and delivery, and the Guild won't help someone her
      size. Track the leak from the docks, work the market for a name, and
      run the skimmer to ground in the Undercity. A freelance favor — open
      to anyone, no faction required.
    archetype_label: "Freelance Investigation"
    faction_alignment: independent
    starting_zone: nar_shaddaa_promenade
    starting_room: burning_deck_cantina
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["ghost_shipment_solved"]
      drop_room: burning_deck_cantina
      follow_up_hint: >
        Yelza will remember this. Independent brokers across the Corellian
        Sector talk — freelance work tends to find those who finish it.

    steps:
      - step: 1
        title: "The Broker's Problem"
        location: burning_deck_cantina
        npc: "Yelza Korrin"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Yelza Korrin in the Burning Deck Cantina."
        npc_intro: >
          "You look like you can keep your mouth shut and your eyes open.
          Good — that's the job. I'm Yelza, I run freight, and three of my
          last runs vanished clean between pickup and delivery. The Guild
          won't touch it. I'll pay a fair cut to whoever finds out where my
          cargo's going. Start at the docks — Bay Aurek's where my last run
          loaded. `search` it for anything that doesn't add up."
        completion:
          type: talk_to_npc
          npc: "Yelza Korrin"
        npc_complete: >
          "Bay Aurek. Today. Walk the loading floor and `search` it — a
          manifest doesn't just evaporate. Somebody moved it, and people
          who move cargo leave a trail if you know how to look."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Head to Bay Aurek and `search` the loading floor for the cargo trail."

      - step: 2
        title: "The Trail at the Docks"
        location: nar_shaddaa_bay_aurek
        npc: "(none)"
        npc_role: contact
        teaches: ["search"]
        objective: "Search Docking Bay Aurek for the diverted-cargo trail."
        npc_intro: >
          [The loading floor is a churn of crates, droids, and shouting
          stevedores.] Somewhere in this mess is the seam where Yelza's
          cargo slipped sideways. `search` the bay — check the manifests,
          the re-tag stickers, the bays nobody's watching.
        completion:
          type: skill_check_passed
          skill: "search"
          difficulty: 9
          on_fail: "retry_allowed"
        npc_complete: >
          [There — a stack of crates with fresh re-tag stickers slapped
          over Yelza's outfit codes, routed to a buyer in the Undercity.
          Someone here is selling her pickup windows. You'll need a name,
          and the Floating Market is where dock gossip gets sold.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The trail leads to the Floating Market. Work it for a name — `chain attempt`."

      - step: 3
        title: "A Name on the Market"
        location: floating_market
        npc: "(none)"
        npc_role: contact
        teaches: ["streetwise"]
        objective: "Work the Floating Market for the skimmer's name (streetwise)."
        npc_intro: >
          [The Floating Market drifts between the towers, a churn of vendors,
          fixers, and people who hear everything for the right price.] Re-tag
          work and stolen manifests get fenced somewhere. Use your
          `streetwise` — buy a drink, drop the right name, listen.
        completion:
          type: skill_check_passed
          skill: "streetwise"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [A nervous fixer, two drinks in, gives it up: Brakkis Vone — a
          small-time crew boss skimming cargo through a dead transfer point
          in the Undercity Depths, with a bought dock clerk feeding him
          windows. He kills witnesses. He won't expect one to come to him.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "Brakkis Vone runs his operation in the Undercity Depths. Go confront him."

      - step: 4
        title: "The Transfer Point"
        location: undercity_depths
        npc: "Brakkis Vone"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Confront Brakkis Vone and recover the truth — `attack`, `dodge`."
        npc_intro: >
          [The transfer point is a forgotten Undercity bay stacked with
          re-tagged crates — Yelza's codes among them. Brakkis Vone looks up
          from a manifest, reads the trail on your face, and reaches for his
          blaster.] "You followed the wrong manifest down here, snoop."
        completion:
          type: combat_won
          enemy_template: "nar_ghost_shipment_pirate"
          enemy_count: 1
        npc_complete: >
          [Vone goes down hard among the stolen crates. On his datapad: the
          bought dock clerk's name, the buyer, the whole skimming route —
          everything Yelza needs to shut it down and clear her manifests.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "You have the proof. Return to Yelza at the Burning Deck Cantina."

      - step: 5
        title: "Squaring the Account"
        location: burning_deck_cantina
        npc: "Yelza Korrin"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Yelza Korrin to close the job."
        npc_intro: >
          "You came back. With a name, a route, and a datapad full of proof.
          Figures it was Vone — and a clerk on my own dock." [She lets out a
          long breath, some of the weight off her shoulders.] "That's my
          cargo back and my route clean. Here's your cut, and then some."
        completion:
          type: talk_to_npc
          npc: "Yelza Korrin"
        npc_complete: >
          "Square. You did honest work for an honest broker — that's rarer
          than it should be out here. Anyone gives you grief about freelance,
          you tell them Yelza Korrin vouches for you. Fly safe."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The Ghost Shipment is solved. Yelza's good word travels — freelance
          work finds those who finish it.

  # ─── G2. FREELANCE INVESTIGATION — "The Crooked Wheel" ────────────────
  # T3.24 next slice (2026-06-25). The SECOND accessible kind:questline
  # chain, set on Tatooine/Mos Eisley (vs the Ghost Shipment's Nar Shaddaa)
  # and exercising a DIFFERENT skill spread (investigation + gambling).
  # Reuses the live questline engine with NO new engine code/slot/event type.
  - chain_id: mos_eisley_crooked_wheel
    chain_name: "The Crooked Wheel"
    description: >
      A loan operation locals call "the Wheel" runs a rigged sabacc table out
      of Chalmun's Cantina, traps marks in spiralling debt, then collects with
      muscle. A small Mos Eisley vendor's runner got caught, and now the
      Wheel's smiling enforcer is squeezing her stall. Read the racket on the
      market floor, sit the crooked table to expose it, and run the collector
      to ground in the desert. A freelance favor — open to anyone, no faction
      required.
    archetype_label: "Freelance Investigation"
    faction_alignment: independent
    starting_zone: tatooine_market
    starting_room: market_place_geps_grill
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["crooked_wheel_busted"]
      drop_room: market_place_geps_grill
      follow_up_hint: >
        Dorae will remember this. Word on the Mos Eisley market floor travels
        fast — freelance work tends to find those who finish it.

    steps:
      - step: 1
        title: "The Vendor's Account"
        location: market_place_geps_grill
        npc: "Dorae Vint"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Dorae Vint at Gep's Grill in the Mos Eisley market."
        npc_intro: >
          "You look like you can read a room and keep your mouth shut. Good —
          that's the job. I'm Dorae, I run a salvage stall two rows over. My
          runner sat a sabacc game he couldn't win, the debt tripled overnight,
          and now the Wheel's collector keeps drifting past my stand, smiling,
          asking when I'll 'settle the account.' A game you can't win isn't a
          game — it's a harvest. Walk the market and watch who the Wheel leans
          on. `investigate` the pattern."
        completion:
          type: talk_to_npc
          npc: "Dorae Vint"
        npc_complete: >
          "Start on the market floor. The Wheel doesn't squeeze everyone — just
          the ones who can't fight back. Watch who the collector visits and
          which stalls go quiet. `investigate` the pattern; debts that move in
          lockstep aren't bad luck, they're a system."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Walk the Market District and `investigate` who the Wheel is squeezing."

      - step: 2
        title: "Reading the Racket"
        location: mos_eisley_market_district
        npc: "(none)"
        npc_role: contact
        teaches: ["investigate"]
        objective: "Investigate the Market District for the Wheel's collection pattern."
        npc_intro: >
          [The Market District is a churn of stalls, hagglers, and the dry rasp
          of the desert wind.] Somewhere in the rhythm of who pays and who goes
          quiet is the shape of the racket. `investigate` the floor — track the
          collector's circuit, the stalls behind on a 'debt', the marks who sat
          the table and never recovered.
        completion:
          type: skill_check_passed
          skill: "investigation"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [The pattern resolves: every squeezed vendor lost a stake at the same
          sabacc table in Chalmun's back corner, and every debt grew on the
          same impossible curve. The game is the trap. To prove it's rigged
          you'll have to sit the table yourself — and read it from the inside.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The trap is a sabacc table in Chalmun's Cantina. Sit it and read the game — `chain attempt`."

      - step: 3
        title: "Reading the Table"
        location: chalmuans_cantina_main_bar
        npc: "(none)"
        npc_role: contact
        teaches: ["gambling"]
        objective: "Sit the Wheel's sabacc table and read the rig (gambling)."
        npc_intro: >
          [The Wheel's table sits in a quiet corner of Chalmun's, a smiling
          dealer and a pot that always seems to lean one way.] You don't have
          to win — you have to *read* it. Use your `gambling` eye: watch the
          deal, the shaved chits, the tell in the dealer's hands. Catch the rig
          and you have your proof — and a name.
        completion:
          type: skill_check_passed
          skill: "gambling"
          difficulty: 12
          on_fail: "retry_allowed"
        npc_complete: >
          [There it is — a marked deck and a dealer feeding the house every
          stubborn hand. The dealer, two losses deep into his own debt, gives
          up the collector: Gorvahn Brusk, who walks the stubborn debtors out
          to an abandoned farm past the eastern gate to 'talk it over.' He
          won't expect one of them to come looking.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "Gorvahn Brusk runs his collections from the abandoned farm past the eastern gate. Go confront him."

      - step: 4
        title: "Settling the Account"
        location: outskirts_abandoned_farm
        npc: "Gorvahn Brusk"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Confront Gorvahn Brusk and end the Wheel's collection — `attack`, `dodge`."
        npc_intro: >
          [The abandoned moisture farm is a ring of dead vaporators and drifting
          sand, the Wheel's quiet room for stubborn accounts. Gorvahn Brusk
          looks up from a stack of re-tagged sabacc chits, reads the trail on
          your face, and his smile finally drops.] "You traced the table all
          the way out here, friend? That's a problem."
        completion:
          type: combat_won
          enemy_template: "mos_eisley_crooked_wheel_enforcer"
          enemy_count: 1
        npc_complete: >
          [Brusk goes down among the dead vaporators. On him: the marked deck,
          the doctored debt-ledger, and the names of every mark the Wheel was
          bleeding — everything Dorae needs to break the debts and put the
          collector off the market for good.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "You have the proof and the ledger. Return to Dorae at Gep's Grill."

      - step: 5
        title: "Squaring the Stall"
        location: market_place_geps_grill
        npc: "Dorae Vint"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Dorae Vint to close the job."
        npc_intro: >
          "You came back. With a marked deck, a doctored ledger, and Brusk's
          whole collection list." [She lets out a long breath, some of the
          weight off her shoulders.] "That's my runner's debt broken and the
          collector off my stall. Figures the game was rigged from the deal.
          Here's your cut, and then some."
        completion:
          type: talk_to_npc
          npc: "Dorae Vint"
        npc_complete: >
          "Square. You did honest work for an honest stall — that's rarer than
          it should be out here. Anyone leans on you about freelance, you tell
          them Dorae Vint vouches for you. Walk easy."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The Crooked Wheel is broken. Dorae's good word travels the market
          floor — freelance work finds those who finish it.

  # T3.24 third slice (2026-06-25). The THIRD accessible kind:questline
  # chain, set on Coruscant's lower city (vs Nar Shaddaa / Tatooine) and
  # exercising a THIRD distinct skill spread (persuasion + sneak). A
  # rescue/recovery story shape, not a racket-bust. Reuses the live
  # questline engine with NO new engine code/slot/event type.
  - chain_id: coruscant_lower_lost_courier
    chain_name: "The Lost Courier"
    description: >
      A lower-city fixer's young courier vanished two days ago carrying a
      client's data-spike into the Southern Underground and never came back.
      The warren that saw the grab is too scared to talk, the trail runs
      through a sealed bolt-hole in the Petrax sublevels, and a Trandoshan
      enforcer is holding the kid in the Factory District until a buyer
      collects. Talk the warren open, slip the bolt-hole, and get the courier
      back. A freelance favor — open to anyone, no faction required.
    archetype_label: "Freelance Recovery"
    faction_alignment: independent
    starting_zone: southern_underground
    starting_room: crystal_jewel_cantina
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["lost_courier_found"]
      drop_room: crystal_jewel_cantina
      follow_up_hint: >
        Sashi Renko keeps her word, and word travels the lower city fast. A
        fixer who vouches for you is worth more than the cut — freelance work
        finds those who finish it.

    steps:
      - step: 1
        title: "The Fixer's Booth"
        location: crystal_jewel_cantina
        npc: "Sashi Renko"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Sashi Renko in her booth at the Crystal Jewel Cantina."
        npc_intro: >
          "You look like you can keep your mouth shut and your eyes open. Good —
          that's the job. I'm Sashi, I match jobs to hands down here. Two days
          ago I put a kid named Tav on a simple data-run and he never came back.
          My contacts have all gone suddenly deaf about it. Somebody grabbed him,
          and the whole warren near his last stop is too scared to say what they
          saw. Go down there and `talk` them open — the truth's in that warren if
          you can pry it loose."
        completion:
          type: talk_to_npc
          npc: "Sashi Renko"
        npc_complete: >
          "Start at the Refugee Warren — that was Tav's last stop before he went
          dark. They saw the grab, I'd bet my booth on it. They won't volunteer
          it, though; you'll have to `persuade` someone to talk. Be gentle. Half
          of them are one bad week from being grabbed themselves."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Lower City Refugee Warren and `persuade` a witness to talk — `chain attempt`."

      - step: 2
        title: "The Warren That Forgot"
        location: lower_refugee_warren
        npc: "(none)"
        npc_role: contact
        teaches: ["persuasion"]
        objective: "Persuade a frightened witness in the Refugee Warren to talk."
        npc_intro: >
          [The Refugee Warren is a low maze of curtained alcoves and watchful
          eyes; everyone here saw something and no one will be the one who said
          it.] Somebody watched the kid get taken. Find them, read the fear, and
          `persuade` them it's safer to talk to you than to keep carrying it —
          use `chain attempt` to make the case.
        completion:
          type: skill_check_passed
          skill: "persuasion"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [An old spacer with shaking hands finally lets it out: a Trandoshan
          dragged the kid toward the old Petrax sublevels two nights back, into a
          maintenance hatch the locals know to stay clear of. "Sealed bolt-hole,"
          she whispers. "Watched. Don't go loud or you'll join him."]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The trail runs to a watched bolt-hole in the Petrax sublevels. Slip it quietly — `sneak`, `chain attempt`."

      - step: 3
        title: "The Bolt-Hole"
        location: petrax_sublevels
        npc: "(none)"
        npc_role: contact
        teaches: ["sneak"]
        objective: "Sneak past the lookout into the Petrax sublevels bolt-hole."
        npc_intro: >
          [The Petrax sublevels are black and dripping, and a lookout sits where
          the only passage narrows — go loud and the kid pays for it.] You don't
          have to fight your way in; you have to *not be seen*. Use your `sneak` —
          time the lookout, take the dead ground, slip the bolt-hole — and find
          where they're holding Tav. `chain attempt` when you make your move.
        completion:
          type: skill_check_passed
          skill: "sneak"
          difficulty: 12
          on_fail: "retry_allowed"
        npc_complete: >
          [Past the lookout, the cell is empty — but a fresh scuff of drag-marks
          and a dropped courier's tag tell the story: they moved him at
          shift-change, up to a stripped holding cell in the Factory District,
          waiting on a buyer. He's alive. He won't stay that way once the
          hand-off happens.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "Tav's been moved to a holding cell in the Factory District. Get there before the buyer does."

      - step: 4
        title: "The Holding Cell"
        location: factory_district
        npc: "Skarn Vex"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Confront Skarn Vex in the Factory District and free the courier — `attack`, `dodge`."
        npc_intro: >
          [The Factory District's dead conveyor lines swallow every sound, which
          is exactly why the grab job ends here. Tav is chained to a stanchion,
          bruised but whole. Skarn Vex pushes off the line, reads the whole trail
          on your face, and the lazy menace finally sharpens.] "You traced the
          kid all the way down here, soft-skin? Now I have to keep two of you
          quiet."
        completion:
          type: combat_won
          enemy_template: "coruscant_lost_courier_enforcer"
          enemy_count: 1
        npc_complete: >
          [Skarn Vex goes down against the dead conveyor. The cell key and the
          recovered data-spike are on his harness; Tav, shaking the chains off,
          can barely get the thanks out. The buyer is going to arrive to an empty
          cell and a dead enforcer — and no merchandise.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "Tav's free and the spike's recovered. Walk him back up to Sashi at the Crystal Jewel."

      - step: 5
        title: "Squaring the Job"
        location: crystal_jewel_cantina
        npc: "Sashi Renko"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Sashi Renko to close the job."
        npc_intro: >
          "You walked him right back in the door." [Sashi turns the data-pad
          face-up for the first time in two days, some of the stillness going out
          of her shoulders.] "Spike recovered, kid breathing, and a freelance
          enforcer down a job. That's the cleanest run anybody's done me in a
          long while. Here's your cut, and then some."
        completion:
          type: talk_to_npc
          npc: "Sashi Renko"
        npc_complete: >
          "Square. You did honest work and you brought a kid home — that buys you
          my word on the lower-city floor, which down here is worth more than the
          credits. Anyone leans on you about freelance, you tell them Sashi Renko
          vouches. Walk easy."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The Lost Courier is home. Sashi's good word travels the Southern
          Underground — freelance work finds those who finish it.

  # ─────────────────────────────────────────────────────────────────────
  # GENERALIZED QUESTLINE — "The Skimmed Line" (T3.24 fourth slice, Jun 26 2026)
  # The FOURTH accessible (non-t5, non-tutorial) kind: questline chain, after
  # The Ghost Shipment (Nar Shaddaa), The Crooked Wheel (Tatooine/Mos Eisley),
  # and The Lost Courier (Coruscant lower city). Set on KUAT (the Kuat Drive
  # Yards orbital ring) so the four accessible questlines span four planets, and
  # exercises a FOURTH distinct skill spread — SECURITY + BARGAIN — as a
  # clear-the-innocent industrial theft. Reuses the live questline engine with
  # NO new engine code/slot/event type. NPCs back it in
  # data/worlds/clone_wars/npcs_drop_generalized_questline_skimmed_line.yaml.
  # ─────────────────────────────────────────────────────────────────────
  - chain_id: kuat_ring_skimmed_line
    chain_name: "The Skimmed Line"
    description: >
      A restricted navigation-core blank was skimmed off a feeder line on the
      Kuat Drive Yards ring, and Kuat Security Force is about to write it up
      against the honest floor crew that fitted it — cheaper than a real probe,
      and it costs the whole crew their berths. The foreman knows his people are
      clean: the shift badge log was scrubbed, but a maintenance subsystem keeps
      a shadow copy, and an off-ring fixer has been buying skimmed KDY parts to
      order. Slice the shadow log, buy the buyer's name off a warehouse fence,
      and take the core back before it ships out. A freelance favor — open to
      anyone, no faction required.
    archetype_label: "Freelance Recovery"
    faction_alignment: independent
    starting_zone: kdy_orbital_ring
    starting_room: kuat_ring_cantina
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["skimmed_line_cleared"]
      drop_room: kuat_ring_cantina
      follow_up_hint: >
        Dav Nuro pays his berth-bonus and means the thanks. A foreman who keeps
        his crew on the ring remembers who kept them there — honest work on the
        yards finds those who finish it.

    steps:
      - step: 1
        title: "The Foreman's Booth"
        location: kuat_ring_cantina
        npc: "Dav Nuro"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Dav Nuro in the back booth of the Pressure Drop Cantina."
        npc_intro: >
          "You look like you can read a system and keep your mouth shut. Good —
          that's the job. Dav Nuro, line-foreman, twenty years fitting cores on
          this ring. Two days ago a restricted core blank walked off my feeder
          line and the shift badge log came up scrubbed. Now KSF wants to write
          the theft against my crew, because that's cheaper than finding who
          really took it. My people are clean. I can't prove it and I can't fight
          the company — but the truth's still in the yard's systems if somebody
          who knows how can `talk` to me about where to dig."
        completion:
          type: talk_to_npc
          npc: "Dav Nuro"
        npc_complete: >
          "The official log's gone, but the machine shops run a maintenance
          subsystem that keeps its own shadow copy of who badged the floor — KSF
          never bothers with it. Get into that subsystem and pull the dead-shift
          badges; you'll have to `slice` it, the access is locked. Prove an
          outsider was on my floor and the write-up's got nothing to stand on."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Machine Shops and use your `security` skill to slice the maintenance subsystem's shadow log — `chain attempt`."

      - step: 2
        title: "The Scrubbed Shift"
        location: kuat_ring_machine_shops
        npc: "(none)"
        npc_role: contact
        teaches: ["security"]
        objective: "Slice the machine-shop maintenance subsystem to recover the scrubbed shift log."
        npc_intro: >
          [The Machine Shops never fully stop; a maintenance subsystem hums in a
          locked alcove off the floor, logging every badge that ever crossed it.]
          The official shift log was wiped, but this subsystem kept its own copy —
          and it's locked. Work the `security` panel, get past the access lock,
          and pull the dead-shift badges. `chain attempt` when you make your run
          at it.
        completion:
          type: skill_check_passed
          skill: "security"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [The lock gives, and the shadow log scrolls up clean: every one of Dav's
          crew badged out before the core went missing — and one badge that
          isn't on any crew roster crossed the floor during the dead shift, a
          contractor credential that pings back to an off-ring "acquisitions"
          handle. Somebody bought their way onto the floor. The crew is clean.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "An off-ring fixer bought their way onto the floor. A parts-fence in the Warehouse District knows who buys skimmed KDY parts — `bargain` it out of them, `chain attempt`."

      - step: 3
        title: "The Fence's Price"
        location: kuat_ring_warehouses
        npc: "(none)"
        npc_role: contact
        teaches: ["bargain"]
        objective: "Bargain a parts-fence in the Warehouse District into naming the buyer and the handoff."
        npc_intro: >
          [The Warehouse District has a gray-market corner where ring parts that
          fell off a manifest change hands quietly. The fence here knows who's
          buying skimmed Kuat cores — and won't give it up for nothing.] Don't
          threaten them; the floor would close around you. Read the trade, make
          the `bargain`, and buy the buyer's name and where the handoff's going
          down. `chain attempt` when you put your price on the table.
        completion:
          type: skill_check_passed
          skill: "bargain"
          difficulty: 12
          on_fail: "retry_allowed"
        npc_complete: >
          [The fence weighs your offer, decides the credits beat the risk, and
          gives it up low and fast: the buyer is a fixer named Suro Vant, the
          core blank's already crated, and the handoff to an off-ring freighter
          runs through the ring Factories at the next shift change. "He'll have
          it on him," the fence murmurs. "And he doesn't like being found."]
        reward:
          faction_rep:
            independent: 3
        next_hint: "Suro Vant is moving the core through the Factories at shift change. Get there and take it back before it ships off-ring."

      - step: 4
        title: "The Handoff"
        location: kuat_ring_factories
        npc: "Suro Vant"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Confront Suro Vant in the Factories and recover the skimmed core — `attack`, `dodge`."
        npc_intro: >
          [The ring Factories run loud enough to bury a handoff, which is exactly
          why it ends here. The crated core blank sits at Suro Vant's boot; he
          pushes off a cold press-line, reads the whole trail on your face — the
          shadow log, the fence, all of it — and the bored patience finally goes
          out of his tusked face.] "You traced a core blank all the way to my
          floor, fitter? That's a careless thing to be good at."
        completion:
          type: combat_won
          enemy_template: "kuat_skimmed_line_collector"
          enemy_count: 1
        npc_complete: >
          [Suro Vant goes down against the press-line, and the case pops open on
          the restricted core blank, KDY seals intact. The off-ring freighter is
          going to dock to an empty handoff and a dead fixer — and no merchandise.
          The contractor credential on Vant's pad is the last thing the write-up
          needed to fall apart. Take it all back to Dav.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "Core recovered, fixer down, outsider's credential in hand. Walk it back to Dav at the Pressure Drop."

      - step: 5
        title: "Clearing the Crew"
        location: kuat_ring_cantina
        npc: "Dav Nuro"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Dav Nuro to close the job and clear his crew."
        npc_intro: >
          "You walked the core right back onto the ring." [Dav turns the
          data-pad face-up for the first time in two days, the dead-shift log and
          the outsider's credential laid out where KSF can't pretend not to see
          them, and some of the weight goes off his shoulders.] "Shadow log,
          recovered core, an outsider's badge on my floor. That's a write-up that
          doesn't land. Here's your cut out of my berth-bonus, and then some."
        completion:
          type: talk_to_npc
          npc: "Dav Nuro"
        npc_complete: >
          "Square. You pulled the truth out of the systems and you kept twelve
          honest people on the ring — that buys you my word on this yard, which up
          here is worth more than the credits. Anyone questions your work on the
          Kuat lines, you tell them Dav Nuro vouches. Fly safe."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The crew keeps their berths and the yard keeps turning. Dav Nuro's
          good word travels the Kuat ring — honest work finds those who finish it.

  # ─────────────────────────────────────────────────────────────────────
  # GENERALIZED QUESTLINE — "The Dust-Sick" (T3.24 fifth slice, Jun 26 2026)
  # The FIFTH accessible (non-t5, non-tutorial) kind: questline chain, after
  # The Ghost Shipment (Nar Shaddaa), The Crooked Wheel (Tatooine/Mos Eisley),
  # The Lost Courier (Coruscant lower city), and The Skimmed Line (Kuat ring).
  # FIRST questline set in the WILDERNESS (the Tatooine deep desert — the City
  # Outskirts scavenger market and the Jundland Wastes — not a city interior),
  # and exercises a FIFTH distinct skill spread — FIRST_AID + SURVIVAL — as a
  # save-the-stricken frontier rescue. Reuses the live questline engine with NO
  # new engine code/slot/event type, and touches NO map coordinate or exit graph
  # (the desert rooms already exist + are loaded). NPCs back it in
  # data/worlds/clone_wars/npcs_drop_generalized_questline_dust_sick.yaml.
  # ─────────────────────────────────────────────────────────────────────
  - chain_id: jundland_dust_sick
    chain_name: "The Dust-Sick"
    description: >
      A homesteader's grown son chased a salvage lead into the Jundland Wastes
      and came back word that he is down — fevered, out of good water, "dust-sick"
      and too weak to walk out of the cave he sheltered in — while desert
      scavengers circle his dead speeder waiting for the desert to finish him.
      His mother can't carry him out alone and no one in the market will go for a
      homesteader's credits. Reach the boy and stabilize him, read the rising sand
      to chart a way home across the dunes, and get past the scavenger band before
      the Wastes keep him. A frontier favor — open to anyone, no faction required.
    archetype_label: "Frontier Rescue"
    faction_alignment: independent
    starting_zone: tatooine_outskirts
    starting_room: outskirts_scavenger_market
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["dust_sick_recovered"]
      drop_room: outskirts_scavenger_market
      follow_up_hint: >
        Soree Bann pays her water-credits and means the thanks. A homesteader
        whose son walked home out of the Wastes remembers who carried him — the
        far claims and the caravan trails carry a good word a long way out here.

    steps:
      - step: 1
        title: "The Far Claim's Mother"
        location: outskirts_scavenger_market
        npc: "Soree Bann"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Soree Bann at the City Outskirts scavenger market."
        npc_intro: >
          "You've got the look of someone the desert hasn't beaten yet. Good —
          I need that. Soree Bann; my claim's out past the last marked trail. My
          boy Eddin went into the Jundland after a wreck-salvage lead four days
          back, and a Jawa caravan brought word he's down — fevered, out of good
          water, holed up in a cave too weak to walk. The scavengers that work
          that waste are already circling his speeder. I can't carry him out
          alone and nobody here will go for a homesteader's pay. `talk` to me and
          I'll tell you where he's lying and what'll keep him breathing."
        completion:
          type: talk_to_npc
          npc: "Soree Bann"
        npc_complete: >
          "He's in a hidden cave off the canyon mouth — the caravan marked it.
          Fever and bad water; he'll be slipping in and out. Don't try to move
          him first. Get him stable — water, shade, a steady hand; you'll have to
          `first aid` him on the spot before he can travel at all. Keep him
          breathing and we've got a chance to walk him home."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Jundland Wastes hidden cave and use your `first_aid` skill to stabilize the fevered boy — `chain attempt`."

      - step: 2
        title: "Dust-Sick in the Cave"
        location: jundland_hidden_cave
        npc: "(none)"
        npc_role: contact
        teaches: ["first_aid"]
        objective: "Stabilize the fevered Eddin Bann in the hidden cave with a first-aid check."
        npc_intro: >
          [The hidden cave holds a sliver of shade and a young man laid out in it,
          flushed and shaking, lips cracked, a salvage bar still clutched in one
          hand — Eddin Bann, dust-sick and slipping under.] He's alive, but the
          fever's climbing and bad water's wrung him dry; move him like this and
          the walk will kill him. Cool him, get clean water into him, steady the
          fever — `first aid`, careful and right. `chain attempt` when you work
          on him.
        completion:
          type: skill_check_passed
          skill: "first_aid"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [The fever breaks enough. Eddin's eyes find focus, the shaking eases,
          and the cracked lips manage a dry whisper of thanks. He can't run, but
          with an arm under him he can walk — and walking out is the only way he
          leaves this cave alive. He grips the salvage bar like it's worth the
          trip. Now you only have to get him across open desert.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "Eddin can walk now, but the straight line home crosses open dune. Get to the Dune Sea Edge and use your `survival` skill to read the rising sand and chart a way back — `chain attempt`."

      - step: 3
        title: "Reading the Sand"
        location: jundland_dune_sea_edge
        npc: "(none)"
        npc_role: contact
        teaches: ["survival"]
        objective: "Read the rising desert at the Dune Sea Edge to chart a safe line home for a man who can't run."
        npc_intro: >
          [Past the canyon the Wastes open into raw dune, and the wind has the
          gritty edge that comes before a sand rises — the straight line home is
          the one a storm erases first, and a fevered man on your shoulder can't
          outpace it.] Read the desert the way Soree would: the firm sand, the
          windbreaks, the slow safe line that keeps shade and water within reach.
          Pick the route a sick man can survive, not the short one. `survival`,
          and `chain attempt` when you commit to a line.
        completion:
          type: skill_check_passed
          skill: "survival"
          difficulty: 12
          on_fail: "retry_allowed"
        npc_complete: >
          [The desert resolves into a route: firmer footing along the windward
          dunes, two shaded hollows to rest him in, a line that bends wide of the
          open pan where the sand will run. It's longer, and it's the only one
          Eddin walks out of. You get him moving along it — and that line bends
          straight into the narrows of Beggar's Canyon, where someone is already
          waiting on the take.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "The safe line home funnels through Beggar's Canyon — and the scavenger boss Vohrek Sarn is waiting on the speeder. Get the boy through; `attack`, `dodge`."

      - step: 4
        title: "The Narrows"
        location: jundland_beggars_canyon
        npc: "Vohrek Sarn"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Get Eddin past Vohrek Sarn's scavengers in Beggar's Canyon — `attack`, `dodge`."
        npc_intro: >
          [The safe line funnels into the narrows of Beggar's Canyon, and a heavy
          red-Nikto in a trophy-strung duster steps out to fill it — Vohrek Sarn,
          who has been circling Eddin's dead speeder for two days, content to let
          the fever do his work. The take he was waiting on is walking out on a
          stranger's shoulder, and the lazy patience goes flat out of his ridged
          face.] "That speeder's mine by waiting, stranger. Put the man down and
          walk — or don't, and the desert keeps you both."
        completion:
          type: combat_won
          enemy_template: "jundland_dust_scavenger_boss"
          enemy_count: 1
        npc_complete: >
          [Vohrek Sarn goes down in the narrows and his band scatters back into
          the Wastes the way scavengers do when the easy take turns and bites.
          The canyon's clear, the line home is open, and Eddin is still on his
          feet with the salvage bar in his fist. Nothing between here and the
          market now but desert you've already learned to read. Walk him home to
          his mother.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "Scavengers scattered, the line home open, the boy still walking. Bring Eddin back to Soree at the scavenger market."

      - step: 5
        title: "Walked Home"
        location: outskirts_scavenger_market
        npc: "Soree Bann"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Soree Bann to close the job and bring her son home."
        npc_intro: >
          "You walked him out." [Soree Bann's three eyes go to the young man on
          your shoulder — fever-thinned and unsteady but upright, salvage bar
          still in his fist — and for a moment the held-breath stillness she came
          in with finally lets go.] "Stabilized, walked across open dune, and past
          whatever was waiting in the canyon. Here's your water-credits out of the
          season's sale, and then some. `talk` to me and let me get my boy sat
          down."
        completion:
          type: talk_to_npc
          npc: "Soree Bann"
        npc_complete: >
          "Square. You kept a fevered man breathing, read a desert that'd have
          buried him, and brought him home through people who'd have stripped him
          where he lay. That buys you my word on the far claims — out here that's
          shade and water when you need it, which is worth more than the credits.
          Anyone questions you on the Outer trails, you tell them Soree Bann
          vouches. Walk safe."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          Eddin sits in the shade and the far claim keeps its son. Soree Bann's
          word travels the outskirts and the caravan trails — honest work in the
          Wastes finds those who finish it.

  # ─────────────────────────────────────────────────────────────────────
  # The SIXTH accessible (non-t5, non-tutorial) kind: questline chain, after
  # The Ghost Shipment (Nar Shaddaa), The Crooked Wheel (Tatooine/Mos Eisley),
  # The Lost Courier (Coruscant LOWER city), The Skimmed Line (Kuat ring), and
  # The Dust-Sick (Tatooine wilderness). FIRST questline set in Coruscant's
  # CULTURAL / MID-UPPER district (the Petrax Historic Quarter, the Galactic
  # Museum, Calocour Heights, Westport Spaceport — a different face of the
  # planet than the Lost Courier's lower city), and exercises a SIXTH distinct
  # skill spread — VALUE + CON — as an art-fraud caper: clear a defamed dealer
  # and recover a swapped artifact. Reuses the live questline engine with NO new
  # engine code/slot/event type, and touches NO map coordinate or exit graph
  # (the Coruscant rooms already exist + are loaded). NPCs back it in
  # data/worlds/clone_wars/npcs_drop_generalized_questline_false_provenance.yaml.
  # ─────────────────────────────────────────────────────────────────────
  - chain_id: coruscant_petrax_false_provenance
    chain_name: "The False Provenance"
    description: >
      A respected Petrax Quarter antiquities dealer is being ruined: she sourced
      a genuine pre-Republic votive for a wealthy collector in good faith, the
      collector received a flawless forgery, and now her name is being branded
      forger before the Guild of Antiquaries while her license hangs on it. The
      truth is a fence who swapped the real piece on the consignment leg and is
      hours from shipping it off-world. Authenticate the fake to prove the swap,
      pose your way into the broker's quiet money to learn where the genuine
      votive is moving, and run down his courier before Westport clears the
      berth. A freelance favor — open to anyone, no faction required.
    archetype_label: "Freelance Authentication"
    faction_alignment: independent
    starting_zone: monumental_district
    starting_room: petrax_quarter
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["false_provenance_cleared"]
      drop_room: petrax_quarter
      follow_up_hint: >
        Hessa Veil's name holds and the genuine votive goes back on the Guild
        register where it belongs. A dealer whose word survived a paid-for
        scandal remembers who proved it — and a good eye that can be trusted in
        the upper-city's quiet money is rarer, and worth more, than the fee.

    steps:
      - step: 1
        title: "The Defamed Dealer"
        location: petrax_quarter
        npc: "Hessa Veil"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Hessa Veil at her gallery in the Petrax Historic Quarter."
        npc_intro: >
          "You have the look of someone who can tell a true thing from a
          well-made lie. Good — that is precisely my problem. Hessa Veil; I deal
          antiquities on this row, honestly, for thirty years. I sourced a
          genuine pre-Republic Koru votive for a collector named Edran Sool —
          authenticated it myself — and the piece in his vault is a forgery. Now
          he is spending real money to call me a forger, and the Guild will pull
          my license over it. The swap happened on the consignment leg, through
          a fence I cannot prove exists. `talk` to me and I will tell you where
          to start pulling the truth loose."
        completion:
          type: talk_to_npc
          npc: "Hessa Veil"
        npc_complete: >
          "Start with the fake itself. Sool's forgery is on inquiry display at
          the Galactic Museum — the Guild lodged it as evidence. Get a proper
          look at it and `value` it the way I would: the glaze-firing, the
          mourning-glass inclusions, the weight of the clay. A forgery this good
          fools a buyer, not an appraiser who knows what to weigh. Prove it false
          and you have proved a swap happened — that is the first thread."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Galactic Museum and use your `value` skill to appraise the disputed votive and prove it a forgery — `chain attempt`."

      - step: 2
        title: "The Appraiser's Eye"
        location: galactic_museum
        npc: "(none)"
        npc_role: contact
        teaches: ["value"]
        objective: "Appraise the disputed Koru votive at the Galactic Museum and prove it a forgery with a value check."
        npc_intro: >
          [The forgery sits under glass in the museum's inquiry alcove, lodged
          as Guild evidence — a small dark mourning-votive, convincing at a
          glance, the kind of piece that fools the man who pays for it.] But the
          true Koru votives are kiln-fired to a glaze a forger cannot quite
          match and seeded with mourning-glass that settles a certain way under
          its own weight. Weigh it the way Hessa would — the firing, the
          inclusions, the heft of the clay — and read what it really is.
          `value`, careful and exact. `chain attempt` when you appraise it.
        completion:
          type: skill_check_passed
          skill: "value"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [It resolves under a careful eye: the glaze runs a half-shade too even,
          the mourning-glass sits high where age would have let it settle, the
          clay weighs light for its size. A good forgery — good enough to clear a
          collector's vault, not good enough to clear yours. The piece Sool
          received was never the one Hessa authenticated. Which means the genuine
          votive went somewhere, through someone, on its way through her hands —
          and the only quiet money on Coruscant that moves real relics like that
          works out of Calocour Heights.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The fake is proven, so a swap happened — the genuine votive moved through a fence working the quiet money in Calocour Heights. Get there and `con` your way in as a rival buyer to draw the broker out — `chain attempt`."

      - step: 3
        title: "The Quiet Money"
        location: calocour_heights
        npc: "(none)"
        npc_role: contact
        teaches: ["con"]
        objective: "Pose as a rival collector in Calocour Heights to draw the fence out and learn where the genuine votive is moving — a con check."
        npc_intro: >
          [Calocour Heights runs on discreet money and discreeter taste — the
          broker who deals genuine relics off-world will not see a Guild
          investigator, but he will always make time for a richer buyer than the
          one he has.] Wear the part: an off-world collector with deep credits, a
          taste for pre-Republic Core pieces, and no patience for provenance
          questions. Let him think you are competition for the votive he is
          already moving, and he will tell you more reaching for your money than
          he ever would under oath. `con`, smooth and unhurried — `chain attempt`
          when you work him.
        completion:
          type: skill_check_passed
          skill: "con"
          difficulty: 13
          on_fail: "retry_allowed"
        npc_complete: >
          [The broker bites on the richer buyer the way Hessa said he would —
          warm, eager, careless. The genuine Koru votive, he lets slip pricing it
          against your invented bid, is already sold and already moving: a sealed
          shockcase, a hired courier, an off-world berth at Westport that boards
          within the hour. He even names the runner — a Zabrak, Brask Yade — to
          prove the piece is real and the deal is closing. He has just sold the
          one thing that clears Hessa to a buyer who is not you, and told you
          exactly where to catch it.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "The genuine votive is in a courier's chained case heading off-world — the Zabrak Brask Yade, boarding at Westport within the hour. Get there and take it back; `attack`, `dodge`."

      - step: 4
        title: "The Gate Lane"
        location: coruscant_westport_landing
        npc: "Brask Yade"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Stop Brask Yade at Westport Spaceport before the votive ships off-world — `attack`, `dodge`."
        npc_intro: >
          [Westport's gate lanes run thick with travelers, and a hard-faced
          Iridonian Zabrak moves through them toward a private berth with a
          sealed shockcase chained to one wrist — Brask Yade, the courier the
          broker named, the genuine votive an hour from leaving Coruscant for
          good. When you step into the lane between him and the berth, the bored
          professionalism goes cold and his free hand drops to the blaster.]
          "Case stays on the wrist, the wrist makes the berth, stranger.
          Whatever the old Bith paid you, it doesn't cover this. Walk — last
          time I say it."
        completion:
          type: combat_won
          enemy_template: "petrax_relic_courier"
          enemy_count: 1
        npc_complete: >
          [Brask Yade goes down in the gate lane and the berth boards without
          him. The chain comes off the wrist; the shockcase cracks open on a
          small dark mourning-votive that weighs right for its size, the
          mourning-glass settled deep and even where the forgery's sat high — the
          genuine Koru piece, caught a single hour before it would have been gone
          for good. Nothing between here and the Petrax row now but the walk back
          to the woman whose name it clears.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "The courier's down and the genuine votive is in your hands. Bring it back to Hessa Veil at her Petrax Quarter gallery."

      - step: 5
        title: "Provenance Restored"
        location: petrax_quarter
        npc: "Hessa Veil"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Hessa Veil with the genuine votive to clear her name."
        npc_intro: >
          "You caught it." [Hessa Veil takes the votive in both hands, turns it
          once under the appraiser's loupe, and the careful composure she has
          held against a paid-for scandal finally eases.] "Genuine. The firing,
          the inclusions, the weight — this is the piece I authenticated, and
          the one in Sool's vault is the lie I'll prove with it. You appraised the
          fake, drew the broker into the open, and ran the real thing down before
          Westport cleared it. `talk` to me and let me put this back on the
          register where it belongs."
        completion:
          type: talk_to_npc
          npc: "Hessa Veil"
        npc_complete: >
          "Square — more than square. The Guild has the genuine votive, the
          courier's case, and a broker named in his own greed; the forgery charge
          collapses and Sool's money buys him nothing. You proved a true thing
          against a well-funded lie, which in my trade is the only thing that
          matters. Here is the gallery's commission, honestly paid. And you have
          a Bith appraiser's word on the Petrax row now — out here, that opens
          quiet doors money cannot. Walk well."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The votive goes back on the Guild register and Hessa Veil keeps her
          name and her license. An honest dealer's word travels the upper-city's
          quiet money — a good eye that proved itself once gets sent for again.

  # ─────────────────────────────────────────────────────────────────────
  # GENERALIZED QUESTLINE (T3.24, seventh slice) — "The Forged Notice"
  # The SEVENTH accessible kind:questline. Back on Nar Shaddaa (vs the Ghost
  # Shipment's cantina/Undercity face of the same moon — reuses NONE of its
  # rooms), a SEVENTH distinct skill spread (forgery + bureaucracy), and a new
  # story shape: a forged-paperwork ship-seizure racket beaten on its own
  # registry ground. NPCs in npcs_drop_generalized_questline_forged_notice.yaml;
  # achievement forged_notice_cleared. No new engine code / slot / event type /
  # schema / faucet, and no map-coordinate or exit-graph change.
  # ─────────────────────────────────────────────────────────────────────
  - chain_id: nar_shaddaa_forged_notice
    chain_name: "The Forged Notice"
    description: >
      An honest Corellian freighter captain came back from a haul to find her
      ship condemned as derelict on a notice she never triggered — the work of a
      Nar Shaddaa port factor who forges abandonment paperwork, seizes the
      berthed ships of owners who can't fight the registry, and sells the hulls
      off-moon for a cut. The notice is a forgery with a good enough seal to take
      a ship, and a seizure crew is mustering within the hour. Prove the notice
      forged, file an emergency hold the factor can't quash, and stop his
      enforcer before the crew reaches the berth. A freelance favor — open to
      anyone, no faction required.
    archetype_label: "Freelance Counter-Forgery"
    faction_alignment: independent
    starting_zone: nar_shaddaa_promenade
    starting_room: upper_dock_observation
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["forged_notice_cleared"]
      drop_room: upper_dock_observation
      follow_up_hint: >
        The Cinder Run flies out clean and the factor's forged notice goes into
        the Guild record as evidence against a racket that ran for years on
        captains who couldn't fight the paper. A spacer whose ship you pulled out
        of a crooked seizure remembers it — and word travels the docks that
        there is someone who can read a forged seal and beat a bent clerk at his
        own forms.

    steps:
      - step: 1
        title: "The Condemned Ship"
        location: upper_dock_observation
        npc: "Cassa Brel"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Cassa Brel on the Upper Dock Observation Level."
        npc_intro: >
          "You look like you've read a few documents that didn't want to be
          read. Good — that's the job. Cassa Brel; that's my ship two levels
          down, the Cinder Run, and the port's just condemned her as derelict.
          She isn't. I flew her in here myself. There's a notice mag-clamped to
          her hull with a registry seal good enough to seize her and sell her
          off-moon, and the factor who hung it owns the desk I'd appeal to. It's
          a forgery — I'd stake the ship on it, which is exactly what I'm doing.
          `talk` to me and I'll tell you where to start prying it apart."
        completion:
          type: talk_to_npc
          npc: "Cassa Brel"
        npc_complete: >
          "Start with the notice itself. It's clamped to the Cinder Run's hull
          down at Landing Platform Besh — go read it the way a forger doesn't
          want it read. The seal, the issue-stamp, the authority codes: a fake
          good enough to fool a hurried captain isn't good enough to fool someone
          who knows what a real registry condemnation looks like. Prove that seal
          was never issued and you've proved the seizure's a theft."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to Landing Platform Besh and use your `forgery` skill to examine the derelict-notice on the Cinder Run's hull and prove it a fake — `chain attempt`."

      - step: 2
        title: "The Forged Seal"
        location: westport_arrivals
        npc: "(none)"
        npc_role: contact
        teaches: ["forgery"]
        objective: "Examine the derelict-notice clamped to the Cinder Run at Landing Platform Besh and prove the seal forged with a forgery check."
        npc_intro: >
          [The notice hangs mag-clamped to the freighter's hull at the platform's
          edge — a crisp condemnation slate, registry seal embossed, issue-codes
          marching down the margin, official enough at a glance to have already
          barred the captain from her own airlock.] But a real registry
          condemnation is issued, logged, and counter-sealed in three places a
          forger has to fake all at once — the embossed authority-seal, the
          issue-stamp's timestamp chain, the desk-code that says which clerk
          signed it. Read it the way the man who made it hoped no one would.
          `forgery`, slow and exact — `chain attempt` when you work the seal.
        completion:
          type: skill_check_passed
          skill: "forgery"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [It comes apart under a knowing eye: the authority-seal is embossed
          from a lifted master a half-generation stale, the issue-stamp's
          timestamp chain skips a registry handshake a genuine condemnation can't
          skip, and the desk-code belongs to a clerk who was off-shift the day it
          claims to be signed. A good forgery — good enough to seize a ship off a
          captain who can't fight it, not good enough to survive being read. The
          Cinder Run was never condemned by the registry. Which means the seizure
          stands on nothing but a faked seal — and a faked seal proven false is a
          hold the factor's own registry has to honor, if you file it before the
          crew moves.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The seal's a proven forgery, so the seizure is fraudulent — now beat the factor on paper. Get to the Smugglers' Guild Hall registry and `bureaucracy` an emergency title-hold filed before the crew can take the ship — `chain attempt`."

      - step: 3
        title: "The Hold on the Desk"
        location: smugglers_guild_hall
        npc: "(none)"
        npc_role: contact
        teaches: ["bureaucracy"]
        objective: "File an emergency title-hold at the Smugglers' Guild registry to freeze the seizure before the crew moves — a bureaucracy check."
        npc_intro: >
          [The Guild's freight registry runs on forms, precedent, and which clerk
          owes which favor — and the factor has spent years making sure an appeal
          dies quietly at the desk he controls.] But a proven-forged seal is a
          different filing entirely: an emergency title-hold lodged on evidence of
          fraud goes around the appeals desk, not through it, and once it's
          stamped the seizure is frozen until a Guild arbiter rules — long after
          the crew's window closes. You have to know the form, cite the right
          condemnation statute, and get it stamped by a clerk who isn't the
          factor's before he hears it's coming. `bureaucracy`, sharp and certain
          — `chain attempt` when you file it.
        completion:
          type: skill_check_passed
          skill: "bureaucracy"
          difficulty: 13
          on_fail: "retry_allowed"
        npc_complete: >
          [It stamps. The right form, the fraud-evidence rider, the statute cited
          chapter and line, dropped on a clerk three desks clear of the factor's
          reach before word of it crosses the floor — and an emergency title-hold
          on the Cinder Run is suddenly Guild record, frozen pending an arbiter
          the factor can't appoint. On paper, the ship is safe. The trouble is
          the factor's crew doesn't read paper fast: his enforcer is already
          mustering a seizure detail to march on the berth and take the hull
          before the hold can mean anything, and a clamped ship hauled off-moon
          is hard to give back, arbiter or no. The hold only holds if the crew
          never reaches the Cinder Run.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "The hold is filed but the factor's crew is mustering to take the ship before it matters — his enforcer is forming them up in Enforcer Alley. Stop him before they reach the berth; `attack`, `dodge`."

      - step: 4
        title: "The Alley Mouth"
        location: enforcer_alley
        npc: "Varn Tesk"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Stop Varn Tesk in Enforcer Alley before the seizure crew reaches the Cinder Run — `attack`, `dodge`."
        npc_intro: >
          [Enforcer Alley runs from the Corellian Sector to the upper docks, and
          a broad, leather-skinned Weequay is mustering a half-dozen hired hands
          in its mouth — Varn Tesk, the factor's enforcer, a rolled seizure writ
          in one fist and the Cinder Run named on it, the crew that turns a forged
          notice into a stolen ship. When you plant yourself in the lane between
          him and the berth, the bored efficiency goes flat and his free hand
          settles on the blaster.] "Writ's good, the berth's condemned, and
          you're standing in a working alley. Whatever the captain promised you,
          it doesn't cover a seizure crew. Clear the lane — last time I say it."
        completion:
          type: combat_won
          enemy_template: "nar_forged_notice_enforcer"
          enemy_count: 1
        npc_complete: >
          [Varn Tesk goes down in the alley mouth and the half-mustered crew, paid
          by the cleared berth and not by the fight, melts back into the
          Promenade rather than serve a writ a Guild hold has already frozen. The
          rolled seizure writ comes loose from his fist — the same forged seal you
          read on the hull, the same racket, named now in his hand. Nothing
          between here and the Cinder Run's berth but the walk back up to the
          captain whose ship the hold and the alley just bought back.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "The enforcer's down and the crew's scattered — the hold holds. Bring the cleared title back to Cassa Brel on the Upper Dock Observation Level."

      - step: 5
        title: "Title Cleared"
        location: upper_dock_observation
        npc: "Cassa Brel"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Cassa Brel with the seizure stopped to clear the Cinder Run's title."
        npc_intro: >
          "She's still on the clamps, but the clamps come off now." [Cassa Brel
          turns from the observation rail, the set finally going out of her jaw as
          she reads the stamped hold and the forged writ you carry.] "Forged seal
          proven, hold filed, crew turned back — that's the whole trap sprung, in
          order. The arbiter'll rule the notice a fraud, the factor's name goes on
          the Guild record beside it, and a racket that ran for years on captains
          who couldn't fight the paper just met one who could. `talk` to me and
          let me sign you what I owe you."
        completion:
          type: talk_to_npc
          npc: "Cassa Brel"
        npc_complete: >
          "Square — more than square. The Cinder Run flies out clean, the forged
          notice is evidence instead of a death warrant, and Factor Hask is going
          to spend a long time explaining a desk full of seals that were never
          issued. Here's the run's fee, honestly paid. And you've a captain's word
          on the Nar Shaddaa docks now — out here, a name that reads a forgery and
          beats a bent registry is worth more than the fee and travels faster.
          Fair skies."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The Cinder Run's title clears and Cassa Brel keeps the ship she earned.
          A captain's word travels the docks — a sharp eye for a forged seal and a
          steady hand at a crooked desk get sent for again.

  - chain_id: nar_shaddaa_warrens_toll
    chain_name: "The Warrens Toll"
    description: >
      Down in the Warrens — the lowest inhabitable levels of the Smuggler's Moon
      — a racketeer the locals know only as the Toll-Keeper has sold "reactor
      safety" to the squat block for a year: pay the toll or the centuries-old
      reactor that keeps the level lit and breathing has an "accident." This cycle
      the block couldn't pay, and his enforcer wired a real demolitions charge
      into the reactor's cooling fins — a breach that would collapse the lowest
      levels and everyone on them. There is no law on Nar Shaddaa that comes down
      this far. Get the frightened level to move together, take the charge off the
      fins before it blows, and stop the enforcer who comes to set it by hand. A
      freelance favor — open to anyone, no faction required.
    archetype_label: "Freelance Community Defense"
    faction_alignment: independent
    starting_zone: nar_shaddaa_warrens
    starting_room: warrens_squat_block
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["warrens_toll_broken"]
      drop_room: warrens_squat_block
      follow_up_hint: >
        The charge comes off the fins, the enforcer goes down in the rubble, and
        for the first cycle in a year the squat block sleeps without a toll over
        its head — word travels the Warrens that the Toll-Keeper's safety racket
        met a level that didn't pay and didn't burn. A keeper of a hundred
        families remembers who spent themselves on the block instead of the boss,
        and the lowest level of the Smuggler's Moon learns there is someone who
        will come down here when no law will.

    steps:
      - step: 1
        title: "The Toll Came Due"
        location: warrens_squat_block
        npc: "Vessa Tial"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Vessa Tial in the Warrens squat block."
        npc_intro: >
          "You came down to the Warrens on purpose — that already makes you rarer
          than help usually is down here. Vessa Tial; I keep this block, such as
          it keeps. There's a man we only ever call the Toll-Keeper who sells us
          reactor-safety: pay the toll, or the reactor that keeps this level
          breathing has an accident. We paid it like weather for a year. This
          cycle we couldn't — and his enforcer wired a real charge into the
          reactor's cooling fins. No law on this moon comes down this far. `talk`
          to me and I'll tell you what I can't do alone."
        completion:
          type: talk_to_npc
          npc: "Vessa Tial"
        npc_complete: >
          "Three things, and I can't do one of them. First — the level. People
          are hiding in their dwellings waiting to die polite. The scavengers in
          the den hold the only safe approach to the reactor and they won't open
          it; they're as scared as everyone, and scared people down here close
          the barricade. Get them — get the whole level — to move as one instead
          of waiting. You'll have to make a frightened crowd believe acting beats
          hiding. Start in the scavenger den; that's the door we need open."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Warrens Scavenger Den and use your `command` skill to rally the scavengers and the squat-block dwellers to act together and open the reactor approach — `chain attempt`."

      - step: 2
        title: "Move the Level"
        location: warrens_scavenger_den
        npc: "(none)"
        npc_role: contact
        teaches: ["command"]
        objective: "Rally the frightened scavengers and squat-block dwellers to act together and open the safe approach to the reactor — a command check."
        npc_intro: >
          [Behind the den's barricade of welded durasteel a knot of hard-bitten
          scavengers and squat-block families have gone still and small, each
          waiting for someone else to move first while a charge ticks on the only
          reactor they have.] They are not cowards — they are people who have
          learned that on the Smuggler's Moon the ones who stand up get noticed,
          and being noticed kills you. Changing that in the next few minutes is not
          a matter of a good speech; it is a matter of giving frightened people a
          job, a direction, and the nerve to believe a level acting together can
          do what a level hiding never could. Lead them — open the barricade, clear
          the safe approach, put eyes on the toll-crew's lookouts. `command`,
          steady and certain — `chain attempt` when you take charge.
        completion:
          type: skill_check_passed
          skill: "command"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [It turns, the way a frightened crowd turns when one person finally tells
          it where to stand: the barricade comes down, scavengers who would not
          open the approach for fear are suddenly clearing it and posting watch on
          the toll-crew's lookouts, and the squat block stops waiting to die polite
          and starts moving its old and its young up off the lowest level. With the
          approach open and the lookouts watched, the reactor core is reachable —
          and somewhere on its cooling fins is the charge the level just found the
          nerve to let you go and pull.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The level's moving and the approach is open — now the charge. Get to the Warrens Reactor Core Access and use your `demolitions` skill to take the charge off the cooling fins before it breaches — `chain attempt`."

      - step: 3
        title: "The Charge on the Fins"
        location: warrens_reactor_core
        npc: "(none)"
        npc_role: contact
        teaches: ["demolitions"]
        objective: "Reach the demolitions charge wired into the reactor's cooling fins and defuse it before it breaches — a demolitions check."
        npc_intro: >
          [The reactor core access is a furnace of residual heat off a machine
          that has run unmaintained for centuries, the catwalk humming with
          suppressed power — and clamped low among the cooling fins where the
          breach would do the most is the charge: a competent, ugly piece of
          work, shaped to crack a fin-bank and let the core run away rather than
          to simply explode.] A panicked yank sets it off; so does cutting the
          wrong lead. Reading it is the whole job — the trigger logic, the
          anti-tamper, the order the leads have to come in — and doing it with the
          heat closing your throat and a level depending on your hands not
          shaking. `demolitions`, slow and exact — `chain attempt` when you work
          the charge.
        completion:
          type: skill_check_passed
          skill: "demolitions"
          difficulty: 13
          on_fail: "retry_allowed"
        npc_complete: >
          [It comes apart the way ugly competent work does when someone better
          reads it: the anti-tamper first, then the trigger logic, then the leads
          in the only order that doesn't run the core — and the charge goes dead
          and harmless in your hands, a breach that won't happen lifted clean off
          the fins. The reactor settles back to its old centuries' hum, the level
          above it keeps breathing, and the thing the Toll-Keeper sold safety
          against is suddenly just scrap and evidence. The trouble is the deadline
          has passed and the toll's gone unpaid — and a collector whose lesson
          just failed doesn't write it off. His enforcer is already crossing the
          collapsed plaza to set the next one by hand and make the block pay in
          wreckage what it wouldn't pay in credits.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "The charge is dead but the enforcer's coming to set another by hand — he's crossing the Collapsed Plaza toward the reactor approach. Stop him before he reaches it; `attack`, `dodge`."

      - step: 4
        title: "The Gap in the Rubble"
        location: warrens_collapsed_plaza
        npc: "Tarko Venn"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Stop Tarko Venn in the Collapsed Plaza before he reaches the reactor approach to set another charge — `attack`, `dodge`."
        npc_intro: >
          [The collapsed plaza is a tangle of fallen building-layers, the ceiling
          of the level a frozen avalanche overhead — and picking across it toward
          the one gap in the rubble that opens onto the reactor approach is a
          heavy, flat-faced Klatooinian, a remote detonator clipped at his belt
          and a blaster on his hip. Tarko Venn, the Toll-Keeper's enforcer, the
          hand that wired the dead charge and means to set the next one himself.
          When you plant yourself in the gap between him and the approach, he
          thumbs the detonator, finds the charge already gone, and lets his free
          hand fall to the blaster instead.] "Block missed the toll. That makes
          this a collection, and you're standing in it. Out of the rubble — last
          time I say it."
        completion:
          type: combat_won
          enemy_template: "warrens_toll_enforcer"
          enemy_count: 1
        npc_complete: >
          [Tarko Venn goes down in the gap in the rubble, the remote detonator
          skittering away across fallen tile to a charge that isn't there anymore,
          and the toll-crew's lookouts — paid by a collection, not by a fight on a
          level that suddenly isn't scattered — fade back up the shafts rather than
          come down into a Warrens that found its nerve. The detonator and the dead
          charge are the whole racket in your hands now, the same shaped work on a
          dozen blocks the Toll-Keeper bled before this one. Nothing between here
          and the squat block but the climb back to the keeper who bet the toll-money
          on a stranger.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "The enforcer's down and the crew's scattered — the level holds. Bring word back to Vessa Tial in the squat block."

      - step: 5
        title: "The Toll Broken"
        location: warrens_squat_block
        npc: "Vessa Tial"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Vessa Tial with the charge dead and the enforcer down to break the toll."
        npc_intro: >
          "The reactor's humming and the lifts are full of people coming back
          down." [Vessa Tial sets down the block's roster, the steadiness she
          has been holding all cycle finally costing her a breath as she takes the
          dead charge and the detonator from your hands.] "Level moved, charge
          pulled, his man down in the plaza — that's the toll broken, in order.
          The Toll-Keeper sold safety against the one thing that would've killed
          us, and a block that couldn't pay him just made sure he can't sell it
          here again. `talk` to me and let me give you what we owe you."
        completion:
          type: talk_to_npc
          npc: "Vessa Tial"
        npc_complete: >
          "Square — and the block knows it. This is the toll-money — every credit
          we scraped to stay alive this cycle. It was always going to be spent on
          surviving; I'd a thousand times rather it bought the block than the boss.
          You've a keeper's word in the Warrens now, and word travels down here
          faster than it travels up — when no law will come to the lowest level,
          there's a name that will. Mind the climb out, and the spores in the
          fungal cavern. Go safe."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The squat block keeps its reactor and its hundred families, and the
          Toll-Keeper's safety racket loses the level it leaned on hardest. A
          keeper's word travels the Warrens — when a block needs someone who will
          come down where the law won't, they send for the name that already did.

  # ─────────────────────────────────────────────────────────────────────
  # The NINTH accessible kind:questline. Coruscant MID-CITY — the commercial
  # district and the Coruscant Works sublevels — a FRESH district reusing
  # NONE of the two prior Coruscant arcs' rooms (the Lost Courier ran the
  # lower-city crystal_jewel_cantina / lower_refugee_warren / petrax_sublevels
  # / factory_district; the False Provenance ran the monumental petrax_quarter
  # / galactic_museum / calocour_heights / coruscant_westport_landing). It
  # exercises a NINTH distinct skill spread — PICK POCKET + HIDE + COMPUTER
  # PROGRAMMING (slicing) — none of which any prior accessible questline uses,
  # and it is a NEW STRUCTURE: the FIRST accessible questline that resolves on
  # FINESSE, not force. Three skill-check steps and NO combat step, climaxing
  # on the master slice rather than a blaster fight — the first side-arc a
  # pure slicer / scoundrel / face build can finish on its own terms (every
  # other accessible questline forces a combat climax). A heist-for-justice:
  # pull the proof of a predatory info-broker's forged debt-liens out of the
  # private data-vault he hid in a dead corner of the Works, before his
  # scheduled purge re-forges it — clearing dozens of families at once. NPCs
  # in npcs_drop_generalized_questline_sealed_ledger.yaml; achievement
  # sealed_ledger_recovered. ONE placed NPC (the giver/closer); the broker
  # "the Ledger", his collector, his watchers, and the seized families are
  # narrated-only (no spawned entity, and no combat step needs a foil). No new
  # engine code / slot / event type / schema / faucet, and no map-coordinate
  # or exit-graph change.
  # ─────────────────────────────────────────────────────────────────────
  - chain_id: coruscant_works_sealed_ledger
    chain_name: "The Sealed Ledger"
    description: >
      An info-broker the Coruscant mid-city knows only as the Ledger runs a
      "debt-clearing service" that is really a forgery mill: he fabricates
      lien-records against working families — debts they never owed — and when
      they can't pay his "service fees" he seizes their accounts through a
      registry desk he controls. The proof the liens are fakes lives in a
      private data-vault he tucked into a decommissioned corner of the
      Coruscant Works, behind automation so old the maintenance crews never
      look at it, and on a schedule he runs a purge that wipes and re-forges
      the records to stay ahead of any audit. One advocate — Terva Dohl, who
      helps mid-city families fix registry errors honestly — can't beat him on
      paper: he owns the desk and forges faster than she can appeal. So she
      needs the original ledger pulled out of his vault before the next purge,
      the one record that collapses every forged lien at once. A sealed
      sublevel full of his watchers is no place for a firefight; this is a job
      for a light touch — lift the way in, slip past unseen, and crack the
      lock. A freelance favor, open to anyone, no faction required.
    archetype_label: "Freelance Heist"
    faction_alignment: independent
    starting_zone: commercial_district
    starting_room: dexters_diner
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["sealed_ledger_recovered"]
      drop_room: dexters_diner
      follow_up_hint: >
        The original ledger reaches an honest desk before the Ledger's purge
        can re-forge it, and the forged liens collapse all at once — dozens of
        mid-city families clear of debts they never owed, the widow whose
        savings he took first among them. The broker who never lost a record to
        an audit just lost the whole vault to a pair of quiet hands, and word
        moves through the mid-city the way it moves nowhere else: there is
        someone who gets a thing back without ever raising a blaster.

    steps:
      - step: 1
        title: "The Advocate's Problem"
        location: dexters_diner
        npc: "Terva Dohl"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Terva Dohl at Dexter's Diner in Coco Town."
        npc_intro: >
          [A sleek-furred Bothan woman has a back booth at Dexter's and a
          datapad stacked with other people's ruin.] "You have the look of
          someone who can get a thing out of a place it isn't supposed to come
          out of. Good. Terva Dohl — I help mid-city families fix what the
          registry got wrong, and lately I'm losing. There's a broker they call
          the Ledger; he forges debt-liens against people who never borrowed a
          credit, then seizes their accounts when they can't pay his fees. I
          can't beat him appealing — he owns the desk and forges faster than I
          can file. But he keeps the originals, the proof the liens are fake, in
          a vault he thinks no one can reach. `talk` to me and I'll tell you
          where he hid it."
        completion:
          type: talk_to_npc
          npc: "Terva Dohl"
        npc_complete: >
          "He runs a purge on a schedule — wipes the originals and re-forges
          them clean, so an audit never finds the same record twice. Pull the
          ledger before the next purge and every forged lien collapses at once;
          dozens of families clear, all of them. The vault's in a dead corner of
          the Coruscant Works, and the only soft way in starts with his
          collector — the man who works the mid-city accounts carries the vault
          fob on him, and he rides the transit hub every shift in a crowd thick
          enough to lose a hand in. Lift the fob. Don't let him feel it go."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Mid-City Transit Hub and lift the Ledger's collector's vault-fob out of the commuter crush with your `pick pocket` skill — `chain attempt`."

      - step: 2
        title: "The Fob in the Crowd"
        location: mid_transit_hub
        npc: "(none)"
        npc_role: contact
        teaches: ["pick pocket"]
        objective: "Lift the vault access-fob off the Ledger's collector in the Mid-City Transit Hub crowd with a pick pocket check."
        npc_intro: >
          [The transit hub moves tens of thousands an hour through tram queues
          and turbolift crushes, and the Ledger's collector rides it every
          shift — a careful man in a good coat, the vault fob clipped to an
          inside pocket where a careless hand would never reach and a slow one
          would get caught.] Pickpockets work this crowd for a living and the
          scan-droids run random sweeps; the only way to take the fob is in the
          press of a tram arrival, clean and unhurried, and to leave him certain
          it's still in his pocket. `pick pocket`, light and patient — `chain
          attempt` when the crowd surges.
        completion:
          type: skill_check_passed
          skill: "pick pocket"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [The tram doors gasp open, the crowd lurches, and in the half-second
          of contact the fob comes free of the inside pocket and into your sleeve
          while your other hand is already somewhere harmless. The collector
          rides on, hand brushing his coat out of habit, feeling the shape of
          something that is no longer there. By the time he reaches the vault and
          learns it's gone, you intend to be standing in it. The fob will open
          the Ledger's reader — but the vault sits in a stretch of the Coruscant
          Works he keeps watched, and a fob in the wrong place at the wrong
          moment is worse than no fob at all.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "You have the fob — now reach the vault unseen. Get down to the Coruscant Works Industrial Sublevel and `hide` your way past the Ledger's posted watchers and the dead sublevel's sensor sweep — `chain attempt`."

      - step: 3
        title: "The Quiet Sublevel"
        location: commercial_district_main
        npc: "(none)"
        npc_role: contact
        teaches: ["hide"]
        objective: "Cross the Coruscant Works Industrial Sublevel to the dead plant unseen — past the Ledger's watchers and the motion-sweep — with a hide check."
        npc_intro: >
          [The Works sublevel is conduits and recyclers and the kind of quiet
          that makes the few people down here nervous; the live grid stations
          have their own crews busy elsewhere, but the dead stretch toward the
          old atmospheric plant is the Ledger's, and he keeps two watchers on the
          approach and a motion-sweep walking the gantries between them.] A
          firefight in a sealed sublevel ends with you cornered; the way through
          is the way no one notices — read the sweep's pattern, time the
          watchers' arcs, and move only in the gaps, staying off the
          motion-grid and out of every sightline. `hide`, slow and certain —
          `chain attempt` when the sweep turns away.
        completion:
          type: skill_check_passed
          skill: "hide"
          difficulty: 13
          on_fail: "retry_allowed"
        npc_complete: >
          [The sweep crawls down the far gantry, a watcher turns to light a
          deathstick in cupped hands, and in the dark seam between them you cross
          the dead stretch one held breath at a time — past the warning-lit
          recyclers no one remembers the meaning of, into the oldest part of the
          plant where the automation hasn't been updated since the late Old
          Republic and no living soul comes on purpose. The vault is here, where
          he was sure no one would ever stand: a slicer's-gauntlet lock on a
          data-core tucked behind machinery older than the war. The fob wakes the
          reader. The lock is another matter — and somewhere a purge-timer is
          counting down toward the wipe that makes all of this for nothing.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "You're at the vault in the Atmospheric Processing Plant — now beat the lock before the purge. Slice the data-core's gauntlet with your `computer programming` skill and pull the original ledger — `chain attempt`."

      - step: 4
        title: "The Slicer's Gauntlet"
        location: commercial_district_atmospheric
        npc: "(none)"
        npc_role: contact
        teaches: ["computer programming"]
        objective: "Crack the data-vault's slicer-gauntlet lock and pull the original ledger before the scheduled purge wipes it — a computer programming check."
        npc_intro: >
          [The data-core sits behind the ancient automation like a held secret,
          and the Ledger spent on it the one thing he trusts: a slicer's
          gauntlet, layered counter-ice that wipes the originals the instant a
          clumsy intrusion trips it — and a purge-timer underneath, counting
          down to do the same on schedule whether you're here or not.] This is
          the whole job in one roll: get through the gauntlet faster than it can
          wipe, and faster than the timer, and pull the original ledger clean —
          the forged liens collapse the moment it reaches an honest desk, but
          only if it survives the next sixty seconds. `computer programming`,
          steady and exact — `chain attempt`, and beat the clock.
        completion:
          type: skill_check_passed
          skill: "computer programming"
          difficulty: 14
          on_fail: "retry_allowed"
        npc_complete: >
          [The gauntlet peels back layer by layer under a knowing hand — a feint
          to draw the counter-ice, a held line while it resets, and then the core
          is open with the purge-timer still ticking and the wipe still leashed.
          The original ledger copies out whole: every forged lien, every seized
          account, every family name the Ledger manufactured a debt against, in
          the broker's own untouched records. You pull it clean and let the
          gauntlet close on an empty core a breath before the purge fires on
          nothing. He'll re-forge what's left and find it proves only that he
          forges — because the real ledger is in your hand, and it only has to
          reach Terva Dohl before he learns it's gone.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "You have the original ledger — now get it to an honest desk before the Ledger can react. Bring it back to Terva Dohl at Dexter's Diner."

      - step: 5
        title: "An Honest Desk"
        location: dexters_diner
        npc: "Terva Dohl"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Terva Dohl with the original ledger to collapse the forged liens."
        npc_intro: >
          [Terva Dohl reads the copied ledger in the back booth, fur prickling,
          scrolling faster the further she gets.] "You actually pulled it. The
          whole vault, the originals, every lien he forged in his own hand — this
          isn't an appeal, this is the case that ends him. Fob lifted, sweep
          beaten, gauntlet cracked, and not a shot fired — that's the cleanest
          piece of work I've seen in the mid-city in years. `talk` to me and let
          me pay you what this is worth before I go file it where he can't reach."
        completion:
          type: talk_to_npc
          npc: "Terva Dohl"
        npc_complete: >
          "It's filed — on a desk the Ledger doesn't own, with the originals
          attached, before his purge could re-forge a single line. Every lien he
          hung collapses at once: the widow gets her savings back, and dozens of
          families clear of debts they never owed. Here's your fee, honestly
          paid, and there's more than the fee in it for you — the mid-city has a
          name now for someone who gets a thing back without raising a blaster,
          and that name travels. Quiet hands are rarer than gun hands down here,
          and worth more. Come find me when you want the next one."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The forged liens collapse and the mid-city families come out clear,
          the widow first among them. A name moves through the commercial
          district — someone who can get a thing back on finesse alone — and
          quiet work has a way of finding the quiet hands that can do it.

  # ─────────────────────────────────────────────────────────────────────
  # The TENTH accessible kind:questline. Tatooine SPEEDER CIRCUIT — the Mos
  # Eisley spaceport speeder lot, the transport depot, the outskirts speeder
  # track, and the gutted-sandcrawler chop-shop — a THIRD, vehicle-country
  # face of Tatooine reusing NONE of the two prior Tatooine arcs' rooms (the
  # Crooked Wheel ran market_place_geps_grill / chalmuans_cantina_main_bar /
  # mos_eisley_market_district / outskirts_abandoned_farm; the Dust-Sick ran
  # the Jundland outskirts_scavenger_market / jundland_hidden_cave /
  # jundland_dune_sea_edge / jundland_beggars_canyon). It exercises a TENTH
  # distinct skill spread — SENSORS + REPULSORLIFT OPERATION — and is the
  # FIRST accessible questline to lead with a MECHANICAL build (every prior
  # arc leads with Perception / Knowledge / Technical / combat skills),
  # rewarding the pilot / driver / scanner character that the social,
  # investigative, appraisal, technical-repair, leadership, and finesse arcs
  # never do. A new STORY SHAPE: breaking a fixed racing circuit. A swoop
  # gang the outskirts calls the Dust Wheelers spikes honest riders' coils at
  # the start gates so their own rigs win the purses and the haul contracts;
  # they spiked a young runner's speeder and stripped it at their chop-shop,
  # a stranded medical-supply run still crated on it. Read the sabotage off
  # the depot gate scanners and trace the gang's rig (sensors), run the
  # circuit to draw their outrider off the chop-shop (repulsorlift
  # operation), stand off the enforcer who guards it (combat), and bring the
  # rig and the run back. NPCs in
  # npcs_drop_generalized_questline_sabotaged_run.yaml; achievement
  # sabotaged_run_won. TWO placed NPCs (the giver/closer + the combat foil);
  # the gang's boss "the Pacer", the outrider, the gang crew, the young
  # runner, and the stripped rigs are narrated-only (no spawned entity). No
  # new engine code / slot / event type / schema / faucet, and no
  # map-coordinate or exit-graph change.
  # ─────────────────────────────────────────────────────────────────────
  - chain_id: tatooine_speeder_sabotaged_run
    chain_name: "The Sabotaged Run"
    description: >
      Out at the Mos Eisley outskirts speeder circuit — where independent
      haulers prove their rigs and pick up the contract runs the big outfits
      won't touch — a swoop gang the locals call the Dust Wheelers has the
      whole track fixed. They scan honest riders' repulsors at the start
      gates and quietly spike the coils of anyone who won't buy their "track
      insurance," so the gang's own rigs take every purse and every haul
      contract. This week they spiked a young runner's speeder mid-race; she
      walked away, but her rig — and the medical-supply run riding on it — is
      stripped down in the gang's chop-shop out at a gutted sandcrawler. Read
      the sabotage off the depot gate scanners and trace the gang's rig, run
      the circuit to pull their outrider off the chop-shop, stand off the
      enforcer who guards it, and bring the rig and the run home. A freelance
      favor — open to anyone, no faction required.
    archetype_label: "Freelance Circuit Run"
    faction_alignment: independent
    starting_zone: tatooine_spaceport
    starting_room: spaceport_speeders
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["sabotaged_run_won"]
      drop_room: spaceport_speeders
      follow_up_hint: >
        The runner's rig comes back off the gang's racks and the stranded
        medical-supply run reaches the moisture farms a week late but whole;
        the Dust Wheelers' fix on the outskirts circuit cracks the day an
        independent beat their outrider clean and walked their enforcer down
        in his own chop-shop. Word runs the speeder lanes the way it runs
        nowhere else on Tatooine — there's a hand who'll take the gang's
        spike off an honest rig and give it back — and honest riders queue at
        the start gates again.

    steps:
      - step: 1
        title: "The Fixed Circuit"
        location: spaceport_speeders
        npc: "Ria Tann"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Ria Tann at Spaceport Speeders in Mos Eisley."
        npc_intro: >
          [A blue-skinned Duros woman looks up from a stripped repulsor
          housing on the bench, grease to the elbow, a row of dead spike-coils
          laid out beside it like evidence.] "You ride, or you haul? Either
          way you came to the right bench and the wrong week. Ria Tann — I
          keep the only honest speeder shop left on the outskirts circuit.
          There's a swoop gang, the Dust Wheelers, that's got the whole track
          fixed: scan your repulsor at the start gate, and if you won't buy
          their 'track insurance' they spike your coil so it throws at speed.
          Their rigs win every purse and every haul run, and the independents
          are folding. They spiked a kid mid-race three days back. `talk` to
          me and I'll tell you what they took."
        completion:
          type: talk_to_npc
          npc: "Ria Tann"
        npc_complete: >
          "She walked away — barely. Her rig didn't: it's stripped down in
          their chop-shop out at the old gutted sandcrawler past the track,
          and there was a medical-supply run contracted on it — bacta and
          fever-spike for the far moisture farms — stranded with it. I can't
          out-muscle a gang, and there's no law in the outskirts that hasn't
          already taken their cut. But the spike they use leaves a signature,
          and every rig that runs the circuit gets logged at the depot gate
          scanners. Start there — read what they did to her coil, and the same
          scan'll show you where their rig went after."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Transport Depot and use your `sensors` skill to read the Dust Wheelers' spike off the gate-scanner logs and trace their rig out to the chop-shop — `chain attempt`."

      - step: 2
        title: "The Signature in the Logs"
        location: transport_depot
        npc: "(none)"
        npc_role: contact
        teaches: ["sensors"]
        objective: "Read the gang's sabotage off the depot gate-scanner logs and trace their rig to the chop-shop — a sensors check."
        npc_intro: >
          [The transport depot's gate scanners log every repulsor that runs
          the outskirts circuit — a wall of signal traces, throttle ghosts,
          and transponder pings going back weeks, most of it junk and all of
          it the gang's cover.] The spiked coil left a signature in the
          runner's last trace if you know the shape to look for: a foreign
          scan-pulse riding the gang's own start-gate sweep, the half-second
          they wrote the fault in. The rig that pulsed it spoofed its
          transponder but not its throttle ghost — and that runs the same
          drift on every Dust Wheeler chassis. Cut the gang's pulse out of the
          noise, match the drift, and the trace runs straight to where their
          rig parked. `sensors`, patient and exact — `chain attempt` when the
          signal resolves.
        completion:
          type: skill_check_passed
          skill: "sensors"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [The runner's last trace blooms on the scanner and there it is — a
          foreign scan-pulse laid over her coil a half-second before the
          fault, the gang writing the spike in at the gate exactly the way Ria
          said. You pull the pulse, match its throttle-drift against the weeks
          of logged traces, and the same drift surfaces over and over on a
          transponder that keeps changing its name and never its chassis. The
          last clean ping parks it out past the track, at the gutted
          sandcrawler the outskirts crews stopped going near. The proof's in
          hand and the chop-shop's on the map — but their rigs run a picket on
          the circuit, and the only way out there fast enough to matter is to
          run it yourself.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "You've traced the rig to the chop-shop and you know their spike — now get out there. Take a speeder onto the City Outskirts Speeder Track and out-run the Dust Wheelers' outrider with your `repulsorlift operation` skill — `chain attempt`."

      - step: 3
        title: "The Outrun"
        location: outskirts_speeder_track
        npc: "(none)"
        npc_role: contact
        teaches: ["repulsorlift operation"]
        objective: "Run the outskirts circuit and beat the Dust Wheelers' outrider to draw their picket off the chop-shop — a repulsorlift operation check."
        npc_intro: >
          [The outskirts speeder track is a flat-out run of gate-markers and
          dust through the broken country past the spaceport, and the Dust
          Wheelers keep an outrider on it to turn back anyone headed for the
          chop-shop.] You can't sneak a speeder past a picket on open hardpan —
          but you can beat it. Make a run their outrider has to chase: hold
          the throttle past where a careful rig lifts, ride the gate-markers
          close enough to strip paint, and draw him off the chop-shop road and
          onto your tail, where he can't watch both. A gang that wins by
          spiking honest coils rides slow on a clean rider who isn't scared of
          the dust. `repulsorlift operation`, full out and steady — `chain
          attempt` when you commit to the run.
        completion:
          type: skill_check_passed
          skill: "repulsorlift operation"
          difficulty: 13
          on_fail: "retry_allowed"
        npc_complete: >
          [You take the circuit the way the gang never expects an independent
          to take it — wide open through the first gates, throttle past the
          lift line, close enough to the markers that the outrider commits to a
          chase he has to win and finds he can't. He burns his lead trying to
          match a line he doesn't have the nerve for, drifts wide on the back
          hardpan, and falls off your tail somewhere behind the dust with the
          chop-shop road wide open ahead of you. The picket's pulled and the
          gutted sandcrawler is in sight off the track — but the noise of your
          run has told everyone in it that someone is coming, and the enforcer
          who keeps the chop-shop will be standing in the door.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "You've pulled the picket and the chop-shop's ahead — but the noise brought their enforcer out. Get to the Wrecked Sandcrawler and stop Drevin Saar; `attack`, `dodge`."

      - step: 4
        title: "The Chop-Shop Door"
        location: outskirts_wrecked_sandcrawler
        npc: "Drevin Saar"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Stop Drevin Saar at the gang's chop-shop in the Wrecked Sandcrawler and recover the runner's rig — `attack`, `dodge`."
        npc_intro: >
          [The gutted sandcrawler is a cave of stripped speeders and
          cannibalized repulsors — the Dust Wheelers' chop-shop — and standing
          in the torn-open hull with the runner's half-stripped rig behind him
          is a red-skinned, horned Devaronian in a racer's vest, a blaster
          loose in one hand and a coil-spanner still in the other.] Drevin
          Saar, the gang's enforcer — the man who works the spikes and keeps
          the chop-shop, who heard a clean run pull his picket and came to the
          door to see who was fool enough to make it. When he reads that you
          mean to take the rig back, his easy contempt goes flat and certain.
          "That coil's the gang's now, hauler — same as the run that was on it.
          You rode all the way out here to lose a speeder and walk back, if you
          walk. Turn around." [He thumbs the blaster up.]
        completion:
          type: combat_won
          enemy_template: "sabotaged_run_enforcer"
          enemy_count: 1
        npc_complete: >
          [Drevin Saar goes down among the stripped rigs he cut apart, the
          coil-spanner ringing off the sandcrawler's hull, and the chop-shop
          crew — gang riders who run a fixed circuit precisely so they never
          have to fight a fair one — melt out the far breaches rather than
          stand for an enforcer who just lost in his own door. The runner's rig
          is racked and half-stripped, but the drive and the coil are whole,
          and the medical-supply run is still crated in the cargo well, bacta
          and fever-spike untouched. Enough rig to limp back to Ria's bench,
          enough run to still reach the farms. Nothing between here and the
          spaceport but the drive back — and the gang's whole spike racket,
          dead coils and all, riding in the seat beside you.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "The enforcer's down, the crew's scattered, and you've got the rig and the medical run — drive it back to Ria Tann at Spaceport Speeders."

      - step: 5
        title: "Honest Riders Again"
        location: spaceport_speeders
        npc: "Ria Tann"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Ria Tann with the recovered rig and the stranded medical run."
        npc_intro: >
          [Ria Tann comes out from behind the bench before you've cut the
          repulsor, already reading the rig on the trailer and the crates in
          the well — and the dead spike-coils you've brought back with them.]
          "You beat their outrider on open hardpan and walked Saar down in his
          own chop-shop — and you brought the kid's rig and the farm run both."
          [She picks up one of the gang's spent spike-coils, turns it over,
          sets it down.] "That's the whole fix, in your hand. `talk` to me and
          let me settle up before the lot fills with riders who heard."
        completion:
          type: talk_to_npc
          npc: "Ria Tann"
        npc_complete: >
          "Here's the contract advance — the credits I'd set by to make that
          farm run myself, and worth more spent on the gang losing than on me
          driving. The kid'll have her rig back inside a week, the farms get
          their bacta, and the Dust Wheelers spent their enforcer and their
          outrider's nerve to lose the one race that paid. The circuit
          remembers a hand like that. Independents are already back at the
          start gates this morning — first clean board in a year. You've a
          mechanic's word on the outskirts now, and out here that's worth more
          than a fast rig: when a gang spikes an honest run, there's a name
          they send for. Mind the road back into town."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The fix on the outskirts circuit breaks and the independents ride
          clean again, the stranded farm run reaching the moisture farms whole.
          A hand that takes a gang's spike off an honest rig has a way of being
          sent for — the speeder lanes carry a name now, the way the dust
          carries everything on Tatooine.

  # ─────────────────────────────────────────────────────────────────────
  # GENERALIZED QUESTLINE #11 (T3.24): "The Hollow Crew" — the ELEVENTH
  # accessible (non-t5, non-tutorial) kind: questline chain, and the FIRST
  # set on GEONOSIS. Eleventh distinct skill spread: ALIEN SPECIES +
  # DROID PROGRAMMING (none of the prior ten uses either) — the first
  # accessible arc to reward the xeno-knowledge / droid-tech build. The
  # CIS droid foundry stays entirely OFF-STAGE: the trader buys
  # decommissioned foundry-OVERRUN labor droids (surplus units sold off
  # cheap), and the whole arc runs on the faction-neutral Stalgasin
  # offworlder surface + the deep-hive market — the war kept offstage the
  # way every prior accessible arc keeps the Republic/Clone-War offstage.
  # NO new engine code, slot, event type, schema migration, reward faucet,
  # or map-coordinate/exit-graph change — pure additive content per
  # quest_expansion_postlaunch_path_v1.md.
  # ─────────────────────────────────────────────────────────────────────
  - chain_id: geonosis_offworld_hollow_crew
    chain_name: "The Hollow Crew"
    description: >
      In the Stalgasin offworld quarter — the dusty walk-up sprawl where
      the spacers, salvagers, and contract crews who get stuck on Geonosis
      wait out their business — a Sullustan trader named Nuva Sehl makes an
      honest living off the foundry's leavings: she buys decommissioned
      labor droids out of the foundry overruns, rebuilds them on her bench,
      and sells honest work-crews to the mining and moisture outfits that
      pass through. Lately every crew she sells goes wrong the same way — a
      tenday after the sale the droid walks off on its own in the night and
      turns up back in the offworld quarter, stripped of whatever it was
      carrying. A scrap-gang that calls itself the Reclaimers has been
      burying a hidden recall-string in her rebuilt cores: sold honest, the
      droid wakes on a timer and walks its new owner's cargo straight to the
      gang. Her name on the quarter is mud, the buyers think she runs the
      racket, and the Geonosian drone-caste broker who sells her the
      overruns has stopped dealing with an offworlder whose droids "walk" —
      cutting off every salvager in the quarter who lives on cheap labor.
      Read the hive broker right and re-open the channel, crack a walked
      droid to pull the gang's string and find them, stand off the enforcer
      who comes when his crew goes quiet, and give the offworld quarter back
      an honest bench. A freelance favor — open to anyone, no faction
      required.
    archetype_label: "Freelance Salvage Favor"
    faction_alignment: independent
    starting_zone: geonosis_surface
    starting_room: stalgasin_offworld_quarter
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["hollow_crew_freed"]
      drop_room: stalgasin_offworld_quarter
      follow_up_hint: >
        The recall-string comes out of every core the gang ever touched, and
        the walked crews stop walking; the droids Nuva Sehl already sold
        stay sold, working honest for the outfits that bought them. The hive
        broker re-opens the overrun channel the day his drones stop tracking
        her droids back to the Reclaimers, and the offworld quarter takes her
        name out of the mud. Word runs the offworlder camps the way it runs
        nowhere the war touches — there's a hand who can pull a buried string
        out of a stolen droid and walk down the crew that planted it — and
        the salvagers buy crews off her bench again without checking over
        their shoulders.

    steps:
      - step: 1
        title: "The Walking Crews"
        location: stalgasin_offworld_quarter
        npc: "Nuva Sehl"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Nuva Sehl in the Stalgasin Offworld Quarter on Geonosis."
        npc_intro: >
          [A small, jowled Sullustan woman looks up from a half-gutted labor
          droid clamped to a workbench under a dust-tarp, a core-reader in one
          hand and a row of pulled memory cores laid out beside it like
          spent shells.] "Offworld and looking for a work-crew? You came to the
          right bench and the wrong season. Nuva Sehl — I buy the foundry's
          throwaway labor droids, rebuild them honest, and sell crews to the
          outfits passing through. Or I did. Every crew I've sold these two
          months walks off in the night a tenday after the sale, strolls back
          to this quarter, and turns up stripped of whatever its new owner had
          it hauling. The whole offworld camp thinks I'm running the theft. I'm
          not — somebody's reflashing my cores. `talk` to me and I'll show you
          what they put in them."
        completion:
          type: talk_to_npc
          npc: "Nuva Sehl"
        npc_complete: >
          [She turns one of the pulled cores so its read-out faces you — a
          clean rebuild, her own work, with a foreign block of command
          buried under the labor routines.] "A recall-string. Sleeps through
          the sale, wakes on a timer, and walks the droid — and the cargo —
          straight back to a scrap-gang that calls itself the Reclaimers. I
          can read that it's there. I can't crack it, I can't prove who wrote
          it, and I can't find where the droids walk to. Two things stand in
          my way. The Geonosian who sells me the overruns has stopped dealing
          — his caste won't trade with an offworlder whose droids 'walk,' and
          without his channel I'm finished and so's every salvager out here.
          And the gang's crew is somewhere in this quarter I can't reach.
          Start at the hive market — make the broker hear you out, and his
          drones have been tracking my droids; they'll know where they go."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Hive Interior Market and use your `alien species` skill to read the Geonosian drone-caste broker right, re-open the overrun channel, and learn where the walked droids return — `chain attempt`."

      - step: 2
        title: "The Broker's Caste"
        location: geonosis_hive_market
        npc: "(none)"
        npc_role: contact
        teaches: ["alien species"]
        objective: "Read the Geonosian drone-caste scrap-broker correctly, re-open the overrun channel, and learn where the walked droids return — an alien species check."
        npc_intro: >
          [The hive interior market is a vaulted gallery of the worker and
          drone caste — clicking, chittering Geonosians trading foundry scrap
          and mineral by signs an offworlder reads at his peril.] The broker
          who sold Nuva Sehl her overruns is here, and he has turned his back
          on her: to the drone caste a being whose machines wander off is a
          being who cannot keep his own hive in order, and they do not deal
          with the disordered. Push him like a human and you lose the channel
          for good. Read him like what he is — the wing-set that means shame
          deflected, the antenna-cant that means a grievance he wants
          answered, not soothed — answer the grievance in the caste's own
          terms, and the disorder becomes the gang's, not hers. Do it right
          and his foragers, who track every machine that crosses their market,
          will tell you where the walked droids go. `alien species`, patient
          and exact — `chain attempt` when you've read him true.
        completion:
          type: skill_check_passed
          skill: "alien species"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [You read the broker the way the caste reads itself — not pleading
          an offworlder's case but naming the disorder where it belongs, with
          the gang that steals foundry-bound droids off the market's own
          ground, and the wing-set eases. The grievance was never with Nuva
          Sehl; it was with machines walking through his market answering a
          string no Geonosian wrote, an offense to a caste that orders its
          whole world by who answers to whom. He re-opens the overrun channel
          with a single folded gesture, and then his foragers, who miss
          nothing that crosses their gallery, sign you the path the walked
          droids take: down to the offworld quarter, to a back room the gang
          rents off the Smuggler's Roost flophouse, where a fresh crew is
          sitting right now waiting on its recall timer.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The broker's foragers tracked the walked droids to a rented back room at the Smuggler's Roost Flophouse — get there and use your `droid programming` skill to crack a sitting droid, pull the gang's recall-string, and trace it to them — `chain attempt`."

      - step: 3
        title: "The Buried String"
        location: smugglers_roost_flophouse
        npc: "(none)"
        npc_role: contact
        teaches: ["droid programming"]
        objective: "Crack a walked droid in the gang's rented back room, pull the buried recall-string, and trace it to the gang's compound — a droid programming check."
        npc_intro: >
          [Vez Garra, who runs the Smuggler's Roost and learned long ago not
          to comment on what her tenants store in the back rooms, rents the
          gang a windowless cell off the flophouse — and there it is: a freshly
          walked labor droid, powered down on its haunches in the dark,
          waiting out its recall timer with a moisture-outfit's cargo still
          slung on its frame.] This is the gang's whole racket in one machine.
          Crack its core and the recall-string is right where Nuva Sehl said —
          but the string is the door, not the prize: written into it is the
          master-core address the droid walks home to, the gang's own node
          out in the outsider compound, and the signature of the hand that
          wrote it. Pull the string clean, copy the address, and reflash the
          droid honest while you're in its head, and you walk out with the
          proof, the location, and one crew member the gang will never get
          back. `droid programming`, careful in a sleeping core — `chain
          attempt` when you're into it.
        completion:
          type: skill_check_passed
          skill: "droid programming"
          difficulty: 13
          on_fail: "retry_allowed"
        npc_complete: >
          [The core opens to you and the buried string lies there exactly as
          she read it — and threaded through it, the master-core address it
          walks home to: a gang node out in the Stalgasin outsider compound,
          stamped with the write-signature of the hand that planted it. You
          copy the address, lift the signature for proof, and strip the recall
          out of the droid's head, reflashing it honest so it wakes to its
          owner and not to the gang. The droid stirs, finds its own routines
          where the string used to be, and stands down quiet. But pulling its
          string drops it off the gang's own roster the instant they next
          count — and the address in your hand points straight at the compound
          where the man who keeps that roster is going to come looking for
          whoever just made one of his crew stop answering.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "You've pulled the string and traced the gang to the Stalgasin Outsider Compound — get out there. Their enforcer Vossk Rhal will come when his crew goes quiet; stand him off — `attack`, `dodge`."

      - step: 4
        title: "The Outsider Compound"
        location: stalgasin_outsider_compound
        npc: "Vossk Rhal"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Stop Vossk Rhal at the gang's node in the Stalgasin Outsider Compound and break the recall racket — `attack`, `dodge`."
        npc_intro: >
          [The outsider compound is a walled scrap-yard of cannibalized droids
          and stacked foundry reject — the Reclaimers' turf — and standing over
          the gang's master-core node with one of the walked crew gone dark
          beside him is a heavy-scaled, slit-eyed Trandoshan in a welder's
          apron, a blaster on his hip and a cutting-spanner in one clawed
          hand.] Vossk Rhal, the gang's enforcer — the hand whose write-
          signature is on every buried string, the one who came to the node
          the moment a crew member stopped answering his roster. He reads the
          reflashed droid you walked in behind, and the easy contempt of a
          being who steals with a buried command and never has to fight for it
          goes flat. "You're the one pulling my strings out of my droids,
          offworlder. That's gang property you reflashed — every core in this
          quarter answers to me, and so will you, in pieces. Should've stayed
          on your ship." [He thumbs the blaster up off his hip.]
        completion:
          type: combat_won
          enemy_template: "hollow_crew_enforcer"
          enemy_count: 1
        npc_complete: >
          [Vossk Rhal goes down among the cannibalized droids he built his
          racket on, the cutting-spanner ringing off the compound wall, and the
          rest of the Reclaimers — a scrap-crew that steals precisely so it
          never has to stand in a fair fight — scatter over the back wall
          rather than answer for an enforcer who just lost in his own yard. The
          gang's master-core node sits open beside him, the whole recall racket
          spelled out in it: every buried string, every walked crew, every
          address the droids were told to walk home to. Pull the node and the
          strings die with it — the droids the gang already turned stay turned
          back, and the crews still on Nuva Sehl's bench will sell honest. The
          write-signature on the node matches the one you lifted off the
          flophouse droid; that's the proof that clears her name in the
          quarter. Nothing between here and her bench but the walk back, the
          dead node under your arm and a reflashed droid trailing you home.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "The enforcer's down, the node's pulled, and you've got the proof and a freed droid — carry it back to Nuva Sehl in the Stalgasin Offworld Quarter."

      - step: 5
        title: "An Honest Bench"
        location: stalgasin_offworld_quarter
        npc: "Nuva Sehl"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Nuva Sehl with the gang's master-core node and the freed droid."
        npc_intro: >
          [Nuva Sehl comes out from under the dust-tarp before you've crossed
          the quarter, reading the dead master-core node under your arm and the
          reflashed droid walking honest at your heel — and the broken
          cutting-spanner you've brought back with them.] "You read the broker
          true, cracked their string out of a sitting droid, and walked Vossk
          Rhal down in his own yard — and you pulled their whole node and
          brought one of my crew home awake." [She turns the node over, reads
          the write-signature stamped across it, and sets it down beside her
          row of spent cores.] "That signature clears my name in this quarter
          and damns theirs. `talk` to me and let me settle up before the camp
          hears their bench is honest again."
        completion:
          type: talk_to_npc
          npc: "Nuva Sehl"
        npc_complete: >
          "Here's the fee — the credits I'd set by to buy my way off this rock
          if the racket finished me, and worth a great deal more spent on the
          Reclaimers finished instead. The strings die with their node, the
          crews I already sold stay honest, and the broker's channel is open
          the moment his foragers stop tracking my droids anywhere but to work.
          The offworld quarter's a hard posting and a small one, and it
          remembers a hand that pulled a buried string out of a stolen droid
          and gave a salvager her bench back. When somebody out here finds
          their machines answering a command they never wrote, there's a name
          they'll send for now. Mind the dust on the walk to the pad."
        # graduation closes the arc; no extra on-completion side effects.
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The recall racket dies with the gang's node and the offworld quarter
          buys honest crews off Nuva Sehl's bench again, the hive broker's
          overrun channel open and the walked droids working where they were
          sold. A hand that pulls a buried string out of a stolen droid has a
          way of being sent for — the offworlder camps carry a name now, in the
          one corner of Geonosis the war hasn't reached.

  # ─────────────────────────────────────────────────────────────────────
  # GENERALIZED QUESTLINE #12 — "The Driven Herd" (kamino_driven_herd)
  # ─────────────────────────────────────────────────────────────────────
  # The TWELFTH accessible (non-t5, non-tutorial) `kind: questline` chain,
  # and the FIRST set on KAMINO. Twelfth distinct skill spread: BEAST
  # RIDING + SWIMMING (none of the prior eleven uses either) — the FIRST
  # accessible arc whose spread includes a STRENGTH skill (swimming) and
  # the FIRST to reward BEAST RIDING: the physical creature-handler /
  # rider-and-swimmer build. The Tipoca City cloning facility and the clone
  # army stay entirely OFF-STAGE: the whole arc runs on the faction-neutral
  # fauna-and-spacer margins of the open-ocean platforms — the war kept
  # offstage the way every prior accessible arc keeps the Republic/Clone-War
  # offstage. New story shape: breaking a wildlife-poaching racket / rescuing
  # a driven herd (no prior accessible arc touches fauna). NO new engine
  # code, slot, event type, schema migration, reward faucet, or
  # map-coordinate/exit-graph change — pure additive content per
  # quest_expansion_postlaunch_path_v1.md.
  # ─────────────────────────────────────────────────────────────────────
  - chain_id: kamino_driven_herd
    chain_name: "The Driven Herd"
    description: >
      On the storm-lashed ocean platforms of Kamino — out past the Tipoca
      City cloning halls, on the open-water margin where the offworld
      outfits and the aiwha stable live — a Nautolan keeper named Neyla Sur
      tends the working aiwha that ferry rider-and-cargo crossings between
      the storm-separated pylons, and doctors the foundered beasts the
      squalls bring in. For a season a poacher has worked her string: in the
      worst of the squalls he sounds a stolen Kaminoan herd-call goad that
      panics the aiwha off their roost and scatters them into the open swell,
      where his crew nets the foundered ones and crates them — under the
      city's sensor umbrella and off the logs — for off-world collectors who
      pay a fortune for a thing that flies and swims. The aiwha his crew
      don't reach drown out in the dark water; the string thins one squall
      at a time, and the platform outfits that cross by aiwha are stranded.
      Gentle one of the driven beasts and ride it out to find where the herd
      was taken, dive the poacher's submerged net-pen and cut the foundering
      aiwha free before they drown, stand off the poacher when he comes back
      to an empty pen, and give the platforms their herd back. A freelance
      favor — open to anyone, no faction required.
    archetype_label: "Freelance Beast-Keeper's Favor"
    faction_alignment: independent
    starting_zone: kamino_ocean_platform
    starting_room: kamino_aiwha_stable
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["driven_herd_freed"]
      drop_room: kamino_aiwha_stable
      follow_up_hint: >
        The poacher's goad goes silent and his pen stays cut; the aiwha he
        crated breach back to the roost and the ones his crew never reached
        stop drowning unnoticed in the swell. Neyla Sur's string fills again,
        and the platform outfits cross the storm-separated pylons by aiwha
        the way they did before the squalls turned into a harvest. Word runs
        the ocean platforms the way it runs nowhere the war touches — there's
        a rider who can gentle a driven beast and a diver who can cut a
        drowning herd loose and walk the poacher down — and the keeper hires
        her crossings out again without counting the roost in the morning to
        see who's gone.

    steps:
      - step: 1
        title: "The Thinning String"
        location: kamino_aiwha_stable
        npc: "Neyla Sur"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Neyla Sur at the Aiwha Stable on Kamino's ocean platform."
        npc_intro: >
          [A lean, sea-green Nautolan woman looks up from a foundered aiwha
          she is doctoring on the stable's open deck, the rain beading on her
          bound head-tresses, a coil of cut net over one shoulder.] "Offworld
          and looking for a crossing? You came to the right stable and the
          wrong season. Neyla Sur — I keep the aiwha that ferry the outfits
          between the pylons, and I doctor the ones the squalls break. Or I
          did. There's a poacher working my string. Every bad squall he scatters
          the herd into the swell and his crew nets the foundered ones and
          crates them off the logs for some collector off-world. The ones they
          miss drown. My string's half what it was and the platforms can't
          cross. `talk` to me and I'll show you what he leaves in the water."
        completion:
          type: talk_to_npc
          npc: "Neyla Sur"
        npc_complete: >
          [She lifts the coil off her shoulder and runs the cut end through her
          webbed hands — net-cord sheared clean, not torn.] "His pen's nets.
          One of my aiwha came home dragging this through the swell with a
          crate-line still on it before it foundered. He sounds a stolen
          Kaminoan herd-call goad in the squalls — panics the beasts off the
          roost, scatters them where his crew can net them under the city's
          sensor shadow, off every log. Three things stand between me and
          stopping him, and I can't do one of them. There's a driven aiwha
          foundering off the ocean-surface platform right now, too spooked to
          come in — gentle it, ride it out across the swell, and it'll take you
          to where the herd was driven. Start there. I haven't the seat for a
          storm-swell, and the platforms haven't the time."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Go to the Ocean Surface Platform and use your `beast riding` skill to gentle the driven aiwha foundering in the swell and ride it out to where the poacher took the herd — `chain attempt`."

      - step: 2
        title: "The Driven Beast"
        location: kamino_ocean_surface
        npc: "(none)"
        npc_role: contact
        teaches: ["beast riding"]
        objective: "Gentle the driven aiwha foundering off the ocean-surface platform and ride it out across the storm-swell to find where the herd was taken — a beast riding check."
        npc_intro: >
          [At ocean level the swells stand four meters on a calm day and this
          is not a calm day; the city rises overhead on its pylons like an
          artificial cliff, and out past the platform's edge a single aiwha
          wallows half-foundered in the swell, wings beating ragged, too
          panicked from the goad to come in and too spent to fly clear.] No
          Kaminoan ever taught a clone to approach an aiwha, and the swell
          will drown a rider who fights the beast instead of reading it. Come
          in low and slow, match the wallow, put a hand where it can feel you
          are not the sound that scattered it — gentle the panic out of it,
          take the seat, and let it carry you where the herd's instinct says
          the rest were driven: down under the pylons, to the sensor-shadowed
          dock where the poacher pens his catch. `beast riding`, patient
          against a panicked beast in a heavy sea — `chain attempt` when you've
          gentled it and taken the seat.
        completion:
          type: skill_check_passed
          skill: "beast riding"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [The panic goes out of the aiwha under your hand the way a held breath
          lets go — it stops fighting the swell, folds its great wings to the
          wallow, and lets you take the seat behind its head-crest. You turn it
          with the swell instead of against it and it knows at once where you
          mean to go: it banks down under the lip of the platform, slides along
          the pylons through the electromagnetic murk that hides the dock from
          the city's sensors, and brings you in beneath the Unauthorized Docking
          Point — and there it is, lashed to the underside of the dock and half
          drowned in the dark water: the poacher's net-pen, crates stacked on
          the deck above it and, below the waterline, a knot of netted aiwha
          fighting the strands for the air they can't reach. The beast under you
          shudders at the sound of them. The crates wait on the tide for a ship;
          the netted herd does not have until the tide.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The driven aiwha carried you under the city to the poacher's net-pen beneath the Unauthorized Docking Point — get there and use your `swimming` skill to dive the flooded pen and cut the foundering aiwha free before they drown — `chain attempt`."

      - step: 3
        title: "The Drowning Pen"
        location: kamino_smuggler_dock
        npc: "(none)"
        npc_role: contact
        teaches: ["swimming"]
        objective: "Dive the poacher's submerged net-pen beneath the dock and cut the netted aiwha free before they drown — a swimming check."
        npc_intro: >
          [The Unauthorized Docking Point hangs beneath the city's sensor
          umbrella, its modified pylon-section quiet and unlogged — and lashed
          to its underside, below the black waterline, is the poacher's pen:
          a knot of net-mesh and crate-lines holding the netted aiwha under,
          where every surge drives them deeper from the air they breach to
          breathe.] Aiwha are air-breathers; netted under, they drown — and
          the strong, panicking ones drown fastest, fouling themselves deeper
          the harder they fight. There's no cutting the pen from the deck;
          you go in the cold dark water after it, find the crate-lines by feel
          in the surge, and cut the mesh from the beasts without being dragged
          under by a panicked half-tonne of aiwha or fouled in your own cut
          net. Free them and they breach for the surface and scatter for the
          open roost; leave one and the tide finishes it. `swimming`, hard
          against a heavy surge in a fouling net — `chain attempt` when you're
          down in it.
        completion:
          type: skill_check_passed
          skill: "swimming"
          difficulty: 13
          on_fail: "retry_allowed"
        npc_complete: >
          [You go off the dock into water cold enough to stop the breath, find
          the first crate-line by feel in the surge, and saw the mesh off the
          nearest aiwha a strand at a time while it thrashes for air it can't
          reach — then the next, and the next, working the knot of the pen from
          the outside in, twice nearly dragged under by a freed beast breaching
          for the surface and once fouled in your own cut net before you kick
          clear. One by one they tear loose and breach, the dark water boiling
          white as the freed herd scatters up and out for the open roost, until
          the pen hangs empty and cut, the crate-lines trailing slack in the
          surge. You come up under the dock among the empty mesh — and feel,
          through the pylon, the thud of a boot on the deck above: the poacher's
          pen-line has gone slack on his count, and Korsa Drael has come back
          down to the dock to see who emptied it.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "You've cut the pen and the herd's breaching free — but the poacher Korsa Drael has come back down to the dock to a pen cut empty. Stand him off — `attack`, `dodge`."

      - step: 4
        title: "The Empty Pen"
        location: kamino_smuggler_dock
        npc: "Korsa Drael"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Stop Korsa Drael at the dock and break the poaching racket — `attack`, `dodge`."
        npc_intro: >
          [You haul out of the black water onto the dock and he is already
          there at the head of the stacked crates — a weathered, leather-skinned
          Weequay in a sealed slicker, the stolen herd-call goad slung across
          his back, a blaster coming up off his hip — reading the cut pen and
          the freed aiwha breaching off into the swell.] Korsa Drael, the
          poacher — the hand who sounds the goad in the squalls, the one who
          came back down the moment his pen-line went slack on the count. The
          bored contempt of a being who poaches by remote sound and never has
          to fight for it goes flat. "That's a season's work breaching off into
          the dark on your account, diver. The herd's my catch and this dock's
          mine — should've stayed up top where the rain can't reach you. You go
          out in the nets they just left empty." [He thumbs the blaster up.]
        completion:
          type: combat_won
          enemy_template: "driven_herd_poacher"
          enemy_count: 1
        npc_complete: >
          [Korsa Drael goes down on the dock among his own empty crates, the
          stolen goad clattering off into the dark water, and the net-crew that
          works for him — a poaching gang that nets drowning beasts precisely so
          it never has to stand in a fair fight — scatters for its ship rather
          than answer for a poacher who just lost on his own dock. The goad sinks
          where it fell, and with it the only sound that could scatter the herd;
          the crates on the deck stand empty, their catch breaching free in the
          swell. Take the cut pen-line and the goad's broken sling for the
          keeper — the proof that the racket worked her string and not she
          herself — and there's nothing between here and the stable but the ride
          back up through the pylons, a gentled aiwha under you and a freed herd
          scattering for the open roost behind.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "The poacher's down, his goad's in the deep, and the herd's breaching free — ride back up to Neyla Sur at the Aiwha Stable."

      - step: 5
        title: "The Full Roost"
        location: kamino_aiwha_stable
        npc: "Neyla Sur"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Neyla Sur with the cut pen-line and word that the poacher is down."
        npc_intro: >
          [Neyla Sur is already out on the stable deck when you bring the
          gentled aiwha in, reading the freed herd scattering for the roost
          behind you and the cut pen-line and the goad's broken sling in your
          hands.] "You gentled a driven beast and rode it out, cut my herd loose
          from his pen before the tide took them, and put Korsa Drael down on
          his own dock." [She turns the cut net-cord over in her webbed hands,
          reads where it was sheared, and sets it beside the coil she's kept all
          season as proof.] "His goad's in the deep and his pen's cut, and the
          aiwha he crated are breaching home where I can count them. `talk` to
          me and let me settle up before the roost fills back in."
        completion:
          type: talk_to_npc
          npc: "Neyla Sur"
        npc_complete: >
          "Here's the fee — the credits I'd set by to buy my way off this rock
          if the racket finished my string, and worth a great deal more spent on
          the poacher finished instead. The goad's silent, the pen's cut, and
          the herd that drowned a beast a squall stays in the swell where it
          belongs. The ocean platforms are a hard posting and a small one, and
          they remember a rider who gentled a driven beast and a diver who cut a
          drowning herd loose. When somebody out here finds their string going
          quiet in the squalls, there's a name they'll send for now. Mind the
          rain on the ride up to the pad."
        # graduation closes the arc; no extra on-completion side effects.
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The poaching racket dies with the goad in the deep and the ocean
          platforms cross by aiwha again, the keeper's string filling back to
          the roost and the squalls turned back into weather instead of a
          harvest. A rider who can gentle a driven beast and a diver who can cut
          a drowning herd loose has a way of being sent for — the ocean
          platforms carry a name now, in the one corner of Kamino the war hasn't
          reached.

  # ═══════════════════════════════════════════════════════════════════════
  # ENGINE INTEGRATION NOTES
# ═══════════════════════════════════════════════════════════════════════
# When the CW tutorial engine session lands:
#
# 1. Add `engine/tutorial_chains.py` (or extend `engine/tutorial_v2.py`)
#    with a chain loader that consumes this file and the GCW counterpart
#    (data/worlds/gcw/tutorials/chains.yaml — TBD).
#
# 2. The state-tracking JSON gets a new key alongside the existing
#    `tutorial_core` and `tutorial_electives`:
#
#        "tutorial_chain": {
#            "chain_id": "republic_soldier",
#            "step": 3,
#            "started_at": <ts>,
#            "completed_steps": [1, 2]
#        }
#
#    The chain is selected after chargen if a `faction_intent` is set
#    that maps to one of the chains (or by direct chain_id selection at
#    the chargen "skip core, pick chain" branch).
#
# 3. Tutorial-zone-only rooms (those NOT in zones.yaml — e.g.
#    `tipoca_briefing_room`, `kdy_apprentice_bay_7`) are built by an
#    extension to `build_tutorial.py` that walks the chain definitions
#    and creates rooms with `tutorial_zone: true` properties.
#
# 4. Step `completion` types map to engine event hooks:
#       command_executed   → parser hook
#       talk_to_npc        → NPC interaction hook
#       combat_won         → combat resolution hook
#       skill_check_passed → dice roll hook
#       mission_accepted   → mission system hook
#       mission_completed  → mission system hook
#       bounty_accepted    → bounty board hook
#       item_acquired      → inventory hook
#       item_used          → use command hook
#       room_entered       → movement hook
#       prerequisite       → flag check (no event, blocks chain)
#
# 5. The Jedi-Path chains (`jedi_path` and `jedi_path_independent`) are
#    locked: the chain selector rejects both at chargen and surfaces the
#    `locked_message` instead. The Village quest sets the
#    `jedi_path_unlocked` flag on completion of either Path A (Order) or
#    Path B (Independent); only then does the corresponding flavored
#    chain become available, and only the one matching the player's
#    `village_chosen_path`.
#
#    Player still needs the `force_sensitive` flag from chargen or
#    Village trials.
#
#    F.7.j (May 4 2026) split the formerly-monolithic `jedi_path` chain
#    into:
#      - `jedi_path`              → Path A graduates (jedi_order, drops
#                                   into jedi_temple_main_gate)
#      - `jedi_path_independent`  → Path B graduates (independent, drops
#                                   into village_common_square)
#    Path C (Dark Whispers) deliberately has no chain; that flavor is
#    post-launch content per from_dust_to_stars_design_v2_clone_wars.md
#    §7.3.
#
# ═══════════════════════════════════════════════════════════════════════
