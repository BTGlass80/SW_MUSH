# data/worlds/clone_wars/tutorials/chains.yaml
# Clone Wars Era — Tutorial Profession Chains
# Schema version 1
#
# Per clone_wars_era_design_v3.md §10:
#   "Eight chains for launch (up from six), mapping to the eight joinable
#    faction-archetype axes. Each chain: 4-6 steps, introduces the player
#    to their starting zone, faction HQ, mission board, relevant tools,
#    and sets them up with 1-2 clear next actions."
#
# This file is the content side of the CW tutorial rework. The current
# tutorial is hardcoded in build_tutorial.py (~2200 lines) and
# engine/tutorial_v2.py (~2250 lines) — both GCW-keyed. The CW rework's
# engine session will:
#   1. Add a tutorial loader that consumes this YAML.
#   2. Generalize the tutorial state machine to handle profession chains
#      (currently it handles only "core" + 8 elective modules).
#   3. Build the tutorial zone rooms from the locations referenced here.
#
# Until that refactor lands, this file is inert at runtime. It is the
# regression-test asset and authoring source for the engine session.
#
# ─── Schema ────────────────────────────────────────────────────────────
#
# chains:
#   - chain_id           str       unique identifier (snake_case)
#     chain_name         str       display name
#     description        str       1-2 sentence pitch shown at chain pick
#     archetype_label    str       what kind of character this is
#     faction_alignment  str       faction code from organizations.yaml,
#                                  or `null` for unaligned (Smuggler)
#     starting_zone      str       zone key from zones.yaml
#     starting_room      str       room slug — built into tutorial zone
#                                  if not present in zones.yaml
#     prerequisites      list      gating flags (chargen_complete,
#                                  faction_intent: <code>, force_sign,
#                                  jedi_path_unlocked, etc.)
#     duration_minutes   int       estimated chain length
#     locked             bool      true means stub-only (Jedi Path)
#     locked_message     str       explanation shown if player tries
#     graduation:                  what happens at chain completion
#       credits          int       cash reward
#       faction_rep      dict      {faction_code: int_delta}
#       items            list      item slugs granted
#       achievements     list      achievement slugs unlocked
#       drop_room        str       room player ends up in (live world)
#       follow_up_hint   str       1-line "go do X next" pointer
#     steps:
#       - step           int       1-indexed step number
#         title          str       step name
#         location       str       zone key OR new tutorial-zone room slug
#         npc            str       NPC display name
#         npc_role       str       "instructor" | "contact" | "antagonist"
#         teaches        list      command names this step exercises
#         objective      str       player-facing objective sentence
#         npc_intro      str       NPC opening line (delivered on entry)
#         completion:    object    how the engine recognizes step done
#           type         str       command_executed | talk_to_npc |
#                                  combat_won | item_acquired |
#                                  room_entered | mission_completed
#           ...                    type-specific fields
#         npc_complete   str       NPC reaction line on completion
#         reward         object    {credits, items, faction_rep}
#         next_hint      str       1-sentence pointer to step+1 or grad
#
# ─── Cross-references ──────────────────────────────────────────────────
#
# All `faction_alignment` values resolve to organizations.yaml codes:
#   republic, cis, jedi_order, hutt_cartel, bounty_hunters_guild,
#   independent, mechanics_guild, shipwrights_guild, medics_guild,
#   slicers_guild, entertainers_guild, scouts_guild
#
# All `starting_zone` values resolve to zones.yaml keys:
#   coruscant_*, kuat_*, kamino_*, geonosis_*, tatooine_*, nar_shaddaa_*,
#   space_*
#
# Tutorial-zone-only rooms (e.g. `tipoca_briefing_room`,
# `kuat_apprentice_dock`) are NEW rooms the engine session will build
# under tutorial properties (`tutorial_zone: true`). They do NOT need to
# exist in zones.yaml — they are tutorial-only rooms with the same flag
# behavior as the current core tutorial's Landing Pad / Desert Trail.
#
# ═══════════════════════════════════════════════════════════════════════

schema_version: 1

chains:

  # ─── 1. REPUBLIC SOLDIER ──────────────────────────────────────────────
  - chain_id: republic_soldier
    chain_name: "Republic Soldier"
    description: >
      Clone trooper or Naval officer. You start in a Republic facility,
      receive your orders, prove your competence in a controlled exercise,
      and ship out to Coruscant for active deployment.
    archetype_label: "Clone Trooper / Naval Officer"
    faction_alignment: republic
    starting_zone: kamino_tipoca_city
    starting_room: tipoca_briefing_room
    prerequisites:
      - chargen_complete
      - faction_intent: republic
    duration_minutes: 22
    locked: false

    graduation:
      credits: 500
      faction_rep:
        republic: 3
      items: ["dc15_blaster_rifle", "republic_light_armor", "comlink_basic"]
      achievements: ["sworn_to_the_republic"]
      drop_room: coco_town  # fun7: live vendor-hub (was commercial_district_landing_zone, an exitless tutorial pocket — graduate stranded with no reachable shop)
      follow_up_hint: >
        Report to the duty officer at Coruscant Works for your first
        mission. The Republic mission board (`+missions republic`) is
        where most of your work will come from.

    steps:
      - step: 1
        title: "Reporting In"
        location: tipoca_briefing_room
        npc: "Major Tarrn"
        npc_role: instructor
        teaches: ["look", "+sheet"]
        objective: "Type 'look' to get your bearings and '+sheet' to check your gear, then 'talk Major Tarrn' to report in."
        command_to_type: "talk Major Tarrn"
        npc_intro: >
          "Stand at attention, trooper. I'm Major Tarrn, your CO for this
          briefing cycle. Look around, confirm your gear with +sheet,
          then come see me. Move."
        completion:
          type: talk_to_npc
          npc: "Major Tarrn"
          requires_first:
            - command: "look"
            - command: "+sheet"
        npc_complete: >
          "Good. Records check out. Tipoca conditioning passed. You're
          cleared for Mission Cycle 11. The combat sims are through that
          hatch."
        reward: {}
        # F.8.c.2.e: text-only — tutorial rooms have no exits; step advance
        # teleports the player to the sim room automatically.
        next_hint: "The combat simulator is waiting. Advance to the sim room and prepare to fight."

      - step: 2
        title: "Combat Sim Drill"
        location: tipoca_combat_sim
        npc: "Sim Operator CT-9904"
        npc_role: instructor
        teaches: ["attack", "dodge"]
        objective: "Defeat two simulated B1 battle droids."
        command_to_type: "attack"
        npc_intro: >
          "Trooper. Drill ration: two B1 droids, weapons set to non-lethal.
          Your DC-15 stays on full live-fire — they don't. Standard
          engagement. Any questions? Didn't think so. Open the hatch."
        completion:
          type: combat_won
          enemy_template: "b1_battle_droid_sim"
          enemy_count: 2
        npc_complete: >
          "Adequate. Below the bell curve for your batch but inside
          spec. Better trooper, worse droid — same outcome. Cleared."
        reward:
          credits: 0
          faction_rep:
            republic: 3
        next_hint: "Report back to Major Tarrn for your assignment."

      - step: 3
        title: "Receiving the Assignment"
        location: tipoca_briefing_room
        npc: "Major Tarrn"
        npc_role: instructor
        teaches: ["+missions", "accept"]
        objective: "Accept your first deployment from the mission board."
        command_to_type: "+missions"
        npc_intro: >
          "Sims passed. Congratulations, you're now overqualified for
          everything you'll actually do. Your assignment's on the board
          — `+missions` will pull it. Accept it before the transport
          leaves without you."
        completion:
          type: mission_accepted
          mission_id: "tutorial_republic_first_deployment"
        npc_complete: >
          "Coruscant. You'll be at Republic Works under Sergeant Drix.
          He's a clone like you — listen to him. Transport's at the
          north dock. Move."
        reward: {}
        # F.8.c.2.e: text-only — no exits; the chain teleports the player to
        # the transport pad on advance. Talk to Pilot CT-7567 when you arrive.
        next_hint: "You'll be teleported to the transport pad. Talk to Pilot CT-7567 to ship out."

      - step: 4
        title: "Transit to Coruscant"
        location: tipoca_transport_pad
        npc: "Pilot CT-7567"
        npc_role: contact
        teaches: ["talk"]
        objective: "Report to Pilot CT-7567 to ship out to Coruscant."
        npc_intro: >
          "On time, trooper. Strap in. Three-hour hyperspace jump to
          Coruscant. Boring. Don't lose your gear in the cabin. Talk
          to me when you're aboard and we'll lift."
        # F.8.c.2.e: was `room_entered: commercial_district_landing_zone`
        # — unreachable, because tutorial rooms have no exits and the
        # inter-step teleport (not a directional move) never fires the
        # room_entered hook. Re-anchored to talking to the pilot (who is
        # present at the transport pad); advancing then teleports the
        # player to step 5's room, commercial_district_landing_zone.
        completion:
          type: talk_to_npc
          npc: "Pilot CT-7567"
        npc_complete: >
          "Welcome to Coruscant. There's your air. Try not to choke on
          it. Sergeant Drix is the one in 212th colors over there."
        reward:
          credits: 100
          items: ["coruscant_clearance_chip"]
        next_hint: "Sergeant Drix is waiting. Talk to him."

      - step: 5
        title: "First Day on Coruscant"
        location: commercial_district_landing_zone
        npc: "Sergeant Drix"
        npc_role: contact
        teaches: ["talk", "+factions"]
        objective: "Meet Sergeant Drix; check your faction standing."
        npc_intro: >
          "Vat-fresh. Wonderful. I'm Drix, 212th. You'll bunk with the
          rest of the Cycle 11s for now. Use `+factions` to see your
          standing — it'll change as you do work. Welcome to the war."
        completion:
          type: command_executed
          command: "+factions"
        npc_complete: >
          "Good. You're a Conscript with the Republic — that's normal.
          Earn your stripes. Mission board's `+missions republic`. Don't
          die on your first run."
        reward:
          credits: 0
          faction_rep:
            republic: 3
        next_hint: "Chain complete — you're cleared for live deployment."

  # ─── 2. REPUBLIC INTELLIGENCE ─────────────────────────────────────────
  - chain_id: republic_intelligence
    chain_name: "Republic Intelligence"
    description: >
      Covert operative for the Republic. You're recruited through
      back channels, briefed on a CIS sympathizer, and tail him through
      Coruscant midlevels. Clean, careful work — not stand-up combat.
    archetype_label: "Republic Intelligence Officer"
    faction_alignment: republic
    starting_zone: monumental_district
    starting_room: republic_intel_safehouse_alpha
    prerequisites:
      - chargen_complete
      - faction_intent: republic
    duration_minutes: 25
    locked: false

    graduation:
      credits: 600
      faction_rep:
        republic: 2
      items: ["concealed_blaster", "civilian_disguise_kit", "encrypted_comlink"]
      achievements: ["recruited_in_shadow"]
      drop_room: coco_town  # fun7: live vendor-hub (was monumental_district_judicial_plaza, an exitless tutorial pocket)
      follow_up_hint: >
        Your handler will contact you via comlink with field assignments.
        Republic Intelligence missions on `+missions republic` are
        flagged with the "intel" tag.

    steps:
      - step: 1
        title: "The Quiet Recruitment"
        location: republic_intel_safehouse_alpha
        npc: "Director Naya Vell"
        npc_role: instructor
        teaches: ["look", "+sheet", "say"]
        objective: "When Director Vell finishes the pitch, type 'say I accept' to take the job."
        command_to_type: "say I accept"
        npc_intro: >
          "You weren't supposed to find this address. The fact that you
          did is exactly why you're here. Look around. Check your sheet
          — your file is open on the terminal. When you're ready, say
          you'll take the position."
        completion:
          type: command_executed
          command: "say"
          contains_any: ["yes", "i'll do it", "i accept", "agreed", "in"]
        npc_complete: >
          "Good. From now on you don't exist. I'm Director Vell. Your
          first contact will be a man named Bren Kost. He'll appear in
          the next hour at Dex's Diner. Watch him. Don't approach."
        reward:
          items: ["concealed_blaster", "civilian_disguise_kit"]
        # F.8.c.2.e: text-only — no exits in tutorial rooms; the chain
        # teleports the player to Dex's Diner on advance.
        next_hint: "You'll be brought to Dex's Diner. Find Bren Kost and use `examine` on his booth."

      - step: 2
        title: "Surveillance at Dex's"
        location: dexters_diner  # F.8.b: re-targeted to live-world room id 232 per F.4c rename map.
        npc: "Bren Kost"
        npc_role: antagonist
        teaches: ["look", "examine"]
        objective: "Locate Bren Kost without being noticed."
        command_to_type: "examine Kost"
        npc_intro: >
          [Director Vell on comlink]: "He's there. Booth in the back.
          Don't talk to him. Use `examine` on the booth area to confirm
          his identity, then leave the way you came."
        completion:
          type: command_executed
          command: "examine"
          target_contains: "kost"
        npc_complete: >
          [Vell]: "Confirmed. He's meeting a contact in the midlevels
          tonight. Track him. Don't lose him."
        reward:
          faction_rep:
            republic: 3
        # F.8.c.2.e: text-only — no exits; the chain teleports the player
        # to the midlevels freight district on advance.
        next_hint: "You'll be brought to the midlevels. Type `chain attempt` to tail Kost unseen."

      - step: 3
        title: "Tailing the Contact"
        location: commercial_district_freight_district
        npc: "Bren Kost"
        npc_role: antagonist
        # F.8.c.2.e: text-only — `follow` is not a command; `sneak` is a skill,
        # not a standalone command. The skill_check_passed completion fires via
        # `chain attempt` only. teaches updated to reflect the real trigger.
        teaches: ["chain attempt"]
        objective: "Tail Kost to his meeting without being spotted."
        npc_intro: >
          [Vell]: "He's two streets ahead. Type `chain attempt` to roll
          your Sneak (vs difficulty 8) and shadow him without alerting
          him. If your stealth fails he spots you and the operation
          aborts. Patience."
        completion:
          type: skill_check_passed
          skill: "sneak"
          difficulty: 8
        npc_complete: >
          [Vell]: "He's at the meet. Hold position. Listen."
        reward:
          faction_rep:
            republic: 5
        next_hint: "Hold and listen — the meet is happening now."

      - step: 4
        title: "The Intercept"
        location: commercial_district_freight_district
        npc: "Bren Kost"
        npc_role: antagonist
        teaches: ["+missions", "complete"]
        objective: "File your intercept report via mission complete."
        npc_intro: >
          [Vell]: "Recording captured. The meet was a CIS sympathizer
          handoff — credit chip for ship schematics. We have what we
          need. Type `+missions` to view your active assignment, then
          `complete` it. Quietly."
        completion:
          type: mission_completed
          mission_id: "tutorial_intel_first_intercept"
        npc_complete: >
          [Vell]: "Clean work. The chip Kost passed had Kuat schematics
          — Republic Counter-Intel takes it from here. Report to the
          Judicial Plaza office at street level. They'll formally
          induct you."
        reward:
          credits: 200
        # F.8.c.2.e: text-only — no exits; the chain teleports the player
        # to the Judicial Plaza on advance.
        next_hint: "You'll be brought to the Judicial Plaza. Talk to Coordinator Sehrra for your credentials."

      - step: 5
        title: "Formal Induction"
        location: monumental_district_judicial_plaza
        npc: "Coordinator Sehrra"
        npc_role: contact
        teaches: ["+factions"]
        objective: "Receive your formal Republic Intelligence credentials."
        npc_intro: >
          "Director Vell's recommendation came in. Your credentials
          are on the desk — encrypted comlink, badge, the usual. Check
          `+factions` to confirm your standing. You're a field operative
          now. The work doesn't stop."
        completion:
          type: command_executed
          command: "+factions"
        npc_complete: >
          "You're Republic Intelligence — Field Operative. Missions tagged
          `intel` are yours. Stay alive. The job is the job."
        reward:
          items: ["encrypted_comlink"]
          faction_rep:
            republic: 2
        next_hint: "Chain complete. Your handler will reach you in the field."

  # ─── 3. JEDI PATH — ORDER (LOCKED STUB) ───────────────────────────────
  #
  # F.7.j (May 4 2026) — split the formerly-monolithic "Jedi Path" into
  # two path-flavored chains. The chain_id `jedi_path` is preserved
  # for the Order-bound (Path A) flavor so existing engine consumers,
  # smoke scenarios, and tests keep their references. The new
  # sibling `jedi_path_independent` (entry 4 below) handles Path B —
  # Force-sensitive characters who stayed with the Village.
  #
  # Path C (the Dark Whispers branch) deliberately has NO chain — Path
  # C does not set `jedi_path_unlocked`, the player is exiled from the
  # Order, and the Dark-side comlink content is post-launch (per
  # `from_dust_to_stars_design_v2_clone_wars.md` §7.3 and the F.7.h
  # carry-over list). When that content lands, it gets its own chain
  # (`dark_path_acolyte` or similar), gated on `dark_path_unlocked`
  # and `village_chosen_path: c`.
  - chain_id: jedi_path
    chain_name: "Jedi Path — Order"
    description: >
      The Order accepted you. Your name is now in a ledger that has
      been quiet for a long time. A senior Council representative
      meets you at the Temple gate; your training begins where
      countless Padawans have begun before.
    archetype_label: "Jedi Padawan (Order)"
    faction_alignment: jedi_order
    starting_zone: tatooine_dune_sea
    prerequisites:
      - chargen_complete
      - jedi_path_unlocked         # set by the Village quest chain
                                   #   (Path A or Path B both unlock it)
      - force_sensitive            # set during chargen (50% chance) or
                                   #   via Village quest narrative path
      - village_chosen_path: a     # F.7.j: only Path A graduates take
                                   #   the Order chain. Path B graduates
                                   #   take `jedi_path_independent` below.
    duration_minutes: 0
    locked: true
    locked_message: >
      The Jedi path is not available at character creation. To unlock
      it you must find a hidden village in the Jundland Wastes and
      complete the Master's trials. Begin your career on another path
      — the Force will find you in time.

    graduation:
      drop_room: jedi_temple_main_gate  # F.8.b: re-targeted to live-world room id 210 per F.4c rename map.
      follow_up_hint: >
        Speak with your assigned instructor at the Jedi Temple.
        Padawan assignment follows.

    steps:
      - step: 1
        title: "(Locked — Village Quest Required)"
        location: jedi_temple_main_gate  # F.8.b: re-targeted from a zone slug to the live-world jedi_temple_main_gate (id 210). Stub never runs at runtime.
        npc: "(none)"
        npc_role: instructor
        teaches: []
        objective: "Complete the Village quest chain to unlock this path."
        npc_intro: ""
        completion:
          type: prerequisite
          flag: jedi_path_unlocked
        npc_complete: ""
        reward: {}
        next_hint: "(See locked_message at chain level.)"

  # ─── 4. JEDI PATH — INDEPENDENT (LOCKED STUB) ─────────────────────────
  #
  # F.7.j (May 4 2026) — Path B opening for Village graduates who
  # stayed with the Village rather than reporting to the Order.
  # Force-sensitive, training-bound, but NOT in the Order's ledger.
  # The chain itself is a stub at this point — the runtime tutorial
  # engine that will consume `steps:` is F.8.b's deferred work and
  # this chain shares the locked-stub shape with the Order chain
  # above. The graduation `drop_room` is the Village Common Square
  # (`village_common_square`, authored in dune_sea.yaml) — a Path B
  # graduate's "home base" rather than the Coruscant Temple.
  #
  # Why a separate chain (vs. branching steps inside `jedi_path`):
  #   - The chain abstraction is "one chain, one path through the
  #     world." Branching inside a chain breaks that contract and
  #     forces every chain consumer (verifier, smoke, chargen menu,
  #     graduation drop, achievements) to learn the branch.
  #   - Path A graduates land in Coruscant; Path B graduates land in
  #     the Village. Different `drop_room`, different
  #     `faction_alignment` (Path B is `independent`, not
  #     `jedi_order`), different `archetype_label`, different
  #     `follow_up_hint`. These differences are at the chain level,
  #     not the step level.
  #   - Future Path-B-specific content (e.g. a Hermit-mentored
  #     intermediate trial, the lightsaber-bond scene without a
  #     Council audience) can be added to `jedi_path_independent`
  #     without touching `jedi_path`.
  - chain_id: jedi_path_independent
    chain_name: "Jedi Path — Independent"
    description: >
      You are Force-sensitive and trained to be so, but the Order
      has no claim it can press without your asking. The Village is
      your home; the rest of the galaxy is open to you. You walk
      this path alone — and not alone, in the older meaning.
    archetype_label: "Jedi Padawan (Independent)"
    faction_alignment: independent
    starting_zone: tatooine_dune_sea
    prerequisites:
      - chargen_complete
      - jedi_path_unlocked         # set by the Village quest chain
                                   #   (Path B sets this too)
      - force_sensitive            # Path B mandatorily sets this
      - village_chosen_path: b     # F.7.j: only Path B graduates take
                                   #   the Independent chain.
    duration_minutes: 0
    locked: true
    locked_message: >
      The Jedi path is not available at character creation. To unlock
      it you must find a hidden village in the Jundland Wastes and
      complete the Master's trials. The Independent flavor of this
      path opens to those who stay with the Village rather than
      reporting to the Order.

    graduation:
      drop_room: village_common_square  # F.7.j: Path B graduate's home — the Village, not Coruscant.
      follow_up_hint: >
        Master Yarael remains at the Council Hut. Walk the Dune Sea
        and the wider galaxy; come back when you can.

    steps:
      - step: 1
        title: "(Locked — Village Quest Required)"
        location: village_common_square  # F.7.j: stub never runs at runtime; mirrors `jedi_path`'s pattern but anchors at the Village rather than the Temple.
        npc: "(none)"
        npc_role: instructor
        teaches: []
        objective: "Complete the Village quest chain (Path B) to unlock this path."
        npc_intro: ""
        completion:
          type: prerequisite
          flag: jedi_path_unlocked
        npc_complete: ""
        reward: {}
        next_hint: "(See locked_message at chain level.)"

  # ─── 5. SEPARATIST COMMANDO ───────────────────────────────────────────
  - chain_id: separatist_commando
    chain_name: "Separatist Commando"
    description: >
      Loyal warrior of the Confederacy. You're conscripted into a CIS
      shock-trooper unit on Geonosis, learn to operate alongside droids,
      survive your first action, and join the war on the other side.
    archetype_label: "CIS Shock Trooper"
    faction_alignment: cis
    starting_zone: geonosis_foundries
    starting_room: geonosis_foundry_briefing
    prerequisites:
      - chargen_complete
      - faction_intent: cis
    duration_minutes: 22
    locked: false

    graduation:
      credits: 500
      faction_rep:
        cis: 3
      items: ["e5_blaster_rifle", "cis_field_armor", "comlink_basic"]
      achievements: ["raised_the_red_flag"]
      drop_room: mos_eisley_market_district  # fun7: live vendor-hub (was tatooine_outskirts_cis_safehouse, an exitless tutorial pocket); Mos Eisley vendors (Kayson/Lup/Jawa) 1 hop
      follow_up_hint: >
        Your unit operates from the Tatooine safehouse. CIS missions
        on `+missions cis` carry the work — most of it covert, since
        Tatooine is technically Republic-aligned.

    steps:
      - step: 1
        title: "The Foundry Floor"
        location: geonosis_foundry_briefing
        npc: "Tactical Droid TQ-89"
        npc_role: instructor
        teaches: ["look", "+sheet"]
        objective: "Type '+sheet' to confirm your equipment for Tactical Droid TQ-89."
        command_to_type: "+sheet"
        npc_intro: >
          "[TQ-89, modulated]: Designation accepted. You are a sentient
          unit assigned to Battalion Verdant. Look around. Confirm your
          equipment via `+sheet`. Speak when ready."
        completion:
          type: command_executed
          command: "+sheet"
        npc_complete: >
          "[TQ-89]: Sentient units require greater confirmation overhead
          than droid units. Inefficient. Acceptable. Proceed to the
          training pit."
        reward: {}
        # F.8.c.2.e: text-only — no exits; the chain teleports the player
        # to the drill pit on advance.
        next_hint: "You'll be brought to the training pit. Engage the Republic simulants when combat begins."

      - step: 2
        title: "Joint Operations Drill"
        location: geonosis_foundry_drill_pit
        npc: "Squad-Lead B2-7745"
        npc_role: instructor
        # F.8.c.2.e: text-only — `follow` is not a real command; combat_won
        # advances automatically when the enemies are defeated. teaches updated
        # to reflect only the real player command used here.
        teaches: ["attack"]
        objective: "Defeat two republic combat sims with droid support."
        command_to_type: "attack"
        npc_intro: >
          "[B2-7745]: Sentient unit, move in alongside droid units.
          Engage hostiles on contact. Two Republic clone-troop simulants.
          Use `attack` to fight. Begin."
        completion:
          type: combat_won
          enemy_template: "republic_clone_sim"
          enemy_count: 2
          ally_count: 2          # B2 + tactical droid backup
        npc_complete: >
          "[B2-7745]: Engagement resolved. Sentient unit performed within
          acceptable parameters. Proceed for assignment."
        reward:
          faction_rep:
            cis: 3
        next_hint: "Return to Tactical Droid TQ-89 for your assignment."

      - step: 3
        title: "First Assignment"
        location: geonosis_foundry_briefing
        npc: "Tactical Droid TQ-89"
        npc_role: instructor
        teaches: ["+missions", "accept"]
        objective: "Accept your first CIS field deployment."
        command_to_type: "+missions"
        npc_intro: >
          "[TQ-89]: Sentient unit cleared for field assignment. The
          mission file is loaded. Use `+missions` and accept assignment
          [tutorial_cis_tatooine_dispatch]. Transport awaits."
        completion:
          type: mission_accepted
          mission_id: "tutorial_cis_tatooine_dispatch"
        npc_complete: >
          "[TQ-89]: Tatooine. Hutt-aligned territory. Republic presence
          minimal. Optimal infiltration scenario. Embark."
        reward: {}
        # F.8.c.2.e: text-only — no exits; the chain teleports the player
        # to the Tatooine safehouse on advance. Talk to Mira Kavin on arrival.
        next_hint: "You'll be transported to Tatooine. Make contact with Cell Leader Mira Kavin."

      - step: 4
        title: "Insertion on Tatooine"
        location: tatooine_outskirts_cis_safehouse
        npc: "Cell Leader Mira Kavin"
        npc_role: contact
        teaches: ["look", "talk"]
        objective: "Make contact at the Tatooine safehouse."
        npc_intro: >
          "You're the new commando. Welcome to nowhere. We don't fly
          colors here — Tatooine pretends to be Republic when it bothers
          to pretend at all. I'm Mira Kavin. I run this cell. Sit down."
        completion:
          type: talk_to_npc
          npc: "Cell Leader Mira Kavin"
        npc_complete: >
          "Your role is overt-when-needed, covert-by-default. Hutt
          Cartel turns a profitable blind eye if you don't make trouble.
          Use `+factions` to confirm your CIS standing — that's how I'll
          know you're real."
        reward:
          credits: 100
        next_hint: "Check your faction standing."

      - step: 5
        title: "Confirmed Operational"
        location: tatooine_outskirts_cis_safehouse
        npc: "Cell Leader Mira Kavin"
        npc_role: contact
        teaches: ["+factions"]
        objective: "Verify CIS faction standing."
        npc_intro: >
          "Run `+factions`. The Republic doesn't show your true rank
          but I do. You're cleared for missions on `+missions cis`.
          Don't get yourself caught. We don't extract."
        completion:
          type: command_executed
          command: "+factions"
        npc_complete: >
          "Operational. Welcome to the CIS, commando. The war is mostly
          elsewhere — your job is to keep it that way for our cell."
        reward:
          faction_rep:
            cis: 5
        next_hint: "Chain complete. Mira Kavin is your contact for ops."

  # ─── 6. SEPARATIST AGENT ──────────────────────────────────────────────
  - chain_id: separatist_agent
    chain_name: "Separatist Agent"
    description: >
      CIS infiltrator hiding in plain sight in the Republic capital.
      You're recruited at a Coruscant cantina, dead-drop a courier
      packet, and survive your first close call with Republic Security.
    archetype_label: "CIS Infiltrator / Diplomat"
    faction_alignment: cis
    starting_zone: southern_underground
    starting_room: crystal_jewel_cantina
    prerequisites:
      - chargen_complete
      - faction_intent: cis
    duration_minutes: 25
    locked: false

    graduation:
      credits: 600
      faction_rep:
        cis: 2
      items: ["concealed_blaster", "civilian_disguise_kit", "fake_republic_id"]
      achievements: ["sleeper_in_the_capital"]
      drop_room: coco_town  # fun7: live vendor-hub (was southern_underground_freight_dock, an exitless tutorial pocket)
      follow_up_hint: >
        Your handler will contact you via the fake comlink. CIS-aligned
        missions on `+missions cis` are flagged "deep cover." Avoid
        Republic-faction contact NPCs while on assignment.

    steps:
      - step: 1
        title: "The Cantina Recruitment"
        location: crystal_jewel_cantina
        npc: "Sevra Toryn"
        npc_role: instructor
        teaches: ["look", "say"]
        objective: "Hear Sevra out, then type 'say Geonosis' to signal you're in."
        command_to_type: "say Geonosis"
        npc_intro: >
          "You're alone. That's good. Sit. I've been watching you. The
          Republic has not been kind. The Confederacy is recruiting.
          Look around. If you're interested, say a word about Geonosis
          — any word. If you're not, walk out."
        completion:
          type: command_executed
          command: "say"
          contains_any: ["geonosis"]
        npc_complete: >
          "Good. The word is the contract. I'm Sevra. The Republic will
          never know your name. The Confederacy will. Take this. Don't
          read it here. Find a quiet place."
        reward:
          items: ["sealed_data_packet"]
        # F.8.c.2.e: text-only — no exits; the chain teleports the player
        # to the freight district on advance. Use the sealed packet there.
        next_hint: "You'll be brought to a quiet location. Use the sealed packet (`use sealed_data_packet`)."

      - step: 2
        title: "Reading the Packet"
        location: commercial_district_freight_district
        npc: "(none)"
        npc_role: contact
        teaches: ["examine", "use"]
        objective: "Decrypt the sealed packet."
        command_to_type: "use sealed_data_packet"
        npc_intro: >
          [Comlink, Sevra]: "Use the packet. It's keyed to your bio-sig.
          Inside is your handler ID and the dead-drop location. Memorize
          and destroy."
        completion:
          type: item_used
          item: "sealed_data_packet"
        npc_complete: >
          [Comlink, Sevra]: "Now you know the address. Coruscant Works,
          locker 144. Drop the packet there before midnight. Don't be
          followed."
        reward: {}
        # F.8.c.2.e: text-only — no exits; the chain teleports the player
        # to the locker area on advance. Type `chain attempt` to make the drop.
        next_hint: "You'll be brought to Coruscant Works. Type `chain attempt` to place the packet at locker 144 unseen."

      - step: 3
        title: "The Dead Drop"
        location: commercial_district_lockers
        npc: "(none)"
        npc_role: contact
        # F.8.c.2.e: text-only — `sneak` is a skill, not a command; `use` is
        # not the wiring for skill_check_passed. The Sneak roll fires via
        # `chain attempt` only. teaches updated; `use` dropped (not load-bearing).
        teaches: ["chain attempt"]
        objective: "Place the courier packet at locker 144 unseen."
        npc_intro: >
          [Comlink, Sevra]: "There are Republic Security cameras. Type
          `chain attempt` to roll your Sneak (vs difficulty 9) and
          approach the locker unseen. If your stealth fails, abort and
          move on — we don't repeat-attempt."
        completion:
          type: skill_check_passed
          skill: "sneak"
          difficulty: 9
          on_fail: "abort_step_no_retry"   # narrative only — engine handles
        npc_complete: >
          [Comlink, Sevra]: "Drop confirmed. Get out. Republic patrol
          passes through in two minutes."
        reward:
          faction_rep:
            cis: 3
        # F.8.c.2.e: text-only — no exits; "Move." was an impossible
        # directional hint. Step advances automatically on skill success.
        next_hint: "Drop made. The chain will advance automatically."

      - step: 4
        title: "Close Call"
        location: commercial_district_freight_corridor
        npc: "Republic Security Officer Daln"
        npc_role: antagonist
        # F.8.c.2.e: text-only — `bluff` is not a command; the skill rolled is
        # Con (not Bluff). `say` is not the wiring for skill_check_passed.
        # `chain attempt` is the only trigger. teaches updated; `say` dropped
        # (not load-bearing for completion). If Con roll fails, fight instead.
        teaches: ["chain attempt"]
        objective: "Talk past Republic Security."
        npc_intro: >
          "You. Stop. ID and reason for being on this level. Cargo
          handlers were dismissed an hour ago. Speak."
          [Type `chain attempt` to talk your way past (Con vs difficulty 10).
          If the bluff fails you'll have to fight.]
        completion:
          type: skill_check_passed
          skill: "con"
          difficulty: 10
          fallback:
            type: combat_won
            enemy_template: "republic_security_officer"
        npc_complete: >
          "...alright. Move along. Curfew on this level is twenty-
          two hundred. Don't make me see you again."
        reward:
          credits: 100
          faction_rep:
            cis: 3
        # F.8.c.2.e: text-only — no exits in tutorial rooms; chain teleports
        # the player to the freight dock on advance.
        next_hint: "You'll be brought to the freight dock. Find Sevra Toryn to confirm your status."

      - step: 5
        title: "Operational Confirmation"
        location: southern_underground_freight_dock
        npc: "Sevra Toryn"
        npc_role: contact
        teaches: ["+factions"]
        objective: "Confirm operational status with Sevra."
        npc_intro: >
          "You made it. That's not nothing. Run `+factions` — your CIS
          rank is logged but not visible to the Republic. The fake ID
          is in the box. Carry it. Use it."
        completion:
          type: command_executed
          command: "+factions"
        npc_complete: >
          "Welcome to the Confederacy, agent. You don't exist on any
          Republic record. That's the only protection we can give you.
          Make it count."
        reward:
          items: ["fake_republic_id", "encrypted_comlink"]
          faction_rep:
            cis: 3
        next_hint: "Chain complete. Stay quiet. Stay alive."

  # ─── 7. BOUNTY HUNTER ─────────────────────────────────────────────────
  - chain_id: bounty_hunter
    chain_name: "Bounty Hunter"
    description: >
      Independent operator licensed by the Bounty Hunters Guild. You're
      vetted by a Guild adjudicator on Nar Shaddaa, take a low-tier
      contract, capture or kill the target, and get your Guild card.
    archetype_label: "Licensed Bounty Hunter"
    faction_alignment: bounty_hunters_guild
    starting_zone: nar_shaddaa_promenade
    starting_room: nar_shaddaa_bhg_chapter_house
    prerequisites:
      - chargen_complete
      - faction_intent: bounty_hunters_guild
    duration_minutes: 22
    locked: false

    graduation:
      credits: 700              # higher because Guild bounty paid out
      faction_rep:
        bounty_hunters_guild: 3
      items: ["bhg_license_card", "tracking_fob", "stun_baton"]
      achievements: ["first_contract"]
      drop_room: nar_shaddaa_promenade_main  # fun7: live vendor-hub (was nar_shaddaa_promenade_bhg_lounge, an exitless tutorial pocket)
      follow_up_hint: >
        Pull contracts from the Guild board (`+bounties`). The chapter
        house lounge has standing-rate jobs and rumor-tier targets. Pay
        your Guild dues monthly or your card lapses.

    steps:
      - step: 1
        title: "Vetting at the Chapter House"
        location: nar_shaddaa_bhg_chapter_house
        npc: "Adjudicator Kaeleth Voss"
        npc_role: instructor
        teaches: ["look", "+sheet"]
        objective: "Type '+sheet' to show Adjudicator Voss your record and pass intake."
        command_to_type: "+sheet"
        npc_intro: >
          "Another one. Sit down. I'm Voss, BHG adjudicator for this
          chapter. I'll vet you. Look around — this is where you'll
          collect work, get drinks, and complain about other hunters
          taking your contracts. Show me your sheet via `+sheet`."
        completion:
          type: command_executed
          command: "+sheet"
        npc_complete: >
          "Acceptable. Combat skills not bad, intelligence not too low.
          You pass intake. The Guild doesn't formally license you until
          you bring in a contract. Take a fresh one off the board."
        reward: {}
        next_hint: "The bounty board is on the back wall. Use `+bounties`."

      - step: 2
        title: "Picking the Contract"
        location: nar_shaddaa_bhg_chapter_house
        npc: "Adjudicator Kaeleth Voss"
        npc_role: instructor
        teaches: ["+bounties", "accept"]
        objective: "Accept a tier-1 contract from the board."
        command_to_type: "+bounties"
        npc_intro: >
          "Lowest tier. Don't get cute. The smart money on your first
          contract is `Tarko Vinn` — petty smuggler, last seen in the
          warrens. Use `+bounties` to view the board and accept."
        completion:
          type: bounty_accepted
          bounty_id: "tutorial_bhg_tarko_vinn"
        npc_complete: >
          "Good pick. Tarko's not armed past a hold-out. Bring him in
          alive — capture pays better than corpse on tier-1. The
          warrens are downstairs."
        reward: {}
        # F.8.c.2.e: text-only — no exits in tutorial rooms; the chain
        # teleports the player to the warrens on advance.
        next_hint: "You'll be brought to the warrens. Type `chain attempt` to track down Tarko Vinn."

      - step: 3
        title: "Tracking the Mark"
        location: nar_shaddaa_warrens_safehouse  # F.8.b: re-targeted from a zone slug to a real tutorial-zone room.
        npc: "Tarko Vinn"
        npc_role: antagonist
        teaches: ["chain attempt"]
        objective: "Search the warrens for Tarko Vinn (chain attempt)."
        npc_intro: >
          [Tracking fob beeps]: "Tarko Vinn — proximity 30m. He's
          hiding in here somewhere. Type `chain attempt` to search the
          warrens and run him down."
        # F.8.c.2.e: the npc used to say "use scan/search", but `scan`
        # is the ship command (errors dirtside) and `search` runs an
        # unrelated room check — neither advances the chain. The Search
        # roll for this step fires via `chain attempt` (the wiring for
        # every skill_check_passed step).
        completion:
          type: skill_check_passed
          skill: "search"
          difficulty: 8
        npc_complete: >
          [Vinn, spotting you]: "Oh hells. Hells. You're a Guild card?
          Look — I can pay. I can pay more than the bounty. Listen —"
        reward:
          faction_rep:
            bounty_hunters_guild: 3
        next_hint: "Capture him. Stun preferred — pay's better."

      - step: 4
        title: "The Capture"
        location: nar_shaddaa_warrens_safehouse  # F.8.b: re-targeted from a zone slug to a real tutorial-zone room.
        npc: "Tarko Vinn"
        npc_role: antagonist
        teaches: ["attack"]
        objective: "Subdue Tarko Vinn — `attack Tarko Vinn stun` pays more."
        npc_intro: >
          [Vinn, drawing hold-out blaster]: "Last warning, hunter."
        completion:
          type: combat_won
          enemy_template: "tarko_vinn_petty_smuggler"
          stun_bonus_credits: 200
        npc_complete: >
          [Vinn, dropping]: "...fine. Fine. Tell Voss I'm cooperating.
          I'm cooperating."
        reward:
          credits: 0          # paid at chain graduation
        # F.8.c.2.e: `stun` is not a standalone command — it's a mode
        # of `attack` (`attack <target> stun`). next_hint no longer
        # says "type up": the chain teleports the player back to the
        # chapter house on advance (tutorial rooms have no exits).
        next_hint: "Vinn is down — your Guild card is waiting back at the chapter house."

      - step: 5
        title: "Collecting the Bounty"
        location: nar_shaddaa_bhg_chapter_house
        npc: "Adjudicator Kaeleth Voss"
        npc_role: instructor
        teaches: ["+factions"]
        objective: "Deliver Vinn and receive your Guild card."
        npc_intro: >
          "Vinn. Alive. Better than I expected. Your card is keyed to
          your sheet now — run `+factions` to see your standing. Welcome
          to the Guild. The bounty board's all yours."
        completion:
          type: command_executed
          command: "+factions"
        npc_complete: >
          "Licensed. Don't lose the card — replacements cost more than
          you have. Don't kill marks tagged 'capture only.' Don't poach
          another hunter's contract. Otherwise — the work is yours."
        reward:
          items: ["bhg_license_card", "tracking_fob"]
          faction_rep:
            bounty_hunters_guild: 5
        next_hint: "Chain complete. The board updates hourly."

  # ─── 8. SMUGGLER ──────────────────────────────────────────────────────
  - chain_id: smuggler
    chain_name: "Smuggler"
    description: >
      Independent freight runner. You start crewing on a tramp ship at
      Mos Eisley, learn the smuggling system, take a hot delivery to
      Nar Shaddaa, and walk away with your own contacts list.
    archetype_label: "Smuggler / Tramp Spacer"
    faction_alignment: independent
    starting_zone: tatooine_spaceport
    starting_room: tatooine_spaceport_dock_94
    prerequisites:
      - chargen_complete
      # No faction_intent gate — Smuggler is the unaligned default path.
    duration_minutes: 22
    locked: false

    graduation:
      credits: 800
      faction_rep:
        independent: 5
        hutt_cartel: 3        # graduating with a Hutt favor on file
      items: ["spacer_ident", "comlink_basic", "smugglers_baffle_kit"]
      achievements: ["first_run"]
      drop_room: nar_shaddaa_promenade_main  # fun7: live vendor-hub (was nar_shaddaa_landing_dock_e, an exitless tutorial pocket); smuggler has no faction commissary so a world vendor is mandatory
      follow_up_hint: >
        Hutt Cartel and independent missions on `+missions independent`.
        Smuggling cargo via the cargo system pays best on the
        Tatooine ↔ Nar Shaddaa run. Avoid Republic patrols at Coruscant
        boundary — they scan harder.

    steps:
      - step: 1
        title: "Crewing Up"
        location: tatooine_spaceport_dock_94
        npc: "Captain Reggi Voss"
        npc_role: instructor
        teaches: ["look", "+sheet"]
        objective: "Type '+sheet' so Captain Voss can size you up and sign you on."
        command_to_type: "+sheet"
        npc_intro: >
          "You're the new hand? Look you over — `+sheet` if you don't
          mind. I run a YT-1300 called the *Mynock's Promise*. Crew of
          three, soon four. Show me you're not useless and I'll teach
          you the trade."
        completion:
          type: command_executed
          command: "+sheet"
        npc_complete: >
          "Good enough. Welcome aboard. We've got a run to Nar Shaddaa
          tonight. Cargo's coming up from the bazaar. Help me load."
        reward: {}
        # F.8.c.2.e: text-only — no exits in tutorial rooms; the chain
        # teleports the player to the market on advance.
        next_hint: "You'll be brought to the market. Find Hutt Broker Vresh and `examine` the cargo crate."

      - step: 2
        title: "The Cargo"
        location: tatooine_market_smugglers_alley
        npc: "Hutt Broker Vresh"
        npc_role: contact
        teaches: ["examine", "talk"]
        objective: "Take delivery of the cargo from Vresh."
        command_to_type: "examine crate"
        npc_intro: >
          "[Vresh, in Huttese-laced Basic]: Voss sent you. Crate is
          there. Examine it — you must know what you carry, even if
          we both pretend not to. Then take it. Quickly."
        completion:
          type: command_executed
          command: "examine"
          target_contains: "crate"
        npc_complete: >
          "[Vresh]: Spice. You did not see this. Voss did not see this.
          Nar Shaddaa contact pays on delivery. Go."
        reward:
          items: ["sealed_cargo_crate"]
        next_hint: "Back to the dock. Voss is waiting."

      - step: 3
        title: "Lift Off"
        location: tatooine_spaceport_dock_94
        npc: "Captain Reggi Voss"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Report to Captain Voss to lift off for Nar Shaddaa."
        command_to_type: "talk Captain Reggi Voss"
        npc_intro: >
          "Cargo aboard? Good. Strap in. I'll handle the controls — you
          watch the sensor board. Tell me when you're set and we'll
          lift. Welcome to the trade."
        # F.8.c.2.e: was `room_entered: tatooine_smuggler_holdout` —
        # unreachable (no exits; the inter-step teleport doesn't fire
        # the room_entered hook). Re-anchored to talking to Captain Voss
        # (present at Docking Bay 94); advancing teleports the player to
        # step 4's room, smuggler_ship_cockpit (in transit).
        completion:
          type: talk_to_npc
          npc: "Captain Reggi Voss"
        npc_complete: >
          "Hyperspace in three. Smooth so far. The dangerous part's
          dropping out — Nar Shaddaa orbital screens harder than
          Tatooine bothers to."
        reward: {}
        next_hint: "Hyperspace transit. Sit tight."

      - step: 4
        title: "Customs"
        location: smuggler_ship_cockpit  # F.8.b: re-targeted from a zone slug to a real tutorial-zone room (in-transit ship cockpit).
        npc: "Customs Inspector Drall"
        npc_role: antagonist
        # F.8.c.2.e: text-only — `bluff` is not a command; the skill rolled is
        # Con. `say` is not the wiring for skill_check_passed. `chain attempt`
        # is the only trigger. teaches updated; `say` dropped (not load-bearing).
        teaches: ["chain attempt"]
        objective: "Talk past Nar Shaddaa customs (or outfly them)."
        npc_intro: >
          "[Customs, on comm]: *Mynock's Promise*. Routine inspection.
          State cargo manifest and prepare for boarding."
          [Type `chain attempt` to bluff customs (Con vs difficulty 9).
          If that fails, Voss can try to outfly them (Space Transports vs 10).]
        completion:
          type: skill_check_passed
          skill: "con"
          difficulty: 9
          fallback:
            type: skill_check_passed
            # F.8.c.2.e: was `starship_piloting` (not a real WEG skill).
            # `space_transports` is the canonical skill for flying a
            # YT-1300 and resolves in data/skills.yaml.
            skill: "space_transports"
            difficulty: 10
            on_fail_narrative: "Cargo seized — Voss covers, you owe him."
        npc_complete: >
          "[Customs]: ...routine clearance. Approved. Land at Dock E."
          " [Voss, off-comm]: Nice work. Crate's still ours."
        reward:
          faction_rep:
            independent: 5
        # F.8.c.2.e: text-only — no exits; the chain teleports the player
        # to Dock E on advance. Talk to Underworld Contact Dyn there.
        next_hint: "You'll be brought to Dock E. Deliver the cargo to Dyn with `give`."

      - step: 5
        title: "Delivery and Pay"
        location: nar_shaddaa_landing_dock_e
        npc: "Underworld Contact Dyn"
        npc_role: contact
        teaches: ["give", "+factions"]
        objective: "Deliver the cargo to Dyn and check your standing."
        npc_intro: >
          "You're Voss's new hand. Crate. Quietly. Voss's cut goes to
          him; yours goes to you direct. The Hutts will hear you did
          good — `+factions` to confirm your standing afterward."
        completion:
          type: command_executed
          command: "+factions"
          requires_first:
            - command: "give"
              target_contains: "crate"
              target_npc: "Dyn"
        npc_complete: >
          "Independent — that's your sheet. Hutt favor — that's mine,
          for now. Voss likes you. He's already asked if you want a
          steady berth. Up to you."
        reward:
          credits: 200
          items: ["spacer_ident", "smugglers_baffle_kit"]
          faction_rep:
            hutt_cartel: 5
        next_hint: "Chain complete. Voss is at the cantina if you want steady work."

  # ─── 9. SHIPWRIGHT / TRADER ───────────────────────────────────────────
  - chain_id: shipwright_trader
    chain_name: "Shipwright / Trader"
    description: >
      Apprentice in the Kuat shipyards. You start in a KDY apprentice
      bay, learn the survey-and-craft loop on a sub-component repair,
      take a small repair contract, and graduate as a Shipwrights' Guild
      apprentice with your first ship-side tools.
    archetype_label: "KDY Apprentice / Trader"
    faction_alignment: shipwrights_guild
    starting_zone: kuat_main_spaceport
    starting_room: kdy_apprentice_bay_7
    prerequisites:
      - chargen_complete
      - faction_intent: shipwrights_guild
    duration_minutes: 22
    locked: false

    graduation:
      credits: 400              # lower cash, more gear
      faction_rep:
        shipwrights_guild: 3
        mechanics_guild: 2
      items:
        - "shipwright_toolkit"
        - "diagnostic_scanner"
        - "kdy_apprentice_pass"
      achievements: ["first_repair"]
      drop_room: kuat_ring_commercial  # fun7: live vendor-hub (was kuat_orbital_apprentice_lounge, an exitless tutorial pocket)
      follow_up_hint: >
        Shipwrights' Guild contracts post on `+missions shipwrights_guild`.
        The Kuat orbital array has standing repair jobs; harder ones come
        with materials shortages. Crafting commands (`+craft`, `+survey`)
        unlock more as your skills grow.

    steps:
      - step: 1
        title: "Apprentice Intake"
        location: kdy_apprentice_bay_7
        npc: "Foreman Andrim Purkis"
        npc_role: instructor
        teaches: ["look", "+sheet"]
        objective: "Type '+sheet' to show Foreman Purkis your starting tools."
        command_to_type: "+sheet"
        npc_intro: >
          "You're the new apprentice. I'm Purkis — Shipwrights' Guild,
          KDY contracted. House Andrim runs this bay. Look around. Use
          `+sheet` to confirm your starting tools. Don't break anything."
        completion:
          type: command_executed
          command: "+sheet"
        npc_complete: >
          "Adequate. You'll learn the rest on the job. Apprentice work
          is repair, not build — KDY doesn't trust new hands with new
          frames. Diagnostic bench is east."
        reward: {}
        next_hint: "Diagnostic bench is east."

      - step: 2
        title: "Reading the Damage"
        location: kdy_apprentice_diag_bench
        npc: "Foreman Andrim Purkis"
        npc_role: instructor
        teaches: ["scan", "examine"]
        objective: "Diagnose the damaged hyperdrive subsystem."
        npc_intro: >
          "Subsystem on the bench is from a Venator that took a Vulture
          droid hit last week. Use `scan` to read its diagnostic, then
          `examine subsystem` to confirm the damage type. I'll wait."
        completion:
          type: command_executed
          command: "examine"
          target_contains: "subsystem"
          requires_first:
            - command: "scan"
              target_contains: "subsystem"
        npc_complete: >
          "Capacitor coil — burnt-through. Standard fault. Now you fetch
          a replacement coil from the parts crib. `+survey` checks the
          parts pool; `+craft fetch` pulls the part."
        reward:
          faction_rep:
            shipwrights_guild: 3
        next_hint: "Parts crib via `+survey`."

      - step: 3
        title: "The Parts Crib"
        location: kdy_apprentice_parts_crib
        npc: "(none)"
        npc_role: contact
        teaches: ["survey", "+craft"]
        objective: "Requisition a capacitor coil from the parts crib."
        command_to_type: "+craft"
        npc_intro: >
          [Comlink, Purkis]: "`survey` shows what's in stock. The part
          you want is a capacitor coil. Type `+craft` to open the
          requisition interface and pull it, then bring it back."
        # F.8.c.2.e: was `item_acquired: capacitor_coil_t1` via the
        # phantom `+craft fetch` subcommand — no such producer existed,
        # the part was granted nowhere, so the step was unfinishable.
        # Now completes on the real `+craft` command and grants the
        # coil as this step's reward (delivered on advance) so the
        # repair bench step has the part in hand.
        completion:
          type: command_executed
          command: "+craft"
        npc_complete: >
          [Comlink, Purkis]: "Got it. Back to the bench. Don't drop it
          — KDY apprentice damage tickets come out of your pay."
        reward:
          items: ["capacitor_coil_t1"]
        next_hint: "Back to the diagnostic bench."

      - step: 4
        title: "The Repair"
        location: kdy_apprentice_diag_bench
        npc: "Foreman Andrim Purkis"
        npc_role: instructor
        teaches: ["+craft repair"]
        objective: "Repair the hyperdrive subsystem."
        npc_intro: >
          "Subsystem on the bench, coil in your inventory. `+craft repair
          subsystem capacitor_coil_t1`. If the skill check passes the
          subsystem comes back online. If it fails, we take it apart
          and start over — no charge to you on the first attempt."
        completion:
          type: skill_check_passed
          # F.8.c.2.e: was `starship_repair` — not a real WEG skill, so
          # it silently rolled raw Perception. `space_transport_repair`
          # is the canonical skill (the bench piece is from a YT-class
          # space transport) and resolves in data/skills.yaml.
          skill: "space_transport_repair"
          difficulty: 8
          on_fail: "retry_allowed"
        npc_complete: >
          "Subsystem online. Test bench reads green. That's a real
          repair — your first. Now we get you signed on the Guild
          rolls."
        reward:
          credits: 100
          faction_rep:
            shipwrights_guild: 5
        next_hint: "Apprentice lounge for Guild signing."

      - step: 5
        title: "Guild Signing"
        location: kuat_orbital_apprentice_lounge
        npc: "Guildmaster Sera Kavel"
        npc_role: contact
        teaches: ["+factions"]
        objective: "Sign the Shipwrights' Guild apprentice register."
        npc_intro: >
          "Purkis vouched. That's worth something around here. I'm
          Sera Kavel, Guildmaster for the orbital. Your apprentice
          card and toolkit are on the table. Run `+factions` once you
          take them — that's how I know it's real."
        completion:
          type: command_executed
          command: "+factions"
        npc_complete: >
          "Apprentice. The work pays in skill bumps and contacts more
          than credits at this stage — but the credits will come.
          Welcome to the Guild."
        reward:
          items:
            - "shipwright_toolkit"
            - "diagnostic_scanner"
            - "kdy_apprentice_pass"
          faction_rep:
            shipwrights_guild: 2
        next_hint: "Chain complete. The contract board is yours."

  # ═══════════════════════════════════════════════════════════════════════
  # MASTER-TRAINER QUESTLINES (kind: questline) — T5 schematic unlocks
  # ═══════════════════════════════════════════════════════════════════════
  # Drop B of the T5-questline arc (2026-06-13). These are MID-GAME
  # questlines, NOT chargen-assigned: a veteran starts one deliberately
  # via `mastery start <id>` (or an NPC offer on talk). `kind: questline`
  # keeps them out of the chargen picker (engine/creation_wizard.py) and
  # into the `quests`/`mastery` surface. Completing one + holding faction
  # rep >= 50 unlocks the trainer's t5 schematic (the gate lives on the
  # schematic via gated_by_questline / gated_faction / gated_min_rep,
  # enforced in parser/crafting_commands.py::trainer_curriculum).
  #
  # Reachability rules these MUST satisfy (tests/test_chain_corpus_
  # reachability_invariant.py): every `location` is a REAL world-room
  # slug; NO room_entered / item_acquired completions; every command
  # literal is registered; every skill_check skill is canonical. These
  # questlines run in real, exit-bearing world rooms (Jundland Wastes,
  # contested band) — the state-machine inter-step teleport relays the
  # player between them.

  # ─── Q1. JEDI MASTER — "The Hermit's Trial" → t5 lightsaber ───────────
  - chain_id: master_jedi_lightsaber
    chain_name: "The Hermit's Trial"
    description: >
      A reclusive Jedi Master in the Jundland Wastes will teach the
      forging of a master-crafted lightsaber — but only to one who can
      find the kyber's song, face the desert's guardians, and return
      with a still mind. Rich, dangerous, end-game.
    archetype_label: "Master-Crafted Lightsaber Trial"
    faction_alignment: jedi_order
    starting_zone: tatooine_jundland
    starting_room: jundland_hidden_cave
    prerequisites:
      - chargen_complete
    duration_minutes: 40
    locked: false
    kind: questline

    graduation:
      credits: 500
      faction_rep:
        jedi_order: 3
      items: []
      achievements: ["hermits_trial"]
      drop_room: jundland_hidden_cave
      follow_up_hint: >
        Master Vehn will now teach the Master-Crafted Lightsaber. With
        the Jedi Order honored (rep 50+) you can `learn` it from him —
        `talk` to begin, then gather q75+ kyber and craft.

    steps:
      - step: 1
        title: "The Hermit in the Wastes"
        location: jundland_hidden_cave
        npc: "Master Vehn Tasaal"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Master Vehn Tasaal in his hidden cave."
        npc_intro: >
          "You found the cave. Few do. I am Vehn Tasaal — once of the
          Order, now of the desert. You seek the forging of a true
          blade. That knowledge is not given; it is earned. First, sit.
          `meditate`. The wastes are loud to those who cannot quiet
          themselves."
        completion:
          type: talk_to_npc
          npc: "Master Vehn Tasaal"
        npc_complete: >
          "Good. You came, and you listened. Now — quiet your mind.
          `meditate` here, and tell me what you hear beneath the wind."
        # Per-step credits/faction_rep ARE consumed as of the
        # apply_step_rewards extension (T5-questline arc, 2026-06-13).
        reward:
          faction_rep:
            jedi_order: 2
        next_hint: "Quiet your mind — `meditate` in the cave."

      - step: 2
        title: "A Still Mind"
        location: jundland_hidden_cave
        npc: "Master Vehn Tasaal"
        npc_role: instructor
        teaches: ["meditate"]
        objective: "Meditate to hear the kyber's resonance."
        npc_intro: >
          "Sit. Breathe. `meditate`. The crystal you will one day bind
          into a blade sings even now, out in the canyons. You cannot
          forge what you cannot hear."
        completion:
          type: command_executed
          command: "meditate"
        npc_complete: >
          "There. You felt it — a thread of song, eastward, through
          Beggar's Canyon. Follow it. `search` the canyon until you
          find its source. The desert will not make it easy."
        reward:
          faction_rep:
            jedi_order: 3
        next_hint: "Track the resonance — `search` in Beggar's Canyon."

      - step: 3
        title: "The Kyber's Song"
        location: jundland_beggars_canyon
        npc: "(none)"
        npc_role: contact
        teaches: ["search"]
        objective: "Search Beggar's Canyon for the kyber resonance."
        npc_intro: >
          [The song is faint here, woven into the canyon's echoes.]
          "Trust the Force, not your eyes," Vehn's voice lingers in your
          memory. "`search` — and let the song guide your hands."
        completion:
          type: skill_check_passed
          skill: "search"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [You find it — a seam of raw kyber, humming, in the canyon
          wall. But you are not alone. A krayt-spawn has been stalking
          the song too, and it has found YOU.]
        reward:
          faction_rep:
            jedi_order: 3
        next_hint: "Something hunts the song. Defend yourself."

      - step: 4
        title: "The Desert's Guardian"
        location: jundland_krayt_graveyard
        npc: "(none)"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Defeat the canyon krayt-spawn."
        npc_intro: >
          [The krayt-spawn drives you back through the canyon to the
          dragon graveyard — a place of bones and old death. Here it
          turns to fight. `attack` it, `dodge` its lunges. The kyber's
          song steadies your hand.]
        completion:
          type: combat_won
          enemy_template: "jundland_krayt_spawn"
          enemy_count: 1
        npc_complete: >
          [The guardian falls among the bones of its elders. The song
          is yours now — and so is the silence after. Return to Master
          Vehn.]
        reward:
          credits: 200
          faction_rep:
            jedi_order: 4
        next_hint: "Return to Master Vehn in the hidden cave."

      - step: 5
        title: "The Trial's End"
        location: jundland_hidden_cave
        npc: "Master Vehn Tasaal"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Master Vehn to complete the trial."
        npc_intro: >
          "You came back. With the song, with a still mind, with the
          desert's dust on you and its guardian behind you. That is the
          trial. Few finish it. Fewer deserve to."
        completion:
          type: talk_to_npc
          npc: "Master Vehn Tasaal"
        npc_complete: >
          "I will teach you the forging of a master-crafted blade. Talk
          to me when the Order trusts you as I now do — and bring kyber
          worthy of the work. Go in the Light."
        reward:
          faction_rep:
            jedi_order: 3
        next_hint: >
          Trial complete. `talk` to Master Vehn to learn the
          Master-Crafted Lightsaber (Jedi Order rep 50+ required).

  # ─── Q2. HUTT WEAPONSMITH — "The Pit Boss's Favor" → t5 blaster ──────
  - chain_id: master_hutt_blaster
    chain_name: "The Pit Boss's Favor"
    description: >
      A Hutt-cartel weaponsmith who runs guns out of the Nar Shaddaa
      fighting pits will teach the building of a top-spec blaster rifle —
      to someone who proves useful, settles a debt in the Undercity, and
      walks back out of the pits alive. Rich, dangerous, end-game.
    archetype_label: "Top-Spec Blaster Rifle Trial"
    faction_alignment: hutt_cartel
    starting_zone: nar_shaddaa_undercity
    starting_room: fighting_pits
    prerequisites:
      - chargen_complete
    duration_minutes: 40
    locked: false
    kind: questline

    graduation:
      credits: 500
      faction_rep:
        hutt_cartel: 3
      items: []
      achievements: ["pit_bosss_favor"]
      drop_room: fighting_pits
      follow_up_hint: >
        Vossk will now build you a Top-Spec Blaster Rifle. With the Hutt
        Cartel honored (rep 50+) you can `learn` it — `talk` to begin,
        then bring a q75+ weapons capacitor core and craft.

    steps:
      - step: 1
        title: "The Weaponsmith of the Pits"
        location: fighting_pits
        npc: "Vossk the Armorer"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Find Vossk the Armorer at the fighting pits."
        npc_intro: >
          "You want the good iron — the top-spec work, not the junk the
          cartel sells topside. Heh. Everyone does. I build for those who
          are USEFUL to the cartel. First, `search` the pits — somebody
          stashed a debt-marker chit down here and the boss wants it
          found before the next fight."
        completion:
          type: talk_to_npc
          npc: "Vossk the Armorer"
        npc_complete: >
          "Go on. `search` the pits. The chit's here somewhere — under a
          loose grate, behind the betting cage. Bring it to me."
        reward:
          faction_rep:
            hutt_cartel: 2
        next_hint: "Find the debt-marker — `search` the fighting pits."

      - step: 2
        title: "The Debt-Marker"
        location: fighting_pits
        npc: "Vossk the Armorer"
        npc_role: instructor
        teaches: ["search"]
        objective: "Search the fighting pits for the cartel's debt-marker."
        npc_intro: >
          "It's down here. Cartel chits don't walk off on their own —
          someone hid it. `search`. Use your eyes; the pit crowd won't
          help you."
        completion:
          type: command_executed
          command: "search"
        npc_complete: >
          "There it is. Good. Now — the deadbeat who owes on that chit is
          holed up in the Spice Den, and he won't pay quiet. Lean on him.
          You'll need to `intimidate` your way past his nerve."
        reward:
          faction_rep:
            hutt_cartel: 2
        next_hint: "Collect the debt at the Spice Den — `chain attempt`."

      - step: 3
        title: "Collecting the Debt"
        location: spice_den
        npc: "(none)"
        npc_role: contact
        teaches: ["intimidate"]
        objective: "Intimidate the deadbeat into paying the cartel's debt."
        npc_intro: >
          [The deadbeat is slumped in a Spice Den booth, glassy-eyed but
          armed. The chit says he owes. Vossk says collect.] "Make him
          understand," Vossk had said. Steady your nerve and lean hard —
          `chain attempt` to apply pressure.
        completion:
          type: skill_check_passed
          skill: "intimidation"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [He pays — fast, hands shaking. But debt-collecting in the
          Undercity draws attention, and a pit enforcer who works the
          OTHER cartel decides you're worth rolling on your way out.]
        reward:
          faction_rep:
            hutt_cartel: 3
        next_hint: "An enforcer blocks your way out. Fight."

      - step: 4
        title: "No Quiet Exit"
        location: undercity_depths
        npc: "(none)"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Defeat the rival-cartel enforcer."
        npc_intro: >
          [The enforcer corners you in the Undercity depths — a slab of
          muscle with a vibro-axe and a grudge. No talking past this one.
          `attack` him, `dodge` the axe.]
        completion:
          type: combat_won
          enemy_template: "undercity_cartel_enforcer"
          enemy_count: 1
        npc_complete: >
          [The enforcer goes down hard. The depths go quiet. You've got
          the cartel's credits and a story Vossk will like. Back to the
          pits.]
        reward:
          credits: 200
          faction_rep:
            hutt_cartel: 4
        next_hint: "Return to Vossk at the fighting pits."

      - step: 5
        title: "Useful Enough"
        location: fighting_pits
        npc: "Vossk the Armorer"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Vossk to finish the job."
        npc_intro: >
          "Debt collected, enforcer flat, and you walked back. Heh. The
          boss noticed. THAT'S useful."
        completion:
          type: talk_to_npc
          npc: "Vossk the Armorer"
        npc_complete: >
          "I'll build you the top-spec iron. Come back when the cartel
          trusts you proper — and bring me a capacitor core worth the
          work. Don't make me regret it."
        reward:
          faction_rep:
            hutt_cartel: 3
        next_hint: >
          Trial complete. `talk` to Vossk to learn the Top-Spec Blaster
          Rifle (Hutt Cartel rep 50+ required).

  # ─── Q3. REPUBLIC HYPERDRIVE SPECIALIST — "Field Test" → t5 hyperdrive ─
  - chain_id: master_republic_hyperdrive
    chain_name: "Field Test: Hyperdrive"
    description: >
      A Republic engineer-corps officer dug into a forward position on
      Geonosis will teach the building of a hyperdrive surge converter —
      to an engineer who can diagnose a battle-damaged drive under fire
      and hold the line while the test runs. Rich, dangerous, end-game.
    archetype_label: "Hyperdrive Surge Converter Trial"
    faction_alignment: republic
    starting_zone: geonosis_deep_hive
    starting_room: geonosis_cis_command_post
    prerequisites:
      - chargen_complete
    duration_minutes: 40
    locked: false
    kind: questline

    graduation:
      credits: 500
      faction_rep:
        republic: 3
      items: []
      achievements: ["field_test_hyperdrive"]
      drop_room: geonosis_cis_command_post
      follow_up_hint: >
        Lieutenant Corso will sign off on the Hyperdrive Surge Converter.
        With the Republic honored (rep 50+) you can `learn` it — `talk`
        to begin, then bring q75+ scavenged Republic tech and craft.

    steps:
      - step: 1
        title: "The Engineer-Corps Forward Post"
        location: geonosis_cis_command_post
        npc: "Lieutenant Corso Venn"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Report to Lieutenant Corso Venn at the forward post."
        npc_intro: >
          "Engineer-corps, forward of the line. You want the surge-
          converter spec — that's drive work nobody hands out on a
          requisition form. We earn it in the field. There's a downed
          gunship drive on this position took a hit in the push. `scan`
          it, tell me what's wrong with it."
        completion:
          type: talk_to_npc
          npc: "Lieutenant Corso Venn"
        npc_complete: >
          "Drive's on the bench behind me. `scan` the hyperdrive — read
          its diagnostic before you touch anything. Field rule one."
        reward:
          faction_rep:
            republic: 2
        next_hint: "Diagnose the drive — `scan` the hyperdrive."

      - step: 2
        title: "Reading the Damage"
        location: geonosis_cis_command_post
        npc: "Lieutenant Corso Venn"
        npc_role: instructor
        teaches: ["scan"]
        objective: "Scan the battle-damaged hyperdrive."
        npc_intro: >
          "`scan` the drive. A surge converter only works if you know
          where the surge went WRONG. Read it."
        completion:
          type: command_executed
          command: "scan"
        npc_complete: >
          "Surge-line burnout — textbook. Now the field part: I need you
          to bench-test a converter prototype while it's live. That's a
          `space transports repair` job under pressure. `chain attempt`
          when you're ready to run the test."
        reward:
          faction_rep:
            republic: 2
        next_hint: "Run the live bench test — `chain attempt`."

      - step: 3
        title: "The Live Test"
        location: geonosis_cis_command_post
        npc: "Lieutenant Corso Venn"
        npc_role: instructor
        teaches: ["repair"]
        objective: "Bench-test the surge converter prototype."
        npc_intro: >
          [The prototype is live on the bench, drawing power off the
          forward post's reactor. One wrong move and it overloads.]
          "Steady hands, engineer. `chain attempt` — `space transports
          repair` against the test rig."
        completion:
          type: skill_check_passed
          skill: "space_transports_repair"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [The converter holds — clean surge, no overload. Then the post
          alarm goes: a CIS droid probe-and-patrol found your position,
          drawn by the reactor draw. They're inbound. Hold the line.]
        reward:
          faction_rep:
            republic: 3
        next_hint: "CIS droids inbound. Defend the post."

      - step: 4
        title: "Hold the Line"
        location: geonosis_upper_tunnel
        npc: "(none)"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Defeat the CIS droid patrol."
        npc_intro: >
          [B1s push up the hive tunnel toward the post, blasters up. The
          test's done; now you cover the withdrawal. `attack` the
          droids, `dodge` their fire.]
        completion:
          type: combat_won
          enemy_template: "geonosis_b1_patrol_droid"
          enemy_count: 1
        npc_complete: >
          [The last droid drops, optics dark. The post holds. Corso's
          prototype data is safe — and so is your field record.]
        reward:
          credits: 200
          faction_rep:
            republic: 4
        next_hint: "Report back to Lieutenant Corso."

      - step: 5
        title: "Field-Certified"
        location: geonosis_cis_command_post
        npc: "Lieutenant Corso Venn"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Report your field test to Lieutenant Corso."
        npc_intro: >
          "Converter test green, position held, droids down. That's a
          field cert in my book — the kind requisition forms can't give."
        completion:
          type: talk_to_npc
          npc: "Lieutenant Corso Venn"
        npc_complete: >
          "I'll sign you for the surge-converter spec. Come back when the
          Republic trusts you proper, with scavenged drive tech worth
          building on. Dismissed, engineer."
        reward:
          faction_rep:
            republic: 3
        next_hint: >
          Trial complete. `talk` to Lieutenant Corso to learn the
          Hyperdrive Surge Converter (Republic rep 50+ required).

  # ─── Q4. REPUBLIC ION-ENGINE SPECIALIST — "Power Run" → t5 ion core ──
  - chain_id: master_republic_ion
