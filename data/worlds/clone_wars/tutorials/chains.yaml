          faction_rep:
            republic: 2
        next_hint: "Inspect the reactor — `examine` the housing."

      - step: 2
        title: "Salvaged Power"
        location: geonosis_hive_main_chamber
        npc: "Chief Dax Orrin"
        npc_role: instructor
        teaches: ["examine"]
        objective: "Examine the salvaged CIS reactor housing."
        npc_intro: >
          "`examine` the housing. You can't tune a powerplant you don't
          understand — and CIS salvage doesn't read like Republic kit."
        completion:
          type: command_executed
          command: "examine"
        npc_complete: >
          "Now you see the problem — the regulator's fighting the core.
          Tuning it by hand is the test. `chain attempt` — that's a
          `space transports repair` job, and the margins are tight."
        reward:
          faction_rep:
            republic: 2
        next_hint: "Tune the powerplant by hand — `chain attempt`."

      - step: 3
        title: "Tuning by Hand"
        location: geonosis_hive_main_chamber
        npc: "Chief Dax Orrin"
        npc_role: instructor
        teaches: ["repair"]
        objective: "Hand-tune the salvaged ion powerplant."
        npc_intro: >
          [The regulator hums wrong, power surging against the core's
          limits. Tune it live or it cooks.] "Easy," Dax murmurs.
          "`chain attempt` — `space transports repair`, and feel the
          margin."
        completion:
          type: skill_check_passed
          skill: "space_transports_repair"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [The powerplant settles into a clean, deep hum — mil-spec
          steady. But a full reactor draw rings through the hive, and the
          Geonosians who built this place come to reclaim it.]
        reward:
          faction_rep:
            republic: 3
        next_hint: "Geonosian warriors converge. Defend the chamber."

      - step: 4
        title: "Reclaimers"
        location: geonosis_warrior_barracks
        npc: "(none)"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Defeat the Geonosian warrior."
        npc_intro: >
          [A Geonosian drone-warrior drops from a barracks tunnel, sonic
          pike leveled, hive-furious that off-worlders woke its reactor.
          `attack`, `dodge` the pike.]
        completion:
          type: combat_won
          enemy_template: "geonosis_drone_warrior"
          enemy_count: 1
        npc_complete: >
          [The warrior falls; the chamber holds. The powerplant still
          hums clean behind you — and Dax has his proof.]
        reward:
          credits: 200
          faction_rep:
            republic: 4
        next_hint: "Report back to Chief Dax."

      - step: 5
        title: "Powerplant-Certified"
        location: geonosis_hive_main_chamber
        npc: "Chief Dax Orrin"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Report your tuning run to Chief Dax."
        npc_intro: >
          "Tuned by hand, held the chamber, and that core's still singing
          mil-spec. That's the run. Not many finish it."
        completion:
          type: talk_to_npc
          npc: "Chief Dax Orrin"
        npc_complete: >
          "I'll sign you for the ion-core spec. Come back when the
          Republic trusts you proper, with deep-dune iron worth the
          build. Good run, engineer."
        reward:
          faction_rep:
            republic: 3
        next_hint: >
          Trial complete. `talk` to Chief Dax to learn the Mil-Spec Ion
          Engine Core (Republic rep 50+ required).

  # ─── Q5. MASTER ARMORER — "The Warrens Forge" → t5 armor ─────────────
  - chain_id: master_armorer_armor
    chain_name: "The Warrens Forge"
    description: >
      An independent master armorer who works a hidden forge in the Nar
      Shaddaa Warrens will teach the crafting of master-grade armor — to
      one who can scavenge the right composite, prove the plate against a
      real edge, and survive what the Warrens send. Rich, dangerous,
      end-game.
    archetype_label: "Master-Grade Armor Trial"
    faction_alignment: independent
    starting_zone: nar_shaddaa_warrens
    starting_room: warrens_scavenger_den
    prerequisites:
      - chargen_complete
    duration_minutes: 40
    locked: false
    kind: questline

    graduation:
      credits: 500
      faction_rep:
        independent: 3
      items: []
      achievements: ["warrens_forge"]
      drop_room: warrens_scavenger_den
      follow_up_hint: >
        Sabra will teach Master-Grade Armor. With the independents
        honored (rep 50+) you can `learn` it — `talk` to begin, then
        bring q75+ composite chitin and craft.

    steps:
      - step: 1
        title: "The Armorer of the Warrens"
        location: warrens_scavenger_den
        npc: "Sabra the Smith"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Find Sabra the Smith in the scavenger den."
        npc_intro: >
          "Master-grade plate. You came to the right hole in the ground —
          and the most dangerous one. I don't sell the spec; I teach it to
          people who can WORK. The Warrens are full of good composite if
          you know where to dig. `search` the den — find me a chitin
          plate worth forging."
        completion:
          type: talk_to_npc
          npc: "Sabra the Smith"
        npc_complete: >
          "Go dig. `search` the scavenger den. The good chitin's buried
          under the junk — most folk walk right past it."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Scavenge composite — `search` the scavenger den."

      - step: 2
        title: "Good Composite"
        location: warrens_scavenger_den
        npc: "Sabra the Smith"
        npc_role: instructor
        teaches: ["search"]
        objective: "Search the scavenger den for composite chitin."
        npc_intro: >
          "`search`. Chitin plate, not scrap — you'll know it by the
          weight. The Warrens don't give up the good stuff easy."
        completion:
          type: command_executed
          command: "search"
        npc_complete: >
          "That's the one. Heavy, clean. Now — plate's no good if it
          can't take an edge. There's a test rig in the fungal cavern.
          Prove the chitin holds: `chain attempt`, armor work, by hand."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Prove the plate in the fungal cavern — `chain attempt`."

      - step: 3
        title: "Proving the Plate"
        location: warrens_fungal_cavern
        npc: "(none)"
        npc_role: contact
        teaches: ["repair"]
        objective: "Work the chitin plate against the test rig."
        npc_intro: >
          [The test rig is a brutal old thing — a powered edge that bites
          armor to grade it. Set the plate, work it true.] "By hand,"
          Sabra had said. "`chain attempt` — `armor repair`, and feel
          where it wants to fail."
        completion:
          type: skill_check_passed
          skill: "armor_repair"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [The plate takes the edge and holds — master-grade. But the
          rig's noise carries in the Warrens, and a fungal-cavern stalker
          that hunts by sound comes for you.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "A stalker hunts the noise. Defend yourself."

      - step: 4
        title: "What the Warrens Send"
        location: warrens_collapsed_plaza
        npc: "(none)"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Defeat the Warrens stalker."
        npc_intro: >
          [It drives you into the collapsed plaza — a pale, many-legged
          Warrens predator, all hooks and silence. `attack` it, `dodge`
          its lunges. Your new plate earns its first scars here.]
        completion:
          type: combat_won
          enemy_template: "warrens_stalker"
          enemy_count: 1
        npc_complete: >
          [The stalker shrieks and folds. The plaza goes still. The plate
          held — and so did you. Back to the forge.]
        reward:
          credits: 200
          faction_rep:
            independent: 4
        next_hint: "Return to Sabra at the scavenger den."

      - step: 5
        title: "Forge-Proven"
        location: warrens_scavenger_den
        npc: "Sabra the Smith"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Sabra to finish the trial."
        npc_intro: >
          "Scavenged it, proved it, wore it against a stalker, and walked
          back to my forge. That's the trial. The Warrens keep the rest."
        completion:
          type: talk_to_npc
          npc: "Sabra the Smith"
        npc_complete: >
          "I'll teach you master-grade plate. Come back when the
          independents trust you proper, with chitin worth the forge. Now
          get out of my den — you've earned the right to come back."
        reward:
          faction_rep:
            independent: 3
        next_hint: >
          Trial complete. `talk` to Sabra to learn Master-Grade Armor
          (independent rep 50+ required).

  # ═══════════════════════════════════════════════════════════════════════
  # GENERALIZED QUESTLINES (kind: questline) — T3.24 quest expansion
  # ═══════════════════════════════════════════════════════════════════════
  # quest_expansion_postlaunch_path_v1.md — the sanctioned right-of-launch
  # widening of the chain engine: MORE `kind: questline` chains that reuse
  # the SAME live engine (active_questline slot, the 11 existing event
  # types, the four reward funnels). NO new engine code, NO new slot, NO
  # new completion type — pure additive content, exactly the "author
  # questlines in chains.yaml" build step the design doc describes.
  #
  # These differ from the t5 master-trainer questlines above: they are
  # ACCESSIBLE (prerequisites: chargen_complete; no faction rep gate), run
  # in ordinary city rooms, do NOT unlock a t5 schematic, and pay a modest
  # reward + a lower-tier achievement (cp_reward 3 vs the t5 chains' 5).
  # They prove the generalized-quest path serves ordinary freelance
  # side-content, not just the trainer economy. Same reachability rules
  # apply (tests/test_chain_corpus_reachability_invariant.py): every
  # `location` is a REAL world-room slug; NO room_entered / item_acquired
  # completions; every command literal registered; every skill canonical;
  # every combat_won enemy_template resolves to a tagged NPC.

  # ─── G1. FREELANCE INVESTIGATION — "The Ghost Shipment" ───────────────
  - chain_id: nar_freight_ghost_shipment
    chain_name: "The Ghost Shipment"
    description: >
      A small independent freight broker on Nar Shaddaa keeps losing cargo
      between pickup and delivery, and the Guild won't help someone her
      size. Track the leak from the docks, work the market for a name, and
      run the skimmer to ground in the Undercity. A freelance favor — open
      to anyone, no faction required.
    archetype_label: "Freelance Investigation"
    faction_alignment: independent
    starting_zone: nar_shaddaa_promenade
    starting_room: burning_deck_cantina
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["ghost_shipment_solved"]
      drop_room: burning_deck_cantina
      follow_up_hint: >
        Yelza will remember this. Independent brokers across the Corellian
        Sector talk — freelance work tends to find those who finish it.

    steps:
      - step: 1
        title: "The Broker's Problem"
        location: burning_deck_cantina
        npc: "Yelza Korrin"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Yelza Korrin in the Burning Deck Cantina."
        npc_intro: >
          "You look like you can keep your mouth shut and your eyes open.
          Good — that's the job. I'm Yelza, I run freight, and three of my
          last runs vanished clean between pickup and delivery. The Guild
          won't touch it. I'll pay a fair cut to whoever finds out where my
          cargo's going. Start at the docks — Bay Aurek's where my last run
          loaded. `search` it for anything that doesn't add up."
        completion:
          type: talk_to_npc
          npc: "Yelza Korrin"
        npc_complete: >
          "Bay Aurek. Today. Walk the loading floor and `search` it — a
          manifest doesn't just evaporate. Somebody moved it, and people
          who move cargo leave a trail if you know how to look."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Head to Bay Aurek and `search` the loading floor for the cargo trail."

      - step: 2
        title: "The Trail at the Docks"
        location: nar_shaddaa_bay_aurek
        npc: "(none)"
        npc_role: contact
        teaches: ["search"]
        objective: "Search Docking Bay Aurek for the diverted-cargo trail."
        npc_intro: >
          [The loading floor is a churn of crates, droids, and shouting
          stevedores.] Somewhere in this mess is the seam where Yelza's
          cargo slipped sideways. `search` the bay — check the manifests,
          the re-tag stickers, the bays nobody's watching.
        completion:
          type: skill_check_passed
          skill: "search"
          difficulty: 9
          on_fail: "retry_allowed"
        npc_complete: >
          [There — a stack of crates with fresh re-tag stickers slapped
          over Yelza's outfit codes, routed to a buyer in the Undercity.
          Someone here is selling her pickup windows. You'll need a name,
          and the Floating Market is where dock gossip gets sold.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The trail leads to the Floating Market. Work it for a name — `chain attempt`."

      - step: 3
        title: "A Name on the Market"
        location: floating_market
        npc: "(none)"
        npc_role: contact
        teaches: ["streetwise"]
        objective: "Work the Floating Market for the skimmer's name (streetwise)."
        npc_intro: >
          [The Floating Market drifts between the towers, a churn of vendors,
          fixers, and people who hear everything for the right price.] Re-tag
          work and stolen manifests get fenced somewhere. Use your
          `streetwise` — buy a drink, drop the right name, listen.
        completion:
          type: skill_check_passed
          skill: "streetwise"
          difficulty: 11
          on_fail: "retry_allowed"
        npc_complete: >
          [A nervous fixer, two drinks in, gives it up: Brakkis Vone — a
          small-time crew boss skimming cargo through a dead transfer point
          in the Undercity Depths, with a bought dock clerk feeding him
          windows. He kills witnesses. He won't expect one to come to him.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "Brakkis Vone runs his operation in the Undercity Depths. Go confront him."

      - step: 4
        title: "The Transfer Point"
        location: undercity_depths
        npc: "Brakkis Vone"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Confront Brakkis Vone and recover the truth — `attack`, `dodge`."
        npc_intro: >
          [The transfer point is a forgotten Undercity bay stacked with
          re-tagged crates — Yelza's codes among them. Brakkis Vone looks up
          from a manifest, reads the trail on your face, and reaches for his
          blaster.] "You followed the wrong manifest down here, snoop."
        completion:
          type: combat_won
          enemy_template: "nar_ghost_shipment_pirate"
          enemy_count: 1
        npc_complete: >
          [Vone goes down hard among the stolen crates. On his datapad: the
          bought dock clerk's name, the buyer, the whole skimming route —
          everything Yelza needs to shut it down and clear her manifests.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "You have the proof. Return to Yelza at the Burning Deck Cantina."

      - step: 5
        title: "Squaring the Account"
        location: burning_deck_cantina
        npc: "Yelza Korrin"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Yelza Korrin to close the job."
        npc_intro: >
          "You came back. With a name, a route, and a datapad full of proof.
          Figures it was Vone — and a clerk on my own dock." [She lets out a
          long breath, some of the weight off her shoulders.] "That's my
          cargo back and my route clean. Here's your cut, and then some."
        completion:
          type: talk_to_npc
          npc: "Yelza Korrin"
        npc_complete: >
          "Square. You did honest work for an honest broker — that's rarer
          than it should be out here. Anyone gives you grief about freelance,
          you tell them Yelza Korrin vouches for you. Fly safe."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The Ghost Shipment is solved. Yelza's good word travels — freelance
          work finds those who finish it.

  # ─── G2. FREELANCE INVESTIGATION — "The Crooked Wheel" ────────────────
  # T3.24 next slice (2026-06-25). The SECOND accessible kind:questline
  # chain, set on Tatooine/Mos Eisley (vs the Ghost Shipment's Nar Shaddaa)
  # and exercising a DIFFERENT skill spread (investigation + gambling).
  # Reuses the live questline engine with NO new engine code/slot/event type.
  - chain_id: mos_eisley_crooked_wheel
    chain_name: "The Crooked Wheel"
    description: >
      A loan operation locals call "the Wheel" runs a rigged sabacc table out
      of Chalmun's Cantina, traps marks in spiralling debt, then collects with
      muscle. A small Mos Eisley vendor's runner got caught, and now the
      Wheel's smiling enforcer is squeezing her stall. Read the racket on the
      market floor, sit the crooked table to expose it, and run the collector
      to ground in the desert. A freelance favor — open to anyone, no faction
      required.
    archetype_label: "Freelance Investigation"
    faction_alignment: independent
    starting_zone: tatooine_market
    starting_room: market_place_geps_grill
    prerequisites:
      - chargen_complete
    duration_minutes: 25
    locked: false
    kind: questline

    graduation:
      credits: 300
      faction_rep:
        independent: 5
      items: []
      achievements: ["crooked_wheel_busted"]
      drop_room: market_place_geps_grill
      follow_up_hint: >
        Dorae will remember this. Word on the Mos Eisley market floor travels
        fast — freelance work tends to find those who finish it.

    steps:
      - step: 1
        title: "The Vendor's Account"
        location: market_place_geps_grill
        npc: "Dorae Vint"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Speak with Dorae Vint at Gep's Grill in the Mos Eisley market."
        npc_intro: >
          "You look like you can read a room and keep your mouth shut. Good —
          that's the job. I'm Dorae, I run a salvage stall two rows over. My
          runner sat a sabacc game he couldn't win, the debt tripled overnight,
          and now the Wheel's collector keeps drifting past my stand, smiling,
          asking when I'll 'settle the account.' A game you can't win isn't a
          game — it's a harvest. Walk the market and watch who the Wheel leans
          on. `investigate` the pattern."
        completion:
          type: talk_to_npc
          npc: "Dorae Vint"
        npc_complete: >
          "Start on the market floor. The Wheel doesn't squeeze everyone — just
          the ones who can't fight back. Watch who the collector visits and
          which stalls go quiet. `investigate` the pattern; debts that move in
          lockstep aren't bad luck, they're a system."
        reward:
          faction_rep:
            independent: 2
        next_hint: "Walk the Market District and `investigate` who the Wheel is squeezing."

      - step: 2
        title: "Reading the Racket"
        location: mos_eisley_market_district
        npc: "(none)"
        npc_role: contact
        teaches: ["investigate"]
        objective: "Investigate the Market District for the Wheel's collection pattern."
        npc_intro: >
          [The Market District is a churn of stalls, hagglers, and the dry rasp
          of the desert wind.] Somewhere in the rhythm of who pays and who goes
          quiet is the shape of the racket. `investigate` the floor — track the
          collector's circuit, the stalls behind on a 'debt', the marks who sat
          the table and never recovered.
        completion:
          type: skill_check_passed
          skill: "investigation"
          difficulty: 10
          on_fail: "retry_allowed"
        npc_complete: >
          [The pattern resolves: every squeezed vendor lost a stake at the same
          sabacc table in Chalmun's back corner, and every debt grew on the
          same impossible curve. The game is the trap. To prove it's rigged
          you'll have to sit the table yourself — and read it from the inside.]
        reward:
          faction_rep:
            independent: 2
        next_hint: "The trap is a sabacc table in Chalmun's Cantina. Sit it and read the game — `chain attempt`."

      - step: 3
        title: "Reading the Table"
        location: chalmuans_cantina_main_bar
        npc: "(none)"
        npc_role: contact
        teaches: ["gambling"]
        objective: "Sit the Wheel's sabacc table and read the rig (gambling)."
        npc_intro: >
          [The Wheel's table sits in a quiet corner of Chalmun's, a smiling
          dealer and a pot that always seems to lean one way.] You don't have
          to win — you have to *read* it. Use your `gambling` eye: watch the
          deal, the shaved chits, the tell in the dealer's hands. Catch the rig
          and you have your proof — and a name.
        completion:
          type: skill_check_passed
          skill: "gambling"
          difficulty: 12
          on_fail: "retry_allowed"
        npc_complete: >
          [There it is — a marked deck and a dealer feeding the house every
          stubborn hand. The dealer, two losses deep into his own debt, gives
          up the collector: Gorvahn Brusk, who walks the stubborn debtors out
          to an abandoned farm past the eastern gate to 'talk it over.' He
          won't expect one of them to come looking.]
        reward:
          faction_rep:
            independent: 3
        next_hint: "Gorvahn Brusk runs his collections from the abandoned farm past the eastern gate. Go confront him."

      - step: 4
        title: "Settling the Account"
        location: outskirts_abandoned_farm
        npc: "Gorvahn Brusk"
        npc_role: antagonist
        teaches: ["attack", "dodge"]
        objective: "Confront Gorvahn Brusk and end the Wheel's collection — `attack`, `dodge`."
        npc_intro: >
          [The abandoned moisture farm is a ring of dead vaporators and drifting
          sand, the Wheel's quiet room for stubborn accounts. Gorvahn Brusk
          looks up from a stack of re-tagged sabacc chits, reads the trail on
          your face, and his smile finally drops.] "You traced the table all
          the way out here, friend? That's a problem."
        completion:
          type: combat_won
          enemy_template: "mos_eisley_crooked_wheel_enforcer"
          enemy_count: 1
        npc_complete: >
          [Brusk goes down among the dead vaporators. On him: the marked deck,
          the doctored debt-ledger, and the names of every mark the Wheel was
          bleeding — everything Dorae needs to break the debts and put the
          collector off the market for good.]
        reward:
          credits: 150
          faction_rep:
            independent: 3
        next_hint: "You have the proof and the ledger. Return to Dorae at Gep's Grill."

      - step: 5
        title: "Squaring the Stall"
        location: market_place_geps_grill
        npc: "Dorae Vint"
        npc_role: instructor
        teaches: ["talk"]
        objective: "Return to Dorae Vint to close the job."
        npc_intro: >
          "You came back. With a marked deck, a doctored ledger, and Brusk's
          whole collection list." [She lets out a long breath, some of the
          weight off her shoulders.] "That's my runner's debt broken and the
          collector off my stall. Figures the game was rigged from the deal.
          Here's your cut, and then some."
        completion:
          type: talk_to_npc
          npc: "Dorae Vint"
        npc_complete: >
          "Square. You did honest work for an honest stall — that's rarer than
          it should be out here. Anyone leans on you about freelance, you tell
          them Dorae Vint vouches for you. Walk easy."
        reward:
          faction_rep:
            independent: 2
        next_hint: >
          The Crooked Wheel is broken. Dorae's good word travels the market
          floor — freelance work finds those who finish it.

  # ═══════════════════════════════════════════════════════════════════════
  # ENGINE INTEGRATION NOTES
# ═══════════════════════════════════════════════════════════════════════
# When the CW tutorial engine session lands:
#
# 1. Add `engine/tutorial_chains.py` (or extend `engine/tutorial_v2.py`)
#    with a chain loader that consumes this file and the GCW counterpart
#    (data/worlds/gcw/tutorials/chains.yaml — TBD).
#
# 2. The state-tracking JSON gets a new key alongside the existing
#    `tutorial_core` and `tutorial_electives`:
#
#        "tutorial_chain": {
#            "chain_id": "republic_soldier",
#            "step": 3,
#            "started_at": <ts>,
#            "completed_steps": [1, 2]
#        }
#
#    The chain is selected after chargen if a `faction_intent` is set
#    that maps to one of the chains (or by direct chain_id selection at
#    the chargen "skip core, pick chain" branch).
#
# 3. Tutorial-zone-only rooms (those NOT in zones.yaml — e.g.
#    `tipoca_briefing_room`, `kdy_apprentice_bay_7`) are built by an
#    extension to `build_tutorial.py` that walks the chain definitions
#    and creates rooms with `tutorial_zone: true` properties.
#
# 4. Step `completion` types map to engine event hooks:
#       command_executed   → parser hook
#       talk_to_npc        → NPC interaction hook
#       combat_won         → combat resolution hook
#       skill_check_passed → dice roll hook
#       mission_accepted   → mission system hook
#       mission_completed  → mission system hook
#       bounty_accepted    → bounty board hook
#       item_acquired      → inventory hook
#       item_used          → use command hook
#       room_entered       → movement hook
#       prerequisite       → flag check (no event, blocks chain)
#
# 5. The Jedi-Path chains (`jedi_path` and `jedi_path_independent`) are
#    locked: the chain selector rejects both at chargen and surfaces the
#    `locked_message` instead. The Village quest sets the
#    `jedi_path_unlocked` flag on completion of either Path A (Order) or
#    Path B (Independent); only then does the corresponding flavored
#    chain become available, and only the one matching the player's
#    `village_chosen_path`.
#
#    Player still needs the `force_sensitive` flag from chargen or
#    Village trials.
