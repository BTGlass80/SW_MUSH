    starting_room: geonosis_hive_main_chamber
    prerequisites:
      - chargen_complete
    duration_minutes: 40
    locked: false
    kind: questline

    graduation:
      credits: 500
      faction_rep:
        republic: 3
      items: []
      achievements: ["power_run_ion"]
