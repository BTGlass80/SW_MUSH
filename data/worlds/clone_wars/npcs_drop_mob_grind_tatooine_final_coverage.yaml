# data/worlds/clone_wars/npcs_drop_mob_grind_tatooine_final_coverage.yaml
#
# Tatooine Final Coverage Mob Grind Batch (2026-06-24)
#
# Six roaming hostile NPCs seeded across the six remaining Tatooine rooms
# without hostile mob coverage, completing the solo-PvE mob-grind reward
# loop (engine/hunting_rewards.py) for the Tatooine planet.
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Lup's General Store x1        (Gran tax enforcer,         tatooine_market)
#   Mos Eisley Inn x1              (Human inn fugitive,        tatooine_mos_eisley)
#   Regional Government Offices x1 (Rodian office extortionist, tatooine_civic)
#   Dewback Stables and Garage x1  (Trandoshan garage thief,   tatooine_civic)
#   Jawa Traders x1                (Human parts thief,         tatooine_market)
#   House of Momaw Nadon x1        (Kubaz garden watcher,      tatooine_mos_eisley)
#
# Note: rooms at Mos Eisley Inn, Regional Government Offices, and House of
# Momaw Nadon already carry ambient (non-hostile) NPCs from
# npcs_drop_ambient_mos_eisley_service_sector.yaml and
# npcs_drop_ambient_tatooine_civic_outskirts.yaml. Multiple NPCs per room
# are supported by npc_loader — the hostile mob and ambient NPC coexist.
#
# Thematic premise: Mos Eisley's settled zones are not safe; Hutt protection
# networks, bounty-fugitive transients, and black-market operators pervade
# every commercial, civic, and residential room. The general store absorbs
# weekly Hutt taxation visits that turn violent; the inn shelters wanted
# persons who cannot afford recognition; the government offices are worked
# by Hutt fixers manipulating land and license records; the militia stables
# are targeted by chop-shop crews; the droid shop is a high-value theft
# target; and the Ithorian naturalist's private garden is being quietly
# watched by a contractor intelligence operative.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
#   Momaw Nadon (Ithorian owner, House of Momaw Nadon) is a canonical
#   Clone Wars-era figure — he is NOT instanced as an NPC. The Kubaz
#   operative is an uninvited visitor to the property, not the owner.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF absent from this worktree;
#   stats UNVERIFIED against PDF. Grounded in sibling CW NPC patterns:
#     Rodian:     DEX 3D, PER 3D, STR 2D+1   (cantina_market baseline)
#     Trandoshan: DEX 2D+2, STR 4D            (cantina_market baseline)
#     Human:      2D baseline all attributes  (standard WEG humanoid)
#     Gran:       DEX 2D+1, STR 2D+2          (average humanoid; criminal build)
#     Kubaz:      DEX 2D+2, STR 2D, PER 3D   (perceptual specialist; WEG humanoid avg)
# Weapons: vibroblade, blaster_pistol, hold_out_blaster, blaster_carbine
#   — all keys confirmed present in data/weapons.yaml at HEAD.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # LUP'S GENERAL STORE — 1 NPC (Gran tax enforcer)
  # The Shistavanen proprietors run an honest shop, which is exactly
  # why Jabba's collection network has them on a weekly visit schedule.
  # The Gran enforcer arrives on time, expects no argument, and helps
  # himself to merchandise when the fee is short.
  # ══════════════════════════════════════════════════════════════════

  - name: Gran Tax Enforcer
    room: "Lup's General Store"
    species: Gran
    description: >-
      A heavyset Gran in a worn leather vest stands at the counter
      with the unhurried posture of someone who has done this exact
      errand four hundred times. Three brown eyes track the room
      independently — one watching the back door, one watching the
      Wolfman owners, and one, currently, watching you. A vibroblade
      rides openly on his belt, which is the point. The Hutt collection
      network does not hide its tools. He turns toward you with a
      patience that is clearly a threat in itself, and the third eye
      stops moving.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 2D+2
        technical: 2D
      skills:
        melee_combat: 3D+2
        brawling: 3D+1
        intimidation: 3D+2
        streetwise: 2D+2
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 2
    ai_config:
      personality: >-
        A Gran muscle enforcer on the Hutt protection circuit — he
        collects weekly fees from a dozen shops in this quarter and
        has been doing it for six years. He expects compliance and
        reads uncertainty as an opening to press harder. He does not
        start fights; he finishes them with the vibroblade before
        the other person processes what happened. The three-eyed
        peripheral vision means he is very difficult to approach
        unnoticed, and he knows it.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Flat, accented Basic with the unhurried delivery of someone
        who expects to be obeyed. "Collection day. You're in the way."
        The vibroblade clears the scabbard if you say anything else.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He swings the vibroblade in a controlled arc, three eyes tracking
          separately — he will not be flanked.*"
        - "*'Short payment.' He advances, using his bulk to pin you against
          the merchandise shelves.*"
        - "*A Gran that fights clean is a Gran that loses. He fights dirty.*"

  # ══════════════════════════════════════════════════════════════════
  # MOS EISLEY INN — 1 NPC (Human inn fugitive)
  # The inn's subterranean rooms are cool and dark and exactly the
  # kind of place a person with a price on their head rents by the
  # week. The fugitive does not ask who you are. She already knows.
  # ══════════════════════════════════════════════════════════════════

  - name: Inn Room Fugitive
    room: "Mos Eisley Inn"
    species: Human
    description: >-
      A Human woman in her mid-thirties sits in the lobby's only dark
      corner, back to the wall, a half-eaten ration bar on the table
      beside her and her blaster already in her hand under the table.
      The imported trees provide minimal cover; she is using them
      anyway. Three weeks on the run has stripped away everything
      that was not essential — what remains is fast-twitch reflexes
      and the conviction that everyone who makes eye contact is
      either a bounty agent or about to become a problem. The blaster
      clears the tabletop the moment you take a step toward her.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 3D+1
        sneak: 3D
        streetwise: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 0
    ai_config:
      personality: >-
        A wanted fugitive who has been sleeping in rotation between
        three Mos Eisley lodgings to avoid pattern-detection. She is
        not violent by disposition but has been on the run long enough
        that her reaction time to anything unexpected has compressed
        to under a second. She fires first and asks nothing after.
        She uses the lobby furniture as cover and backs toward the
        subterranean exit if given the opportunity.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Clipped Basic, no accent, no elaboration. "Keep walking."
        The blaster is already aimed before you hear the words.
      hostile: true
      combat_behavior: evasive
      fallback_lines:
        - "*She fires twice and immediately puts the nearest imported tree
          between herself and you.*"
        - "*'Wrong move.' She is already backing toward the subterranean
          stair, keeping the blaster level.*"
        - "*A fast shot from the corner — she has the sight lines memorized.*"

  # ══════════════════════════════════════════════════════════════════
  # REGIONAL GOVERNMENT OFFICES — 1 NPC (Rodian office extortionist)
  # Prefect Talmont's office handles land deeds and weapon licenses,
  # which means it handles Hutt land fraud and unlicensed weapon flows.
  # The Rodian fixer ensures the paperwork moves in the right direction.
  # ══════════════════════════════════════════════════════════════════

  - name: Rodian Government Fixer
    room: "Regional Government Offices"
    species: Rodian
    description: >-
      A Rodian in a business tunic that is slightly too expensive for
      this office stands at the filing alcove with a datadisk in one
      hand and a posture that says he has been here before and will be
      here again. His multifaceted green eyes track you from the moment
      you enter. The Prefect's clerks are conspicuously occupied with
      something else. The small hold-out blaster is visible inside his
      open jacket — he is not hiding it, because in this office he does
      not need to. He straightens when you get too close to whatever
      transaction he is facilitating.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D+1
        search: 3D+2
        streetwise: 3D+1
        intimidation: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Hutt cartel operative specializing in administrative
        corruption — land-deed manipulation, license suppression,
        and record alteration. He is not a combatant by profession
        but carries himself like one because the government offices
        have taught him that looking like a problem prevents most
        problems. He fires fast when cornered, uses the office
        furniture and the corridor geometry to break contact, and
        prefers to disengage rather than escalate beyond the hold-out.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Rodian-accented Basic, polished and cold. "This is a private
        consultation." The hold-out emerges if you say anything else.
      hostile: true
      combat_behavior: evasive
      fallback_lines:
        - "*He fires once from behind the filing cabinet and immediately
          moves for the corridor door.*"
        - "*A fast draw from the open jacket — the shot is precise, and he
          is already stepping sideways.*"
        - "*'Wrong office.' He fires twice and retreats toward the lobby,
          using the clerk desks as cover.*"

  # ══════════════════════════════════════════════════════════════════
  # DEWBACK STABLES AND GARAGE — 1 NPC (Trandoshan garage thief)
  # The militia garage holds three armored landspeeders and a rack of
  # patrol scooters. The Trandoshan chop-shop crew sent one operative
  # to strip the motivators. The dewbacks in the adjacent paddock have
  # been agitated for twenty minutes; nobody has come to check.
  # ══════════════════════════════════════════════════════════════════

  - name: Trandoshan Chop-Shop Operative
    room: "Dewback Stables and Garage"
    species: Trandoshan
    description: >-
      A large Trandoshan crouches beside the lead landspeeder with a
      plasma cutter and three motivator housings already stacked beside
      him. The dewbacks in the adjacent paddock shift and low-growl in
      the way they do when a predator is near — which is accurate. He
      has been here long enough to be comfortable. He is not comfortable
      now. Reptilian eyes track you the moment the door opens, and the
      plasma cutter goes down in favor of the blaster carbine slung
      across his back before you process what is happening.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+1
        strength: 4D
        technical: 2D+1
      skills:
        blaster: 3D+2
        brawling: 4D+1
        sneak: 3D
        repair: 3D
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        A Trandoshan parts-stripper from a Mos Eisley black-market
        chop-shop operation — skilled with vehicles, more skilled with
        the blaster carbine, and entirely willing to use either. He
        was sent for specific components and is now committed to leaving
        with them or leaving without witnesses. The confined garage space
        suits him; his species' STR advantage in close quarters is not
        subtle. He does not panic and does not retreat until he has no
        other option.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Deep, accented Basic with minimal vocabulary. "Your problem now."
        The blaster carbine tracks center-mass.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires from behind the landspeeder's engine block and moves
          immediately to close the distance.*"
        - "*The Trandoshan uses a parked scooter as cover and advances — he
          intends to finish this at arm's length.*"
        - "*A deep hiss and he is charging, blaster carbine firing as he
          comes — the dewbacks scatter in the adjacent paddock.*"

  # ══════════════════════════════════════════════════════════════════
  # JAWA TRADERS — 1 NPC (Human parts thief)
  # Seven levels of droid components make Jawa Traders an attractive
  # target. The Jawas' restraining bolts mean the display droids will
  # not intervene. The Human thief with the vibroblade has been
  # working through the shelf inventory for twenty minutes.
  # ══════════════════════════════════════════════════════════════════

  - name: Droid Component Thief
    room: "Jawa Traders"
    species: Devaronian
    description: >-
      A Devaronian man with filed-down horns — the old spacer trick
      for passing unnoticed in ports that keep Devaronian watch-lists —
      stands halfway up the motivator unit shelves with a canvas satchel
      already half-full of circuit boards and sensor arrays. The display
      droids near the entrance stand frozen — restraining bolts engaged,
      exactly as they were when he walked in. He is systematic and
      unhurried, working from a handwritten list. When you enter, he
      does not run. He turns, drops off the shelf, and pulls a vibroblade
      from his boot with the practiced ease of someone who knew an
      interruption was possible and planned for it.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+1
        strength: 2D+2
        technical: 2D+1
      skills:
        melee_combat: 3D+2
        brawling: 3D
        sneak: 3D+1
        streetwise: 2D+2
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        A Devaronian droid-component thief working a specific parts
        list for a black-market reseller. The filed horns mark him
        as a long-term spacer who has learned that looking ordinary
        opens more doors than species charisma does. He knows the
        shop layout, knows the droids are bolt-locked, and planned
        the exit route before entering. He fights only because
        leaving a witness is worse than the noise. Uses the shelf
        racks as cover, stays light on his feet, and is looking
        for an opening to get past you to the door.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Accented Basic, unhurried. "Not your problem." The vibroblade
        is already between you and the door.
      hostile: true
      combat_behavior: evasive
      fallback_lines:
        - "*He feints left and slashes at your weapon arm — trying to
          clear a path to the entrance.*"
        - "*The Thief uses a shelf rack as a barrier and repositions
          toward the exit, blade tracking you.*"
        - "*A quick slash and he angles toward the door — he is not
          here to fight, he is here to leave.*"

  # ══════════════════════════════════════════════════════════════════
  # HOUSE OF MOMAW NADON — 1 NPC (Kubaz garden watcher)
  # The Ithorian naturalist maintains a private garden inside a
  # pourstone shell. A contractor intelligence operative entered
  # through the rear access, using the garden cover. He has been
  # watching the property for three days. He does not want company.
  # ══════════════════════════════════════════════════════════════════

  - name: Kubaz Garden Watcher
    room: "House of Momaw Nadon"
    species: Kubaz
    description: >-
      A Kubaz operative in lightweight desert clothing crouches in the
      artificial garden's fern thicket, a compact long-lens scanner
      held against one of his large anterior eyes. The humidity fog
      from the pond makes him difficult to spot until he moves — and
      he moves the moment he hears the door. The scanner disappears
      into a belt pouch and a hold-out blaster takes its place with the
      fluid practice of someone who has done this exactly as many times
      as their profession requires. His other eye, the one not aimed at
      you, continues to track the garden exit.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D
      skills:
        blaster: 3D+1
        dodge: 3D+1
        sneak: 3D+2
        search: 3D+2
        hide: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A Kubaz intelligence operative employed by an unnamed offworld
        contractor to maintain surveillance on the Ithorian property —
        its owner has connections to multiple factions and is considered
        a valuable information node. The Kubaz did not come here to
        fight. He came to watch. But the intelligence he has spent
        three days collecting is worth protecting at any cost, and a
        witness who has seen his face in this garden will make that
        collection worthless. He uses the garden's layered vegetation
        as cover, fires from concealment, and attempts to disengage
        through the rear access if able.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Quiet, clicking Kubaz cadence beneath careful Basic. "You were
        not supposed to come in here." The hold-out blaster is steady.
      hostile: true
      combat_behavior: evasive
      fallback_lines:
        - "*He fires from inside the fern cover and immediately shifts
          position — the garden gives him angles you do not have.*"
        - "*The Kubaz goes still behind the pond's edge, then fires the
          moment you move toward him.*"
        - "*A precise shot and he is backing toward the rear access,
          scanner tucked, blaster tracking you.*"
