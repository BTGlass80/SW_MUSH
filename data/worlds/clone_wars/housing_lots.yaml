# data/worlds/clone_wars/housing_lots.yaml
#
# F.5a.1 (Apr 29 2026) - Clone Wars housing lot inventory.
#
# Per cw_housing_design_v1.md §5 (Tier 2 faction quarters) + §11 (schema).
# This drop ships the Tier 2 faction-quarter mappings; T1 (rentals),
# T3 (private residence), T4 (shopfronts), T5 (organization HQ) come
# in F.5a.2.
#
# The CW faction set is republic / cis / jedi_order / hutt_cartel /
# bounty_hunters_guild. BHG has no faction quarters by design (§5.5);
# its entry is null.
#
# Schema:
#   tier2_faction_quarters:
#     <faction_code>:
#       tiers: list of { rank_min, label, storage_max, room_name, room_desc }
#
# This file is byte-equivalent to the CW additions in
# `engine/housing.py::FACTION_QUARTER_TIERS` (republic/cis/jedi_order/
# hutt_cartel) that B.1.d.1 (Apr 29) landed. Until F.5b's data-fy
# ships, this YAML is data-only.

schema_version: 1
era: clone_wars

tier2_faction_quarters:
  cis:
    tiers:
    - rank_min: 0
      label: Stalgasin Hive — Recruit Dormitory
      storage_max: 10
      room_name: '{name}''s Bedroll'
      room_desc: >-
        A spartan dormitory carved into the chitinous walls of the Stalgasin Deep Hive. Low orange light pulses from glow-grubs
        in the ceiling. A bedroll, a stone shelf, and a single locking footlocker. The air tastes of damp resin and ozone
        from distant droid foundries.
    - rank_min: 2
      label: Stalgasin Hive — Private Alcove
      storage_max: 40
      room_name: '{name}''s Alcove'
      room_desc: >-
        A private vaulted alcove deep in the hive. Carved chitin curves overhead. An encrypted comms station tied to the Separatist
        network sits beside the bedroll. Spare battle-droid parts are stacked in a corner. The Geonosian guards outside know
        your scent.
    - rank_min: 4
      label: Stalgasin Hive — Officer's Chamber
      storage_max: 80
      room_name: '{name}''s Chamber'
      room_desc: >-
        An officer's chamber in the upper levels of the deep hive — two rooms, with a war-planning slate showing current Separatist
        front lines and a droid-courier dock for sending orders to droid foundries across the system. The vaulted ceiling
        is studded with trophy plaques.
    - rank_min: 5
      label: Stalgasin Hive — Council Suite
      storage_max: 100
      room_name: Marshal {name}'s Suite
      room_desc: >-
        A council suite at the Stalgasin Deep Hive's restricted Council approach — three chambers, a holotable showing live
        tactical data from every Separatist battlefront, and a private antechamber where Count Dooku's emissaries are received.
        Geonosian sentinels stand watch in the outer hall. Few non-Geonosians have ever stood here.
  hutt_cartel:
    tiers:
    - rank_min: 2
      label: Hutt Cartel — Enforcer's Safehouse
      storage_max: 30
      room_name: Enforcer's Room
      room_desc: >-
        A functional safehouse room in the Nar Shaddaa undercity. The door is reinforced durasteel with three separate locks.
        A weapons rack, a bunk, and a hidden floor compartment for 'special deliveries.' The walls are covered in cheap soundproofing
        material. Comfort was never the point.
    - rank_min: 3
      label: Hutt Cartel — Lieutenant's Suite
      storage_max: 50
      room_name: '{name}''s Suite'
      room_desc: >-
        A well-appointed suite in a Hutt-controlled building. The decor is gaudy — gold trim, velvet cushions, a bubbling
        hookah stand. A heavy curtain hides a hidden compartment large enough to hold a small arsenal. A viewport shows {planet_view}.
        The Hutts take care of their own.
    - rank_min: 5
      label: Hutt Vigo — Luxury Penthouse
      storage_max: 100
      room_name: Vigo {name}'s Penthouse
      room_desc: >-
        A luxury penthouse dripping with Hutt-style opulence. Gold-plated fixtures, a sunken conversation pit with plush cushions,
        a fully stocked bar of exotic spirits, and a panoramic viewport showing {planet_view}. A private turbolift connects
        to the street below. Armed guards patrol the corridor outside. This is what power looks like in the Outer Rim.
  jedi_order:
    tiers:
    - rank_min: 0
      label: Jedi Temple — Initiate Cluster
      storage_max: 10
      room_name: Initiate {name}'s Cot
      room_desc: >-
        A communal sleeping arrangement in the Jedi Temple's Initiate Cluster. A simple cot among many, separated by hanging
        cloth partitions. Robed initiates move quietly between the rows. The room smells faintly of old books and the polished
        stone of the Temple. Through the high arched window, {planet_view}.
    - rank_min: 1
      label: Jedi Temple — Padawan Cell
      storage_max: 30
      room_name: Padawan {name}'s Cell
      room_desc: >-
        A small private room in the Padawan Wing, adjacent to one's Master's quarters. A pallet, a desk with study datapads,
        a shelf of spare robes, and a small meditation corner. The Temple's Force-presence is thick here. Through the slit
        window, {planet_view}.
    - rank_min: 3
      label: Jedi Temple — Knight Quarters
      storage_max: 80
      room_name: Knight {name}'s Quarters
      room_desc: >-
        A Jedi Knight's quarters in the Knight Wing — two rooms. A meditation chamber with a smooth stone floor and a single
        candle, and a private cell with a proper bed and a writing desk. A high arched viewport shows {planet_view}. The lightsaber
        rack on the wall is empty when its owner is in residence.
    - rank_min: 5
      label: Jedi Temple — Master Suite
      storage_max: 100
      room_name: Master {name}'s Suite
      room_desc: >-
        A Jedi Master's suite in the Master Wing — three rooms. A meditation hall large enough for kata practice, a Padawan
        teaching alcove with floor cushions and a holocron projector, and a private chamber. Carved kyber crystals are set
        into the walls, faintly luminous. Through the master viewport, {planet_view}. Few rooms in the galaxy carry this much
        accumulated Force-presence.
  republic:
    tiers:
    - rank_min: 0
      label: Republic Guard Barracks — Shared Bunk
      storage_max: 10
      room_name: '{name}''s Bunk'
      room_desc: >-
        A bunk in the Coruscant Coco Town Republic Guard barracks. Crisp white-and-blue walls, a sealed footlocker, and a
        holosched display showing rotation orders. The hum of the barracks ventilation is a constant white noise. A view through
        the slit window shows {planet_view}.
    - rank_min: 2
      label: Republic Guard — Private Cell
      storage_max: 30
      room_name: '{name}''s Quarters'
      room_desc: >-
        A functional officer's cell in the Republic Guard barracks. A proper bed, a desk with an encrypted terminal, and a
        wall locker with a biometric lock. The Republic crest is etched above the desk. A viewport shows {planet_view}.
    - rank_min: 4
      label: Republic Officer Wing — Suite
      storage_max: 50
      room_name: '{name}''s Officer Suite'
      room_desc: >-
        An officer's suite in the Republic Guard's command wing. A bedroom and an adjoining briefing room with a holotable
        for tactical reviews. The walls carry framed Republic battle citations. A viewport offers a commanding view of {planet_view}.
        A private refresher adjoins.
    - rank_min: 5
      label: Republic Commander — Senate-Adjacent Compound
      storage_max: 100
      room_name: Commander {name}'s Quarters
      room_desc: >-
        A commander's compound on the edge of the Senate District, three rooms deep — bedchamber, war room with secure subspace
        comms, and a private antechamber for visiting senators or generals. The Judicial Forces insignia is woven into the
        carpet. A panoramic viewport spans the wall, showing {planet_view}. Guard patrols rotate past the corridor outside.
  bounty_hunters_guild: null

