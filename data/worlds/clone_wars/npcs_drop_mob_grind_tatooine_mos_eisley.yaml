# data/worlds/clone_wars/npcs_drop_mob_grind_tatooine_mos_eisley.yaml
#
# Tatooine Mos Eisley Streets Hostile Mob Grind Batch (2026-06-21)
#
# Six roaming hostile NPCs seeded across Mos Eisley's city streets to extend
# the solo-PvE mob-grind reward loop (engine/hunting_rewards.py).
# Complements the existing Jundland Wastes (rooms 48-53) and City Outskirts
# (rooms 40-47) grind batches; this batch covers the main city zones
# (tatooine_mos_eisley / tatooine_civic, open/contested security).
#
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Mos Eisley Street - Spaceport Row x1   (Devaronian mugger)
#   Mos Eisley Street - South End x1       (Aqualish gang enforcer)
#   Power Station x1                       (Twi'lek saboteur)
#   Transport Depot x1                     (Weequay protection racketeer)
#   Street Corner - Dowager Queen Wreckage x1 (Rodian opportunist)
#   Notsub Shipping - Lobby x1             (Nikto cargo thief)
#
# Existing Mos Eisley civilian NPCs avoided: cantina occupants, vendor-room
#   proprietors, spaceport staff, and Jabba's Townhouse roster.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats grounded in sibling CW NPC patterns (Drop H / mob-grind baselines).
#   Stats UNVERIFIED against WEG40120 PDF.
# Weapons: blaster_pistol, hold_out_blaster, blaster_carbine, vibroblade,
#   heavy_blaster_pistol — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # SPACEPORT ROW — 1 NPC (Devaronian mugger)
  # The main street connecting the docking bays; transients with
  # fresh cargo credits make easy marks for someone with sharp eyes
  # ══════════════════════════════════════════════════════════════════

  - name: Devaronian Street Mugger
    room: "Mos Eisley Street - Spaceport Row"
    species: Devaronian
    description: >-
      A lean Devaronian with filed horn-tips and a weathered jacket that
      hangs open to show the blaster on his hip — not the hold-out, the
      visible one, because the visible one keeps most people walking. He
      runs a simple business: watch the docking bay exits, read who just
      got paid, follow them two blocks down Spaceport Row, and turn the
      conversation into a transaction. He has a second blaster inside the
      jacket for the ones who argue. When you make eye contact, he smiles
      with the teeth that made his species famous and takes a step forward.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 3D+1
        streetwise: 3D+2
        sneak: 3D
        persuasion: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A street mugger who has worked Spaceport Row for two years,
        building a mental map of which bays pay out on which days.
        He is not a killer by preference — dead marks attract KSF
        attention — but he is willing, experienced, and has no
        illusions about what this encounter is. He fires fast and
        retreats into the alley network he knows cold.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Smooth Devaronian Basic with a smile that doesn't reach the
        eyes. "Friend. You look like you could use directions." The
        blaster is already clear of the holster.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires and steps sideways into the alley mouth he was already
          measuring.*"
        - "*A quick shot from cover — he has done this before.*"
        - "*'Bad call.' Another bolt, backing toward the side street.*"

  # ══════════════════════════════════════════════════════════════════
  # SOUTH END — 1 NPC (Aqualish gang enforcer)
  # The rougher end of Mos Eisley; Hutt-affiliated gangs treat this
  # block as a boundary marker and patrol it accordingly
  # ══════════════════════════════════════════════════════════════════

  - name: Aqualish Gang Enforcer
    room: "Mos Eisley Street - South End"
    species: Aqualish
    description: >-
      A broad-shouldered Aqualish in a heavy jacket with a Hutt-family
      gang color sewn into the collar lining — visible if you know what
      to look for, invisible if you don't. He is not here to conduct
      business; he is here to establish that this end of the street
      belongs to someone, and that someone does not welcome unaffiliated
      activity. Two blaster carbine magazines are visible at his belt.
      He has been in three firefights this month and started two of them.
      When you walk into the South End without the right greeting, he
      registers it as a problem to be resolved.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 3D+1
        technical: 2D
      skills:
        blaster: 4D
        brawling: 3D+2
        intimidation: 3D+2
        dodge: 2D+2
        streetwise: 3D
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Hutt-affiliated territorial enforcer whose job is to make
        the South End visibly dangerous for anyone without gang
        affiliation. He is not subtle and does not try to be. His
        value to his employers is that he is large, angry, and willing
        — which he is. He charges when threatened and uses his carbine
        at mid-range, closing when possible because he prefers the
        shorter fight.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Aqualish-accented Basic, minimal vocabulary, maximum volume.
        A guttural challenge bark. The carbine comes up before any
        word lands.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*A burst from the carbine — he fires wide to pin rather than
          kill, then closes.*"
        - "*He advances behind his shots, using his size as a weapon.*"
        - "*A grinding sound in his throat and another burst. He is not
          leaving.*"

  # ══════════════════════════════════════════════════════════════════
  # POWER STATION — 1 NPC (Twi'lek saboteur)
  # The city's power infrastructure; minimally staffed, poorly
  # monitored — exactly the kind of place CIS intelligence uses
  # ══════════════════════════════════════════════════════════════════

  - name: Twi'lek Power Station Saboteur
    room: "Power Station"
    species: Twi'lek
    description: >-
      A Twi'lek woman with blue-grey lekku carefully wrapped and tucked
      under a maintenance cap — the kind of precaution taken by someone
      who does not want to be remembered. She carries a standard KSF-
      contracted maintenance kit, but the outer tray conceals a compact
      circuit disruptor built to look like a calibration tool. She has
      already placed one device in the relay housing behind panel seven.
      She is here to place a second one. When she hears your footfall on
      the grating, the maintenance kit closes and the hold-out blaster
      from her thigh rig comes up in one practiced motion.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 3D+1
        strength: 2D
        technical: 3D+1
      skills:
        blaster: 4D+2
        dodge: 3D+2
        sneak: 4D
        security: 3D+2
        demolitions: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS technical-infiltration operative running a sabotage
        campaign against Mos Eisley's municipal power grid — small
        disruptions designed to degrade the spaceport's customs
        scanner reliability over several weeks. She is methodical,
        patient, and acutely aware that any witness threatens the
        whole operation. She fires immediately when cornered and
        aims for communications gear first, then retreats through
        the maintenance crawlways she has mapped.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Precise Core Worlds Basic with no regional marker. "This
        section is closed for scheduled maintenance." The hold-out
        is already in her hand.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She fires and steps into the maintenance crawlway behind
          the primary relay.*"
        - "*A second shot from cover — she is not wasting bolts.*"
        - "*'You should have believed the sign.' Firing again, moving
          laterally.*"

  # ══════════════════════════════════════════════════════════════════
  # TRANSPORT DEPOT — 1 NPC (Weequay protection racketeer)
  # The city's ground transport hub; high throughput of credits and
  # cargo — a natural territory for organized criminal pressure
  # ══════════════════════════════════════════════════════════════════

  - name: Weequay Protection Racketeer
    room: "Transport Depot"
    species: Weequay
    description: >-
      A weathered Weequay in a courier's vest with the Mos Eisley
      Transport Guild emblem on the shoulder — the kind of forgery
      good enough to pass casual inspection. He is not here to courier
      anything. He is here because the depot's incoming freight handlers
      pay a weekly fee to a Hutt-adjacent operation for the continued
      health of their cargo, their loading droids, and their knuckles.
      He is the collection agent. Three of the depot's regular freight
      crews have already seen what happens when payment is late. When
      you interrupt the collection, he stops being patient.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+2
        strength: 3D
        technical: 2D
      skills:
        blaster: 4D
        intimidation: 3D+2
        brawling: 3D+1
        dodge: 2D+2
        streetwise: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Hutt-affiliated collection enforcer running a protection
        racket across the Mos Eisley transport sector. He is not
        a gunfighter by profession — he relies on reputation and
        implied threat. When that fails, he becomes straightforwardly
        violent. He has been doing this long enough to be efficient
        rather than angry, which makes him more dangerous. He fires
        twice and retreats to the freight bay if the situation goes
        against him.
      knowledge: []
      faction: hutt_cartel
      dialogue_style: >-
        Flat Weequay-accented Basic, minimal and threatening. "You
        are interrupting business." No further warning. The blaster
        is already moving.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires twice without a word and steps behind the freight
          stacks.*"
        - "*A shot from the cargo row — he is positioning for the exit.*"
        - "*He does not speak again. Two more shots and he moves.*"

  # ══════════════════════════════════════════════════════════════════
  # DOWAGER QUEEN WRECKAGE — 1 NPC (Rodian opportunist)
  # The crashed luxury liner's wreckage forms a permanent landmark
  # and a useful concealed position for someone who understands
  # that abandoned spaces attract desperate people
  # ══════════════════════════════════════════════════════════════════

  - name: Rodian Wreckage Scavenger
    room: "Street Corner - Dowager Queen Wreckage"
    species: Rodian
    description: >-
      A wiry Rodian crouched in the shadow of the old liner's hull
      section, sorting components into a satchel with practiced
      speed. The wreckage has been picked over for decades; what he
      has found is either a genuine overlooked system cache or a
      staged display of activity designed to explain his presence
      at a corner known for illegal cargo transfers. When he
      registers you as more attentive than a passerby, his snout
      angles toward you and the satchel closes around a blaster
      carbine he was not previously making visible.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D+1
        perception: 3D+2
        strength: 2D+1
        technical: 2D+2
      skills:
        blaster: 4D+2
        dodge: 3D+2
        search: 3D+2
        sneak: 3D+1
        streetwise: 3D
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A Rodian opportunist running a cargo-interception side
        operation from the wreckage — he watches for small freight
        transfers done off-manifest at the corner, follows the
        carrier, and takes the cargo at blaster-point before they
        reach their buyer. He is fast, perceptive, and not
        interested in conversation. He fires on perceived threats
        without negotiation and uses the wreckage as cover reflexively.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Rodian-accented Basic, short and clipped. A single sharp
        clicking sound from the snout, then the carbine is up.
        No words after that.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires from behind the hull section and shifts position
          instantly.*"
        - "*A fast double-tap — he fires and moves before you can
          reacquire.*"
        - "*No words. Another burst and he retreats deeper into the
          wreckage.*"

  # ══════════════════════════════════════════════════════════════════
  # NOTSUB SHIPPING LOBBY — 1 NPC (Nikto dock thief)
  # A legitimate-looking freight broker whose back office handles
  # off-book cargo; the lobby is where the unacknowledged arrivals
  # are processed before the books show them
  # ══════════════════════════════════════════════════════════════════

  - name: Nikto Dock Thief
    room: "Notsub Shipping - Lobby"
    species: Nikto
    description: >-
      A muscular Nikto in unmarked work clothes with a hand-truck
      parked against the wall and a datapad showing a manifest he
      did not receive through official channels. He is in the process
      of removing three crates from an incoming shipment before the
      legitimate freight handler arrives to process the rest. The
      operation has twelve minutes before that window closes. He
      does not want a conversation. When he sees you watching him
      record the crate serials, the datapad goes into his jacket
      and a heavy blaster pistol comes out before you have drawn
      a second breath.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+2
        strength: 3D+2
        technical: 2D
      skills:
        blaster: 4D+1
        brawling: 4D
        dodge: 2D+2
        intimidation: 3D+1
        streetwise: 3D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A dock thief running a timed cargo-skimming operation at
        Notsub Shipping — he knows the freight schedule, knows the
        lobby's blind spots, and has twelve minutes before this
        becomes a problem. A witness compresses that window to zero.
        He is physically powerful, direct, and experienced with the
        heavy pistol. He fires immediately when compromised and uses
        the crate stacks for cover, advancing when he thinks he has
        the angle.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Low Nikto-accented Basic, no preamble. A flat look that
        communicates the decision has already been made. The heavy
        blaster is already at shoulder level.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The heavy blaster fires without a word — he advances behind
          the shot.*"
        - "*He shoves a crate sideways and fires from behind it.*"
        - "*A low sound and two more shots. He is not stopping.*"
