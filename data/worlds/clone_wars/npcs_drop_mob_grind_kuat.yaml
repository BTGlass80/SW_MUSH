# data/worlds/clone_wars/npcs_drop_mob_grind_kuat.yaml
#
# Kuat Drive Yards Hostile Mob Grind Batch (2026-06-21)
#
# Six roaming hostile NPCs seeded across the KDY orbital ring to populate
# the solo-PvE mob-grind reward loop (engine/hunting_rewards.py).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Ring Warehouse District x2  (CIS cargo operative + black-market fence)
#   Machine Shops x1            (CIS fabrication saboteur)
#   Factories x1                (rogue assembly droid)
#   Supply Space Station x1     (pirate advance scout)
#   Deporin Shipyards x1        (Trandoshan salvage stripper)
#
# Existing KDY civilian NPCs avoided: secured areas (KSF HQ, drydocks,
# military station, corporate offices). Only non-security_level rooms used.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats grounded in sibling CW NPC patterns (Drop H / mob-grind baselines).
#   Stats UNVERIFIED against WEG40120 PDF.
# Weapons: blaster_pistol, hold_out_blaster, blaster_carbine, vibroblade —
#   all keys confirmed in data/weapons.yaml. Rogue droid uses empty
#   weapon key; combat engine falls back to brawling + STR.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # RING WAREHOUSE DISTRICT — 2 NPCs (CIS operative + black-market runner)
  # Vast freight storage bays; irregular KSF audit presence; long shadows
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Cargo Operative
    room: "Kuat Drive Yards - Ring Warehouse District"
    species: Human
    description: >-
      A Human woman in KDY contractor coveralls with a falsified
      inventory badge clipped to her collar. The badge is good work —
      close inspection reveals the serial is three characters off the
      current KSF format, which she is counting on most people not
      knowing. She moves through the warehouse rows with a dataslate
      open, cross-referencing shipment manifests she has no authorization
      to access. When she notices you watching, the dataslate goes into
      a cargo crate and the blaster comes out of a thigh holster in
      one practiced motion.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 2D+2
        strength: 2D+1
        technical: 2D+2
      skills:
        blaster: 4D
        dodge: 3D
        sneak: 3D+1
        security: 3D
        persuasion: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS intelligence operative embedded in the KDY contractor
        pool, tasked with photographing shipment manifests and
        intercepting component-routing data for CIS strategic planning.
        She is calm, professional, and trained to terminate witnesses
        before they can reach a KSF substation. She has been in the
        warehouse for six days and found what she came for; this
        encounter is a complication she intends to resolve permanently.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Clipped, neutral Basic — the accent of someone who grew up on
        the Core Worlds and trained hard to lose it. "You didn't
        see me." Fires before the sentence is finished.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She steps sideways into the cargo rows and fires from cover.*"
        - "*A precise shot from the far end of the row — she's positioning.*"
        - "*'Wrong place.' Another bolt, already moving.*"

  - name: Black-Market Parts Runner
    room: "Kuat Drive Yards - Ring Warehouse District"
    species: Nikto
    description: >-
      A broad-shouldered Nikto with the KDY worker's stamp on his
      wrist-band but no active shift logged. He has been moving
      unmarked crates from a legitimate incoming shipment to a
      secondary stack near bay seventeen — crates that will vanish
      from the official manifest before the morning audit and
      reappear in a private dock at the supply station. He has been
      running this route for four months. He does not want witnesses
      and does not intend to create them.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+1
        strength: 3D
        technical: 2D
      skills:
        blaster: 4D
        brawling: 3D+2
        intimidation: 3D
        dodge: 2D+2
        streetwise: 3D
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A black-market freight runner with four months of clean
        operations on the KDY ring. He is not ideological — the
        components go to whoever is paying the best rate, which this
        month is a Hutt broker with CIS-adjacent contracts. He is
        experienced, physically imposing, and does not hesitate to
        use the carbine when his route is at risk. He fires first
        and the intimidation is a prelude to the shot, not a
        substitute for it.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat Nikto-accented Basic, minimal vocabulary. A long look,
        a low sound that is not quite speech, and then the carbine
        is already at his shoulder.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The carbine comes up without a word.*"
        - "*He fires from a braced stance and advances behind the shot.*"
        - "*He does not speak. He fires and takes a step sideways.*"

  # ══════════════════════════════════════════════════════════════════
  # MACHINE SHOPS — 1 NPC (CIS fabrication saboteur)
  # Precision component fabrication; constant noise provides cover
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Fabrication Saboteur
    room: "Kuat Drive Yards - Machine Shops"
    species: Pantoran
    description: >-
      A Pantoran woman with the gold facial tattoos of the Pantoran
      Assembly filed down to faint lines — she does not want them
      read by KDY staff who might ask about her planet of origin.
      She wears precision-fabrication gloves and carries a calibration
      kit that, if the inner compartments were examined, contains
      small disruptor nodes designed to introduce microfractures into
      bearing housings and drive calibration rods. She has placed
      three of them in the last two shifts. When you come around the
      corner of the fabrication line, she assesses the situation in
      half a second and reaches for the hold-out blaster in her
      calibration kit's outer pocket.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 3D+2
      skills:
        blaster: 4D+1
        sneak: 3D+2
        security: 4D
        demolitions: 3D+1
        dodge: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS technical-infiltration specialist whose mission is to
        introduce subtle defects into KDY precision components — not
        enough to catch in quality control, enough to cause drive
        failures six months into a deployment. She is methodical,
        patient, and deeply aware that her cover depends entirely on
        nobody leaving this aisle alive to report what they saw.
        She fires immediately when compromised and aims for the
        communications device first.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Precise, slightly formal Basic with no regional marker.
        "This section is closed for calibration." The blaster
        is already in her hand.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She fires low, forcing you to cover, and reaches for the
          exit behind the fabrication line.*"
        - "*A second shot — she is methodical. She does not waste bolts.*"
        - "*'You should have believed the sign.' She fires again.*"

  # ══════════════════════════════════════════════════════════════════
  # FACTORIES — 1 NPC (rogue KDY assembly droid)
  # Automated production floor; organic workers are supervisors only
  # ══════════════════════════════════════════════════════════════════

  - name: Rogue Assembly Droid
    room: "Kuat Drive Yards - Factories"
    species: Droid
    description: >-
      A KDY LMC-series heavy assembly unit — roughly humanoid in
      the torso and arms, with a low-profile chassis designed to
      pass under the factory conveyor lines. Its photoreceptors
      flash orange instead of the standard white; somewhere in its
      instruction stack a maintenance subroutine has looped into
      an object-clearance protocol that no longer distinguishes
      between machinery obstructions and organic personnel. Three
      workers have been moved to the ring medical center in the past
      week. KSF is aware. The droid is still on the floor because
      nobody wants to get close enough to shut it down manually.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 1D
        mechanical: 2D
        perception: 2D
        strength: 3D+1
        technical: 2D+2
      skills:
        brawling: 4D+1
        dodge: 2D
        search: 2D+1
        lifting: 4D
      weapon: ""
      move: 8
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      personality: >-
        A heavy industrial assembly droid with a corrupted
        object-clearance subroutine running at priority-one. It does
        not distinguish threats from obstructions; anything in its
        designated work path that does not carry an active KDY
        factory-floor transponder gets classified as an obstruction
        to be cleared. Its strength is extraordinary by organic
        standards, and its chassis is built to take the kind of
        punishment a factory floor delivers. It does not experience
        pain. It does not stop.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Repetitive industrial warning alerts in a flat machine voice.
        "OBSTRUCTION DETECTED. CLEARANCE PROTOCOL ACTIVE. PLEASE
        MOVE CLEAR." It does not wait.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*OBSTRUCTION DETECTED. INITIATING CLEARANCE.*"
        - "*The heavy assembly arms swing in a wide, mechanical arc.*"
        - "*CLEARANCE PROTOCOL ACTIVE. PATHWAY MUST BE CLEAR.*"

  # ══════════════════════════════════════════════════════════════════
  # SUPPLY SPACE STATION — 1 NPC (pirate advance scout)
  # High-traffic freight hub; cover is easy among the shipping crews
  # ══════════════════════════════════════════════════════════════════

  - name: Pirate Supply Scout
    room: "Kuat - Supply Space Station"
    species: Weequay
    description: >-
      A Weequay in Outer Rim freighter crew's kit — worn jacket,
      battered helmet clipped to his belt, the kind of gear that
      blends into any busy port. He has been here for two days
      cataloguing incoming shipment schedules, docking rotations,
      and the patrol timing of the KSF inspectors. He is doing
      advance work for a four-ship raider crew that intends to
      intercept a KDY component freighter three parsecs out.
      When he realizes you have been watching him watch the
      schedules, he draws immediately — he cannot afford a KSF
      report this close to the operation's window.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D+1
        perception: 2D+2
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D
        piloting: 3D
        streetwise: 3D
        dodge: 2D+2
        search: 3D
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        An experienced pirate scout running advance reconnaissance
        for a freighter-raiding crew. He is patient, observant, and
        professional in the way people who do dangerous work for a
        living tend to be. He does not want a firefight on a station
        with a KSF presence — but he wants a witness to his
        reconnaissance operation even less. He fires accurately and
        retreats toward the freight docking collars if the exchange
        goes badly.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Weequay-accented Basic, economic and blunt. "Nothing you
        need to see here, friend." His hand is already moving.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He draws fast and fires without another word.*"
        - "*He moves toward the freight docks and fires back over
          his shoulder.*"
        - "*A controlled, accurate shot — he has done this before.*"

  # ══════════════════════════════════════════════════════════════════
  # DEPORIN SHIPYARDS — 1 NPC (Trandoshan salvage stripper)
  # Battle-damage repair yard; damaged ships create stripping opportunities
  # ══════════════════════════════════════════════════════════════════

  - name: Trandoshan Salvage Stripper
    room: "Kuat Drive Yards - Deporin Shipyards"
    species: Trandoshan
    description: >-
      A large Trandoshan with the scarring that accumulates from
      years of work in the tight spaces between a ship's hull and
      its internal frame. He is not here on a work order. He found
      a gap in the audit rotation three weeks ago and has been
      pulling navigational transponders, sensor packages, and
      power-coupling assemblies from the battle-damaged hulls
      queueing for repair certification — components that will
      never be missed because the accounting on incoming battle-
      damage is too chaotic to catch a systematic strip. When
      he hears your footfall on the deck plating, he turns with
      a vibroblade in his hand and the expression of someone who
      has already done the math on this situation.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 3D+2
        technical: 2D+1
      skills:
        melee_combat: 4D+2
        brawling: 4D
        intimidation: 3D+1
        dodge: 2D+2
        search: 2D+2
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Trandoshan opportunist who discovered a lucrative gap in
        Deporin's audit cycle and has been exploiting it with
        methodical patience. He is not a CIS asset or a professional
        criminal — he is a freelance salvager who found an open door
        and walked through it. He is large, strong, experienced with
        the vibroblade, and has no interest in negotiation when a
        witness can end a profitable operation. He attacks without
        preamble and uses the damaged ship hulls as cover instinctively.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Low, rumbling Basic with a Trandoshan rasp. No preamble.
        The vibroblade is already up when he turns around.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The vibroblade swings in a wide arc. He is faster than
          he looks.*"
        - "*He shoves a hull panel between you and steps sideways.*"
        - "*A low growl. He advances, blade angled low.*"
