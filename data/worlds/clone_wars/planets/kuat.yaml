  - id: 332
    slug: spaceport_concourse_hotel
    name: "Kuat - Spaceport Concourse Hotel"
    short_desc: "A clean, functional hotel above the spaceport concourse — KDY-affiliated, run by hospitality droids."
    description: >
      The Concourse Hotel occupies the upper deck of the main spaceport
      concourse — a covered glass walkway runs from the customs hall
      directly into the lobby, so arriving travellers can check in
      without going outside. KDY built the place as a contractor lodge
      and still leases the building to a hospitality consortium that
      runs it efficiently. Rooms are modular standardized units with
      hard surfaces and quiet ventilation. The hospitality droids
      handle check-in, room service, and most security questions; a
      single human shift manager handles anything they can't. Rate is
      fifty credits per night, payable in any major currency.
    zone: kuat_main_spaceport
    map_x: 30
    map_y: 10
    security_level: secured
    housing: true
    exits:
      out: kuat_spaceport_concourse

  - id: 333
    slug: embassy_inn
    name: "Kuat City - The Embassy Inn"
    short_desc: "A modest inn on the embassy quarter's main street — Talvik Maru's family business, three generations running."
    description: >
      The Embassy Inn is the kind of small, well-run hotel that takes
      pride in not being grand. Three stories of clean rooms above a
      ground-floor common room with a bar that serves an honest
      caf-and-pastry breakfast. Talvik Maru runs the desk; her father
      ran it before her, and his mother before him. The Maru family
      has watched three Republic ambassadors come and go from the
      building across the street, and they keep a register of their
      regular guests that goes back decades. Most of the trade is
      KDY-affiliated contractors and embassy staff on per-diem. The
      rate is fifty credits per night and includes a passably decent
      breakfast.
    zone: kuat_city_embassy
    map_x: 35
    map_y: 11
    security_level: secured
    housing: true
    exits:
      out: kuat_city_main_street
