  - id: 330
    slug: kdy_engineer_apartments
    name: "Kuat Drive Yards - Engineer Apartments"
    short_desc: "Residential block reserved for KDY engineering staff and Republic military liaison officers — Republic clearance required."
    description: >
      The engineer apartments occupy a dedicated residential ring
      attached to the orbital ring's commercial zone. Units range from
      single-occupancy studios for junior engineers to family-sized
      apartments for senior staff with dependents. The complex is
      Republic-cleared; access requires verified Republic military or
      Republic-contractor credentials with at least journeyman-level
      clearance. KDY hospitality runs the front desk. The lifts to the
      restricted production sections are accessible only from these
      residences — a perk and a leash.
    zone: kdy_orbital_ring
    map_x: 35
    map_y: 10
    security_level: secured
    housing: true
    exits:
      out: kuat_ring_apartments

  - id: 331
    slug: embassy_residential_row
    name: "Kuat City - Embassy Residential Row"
    short_desc: "A row of mid-sized residences adjacent to the Republic Embassy quarter — for visiting officers and contractors."
    description: >
      Embassy Row consists of two-story residences built into a
      long curving block that faces the embassy plaza. Each unit
      includes a small garden and a discreet rear delivery entrance.
      The residents are mostly Republic Embassy staff and visiting
      contractors — Kuati families don't live here, the Estate
      District being where they prefer to keep their distance. Republic
      Special Forces sentries make passes at irregular intervals.
      Quieter than orbital, less guarded than the Estate, and closer
      to KDY's corporate offices than either.
    zone: kuat_city_embassy
    map_x: 36
    map_y: 10
    security_level: secured
    housing: true
    exits:
      out: kuat_city_main_street

