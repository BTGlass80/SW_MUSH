  - id: 270
    slug: crystal_jewel_back_rooms
    name: "Coruscant - Crystal Jewel Cantina - Back Rooms"
    short_desc: "The back-of-cantina lodgings rented out by Wesseri the innkeeper — cheap, dangerous, no questions."
    description: >
      Behind the cantina's main floor, a narrow stairway leads up to
      a row of small letting-rooms above the bar. Wesseri runs the
      board with a heavy datapad and a heavier blaster. The rooms
      themselves are basic: cot, footlocker with a working lock, a
      sink that mostly works, a window that doesn't. Down here in the
      lower city the rate is twenty-five credits a night and the
      clientele is what you'd expect — between-jobs spacers, refugees
      with savings to stretch, the occasional bounty hunter laying
      low for a contract. Wesseri's motto, if she had one, would be
      that she does not care who you are or what you did, only that
      you pay on time and don't bring trouble onto her floor.
    zone: coruscant_lower
    map_x: 19
    map_y: 14
    security_level: lawless
    housing: true
    exits:
      out: crystal_jewel_cantina

  - id: 271
    slug: mosaic_hotel
    name: "Coruscant - The Mosaic Hotel"
    short_desc: "A small mid-tier hotel in the Gilded Cage, run by Iri Camas — twi'lek-owned and proud of it."
    description: >
      The Mosaic occupies the third through sixth floors of a converted
      apartment block in the Gilded Cage's quieter end. The lobby is
      decorated with hand-laid stone mosaics in classical Rylothian
      patterns — Iri Camas designed them herself when she bought the
      building eleven years ago. The clientele is mostly off-worlders
      who want comfortable accommodations without the Calocour Heights
      price tag, plus a regular trickle of senatorial-staff aides on
      modest expense accounts. Rooms are clean, the breakfast is
      genuinely good, and Iri runs a tight desk. The rate is thirty-
      eight credits per night.
    zone: coruscant_gilded_cage
    map_x: 18
    map_y: 9
    security_level: contested
    housing: true
    exits:
      out: gilded_cage_alien_quarter


