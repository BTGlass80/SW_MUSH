# data/worlds/clone_wars/npcs_drop_mob_grind_nar_shaddaa_deep.yaml
#
# Nar Shaddaa Warrens & Undercity Hostile Mob Grind Expansion (2026-06-21)
#
# Six roaming hostile NPCs filling Nar Shaddaa rooms that previously lacked
# a huntable mob: three in the Warrens (wilds tier) and three in the
# Undercity (contested_marches tier).
#
# Complements npcs_drop_mob_grind_nar_shaddaa.yaml (initial 6: Enforcer
# Alley x2, Warrens Entry Shaft / Reactor Core / Squat Block, Undercity
# Depths). This batch fills the six remaining empty rooms.
#
# Zone spread:
#   The Warrens - Fungal Cavern x1    (Evocii Tunnel Warden)
#   The Warrens - Scavenger Den x1    (Scavenger Camp Sentry)
#   The Warrens - Collapsed Plaza x1  (Tunnel Stalker — creature)
#   Spice Den x1                      (Spice Den Enforcer)
#   Droid Junkyard x1                 (Rogue Patrol Droid)
#   Fighting Pits x1                  (Pit Floor Enforcer)
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats grounded in sibling CW NPC patterns.
#   Sourcebooks absent in this tree — stats UNVERIFIED against WEG40120 PDF.
# Weapons: vibroblade, blaster_pistol, vibroaxe — all keys confirmed in
#   data/weapons.yaml. Tunnel Stalker uses weapon: "" (brawling + STR).
#   Rogue Patrol Droid uses blaster_pistol (integrated chassis weapon).
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # FUNGAL CAVERN — 1 NPC (Evocii Tunnel Warden)
  # Evocii tribal territory; the displaced native species does not
  # welcome outsiders into the camp hidden in the fungal growth
  # ══════════════════════════════════════════════════════════════════

  - name: Evocii Tunnel Warden
    room: "Nar Shaddaa - The Warrens - Fungal Cavern"
    species: Evocii
    description: >-
      A lean Evocii with skin the blue-grey of someone who has lived
      below sunlight for three generations. Bioluminescent fungal spores
      cling to the rough cloth wrapped around his shoulders, making him
      harder to distinguish from the glowing mushroom stalks behind him.
      He holds a salvaged vibroblade at an angle that marks his right
      hand as primary but says his left knows what to do. The Evocii
      claim the Fungal Cavern as tribal space — the camps deeper in the
      glow are his people's — and the last six outsiders who pressed past
      his position did not make it to those camps. He watches you from
      behind a mushroom cap wider than your torso and waits to see
      whether you are the seventh kind of wrong or the eighth.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 1D+2
        mechanical: 1D
        perception: 2D+2
        strength: 3D
        technical: 1D+2
      skills:
        melee_combat: 3D+2
        brawling: 3D+1
        dodge: 2D+2
        search: 3D
        survival: 3D
        sneak: 3D+1
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 0
    ai_config:
      personality: >-
        An Evocii warden whose role is to keep the Fungal Cavern tribal
        camp safe from the many factions that push through the Warrens.
        He is not aggressive by instinct — he is a protector — but he
        has been protecting this passage for eleven years and he knows
        exactly how fast the transition from warning to action must be
        if you want to still be alive afterward. Any outsider pressing
        past his position is a threat, and threats are met without
        further ceremony.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Guttural, clipped Basic filtered through a deep-tunnel accent.
        "Wrong way." The vibroblade is already angled toward you.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He steps out from the mushroom cover, vibroblade moving in a low arc.*"
        - "*He retreats a pace into the fungal growth and strikes from the shadow.*"
        - "*'Camp safe.' He drives forward again.*"

  # ══════════════════════════════════════════════════════════════════
  # SCAVENGER DEN — 1 NPC (Scavenger Camp Sentry)
  # Fortified camp perimeter; trigger-happy guard on the outer barricade
  # who shoots first and never asks questions
  # ══════════════════════════════════════════════════════════════════

  - name: Scavenger Camp Sentry
    room: "Nar Shaddaa - The Warrens - Scavenger Den"
    species: Human
    description: >-
      A Human woman perched on the durasteel barricade with a blaster
      pistol braced on one knee, scanning the passage approaches in a
      systematic sweep. She has been on the outer ring long enough that
      she no longer waits to ask questions. The Warrens has taught her
      that anyone who comes to the Den without a known face and a prior
      arrangement is either a customer who knows the signal or a thief
      who does not, and in four years she has never met the first kind
      coming from this direction without clearance. Her trigger
      discipline has gotten much simpler since month two.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D+1
        search: 4D
        streetwise: 3D
        sneak: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A Warrens scavenger camp sentry who has learned that hesitation
        kills. She is not cruel — she is efficient. Unknown face plus
        wrong approach vector equals a shot before conversation. She
        uses the barricade plates as cover, fires controlled bursts, and
        does not pursue past the outer wire because the camp's defense
        is layered and she is layer one.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat Basic with an undercity edge. "Wrong approach."
        The blaster is already trained on your center mass.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She fires from behind the durasteel plate, controlled and fast.*"
        - "*She drops below the barricade lip and fires again from a lower angle.*"
        - "*'Should've used the signal.' She fires again.*"

  # ══════════════════════════════════════════════════════════════════
  # COLLAPSED PLAZA — 1 NPC (Tunnel Stalker)
  # An apex predator has claimed the dark spaces between fallen columns
  # as its territory; the scavengers route around it
  # ══════════════════════════════════════════════════════════════════

  - name: Tunnel Stalker
    room: "Nar Shaddaa - The Warrens - Collapsed Plaza"
    species: Creature
    description: >-
      A four-limbed predator the length of a landspeeder, pale as
      bone, with joints that flex at wrong angles and eyes that pick up
      the faint bioluminescence from the deeper fungal beds with
      startling precision. It has lived in the Collapsed Plaza for
      longer than anyone has records of — the Warrens scavengers call
      it "the landlord" and route around it. Its hide is thick and
      scarred. It hunts by sound in the rubble gaps between the ancient
      columns, moving without vibration, and it has not needed to be
      fast to be successful because nothing survives the first strike.
      It selected you as its next meal approximately thirty seconds ago.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 1D
        mechanical: 1D
        perception: 3D+1
        strength: 4D
        technical: 1D
      skills:
        brawling: 5D+1
        sneak: 4D+2
        search: 3D+2
        dodge: 2D+1
      weapon: ""
      move: 14
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      personality: >-
        An apex tunnel predator that has survived for decades in the
        collapsed ruins by being patient, quiet, and decisive. It does
        not test. It does not warn. It selects prey, waits for the gap
        in attention, and strikes from the closest possible range. If
        the prey fights back effectively it retreats into the rubble to
        re-approach from a different angle — it knows the column layout
        better than any map.
      knowledge: []
      faction: wildlife
      dialogue_style: >-
        Absolute silence until it moves. The click of claws on ancient
        tile is the only warning, and it comes too late.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The Tunnel Stalker drops from the column shadow, going for your throat.*"
        - "*It retreats into the rubble gap and comes from a different angle.*"
        - "*A rapid, nearly-silent rush from the darkness between the columns.*"

  # ══════════════════════════════════════════════════════════════════
  # SPICE DEN — 1 NPC (Spice Den Enforcer)
  # The Twi'lek proprietor's protection; attacks rivals, enforcement
  # threats, and anyone flagged as unwanted
  # ══════════════════════════════════════════════════════════════════

  - name: Spice Den Enforcer
    room: "Nar Shaddaa - Spice Den"
    species: Rodian
    description: >-
      A Rodian at the far end of the den whose compound eyes track
      every entrance and exit point in a continuous sweep. He is not
      here to sample the product. The Twi'lek proprietor pays him to
      keep competitors, informants, and unwanted visitors from the
      upper levels out of the operation. He has been doing this
      specific job long enough that he categorizes new arrivals
      automatically: regular customer, a runner with delivery, or
      problem. He has already decided which category you belong to.
      The blaster is against his thigh, not holstered.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 3D+2
        search: 3D
        streetwise: 3D+1
        intimidation: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A professional Rodian enforcer contracted to protect the Spice
        Den's operation. His job is to identify and neutralize threats
        before they develop — competing spice runners scouting the
        location, enforcement agents working undercover, or simply
        anyone the proprietor signals as unwanted. He is accurate,
        fast-drawing, and does not escalate to conversation when the
        threat assessment already says threat.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Rodian-accented Basic, quiet and direct. "Wrong den."
        The blaster is up before the sentence ends.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He draws from the low position and fires without announcement.*"
        - "*He steps behind the reclining couch and fires again.*"
        - "*'Proprietor's orders.' He fires again, retreating toward the back exit.*"

  # ══════════════════════════════════════════════════════════════════
  # DROID JUNKYARD — 1 NPC (Rogue Patrol Droid)
  # Malfunctioning Hutt security chassis; IFF module corrupted, attacks
  # every biosignature in sensor range as unauthorized
  # ══════════════════════════════════════════════════════════════════

  - name: Rogue Patrol Droid
    room: "Nar Shaddaa - Droid Junkyard"
    species: Droid
    description: >-
      A security chassis from a Hutt installation three levels above,
      stripped of identifying markings and dumped here when its IFF
      module corrupted beyond the owner's patience to fix. It came
      back online seventeen months ago when a salvager accidentally
      reconnected its power cell. Its patrol protocols are intact; its
      threat-identification library is not — the corrupted IFF flags
      every biosignature in sensor range as unauthorized. The Ugnaught
      proprietor has learned to give it a wide berth and warns paying
      customers accordingly. Nobody has found the courage to shut it
      down because nobody can locate the override panel under all the
      replacement plating.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 1D+1
        mechanical: 1D+2
        perception: 2D+2
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 2D+2
        search: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 0
      dark_side_points: 0
    ai_config:
      personality: >-
        A malfunctioning Hutt security droid running corrupted patrol
        protocols. Its IFF module flags every biosignature as
        unauthorized. It does not negotiate, does not respond to
        challenge codes, and does not distinguish between threats and
        salvagers. It patrols a fixed route through the junkyard and
        engages anything within sensor range on first contact.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat, synthesized audio output: "UNAUTHORIZED BIOSIGNATURE.
        SECURITY PROTOCOL ACTIVE." It fires immediately after.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*'UNAUTHORIZED.' It fires and advances on its patrol path.*"
        - "*It tracks you through the droid parts with degraded targeting.*"
        - "*'SECURITY PROTOCOL ACTIVE.' Another shot, closer.*"

  # ══════════════════════════════════════════════════════════════════
  # FIGHTING PITS — 1 NPC (Pit Floor Enforcer)
  # Hutt-employed arena patrol; the house rule is no blasters on the
  # sand floor, and the enforcer follows the same rules he enforces
  # ══════════════════════════════════════════════════════════════════

  - name: Pit Floor Enforcer
    room: "Nar Shaddaa - Fighting Pits"
    species: Human
    description: >-
      A stocky Human with the flattened nose and scar-striped knuckles
      of a former pit fighter who found more reliable income enforcing
      the house rules than bleeding for crowd entertainment. He carries
      a vibroaxe slung at one hip — the Hutt who runs the operation
      has a strict no-blasters policy on the sand floor, and the
      enforcer follows the same rules he enforces, which is how you
      keep the regulars honest. His job is to keep unauthorized
      fighters off the arena floor, prevent premature interference in
      active bouts, and collect the forty-percent cut from any fighter
      who tries to walk out without paying. He is very good at the
      third part.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 3D+2
        technical: 2D
      skills:
        melee_combat: 4D+2
        brawling: 4D+1
        dodge: 3D
        intimidation: 3D+2
        search: 2D+1
      weapon: vibroaxe
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A former pit fighter turned enforcer who has exactly one setting
        when someone enters the sand floor without authorization:
        immediate physical removal. He prefers a single overwhelming
        strike to an extended fight — he has learned from watching bouts
        that protracted violence is for entertainment, not work. He is
        strong, accustomed to being hit without stopping, and completely
        unmoved by threats from people standing on the arena sand with
        no exit behind them.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Slow, flat Basic. "Floor's not for visitors."
        The vibroaxe is already off his hip.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He swings the vibroaxe in a single, practiced arc.*"
        - "*He absorbs the hit and shoves forward, using his weight.*"
        - "*'Forty percent first.' He swings again.*"
