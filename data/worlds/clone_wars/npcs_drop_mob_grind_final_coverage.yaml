# data/worlds/clone_wars/npcs_drop_mob_grind_final_coverage.yaml
#
# Final Coverage Sweep — Mob Grind Hostile NPCs (2026-06-24)
#
# Completes mob-grind hostile-NPC coverage for all remaining uncovered
# publicly-accessible planet rooms across Coruscant and Nar Shaddaa.
# All ten NPCs satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Room coverage (verified no prior NPC in any of these rooms):
#   Coruscant - The Falleen Syndicate Tower  (monumental_district, frontier) x2
#   Coruscant - Coco Town                   (commercial_district, settled)   x2
#   Coruscant - Dexter's Diner              (commercial_district, settled)   x2
#   Nar Shaddaa - Ship Parts Emporium       (nar_shaddaa_promenade, settled)  x2
#   Nar Shaddaa - Renna Dox's Workshop      (nar_shaddaa_promenade, settled)  x2
#
# All rooms confirmed present in planet YAMLs; no prior mob-grind coverage
# (verified grep across all npcs_drop_mob_grind_*.yaml files).
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats grounded in sibling CW NPC patterns.
#   WEG40120 PDF unavailable in this tree — stats UNVERIFIED vs PDF.
# Weapons: blaster_pistol, hold_out_blaster, concealed_blaster,
#   vibroblade, heavy_blaster_pistol — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # CORUSCANT - THE FALLEEN SYNDICATE TOWER — 2 NPCs
  # (monumental_district, security: secured, threat_band: frontier)
  # The Falleen Syndicate's Coruscant headquarters: pheromone-laced
  # terraces, engineered biochemical gardens, operatives stationed
  # openly because the Syndicate owns enough Senate staff to stay untouchable.
  # ══════════════════════════════════════════════════════════════════

  - name: Falleen Syndicate Lieutenant
    room: "Coruscant - The Falleen Syndicate Tower"
    species: Falleen
    description: >-
      A Falleen woman in a pearl-grey tunic bearing no insignia stands
      at the edge of the terrace garden, watching the skylane traffic
      below. She has the unhurried posture of someone who owns the air
      around her — which, given the Falleen pheromone gradient drifting
      from the tower's engineered flora, she very nearly does. She
      registers you the moment you step onto the terrace and her
      expression does not change, which is the most alarming thing
      about her.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 3D
        mechanical: 2D+1
        perception: 3D+2
        strength: 2D+2
        technical: 2D+1
      skills:
        blaster: 4D+2
        intimidation: 5D
        con: 4D+1
        persuasion: 4D+2
        dodge: 4D
        sneak: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A mid-tier Falleen Syndicate field lieutenant who manages the
        Tower's day-to-day operational security and talent acquisition.
        She is patient, analytically cold, and does not raise her voice —
        the pheromone manipulation she practices is a calculated tool,
        not a vanity. When an uninvited presence becomes a liability she
        moves to resolve it with minimal theater and maximum efficiency.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Low, measured Basic with precise diction. She offers you one
        redirect. "The garden is private. You should leave." If you
        don't, the blaster comes up without further discussion.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She draws the blaster with the economy of someone who practices daily.*"
        - "*'You chose this.' She fires twice — no wasted motion.*"
        - "*She retreats toward the tower interior, maintaining precise targeting.*"

  - name: Syndicate Security Contractor
    room: "Coruscant - The Falleen Syndicate Tower"
    species: Weequay
    description: >-
      A broad-shouldered Weequay in civilian contractor's clothes
      leans against the terrace balustrade, arms folded, watching
      the lift access with a patience that suggests he has been doing
      this for a very long time. He is not Falleen but the Syndicate
      pays better than anyone else in this district, and his contract
      specifies no questions about the work. He straightens when you
      arrive somewhere you should not be.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 3D+2
        technical: 2D
      skills:
        brawling: 4D+2
        blaster: 4D
        intimidation: 4D+1
        dodge: 3D+1
        melee_combat: 4D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A Weequay security contractor employed by the Falleen Syndicate
        for physical deterrence. He has no allegiance to their
        operations — he is paid to keep unauthorized people away from
        the Tower's upper terrace and to make problems disappear quietly.
        He is direct, aggressive, and has no interest in explanations
        from people who were not supposed to be here.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Gravelly Weequay Basic, minimal. "Wrong floor." That is the
        full warning. Then he moves.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He pushes off the balustrade and closes the distance fast.*"
        - "*The heavy blaster comes up. 'Last chance.' He does not mean it.*"
        - "*He absorbs the hit without slowing and fires again.*"

  # ══════════════════════════════════════════════════════════════════
  # CORUSCANT - COCO TOWN — 2 NPCs
  # (commercial_district, security: secured, threat_band: settled)
  # Mid-level Coruscant neighborhood under the Senate towers; street
  # vendors, tired civilians, Clone troopers on leave, and the shadow
  # economy that feeds on all of them. War has made everything expensive
  # and everyone a little more desperate.
  # ══════════════════════════════════════════════════════════════════

  - name: Coco Town Surplus Fence
    room: "Coruscant - Coco Town"
    species: Zabrak
    description: >-
      A Zabrak man in a faded merchant's coat moves between the
      repulsorlift food carts with the ease of someone who knows every
      vendor on this block and owes most of them a favor. He is selling
      surplus clone-issue medical kits, ration packs, and sensor
      components to anyone who asks the right questions — all of it
      diverting from a Republic logistics chain that has too many moving
      parts to notice a steady bleed. He notices you noticing him and
      his expression hardens.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D+1
      skills:
        blaster: 3D+2
        con: 4D
        streetwise: 4D+1
        dodge: 3D
        bargain: 3D+2
      weapon: concealed_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A mid-level logistics fence who diverts Republic military surplus
        through Coco Town's informal market network. He is careful,
        professionally paranoid, and has survived three Senate anti-
        corruption sweeps by knowing who to pay. Being identified by a
        stranger in a public street is exactly the scenario that ends
        careers — and he responds to it immediately.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat, transactional Zabrak Basic. "Move along." If you push:
        "You're making a mistake." Then the concealed blaster comes out.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He steps back between two carts and draws the concealed blaster.*"
        - "*'You should have kept walking.' He fires.*"
        - "*He ducks behind a vendor cart, using the crowd as cover.*"

  - name: Hutt Collection Enforcer
    room: "Coruscant - Coco Town"
    species: Human
    description: >-
      A lean Human man in nondescript working clothes stands at the
      corner of the food-stall row, watching the civilian foot traffic
      with the systematic attention of someone running a mental list.
      He works a Hutt-backed debt-collection route through the mid-level
      residential blocks, and Coco Town is on his afternoon circuit.
      The vibroblade under his coat is the polite version of his
      employer's preferred communication method. He spots you and reads
      something in your posture that he decides is a threat to the
      circuit's integrity.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 3D+1
        technical: 2D
      skills:
        melee_combat: 4D+1
        brawling: 4D
        intimidation: 3D+2
        dodge: 3D
        blaster: 3D+1
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        A Hutt-employed debt-collection enforcer running a standard
        mid-level circuit through Coco Town. He is not subtle and not
        interested in conversation — his method is direct physical
        pressure and the promise of more if payments are missed. When
        a stranger interferes with his circuit he treats it as an
        employer-sanctioned threat.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Clipped, dismissive Basic. "None of your business." He does
        not elaborate. He draws the vibroblade and the conversation ends.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He draws the vibroblade and comes forward without hesitation.*"
        - "*He absorbs the hit and keeps coming — he has taken worse.*"
        - "*He drives forward, using his weight, trying to close to grappling range.*"

  # ══════════════════════════════════════════════════════════════════
  # CORUSCANT - DEXTER'S DINER — 2 NPCs
  # (commercial_district, security: secured, threat_band: settled)
  # A working-class diner in the lower Coco Town block: greasy food,
  # cheap booze, Clone troopers on leave, and the kind of quiet corner
  # conversations that would not survive the light. War-time desperation
  # has made the back booths a marketplace for information, debts, and
  # people who don't want to be found.
  # ══════════════════════════════════════════════════════════════════

  - name: War-Profiteer Broker
    room: "Coruscant - Dexter's Diner"
    species: Quarren
    description: >-
      A Quarren in a respectable-quality civilian jacket has claimed
      the same back booth for the last three weeks, running a business
      that does not appear on any registered manifest. He moves
      battlefield-salvaged medical supplies and clone-issue rations into
      the civilian gray market at two hundred percent markup, and he
      uses this diner because the food is cheap enough that his
      extended occupation of a table does not draw comment. He is
      comfortable, profitable, and does not appreciate being interrupted
      mid-transaction.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+1
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D+2
      skills:
        blaster: 3D+1
        bargain: 4D+1
        con: 4D
        streetwise: 3D+2
        dodge: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A war-profiteer operating a battlefield-salvage resale network
        from a fixed Coco Town location. He is financially comfortable,
        casually criminal, and views interruptions to his operations as
        a cost-of-business risk to be neutralized. He is not brave
        but he is practical: a witness in a public diner is a problem
        he prefers to manage before the witness leaves.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Smooth, slightly oily Quarren Basic. "I'm sure we can come to
        an arrangement." If the arrangement is not forthcoming, the
        hold-out blaster appears under the table.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He produces the hold-out blaster under the table edge.*"
        - "*'I prefer things quiet.' He fires from below the tabletop.*"
        - "*He slides out of the booth and fires, using the counter as partial cover.*"

  - name: Skip-Trace Contractor
    room: "Coruscant - Dexter's Diner"
    species: Duros
    description: >-
      A Duros with the long-traveled look of someone who has spent too
      much time in hyperspace occupies a counter stool near the exit,
      nursing something hot and watching the room with the systematic
      attention of a professional. He finds people for money — people
      who owe Hutts, people who have skipped Republic-affiliated payment
      plans, people whose families would like to know where they are
      for a fee. He has a mark in this diner tonight and you have
      walked between him and the door at the wrong moment.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D+1
        perception: 3D+2
        strength: 2D
        technical: 2D
      skills:
        blaster: 4D
        investigation: 4D
        streetwise: 3D+2
        dodge: 3D+1
        con: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A freelance skip-trace contractor who locates debtors and
        fugitives for Hutt-connected creditors. He treats every
        operational complication as a variable to be solved. A stranger
        who interferes with a live trace is exactly that — a variable —
        and he responds to variables with the blaster pistol holstered
        inside his jacket.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Tired, efficient Duros Basic. No preamble. "You're going to
        want to sit back down." Then the blaster comes out.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He comes off the counter stool and draws in the same motion.*"
        - "*He fires twice and moves toward the exit — he prefers room to work.*"
        - "*'Nothing personal.' He fires again, staying mobile.*"

  # ══════════════════════════════════════════════════════════════════
  # NAR SHADDAA - SHIP PARTS EMPORIUM — 2 NPCs
  # (nar_shaddaa_promenade, security: contested, threat_band: settled)
  # Seven floors of stolen and salvaged ship components, operated by
  # a Sullustan owner who maintains careful ignorance about provenance.
  # The war has made hyperdrive motivators worth more than blasters,
  # which makes this place a target for everyone from heist crews
  # to desperate independent freighter operators.
  # ══════════════════════════════════════════════════════════════════

  - name: Parts-Casing Scout
    room: "Nar Shaddaa - Ship Parts Emporium"
    species: Rodian
    description: >-
      A Rodian in worn spacer's clothes moves through the component
      shelving with a datapad, taking notes that are not inventory
      assessments. He has been working this floor for forty minutes,
      timing staff patterns and tagging the high-value motivator
      rack for a crew waiting in a docking bay three platforms down.
      When you watch him long enough to make the connection, he
      abandons the datapad and produces the hold-out blaster with
      the speed of someone who has been caught in this particular
      situation before.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D+2
        perception: 3D+1
        strength: 2D
        technical: 2D
      skills:
        blaster: 3D+2
        sneak: 4D
        streetwise: 3D+1
        dodge: 3D
        con: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        A heist-crew scout casing the Ship Parts Emporium for a
        motivated hyperdrive-component theft. He is careful, fast,
        and has a professional's dislike of witnesses. When exposed
        he goes for the hold-out blaster immediately and tries to
        create enough chaos to exit before anyone can lock the floor.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Rapid Rodian-accented Basic. "You didn't see me." Then the
        hold-out blaster comes out before you can answer.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He drops the datapad and draws the hold-out blaster in one motion.*"
        - "*He fires toward the exit and runs between the shelving rows.*"
        - "*He knocks a component rack into your path and keeps moving.*"

  - name: Stolen Stock Enforcer
    room: "Nar Shaddaa - Ship Parts Emporium"
    species: Nikto
    description: >-
      A Nikto in unmarked gray coveralls walks the upper shelving
      levels with a vibroblade on his hip and no pretense of shopping.
      The Sullustan owner subcontracts the enforcement of the Emporium's
      informal no-questions policy to him: anyone who spends too much
      time asking where the motivators came from, or who photographs
      component serial numbers, gets a personal conversation with the
      Nikto before they reach the ground floor. He has already decided
      you are one of those people.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 3D+2
        technical: 2D
      skills:
        melee_combat: 4D+2
        brawling: 4D+1
        intimidation: 4D
        dodge: 3D
        blaster: 3D
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        A privately contracted security enforcer keeping the Emporium's
        provenance questions from reaching anyone with authority. He is
        blunt, physical, and does not waste words explaining his role.
        His job is to make people who know too much decide they know
        nothing, and he prefers the direct approach.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Harsh Nikto Basic, minimal. "You're done here." He draws the
        vibroblade. That is the conversation.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The vibroblade is in his hand before the sentence ends.*"
        - "*He drives forward, swinging wide to force you back against the shelving.*"
        - "*'Wrong place to ask questions.' He presses the attack.*"

  # ══════════════════════════════════════════════════════════════════
  # NAR SHADDAA - RENNA DOX'S WORKSHOP — 2 NPCs
  # (nar_shaddaa_promenade, security: contested, threat_band: settled)
  # Zabrak mechanic's workshop crammed with ship components and schematics;
  # Renna Dox is skilled enough to be valuable and independent enough
  # to be a target. Protection rackets and component thieves both
  # view her workshop as an ongoing opportunity.
  # ══════════════════════════════════════════════════════════════════

  - name: Workshop Shakedown Agent
    room: "Nar Shaddaa - Renna Dox's Workshop"
    species: Trandoshan
    description: >-
      A Trandoshan in battered mercenary-surplus armor stands in the
      workshop doorway with the easy posture of someone who has made
      this particular visit before and expects it to go the same way
      it always does. He works a protection circuit for a mid-tier
      Hutt-connected operation, and Renna Dox's Workshop is three
      payments behind. The tools on the workbenches and the schematics
      on the walls represent enough credits to cover the debt twice
      over, and he has been given permission to collect in kind if
      credits are not available. He sees you before you see him.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 3D+2
        technical: 2D
      skills:
        brawling: 4D+2
        blaster: 3D+2
        intimidation: 4D+1
        dodge: 3D
        melee_combat: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 2
    ai_config:
      personality: >-
        A Trandoshan enforcement agent running a Hutt-backed protection
        shakedown on Promenade workshop owners. He views the work as
        straightforward debt collection with an implied threat of
        property destruction, and he deals with unexpected complications
        — a bystander, a defender — the same way he deals with debtors
        who don't have the credits: with immediate physical force.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Gravelly Trandoshan Basic, unhurried. "You don't want to be
        here for this." If you stay: the blaster comes up and the
        threat becomes an action.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He drops any pretense and raises the blaster.*"
        - "*'Your call.' He fires.*"
        - "*He backs toward the door, keeping the blaster trained — he prefers exits.*"

  - name: Component Stripping Thief
    room: "Nar Shaddaa - Renna Dox's Workshop"
    species: Arcona
    description: >-
      An Arcona crouches over a half-dismantled ship sensor array at
      the back of the workshop, working a powered driver with practiced
      efficiency. She is not an employee — she slipped in through the
      maintenance access on the building's lower level and has been
      stripping high-value sensor components from the bench stock for
      the better part of an hour. The components are worth enough to
      cover three months' rent in the Corellian Sector. She hears you
      before you see her and comes up with the concealed blaster already
      in her hand.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 3D
        perception: 3D
        strength: 2D
        technical: 3D+1
      skills:
        blaster: 3D+2
        sneak: 4D+2
        security: 4D
        dodge: 3D+1
        con: 3D
      weapon: concealed_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A skilled component thief specializing in workshop break-ins
        for high-value electronic parts. She is fast, quiet, and risk-
        averse — she prefers to be gone before anyone knows she was
        there. When caught mid-job she goes immediately to the concealed
        blaster rather than trying to talk her way out: words take time
        she doesn't have.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Brief, clipped Arcona Basic. "Don't." She fires if you move
        toward her. She fires if you shout. She fires.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She comes up from the bench with the concealed blaster already drawn.*"
        - "*She fires twice and moves toward the maintenance access hatch.*"
        - "*'Wrong time.' She fires again, stepping back toward the exit.*"
