# data/worlds/clone_wars/npcs_drop_mob_grind_final_coverage.yaml
#
# Final Coverage Sweep — Mob Grind Hostile NPCs (2026-06-24)
#
# Completes mob-grind hostile-NPC coverage for all remaining uncovered
# publicly-accessible planet rooms across Coruscant and Nar Shaddaa.
# All ten NPCs satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Room coverage (verified no prior NPC in any of these rooms):
#   Coruscant - The Falleen Syndicate Tower  (monumental_district, frontier) x2
#   Coruscant - Coco Town                   (commercial_district, settled)   x2
#   Coruscant - Dexter's Diner              (commercial_district, settled)   x2
#   Nar Shaddaa - Ship Parts Emporium       (nar_shaddaa_promenade, settled)  x2
#   Nar Shaddaa - Renna Dox's Workshop      (nar_shaddaa_promenade, settled)  x2
#
# All rooms confirmed present in planet YAMLs; no prior mob-grind coverage
# (verified grep across all npcs_drop_mob_grind_*.yaml files).
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats grounded in sibling CW NPC patterns.
#   WEG40120 PDF unavailable in this tree — stats UNVERIFIED vs PDF.
# Weapons: blaster_pistol, hold_out_blaster, concealed_blaster,
#   vibroblade, heavy_blaster_pistol — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # NAR SHADDAA - SHIP PARTS EMPORIUM — 2 NPCs
  # (nar_shaddaa_promenade, security: contested, threat_band: settled)
  # Seven floors of stolen and salvaged ship components, operated by
  # a Sullustan owner who maintains careful ignorance about provenance.
  # The war has made hyperdrive motivators worth more than blasters,
  # which makes this place a target for everyone from heist crews
  # to desperate independent freighter operators.
  # ══════════════════════════════════════════════════════════════════

  - name: Parts-Casing Scout
    room: "Nar Shaddaa - Ship Parts Emporium"
    species: Rodian
    description: >-
      A Rodian in worn spacer's clothes moves through the component
      shelving with a datapad, taking notes that are not inventory
      assessments. He has been working this floor for forty minutes,
      timing staff patterns and tagging the high-value motivator
      rack for a crew waiting in a docking bay three platforms down.
      When you watch him long enough to make the connection, he
      abandons the datapad and produces the hold-out blaster with
      the speed of someone who has been caught in this particular
      situation before.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D+2
        perception: 3D+1
        strength: 2D
        technical: 2D
      skills:
        blaster: 3D+2
        sneak: 4D
        streetwise: 3D+1
        dodge: 3D
        con: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        A heist-crew scout casing the Ship Parts Emporium for a
        motivated hyperdrive-component theft. He is careful, fast,
        and has a professional's dislike of witnesses. When exposed
        he goes for the hold-out blaster immediately and tries to
        create enough chaos to exit before anyone can lock the floor.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Rapid Rodian-accented Basic. "You didn't see me." Then the
        hold-out blaster comes out before you can answer.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He drops the datapad and draws the hold-out blaster in one motion.*"
        - "*He fires toward the exit and runs between the shelving rows.*"
        - "*He knocks a component rack into your path and keeps moving.*"

  - name: Stolen Stock Enforcer
    room: "Nar Shaddaa - Ship Parts Emporium"
    species: Nikto
    description: >-
      A Nikto in unmarked gray coveralls walks the upper shelving
      levels with a vibroblade on his hip and no pretense of shopping.
      The Sullustan owner subcontracts the enforcement of the Emporium's
      informal no-questions policy to him: anyone who spends too much
      time asking where the motivators came from, or who photographs
      component serial numbers, gets a personal conversation with the
      Nikto before they reach the ground floor. He has already decided
      you are one of those people.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 3D+2
        technical: 2D
      skills:
        melee_combat: 4D+2
        brawling: 4D+1
        intimidation: 4D
        dodge: 3D
        blaster: 3D
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 1
    ai_config:
      personality: >-
        A privately contracted security enforcer keeping the Emporium's
        provenance questions from reaching anyone with authority. He is
        blunt, physical, and does not waste words explaining his role.
        His job is to make people who know too much decide they know
        nothing, and he prefers the direct approach.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Harsh Nikto Basic, minimal. "You're done here." He draws the
        vibroblade. That is the conversation.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The vibroblade is in his hand before the sentence ends.*"
        - "*He drives forward, swinging wide to force you back against the shelving.*"
        - "*'Wrong place to ask questions.' He presses the attack.*"

  # ══════════════════════════════════════════════════════════════════
  # NAR SHADDAA - RENNA DOX'S WORKSHOP — 2 NPCs
  # (nar_shaddaa_promenade, security: contested, threat_band: settled)
  # Zabrak mechanic's workshop crammed with ship components and schematics;
  # Renna Dox is skilled enough to be valuable and independent enough
  # to be a target. Protection rackets and component thieves both
  # view her workshop as an ongoing opportunity.
  # ══════════════════════════════════════════════════════════════════

  - name: Workshop Shakedown Agent
    room: "Nar Shaddaa - Renna Dox's Workshop"
    species: Trandoshan
    description: >-
      A Trandoshan in battered mercenary-surplus armor stands in the
      workshop doorway with the easy posture of someone who has made
      this particular visit before and expects it to go the same way
      it always does. He works a protection circuit for a mid-tier
      Hutt-connected operation, and Renna Dox's Workshop is three
      payments behind. The tools on the workbenches and the schematics
      on the walls represent enough credits to cover the debt twice
      over, and he has been given permission to collect in kind if
      credits are not available. He sees you before you see him.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 3D+2
        technical: 2D
      skills:
        brawling: 4D+2
        blaster: 3D+2
        intimidation: 4D+1
        dodge: 3D
        melee_combat: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 1
      dark_side_points: 2
    ai_config:
      personality: >-
        A Trandoshan enforcement agent running a Hutt-backed protection
        shakedown on Promenade workshop owners. He views the work as
        straightforward debt collection with an implied threat of
        property destruction, and he deals with unexpected complications
        — a bystander, a defender — the same way he deals with debtors
        who don't have the credits: with immediate physical force.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Gravelly Trandoshan Basic, unhurried. "You don't want to be
        here for this." If you stay: the blaster comes up and the
        threat becomes an action.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He drops any pretense and raises the blaster.*"
        - "*'Your call.' He fires.*"
        - "*He backs toward the door, keeping the blaster trained — he prefers exits.*"

  - name: Component Stripping Thief
    room: "Nar Shaddaa - Renna Dox's Workshop"
    species: Arcona
    description: >-
      An Arcona crouches over a half-dismantled ship sensor array at
      the back of the workshop, working a powered driver with practiced
      efficiency. She is not an employee — she slipped in through the
      maintenance access on the building's lower level and has been
      stripping high-value sensor components from the bench stock for
      the better part of an hour. The components are worth enough to
      cover three months' rent in the Corellian Sector. She hears you
      before you see her and comes up with the concealed blaster already
      in her hand.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 3D
        perception: 3D
        strength: 2D
        technical: 3D+1
      skills:
        blaster: 3D+2
        sneak: 4D+2
        security: 4D
        dodge: 3D+1
        con: 3D
      weapon: concealed_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A skilled component thief specializing in workshop break-ins
        for high-value electronic parts. She is fast, quiet, and risk-
        averse — she prefers to be gone before anyone knows she was
        there. When caught mid-job she goes immediately to the concealed
        blaster rather than trying to talk her way out: words take time
        she doesn't have.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Brief, clipped Arcona Basic. "Don't." She fires if you move
        toward her. She fires if you shout. She fires.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She comes up from the bench with the concealed blaster already drawn.*"
        - "*She fires twice and moves toward the maintenance access hatch.*"
        - "*'Wrong time.' She fires again, stepping back toward the exit.*"
