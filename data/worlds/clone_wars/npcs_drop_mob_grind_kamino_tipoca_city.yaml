# data/worlds/clone_wars/npcs_drop_mob_grind_kamino_tipoca_city.yaml
#
# Kamino Tipoca City Hostile Mob Grind Batch (2026-06-22)
#
# Six roaming hostile NPCs seeded across the Tipoca City zone
# (kamino_tipoca_city) to populate the solo-PvE mob-grind reward loop
# (engine/hunting_rewards.py). All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Thematic premise: CIS multi-front intelligence operation against Tipoca City's
# administrative and research zones. At ~20 BBY the CIS has strong strategic
# interest in mapping Republic clone production manifests, behavioral conditioning
# protocols, and deployment schedules. Six original operatives are embedded
# under Republic contractor, research, and diplomatic credentials.
#
# Zone spread:
#   Main Corridor x1            (Sullustan courier impostor)
#   Briefing Room x1            (Umbaran intelligence observer)
#   Visitor Dining Hall x1      (Falleen liaison operative)
#   Medical Bay x1              (Duros inspector saboteur)
#   Library and Research Archive x1  (Gran archive researcher)
#   Administration x1           (Aqualish procurement agent)
#
# Avoided rooms with existing ambient NPCs:
#   Arrivals Hall → Kaminoan Attendant Kel Avon (npcs_drop_kamino_interiors_ambient.yaml)
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF absent from this worktree;
#   stats grounded in sibling CW NPC patterns (Cloning Halls mob-grind baselines)
#   and marked UNVERIFIED vs WEG40120 PDF.
# Weapons: blaster_pistol, heavy_blaster_pistol — all keys confirmed in
#   data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # MAIN CORRIDOR — 1 NPC
  # Central administrative thoroughfare connecting Tipoca City's
  # major facilities. Heavy foot traffic from Republic contractors,
  # Kaminoan staff, and military liaisons — useful cover for an agent
  # who needs to move without appearing to go anywhere in particular.
  # ══════════════════════════════════════════════════════════════════

  - name: Republic Courier Impostor
    room: "Kamino - Tipoca City - Main Corridor"
    species: Sullustan
    description: >-
      A Sullustan in Republic Logistics Corps livery with an official
      data satchel he carries with the practiced ease of someone who
      has made this exact walk through this exact corridor many times.
      He has made it eleven times. Each time, the satchel carried
      documents; each time, the satchel also carried a passive data-
      harvesting module drawing traffic telemetry from the corridor's
      administrative network nodes. The Republic ID clipped to his
      lapel is a precision forgery. When he registers you stopping
      to look at him too long, his hand drops and the pistol clears
      the satchel with a motion that took weeks to practice.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D+1
      skills:
        blaster: 3D+2
        dodge: 3D
        con: 4D
        sneak: 3D+1
        streetwise: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS logistics operative running a passive data-collection
        network through Tipoca City's main corridor. He poses as a
        Republic contractor on a standing delivery rotation. His
        primary value is the pattern data he has assembled over eleven
        runs — schedules, personnel movements, production timing. He
        is not a front-line combatant but he is careful, fast, and
        has planned his exit from this conversation.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Friendly, slightly rushed Basic — contractor tone, always
        somewhere to be. "Excuse me, authorized personnel only." Then
        the pistol is already moving.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires one-handed, the satchel swinging as he moves.*"
        - "*He keeps the pistol up and angles for the junction.*"
        - "*'I just needed two more runs.' He fires without looking back.*"

  # ══════════════════════════════════════════════════════════════════
  # BRIEFING ROOM — 1 NPC
  # Formal briefing space for Republic military representatives
  # receiving status updates on clone production and deployment
  # timelines. An intelligence goldmine for anyone with a seat.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Briefing Room Infiltrator
    room: "Kamino - Tipoca City - Briefing Room"
    species: Umbaran
    description: >-
      An Umbaran in the pressed uniform of a Republic Strategic
      Analysis office — pale, still, and carrying the deliberate
      composure that the species cultivates as a default posture.
      He sits at the far edge of the briefing room's observer row
      with a datapad he has not written on in forty minutes; he does
      not need to. He has been listening to Republic clone deployment
      projections and committing them to memory with the methodical
      thoroughness that is either a gift or a learned behavior,
      and he would not tell you which. When the room empties and
      you are still here, he turns his pale eyes toward you with
      an expression that communicates nothing useful.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+1
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 2D+2
      skills:
        blaster: 3D+1
        dodge: 3D
        con: 3D+2
        bureaucracy: 4D
        search: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A senior CIS intelligence specialist who has spent four
        sessions in the Tipoca City briefing rotation memorizing
        Republic clone deployment projections. The Umbaran capacity
        for patience and detail-retention makes him extremely
        effective at this specific task. He is unhurried about the
        confrontation — he has already transmitted the most valuable
        data — and approaches violence with the same measured quality
        he brings to everything else.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Measured, slightly formal Basic. A long pause before he
        speaks. "You should leave this room." Silence. Then the
        pistol comes up without urgency.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires precisely, from the same position, without hurry.*"
        - "*He moves only enough to keep the sight line clear.*"
        - "*'The briefing was very informative.' He keeps shooting.*"

  # ══════════════════════════════════════════════════════════════════
  # VISITOR DINING HALL — 1 NPC
  # Social dining space for Republic officials and inspectors.
  # Kaminoan food, extraordinary ocean views, and an unusually high
  # concentration of Republic officers willing to talk over a meal.
  # ══════════════════════════════════════════════════════════════════

  - name: Diplomatic Liaison Operative
    room: "Kamino - Tipoca City - Visitor Dining Hall"
    species: Falleen
    description: >-
      A Falleen in the understated formal wear of a Republic diplomatic
      liaison office, seated alone with a half-finished meal and the
      relaxed ease of someone who has been here long enough to be
      considered furniture. He has been here twenty-two days. He has
      had dinner with eight different Republic officers in that time.
      The conversations have been excellent — officers relax with good
      food and someone who listens well and never asks the obvious
      question directly. He keeps the information in a compressed
      file that transmits automatically when he crosses the exit
      corridor's trigger point. When you sit down across from him
      without being invited, something in his expression changes
      precisely a degree and a half.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 3D+1
        strength: 2D
        technical: 2D+1
      skills:
        blaster: 3D+2
        dodge: 3D
        con: 4D+1
        persuasion: 4D
        willpower: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS social intelligence operative running a long-horizon
        information extraction operation through the Republic officer
        dining circuit. He builds rapport over weeks and extracts
        strategic intelligence through conversation rather than
        technical means. He is accustomed to managing unexpected
        situations calmly — the Falleen pheromone advantage only
        works on humanoids close enough to breathe; at range, he
        has the pistol, which has no such limitation.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Warm, engaging Basic — exactly the kind of voice you want
        to keep talking to. "This is an awkward moment, isn't it."
        A small smile. Then the pistol, unhurried.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires with the same easy precision he brings to everything.*"
        - "*He moves to the next table for cover, still unhurried.*"
        - "*'Twenty-two days.' He keeps shooting. 'Worth it.'*"

  # ══════════════════════════════════════════════════════════════════
  # MEDICAL BAY — 1 NPC
  # Advanced clone medical facility. Kaminoan medical science at its
  # most precise — and most exposed to subtle modification by someone
  # with the right credentials and enough patience.
  # ══════════════════════════════════════════════════════════════════

  - name: Clone Medical Inspector
    room: "Kamino - Tipoca City Medical Bay"
    species: Duros
    description: >-
      A Duros with the gray-green complexion and large red eyes of
      his species, carrying a Republic Medical Standards clipboard
      that is extremely thorough and entirely fictional. He has
      been conducting a "standards compliance review" of Tipoca
      City's medical protocols for nine days — long enough to build
      access to the behavioral conditioning update queue, where
      he has been introducing subtle adjustments to the clone
      physiological baselines. The changes are small. Over six
      months they degrade response latency by twelve percent.
      A Kaminoan medical technician watches him with an expression
      that may be suspicion or may simply be the Kaminoan default.
      When you enter, the Duros does not look up from his clipboard.
      Then he does.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 2D+2
        mechanical: 2D
        perception: 2D+2
        strength: 2D
        technical: 3D+2
      skills:
        blaster: 3D+1
        dodge: 3D
        con: 3D+2
        medicine: 4D+1
        security: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS medical infiltration specialist running a long-term
        behavioral modification program against the clone medical
        infrastructure. He is not primarily a combatant — he relies
        on documentation, credentials, and the institutional
        reluctance to challenge someone who looks like they belong.
        He has thought carefully about what happens if he is
        discovered, and he has prepared accordingly, which is a
        pistol in his coat pocket and a clean exit route via the
        maintenance access hatch behind the treatment bay.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Precise, slightly bored Basic — the sound of someone who
        has filled in a great deal of paperwork. "This is a
        restricted area, please." Then the pistol comes out and
        he stops sounding bored.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires and moves toward the maintenance hatch.*"
        - "*The clipboard hits the floor. The pistol doesn't waver.*"
        - "*'Nine days.' He fires again. 'I was almost done.'*"

  # ══════════════════════════════════════════════════════════════════
  # LIBRARY AND RESEARCH ARCHIVE — 1 NPC
  # Centuries of Kaminoan genetic research, cloning methodology,
  # and behavioral conditioning documentation. Most is inaccessible
  # on intellectual property grounds — unless you have academic
  # credentials and a very specific research brief.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Archive Researcher
    room: "Kamino - Tipoca City Library and Research Archive"
    species: Gran
    description: >-
      A Gran with the three-eyestalk clusters of his species, seated
      at a research terminal with an academic research permit from an
      institution that exists on paper and in three different credit-
      routing networks. He has been here six days, which is how long
      it has taken to navigate the Kaminoan intellectual property
      access tiers to the level he actually needs. He is currently
      forty percent through copying the baseline clone genetic template
      documentation — not the raw code, which is stored offline, but
      the theoretical framework, which turns out to be more valuable
      to the CIS research programs he works for. He does not look up
      when you enter. Then he does, and one of his three eyes tracks
      to the door.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 3D
      skills:
        blaster: 3D+2
        dodge: 3D
        computer: 4D+2
        con: 3D+2
        search: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS technical research operative tasked with extracting
        Kaminoan genetic methodology documentation. He is patient,
        systematic, and has no combat background to speak of — the
        pistol is his contingency plan, not his primary tool. He
        fires to create distance and time rather than to win the
        exchange, and his first priority is always the datachip
        in his left coat pocket.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Quiet, slightly distracted Basic — the voice of someone
        deep in research. "I have authorization, please check the
        desk terminal." Then the terminal goes dark and the pistol
        comes up.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires and sidesteps deeper into the archive stacks.*"
        - "*One eye tracks the exit. Two track you. He keeps firing.*"
        - "*The datachip goes into a secondary pocket. He fires again.*"

  # ══════════════════════════════════════════════════════════════════
  # ADMINISTRATION — 1 NPC
  # The nerve center of Republic-Kaminoan contract management:
  # production orders, delivery timelines, and the scheduling data
  # that underpins the entire clone army logistical pipeline.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Procurement Representative
    room: "Kamino - Tipoca City Administration"
    species: Aqualish
    description: >-
      An Aqualish in a Republic Procurement Corps uniform with a
      badge that lists his name as something with too many consonants
      to be remembered easily, which is by design. He has been
      attending administrative coordination meetings for two weeks
      as a representative of a Republic logistics sub-contractor.
      The meetings involve clone production manifest reviews, delivery
      timeline reconciliation, and batch allocation scheduling — all
      of which he has been transmitting in compressed form to a
      frequency-hopping relay three systems out. He is large for an
      Aqualish, carries himself with the confidence of someone whose
      cover has held through fourteen of these meetings, and has a
      heavy blaster under the procurement jacket that he has not
      needed to use yet.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 4D
        dodge: 3D+1
        con: 3D+2
        bureaucracy: 3D+2
        intimidation: 3D
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 3
    ai_config:
      personality: >-
        A CIS logistics intelligence operative embedded in the
        Republic procurement process. He is aggressive rather than
        subtle — his cover works through bureaucratic confidence
        and volume rather than finesse. He has been in difficult
        situations before and responds to discovery with immediate,
        committed violence rather than any further attempt at
        concealment. The heavy blaster is not a contingency. It
        is the plan.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Loud, assured Basic with an accent that does not match
        the badge. "Wrong office. You want procurement sub-level
        three." Then the heavy blaster clears the jacket.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The heavy blaster sweeps the room. He fires without aiming small.*"
        - "*He moves toward you, firing. He does not use cover.*"
        - "*'Fourteen meetings.' He fires again. 'Fourteen.'*"
