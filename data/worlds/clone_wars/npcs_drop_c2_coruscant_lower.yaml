# data/worlds/clone_wars/npcs_drop_c2_coruscant_lower.yaml
#
# Drop C2 — Coruscant Coco Town + Underworld Roster (May 2026)
#
# Per cw_content_gap_design_v1_1_decisions.md Stage 4, Drop C2 is
# the second half of the Coruscant roster build-out and the FINAL
# remaining CW.NPCS content drop. After C2, the CW.NPCS track
# closes and the path to launch becomes purely engine-lane.
#
# C2 covers ~25 NPCs across 16 of Coruscant's 57 still-empty rooms,
# focused on:
#
#   Coco Town (4 rooms)         — freelance-job hub, mid-levels
#                                  cosmopolitan
#   Dexter's Diner              — canonical CW landmark (Dexter
#                                  framed as off-world, sous-chef
#                                  present in his place)
#   Mid-City zones (3 rooms)    — Transit Hub, Market Street,
#                                  Residential Block — the tier
#                                  between Senate District and
#                                  Underworld
#   Lower City zones (4 rooms)  — Black Market, Descent, Medical
#                                  Post, Refugee Warren
#   Coruscant Underworld
#     Surface Entry             — the Underworld gateway
#   Outlander Club              — canonical Coruscant nightlife
#                                  landmark
#   Westport Spaceport          — secondary spaceport
#   Coco Town Civic Block       — local government tier
#
# Many empty Coruscant rooms remain empty by design after C2:
# Xizor's Castle District (canonical Black Sun, Q1-restricted),
# Jedi Temple - Council Antechamber and Lightsaber Crafting
# Alcove (intentional silence per C1), Galactic Senate Public
# Lobby (already has CT-2287 from Drop H), and ~30 atmospheric/
# reserved-for-future zones (Calocour Heights, Gilded Cage,
# Petrax Historic Quarter, etc.). These can be populated in
# post-launch content drops.
#
# Schema follows the canonical Vela Niree (npcs_cw_additions.yaml)
# reference per J1 handoff §6.7.
#
# ── POLICY CONSTRAINTS APPLIED ─────────────────────────────────────
#
# Q1 (canonical character cameos = EXTREMELY RESTRICTED):
#   - **Dexter Jettster** is canonical (AOTC, TCW). Dexter does NOT
#     appear in C2; he is canonical-reference and described as
#     "off-world for the day on a supply run." His sous-chef Vrenna
#     Sahl runs the diner in his absence. This is the same off-screen
#     framing pattern used for Jabba (Drop B), Drago (Drop G2),
#     Madame Jocasta Nu (Drop C1), and the Jedi Council (Drop C1).
#   - **Xizor / Black Sun** — Xizor's Castle District remains empty
#     by design.
#   - No canonical bounty hunters (Cad Bane's Coruscant raid is
#     historically referenced via the C1 NPC Tessa Byrn's senator
#     dialogue but Cad Bane himself doesn't appear).
#   - No canonical clones (CT designations checked against canonical
#     hero list).
#   - No canonical Coruscant Underworld figures.
#
# Q2 (mid-war ~20 BBY): Coruscant's Lower City and Underworld are
#   feeling the war's economic ripples — refugees from CIS-occupied
#   worlds, Republic deserters seeking anonymity, war profiteers
#   moving to escape Senate scrutiny. Mid-City is busier than usual
#   with Senate-staff and military-liaison foot traffic.
#
# Q5 (re-skin first, source canon second, bespoke last): Background
#   NPCs use GG7-archetype patterns; named NPCs are bespoke but
#   grounded in canonical Coruscant socioeconomic structure.
#
# Q6 (variable density per planet, Coruscant target ~1.4/room
#   for hangout zones): C1 + C2 combined cover 31 rooms with
#   24 + 23 = 47 NPCs (~1.5/room over the populated subset).
#   The remaining ~40 unpopulated Coruscant rooms are atmospheric
#   reserves. Whole-planet density: 47 / 72 = 0.65/room (below
#   the 1.4 target only because most of Coruscant is left as
#   atmospheric tiers; the *active* zones hit target).
#
# ── SOURCE GROUNDING ───────────────────────────────────────────────
#
# - wookieepedia_extracts/coruscant.md — Coco Town as freelance-
#   job hub, Mid-City demographics, Lower City and Underworld
#   stratification
# - wookieepedia_extracts/coruscant_underworld.md — Underworld
#   ecology, refugee patterns, the relationship between Lower
#   City and the deeper levels
# - cw_content_gap_design_v1.md Gap C — Coco Town as FDtS-relevant
#   freelance hub
# - HANDOFF_FDTS_REWICKER_FOR_CLONE_WARS.md — era-agnostic
#   confirmation for the Refugee Sector / mutual-aid kitchen
#   patterns (mirrored across Coruscant Lower City and Nar
#   Shaddaa)

schema_version: 1

npcs:

  # ════════════════════════════════════════════════════════════════════
  # COCO TOWN (4 NPCs across 4 rooms)
  # ════════════════════════════════════════════════════════════════════
  # Coco Town is the canonical Coruscant mid-level cosmopolitan
  # district — freelance-job hub, working-class residential,
  # diverse civilian population.

  - name: Coco Town Job Broker Halen Verro
    room: Coruscant - Coco Town
    species: Human
    description: >-
      A man in his early forties in well-worn but well-cut civilian
      clothing, seated at a small public-square table with three
      datapads and a chronometer. The table has a hand-lettered
      sign in two languages reading "JOBS — MID-LEVEL — REFERENCES
      WELCOME." Halen has run this booking table for nine years.
      He brokers freelance work — courier runs, security gigs,
      legitimate-and-semi-legitimate freight contracts — between
      Coco Town's working population and Mid-City clients.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+1
        mechanical: 2D
        perception: 4D
        strength: 2D+1
        technical: 2D+2
      skills:
        bargain: 4D+2
        bureaucracy: 4D
        con: 3D+2
        investigation: 3D+2
        languages: 4D
        persuasion: 4D+1
        scholar_galactic_business: 3D+2
        streetwise_coruscant: 4D+2
        value: 4D
        willpower: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Job broker, nine years on the Coco Town booking table.
        Was a freight-courier himself for twelve years before a
        shoulder injury rotated him to brokering. Knows everyone
        who runs work through Coco Town; tracks who pays on time,
        who ghosts, who hires twice. Polite, transactional, the
        kind of operator who treats his ledger as professional
        ethics rather than just record-keeping. Cooperates
        casually with Republic Customs when asked; doesn't
        volunteer.
      knowledge:
      - "Job broker, nine years."
      - "Was a freight-courier for twelve years pre-injury."
      - "Brokers ~30 active gigs at any time. Half are courier work."
      - "Maintains a personal ledger of client and freelancer reliability."
      - "Has refused bookings from war-profiteer clients three times. They went elsewhere."
      - "Knows the FDtS-style 'find your way as a freelancer' pattern; sees that arc weekly."
      faction: independent
      dialogue_style: >-
        Coruscant-Mid-Level accent — a blend of Core polish and
        Outer Rim flatness. Direct, dry, the cadence of someone
        who has had thousands of variations of the same
        conversation. Calls freelancers "freelancer"; clients
        "client"; everyone else "friend."
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Freelancer or client?'"
      - "*Halen taps a datapad. 'Thirty active gigs. Courier work, security, light freight. Reliability flags on the riskier ones.'*"
      - "'Twelve years on the haul, nine years on this table. The table pays better and hurts the shoulder less.'"
      - "*He glances at his ledger.* 'New face. References, or do you want me to spot you a low-stakes first gig?'"
      - "'I do not broker war-profiteer contracts. Three refusals on record. I track the refusals.'"

  - name: Coco Town Civic Clerk Mara Soris
    room: Coruscant - Coco Town - Civic Block
    species: Twi'lek
    description: >-
      A green-skinned Twi'lek woman in the muted-blue uniform of
      the Coco Town civic-services office, behind a public counter
      handling residency paperwork, business licenses, and
      refugee-registration intake. The office is busy at this hour;
      a queue of twelve people waits behind you. Mara has been
      processing Coco Town civic paperwork for fourteen years and
      considers it the city's most important quiet job.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 3D
      skills:
        bargain: 3D+1
        bureaucracy: 5D+2
        computer_programming_repair: 4D
        languages: 5D
        persuasion: 3D+2
        cultures: 4D+1
        scholar_coruscant_civic_law: 4D+2
        scholar_galactic_geography: 3D+2
        willpower: 4D
      weapon: none
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Twi'lek civic clerk, fourteen years. Came to Coruscant
        from Ryloth as a teenager pre-war; processed her own
        residency paperwork and decided she could do the job
        better than the person who handled her case. Took the
        civil-service exam, got hired, has been at it ever since.
        Refugee-registration volume has tripled since the war
        started; she handles every case with the same patient
        attention.
      knowledge:
      - "Coco Town civic clerk, fourteen years. Twi'lek; pre-war Ryloth migrant."
      - "Processes residency paperwork, business licenses, refugee registrations."
      - "Refugee volume has tripled since the war started."
      - "Knows which bureaucratic shortcuts work and which don't."
      - "Has refused to share refugee registration data with Republic Intelligence three times. The requests stopped."
      - "Considers her job the most important quiet job on Coruscant."
      faction: republic
      dialogue_style: >-
        Twi'lek-accented Basic — soft consonants, slight musical
        lilt. Patient, precise, slightly tired. Calls applicants
        "applicant"; uses given names afterward.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Civic Block. Take a number from the wall slot. The wait is approximately forty-five minutes.'"
      - "*Mara's headtails twitch slightly — a Twi'lek micro-tell of mild fatigue, controlled.*"
      - "'Residency paperwork on the left form. Business license on the right. Refugee intake at the back desk.'"
      - "'Refugee volume has tripled. We are processing as fast as we can. The forms have to be right.'"
      - "*She glances at the queue, then at you.* 'Was your question answered?'"

  - name: Coco Town Loft Dweller Wessek-vi
    room: Coruscant - Coco Town - Loft District
    species: Bith
    description: >-
      A young Bith — large-headed, large-eyed, the species' delicate fingers operating the stylus and holopad simultaneously — in casual creative-class clothing on the steps
      of a converted-warehouse residential loft in the Coco Town
      Loft District — a tier the Coruscant culture-press calls
      "post-bohemian" and the locals mostly just call "rent
      affordable." He is sketching architectural details of the
      building across the street with a stylus and a holopad. He
      is a freelance architectural illustrator; the work pays
      irregularly.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D
        mechanical: 2D
        perception: 4D+1
        strength: 2D
        technical: 3D+2
      skills:
        bargain: 2D+2
        computer_programming_repair: 3D+1
        forgery: 4D
        languages: 3D+1
        scholar_galactic_architecture: 4D+2
        scholar_coruscant_history: 4D
        sneak: 3D+1
        streetwise_coruscant: 3D+2
        artist: 5D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Freelance architectural illustrator, three-year career.
        Coruscant-born, Mid-Level upbringing, art school dropout.
        Considers Coco Town his neighborhood and the war a
        distant news cycle. Cheerful, articulate, mildly cynical
        about Senate-tier patrons. The forgery skill reflects a
        side gig he doesn't advertise — period-appropriate
        document mock-ups for refugees who need provisional
        papers while their real ones get processed. He doesn't
        charge for that side.
      knowledge:
      - "Freelance architectural illustrator, three years."
      - "Art school dropout; self-taught afterward."
      - "Forges provisional documents for refugees pro-bono. Considers it civic duty."
      - "Knows Coco Town's architectural history intimately."
      - "Considers the war abstract; has not lost anyone close to it."
      - "Books work through Halen Verro the job broker occasionally."
      faction: independent
      dialogue_style: >-
        Coruscant Mid-Level accent. Cheerful, articulate, slightly
        verbose when discussing architecture (which he discusses
        often).
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "*Wessek looks up from his sketch. 'Hey. Visitor?'*"
      - "*He gestures at the building across the street. 'Three-hundred-year-old façade. Pre-Republican-redesign era. Look at the cornices.'*"
      - "'Illustrator. Freelance. Pays irregularly. Coco Town keeps the rent reasonable.'"
      - "*He shrugs. 'Senate-tier patrons commission tower-portraits. They want them flattering. I oblige; they pay; everyone leaves happy.'*"
      - "*Wessek glances at his stylus, then at you.* 'You need a sketch? I do quick portraits. Twenty credits. Cash.'"

  - name: Coco Town Market Vendor Tess Kallor
    room: Coruscant - Coco Town - Market Arcade
    species: Human
    description: >-
      A middle-aged woman in a vendor's apron behind a stall in
      the Coco Town Market Arcade — a long covered walkway lined
      with booths selling produce, prepared food, household goods,
      and the occasional curiosity from off-world. Her stall sells
      Mid-Rim spice mixes, dried herbs, and the cooking tools that
      go with them. She has been on this corner for twenty-two
      years and her customer base is mostly locals.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+1
        mechanical: 2D
        perception: 3D+2
        strength: 2D+2
        technical: 2D
      skills:
        bargain: 5D
        bureaucracy: 3D
        languages: 3D+2
        persuasion: 4D
        cultures: 3D+2
        scholar_galactic_cuisine: 4D+2
        streetwise_coruscant: 3D+2
        value: 4D+1
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Market vendor, twenty-two years. Came to Coruscant from
        Cerea as a young woman; her late husband was a chef at
        a Mid-Rim restaurant chain that went bankrupt during
        the early war years. She kept the stall going through
        the bankruptcy. Cheerful, professional, unflashy. Her
        cooking spice mixes are genuinely good and she has a
        small but devoted Mid-City clientele.
      knowledge:
      - "Market vendor, twenty-two years."
      - "Cerea-born; widow."
      - "Late husband was Mid-Rim restaurant chef; chain went bankrupt early in the war."
      - "Stocks Mid-Rim spice mixes, dried herbs, cooking tools."
      - "Has supplied Dexter's Diner with house-blend spice mixes for a decade (Dexter is canonical-reference; off-world today on a supply run)."
      - "Mid-City clientele primarily; occasional Senate-staff buyer."
      faction: independent
      dialogue_style: >-
        Cerean-accented Basic, soft and steady. Friendly with
        regulars; warm with first-timers; calls everyone "dear"
        without artifice.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Welcome, dear. Spice mix? Dried herbs? Looking for something specific?'"
      - "*Tess gestures at the stall display.* 'Mid-Rim blends, Cerean traditional, Tatooine desert-spice. The Tatooine is hotter than it sounds.'*"
      - "'Twenty-two years on this corner. Outlasted three other vendors and a fire.'"
      - "*She wraps a small package.* 'House blend, ten credits. Dexter buys this one. Has for ten years.'"
      - "'My husband would've liked you. He liked everyone. The bankruptcy took the restaurant; the war took everything else.'"

  # ════════════════════════════════════════════════════════════════════
  # DEXTER'S DINER (1 NPC — Dexter framed as off-world)
  # ════════════════════════════════════════════════════════════════════

  - name: Diner Sous-Chef Vrenna Sahl
    room: Coruscant - Dexter's Diner
    species: Human
    description: >-
      A wiry human woman in a flour-dusted apron behind the long
      counter of Dexter's Diner — Coruscant's canonical mid-level
      institution, in operation for forty-some years. The diner is
      between the breakfast and lunch rushes; three booths are
      occupied. Vrenna runs the diner when Dexter is off-world
      (which is often, for supply runs). She has been Dexter's
      sous-chef for eight years and considers him family.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+1
        mechanical: 2D
        perception: 4D
        strength: 3D
        technical: 3D+1
      skills:
        bargain: 4D
        blaster: 3D+2
        brawling: 3D+1
        bureaucracy: 3D
        cooking: 5D+2
        dodge: 3D+1
        first_aid: 3D
        languages: 3D+2
        persuasion: 3D+2
        cultures: 3D+1
        scholar_galactic_cuisine: 4D+2
        streetwise_coruscant: 3D+2
        value: 3D+2
        willpower: 4D+1
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Sous-chef and acting proprietor when Dexter is off-world
        (Dexter is canonical-reference; out today on a supply run
        that may take a standard week, which is normal). Eight
        years on the diner staff. Came in as a dishwasher; cooked
        her way up. Considers Dexter family — he gave her work
        when she had no references and her aunt was sick. She
        runs the place his way: generous portions, fair prices,
        no questions about which booth a customer chooses.
      knowledge:
      - "Sous-chef at Dexter's Diner, eight years."
      - "Dexter Jettster (canonical-reference) is off-world today on a supply run. Routine; happens often."
      - "Diner runs the same whether Dexter is in or out — that's the agreement."
      - "Customers: Mid-City office workers (lunch rush), Senate aides (breakfast meetings), local regulars (everything between)."
      - "Has heard Senate-staff gossip the way bartenders hear gossip. Doesn't share."
      - "Has supplied a few Jedi a meal-on-the-house over the years. Master Iridia Kell once. Doesn't make a thing of it."
      faction: independent
      dialogue_style: >-
        Coruscant-Mid-Level accent, friendly and unhurried.
        Calls customers "friend" or "dear"; calls Dexter
        "Dex" when speaking of him.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "*Vrenna wipes the counter. 'Welcome to Dex's. Booth or counter? Menu's on the wall.'*"
      - "'Dex is off-world today. Supply run. Probably back in a week. The diner runs the same.'"
      - "*She nods at a booth where two Senate aides are arguing quietly over caf.* 'Senate aides at breakfast. Same arguments every week.'*"
      - "'Generous portions, fair prices, no questions. Dex's rules. I follow them.'"
      - "*Vrenna flips a pancake on the griddle with practiced ease.* 'Twenty-eight years he's run this place. I've been here for eight. Family.'"

  # ════════════════════════════════════════════════════════════════════
  # MID-CITY (3 NPCs)
  # ════════════════════════════════════════════════════════════════════

  - name: Transit Hub Patrol Officer Kellan Vrent
    room: Coruscant - Mid-City Transit Hub
    species: Human
    description: >-
      A Coruscant Security Force officer in dark-blue uniform with
      the silver bar of patrol rank, standing at the central plaza
      of the Mid-City Transit Hub — the point where eight transit
      lines converge in a tiered concourse. The plaza is busy;
      thousands of commuters pass through every hour. Kellan tracks
      foot traffic with the practiced gaze of a beat officer who
      has been at this hub for six years.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D+2
        perception: 4D
        strength: 2D+2
        technical: 2D+1
      skills:
        blaster: 4D+1
        brawling: 3D+2
        bureaucracy: 3D+1
        dodge: 4D
        intimidation: 3D+1
        investigation: 3D+2
        languages: 3D
        scholar_coruscant_law: 3D
        search: 4D
        streetwise_coruscant: 4D+2
        tactics: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        CSF beat officer, six years at the Mid-City Transit Hub.
        Career-stable, professional, slightly bored. Considers
        the Hub the most-trafficked-and-least-eventful posting on
        the force — most days are pickpockets and lost commuters
        and the occasional kid running away from home. Coordinates
        with the Coruscant Guard (clone garrison) for major events
        but views them as military rather than peers.
      knowledge:
      - "CSF beat officer, Mid-City Transit Hub, six years."
      - "Hub handles ~40,000 commuters/hour during rush periods."
      - "Most common incidents: pickpockets, lost commuters, runaway kids."
      - "Coordinates with Coruscant Guard for major events; views them as military, not peers."
      - "Has noticed an uptick in refugee-passenger volume since the war started. Mostly Mid-Rim arrivals."
      - "Knows which transit lines have current delays. Will share."
      faction: republic
      dialogue_style: >-
        Coruscant-trained Basic, professional. Calls civilians
        "citizen"; lost commuters "passenger"; pickpockets
        "operator."
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'CSF Officer Vrent. Can I help you, citizen?'"
      - "*Kellan glances at a transit display.* 'Line four is delayed. Track failure. Estimated twenty-minute clear.'"
      - "'Forty thousand commuters an hour, peak. Most of them ignore me and that's fine.'"
      - "'Lost? Hub map's on the column. Or I can point you. Where are you trying to go?'"
      - "*A pickpocket on the far side of the plaza notices Kellan's gaze and changes direction. Kellan continues without comment.*"

  - name: Mid-Level Market Vendor Dross-tha
    room: Coruscant - Mid-Level Market Street
    species: Rodian
    description: >-
      A male Rodian in a vendor's vest behind a long stall
      in the Mid-Level Market Street — Coruscant's tier between
      the Senate-District commercial zones and the Lower City
      grime. The street is busy with office-worker lunch traffic.
      His stall sells prepared meals: noodle bowls, stuffed dough,
      protein-skewer plates. He's been on this stretch for eleven
      years and his lunch rush is reliable.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D+2
        strength: 2D+2
        technical: 2D+1
      skills:
        bargain: 4D+1
        bureaucracy: 2D+2
        cooking: 4D+2
        languages: 3D+1
        persuasion: 3D
        streetwise_coruscant: 3D+2
        value: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Prepared-meals vendor, eleven years on this corner. Born
        on Coruscant; never lived anywhere else. Considers his
        stall a small business and runs it accordingly: clean,
        reliable, slightly above-average prices for the tier.
        Lunch rush from the surrounding office tiers is steady;
        he has six regular customers who order the same thing
        every day and he has their orders ready before they
        reach the counter.
      knowledge:
      - "Prepared-meals vendor, eleven years."
      - "Rodian; came from Rodia 25 years ago. Never went back."
      - "Stocks: noodle bowls, stuffed dough, protein-skewer plates. Mid-Rim seasoning."
      - "Six regular customers; orders ready before they ask."
      - "Sources spice mixes from Tess Kallor over in Coco Town."
      - "Has heard Senate-aide gossip from his counter; doesn't share."
      faction: independent
      dialogue_style: >-
        Coruscant Mid-Level accent. Brisk, friendly, professional.
        Calls customers "friend"; calls regulars by their order.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Lunch? Noodle bowl, stuffed dough, protein skewer. Five to seven credits.'"
      - "*Drass slides a noodle bowl across the counter for someone behind you.* 'There you go, regular. Same as always.'"
      - "'Eleven years on this corner. Lunch rush is reliable. The rest is bonus.'"
      - "*He gestures at his Coco Town spice rack. 'Tess sources my blends. Twenty-two years she's been at it. Older than the stall.'*"
      - "'Senate aides come down for lunch. They tip well; they gossip louder. I hear; I don't share.'"

  - name: Residential Block Concierge Halma Vess
    room: Coruscant - Mid-Level Residential Block
    species: Human
    description: >-
      An older woman in plain practical dress at a small concierge
      desk in the lobby of a Mid-Level residential block — a
      thirty-floor building housing approximately 400 working-class
      families. She handles deliveries, mediates neighbor disputes,
      keeps a list of who is and isn't authorized to visit which
      apartment, and remembers everyone's children's names. The
      lobby is quiet at this hour.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D+1
        mechanical: 2D
        perception: 4D+1
        strength: 2D
        technical: 2D+2
      skills:
        bargain: 3D+1
        bureaucracy: 4D+2
        first_aid: 3D
        languages: 3D+2
        persuasion: 4D
        cultures: 3D+2
        scholar_residential_administration: 4D
        streetwise_coruscant: 4D
        willpower: 4D+1
      weapon: hold_out_blaster
      move: 9
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Residential concierge, eighteen years. Came to the block
        from a Mid-Rim retirement that didn't suit her. Knows
        every resident, every child's name, every family's quiet
        crisis. Has mediated approximately four hundred neighbor
        disputes in her tenure, of which only six required CSF
        involvement. Considers the block her neighborhood. The
        block considers her something between a grandmother and
        a building inspector.
      knowledge:
      - "Residential block concierge, eighteen years."
      - "Block houses ~400 working-class families."
      - "Has mediated ~400 neighbor disputes; six required CSF."
      - "Knows every resident's children's names."
      - "Has noticed a recent uptick in war-affected families moving in (refugees, deserters' families)."
      - "Maintains a personal ledger of authorized visitors per apartment. Will not share."
      faction: republic
      dialogue_style: >-
        Mid-Rim accent worn smooth by eighteen Coruscant years.
        Warm, slow, slightly stern with strangers. Calls
        residents by their family name; visitors "guest" with
        graduated warmth.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Welcome to the block. Are you visiting a resident, or are you lost?'"
      - "*Halma adjusts a stack of delivery slips.* 'Residents are listed. Visitors are signed in. House policy.'"
      - "'Eighteen years. I know everyone. The block knows me. The arrangement works.'"
      - "*She glances at her ledger.* 'Which apartment, please? I'll comm them.'*"
      - "'No, I do not share visitor lists. Not with anyone. The block trusts me; I keep the trust.'"

  # ════════════════════════════════════════════════════════════════════
  # OUTLANDER CLUB + WESTPORT (3 NPCs)
  # ════════════════════════════════════════════════════════════════════

  - name: Outlander Club Owner Davren Korr
    room: Coruscant - The Outlander Club
    species: Human
    description: >-
      A man in his fifties in expensive but understated formal-wear
      behind the Outlander Club's main bar — Coruscant's
      mid-to-upper-tier nightlife institution, a hangout for
      Senate-staff, off-duty pilots, freelance professionals, and
      the occasional Jedi (who never stay long). The bar's lighting
      is gold and indirect; the music is live and just-loud-enough.
      Davren has owned the place for fifteen years.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 2D
        perception: 4D
        strength: 2D+2
        technical: 2D
      skills:
        bargain: 4D+2
        blaster: 3D+1
        brawling: 3D
        bureaucracy: 3D+2
        con: 3D+2
        dodge: 3D+1
        gambling: 4D
        languages: 4D
        persuasion: 4D+2
        cultures: 3D+2
        scholar_coruscant_society: 4D+2
        streetwise_coruscant: 4D+2
        value: 4D
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Outlander Club owner, fifteen years. Was a high-end
        Mid-Rim hotel manager before buying the Club; brought
        a hospitality professional's polish to a property that
        had been coasting on its reputation. Knows everyone who
        matters in the Senate-staff social circuit. Maintains
        strict house policies on dispute resolution (immediate
        ejection, lifetime ban for second offenses) and pays his
        staff above-tier rates.
      knowledge:
      - "Outlander Club owner, fifteen years."
      - "Was a Mid-Rim hotel manager before buying the Club."
      - "Senate-staff and off-duty professional clientele."
      - "House policy: immediate ejection on first dispute; lifetime ban on second offense."
      - "Pays staff above-tier rates. Loyalty is high."
      - "Has had Anakin Skywalker drink here once (canonical-reference; not present today; left after 20 minutes). Doesn't make a thing of it. Most regulars don't know."
      faction: independent
      dialogue_style: >-
        Polished Coruscant Basic. Warm, professional, deeply
        graduated in calibration. Calls regulars by name; new
        arrivals "guest" with appropriate warmth.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Welcome to the Outlander. Davren Korr. May I direct you?'"
      - "*Davren gestures at the main floor.* 'Bar to the right, booths to the left, back rooms by appointment. Music is live until oh-three-hundred standard.'*"
      - "'Fifteen years. The Club has had four owners; I'm the fourth and the longest.'"
      - "*He glances at a Senate aide's table; the aide nods. Davren returns the nod.* 'Regulars. Mostly Senate-tier. Some off-duty pilots. The occasional Jedi who doesn't stay long.'"
      - "'House policy: one warning, then out. Two offenses, lifetime ban. The policy means we keep the room calm.'"

  - name: Outlander Back Room Booker Kel Vohn
    room: Coruscant - Outlander Cantina - Back Rooms
    species: Sullustan
    description: >-
      A male Sullustan in dark formal-wear at a small podium in the
      Outlander Club's private-meeting back rooms — distinct from
      the Cantina's main bar floor. He handles bookings for the
      Club's six private rooms, which range from intimate dining
      alcoves (couples, small celebrations) to formal meeting
      chambers (Senate-staff dinners, business negotiations).
      His clientele is high-end and his confidentiality is
      absolute.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 2D
        perception: 4D+1
        strength: 2D
        technical: 2D+2
      skills:
        bargain: 4D
        bureaucracy: 4D+2
        con: 3D+2
        gambling: 3D
        hide: 3D+2
        investigation: 3D+1
        languages: 4D+2
        persuasion: 4D+1
        cultures: 4D
        scholar_coruscant_society: 4D
        streetwise_coruscant: 3D+2
        value: 3D+2
        willpower: 4D
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Sullustan back-room booker, ten years. Reports to Davren.
        Handles bookings for six private rooms; maintains a
        confidential ledger of who books which room when and with
        whom. Polite, precise, impossible to pressure. Has been
        offered bribes for booking information twelve times in
        his career; declined all twelve. The Club's reputation
        for discretion has been built largely on his desk.
      knowledge:
      - "Outlander back-room booker, ten years."
      - "Sullustan; came to Coruscant from Sullust pre-war."
      - "Six private rooms; bookings 200–800 credits/hour depending on room."
      - "Maintains confidential ledger. Will not share. Twelve declined bribes on record."
      - "Today's bookings: one Senate-staff dinner (booth 2), one business negotiation (chamber 4), four open."
      - "Has refused to book rooms for Republic Intelligence three times. The requests stopped."
      faction: independent
      dialogue_style: >-
        Sullustan-accented Basic — clicks, slight nasal cadence.
        Polite, professional, impossible to flatter. Calls
        clients by their full title.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Outlander back rooms. Are you booking, or are you here for a booking?'"
      - "*Kel taps his datapad.* 'Six rooms. Two booked tonight. Four open. Two hundred to eight hundred credits per hour.'"
      - "*Click.* 'I do not discuss other bookings. Not with anyone. Club policy.'"
      - "'Yes, I have been offered bribes. Twelve times. The Club's reputation depends on the answer being no.'"
      - "*He glances at a passing Senate aide who nods to him. Kel returns the nod with calibrated discretion.*"

  - name: Westport Customs Inspector Mira Vess
    room: Coruscant - Westport Spaceport
    species: Human
    description: >-
      A Republic Customs inspector in the dark-green uniform with
      the silver bar of senior rank, behind a customs counter at
      the Westport Spaceport — Coruscant's secondary spaceport,
      handling Mid-Rim and Outer Rim arrivals that don't merit
      the main spaceport's volume. The customs hall is busy with
      a recently-landed transport from Brentaal IV. Mira is fifteen
      years on the job and considers Westport a quiet posting.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+1
        mechanical: 2D+1
        perception: 4D+1
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 3D+2
        brawling: 3D+1
        bureaucracy: 5D
        dodge: 3D+1
        intimidation: 3D
        investigation: 4D+2
        languages: 4D
        scholar_galactic_trade_law: 4D+2
        search: 4D+2
        streetwise_coruscant: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Republic Customs senior inspector, fifteen years. Joint
        Republic Customs / CSF role at Westport. Has caught three
        notable smuggling attempts in her career; has logged
        approximately eleven hundred routine processing days that
        ended without incident. Considers her job tedious, useful,
        and currently underfunded — Westport's customs equipment
        is older than the war.
      knowledge:
      - "Republic Customs senior inspector, fifteen years. Westport posting."
      - "Westport handles Mid-Rim and Outer Rim arrivals."
      - "Equipment is older than the war. Budget requests have not been approved."
      - "Has caught three notable smuggling attempts in her career."
      - "Refugee arrivals have tripled since the war started. Most pass through here."
      - "Coordinates with Coco Town civic clerk Mara Soris on refugee processing."
      faction: republic
      dialogue_style: >-
        Coruscant-trained Basic, professional and precise. Calls
        travelers "passenger"; suspect cargo profiles "anomaly."
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Republic Customs. Manifest, please.'"
      - "*Mira scans a manifest.* 'Brentaal arrival. Standard cargo. Passenger documentation in order.'*"
      - "'Westport handles the Mid-Rim and Outer Rim. Main spaceport handles the Core. Different problems.'"
      - "*She glances at a queue forming behind you.* 'I have nine more passengers to process. State your business briefly.'*"
      - "'Refugee arrivals are up. The system processes as fast as it can. Most are legitimate. Most.'"

  # ════════════════════════════════════════════════════════════════════
  # CORUSCANT UNDERWORLD - SURFACE ENTRY (1 NPC)
  # ════════════════════════════════════════════════════════════════════

  - name: Underworld Surface Entry Watcher Old Kerrick
    room: Coruscant Underworld - Surface Entry
    species: Human
    description: >-
      An old man in patched layered clothing seated on a folding
      stool at the topside threshold of one of Coruscant's
      Underworld access shafts — the rusted maintenance entries
      that connect the lit upper city to the perpetually-dark
      lower levels. He has been watching this shaft for twelve
      years. He is the Coruscant analog of Old Krell on Nar
      Shaddaa: charges a small entry fee to off-worlders going
      down, charges nothing to Underworld residents coming back
      up.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+2
        mechanical: 2D
        perception: 4D+2
        strength: 2D
        technical: 2D+1
      skills:
        bargain: 3D
        blaster: 3D
        dodge: 3D+1
        first_aid: 3D+2
        hide: 4D
        intimidation: 3D
        languages: 3D+2
        scholar_underworld_geography: 5D+2
        sneak: 4D
        streetwise_coruscant: 5D
        survival_underworld: 5D
        willpower: 4D+1
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Old Kerrick. Sixty-one standard years old. Was a Lower
        City warehouse foreman for thirty years before the
        warehouse closed. Has watched this Underworld shaft for
        twelve. Knows the lower levels intimately and will
        direct anyone who treats him with respect.
      knowledge:
      - "Underworld surface-entry watcher, twelve years."
      - "Was a Lower City warehouse foreman for 30 years before."
      - "Charges 5 cr off-worlder entry tax; nothing to Underworld residents."
      - "Knows Lower City and Underworld layouts intimately."
      - "Has heard about an uptick in war-refugee Underworld arrivals."
      - "CSF does not enforce on the Underworld. Coruscant Guard occasionally does, badly."
      faction: independent
      dialogue_style: >-
        Coruscant Lower-Level accent, weathered. Calm, slightly
        wry. Calls everyone "friend" with graduation depending
        on the five-credit handover.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "*Kerrick looks up. 'Five credits to descend, friend. Nothing to come back up. House rules.'*"
      - "*He gestures at the shaft.* 'Five hundred levels down. The Lower City is the first hundred. The Underworld proper is below that. The deep levels are not for tourists.'"
      - "'CSF doesn't enforce down here. Coruscant Guard tries occasionally. They never finish what they start.'"
      - "*Kerrick nods at a returning resident; the resident nods back. Neither pays.*"
      - "'Refugee arrivals are up. War sends people down here. The shaft sees more traffic than it used to.'"

  # ════════════════════════════════════════════════════════════════════
  # LOWER CITY (4 NPCs)
  # ════════════════════════════════════════════════════════════════════

  - name: Lower City Black Market Vendor Trex Hovan
    room: Coruscant - Lower City Black Market
    species: Human
    description: >-
      A man in his late thirties in worn industrial clothing
      behind a stall in the Lower City Black Market — an open
      area of tiered stalls in a former industrial space that
      operates outside Republic licensing because Republic
      licensing doesn't reach this deep. His stall sells
      salvaged tech, off-spec ammunition, refurbished medical
      supplies, and the occasional grey-market document. He
      pays Cartel-adjacent protection (smaller-scale than the
      Hutt operations on Tatooine and Nar Shaddaa, but real).
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D
        mechanical: 2D+2
        perception: 4D
        strength: 2D+2
        technical: 3D+1
      skills:
        bargain: 4D+2
        blaster: 3D+2
        brawling: 3D
        con: 3D+2
        dodge: 3D+2
        forgery: 3D+2
        hide: 3D+1
        languages: 3D
        scholar_galactic_arms_market: 3D+2
        sneak: 3D+1
        starship_repair: 3D
        streetwise_coruscant: 4D+2
        value: 4D+1
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Black-market vendor, six years on this stall. Was a
        Mid-City warehouse worker before a labor dispute went
        bad and he ended up on the Lower City. Considers the
        stall a step up from the warehouse. Pays protection to
        a small-time syndicate (Republic-side criminal
        operation, not Hutt-affiliated). Polite with paying
        customers; cool with browsers; openly hostile with
        anyone who looks like Republic Intelligence.
      knowledge:
      - "Black-market vendor, six years."
      - "Was a Mid-City warehouse worker before a labor dispute."
      - "Stocks: salvaged tech, off-spec ammo, refurbished medical, grey-market docs."
      - "Pays Lower City syndicate protection 100 cr/week."
      - "Will not stock Cartel-flagged stolen goods. Different problem."
      - "Has refused to sell to Republic Intelligence twice. They went elsewhere."
      faction: independent
      dialogue_style: >-
        Coruscant Lower-Level accent. Brisk, transactional.
        Calls customers "buyer"; browsers "wanderer"; suspect
        figures nothing at all.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Black market. Buying or browsing? Browsing's free. Touching costs.'"
      - "*Trex gestures at the stall.* 'Salvaged tech, off-spec ammo, refurbished medical. Documents in the back; ask if interested.'"
      - "'Republic licensing doesn't reach down here. Syndicate licensing does. It's cheaper.'"
      - "*He glances at a passing patrol.* 'CSF doesn't come down here. Coruscant Guard occasionally. They never find what they're looking for.'"
      - "'No Cartel-flagged goods. Different syndicate runs this market. We don't cross.'"

  - name: Lower City Descent Beggar Old Pera
    room: Coruscant - Lower City Descent
    species: Human
    description: >-
      An older woman in many layers of patched clothing sitting
      against a wall along the Lower City Descent — the long
      ramp that connects the Mid-City tier to the Lower City
      proper. She has a small bowl in front of her with a few
      credit chips and a chipped ceramic cup beside it. She is
      not a beggar in the conventional sense — she is a former
      Mid-Rim teacher who came to Coruscant for medical care
      that the Republic system never delivered, and the
      ramp-side bowl is what she has now.
    char_sheet:
      attributes:
        dexterity: 1D+2
        knowledge: 4D
        mechanical: 1D+2
        perception: 4D
        strength: 1D+2
        technical: 2D+1
      skills:
        bargain: 2D+2
        first_aid: 3D
        languages: 4D+2
        persuasion: 3D+2
        scholar_galactic_history: 4D+2
        scholar_mathematics: 4D
        scholar_pre_war_education: 4D+1
        streetwise_coruscant: 3D
        teach: 5D
        willpower: 4D+1
      weapon: none
      move: 8
      force_points: 3
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Old Pera. Sixty-seven standard years old. Was a primary-
        school mathematics teacher on a Mid-Rim agricultural
        world for thirty-eight years. Came to Coruscant six
        years ago for a medical condition the Mid-Rim couldn't
        treat. The Republic medical-aid system processed her
        application for two years; by the time the approval
        came through, the condition was managed but her savings
        were gone and she had no way back home. The bowl is
        what she has. She refuses to leave the ramp; she
        believes someone she taught will eventually pass and
        recognize her.
      knowledge:
      - "Former Mid-Rim primary-school mathematics teacher. 38-year career."
      - "Came to Coruscant for medical care 6 years ago."
      - "Republic medical-aid system processed her application for 2 years; by approval, savings were gone."
      - "Has been on the ramp 4 years."
      - "Believes someone she taught will pass and recognize her. Statistically possible; emotionally improbable."
      - "Will teach a child mathematics for free if asked. Has done so seven times."
      faction: independent
      dialogue_style: >-
        Mid-Rim accent, soft, slightly lecturing — the cadence
        of a career teacher. Calls everyone "child" without
        condescension.
      hostile: false
      combat_behavior: passive
      fallback_lines:
      - "*Pera looks up; her gaze is patient and clear. 'Hello, child.'*"
      - "*She gestures at the bowl.* 'A credit if you have one. If not, that is fine.'"
      - "'Thirty-eight years teaching. The work was good. The medical system was not.'"
      - "*She watches the descending foot traffic.* 'I look for my old students. Statistically, one of them must pass eventually.'"
      - "'I will teach a child mathematics if asked. I have done so seven times. The seventh was a child of a smuggler. Bright girl.'"

  - name: Lower City Medical Post Volunteer Drall Korva
    room: Coruscant - Lower City Medical Post
    species: Mirialan
    description: >-
      A male Mirialan in a clean but old medical smock at a small
      free-clinic in the Lower City Medical Post — a converted
      warehouse space that serves as the volunteer medical
      operation for Lower City residents who can't afford
      Mid-City care. His green skin shows the sparse diamond
      tattoos of a Mirialan in early adulthood, four diamonds
      distributed asymmetrically. He is treating a child with a
      respiratory infection.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 4D
        mechanical: 2D+1
        perception: 3D+2
        strength: 2D+1
        technical: 4D
      skills:
        bargain: 3D
        first_aid: 5D+2
        languages: 4D+1
        medicine: 5D
        cultures: 3D+2
        scholar_galactic_medicine: 4D+2
        scholar_alien_physiology: 3D+2
        streetwise_coruscant: 3D+2
        survival_lower_levels: 3D
        willpower: 4D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 3
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Mirialan medical volunteer, four years at the Lower City
        Medical Post. Trained as a medic on Mirial; came to
        Coruscant three years before the war for advanced
        training; the training program ended with the war's
        outbreak; he stayed to volunteer. Operates the post
        with two other volunteers (out of rotation today) and
        treats whoever walks in. Funded by donations and
        occasional Coco Town civic-clerk supply referrals.
        Mirrors the Doc Myrra pattern from Nar Shaddaa.
      knowledge:
      - "Lower City Medical volunteer, four years."
      - "Mirialan; trained as medic on Mirial."
      - "Came to Coruscant pre-war for advanced training; stayed when the war started."
      - "Two other volunteers in rotation; treats ~30 patients/day."
      - "Funded by donations + Coco Town civic-clerk supply referrals."
      - "Has treated occasional refugees, deserters, and Lower City residents alike. Doesn't ask which is which."
      - "Considers his work the most important thing he could be doing on Coruscant."
      faction: independent
      dialogue_style: >-
        Mirialan-accented Basic — soft consonants, slight
        musical lilt. Calm, professional, the cadence of someone
        who has seen the same conditions repeatedly and is
        still patient.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "*Drall finishes adjusting a child's breathing mask and looks up. 'Welcome. Are you injured, or here for someone?'*"
      - "*He traces a diamond on his cheek absently — Mirialan caste habit.* 'Four years. Treats anyone who walks in. Sliding-scale; free for refugees.'"
      - "'Coco Town civic clerk Mara sometimes refers refugees here. Good system. Quiet.'"
      - "*He glances at the supply cabinet.* 'Supplies are tight. Always tight. We make it work.'"
      - "'Mirial trained me. The Mirialan caste tattoos — these four — represent things. I will not list which.'"

  - name: Lower City Refugee Coordinator Halen Voss
    room: Coruscant - Lower City Refugee Warren
    species: Human
    description: >-
      A man in his fifties in plain dark clothing standing at an
      improvised desk in a partitioned section of the Lower City
      Refugee Warren — a former tenement complex that has been
      converted, informally, into housing for the refugee influx
      the war has brought to Coruscant's lower levels. He
      registers arrivals, coordinates with Coco Town civic clerk
      Mara Soris on official paperwork, refers urgent cases to
      Drall Korva at the Medical Post.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+2
        mechanical: 2D
        perception: 4D
        strength: 2D+2
        technical: 2D+1
      skills:
        bargain: 3D
        bureaucracy: 4D+1
        first_aid: 3D+1
        languages: 4D+2
        persuasion: 4D+1
        cultures: 4D+2
        scholar_galactic_geography: 4D
        streetwise_coruscant: 4D
        survival_lower_levels: 3D+2
        willpower: 5D
      weapon: hold_out_blaster
      move: 10
      force_points: 3
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Refugee coordinator, eight years (four years pre-war,
        four years since). Was a Mid-City social worker; took
        a leave of absence to volunteer at the Refugee Warren
        and never went back. Coordinates with Mara Soris on
        registration paperwork, Drall Korva on medical care,
        Halen Verro on freelance-job placement for refugees who
        want work. Considers the network informal but
        functional. Mirrors the Talma Rohn pattern from Nar
        Shaddaa Drop G2.
      knowledge:
      - "Lower City Refugee Warren coordinator, 8 years (4 pre-war, 4 since)."
      - "Was a Mid-City social worker; took leave of absence; never returned."
      - "Coordinates with Mara Soris (Coco Town civic clerk), Drall Korva (Medical Post), Halen Verro (Coco Town job broker)."
      - "Currently tracking ~280 active Lower City refugee cases."
      - "Refugee influx has tripled since the war started."
      - "Has heard about Talma Rohn doing similar work on Nar Shaddaa. Has never met her."
      faction: independent
      dialogue_style: >-
        Coruscant-trained Basic with Lower-Level wear.
        Patient, steady, the cadence of someone who has had
        many variations of the same conversation and is
        still patient with each.
      hostile: false
      combat_behavior: passive
      fallback_lines:
      - "*Halen looks up from his ledger. 'Refugee, or someone here to help?'*"
      - "'Eight years coordinating. I know where the food is, where the medicine is, where you can sleep tonight.'"
      - "*He gestures at the partitioned section.* 'Warren has space. Not luxurious; warm and dry.'"
      - "'Mara at Coco Town handles the paperwork. Drall at the Medical Post handles the medical. Halen Verro at the job broker placeholds work for those who want it.'"
      - "'No appointment needed. Tell me your name and where you're from. I'll register you.'"

  # ════════════════════════════════════════════════════════════════════
  # COCO TOWN RESIDENTIAL + GARTRO ROOKERY (2 NPCs)
  # ════════════════════════════════════════════════════════════════════

  - name: Coco Town Resident Brel Mora
    room: Coruscant - Coco Town - Residential Walk
    species: Human
    description: >-
      A young woman in casual professional clothing walking a
      small spiral-tailed pet (a Coruscant-domesticated
      kowakian-related species, popular as Mid-Level pets) along
      the Coco Town Residential Walk — a tree-lined pedestrian
      tier between the Loft District and the Civic Block. She
      is in her late twenties, works at a Mid-City accounting
      firm, lives with her partner in a third-floor apartment.
      Coco Town is her neighborhood and she likes it.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D+1
        strength: 2D
        technical: 3D+1
      skills:
        bargain: 3D+1
        bureaucracy: 4D
        computer_programming_repair: 3D+2
        languages: 3D+2
        cultures: 3D+1
        scholar_galactic_economics: 4D
        streetwise_coruscant: 3D+1
        value: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Young accounting professional. Coruscant-born, Mid-Level
        upbringing, Mid-City employer. Lives with partner in
        Coco Town because Mid-City rent priced them out. Likes
        the neighborhood, walks the pet daily, knows half the
        neighbors by sight. Politically neutral; the war is a
        news cycle that hasn't directly touched her.
      knowledge:
      - "Late-twenties accounting professional. Works in Mid-City."
      - "Lives with partner in a Coco Town third-floor apartment."
      - "Walks her pet (a kowakian-related species) daily."
      - "Knows ~half the neighbors by sight. Has had small-talk relationships with several over the years."
      - "Has not personally been affected by the war. Knows it's affecting others."
      faction: independent
      dialogue_style: >-
        Coruscant Mid-Level accent, casual and friendly. Calls
        strangers "hey there" or nothing depending on context.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "*Brel waves a friendly hello.* 'Hey there. New to the neighborhood?'"
      - "*The pet at her feet makes a small spiral-tailed greeting noise. Brel laughs.* 'She likes you. That's rare.'*"
      - "'Coco Town's nice. Rent's reasonable for the tier. Most of the neighbors are friendly.'"
      - "*She glances at the residential walk.* 'I work at an accounting firm Mid-City. Boring work; reliable pay; it pays the rent.'"
      - "'War? Yeah, news every day. Hasn't touched me directly. I know it's touching others. Lower City refugee population is up.'"

  - name: Gartro Rookery Caretaker Old Sevvo
    room: Coruscant - Gartro Rookery
    species: Human
    description: >-
      An older man in worn caretaker's overalls maintaining the
      ledges of the Gartro Rookery — a tower-side roost for
      gartros, the small leathery-winged scavenger birds
      canonically endemic to Coruscant. The rookery is a
      municipal facility; gartros are the city's natural
      anti-pest control and the rookery houses them so they
      stay healthy and propagate. Sevvo has been the caretaker
      for twenty-six years.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+2
        mechanical: 2D
        perception: 4D+1
        strength: 2D+2
        technical: 2D+1
      skills:
        bargain: 2D+2
        beast_riding: 3D+2
        first_aid: 3D
        languages: 2D+2
        scholar_gartro_ecology: 5D+2
        scholar_coruscant_wildlife: 4D+2
        streetwise_coruscant: 3D+1
        survival_coruscant: 4D
        willpower: 4D
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Gartro Rookery caretaker, twenty-six years. Was a
        municipal-services apprentice in his youth; got the
        rookery posting at twenty-eight and has been there ever
        since. Knows gartros better than anyone in the city —
        their breeding cycles, dietary needs, the personality
        differences between individuals (he names them all).
        Considers the gartros his neighborhood.
      knowledge:
      - "Gartro Rookery caretaker, twenty-six years."
      - "Currently 47 gartros in residence."
      - "Names them all. Knows them all by individual personality."
      - "Gartros are Coruscant's natural anti-pest control."
      - "Rookery is municipally funded; the budget has been frozen for six years; supplies are tight."
      - "Has shared rookery space with two refugee families discreetly. The Cartel doesn't reach this far up; no one official noticed."
      faction: republic
      dialogue_style: >-
        Coruscant Mid-Level accent, slow and weathered. Calls
        gartros by name; calls people "friend" with the same
        cadence he uses with the smarter gartros.
      hostile: false
      combat_behavior: passive
      fallback_lines:
      - "*Sevvo looks up from a feeding ledge. A gartro on his shoulder regards you with one yellow eye.* 'A visitor. Most don't come up here. The smell.'*"
      - "*He gestures at a nearby gartro.* 'That's Pek. Six years old. Has a nesting partner three ledges down. Their eggs hatch next month, probably.'"
      - "'Forty-seven gartros. I know each one. The municipality calls it inventory. I call it the neighborhood.'"
      - "*Sevvo offers a gartro feed-pellet to the bird on his shoulder; it takes the pellet delicately.* 'Pek says hello. In her way.'"
      - "'Two refugee families have stayed up here. Quietly. The rookery has space; the bureaucracy doesn't notice. The gartros don't mind.'"

  # ════════════════════════════════════════════════════════════════════
  # CRYSTAL JEWEL CANTINA (1 NPC)
