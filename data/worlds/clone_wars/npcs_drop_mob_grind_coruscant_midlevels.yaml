# data/worlds/clone_wars/npcs_drop_mob_grind_coruscant_midlevels.yaml
#
# Coruscant Mid-Levels & Commercial District Hostile Mob Grind Batch (2026-06-22)
#
# Six roaming hostile NPCs seeded across six previously uncovered
# commercial_district rooms on Coruscant to extend the solo-PvE mob-grind
# reward loop (engine/hunting_rewards.py).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone: commercial_district (threat_band: settled)
# These rooms were untouched by the prior Coruscant grind batches:
#   npcs_drop_mob_grind_coruscant.yaml        (southern_underground + lower-city)
#   npcs_drop_mob_grind_coruscant_lower.yaml  (Invisible Sector / Descent tail)
#   npcs_drop_mob_grind_coruscant_monumental.yaml (monumental_district)
#   npcs_drop_mob_grind_coruscant_underworld{,_deep}.yaml (wilderness underworld)
#
# Zone spread:
#   The Outlander Club x1              (Roxe Collection Thug, Human)
#   Gartro Rookery x1                  (Lost Ones Initiate, Twi'lek)
#   Central Power Grid Station x1      (CIS Grid Infiltrator, Bothan)
#   University of Coruscant District x1 (Expelled Alien Militant, Mirialan)
#   Coco Town - Loft District x1       (Loft Quarter Fence, Devaronian)
#   Coco Town - Civic Block x1         (Civic Block Shakedown Artist, Weequay)
#
# Thematic premise: Wartime Coruscant's mid-levels are stretched thin on
# security. Crime boss Volven Roxe's network runs through the Outlander Club's
# back rooms; the Lost Ones gang uses the Gartro Rookery for initiation
# violence; CIS saboteurs with forged engineering credentials filter into
# the Works; expelled non-Human students radicalized by the Republic's
# discriminatory enrollment ban surface in the University District; fences
# move stolen military hardware through the Coco Town artist community cover;
# Weequay protection rackets prey on civic-block mutual-aid societies whose
# lighter regulatory scrutiny makes them attractive targets.
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats grounded in sibling CW NPC patterns (coruscant
#   monumental batch + nar_shaddaa batch baselines).
#   Sourcebooks absent in this tree — stats UNVERIFIED against WEG40120 PDF.
# Species stat modifiers applied per WEG D6 convention:
#   Human:      2D baseline all attributes
#   Twi'lek:    PER 3D, DEX 2D+2 (charismatic; varied by lekku)
#   Bothan:     KNO 3D, PER 3D (intelligence-focused espionage species)
#   Mirialan:   DEX 2D+2, PER 2D+2 (disciplined, tattooed Force-adjacent species)
#   Devaronian: STR 2D+1, PER 3D (nomadic wanderers; sharp-eyed)
#   Weequay:    STR 2D+2, DEX 2D+2 (tough, thuggish; Hutt-associated mercenaries)
# Weapons: blaster_pistol, vibroblade, hold_out_blaster, blaster_carbine
#   — all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # THE OUTLANDER CLUB — 1 NPC (Roxe collection thug)
  # Crime boss Volven Roxe owns the Outlander. His collectors circulate
  # the floor and back rooms each night, harvesting the house cut from
  # dealers, betting operators, and anyone else running business inside.
  # At 20 BBY, wartime crowds have swollen the club and the collection
  # has grown proportionally; so have the arguments about it.
  # ══════════════════════════════════════════════════════════════════

  - name: Roxe Collection Thug
    room: "Coruscant - The Outlander Club"
    species: Human
    description: >-
      Broad-shouldered and dressed in the club's unofficial uniform of
      expensive synthetic leather and a credit-chip reader clipped to
      his belt like a badge of rank. He moves through the crowd with
      the practiced ease of someone who owns the space by virtue of
      who he works for. He is not here for the music. His eyes track
      who is running product without clearing it with the house. When
      he stops beside you and lets the silence breathe, it is an
      invitation to resolve a discrepancy in his employer's favor.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D+2
        dodge: 3D+2
        intimidation: 4D
        streetwise: 3D+2
        search: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A collection enforcer who has worked the Outlander's floor long
        enough to know when a conversation is productive and when it
        isn't. He prefers resolution — taking the money without a scene —
        but he is not squeamish about escalation and has done it enough
        times that there is no particular emotion attached to it anymore.
        He works with a partner somewhere in the crowd; if things go
        wrong he expects backup within thirty seconds. He factors that
        into when he decides things have gone wrong.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Low, flat Basic, barely audible over the music. Short declarative
        sentences. "You owe the house." "This doesn't have to be a
        problem." "It's a problem now."
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He squares to you in the crowd, one hand already inside his jacket.*"
        - "*The credit reader disappears and something else occupies that hand now.*"
        - "*He makes no move toward the door. The problem is here.*"

  # ══════════════════════════════════════════════════════════════════
  # GARTRO ROOKERY — 1 NPC (Lost Ones initiate)
  # The Lost Ones gang uses this abandoned, bird-colonized warehouse
  # as an initiation site. Recruits prove themselves in the dark under
  # the roost noise. Sometimes the proof involves being alone with a
  # stranger who has made the mistake of walking in.
  # ══════════════════════════════════════════════════════════════════

  - name: Lost Ones Initiate
    room: "Coruscant - Gartro Rookery"
    species: Twi'lek
    description: >-
      A young Twi'lek — female, mid-teens by appearance, one lekku
      wrapped tight to her shoulder to keep it out of the way — crouched
      on a salvaged packing crate near the far wall. The gartro birds
      overhead are used to her; they continue their frenetic cycling
      undisturbed. She watches the entrance with the specific alertness
      of someone who has been told an initiation requires a test and has
      decided the test is you. The vibroblade is not hidden.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D
      skills:
        melee_combat: 4D+1
        brawling: 3D+2
        dodge: 3D+2
        intimidation: 3D
        streetwise: 3D+1
        sneak: 3D
      weapon: vibroblade
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        Trying very hard not to be afraid and succeeding well enough that
        a stranger might not notice it. She has been told this is the test
        and she intends to pass. The Lost Ones do not forgive recruits who
        back down. She knows the rookery and can use its noise, shadow, and
        the disorienting gartro flocking patterns to her advantage if the
        fight moves. She will not run first.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Terse Ryl-accented Basic. "Wrong warehouse." "I don't have to
        warn you." No extended conversation — she is not here to talk.
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*A thousand gartros scream at once as she vaults off the crate.*"
        - "*She uses the bird-noise and shadow the way someone who grew up here would.*"
        - "*The blade catches a sliver of light filtering through a rusted roof panel.*"

  # ══════════════════════════════════════════════════════════════════
  # CORUSCANT WORKS — CENTRAL POWER GRID STATION — 1 NPC (CIS saboteur)
  # The station has documented CIS sabotage attempts in the past year.
  # The current threat is internal — an embedded agent carrying forged
  # maintenance credentials, waiting for the right shift rotation.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Grid Infiltrator
    room: "Coruscant Works - Central Power Grid Station"
    species: Bothan
    description: >-
      A Bothan in Works-standard maintenance coveralls with a security
      badge clipped to the breast pocket. The badge is real in the sense
      that it opens doors; the identity on it has not reported for a
      roster inspection in eleven days. He carries a technical datapad
      and moves with the purposeful unhurry of someone who belongs here.
      Up close the fur betrays him — the Bothan tell of stress-ripple
      just under the surface, a pattern no amount of training entirely
      suppresses. When he realizes you have noticed it, the datapad goes
      into a pocket and something else comes out.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D+2
      skills:
        blaster: 4D+1
        dodge: 3D+2
        security: 4D
        con: 4D+1
        computer_programming_repair: 3D+2
        sneak: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A professional intelligence operative who has spent three weeks
        building this cover identity. He is calculating rather than
        impulsive — his primary concern is completing the mission, and
        his secondary concern is not becoming a casualty that generates
        a formal investigation. If he can neutralize a witness quietly
        he prefers that. If he cannot, he will use the grid station's
        layout to his advantage — the transformer bays have no sightlines,
        and the station commander is two sections over.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Clipped, authoritative Basic with no Bothan accent — the cover
        requires passing as a non-native maintenance contractor. "Access
        restricted. Move on." "I'm going to need you to step back."
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*The datapad drops and he's moving toward the transformer bank before it lands.*"
        - "*He knows exactly which sections of this station have no surveillance coverage.*"
        - "*The hold-out clears his jacket with the efficiency of someone who has practiced this.*"

  # ══════════════════════════════════════════════════════════════════
  # UNIVERSITY OF CORUSCANT DISTRICT — 1 NPC (expelled alien militant)
  # The Republic's alien enrollment ban has radicalized a generation of
  # students. Most channel their anger into organizing. Some have gone
  # further. The Fobosi district's academic cover makes it easy to move
  # between the legitimate and the very much not.
  # ══════════════════════════════════════════════════════════════════

  - name: Expelled Alien Militant
    room: "Coruscant - University of Coruscant District"
    species: Mirialan
    description: >-
      A young Mirialan woman wearing a University jacket with the school
      seal removed — the threads where it was are still visible. Her
      geometric facial tattoos have been extended across the jaw, new
      marks added since the Republic made her ineligible to sit for
      her third-year examinations. She carries academic papers as cover
      and moves the district like someone who once belonged here and
      has decided that what was taken from her has given her a different
      kind of claim. She does not like being followed.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 2D+2
        strength: 2D
        technical: 2D
      skills:
        blaster: 4D+2
        dodge: 3D+2
        scholar: 4D
        streetwise: 3D+1
        con: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        She has crossed a line she did not intend to cross and is not
        certain she can uncross it. She is ideologically motivated but
        not reckless — she makes choices that serve the larger cause, not
        personal revenge, even when the two feel identical. She is smarter
        than she sometimes acts and uses the academic district's layout
        — lecture halls, restricted-access archive wings, maintenance
        passages she memorized over three years — as terrain she knows
        better than whoever is chasing her.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Precise, educated Basic with a Mirialan undertone. She does not
        shout. "You shouldn't be here." "This isn't your concern." "I
        didn't choose this — they did."
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*She breaks for the archive wing — she knows exactly which doors respond to a bypass.*"
        - "*The lecture hall is between you; she uses the tiered seating for cover.*"
        - "*Her shot is controlled, measured. She has been practicing.*"

  # ══════════════════════════════════════════════════════════════════
  # COCO TOWN — LOFT DISTRICT — 1 NPC (military hardware fence)
  # The loft district's art-collective cover is ideal for moving stolen
  # Republic military supplies — shipments labeled "art materials" clear
  # customs more often than they should. The Devaronian running this
  # operation treats his inventory like sculpture and his business rivals
  # like critics.
  # ══════════════════════════════════════════════════════════════════

  - name: Loft Quarter Fence
    room: "Coruscant - Coco Town - Loft District"
    species: Devaronian
    description: >-
      A Devaronian male with an art collector's posture — one hand in a
      jacket pocket, head tilted as if evaluating something only he can
      see. He is probably not evaluating art. The loft he uses is
      registered to a collective that hasn't held a showing in four
      months. Stacked behind the hanging canvases are crates with military
      supply stamps partially sanded off. He has noticed that you are not
      a buyer, an artist, or a customs inspector — which means you are
      a problem, and problems get resolved the same way here as anywhere
      else he has worked.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+1
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 4D+2
        dodge: 3D+2
        persuasion: 3D+2
        streetwise: 4D
        con: 3D+2
        search: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        Has been in this business long enough to read a room faster than
        most beings read a sentence. He knows within the first exchange
        whether a situation is salvageable or not. When it's not, he
        prefers decisive action over negotiation, because negotiation
        from a weak position just drags things out. He knows the loft's
        exits and the collective's schedule, and there are people in
        the building who owe him enough to look the other way.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Smooth, unhurried Basic with a light Devaronian cadence. He sounds
        like someone who sells rare things to people who can afford them.
        "I think there's been a misunderstanding." "I'm going to ask you
        not to move, please." "This is a waste of both our time."
      hostile: true
      combat_behavior: guerrilla
      fallback_lines:
        - "*He steps sideways behind a hanging canvas and draws in one motion.*"
        - "*He is moving toward the freight exit before the canvas finishes swinging.*"
        - "*The hold-out is small enough that it was in his hand before you saw it.*"

  # ══════════════════════════════════════════════════════════════════
  # COCO TOWN — CIVIC BLOCK — 1 NPC (protection racket enforcer)
  # The civic block's designation means lighter regulatory scrutiny and
  # cheaper rents. A Weequay enforcer has identified this as prime
  # territory — mutual-aid societies and veterans' associations are
  # asset-rich and reluctant to involve Republic security in their
  # business, making them ideal protection-tax targets.
  # ══════════════════════════════════════════════════════════════════

  - name: Civic Block Shakedown Artist
    room: "Coruscant - Coco Town - Civic Block"
    species: Weequay
    description: >-
      A Weequay in civilian clothes that fit poorly over a frame built
      for something heavier than civilian work. He stands near the
      plaza's veteran-lodge corner with the specific relaxed posture of
      someone who is always on the clock. He has been through these
      organizations one by one — explained the neighborhood's
      circumstances, the costs of misfortune, the value of community
      protection — and most of them pay. The ones who don't pay end up
      in a conversation with him directly. He views this as the
      natural order of things and has no particular beef with anyone
      who disagrees, as long as they do it quietly and quickly.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 3D+2
        intimidation: 4D
        streetwise: 3D+2
        brawling: 3D+2
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        Patient, professional, and not personally invested in the outcome
        of any individual conversation. He has done this in six districts
        across three planets. He knows the difference between someone
        who is going to pay eventually and someone who isn't, and he
        stops spending time on the latter. In a fight he is methodical —
        carbine range, steady positioning, no wasted movement. He is
        not worried about noise because he knows which civic-block
        organizations are going to pretend they saw nothing.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Gruff Weequay Basic, clipped and economical. "Simple transaction."
        "Everyone pays. Question is how." "Last organization that said
        no is not in this block anymore."
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He unslings the carbine from under his coat without any particular hurry.*"
        - "*He doesn't move for the exit. This is his street.*"
        - "*The carbine points at center mass — not at your face, not at your feet. Center mass.*"
