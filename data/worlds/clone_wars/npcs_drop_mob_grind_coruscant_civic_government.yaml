# data/worlds/clone_wars/npcs_drop_mob_grind_coruscant_civic_government.yaml
#
# Coruscant Civic Core & Government Hall Mob Grind Batch (2026-06-24)
#
# Six roaming hostile NPCs seeded across six previously uncovered Coruscant rooms
# spanning two zones: senate_district (5 rooms) and entertainment_district (1 room).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Coruscant - Galactic Senate Building - Exterior Plaza (senate_district)  x1  (Zabrak CIS spotter)
#   Coruscant - Galactic Senate Building - Public Lobby   (senate_district)  x1  (Duros data broker)
#   Coruscant - Chancellor's Avenue                       (senate_district)  x1  (Aqualish extortionist)
#   Coruscant - Grand Reception Hall                      (senate_district)  x1  (Twi'lek document thief)
#   Coruscant - Legislative Borough                       (senate_district)  x1  (Human CIS asset)
#   Coruscant - The Mosaic Hotel                          (entertainment_district) x1 (Nikto fugitive)
#
# Species diversity: Zabrak / Duros / Aqualish / Twi'lek / Human / Nikto — 6 distinct.
#
# Thematic premise: The Senate District's clone trooper presence concentrates on
# government entry-points and dignitary routes, not the surrounding civic fabric.
# The Senate Building's exterior plaza and public lobby draw thousands of political
# observers daily — ideal cover for intelligence operatives who need a reason to
# stand near senators. Chancellor's Avenue is patrolled but not searched; a
# protection ring running government workers has operated there for two years
# under the clone troopers' noses. The Grand Reception Hall hosts enough state
# occasions that a skilled document thief with a senatorial aide's credentials
# can work the crowd indefinitely. The Legislative Borough's GAR logistics center
# makes it a high-value target for Separatist procurement intelligence. The
# Mosaic Hotel in the Gilded Cage harbors a Nikto bounty hunter who targeted
# the wrong person and is burning time waiting for a way off-planet.
#
# All rooms confirmed in data/worlds/clone_wars/planets/coruscant.yaml at HEAD.
# Room name → planet YAML name matches exactly (see test for validation).
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats are UNVERIFIED against the PDF. Grounded in sibling CW NPC
#   patterns (coruscant_senate_district + coruscant_monumental baselines):
#     settled/secured zone humanoid band: DEX 2D+2–3D, blaster 3D+1–4D+1,
#     dodge 3D–3D+2, STR 2D–3D, cp 2–3, dsp 1–2.
# Weapons: blaster_pistol / concealed_blaster / hold_out_blaster —
#   all keys confirmed in data/weapons.yaml at HEAD.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # GALACTIC SENATE BUILDING — EXTERIOR PLAZA — 1 NPC (Zabrak CIS spotter)
  # The plaza fronts the Senate dome and never empties: petitioners,
  # HoloNet reporters, Republic dignitaries, and off-world observers
  # cycle through it continuously. Clone honor guards watch the main
  # entrance, not the observer crowd. A Zabrak with a datapad and a
  # reason to stand still is invisible here — and has been for six weeks.
  # ══════════════════════════════════════════════════════════════════

  - name: Senate Plaza Spotter
    room: "Coruscant - Galactic Senate Building - Exterior Plaza"
    species: Zabrak
    description: >-
      A Zabrak in the kind of civilian suit that signals political staffer
      without specifying which senator — dark, pressed, carrying a datapad
      whose screen-tap cadence is slower than any genuine assistant would
      tolerate. He has been standing near the HoloNet terminal for long
      enough that the clone honor guards at the main entrance have stopped
      clocking him. The crown of vestigial horns above his brow and the
      Zabrak facial tattoos are unremarkable here; the Senate District has
      seen every species. What is remarkable, if you know what you are
      looking at, is that the datapad is logging faces, not schedules —
      identifying high-value Senate personnel for a buyer who is not
      interested in their legislative agenda. When you get close enough
      to see the screen, the datapad goes into the jacket pocket and the
      concealed blaster comes out in the same motion.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 3D
        search: 3D+2
        con: 3D+1
        sneak: 3D
      weapon: concealed_blaster
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A Zabrak CIS intelligence asset running a long-term observation
        post on the Senate Building's exterior plaza — logging Republic
        dignitaries and Senate staff for his handler's targeting
        database. He is patient, disciplined, and has internalized the
        rhythm of the plaza well enough to avoid every clone trooper
        rotation. He does not panic when his cover is threatened; he
        assesses the threat, makes one cost-benefit calculation, and
        then acts with the speed and precision that six weeks of
        maintaining a static post has sharpened to a fine edge.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat, unhurried Zabrak-accented Basic — the voice of someone
        who does not expect the conversation to last long. "Wrong
        terminal." The datapad goes into the jacket and the concealed
        blaster replaces it before the sentence finishes.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The datapad disappears into the jacket pocket in one motion; the concealed blaster is out before the coat settles.*"
        - "*He fires and steps sideways into the observer crowd, using their startled scatter to mask his angle.*"
        - "*'Wrong face.' He fires again, backing toward the HoloNet terminal cluster for cover.*"

  # ══════════════════════════════════════════════════════════════════
  # GALACTIC SENATE BUILDING — PUBLIC LOBBY — 1 NPC (Duros data broker)
  # The public lobby runs on foot-traffic: lobbyists, credentialed
  # visitors, and senatorial-office messengers. Access to committee
  # schedules, floor vote timings, and diplomatic movement logs is
  # worth significant credits to the right buyers — and a Duros who
  # looks like a scheduling aide can harvest all three without
  # leaving this lobby. He has not left in four days.
  # ══════════════════════════════════════════════════════════════════

  - name: Senate Lobby Data Broker
    room: "Coruscant - Galactic Senate Building - Public Lobby"
    species: Duros
    description: >-
      A Duros in standard bureaucratic grey, standing near the visitor
      queue with a laminated schedule card and the patient expression
      of someone who has been waiting on a senator's administrative
      office for two hours and has stopped caring. The Duros red eyes
      track the lobby's information streams with a precision that no
      mere scheduling aide would waste on them — committee access
      cards tapped at the security panel, the time-stamp intervals
      between diplomatic courier arrivals, which senatorial staff are
      carrying marked datapads and which are carrying unmarked ones.
      He buys favors from lobby-level security staff with sabacc chips
      he loses deliberately and sells what he hears to clients whose
      names are not on any lobbyist registry. When you follow him to
      the quiet end of the lobby where the comms kiosks cluster, the
      hold-out blaster emerges from inside the schedule card folder.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D
      skills:
        blaster: 3D+1
        dodge: 3D
        con: 3D+2
        forgery: 3D+1
        streetwise: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        A Duros operating an independent intelligence-brokerage from
        the Senate Building's public lobby — selling committee
        schedules, diplomatic movement data, and vote-timing
        forecasts to off-books buyers. He is cerebral, patient,
        and deeply risk-averse in the collection phase; when the
        collection phase ends and the threat-assessment phase
        begins, the hold-out blaster emerges with the calm
        efficiency of a professional who has done this before
        and intends to do it again.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Precise, unhurried Duros Basic — each word load-bearing,
        nothing wasted. "Schedule's full." The hold-out blaster
        clears the schedule card folder and levels before the
        lobby's ambient noise has time to mask the sound.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The schedule card folder closes around the hold-out blaster and opens again with it pointing at you.*"
        - "*He fires and retreats toward the comms kiosks — he already mapped three angles of approach from them.*"
        - "*'Wrong lobby.' He fires again, angling for the stairwell exit behind the visitor queue.*"

  # ══════════════════════════════════════════════════════════════════
  # CHANCELLOR'S AVENUE — 1 NPC (Aqualish extortionist)
  # The Avenue is patrolled and the clone troopers at the far gate
  # check credentials. What the clones do not patrol is the route
  # itself — the two-kilometer walk between the Senate District and
  # the Chancellor's compound that ministerial aides, legislative
  # assistants, and government support staff make twice a day. An
  # Aqualish with leverage and a blaster pistol has been running
  # a protection operation here for sixteen months.
  # ══════════════════════════════════════════════════════════════════

  - name: Government Quarter Extortionist
    room: "Coruscant - Chancellor's Avenue"
    species: Aqualish
    description: >-
      An Aqualish in a maintenance contractor's vest, standing near
      a Republic-flagged monument at the avenue's midpoint where the
      clone trooper foot-route has a twelve-minute gap between passes.
      The multi-jointed arms are folded in the way that Aqualish use
      to signal patience rather than passivity, and the broad flat
      face does not change expression when government workers cross
      the gap alone. He knows their schedules, their salaries, and
      which ones have complained to their supervisors about being
      stopped on a Republic boulevard. None of them have complained
      twice. The blaster pistol comes out of the contractor's vest
      at the first sign of resistance; the Aqualish has been doing
      this long enough that the motion is unhurried.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 3D
        technical: 2D
      skills:
        blaster: 4D
        dodge: 3D
        intimidation: 3D+2
        brawling: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        An Aqualish extortionist running a sixteen-month protection
        operation on the government workers who transit Chancellor's
        Avenue daily. He is methodical, unhurried, and physically
        confident — an Aqualish's natural strength means the blaster
        pistol is a convenience rather than a necessity. He treats
        resistance as a scheduling problem: one that ends quickly
        and without drama. He is not interested in conversation;
        he is interested in compliance.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat, guttural Aqualish-accented Basic stripped to
        operational minimum. "The rate is two hundred." If that
        does not work, the blaster pistol comes out of the
        contractor's vest. If that does not work, the other
        multi-jointed arm closes the distance.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The blaster pistol clears the contractor's vest with the efficiency of long practice.*"
        - "*He fires and advances — an Aqualish does not retreat on a boulevard he has worked for sixteen months.*"
        - "*A low sound that is not quite Basic. He fires again and closes the range.*"

  # ══════════════════════════════════════════════════════════════════
  # GRAND RECEPTION HALL — 1 NPC (Twi'lek document thief)
  # The Reception Hall runs a continuous cycle of state functions:
  # diplomatic presentations, Republic military commendations,
  # senatorial delegation meetings. A credentialed senatorial aide
  # can attend most of them — and a forged aide credential is worth
  # one-tenth of what a single classified procurement document from
  # a diplomatic reception is worth on the open market.
  # ══════════════════════════════════════════════════════════════════

  - name: Reception Hall Infiltrator
    room: "Coruscant - Grand Reception Hall"
    species: Twi'lek
    description: >-
      A Twi'lek in the blue-and-white livery of a mid-level senatorial
      aide — the credential lanyard visible, the datapad ready, the
      lekku wrapped in the tight formal binding that off-world Twi'lek
      staff use to signal they are not here to be decorative. She has
      attended nine state receptions in the past thirty days. The
      Republic's event security focuses on the principals, not the
      support staff; she has attended nine state receptions in thirty
      days specifically because of that focus. The classified briefing
      datapads that high-ranking Republic administrators carry to these
      events spend seven to ten minutes in jacket pockets or on chairs
      while their owners shake hands. Seven to ten minutes is more time
      than she needs. The concealed blaster under the aide's livery
      comes out when you get between her and the nearest service exit.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 3D+1
        con: 3D+2
        pick_pocket: 4D
        sneak: 3D
      weapon: concealed_blaster
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        A Twi'lek intelligence operative running a long-running
        document-theft operation from the Republic's state reception
        circuit. She is disciplined, precise, and has spent two
        years training for exactly this environment — the social
        choreography of Republic state functions, the positioning
        of security cameras, the timing windows that senior
        administrators create around their own datapad handling.
        When her cover is threatened, the concealed blaster comes
        out with the same calm precision she applies to everything
        else, and she moves for the exit she already located on
        entry.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Polished, aide-perfect Basic with a Ryloth accent that
        has been modulated out of anything distinctive. "This
        function is closed." The concealed blaster clears the
        livery in one motion and she is already moving toward
        the service exit.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The aide lanyard goes into the jacket and the concealed blaster comes out in the same motion.*"
        - "*She fires and breaks for the service exit she clocked on entry — the approach angle is already mapped.*"
        - "*'Wrong reception.' She fires again without breaking stride toward the exit.*"

  # ══════════════════════════════════════════════════════════════════
  # LEGISLATIVE BOROUGH — 1 NPC (Human CIS procurement asset)
  # The Borough's GAR logistics center processes clone trooper
  # replacement requisitions, deployment schedules, and weapons
  # procurement orders around the clock. A forged Republic civilian-
  # contractor badge gets a Human inside the building. What they
  # do with clone-deployment timetables once they are outside is
  # worth more to the right buyers than any cargo the Borough's
  # loading docks will see this month.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Legislative Asset
    room: "Coruscant - Legislative Borough"
    species: Human
    description: >-
      A Human in the recycled-oxygen-grey of a mid-tier government
      contractor, carrying the datachip portfolio that every GAR
      logistics subcontractor carries and none of them guard well.
      He has been through the Borough's contractor entrance eleven
      times in the past three weeks. Republic procurement offices
      process thousands of contractor visits a month; eleven is
      unremarkable. What is remarkable is what he does at the
      GAR logistics center's public terminal during each visit —
      the query patterns that map clone trooper deployment cycles,
      the document-access logs that reconstruct the order of battle
      for six Outer Rim campaigns. He sells the output to a contact
      who never meets him in person and pays in untraceable chits.
      When you position yourself between him and the Borough's
      contractor entrance, the blaster pistol comes out from under
      the portfolio with no hesitation and no visible change in his
      expression.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 2D+2
        strength: 2D+1
        technical: 2D+1
      skills:
        blaster: 3D+2
        dodge: 3D
        con: 3D+2
        forgery: 3D+1
        streetwise: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Human CIS intelligence operative embedded in the
        Legislative Borough's contractor network, harvesting
        GAR deployment data from public procurement terminals.
        He is methodical, patient, and accustomed to the
        bureaucratic rhythm of a government district that
        processes too much information to examine any of it
        carefully. When his cover is broken, he treats the
        situation with the same methodical efficiency he applies
        to procurement queries — identify the problem, apply
        the solution, exit the building.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Flat contractor Basic — the accent of someone who
        has spent a long time sounding like no one in particular.
        "Wrong building." The datachip portfolio closes and the
        blaster pistol comes up from beneath it.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The datachip portfolio drops and the blaster pistol comes up from the carry position without a wasted motion.*"
        - "*He fires and moves toward the contractor entrance — he has walked this exit eleven times and knows every angle.*"
        - "*'Wrong contractor.' He fires again, using the loading dock's column for cover.*"

  # ══════════════════════════════════════════════════════════════════
  # THE MOSAIC HOTEL — 1 NPC (Nikto fugitive)
  # The Mosaic is Iri Camas' hotel in the quieter end of the Gilded
  # Cage — comfortable, clean, and not the sort of place that asks
  # returning guests why they have been in the same room for four days.
  # A Nikto who made an extremely poor professional decision two weeks
  # ago and is burning credits waiting for a transport out is exactly
  # the sort of problem that Iri's reputation for discretion protects
  # and Iri's lobby would never tolerate if she knew.
  # ══════════════════════════════════════════════════════════════════

  - name: Mosaic Hotel Fugitive
    room: "Coruscant - The Mosaic Hotel"
    species: Nikto
    description: >-
      A Nikto at a corner seat in the Mosaic's lobby with a meiloorun
      fruit that has been untouched for thirty minutes and a sight line
      to both the lobby entrance and the stairwell. The scaled face
      carries the particular stillness of a Nikto who has been sitting
      in the same corner for four days and has long since stopped
      pretending to be a hotel guest with leisure. He took a contract
      two weeks ago that was supposed to be straightforward and
      produced an outcome that is — complicated. The person who hired
      him is not happy. The friends of the person he delivered are
      not happy. He is not happy. He has seventeen hundred credits
      left, a berth on a departing freighter in three days, and a
      blaster pistol that he will produce without any of the usual
      social foreplay the moment he decides you are connected to
      either of his unhappy parties.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 3D
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 3D+2
        brawling: 4D
        intimidation: 3D
        search: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A Nikto bounty hunter in the worst phase of his career —
        competent enough to have completed a complicated contract,
        not careful enough to have anticipated its consequences.
        He is jumpy in the way that professionals get jumpy
        when they know the window is closing: the paranoia is
        calculated, the violence when triggered is fast and
        not particularly controlled. He is not looking for a
        fight; he is looking for a transport. Everything between
        him and the transport departure is a threat to be
        neutralized.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Terse Nikto-accented Basic — no pleasantries, no
        patience for context. "Wrong hotel." The blaster
        pistol is already in his hand by the time the
        sentence ends; he had the draw distance calculated
        from the moment you came through the lobby entrance.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The Nikto is out of the lobby chair with the blaster pistol level before you have finished deciding.*"
        - "*He fires and sweeps sideways, using the corner furniture as cover — he mapped this four days ago.*"
        - "*A low Nikto rasp. He fires again, angling for the stairwell exit.*"
