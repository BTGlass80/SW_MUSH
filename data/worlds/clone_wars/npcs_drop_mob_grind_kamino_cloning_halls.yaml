# data/worlds/clone_wars/npcs_drop_mob_grind_kamino_cloning_halls.yaml
#
# Kamino Cloning Halls Hostile Mob Grind Batch (2026-06-22)
#
# Six roaming hostile NPCs seeded across the Cloning Halls zone (kamino_cloning_halls)
# to populate the solo-PvE mob-grind reward loop (engine/hunting_rewards.py).
# All six satisfy engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Thematic premise: CIS infiltration of Tipoca City's Cloning Halls.
# At ~20 BBY the CIS has standing strategic interest in destroying or
# compromising the clone production pipeline. All six are original CIS
# operatives or rogue agents acting on that mission.
#
# Zone spread:
#   Cloning Hall Access Checkpoint x1  (sleeper security agent)
#   Genetics Laboratory x1             (Bothan data thief)
#   Training Block Alpha x1            (Nikto assassin)
#   Advanced Training Facility x1      (sabotage droid operator)
#   Clone Mess Hall x1                 (supply-chain poisoner)
#   Strategic Command Center x1        (CIS intelligence analyst)
#
# Avoided rooms with existing ambient NPCs:
#   Growth Chambers    → Growth Tech Vel Thun (npcs_drop_kamino_interiors_ambient.yaml)
#   Clone Barracks     → Veteran CT-2711 'Drift' (ibid.)
#   Clone Equipment Bay → Equipment Manager Vas Toru (ibid.)
#   Arrivals Hall      → Kaminoan Attendant Kel Avon (ibid.)
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF unavailable in this tree;
#   stats grounded in sibling CW NPC patterns (Drop H / Kamino mob-grind baselines).
# Weapons: blaster_pistol, heavy_blaster_pistol — all keys confirmed in
#   data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # CLONING HALL ACCESS CHECKPOINT — 1 NPC
  # Security seam between Tipoca City proper and the Cloning Halls;
  # staffed by Kaminoan techs and Republic-contracted security personnel.
  # ══════════════════════════════════════════════════════════════════

  - name: Checkpoint Security Impostor
    room: "Kamino - Cloning Hall Access Checkpoint"
    species: Mirialan
    description: >-
      A Mirialan in Kaminoan security livery with a Republic contractor
      badge clipped to her collar. The badge scans correctly — she spent
      three weeks in place making sure it would. Her facial tattoos follow
      the geometric patterns of a lineage she has not spoken to in years.
      She processes access requests with practiced efficiency, logging
      everything that passes through, and has been passing that log to
      a dead-drop receiver beneath the platform for six days. When you
      move toward the inner checkpoint, her hand drops to her sidearm
      and her expression changes. She has been waiting for this moment
      and has a plan for it.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 3D+1
      skills:
        blaster: 4D
        dodge: 3D+1
        security: 4D+1
        con: 3D+2
        sneak: 3D
        search: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS sleeper agent embedded as a contracted security technician
        at the Cloning Hall access checkpoint. Her mission is data
        collection and selective access facilitation for inbound CIS
        operatives. She is professional, unhurried, and has rehearsed
        her cover story to the point where it feels like memory. When
        her cover is threatened, the professional calm becomes immediate
        violence — she is trained for exactly this contingency and does
        not hesitate.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Clipped, helpful Basic with a contractor's tone — until it isn't.
        "Access credentials, please." Then a pause, and the pistol
        clearing the holster.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The badge goes dark as she fires from behind the checkpoint desk.*"
        - "*She moves into the corridor's shadow and keeps firing.*"
        - "*'Six days. I almost made it.' She doesn't stop shooting.*"

  # ══════════════════════════════════════════════════════════════════
  # GENETICS LABORATORY — 1 NPC
  # Core research space: clone growth templates, genetic sequencing
  # banks, and Kaminoan long-cycle modification records. Target of
  # extreme CIS intelligence interest.
  # ══════════════════════════════════════════════════════════════════

  - name: Bothan Genetics Thief
    room: "Kamino - Genetics Laboratory"
    species: Bothan
    description: >-
      A Bothan male in an ill-fitting Kaminoan researcher smock, hands
      on a sequencing terminal he has no legitimate reason to be
      operating. He has already loaded three archive files to an
      encrypted datachip — the chip is in his left hand and will not
      survive this encounter no matter what. He moves with the
      particular alertness of someone who has spent years operating
      in spaces where discovery means death, and who has made a
      practised calculation about how long he has before the
      alarm reaches anyone armed.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+1
        mechanical: 2D
        perception: 3D+1
        strength: 2D
        technical: 2D+2
      skills:
        blaster: 4D
        dodge: 3D+2
        computer: 4D+1
        sneak: 4D
        con: 3D+2
        search: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A Bothan intelligence operative contracted by CIS procurement to
        extract the Kaminoan clone genetic baseline — the master template
        from which the entire clone army is produced. He is experienced,
        calm under threat, and has gotten out of worse situations than
        this one. The datachip in his hand is the mission; he will
        destroy it before letting it be captured and will fight hard
        enough to buy the seconds needed to do so.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Precise, unhurried Basic. No panic. "You should leave this room."
        Then the pistol is up and the datachip goes into a pocket that
        will not survive the encounter.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires one-handed, the other palming the datachip deeper
          into his coat.*"
        - "*He angles for the exit without lowering the pistol.*"
        - "*'The data is already gone.' He keeps firing.*"

  # ══════════════════════════════════════════════════════════════════
  # TRAINING BLOCK ALPHA — 1 NPC
  # Primary clone combat training space; obstacle courses, weapons
  # qualification ranges, tactical scenario rooms. Significant
  # kill-potential if a CIS operative can take out key personnel here.
  # ══════════════════════════════════════════════════════════════════

  - name: Nikto Assassin
    room: "Kamino - Training Block Alpha"
    species: Nikto
    description: >-
      A Nikto in training-block maintenance coveralls that do not fit
      a Nikto well and that he did not obtain legitimately. He is
      positioned near the qualification range's control terminal —
      not operating it, just near enough to have access — with a
      heavy blaster worn openly in the way that people with authorization
      sometimes carry weapons in a military facility. He does not have
      authorization. He was sent to remove a specific instructor and
      the timeline has slipped, and now someone unexpected is in
      the room with him, which he finds irritating.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 3D+1
        technical: 2D
      skills:
        blaster: 5D
        brawling: 4D+1
        dodge: 4D
        intimidation: 3D+1
        sneak: 3D+2
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 3
    ai_config:
      personality: >-
        A CIS contract assassin tasked with eliminating a Republic clone
        training specialist whose name is above his clearance level. He
        is unhurried about violence and practiced at it. The mission's
        secondary objective — gathering targeting data on the clone
        qualification process — is irrelevant now that there is a
        complication. He addresses complications with the heavy blaster
        and the particular economical efficiency that keeps him employed.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Minimal, accented Basic. "Wrong building." Nothing else. Then
        the heavy blaster comes up.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The heavy blaster tracks you across the range floor.*"
        - "*He fires twice — precise, unhurried — and steps to cover.*"
        - "*He doesn't explain. He just keeps shooting.*"

  # ══════════════════════════════════════════════════════════════════
  # ADVANCED TRAINING FACILITY — 1 NPC
  # Elite clone training space: ARC trooper scenarios, command
  # simulations, restricted tactical environment. Harder to penetrate
  # than Training Block Alpha — but this one managed.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Simulator Saboteur
    room: "Kamino - Advanced Training Facility"
    species: Chagrian
    description: >-
      A Chagrian crouched near one of the tactical scenario terminals,
      working with a compact slicer kit that vanishes into a sealed
      case the moment he registers a presence in the room. The lethorns
      at his jaw are capped in conductive sheathing — a modification
      that lets him interface directly with certain older terminal
      formats, which is how he got past the access lock on the
      simulator core. He straightens slowly, the slicer case now
      closed, and gives you a look that is mostly calculating the
      odds and finding them acceptable.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+1
        mechanical: 2D+1
        perception: 2D+2
        strength: 2D
        technical: 4D
      skills:
        blaster: 3D+2
        computer: 5D
        security: 4D+2
        dodge: 3D
        sneak: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS technical operative assigned to compromise the ARC training
        simulator: inserting subtle kill-scenario modifications that will
        degrade the quality of Republic elite unit training over the
        following months. He is not primarily a combatant but has dealt
        with interruptions before. He will shoot fast and without warning
        to buy the seconds needed to ensure the slicer kit is already
        clean when anyone else arrives.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Calm, methodical Basic. No threats, no negotiation. He is
        already calculating exit vectors before he speaks. Then the
        pistol is out and he fires without announcement.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires without preamble, already moving for the exit.*"
        - "*The slicer case is sealed; now he just needs to leave.*"
        - "*He fires again, precise and economical. He wants to be
          somewhere else in thirty seconds.*"

  # ══════════════════════════════════════════════════════════════════
  # CLONE MESS HALL — 1 NPC
  # Clone trooper dining facility; food processing, ration storage,
  # the primary nutritional intake point for Tipoca City's training
  # cohorts. A vector for mass effect operations.
  # ══════════════════════════════════════════════════════════════════

  - name: Supply Chain Operative
    room: "Kamino - Clone Mess Hall"
    species: Twi'lek
    description: >-
      A Twi'lek female in the gray coveralls of a Republic supply
      contractor, carrying a manifest tablet that she has been staring
      at in one spot for fifteen minutes without moving down the
      aisle. The coveralls are genuine but the manifest is not — it
      covers a secondary inventory she has been running through the
      mess hall's ration crates for eleven days. She looks up when
      you enter and does the calculation quickly: you are not
      mess staff, you are not clone, you are not scheduled. The
      manifest tablet goes into a pocket and the blaster comes out.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+2
        mechanical: 2D
        perception: 2D+2
        strength: 2D
        technical: 2D+2
      skills:
        blaster: 3D+2
        con: 4D
        dodge: 3D
        sneak: 3D+1
        streetwise: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS logistics operative running a slow-burn contamination
        program through the mess hall supply chain — the modification
        does not kill, it degrades clone performance metrics over weeks
        in ways indistinguishable from natural fatigue. She is not a
        combat specialist but she has been in this situation before
        and has thought about how it ends. She fires fast, not accurately,
        and uses the mess hall's aisle structure to create distance.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Quick, nervous Basic when surprised — but the pistol is already
        moving. "I'm just a contractor." Then the shot.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*She fires and ducks behind a ration storage rack.*"
        - "*'I'm just a contractor.' The pistol says otherwise.*"
        - "*She fires again from a lower angle, using the aisle for cover.*"

  # ══════════════════════════════════════════════════════════════════
  # STRATEGIC COMMAND CENTER — 1 NPC
  # The operational nerve of Tipoca City's clone deployment coordination:
  # battle group assignments, transfer manifests, training cohort
  # scheduling. The highest-value intelligence target in the facility.
  # ══════════════════════════════════════════════════════════════════

  - name: CIS Intelligence Analyst
    room: "Kamino - Strategic Command Center"
    species: Zabrak
    description: >-
      A Zabrak with a Republic Strategic Command access badge and
      the bearing of someone who belongs exactly where they are —
      which is the point. He has been here for four hours, working
      from a terminal in the center's secondary workstation row,
      extracting deployment records with the methodical patience
      of a professional who knows that speed creates noise. The
      badge is not forged — it was taken from someone who will not
      be reporting it missing. He clocks you across the room,
      finishes the extraction sequence he is running, and then
      stands and turns to address you with the same unhurried
      confidence he has used for everything else in this facility.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D+1
        strength: 2D+2
        technical: 3D
      skills:
        blaster: 4D
        dodge: 3D+1
        computer: 4D+2
        bureaucracy: 4D
        con: 3D+2
        sneak: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 4
      dark_side_points: 2
    ai_config:
      personality: >-
        A senior CIS intelligence analyst whose speciality is
        penetrating Republic military command infrastructure. He has
        done this six times before and been interrupted twice. Both
        times he got out. He is calm, clinical, and genuinely
        confident in his ability to manage the situation in front
        of him, whatever form it takes. He finishes what he was doing,
        then deals with the interference — in that order.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Measured, confident Basic. He takes a moment before speaking,
        as if granting an audience. "This is unfortunate for you."
        Then he fires without further ceremony.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'This is unfortunate for you.' *He fires with practiced
          accuracy.*"
        - "*He steps between terminal banks, firing from partial cover.*"
        - "*'I've already transmitted what I need.' He keeps shooting.*"
