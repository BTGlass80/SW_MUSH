# data/worlds/clone_wars/test_character.yaml
# Clone Wars Era — Test character / dev account.
# Schema version 1.
#
# May 19 2026: Authored to close the May 18 active_era pivot regression.
# When the production era flipped GCW → CW, the test character loader
# (engine/test_character_loader.py) began looking for
# `data/worlds/clone_wars/test_character.yaml`, which did not exist.
# The loader silently returned None, build_mos_eisley.py printed
# "[SKIP] No test_character spec for this era." and no dev account
# was created in the CW DB. This file restores the testuser/testpass
# account under the CW era with CW-appropriate flavor (Jedi Knight on
# active assignment, faction_id=jedi_order vs GCW's `independent`).
#
# Auto-created on first build to provide an admin+builder god-mode
# account for development testing. Skips chargen + tutorial.
#
# Schema: identical to data/worlds/gcw/test_character.yaml. See that
# file's header for full schema documentation.
#
# Loaded by engine/test_character_loader.py via era.yaml's
# content_refs.test_character. The companion content_refs.test_jedi
# ref in era.yaml is currently inert — world_loader.py resolves it into
# the bundle struct (`test_jedi_path` on EraManifest) but no caller
# dereferences it. Per May 19 audit, only test_character.yaml is
# actually consumed; test_jedi.yaml is reserved for a future
# "second test account" feature.

schema_version: 1

account:
  username: testuser
  password: testpass
  is_admin: true
  is_builder: true

