# data/worlds/clone_wars/npcs_drop_mob_grind_kamino_remaining.yaml
#
# Kamino Remaining Rooms Hostile Mob Grind (2026-06-22)
#
# Four roaming hostile NPCs filling the four Kamino rooms that lacked
# hostile-mob coverage after all prior batches (kamino.yaml,
# kamino_cloning_halls.yaml, kamino_tipoca_city.yaml,
# kamino_inner_complex.yaml). All four satisfy
# engine/hunting_rewards.is_huntable_mob():
#   - ai_config.hostile = true
#   - NONE of the special-reward markers present:
#     (is_bounty_target / is_anomaly_target / is_wilderness_encounter /
#      is_dsp_hunter / is_intel_handler / chain_enemy_template / vendor)
#
# Zone spread:
#   Tipoca City Arrivals Hall x1         (kamino_tipoca_city  — frontier)
#   Clone Barracks x1                    (kamino_cloning_halls — frontier)
#   Aiwha Stable x1                      (kamino_ocean_platform — contested_marches)
#   Ocean Platform - Visiting Officers' Quarters x1
#                                        (kamino_ocean_platform — contested_marches)
#
# Existing ambient NPCs in these rooms (non-hostile; additions independent):
#   Arrivals Hall: Kaminoan Attendant Kel Avon
#     (npcs_drop_kamino_interiors_ambient.yaml)
#   Clone Barracks: Veteran CT-2711 'Drift'
#     (npcs_drop_kamino_interiors_ambient.yaml)
#   Aiwha Stable: Aiwha Keeper Tae Kalu
#     (npcs_drop_def_civilians.yaml)
#   Visiting Officers' Quarters: Visiting Officer Lt. Cmdr. Salla Vren
#     (npcs_drop_def_civilians.yaml)
#
# Prior batches and their room coverage:
#   kamino.yaml           -> Pylon Access x2, Unauthorized Docking x2,
#                            Ocean Surface x1, Lower Platform x1
#   kamino_cloning_halls  -> Checkpoint x1, Genetics Lab x1, Training Block x1,
#                            Advanced Training x1, Clone Mess Hall x1,
#                            Strategic Command x1
#   kamino_tipoca_city    -> Main Corridor x1, Briefing Room x1, Visitor Dining x1,
#                            Medical Bay x1, Library x1, Administration x1
#   kamino_inner_complex  -> PM's Residence x1, Residential Wing x1,
#                            Growth Chambers x1, Equipment Bay x1,
#                            Security Holding x1, Landing Platform Alpha x1
#
# ── Policy ────────────────────────────────────────────────────────────
# Q1 (no canon figures): all characters are original.
# Era (~20 BBY): no Imperial/Empire/Rebel/TIE strings.
# WEG R&E D6 stats. WEG40120 PDF absent from this worktree;
#   stats UNVERIFIED against PDF. Grounded in sibling Kamino NPC
#   patterns: frontier band (tipoca_city.yaml baselines: DEX 2D+2 to 3D,
#   blaster 3D+2 to 4D+1); contested_marches (kamino.yaml outer-platform
#   baselines: DEX 2D+2 to 3D+1, blaster 3D+2 to 4D+1, creature brawling
#   4D+2). Skill governance (engine/skill_checks.py): sneak=DEX, con=PER,
#   search=PER, intimidation=PER, brawling=DEX, security=TEC, survival=KNO.
# Weapons: blaster_pistol, blaster_carbine, heavy_blaster_pistol --
#   all keys confirmed in data/weapons.yaml.
# Loaded by: engine/npc_loader.py via era.yaml content_refs.npcs.
# ──────────────────────────────────────────────────────────────────────

schema_version: 1

npcs:

  # ══════════════════════════════════════════════════════════════════
  # TIPOCA CITY ARRIVALS HALL -- 1 NPC (Devaronian intelligence broker)
  # The public-facing entry point for civilian and contractor arrivals.
  # Kaminoan Attendant Kel Avon processes visitors at the reception
  # counter. One Devaronian in transit-agent livery has been here
  # three hours longer than any transit business requires, watching
  # every arrivals door and cataloguing every uniform grade.
  # ══════════════════════════════════════════════════════════════════

  - name: Devaronian Arrivals Watcher
    room: "Kamino - Tipoca City Arrivals Hall"
    species: Devaronian
    description: >-
      A Devaronian male leaning against a viewport column with a
      datapad tilted just far enough to conceal the screen. The
      curved horns and deep-red skin are unmistakably Devaronian;
      the transit-agency credentials clipped to his collar are not
      what they claim. He has logged every arrivals-door opening
      since the morning shift, noting uniform grades, specialist
      insignia, and transfer-case markings on a deniable local
      store. He registered you the moment you entered the hall.
      When he understands you have registered him in return, his
      posture shifts from relaxed to precise in a single breath.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 3D+1
        strength: 2D+1
        technical: 2D
      skills:
        blaster: 3D+2
        dodge: 3D+1
        con: 4D+2
        sneak: 3D+2
        search: 4D
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 2
    ai_config:
      personality: >-
        A CIS intelligence asset embedded in Kamino's civilian
        arrivals flow, cataloguing Republic personnel -- officer
        grades, specialist classifications, transfer patterns. He
        is not a front-line combatant; he is a watcher. When
        cornered his first instinct is misdirection; his second is
        the pistol already in his off hand.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Smooth, unhurried Basic with a Devaronian undertone he has
        spent years softening. Prefers misdirection over confrontation
        until misdirection is no longer viable.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires low and angles for the exit without looking back.*"
        - "*'You were not supposed to be looking.' He fires again.*"
        - "*The datapad hits the floor. The pistol was already out.*"

  # ══════════════════════════════════════════════════════════════════
  # CLONE BARRACKS -- 1 NPC (Klatooinian barracks infiltrator)
  # Sleeping quarters for an off-duty clone rotation. Veteran
  # CT-2711 'Drift' stands end-of-shift watch near the bunk rows.
  # A Klatooinian in Republic Logistics coveralls has been moving
  # through the barracks during the low-traffic window, working
  # through footlockers with a portable reader, harvesting clone
  # squad identifier chips and unit-designation patches.
  # ══════════════════════════════════════════════════════════════════

  - name: Klatooinian Barracks Infiltrator
    room: "Kamino - Clone Barracks"
    species: Klatooinian
    description: >-
      A Klatooinian in Republic Logistics Corps coveralls moving
      through the barracks with the quiet confidence of someone
      who has a plausible reason to be here and is hoping no one
      asks for it in detail. The slicer kit tucked against his
      thigh is visible if you know what to look for. He has been
      scanning footlocker locks with a passive reader, harvesting
      clone squad identifier chips -- small items, individually
      worthless, collectively a detailed order of battle. He
      stops when you step into his sightline. There is a moment
      where both of you understand the situation at the same time.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D+1
        mechanical: 2D
        perception: 2D+2
        strength: 3D
        technical: 2D+2
      skills:
        blaster: 3D+2
        dodge: 3D
        sneak: 3D+2
        search: 3D+1
        security: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 2
      dark_side_points: 1
    ai_config:
      personality: >-
        A Klatooinian contract field agent hired to harvest clone
        unit identification data during the barracks rotation. He
        has no political conviction -- this is work. His priority
        is completing the slicer pass; his contingency is getting
        out fast. He will use violence efficiently if it is faster
        than talking his way past the problem.
      knowledge: []
      faction: cis
      dialogue_style: >-
        Flat, minimal Basic. No elaborate cover story -- if words
        fail, the conversation is already over and he has made
        the decision.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*He fires once and moves for the barracks door.*"
        - "*The slicer kit goes into a pocket. The pistol comes out.*"
        - "*'Worth more alive.' He doesn't slow down.*"

  # ══════════════════════════════════════════════════════════════════
  # AIWHA STABLE -- 1 NPC (Whiphid creature hunter)
  # The ocean-platform stable housing Kamino's eight stabled Aiwha.
  # Aiwha Keeper Tae Kalu tends the animals. A Whiphid has arrived
  # on fabricated landing credentials carrying a containment harness
  # and a standing order from an Outer Rim exotic-animal broker who
  # wants three live Aiwha specimens, cost secondary.
  # ══════════════════════════════════════════════════════════════════

  - name: Whiphid Creature Hunter
    room: "Kamino - Aiwha Stable"
    species: Whiphid
    description: >-
      A massive Whiphid filling most of the stable access corridor,
      tusked jaw working slowly as he surveys the stalled Aiwha with
      the practiced eye of someone who has moved large living animals
      across a lot of parsecs. He carries a blaster carbine slung
      forward and a containment harness folded under one arm. The
      Aiwha in the nearest stall is already showing stress signs --
      they read intent at a distance, and what they are reading from
      this visitor is not reassuring. The Whiphid notices you the
      way a cliff face notices weather. His grip on the carbine shifts.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 2D
        mechanical: 2D
        perception: 2D+2
        strength: 4D
        technical: 2D
      skills:
        blaster: 3D+2
        brawling: 5D
        melee_combat: 4D
        survival: 3D
        search: 3D
      weapon: blaster_carbine
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      personality: >-
        A Whiphid big-game and exotic-fauna contractor on a live-
        capture job. He has moved creatures across a dozen systems
        and handled interference before. When you appear between him
        and his work he processes the problem the way he processes
        every problem: directly, and with a great deal of mass.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Minimal Basic, accent thick. When words are used at all:
        brief, declarative, not particularly interested in a reply.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The Whiphid advances without slowing. The carbine swings up.*"
        - "*A low resonant sound -- not quite a word. The harness drops.*"
        - "*He fires one-handed and keeps moving forward.*"

  # ══════════════════════════════════════════════════════════════════
  # OCEAN PLATFORM -- VISITING OFFICERS' QUARTERS -- 1 NPC
  # Secured guest suites for senior Republic officers on inspection
  # or liaison duty. Lt. Cmdr. Salla Vren currently has the primary
  # suite. A Shistavanen arrived on fabricated Republic Security
  # Bureau credentials and has been waiting forty minutes for a
  # named target whose transit schedule he received three days prior.
  # ══════════════════════════════════════════════════════════════════

  - name: Shistavanen Contract Killer
    room: "Kamino - Ocean Platform - Visiting Officers' Quarters"
    species: Shistavanen
    description: >-
      A Shistavanen in the dark-grey field uniform of a Republic
      Security Bureau liaison, standing at the corridor juncture of
      the visiting officers' block with a datapad up and face angled
      toward it. The wolf-muzzle and amber eyes do not move from the
      pad when you enter the corridor; the muzzle takes a single slow
      breath in your direction. His RSB credentials are authentic
      forgeries from a document shop on Nar Shaddaa. His target is
      four doors down and not yet back from the briefing. When you
      stop walking, his eyes come off the datapad.
    char_sheet:
      attributes:
        dexterity: 3D+1
        knowledge: 2D
        mechanical: 2D
        perception: 3D
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D+1
        dodge: 4D
        sneak: 4D
        search: 3D+2
        intimidation: 3D+1
      weapon: heavy_blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 3
    ai_config:
      personality: >-
        A Shistavanen contract killer on a precision assignment --
        one named target, eliminate on sight, confirm the kill.
        Patient and methodical. When an unexpected witness appears
        his triage is fast: witnesses complicate exits.
      knowledge: []
      faction: independent
      dialogue_style: >-
        Clipped, flat Basic with a Shistavanen undertone. No cover
        story that can survive scrutiny -- words are not the tool
        at this range.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "*The datapad drops. The heavy blaster is already at eye level.*"
        - "*He fires twice and angles for the stairwell.*"
        - "*A low growl -- then the blaster swings up.*"
