      personality: >-
        A Devaronian enforcer for a luxury-goods theft ring operating
        in the Calocour Heights Boutique Row. His role is lookout and
        crew protector — he maintains a credible civilian presence and
        calls off or delays security responses while his crew works.
        He is personable when that is useful and is skilled at reading
        whether a bystander is genuinely oblivious or a threat.
        When he identifies a threat, his transition to hostile is fast
        and professional. He prefers to end confrontations quickly
        and move his crew out before attention compounds.
