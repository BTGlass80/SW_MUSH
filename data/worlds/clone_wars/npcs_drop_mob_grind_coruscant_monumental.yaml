      display case in the covered shopping arcade, apparently
      interested in a set of Alderaanian glass sculptures priced
      at enough credits to run a small freighter for a month.
      He is not here to buy them. The small earbud and the
      deliberate positioning — back to the wall, facing both
      entrances — are the signals a careful observer catches.
      He is here because two members of his crew are in the
      back of the flagship boutique three doors down, and he
      is the warning system. When you look at him too long
      or move toward the back of the arcade, his hand drops
      from the display case to his jacket, and the casual
      interest leaves his face entirely.
