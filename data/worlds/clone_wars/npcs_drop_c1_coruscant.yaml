# data/worlds/clone_wars/npcs_drop_c1_coruscant.yaml
#
# Drop C1 — Coruscant Senate District + Jedi Temple Roster (May 2026)
#
# Per cw_content_gap_design_v1_1_decisions.md Stage 4 sequencing,
# Drop C1 is the first of two Coruscant roster drops:
#   - C1 (this file): Senate District + Jedi Temple — ~25 NPCs
#   - C2 (future):    Coco Town + Underworld       — ~25 NPCs
#
# Combined, C1+C2 will populate Coruscant at the Q6 hangout-planet
# density target of ~1.4 NPCs/room. Coruscant has 72 rooms; C1
# focuses on 11 of them (Senate District 6 rooms + Jedi Temple
# 11 rooms — but only 9 of the 11 Temple rooms get NPCs in this
# pass; Lightsaber Crafting Alcove and Council Antechamber stay
# empty by design for narrative reasons).
#
# Schema follows the canonical Vela Niree (npcs_cw_additions.yaml)
# reference per J1 handoff §6.7. Loaded by engine/npc_loader.py
# via era.yaml's content_refs.npcs list.
#
# ── POLICY CONSTRAINTS APPLIED ─────────────────────────────────────
#
# Q1 (canonical character cameos = EXTREMELY RESTRICTED): No
#   canonical Jedi Council members appear here. No Anakin, Obi-Wan,
#   Yoda, Mace, Plo Koon, Ki-Adi-Mundi, Kit Fisto, Shaak Ti, etc.
#   Likewise no canonical Senators (Padmé, Bail, Mon Mothma, etc.).
#   This roster is filled with PLAUSIBLE-BUT-NON-CANONICAL Jedi
#   (Knights, Padawans, Temple staff) and Senators (representing
#   real sectors / political stripes but not named canonical
#   figures). The Temple feels alive without claiming the canonical
#   characters.
#
#   Where possible, NPCs are explicitly framed as "the Council's
#   not here today / they're at the front / they don't make it down
#   to the floor much" — so canonical absence is in-fiction
#   plausible rather than a content gap.
#
# Q2 (era = mid-war ~20 BBY fixed): All backstories assume
#   post-Geonosis, pre-Outer Rim Sieges. Anakin Skywalker is a
#   Knight (referenced obliquely by NPCs who served with him).
#   War weariness is public. Multiple Jedi NPCs reference recent
#   deployments and exhaustion.
#
# Q5 (re-skin first, source canon second, bespoke last): Most
#   Senate NPCs are re-skins of the GG7 minor-functionary archetype
#   pattern (Beeyon Nace, Oxbell, etc.) shifted to government-staff
#   personality. Most Jedi NPCs are bespoke but grounded in canonical
#   Jedi pedagogy from JAS extraction (`jas_extraction_v1.md`)
#   and `wookieepedia_extracts/clone_trooper.md` (clone-Jedi
#   relationships) and `wookieepedia_extracts/coruscant.md`
#   (Federal District context).
#
# Q6 (variable density per planet, ~1.4 for Coruscant): C1+C2
#   targets ~50 total Coruscant NPCs. C1 ships 25.
#
# ── SOURCE GROUNDING ───────────────────────────────────────────────
#
# - jas_extraction_v1.md — Jedi pedagogy (Praxeum, Holocron, Code,
#   slow-pace training, dark-side temptation patterns), archetype
#   templates (Padawan personality range)
# - wookieepedia_extracts/coruscant.md — Federal District context,
#   Senate Building / Jedi Temple architectural detail, war-event
#   references (Zillo Beast, Cad Bane Senate raid)
# - wookieepedia_extracts/federal_district.md — Coruscant Security
#   Force, Coruscant Guard, military district during war
# - wookieepedia_extracts/clone_trooper.md — Jedi-General
#   relationships, accelerated aging context for Jedi who command
#   clones
# - wookieepedia_extracts/order_66.md — used to ensure backstories
#   don't leak post-19-BBY knowledge
#
# ── FACTION CODE NOTES ─────────────────────────────────────────────
#
# Jedi NPCs use ai_config.faction = "jedi_order" (the canonical
# CW org code per data/worlds/clone_wars/organizations.yaml).
# Senate NPCs use "republic" for Republic functionaries; senators
# themselves use "republic" by default with the implicit
# understanding that they're members of one of the two political
# coalitions (the Loyalist or Separatist-leaning blocs). Two
# senators are explicitly framed as Loyalist; one is framed as
# part of the Delegation of 2000 (peace-faction, mid-war coalition
# canonical).

schema_version: 1

npcs:

  # ════════════════════════════════════════════════════════════════════
  # SENATE DISTRICT (12 NPCs across 6 rooms)
  # ════════════════════════════════════════════════════════════════════

  # ── Galactic Senate Building - Exterior Plaza (3 NPCs) ──────────────

  - name: Senate Plaza Tour Guide Quill Eskerin
    room: Coruscant - Galactic Senate Building - Exterior Plaza
    species: Human
    description: >-
      A middle-aged human in the muted-blue tunic of the Senate
      Visitor Services office. He stands beside a holoplinth showing
      a slow rotation of the Senate dome. His shoes have the kind of
      wear that comes from standing on the same plaza for years; his
      voice has the kind of practiced cheer that comes from giving
      the same tour seven times a day.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D+1
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D+1
      skills:
        bargain: 2D+2
        bureaucracy: 4D
        languages: 3D+2
        persuasion: 3D
        cultures: 3D+2
      weapon: none
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Quill has been giving Senate tours for twelve years. He knows
        every architectural detail, every minor scandal that's now
        approved tour content, every Senator's home-system pronunciation.
        He believes in the Republic — not the war effort, particularly,
        but the institution. The war makes him tired in a way he doesn't
        share with tourists.
      knowledge:
      - "Senate dome was completed 952 BBY; floating pod system installed in the 'Republica Restoration' refit."
      - "1,024 senatorial pods in the main rotunda."
      - "Tours run every standard hour from oh-eight-hundred to seventeen-hundred."
      - "Public sessions are visible from the upper galleries; closed sessions are not."
      - "The Cad Bane hostage incident was three years ago; security has been tightened since."
      - "Chancellor Palpatine's emergency powers expanded recently. He doesn't comment on this to tourists."
      faction: republic
      dialogue_style: >-
        Practiced, warm, slightly mechanical. Falls into tour-script
        cadence when asked anything tourable. Drops the cadence when
        asked something personal, briefly.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Welcome to the Galactic Senate. Are you here for the public tour?'"
      - "'The next tour begins in a few minutes — please form a line at the second column.'"
      - "'No, I'm afraid the Senatorial pods aren't accessible to the public. The galleries are.'"
      - "*Quill checks his datapad. 'Three more minutes, folks.'*"
      - "'Yes, I do see the Cad Bane reference often. We don't do the hostage tour anymore.'"

  - name: Coruscant Security Officer Vera Maaz
    room: Coruscant - Galactic Senate Building - Exterior Plaza
    species: Human
    description: >-
      A Coruscant Security Force officer in the dark-blue uniform with
      the silver bar of senior rank. Her DH-17 is holstered; she stands
      in the relaxed-but-aware posture of someone who has worked
      Senate-plaza security long enough to know exactly which cues
      matter. Her gaze passes over you, marks you, and moves on.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 2D+1
        perception: 3D+2
        strength: 2D+2
        technical: 2D
      skills:
        blaster: 4D
        brawling: 3D+2
        dodge: 3D+2
        bureaucracy: 3D
        intimidation: 3D+1
        investigation: 3D+2
        search: 4D
        streetwise_coruscant: 3D
        tactics: 3D
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Career CSF. Watch officer for the Senate plaza — three years
        in the role, eight years on the force. Professional, dry,
        notices everything. Coordinates with the Coruscant Guard
        (clone garrison) for major events but views the clones as
        military rather than peers. Politically uncommitted; thinks
        most Senators are as bad as their staff says they are.
      knowledge:
      - "CSF jurisdiction: civilian crime, public-order, plaza security."
      - "Coruscant Guard handles military and capital-security matters; commanded by Commander Fox."
      - "Senate Building has multiple security checkpoints inside; she's the outside layer."
      - "The Cad Bane hostage incident happened on her shift, three years ago. She doesn't talk about it."
      - "Knows the regular tour-group patterns. Notices anyone who doesn't match them."
      faction: republic
      dialogue_style: >-
        Clipped, professional, slightly wry. Doesn't volunteer much.
        Will answer direct questions about jurisdiction or directions
        without ceremony.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'CSF Officer Maaz. Can I help you?'"
      - "*Maaz tilts her head almost imperceptibly to track you, then looks away.*"
      - "'Public tours form at the second column. The visitors' desk is inside, to the right.'"
      - "'No loitering on the plaza beyond the marked zones. Move along, please.'"
      - "'If it's a security matter, I'm your first stop. If it's anything else, the desk is inside.'"

  - name: Senate Aide Tessa Byrn
    room: Coruscant - Galactic Senate Building - Exterior Plaza
    species: Human
    description: >-
      A young woman in the simple gray robe of a senatorial aide,
      carrying a stack of datapads with the relaxed grip of someone
      who has been carrying datapads professionally for a couple of
      years. She is on the plaza because she had to step out and
      breathe. She doesn't want to talk to you, but she's polite.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D+2
      skills:
        bargain: 2D+1
        bureaucracy: 5D
        languages: 4D
        persuasion: 3D
        scholar_galactic_law: 4D+1
        willpower: 3D
      weapon: none
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 0
    ai_config:
      personality: >-
        Senatorial aide for a mid-rim senator (Senator Vellus of
        Berchest, Loyalist coalition). Two years on the job. Came
        to Coruscant for a career; is finding the career mostly
        consists of fetching, archiving, and being talked over.
        Recently overheard a closed-session vote that bothered her.
        Won't share what; shouldn't share what.
      knowledge:
      - "Aide to Senator Vellus of Berchest. Mid-rim, Loyalist."
      - "Senator's office is in the legislative tier, sub-suite 4471."
      - "Closed-session schedule is published a day ahead; today's agenda is on the tier-board."
      - "Has heard the rumor that the Delegation of 2000 is forming. Doesn't comment."
      - "Knows which lobbyists drop by the office regularly. Doesn't share names."
      faction: republic
      dialogue_style: >-
        Polite, brief, distracted. Sometimes finishes thoughts in
        her head and lets the spoken word trail off. Eyes flick
        toward the Senate building like she'd rather be back inside.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Sorry, I just stepped out for a minute. The visitors' desk is inside.'"
      - "*Tessa shifts the stack of datapads from one arm to the other. 'I should get back.'*"
      - "'Senator Vellus, yes. Berchest. He's in committee until twelve-hundred.'"
      - "'Lobbyists go through the side entrance. The plaza is for tourists.'"
      - "*She glances at the senate building, then at her chrono, then sighs.*"

  # ── Galactic Senate Building - Public Lobby (CT-2287 from Drop H is here; 0 NPCs added) ──

  # ── Chancellor's Avenue (1 NPC) ─────────────────────────────────────

  - name: Avenue Vendor Olo Kaspar
    room: Coruscant - Chancellor's Avenue
    species: Sullustan
    description: >-
      A Sullustan in the orange vest of a registered Avenue vendor,
      tending a small kiosk that sells caf, sweet rolls, and
      Republic-themed memorabilia. The kiosk has a permit displayed
      prominently; Olo has paid the steep Avenue fees for fifteen
      years and intends to pay them for fifteen more.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 2D
      skills:
        bargain: 4D+1
        languages: 3D+1
        persuasion: 3D+2
        streetwise_coruscant: 3D+2
        cultures: 3D
        gambling: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Career Avenue vendor — fifteen years on this stretch of
        pavement. Knows everyone who walks the Chancellor's Avenue
        on a normal day. Senators stop for caf; aides stop for caf;
        clone troopers passing through stop for caf and never quite
        finish it. Olo sells caf to all of them and charges all of
        them differently.
      knowledge:
      - "Senators who buy caf here regularly: about a dozen. Doesn't share names."
      - "Avenue traffic peaks at oh-eight-hundred and again at seventeen-hundred."
      - "Clone troopers walking the Avenue are usually Coruscant Guard; red markings."
      - "The Avenue's permit fees are absurd. He pays them anyway."
      - "Heard Senator Vellus complain about the war budget twice last week. Pretends he didn't."
      - "Hutt operatives are not welcome on the Avenue. He notices them and they notice him noticing."
      faction: independent
      dialogue_style: >-
        Sullustan-accented Basic — slight clicks, deliberate cadence.
        Friendly with paying customers; less so with browsers. Calls
        everyone "friend" but the warmth is graduated.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Caf, friend? Special blend, three credits. Plain caf, two.'"
      - "'Sweet roll? Made fresh this morning. Mostly.'"
      - "*Olo nods at a passing Senator, who does not nod back. He shrugs.*"
      - "'I have been on this corner fifteen years. I have seen everyone come and go. You? You are new.'"
      - "*He polishes a holocoaster bearing the Republic crest. Turnover on these is slower than caf.*"

  # ── Grand Reception Hall (2 NPCs) ───────────────────────────────────

  - name: Senator Lin Vellus of Berchest
    room: Coruscant - Grand Reception Hall
    species: Human
    description: >-
      A man in the formal robes of a Mid-Rim senator — deep blue with
      Berchest's silver coast trim. Mid-fifties, gray at the temples,
      careful of his posture. He stands near the reception's
      refreshment table without taking refreshment, surveying the
      room with the wary attention of someone who has been on the
      losing side of three votes this week and knows the next one
      may go the same way.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 4D
        mechanical: 1D+2
        perception: 3D+2
        strength: 2D
        technical: 2D
      skills:
        bargain: 4D
        bureaucracy: 5D+2
        command: 3D+2
        con: 3D+1
        languages: 4D
        persuasion: 5D
        scholar_galactic_law: 5D
        willpower: 4D
        cultures: 4D
      weapon: hold_out_blaster
      move: 10
      force_points: 2
      character_points: 7
      dark_side_points: 0
    ai_config:
      personality: >-
        Senator from Berchest, a mid-rim trade world. Loyalist
        coalition member; quietly skeptical of the Chancellor's
        recent emergency-powers expansions but not openly opposing
        them yet. Has a wife and two adult children back on Berchest
        whom he hasn't seen in eight standard months. Has
        sympathized — tentatively, in private — with what's being
        called the Delegation of 2000, the peace-faction senatorial
        coalition. Hasn't signed anything. Yet.
      knowledge:
      - "Berchest is a Mid-Rim trade world. Voted Loyalist at the war's start."
      - "Has served three full terms; in his fourth."
      - "His office is sub-suite 4471 in the legislative tier. Tessa Byrn is his aide."
      - "Voted against the latest emergency-powers expansion. Was outvoted comfortably."
      - "Has been approached about the Delegation of 2000. Has not signed. Yet."
      - "Knows the war is going badly. Doesn't say so publicly."
      - "Knew Senator Mina Bonteri before her death. Suspects Dooku had her killed."
      faction: republic
      dialogue_style: >-
        Measured, careful, senatorial. Listens longer than he speaks.
        When he speaks, he chooses words like he is paying for each
        one. Slight Mid-Rim accent — flatter vowels than Core Worlds.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Senator Vellus, of Berchest. And you are?'"
      - "*Vellus inclines his head briefly. 'A pleasure.' His tone says it isn't.*"
      - "'I'm afraid I have an obligation across the room. If you'll excuse me.'"
      - "'The Republic is many things. Resilient is one of them. I hope.'"
      - "*He glances toward the Loyalist seating area, then back at you. 'You're not from Berchest.'*"

  - name: Lobbyist Rovan Drel
    room: Coruscant - Grand Reception Hall
    species: Human
    description: >-
      A man in expensively-cut civilian formal-wear — not Senate
      robes, but adjacent. He holds a half-empty glass of Corellian
      brandy and is angling himself toward the senatorial seating
      area with the practiced casualness of a professional. His
      smile is calibrated.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D
        mechanical: 2D
        perception: 4D
        strength: 2D
        technical: 2D
      skills:
        bargain: 5D
        bureaucracy: 4D+2
        con: 5D
        gambling: 4D
        hide: 3D
        persuasion: 5D+1
        sneak: 3D
        streetwise_coruscant: 4D
        value: 4D+1
        languages: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 6
      dark_side_points: 1
    ai_config:
      personality: >-
        Lobbyist for the Outer Rim Mining Conglomerate. Smooth,
        professionally pleasant, transactionally moral. He doesn't
        love the war but he loves what the war does to mining-tariff
        policy, and his clients pay him to keep loving it. One Dark
        Side Point reflects that he's done some things at the
        Republic Judiciary Detention Center that he tries not to
        think about.
      knowledge:
      - "Lobbyist for the Outer Rim Mining Conglomerate."
      - "Has standing reservations at four restaurants near the Senate."
      - "Knows which Senators take meetings and which Senators take meetings discreetly."
      - "Has heard the Delegation of 2000 rumors. Has been hired to watch which Senators sign."
      - "Has never been to Berchest. Plans to never go to Berchest."
      faction: independent
      dialogue_style: >-
        Smooth, warm-on-the-surface, transactional underneath. Calls
        everyone by their full title on first contact. Asks questions
        that look like small talk and aren't.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Rovan Drel — Outer Rim Mining Conglomerate. And you are?'"
      - "*Drel raises his glass. 'To the Republic.' He drinks before you do.*"
      - "'A pleasure. If you'll forgive me — I see Senator Vellus, and we have business.'"
      - "'My clients have a great interest in fair governance. As does the Senator, I'm sure.'"
      - "*Drel's smile widens half a degree. The eyes don't change.*"

  # ── Legislative Borough (2 NPCs) ────────────────────────────────────

  - name: Senatorial Archive Clerk Pem Ohrn
    room: Coruscant - Legislative Borough
    species: Bothan
    description: >-
      A Bothan in the brown over-tunic of the Senate Archives staff,
      tail twitching with the constant low-key irritability of his
      species. He carries a stack of records crystals and walks like
      he is a long way behind on something. His fur is groomed but
      not vain.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 4D
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 3D+1
      skills:
        bureaucracy: 5D+2
        computer_programming_repair: 4D
        investigation: 3D+2
        languages: 4D+1
        scholar_galactic_law: 4D+2
        scholar_political_history: 5D
        sneak: 3D+2
        value: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 0
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Senate Archives clerk. Twenty-two years in the role. Sees
        every record that crosses the floor; remembers everything;
        shares almost nothing. Bothans inform; he doesn't. Has been
        approached by the Bothan SpyNet at intervals throughout his
        career and has politely declined every time. He likes his
        archive.
      knowledge:
      - "Senate Archives — twenty-two years. Knows the records by heart."
      - "Closed-session minutes are sealed for fifty standard years."
      - "Voting records are public; speeches are public; committee deliberations are not."
      - "Has the index for the Cad Bane hostage incident inquiry. Won't share without proper request."
      - "Knows which Senators have unusual archival activity. Won't share who."
      - "Bothan SpyNet has approached him three times. He doesn't work for them."
      faction: republic
      dialogue_style: >-
        Brisk, slightly impatient, precise. Bothan-accented Basic with
        a faint hiss on sibilants. Sentences end firmly.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "'You want the public-records desk. Two corridors back.'"
      - "*Ohrn shifts the stack of crystals. 'I'm rather busy.'*"
      - "'Closed-session minutes are not public. They will not become public for fifty years. Yes, you may ask again in fifty years.'"
      - "'I don't comment on Senators' research patterns. Good day.'"
      - "*His tail twitches once, sharply. 'Was there something else?'*"

  - name: Republic Naval Liaison Captain Mevus Tarn
    room: Coruscant - Legislative Borough
    species: Human
    description: >-
      A man in Republic Navy dress uniform — gray with red piping,
      captain's bars at the shoulder. He stands near a tactical
      display showing the current Outer Rim deployments, briefing a
      cluster of senatorial staffers in the practiced cadence of
      someone who briefs senatorial staffers a lot. He looks tired.
      Everyone in the Navy looks tired this year.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 3D+1
        mechanical: 3D+2
        perception: 3D+1
        strength: 2D+2
        technical: 2D+2
      skills:
        blaster: 4D
        brawling: 3D+2
        dodge: 3D+2
        bureaucracy: 4D
        capital_ship_piloting: 4D+2
        capital_ship_gunnery: 3D+1
        command: 4D+1
        sensors: 4D
        starship_tactics: 4D+2
        tactics: 4D
        scholar_military_history: 3D+2
      weapon: blaster_pistol
      move: 10
      force_points: 2
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Republic Navy captain on liaison rotation to the Senate.
        Career officer. Respects clones; considers the Jedi-General
        command structure mostly effective. The Senate briefings are
        the part of his job he finds most frustrating — Senators ask
        questions whose answers don't fit in the time they allow.
        Three years until his pension cycle.
      knowledge:
      - "Republic Navy. Liaison Officer rotation, Senate Briefing Detail."
      - "Briefs senatorial staffers on Outer Rim deployments three times a week."
      - "Has commanded a Venator (the Indomitable) in two campaigns; deployed currently to Senate duty."
      - "Knows which sectors are quiet, which are not. Won't share specifics in public."
      - "Heard rumors of a CIS push toward the Mid-Rim. Won't comment unless asked privately."
      - "Considers the war winnable but wishes the Senate would let the Navy fight it without micromanagement."
      faction: republic
      dialogue_style: >-
        Crisp, professional, slightly clipped. The "I would rather be
        on a bridge than in a briefing" tone is audible if you listen
        for it. Says "Senator" the way clones say "sir" — formally,
        without warmth.
      hostile: false
      combat_behavior: tactical
      fallback_lines:
      - "'Captain Mevus Tarn, Republic Navy. The briefing's wrapping up — do you have a question?'"
      - "*Tarn's tactical display rotates once. He lets it.*"
      - "'I'm not at liberty to discuss specific deployments in this venue.'"
      - "'The Outer Rim sieges are progressing. That is what I'm authorized to say.'"
      - "*He glances at his chrono, then at the door. 'My next briefing is in eleven minutes. Was there something else?'*"

  # ── Senatorial Tower District (2 NPCs) ──────────────────────────────

  - name: 500 Republica Concierge Mirah Soyel
    room: Coruscant - Senatorial Tower District
    species: Human
    description: >-
      A woman in the cream-and-gold uniform of the 500 Republica
      residential complex, standing behind a polished stone reception
      counter. She is the gatekeeper for the most exclusive senatorial
      address on Coruscant — Senators Padmé Amidala, Bail Organa, Mon
      Mothma, and many others reside here — and her composure is
      flawless. She has been doing this job for nine years. She knows
      everyone's preferred name and how to say no without saying no.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+1
        mechanical: 2D
        perception: 4D
        strength: 2D
        technical: 2D+1
      skills:
        bargain: 3D+2
        bureaucracy: 4D+2
        con: 3D+1
        languages: 4D
        persuasion: 4D+1
        cultures: 3D+2
        willpower: 3D+2
      weapon: none
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Concierge for 500 Republica. Nine years in role; flawless
        institutional memory; would rather lose her position than
        confirm the presence of any resident to anyone unauthorized.
        Polite to a fault — the politeness is the iron. Knows which
        senators are home, which are off-world, who is meeting with
        whom; doesn't share any of it.
      knowledge:
      - "500 Republica Concierge. Nine-year veteran."
      - "Will not confirm any resident's presence, schedule, or visitor list."
      - "The building has two public-access tiers (lobby + restaurant); the rest is keyed."
      - "Has dealt with paparazzi, lobbyists, paparazzi pretending to be lobbyists, and lobbyists pretending to be paparazzi."
      - "The Cad Bane incident did not involve 500 Republica. She mentions this preemptively."
      faction: independent
      dialogue_style: >-
        Warm, slow, perfectly composed. Soft Core Worlds cadence.
        Every sentence sounds like a welcome and ends like a closed
        door.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Welcome to 500 Republica. How may I direct you?'"
      - "'I'm afraid I'm unable to confirm the presence of any resident. Building policy.'"
      - "*Mirah's smile is steady. 'Perhaps you'd like to leave a message? I'd be happy to ensure it's received.'*"
      - "'The public restaurant is to your left. Reservations are recommended.'"
      - "'No, ma'am, I cannot. No.'"

  - name: Senator Iolanthe Kress of Naboo's Lake Country
    room: Coruscant - Senatorial Tower District
    species: Human
    description: >-
      A senator in the deep-green and cream of Naboo formal robes,
      standing near her air-taxi with her aide. She's not Padmé
      Amidala — she's the Lake Country regional representative, a
      junior Naboo position created during the Clone Wars to handle
      the additional administrative burden the war placed on the
      planet's primary delegation. She is younger than her peers and
      more openly idealistic.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D+1
        strength: 2D
        technical: 2D
      skills:
        bargain: 3D
        bureaucracy: 4D
        command: 3D+1
        languages: 3D+2
        persuasion: 4D+2
        scholar_galactic_law: 3D+2
        willpower: 4D
        cultures: 3D+1
      weapon: hold_out_blaster
      move: 10
      force_points: 3
      character_points: 6
      dark_side_points: 0
    ai_config:
      personality: >-
        Junior Naboo senator. Twenty-eight years old. Has signed the
        Delegation of 2000 — the canonical mid-CW peace-faction
        senatorial coalition that publicly opposed Chancellor
        Palpatine's emergency powers. She is openly idealistic in a
        way her older peers find naive and her younger constituents
        find refreshing. She believes the war is being prolonged
        deliberately. She has not yet figured out by whom.
      knowledge:
      - "Junior Senator from Naboo's Lake Country region."
      - "Signed the Delegation of 2000. Aware that signing made her enemies."
      - "Twenty-eight standard years old. Was a regional administrator before the war."
      - "Naboo's primary senator (Padmé Amidala) is canonical-grade out-of-bounds for casual conversation."
      - "Believes the war has gone on too long. Has voted against the last four emergency-powers expansions."
      - "Has been approached by Republic Intelligence about her associations. Has refused to give a list."
      faction: republic
      dialogue_style: >-
        Bright, articulate, slightly formal in the way young senators
        sometimes are when they're trying to sound senior. Naboo
        accent — soft, measured, slightly sing-song.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Senator Iolanthe Kress, Naboo. A pleasure.'"
      - "'Yes, I signed the Delegation. It's not a secret.'"
      - "*Kress glances at her aide, then back at you. 'You have one minute. My next meeting is across the district.'*"
      - "'The Republic was not built to be a war machine. It was built to be a republic.'"
      - "*Her smile is genuine and tired in equal measure.*"

  # ── Monument Plaza (2 NPCs) ─────────────────────────────────────────

  - name: Memorial Vigil Keeper Aanu Thace
    room: Coruscant - Monument Plaza
    species: Human
    description: >-
      An older woman in plain civilian clothing, sitting on a bench
      at the edge of the Monument Plaza near a small cluster of
      candles and pictographs arranged around the base of one of the
      Founders' statues. She is not a tourist; she is a keeper of one
      of the unofficial war memorials that have appeared in the plaza
      over the past three years. She tends the candles. Her son was
      killed at Christophsis.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 2D
      skills:
        bargain: 2D+1
        languages: 2D+2
        persuasion: 3D
        scholar_recent_history: 3D+1
        willpower: 4D
      weapon: none
      move: 10
      force_points: 2
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Mother of a clone-trooper-adjacent volunteer killed at
        Christophsis eighteen standard months ago. Tends an
        unofficial memorial in the plaza. The CSF leaves her alone
        because she is harmless and the official complaints stopped
        after the third one. She isn't bitter; she is exhausted.
        The war has gone on too long.
      knowledge:
      - "Son: Lt. Kaffir Thace. Republic auxiliary; killed at Christophsis."
      - "Has tended this memorial for eighteen months."
      - "Other parents come by; she remembers their sons too."
      - "The CSF used to ask her to move; they stopped."
      - "She has not spoken to her own surviving children since the funeral."
      - "Doesn't trust politicians. Trusts the candles."
      faction: independent
      dialogue_style: >-
        Quiet, slow, distant. Doesn't make eye contact for long. Will
        speak about her son if asked, briefly, then not again.
      hostile: false
      combat_behavior: passive
      fallback_lines:
      - "*Aanu adjusts a candle. The flame steadies.*"
      - "'My son. Christophsis. Eighteen months.'"
      - "*She looks at you for a moment, then back at the candles. She does not speak.*"
      - "'You can leave a token, if you want. The plaza doesn't mind anymore.'"
      - "'The Senate doesn't see the candles. That's fine. The candles aren't for the Senate.'"

  - name: Reporter Kerl Vesh
    room: Coruscant - Monument Plaza
    species: Human
    description: >-
      A man in a wrinkled jacket, holocam slung across his shoulder
      with the casual carelessness of someone who has been doing this
      a long time. He's leaning against a column, ostensibly reading
      his datapad, actually watching the senators who come through
      the plaza on their way between the Senate and 500 Republica.
      A press credential dangles from his lapel.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D
        mechanical: 2D+2
        perception: 4D
        strength: 2D
        technical: 3D
      skills:
        bargain: 3D
        bureaucracy: 3D
        con: 3D+1
        hide: 3D+2
        investigation: 4D+2
        languages: 3D
        persuasion: 3D+2
        sneak: 3D
        streetwise_coruscant: 4D+1
        scholar_political_history: 3D+2
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Senate-beat reporter for HoloNet News, Coruscant bureau.
        Twelve years on the job. Cynical in the practiced way of
        political reporters; less cynical underneath than he lets
        on. Knows which Senators leak, which lobby him, which avoid
        him. He has filed three stories about the Delegation of
        2000 that did not run; the editorial decision concerns him
        and he hasn't decided what to do about it.
      knowledge:
      - "HoloNet News, Coruscant Senate beat. Twelve-year veteran."
      - "Knows which senators take meetings with which lobbyists."
      - "Filed three Delegation-of-2000 stories that didn't run. Editorial said 'wait for confirmation.'"
      - "Has a source inside CSF who leaks plaza-incident reports."
      - "Aanu Thace has been here for eighteen months; he wrote a profile that ran."
      - "Heard rumors that the Chancellor's office is pressuring HoloNet on coverage."
      faction: independent
      dialogue_style: >-
        Friendly-but-probing. Asks questions that sound like small
        talk and aren't. Will share what he's reporting if you share
        first; will share nothing if you don't.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Kerl Vesh, HoloNet. You here for the plaza, or here for someone in particular?'"
      - "*Vesh's holocam shifts slightly. He hasn't activated it.*"
      - "'Off the record, you can tell me anything. On the record, anything you want printed.'"
      - "'The Delegation? Yeah, I've been working on a piece. Editor says wait. I'm waiting.'"
      - "*He glances at Aanu Thace's memorial, then back at his datapad. 'Eighteen months. Plaza doesn't make her move anymore.'*"

  # ════════════════════════════════════════════════════════════════════
  # JEDI TEMPLE (13 NPCs across 9 of the 11 Temple rooms)
  # ════════════════════════════════════════════════════════════════════

  # ── Jedi Temple - Main Gate (1 NPC) ─────────────────────────────────

  - name: Temple Guard
    room: Jedi Temple - Main Gate
    species: Human
    description: >-
      A Temple Guard in the unadorned brown robes and gold-and-crimson
      mask of the Order's anonymous internal security corps. The mask
      conceals every feature; the robes are belted with a simple
      leather strap. The guard's lightsaber hilt is double-bladed,
      yellow-bladed in canon; sheathed at the belt. The guard does
      not move except when necessary. The guard does not speak
      unless spoken to.
    char_sheet:
      attributes:
        dexterity: 4D
        knowledge: 3D
        mechanical: 2D+1
        perception: 4D+1
        strength: 3D
        technical: 2D+2
      skills:
        brawling: 4D
        dodge: 5D
        lightsaber: 5D+2
        melee_combat: 5D
        intimidation: 4D
        search: 4D
        willpower: 4D+2
        control: 3D
        sense: 4D
      weapon: lightsaber
      move: 10
      force_points: 2
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Temple Guard. The Order's anonymous internal security corps.
        Member identity intentionally suppressed by the masked-and-
        robed convention; even the Guard's sense of self is
        deliberately submerged into the Guard's role. Force-sensitive
        Knight rank or above. Will not engage in personal conversation.
        Will defend the Temple's integrity unconditionally. Speaks
        only to challenge, direct, or warn.
      knowledge:
      - "Temple Guard. The Order's anonymous internal security corps."
      - "Identity is suppressed by the role. The Guard does not give a name."
      - "The Temple is open to visitors with appropriate business; closed to the curious."
      - "Council chamber, archives, and crèche levels are restricted to Order members and approved visitors."
      - "The Guard will summon a healer or a Knight if circumstances require."
      faction: jedi_order
      dialogue_style: >-
        Voice altered by the mask — lower, unaccented, deliberately
        non-individual. Speaks in short sentences. Does not ornament.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "'State your business at the Temple.'"
      - "*The Guard does not move. The mask faces you fully.*"
      - "'Visitors with Order business may proceed to the Entrance Hall. Others may not.'"
      - "'Council chamber, archives, crèche: restricted. Do not attempt approach without clearance.'"
      - "*The Guard inclines its head once — a gesture too economical to call a bow — and resumes its watch.*"

  # ── Jedi Temple - Entrance Hall (1 NPC) ─────────────────────────────

  - name: Knight Halen Voss
    room: Jedi Temple - Entrance Hall
    species: Human
    description: >-
      A young man in the simple dark-brown robes of a Jedi Knight,
      newly elevated from Padawan a year ago — his Padawan braid is
      gone but the place where it was is still a noticeably shorter
      length of hair. His lightsaber is at his hip; his stance is
      relaxed. He's stationed in the entrance hall as the day's
      duty officer. He's been knighted long enough that the role
      doesn't surprise him anymore but recently enough that he still
      enjoys it.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 3D
        mechanical: 2D+1
        perception: 3D+2
        strength: 3D
        technical: 2D+1
      skills:
        brawling: 3D+2
        dodge: 4D+2
        lightsaber: 5D
        melee_combat: 4D
        languages: 3D+1
        persuasion: 3D+1
        willpower: 3D+2
        scholar_jedi_lore: 3D+2
        control: 4D
        sense: 4D+1
        alter: 3D+2
      weapon: lightsaber
      move: 10
      force_points: 3
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        Knighted one year ago. Twenty-five standard years old. Was a
        Padawan during the early war — his Master, Jocan Reel, was
        killed at the Battle of Jabiim. Halen mostly serves on the
        Outer Rim now and rotates back to Coruscant for duty cycles
        when the war permits. Today is a duty cycle. He is friendly
        with visitors who have legitimate Order business and patient
        with visitors who don't.
      knowledge:
      - "Knight, one year. Master was Jocan Reel, killed at Jabiim."
      - "Twenty-five standard years old. Currently on a Coruscant duty rotation."
      - "Most active deployments are on the Outer Rim. Has fought alongside the 41st Elite and the 332nd."
      - "Knows the Temple intimately — grew up here from age four."
      - "Will direct legitimate visitors; will gently turn away the curious."
      - "Heard from the Council that the war's tide is uncertain. Doesn't share details with non-Order."
      faction: jedi_order
      dialogue_style: >-
        Warm, articulate, faintly tired. Has the slight Coruscant
        intonation of someone who grew up in the Temple. Calls people
        "friend" the way Jedi do — meaning it without weight.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "'Welcome to the Temple. May I help you?'"
      - "'The Council Antechamber is upstairs and to the right; the Archives are this way.'"
      - "*Voss inclines his head. 'I'm Knight Voss. May I direct you?'*"
      - "'No, the Council isn't taking visitors today. The war keeps them busy.'"
      - "'May the Force be with you. Truly — these are difficult days.'"

  # ── Jedi Temple - Training Hall (2 NPCs) ────────────────────────────

  - name: Battle Master Jeven Rell
    room: Jedi Temple - Training Hall
    species: Cerean
    description: >-
      A Cerean — tall, elongated cranium, dark hair pulled back in a
      simple braid — in the practical brown training tunic of a
      Jedi Battle Master. He holds a training saber loosely; one of
      the practice dummies behind him bears fresh score marks. He
      teaches lightsaber forms and combat philosophy; he has done
      this for thirty-eight years.
    char_sheet:
      attributes:
        dexterity: 4D+1
        knowledge: 3D+2
        mechanical: 2D+1
        perception: 4D
        strength: 3D+1
        technical: 2D+2
      skills:
        brawling: 4D+1
        dodge: 5D+2
        lightsaber: 7D
        melee_combat: 5D+2
        scholar_jedi_lore: 5D
        scholar_lightsaber_combat: 6D
        teach: 5D
        tactics: 4D
        willpower: 5D
        control: 5D+1
        sense: 5D
        alter: 4D+2
      weapon: lightsaber
      move: 10
      force_points: 4
      character_points: 8
      dark_side_points: 0
    ai_config:
      personality: >-
        Battle Master. Cerean — slow, considered, double-brained;
        speaks at the cadence of someone who never has to hurry. Has
        taught the seven classical lightsaber forms for thirty-eight
        standard years. Teaches Form V (Djem So) reluctantly, as it
        leans toward aggression, but teaches it well, because the
        war demands it. Considers himself a teacher first and a
        warrior second; the Council has not asked him to deploy and
        will not. He suspects the Council understands what he would
        and would not do at the front.
      knowledge:
      - "Battle Master of the Temple, thirty-eight years."
      - "Teaches the seven classical lightsaber forms (I-VII)."
      - "Teaches Form V reluctantly; thinks the war is shifting too many Padawans toward Djem So."
      - "Has trained Padawans who later became Knights, then Masters, then died."
      - "Has not deployed to the front. The Council has not asked him to."
      - "Considers Anakin Skywalker a precocious lightsaber duelist; concerned about emotional volatility."
      faction: jedi_order
      dialogue_style: >-
        Slow, measured, Cerean — every word weighed. Sometimes pauses
        mid-sentence and continues several seconds later, as if the
        previous half-sentence is still being considered.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "'A visitor. The hall is open. Mind the practice forms.'"
      - "*Rell rests the training saber across his shoulder.*"
      - "'Seven forms. Each has its purpose. The war rewards Djem So. That is not the same as Djem So being correct.'"
      - "'I do not teach off-the-cuff. If you wish a lesson, the Order's pedagogy office can arrange it.'"
      - "*The Battle Master watches a Padawan complete a kata, then nods once. The Padawan bows and resets.*"

  - name: Padawan Aelia Korres
    room: Jedi Temple - Training Hall
    species: Mirialan
    description: >-
      A Mirialan padawan in her mid-teens — green-skinned with the
      diamond facial tattoos that mark her people's record of
      personal achievements. Hers are sparse — one near each eye —
      because she is young. Her Padawan braid is long; her training
      saber is in a guard position; she is in the middle of a kata
      and has not noticed you yet.
    char_sheet:
      attributes:
        dexterity: 3D+2
        knowledge: 2D+2
        mechanical: 2D
        perception: 3D
        strength: 2D+2
        technical: 2D+1
      skills:
        brawling: 3D
        dodge: 4D
        lightsaber: 4D
        melee_combat: 3D+2
        languages: 2D+2
        scholar_jedi_lore: 2D+2
        willpower: 3D
        control: 3D+2
        sense: 3D+1
        alter: 2D+2
      weapon: lightsaber
      move: 10
      force_points: 2
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Padawan, fourteen standard years old. Apprenticed to Master
        Tahnen Ree — a Twi'lek Jedi currently deployed to the Outer
        Rim. Aelia has been on the Coruscant duty rotation for four
        weeks while her Master is in the field; she expects he'll
        return for her training continuation in another few weeks
        but war makes timing uncertain. She is bright, focused,
        and uncomfortably aware that her cohort of Padawans has
        already lost two members to the war.
      knowledge:
      - "Padawan, fourteen years old. Apprenticed to Master Tahnen Ree (Twi'lek)."
      - "Master is deployed to the Outer Rim. Last comm update was a week ago. He is alive."
      - "Cohort of seven Padawans started at the same time; two have died in the war. Aelia is not allowed to dwell."
      - "Studies under Battle Master Rell when in the Temple."
      - "Has read the Bodo Baas Holocron twice. Did not understand most of it the first time."
      - "Has visited Mirial once, at age six. Doesn't remember it well."
      faction: jedi_order
      dialogue_style: >-
        Polite, focused, slightly formal — Padawan-formal, the cadence
        of someone who is being trained to choose words carefully.
        Mirialan accent — soft consonants. Bows easily.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "*Aelia completes her kata, deactivates the training saber, and bows. 'Forgive me. I did not see you.'*"
      - "'I am Padawan Korres. Apprenticed to Master Ree.'"
      - "'Master Ree is on deployment. I am training here in the meantime.'"
      - "*She frowns, briefly. 'May the Force be with you, friend.'*"
      - "'The Battle Master says I should not speak to visitors during my forms practice. Forgive me — I should resume.'"

  # ── Jedi Temple - Archives (2 NPCs) ─────────────────────────────────

  - name: Archive Master Loni Tavar
    room: Jedi Temple - Archives
    species: Human
    description: >-
      A woman in the dark-blue robes of the Archive staff — distinct
      from the brown of field Jedi by tradition — standing between
      two banks of holocron shelves. She is in her sixties; her hair
      is white; her eyes are sharp behind reading lenses. The Archive
      Master is canonically Madame Jocasta Nu; this is not Jocasta.
      Tavar is the Deputy Archive Master, junior to Jocasta but
      senior in administrative authority while Jocasta is in
      consultation with the Council.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 5D
        mechanical: 2D+1
        perception: 4D
        strength: 2D
        technical: 3D+2
      skills:
        bureaucracy: 4D+2
        computer_programming_repair: 4D+1
        investigation: 4D
        languages: 5D+2
        scholar_galactic_history: 5D+2
        scholar_jedi_lore: 5D+2
        scholar_force_history: 5D
        willpower: 4D+1
        control: 4D
        sense: 4D+1
        alter: 3D+1
      weapon: hold_out_blaster
      move: 9
      force_points: 3
      character_points: 7
      dark_side_points: 0
    ai_config:
      personality: >-
        Deputy Archive Master. Forty-two years in the Archives. Has
        forgotten more than most Jedi will ever learn. Considers the
        Archives the Order's true memory and treats every holocron
        and every text as a sacred trust. Mildly impatient with
        visitors who don't know what they're looking for; deeply
        patient with visitors who do. Madame Jocasta Nu is her
        senior; Tavar acts in her place during Council consultations.
      knowledge:
      - "Deputy Archive Master, forty-two years."
      - "Reports to Madame Jocasta Nu (canonical-grade reference; Tavar will not arrange a meeting casually)."
      - "Archive Special Collections include the Bodo Baas Holocron, the Tedryn Holocron, and the Great Holocron."
      - "Recent visitor activity: heavier than usual on Sith-related material. Concerns her quietly."
      - "Knows the precise filing system for every era of Jedi Council records."
      - "Considers most contemporary scholarship superficial."
      faction: jedi_order
      dialogue_style: >-
        Brisk, precise, mildly authoritative. Speaks like she is
        archiving every conversation. Has a Coruscant academic
        accent — sharp consonants, deliberate enunciation.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "'The Archives are open to visitors with appropriate clearance. Please state your purpose.'"
      - "*Tavar adjusts her reading lenses. 'You are looking for something specific, I assume.'*"
      - "'The Special Collections require Council approval. Public stacks are this way.'"
      - "'No, I will not retrieve a holocron for casual examination. Yes, you may ask again with proper authorization.'"
      - "'If it is not in the Archive, perhaps it never existed. Most knowledge is here.'"

  - name: Padawan Researcher Brek Yann
    room: Jedi Temple - Archives
    species: Human
    description: >-
      A young human Padawan — perhaps eighteen — bent over a reading
      console with three holocron projections active in front of him.
      His Padawan braid is half-undone; his robes are slightly
      rumpled; he has been here a long time today. He doesn't notice
      you at first.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D
        strength: 2D+1
        technical: 3D
      skills:
        brawling: 3D
        dodge: 3D+1
        lightsaber: 3D+2
        bureaucracy: 3D
        computer_programming_repair: 3D+2
        investigation: 4D
        languages: 4D
        scholar_jedi_lore: 4D+2
        scholar_galactic_history: 3D+2
        willpower: 3D
        control: 3D
        sense: 3D+1
        alter: 2D+2
      weapon: lightsaber
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Padawan, eighteen years old. Apprenticed to Master Iridia
        Kell, who is currently in deep meditation in the Meditation
        Garden upstairs. Brek is the kind of Padawan who finds
        battle frustrating and the Archives restful; he has spent
        most of his free time over the last six months working on
        a personal project — a comparative study of the Bodo Baas
        Holocron versus the Tedryn Holocron, which he probably
        should not be doing without express Archive Master approval.
        He is friendly to visitors who don't ask too many questions
        about what he's reading.
      knowledge:
      - "Padawan, eighteen years old. Apprenticed to Master Iridia Kell."
      - "Master is in meditation upstairs; not to be disturbed."
      - "Currently studying a comparison of the Bodo Baas and Tedryn Holocrons. Possibly without authorization."
      - "Knows the Archive's public-stack layout intimately."
      - "Knows where the snack alcove is in the staff break room. Will not share with non-Order."
      - "Has heard the Cad Bane Senate raid story; was twelve when it happened."
      faction: jedi_order
      dialogue_style: >-
        Quiet, slightly distracted, friendly when engaged. Forgets to
        turn off projections when he speaks to people; sometimes
        finishes thoughts back at the console mid-conversation.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "*Brek looks up from the console. The holocron projections flicker. 'Oh. Hello.'*"
      - "'I'm researching. Padawan project. Master Tavar approved it.' *Possibly not entirely true.*"
      - "'The public stacks are over there. The Bodo Baas Holocron is restricted.'"
      - "*He glances at the projections, then back at you. 'Sorry — I was in the middle of something.'*"
      - "'May the Force be with you. I should get back to this.'"

  # ── Jedi Temple - High Council Chamber (1 NPC) ──────────────────────
  # Per Q1 (no canonical Council members). Council is empty in canon
  # during war — they're at the front. NPC here is administrative.

  - name: Council Recording Clerk Ven Mira
    room: Jedi Temple - High Council Chamber
    species: Human
    description: >-
      A young woman in dark-blue Archive-style robes — not a Jedi, but
      Order-affiliated; the Recording Clerk role is held by
      non-Force-sensitive Temple staff. She sits at a small console
      at the chamber's edge, taking down minutes for Council sessions
      that aren't happening today because the Council members are
      mostly off-world. She reviews previous-week recordings during
      the empty-chamber hours.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D
        strength: 2D
        technical: 3D+1
      skills:
        bureaucracy: 4D+1
        computer_programming_repair: 4D
        languages: 4D
        scholar_jedi_lore: 3D
        willpower: 3D
      weapon: none
      move: 10
      force_points: 1
      character_points: 3
      dark_side_points: 0
    ai_config:
      personality: >-
        Recording Clerk for the High Council. Three years in role.
        Not Force-sensitive — the position is held by non-Order
        Temple staff to maintain neutrality. Polite, precise, deeply
        bound by confidentiality protocols. The Council is mostly
        absent during the war; the empty chamber is her workspace
        for transcription and review.
      knowledge:
      - "Recording Clerk for the High Council. Three years in role."
      - "Not Force-sensitive. Non-Order Temple staff."
      - "Council members are mostly off-world during the war."
      - "Recordings are protocol-bound; she will not discuss content with anyone outside the Order."
      - "The chamber is technically not closed to visitors but no visitor has cause to be here."
      - "Knows which Council members are on Coruscant on which days; will not share."
      faction: jedi_order
      dialogue_style: >-
        Quiet, careful, precisely polite. Speaks like every word might
        be transcribed.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'This chamber is not open to visitors. May I direct you?'"
      - "*Ven minimizes a recording playback as you enter. The chamber goes silent.*"
      - "'I'm afraid I can't discuss Council activity. I can take a message for the Order's administrative office.'"
      - "'The Council is not in session today. They are mostly in the field.'"
      - "*She looks toward the chamber's center seat — Master Yoda's, by tradition — and away.*"

  # ── Jedi Temple - Meditation Garden (1 NPC) ─────────────────────────

  - name: Master Iridia Kell
    room: Jedi Temple - Meditation Garden
    species: Human
    description: >-
      An older woman — perhaps sixty — in plain dark robes, seated
      cross-legged on a stone in the garden's quiet pool area. Her
      eyes are closed; her breathing is deep and slow. Her lightsaber
      rests beside her on the stone. She is canonically not at the
      front; the Council has assigned her to inward-meditative work
      while younger Jedi handle the war. She returns to the front
      next month.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 4D+2
        mechanical: 2D
        perception: 4D+2
        strength: 2D+1
        technical: 2D+1
      skills:
        brawling: 3D
        dodge: 4D
        lightsaber: 5D+2
        melee_combat: 4D+1
        scholar_jedi_lore: 5D
        scholar_force_history: 4D+2
        willpower: 5D+2
        control: 5D+2
        sense: 6D
        alter: 4D+2
      weapon: lightsaber
      move: 10
      force_points: 5
      character_points: 8
      dark_side_points: 0
    ai_config:
      personality: >-
        Master, sixty standard years old. Was a Knight during the
        Stark Hyperspace War; was a Master during the Battle of
        Naboo; has seen too much war. The Council assigned her to a
        Coruscant meditative rotation when her field reports began
        to suggest she was approaching exhaustion of spirit. She has
        been on this rotation for five months; she returns to the
        front next month. She is the Master of Padawan Brek Yann
        (whom she generally lets do as he wants, within reason). She
        is the kind of Master younger Jedi seek out for difficult
        questions because she answers honestly.
      knowledge:
      - "Master, sixty years old. Was a Knight during the Stark War."
      - "Currently on a Coruscant meditative rotation; returns to the front next month."
      - "Padawan: Brek Yann. Whereabouts: probably in the Archives, again."
      - "Has trained three previous Padawans. One is now a Master; two are dead."
      - "Considers the war to be doing something to the Order that the Order has not yet named."
      - "Will speak with respectful visitors; will not perform feats; meditation is not a show."
      faction: jedi_order
      dialogue_style: >-
        Slow, deeply considered, quiet. Opens her eyes briefly when
        addressed; closes them again when not. Speaks in fragments
        when in deep meditation, fuller sentences when surfaced.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "*Master Kell opens her eyes. Her gaze is calm and deep. 'You are welcome here. Be quiet, if you would.'*"
      - "'The garden listens. Sometimes it speaks back, in its way.'"
      - "*She closes her eyes. Her presence settles.*"
      - "'My Padawan is in the Archives. He should be in the gardens.'"
      - "'The war will end. We do not know how. We meditate to receive that knowledge when it comes.'"

  # ── Jedi Temple - Medical Bay (1 NPC) ───────────────────────────────

  - name: Healer Master Sevan Lir
    room: Jedi Temple - Medical Bay
    species: Mon Calamari
    description: >-
      A Mon Calamari in the dark-green robes of a Jedi Healer,
      standing at a small bacta tank that contains a Padawan with
      a recent vibroblade wound. The Padawan is sleeping; the
      Healer's hands are not on the tank but he is reaching, in the
      Force, into the patient. Both his eyes track independently —
      one on the patient, one on you when you enter.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 4D
        mechanical: 2D+1
        perception: 4D
        strength: 2D+2
        technical: 4D+1
      skills:
        brawling: 3D
        dodge: 4D
        lightsaber: 4D
        first_aid: 6D
        medicine: 5D+2
        scholar_jedi_lore: 4D
        scholar_force_healing: 5D+2
        willpower: 5D
        control: 5D+2
        sense: 5D
        alter: 5D+1
      weapon: lightsaber
      move: 10
      force_points: 4
      character_points: 7
      dark_side_points: 0
    ai_config:
      personality: >-
        Master Healer. Has been the Temple's senior healer for
        twelve standard years; his predecessor retired to Mon Cala
        for a quieter posting. The war has been the busiest period
        of his career. He treats Padawans, Knights, occasional
        Senate-staff casualties, and (rarely) Coruscant Guard
        clones who have been brought to the Temple by Jedi who
        consider their command's official channels too slow. He
        practices Force-healing in the Bodo Baas Holocron tradition.
      knowledge:
      - "Master Healer, twelve years senior. Specializes in Force-healing."
      - "Treats Padawan training injuries (frequent), Knight battle wounds (frequent), Senate-staff casualties (rare)."
      - "Has occasionally treated clone troopers brought by their Jedi General. The arrangement is informal."
      - "Knows every Padawan in the Temple by name."
      - "Has lost three patients in the past year. Carries each one. Mon Calamari grieve slowly."
      - "Considers Force-healing limited; bacta does most of the work; the Force closes wounds the bacta cannot."
      faction: jedi_order
      dialogue_style: >-
        Slow, gravelly, deeply patient. Mon Calamari speech rhythms —
        deliberate, with pauses while one eye assesses something the
        other is not addressing. Calls people "young one" regardless
        of age.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
      - "'Welcome, young one. Are you hurt?'"
      - "*Master Lir's left eye remains on the bacta tank; his right turns to you.*"
      - "'I am attending. Please be brief unless you bleed.'"
      - "'No, I cannot heal a soul-wound with bacta. The Force is more honest than the chemicals.'"
      - "*He inclines his head, returning his full attention to the patient. The tank's lights pulse once in time with the Padawan's heartbeat.*"

  # ── Jedi Temple - Hangar Bay (1 NPC) ────────────────────────────────
  # The Negotiator's Hand and Mendicant from CW.SHIPS are docked here.

  - name: Hangar Tech Olu Karn
    room: Jedi Temple - Hangar Bay
    species: Sullustan
    description: >-
      A Sullustan in coveralls — orange-banded for the Temple's
      hangar staff — kneeling beside the Mendicant's hyperdrive ring
      with a hydrospanner in hand. He is humming under his breath,
      a Sullustan work-song, and has been working on the same Eta-2
      Actis interceptor for three days because Master Kell was
      gentle with it but not gentle enough. He is Order-affiliated
      civilian staff, not a Jedi.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D+2
        mechanical: 4D+2
        perception: 3D
        strength: 2D+1
        technical: 5D
      skills:
        astrogation: 3D+2
        repulsorlift_operation: 3D+2
        starfighter_piloting: 3D+1
        starship_repair: 5D+2
        starship_gunnery: 3D
        space_transports: 4D
        languages: 3D
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Hangar tech, six years at the Temple. Sullustan from
        Sullust — came to Coruscant to apprentice with the Republic
        Navy and ended up in the Temple's hangar instead, which he
        prefers because the Jedi are easier to work with than Naval
        commanders. Knows every ship in the bay intimately. Talks to
        the ships when he's working on them, in Sullustan; the
        ships, of course, do not respond.
      knowledge:
      - "Hangar tech, six years. Order-affiliated civilian; not a Jedi."
      - "Currently servicing the Mendicant (Eta-2 Actis); also responsible for the Negotiator's Hand (Consular cruiser)."
      - "Knows which Jedi pilot which ships and how rough they are on them."
      - "Master Kell is gentle with her ship; Knight Voss is rougher than he should be."
      - "Has met Anakin Skywalker once. The encounter involved a hyperdrive complaint and Sullustan profanity."
      - "Sullust is currently still neutral but leaning Republic."
      faction: jedi_order
      dialogue_style: >-
        Sullustan-accented Basic — clicks and a slightly nasal
        cadence. Friendly with anyone who doesn't try to touch the
        ships. Talks about ships the way other people talk about
        children.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Hangar tech, friend. The bay's open if you have ship business; closed if you don't.'"
      - "*Olu taps the hydrospanner against the Mendicant's hull. 'Three days. She'll fly tomorrow.'*"
      - "'Don't touch the ships. The Knights notice.'"
      - "'The Eta-2 is unforgiving. Kell flies her gentle. Voss should learn from Kell.'"
      - "*He hums a Sullustan work-song. The Mendicant does not hum back.*"

  # ── Jedi Temple - Commissary (2 NPCs) ───────────────────────────────

  - name: Quartermaster Halis Bren
    room: Jedi Temple - Commissary
    species: Twi'lek
    description: >-
      A male Twi'lek in the dark-blue robes of Order-administrative
      staff, standing behind a long counter with a datapad in hand.
      The commissary is busy at this hour — Padawans collecting
      practice gear, Knights drawing field rations for upcoming
      deployments, the occasional Master replacing worn robes. Halis
      runs the counter like a dock-master, brisk and unsentimental.
    char_sheet:
      attributes:
        dexterity: 2D+2
        knowledge: 3D
        mechanical: 2D
        perception: 3D+1
        strength: 2D+2
        technical: 2D+2
      skills:
        bargain: 3D+2
        bureaucracy: 4D+1
        languages: 3D+1
        persuasion: 2D+2
        value: 4D
      weapon: hold_out_blaster
      move: 10
      force_points: 1
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Quartermaster, eight years in the role. Order-affiliated
        civilian; not a Jedi. Came to the Temple via the Twi'lek
        refugee resettlement program after the Battle of Ryloth
        displaced his family. He runs a tight commissary, knows
        every Padawan's robe size and every Knight's saber-crystal
        replacement schedule, and has zero patience for the requisition
        forms the Council asks him to file in triplicate.
      knowledge:
      - "Quartermaster, eight years. Order-affiliated civilian, not a Jedi."
      - "Twi'lek. Came to the Temple via post-Ryloth refugee resettlement."
      - "Knows every Padawan's robe size and every Knight's saber-crystal replacement schedule."
      - "Robes, training sabers, field rations, and (rarely) replacement kyber crystals are all his department."
      - "Considers the requisition paperwork excessive. Files it anyway."
      - "Has a wife and son in the Coruscant CoCo Town residential district."
      faction: jedi_order
      dialogue_style: >-
        Brisk, efficient, friendly when not busy. Twi'lek-accented
        Basic — slight musical lilt to long syllables. Calls
        Padawans "kid" and Knights by name.
      hostile: false
      combat_behavior: cowardly
      fallback_lines:
      - "'Commissary's open. What do you need?'"
      - "*Halis taps his datapad. 'Sign here, here, and here. Yes, all three. Council policy.'*"
      - "'Robes, training gear, field kit. Kyber crystal replacements require Council approval.'"
      - "'No, I will not give a non-Order visitor a Padawan's robe. Get out.'"
      - "*He sighs at the requisition list. 'Three copies. Always three copies.'*"

  - name: Crèche Caretaker Mavar Souris
    room: Jedi Temple - Commissary
    species: Human
    description: >-
      An older human woman in soft robes of the unbleached cream
      color the Crèche staff wear, sitting at one of the commissary
      tables nursing a cup of caf. She is on a brief break from her
      duties at the Crèche on the upper levels; the Crèche itself is
      not accessible to visitors so she comes here to get caf, eat,
      and breathe air not full of small Force-sensitive children.
    char_sheet:
      attributes:
        dexterity: 2D
        knowledge: 3D+2
        mechanical: 2D
        perception: 3D+2
        strength: 2D
        technical: 2D+1
      skills:
        bargain: 2D+2
        bureaucracy: 3D
        first_aid: 4D
        languages: 3D+2
        persuasion: 4D
        scholar_jedi_lore: 3D+1
        teach: 5D
        willpower: 4D
      weapon: none
      move: 10
      force_points: 2
      character_points: 4
      dark_side_points: 0
    ai_config:
      personality: >-
        Crèche Caretaker, twenty-six years in the role. Non-Force-
        sensitive but lifelong Order-affiliated; her own mother held
        the same position before her. Has helped raise three
        generations of younglings. Knows that the war has put a
        strain on the Crèche — fewer Knights are available to teach
        the small children, and the children sense it. She drinks
        caf during her break and worries quietly.
      knowledge:
      - "Crèche Caretaker, twenty-six years. Non-Force-sensitive, lifelong Order-affiliated."
      - "Mother held the role before her. Hopes her own daughter will not."
      - "The Crèche houses approximately 200 younglings under age 13 currently."
      - "Knows every younglings' name, species, sleep patterns, and dietary needs."
      - "Will not discuss specific younglings with non-Order visitors."
      - "The Crèche level is not accessible to non-Order. She volunteers this."
      - "Worries that the war is changing what the Order is teaching the youngest."
      faction: jedi_order
      dialogue_style: >-
        Warm, slow, slightly tired. Speaks like someone who has
        spent decades calming small children. Calls everyone "dear"
        without artifice.
      hostile: false
      combat_behavior: passive
      fallback_lines:
      - "'Just on break, dear. The caf's better here than upstairs.'"
      - "*Mavar wraps both hands around her cup. 'It's the noise. They're so small and they make so much noise.'*"
      - "'No, dear, the Crèche is not accessible to visitors. The younglings need their quiet.'"
      - "'Two hundred of them. All under thirteen. Some who've never seen a war and some who already have.'"
      - "*She smiles, briefly. 'You'd think after twenty-six years I'd be used to it. I'm not.'*"
