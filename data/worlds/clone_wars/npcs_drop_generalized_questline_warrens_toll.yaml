# Generalized Questline Drop — "The Warrens Toll" (T3.24 eighth slice, 2026-06-26)
#
# The EIGHTH accessible (non-t5, non-tutorial) `kind: questline` chain, after
# "The Ghost Shipment" (nar_freight_ghost_shipment, Nar Shaddaa Promenade/
# Undercity), "The Crooked Wheel" (mos_eisley_crooked_wheel, Tatooine/Mos
# Eisley), "The Lost Courier" (coruscant_lower_lost_courier, Coruscant LOWER
# city), "The Skimmed Line" (kuat_ring_skimmed_line, Kuat orbital ring), "The
# Dust-Sick" (jundland_dust_sick, Tatooine wilderness), "The False Provenance"
# (coruscant_petrax_false_provenance, Coruscant cultural district), and "The
# Forged Notice" (nar_shaddaa_forged_notice, Nar Shaddaa upper docks). It reuses
# the SAME live questline engine (engine/tutorial_chains.py + chain_events.py:
# the `kind: questline` type + `active_questline` slot, the existing event
# types, the four reward funnels) with NO new engine code, no new slot, no new
# event type, no schema migration, no new reward faucet, and NO map-coordinate
# or exit-graph change — the sanctioned right-of-launch widening per
# quest_expansion_postlaunch_path_v1.md (T3.24): author MORE questlines on the
# proven pattern.
#
# Two firsts for the accessible-questline arc:
#   1. An EIGHTH distinct skill spread — COMMAND + DEMOLITIONS (vs
#      search+streetwise on the Ghost Shipment, investigation+gambling on the
#      Crooked Wheel, persuasion+sneak on the Lost Courier, security+bargain on
#      the Skimmed Line, first_aid+survival on the Dust-Sick, value+con on the
#      False Provenance, forgery+bureaucracy on the Forged Notice). The eight
#      accessible questlines now each teach distinct play, and this is the first
#      to lead with the leader's nerve (rallying frightened people to act
#      together under threat — Knowledge/command) and the breacher's hand
#      (reading and defusing a live charge — Technical/demolitions). No prior
#      accessible questline exercises either skill, so this rewards the
#      leadership and explosive-ordnance builds the social, technical-repair,
#      investigative, wilderness, appraisal, and counter-forgery arcs never do.
#   2. A THIRD, deepest face of NAR SHADDAA — the Smuggler's Moon's lowest
#      inhabitable levels, the WARRENS (nar_shaddaa_warrens zone): the squat
#      block, the scavenger den, the centuries-unmaintained reactor core, the
#      collapsed plaza. It reuses NONE of the prior two Nar Shaddaa arcs' rooms
#      (the Ghost Shipment ran burning_deck_cantina / nar_shaddaa_bay_aurek /
#      floating_market / undercity_depths; the Forged Notice ran
#      upper_dock_observation / westport_arrivals / smugglers_guild_hall /
#      enforcer_alley). It touches NO map coordinate or world exit graph — the
#      Warrens rooms already exist and are loaded (planets/nar_shaddaa.yaml);
#      only NPCs + a chains.yaml entry + an achievement are added.
#
# It is also a new STORY SHAPE: a disaster-prevention / community-defense — not
# a smuggling-trace, a racket-bust-by-investigation, a kidnap-rescue, an
# industrial-skim, a frontier medical rescue, an art-fraud caper, or a
# counter-forgery. A Hutt-space racketeer the Warrens knows only as the
# Toll-Keeper has run a "reactor-safety toll" on the lowest levels for a year:
# pay the toll or the ancient reactor that keeps the Warrens lit and breathing
# "has an accident." This time the squat block couldn't make the toll, and his
# enforcer has wired a real demolitions charge into the reactor's cooling fins —
# a breach that would collapse the lowest inhabitable levels and kill everyone
# in them. There is no law on the Smuggler's Moon to appeal to; the Hutts do not
# notice the Warrens at all. So Vessa Tial, who keeps the squat block together,
# offers the toll-money itself — the credits her people scraped against the
# deadline — to anyone who can do what they cannot: get the scattered, frightened
# Warrens to move together (command), reach the planted charge and defuse it
# before it breaches (demolitions), stop the enforcer when he comes to set it off
# by hand (attack/dodge), and carry word back that the toll is broken.
#
# These NPCs back the `nar_shaddaa_warrens_toll` questline in
# data/worlds/clone_wars/tutorials/chains.yaml:
#   * Vessa Tial   — the squat-block organizer who offers + closes the quest
#                    (step-1 npc = the questline's start-NPC, per
#                    get_questline_offer). She holds the Warrens' lowest level
#                    together and has run out of ways to do it alone.
#                    Step-1 + step-5 NPC.
#   * Tarko Venn   — the combat-step enforcer (ai_config.chain_enemy_template
#                    warrens_toll_enforcer; the step-4 combat_won foil), the
#                    Toll-Keeper's muscle who rigged the reactor charge and
#                    comes to the collapsed plaza to set it off by hand once the
#                    squat block refuses to pay.
# The racketeer (narrated only as "the Toll-Keeper"), the toll-crew at his back,
# the wired reactor charge, and the squat-block families at risk are NARRATED
# ONLY — story beats carried in the prose, NOT spawned NPC entities (the
# off-screen boss and the endangered residents need no producer, the way the
# prior questlines' off-screen principals are carried). Only the giver and the
# single combat foil are real placed NPCs.
#
# Original characters, era-clean ~20 BBY, WEG R&E D6 stats. No canon figures.
# Provenance: Twi'lek (the ubiquitous underclass species of Nar Shaddaa, wholly
# era-clean and faction-neutral — Twi'leks crowd every level of the Smuggler's
# Moon) and Klatooinian (a long-settled Hutt-space servant/enforcer species,
# faction-neutral and a fixture of Hutt muscle for millennia before the Clone
# Wars) are both era-clean and not war-faction coded. Stats matched to the
# shipped accessible-questline bands — the giver to the non-combat fixer band
# (Yelza Korrin / Dorae Vint / Sashi Renko / Dav Nuro / Soree Bann / Hessa Veil
# / Cassa Brel), the enforcer to the small-time-criminal antagonist band
# (Brakkis Vone / Gorvahn Brusk / Skarn Vex / Suro Vant / Vohrek Sarn / Brask
# Yade / Varn Tesk): a real fight, beatable by a fresh post-chargen character.
# WEG40120 PDF is local-only (gitignored) and absent in this tree; the bands are
# cited against the in-repo reference NPCs, not re-derived.

schema_version: 1

npcs:

  # ═══════════════════════════════════════════════════════════════════
  # The squat-block organizer — Vessa Tial (questline GIVER + closer)
  # Questline: nar_shaddaa_warrens_toll ("The Warrens Toll")
  # Placement: Nar Shaddaa - The Warrens - Squat Block
  #            (warrens_squat_block, zone nar_shaddaa_warrens).
  #            Step-1 + step-5 NPC.
  # NOTE: the woman who keeps the block's jury-rigged power and water
  # running and its hundred families counted — NOT one of the squat
  # block's anonymous dwellers. Distinct presence, same room.
  # ═══════════════════════════════════════════════════════════════════

  - name: Vessa Tial
    room: "Nar Shaddaa - The Warrens - Squat Block"
    species: Twi'lek
    description: >-
      A wiry, grey-lekku'd Twi'lek woman in a patched mechanic's smock, a coil of
      power cable over one shoulder and a datapad of the block's roster in her
      hand — the unofficial keeper of the squat block, the closest thing the
      Warrens' lowest level has to anyone in charge. She has spliced its power off
      the warrens' main line, rationed its water, and counted its hundred families
      through every cave-in and outage for fifteen years, and she has paid the
      Toll-Keeper's "reactor-safety toll" every cycle the way you pay weather —
      because the alternative was the reactor having an "accident." This cycle the
      block couldn't make the toll, and now there is a real charge wired into the
      reactor that keeps them all breathing, a deadline measured in hours, and no
      law on the whole Smuggler's Moon that will come down here to care. She is
      out of cable-splices and clever rationing for this one. She is looking for
      someone who can do the three things she cannot do alone — move a frightened
      level as one, take a live charge off the cooling fins, and stand in front of
      the man who set it.
    char_sheet:
      attributes:
        dexterity: 2D+1
        knowledge: 3D+1
        mechanical: 2D+1
        perception: 3D
        strength: 2D
        technical: 2D+2
      skills:
        command: 4D+1
        persuasion: 3D+2
        streetwise: 4D
        bargain: 3D
        demolitions: 3D
        bureaucracy: 2D+2
      weapon: blaster_pistol
      move: 10
      force_points: 1
      character_points: 5
      dark_side_points: 0
    ai_config:
      personality: >-
        A steady, unsentimental community organizer worn thin by fifteen years of
        holding a dying level together — practical to the bone, quick to read a
        room, slow to ask for help because help on the Smuggler's Moon usually
        costs more than the trouble. She knows every family, every splice, and
        every angle the Toll-Keeper has worked, but she is no fighter and no
        breacher, and a charge on the reactor is past anything she can splice or
        ration her way out of. Tired, clear-eyed, and quietly furious; she offers
        the toll-money itself as the fee because the credits were always going to
        be spent on staying alive, and a stranger willing to spend them on the
        block instead of the boss is the only kind of luck the Warrens gets.
      knowledge:
        - "She is Vessa Tial, the keeper of the squat block on the Warrens' lowest inhabitable level; she splices its power, rations its water, and counts its hundred families, and she has run out of ways to keep them safe alone."
        - "A racketeer the Warrens knows only as the Toll-Keeper has run a 'reactor-safety toll' on the lowest levels for a year — pay or the centuries-old reactor that keeps the Warrens lit and breathing 'has an accident'; this cycle the block couldn't pay, and his enforcer has wired a real demolitions charge into the reactor's cooling fins."
        - "There is no law on Nar Shaddaa that will come down to the Warrens; the Hutts don't notice it exists. A charge on that reactor would breach it and collapse the lowest inhabitable levels — everyone on them — and the only thing standing against that is whoever she can find before the deadline."
        - "The three things she cannot do alone: get the scattered, frightened level to move together instead of hiding (the scavengers in the den hold the only safe approach to the reactor and won't open it for fear); take the live charge off the cooling fins before it breaches; and stop the enforcer when he comes to the collapsed plaza to set it off by hand once the block refuses to pay."
      faction: independent
      dialogue_style: >-
        Flat, economical Warrens diction, no wasted words and no self-pity; talks
        like someone used to being the calmest person in a frightening room
        because no one else can afford to be.
      hostile: false
      combat_behavior: defensive
      fallback_lines:
        - "'The Toll-Keeper sells us reactor-safety. What he means is he'll blow the only reactor we've got unless we pay him not to. This cycle we couldn't pay — and his man wired the charge for real. There's no one on this moon to call. Just me, and now maybe you.'"
        - "*Vessa Tial thumbs the block's roster on her datapad — a hundred names on the lowest level of the Smuggler's Moon — and does not let her hand shake.*"
        - "'Move the level so the scavengers open the reactor approach, get that charge off the fins, and put yourself between the plaza and the man who set it. Do that and the toll-money's yours — every credit we scraped to stay alive. I'd rather it bought the block than the boss.'"

  # ── Questline antagonist: Tarko Venn (combat step 4) ────────────────
  # Single hostile instance in the Collapsed Plaza. Matches the
  # nar_shaddaa_warrens_toll step-4 combat_won enemy_template.

  - name: Tarko Venn
    room: "Nar Shaddaa - The Warrens - Collapsed Plaza"
    species: Klatooinian
    description: >-
      A heavy, flat-faced Klatooinian in a scarred work-coat, a remote detonator
      clipped at his belt and a blaster riding his hip, picking his way across the
      collapsed plaza toward the reactor approach to do by hand what the deadline
      was supposed to do for him. He is the Toll-Keeper's enforcer — the one who
      wires the charges, collects the tolls, and makes the "accidents" happen on
      schedule — and he has bled a dozen Warrens blocks this way without anyone
      down here ever having the means to stop him. He came to the plaza expecting
      to thumb a detonator on an empty level and walk back up with the toll
      doubled as a lesson. The level is not empty, the charge is not where he left
      it, and a stranger is standing in the one gap in the rubble between him and
      the reactor. The bored cruelty in him goes cold and certain: the block pays,
      one way or another, and anyone who got in the way of an honest collection
      is part of the lesson.
    char_sheet:
      attributes:
        dexterity: 3D
        knowledge: 2D
        mechanical: 2D
        perception: 2D+1
        strength: 3D+2
        technical: 2D+1
      skills:
        blaster: 4D
        brawling: 4D+2
        dodge: 3D+1
        melee_combat: 3D+2
        intimidation: 4D
        demolitions: 3D+1
      weapon: blaster_pistol
      move: 10
      force_points: 0
      character_points: 3
      dark_side_points: 1
    ai_config:
      chain_enemy_template: warrens_toll_enforcer
      personality: >-
        A career Hutt-space collector, incurious and unbothered about whose level
        he is blowing or who is on it, then immediately and coldly violent the
        moment the collection is blocked. He would rather set the charge on an
        empty plaza and walk away clean than fight, but his pay rides on the toll
        being paid in credits or in wreckage and his standing on never letting a
        block see him backed down — he will draw on anyone who plants themselves
        between him and the reactor approach. Combat foil for the questline's
        confrontation beat.
      knowledge:
        - "He is the Toll-Keeper's enforcer — he wires the reactor charges, collects the safety-tolls, and stages the 'accidents'; he does not care that the block can't pay, only that an unpaid toll has to cost something a watching level remembers."
        - "He came to the collapsed plaza to thumb the detonator by hand now the deadline's passed; the charge has been moved off the fins and the level didn't scatter the way it always does, and anyone blocking the reactor approach is between him and his pay — he will gun them down in the rubble to keep the toll and his name in the Warrens."
      faction: criminal
      dialogue_style: >-
        Flat, unhurried, contemptuous. States the toll once, tells you to clear
        the approach, and after that lets the blaster settle the collection.
      hostile: true
      combat_behavior: aggressive
      fallback_lines:
        - "'The block missed the toll. That's not my problem to forgive — it's my job to collect, in credits or in a level that learns. You're standing in a collection. Clear the approach.'"
        - "*Tarko Venn thumbs the detonator at his belt, finds the charge already gone from the fins, and lets his free hand drop to the blaster instead.*"
        - "'Moved my charge, did you. Doesn't matter. I'll set the next one personally, and you won't be standing here to move it. Last time — out of the rubble.'"
