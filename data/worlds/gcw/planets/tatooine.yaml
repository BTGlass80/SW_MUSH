    zone: outskirts
    map_x: 0.72
    map_y: 0.4

  - id: 42
    slug: city_outskirts_abandoned_moisture_farm
    name: "City Outskirts - Abandoned Moisture Farm"
    short_desc: "A moisture farm abandoned after a Tusken raid, now a squatter camp."
    description: >-
      Four vaporator towers stand silent, their condensation tubes stripped
      for parts. The underground living quarters have been claimed by
      drifters and outcasts — beings with nowhere else to go. Makeshift
      shelters lean against the old ferrocrete homestead walls. A faint
      smell of charring lingers from the raid.
    zone: outskirts
    map_x: 0.65
    map_y: 0.5
    properties:
      cover_max: 0
    housing: true  # F.5b.3.a: T5 organization HQ host (Outskirts Compound)

  - id: 43
    slug: city_outskirts_speeder_track
    name: "City Outskirts - Speeder Track"
    short_desc: An informal swoop racing circuit carved into the hardpan desert.
    description: >-
      Berms of packed sand mark a rough oval course. Swoop gangs gather here
