      sunk into the desert floor. The interior has been stripped of anything
      valuable, but the superstructure provides welcome shade. Womp Rat
      warrens riddle the hull.
    zone: outskirts
    map_x: 0.72
    map_y: 0.32
    properties:
      cover_max: 3
      lighting: dim

  - id: 46
    slug: city_outskirts_hermits_ridge
    name: "City Outskirts - Hermit's Ridge"
    short_desc: A rocky outcropping overlooking the desert approaches to Mos Eisley.
    description: >-
      Weathered sandstone formations create natural shelters along this
      ridge. An old hermit is said to live somewhere in these rocks — a
      crazy old wizard, the locals say, best left alone. The view extends
      for kilometers across the desert floor. Thermal updrafts make the air
      dance.
    zone: outskirts
    map_x: 0.65
    map_y: 0.58
    properties:
      cover_max: 2

  - id: 47
    slug: city_outskirts_desert_trail_junction
    name: "City Outskirts - Desert Trail Junction"
    short_desc: "Where the main road forks: east toward the Wastes, south toward Anchorhead."
    description: >-
      A trail marker — three stones stacked by some long-forgotten traveler
