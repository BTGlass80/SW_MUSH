    zone: residential
    map_x: 0.32
    map_y: 0.62

  - id: 39
    slug: notsub_shipping_lobby
    name: "Notsub Shipping - Lobby"
    short_desc: "The corporate lobby of Tatooine's largest company."
    description: >-
      The most professional-looking building in Mos Eisley. Polished floors,
      working climate control. Notsub employs almost 1,000 beings. CEO
