      reinforced with an E-web emplacement and sensor equipment. Most locals
      know the back routes around it.
    zone: outskirts
    map_x: 0.75
    map_y: 0.35
    properties:
      cover_max: 2

  - id: 45
    slug: city_outskirts_wrecked_sandcrawler
    name: "City Outskirts - Wrecked Sandcrawler"
    short_desc: "The rusting hulk of a Jawa sandcrawler, half-buried in sand."
    description: >-
      This sandcrawler was destroyed years ago — whether by Tusken Raiders
