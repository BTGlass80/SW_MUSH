      leading toward the Jundland Wastes. The southern road is wider,
      following the route to Anchorhead and the moisture farming
      settlements. Heat mirages shimmer on both horizons.
    zone: outskirts
    map_x: 0.82
    map_y: 0.3
    housing: true  # F.5b.3.a: T5 organization HQ host (Abandoned Compound)

  - id: 48
    slug: jundland_wastes_canyon_mouth
    name: "Jundland Wastes - Canyon Mouth"
    short_desc: The entrance to a narrow canyon cutting through sandstone cliffs.
    description: >-
      Towering walls of wind-carved sandstone rise on either side, casting
      deep shadow even under the twin suns. The canyon floor is littered
      with rocks fallen from above — natural chokepoints that Tusken Raiders
      use for ambushes. Bantha tracks are pressed deep into the sand. The
      silence is oppressive.
    zone: wastes
    map_x: 0.88
    map_y: 0.3
    properties:
      cover_max: 3
      environment_hazard: {"type": "extreme_heat", "severity": 1, "difficulty": 10}
      lighting: dim

  - id: 49
    slug: jundland_wastes_beggars_canyon
    name: "Jundland Wastes - Beggar's Canyon"
    short_desc: A treacherous canyon famous as a test of piloting skill.
    description: >-
      Sheer walls plunge hundreds of meters on either side of a winding rock
      corridor barely wide enough for a speeder. Local youths race T-16
      Skyhoppers through here. The canyon floor is littered with wreckage
      from those who misjudged the turns. Womp Rats nest in the crevices —
      some growing nearly two meters long.
    zone: wastes
    map_x: 0.88
    map_y: 0.38
    properties:
      cover_max: 0
      environment_hazard: {"type": "extreme_heat", "severity": 2, "difficulty": 13}

  - id: 50
    slug: jundland_wastes_tusken_camp_overlook
    name: "Jundland Wastes - Tusken Camp Overlook"
    short_desc: A high vantage point overlooking a Tusken Raider encampment.
    description: >-
      From behind a screen of boulders, a Tusken camp is visible in the
      valley below — Bantha-hide tents arranged in a rough circle, cook
      fires sending thin smoke into the sky. Banthas graze on scrub. The
      Sand People are fiercely territorial; approaching the camp uninvited
      is suicide. Even from this distance, their gaderffii sticks glint in
      the sun.
    zone: wastes
    map_x: 0.94
    map_y: 0.28
    properties:
      cover_max: 3
      environment_hazard: {"type": "extreme_heat", "severity": 1, "difficulty": 10}

  - id: 51
    slug: jundland_wastes_krayt_dragon_graveyard
    name: "Jundland Wastes - Krayt Dragon Graveyard"
    short_desc: A desolate stretch of desert where Krayt Dragons come to die.
    description: >-
      Massive ribcages arch from the sand like the keels of buried
      starships. Bleached skulls the size of landspeeders stare with empty
      eye sockets. The pearl-hunters come here despite the danger — a single
      Krayt Dragon pearl can be worth ten thousand credits. The bones
      themselves are prized by collectors. Something moves in the sand
      nearby.
    zone: wastes
    map_x: 0.97
    map_y: 0.25
    properties:
      cover_max: 0
      environment_hazard: {"type": "extreme_heat", "severity": 2, "difficulty": 13}
      lighting: bright

  - id: 52
    slug: jundland_wastes_hidden_cave
    name: "Jundland Wastes - Hidden Cave"
    short_desc: "A natural cave concealed behind a rockfall, showing signs of habitation."
    description: >-
      The cave entrance is invisible from the canyon floor, screened by
      tumbled boulders. Inside, the temperature drops sharply. Someone has
      been here recently — a fire ring, water containers, survival supplies.
      Scratched into the wall in several languages: coordinates, warnings,
      and what might be a Rebel Alliance symbol half-obscured by sand.
    zone: wastes
    map_x: 0.9
    map_y: 0.22
    properties:
      cover_max: 2
      lighting: dark

  - id: 53
    slug: jundland_wastes_dune_sea_edge
    name: "Jundland Wastes - Dune Sea Edge"
    short_desc: Where the Jundland Wastes give way to the endless Dune Sea.
    description: >-
      The rocky terrain falls away to an ocean of sand stretching to every
      horizon. The Great Pit of Carkoon lies somewhere out there — and
      Jabba's palace beyond. The wind carries fine grit that stings exposed
      skin. Navigation without instruments is nearly impossible. The Dune
      Sea has claimed more lives than the Tusken Raiders ever will.
    zone: wastes
    map_x: 0.97
    map_y: 0.32
    properties:
      cover_max: 0
      environment_hazard: {"type": "extreme_heat", "severity": 3, "difficulty": 16}
      lighting: bright

