      track is empty except for Womp Rats darting between the berms.
      Discarded fuel cells and broken swoop parts litter the edges.
    zone: outskirts
    map_x: 0.8
    map_y: 0.4

  - id: 44
    slug: city_outskirts_imperial_checkpoint
    name: "City Outskirts - Imperial Checkpoint"
    short_desc: A prefab checkpoint on the main road heading east from Mos Eisley.
    description: >-
      A plasteel booth and retractable barrier mark the last Imperial
