    zone: civic
    map_x: 0.58
    map_y: 0.25

  - id: 36
    slug: dim_u_monastery_main_gate
    name: "Dim-U Monastery - Main Gate"
    short_desc: The entrance to an abandoned greenhouse converted into a monastery.
    description: >-
      Huge doors rarely opened. The building was once a greenhouse. Monks
