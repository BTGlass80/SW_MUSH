    zone: outskirts
    map_x: 0.65
    map_y: 0.4
    housing: true  # F.5b.3.a: T3 private residence host (Outskirts Homesteads)

  - id: 41
    slug: city_outskirts_scavenger_market
    name: "City Outskirts - Scavenger Market"
    short_desc: A ramshackle collection of stalls where Jawas trade salvage.
    description: >-
      Outside the city wall, Jawas have established a semi-permanent trading
