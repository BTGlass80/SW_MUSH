    zone: residential
    map_x: 0.35
    map_y: 0.62

  - id: 32
    slug: lucky_despot_star_chamber_cafe
    name: "Lucky Despot - Star Chamber Cafe"
    short_desc: The hotel restaurant with its famous holographic starfield projector.
    description: >-
      The Star Chamber serves meals by day and transforms into an illegal
      casino after Second Twilight. A holographic projector portrays the
