# data/worlds/gcw/planets/nar_shaddaa.yaml
# Galactic Civil War — Nar Shaddaa (Corellian Sector)
# 30 rooms, 30 one-way exits.
# Generated by tools/extract_gcw_world.py from build_mos_eisley.py.
# Room IDs are positional and stable — do NOT reorder.

planet: nar_shaddaa
planet_display_name: Nar Shaddaa
primary_city: Corellian Sector
description: >-
  The Smuggler's Moon — a crime-saturated industrial moon orbiting Nal
  Hutta, layered in vertical districts where the Hutt cartels rule openly
  and Imperial law stops at the docking pads.

rooms:

  - id: 54
    slug: nar_shaddaa_docking_bay_aurek
    name: "Nar Shaddaa - Docking Bay Aurek"
    short_desc: A grimy docking bay in the Corellian Sector of Nar Shaddaa.
    description: >-
      Fuel-stained duracrete slopes down into this cavernous bay. Refueling
      spires tower overhead, their navigation lights blinking in the
      perpetual gloom. Cargo droids haul crates without supervision. A
      battered kiosk charges 50 credits per day, payable in advance. No
      questions asked.
    zone: ns_landing_pad
    map_x: 0.35
    map_y: 0.08

  - id: 55
    slug: nar_shaddaa_landing_platform_besh
    name: "Nar Shaddaa - Landing Platform Besh"
    short_desc: An exposed landing platform jutting from the upper levels.
    description: >-
      Wind howls across this platform, hundreds of stories above the
      undercity. Mag-clamps secure ships against the constant gale. The view
      of Nar Shaddaa's endless cityscape stretches to every horizon, spire
      after spire vanishing into atmospheric haze. Nal Hutta looms in the
      sky above.
    zone: ns_landing_pad
    map_x: 0.55
    map_y: 0.08

  - id: 56
    slug: nar_shaddaa_corellian_sector_promenade
    name: "Nar Shaddaa - Corellian Sector Promenade"
    short_desc: "The main street of the Corellian Sector, a smugglers' paradise."
    description: >-
      Neon holographic signs flicker above a crowded thoroughfare.
      Corellians and beings from a hundred worlds push through the crowd.
      Street vendors hawk counterfeit transponder chips and black market
      spice. The air reeks of engine exhaust and cooking oil. Somewhere
      above, the refueling spires vanish into clouds.
    zone: ns_promenade
    map_x: 0.45
    map_y: 0.22
    housing: true  # F.5b.3.a: T1 + T3 host (Promenade Hostel + Corellian Sector Apartments)

  - id: 57
    slug: nar_shaddaa_the_burning_deck_cantina
    name: "Nar Shaddaa - The Burning Deck Cantina"
    short_desc: A notorious smuggler cantina deep in the Corellian Sector.
    description: >-
      Low ceilings, thick smoke, and the persistent clatter of sabacc chips
      define this dive. Corellian whiskey flows cheap. Smuggling guild
      recruiters size up newcomers from corner booths. A holographic
      scoreboard tracks active cargo runs. The bartender, a scarred Weequay,
      has a blaster under the counter.
    zone: ns_promenade
    map_x: 0.3
    map_y: 0.22

  - id: 58
    slug: nar_shaddaa_burning_deck_back_room
    name: "Nar Shaddaa - Burning Deck Back Room"
    short_desc: "A private room behind the cantina used for high-stakes deals."
    description: >-
      Soundproofed walls and a signal jammer ensure privacy. A circular
      table seats six. Scorch marks on the ceiling tell of negotiations gone
      wrong. The door has three locks and no window.
    zone: ns_promenade
    map_x: 0.22
    map_y: 0.22
    properties:
      cover_max: 1

  - id: 59
    slug: nar_shaddaa_smugglers_guild_hall
    name: "Nar Shaddaa - Smugglers' Guild Hall"
    short_desc: "The unofficial headquarters of the Corellian Smugglers' Guild."
    description: >-
      What looks like an abandoned warehouse opens into a surprisingly
      organized operations center. Star charts cover the walls. Dispatchers
      coordinate cargo runs across a dozen sectors. A communal armory sits
      behind a cage. Membership dues are 500 credits per standard month.
    zone: ns_promenade
    map_x: 0.45
    map_y: 0.14

  - id: 60
    slug: nar_shaddaa_vertical_bazaar
    name: "Nar Shaddaa - Vertical Bazaar"
    short_desc: "A multi-level marketplace built into an old refueling spire."
    description: >-
      Shops and stalls ring the interior of a hollowed-out spire, connected
      by rickety turbolifts and spiral ramps. Each level specializes:
      weapons on three, ship parts on seven, information on twelve. A
      central open shaft lets you see fifty stories up and down. Vertigo is
      free of charge.
    zone: ns_promenade
    map_x: 0.58
    map_y: 0.25
    housing: true  # F.5b.3.a: T4 shopfront host (Promenade Market)

  - id: 61
    slug: nar_shaddaa_bounty_hunters_quarter
    name: "Nar Shaddaa - Bounty Hunters' Quarter"
    short_desc: A fortified block claimed by bounty hunters and mercenaries.
    description: >-
      Reinforced doors and weapon scanners mark the entrance to this
      self-policing enclave. Bounty posting boards line the main corridor.
      An equipment shop specializes in tracking devices and restraints. The
      cantina here serves strong drink and asks fewer questions than most.
    zone: ns_promenade
    map_x: 0.45
    map_y: 0.32
    housing: true  # F.5b.3.a: T5 organization HQ host (Corellian Sector Block)

  - id: 62
    slug: nar_shaddaa_old_corellian_quarter
    name: "Nar Shaddaa - Old Corellian Quarter"
    short_desc: "A weathered residential block, home to longtime Corellian expatriates."
    description: >-
      Older than the rest of the Corellian Sector, this block predates the
      Imperial era. Residents have lived here for generations, maintaining
      Corellian customs in exile. A communal kitchen serves as social
      center. Graffiti in Corellian script covers the entry archway: 'Never
      tell me the odds.'
    zone: ns_promenade
    map_x: 0.32
    map_y: 0.3

  - id: 63
    slug: nar_shaddaa_refugee_sector
    name: "Nar Shaddaa - Refugee Sector"
    short_desc: A crowded district where displaced beings eke out survival.
    description: >-
      Makeshift shelters crowd the corridors between abandoned industrial
      blocks. Families huddle around shared heating vents. Children beg in a
      dozen languages. Relief droids distribute protein packs on a
      first-come basis. The smell of too many beings in too small a space is
      overwhelming.
    zone: ns_promenade
    map_x: 0.55
    map_y: 0.3

  - id: 64
    slug: nar_shaddaa_undercity_market
    name: "Nar Shaddaa - Undercity Market"
    short_desc: A sprawling black market in the lower levels of Nar Shaddaa.
    description: >-
      Daylight has never reached these depths. Bioluminescent fungi and
      jury-rigged glowpanels cast everything in sickly blue-green. Stalls
      built from scrap metal sell everything from illegal weapons to stolen
      ship parts. Pickpockets and informants lurk at every junction. The law
      does not come here.
    zone: ns_undercity
    map_x: 0.45
    map_y: 0.45
    properties:
      environment_hazard: {"type": "urban_danger", "severity": 1, "difficulty": 10}

  - id: 65
    slug: nar_shaddaa_undercity_depths
    name: "Nar Shaddaa - Undercity Depths"
    short_desc: "The deepest accessible level of Nar Shaddaa's vertical city."
    description: >-
      Corroded catwalks span chasms that plunge into absolute darkness. The
      mutated descendants of the Evocii scuttle in the shadows, wary of
      strangers. Moisture condenses on every surface. Strange sounds echo
      from below — machinery, or something else entirely. Few who venture
      this deep return unchanged.
    zone: ns_undercity
    map_x: 0.45
    map_y: 0.55
    properties:
      cover_max: 0
      environment_hazard: {"type": "urban_danger", "severity": 2, "difficulty": 13}
      lighting: dark

  - id: 66
    slug: nar_shaddaa_spice_den
    name: "Nar Shaddaa - Spice Den"
    short_desc: A dimly lit den where various forms of spice are consumed.
    description: >-
      Reclining couches line the walls, occupied by beings in various states
      of intoxication. Glitterstim, ryll, and more exotic substances change
      hands in whispered transactions. The Twi'lek proprietor watches with
      calculating eyes. A back exit leads deeper into the Undercity.
    zone: ns_undercity
    map_x: 0.55
    map_y: 0.45
    properties:
      lighting: dim

  - id: 67
    slug: nar_shaddaa_droid_junkyard
    name: "Nar Shaddaa - Droid Junkyard"
    short_desc: A vast scrapyard of decommissioned and stolen droids.
    description: >-
      Mountains of droid parts stretch to the hazy ceiling. Salvagers pick
      through the wreckage with magnetic tools. Occasionally a
      half-functional droid twitches or speaks a garbled phrase. The
      Ugnaught proprietor insists everything is legitimately acquired.
      Nobody believes him.
    zone: ns_undercity
    map_x: 0.65
    map_y: 0.32
    properties:
      environment_hazard: {"type": "urban_danger", "severity": 1, "difficulty": 10}

  - id: 68
    slug: nar_shaddaa_black_market_medcenter
    name: "Nar Shaddaa - Black Market Medcenter"
    short_desc: An unlicensed medical facility hidden behind a scrap metal front.
    description: >-
      Behind a rust-streaked door lies a surprisingly functional operating
      room. Recycled bacta tanks line one wall, half-full. Stolen medical
      equipment fills surgical bays. The doctor charges double the legal
      rate but asks no questions and files no reports. A Twi'lek nurse
      monitors the waiting area.
    zone: ns_undercity
    map_x: 0.4
    map_y: 0.52

  - id: 69
    slug: nar_shaddaa_fighting_pits
    name: "Nar Shaddaa - Fighting Pits"
    short_desc: An underground arena where beings fight for credits and survival.
    description: >-
      Concentric rings of rusted seating surround a sand-floored pit stained
      dark with old blood. Betters crowd the rails, screaming odds.
      Combatants range from desperate refugees to professional gladiators.
      The Hutt who runs the operation takes a forty percent cut. House
      rules: no blasters, no surrender, and the crowd decides if losers walk
      out.
    zone: ns_undercity
    map_x: 0.55
    map_y: 0.55
    properties:
      cover_max: 0
    housing: true  # F.5b.3.a: T3 + T4 + T5 host (Hab-Block + Black Market + Stronghold)

  - id: 70
    slug: nar_shaddaa_hutt_emissary_tower_lobby
    name: "Nar Shaddaa - Hutt Emissary Tower - Lobby"
    short_desc: "The opulent lobby of a Hutt-controlled tower in the upper levels."
    description: >-
      Polished duranium floors reflect the garish lighting. A massive Hutt
      clan sigil dominates one wall. Gamorrean guards flank the turbolift
      entrance. Visitors are scanned for weapons — then scanned again. A
      protocol droid manages appointments with mechanical precision.
    zone: ns_promenade
    map_x: 0.45
    map_y: 0.1

  - id: 71
    slug: nar_shaddaa_hutt_emissary_tower_audience_chamber
    name: "Nar Shaddaa - Hutt Emissary Tower - Audience Chamber"
    short_desc: "An audience chamber for conducting Hutt business on the Smuggler's Moon."
    description: >-
      The chamber is designed to intimidate. A raised dais supports a Hutt
      repulsor sled. Hookah pipes and platters of live food surround the
      seat of power. Supplicants stand below, necks craned upward.
      Wall-mounted security cameras record everything.
    zone: ns_promenade
    map_x: 0.45
    map_y: 0.05
    properties:
      cover_max: 3

  - id: 72
    slug: nar_shaddaa_the_grid
    name: "Nar Shaddaa - The Grid"
    short_desc: "An information broker's den in the upper levels, accessible by coded lift."
    description: >-
      Banks of screens show feeds from across the Smuggler's Moon — dock
      cameras, comm intercepts, Imperial patrol schedules. The broker, a
      blind Miralukan, trades exclusively in information. No physical goods.
      No violence permitted on premises. This rule is enforced by three
      heavily armed Gamorrean sentinels.
    zone: ns_promenade
    map_x: 0.52
    map_y: 0.05

  - id: 73
    slug: nar_shaddaa_ship_parts_emporium
    name: "Nar Shaddaa - Ship Parts Emporium"
    short_desc: "A multi-deck shop selling salvaged and black-market starship components."
    description: >-
      Seven levels of shelving hold hyperdrive motivators, sensor arrays,
      shield generators, and ion cannon components. The stock is eighty
      percent stolen, twenty percent salvage. The Sullustan owner maintains
      meticulous inventory and competitive pricing. Rare parts available on
      order.
    zone: ns_promenade
    map_x: 0.68
    map_y: 0.25

  - id: 74
    slug: nar_shaddaa_renna_doxs_workshop
    name: "Nar Shaddaa - Renna Dox's Workshop"
    short_desc: A cluttered mechanical workshop run by a master shipwright.
    description: >-
      Every surface is covered with ship components in various states of
      assembly or disassembly. Diagrams and schematics paper the walls.
      Renna Dox — a broad-shouldered Zabrak woman with engine grease
      permanently under her fingernails — builds custom ship modifications
      and teaches Technical skills to those willing to work for the
      knowledge.
    zone: ns_promenade
    map_x: 0.25
    map_y: 0.3

  - id: 75
    slug: nar_shaddaa_the_floating_market
    name: "Nar Shaddaa - The Floating Market"
    short_desc: "Repulsorlift platforms drifting between towers, forming an open-air market."
    description: >-
      A dozen hovering platforms connected by gangways form this unusual
      marketplace. The platforms drift slowly in the thermal currents
      between towers, requiring some agility to navigate between them. Food,
      cheap goods, and stolen Imperial surplus are the primary offerings.
      The market has no fixed address — it moves.
    zone: ns_undercity
    map_x: 0.38
    map_y: 0.4

  - id: 76
    slug: nar_shaddaa_enforcer_alley
    name: "Nar Shaddaa - Enforcer Alley"
    short_desc: A narrow passage controlled by Hutt enforcers collecting protection money.
    description: >-
      This passage connects the Corellian Sector to the upper docks.
      Hutt-affiliated enforcers demand a 'transit toll' from everyone
      passing through. Refusing is inadvisable. The alley smells of spilled
      Corellian ale and old fear. Graffiti marks which gangs claim what
      territory.
    zone: ns_undercity
    map_x: 0.5
    map_y: 0.15

  - id: 77
    slug: nar_shaddaa_weapons_cache
    name: "Nar Shaddaa - Weapons Cache"
    short_desc: "A fortified room in the Bounty Hunters' Quarter, selling military hardware."
    description: >-
      Security shutters and a Durasteel door protect this arsenal. The
      proprietor, an armless Duros who lost both limbs on a bad contract,
      operates the shop via waldos. Every weapon type is represented —
      blasters, melee, explosives, even restricted military stock if the
      price is right.
    zone: ns_undercity
    map_x: 0.52
    map_y: 0.35

  - id: 78
    slug: nar_shaddaa_upper_dock_observation_level
    name: "Nar Shaddaa - Upper Dock Observation Level"
    short_desc: A windswept observation level above the main docking platforms.
    description: >-
      The view from here is staggering — Nar Shaddaa's cityscape in every
      direction, stretching to the curved horizon. Ships arrive and depart
      in constant streams. Nal Hutta hangs enormous in the sky above. Sensor
      equipment here monitors traffic for the dock authority — which is
      actually a Hutt front company.
    zone: ns_landing_pad
    map_x: 0.6
    map_y: 0.08

  - id: 79
    slug: nar_shaddaa_the_warrens_entry_shaft
    name: "Nar Shaddaa - The Warrens - Entry Shaft"
    short_desc: A ventilation shaft descending into the deepest levels of Nar Shaddaa.
    description: >-
      The turbolift stopped working decades ago. A jury-rigged ladder of
      welded pipe descends into the Warrens — the lowest inhabitable levels
      of the Smuggler's Moon. The air here is thick, recycled so many times
      it tastes metallic. A warning scrawled in blood-red paint: 'NO LAW
      BELOW THIS LINE.'
    zone: ns_warrens
    map_x: 0.45
    map_y: 0.65
    properties:
      environment_hazard: {"type": "urban_danger", "severity": 2, "difficulty": 13}
      lighting: dark

  - id: 80
    slug: nar_shaddaa_the_warrens_fungal_cavern
    name: "Nar Shaddaa - The Warrens - Fungal Cavern"
    short_desc: A vast natural cavity colonized by bioluminescent fungal growths.
    description: >-
      Enormous mushroom-like growths reach three meters tall, their caps
      glowing with pale blue light. The air is warm and humid, thick with
      spores. The Evocii — the original inhabitants of Nar Shaddaa,
      displaced millennia ago by the Hutts — have adapted to life here.
      Their camps are visible as clusters of dim firelight among the fungi.
      They do not welcome outsiders.
    zone: ns_warrens
    map_x: 0.55
    map_y: 0.68
    properties:
      environment_hazard: {"type": "urban_danger", "severity": 3, "difficulty": 16}
      lighting: dark

  - id: 81
    slug: nar_shaddaa_the_warrens_reactor_core_access
    name: "Nar Shaddaa - The Warrens - Reactor Core Access"
    short_desc: "A catwalk spanning an ancient reactor core, still partially active."
    description: >-
      The heat is intense — residual energy from a reactor that has been
      running unmaintained for centuries. The catwalk vibrates with
      suppressed power. Rare energy crystals grow on the cooling fins like
      mineral barnacles, prized by crafters and smugglers alike. The
      radiation levels are... elevated. Don't linger.
    zone: ns_warrens
    map_x: 0.42
    map_y: 0.75
    properties:
      environment_hazard: {"type": "urban_danger", "severity": 2, "difficulty": 13}
      lighting: dim

  - id: 82
    slug: nar_shaddaa_the_warrens_scavenger_den
    name: "Nar Shaddaa - The Warrens - Scavenger Den"
    short_desc: A fortified camp where Warrens scavengers trade salvage from the deep.
    description: >-
      Behind a barricade of welded durasteel plates, a small community of
      hard-bitten scavengers has carved out survival. They trade in reactor
      components, rare minerals, and information about what lurks in the
      deeper tunnels. Payment is accepted in credits, supplies, or
      interesting salvage. Trust is earned in blood down here.
    zone: ns_warrens
    map_x: 0.65
    map_y: 0.72
    properties:
      cover_max: 2
      environment_hazard: {"type": "urban_danger", "severity": 2, "difficulty": 13}
      lighting: dark

  - id: 83
    slug: nar_shaddaa_the_warrens_collapsed_plaza
    name: "Nar Shaddaa - The Warrens - Collapsed Plaza"
    short_desc: "The ruins of what was once a grand public space, now buried under centuries of city."
    description: >-
      Columns of an ancient plaza still stand, supporting nothing — the
      ceiling is a tangle of collapsed infrastructure from dozens of
      building layers above. The original tile floor is partially visible
      under debris. This was street level thousands of years ago, before the
      Hutts built their towers on top of the Evocii civilization. History,
      forgotten and buried.
    zone: ns_warrens
    map_x: 0.38
    map_y: 0.82
    properties:
      environment_hazard: {"type": "urban_danger", "severity": 3, "difficulty": 16}
      lighting: dark

