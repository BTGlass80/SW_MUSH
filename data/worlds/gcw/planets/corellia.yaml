# data/worlds/gcw/planets/corellia.yaml
# Galactic Civil War — Corellia (Coronet City)
# 24 rooms, 24 one-way exits.
# Generated by tools/extract_gcw_world.py from build_mos_eisley.py.
# Room IDs are positional and stable — do NOT reorder.

planet: corellia
planet_display_name: Corellia
primary_city: Coronet City
description: >-
  A core world and the heart of the Corellian Engineering Corporation.
  Coronet City sprawls along the coast — orderly on the surface, with a
  contested port district where smugglers and CEC engineers share the same
  cantinas.

rooms:

  - id: 96
    slug: coronet_city_starport_docking_bay
    name: "Coronet City - Starport Docking Bay"
    short_desc: "A modern docking bay in Corellia's capital city."
    description: >-
      Clean, well-maintained, and efficiently run — everything Mos Eisley is
      not. Automated cargo handlers move freight on repulsor tracks. Docking
      fees are posted clearly: 30 credits per standard day. Corellian
      Security Force officers patrol with quiet authority. The bay smells of
      ion drives and fresh rain.
    zone: coronet_port
    map_x: 0.12
    map_y: 0.35

  - id: 97
    slug: coronet_city_starport_concourse
    name: "Coronet City - Starport Concourse"
    short_desc: "The main concourse of Coronet Starport, bustling with travelers."
    description: >-
      Holographic departure boards list destinations across the galaxy.
      Shops sell Corellian brandy, ship parts, and travel supplies. The
      architecture is classic Corellian — functional elegance with no wasted
      space. Enormous viewports show ships ascending and descending against
      a blue sky.
    zone: coronet_port
    map_x: 0.22
    map_y: 0.35

  - id: 98
    slug: coronet_city_dockside_warehouses
    name: "Coronet City - Dockside Warehouses"
    short_desc: "Commercial warehouses near the starport, some with questionable tenants."
    description: >-
      Rows of prefab warehouses store legitimate cargo — and occasionally
      not so legitimate cargo. CorSec runs spot inspections, but Corellians
      have a long tradition of looking the other way when it comes to
      smuggling. Several warehouses serve as fronts for the local black
      market.
    zone: coronet_port
    map_x: 0.22
    map_y: 0.45

  - id: 99
    slug: coronet_city_spacers_rest_hotel
    name: "Coronet City - Spacers' Rest Hotel"
    short_desc: A comfortable hotel catering to visiting ship crews.
    description: >-
      Clean rooms, reliable amenities, and a cantina on the ground floor
      make this the preferred lodging for spacers. The Drall proprietor runs
      a tight ship. Message boards in the lobby advertise crew positions,
      cargo jobs, and the occasional discreet request for 'special delivery
      services.'
    zone: coronet_port
    map_x: 0.22
    map_y: 0.52

  - id: 100
    slug: coronet_city_treasure_ship_row
    name: "Coronet City - Treasure Ship Row"
    short_desc: The famous merchant street at the heart of Coronet City.
    description: >-
      Named for the ancient treasure ships that once docked here, this broad
      avenue is lined with upscale shops, trading companies, and financial
      houses. Corellian Engineering Corporation has a showroom displaying
      the latest freighter models. Street performers and food vendors add
      color to the commercial bustle.
    zone: coronet_city
    map_x: 0.4
    map_y: 0.35

  - id: 101
    slug: coronet_city_the_corellian_slice_cantina
    name: "Coronet City - The Corellian Slice Cantina"
    short_desc: A spacer cantina popular with freighter crews and CEC workers.
    description: >-
      Named for the Corellian Slice hyperspace route, this cantina serves
      the best Whyren's Reserve in the city. Ship captains negotiate cargo
      deals over drinks. A sabacc table in the back sees constant action.
      The atmosphere is rough but friendly — Corellians look after their
      own.
    zone: coronet_city
    map_x: 0.4
    map_y: 0.45

  - id: 102
    slug: coronet_city_cec_shipyard_visitor_center
    name: "Coronet City - CEC Shipyard Visitor Center"
    short_desc: The public face of the Corellian Engineering Corporation.
    description: >-
      Scale models of CEC's famous ships line the walls — YT-series
      freighters, Corellian corvettes, bulk cruisers. Interactive displays
      let visitors explore ship systems. Through the viewports, the orbital
      shipyard facilities are visible as bright points of light in the sky.
      CEC employs half the city.
    zone: coronet_city
    map_x: 0.55
    map_y: 0.35

  - id: 103
    slug: coronet_city_blue_sector
    name: "Coronet City - Blue Sector"
    short_desc: The entertainment district of Coronet City.
    description: >-
      Nightclubs, casinos, holovid theaters, and restaurants cram this
      vibrant district. Neon signs advertise everything from Twi'lek dancers
      to zero-g sportball matches. CorSec maintains a visible presence but
      tolerates most activities. The real trouble happens in the alleys
      behind the main strip.
    zone: coronet_city
    map_x: 0.4
    map_y: 0.55
    properties:
      lighting: dim

  - id: 104
    slug: coronet_city_residential_quarter
    name: "Coronet City - Residential Quarter"
    short_desc: "A middle-class residential district with tree-lined streets."
    description: >-
      Two and three-story residential buildings face quiet streets shaded by
      Corellian oaks. Children play in small parks. Neighbors know each
      other by name. Compared to the rest of the galaxy, life here seems
      almost peaceful. Almost — CorSec patrols remind everyone that peace
      requires vigilance.
    zone: coronet_city
    map_x: 0.45
    map_y: 0.18

  - id: 105
    slug: coronet_city_central_plaza
    name: "Coronet City - Central Plaza"
    short_desc: "A grand public square at the intersection of Coronet's main avenues."
    description: >-
      Fountains spray arcs of water into the mild Corellian air. A monument
      to the original Corellian settlers stands at the center — a stylized
      starship pointing skyward. Cafes and government buildings ring the
      perimeter. This is where Corellians gather for festivals, protests,
      and the annual CEC ship christening ceremonies.
    zone: coronet_city
    map_x: 0.48
    map_y: 0.28

  - id: 106
    slug: coronet_city_corsec_headquarters
    name: "Coronet City - CorSec Headquarters"
    short_desc: The imposing headquarters of the Corellian Security Force.
    description: >-
      The Corellian Security Force — CorSec — operates from this
      fortress-like building in the government district. Turbolaser
      emplacements are concealed in the architecture. Inside, investigators
      and agents coordinate across the entire Corellian system. CorSec has a
      reputation for competence and independence.
    zone: coronet_gov
    map_x: 0.55
    map_y: 0.22
    properties:
      cover_max: 2

  - id: 107
    slug: coronet_city_government_district
    name: "Coronet City - Government District"
    short_desc: The administrative heart of the Corellian system.
    description: >-
      Grand buildings in traditional Corellian style house the planetary
      government, trade commissions, and diplomatic missions. Fountains and
      parkland provide green space between the stone structures. The
      Diktat's palace is visible on the hill above, its spires catching the
      afternoon sun.
    zone: coronet_gov
    map_x: 0.42
    map_y: 0.25

  - id: 108
    slug: coronet_city_hall_of_justice
    name: "Coronet City - Hall of Justice"
    short_desc: The Corellian judicial complex where both civil and criminal cases are heard.
    description: >-
      Ornate columns frame the entrance to this centuries-old building.
      Corellian justice is famously independent — even the Empire has
      struggled to fully subordinate the local courts. Barristers in
      traditional robes argue cases while CorSec officers escort defendants
      through side corridors.
    zone: coronet_gov
    map_x: 0.52
    map_y: 0.18

  - id: 109
    slug: coronet_city_cec_worker_district
    name: "Coronet City - CEC Worker District"
    short_desc: A residential and commercial area serving the shipyard workforce.
    description: >-
      Modest but well-maintained housing blocks line streets named after
      famous Corellian ships. CEC provides housing subsidies, and the
      district has a strong community identity. Cantinas, shops, and
      recreational facilities cater to shift workers. The orbital gantries
      are visible from every window.
    zone: coronet_industrial
    map_x: 0.65
    map_y: 0.35

  - id: 110
    slug: coronet_city_shipyard_ground_facility
    name: "Coronet City - Shipyard Ground Facility"
    short_desc: "The surface component of CEC's massive shipbuilding operation."
    description: >-
      Assembly halls the size of hangar bays house components too large to
      manufacture in orbit. Hyperdrive cores, bridge modules, and hull
      plating wait for orbital transfer. Security is tight — CEC's designs
      are among the most pirated in the galaxy. Workers wear orange
      coveralls with clearance badges.
    zone: coronet_industrial
    map_x: 0.75
    map_y: 0.35

  - id: 111
    slug: coronet_city_drall_quarter
    name: "Coronet City - Drall Quarter"
    short_desc: "A small enclave of Drall, the diminutive scholarly species native to the Corellian system."
    description: >-
      The furry, bearlike Drall maintain a quiet quarter near the industrial
      district. Their dwellings are built to Drall scale — uncomfortably
      small for most Humans. The quarter houses the finest library on
      Corellia, maintained by Drall scholars who have catalogued Corellian
      history for millennia. The smells of old books and brewing tea drift
      from open doorways.
    zone: coronet_industrial
    map_x: 0.65
    map_y: 0.45

  - id: 112
    slug: coronet_city_selonian_tunnels_entry
    name: "Coronet City - Selonian Tunnels - Entry"
    short_desc: An entrance to the network of tunnels maintained by the Selonian community.
    description: >-
      The Selonians — tall, sleek-furred beings resembling otters — have
      burrowed an extensive tunnel network beneath Coronet City. This
      entrance, marked with Selonian pictographs, descends into their
      communal warrens. Non-Selonians are tolerated in the upper tunnels but
      venturing deeper requires an escort. The Selonians are fiercely
      protective of their dens.
    zone: coronet_industrial
    map_x: 0.75
    map_y: 0.45

  - id: 113
    slug: coronet_city_old_quarter_market
    name: "Coronet City - Old Quarter Market"
    short_desc: "An open-air market in the historic Old Quarter."
    description: >-
      Cobblestone streets and ancient stone archways frame a lively market.
      Local farmers sell Corellian produce, fishermen bring in catches from
      the coast, and craftspeople display handmade goods. The smells of
      roasting meat and fresh bread compete with the salt breeze from the
      nearby sea.
    zone: coronet_old_quarter
    map_x: 0.3
    map_y: 0.35

  - id: 114
    slug: coronet_city_old_quarter_back_streets
    name: "Coronet City - Old Quarter Back Streets"
    short_desc: "Narrow lanes behind the Old Quarter market, less patrolled than the main streets."
    description: >-
      These winding alleys are where Coronet's less legitimate business
      happens. Fences operate from back rooms, slicers offer their services
      from nondescript doorways, and small-time smugglers arrange drops.
      CorSec knows about these operations but focuses resources on bigger
      threats. An unspoken truce keeps violence to a minimum — bad for
      everyone's business.
    zone: coronet_old_quarter
    map_x: 0.28
    map_y: 0.45
    properties:
      cover_max: 1
      lighting: dim

  - id: 115
    slug: coronet_city_the_spearhead_tavern
    name: "Coronet City - The Spearhead Tavern"
    short_desc: "A rough dockworkers' pub in the Old Quarter, known for information trading."
    description: >-
      Named for the old Corellian warship class, this tavern caters to a
      rougher crowd than the Slice. Dockworkers, low-level smugglers, and
      off-duty CorSec officers drink side by side. The barkeep is rumored to
      be a former Rebel operative. The back room is available for private
      meetings — fifty credits, no questions.
    zone: coronet_old_quarter
    map_x: 0.22
    map_y: 0.35

  - id: 116
    slug: coronet_city_coastal_promenade
    name: "Coronet City - Coastal Promenade"
    short_desc: "A seawall walkway along Coronet's southern coast."
    description: >-
      Salt wind carries the scent of the Corellian sea. Fishing boats bob in
      a small harbor. The promenade offers views of the coastline stretching
      west toward the agricultural regions. At night, the orbital shipyards
      trace bright arcs across the sky. Old Corellians come here to watch
      the ships and remember when the galaxy was smaller.
    zone: coronet_old_quarter
    map_x: 0.22
    map_y: 0.52

  - id: 117
    slug: coronet_city_the_golden_orbit_casino
    name: "Coronet City - The Golden Orbit Casino"
    short_desc: "An upscale casino in Blue Sector, popular with visiting merchants."
    description: >-
      Crystal chandeliers and polished wood give the Golden Orbit a veneer
      of respectability. Sabacc tables, chance cubes, and jubilee wheels
      fill the main floor. High-stakes games happen upstairs by invitation.
      The house always wins, but the Corellian brandy makes losing almost
      pleasant.
    zone: coronet_city
    map_x: 0.5
    map_y: 0.55

  - id: 118
    slug: coronet_city_mechanics_guild_hall
    name: "Coronet City - Mechanics' Guild Hall"
    short_desc: "The headquarters of the Coronet City chapter of the Mechanics' Guild."
    description: >-
      Workbenches, diagnostic terminals, and tool racks fill this functional
      space. Guild members gather here to share techniques, post job
      listings, and socialize. A notice board displays current contracts
      from CEC, independent ship owners, and the occasional 'no questions
      asked' repair job. Guild dues are 100 credits per month, but the
      discount on parts makes it worthwhile.
    zone: coronet_industrial
    map_x: 0.72
    map_y: 0.3

  - id: 119
    slug: coronet_city_venn_kators_forge
    name: "Coronet City - Venn Kator's Forge"
    short_desc: "A shipwright's workshop tucked behind the Mechanics' Guild Hall."
    description: >-
      The heat from plasma cutters and welding torches makes this room
      uncomfortably warm. Venn Kator — a grizzled Corellian with burn scars
      on both forearms — builds and modifies ship components with an
      artisan's eye. Half-finished projects hang from ceiling hooks.
      Technical readouts paper the walls. Kator only teaches those who
      demonstrate both skill and patience.
    zone: coronet_industrial
    map_x: 0.78
    map_y: 0.28

