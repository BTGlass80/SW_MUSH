planet: kessel
planet_display_name: Kessel
primary_city: Spice Mines
description: >-
  A barren prison-mining world infamous for its spice mines. Light gravity
  and thin atmosphere make every breath a labor. Imperial interest is light;
  criminal interest is heavy.

rooms:

  - id: 84
    slug: kessel_spaceport_landing_field
    name: "Kessel - Spaceport Landing Field"
    short_desc: "The heavily guarded landing field of Kessel's main spaceport."
    description: >-
      A flat expanse of permacrete surrounded by guard towers and sensor
      arrays. The thin atmosphere makes breathing labored without
      supplements. The Maw's gravitational distortion is visible as a
      shimmer on the horizon. Imperial shuttles and prison transports
      dominate the traffic.
    zone: kessel_station
    map_x: 0.45
    map_y: 0.1

  - id: 85
    slug: kessel_garrison_checkpoint
    name: "Kessel - Garrison Checkpoint"
    short_desc: An Imperial garrison checkpoint controlling access to the mines.
    description: >-
      Blast doors and ray shields funnel all traffic through scanners.
      Stormtroopers check identification with humorless efficiency. A
      holo-display lists current inmates and their work assignments. The
      walls are reinforced to withstand prisoner riots.
    zone: kessel_station
    map_x: 0.45
    map_y: 0.25

  - id: 86
    slug: kessel_administration_block
    name: "Kessel - Administration Block"
    short_desc: "The administrative center for Kessel's mining operations."
    description: >-
      Desks and data terminals fill this climate-controlled building — a
      stark contrast to the harsh conditions outside. Mining quotas,
      prisoner records, and shipment manifests scroll across screens. The
      warden's office occupies the top floor behind blast-proof
      transparisteel.
    zone: kessel_station
    map_x: 0.6
    map_y: 0.25

  - id: 87
    slug: kessel_mine_entrance_level_1
    name: "Kessel - Mine Entrance - Level 1"
    short_desc: "The primary entrance to Kessel's infamous spice mines."
    description: >-
      A massive tunnel mouth descends into darkness. Ore carts on magnetic
      rails emerge at regular intervals, filled with raw spice ore. The air
      is thick with glitterstim dust that sparkles in the floodlights.
      Miners shuffle past in chains, their eyes hollow.
    zone: kessel_mines
    map_x: 0.45
    map_y: 0.4
    properties:
      environment_hazard: {"type": "toxic_atmosphere", "severity": 1, "difficulty": 12}
      lighting: dim

  - id: 88
    slug: kessel_spice_processing_facility
    name: "Kessel - Spice Processing Facility"
    short_desc: A heavily secured facility where raw spice is refined.
    description: >-
      Sealed clean rooms behind transparisteel walls house the delicate
      refining process. Workers in protective suits handle crystallized
      glitterstim with precise instruments. Armed guards watch from catwalks
      above. The refined product is worth more than its weight in aurodium.
    zone: kessel_mines
    map_x: 0.6
    map_y: 0.4
    properties:
      environment_hazard: {"type": "toxic_atmosphere", "severity": 1, "difficulty": 12}

  - id: 89
    slug: kessel_prisoner_barracks
    name: "Kessel - Prisoner Barracks"
    short_desc: "Bleak dormitories housing Kessel's forced labor population."
    description: >-
      Row upon row of bare metal bunks. The air recyclers barely function.
      Prisoners huddle in groups defined by species, crime, or simple
      survival. Guard droids patrol on fixed routes. A small infirmary
      treats only injuries that would reduce work output.
    zone: kessel_mines
    map_x: 0.45
    map_y: 0.18
    properties:
      cover_max: 0
      environment_hazard: {"type": "toxic_atmosphere", "severity": 2, "difficulty": 15}

  - id: 90
    slug: kessel_black_market_tunnel
    name: "Kessel - Black Market Tunnel"
    short_desc: A hidden tunnel network where guards and prisoners trade illegally.
    description: >-
      Behind a false wall in a maintenance corridor, a cramped network of
      tunnels hosts Kessel's worst-kept secret. Guards sell ration
      supplements, prisoners trade refined spice samples, and information
      changes hands in whispers. Everyone pretends this place doesn't exist.
    zone: kessel_mines
    map_x: 0.55
    map_y: 0.18
    properties:
      environment_hazard: {"type": "toxic_atmosphere", "severity": 1, "difficulty": 12}

  - id: 91
    slug: kessel_observation_deck
    name: "Kessel - Observation Deck"
    short_desc: A windswept observation platform overlooking the Maw.
    description: >-
      Transparisteel panels offer a terrifying view of the Maw — a cluster
      of black holes whose gravitational pull warps the stars themselves.
      Navigating the Kessel Run means skirting this cosmic horror. On clear
      days, the accretion disks glow with captured starlight. The view is
      humbling.
    zone: kessel_station
    map_x: 0.68
    map_y: 0.2
    properties:
      environment_hazard: {"type": "toxic_atmosphere", "severity": 2, "difficulty": 15}

  - id: 92
    slug: kessel_deep_mines_shaft_junction
    name: "Kessel - Deep Mines - Shaft Junction"
    short_desc: "Where the maintained mine shafts give way to older, abandoned tunnels."
    description: >-
      The magnetic rail ends here. Beyond this point, the tunnels were
      sealed decades ago after a series of energy spider attacks killed an
      entire work crew. Someone has cut through the blast door. The air is
      thinner, the glitterstim dust thicker. Bioluminescent spice deposits
      glow in the walls like trapped stars.
    zone: kessel_deep_mines
    map_x: 0.45
    map_y: 0.55
    properties:
      environment_hazard: {"type": "radiation", "severity": 1, "difficulty": 15}
      lighting: dark

  - id: 93
    slug: kessel_deep_mines_energy_spider_caverns
    name: "Kessel - Deep Mines - Energy Spider Caverns"
    short_desc: Deep caverns where dangerous energy spiders guard raw glitterstim.
    description: >-
      The natural caverns glow with bioluminescence and raw spice deposits.
      Energy spiders — deadly silicon-based predators — spin webs of pure
      energy between the stalactites. Miners work in teams, harvesting spice
      while lookouts watch for spider movement. Death is common here.
    zone: kessel_deep_mines
    map_x: 0.58
    map_y: 0.58
    properties:
      cover_max: 0
      environment_hazard: {"type": "radiation", "severity": 2, "difficulty": 18}
      lighting: dark

  - id: 94
    slug: kessel_deep_mines_smugglers_contact_point
    name: "Kessel - Deep Mines - Smuggler's Contact Point"
    short_desc: A concealed meeting point used by spice smugglers.
    description: >-
      Tucked behind the spaceport's maintenance hangars, this prefab shelter
      serves as the contact point for smugglers brave or desperate enough to
      run Kessel spice. A coded signal on frequency 1138 announces available
      cargo. Payment is always in advance, and in hard credits only.
    zone: kessel_deep_mines
    map_x: 0.3
    map_y: 0.1
    properties:
      environment_hazard: {"type": "radiation", "severity": 1, "difficulty": 15}

  - id: 95
    slug: kessel_deep_mines_collapsed_gallery
    name: "Kessel - Deep Mines - Collapsed Gallery"
    short_desc: A partially collapsed cavern revealing ancient geological formations.
    description: >-
      A cave-in opened this gallery to a natural cavern system that predates
      the mining operation by millennia. Crystal formations of unknown
      composition line the walls, some pulsing with faint internal light.
      Geological survey equipment has been abandoned here — whoever was
      studying these formations left in a hurry. The crystals are worth a
      fortune to the right buyer.
    zone: kessel_deep_mines
    map_x: 0.4
    map_y: 0.65
    properties:
      environment_hazard: {"type": "radiation", "severity": 2, "difficulty": 18}
      lighting: dark

