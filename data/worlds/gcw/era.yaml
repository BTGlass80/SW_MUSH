# data/worlds/gcw/era.yaml
# Galactic Civil War Era — Foundation Configuration
# Schema version 1 — per world_data_extraction_design_v1.md §5
#
# This file is the GCW counterpart to data/worlds/clone_wars/era.yaml.
# It registers the GCW lore/director_config/ambient_events YAMLs so the
# era loader picks them up when active_era == gcw.
#
# Until Drop 6a.2/6a.3/6a.4 ship, this file is inert at runtime — the
# engine still reads SEED_ENTRIES, DEFAULT_INFLUENCE, etc. from
# hardcoded constants in engine/world_lore.py and engine/director.py.
# The era YAML is the regression-test asset proving byte-equivalence.

schema_version: 1

era:
  code: gcw
  name: "Galactic Civil War"
  tagline: "The Empire stands. The Rebellion fights. The galaxy chooses sides."
  description: >
    Approximately 0 ABY, between A New Hope and The Empire Strikes Back.
    The Galactic Empire rules through fear; the Rebel Alliance fights from
    hidden bases. The Hutt Cartel profits from both sides. Mos Eisley is
    a backwater spaceport on Tatooine where Imperial authority is thin
    and the Hutts hold real power.
  timeline_reference: "~0 ABY"
  canon_era: "Galactic Civil War (Original Trilogy)"
  sourcebook_refs:
    - "WEG40092 (Imperial Sourcebook)"
    - "WEG40069 (GG7 Mos Eisley)"
    - "WEG40124 (GG1 A New Hope)"
    - "WEG40027 (GG6 Tramp Freighters)"
    - "WEG40048 (GM Screen)"
    - "WEG40093 (SW Sourcebook 2nd Ed)"

policy:
  # ── Force policy ─────────────────────────────────────────────────────────
  # GCW: Jedi Order is destroyed. Force-sensitives are hunted. Public Force
  # use draws Imperial attention. Lightsabers are extreme contraband.
  force_chargen_allowed: false
  force_sensitive_chargen: forbidden       # No PC Jedi in GCW launch scope
  lightsaber_availability: extreme_contraband
  force_suppression: inquisitorial         # Active Imperial pressure
  dark_side_detectability: medium

  # ── Faction set ──────────────────────────────────────────────────────────
  # Must match VALID_FACTIONS frozenset in engine/director.py.
  factions:
    - imperial
    - rebel
    - criminal
    - independent
  npc_only_factions: []

  # ── Starting defaults ────────────────────────────────────────────────────
  starting_room_slug: westport_arrivals
  starting_faction: independent
  starting_credits_default: 500

  # ── Era flavor ──────────────────────────────────────────────────────────
  default_trooper_type: stormtrooper
  default_imperial_substitute: imperial    # GCW IS the imperial axis
  default_rebel_substitute: rebel
  hutt_cartel_stance: criminal_dominant

  # ── Director AI knobs ────────────────────────────────────────────────────
  director_config_ref: director_config.yaml

content_refs:
  zones: zones.yaml                        # GCW zones — TBD; engine reads from build_mos_eisley.py today
  organizations: organizations.yaml        # GCW orgs — TBD; engine reads from data/organizations.yaml today
  planets:                                 # GCW Mos Eisley + Nar Shaddaa + Kessel + Corellia
    - planets/tatooine.yaml                # 54 rooms
    - planets/nar_shaddaa.yaml             # 30 rooms
    - planets/kessel.yaml                  # 12 rooms
    - planets/corellia.yaml                # 24 rooms

  # ── NPCs (per F.1a — era-aware NPC loader) ──────────────────────────────
  # `npcs` is a list of files that engine/npc_loader.py loads in order.
  # Loading order:
  #   1. ../../npcs_gg7.yaml    — Era-agnostic GG7 base roster (50 NPCs at
  #                              Mos Eisley locations; Imperial-keyed entries
  #                              are suppressed in CW per its replaces: map).
  #   2. npcs_planet.yaml       — GCW planet-specific NPCs across Tatooine
  #                              outskirts/wastes, Nar Shaddaa, Kessel,
  #                              Corellia (43 entries; F.1a extraction).
  #   3. npcs_hireable.yaml     — Hireable crew NPCs at cantinas/spaceports
  #                              (4 entries; F.1a extraction). File location
  #                              identifies the role; no per-entry flag.
  # The path "../../npcs_gg7.yaml" is era-relative; resolved against the
  # data/worlds/gcw/ directory.
  npcs:
    - ../../npcs_gg7.yaml
    - npcs_planet.yaml
  npcs_hireable: npcs_hireable.yaml

  # ── Ships (per F.1b — era-aware ship loader) ────────────────────────────
  # Pre-spawned ships docked at bays across the four GCW planets. Loaded
  # by engine/ship_loader.py at world-build time. CW has its own analogous
  # file at data/worlds/clone_wars/starships.yaml — F.1b's loader will
  # consume both schemas (CW's has ship templates per registry policy;
  # this file is the GCW spawn manifest).
  ships: ships.yaml

  # ── Test character (per F.1c — era-aware test character loader) ─────────
  # Dev/admin god-mode account for testing. Skips chargen + tutorial.
  # GCW: Test Jedi at Docking Bay 94. CW will populate its own when the
  # era pivot lands (CW's era.yaml already declares this slot).
  test_character: test_character.yaml

  # ── Director / Lore data-fication (Drop 6a) ─────────────────────────────
  # These three files are consumed by Drop 6a's engine refactor. Until 6a.2
  # /6a.3/6a.4 land, they are inert at runtime — engine still reads from
  # source constants. They are the regression-test asset proving byte-
  # equivalence at the parsed-dict level.
  lore: lore.yaml
  director_config: director_config.yaml
  ambient_events: ambient_events.yaml

  # ── Housing lot inventory (per F.5a.1, Apr 29 2026) ─────────────────────
  # Tier 2 faction-quarter mappings. Byte-equivalent extraction of
  # engine/housing.py::FACTION_QUARTER_TIERS (GCW factions: empire, rebel,
  # hutt). T1/T3/T4/T5 inventories come in F.5a.2.
  # Until F.5b's data-fy refactor lands, this YAML is data-only — engine
  # still reads from the in-Python literal.
  housing_lots: housing_lots.yaml

  # ── Chargen templates (per F.7, Apr 30 2026) ────────────────────────────
  # 7 GCW chargen archetypes (smuggler, bounty_hunter, rebel_pilot,
  # scoundrel, technician, jedi_apprentice, soldier). Byte-equivalent
  # to the in-Python TEMPLATES literal at engine/creation.py L42–L101
  # under F.7 Phase 1; F.7.b Phase 2 retires the literal once
  # byte-equivalence is proven in production.
  chargen_templates: chargen_templates.yaml

# ═══════════════════════════════════════════════════════════════════════
# REGISTRY POLICY
# ═══════════════════════════════════════════════════════════════════════
# GCW uses the global data/starships.yaml unfiltered. No exclusions.
registry_policy:
  starship_excluded_templates: []

# Policy enforcement flags — advisory until Drop 0 lands the world-extraction
# refactor. CW already enforces several of these.
policy_enforcement:
  force_chargen_allowed_is_enforced: true
  force_sensitive_chargen_is_enforced: true
  lightsaber_availability_is_enforced: true
  starting_faction_is_enforced: true
