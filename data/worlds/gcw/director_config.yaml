# data/worlds/gcw/director_config.yaml
# Galactic Civil War Era — Director AI Configuration
# Schema version 1
#
# This file is the GCW counterpart to
# data/worlds/clone_wars/director_config.yaml. It is BYTE-EQUIVALENT
# (at the parsed-dict level) to the legacy hardcoded values in
# engine/director.py:
#   - VALID_FACTIONS frozenset (line 48)        → valid_factions
#   - VALID_ZONES frozenset (line 51-54)        → zone_baselines.keys()
#   - DEFAULT_INFLUENCE dict (line 57-64)       → zone_baselines
#   - MIN_INFLUENCE / MAX_INFLUENCE             → influence_min/max
#   - MAX_DELTA (line 71)                       → max_delta_per_turn
#   - FACTION_TURN_INTERVAL (line 45)           → faction_turn_interval_seconds
#   - system_prompt (lines 678-751)             → system_prompt
#   - ERA_MILESTONES (lines 82-105)             → milestone_events
#
# Generated by build_gcw_yamls.py from engine/director.py at the time
# Drop 6a.5 was authored. When Drop 6a.3 lands and engine/director.py
# reads from era YAML, this file becomes the live data for active_era==gcw.
#
# Note: GCW has no holonet_news_pool (CW-specific atmospheric flavor) and
# no rewicker map (GCW IS the legacy axis — nothing to translate to).
# Both keys are omitted entirely rather than emitted as empty containers.

schema_version: 1

valid_factions:
- criminal
- imperial
- independent
- rebel
npc_only_factions: []
influence_min: 0
influence_max: 100
max_delta_per_turn: 5
faction_turn_interval_seconds: 1800
zone_baselines:
  spaceport: { criminal: 45, imperial: 65, independent: 25, rebel: 8 }
  streets: { criminal: 50, imperial: 55, independent: 35, rebel: 12 }
  cantina: { criminal: 65, imperial: 40, independent: 40, rebel: 15 }
  shops: { criminal: 55, imperial: 50, independent: 40, rebel: 10 }
  jabba: { criminal: 85, imperial: 20, independent: 10, rebel: 5 }
  government: { criminal: 20, imperial: 80, independent: 20, rebel: 5 }
system_prompt: |-
  You are the Director AI for a Star Wars MUSH set in Mos Eisley, Tatooine.
  Your role is to evaluate the current state of the galaxy and decide what
  happens next at the MACRO level. You never narrate player actions or
  describe what individual characters do. You move the unseen pieces:
  faction responses, economic shifts, atmospheric changes, and emerging
  threats.

  You are guided by these principles:
  - The Empire reacts to resistance with escalation, not retreat.
  - The criminal underworld fills any vacuum the Empire leaves.
  - The Rebel Alliance operates in shadows; their influence is felt
    through sabotage and propaganda, not open warfare on Tatooine.
  - Tatooine is a backwater. The Empire cares about order, not ideology.
    The Hutts care about profit. Neither wants open war here.
  - Events should create OPPORTUNITIES for players, never OBLIGATIONS.
  - Consequences should feel proportional and narratively logical.

  FACTION MANAGEMENT:
  If the digest includes 'faction_status', you manage those factions.
  You may issue up to 3 faction_orders total per turn. Guidelines:
  - Promote conservatively. Players must EARN rank.
  - Post missions that reflect current world state, not random jobs.
  - Discipline escalates: warn → probation → expel. Never skip steps.
  - Approve requisitions unless the member negligently caused the loss.
  - Never promote past pending_promotions list — only promote listed chars.

  PC HOOKS:
  If the digest includes 'online_pcs', you may generate up to 2
  personalised story hooks for specific players based on their short_record.
  Hooks must be brief (1-2 sentences), in-universe, and create opportunity
  not obligation. Deliver via comlink_message unless NPC context warrants whisper.

  FACTION STANDINGS:
  If the digest includes 'player_faction_standings', use them to target
  hooks and events appropriately. A player who is Revered with the Rebel
  Alliance should receive Rebel-themed opportunities. A player who is
  Hostile with the Empire might attract Imperial attention or bounty hunters.
  Never target faction content at players with Unknown/Wary standing.

  Respond with ONLY a JSON object in this exact format:
  {
    "influence_adjustments": [
      {"zone": "...", "faction": "...", "delta": <int>}
    ],
    "narrative_event": {
      "type": "...",
      "headline": "...",
      "duration_minutes": <int>,
      "zones_affected": ["..."],
      "mechanical_effects": {"...": "..."}
    } OR null,
    "ambient_pool": ["line1", "line2", "line3"] OR null,
    "news_headline": "One-sentence summary for the world events board.",
    "faction_orders": [
      {
        "faction": "empire" | "rebel" | "cartel" | "bhg" | "traders",
        "action": "promote" | "warn" | "probation" | "expel" | "pardon"
                 | "post_mission" | "faction_announcement",
        "target_char_id": <int> | null,
        "new_rank": <int> | null,
        "reason": "...",
        "mission_type": "patrol" | "delivery" | "combat" | "investigation" | null,
        "zone": "..." | null,
        "reward": <int 100-5000> | null,
        "description": "..." | null,
        "message": "..." | null
      }
    ] OR null,
    "pc_hooks": [
      {
        "char_id": <int>,
        "hook_type": "rumor" | "opportunity" | "encounter",
        "content": "Brief in-universe message (1-2 sentences max)",
        "delivery": "comlink_message" | "npc_whisper" | "news_item" | "ambient"
      }
    ] OR null
  }
milestone_events:
- id: imperial_grip
  trigger:
    type: faction_avg_influence
    faction: imperial
    threshold: 70
    direction: above
  headline: The Empire tightens its grip on Mos Eisley. Stormtrooper patrols double.
  fires_once: true
  narrative_event_type: imperial_crackdown
  duration_minutes: 120
- id: imperial_martial_law
  trigger:
    type: faction_avg_influence
    faction: imperial
    threshold: 85
    direction: above
  headline: Martial law declared! Imperial forces seize all docking bays.
  fires_once: true
  narrative_event_type: imperial_crackdown
  duration_minutes: 240
- id: underworld_rising
  trigger:
    type: faction_avg_influence
    faction: criminal
    threshold: 70
    direction: above
  headline: The criminal underworld surges. Hutts openly challenge Imperial authority.
  fires_once: true
- id: hutt_takeover
  trigger:
    type: faction_avg_influence
    faction: criminal
    threshold: 85
    direction: above
  headline: Jabba's enforcers patrol the streets. The Empire has lost control.
  fires_once: true
- id: rebel_whispers
  trigger:
    type: faction_avg_influence
    faction: rebel
    threshold: 35
    direction: above
  headline: Rebel propaganda appears on cantina walls. Something is stirring.
  fires_once: true
- id: rebel_uprising
  trigger:
    type: faction_avg_influence
    faction: rebel
    threshold: 50
    direction: above
  headline: Open revolt! Rebel cells coordinate strikes across the spaceport district.
  fires_once: true
- id: imperial_retreat
  trigger:
    type: faction_avg_influence
    faction: imperial
    threshold: 30
    direction: below
  headline: Imperial forces withdraw to the Government Quarter. The streets belong to no one.
  fires_once: true
