# data/worlds/gcw/test_character.yaml
# GCW Era — Test character / dev account.
# Schema version 1.
#
# Auto-created on first build to provide an admin+builder god-mode account
# for development testing. Skips chargen + tutorial.
#
# Schema:
#   account              — username, password (PLAINTEXT — bcrypt'd at build time)
#   account.is_admin     — bool, grants admin command access
#   account.is_builder   — bool, grants build commands
#   character.name       — display name
#   character.species
#   character.template   — chargen template key (jedi, scout, smuggler, etc.)
#   character.faction_id — starting faction code
#   character.starting_room — name of the room to spawn in (resolved against
#                             the world bundle's room_name_map)
#   character.description
#   character.credits
#   character.character_points / force_points / dark_side_points / wound_level
#   character.attributes      — D6 dice values + game state flags
#   character.skills          — skill name -> dice
#   character.equipment       — equipped slot blob (lightsaber etc.)
#   character.inventory       — items + resources
#
# Loaded by engine/test_character_loader.py via era.yaml's
# content_refs.test_character.

