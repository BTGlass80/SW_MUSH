# data/worlds/gcw/chargen_templates.yaml
# GCW Chargen Templates — Schema v1
#
# F.7 (Apr 30 2026): byte-equivalent extraction of the in-Python
# TEMPLATES literal at engine/creation.py L42–L101. Each entry below
# matches its in-Python counterpart exactly — same key, label, species,
# attribute pools, and skill pools. F.7 byte-equivalence tests
# (tests/test_f7_chargen_templates_loader.py::TestGCWByteEquivalence)
# enforce this parity.
#
# Schema:
#   templates:
#     <key>:                       # snake_case template key
#       label: <str>               # Display name in the chargen wizard
#       species: <str>             # Default species (matches species
#                                  # registry; usually "Human")
#       attributes:                # 6-attribute D-pool literal map
#         dexterity:    "<DnD+m>"  # WEG dice pool format: e.g. "3D+2"
#         knowledge:    "<DnD+m>"
#         mechanical:   "<DnD+m>"
#         perception:   "<DnD+m>"
#         strength:     "<DnD+m>"
#         technical:    "<DnD+m>"
#       skills:                    # Skill -> bonus dice (over attribute)
#         <skill_key>:  "<DnD+m>"
#
# Maintenance note: when adding/editing a template, also update
# engine/creation.py's _LEGACY_TEMPLATES_GCW (F.7's parallel-fallback
# constant, deleted in F.7.b) to maintain byte-equivalence until
# Phase 2 retires the legacy literal.

