    trigger: {event: "chain_graduation", count: 1, chain_id: "separatist_commando"}

  - key: sleeper_in_the_capital
    name: "Sleeper in the Capital"
    description: "Graduated the Separatist Agent tutorial chain. Your cover holds; Republic eyes don't see you."
    category: profession
    icon: "🎭"
    cp_reward: 3
    trigger: {event: "chain_graduation", count: 1, chain_id: "separatist_agent"}

  - key: first_contract
    name: "First Contract"
    description: "Graduated the Bounty Hunter tutorial chain on Nar Shaddaa. The Guild knows your face."
    category: profession
    icon: "💰"
    cp_reward: 3
    trigger: {event: "chain_graduation", count: 1, chain_id: "bounty_hunter"}

  - key: first_run
    name: "First Run"
    description: "Graduated the Smuggler tutorial chain. Hutt Cartel files you under 'reliable'."
    category: profession
    icon: "🚀"
    cp_reward: 3
