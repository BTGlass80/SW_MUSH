  # T3.24 generalized-questline arc (2026-06-22): the first ACCESSIBLE
  # (non-t5, non-tutorial) questline. Earned by solving "The Ghost
  # Shipment" for the freight broker Yelza Korrin on Nar Shaddaa. Lower
  # cp_reward than the t5 trainer chains (3 vs 5): this is open freelance
  # side-content, not a rep-gated end-game trial.
  - key: ghost_shipment_solved
    name: "The Ghost Shipment"
    description: "Tracked down the skimmer bleeding Yelza Korrin's freight runs dry on Nar Shaddaa. A freelance reputation starts with one finished job."
    category: profession
    icon: "📦"
    cp_reward: 3
    trigger: {event: "chain_graduation", count: 1, chain_id: "nar_freight_ghost_shipment"}

  # T3.24 generalized-questline arc (2026-06-25): the SECOND accessible
  # (non-t5, non-tutorial) questline. Earned by breaking "the Wheel" — a
  # rigged-sabacc loan racket — for the market vendor Dorae Vint on Mos
  # Eisley. Same lower-tier band as the Ghost Shipment (cp_reward 3 vs the
  # t5 trainer chains' 5): open freelance side-content, not a rep-gated trial.
  - key: crooked_wheel_busted
    name: "The Crooked Wheel"
    description: "Exposed the rigged sabacc table bleeding Mos Eisley's market vendors dry and ran the Wheel's collector to ground. Some games only end when somebody flips the table."
    category: profession
    icon: "🎲"
    cp_reward: 3
    trigger: {event: "chain_graduation", count: 1, chain_id: "mos_eisley_crooked_wheel"}

  # T3.24 generalized-questline arc (2026-06-25): the THIRD accessible
  # (non-t5, non-tutorial) questline. Earned by tracing a grabbed courier
  # through Coruscant's Southern Underground and freeing the kid from a
  # Trandoshan enforcer for the fixer Sashi Renko. Same lower-tier band as
  # the Ghost Shipment / Crooked Wheel (cp_reward 3 vs the t5 trainer
  # chains' 5): open freelance side-content, not a rep-gated trial.
  - key: lost_courier_found
    name: "The Lost Courier"
    description: "Talked a frightened warren open, slipped a watched bolt-hole, and brought a fixer's grabbed courier home alive from the Coruscant underworld. Some jobs are only simple until somebody disappears."
    category: profession
    icon: "🛰️"
    cp_reward: 3
    trigger: {event: "chain_graduation", count: 1, chain_id: "coruscant_lower_lost_courier"}
