  # ══════════════════════════════════════════════════════════════
  # PROFESSION (7 achievements — F.8.c.2.d May 2026)
  #
  # One per unlocked CW tutorial chain. Awarded by chain_rewards
  # at graduation; fires through engine/chain_rewards.py's
  # apply_graduation_rewards() rather than via event-matching.
  # The `trigger.event = "chain_graduation"` field is informational
  # only — the catalog dispatcher does not auto-match this event;
  # chain_rewards passes the achievement dict to
  # _complete_achievement() directly when the matching chain
  # graduates.
  #
  # Pre-F.8.c.2.d these keys were referenced in chains.yaml's
  # `graduation.achievements` list but absent from this catalog;
  # chain_rewards stamped them onto chargen_notes.graduation_achievements
  # as a fallback. With these entries authored, the catalog mark
  # path now fires alongside the chargen_notes stamp.
  # ══════════════════════════════════════════════════════════════

  - key: sworn_to_the_republic
    name: "Sworn to the Republic"
    description: "Graduated the Republic Soldier tutorial chain on Kamino. Major Tarrn signed off."
    category: profession
    icon: "🪖"
    cp_reward: 3
    trigger: {event: "chain_graduation", count: 1, chain_id: "republic_soldier"}

  - key: recruited_in_shadow
    name: "Recruited in Shadow"
    description: "Graduated the Republic Intelligence tutorial chain. Director Vell knows your name now."
    category: profession
    icon: "🕵️"
    cp_reward: 3
    trigger: {event: "chain_graduation", count: 1, chain_id: "republic_intelligence"}

  - key: raised_the_red_flag
