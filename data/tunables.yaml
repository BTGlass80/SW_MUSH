# SW_MUSH game balance tunables  (T3.19 Phase 0)
#
# Dotted keys mirror the TUN.* comment conventions already in engine/*.py.
# A missing key (or an empty / absent file) falls back to the hardcoded
# default at each call site — so this file is always safe to leave empty.
#
# Format:  <namespace>.<knob>: <value>
# Example: trade.price_demand_multiplier: 1.40
#
# Phase 1 (2026-06-15): HIGH-priority economy cluster externalized.
# Each value below EQUALS the in-code default at its call site, so this
# file is behavior-identical to omitting it — operators tune from here.
# Every consumer reads via get_tunable("<key>", <in-code default>) at the
# USE SITE (not module import), so edits take effect on the next load.
#
# Edit via string-replacement only (never a yaml round-trip rewrite that
# could reformat entries or collapse comments).

# ── Trade (engine/trading.py) ──
trade.price_source_multiplier: 0.70   # sell price at a good's SOURCE planet (cheap)
trade.price_demand_multiplier: 1.40   # sell price at a good's DEMAND planet (premium)
trade.supply_refresh_seconds: 2700    # supply-pool refresh cadence (45 min)
trade.supply_max_luxury_goods: 6      # luxury_goods units per refresh (tightest cap)

# ── Mission rewards (engine/missions.py) ──
mission.reward_smuggling_max: 5000    # top of the smuggling pay band (lo stays 500)

# ── Bounty rewards (engine/bounty_board.py) ──
bounty.reward_superior_max: 10000     # top of the superior-tier bounty band (lo stays 3000)

# ── Player-to-player trade (parser/builtin_commands.py) ──
p2p.tax_pct: 5                        # percent sink on consented credit trades (floor 1cr)

# ── Faction commissary (engine/commissary.py) ──
commissary.sellback_rate: 0.50        # refund fraction on commissary sellback (<=50%, net loss)

# ── Telemetry sampling (engine/telemetry.py / skill_checks.py) ──
# Keep-rate for the highest-frequency telemetry chokepoint. 1.0 = capture
# every out-of-combat skill check (fine at launch's small population); lower
# it (e.g. 0.25) post-launch if the skill_check event stream gets noisy.
telemetry.skill_check_sample: 1.0     # fraction of skill checks emitted (0..1]
# Keep-rate for the command-frequency histogram (parser/commands.py). Every
# dispatched command emits one 'command' event at the chokepoint; 1.0 captures
# all of them at launch's small population. Lower it (e.g. 0.25) post-launch if
# the command stream gets noisy — the relative histogram is preserved under
# uniform sampling.
telemetry.command_sample: 1.0         # fraction of dispatched commands emitted (0..1]
# Keep-rate for the gambling-outcome stream (parser/sabacc_commands.py). Each
# resolved Sabacc hand emits one 'gamble' event with the win/loss split, bet,
# and rake breakdown — the house-edge tuning signal. Cooldown-bounded per
# player so 1.0 is fine at launch; lower it if the stream gets noisy.
telemetry.gamble_sample: 1.0          # fraction of gambling hands emitted (0..1]
# Keep-rate for the faction-reputation stream (engine/organizations.py). Each
# landed rep change (member rep_score + non-member faction_rep, incl. the
# cross-faction penalty recursion) emits one 'faction_rep' event with the
# delta, tier transition, and clamp flag — the progression/affiliation tuning
# signal. Bounded by player action so 1.0 is fine at launch; lower it if noisy.
telemetry.faction_rep_sample: 1.0     # fraction of rep changes emitted (0..1]
# Keep-rate for the player-to-player trade stream (parser/builtin_commands.py).
# Each completed `trade` emits one 'p2p_trade' event — credit transfers carry
# gross/net/tax (the p2p.tax_pct + velocity-alert tuning signal); item trades
# carry the bartered item (a flow credit_flow can't see). Bounded by the 2-min
# offer TTL + alt-trade block so 1.0 is fine at launch; lower it if noisy.
telemetry.p2p_trade_sample: 1.0       # fraction of completed P2P trades emitted (0..1]
# Keep-rate for the faction-commissary requisition stream (engine/commissary.py).
# Each completed requisition emits one 'commissary_txn' event: a buy carries the
# cost (sink) + the rank gate it cleared; a sellback carries the refund (faucet).
# The signal for tuning commissary stock costs + commissary.sellback_rate.
# Rank-gated + bounded by player action so 1.0 is fine at launch; lower if noisy.
telemetry.commissary_sample: 1.0      # fraction of commissary requisitions emitted (0..1]
# Keep-rate for the player-vendor marketplace stream (engine/vendor_droids.py).
# Each completed vendor-droid trade emits one 'vendor_txn' event: a buy carries
# price + the bargain/faction base_price delta + listing fee + city tax (so the
# seller's net is derivable); a buy-order sell carries the per-unit payout and
# quantity. The signal for tuning the shop price floor, listing-fee decay, and
# buy-order escrow. Bounded by player action so 1.0 is fine at launch; lower if noisy.
telemetry.vendor_sample: 1.0          # fraction of completed vendor trades emitted (0..1]
# Keep-rate for the player-housing economy stream (engine/housing.py). Each
# credit-moving housing transition emits one 'housing' event tagged by action:
# acquire (deposit+first-week sink), rent_paid (weekly-rent sink), rent_overdue
# (a tick that couldn't collect — weeks_overdue), checkout (deposit-refund
# faucet + a forfeited flag), and prestige (the cosmetic-tier sink). The signal
# for tuning TIER1_WEEKLY_RENT / TIER1_DEPOSIT / TIER1_EVICT_WEEKS — the
# acquire→rent→overdue→forfeit funnel + voluntary-checkout churn. Low-frequency
# (bounded by player action + the weekly tick) so 1.0 is fine; lower if noisy.
telemetry.housing_sample: 1.0         # fraction of housing transitions emitted (0..1]
# Keep-rate for the entertainer (cantina) credit faucet (parser/entertainer_commands.py).
# Each `perform` emits one 'entertainer_perform' event tagged by outcome
# (critical/success/partial/fail): the payout the ledger logs plus the depth it
# can't rejoin — the fatigue-bumped difficulty + fatigue_count (diminishing
# returns), the live-audience hub bonus (audience heads), and the cantina-brawl
# 2x flag. The signal for tuning the pay bounds (_BASE_PAY/_CRIT_PAY/_PARTIAL_PAY),
# the audience cap, the fatigue penalty, and the perform cooldowns. Bounded by
# player action + the 10-min cooldown so 1.0 is fine at launch; lower if noisy.
telemetry.entertainer_sample: 1.0     # fraction of performances emitted (0..1]
# Keep-rate for the player-healer medical-services economy (parser/medical_commands.py).
# Each resolved `healaccept` emits one 'medical_treatment' event tagged by outcome
# (critical/success/partial/fail/fumble): the healer→patient service transaction the
# credit ledger can't rejoin, plus the partial/failed treatments that move no credits
# and so are invisible to credit_flow entirely. Carries the skill roll vs the
# wound-scaled difficulty, the rate, and wound_before→wound_after — the signal for
# tuning _HEAL_DIFFICULTY and whether heal-for-hire is worth it vs a bacta tank.
# Low-frequency (player action + the 60s offer window) so 1.0 is fine; lower if noisy.
telemetry.medical_sample: 1.0         # fraction of treatments emitted (0..1]
# Keep-rate for the Hutt-cartel sabacc-den lifecycle (engine/dens.py). Each
# `+den establish` / `+den abandon` emits one 'den' event tagged by action: the
# setup-cost sink the ledger tags `sabacc_den_setup` plus the lifecycle the
# isolated credit row can't rejoin — the per-org establish→abandon churn and the
# setup-sink volume. The signal for tuning DEN_SETUP_COST / DEN_ESTABLISH_MIN_RANK
# against live @economy data. The rake faucet itself rides the sabacc `gamble`
# emitter. Very low-frequency (a ranked-cartel act) so 1.0 is fine.
telemetry.den_sample: 1.0             # fraction of den transitions emitted (0..1]
# Keep-rate for the PvP player-bounty economy (parser/pc_bounty_commands.py).
# Each post/stack/cancel/fulfill/void/expire emits one 'pc_bounty' event tagged
# by action: the closed PvP credit loop the per-tag credit rows (bounty_post /
# bh_bounty_payout / bounty_*_refund) can't rejoin into a contract lifecycle —
# the post→fulfil vs post→cancel/expire funnel, the escrow distribution against
# MAX_BOUNTY, and the posting/cancel fee-burn volume. The signal for tuning
# MIN_BOUNTY / MAX_BOUNTY / POSTING_FEE_PCT / CANCEL_FEE_PCT / BOUNTY_DURATION.
# Very low-frequency (a deliberate PvP act) so 1.0 is fine.
telemetry.pc_bounty_sample: 1.0       # fraction of pc-bounty transitions emitted (0..1]
# Keep-rate for the gear-insurance policy lifecycle (engine/gear_insurance.py).
# Each `+insure buy` / `+insure cancel` emits one 'gear_insurance' event tagged
# by action: the premium sink the ledger tags `gear_insurance_premium` plus the
# lifecycle the isolated credit row can't rejoin — the buy→cancel voluntary-churn
# rate and the premium-sink volume against take-up. The signal for tuning the
# lone lever GEAR_INSURANCE_PREMIUM (too cheap → everyone insures, eroding the
# consensual gear-loss sink; too dear → dead weight). The death-consume leg moves
# no credits and lives in death.py (avoid-lane), so it is intentionally not
# emitted. Very low-frequency (a deliberate loadout-protection buy) so 1.0 is fine.
telemetry.gear_insurance_sample: 1.0  # fraction of insurance transitions emitted (0..1]
# Keep-rate for the Hutt-debt payment lifecycle (engine/debt.py). The weekly
# auto-debit already rides credit_flow under `debt_payment`, but those isolated
# rows can't be rejoined offline into the debt lifecycle: each weekly tick emits
# one 'debt' event tagged by action — `payment` (partial), `payoff` (cleared),
# or `missed` (insufficient; escalation tags warning/enforcer). The signal for
# tuning DEBT_WEEKLY_PAYMENT (500cr) and the miss thresholds: nobody misses →
# painless dead weight; everyone escalates to the enforcer → punitive. At most
# one event per debtor per weekly tick, so 1.0 (full capture) is fine.
telemetry.debt_sample: 1.0            # fraction of debt-lifecycle events emitted (0..1]
# Keep-rate for the vanity-title prestige lifecycle (engine/titles.py). The
# purchase debit already rides credit_flow under `vanity_title`, but that
# isolated row can't be rejoined offline into the prestige lifecycle: each
# `+title buy` emits one 'vanity_title' event tagged `purchase` (the sink, with
# the price-tier index + owned-count-after) and each earned deed-reward emits
# `grant` (no credits move). The signal for tuning the 8-tier VANITY_TITLES cost
# curve (2k→400k): a dead top tier is priced past reach; everyone parked on the
# cheap tiers means the sink is too shallow. A deliberate, low-frequency buy so
# 1.0 (full capture) is fine.
telemetry.title_sample: 1.0           # fraction of vanity-title events emitted (0..1]
# Keep-rate for the spacer-quest onboarding funnel (engine/spacer_quest.py). The
# 30-step "From Dust to Stars" new-player chain pays a per-step credit faucet
# (already on credit_flow under `spacer_quest`) but those isolated rows can't be
# rejoined offline into the onboarding funnel: how many players START vs the last
# step they reach (the drop-off curve) vs how many reach grand COMPLETE, plus the
# per-step pay. Each event is one `spacer_quest` record tagged `start`/`step`/
# `complete`. A once-per-player, low-frequency lifecycle so 1.0 (full capture)
# is fine — sampling it down would blur the very drop-off curve it exists to show.
telemetry.spacer_quest_sample: 1.0    # fraction of spacer-quest events emitted (0..1]
# Keep-rate for the CP-spend (advancement) sink (parser/cp_commands.py `train`).
# The CP economy already telemeters its FAUCET (cp_income — every Character-Point
# income source, in engine/cp_engine.py) but had no SINK emitter: each `train`
# spends CP to raise a skill pip. Each advance emits one `cp_spend` event tagged
# source=train, with the skill, the `dice` cost basis (== the pool size advanced),
# the CP `cost` paid, `cp_remaining`, the old→new pool, and a `guild_discount`
# flag. Joined to cp_income on char_id it shows whether players hoard or spend CP,
# which skills they invest in, and guild-discount uptake — the signal for tuning
# TICKS_PER_CP / WEEKLY_CAP_TICKS + the 20% guild discount. A deliberate, low-
# frequency act so 1.0 (full capture) is fine.
telemetry.cp_spend_sample: 1.0        # fraction of CP-advancement events emitted (0..1]
# Keep-rate for the mob-grind kill-reward sink (engine/hunting_rewards.py
# `on_huntable_kill`). The solo-PvE grind faucet already tags its CREDIT leg on
# the ledger (`mob_grind`) but those isolated rows can't be rejoined offline into
# the grind funnel: per-kill payout distribution, how fast a grinder hits the
# 400 cr/day SOFT CAP + how much runs on the OVER_CAP_FLOOR trickle tail, what /
# where is farmed, and engagement depth (lifetime kills, milestone titles). Each
# kill emits one `grind_kill` event; joined to credit_flow on char_id it's the
# signal for tuning BASE_REWARD / DAILY_SOFT_CAP / OVER_CAP_FLOOR. The daily soft
# cap already bounds a grinder's kill volume, so 1.0 (full capture) is affordable
# and sampling down would blur the very cap-pressure curve it exists to show.
telemetry.grind_kill_sample: 1.0      # fraction of mob-grind kills emitted (0..1]
# Keep-rate for the mob-DENSITY (encounter-spawn) leg of the grind funnel
# (engine/wilderness_encounters.py `roll_encounter`). The complement to
# grind_kill: grind_kill captures what a kill PAYS, this captures how often the
# wilderness OFFERS a huntable encounter. Each roll against a LIVE encounter pool
# emits one `wild_encounter` event with `fired` + a `reason` (chance_miss /
# on_cooldown / no_eligible_entries / averted_by_excluder / ok) + threat `band` +
# region/zone/planet (and entry_id/entry_type on a fire). Joined to grind_kill on
# char_id it closes the loop rolls→fires→kills→reward — the signal for tuning
# base_chance_per_move, the 60s cooldown, and threat-band pool authoring after the
# 2026-06-24 grind redirect into the wilderness. Pool-less passthroughs
# (no_pool_configured) are deliberately NOT emitted (flood, no pacing signal).
# Uniform sampling preserves fire-rate / reason / band ratios, so a dial-down keeps
# the shape; 1.0 (full capture) is the launch default.
telemetry.wild_encounter_sample: 1.0  # fraction of pooled encounter rolls emitted (0..1]
# Keep-rate for the dark-side-cult MENACE ESCALATION leg (engine/
# communal_objective_runtime.py `advance_and_resolve`). Completes the communal
# events triad: `objective` start/complete bookend the uprising, `communal_strike`
# captures player participation (menace pushed DOWN), and this captures the
# uncontested climb UP — the only telemetry record of menace rising between
# strikes. Each escalation tick that moves menace emits one `communal_menace`
# event (menace_before/after, elapsed minutes, tier transition, contributor
# count, staged flag) — the signal for tuning MENACE_PER_MINUTE / DEADLINE_HOURS
# and whether a small community can keep pace. At most one uprising on a 120s
# cadence → very low volume, so 1.0 (full capture) is the launch default.
telemetry.communal_menace_sample: 1.0 # fraction of menace escalation ticks emitted (0..1]
# Keep-rate for the session-lifecycle sink (server/game_server.py IN_GAME login
# seam + server/session.py SessionManager.remove teardown chokepoint). The
# engagement/retention primitive the economy funnels above can't see: one
# `session` event tagged phase=login (a character entered the world) and one
# phase=logout per torn-down connection (carrying play duration login→logout, the
# full connect→disconnect span, transport telnet-vs-web, and reached_game so a
# bounce at the login screen is the funnel denominator). Joined offline it gives
# the session-length distribution, the connect→login conversion, and the web-vs-
# purist mix — the signal for tuning idle_timeout + reading real DAU/session
# length without a DB scan (there is no login ledger). One event per connect/
# disconnect = very low volume, so 1.0 (full capture) is the launch default;
# sampling down would blur the very session-length curve it exists to show.
telemetry.session_sample: 1.0         # fraction of session lifecycle events emitted (0..1]

# ── Combat CP (engine/combat_cp.py) ──
# Early-game combat CP faucet: the first N hostile NPC kills each grant +1 CP
# (lifetime seal per character). Funds ~one die-step on first session without
# disturbing the long-term RP-first economy. Per-kill award is fixed at 1 CP;
# only the cap is tunable. Set to 0 to disable entirely.
combat.early_cp_kill_cap: 5

# ── Feature flags (parser/city_commands.py) ──
# Gate `+city found` off at launch; set true when city founding opens.
# Brian decision #7 (2026-06-16): T3.14 cities are OPTIONAL at launch.
cities.found_enabled: false
