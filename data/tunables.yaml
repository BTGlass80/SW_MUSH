# SW_MUSH game balance tunables  (T3.19 Phase 0)
#
# Dotted keys mirror the TUN.* comment conventions already in engine/*.py.
# A missing key (or an empty / absent file) falls back to the hardcoded
# default at each call site — so this file is always safe to leave empty.
#
# Format:  <namespace>.<knob>: <value>
# Example: trade.price_demand_multiplier: 1.40
#
# Phase 1 (2026-06-15): HIGH-priority economy cluster externalized.
# Each value below EQUALS the in-code default at its call site, so this
# file is behavior-identical to omitting it — operators tune from here.
# Every consumer reads via get_tunable("<key>", <in-code default>) at the
# USE SITE (not module import), so edits take effect on the next load.
#
# Edit via string-replacement only (never a yaml round-trip rewrite that
# could reformat entries or collapse comments).

# ── Trade (engine/trading.py) ──
trade.price_source_multiplier: 0.70   # sell price at a good's SOURCE planet (cheap)
trade.price_demand_multiplier: 1.40   # sell price at a good's DEMAND planet (premium)
trade.supply_refresh_seconds: 2700    # supply-pool refresh cadence (45 min)
trade.supply_max_luxury_goods: 6      # luxury_goods units per refresh (tightest cap)

# ── Mission rewards (engine/missions.py) ──
mission.reward_smuggling_max: 5000    # top of the smuggling pay band (lo stays 500)

# ── Bounty rewards (engine/bounty_board.py) ──
bounty.reward_superior_max: 10000     # top of the superior-tier bounty band (lo stays 3000)

# ── Player-to-player trade (parser/builtin_commands.py) ──
p2p.tax_pct: 5                        # percent sink on consented credit trades (floor 1cr)

# ── Faction commissary (engine/commissary.py) ──
commissary.sellback_rate: 0.50        # refund fraction on commissary sellback (<=50%, net loss)

# ── Telemetry sampling (engine/telemetry.py / skill_checks.py) ──
# Keep-rate for the highest-frequency telemetry chokepoint. 1.0 = capture
# every out-of-combat skill check (fine at launch's small population); lower
# it (e.g. 0.25) post-launch if the skill_check event stream gets noisy.
telemetry.skill_check_sample: 1.0     # fraction of skill checks emitted (0..1]
# Keep-rate for the command-frequency histogram (parser/commands.py). Every
# dispatched command emits one 'command' event at the chokepoint; 1.0 captures
# all of them at launch's small population. Lower it (e.g. 0.25) post-launch if
# the command stream gets noisy — the relative histogram is preserved under
# uniform sampling.
telemetry.command_sample: 1.0         # fraction of dispatched commands emitted (0..1]
# Keep-rate for the gambling-outcome stream (parser/sabacc_commands.py). Each
# resolved Sabacc hand emits one 'gamble' event with the win/loss split, bet,
# and rake breakdown — the house-edge tuning signal. Cooldown-bounded per
# player so 1.0 is fine at launch; lower it if the stream gets noisy.
telemetry.gamble_sample: 1.0          # fraction of gambling hands emitted (0..1]
# Keep-rate for the faction-reputation stream (engine/organizations.py). Each
# landed rep change (member rep_score + non-member faction_rep, incl. the
# cross-faction penalty recursion) emits one 'faction_rep' event with the
# delta, tier transition, and clamp flag — the progression/affiliation tuning
# signal. Bounded by player action so 1.0 is fine at launch; lower it if noisy.
telemetry.faction_rep_sample: 1.0     # fraction of rep changes emitted (0..1]
# Keep-rate for the player-to-player trade stream (parser/builtin_commands.py).
# Each completed `trade` emits one 'p2p_trade' event — credit transfers carry
# gross/net/tax (the p2p.tax_pct + velocity-alert tuning signal); item trades
# carry the bartered item (a flow credit_flow can't see). Bounded by the 2-min
# offer TTL + alt-trade block so 1.0 is fine at launch; lower it if noisy.
telemetry.p2p_trade_sample: 1.0       # fraction of completed P2P trades emitted (0..1]

# ── Feature flags (parser/city_commands.py) ──
# Gate `+city found` off at launch; set true when city founding opens.
# Brian decision #7 (2026-06-16): T3.14 cities are OPTIONAL at launch.
cities.found_enabled: false
