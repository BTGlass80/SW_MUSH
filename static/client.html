<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars D6 MUSH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  :root {
    --bg-deep: #0a0c10;
    --bg-panel: #0d1117;
    --bg-input: #161b22;
    --bg-hud: #0d1117;
    --border-dim: #1c2433;
    --border-glow: #2d4a22;
    --text-primary: #c9d1d9;
    --text-dim: #6e7681;
    --text-bright: #e6edf3;
    --accent-green: #3fb950;
    --accent-amber: #d29922;
    --accent-red: #f85149;
    --accent-blue: #58a6ff;
    --accent-cyan: #56d4dd;
    --scrollbar-track: #161b22;
    --scrollbar-thumb: #30363d;
    --glow-green: rgba(63, 185, 80, 0.15);
    --glow-amber: rgba(210, 153, 34, 0.1);
    --font-mono: 'Share Tech Mono', 'Consolas', 'Courier New', monospace;
    --font-display: 'Orbitron', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Scanline overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    z-index: 9999;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 1fr 240px;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    gap: 0;
  }

  /* ── Header ── */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-dim);
  }

  .header-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-amber);
    text-shadow: 0 0 20px var(--glow-amber);
  }

  .conn-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .conn-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-red);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .conn-dot.connected {
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green);
  }

  .conn-dot.connecting {
    background: var(--accent-amber);
    box-shadow: 0 0 8px var(--accent-amber);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Output Area ── */
  .output-wrap {
    grid-column: 1;
    grid-row: 2;
    overflow: hidden;
    position: relative;
    background: var(--bg-deep);
  }

  #output {
    height: 100%;
    overflow-y: auto;
    padding: 12px 16px;
    scroll-behavior: smooth;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  #output::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  #output::-webkit-scrollbar-thumb:hover { background: #484f58; }

  .output-line {
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-bottom: 1px;
    font-size: 14px;
  }

  .output-line:empty::before {
    content: '\200b'; /* zero-width space to preserve empty line height */
  }

  /* Fade-in for new lines */
  .output-line.fresh {
    animation: lineIn 0.15s ease-out;
  }

  @keyframes lineIn {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }

  /* ── HUD Sidebar ── */
  .hud {
    grid-column: 2;
    grid-row: 2 / 4;
    background: var(--bg-hud);
    border-left: 1px solid var(--border-dim);
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  .hud-section {
    border: 1px solid var(--border-dim);
    border-radius: 4px;
    padding: 10px 12px;
    background: rgba(13, 17, 23, 0.6);
  }

  .hud-label {
    font-family: var(--font-display);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .hud-value {
    font-size: 15px;
    color: var(--text-bright);
  }

  .hud-value.name {
    color: var(--accent-amber);
    font-weight: bold;
  }

  .hud-value.room {
    color: var(--accent-cyan);
    font-size: 13px;
  }

  .hud-value.credits {
    color: var(--accent-amber);
  }

  /* Wound bar */
  .wound-bar {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }

  .wound-seg {
    flex: 1;
    height: 6px;
    border-radius: 2px;
    background: var(--border-dim);
    transition: background 0.3s;
  }

  .wound-seg.healthy { background: var(--accent-green); box-shadow: 0 0 4px rgba(63,185,80,0.4); }
  .wound-seg.stunned { background: var(--accent-amber); }
  .wound-seg.wounded { background: #da6d28; }
  .wound-seg.incap   { background: var(--accent-red); }
  .wound-seg.mortal  { background: #8b0000; box-shadow: 0 0 6px rgba(139,0,0,0.6); }

  /* Quick commands */
  .quick-cmds {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .quick-cmd {
    padding: 3px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg-input);
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .quick-cmd:hover {
    color: var(--accent-green);
    border-color: var(--accent-green);
    background: rgba(63, 185, 80, 0.05);
  }

  /* Exits */
  .exit-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .exit-btn {
    padding: 3px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg-input);
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    color: var(--accent-cyan);
    cursor: pointer;
    transition: all 0.15s;
  }

  .exit-btn:hover {
    border-color: var(--accent-cyan);
    background: rgba(86, 212, 221, 0.08);
  }

  /* ── Input Area ── */
  .input-area {
    grid-column: 1;
    grid-row: 3;
    display: flex;
    align-items: center;
    padding: 8px 16px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border-dim);
    gap: 8px;
  }

  .input-prompt {
    font-size: 14px;
    color: var(--accent-green);
    text-shadow: 0 0 8px var(--glow-green);
    user-select: none;
    flex-shrink: 0;
  }

  #cmd-input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border-dim);
    border-radius: 4px;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-bright);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #cmd-input:focus {
    border-color: var(--accent-green);
    box-shadow: 0 0 0 2px var(--glow-green);
  }

  #cmd-input::placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  .send-btn {
    padding: 8px 16px;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(63, 185, 80, 0.1);
    border: 1px solid var(--accent-green);
    border-radius: 4px;
    color: var(--accent-green);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: rgba(63, 185, 80, 0.2);
    box-shadow: 0 0 12px var(--glow-green);
  }

  /* ── ANSI Color Classes ── */
  .ansi-bold { font-weight: bold; }
  .ansi-dim { opacity: 0.6; }
  .ansi-italic { font-style: italic; }
  .ansi-underline { text-decoration: underline; }
  .ansi-blink { animation: blink 1s step-end infinite; }
  .ansi-reverse { /* handled inline */ }
  .ansi-strikethrough { text-decoration: line-through; }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Foreground */
  .ansi-fg-30 { color: #4d4d4d; }
  .ansi-fg-31 { color: #f85149; }
  .ansi-fg-32 { color: #3fb950; }
  .ansi-fg-33 { color: #d29922; }
  .ansi-fg-34 { color: #58a6ff; }
  .ansi-fg-35 { color: #bc8cff; }
  .ansi-fg-36 { color: #56d4dd; }
  .ansi-fg-37 { color: #e6edf3; }
  /* Bright foreground */
  .ansi-fg-90 { color: #6e7681; }
  .ansi-fg-91 { color: #ff7b72; }
  .ansi-fg-92 { color: #7ee787; }
  .ansi-fg-93 { color: #e3b341; }
  .ansi-fg-94 { color: #79c0ff; }
  .ansi-fg-95 { color: #d2a8ff; }
  .ansi-fg-96 { color: #76e4ed; }
  .ansi-fg-97 { color: #ffffff; }

  /* Background */
  .ansi-bg-40 { background: #4d4d4d; }
  .ansi-bg-41 { background: #8b2520; }
  .ansi-bg-42 { background: #1a4d2e; }
  .ansi-bg-43 { background: #6b4e14; }
  .ansi-bg-44 { background: #1a3a6b; }
  .ansi-bg-45 { background: #5a3d7a; }
  .ansi-bg-46 { background: #1a5c5f; }
  .ansi-bg-47 { background: #cccccc; color: #000; }

  /* ── Mobile Responsive ── */
  @media (max-width: 700px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto auto;
    }

    .hud {
      grid-column: 1;
      grid-row: 4;
      flex-direction: row;
      flex-wrap: wrap;
      border-left: none;
      border-top: 1px solid var(--border-dim);
      padding: 8px;
      gap: 8px;
      max-height: 120px;
      overflow-y: auto;
    }

    .hud-section {
      flex: 1;
      min-width: 100px;
      padding: 6px 8px;
    }

    .hud-label { font-size: 8px; margin-bottom: 4px; }
    .hud-value { font-size: 12px; }

    .header-title { font-size: 11px; letter-spacing: 2px; }

    #cmd-input { font-size: 16px; /* prevent iOS zoom */ }
  }

  /* ── Startup splash ── */
  .splash {
    color: var(--accent-amber);
    text-shadow: 0 0 10px var(--glow-amber);
    margin-bottom: 8px;
  }

  .system-msg {
    color: var(--text-dim);
    font-style: italic;
  }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-title">Star Wars D6 MUSH</div>
    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Disconnected</span>
    </div>
  </div>

  <!-- Output -->
  <div class="output-wrap">
    <div id="output"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <span class="input-prompt">&gt;</span>
    <input type="text" id="cmd-input" placeholder="Enter command..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="send-btn" id="send-btn">Send</button>
  </div>

  <!-- HUD Sidebar -->
  <div class="hud">
    <div class="hud-section">
      <div class="hud-label">Character</div>
      <div class="hud-value name" id="hud-name">—</div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Condition</div>
      <div class="hud-value" id="hud-wound">Healthy</div>
      <div class="wound-bar" id="wound-bar">
        <div class="wound-seg healthy"></div>
        <div class="wound-seg healthy"></div>
        <div class="wound-seg healthy"></div>
        <div class="wound-seg healthy"></div>
        <div class="wound-seg healthy"></div>
      </div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Credits</div>
      <div class="hud-value credits" id="hud-credits">—</div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Location</div>
      <div class="hud-value room" id="hud-room">—</div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Exits</div>
      <div class="exit-list" id="hud-exits">
        <span style="color:var(--text-dim); font-size:12px;">—</span>
      </div>
    </div>

    <div class="hud-section">
      <div class="hud-label">Quick</div>
      <div class="quick-cmds">
        <button class="quick-cmd" onclick="sendCmd('look')">look</button>
        <button class="quick-cmd" onclick="sendCmd('inventory')">inv</button>
        <button class="quick-cmd" onclick="sendCmd('score')">score</button>
        <button class="quick-cmd" onclick="sendCmd('missions')">jobs</button>
        <button class="quick-cmd" onclick="sendCmd('who')">who</button>
        <button class="quick-cmd" onclick="sendCmd('help')">help</button>
      </div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
//  SW_MUSH WebSocket Browser Client
//  Connects to ws://host:4001
//  Protocol: send {"input":"text"}, receive {"type":"text","data":"..."}
// ═══════════════════════════════════════════════════════════

(function() {
  'use strict';

  // ── Config ──
  const WS_PORT = 4001;
  const MAX_OUTPUT_LINES = 2000;
  const RECONNECT_DELAY_MS = 3000;
  const MAX_HISTORY = 100;

  // ── DOM refs ──
  const output    = document.getElementById('output');
  const cmdInput  = document.getElementById('cmd-input');
  const sendBtn   = document.getElementById('send-btn');
  const connDot   = document.getElementById('conn-dot');
  const connLabel = document.getElementById('conn-label');

  // HUD
  const hudName    = document.getElementById('hud-name');
  const hudWound   = document.getElementById('hud-wound');
  const woundBar   = document.getElementById('wound-bar');
  const hudCredits = document.getElementById('hud-credits');
  const hudRoom    = document.getElementById('hud-room');
  const hudExits   = document.getElementById('hud-exits');

  // ── State ──
  let ws = null;
  let reconnectTimer = null;
  let history = [];
  let historyIdx = -1;
  let tempInput = '';

  // ═══════════════════════════════════════════
  //  ANSI Parser
  // ═══════════════════════════════════════════

  /**
   * Convert a string with ANSI escape codes into HTML spans.
   * Supports SGR codes: reset, bold, dim, italic, underline, blink,
   * reverse, strikethrough, foreground 30-37/90-97, background 40-47.
   */
  function ansiToHtml(text) {
    // Escape HTML entities first
    text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    const ESC = '\x1b\\[';
    const regex = new RegExp(ESC + '([0-9;]*)m', 'g');

    let result = '';
    let lastIdx = 0;
    let openSpans = 0;
    let match;

    // Current style state
    let bold = false, dim = false, italic = false, underline = false;
    let blinkOn = false, reverse = false, strike = false;
    let fg = null, bg = null;

    function closeSpans() {
      while (openSpans > 0) { result += '</span>'; openSpans--; }
    }

    function openSpan() {
      let classes = [];
      if (bold) classes.push('ansi-bold');
      if (dim) classes.push('ansi-dim');
      if (italic) classes.push('ansi-italic');
      if (underline) classes.push('ansi-underline');
      if (blinkOn) classes.push('ansi-blink');
      if (strike) classes.push('ansi-strikethrough');
      if (fg !== null) classes.push('ansi-fg-' + fg);
      if (bg !== null) classes.push('ansi-bg-' + bg);

      if (classes.length > 0) {
        result += '<span class="' + classes.join(' ') + '">';
        openSpans++;
      }
    }

    while ((match = regex.exec(text)) !== null) {
      // Append text before this escape
      result += text.substring(lastIdx, match.index);
      lastIdx = match.index + match[0].length;

      // Parse SGR codes
      const codes = match[1] ? match[1].split(';').map(Number) : [0];

      closeSpans();

      for (const code of codes) {
        if (code === 0) {
          bold = dim = italic = underline = blinkOn = reverse = strike = false;
          fg = bg = null;
        } else if (code === 1) bold = true;
        else if (code === 2) dim = true;
        else if (code === 3) italic = true;
        else if (code === 4) underline = true;
        else if (code === 5) blinkOn = true;
        else if (code === 7) reverse = true;
        else if (code === 9) strike = true;
        else if (code === 22) { bold = false; dim = false; }
        else if (code === 23) italic = false;
        else if (code === 24) underline = false;
        else if (code === 25) blinkOn = false;
        else if (code === 27) reverse = false;
        else if (code === 29) strike = false;
        else if (code >= 30 && code <= 37) fg = code;
        else if (code === 39) fg = null;
        else if (code >= 40 && code <= 47) bg = code;
        else if (code === 49) bg = null;
        else if (code >= 90 && code <= 97) fg = code;
      }

      openSpan();
    }

    // Remaining text
    result += text.substring(lastIdx);
    closeSpans();

    return result;
  }

  // ═══════════════════════════════════════════
  //  Output
  // ═══════════════════════════════════════════

  function appendOutput(text, cssClass) {
    // The server sends \r\n delimited lines
    const lines = text.split(/\r?\n/);

    for (const line of lines) {
      const div = document.createElement('div');
      div.className = 'output-line fresh';
      if (cssClass) div.classList.add(cssClass);
      div.innerHTML = ansiToHtml(line);
      output.appendChild(div);
    }

    // Trim old lines
    while (output.children.length > MAX_OUTPUT_LINES) {
      output.removeChild(output.firstChild);
    }

    // Auto-scroll
    output.scrollTop = output.scrollHeight;

    // HUD extraction from text
    extractHud(text);
  }

  function systemMsg(text) {
    appendOutput(text, 'system-msg');
  }

  // ═══════════════════════════════════════════
  //  HUD Extraction
  //  Parses output text to update sidebar
  // ═══════════════════════════════════════════

  function extractHud(raw) {
    // Strip ANSI for pattern matching
    const clean = raw.replace(/\x1b\[[0-9;]*m/g, '');

    // Room name — typically the first bold/cyan line of a 'look' output
    // Common pattern: room name on its own line followed by description
    // We look for lines that are likely room names from look output
    const roomMatch = clean.match(/^([A-Z][A-Za-z' \-]+(?:Bay|Street|Alley|Cantina|Market|Square|Gate|Plaza|Office|Tower|Room|Hangar|Corridor|Quarter|District|Dock|Landing|Pad|Shop|Chamber|Arena|Bazaar|Courtyard))/m);
    if (roomMatch) {
      hudRoom.textContent = roomMatch[1].trim();
    }

    // Exits — look for "Obvious exits:" or "[Exits: ...]"
    const exitMatch = clean.match(/(?:Obvious exits?|Exits?):\s*(.+)/i);
    if (exitMatch) {
      const exits = exitMatch[1].split(/[,\s]+/).filter(e => e && e !== 'None' && e !== 'none');
      hudExits.innerHTML = '';
      if (exits.length === 0) {
        hudExits.innerHTML = '<span style="color:var(--text-dim); font-size:12px;">None</span>';
      } else {
        exits.forEach(ex => {
          const btn = document.createElement('button');
          btn.className = 'exit-btn';
          btn.textContent = ex;
          btn.addEventListener('click', () => sendCmd(ex));
          hudExits.appendChild(btn);
        });
      }
    }

    // Credits — patterns like "Credits: 1,234" or "1234 credits"
    const credMatch = clean.match(/Credits?:\s*([\d,]+)/i) || clean.match(/([\d,]+)\s+credits?/i);
    if (credMatch) {
      hudCredits.textContent = credMatch[1] + ' cr';
    }

    // Character name — from "Character: Name" or welcome message
    const nameMatch = clean.match(/(?:Welcome,|Character:|Playing as)\s+([A-Za-z'_\- ]+)/i);
    if (nameMatch) {
      hudName.textContent = nameMatch[1].trim();
    }

    // Wound status — "Wound Level: Stunned" etc.
    const woundMatch = clean.match(/(?:Wound Level|Condition|Status):\s*(Healthy|Stunned|Wounded|Incapacitated|Mortally Wounded|Dead)/i);
    if (woundMatch) {
      updateWoundDisplay(woundMatch[1]);
    }
  }

  function updateWoundDisplay(level) {
    const levels = {
      'healthy':           { label: 'Healthy',           segs: ['healthy','healthy','healthy','healthy','healthy'] },
      'stunned':           { label: 'Stunned',           segs: ['stunned','stunned','stunned','stunned',''] },
      'wounded':           { label: 'Wounded',           segs: ['wounded','wounded','wounded','',''] },
      'incapacitated':     { label: 'Incapacitated',     segs: ['incap','incap','','',''] },
      'mortally wounded':  { label: 'Mortally Wounded',  segs: ['mortal','','','',''] },
      'dead':              { label: 'DEAD',              segs: ['','','','',''] },
    };

    const key = level.toLowerCase();
    const info = levels[key] || levels['healthy'];

    hudWound.textContent = info.label;
    const segs = woundBar.children;
    for (let i = 0; i < 5; i++) {
      segs[i].className = 'wound-seg';
      if (info.segs[i]) segs[i].classList.add(info.segs[i]);
    }
  }

  // ═══════════════════════════════════════════
  //  WebSocket
  // ═══════════════════════════════════════════

  function getWsUrl() {
    const host = window.location.hostname || 'localhost';
    return 'ws://' + host + ':' + WS_PORT;
  }

  function connect() {
    if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

    const url = getWsUrl();
    setConnStatus('connecting');
    systemMsg('[Connecting to ' + url + '...]');

    ws = new WebSocket(url);

    ws.onopen = function() {
      setConnStatus('connected');
      systemMsg('[Connected]');
      cmdInput.focus();
    };

    ws.onmessage = function(evt) {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'text' && typeof msg.data === 'string') {
          appendOutput(msg.data);
        } else if (msg.type === 'room_description') {
          appendOutput(msg.text || JSON.stringify(msg));
        } else if (msg.type === 'combat_log') {
          appendOutput(msg.text || JSON.stringify(msg));
        } else {
          // Unknown typed message — render as text
          appendOutput(msg.data || msg.text || JSON.stringify(msg));
        }
      } catch (e) {
        // Non-JSON — render raw
        appendOutput(evt.data);
      }
    };

    ws.onclose = function() {
      setConnStatus('disconnected');
      systemMsg('[Disconnected — reconnecting in ' + (RECONNECT_DELAY_MS / 1000) + 's...]');
      scheduleReconnect();
    };

    ws.onerror = function() {
      // onclose will fire after this
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, RECONNECT_DELAY_MS);
  }

  function setConnStatus(state) {
    connDot.className = 'conn-dot';
    if (state === 'connected') {
      connDot.classList.add('connected');
      connLabel.textContent = 'Connected';
    } else if (state === 'connecting') {
      connDot.classList.add('connecting');
      connLabel.textContent = 'Connecting...';
    } else {
      connLabel.textContent = 'Disconnected';
    }
  }

  // ═══════════════════════════════════════════
  //  Input / Commands
  // ═══════════════════════════════════════════

  function sendCmd(text) {
    if (!text || !text.trim()) return;
    text = text.trim();

    if (!ws || ws.readyState !== WebSocket.OPEN) {
      systemMsg('[Not connected. Attempting reconnect...]');
      connect();
      return;
    }

    ws.send(JSON.stringify({ input: text }));

    // Add to history (no duplicates of last entry)
    if (history.length === 0 || history[0] !== text) {
      history.unshift(text);
      if (history.length > MAX_HISTORY) history.pop();
    }
    historyIdx = -1;
    tempInput = '';

    cmdInput.value = '';
    cmdInput.focus();
  }

  // ── Event listeners ──

  cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendCmd(cmdInput.value);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length === 0) return;
      if (historyIdx === -1) tempInput = cmdInput.value;
      if (historyIdx < history.length - 1) {
        historyIdx++;
        cmdInput.value = history[historyIdx];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIdx > 0) {
        historyIdx--;
        cmdInput.value = history[historyIdx];
      } else if (historyIdx === 0) {
        historyIdx = -1;
        cmdInput.value = tempInput;
      }
    }
  });

  sendBtn.addEventListener('click', function() {
    sendCmd(cmdInput.value);
  });

  // Focus input on any keypress when not already in an input
  document.addEventListener('keydown', function(e) {
    if (e.target === cmdInput) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key.length === 1) { // printable character
      cmdInput.focus();
    }
  });

  // ═══════════════════════════════════════════
  //  Splash & Init
  // ═══════════════════════════════════════════

  function showSplash() {
    const splash = [
      '    ╔══════════════════════════════════════════════════╗',
      '    ║       ____  _                __    __            ║',
      '    ║      / ___|| |_ __ _ _ __  / / /\\ \\ \\__ _ _ __  ║',
      '    ║      \\___ \\| __/ _` | \'__| \\ \\/  \\/ / _` | \'__| ║',
      '    ║       ___) | || (_| | |     \\  /\\  / (_| | |    ║',
      '    ║      |____/ \\__\\__,_|_|      \\/  \\/ \\__,_|_|    ║',
      '    ║                                                  ║',
      '    ║            D 6   M U S H   C L I E N T           ║',
      '    ╚══════════════════════════════════════════════════╝',
    ];
    appendOutput(splash.join('\n'), 'splash');
    systemMsg('Browser client v1.0 — Connecting...');
  }

  // Boot
  showSplash();
  connect();

})();
</script>
