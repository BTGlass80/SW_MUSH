<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars D6 MUSH — Galactic Civil War Era</title>
<meta name="description" content="A Star Wars text-based multiplayer game using the WEG D6 Revised & Expanded ruleset. Set during the Galactic Civil War era across four planets.">
<meta property="og:title" content="Star Wars D6 MUSH — Galactic Civil War Era">
<meta property="og:description" content="AI-driven narrative, player-driven economy, 120+ rooms across 4 planets. WEG D6 Revised & Expanded. Play free in your browser.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Star Wars D6 MUSH">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Star Wars D6 MUSH — Galactic Civil War Era">
<meta name="twitter:description" content="AI-driven Star Wars MUSH with WEG D6 rules. Smuggle, duel, pilot, and roleplay across four planets. Play free in your browser.">
<meta name="theme-color" content="#06080c">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg-deep: #06080c;
    --bg-panel: #0b0e14;
    --bg-input: #10141c;
    --bg-card: #0d1118;
    --border-dim: #151c28;
    --border-mid: #1e2838;
    --text-primary: #b8c0cc;
    --text-dim: #566070;
    --text-bright: #dce3ed;
    --accent-green: #3fb950;
    --accent-amber: #d4a020;
    --accent-red: #f85149;
    --accent-blue: #4d9eff;
    --accent-cyan: #40c8d0;
    --accent-purple: #b07cff;
    --font-mono: 'Share Tech Mono', 'Consolas', monospace;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--bg-deep); color:var(--text-primary); font-family:var(--font-body); font-size:16px; line-height:1.6; }

  a { color:var(--accent-cyan); text-decoration:none; }
  a:hover { text-decoration:underline; }

  /* ── Nav ──────────────────────────────────────────────────────── */
  nav {
    position:sticky; top:0; z-index:100;
    background:rgba(6,8,12,0.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border-dim);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; height:52px;
  }
  nav .logo { font-family:var(--font-display); font-size:14px; color:var(--accent-amber); letter-spacing:2px; cursor:pointer; }
  nav .links { display:flex; gap:20px; align-items:center; }
  nav .links a { font-family:var(--font-body); font-weight:600; font-size:15px; color:var(--text-dim); transition:color .2s; }
  nav .links a:hover, nav .links a.active { color:var(--text-bright); text-decoration:none; }
  nav .play-btn {
    font-family:var(--font-display); font-size:12px; letter-spacing:1px;
    background:var(--accent-cyan); color:#000; padding:6px 16px; border-radius:3px;
    font-weight:700; transition:background .2s;
  }
  nav .play-btn:hover { background:#5de0f0; text-decoration:none; }
  .nav-toggle { display:none; background:none; border:none; color:var(--text-primary); font-size:24px; cursor:pointer; }

  /* ── Main container ──────────────────────────────────────────── */
  #app { min-height:calc(100vh - 52px); padding:0; }

  /* ── Landing ─────────────────────────────────────────────────── */
  .landing-hero {
    text-align:center; padding:80px 24px 40px;
    background:radial-gradient(ellipse at 50% 20%, rgba(64,200,208,0.06) 0%, transparent 60%);
  }
  .landing-hero h1 { font-family:var(--font-display); font-size:clamp(24px,5vw,42px); color:var(--accent-amber); letter-spacing:3px; margin-bottom:8px; }
  .landing-hero .subtitle { font-family:var(--font-mono); font-size:14px; color:var(--text-dim); margin-bottom:32px; letter-spacing:1px; }
  .landing-cta { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:40px; }
  .landing-cta a {
    font-family:var(--font-display); font-size:13px; letter-spacing:1px;
    padding:12px 28px; border-radius:3px; font-weight:700; transition:all .2s;
  }
  .btn-primary { background:var(--accent-cyan); color:#000; }
  .btn-primary:hover { background:#5de0f0; text-decoration:none; }
  .btn-secondary { background:transparent; color:var(--accent-cyan); border:1px solid var(--accent-cyan); }
  .btn-secondary:hover { background:rgba(64,200,208,0.1); text-decoration:none; }

  .landing-stats {
    display:flex; gap:24px; justify-content:center; flex-wrap:wrap; margin-bottom:48px;
  }
  .stat-pill {
    background:var(--bg-card); border:1px solid var(--border-dim); border-radius:4px;
    padding:12px 20px; text-align:center; min-width:120px;
  }
  .stat-pill .num { font-family:var(--font-display); font-size:22px; color:var(--accent-cyan); display:block; }
  .stat-pill .label { font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }

  .landing-desc {
    max-width:680px; margin:0 auto 48px; text-align:center;
    font-size:15px; color:var(--text-dim); line-height:1.8;
  }

  .landing-news { max-width:600px; margin:0 auto; text-align:left; }
  .landing-news h3 { font-family:var(--font-display); font-size:13px; color:var(--accent-amber); letter-spacing:2px; margin-bottom:12px; }
  .news-item { padding:8px 0; border-bottom:1px solid var(--border-dim); font-family:var(--font-mono); font-size:13px; }
  .news-item .time { color:var(--text-dim); font-size:11px; }

  /* ── Page layouts ────────────────────────────────────────────── */
  .page { max-width:960px; margin:0 auto; padding:32px 24px 64px; }
  .page h2 { font-family:var(--font-display); font-size:18px; color:var(--accent-amber); letter-spacing:2px; margin-bottom:20px; }
  .page-subtitle { color:var(--text-dim); font-size:14px; margin-bottom:24px; }

  /* ── Cards ───────────────────────────────────────────────────── */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
  .card {
    background:var(--bg-card); border:1px solid var(--border-dim); border-radius:4px;
    padding:16px; cursor:pointer; transition:border-color .2s;
  }
  .card:hover { border-color:var(--accent-cyan); }
  .card .card-name { font-family:var(--font-display); font-size:14px; color:var(--text-bright); margin-bottom:4px; }
  .card .card-meta { font-size:13px; color:var(--text-dim); margin-bottom:8px; }
  .card .card-desc { font-size:13px; color:var(--text-primary); line-height:1.5; }
  .online-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent-green); margin-right:6px; vertical-align:middle; }
  .offline-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--text-dim); margin-right:6px; vertical-align:middle; }
  .badge { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px; font-weight:700; letter-spacing:1px; }
  .badge-faction { background:rgba(64,200,208,0.15); color:var(--accent-cyan); }
  .badge-type { background:rgba(176,124,255,0.15); color:var(--accent-purple); }

  /* ── Table ───────────────────────────────────────────────────── */
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { font-family:var(--font-display); font-size:11px; letter-spacing:1px; color:var(--text-dim); text-align:left; padding:8px 12px; border-bottom:1px solid var(--border-mid); }
  td { padding:8px 12px; border-bottom:1px solid var(--border-dim); }

  /* ── Profile ─────────────────────────────────────────────────── */
  .profile-header { display:flex; gap:24px; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; }
  .profile-header .ph-info { flex:1; min-width:200px; }
  .profile-header h2 { margin-bottom:4px; }
  .profile-section { margin-bottom:24px; }
  .profile-section h3 { font-family:var(--font-display); font-size:13px; color:var(--accent-cyan); letter-spacing:1px; margin-bottom:8px; border-bottom:1px solid var(--border-dim); padding-bottom:4px; }
  .profile-section p, .profile-section .content { font-size:14px; line-height:1.7; white-space:pre-wrap; }

  /* ── Scene detail ────────────────────────────────────────────── */
  .pose { padding:12px 0; border-bottom:1px solid var(--border-dim); }
  .pose .pose-char { font-family:var(--font-mono); font-size:13px; color:var(--accent-cyan); font-weight:700; }
  .pose .pose-content { font-size:14px; line-height:1.7; margin-top:4px; }
  .pose .pose-time { font-size:11px; color:var(--text-dim); margin-top:2px; }

  /* ── Guide ───────────────────────────────────────────────────── */
  .guide-content { font-size:15px; line-height:1.8; }
  .guide-content h1 { font-family:var(--font-display); font-size:20px; color:var(--accent-amber); margin:28px 0 12px; }
  .guide-content h2 { font-family:var(--font-display); font-size:16px; color:var(--accent-cyan); margin:24px 0 8px; }
  .guide-content h3 { font-family:var(--font-display); font-size:14px; color:var(--text-bright); margin:20px 0 8px; }
  .guide-content p { margin-bottom:12px; }
  .guide-content code { font-family:var(--font-mono); background:var(--bg-input); padding:1px 5px; border-radius:3px; font-size:13px; }
  .guide-content pre { background:var(--bg-input); padding:12px; border-radius:4px; overflow-x:auto; margin:12px 0; font-family:var(--font-mono); font-size:13px; line-height:1.5; }
  .guide-content table { margin:12px 0; }
  .guide-content ul, .guide-content ol { padding-left:24px; margin-bottom:12px; }
  .guide-content blockquote { border-left:3px solid var(--accent-amber); padding-left:16px; color:var(--text-dim); margin:12px 0; }
  .guide-content hr { border:none; border-top:1px solid var(--border-dim); margin:24px 0; }
  .guide-content strong { color:var(--text-bright); }

  /* ── Filters / search ────────────────────────────────────────── */
  .filters { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  .filters input, .filters select {
    font-family:var(--font-body); font-size:14px;
    background:var(--bg-input); border:1px solid var(--border-mid); border-radius:3px;
    color:var(--text-primary); padding:6px 12px;
  }
  .filters input:focus, .filters select:focus { outline:none; border-color:var(--accent-cyan); }

  /* ── Pagination ──────────────────────────────────────────────── */
  .pagination { display:flex; gap:8px; margin-top:24px; justify-content:center; }
  .pagination button {
    font-family:var(--font-body); font-size:14px; padding:6px 14px;
    background:var(--bg-input); border:1px solid var(--border-mid); border-radius:3px;
    color:var(--text-primary); cursor:pointer;
  }
  .pagination button:hover { border-color:var(--accent-cyan); }
  .pagination button.active { background:var(--accent-cyan); color:#000; border-color:var(--accent-cyan); }
  .pagination button:disabled { opacity:0.4; cursor:default; }

  /* ── Loading / empty ─────────────────────────────────────────── */
  .loading { text-align:center; padding:48px; color:var(--text-dim); font-family:var(--font-mono); }
  .empty { text-align:center; padding:48px; color:var(--text-dim); }

  /* ── Login modal ─────────────────────────────────────────────── */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:200; align-items:center; justify-content:center;
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--bg-panel); border:1px solid var(--border-mid); border-radius:6px;
    padding:32px; max-width:360px; width:90%;
  }
  .modal h3 { font-family:var(--font-display); font-size:15px; color:var(--accent-amber); margin-bottom:16px; }
  .modal label { display:block; font-size:13px; color:var(--text-dim); margin-bottom:4px; }
  .modal input {
    width:100%; font-family:var(--font-mono); font-size:14px;
    background:var(--bg-input); border:1px solid var(--border-mid); border-radius:3px;
    color:var(--text-primary); padding:8px 12px; margin-bottom:12px;
  }
  .modal input:focus { outline:none; border-color:var(--accent-cyan); }
  .modal .modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
  .modal button {
    font-family:var(--font-display); font-size:12px; padding:8px 20px;
    border:none; border-radius:3px; cursor:pointer; letter-spacing:1px;
  }
  .modal .btn-login { background:var(--accent-cyan); color:#000; font-weight:700; }
  .modal .btn-cancel { background:var(--bg-input); color:var(--text-dim); }
  .modal .error { color:var(--accent-red); font-size:13px; margin-top:8px; }

  /* ── Footer ──────────────────────────────────────────────────── */
  footer {
    border-top:1px solid var(--border-dim); padding:20px 24px; text-align:center;
    font-size:12px; color:var(--text-dim);
  }

  /* ── Mobile ──────────────────────────────────────────────────── */
  @media (max-width:640px) {
    nav .links { display:none; flex-direction:column; position:absolute; top:52px; left:0; right:0; background:var(--bg-deep); border-bottom:1px solid var(--border-dim); padding:16px 24px; gap:12px; }
    nav .links.show { display:flex; }
    .nav-toggle { display:block; }
    .landing-hero { padding:48px 16px 32px; }
    .card-grid { grid-template-columns:1fr; }
    .profile-header { flex-direction:column; }
    .page { padding:20px 16px 48px; }
  }
</style>
</head>
<body>

<nav>
  <span class="logo" onclick="navigate('#/')">SW D6 MUSH</span>
  <button class="nav-toggle" onclick="document.querySelector('.links').classList.toggle('show')">☰</button>
  <div class="links">
    <a href="#/" onclick="navClick(event)">Home</a>
    <a href="#/who" onclick="navClick(event)">Who's Online</a>
    <a href="#/characters" onclick="navClick(event)">Characters</a>
    <a href="#/scenes" onclick="navClick(event)">Scenes</a>
    <a href="#/events" onclick="navClick(event)">Events</a>
    <a href="#/plots" onclick="navClick(event)">Plots</a>
    <a href="#/guides" onclick="navClick(event)">Guides</a>
    <span id="auth-nav"></span>
    <a href="/play" class="play-btn">PLAY NOW</a>
  </div>
</nav>

<div id="app"><div class="loading">Loading...</div></div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h3>LOG IN</h3>
    <label>Username</label>
    <input type="text" id="login-user" autocomplete="username">
    <label>Password</label>
    <input type="password" id="login-pass" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="error" id="login-error"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeLogin()">Cancel</button>
      <button class="btn-login" onclick="doLogin()">LOG IN</button>
    </div>
  </div>
</div>

<footer>Star Wars D6 MUSH · WEG Revised & Expanded · Galactic Civil War Era</footer>

<script>
// ── State ───────────────────────────────────────────────────────
let authToken = localStorage.getItem('portal_token') || null;
let authChars = [];
let cachedStats = null;
let whoInterval = null;

// ── Auth helpers ────────────────────────────────────────────────
function updateAuthNav() {
  const el = document.getElementById('auth-nav');
  if (authToken) {
    let links = '';
    if (authChars.length) {
      links += '<a href="#/my-characters" onclick="navClick(event)" style="color:var(--accent-green)">My Characters</a> ';
    }
    links += '<a href="#" onclick="doLogout(event)" style="color:var(--accent-red)">Log Out</a>';
    el.innerHTML = links;
  } else {
    el.innerHTML = '<a href="#" onclick="showLogin(event)">Log In</a>';
  }
}

function showLogin(e) { e && e.preventDefault(); document.getElementById('loginModal').classList.add('show'); document.getElementById('login-user').focus(); }
function closeLogin() { document.getElementById('loginModal').classList.remove('show'); document.getElementById('login-error').textContent = ''; }

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!user || !pass) { errEl.textContent = 'Username and password required.'; return; }
  try {
    const r = await fetch('/api/portal/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, password:pass}) });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error || 'Login failed.'; return; }
    authToken = d.token;
    authChars = d.characters || [];
    localStorage.setItem('portal_token', authToken);
    closeLogin();
    updateAuthNav();
    route();
  } catch(e) { errEl.textContent = 'Connection error.'; }
}

function doLogout(e) { e && e.preventDefault(); authToken = null; authChars = []; localStorage.removeItem('portal_token'); updateAuthNav(); navigate('#/'); }

function authHeaders() { return authToken ? { 'Authorization': 'Bearer ' + authToken } : {}; }

// Validate stored token on page load
async function validateToken() {
  if (!authToken) return;
  try {
    const r = await fetch('/api/portal/me', { headers: authHeaders() });
    if (!r.ok) { authToken = null; authChars = []; localStorage.removeItem('portal_token'); updateAuthNav(); return; }
    const d = await r.json();
    authChars = d.characters || [];
    updateAuthNav();
  } catch { /* keep token, validate next request */ }
}

// ── API helpers ─────────────────────────────────────────────────
async function api(path) {
  try {
    const r = await fetch(path, { headers: authHeaders() });
    return await r.json();
  } catch(e) { console.error('API error:', path, e); return null; }
}

// ── Routing ─────────────────────────────────────────────────────
function navigate(hash) { location.hash = hash; }
function navClick(e) {
  document.querySelector('.links').classList.remove('show');
  // Update active state
  document.querySelectorAll('.links a').forEach(a => a.classList.remove('active'));
  if (e && e.target) e.target.classList.add('active');
}

async function route() {
  if (whoInterval) { clearInterval(whoInterval); whoInterval = null; }
  const hash = location.hash || '#/';
  const app = document.getElementById('app');

  // Update nav active state
  document.querySelectorAll('.links a').forEach(a => {
    const href = a.getAttribute('href');
    if (href && hash.startsWith(href) && href !== '#/') a.classList.add('active');
    else if (href === '#/' && hash === '#/') a.classList.add('active');
    else a.classList.remove('active');
  });

  if (hash === '#/' || hash === '#') await renderLanding(app);
  else if (hash === '#/who') await renderWho(app);
  else if (hash === '#/my-characters') await renderMyCharacters(app);
  else if (hash === '#/characters') await renderCharacters(app);
  else if (hash.startsWith('#/character/')) await renderProfile(app, hash.split('/')[2]);
  else if (hash === '#/scenes') await renderScenes(app);
  else if (hash.startsWith('#/scene/')) await renderSceneDetail(app, hash.split('/')[2]);
  else if (hash === '#/events') await renderEvents(app);
  else if (hash === '#/plots') await renderPlots(app);
  else if (hash.startsWith('#/plot/')) await renderPlotDetail(app, hash.split('/')[2]);
  else if (hash === '#/guides') await renderGuides(app);
  else if (hash.startsWith('#/guide/')) await renderGuide(app, hash.split('/')[2]);
  else app.innerHTML = '<div class="page"><div class="empty">Page not found.</div></div>';
}

// ── Landing ─────────────────────────────────────────────────────
async function renderLanding(el) {
  const [stats, news] = await Promise.all([
    api('/api/portal/stats'),
    api('/api/portal/news'),
  ]);
  cachedStats = stats;

  const events = (news && news.events || []).slice(0, 5);
  const newsHtml = events.length
    ? events.map(e => `<div class="news-item"><span class="time">${fmtTime(e.timestamp)}</span> ${esc(e.text)}</div>`).join('')
    : '<div class="news-item" style="color:var(--text-dim)">No recent events.</div>';

  el.innerHTML = `
    <div class="landing-hero">
      <h1>STAR WARS D6 MUSH</h1>
      <div class="subtitle">GALACTIC CIVIL WAR ERA · WEG REVISED & EXPANDED</div>
      <div class="landing-cta">
        <a href="/play" class="btn-primary">PLAY NOW</a>
        <a href="/chargen" class="btn-secondary">CREATE CHARACTER</a>
      </div>
      <div class="landing-stats">
        <div class="stat-pill"><span class="num" id="online-count">${stats?.online || 0}</span><span class="label">Online</span></div>
        <div class="stat-pill"><span class="num">${stats?.characters || 0}</span><span class="label">Characters</span></div>
        <div class="stat-pill"><span class="num">${stats?.rooms || 0}</span><span class="label">Rooms</span></div>
        <div class="stat-pill"><span class="num">${stats?.planets || 4}</span><span class="label">Planets</span></div>
        <div class="stat-pill"><span class="num">${stats?.ship_templates || 19}</span><span class="label">Ship Types</span></div>
        <div class="stat-pill"><span class="num">${stats?.shared_scenes || 0}</span><span class="label">Scenes</span></div>
        <div class="stat-pill"><span class="num">${stats?.open_plots || 0}</span><span class="label">Plots</span></div>
      </div>
      <div class="landing-desc">
        A text-based multiplayer Star Wars game powered by the classic WEG D6 system.
        An AI Director drives emergent storylines across Tatooine, Nar Shaddaa, Kessel, and Corellia.
        Smuggle cargo past Imperial patrols. Duel in Chalmun's Cantina. Craft your own weapons.
        Pilot a freighter through hyperspace. Your story, your way.
      </div>
    </div>
    <div class="landing-news">
      <h3>GNN GALACTIC NEWS</h3>
      ${newsHtml}
    </div>
    <div style="height:48px"></div>
  `;

  // Auto-refresh online count
  whoInterval = setInterval(async () => {
    const s = await api('/api/portal/stats');
    if (s) { const c = document.getElementById('online-count'); if (c) c.textContent = s.online; }
  }, 30000);
}

// ── Who's Online ────────────────────────────────────────────────
async function renderWho(el) {
  el.innerHTML = '<div class="page"><h2>WHO\'S ONLINE</h2><div class="loading">Loading...</div></div>';
  const data = await api('/api/portal/who');
  if (!data) { el.querySelector('.loading').textContent = 'Failed to load.'; return; }

  const rows = data.online.map(p => `
    <tr>
      <td><span class="online-dot"></span>${esc(p.name)}</td>
      <td>${esc(p.species)}</td>
      <td>${esc(p.location_area)}</td>
      <td>${esc(p.faction)}</td>
      <td style="color:var(--text-dim)">${fmtIdle(p.idle_seconds)}</td>

// ── Markdown renderer (simple) ──────────────────────────────────
function renderMarkdown(md) {
  let html = esc(md);
  // Code blocks (``` ... ```)
  html = html.replace(/```([^`]*?)```/gs, (_, code) => '<pre>' + code.trim() + '</pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Horizontal rule
  html = html.replace(/^---+$/gm, '<hr>');
  // Tables (simple: | col | col |)
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, hdr, sep, body) => {
    const ths = hdr.split('|').filter(c=>c.trim()).map(c=>'<th>'+c.trim()+'</th>').join('');
    const trs = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c=>c.trim()).map(c=>'<td>'+c.trim()+'</td>').join('');
      return '<tr>'+tds+'</tr>';
    }).join('');
    return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table>';
  });
  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>(\n|$))+/g, m => '<ul>' + m + '</ul>');
  // Paragraphs (double newline)
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // Clean up empty <p> around block elements
  html = html.replace(/<p>\s*(<h[1-4]|<pre|<table|<ul|<hr|<blockquote)/g, '$1');
  html = html.replace(/(<\/h[1-4]>|<\/pre>|<\/table>|<\/ul>|<\/blockquote>|<hr>)\s*<\/p>/g, '$1');
  return html;
}

// ── Utility ─────────────────────────────────────────────────────
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

function fmtIdle(secs) {
  if (secs < 60) return 'Active';
  if (secs < 3600) return Math.floor(secs / 60) + 'm idle';
  return Math.floor(secs / 3600) + 'h idle';
}

function fmtDuration(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 24) return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
  return h + 'h ' + m + 'm';
}

function fmtTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts.includes('T') ? ts : ts + 'Z');
    const now = Date.now();
    const diff = (now - d.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  } catch { return ts; }
}

function fmtDate(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts.includes('T') ? ts : ts + 'Z');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  } catch { return ts; }
}

// ── Init ────────────────────────────────────────────────────────
window.addEventListener('hashchange', route);
updateAuthNav();
validateToken().then(() => route());
</script>
