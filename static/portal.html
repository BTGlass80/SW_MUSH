<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars D6 MUSH — Galactic Civil War Era</title>
<meta name="description" content="A Star Wars text-based multiplayer game using the WEG D6 Revised & Expanded ruleset. Set during the Galactic Civil War era across four planets.">
<meta property="og:title" content="Star Wars D6 MUSH — Galactic Civil War Era">
<meta property="og:description" content="AI-driven narrative, player-driven economy, 120+ rooms across 4 planets. WEG D6 Revised & Expanded. Play free in your browser.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Star Wars D6 MUSH">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Star Wars D6 MUSH — Galactic Civil War Era">
<meta name="twitter:description" content="AI-driven Star Wars MUSH with WEG D6 rules. Smuggle, duel, pilot, and roleplay across four planets. Play free in your browser.">
<meta name="theme-color" content="#1a1412">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════
   PORTAL — Field Kit theme (amber datapad).
   Tokens mirror static/client.html's --pad-* palette so the portal
   and the in-game client feel like surfaces of the same device.
   ════════════════════════════════════════════════════════════════════ */

:root {
  /* Datapad palette (from client.html / field-kit.jsx) */
  --pad-shell:        #2a2220;
  --pad-shell-dark:   #1a1412;
  --pad-bezel:        #1e1815;
  --pad-screen:       #14200e;
  --pad-screen-dim:   #0b1408;
  --pad-amber:        #ffc857;
  --pad-amber-bright: #ffe3a0;
  --pad-amber-dim:    #8a6220;
  --pad-green:        #7ce068;
  --pad-red:          #ff6e4a;
  --pad-text:         #d9b472;
  --pad-text-dim:     #7a5e2e;

  /* Semantic aliases */
  --bg-deep:       #0a0604;
  --bg-panel:      var(--pad-shell-dark);
  --bg-card:       var(--pad-bezel);
  --bg-inset:      #0f0a07;
  --bg-input:      rgba(0, 0, 0, 0.45);
  --border-dim:    rgba(138, 98, 32, 0.25);
  --border-mid:    rgba(138, 98, 32, 0.5);
  --border-bright: var(--pad-amber-dim);

  --text-primary: var(--pad-text);
  --text-dim:     var(--pad-text-dim);
  --text-bright:  var(--pad-amber-bright);
  --accent:       var(--pad-amber);
  --accent-bright:var(--pad-amber-bright);
  --accent-dim:   var(--pad-amber-dim);
  --ok:           var(--pad-green);
  --warn:         var(--pad-red);

  --font-mono:    'IBM Plex Mono', 'Berkeley Mono', Menlo, Consolas, monospace;
  --font-display: 'Space Grotesk', 'Rajdhani', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100%;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

body {
  background:
    radial-gradient(ellipse at 50% -20%, rgba(255, 200, 87, 0.04) 0%, transparent 50%),
    linear-gradient(180deg, var(--pad-shell-dark) 0%, var(--bg-deep) 80%);
}

a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-bright); text-shadow: 0 0 8px rgba(255, 200, 87, 0.4); }

/* Scrollbars */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Selection */
::selection { background: rgba(255, 200, 87, 0.25); color: var(--text-bright); }

/* ════════════════════════════════════════════════════════════════════
   NAV — hardware strip at top with rivets along the bottom edge
   ════════════════════════════════════════════════════════════════════ */

nav.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px;
  background: linear-gradient(180deg, var(--pad-shell) 0%, var(--pad-shell-dark) 100%);
  border-bottom: 2px solid #000;
  box-shadow:
    inset 0 1px 0 rgba(255, 220, 160, 0.08),
    0 4px 12px rgba(0, 0, 0, 0.6);
}

/* Rivet strip along bottom of nav */
nav.topbar::after {
  content: "";
  position: absolute; left: 40px; right: 40px; bottom: -2px;
  height: 4px; pointer-events: none;
  --rivets: 32;
  background-image: radial-gradient(circle at center, #6a5e4a 0%, #0a0604 60%, transparent 70%);
  background-size: calc(100% / var(--rivets)) 4px;
  background-repeat: repeat-x;
  -webkit-mask-image: radial-gradient(circle 1.8px at center, #000 95%, transparent 100%);
  -webkit-mask-size: calc(100% / var(--rivets)) 100%;
  -webkit-mask-repeat: repeat-x;
          mask-image: radial-gradient(circle 1.8px at center, #000 95%, transparent 100%);
          mask-size: calc(100% / var(--rivets)) 100%;
          mask-repeat: repeat-x;
  filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
}

nav .logo {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700;
  color: var(--accent);
  letter-spacing: 3px;
  cursor: pointer;
  text-shadow: 0 0 10px rgba(255, 200, 87, 0.35);
  user-select: none;
}
nav .logo:hover { color: var(--accent-bright); }

nav .nav-links { display: flex; gap: 6px; align-items: center; }
nav .nav-links a {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 2px;
  padding: 6px 12px;
  text-transform: uppercase;
  transition: all 120ms ease;
  border: 1px solid transparent;
}
nav .nav-links a:hover,
nav .nav-links a.active {
  color: var(--accent);
  text-shadow: 0 0 6px rgba(255, 200, 87, 0.3);
}
nav .nav-links a.active { border-color: var(--border-dim); background: rgba(255, 200, 87, 0.04); }

nav .play-btn {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  color: #1a1008;
  letter-spacing: 3px;
  padding: 7px 18px; margin-left: 4px;
  background: linear-gradient(180deg, #d6a038, #9a7220);
  border: 1px solid #2a1808;
  border-radius: 2px;
  box-shadow:
    inset 0 1px 1px rgba(255, 220, 160, 0.3),
    0 2px 4px rgba(0, 0, 0, 0.5),
    0 0 10px rgba(255, 200, 87, 0.3);
  cursor: pointer;
  transition: all 120ms;
  text-transform: uppercase;
}
nav .play-btn:hover {
  color: #1a1008;
  text-shadow: none;
  box-shadow:
    inset 0 1px 1px rgba(255, 220, 160, 0.4),
    0 2px 4px rgba(0, 0, 0, 0.5),
    0 0 16px rgba(255, 200, 87, 0.7);
}
nav .play-btn:active { transform: translateY(1px); }

.nav-toggle {
  display: none;
  background: none; border: 1px solid var(--border-dim);
  color: var(--accent); font-size: 18px;
  padding: 4px 10px; cursor: pointer;
  border-radius: 2px;
}

/* ════════════════════════════════════════════════════════════════════
   APP CONTAINER — the content "screen" below the nav
   ════════════════════════════════════════════════════════════════════ */

#app {
  min-height: calc(100vh - 56px);
  padding: 0;
}

/* ════════════════════════════════════════════════════════════════════
   LANDING — hero + stats + getting-started + news
   ════════════════════════════════════════════════════════════════════ */

.landing-hero {
  position: relative;
  text-align: center;
  padding: 72px 24px 40px;
  overflow: hidden;
}

/* Scanlines only on the hero — preserves readability elsewhere */
.landing-hero::before {
  content: "";
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: repeating-linear-gradient(
    0deg,
    transparent 0, transparent 2px,
    rgba(0, 0, 0, 0.18) 2px, rgba(0, 0, 0, 0.18) 3px
  );
  opacity: 0.8;
}
.landing-hero::after {
  content: "";
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: radial-gradient(ellipse at 50% 40%, transparent 45%, rgba(0, 0, 0, 0.6) 100%);
}
.app.clean .landing-hero::before,
.app.clean .landing-hero::after { display: none; }

.landing-hero > * { position: relative; z-index: 2; }

.landing-hero .boot-label {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 4px;
  color: var(--accent-dim);
  margin-bottom: 14px;
}
.landing-hero .boot-label .led {
  display: inline-block; width: 6px; height: 6px;
  background: var(--ok); border-radius: 50%;
  margin-right: 6px; vertical-align: middle;
  box-shadow: 0 0 6px var(--ok);
  animation: led-blink 2.4s ease-in-out infinite;
}
@keyframes led-blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.5; }
}

.landing-hero h1 {
  font-family: var(--font-display);
  font-size: clamp(32px, 6vw, 54px);
  color: var(--accent);
  letter-spacing: 4px;
  font-weight: 700;
  margin-bottom: 10px;
  text-shadow:
    0 0 14px rgba(255, 200, 87, 0.45),
    0 0 30px rgba(255, 200, 87, 0.2);
}
.app.clean .landing-hero h1 { text-shadow: none; }

.landing-hero .subtitle {
  font-family: var(--font-mono);
  font-size: 12px; letter-spacing: 3px;
  color: var(--text-dim);
  margin-bottom: 36px;
}

.landing-cta {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 44px;
}
.btn {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 3px; font-weight: 700;
  padding: 12px 26px;
  border-radius: 2px;
  text-transform: uppercase;
  transition: all 120ms ease;
  cursor: pointer;
  border: 1px solid transparent;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary {
  color: #1a1008;
  background: linear-gradient(180deg, #d6a038, #9a7220);
  border-color: #2a1808;
  box-shadow:
    inset 0 1px 1px rgba(255, 220, 160, 0.3),
    0 2px 4px rgba(0, 0, 0, 0.5),
    0 0 10px rgba(255, 200, 87, 0.3);
}
.btn-primary:hover {
  color: #1a1008;
  box-shadow:
    inset 0 1px 1px rgba(255, 220, 160, 0.4),
    0 2px 4px rgba(0, 0, 0, 0.5),
    0 0 18px rgba(255, 200, 87, 0.7);
}
.btn-secondary {
  color: var(--accent);
  background: var(--bg-input);
  border-color: var(--accent-dim);
}
.btn-secondary:hover {
  color: var(--accent-bright);
  border-color: var(--accent);
  background: rgba(255, 200, 87, 0.06);
  box-shadow: 0 0 8px rgba(255, 200, 87, 0.25);
}
.btn:active { transform: translateY(1px); }

/* Stat pills */
.landing-stats {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 48px;
}
.stat-pill {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  padding: 10px 18px;
  min-width: 110px;
  text-align: center;
  border-radius: 2px;
  box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.4);
}
.stat-pill .num {
  display: block;
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700;
  color: var(--accent-bright);
  text-shadow: 0 0 6px rgba(255, 200, 87, 0.35);
  letter-spacing: 1px;
}
.app.clean .stat-pill .num { text-shadow: none; }
.stat-pill .label {
  font-size: 9px; letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.landing-desc {
  max-width: 680px;
  margin: 0 auto 52px;
  text-align: center;
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.75;
  padding: 0 16px;
}

/* Getting-started tiles — three mini "datapad panels" */
.getting-started {
  max-width: 960px;
  margin: 0 auto 56px;
  padding: 0 24px;
}
.getting-started h3 {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 3px;
  color: var(--accent-dim);
  text-align: center;
  margin-bottom: 16px;
  text-transform: uppercase;
}
.gs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
}
.gs-tile {
  display: block;
  background: linear-gradient(180deg, var(--bg-card), var(--bg-inset));
  border: 1px solid var(--border-dim);
  padding: 18px 20px;
  border-radius: 2px;
  box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.5);
  transition: all 160ms ease;
}
.gs-tile:hover {
  border-color: var(--accent);
  box-shadow:
    inset 0 0 12px rgba(0, 0, 0, 0.5),
    0 0 14px rgba(255, 200, 87, 0.25);
  transform: translateY(-1px);
}
.gs-tile .gs-num {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px;
  color: var(--accent-dim);
  margin-bottom: 8px;
}
.gs-tile .gs-title {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 600;
  color: var(--accent);
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.gs-tile:hover .gs-title { color: var(--accent-bright); }
.gs-tile .gs-desc {
  font-size: 13px; color: var(--text-primary);
  line-height: 1.55;
}

/* News feed */
.landing-news {
  max-width: 680px;
  margin: 0 auto 64px;
  padding: 0 24px;
}
.landing-news h3 {
  font-family: var(--font-display);
  font-size: 13px; letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-dim);
  text-transform: uppercase;
}
.news-item {
  padding: 10px 0;
  border-bottom: 1px solid rgba(138, 98, 32, 0.15);
  font-size: 13px;
  line-height: 1.55;
}
.news-item .time {
  display: block;
  color: var(--text-dim);
  font-size: 10px;
  letter-spacing: 1px;
  margin-bottom: 2px;
  text-transform: uppercase;
}

/* ════════════════════════════════════════════════════════════════════
   PAGE LAYOUT — standard container for non-landing views
   ════════════════════════════════════════════════════════════════════ */

.page {
  max-width: 960px;
  margin: 0 auto;
  padding: 36px 24px 72px;
}
.page h2 {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 700;
  color: var(--accent);
  letter-spacing: 3px;
  margin-bottom: 18px;
  text-transform: uppercase;
  text-shadow: 0 0 8px rgba(255, 200, 87, 0.3);
}
.app.clean .page h2 { text-shadow: none; }
.page-subtitle {
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-dim);
}

/* ════════════════════════════════════════════════════════════════════
   CARDS (for directories, lists)
   ════════════════════════════════════════════════════════════════════ */

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.card {
  background: linear-gradient(180deg, var(--bg-card), var(--bg-inset));
  border: 1px solid var(--border-dim);
  padding: 16px 18px;
  border-radius: 2px;
  box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.4);
  cursor: pointer;
  transition: all 150ms ease;
}
.card:hover {
  border-color: var(--accent-dim);
  box-shadow:
    inset 0 0 10px rgba(0, 0, 0, 0.4),
    0 0 10px rgba(255, 200, 87, 0.2);
}
.card .card-name {
  font-family: var(--font-display);
  font-size: 14px; font-weight: 600;
  color: var(--accent);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.card:hover .card-name { color: var(--accent-bright); }
.card .card-meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}
.card .card-desc {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.55;
}

.online-dot, .offline-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 6px; vertical-align: middle;
}
.online-dot {
  background: var(--ok);
  box-shadow: 0 0 5px var(--ok);
}
.offline-dot { background: var(--text-dim); }
.app.clean .online-dot { box-shadow: none; }

/* Badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 2px;
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase;
  border: 1px solid transparent;
}
.badge-faction {
  background: rgba(255, 200, 87, 0.1);
  color: var(--accent);
  border-color: var(--border-dim);
}
.badge-type {
  background: rgba(124, 224, 104, 0.08);
  color: var(--ok);
  border-color: rgba(124, 224, 104, 0.25);
}
.badge-status-open {
  background: rgba(124, 224, 104, 0.1);
  color: var(--ok);
  border-color: rgba(124, 224, 104, 0.3);
}
.badge-status-closed {
  background: rgba(255, 110, 74, 0.1);
  color: var(--warn);
  border-color: rgba(255, 110, 74, 0.3);
}
.badge-tag {
  background: rgba(138, 98, 32, 0.12);
  color: var(--accent-dim);
  border-color: transparent;
  font-size: 9px;
  letter-spacing: 1px;
}

/* ════════════════════════════════════════════════════════════════════
   TABLE
   ════════════════════════════════════════════════════════════════════ */

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px; font-weight: 600;
  color: var(--accent-dim);
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-mid);
  text-transform: uppercase;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-dim);
}
tr:hover td { background: rgba(255, 200, 87, 0.03); }

/* ════════════════════════════════════════════════════════════════════
   PROFILE / DETAIL
   ════════════════════════════════════════════════════════════════════ */

.profile-header {
  display: flex; gap: 24px; align-items: flex-start;
  margin-bottom: 28px; flex-wrap: wrap;
}
.profile-header .ph-info { flex: 1; min-width: 200px; }
.profile-header h2 { margin-bottom: 4px; }

.profile-section { margin-bottom: 28px; }
.profile-section h3 {
  font-family: var(--font-display);
  font-size: 12px; font-weight: 600; letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-dim);
}
.profile-section p,
.profile-section .content {
  font-size: 13px; line-height: 1.7;
  white-space: pre-wrap;
  color: var(--text-primary);
}

/* Scene/pose detail */
.pose {
  padding: 14px 0;
  border-bottom: 1px solid var(--border-dim);
}
.pose .pose-char {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  color: var(--accent);
  letter-spacing: 1px;
}
.pose .pose-content {
  font-size: 13px; line-height: 1.7; margin-top: 4px;
  color: var(--text-primary);
}
.pose .pose-time {
  font-size: 10px; color: var(--text-dim);
  margin-top: 4px; letter-spacing: 1px;
}

/* ════════════════════════════════════════════════════════════════════
   MARKDOWN BODY — used for guides and reference entries
   ════════════════════════════════════════════════════════════════════ */

.md-body {
  font-size: 14px; line-height: 1.75;
  color: var(--text-primary);
  max-width: 720px;
}
.md-body h1 {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700; letter-spacing: 2px;
  color: var(--accent-bright);
  margin: 32px 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-dim);
}
.md-body h1:first-child { margin-top: 0; }
.md-body h2 {
  font-family: var(--font-display);
  font-size: 17px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--accent);
  margin: 26px 0 10px;
}
.md-body h3 {
  font-family: var(--font-display);
  font-size: 14px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--text-bright);
  margin: 22px 0 8px;
  text-transform: uppercase;
}
.md-body p { margin-bottom: 14px; }
.md-body ul, .md-body ol { padding-left: 24px; margin-bottom: 14px; }
.md-body li { margin-bottom: 4px; }
.md-body code {
  font-family: var(--font-mono);
  background: var(--bg-input);
  padding: 2px 6px;
  border-radius: 2px;
  font-size: 12.5px;
  color: var(--accent-bright);
  border: 1px solid var(--border-dim);
}
.md-body pre {
  background: var(--bg-inset);
  border: 1px solid var(--border-dim);
  padding: 14px;
  border-radius: 2px;
  overflow-x: auto;
  margin: 14px 0;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--text-primary);

<body>

<div id="appshell" class="app">

<nav class="topbar">
  <span class="logo" onclick="navigate('#/')">SW · D6 MUSH</span>
  <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('show')">☰</button>
  <div class="nav-links">
    <a href="#/" onclick="navClick(event)">Home</a>
    <a href="#/who" onclick="navClick(event)">Who's Online</a>
    <a href="#/characters" onclick="navClick(event)">Characters</a>
    <a href="#/scenes" onclick="navClick(event)">Scenes</a>
    <a href="#/events" onclick="navClick(event)">Events</a>
    <a href="#/plots" onclick="navClick(event)">Plots</a>
    <a href="#/reference" onclick="navClick(event)">Reference</a>
    <a href="#/guides" onclick="navClick(event)">Guides</a>
    <span id="auth-nav"></span>
    <button class="clean-toggle" id="clean-toggle" onclick="toggleCleanMode()" title="Toggle scanlines & glow effects">FX</button>
    <a href="/play" class="play-btn">Play Now</a>
  </div>
</nav>

<div id="app"><div class="loading">Booting…</div></div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h3>Log In</h3>
    <label>Username</label>
    <input type="text" id="login-user" autocomplete="username">
    <label>Password</label>
    <input type="password" id="login-pass" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="error" id="login-error"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeLogin()">Cancel</button>
      <button class="btn-login" onclick="doLogin()">Connect</button>
    </div>
  </div>
</div>

<footer>Star Wars D6 MUSH · WEG Revised & Expanded · Galactic Civil War Era</footer>

</div><!-- /.app -->

<script>
/* ════════════════════════════════════════════════════════════════════
   State
   ════════════════════════════════════════════════════════════════════ */
let authToken = localStorage.getItem('portal_token') || null;
let authChars = [];
let cachedStats = null;
let whoInterval = null;
let cleanMode = localStorage.getItem('portal_clean') === '1';

// Apply clean mode on boot
if (cleanMode) document.getElementById('appshell').classList.add('clean');
// Reflect state on the toggle once DOM is ready — defer to next tick
setTimeout(() => {
  const tgl = document.getElementById('clean-toggle');
  if (tgl && !cleanMode) tgl.classList.add('on');  // "FX on" is default
  if (tgl && cleanMode) tgl.classList.remove('on');
}, 0);

function toggleCleanMode() {
  cleanMode = !cleanMode;
  const shell = document.getElementById('appshell');
  const tgl = document.getElementById('clean-toggle');
  if (cleanMode) {
    shell.classList.add('clean');
    tgl.classList.remove('on');
    localStorage.setItem('portal_clean', '1');
  } else {
    shell.classList.remove('clean');
    tgl.classList.add('on');
    localStorage.removeItem('portal_clean');
  }
}

/* ════════════════════════════════════════════════════════════════════
   Auth helpers
   ════════════════════════════════════════════════════════════════════ */
function updateAuthNav() {
  const el = document.getElementById('auth-nav');
  if (authToken) {
    let links = '';
    if (authChars.length) {
      links += '<a href="#/my-characters" onclick="navClick(event)" style="color:var(--ok)">My Characters</a>';
    }
    links += '<a href="#" onclick="doLogout(event)" style="color:var(--warn)">Log Out</a>';
    el.innerHTML = links;
  } else {
    el.innerHTML = '<a href="#" onclick="showLogin(event)">Log In</a>';
  }
}

function showLogin(e) { e && e.preventDefault(); document.getElementById('loginModal').classList.add('show'); document.getElementById('login-user').focus(); }
function closeLogin() { document.getElementById('loginModal').classList.remove('show'); document.getElementById('login-error').textContent = ''; }

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!user || !pass) { errEl.textContent = 'Username and password required.'; return; }
  try {
    const r = await fetch('/api/portal/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pass }) });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error || 'Login failed.'; return; }
    authToken = d.token;
    authChars = d.characters || [];
    localStorage.setItem('portal_token', authToken);
    closeLogin();
    updateAuthNav();
    route();
  } catch(e) { errEl.textContent = 'Connection error.'; }
}

function doLogout(e) { e && e.preventDefault(); authToken = null; authChars = []; localStorage.removeItem('portal_token'); updateAuthNav(); navigate('#/'); }

function authHeaders() { return authToken ? { 'Authorization': 'Bearer ' + authToken } : {}; }

async function validateToken() {
  if (!authToken) return;
  try {
    const r = await fetch('/api/portal/me', { headers: authHeaders() });
    if (!r.ok) { authToken = null; authChars = []; localStorage.removeItem('portal_token'); updateAuthNav(); return; }
    const d = await r.json();
    authChars = d.characters || [];
    updateAuthNav();
  } catch { /* keep token, validate next request */ }
}

/* ════════════════════════════════════════════════════════════════════
   API
   ════════════════════════════════════════════════════════════════════ */
async function api(path) {
  try {
    const r = await fetch(path, { headers: authHeaders() });
    return await r.json();
  } catch(e) { console.error('API error:', path, e); return null; }
}

/* ════════════════════════════════════════════════════════════════════
   Routing
   ════════════════════════════════════════════════════════════════════ */
function navigate(hash) { location.hash = hash; }
function navClick(e) {
  document.querySelector('.nav-links').classList.remove('show');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  if (e && e.target) e.target.classList.add('active');
}

async function route() {
  if (whoInterval) { clearInterval(whoInterval); whoInterval = null; }
  const hash = location.hash || '#/';
  const app = document.getElementById('app');

  // Update nav active state based on path prefix
  document.querySelectorAll('.nav-links a').forEach(a => {
    const href = a.getAttribute('href');
    if (!href) return;
    if (hash.startsWith(href) && href !== '#/') a.classList.add('active');
    else if (href === '#/' && hash === '#/') a.classList.add('active');
    else a.classList.remove('active');
  });

  // Reference has its own URL shape: #/reference, #/reference/search?q=..., #/reference/:slug
  if (hash === '#/' || hash === '#') return renderLanding(app);
  if (hash === '#/who') return renderWho(app);
  if (hash === '#/my-characters') return renderMyCharacters(app);
  if (hash === '#/characters') return renderCharacters(app);
  if (hash.startsWith('#/character/')) return renderProfile(app, hash.split('/')[2]);
  if (hash === '#/scenes') return renderScenes(app);
  if (hash.startsWith('#/scene/')) return renderSceneDetail(app, hash.split('/')[2]);
  if (hash === '#/events') return renderEvents(app);
  if (hash === '#/plots') return renderPlots(app);
  if (hash.startsWith('#/plot/')) return renderPlotDetail(app, hash.split('/')[2]);
  if (hash === '#/guides') return renderGuides(app);
  if (hash.startsWith('#/guide/')) return renderGuide(app, hash.split('/')[2]);
  if (hash === '#/reference') return renderReferenceHome(app);
  if (hash.startsWith('#/reference/search')) return renderReferenceSearch(app);
  if (hash.startsWith('#/reference/')) return renderReferenceEntry(app, hash.substring('#/reference/'.length).split('?')[0]);
  app.innerHTML = '<div class="page"><div class="empty">Page not found.</div></div>';
}

   ════════════════════════════════════════════════════════════════════ */
async function renderProfile(el, id) {
  el.innerHTML = '<div class="page"><div class="loading">Loading character…</div></div>';
  const data = await api(`/api/portal/character/${id}`);
  if (!data || data.error) { el.innerHTML = `<div class="page"><div class="empty">${data?.error || 'Character not found.'}</div></div>`; return; }

  let sections = '';
  if (data.background) sections += `<div class="profile-section"><h3>Background</h3><div class="content">${esc(data.background)}</div></div>`;
  if (data.faction_membership) sections += `<div class="profile-section"><h3>Faction</h3><p>${esc(data.faction_membership.name)} — ${esc(data.faction_membership.rank || 'Member')}</p></div>`;
  if (data.scars && data.scars.length) sections += `<div class="profile-section"><h3>Scars</h3><p>${data.scars.map(esc).join('<br>')}</p></div>`;

  const statLine = [
    data.achievement_count ? `${data.achievement_count} achievements` : null,
    data.scene_count ? `${data.scene_count} scenes` : null,
  ].filter(Boolean).join(' · ');

  let privateSections = '';
  if (data.is_own) {
    if (data.attributes) {
      const attrs = Object.entries(data.attributes).map(([k,v]) => `<tr><td style="color:var(--accent)">${esc(k)}</td><td>${esc(String(v))}</td></tr>`).join('');
      privateSections += `<div class="profile-section"><h3>Attributes</h3><table>${attrs}</table></div>`;
    }
    if (data.skills && Object.keys(data.skills).length) {
      const skills = Object.entries(data.skills).map(([k,v]) => `<tr><td>${esc(k)}</td><td>${esc(String(v))}</td></tr>`).join('');
      privateSections += `<div class="profile-section"><h3>Skills</h3><table>${skills}</table></div>`;
    }
    privateSections += `<div class="profile-section"><h3>Finances</h3><p>Credits: ${(data.credits||0).toLocaleString()} · CP: ${data.character_points||0}</p></div>`;
  }

  el.innerHTML = `
    <div class="page">
      <div class="profile-header">
        <div class="ph-info">
          <h2><span class="${data.online ? 'online-dot' : 'offline-dot'}"></span>${esc(data.name)}</h2>
          <div class="card-meta">${esc(data.species)} · ${esc(data.template || 'Custom')} ${data.faction !== 'Neutral' ? `· <span class="badge badge-faction">${esc(data.faction)}</span>` : ''}</div>
          ${statLine ? `<div class="card-meta" style="margin-top:4px">${statLine}</div>` : ''}
        </div>
      </div>
      ${data.description ? `<div class="profile-section"><h3>Description</h3><div class="content">${esc(data.description)}</div></div>` : ''}
      ${sections}
      ${privateSections}
      <div style="margin-top:16px"><a href="#/characters">&larr; Back to directory</a></div>
    </div>
  `;
}

   ════════════════════════════════════════════════════════════════════ */
async function renderEvents(el) {
  el.innerHTML = '<div class="page"><h2>Event Calendar</h2><div class="loading">Loading…</div></div>';
  const data = await api('/api/portal/events');
  if (!data) { el.querySelector('.loading').textContent = 'Failed to load.'; return; }

  if (!data.events.length) {
    el.innerHTML = `
      <div class="page">
        <h2>Event Calendar</h2>
        <div class="empty">No upcoming events scheduled.<br><span style="color:var(--text-dim)">Use <code>+event/create</code> in-game to schedule one.</span></div>
      </div>`;
    return;
  }

  const cards = data.events.map(ev => {
    const dt = new Date(ev.scheduled_at * 1000);
    const timeStr = dt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) + ' ' + dt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    const now = Date.now() / 1000;
    const diff = ev.scheduled_at - now;
    let countdown = '';
    if (diff < 0) countdown = '<span style="color:var(--warn)">past</span>';
    else if (diff < 3600) countdown = '<span style="color:var(--ok)">in ' + Math.floor(diff/60) + 'min</span>';
    else if (diff < 86400) countdown = '<span style="color:var(--accent)">in ' + Math.floor(diff/3600) + 'h</span>';
    else countdown = '<span style="color:var(--text-dim)">in ' + Math.floor(diff/86400) + 'd</span>';

    let statusBadge = '';
    if (ev.status === 'cancelled') statusBadge = ' <span class="badge badge-status-closed">Cancelled</span>';

    return `
      <div class="card" style="cursor:default">
        <div class="card-name">${esc(ev.title)}${statusBadge}</div>
        <div class="card-meta">${timeStr} · ${countdown}</div>
        ${ev.location ? '<div class="card-meta">@ '+esc(ev.location)+'</div>' : ''}
        <div class="card-meta">${ev.signup_count} signed up · by ${esc(ev.creator_name)}</div>
        ${ev.description ? '<div class="card-desc" style="margin-top:8px">'+esc(ev.description)+'</div>' : ''}
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="page">
      <h2>Event Calendar</h2>
      <p class="page-subtitle">${data.total} event${data.total !== 1 ? 's' : ''} · Sign up in-game with <code>+event/signup &lt;id&gt;</code></p>
      <div class="card-grid">${cards}</div>
    </div>`;
}

    ? ' <span class="badge badge-status-closed">Closed</span>'
    : ' <span class="badge badge-status-open">Open</span>';

  const scenes = (data.scenes || []).map(s => {
    const shared = s.status === 'shared';
    return `
      <div class="card" ${shared ? `onclick="navigate('#/scene/${s.id}')" style="cursor:pointer"` : 'style="cursor:default"'}>
        <div class="card-name">${esc(s.title || '(untitled)')}</div>
        <div class="card-meta">
          ${s.scene_type ? `<span class="badge badge-type">${esc(s.scene_type)}</span> ` : ''}
          ${s.pose_count} poses · ${s.participants.map(esc).join(', ')}
          ${s.started_at ? ' · ' + fmtDate(s.started_at) : ''}
        </div>
        ${s.summary ? `<div class="card-desc">${esc(s.summary)}</div>` : ''}
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="page">
      <h2>${esc(data.title)}${status}</h2>
      <div class="card-meta" style="margin-bottom:16px">
        by ${esc(data.creator_name)} · created ${fmtDate(data.created_at)} · updated ${fmtDate(data.updated_at)}
      </div>
      ${data.summary ? `<div class="profile-section"><h3>Summary</h3><p>${esc(data.summary)}</p></div>` : ''}
      <div class="profile-section">
        <h3>Linked Scenes (${data.scenes.length})</h3>
        ${scenes || '<div class="empty">No scenes linked yet. Use <code>+plot/link</code> in-game.</div>'}
      </div>
      <div style="margin-top:16px"><a href="#/plots">&larr; Back to plots</a></div>
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════════════
   Reference — the new Command + Topic reference surface.
   All rendering is driven by the server's /api/portal/reference
   responses. No category names, command keys, or topic keywords
   are hardcoded in this module — when the help system content
   changes, this view reflects it automatically.
   ════════════════════════════════════════════════════════════════════ */

let _refIndex = null;           // cached tree + flat list
let _refIndexPromise = null;    // dedup in-flight requests

function getReferenceIndex() {
  if (_refIndex) return Promise.resolve(_refIndex);
  if (_refIndexPromise) return _refIndexPromise;
  _refIndexPromise = api('/api/portal/reference').then(d => {
    _refIndexPromise = null;
    // Defense-in-depth: api() returns the JSON body even on HTTP error
    // status (e.g. 503 with {error: "..."}), so an error envelope reaches
    // here as a truthy object that lacks the `tree` field. Treat that as
    // a failure so renderers hit their `if (!index)` fallback instead of
    // throwing on Object.entries(undefined) and leaving the spinner stuck.
    if (!d || d.error || !d.tree) {
      _refIndex = null;
      return null;
    }
    _refIndex = d;
    return d;
  });
  return _refIndexPromise;
}

function renderRefSidebar(index, activeSlug) {
  if (!index || !index.tree) return '<div class="ref-sidebar"><div class="empty">No reference data.</div></div>';
  const tree = index.tree;

  function renderEntriesList(entries) {
    if (!entries || !entries.length) return '';
    return entries.map(e => `
      <a href="#/reference/${encodeURIComponent(e.slug)}" onclick="navClick(event)" class="ref-entry-link ${activeSlug === e.slug ? 'active' : ''}">
        <span class="ref-entry-key">${esc(e.key)}</span><span class="ref-entry-title">${esc(e.title)}</span>
      </a>
    `).join('');
  }

  function renderNode(name, node, depth) {
    const hasSubs = node.subcategories && Object.keys(node.subcategories).length > 0;
    const hasEntries = node.entries && node.entries.length > 0;
    // Auto-open the first level so users see structure immediately.
    const openClass = depth === 0 ? 'open' : '';
    const header = depth === 0
      ? `<div class="ref-cat-name" onclick="toggleRefCat(this)">${esc(name)}</div>`
      : `<div class="ref-sub-name">${esc(name)}</div>`;
    let body = '';
    if (hasEntries) body += renderEntriesList(node.entries);
    if (hasSubs) {
      body += Object.entries(node.subcategories).map(
        ([subName, subNode]) => renderNode(subName, subNode, depth + 1)
      ).join('');
    }
    return `<div class="ref-cat ${openClass}">${header}<div class="ref-cat-children">${body}</div></div>`;
  }

  const body = Object.entries(tree).map(
    ([name, node]) => renderNode(name, node, 0)
  ).join('');

  return `
    <div class="ref-sidebar">
      <div class="ref-sidebar-header">◆ Reference</div>
      <div class="ref-search-wrap">
        <input type="text" id="ref-search-input" placeholder="Search…" onkeydown="if(event.key==='Enter')doRefSearch(this.value)">
      </div>
      ${body}
    </div>
  `;
}

function toggleRefCat(headerEl) {
  const cat = headerEl.parentElement;
  if (cat) cat.classList.toggle('open');
}

function doRefSearch(q) {
  q = (q || '').trim();
  if (!q) return;
  navigate('#/reference/search?q=' + encodeURIComponent(q));
}

async function renderReferenceHome(el) {
  el.innerHTML = '<div class="ref-layout"><div class="loading">Loading reference…</div></div>';
  const index = await getReferenceIndex();
  if (!index) { el.innerHTML = '<div class="page"><div class="empty">Failed to load reference.</div></div>'; return; }

  // Build the home layout: sidebar + category overview cards
  const catBlocks = Object.entries(index.tree).map(([catName, node]) => {
    // Flatten entries in this top-level category (including nested subcategories)
    function walk(n, acc) {
      acc.push(...n.entries);
      for (const sub of Object.values(n.subcategories || {})) walk(sub, acc);
      return acc;
    }
    const all = walk(node, []);
    if (!all.length) return '';
    const shown = all.slice(0, 8);
    const cards = shown.map(e => `
      <div class="ref-card" onclick="navigate('#/reference/${encodeURIComponent(e.slug)}')">
        <div class="ref-card-header">
          <span class="ref-card-key">${esc(e.key)}</span>
          <span class="ref-card-title">${esc(e.title)}</span>
        </div>
        ${e.summary ? `<div class="ref-card-summary">${esc(e.summary)}</div>` : ''}
        ${e.tags && e.tags.length ? `<div class="ref-card-tags">${e.tags.slice(0,3).map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>
    `).join('');
    const overflow = all.length > shown.length
      ? `<div class="card-meta" style="margin-top:10px;color:var(--text-dim)">+ ${all.length - shown.length} more in this section</div>`
      : '';
    return `
      <div class="ref-cat-block">
        <h3>${esc(catName)}</h3>
        <div class="ref-card-grid">${cards}</div>
        ${overflow}
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="ref-layout">
      ${renderRefSidebar(index, null)}
      <div class="ref-content">
        <div class="ref-home-intro">
          <h2 style="margin-bottom:10px">Command &amp; Topic Reference</h2>
          <p>Every command and rules topic in the game, searchable. The categories below mirror how the game groups help — click any entry for full details, examples, and cross-references. This reference is live: as the game's help content is updated, this page updates with it.</p>
          <div style="margin-top:14px;color:var(--text-dim);font-size:12px;">${index.total} entries · Try searching for <code>combat</code>, <code>dice</code>, <code>force</code>, or <code>hyperspace</code>.</div>
        </div>
        ${catBlocks}
      </div>
    </div>
  `;
}

async function renderReferenceEntry(el, rawSlug) {
  const slug = decodeURIComponent(rawSlug || '');
  if (!slug) { navigate('#/reference'); return; }

  el.innerHTML = '<div class="ref-layout"><div class="loading">Loading entry…</div></div>';
  const [index, entry] = await Promise.all([
    getReferenceIndex(),
    api('/api/portal/reference/' + encodeURIComponent(slug)),
  ]);
  if (!entry || entry.error) {
    el.innerHTML = `
      <div class="ref-layout">
        ${renderRefSidebar(index, null)}
        <div class="ref-content"><div class="empty">${entry?.error || 'Reference entry not found.'}</div></div>
      </div>`;
    return;
  }

  const examplesHtml = (entry.examples && entry.examples.length)
    ? `
      <div class="ref-detail-examples">
        <h4>Examples</h4>
        ${entry.examples.map(ex => `
          <div class="ref-example-row">
            <div class="ref-example-cmd">${esc(ex.cmd || '')}</div>
            <div class="ref-example-desc">${esc(ex.description || '')}</div>
          </div>
        `).join('')}
      </div>`
    : '';

  const seeAlsoHtml = (entry.see_also && entry.see_also.length)
    ? `
      <div class="ref-detail-see-also">
        <span class="ref-detail-see-also-label">See also</span>
        ${entry.see_also.map(k => `
          <a class="ref-chip" href="#/reference/${encodeURIComponent(k.replace(/\//g, '__'))}" onclick="navClick(event)">${esc(k)}</a>
        `).join('')}
      </div>`
    : '';

  const aliasesHtml = (entry.aliases && entry.aliases.length)
    ? `<div class="ref-detail-meta-item"><strong>Aliases:</strong> ${entry.aliases.map(a => `<code>${esc(a)}</code>`).join(', ')}</div>`
    : '';

  const tagsHtml = (entry.tags && entry.tags.length)
    ? `<div class="ref-detail-meta-item"><strong>Tags:</strong> ${entry.tags.map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join(' ')}</div>`
    : '';

  const updatedHtml = entry.updated_at
    ? `<div class="ref-detail-meta-item"><strong>Updated:</strong> ${esc(entry.updated_at.split('T')[0] || entry.updated_at)}</div>`
    : '';

  el.innerHTML = `
    <div class="ref-layout">
      ${renderRefSidebar(index, entry.slug)}
      <div class="ref-content">
        <div class="ref-detail">
          <div class="ref-detail-header">
            <div class="ref-detail-crumb">
              <a href="#/reference" onclick="navClick(event)">◆ Reference</a> · ${esc(entry.category || '')}
            </div>
            <h2>
              <span class="ref-detail-key">${esc(entry.key)}</span>
              <span class="ref-detail-title">${esc(entry.title)}</span>
            </h2>
            ${entry.summary ? `<div class="ref-detail-summary">${esc(entry.summary)}</div>` : ''}
            <div class="ref-detail-meta">
              ${aliasesHtml}
              ${tagsHtml}
              ${updatedHtml}
            </div>
          </div>
          <div class="md-body">${renderMarkdown(entry.body || '')}</div>
          ${examplesHtml}
          ${seeAlsoHtml}
        </div>
      </div>
    </div>
  `;
}

async function renderReferenceSearch(el) {
  const qs = location.hash.split('?')[1] || '';
  const q = new URLSearchParams(qs).get('q') || '';
  el.innerHTML = '<div class="ref-layout"><div class="loading">Searching…</div></div>';

  const [index, results] = await Promise.all([
    getReferenceIndex(),
    q ? api('/api/portal/reference/search?q=' + encodeURIComponent(q) + '&limit=50') : Promise.resolve({results:[], total:0}),
  ]);

  const hasResults = results && results.results && results.results.length;
  const cards = hasResults ? results.results.map(e => `
    <div class="ref-card" onclick="navigate('#/reference/${encodeURIComponent(e.slug)}')">
      <div class="ref-card-header">
        <span class="ref-card-key">${esc(e.key)}</span>
        <span class="ref-card-title">${esc(e.title)}</span>
      </div>
      <div class="ref-card-summary" style="color:var(--text-dim);margin-top:2px;font-size:11px;letter-spacing:1px;">${esc(e.category || '')}</div>
      ${e.summary ? `<div class="ref-card-summary">${esc(e.summary)}</div>` : ''}
    </div>
  `).join('') : '';

  el.innerHTML = `
    <div class="ref-layout">
      ${renderRefSidebar(index, null)}
      <div class="ref-content">
        <div class="ref-detail-header">
          <div class="ref-detail-crumb"><a href="#/reference" onclick="navClick(event)">◆ Reference</a> · Search</div>
          <h2><span class="ref-detail-title">Search: "${esc(q)}"</span></h2>
          <div class="ref-detail-meta">
            <div class="ref-detail-meta-item"><strong>${results ? results.total : 0}</strong> result${results && results.total === 1 ? '' : 's'}</div>
          </div>
        </div>
        ${hasResults
          ? `<div class="ref-search-results">${cards}</div>`
          : '<div class="empty">No matches. Try a shorter keyword or browse the sidebar.</div>'}
      </div>
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════════════
   Markdown renderer (simple)
   ════════════════════════════════════════════════════════════════════ */
function renderMarkdown(md) {
  if (!md) return '';
  let html = esc(md);
  // Code blocks (``` ... ```)
  html = html.replace(/```([^`]*?)```/gs, (_, code) => '<pre>' + code.trim() + '</pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Horizontal rule
  html = html.replace(/^---+$/gm, '<hr>');
  // Tables (simple: | col | col |)
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, hdr, sep, body) => {
    const ths = hdr.split('|').filter(c=>c.trim()).map(c=>'<th>'+c.trim()+'</th>').join('');
    const trs = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c=>c.trim()).map(c=>'<td>'+c.trim()+'</td>').join('');
      return '<tr>'+tds+'</tr>';
    }).join('');
    return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table>';
  });
  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>(\n|$))+/g, m => '<ul>' + m + '</ul>');
  // Paragraphs (double newline)
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // Clean up empty <p> around block elements
  html = html.replace(/<p>\s*(<h[1-4]|<pre|<table|<ul|<hr|<blockquote)/g, '$1');
  html = html.replace(/(<\/h[1-4]>|<\/pre>|<\/table>|<\/ul>|<\/blockquote>|<hr>)\s*<\/p>/g, '$1');
  return html;
}

/* ════════════════════════════════════════════════════════════════════
   Utility
   ════════════════════════════════════════════════════════════════════ */
function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

function fmtIdle(secs) {
  if (secs < 60) return 'Active';
  if (secs < 3600) return Math.floor(secs / 60) + 'm idle';
  return Math.floor(secs / 3600) + 'h idle';
}

function fmtDuration(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 24) return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
  return h + 'h ' + m + 'm';
}

function fmtTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts.includes('T') ? ts : ts + 'Z');
    const now = Date.now();
    const diff = (now - d.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  } catch { return ts; }
}

function fmtDate(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts.includes('T') ? ts : ts + 'Z');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  } catch { return ts; }
}
